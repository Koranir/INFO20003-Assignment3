    price: 19.95
    isbn: "1876044152"
    release_date: "1997"
    page_count: 175
    reviews:
        - title: Sydney Smith, Write On
          text:
              "Sydney Smith Write On , April 1997 These are collected stories by the winners, since 1985, of the Eltham Alan Marshall Short Story
              Award. Introducing each year’s winners are bio-notes on the writers, their comments on the experience of writing, and potted tutorials by
              Jon Weaving on some aspect of the short story form. A few winners were left out as Jon was unable to find them to gain their permission
              for inclusion. The little tutorials seem adequate as signposts pointing newcomers in the right direction. I agreed with all his points,
              and heartily agreed with his piece on the narrative connect-a-bits: he said, she answered, it howled forlornly. The stories themselves varied
              widely as to approach and content. I liked Tony Lintermans’ ‘The Great Man and Three Chickens’ for its braggadocio similes, Catherine Ford’s
              ‘Empty’ for its unforced delivery and the beauty of its structure, and to Patrick West for ‘Cruelty’, biopsy of a deranged mind, I gave
              a big fat elephant stamp. Special mention to Adam Hinkle’s funny prose cartoon ‘The Haircut That Changed My Life’."
        - title: Muse Review
          text:
              Books And The Winner Is… Writers and judges discuss what makes a winning story, by Jon Weaving Robert Verdon Muse , No. 170, February
              1998 Like the compiler, I wondered what it was about some of these stories that made them ‘winners’. Many appeared flawed. I found myself
              thinking about the non-winning entries, but of course none are included. In this rather didactic anthology of Nillumbik’s Alan Marshall
              Short Story Award, Jon Weaving ponders the question of how stories are to be judged. His approach brought certain questions to my own mind.
              Why should Gary Disher’s 1985 story ‘Poor Reception’, centering on a guilt-ridden man who seems to regard the whole of humanity as ‘perverts’,
              be regarded as worthy of an award, for example? It gives us no reason to accept the outlook of the protagonist as plausible. (Disher himself
              later said ‘I can do much better now’.) Other stories are remarkable. Gillian Mears’ ‘Relics of the Past’ (1987) portrays a woman who has
              been scarred by an inability to get close to her bumbling father, now dying. She is left with the mere relics of this painful relationship
              and the regret of his ageing mother. As we read, we are compelled to confront our own mortality. Patrick West’s ‘Cruelty’ (1990) begins
              with the frightening statement, ‘I have always had a great capacity for cruelty’. It is an eccentric piece whose central character apparently
              suffers from a strange disassociation from the world she inhabits, and whose actions seem aimless. It bears the mark of eighties’ social
              pessimism. As she says, ‘My eyes shoot rays out and over the steaming traffic of the indigo remains of the city. I see it. It doesn’t see
              me. I am leaving it.’ She drives from Melbourne almost to Cairns, then simply turns round and goes home. I think that many writers who read
              this book - and they are likely to be its main audience - will be struck by an analogous arbitrariness in relation to the awarding of this
              (and maybe any) literary prize.
shelter-an-oral-history-of-marjorie-oke-house:
    title: Shelter, An Oral History of Marjorie Oke House
    author: Rhonda Wilson
    short_description:
        What’s great about the Pokies are the pretty pictures and the music, The Black Rhino or Wild Africa and the Cougar one, they’ve
        got beautiful animals on them.
    long_description:
        "What’s great about the Pokies are the pretty pictures and the music, The Black Rhino or Wild Africa and the Cougar one, they’ve
        got beautiful animals on them. Ann Rhonda Wilson introducing Shelter argues: ‘Oral history is important because it records the unofficial
        or subtle history of the world as distinct from received official history, which is largely the history of men’s power struggles and men’s
        wars. Whereas this subtle history tells the lives of the people. It is precious because it truly paints a picture of the times we live in:
        the traditions, the culture. It fosters respect for the way people speak: the rhythms, the colloquialisms, the turns of phrase that characterise
        a particular people at a particular time.’ So this group of pregnant young women would walk down the main road, down to the shops in Fairfield.
        We must have looked like quite a circus show, it was very embarrassing, very shaming. Janet Shelter, An Oral History of Marjorie Oke Rooming
        House for Women , tells in their own words those women’s stories which we would prefer kept hidden."
    price: 27.95
    isbn: "9781876044527"
    release_date: "2007"
    page_count: 304
    reviews:
        - title: Voiceprint Review
          text:
              "SHELTER Joyce Cribb Voiceprint (Newsletter of the NSW Branch of the Oral History Association of Australia), No. 39, October 2008 There
              is a big red brick house in Station St in Fairfield, Victoria. It used to be owned by MacPherson Robertson who made his fame and fortune
              in chocolates. It is strange that a house built on so much sweet sugar and cocoa would over time house so much sadness and pain. This oral
              history of MarjorieOke Rooming House for Women shines a light on individual lives but also shows us society's changing attitudes between
              the 1950s and the present, from a time when single women had their newborn babies taken away from them for adoption to a time when even
              the most marginalized women are offered support and shelter in a comfortable rooming house. This subtle social history tells the lives of
              the people. It is precious because it truly paints a picture of the times we live in: the traditions, the culture. It fosters respect for
              the way people speak: the rhythms, the colloquialisms,the turns of phrase that characterise a particular people at a particular time. An
              actor, theatre director and teacher, Rhonda Wilson’s earlier oral history, Good Talk, The Extraordinary Lives Of Ten Ordinary Australian
              Women , was nominated for the Victorian Premier’s Prize in Australian Studies."
the-beech-resort:
    title: The Beech Resort
    author: Margaret Mathews
    short_description:
        When Bronwen falls in love with her therapist, Bella, Bronwen's husband is left hurt and confused. As the couple rages, the marriage disintegrates and Bronwen and Richard separate.

        Bronwen suffers a nervous breakdown and depression and alcohol abuse spiral her into Beechwood psychiatric hospital. Her recovery is slow but is buoyed by the charismatic psychiatrist Boris and the 'alcohol doctor' Lenny.  Together they help Bronwen remain sober and will her to a better future.
    long_description:
        \"The car races.  It swerves and passes.  Warehouses, parks, shops.  Brown, green, red.  Brown, green, red.  Blur, blur, blur.  Then it slows and meanders through the last couple of back streets.  And I’m there, here.  Outside Bella’s.\"

        When Bronwen falls in love with her therapist, Bella, Bronwen's husband is left hurt and confused. As the couple rages, the marriage disintegrates and Bronwen and Richard separate.

        Bronwen suffers a nervous breakdown and depression and alcohol abuse spiral her into Beechwood psychiatric hospital. Her recovery is slow but is buoyed by the charismatic psychiatrist Boris and the 'alcohol doctor' Lenny.  Together they help Bronwen remain sober and will her to a better future.

        The sequel to the much-loved Room for Delusion, The Beech Resort continues to the explore the relationship between Bronwen and Bella as they trawl through the struggles and problems encountered within Bronwen's marriage and with insight and determination she becomes stronger.

        "Told in a lively fashion and rich in sensual detail."
