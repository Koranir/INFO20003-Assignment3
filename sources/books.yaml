and-the-winner-is:
    title: And The Winner Is...
    author: Jon Weaving
    short_description:
        When Jon Weaving compiled And The Winner Is... , an anthology of Nillumbik Shire Council's Alan Marshall Short Story Award,
        he also wrote a practical book about Writing. The anthology itself is unique. As well as the prize-winning stories, both in the Open and Youth
        sections, it incorporates interviews with the authors on their craft, judges’ comments and biographies of the authors. It is a full history
        of the Alan Marshall Award. As importantly, it is a handbook for creative writing. Using each year's winning stories to illustrate his points,
        Weaving guides us through the making of a work of fiction. He discusses character, imagery, metaphor, dialogue and other components of successful
        storytelling. He teaches us the 'one-percenters,' those little things that make the difference in our writing. And The Winner Is... is an
        enjoyable anthology. It could make you a winner.
    long_description:
        When Jon Weaving compiled And The Winner Is... , an anthology of Nillumbik Shire Council's Alan Marshall Short Story Award,
