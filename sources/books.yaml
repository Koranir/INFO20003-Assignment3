        - title: Antipodes Review
          text:
              "Soundings from Down Under Nicholas Birns Antipodes (USA), Vol. 17, No. 2, December 2003 Black Pepper is a small press which specializes
              in high-quality poetry both in terms of the prestige and talent of the writers and the production quality of the books. One of their latest
              releases is Adrienne Eberhard’s Agamemnon’s Poppies . Eberhard, a Tasmanian poet who has worked in Papua New Guinea, writes poetry of vigour
              and originality which captures the excitement of nature as perceived by an individual sensibility. Two sonnets in the middle of the book
              deal with teenage relationships with great freshness, so much so that the rhyme and meter seem pleasingly transparent, though this transparency
              is a great formal accomplishment. Without doing a deliberate, feminist rewriting of established topoi, Eberhard, writing very much from
              a woman’s perspective and including superb poems on childbirth and motherhood, does nonetheless assay themes associated with male writers
              form Tasmania, or those who have written about it. The evocation of the landscape of the island inevitably recalls the early poems of Vivian
              Smith as well as Chrisopher Koch’s Boys on the Island . ‘Coracle’, as well as its companion poem, ‘Coastlines’, recalls the role of that
              primitive boat in Marcus Clarke’s The Term of His Natural Life , ‘part coral / part ache / part leak with a c / then there’s lore and oracle
              too’. Or, in the next poem, ‘Islands are coracles are memories / are sand and stone’. Eberhard also reminds us of Tasmanian predecessor,
              Carmel Bird in ‘In the Garden’, with its morifs reminiscent of Bird’s novel: primitivism, female victimhood, the whiteness of Sissinghurst."
        - title: Australian Book Review Review
          text:
              "The Shape of Things Adrienne Eberhard 's - Agamemnon’s Poppies & Nicolette Stasko 's The Weight Of Irises Jennifer Strauss Australian
              Book Review, No. 255, October 2003 ‘Dwelling In The Shape Of Things’ is the title of Nicolette Stasko’s sequence of sixteen elegantly executed
              ‘Meditations upon Cezanne’. It could, however, serve as an appropriate epigraph to both these collections. Given that the natural world
              is Stasko’s and Adrienne Eberhard’s main locus for exploring and responding to ‘the shape of things,’ each could be described loosely as
              a ‘landscape’ poet, but the character of their work is neither nationalistic nor naturalistic. They write essentially of their experience
              as sentient beings inhabiting, and intimately responding to, the world of things. In doing so, they contend with mysteries that dwell in
              these worldly shapes. The difference in the tonal and intellectual complexities of their responses is characteristic. Eberhard is the more
              exuberant. She seems too confident of the independent reality of ‘The speech of the world / whispered and nudged on the wind’ (‘Coastlines’)
              to entertain the perceptual doubt voiced by Stasko in ‘Is it true that our eyes see what / our hearts have conditioned?’ (‘Dwelling in the
              Shape of Things’). The resonance of that question depends in part on its contested relationship to the calm assurance with which she speaks
              elsewhere of ‘everything held together / by an eye’ (‘One Return’). It is instructive to compare poems in which each pays respect to the
              power of non-literary art to shape the world. In the richly textured ‘Ceramics/Braille,’ Eberhard’s celebration of the perceptual medium
              of touch reaches a triumphant conclusion in: Raised to exactness of fingerprints, the whole world is lit transparent until muteness speaks
              in many tongues; the heart’s pulled taut, listening to the world spoken through these hands. Stasko’s perceptual medium is the eye, and,
              while it can offer enchantingly direct contact with the world through a still life in which ‘a chaste kitchen table with one shy drawer
              / humbly balances it all,’ at other times entry to the painted landscape is incomplete: the mind builds a bridge over dark blue water but
              cannot walk on it distance remains we stay forever on the peopled shore content with the view through a window If both commit to immanence,
              the refusal to concede to transcendental notions of art as ravishing us from the world has very different expressive outcomes, at least
              in these passages. But once again, it would be dangerous to take the muted, somewhat melancholy acceptance of reality found in the cited
              section of ‘Dwelling in the Shape of Things’ as more than one definitive moment in the experience of a poet who also writes of waking after
              illness to ‘a gift from the world’ in the shape of twelve blue irises that fly and settle like bright swallows around the room send a message
              I beg we are! we are! they sing ‘The Death of Blue’ It is no coincidence, I think, that Stasko writes of thinking as she watches a beloved
              daughter: ‘I could wish you / only one eye to see / what is beautiful and good / but that would be a lie’ (‘Three Days’). Stasko’s sense
              of how the world is may be shadowed by the personal grief identified in ‘After Many Sleepless Nights,’ where a sister’s mind is ‘sprouting
              tumours / like mushrooms.’ But there seems something more fundamental in her reflection: ‘How little we know about one another / each locked
              in our own delicate case / surrounded by dark scenery.’ Despite benign moments that move her to declare benediction on ‘the other people
              in the house / who tread lightly as ghosts / but are corporeal beings’ (‘Days’), the general sense of faulty connections is made specific
              in her precise evocation of that all-too-familiar situation, the dutiful visit to what ‘should be home.’ where my father sits deafly reading
              the newspaper in the zinc light of the TV screen my mother packing up the plastic Christmas tree a corpse to be gotten rid of such a mess
              she says Stasko’s melancholy is tempered by too much intelligence and wit to yield to sentimentality or self-dramatisation, and her take
              on alienation can be entertainingly sardonic, as in ‘On the Economy of Crying.’ ‘When I cry it is never enough when you cry it is always
              too much’. Eberhard’s poems about human relationships - the love poems of the early part of the collection, and the later poems about pregnancy
              and children - certainly do have more of the beautiful and the good than otherwise. ‘In the Bath’ is as lovingly lit and detailed as a Flemish
              domestic study, with the adult body ‘anchored in the shallows / rocking and keeling in the soap- / water; homely as a house boat,’ and she
              depicts an infant body with ‘small pink fists colliding, / toes pointing in all directions.’ It is not that Eberhard is unaware of the potential
              for absence in every beloved presence, or even of the possibility of existential loneliness, but she is no ironist, and so is free to commit
              herself to the unqualified richness of lines like: Honey pools on my spoon, rolls of redness, sticky as the sun; for a moment, beehive tombs
              and poppies crush in my mouth - Mycenae rises rich and oozing, a gold memory dissolving on my tongue. ‘Mycenae’ Eberhard’s language seems
              untrammelled by Stasko’s edgy awareness that, despite the plentifulness of words, the problem is to choose the true ones without an angel’s
              help not fooled by the noise of clapping mistaken for wings Just occasionally, there seemed to me a bit too much of ‘the blood-rush of myself’
              (‘Ariel’s Realm’) in Eberhard’s writing, which may be why I most enjoyed those poems where the energy of her image-making was shaped by
              one of two possibilities. One is the adoption of a fixed form such as the sonnet: for instance, I found ‘Delusions’ a much more concise,
              and hence forceful, poem of childhood desires and inadequacies than the less shapely ‘The Wedding Dress’. The other is dramatisation, which
              is rich in its possibilities for directing imagistic energy. The five ‘Cleopatra Poems’ are pithily sexy, but for me the best writing in
              the collection is in ‘Lines from the Black Sea,’ a sequence spoken by the exiled Roman poet Ovid. Eberhard’s understanding of, and responsiveness
              to, the physicality of language movingly informs the exile’s longing: ... for the polished glide of Latin, smooth as skinned and pitted
              grapes exploding in my mouth, the sensuous rub of words, silken as the sheen of oil over skin. Each of these collections has much to offer.
              A preference for one over the other may depend largely on the reader’s temperamental disposition. But as ideal readers, we ought to be capable
              of taking pleasure in the different qualities, the varied balance of passion and poise in each. Besides, the pair make a handsome addition
              to the bookshelf. Black Pepper is to be congratulated not only for its continuing commitment to the publishing of poetry, but also for matching
              quality production to fine poetry."
        - title: Island Review
          text:
              "Substantial and Subtle Talents Geoff Page Island , No. 93/94, Winter/Spring 2003 There is every chance that Agamemnon’s Poppies may
              prove to be one of those first poetry collections we look back at years later with continuing admiration. How did they get to be this good?
              One thinks of Judith Beveridge’s The Domesticity of Giraffes and Bronwyn Lea’s Flight Animals , both books which were a long time in the
              preparation and which signalled poets already in full control of their craft. One of the intriguing things about many first books, too,
              is their influences. As a poet goes on to find his or her voice it becomes harder to trace their origins. To judge from Agamemnon’s Poppies
              , Adrienne Eberhard has certainly taken something from Central European poets (and from Americans influenced by them, such as Charles Simic).
              She has also learned from Australian poets such as Les Murray, Robert Gray and Judith Beveridge. Like Robert Gray, Eberhard looks long and
              deeply at well-loved landscapes and renders them with remarkable intensity and ingenuity of imagery. Like Les Murray, she has an unapologetic
              love for what language can do and, in a poem such as ‘Courting Paradise Rifle Bird’, a willingness to risk total immersion in it, even to
              the point of excess. Like Judith Beveridge, she has a high degree of empathy with people and a wide range of other living creatures. In
              poems such as ‘Nebuchadnezzar’s Persian Wife’ and ‘Moths in Autumn,’ Eberhard is able to think her way deeply into their situations and
              create complex and lyrical accounts of her investigations. Agamemnon’s Poppies is in four sections. The first has a range of intense and/or
              erotic poems, of which, perhaps, the most striking are ‘Voyages of Discovery,’ ‘The Cleopatra Poems’ and ‘Flight’ - though the object of
              the poet’s affections in the last of these seems to be as much a statue as its human equivalent. ‘Your bodies share the same flex / and
              urge and abandon, / limbs made for sudden speed: / it waits under the skin, / reined in, held back / for the last leaping burst.’ Section
              II concentrates more on the geological and the animal realm, though there is here, as elsewhere, a strong sense of the physical, and the
              metaphysical, of going beyond the limits of our senses. ‘I escape like clouds, / gathering dispersing, / in an endless chase after the world’
              (‘Books for Dreaming’). Eberhard likes to examine things closely and evoke them in their fullness, using long accumulations of images, as
              if to embody their amplitude. As with the extended solos of jazz saxophonist John Coltrane, one sometimes finds these works longer than
              necessary but on reinspection it’s impossible to find where cuts could be made. Often, like Coltrane, Eberhard is striving for another level.
              ‘How many sea journeys,’ she says in a later poem, ‘Stone Boat’, ‘begin like this, / crossings, passages: // moving through dark water to
              the silent, white spaces / at the edges of the mind.’ Another vital dimension of the book is its use of mythology - or perhaps, more accurately,
              its use of mythologised ancient history. Like a number of other Australian poets (Dorothy Porter and Diane Fahey spring to mind) Eberhard
              likes to recreate figures such as Cleopatra, Ovid and the mythical Agamemnon, giving us a vivid sense of an actual existence while at the
              same time implying their symbolic significance and contemporary relevance. A common thread to her presentation of all three figures is their
              sensuality. ‘Mycenae rises rich and oozing, / a gold memory dissolving on my tongue’ (‘Mycenae’); ‘let me give you Egypt/ it lies here wrapped
              in cool sheets / come / enter Egypt // take what is yours’ (‘The Cleopatra Poems’); ‘I don’t remember spring in Rome: / it seemed an endless
              summer - / everything golden and melting, / pliant and malleable, / and coming to an end’ (‘Lines from the Black Sea’). Like many first
              books, Agamemnon’s Poppies is a difficult book to describe. It heads off in quite a few different directions. But, just to judge from the
              excerpts quoted, I suspect it’s likely that others will agree that with Adrienne Eberhard we are seeing the emergence of a truly substantial
              poetic talent."
        - title: The Sunday Tasmanian Review
          text:
              "Green Ambition Christopher Bantick The Sunday Tasmanian , 2003 There is a sense of southern salty winds and water in Adrienne Eberhard’s
              verse. This seems natural enough and perhaps even expected. She was born in Dover with the sea lapping through her childhood. This is a
              childhood where in her poem ‘Dover Scallops’ our senses are enlivened as she recalls: Taste Dover salt green water dark kelp swift shadow
              of albatross Antarctic cold And the sweet southerly whip of wind. Apart from travelling extensively in Europe, Asia and the Pacific, Eberhard
              has taught primary school in Papuaa New Guinea, as well as English and creative writing in Canberra and Tasmania. Eberhard currently lives
              on the D’Entrecasteaux Channel and is attempting to fashion a garden, with her husband, two young sons and a dog. The southerly winds, she
              says, ‘make this a challenge’ but what may not grow easily flourishes in her poetry. Eberhard is one of a growing band of local poets whose
              verse is gaining national recognition. Her new and first collection, Agamemnon’s Poppies , reflects a highly productive decade of writing.
              One of the most arresting poems in the collection is the first. It is simply titled ‘Roots’ and Eberhard read this last weekend at the Tasmanian
              Readers’ and Writers’ Festival. In the poem, she effectively sets out her stall as a poet. ‘I want to tap the earth send out shoots and
              tips and long runners scenting through the grass. and soil to where water runs darkly, silently.’ Eberhard has not always been a poet, at
              least an actively-published one in journals, magazines and now a collection. But, as she explains, the possibility of her becoming a poet
              began when she was a student at Hobart College. ‘When I was 17, I was in the same English class as Heather Rose. She wrote stories. She
              articulated for me this desire to be a writer. I’d always loved reading and words, but I don’t think I’d ever put it all together. It started
              then, but there were a lot of years when I really didn’t write anything. I started writing seriously in the early Nineties. For me, poetry
              comes much more naturally than prose. I also think there is a kind of music in poetry which matters to me. This is how it happens inside
              me. I have played the piano all my life. Words are like musical notes.’ Eberhard is presently working on a collection concerned with gardening
              and landscape. Her deep interest in gardening goes way further than an investigation into plants and where they grow. For her, gardening
              embraces how place and people connect. ‘The interest in gardening forme when we moved to Tinderbox. We had more land and I had great dreams
              about the kind of garden we could grow there. But the reality of living on the D’Entrecasteaux Channel with the winds, salt and lack of
              water made me realise that this was not going to be easy. But curiously, this has created in me an interest in what can be described as
              naturally-occurring gardens. When I go into the bush, there is something about the aesthetics that appeals to me at a level that is like
              a garden.’ Eberhard’s sense of the naturalness of gardens is found in a brace of poems called, ‘Recherche Bay, 1792’. In her intense verse
              study, ‘Felix’s Seeds’ we observe: in my coat pocket corners, seeds settle and still. Let them shoot and spark like stars in this new soil,
              tips burning with green ambition, leaves unfurling to drink deep of southern air and soaking rain."
jane-lady-franklin:
    title: Jane, Lady Franklin
    author: Adrienne Eberhard
    short_description:
        When Adrienne Eberhard assumes the persona of Jane, Lady Franklin, wife of the colonial Governor Sir John Franklin, she follows
        Jane Franklin's Tasmanian years through poems concerned with water, rocks, fossils, step-daughters, desire, guilt, betrayal and the physical
        world.
    long_description:
        Will we assume their speed the shark’s coming the squid’s mobilitiy the flathead’s knowledge? This difficulty fostling in
        our bodies – I could walk on my hands for sure. When Adrienne Eberhard assumes the persona of Jane, Lady Franklin, wife of the colonial Governor
        Sir John Franklin, she releases herself as a poet of intimate engagements. In a suite of poems, linked together like a chain of ponds, she
        follows Jane Franklin's Tasmanian years. Water, rocks, fossils, step daughters, desire or guilt and betrayal, and love of the physical world
        seethe in her lines. Eberhard looks long and deeply at well-loved landscapes and renders them with remarkable intensity and ingenuity of imagery...
        she has an unapologetic love for what language can do... a willingness to risk total immersion in it, even to the point of excess... she has
        a high degree of empathy with people and other living creatures. Eberhard is able to think her way deeply into their situations and create
        complex and lyrical accounts of her investigations... we are seeing the emergence of a truly substantial poetic talent. Geoff Page, Island
    price: 24.95
    isbn: "1876044497"
    release_date: "2004"
    page_count: 123
    reviews:
        - title: Mattoid Review
          text:
              "Reviews A Touch of the Past - Jane, Lady Franklin Kristen Lang Mattoid , No. 55, 2006 In the list of things Jane Franklin must leave
              behind on her return from Hobarton to England in 1843, Adrienne Eberhard includes belief - in beginnings, paradise, god, ourselves here
              I could have been anything Eberhard, too, leaves belief behind, not as her own loss, but as the gift within her poems. Jane, Lady Franklin
              is a mosaic of one woman’s thoughts and experiences. Through this woman we gain access to a specific time in Tasmanian history. The book
              is persuasive as an intimate and imaginative recreation of this time and of Lady Jane herself. The poems begin with Lady Jane’s arrival
              in Hobart as the wife of Sir John Franklin, Lieutenant-Governor of Van Dieman’s Land. The year is 1837. The poems appear more or less as
              abbreviated journal entries but are only loosely chronological and are openly concerned with the place and its people as much as with Jane.
              The front cover of the book displays a mid- to late-1800s drawing by Emily Stewart Bowring. This is not a portrait of Lady Franklin. Instead,
              waves and two small boats foreground Government House, perched on its hilltop, trees to one side, bare hills to the other. It is not quite
              the house the Franklins occupied, but the drawing does reasonably depict the time. The effect of the book is to animate this picture: Lady
              Jane (one might imagine) is on the foreshore, watching the ripples and the birds. The ornithologist, John Gould, and the botanist, Ronald
              Gunn, are nearby, preparing for their next expedition. Beneath the waves, there is debris from the wrecks of sunken convict ships. Further
              down the harbour are the Danish and French whaling boats. Out of sight, another child dies in the nursery at the female convict factory.
              John Montagu, the Colonial Secretary, is in an office somewhere drafting his formal complaint against Sir John and the excessive influence
              of his wife. And hidden in the hills, just maybe, there are one or two survivors from the decimated Aboriginal population. Eberhard could
              not have hoped to find a better ‘tool’ than Lady Jane for her creative endeavours. The poems are always intimate, always the first-person
              impressions of a passionate, imaginative, and strong-willed individual, and yet, due to the intensity and variety of Jane’s interests, manage
              to also offer a broad-ranging historical account. Through Jane’s eyes, we are given general descriptions, intricate details, and immediate
              sensations that build an extensive picture of her location. We are invited, as well, to consider these experiences as they would have seemed
              to English eyes: ‘These birds bring back England,’ Jane tells us, referring to the black swans, ‘but turn it pale and ordinary - / their
              blackness astonishes / and this land looms / vivid, arresting; real.’ The settlements, the animal and bird life, the plants and waterways,
              the new foods - all are described in detail. Eberhard is also able to offer a glimpse of nineteenth-century science and of the opportunities
              colonisation brought to it (with Sir John, Lady Jane established the first Royal Society for the Advancement of Science outside of Britain).
              She is able to acknowledge, too, the conditions of the prisons and the suffering of the Aboriginal people. In ‘West Coast / Port Davey’,
              Jane laments the reality she has entered: ‘I imagine fires. / This shore shaped with dark figures. / Can they all be gone?’ Lady Jane remains,
              Eberhard informs us, ‘fixedly Victorian’ in relation to her ideas about punishment and class. Eberhard emphasises, too, that while the Franklins
              do adopt an Aboriginal orphan, they do not take her with them when they return to England. The book does not judge Lady Jane, it does not
              set out to weigh her virtues against her faults. It sets out, rather, to fully enter the time in which she lived. The book’s greatest strength
              lies in the intimacy with which Eberhard offers Jane to us, and in the vitality this intimacy lends to life in Hobarton. There are several
              ways in which Eberhard secures her broad orientation. In the poems, many names are mentioned that are not intended to be understood without
              reference to Eberhard’s ‘Notes to the poems’. Here, at the back of the book, historical details confirm that Jane was who Eberhard says
              she was, in outline at least. But the notes are not just reinforcements for Eberhard’s claims. They are also reminders of what it is we
              are entertaining: the intriguing woman we meet imaginatively and empathically in the poems is also a woman whose life and influence connects
              to a larger, recorded moment in history. Eberhard all but demands our involvement in this broader moment. When the name ‘Montagu’, for example,
              appears in ‘The Sitting-Room’ and ‘Frenchman’s Cap’, our choice is to learn his story (by reading, at least, Eberhard’s ‘Notes’) or to fail
              to understand the poems. The same ‘encouragement’ from Eberhard similarly lends animation to the names and deeds of other figures, Captain
              James Ross, Francis Crozier, and George Augustus Robinson among them. The poems themselves, too, insist that more is on offer in Jane, Lady
              Franklin than one woman’s fancies. Written as if they come from Lady Jane’s personal diary, the poems are clearly not journal entries -
              they are poems, crafted and arranged for a particular purpose. One might argue that the purpose is to portray six years of Lady Jane’s life
              without printing six years worth of writing. But the poems achieve more than compression. The snippets from Lady Jane’s life are brief and
              the book’s chapters take us from one subject to another rather than through events as they happen. Even the chapter on Lady Jane’s use of
              ‘Laudanum’ recounts, as well, the drug’s history and application. (These poems, as an aside, are enthralling, the nervous condition Jane
              endures becoming almost contagious in. I have clung to a snow bridge, blue-black depths glinting below, watched as icebergs crush my ship,
              masts studded with cold crystals, felt the fine flurry of snow filling my open mouth, closing my eyes. The laudanum is a ‘flower cure’ that
              ‘rings its music’.) There are many purely personal moments in Eberhard’s book. ‘Knock, and Enter’, for example, describes Jane’s regret
              at not having a child of her own. Yet the poems do not expressly privilege Lady Jane as their sole concern. The poems, further, do not adopt
              a single style readers might recognise as the voice of Jane. Eberhard employs a variety of structures, couplets, quatrains, sonnets, and
              free verse among them, sometimes with and sometimes without formal rhythm and rhyme. These structures and their variety encourage, again,
              a broader outlook. We experience Lady Jane intimately, and yet there is space, a structural space, by which we gain some distance from her.
              In the space of poetry generally, particular details are able to be imbued with wider significance. In Jane, Lady Franklin , this enlarged
              perspective emphasises the context in which Jane’s experiences are set, and towards which we are accordingly and repeatedly directed. The
              effect is strong, though Eberhard’s poetic structures do also present some difficulties. Awkward rhymes and rhythms are not uncommon (rhymes
              especially), and there is occasionally the feeling that the task of satisfying a formal sound pattern has been allowed too great an influence
              over the content of a poem. The imagery in Eberhard’s more constrained poems can seem a little careless. In ‘Tides’, water is described
              as ‘a breathing heart’ as if the odd repetition of the similarly compounded ‘black flowers open small hearts like warm and silent mouths’,
              from two lines earlier, does not matter. Jane, Lady Franklin is on the whole a pleasing and highly accessible publication. It contains much
              fine writing. In ‘The Overland Trek’, ‘The rain accompanies us, / an adagio playing in the brain.’ In ‘Wet Autumn’, fungi sprawl in relaxed
              and beckoning poses, legs apart, chins jutting, fingers crooked, leering from their dour brows: grotesques, fit to mount the ramparts of
              cathedrals, grinning gargoyles pointing their fingers at the secrets that lie buried, embedded in the loamy pockets of the rain-washed mind.
              Through Lady Jane, we are given experiences that equip us with the means and motivation to imaginatively explore the world with which Eberhard
              teases us. Eberhard’s book does not effect breathlessness or awe regarding its words, nor significant surprise or challenge regarding its
              content. What it does, and does extraordinarily well, is to open a space of involvement and vibrancy in which the Tasmania of the 1830s
              and 40s can be brought very much to life. For this, the book is easy to recommend."
        - title: Wet Ink Review
          text:
              "The Latest Word - Jane, Lady Franklin Stephen Lawrence Wet Ink, Issue 2, Autumn 2006 Jane was the wife of Tasmanian colonial governor,
              Sir John Franklin. They arrived in Hobarton in 1837, and now poet Adrienne Eberhard provides a rich, well-researched sketch of Lady Franklin’s
              island life and activities. Eberhard is a talented writer, reaching deeply into her character’s psyche and using Jane as the ‘voice through
              which to explore Tasmania’. Coming from England, Jane is enveloped and overwhelmed by her new ‘fecund and teeming’ environment. She makes
              sense of the landscape through the filter of Europe, and describes scenery in familiar similes - in the way that European names are superimposed
              upon natural landmarks: Lake St Clair, Mount King William, Frenchman’s Cap. Although her response is rooted in her heritage, embodying the
              sensibility of the times, Jane is alive to nature: ... it is their noisy presence that pleases me most: the crew of black cockatoos shredding
              banksias, like men drunk on wine, and the early morning hail of song from the wattle bird that wakes me every time. ‘Passion’ The landscape
              is an active participant, and frequently galvanises the poetry. Jane attempts to fuse the language of her heritage and the world she is
              confronted with: Regal birds like royal barges, Sleek, black, streaming, their red beaks a slash of unexpected colour, like rich brocade
              crossed with satin. ‘The River’ Nature’s creepers intrude everywhere, and the words often succumb to piled-on adjectives and similes. Occasionally,
              it is hard to separate Jane straining to convey her experience from the poet failing to avoid cliche or didacticism (‘the broad sweep of
              river,’ ‘rivets the eye,’ ‘vivid, arresting, real,’ ‘Imagine, if you can...’). The bland rhetoric, however artful, can obscure character
              and deaden poetic effects. At its best, Eberhard successfully reveals her character’s deep conflicts. ‘Daughters,’ a chapter about Jane’s
              attempt to adopt an Aboriginal girl, conveys the mindset and limitations of the poet’s nineteenth-century subject: ‘We thought to tame you
              / to mould your mind / make you curtsy, say please and thank you’ (‘Mathinna’). Successful, too, is the ‘Magic of stones’ section, in which
              the period’s intellectual conflicts are portrayed through scientific theories of the day. There are less satisfying chapters, such as ‘The
              female factory’ and the strained sonnets of ‘George Augustus Robinson’. However, this is a highly appealing book. Such a conceit, sustained
              over the length of a full collection, might grow tedious in other hands - but Eberhard has produced intelligent poetry that is both engaging
              and historically enlightening."
        - title: Island Review
          text:
              "Poetry - Jane, Lady Franklin Adrea Breen Island, No. 102, Spring 2005 Tasmanian colonial history has had many visitations and in recent
              years women’s history has found its place among the bones recovered. Adrienne Eberhard’s poetry collection Jane, Lady Franklin speaks in
              the voice of Jane Franklin, wife of Governor Sir John Franklin. The poems are collated into nine thematic sets with some familiar subjects
              for Tasmanian readers: ‘Hobarton’, ‘Port Arthur’, ‘Daughters’, ‘George Augustus Robertson’, ‘The Female Factory’, ‘The Magic of Stones’,
              ‘The Overland Trek’, ‘Laudanum’ and ‘Recall/Return’. Speaking subject Jane Franklin shares dreams of hope and disappoint ment in the journey
              to Van Dieman’s Land: ‘I tasted air in my dreams, faint hills, mounds of whales; the beginnings of things’ (in ‘Snakes’). The monologue
              continues, recounting the personal through a conflation of fact and fiction, and ‘Snakes’ signifies the dig for ‘truth’ that informs this
              book, because Lady Jane had a desperate fear of snakes and tried to eradicate them from Tasmania . What adds to the charm of this work is
              the representations of place that make Tasmania a place of unique beauty. Seen through Jane’s eyes, the historical perception is made more
              intimate and sensuous: ‘Bay after bay of blue water, / limpid, shallow, oh, / to strip to bare flesh and wade; / a child’s garden’ (‘ Recherche
              Bay ’). Eberhard’s ‘Afterword’ is an essay clarifying reasons for her interest and research on Jane Franklin. ‘I want to pay tribute to
              Jane Franklin, the woman’, she says, because she was ‘written out of history, seen as a meddling adjunct to the ‘real’ Franklin, her husband
              Sir John.’ Eberhard’s dedicated research and poetic re-creations stand up well to serve the spirit and feminism of this pioneering Tasmanian."
        - title: Cordite Review
          text:
              "Jane, Lady Franklin by Adrienne Eberhard Magdalena Ball (critic ) Cordite (online), No. 22, 1 July 2005 Adrienne Eberhard’s collection
              Jane, Lady Franklin can almost be described as a poetic novel. It contains a clear storyline, based partly on the real life voyage of Lady
              Jane Franklin, who traveled with her husband, Lieutenant-Governor John Franklin, from England to Hobart in 1837. Eberhard’s well-researched
              set of facts form the barest bones of the work, which follows Lady Jane’s six year stay in Tasmania . The work is divided into nine sections
              which comprise poems about Lady Jane’s initial impressions of Hobart through a visit to Port Arthur; her adoption of an Aboriginal girl,
              Mathinna; her interaction with George Augustus Robinson, Chief Protector of the Aborigines; her attempts to reform the prison system for
              female convicts; her exploration of the geological and natural world around her; her difficult overland trek with her husband from Lake
              St Clair to Macquarie Harbour; her use of Laudanum for her headaches; and her return to England in 1843. The poems are each footnoted and
              the book includes an extensive list of sources. However, while history certainly lends depth and interest to this work, Eberhard’s greatest
              achievement is in creating her own, very real Jane, a protagonist who draws the reader directly into her world, and away from the his-story
              on which her narrative is based. The poetry in this volume is direct, and even simple in terms of the single intention of each individual
              piece. The meaning is very clear, without any kind of overt experimentation or form for form’s sake. For example, by using the power of
              extended metaphor – something that Eberhard does very well – the author provides the reader with an insider’s feel rather than an onlooker’s
              perspective on the weather in Hobarton: In England , the rain was a melodious drubbing on the roof. Here it is a torrent of knocking; angry
              wasps, Pandora’s spirits hitting their small bodies against the box, the Furies wrapped in wet garments, dragged from the sea like a trawl
              of netted weed. ‘Wet Autumn’ The poetry is not without humour. One immediately feels the almost silly exuberance of a stranger-in-a-strange-land
              comic scenario with ‘Victuals’: Quail pie for breakfast, whole wallaby for dinner Kangaroo soup - those furred creatures with their great
              tails and dark-lashed eyes. Will we assume their speed the shark’s cunning the squid’s mobility the flathead’s knowledge? This divinity
              jostling in our bodies - I could walk on my hands for sure. We come to empathise with Jane as she discovers both the harsh and beautiful
              in her adopted country, walking along the water, looking up at the moon, or standing at the black fossil cliffs of Maria Island . It is
              a personal exploration of a public time and place, and Eberhard works deftly to create a character who has as much visceral presence as
              the ‘red lichens the eye finds’ (‘Thark Ridge, Mt Wellington’) or the ‘Mud thick as chocolate’ (‘Frenchman’s Cap’) which she comes across
              on her travels. Her perspective is as limited as any of her class, but it is the depth of her perception which makes her interesting, as
              she marvels at the height of tides, or experiences the hunger of a convict as she eats biscuits and flour, or steals apples from a garden
              on her trek to Macquarie Harbour . Although Jane struggles with the limitations of her class and her desire to understand the women of the
              Female Factory, or the convicts and the badly oppressed Aborigines of the strange world of Van Diemen’s Land which she explores, she begins
              to form a kind of makeshift bond with its inhabitants, sensing and collaborating with the stitchwork of the convicts or the longing that
              they might have felt on their trip: I wonder, when she mends her new mistress’s garments Will she remember the lithe stitches of the quilt,
              Colours that rioted like the sunset on the sea, Seams that gathered together the patches: Small pockets of love and hope. ‘Patchwork I’
              Jane has her own personal longings which tie her more concretely to the land than her observations. Her debilitating headaches become writhing
              tiger snakes, her understanding of the land’s loss – both the aborigines and the Tasmanian Tigers – as a silence that etches the country.
              Her personal longing for a child is also a ‘shadow and absence’ which reaches its apex as a young Aboriginal child, Mathinna, enters her
              life: you are all spirit dispersed in the wind your heart is wild. You were never really mine. ‘Mathinna’ The poetry here is exquisite,
              beautifully taut, clarified to instant meanings that bypass the need for conjunctions and adverbs. Eberhard’s work demonstrates how powerful
              a medium for storytelling poetry can be, and yet none of the poetic force of each piece or its particular intensity is sacrificed. The character
              of Lady Jane is deeply and intensely drawn, both in terms of what she sees, and what she feels, using powerful imagery which heaps metaphor
              on metaphor until they reveal that which lurks under the rocks of the land, and under the petticoats in the parlour. Minor characters like
              Sir John, Mathinna, George Augustus Robinson, and Ornithologist John Gould are also revealed in a few deft strokes through Lady Jane’s perspective.
              This is a dramatic work, and the quiet voice through which it is told, serves to heighten the drama. Lady Jane is a character history refers
              to only in the periphery, but Eberhard succeeds beautifully in giving her center-stage. The perspective and sense is a deeply female one,
              full of pathos, loneliness, loss, hunger, and empathy. While each poem is strong enough to stand on its own, and many in this collection
              have indeed been published on their own, together they form a most intimate and powerful portrait – a history, but also a story of what
              it means to be alive in any time: to experience, to fight for justice, and to be fully conscious of one’s own limitations."
        - title: The Canberra Times Review
          text:
              "A triumph of empathy as Lady Jane is brought to life Geoff Page (poet) The Canberra Times , 11/6/2005 In her new book, Jane, Lady Franklin
              , Adrienne Eberhard assumes the view-point of the wife of the Lieutenant-Governor of Van Diemen’s Land from 1837 to 1843. Here again we
              can see many of the virtues she displayed in her first volume, Agamemnon’s Poppies . There is the same feeling for other people’s situations,
              the same verbal energy. The present book comprises nine sections which cover almost all the main elements of Lady Jane’s six-year stay in
              Van Diemen’s Land. The only exception, perhaps, is the controversy and back-biting that surrounded her husband’s tenure of office and his
              eventual recall. Eberhard, in several sections, gives us Jane’s intensely felt awareness of landscape, flora and fauna - again, a preoccupation
              not unlike what we saw of Eberhard herself in her first book. There are also poems about the Female Factory, a short (slightly sanitised)
              section about Port Arthur, an account of her overland trip with her husband across the island to Macquarie Harbour and a section about her
              adopted Aboriginal daughter, Mathinna, and the frustrations of her own childlessness. ‘I would have liked to feel my belly burgeon beneath
              my hands / too late - / instead I withdraw, my head aching / like a plague of wasps beating in my brain // I would the knocking was in my
              womb instead.’ Jane, Lady Franklin is obviously based on extensive research, including a thorough reading of her diaries, still mainly unpublished.
              The book’s afterword is comprehensive, almost scholarly - and easily answers the considerable number of factual questions raised by the
              poems. The book is not, however, a web of quotation. Eberhard has done her reading and then put the books aside. She has thought her way
              into her subject’s personality, with all of its complexities, its enjoyments and frustrations. Of the swans, for instance, she says: ‘These
              birds bring back England / but turn it pale and ordinary - // their blackness astonishes / and this land looms / vivid, arresting; real.’
              In addition to this, Eberhard has used a considerable variety of poetic forms to embody her perceptions - mainly free verse but also a range
              of others, including iambic pentameter quatrains, and modern sonnets. She thus joins an increasing number of poets these days who think
              themselves into characters and situations from earlier periods but do so using thoroughly contemporary poetic forms. If Lady Jane herself
              had written poetry, the chances are she would have been a ‘poetaster’ or a ‘poetess’, a minor re-cycler of outmoded diction. Her diaries,
              it seems, transcend these expectations and Eberhard appears to have done full justice to their close observation and forward-thinking qualities.
              There are a few words like ‘babes’ and ‘gruel’ which do have a 19th-century ring but mostly the poems are made up of either contemporary
              or timeless description. Jane, Lady Franklin , is certainly no exercise in nostalgia, either in content or manner. The book does, however,
              convey a strong sense of Tasmania’s lost potential, of how a seemingly Edenic landscape is doomed to be degraded, and, particularly in four
              successive sonnets about G.A. Robinson and Trugernanna, of how its original inhabitants were harassed, lied to and pretty much left to die
              on Flinders Island. Yet, paradoxically, for all this, Jane, Lady Franklin is as much lyrical as it is historical or a contribution to the
              ‘history wars’. Ultimately, it is a triumph of empathy."
        - title: Famous Reporter Review
          text:
              "Jane, Lady Franklin - Adrienne Eberhard John West Famous Reporter , No. 31, June 2005 It requires a certain maturity for a poet to
              move outside themselves and write from another’s perspective and it is even more difficult to shift back almost two centuries (as Eberhard
              has here) with its sometimes radically different points of view and beliefs. Karen Knight has recently done it very successfully with Under
              the One Granite Roof , her poems about and through the eyes of Walt Whitman and Jordie Albiston had earlier achieved it with both Botany
              Bay Document and The Hanging of Jean Lee . By chance, I lived within metres of the house in which Lee and her accomplices tortured and murdered
              the old bookmaker; I would read a few pages and go out and look at the house; being able to do this was both valuable and eerie. I mention
              this only because something similar is possible for readers of Eberhard’s book, if they live in Tasmania, perhaps specifically Hobart, however
              such proximity cannot of course be necessary and the poet must manufacture the world in question in such detail that we are transported,
              both to the place and time. In the case of Eberhard, I think this is achieved to a remarkable degree; dividing the collection into ‘Hobarton’,
              ‘Port Arthur’ and ‘The Female Factory’ helps. If there was one criticism I had of Lee it was that times and places were mixed up; that might
              be OK for the video clip generation but I prefer Eberhard’s approach. Eberhard’s language at times is a delight; sometimes she brings to
              mind past poets of great stature. I can hear Plath in this for example: their eyes tight with malice. ‘Snakes’, pg. 3 but the image is her
              own, along with dozens of others. I will give just a couple of examples of her command of the arresting metaphor and image: a palmful of
              freedom. ‘Patchwork’, pg. 59 We are encamped; detained like petty thieves. (Due to constant, heavy rain.) ‘The Overland Trek’, pg. 80 The
              beaches are white as piano keys. ‘The Overland Trek’, pg. 85 Eberhard does a great job of making a ‘telling’ summation too, when she wants
              to, when the story calls for it. ...another chance/at life; this dishonest, tragic dance. ‘George Augustus Robinson’, pg. 53 and my favourite,
              Jane’s thoughts on Tasmania/Australia near the end of the collection, upon her recall/return to England: This country offers no sanctuary:/anything
              unusual is forced to run;... ‘Recall/Return’, pg. 99 I believe that, almost overwhelmingly, Eberhard has convincingly taken up the appropriate,
              believable views and beliefs of the characters (it is a story, and a wonderful reminder of the power of poetry to tell stories; the novel
              being a comparatively recent invention), the only stage at which I doubted this was in ‘The River’ where Jane says, ‘...how long until/there
              are only bones, bleaching?’ (pg. 11) where the views of the 21st Century seemed to be intruding. Another criticism, which can probably be
              made against even The Odyssey (if not The Iliad ) is that some sections are not as strong as others (‘The Magic of Stones’ seemed to lack
              power, and, well, magic) but overall it is an excellent book and the publishers (Black Pepper) are to be congratulated, including on the
              production; the cover drawing by Emily Stewart Bowring, ‘Derwent River & Government House’ circa 1858 is above its usual, sometimes muddy
              offerings. (And how apt that the drawing is by a woman!) I believe that, with this collection, Eberhard has shown herself to be prepared
              to take risks, an essential quality in a poet who is, as Geoff Page says on the back cover, ‘...(an emerging) truly substantial poetic talent’.
              She also has the ability to write as if she (and we) are there and she does this with her considerable compassion (as in the achingly sad
              ‘White Rocks [Suicide Rocks])’ onto which boys jumped to their deaths) and by eschewing the use of the all-too-common Teflon images and
              language of much of today’s Australian poetry."
this-woman:
    title: This Woman
    author: Adrienne Eberhard
    short_description: In This Woman Eberhard gets personal with Tasmania’s coast, its mud and mountains and snow, and it is wholly sensual...
    long_description:
        She’s not interested in figureheads, their breasts and tresses a form of treason, it’s more the way a yacht lies under sail,
        its ability to displace, and sometimes plane, as astonishing as flight. In This Woman Adrienne Eberhard’s themes of gardens and nature, fecundity,
        random illness and cycles of renewal, explore the vital connections that develop between people and place. Ranging from the D’Entrecasteaux
        Channel to Canton, Papua New Guinea and Kew and from the eighteenth century to the present, these poems investigate ways in which physical
        places create mental and emotional spaces fundamental to human needs. Poems about motherhood and children; birds and animals; Aboriginal hand
        stencils, and love poems that draw connections between geography and the human body, give us an intimate view of our earthly presence. The
        title poem adds a plangency and raw tenderness to work which reminds us of what it means to be human, and in particular, a woman. When Adrienne
        Eberhard assumes the persona of Jane, Lady Franklin, wife of the colonial Governor Sir John Franklin, she releases herself as a poet of intimate
        engagements. In a suite of poems, linked together like a chain of ponds, she follows Jane Franklin's Tasmanian years. Water, rocks, fossils,
        step daughters, desire or guilt and betrayal, and love of the physical world seethe in her lines. There is rhythmic and linguistic certainty
        in the development of the poems that convinces one that the writer is passionately engaged with her subject matter, rather than being passionately
        engaged with artifice. Eberhard is concerned with landscapes of the body, mind and heart; she has a talent for precise sensuality. Adrian
        Caesar, Westerly
    price: 25.95
    isbn: "9781876044725"
    release_date: "2011"
    page_count: 110
    reviews:
        - title: Rochford Street Review Review
          text:
              "Signifying the Feminine Marietta Elliott-Kleerkoper Rochford Street Review - 19/3/2012 The title of Adrienne Eberhard’s new collection
              of poetry states her intention boldly: This Woman . ‘This’ signifies the place: the here and now. ‘Woman’ signifies the feminine, the female
              domain, a domain also encompassed by the symbolism of Susan Hawthorne’s ‘Cow’. Margaret Bradstock, in her review of the collection in Mascara
              Literary Review (Issue 10, October 2011), states that it is ‘female poetry’ and that it is ‘confessional’. I find these epithets limiting.
              Maybe ‘personal’ and ‘lyrical’ are more apt. However, as we know, the personal is both universal and political. And these qualities are
              not necessarily ‘female’, as is demonstrated in new collections such as Luke Davies’ Interferon Psalms and Christopher Swan’s Daylight Dark
              and Shadow . One of Eberhard’s most significant and enduring influences is Seamus Heany: ‘Seamus Heany... his ability to invoke childhood...
              his ability to use language and metaphor... his way of anchoring his poems in the natural world... a poet of place...’ ‘In dialogue with
              Poetry: The intimate self/the invisible mender,’ Adrienne Eberhard, Zest e-magazine, 2007 And Eberhard is herself a poet of place. How could
              she not be, living by the beauty of the D’Entrecastaux Channel in Tasmania? Across the Channel, Bruny stretches like a tawny lion, colour
              leaching from tawny hills until grassy slopes are sandy as the beaches rimming the island like an endless string of pearls... ‘Littoral’
              Within this landscape, under the ‘enamelled cobalt’ of the sky, are the children ‘claiming the world with their noise’. In this way, the
              microcosmic and the macrocosmic are united. The notion of place includes its history (a previous volume was Jane Lady Franklin ). While
              Margaret Bradstock may have a point, that Eberhard has romanticised that history in omitting its less palatable aspects (I am not qualified
              to judge), Eberhard does not shirk from confronting even the most painful experiences. Her poems on breast cancer are hard-hitting, almost
              savage: Soon her own breast will radiate lurid colour, her son will hold out his small arms and she will turn away, her breasts dangerous.
              The surgeon will take his knife and rectify. Her breast will follow the knife’s hollowing, all pertness spent in the sharpness of steel,
              falling into itself, as if trying to salvage something. ‘This Woman’ and there is the pain of witnessing her son’s colour blindness, a condition
              ‘carried by daughters, inherited by sons’ (‘Vision’). For me, these poems are the most poignant, perhaps partly because I too have suffered
              breast cancer. Another way Eberhard says Heany has influenced her is in his use of metaphor. She says of metaphor: ‘...in the beginning
              was metaphor. This is what enables us to see the potential of the world.’ Adrienne Eberhard. Zest e-magazine, 2007 Kinzie has defined metaphor
              as follows: ‘Usually something physical and capable of being imagined by us visually... is transferred from the literal realm over to the
              spiritual.’ Mary Kinzie: A Poet’s Guide to Poetry (University of Chicago Press, 1999) In Eberhard’s case, the ‘physical’ is commonly the
              landscape or the body – one expressed in terms of the other, for example, in poems such as ‘The Natural Order’, where the girl is described
              in terms of the wind, and ‘Trust’, where the child in his different stages of growth is described in terms of the animals he encountered.
              Out of this comparison, the message is that we are anchored in the natural world. The comparison can also enhance the description of both
              the landscape and the figures in the landscape. However, if this becomes too much of a pattern, the power of the comparison can be weakened.
              Kinzie also points out that: ‘...the poet must find the right objects and the means of shifting the conception of them from one realm to
              another.’ This can be difficult to achieve. There is a danger of bathos (so well illustrated in the works of Alexander Pope, who uses this
              device with intent): for example: the comparison of a flock of crows with a bikie gang; a bird’s nest ‘soft as suede shoes’ (reminded me
              of Elvis: ‘Don’t step on my blue suede shoes!’). A further issue with comparison is its formulation. Simile (‘as’ or ‘like’) introduces
              a foreign element, to paraphrase Kinzie. In this way it is less direct. Moreover, there is an inherent ambiguity in the simile: the two
              arms of the comparison are as much unlike as like. It is less of a shifting from one realm to another. In Eberhard’s work there is a preponderance
              of simile, as opposed to a more direct form of metaphor. Take, for example, the similes used in ‘Littoral’ (see previous quotation). In
              relation to diction, Kinzie states that: ‘...the more syllables in the word, the more conceptual, cerebral, conversational, and/or editorial
              it will tend to be.’ Eberhard seems to have a fondness for the longer, latinate word, such as ‘luminous’, ‘translucent, ‘illuminated’, ‘excoriation’.
              Clearly, there is a place for both what Kinzie calls ‘objective, thing-or texture-filled’ language and abstract language. However, at times,
              this kind of consciously poetic language, especially if repeated from one poem to the next, or even in the same poem (see use of the word
              ‘golden’ in ‘Instructions for Learning the Saxophone’, p.80) the language seems over-written, especially in the case of phrases such as
              ‘luminous light’ and ‘ancient past’, where the adjective is in fact largely redundant. In this collection, the poet has drawn us into her
              world with intimacy and honesty. It is a world rich in beauty, in history, in love of family. We are indeed ‘very lucky’: ‘And if we are
              very lucky... the poems we write will briefly repair the holes, the tears, the scatterings, the separations, so that for an instant, as
              the transaction between reader and poem takes place, the reader will inhabit a world made whole.’ Adrienne Eberhard. Zest e-magazine, 2007)"
        - title: The Canberra Times Review
          text:
              "This Woman Geoff Page The Canberra Times , 10/12/2011 Although Adrienne Eberhard spent some years in Canberra a decade or so ago it
              is as a Tasmanian poet she is best known these days. Poetry editor of the (now threatened) Island magazine, Eberhard has a strong feeling
              for, and understanding of, Tasmanian landscapes and has become a substantial figure in that state’s lively poetic scene. Eberhard’s third
              book, This Woman , follows (a little distantly) in the wake of her first two, Agamemnon’s Poppies (2003) and Jane, Lady Franklin (2005).
              Like its predecessors, This Woman displays a strong interest in nature (geology and botany in particular) and what it can tell us about
              our own human natures. Most of the poems, one way or another, are meditative, outdoors and full of weather. Their scrutiny can be detailed,
              even exhaustively so for a non-bushwalker, but they are never merely descriptive. Often they are enlivened by her husband - and three young
              sons (running on ahead) - which gives them an added human dimension. But if these poems are about stones, they are also about flesh. Take
              the opening of an early poem, ‘In the Mirror’, for instance: ‘Look, you are round again, / breasts alive with blood, swelling / like sun-basking
              fruit, hips filling / the space and sound of ‘haunches’, growing / into the shape of boulders...’ There are also a number of sophisticated
              and convincing love poems, such as the book’s final sequence, ‘Earth, Air, Water, Fire’, ‘Knots #vi’ and ‘Phosphorence’ which concludes:
              ‘a body awash with ecstasy / of another’s lips and fingers; / that moment when we spin / out of orbit, in our skin / the birth of stars’
              It’s not all a celebration, however. At the core of this book is the title poem, a sequence of seven parts, all dealing with breast cancer.
              Here, in the modest and non-histrionic third person, Eberhard traces a wide range of emotions: the loss of control, the cultural importance
              of the breast itself, the existential terror of the situation, the determination to come through and the power to ‘to live, and let go.’
              Sometimes the experience is objectified, as in the contrasting image of the yacht with its ‘mastery of wind and waves’ and its being ‘more
              certain of the future / than she can ever be.’ In Part iv, however, we are given ‘the foetal crouch / in bed / on the floor / on the phone’
              and how ‘nothing has prepared her for this not three lots of childbirth the push and tear and blood of it’ nor ‘climbing at 16000 feet brain
              begging for oxygen’. In the final third of This Woman , Eberhard returns to some early Tasmanian history (the famous 1792 French garden
              at Recherche Bay, for instance, and her great-great-great highwayman grandfather transported to Van Diemen’s Land). She also offers us quite
              a few more ‘outdoor’ poems such as ‘Button Grass’, ‘Mt Wellington Poems’ and ‘Mt Field’ which ends with some very characteristic Eberhard
              lines: ‘...now our children add their prints / to wallaby and possum, scaffold the wind // with their layered silhouettes, tease out the
              nuances of light / and reason as they race each other up, up into the rocky sky, / while snowgum limbs stretch sideways in death, and life.’"
        - title: Wet Ink Review
          text:
              "This Woman Heather Taylor Johnson Wet Ink, No. 25, 2011 Connection to place can truly be a spiritual thing, and Adrienne Eberhard can
              prove it. In This Woman , her fourth collection of poems, Eberhard gets personal with Tasmania’s coast, its mud and mountains and snow,
              and it is wholly sensual. Her eyes and ears are drawn to the symmetry of nature and human experience, perhaps why domestication has never
              been so satisfying: lovers breathe in time to the lashings of westerlies, and newborn chil¬dren are blessed with dolphin totems. Jellyfish
              become breasts - living and fragile matter so dear to both seafarer and survivor of breast cancer. Like mentions of the ocean, breasts abound
              in This Woman and that connection, too, is a spiritual thing. It is geography and the body: even the sea, gleaming its silver chainmail
              under the sun’s last longing glance is a breast rising and falling, and the hills in the day’s final silence are breasts, too, stained purple
              as lips from summer berries ‘This woman’ There are beautiful, still moments in this collection, even amid nature’s noise, and I caught onto
              that from the very first page. But the spell waned for me - didn’t wear off, just waned - as I came to realize that the poems are very much
              the same. I enjoy collections with tight themes and I very much enjoyed the thematic acuteness of this one, but rhythmically, structurally,
              and emotively there is little variation. Take these first lines from four different poems: A body immersed in the sea (‘The Words) Moonlight
              creeps tentacles (‘Bailiff Songs’) Our boat floats like a small moon (‘Omens’) Curled on the couch, I read Heaney (‘Water Music’) With each
              opening we know what we are in for: something emotive and imagistic. In just those few words Eberhard has given us a particular ambiance;
              she then continues to let it flow until we reach the end of the poem. Her instincts for creating mood are praiseworthy, but I would have
              appreciated alternative atmospheres. The lack of surprise weighed heavy on me the further I got into the book. I am sure this criticism
              will turn out to be a saving grace for me one day. Good poetry is not something that I tend to give away or sell to a secondhand bookshop.
              Good poetry stays on my shelf for future visits, and often I return to them when I am feeling a particular way (so many crossroads in a
              person’s life; so many poems). This is exactly the kind of book I would choose to read when I am feeling reflective, and that is why This
              Woman is exactly the kind of book I will pick up again and again."
        - title: Mascara Literary Review Review
          text:
              "This Woman Margaret Bradstock Mascara Literary Review - 10/10/2011 As the collection’s title suggests, This Woman is a book of poetry
              situating the poet within her world. It is female poetry, confessional poetry, celebrating motherhood, children, love, nature and its fecundity
              and, above all, the significance of place, ‘where what matters is/ something other than us’ (p.66). The prevalence of Tasmanian landscape
              in the poems is strong, and conjures up an awareness of the island’s history and geography. ‘Littoral’ links the present, encapsulated in
              the figures of the poet’s sons, with her own responses to the coastal landmarks: These two, mushrooms under the faded indigo of their hats,
              are the sign posts of her days, the far-reaches of her paddock marked by their small figures running. histories, pulling her like the way
              they lift their heads to watch the finger-winged passage of a sea eagle sailing the air, its territory marked by the nest of young and the
              far gum tree. ‘Littoral’ The sequence ‘Mt Wellington Poems’ goes further back into the past, 10,000 years and more, to the time of Gondwana
              land’s geology and plants: ‘This could be airy ground in Africa,/ the cloud-capped Mountains of the Moon’ (p.61). A response to the Mt Wellington
              Festival of 2002, in collaboration with poets and scientists, the sequence teaches respect for the native flora and an awareness of its
              history: ‘This mountain’s history is collection: flanks scoured,/ plants sampled, examined, described and stored’ (p.59). The concept is
              extended and deepened, both literally and metaphorically, in ‘Managing the Mountain (or Mapping Time’: yet mapped, on the table before us,
              the mountain shrinks, reduced to kilometres of fire-trail, to the homogenisation of trail head, sign, specification. What’s being mapped
              is impact, the scars of over-use. ‘Managing the Mountain (or Mapping Time)’ A further poem celebrating landscape and its links to the human
              condition is ‘Mt Field.’ Here the only scars are created by nature, and we are given a glimpse of a prelapsarian world. Death and life,
              whether of seasons or snowgum limbs, are natural processes in this poem. While the scenario is beautifully evoked, the end-point of anthropogenic
              destruction is not touched upon, as it might well have been in the contemporary climate. Likewise, ‘Recherche Bay’ pays tribute to the conceptual
              fecundity of Lahaie’s garden and the imagined response to it of ship’s steward, Louise Girardon, but makes no mention of the Government-approved
              road and logging project that threatened the site of the garden as a historic feature in 2005. Two poems, however, might be said to go beyond
              the idyll of nature undisrupted and extend their horizons in the direction of ecopoesis. The first and most important of these is ‘Trust,’
              dedicated to the poet’s husband, his adolescent naming of fish and fauna elevating these to ‘friend,’ a passion later shared by his sons.
              Now, in an endangered world: He reads the latest reports, insists they only fish in waters swept by Southern Ocean currents, while each
              day, his sons salvage bones and fossils, shells and starfish to line their bedroom window sill, pulling the river one wave closer each time
              until at night it laps at their ears and they sleep, their world too small yet for pollution, poison, extinction, knowing only renewal,
              their trust huge in his hands. p.20 In ‘Owls,’ ‘the insolent slow flap/ of an owl across the bitumen’s sinuous curve’ assails the persona
              driving home at night: she has not seen owls here for three years their haunting of the dead gum a memory she links to a time when the future
              was a bowl of blue sky and infinity was the rest of their lives tonight a second owl launches into the night in front of her and she understands
              she has not lost the future or the past it is here this feather-claw-beak moment that she has found p.30 Notable also, by its near-absence,
              is the issue of Aboriginality in Tasmania’s black history. There’s a reference to a rock-wall hand imprint on p.1, to ‘native women in this
              Edenic/ world’ (p.57), but neither the harmonious relations between the d’Entrecasteaux expedition and Lylueqonny natives in 1792, nor the
              horrific massacres of 1824-31, receive a mention. When it comes to invasions of the landscape of the human body, however, the poet is more
              confronting. ‘Breast Strokes’ provides a fine commentary on the representation of women’s breasts by traditional male artists, with a contemporary
              bombshell in the closing stanza on Rembrandt’s contribution: a silent time bomb: her breast − a million breasts − flowering with deadly
              beauty, the cells that lie, tucked and hidden, shaping the future into which, oblivious, we sail. p.29 Almost a conceit, the poem progresses
              through repetition of key words, through images of flowers and sailing, to a conclusion which powerfully reverses their expected significance.
              The centrality of these images is continued in the title sequence, ‘This Woman’: She’s not interested in figureheads, their breasts and
              tresses a form of treason, it’s more the way a yacht lies under sail, its ability to displace, and sometimes plane, as astonishing as flight.
              A boat knows its own destiny; this is the most disturbing thing of all, that in its relentless fracturing of the blue meniscus that surrounds
              her, a boat is more certain of the future than she can ever be. p.33 There is the starkness of recognition, encapsulated in spare, hard-hitting
              language: The surgeon will take his knife and chase the trail of spoor, cut and probe, then sew and rectify. Her breast will follow the
              knife’s hollowing, all pertness spent in the sharpness of steel, falling into itself, as if trying to salvage something. p.35 and the images
              of violation: ‘nothing has prepared her for this...blood cells bones clawing each other/ civil war,’ followed ultimately by defiant hope:
              ‘belief, in everyday miracles;/ anything, the paper nautilus tells her, is possible.’ Reliant on the importance of ‘the small personal voice,’
              ‘Breast Strokes’ and ‘This Woman,’ taken together, provide one of the strongest poetic statements in this collection. By contrast, ‘Maze’
              is an afterthought, its frame of reference from legend and fairytale unconvincing. Eberhard works best when re-creating the reality of her
              world, on its own terms. The poem ‘Vision,’ about her son’s colour-blindness, provides an example of this technique. Images and metaphors
              arise naturally from the subject-matter: In my son’s classroom the children’s postcards line cupboard doors, each asked to draw what they
              see: 28 blue vases holding flowers, the 29th, pink. the cones of his retina white-washed into seeing the world awry. In his drawings, he’s
              a stickler for detail as if in its sharpness and accuracy his brain balances out chroma-deficiency, allowing 3D perspectives, upside-down
              views, a vision unfettered by distance and the quotidian. pp.75-6 Technically, the poet exhibits a penchant for sequences which allow her
              to explore different aspects of her subject-matter. Some of the images that arise are startling, metaphysical in their implications (‘Walking
              in the wind, it seemed/ as if the world was a knotted/ ball of wool unravelling,’ p.3; ‘This hut is a harbour, hooked to the mountain,/
              scoparias and waratahs burning red candles,’ p.68; ‘This rib you found, leached like driftwood/ and light as pumice stone,’ p.70). Many
              are maternal, based on her awareness of the female body and its responses (‘the net the fishermen pull/ is full of grief: the stilled voice/
              of a new-born child,’ p.21; ‘it’s a journey into time, when the mountain/ was a child sleeping in its mother’s womb,’ p.66). Sometimes,
              this approach results in over-contrivance (as in the poem ‘Maze’) or the possibility of a clichéd central concept (‘Setting Out,’ ‘Bird
              Song,’ ‘Seeds’). Overall, however, language in the collection is wielded with style and precision, contributing to the shock of recognition
              that is poetry’s function: Some words are like this: when you come across the right ones, their electric stab is like stepping into the
              ocean, being broken and made whole again, drawing a body to a different realm where uprights and verticals are gone, where sky and water
              stream in, jettisoning all the mind’s freight. ‘The Words’"
chasing-marie-antoinette-all-over-paris:
    title: Chasing Marie Antoinette All Over Paris
    author: Adrienne Eberhard
    short_description:
        Adrienne Eberhard’s new collection Chasing Marie Antoinette all Over Paris forges connections between past and present, public
        and private, and human and non-human, exploring what it means to be truly at home in the world, whether her beloved Tasmania, France or Indonesia.
        Ranging in subject matter from native grasses, ducklings and footy games, to cave paintings, family and 9000 years-deep ancestry, she draws
        on personal, as well as cultural, history to investigate possibility, love and loss. With their focus on the small and the precious, these
        poems draw our attention to what is often overlooked, enabling us to see the extraordinary in the ordinary.
    long_description:
        Adrienne Eberhard’s new collection Chasing Marie Antoinette all Over Paris forges connections between past and present, public
        and private, and human and non-human, exploring what it means to be truly at home in the world, whether her beloved Tasmania, France or Indonesia.
        Ranging in subject matter from native grasses, ducklings and footy games, to cave paintings, family and 9000 years-deep ancestry, she draws
        on personal, as well as cultural, history to investigate possibility, love and loss. With their focus on the small and the precious, these
        poems draw our attention to what is often overlooked, enabling us to see the extraordinary in the ordinary.
    price: 25.95
    isbn: "9780648038757"
    release_date: "2020"
    page_count: 110
    reviews:
        - title: Canberra Times
          text:
              'REVIEWS REVIEW by Geoff Page March 6 2021 - 12:00AM Adrienne Eberhard''s latest collection of poetry is a reminder of the strong female
              tradition of Tasmanian poets Chasing Marie Antoinette All Over Paris , by Adrienne Eberhard. Black Pepper , $24. http://blackpepperpublishing.com/eberhardCMAAOP.html
              Adrienne Eberhard''s fifth collection, Chasing Marie Antoinette All Over Paris , is a convenient reminder of what a strong tradition of
              female poetry Tasmania has had over the years. It began with Gwen Harwood (1920-1995) and went on to include Margaret Scott (1934-2005),
              Kathryn Lomer, Louise Oxley, Jane Williams, Sarah Day, Esther Ottaway and Eberhard herself (among others). Eberhard''s new book is divided
              into four sections which reveal, in turn, various aspects of her personal interests and poetic resources. The second shows the poet''s detailed
              knowledge of Tasmanian landscapes and flora and will have a special attraction for readers familiar with them. The poems are closely attentive
              and highly metaphoric. The book''s title, however, comes from a sequence in its third section. It''s in three parts and shows a good deal
              more sympathy for the "Viennese" queen than was demonstrated by the crowd which witnessed her execution. Part I is based on a pair of the
              queen''s satin shoes: tiny shoes with pearl buttons and a heel that tapped authoritatively on the marble floor When I looked again there
              were lilies / spilling like footsteps silken each one a stab of paint a fall and you nowhere to be seen. Part III is also remarkable for
              that relative rarity, a high-quality, explicitly-religious contemporary poem, In "Christmas Eve" the poet appears to be watching her husband,
              at a Parisian Christmas mass, accept: the wafer containing the compression of centuries, and in the lifting voices spilling with the organ''s
              swelling magnitude, he is caught, pinned like a butterfly, his blue eyes catching mine as he swallows. For this reader, the emotional core
              of the book is in the opening sequence of its final section which, from a series of photographs, evokes the life and marriage of her Dutch
              grandfather and his Dutch-Indies wife. They married in 1929 and lived in Java in the 1930s and 40s before emigrating to Australia after
              World War II. The poems here, nine in all, are not without a gloss of imperial nostalgia but their portrait of an initially rhapsodic marriage
              and its progressive decline, capped by the husband''s internment under the Japanese, is more than moving. The last sentence of its second
              poem is indicative of Eberhard at her best: Her pliancy ironed out in him, into the sharp angles of shirt, collar, pocket, the only concession
              the buttonhole spray with its tiny white pods that could be embroidery on a lace veil. Back to top Start of StatCounter Code End of StatCounter
              Code'
other-summers:
    title: Other Summers
    author: Stephen Edgar
    short_description:
        Other Summers is a collection of Stephen Edgar’s lyric poetry in which knowledge and emotion are contained within formal
        structures, technical intricacy and conversational speech.
    long_description:
        "The trees, as though self-mesmerized, all climb Unmowed, you’d say, into a printed breeze In which the yachts, remnants of
        an event, Have long been left behind Those of us who thought that Stephen Edgar had already reached a kind of perfection must now face the
        daunting possibility that he is only just getting into his stride. The range of knowledge and the depth of emotion are contained and intensified
        by an infallibly musical sense of form. Here is the poetry of someone who has been granted all the gifts, including a sense of proportion
        so concentrated that it sings. But perhaps the most fascinating aspect of all is that under the enchanted lyricism, the technical intricacy
        and the dazzling vocabulary there is always the bedrock of good, plain, conversational speech. This is the way we would all talk if we could.
        It’s just that almost none of us except him can. Clive James I can’t think of anyone writing poetry in English, at the moment or recently,
        who renders the natural world with the voluptuous precision of Stephen Edgar. These are poems of elegance and depth. August Kleinzahler Cover
        image: Louise Tomlinson, Strand 2003"
    price: 24.95
    isbn: "9781876044541"
    release_date: "2006"
    page_count: 108
    reviews:
        - title: Five Bells Review
          text:
              "Reviews Other Summers John L. Sheppard Five Bells, Spring/Summer 2008/2009 Stephen Edgar has often been regarded as Australia’s foremost
              formalist. The collection of poems in Other Summers , his sixth book of poetry, only serves to strengthen this reputation. It is evidence
              of a master craftsman at work. He uses rhyme, but not in every instance; he often has regular stanza lengths, especially four or three lines,
              but not always; he sometimes uses known classical forms, like sonnet and villanelle. However, it is not the structural aspects that make
              his writing compelling: it is his elegant use of language and his sophisticated lyricism, often expressed in free verse. Here is an example
              of this elegance of expression, compacted with metaphor, carefully chosen adjective and personification: The day unfolds its golden auguries
              On a charmed sky. A secular congregation Is out already to revere The lit east with a helpless expectation. ‘Tomorrowland’ And in another
              extract, also compacted with metaphor, and with simile: A breeze fills up the manna gum’s huge lung, That hologram of bronchioles. It sways
              there Tethered and shifting like a hot-air balloon Preparing for some fresh and doomed attempt To circle the great globe. ‘The Immortals’
              One of my favourite poems in the book is ‘Salvage’. It is the extraordinary poetic power of the language that attracts me, and the dramatic
              quality in Edgar’s imagery. Consider the following: And when the winches Shriek and groan in concert, and the chain winds in, And the churning
              surface, growing smooth now, shows The green emergence of a rising bulk And bulges momently like a streaming eye, And something broaches,
              oceanwater-curtained, What would it serve them, even if they could see, Whether the deeps fall dazzlingly away Like foamy gauzes trailing
              Aphrodite, Or spill like eels out of a rotting horsehead? ‘Salvage’ The verbs are highly expressive, indeed onomatopoeic, in ‘shriek’, ‘groan’
              , ‘bulges’, ‘broaches’; the adjectives are intense, in ‘churning’, ‘streaming’, ‘oceanwater-curtained’, ‘foamy’, ‘rotting’; the similes
              are startling, in ‘like a streaming eye’, ‘like foamy gauzes trailing Aphrodite’, ‘like eels out of a rotting horsehead’. There is also
              a rhetorical flourish in the writing, where the lines build up to a climax as the repeated ‘and’ (given five times) adds one image after
              another, until there is the ‘What would it serve them...?’ This build-up gives the writing special strength and purpose, just like an orator
              may use repetition to make a powerful point. The reference to Aphrodite (p.73) reflects the author’s classical background, for he is a Latin
              and Greek scholar, and occasionally alludes to the ancient myths; for example, he refers to Beatrice (p.2), Andromeda (p.10), Ithaca (p.19),
              the Minotaur (p.36), and Sappho the writer (p.ix). It helps to know your classics. It also helps to know your literature; for example, Edgar
              often refers to Dante, and has allusions to several other writers. Another part of the book I find intriguing is his treatment of a summer
              theme in three different ways under the same title of ‘Im Sommerwind’, which is a German term. In the first and third rendition he addresses
              the same general scene of his family home, with mother and author present, but deliberately describes it in different tones. I asked him
              about this, and he said he just wanted to try it out in a different way. I am reminded, having just been to the current NSW Art Gallery
              exhibition, of how the French Impressionist artist Claude Monet in the 1880s and 1890s painted several series of the same subject in different
              light, as changes occurred through the day. One of these was of the Creuse Valley, another was Rouen Cathedral, another was haystacks. He
              thereby produced an extraordinary sequence each time. Edgar is taking the same approach of viewing the one subject in different lights,
              for the sake of making the comparison. All three of the poems are in triplet stanzas. The third is in chained verse, a villanelle. The first
              line is the same in the first and third poem. The second treatment is very different in approach, seemingly based on a photograph of his
              family, and acknowledges an extract from Primo Levi which has in it the themes contained in Edgar’s own poem. There is a certain artistic
              playfulness in this approach, of producing a triptych and scattering the three parts to different locations in the book, not side by side,
              leaving it to readers to find what they will. We see here Edgar’s versatility. The three pieces bind the book as a whole, setting up thematic
              unity. One can compare the beginning of the first poem and the third: On a hot listless Sunday afternoon Of adolescence, on the parapet
              Of cooler brick on our front porch, propped up Against the pillar I look lazily Across the park that’s faded less by summer, It seems, than
              from the day’s inert aversion To the principle of colour, as when you stare Directly at the sun, then turn away, And everything is washed
              out, overexposed - ‘Im Sommerwind’ * On a hot listless Sunday afternoon I’m sprawling on the porch by the front door While someone’s radio
              murmurs a tune. My mother’s brought a chair out to maroon Herself a moment between chore and chore On a hot listless Sunday afternoon. The
              screen door wants to let the house commune With languid airs that stray in to explore While someone’s radio murmurs a tune. ‘Im Sommerwind’
              The first poem is in free verse; the third is formalist, following a tighter set of rules. Both versions work; both are competently crafted.
              All three are founded on reminiscence. It is intriguing to relate those three poems to a fourth in the collection, ‘Eighth Heaven’. In it
              Edgar seems to take the ideas further in another treatment, this time including his father in the scenario. Here is the beginning: I open
              the flyscreen door and slip inside Easing it shut. Low voices - the radio? - Drift from the dining room, although their words Are indistinct.
              A milky sort of light Clings to the ceiling showing that the summer Is well established here and the inner shadows, However cool they may
              appear, are tacky As bare thighs on a vinyl chair. My mother, at the kitchen bench, is pouring Afternoon tea... ‘Eighth Heaven’ Here again
              we have the screen door, summer, radio playing, colour and light, his mother: another ‘variation on a theme by Paganini,’ so to speak. Further
              binding the work is an emphasis on memory, reminiscence, time, season, nostalgia, lost love, transience of existence, mortality, and the
              need for hope. These ideas are treated sometimes with complex syntax, density of expression, rich diction, and colourful ingenuity. Rhyme
              and musical rhythm are an integral part of the whole, working in intricate harmony. Time occasionally takes on a haunting aspect, an elegiac
              quality, bitter-sweet memory bringing forward paradox as time stands still. This is serious poetry, and its wealth is worth the effort of
              mining. For sheer brilliance of sophisticated use of language, for extraordinary formal control of rhythm and rhyme, for delicate lyricism,
              this book is not to be missed."
        - title: Poetry Chicago Review more recent
          text:
              "An Almost Perfect Break-up Poem Clive James Poetry (Chicago), January 2009 A critic’s second reading of a poem by Stephen Edgar proves
              that a first reading is the best-kept secret of criticism . ) On a second reading of a poem that has wowed us, we might grow even more interested,
              but we start to sober up. For my own part, initial admiration for a single poem often tempts me into a vocabulary I would rather avoid.
              The Australian poet Stephen Edgar’s poem ‘Man on the Moon’ can be found in his collection Other Summers , or—more quickly, and for free—in
              the selection devoted to his work in the Guest Poets section of my website, clivejames.com. With a single reservation, I think it is a perfect
              poem, although ‘perfect’ is an adjective I would rather not be caught using. The word just doesn’t convey enough meaning to cover, or even
              approach, the integrity of the manufacture. I knew that already on a first reading. But on a second reading, I begin to know how I knew
              it: Hardly a feature in the evening sky As yet—near the horizon the cold glow Of rose and mauve which, as you look on high, Deepens to Giotto’s
              dream of indigo. Giotto is dreaming of indigo because he couldn’t get enough of it: in his time it was a pigment worth its weight in gold.
              Edgar is always good on facts like that. I could write a commentary picking up on such points, but it wouldn’t say why the poem is perfect,
              or almost so. The obvious conclusion is that I don’t need to say that. But I want to, because a task has been fudged if I don’t. There are
              plenty of poems full of solid moments, but the moments don’t hang together even by gravity. So why, in this case, do they cohere? Hardly
              a star as yet. And then that frail Sliver of moon like a thin peel of soap Gouged by a nail, or the paring of a nail: Slender enough repository
              of hope. We can already see the moments cohering. The indigo sky of the first stanza has supplied the background for the moon, which has
              become two different things, one growing out of another: the soap paring and the separated crescent of a fingernail, possibly the same fingernail
              that scratched the soap, but probably not, or he would have said so. These specific but metaphorical details provide the warrant for a general
              but more abstract statement about hope. Out on its own, the abstract concept of hope could be the town where Bill Clinton was born, or a
              mantra in a speech by Barack Obama. We don’t know what the poet’s hope is about yet, but here it looks planted securely on firm ground,
              because of the store of specific noticing that has already been built up: There was no lack of hope when thirty-five Full years ago they
              sent up the Apollo — Two thirds of all the years I’ve been alive. They let us out of school, so we could follow The broadcast of that memorable
              scene, Crouching in Mr. Langshaw’s tiny flat, The whole class huddled round the TV screen. There’s not much chance, then, of forgetting
              that. Now we see where hope was going: all the way to the moon. The Apollo mission landed there in 1969. Add a ‘full’ thirty-five years
              to this and we can calculate that the poem was written in 2004 or perhaps the year after. Increase thirty-five years by a third and we find
              that the poet is about fifty-three years old at the time of writing. And he was about seventeen at the time of the landing. So he was in
              high school, with Mr. Langshaw for a teacher: a dedicated teacher, living alone in tight circumstances, here made tighter by the presence
              of the whole class. The number of boys in the class is the only statistic we can’t work out, but it must have been a substantial number
              or the word ‘whole’ would not have been used for effect. Because these two stanzas form one unit, the first bridging syntactically into
              the next, we can see that the pace has picked up. The first two stanzas of the poem made one statement at a time, but they were just the
              overture. This is the opera. Or at any rate the operetta: there is an air of lightness to it, mainly conveyed by ‘that memorable scene,’
              which is a knowing allusion to a time-honored line of poetry (from Marvell’s ‘An Horatian Ode upon Cromwell’s Return from Ireland’), and
              is obviously put there on the assumption that we also know it, or can at least guess that the heroic elevation of an archaic-sounding phrase
              is deliberately being used to say that this, too, is history. Those who remember the story of Marvell’s poem will be glad to realize that
              this time nobody is getting executed. In Marvell’s poem, it is Charles I, and not Cromwell, who bravely faces death, and the diction is
              a token of the poet’s generous scope of understanding. But to borrow the phrase is also a way for this later poet, Stephen Edgar, to say
              that literature now must make room for the machines. Readers who go further into his work, as they surely must, will find that Edgar is
              unusually sensitive to science and technology. They increase his vocabulary, which is lyrically precise over a greater range of human activity
              than anyone else’s I can think of, with the possible exception of his senior compatriot Les Murray. More of a city boy than Murray, Edgar
              has fewer words for evoking life on the land. But for all other realms he has whole dictionaries in his head: And for the first time ever
              I think now, As though it were a memory, that you Were in the world then and alive, and how Down time’s long labyrinthine avenue Eventually
              you’d bring yourself to me With no excessive haste and none too soon— As memorable in my history As that small step for man on to the moon.
              And this, suddenly and unexpectedly, is another realm, the realm of personal emotion. One of Edgar’s favorite strategies is to set up an
              area of public property, as it were, before bringing in the personal relationship: a way of spreading inward from the world. The effect,
              especially acute in this case, is to dramatize his isolation. But as yet we don’t know that the isolation will mean loneliness. Perhaps
              he and ‘you’ are still together. The portents, however, are ominous. For one thing, she is probably younger than he. She was in the world
              then, but the wording suggests that she might not have been so for very long. She was on her way to him, down a ‘long labyrinthine avenue’
              that sounds as if it has passed through the mind of Philip Larkin. Edgar is fond—sometimes too fond—of echoing Larkin, but he is usually,
              as here, careful to echo only the cadences, not the wording. Larkin often used a monosyllabic adjective before a polysyllabic one, with
              no separating comma. The sonorous glissando of the device was useful to give the pathos of passing time. But Edgar undercuts the evocation
              of inevitability by giving the loved one an air of caprice. She brings herself (good of her) with no excessive haste (what kept her?) and
              none too soon (finally she deigns to turn up). On a fine point of technique, rather than a larger point of tactics, the way that the poet,
              in the penultimate line quoted, gives ‘memorable’ and ‘history’ their full syllabic value recalls Auden, and in the final line of the octet
              we can hear Empson, as we can always hear him when trochees are laid over an iambic pattern to give a spondaic tread. Since Edgar obviously
              weighs his words with care, it is safe to assume that he knows Neil Armstrong blew the script. Armstrong should have said ‘one small step
              for a man.’ When he fluffed it and said ‘one small step for man,’ he ensured that ‘man’ and ‘mankind’ would mean the same thing and that
              the sentence would be deprived of its intended contrast. But Edgar seems to be saying that even the giant step for mankind is small—small
              enough, at any rate, to be matched by the moment in his own history when he and the loved one met: How pitiful and inveterate the way We
              view the paths by which our lives descended From the far past down to the present day And fancy those contingencies intended, A secret destiny
              planned in advance Where what is done is as it must be done For us alone. When really it’s all chance And the special one might have been
              anyone. Here again, a whole argument is bridged over two stanzas, and this time with only a single terminal comma, so that the effect of
              a lot being said at once is reinforced by the technical fact of compressed syntax. The word ‘inveterate’ gets a hypermetric emphasis, making
              it sound important enough for us to figure out exactly what it means here, or to look it up if we’ve never seen it. (If we do look it up,
              we find that the current meanings of something long established and settled by habit are underpinned by a historic meaning of something
              hostile—an undertone which soon turns out to be appropriate.) In the last line of the stanza we have to figure out, in the absence of the
              poet’s spoken emphasis, that the word ‘intended’ is an adjective qualifying the noun ‘contingencies.’ That’s one of the tasks fulfilled
              by the comma: to tell us that the contingencies aren’t about to intend anything, but are, themselves, intended. The other task of the comma
              is to set up a development in which the contingencies amount to a destiny, which turns out to be the wrong idea. ‘Where what is done is
              as it must be done’ has a playful musicality, but the play is sad, because it isn’t true: determinism is an illusion. Chance rules, and
              when the repetition in the line is matched by the repetition in the last line, the game is over. The poem, however, isn’t. Casting our eyes
              down we see that there is more of it to come, although not much more. It’s going to have to cover a lot of distance in a short time if it
              is to bring these themes together: The paths that I imagined to have come Together and for good have simply crossed And carried on. And
              that delirium We found is cold and sober now and lost. This time the argument is confined to one stanza and has the effect of a summary.
              We know that there is more of the poem to come, but it could conceivably end here. The separate trajectories of the mission and the moon
              successfully met each other according to plan, and the Apollo Lunar Module came down in the right spot. The separate trajectories of the
              poet and the loved one met each other as well, but each of them kept going. Ecstasy (called ‘delirium’ in retrospect, as if it had been
              a fever) didn’t hold them together, and the return of sobriety revealed that it couldn’t have. What was ‘lost’ was a big chance, but a chance
              was all it was. The under-punctuation is an indicator, telling us that he’s had time to work this conclusion out, and that it can therefore
              be set down economically, as a given. The whole story can be seen in the turn of the second line into the third. The phrase ‘And carried
              on’ comes out of the turn with a reinforced inevitability. (In the heyday of practical criticism, such an effect would have been called
              ‘enactment,’ but when it was eventually realized that almost any technical feature could be called enactment, the term thankfully went into
              abeyance.) The idea that if their two paths crossed they might stick together was a wrong guess on his part. Was it the wrong wish? Well,
              separation seems to have been her decision, so perhaps she was the wrong woman. Maybe delirium wasn’t what she wanted. We are left free
              to speculate about all those things as the poem spreads outwards again, and makes an end: The crescent moon, to quote myself, lies back,
              A radiotelescope propped to receive The signals of the circling zodiac. I send my thoughts up, wishing to believe This is only the first
              stanza of a conclusion that spreads over two stanzas, but let’s break into the flow and see how it works. My own first judgment was that
              an otherwise unstoppable advance had interrupted itself. On a second reading, I still think so. When I mentioned that I had only one reservation
              about the poem, the phrase ‘to quote myself’ was it. He isn’t quoting any other part of the poem, so what is he quoting? Investigation reveals
              that he is quoting another of his poems: ‘Nocturne,’ the second part of a two-part sequence called ‘Day Work,’ which was collected in his
              previous volume, Lost in the Foreground . A poet need not necessarily be asking too much when he asks us to read one of his poems in the
              light of others in the same volume, or even in other volumes. In the later Yeats, to take a prominent instance, there are plenty of individual
              poems making that demand. But when a poem has successfully spent most of its time convincing us that it stands alone, it seems worse than
              a pity when it doesn’t. It seems like self-injury: a bad tattoo. It was the poem itself that made us wish it to be independent, so it has
              revised its own demand. Edgar’s poem can have this flaw and still remain intact. (Presumably the crack in the golden bowl did not stop it
              holding fruit.) But it’s definitely a blip in the self-contained air of infallibility. The perfect has momentarily become less-than-perfect,
              with the sole advantage that one is forcibly persuaded that the word ‘perfect’ might mean something. (If it means ‘stand-alone,’ ‘independent’
              and ‘self-contained,’ then those are already better words.) But the argument continues despite the backfire. The motor hasn’t stopped running.
              It powers the radio telescope of the moon, which is listening to the stars, appearing here in their old-style, pre-scientific form. What
              does he wish to believe about the possible destination of his thoughts after they are beamed up to the soap paring, or nail paring, that
              has now become a parabolic dish? (This poet doesn’t mix his metaphors: he morphs them.) The answer is in the two-part coda’s second stanza,
              which is the last stanza of the poem: That they might strike the moon and be transferred To where you are and find or join your own. Don’t
              smile. I know the notion is absurd, And everything I think, I think alone. He wants their two trajectories, his and hers, to join again.
              But we have seen that they haven’t, and now we are told that they won’t, because when he addresses her, she isn’t there, except in his head.
              This is a drama for one person, and it’s over. He has been talking to himself all along. * * * When reacting to a poem, the word ‘perfect’
              is inadequate for the same reason that the word ‘wow’ would be. But it isn’t inadequate because it says nothing. It is inadequate because
              it is trying to say everything. On a second reading, we begin to deduce that our first reading was complex, even if it seemed simple. Scores
              of judgments were going on, too quickly for us to catch but adding up to a conviction—first formed early in the piece and then becoming
              more and more detailed—that this object’s mass of material is held together by a binding force. Such a binding force seems to operate within
              all successful works of art in any medium, like a singularity in space that takes us in with it, so that we can’t pay attention to anything
              else, and least of all to all the other works of art that might be just as powerful. We get to pay attention to them only when we recover.
              But recover from what? A spell? Here again, all the natural first words are suspect. I could say why I picked this less-than-perfect, but
              almost perfect, poem by Stephen Edgar out of all the scores of perfect poems by him, and out of all the hundreds of perfect poems by other
              people. I could say I picked it out because it haunts me. If haunting is what ghosts are good at, hanging around to rattle the pots and
              rearrange the furniture when you least expect it, then ‘haunt’ is the right verb. But it’s a verb that I would rather not use. I think Edgar
              is a fine poetic craftsman. But in that sentence there are two other words I would rather not use either. The word ‘craftsman’ always sounds
              like a doomed attempt to give an artist the same credibility as a master carpenter, and ‘fine’ smacks of self-consciously upmarket (i.e.
              effectively downmarket) American advertising, as in ‘fine dining,’ ‘fine linens,’ and ‘fine wine.’ Well, yes, of course the poet is a fine
              craftsman, and of course his poem haunts you with its perfection. All these superannuated words we should take for granted when talking
              about any poem that is properly realized. Actually to put them back into print is like diving on a wreck, with no yield of treasure except
              scrap metal. Yet we need the ideas, if not the vocabulary, if we are to begin talking about why and how the poem in question is a made object,
              and not a foundling. Every bit of it might well be a trouvaille—how phrases are assembled and lucky strikes are struck is an even deeper
              question—but all the bits are put together by someone who either knows exactly what he’s doing or else can control the process by which
              he doesn’t, quite. You could say that the poet, right from the start and without interruption, transmits an air of authority, but I doubt
              that the phrase counts for much more than all those other words I’ve been trying to avoid. (Even the author of a jingle on a birthday card
              has an air of authority if you like the sentiment.) The thing to grasp is that the fine words and phrases are standing in for a complex
              reaction. They serve as tokens for a complete discussion of an intricate process that doesn’t just happen subsequently, on a second reading,
              but happens initially, on the first reading. Most of the analysis that I have supplied above almost certainly happened the first time that
              I read the poem, but this time I have written it out. So much can happen, and in such a short space, only because we bring our own history
              to the poem, even as it brings the poet’s history to us. Contained within the first reaction are all the mechanisms we have built up through
              reading poems since we were young: reading them and deciding they were good. (We might have learned even more from the poems that we decided
              were bad, but we could do that only by having first learned to recognize the good.) This mental store that the reader brings into play on
              a first reading is, I believe, the missing subject in most of what we call criticism. The missing subject needs to be illuminated if we
              are fruitfully to pursue all the other subjects that crop up as we speak further. Without that first thing, all the subsequent things might
              be full of information, but they will lack point. It makes little sense, for example, to say that a poem fits into the general run of a
              poet’s work if we don’t first find ourselves saying why it stands out even from that. We can say later that it blends in, but it had better
              be blending in only in the sense that it stands out like a lot of the poet’s other poems. A poem doesn’t, or shouldn’t, express the author’s
              ‘poetry,’ and it’s a bad sign when we contend that it does. It was a fateful turning point for the career of Ted Hughes when his later poems
              were discovered to be ‘Hughesian,’ i.e. characteristic instead of unique. The idea that a poet should be praised for producing sequences
              of poems, and even whole books of poems, that give us nothing but a set of exercises in his own established manner, is ruinous for criticism,
              and is often the sign of a ruined poet. The great mass of later Lowell is weak when tested by the intensity of early Lowell. Read ‘A Quaker
              Graveyard in Nantucket’ again—or merely recall the bits of it that you have in your memory—and then try to find anything as strong in the
              bean silo of History. It takes a critic who has never appreciated the strength of Lowell’s early poems to think that the later work is a
              development rather than a decline. In the sum of a poet’s achievement, it isn’t enough that the same tone recurs, and often it’s a sign
              of deterioration when it does. Edgar, always precise about shades of color at each end of the day, is a modern master of what I would like
              to call the daylight nocturne, but I would expect to arouse suspicion if I praised one of his poems for having no other characteristics.
              As it happens, almost every poem he publishes is impossible to reduce to a kit of favorite effects. The argument and its illustrations always
              serve each other inseparably: they can be discussed separately, but they flow back together straight away. So everything I can say about
              him follows from his capacity to produce the unified thing. From that initial point, the discussion can widen. We can say that Edgar suffers
              from the peculiar Australian critical climate in which it is widely and honestly believed that a rhymed poem in regular stanzas must be
              inhibiting to a sense of expression that would otherwise flow more freely. The elementary truth that there are levels of imagination that
              a poet won’t reach unless formal restrictions force him to has been largely supplanted, in Australia, by a more sophisticated (though far
              less intelligent) conviction that freedom of expression is more likely to be attained through letting the structure follow the impulse.
              In that climate, Stephen Edgar’s name is not yet properly valued even in Australia. To believe that it one day will be, you have to believe
              that something so good is bound to prevail. But that might not happen. Australia (and here we enter into sociology and politics) has a small
              literary market anyway, and for poetry it is minuscule, so prizes and grants count. Though his position has somewhat improved lately, Edgar
              has been awarded remarkably few of either: partly because, I fear, the committees are stacked with poets who couldn’t write in a set form
              to save their lives, and with critics and academics who believe that the whole idea of a set form is obsolete. It would be nice to think
              that this tendency could be reversed by the example of a single poet. But of course it can’t. All one can do is argue for the importance
              of his work, and that argument must start with the certainty of our first judgment, made on a first reading: a judgment which is not yet
              concerned with advocacy. On a second reading we can, and must, begin to propose a restoration of the balance. There is a place for free
              forms: they no longer have to justify themselves. There should be a place for regular forms too, but they now have to justify themselves
              every time. One of Edgar’s dictionaries is a classical dictionary. He can read the ancient languages, and might have written poems with
              no properties except those from the far past. But his work participates in a new classicism, fit to incorporate the modern world, in which
              it deserves a high place. Almost any of his poems will tell us that, on a first reading. The second reading tells us why we should try to
              tell everyone else."
        - title: Blue Dog Review
          text:
              "Tight Knot of Time: Stephen Edgar’s Other Summers Pauline Reeve Blue Dog , Vol. 6, No. 12 December 2007 This summer, the first without
              my father, saw me putting up the periscope for the first time in a long while, to look for any return of blue skies. Skies that vanished
              when a ‘white dismay’ of cancer invaded and banished an idyllic life with its sense that ‘it will be now for evermore.’ Summer is fading
              into autumn. Outside, the huge gum tree in our backyard no longer winces in the heat even though the sky is flawless, and I reflect that
              for the first time in perhaps five years there has been the satisfaction of more blue sky. And yet... and yet... life viewed from this present
              has changed. For one thing, time itself has taken on new significance. It was during those years dominated by dismay that I discovered my
              first Stephen Edgar poem ‘Im Sommerwind’ (pg 67) which now appears as the central refrain at the heart of his most recent collection, Other
              Summers . I was drawn in by the sensual summer scene he depicted, only to discover that out of it reached a hidden grief. Was this not precisely
              my own experience? Summer so often spent outdoors in the enlivening light was now being shot through with an impending final goodbye. There
              is a symphonic poem called Tm Sommerwind’ by the late nineteenth/early twentieth century composer Anton Webern, itself based on German poet
              Bruno Wille’s poem of the same name. Jonathan D. Kramer writes of this music, ‘the melodic style of Sommerwind does not comfortably fit
              its harmonic style. From the tension of disagreement comes an unsettled undercurrent that gives Sommerwind an unusual and memorable quality’
              (http://www.cincinnatisymphony.org). Though speaking of a musical style, Kramer may well have been speaking of Edgar’s voice in Other Summers
              . Here, summer on the one hand brings with it that drowsy sense of timelessness where things don’t change. On the other, it brings an element
              of unease. Clouds rise even in summer skies. Time brings change and there is no going back. Except perhaps vicariously, through imagination,
              writing, photography - those means by which we seek to hold onto time by duplication. More than that, it is ‘this moment’ that holds both
              ‘a past remoter than / The pyramids’ and ‘an era that is yet unknown.’ Here in Other Summers too, theme is matched with tensions of language.
              There is a fusion of images and poetic forms and styles from past and present, with elements borrowed from science fiction and fantasy so
              that one might describe his poetry in his own words as a ‘tight knot’ (pg 7) of time. In the end, ‘Im Sommerwind’ led me to Edgar’s fifth
              collection, Lost in the Foreground (Duffy & Snellgrove, 2003), a collection which I read like a soldier fighting for every piece of ground.
              I was unaccustomed to such density of thought and intricacies of style, and alternated between delight and despair, until I put it aside
              overwhelmed by the realities of the bleakness filling my own life. And Lost in the Foreground does present a rather jaundiced view of life.
              It takes its title from a line in a poem called ‘The Company’ (pg 48) which imagines the facelessness of the Company and has the speaker
              in the poem pondering: You wonder if it’s you Who after all Must be the last Forlorn surviving soul The collection is populated with poems
              of despair, death, void. ‘Life’ is that which the speaker in ‘Stranger to Fiction’ (pg 33) would save the child from, ‘If [they] knew how
              to.’ What I did delight in was Edgar’s imagination, his skill in evoking landscapes with which I was familiar and his inescapable mastery
              of traditional form and rhyme. On picking up Other Summers , his sixth collection in a career commencing with publication in 1985, much
              of it conducted from his adopted state Tasmania (he has of late returned to Sydney), I was immediately struck by the similarity of its cover
              to that of Lost in the Foreground . Both depict blurred scapes. The latter, a dark streetscape, with an obscure figure merged in the foreground.
              The former, a foreshore with figures emerging out of misty light. In retrospect, the two are not disconnected. ‘Space and time are one,’
              a phrase more often employed in reference to Einstein’s theory of relativity, rings through my thoughts. It is possible to see Lost in the
              Foreground as concerned primarily with space - albeit a metaphysical void. It is seeded, however, with the themes of time and the language
              and imagery characteristic of Other Summers . ‘Arcadia’ (pg 24), an elegy for Gwen Harwood, demonstrates this. Setting the poem in a seascape
              not unlike that of a Harwood poem, Edgar writes, ‘We can recall the past; Why not what is to come?’ And later: When one that we love dies
              With childlike panic we Are forced to realise The vast simplicity Of waiting pain In which the heart is hurled. Never again In the story
              of the world Will this person appear. We look for the known face, Imagine it is near. But there is just a space. Nature as imagery also
              provides a significant source of connective tissue between the books, but so too do the ongoing references to Dante, shadows, lemon light,
              outer space, underwater salvage, fiction, history and even the Prime Minister, to name just a few. But whereas Lost in the Foreground conjures
              despair, Other Summers is a journey to recapture hope and meaningfulness; a hope and meaningfulness that despite the expanse of space and
              time explored in the collection, are very much to be found in a closed but intricately connected system. There is no appeal to transcendence
              or incarnation. ‘Permaculture’ (pg 105) the second last poem of the book, marks the philosophical stance assumed in the end. Reflecting
              on the ‘Men of the world’ in the Qantas Club as they wait for the mechanics and officials conferring about the ‘jet’s improbable, / Impendent
              engine,’ the speaker asks rhetorically: ‘Who could imagine or / Desire their absence from the way things work, / This frame they helped
              contrive and help sustain?’ Only in contemplating and understanding the relationship of part to whole, can one hope to understand and move
              on. In journeying towards hope, Edgar takes us through a four-part collection of poems woven around the refrain ‘Im Sommerwind,’ which occurs
              three times in three variations. The refrain has the effect of binding parts to the whole, underscoring the knottiness of time as well as
              creating a sense of drowsy timelessness. The first and last refrain both perhaps depict a child, observing his mother take time out from
              the chores in the heat; a radio emitting ‘inklings of a tune’ which is ‘not going anywhere’ (pg 5). There is a pervasive sense of being
              stuck in time and changelessness. Edgar’s only variation is to employ the villanelle for the last refrain to emphasise through repetition
              this sense of time. In the central refrain of which I’ve already spoken, time collapses and becomes improbable and is at its most colourful
              when grief threatens an idyllic scene captured in a photograph. It is as if the central figure reaches out of the photograph, reaching beyond
              the moment. ‘You almost feel / Down on her mortal cheek as she kisses you / Goodbye...’ says the speaker observing the photograph. Edgar
              uses a similar ploy of collapsing time borrowed from fantasy in ‘The Immortals’ (pg l), almost bringing to life in a contemporary scene
              both Daniel Deronda and Dante’s Beatrice. Of the former, Edgar writes: ‘Deronda’s lying in Daniel Deronda, / His pages palping at the air,
              as though / Blindly taking in what it is all like.’ ‘The Immortals’ opens the first section of Other Summers , intimating one of Edgar’s
              disputes with summer: the haunting of the present with the past. It is a theme which dominates this section through the ten poem sequence
              ‘Consume My Heart Away’ (pgs 11-28), an engaging lyrical-narrative hybrid collection of poems occupied with coming to terms with the loss
              of love. The opening poem, ‘History of the House’ (pg 11), embarks the reader, through the eyes of the abandoned lover, on a recollection
              of the passage of their relationship and speculation about why things happened as they did. Time collapses. Ghosts of the past haunt the
              house. ‘Enough of ghosts, of those who lived before. / I have to live. Switch off the radio’ says the lover. But the radio is difficult
              to switch off when the voices are from a past and valued relationship. The sequence concludes in ‘The Transit of Venus’ (pg 28) in keeping
              with Edgar’s philosophical stance that the reason (if there is one) for the passage of the relationship, was ‘to prove / Lability the gift
              of love.’ These are perhaps the most moving poems in the collection, carried by their easeful conversational tones, linking narrative and
              depth of feeling. They are amongst the poems least locked with classical reference, though the sequence does not escape this entirely (consider
              ‘Merlin and Vivien,’ pg 22). And although Edgar’s language is extraordinarily rich it is less obtuse in these poems than in others in the
              collection. The award winning ‘Man on the Moon’ (pg 26), towards the end of this sequence, broadens Edgar’s appeal beyond the literati.
              This poem is a gentle, regretful, romantic musing drawing on twentieth century images of the Apollo landing and of space technology (‘the
              crescent moon... / a radioscope’), exploring the idea of destiny in relationship, the longing for intimacy, the idea of thought transfer
              despite physical absence that can occur in intimate relationships, again touching on the theme of collapsed time and space. Time continues
              to appear in collapsed states in the second section of Edgar’s collection.’Stilts’(pg 54), which appears in a bracket of nature poems, is
              beautifully evocative of the shimmering light out of which these long-legged birds appear. The effect of light is to transport us into a
              kind of fantasy world. The speaker observes the stilts and questions: They gradually progressed... With no mark amiss, Contained within
              a still bubble of time Contiguous with this And visible from here, Transparent to our view, ...but to theirs too? When it comes to nature,
              Edgar is focussed on the interplay of context and creature and on creating images that support his philosophical content. Selections from
              a longer work entitled ‘From the Labyrinth’ (pg 38) employ the labyrinth of Minoan myth as a time travel device. It begins as a marble structure
              and progresses to the asphalt surface of the twenty first century. The light along the way also varies from natural light to ‘tube-fed neon.’
              Edgar adopts a psychological interpretation of the myth not unlike that of Dorothy Porter in ‘The Labyrinth of Intimacy’ { Crete , Hyland
              House, 1996, pg 42), and perhaps more directly relevant, ‘The Flying Leap’ ( Crete , Hyland House, 1996, pg 40) where she writes of Ikaros:
              ‘he could smell the Minotaur / playing in his own mind.’ Edgar’s character journeys into the labyrinth of himself to confront self-doubt
              and fear. The journey puts one in mind of Dante’s journey from the inferno to paradise where, along the way, he, like Edgar’s character,
              confronts people from his past. Given Edgar’s training in the Classics, it is not surprising that an exploration of memory dominates the
              third section of Other Summers . Opening with ‘War and Peace’ (pg 61). he first draws attention to our tendency to be oblivious to the repetitiveness
              of time. In other poems such as ‘Living Colour’ (pg 65), the tools of memory - including television, still photography and film and the
              activities of salvage and mummification - pass through his poetic scrutiny, as he addresses such issues as the comparative futility of memory
              and the dangers of time-lapse. Several are perhaps akin to social commentary cum criticism. ‘Promises, Promises’ (pg 69) is partially a
              backhand swipe at politicians, as well as being about ‘time and chance and things that might have been’ and the power of time-lapse made
              possible through the media. The poem closure is apocalyptic: ‘Lights shudder in the clouds and cities sway,’ as if prophesying the consequences
              of falsity. ‘Sonnets in Silicon’ (pgs 70-71) similarly offers social commentary, alerting readers to the negative impact of technology on
              our humanity. It is possible to ‘know so much and yet not understand’ matters of the human heart; to lose one’s sensitivity and compassion.
              Most intriguing for myself, who works in the knowledge industry, is the six poem sequence ‘Against My Ruins’ (pg 74) in which Edgar imagines
              a world without archives. Electronic archives... All that numeric memory was mum.’ He imagines the delivery of the reading rooms ‘To the
              illiterate savage purity / Of wind and sky.’ A kind of futuristic Dark Age followed by the slow restoration of writing. At first ‘pictographic
              scratches’ appear, then the return of scholarship, until ‘Sweet waters in the desert flowed again.’ It is a sequence rendered, unusually
              for Edgar, in free verse and again is almost apocalyptic. It is dedicated to Alberto Manguel, who has both authored A Dictionary of Imaginary
              Places and has been engaged in the restoration of a medieval farmhouse which incorporates space to house his 30,000 volume library. Reassured
              by the purpose of memory, Edgar propels the reader towards a hopeful future in section four. The opening poem ‘Don Juan in Hell’ (pg 81),
              has us looking upon Don Juan as he is ferried across the ‘lower seas,’ the world of the dead, a ‘calm hero’ who does not ‘look or turn’
              to those who are dead and the one steering is ‘a great stone man hollow.’ Perhaps it is such a calm one who can be open to new love, and
              Edgar proceeds to a unique sequence of love poems ‘Alpha and Omega’ (pgs 89-91), capturing for us the breathless surprise with which new
              love arrives bearing gifts of renewed life and purposefulness. In similar cosmic imagery to that employed in part one, he paints the wonder
              of standing ‘alone, / Not waiting, as I thought, my eyes on / The blank, recessional horizon’ only to find ‘Without my noticing, you were
              there / Tapping my shoulder’ so that ‘Everywhere / The day unfolds new shapes and designs.’ Time yields its surprises, ‘a blink ago’ writes
              Edgar, ‘No such patterns were on show. / Where were they hiding in the day?’ ‘Diversionary Tactics’ (pg 107), following on from ‘Permaculture’
              as the last poem in the collection, finds the speaker touring the suburbs, city centre and foreshore of Sydney, observing: ‘Surely, here
              at the heart of things, / Here is the ideal place for the attempt.’ Sydney holds the prospect of the new beginning, already hinted at in
              ‘Permaculture.’ He observes how ‘summer has its way.’ This is the place of Edgar’s childhood and here is the old sameness mingled with the
              new - ‘old ritual’ continues here, he writes, ‘With a new but undeflectable endeavour, / For all that childhood has resigned / Its codes
              and haloed circumstance forever.’ Here too, clouds are no longer described in terms of ‘white dismay’ but rather as a ‘fine smudge’ rising
              ‘in the summer sky.’ Understanding Edgar’s poetry is not always easy going. For those of us less linguistically versatile, reading his work
              will require the presence of a good dictionary. Edgar’s poetry follows the tradition of A.D. Hope and Gwen Harwood with its emphasis on
              classical form, and particularly Hope in the use of myth infused with contemporary relevance. What is therefore required then, for those
              not of the literati, (and maybe for those who are), is the hunting down of relevant keys, whether in a Google search, a dip into a good
              print reference on mythology, or literature, in order to unlock the significance of a poem. And one must also come to this poetry with a
              preparedness to sit with a poem awhile in order to untangle the sometimes convoluted and lengthy sentences he employs (some run to fourteen
              lines). Mostly these are decipherable. Occasionally they are not. I am still puzzling over parts of ‘The Sorcerer’s Apprentice’ (pg 43).
              These strategies for unlocking poems can be an annoyance. Alternatively, they might, if allowed, enrich one’s language and yield the benefits
              of contemplative thought. And are these not also a part of the role of poetry? Edgar is unique in Australian poetry with his pervasive use
              of end rhyme. Only a minority of poems appear in this collection without it, either as blank verse or free verse. Often a rhyming scheme
              is combined with the more contemporary feel of the conversational style, which has the potential to create unsatisfactory tension at the
              end of lines. ‘The Transit of Venus’ (pg 28) is a case in point. Here, the combination of rhyme, indentation and heterometer seems far too
              disruptive of the conversational tone. There are times too when, in an effort to maintain the balance of meaning and sound patterning, sentence
              structure deteriorates into slightly archaic patterns, as happens in the second stanza of’Optical Illusions’ (pg 63). On the other hand,
              the rhyme can work quite unobtrusively as it does in ‘Man on the Moon’ (pg 26), binding it together with repeated sound and adding musicality.
              When I came to Edgar’s Other Summers , I came with a view to keeping ‘in the zone’ of poetry while I settled into a new job taken up after
              the passing of my father. I have come away with a deep sense of pleasure and appreciation for the beauty of patterning in poetry. And I
              am instructed. In ‘Diversionary Tactics,’ the final poem in Other Summers , there is a slight edge of hesitancy and doubt in the speaker’s
              voice. It lingers in the opening words, ‘Surely, here at the heart of things, / Here is the ideal place for the attempt,’ as if only time
              will fully convince. Loss does that to you. Time kicks in with memory and walks along with whatever wishes time also unfolds. The trick
              for contented living is in their reconciliation."
        - title: Critical Survey Review
          text:
              "Other Summers John Lucas Critical Survey , 2007 Stephen Edgar’s poems are unusual and, to me at least, unusually welcome in that they
              bear testimony to the fact that formalism, over which obsequies have so often been pronounced, is alive and well. Edgar positively relishes
              the chance to write in a number of demanding forms, though wary readers will be relieved to know that the sestina, that curse of the creative-writing
              class, makes no appearance. (‘Right, class, it’s sestina time. No pain, no gain.’) There are, however, two villanelles, one of which, ‘Unsunned,’
              while it isn’t very good, is in the manner of its failure, in exalted company: Edgar’s strained rhymes on effluence/rents and quail/ail
              are no worse than Empson’s famously desperate ills/rills, in ‘Missing Dates.’ and at least the Australian poet’s syntax holds steady. Good
              readers will also delight in Edgar’s readiness to make much use of polysyllabic words, thereby thumbing his nose at that silly bit of current
              orthodoxy which insists that each line should be packed with monosyllables - ­this, despite, or perhaps in ignorance of, Pope’s ‘And ten
              low words oft creep in one dull line.’ There’s a down side to this. Edgar has an unwary fondness for such formulations as ‘empowered,’ ‘embowment,’
              ‘empetalled’ and ‘enwraps;’ and he over-uses the word ‘lucid’ (which turns up 4 times), as he does its close neighbour ‘lucent.’ A good
              editor would surely have drawn attention to this, as they would query the bookishness that from time to time sprinkles dust over otherwise
              good poems, as when Edgar speaks of a repeated scene that ‘reinstates but not redeems’ (my italics), or when he imagines someone who ‘contemplates
              his day to the sublime / Inevitabilities of the late Mozart’. And when he refers to ‘the grey encroachments in his thinning hair,’ you think,
              yes, well, Stevens coined the word ‘encroachment’ with an authority that now makes it as unusable as Shakespeare’s ‘multitudinous,’ though
              this is dropped in to what is for the most part a fine poem, ‘Against my Ruins.’ This title comes of course from T.S. Eliot, but then why
              not? Elsewhere there are allusions to or quotations from Shakespeare ( Henry IV, Lear, The Tempest ) , Dante, Cavafy, Wittgenstein, George
              Eliot, Yeats, Pushkin, Baudelaire, Albert Manguel - to whom ‘Against My Ruins’ is dedicated, and others beside, and I think, GOOD. A poet
              who is unembarrassed about his reading and who sees no reason to apologise for it. Other Summers is about as far as you can get from the
              street-wise knowingness of postmodern allusions to whatever happens to happen, every one of them accompanied by a kind of wink-and-a-nudge
              on the grounds that - whatever - it’s all equally valid. No, it isn’t. Reading , for example, the opening of ‘The Immortals’ is to feel
              a serious delight at the lines’ eloquent cadences: A breeze fills up the manna gum’s huge lung, That hologram of bronchioles. It sways there
              Tethered and shifting like a hot-air balloon Preparing for some fresh and doomed attempt To circle the great globe... I don’t know whether
              this is the first time ‘bronchioles’ has appeared in a poem, but I can’t imagine anyone will have used it to better visual and aural effect.
              (Those repeated long os make for a kind of hollow sound that is intrinsic to the phrase’s wit.) There’s a similar delight to be taken from
              the ‘The Time Machine,’ whose intricately- rhymed six-line stanzas allow Edgar to stretch a complex syntax over them, one that rarely threatens
              to snap under pressure. (Though, if I’m to be picky, I must note that to open three out of six successive lines with ‘While’ is going it
              a bit.) For all I know, there may be readers of this review who by now are finding the terms of my praise for Edgar a form of damnation.
              Formalism? Polysyllables? Complex syntax? Aren’t I as good as suggesting that Other Summers is, you know, ‘inaccessible.’ Not long ago I
              read a review in which a poet was taken to task for using words the reviewer hadn’t previously come across. (They included ‘ferrous’ and
              ‘strophic.’) Goodness only knows what he’d make of Edgar’s use of ‘favela’ and ‘pome,’ to choose from a rich variety. If this kind of thing
              bothers you, dear reader, go back to the baby language of those ‘accessible’ poets who fly forgotten as a dream flies at the opening day.
              And good riddance. As Louise Bogan said, ‘The muse is immortal ./ And it isn’t for you.’ Other Summers, a deeply serious collection of poems,
              and one that deserves serious readers, is mostly deeply engaged with memory: personal, social, and cultural. Three different poems, each
              bearing the same title, ‘Im Sommerwind,’ occur at different points during the book’s progress. They are all written in three-line stanzas,
              the last being an adoitly-managed villanelle (aha!), and it occurs to me that Edgar’s use of trimeters may be intended as a slant homage
              to Dante, given that the three poems all use remembered images to evoke the glimpse of a paradisal past, though a sense of menace, of future
              threat, hangs over each of them. And this can also be felt in the poem called ‘Summer,’ where a hospital setting contains, in most senses
              of that word, bodies seen ‘As in a nightmare,’ or, I think, as in a kind of Dantean vision. For there is something spectral, dreamlike,
              about much of the material in Other Summers, a quality which both attends to but tries to distance anguish. Appropriately enough, then,
              probably the finest poems in the collection make up a sequence where such distancing is all-but impossible. ‘Consume My Heart Away’ consists
              of ten poems tracing the course of a love affair from start to finish, and it is prefaced by epigraphs from the Inferno - ‘No greater pain
              / Than to remember happy times / In misery’, and Lawrence Durrell: ‘I saw that pain itself was the only food of memory: for pleasure ends
              in itself.’ I can understand and sympathise with the temptation to pin these epigraphs to the head of the sequence, but I’m not sure it
              shouldn’t have been resisted, as perhaps should the unattributed borrowing from Yeats for the title (which only makes full sense when you
              know the next words of ‘Sailing to Byzantium’: ‘sick with desire’). Between them, title and epigraphs seems as though they want to authenticate
              the pain of the writer, whereas what needs to be authenticated are his poems. Put it slightly differently. Too much bad criticism relies
              on finding poems ‘moving.’ What that nearly always means is that the critic claims vicariously to feel the same pain as the poet claims
              to have felt in writing about lost love, bereavement, other summers. And it won’t do. Randall Jarrell once said of bad ‘sincere’ poems:
              ‘it is as if the writers had sent you their ripped-out arms and legs, with “This is a poem” scrawled on them in lipstick.’ In the past year
              alone I have read any number of such poems, often pressed within the pages of books put out by reputable publishers, each of them crying
              out ‘I was the man - or woman - I suffered, I was there.’ What makes Edgar’s sequence different is that he has written a powerful, achieved
              sequence of poems that are entirely free-standing, so that if I’d heard he’d made the whole thing up it wouldn’t in any way diminish my
              admiration for what he’s done. There’s one exception. ‘Song Without Words’ not only suffers from the knowing allusiveness of its title,
              but from what seems to me a blank at its heart. When the male narrator looks at the woman he loves while, unaware of his presence, she plays
              at the keyboard (a Joni Mitchell number), he thinks that ‘Too self-possessed and too suspicious / To give herself away, / She took back
              what she’d never given / One day.’ The trouble with this is that we’ve had no inkling of either the loved one’s self-possession or her unreadiness
              to give herself away, and have therefore to take it on trust. But why shouldn’t she simply have changed her mind? It’s been known. Or come
              to the decision that she didn’t fancy him as much as he did her? That, too, has been known. It’s a small point, but as the rest of the sequence
              so tactfully and beautifully establishes her presence, both physical and emotional, ‘Song Without Words’ feels like a flattening-out of
              what elsewhere is amply attested precisely because it isn’t treated reductively. Having said this, though, I should at once add that I certainly
              don’t want any caveat to diminish my praise for the overall achievement of ‘Consume My Heart Away,’ which is never less than very good indeed,
              and in the last poem ‘The Transit of Venus’, rises to absolute distinction. That this, the closing poem in the sequence, should be written
              in the Scots ‘flyting’ stanza, is part of the sequence’s accomplishment: its supple, assured strength as poetic art. And to say this is,
              I hope, to provide some measure of the worth of this excellent collection."
        - title: Indigo Review
          text:
              "Other Summers Shane McCauley Indigo : No.1, Winter 2007 Sometimes when sampling a book of poetry, several poems have to be read and
              re-read, tasted, before their tone and quality registers. In Stephen Edgar’s latest collection (his fifth), however, there is no doubt from
              the first poem on, that this is poetry of real aesthetic magnitude. The reader can discern that here is a poet who relishes wielding the
              machinery of verse to direct and to conduct emotive response. Here is the superb final stanza of ‘The Immortals’: The heat is a dimension
              now, like time, And as improbable. The cottage floats, Not quite convinced it’s happening, with its flies And cracked linoleum, its shelves
              of books Unaltered since the war, its bush-rat droppings, The clocklike clicking of the roof - all tethered To the least twitching of her
              dreaming fingers, Her shallow breath. Later, before her friends Descend, she’ll wander barefoot through the rooms In something easy with
              an ice-filled glass And put some music on and watch the sea. The senses of sight and sound cleverly combine to present the essence of skateboarders
              in ‘Proprioception’: Their whole Design to flout The iron rule of balance, as they careen, Curvet and caracole A wheeled mock dressage through,
              between, Among pedestrians. It is such a relief to find a poet who has ignored the trend towards prosaic and poorly crafted minimalism and
              who, instead, has made extensive use of the full panoply of poetry’s forms and techniques. This is poetry rich in metaphor and allusion;
              it is poetry which complements the visual with the vital underpinning of rhythm and unobtrusive rhyme. In fact, Edgar helps to demonstrate
              just what can still be achieved with traditional patterns such as the quatrain: They did not seem to see, Or not at any rate To mind our
              tangent temporality, But with unruffled gait They lifted up and set Back down their graceful feet, With poise unconscious as the etiquette
              Of an age-old elite. Apart from the variety of subject matter - modern science, optical illusions, films of Hitler, the transit of Venus
              - there is a virtuoso display of forms: sonnets, villanelles, free verse and beautifully wrought translations of Baudelaire. Edgar is particularly
              adept at exploring facets of time, season and memory, as suggested in the book’s title. In ‘Im Sommerwind’ he perfectly captures an enervated
              adolescent’s perspective: On a hot listless Sunday afternoon Of adolescence, on the parapet Against the pillar, I look lazily Across the
              park that’s faded less by summer, It seems, than from the day’s inert aversion To the principle of colour. Cycles of presence and absence
              permeate his reflections on the seasons, as in ‘The Sounds of Summer’: The cicadas, as though never here, are gone. A silence that was always
              immanent Slides back. Edgar time-travels back through memory in many poems. In ‘Man on the Moon’, for instance, he is a boy again, watching
              the moon-landing with: The whole class huddled ’round the TV screen. There’s not much chance, then, of forgetting that. He is also a very
              fine poet of love, and such poems are redolent of commemoration and gently bruising regret. Poems about lost or old love can be mawkish
              and embarrassing. Edgar effortlessly avoids the pitfalls and simply records his reflections with controlled dignity: She will not be denied.
              The ghost of her is too much to ignore, More stubborn to remain since she is gone. Enough of ghosts, of those who lived before. I have to
              live. Switch off the radio. This wry bitter-sweetness also filters through Tralee’: Why blame A woman who right from the start I saw could
              not be good for me but still Desired so badly you might well assert That I conspired with you to break my heart. The poem comes to an aching
              close: ‘If you still think we might reach Tralee, the truth is that we cannot start from here.’ This is poetry that most definitely passes
              the ‘Do the hairs rise on the back of your neck?’ test. At the other end of the spectrum, Edgar tackles the hi-tech, fast-paced world of
              Information Technology in his ‘Sonnets in Silicon’. Here, a characteristically lucid form and diction enables him to philosophise on real
              and artificial intelligence: How did that little man with such brief time, Know what he knew about the human heart? And on virtual reality:
              The sun is a child’s drawing, brash and bright Edgar’s range of craft, thought and feeling is immense. Other Summers has to be recommended
              unreservedly."
        - title: Times Literary Supplement Review
          text:
              "Other Summers Oliver Dennis The Times Literary Supplement , 11 May 2007 Stephen Edgar’s previous collection, Lost in the Foreground
              (2003), was one of the most significant achievements in Australian poetry - or, indeed, in poetry anywhere - of recent years. An advance
              on Where the Trees Were (1999) - which, though impressive, suffered throughout from a slight bitterness of tone - it prompted comparisons
              with two of Australia’s foremost formalists, A.D. Hope and Gwen Harwood. Here was a poet, interested for the most part in our essential
              helplessness, who had clearly read widely in the English canon, digested useful lessons there (from, among others, Donne, Shakespeare, Milton,
              Yeats and Auden), and gone on to develop a distinctive lyricism of his own. Most remarkable of all was the sense of tranquillity these poems
              attained: ‘A wind from nowhere just as soon invents / The evening’s empty, lemon-lit reprieve’. Lightness of touch like that was always
              going to be difficult to sustain, and, admittedly, this new book (Edgar’s sixth) has less of it. Whereas Lost in the Foreground achieved
              the objective emotion of which the best poetry is capable, Other Summers doesn’t hide the fact that it has been written under some personal
              imperative, making the impression it leaves seem, overall, a touch more commonplace. For the first time, Edgar has turned consistently to
              aspects of his own life. The volume’s longest sequence, for example, looks in detail at the unravelling of a love affair, but seldom gets
              off the ground: exceptions are ‘The Transit of Venus’ and ‘Man on the Moon’, which reads as well as anything Edgar has done previously:
              The paths that I imagined to have come Together and for good have simply crossed And carried on. And that delirium We found is cold and
              sober now and lost. Elsewhere, more than once, Edgar remembers scenes from childhood summers (‘On a hot, listless Sunday afternoon etc.’)
              and memorializes departed loved ones. One of the chief beauties of this collection is the poignant contrast it makes between sadness and
              a general fascination with warmth and sunlight. It is a measure of Stephen Edgar’s abilities that, even below its best, his work is hardly
              ever less than first-rate. On that basis, Other Summers deserves as wide a readership as possible, particularly if it introduces new readers
              to Lost in the Foreground , still the benchmark of Edgar’s poetry to date."
        - title: Poetry Chicago Review
          text:
              "Other Summers D.H. Tracy Poetry (Chicago), March 2007 Of Australia, David Malouf writes: Its English was not the seventeenth-century
              English of the United States, with its roots in Evangelical dissent and the revolutionary idealism of the Quakers... It was the sober, serviceable
              language fashioned by writers like Addison and Steele and others to purge English of the violent and extreme expression, and political and
              sectarian hostilities, that had led to the Civil War... This was the language Australia inherited. The language of reasonable argument.
              Of balance. Of compromise. Impossible to say whether a given author is subject to such forces, but Australian poet Stephen Edgar has developed
              a quiet, nonvolatile rhetoric of such balance and reason, and has reached such a level of syntactical control in this mode that he can write
              well about, and is at his best writing about, next to nothing: a woman lounging alone in a house on a hot day, some birds walking up the
              beach. Actors in these poems are frustrated from acting by futility, apathy, or anomie, and are thrown back variously onto what they see
              and what they remember, which may bring misery or happiness. The poetry therefore gravitates towards the action of the mind, and fits most
              comfortably into the uncomfortable gap between the senses and sensation: The optic nerve still lives in paradise And hankers to admit Its
              innocent improbabilities. The mind has paid that price And always seems to see through seeing’s wit What was observed by Mephistopheles:
              Why, this is hell, nor am I out of it. ‘Optical Illusions’ Life, especially at its quietest, is a brandy that must be sipped, even if it
              doesn’t taste good. Like Thomas Hardy, Edgar derives considerable impulse from the stanza form, and adapts to it a Latinate syntax that
              artfully defers and paces meaning. He gives image and metaphor limited play, because these devices are liable to run away with a thought
              he has other plans for. The poetry is under high compression, to be sure, and occasionally something leaks out the side: metrical considerations
              lead to a few stiff word choices (like ‘begem,’ ‘conflagrate,’ and ‘empetalled’), all the more evident because the diction is generally
              mellow. Edgar is a bit too angular for his translations of Baudelaire, and an attempt to locate the metaphysics of two laboring porn actors
              topples over into decadence. Though not invulnerable to the rococo dangers of the style, he achieves, overall, a supple classicism that
              earns him a place next to the best twentieth-century American formalists. Nor is he in their image: more exposed than Hecht, more troubled
              than Wilbur, more Horatian than Merrill, he is as capable as all of these poets of weaving out of verse that fine grade of mesh that sifts
              from experience grains of meaning otherwise lost."
        - title: Island Review
          text:
              "Other Summers Janet Upcher Island , No. 107, Summer 2006 A muted contrast to Deane’s work is Stephen Edgar’s latest collection, possibly
              the apex of his poetic oeuvre , surpassing even the achieve­ment of his previous five volumes. Edgar is not known for his exuberance: in
              many ways, he seems of another time, another place - another summer. Perhaps it’s the yearning wistful quality, the nostalgia, which imparts
              such emotional resonance. The haunting nature of his complex images and the crafting of his lines with their musical cadences are exquisitely
              moving. Until now, I’ve often found Edgar’s work to be lacking an emotional depth-charge. The opposite is true here. It is as though he
              has antennae more delicate, more sensitive to experience than the rest of us. He knows how to start a slow fuse which ultimately detonates.
              Coupled with this, he has a mastery of poetic technique and form. Sometimes, though, there’s a danger that the technical ingenuity and constraints
              of a rigid rhyme scheme can overshadow the felt experience: his exacting emphasis on formal excellence occasionally elevates form above
              content. In ‘The Sounds of Summer’, potent and ambivalent images are subsequently diluted through contrived language and constraining rhyme:
              ‘Indoors The Sounds of Summer taints the immense / And daily hours. Lost to its usual crew, / The radio / Can’t bring to bear this stridulant
              pretence.’ This is even more evident in the poem, ‘War and Peace’, where rhyme almost results in bathos: ‘...while a barn / Burns and its
              full bushels bake / Until the air becomes confused / With the aroma of a cake.’ I Such criticisms serve only to heighten the enduring qualities
              of most of this collection in four sections, unified by the three poems entitled ‘Im Sommerwind’, which recur like motifs, as symphonic
              variations on a theme. Behind the entire collection is an aura of mirage, like shadow play where illusion becomes more real than reality.
              Edgar casts a dazzling sensual spell, transporting us to languid days of shimmering heat and half-lights, indolent summers which contain
              within them a heightened awareness of mortality; in the midst of summer ease, there’s a dread, an undercurrent, a ‘smudge ...in the summer
              sky’. This paradox is nowhere more apparent than in the poem ‘Summer’, set in a sterile hospital ward, casting unreality on the summer’s
              day outside. Edgar seems equally at ease with a variety of forms: the villanelle is superbly controlled in ‘Unsunned’ and in the final version
              of ‘Im Sommerwind’; he masters the Italian sonnet, for example, in ‘Promises, Promises’ and again, with a witty, darkly contemporary twist,
              in ‘Sonnets in Silicon’. There is great versatility in his tercets and quatrains, with their variety of metrical effects and half rhymes.
              Possibly the jewel of this collection is the sequence ‘Consume My Heart Away’ - the allusion to a line in Yeats’ ‘Sailing to Byzantium’.
              In this sequence, Edgar explores the many faces of desire, engaging a delightful blend of rationalism, wit and romanticism. It contains
              poems which are celebratory, caustic, self-deprecating, ironic - a brilliantly poignant depiction of male yearning and the rejection of
              unrequited love through a very sharp lens. Throughout the volume, the tensions and complexities create strength and ambiguity: summers are
              frozen in the frame and then dissolved, always with an undercurrent of our ‘tangent temporality’ (‘Stilts’). Fittingly, the collection ends
              on a typical Sydney summer’s day with post-Christmas bargain-shoppers, people strolling in parks, beach­combers and body-boarders and, when
              we least expect it, on the way home: Just down these steps, along where that car turned, The ranks of roses, the grass floor, The notices
              that show The times, even the names of those concerned: ‘Diversionary Tactics’"
        - title: Australian Book Review Review
          text:
              "Clarity and mastery Gregory Kratzmann Australian Book Review, No. 287, December 2006-January 2007 Commendations from celebrities and
              authorities have become a standard feature of cover designs for books of poetry: sometimes one wonders whether the writers have actually
              read what they puff so assiduously. How refreshing it is, then, to find Clive James and August Kleinzahler recommending Stephen Edgar’s
              latest volume so perceptively. Kleinzahler’s phrase ‘voluptuous elegance’ goes to the heart of Edgar’s way with words. James’s comment will
              strike a chord with anyone who takes the time (and time is needed - these are not poems to skim through) to engage with Other Summers :
              ...perhaps the most fascinating aspect of all is that under the enchanted lyricism, the technical intricacy and the dazzling vocabulary
              there is always the bedrock of good, plain, conversational speech. Not surprisingly, the opinions of one poet about the work of another
              surpass or at least precede the evaluations of academic critics. Years ago, Edgar’s close friend Gwen Harwood took me to task for not knowing
              more about Edgar’s work than I did. ‘Read that!’ she said, presenting me with Queuing for the Mudd Club (1985) - ‘ everyone should know
              about Stephen!’ Until recently, Edgar’s poems were not well known, except to other poets. He has not been someone to put himself about at
              literary festivals and readings, at least not outside Hobart, where he lived for thirty years until his recent move to Sydney. Edgar’s seclusion
              may have nurtured his great gifts, but one hopes that soon his work will reach the wide audience it deserves. Like Harwood, he is a wonderful
              reader/interpreter of his own work: that ‘bedrock of good, plain, conversational speech’ was strikingly present in the readings he gave
              at this year’s Mildura Writers’ Festival, where he was awarded the Philip Hodgins Memorial Medal. The language of the poems in Other Summers
              is striking in its range, from colloquial plainness (as in ‘English as a Foreign Language’), as the speaker tells of teaching his lover
              to say ‘‘I love you’ in Russian’: A lover’s commonplace avowal, But rather difficult to sound In Russian; it can be a trial To get your
              tongue around. But she repeated those words over And over till she had them pat. In English, though - well, she could never Quite manage
              to say that. Only an exhibitionist or an artist firmly confident of both his medium and audience would dare to use words such as ‘proprioception’,
              ‘anfractious’, ‘embowment’ and ‘stridulent’. But Edgar is no exhibitionist. The movements into the register of such polysyllabic arcane
              diction have the effect of jolting the reader into thought, making us ponder the strange materiality of these words in their poetic contexts.
              How many of us have forgotten the peculiar delight of encountering a new and strange word, going to the dictionary to check its meaning
              and etymology, and then committing it (or not) to memory? Such language is sparingly and economically invoked; many of the poems reflect
              their creator’s erudition, but the effect is never intimidating, because of the seductiveness of the voice and the sheer power of Edgar’s
              vision. ‘Proprioception’, which introduces the second of the volume’s four sequences, is a case in point. The word is used only for the
              title, but knowing what it means adds a dimension to the poem’s layered meditation on the subjectivities of balance. It moves from an exquisitely
              precise and witty picturing of ‘kids on skateboards’ as they careen, Curvet and caracole A wheeled mock dressage through, between, Among
              pedestrians and keep their hold - Or sprawl in a four-letter wreck and roll, to the self-abandoning moment of rapture when the speaker looks
              up to experience the aerodynamic mystery of a wheeling crane, and thence downward and inward, to his reflection on the dynamics of grief
              and loss: ‘Still at the empty table you make space / For where she sat and tread the kitchen’s bounds / As though two wrote that choreography...’
              This elegiac voice is the dominant one in Other Summers . Characteristically, the sense of a striving for detachment is heightened by the
              use of the second person, where we might have expected ‘I’. It is difficult to be certain, sometimes, whether those ghostly presences, which
              are more real to their creator than his sense of self-identity, are actually or figuratively dead to him. Does it matter? That the reader
              wishes to know something that is withheld is testimony to the way these poems embody the absent lover, whether through the loving observation
              of the known body in ‘The Immortals’, Look, on her hand’s back are the clues to grief, Whatever she may think - those patches like The remnants
              of a suntan, veins as blue As any sky could wish... or the finely tuned eroticism of ‘The Kiss’: And that first night you slid the purple
              shift Over her shoulders and Peeled gently downwards, leaving her to stand In Aphrodite’s gift, And sinking with her garment to the floor,
              Made moist the shining fold you knelt before. This is one of a suite of ten poems called ‘Consume My Heart Away’; at a first reading, I
              did not appreciate the intricate patterns of theme and image which run through the whole. The human inhabitants of this summerworld sometimes
              appear almost incidentally, as in ‘The Sounds of Summer’, which begins with a bravura piece of synaesthetic description. This way of embodying
              the natural world in all its sensuous particularity seems to owe something to Harwood’s exploration of the language of nature in ‘Carnal
              Knowledge’ and in her late Pastorals . Edgar’s work shows a Romantic fascination with colour, shade and light, and with the challenge of
              recreating them through language. I almost missed the moving tribute to Harwood, in ‘Living Colour’ (‘Just as the poet said she’d thought
              her home, / The blessed city, till she was born to bless it...’). This remarkable poem explores the idea of colour as a way of lifting fascism
              out of a monochrome past into the technicolour present, where its power is seen in all its sinister immediacy. This is some of the finest
              lyric poetry to have been written anywhere in recent times. Through sound and structure, Edgar’s work reflects lessons learnt from music
              as well as from poetry: there are echoes of a range of singing masters, from Dante to Donne, from Larkin to Hope and Harwood. Perhaps the
              first thing which strikes the reader is his sheer delight in form, structure and rhyme. Old-fashioned? Surely not, for in most of these
              poems form exists in delicate equipoise with a passionate and highly individual vision of the world. The range of this vision is impressively
              wide, from the elegies for lost lovers to gentle tributes to parents, from political and social satire to gazes into the realm of nightmare.
              The poems from ‘The Labyrinth’ invert the experience of quotidian space and time, re-seeing the familiar and the known as though from another
              dimension, envisaging the horror of disintegration. Here, as elsewhere in this volume, the irruption of an arcane word into the line of
              plain speech jolts the reader’s sense of security in the reading process, drawing him into the experience of the speaker: An empty flask,
              a ragged coat laid by, A notebook or a mobile telephone. At some point all apparently surrendered To the anfractuous fallacy and turned
              Leftwards or right to seek the fabled zone... Stephen Edgar’s writing is analogous to the activity of the photographer in ‘Photography for
              Beginners’: both have the ability to fix and freeze the apparently ordinary moment, to subject it to a gaze which renders it strange, and
              so impels the viewer/reader to ponder the contingency and fragility of the very act of recording. The difference, of course, lies in the
              humane clarity of the poet’s vision, and in his mastery of an art of multiple perspective."
        - title: Wet Ink Review
          text:
              "Other Summers Stephen Lawrence Wet Ink , Issue 5, Summer 2006 Those of us who thought that Stephen Edgar had already reached a kind
              of perfection must now face the daunting possibility that he is only just getting into his stride. Despite his execrable self-promotion
              at 2004 Writers’ Week, I’d be happy for Clive James to provide the cover hyperbole for my next book. Yes, Edgar’s poetry is perfect stuff.
              ‘The sound of summer’ sways the reader along at its own careful pace. And ‘Living colour’ is astonishing from beginning to end: Try the
              opening lines of the collection: A breeze fills up the manna gum’s huge lung, That hologram of bronchioles. It sways there Tethered and
              shifting like a hot-air balloon Preparing for some fresh and doomed attempt To circle the great globe. ‘The Immortals’ But where to from
              there? When your start is as good as it gets, one of the only options left is to disappear into the empyrean. And a number of Edgar’s poems
              conclude by vanishing into ‘the swept sky’: ‘The sky makes history in the clouds’ (‘Pictures of love’). The poet’s eye ‘Watches the fine
              smudge rise in the summer sky’ (‘Diversionary tactics’), and the architecture of the firmament - clouds, rain, wind - are regularly and
              intensely observed: Buildings ail And fade behind the fog’s immantlements This whiter deadlight in the day’s white veil... ‘Unsunned’ When
              it comes to the human landscape, Edgar is less convincing. There are many surges at eroticism - and he creeps up on it, or tries to build
              furnace heat in the course of a full poem - but the outcome is ultimately wintry and passive: ‘frauds, / A cold waxwork attraction / Shown
              at Madame Tussaud’s’ (‘Pictures of love’). His affinity with form estranges him from the heat of engagement (The kiss’), and he seems more
              comfortable peering through distancing frames of windows, dreams, mirrors and camera lenses. A certain anatomical repellence also stifles
              his passions. Feeling both ‘love and disgust’ at women’s ‘plumbing,’ his impeccable style wilts and purple rhetoric emerges: ‘The primal
              tissue of desire... expectant bliss... sleeping heroine / Lies deeply bedded’ (‘Look at you now’). (For the sake of his idiom, he should
              avoid ladies’ underwear aisles: ‘swimwear, lingerie that sings / The body and its moistening promises’ (‘Diversionary tactics’).) Edgar
              is aware of his words’ multiple effect, but irony and light mockery serve only to distance the reader further and highlight his confliction:
              ‘Candour and lewdness mated in one guise’ (The jewels’). There is also a moral/artistic reason for the muffled sexuality presented in Other
              Summers . He quotes Lawrence Durrell in his bust-up sequence ‘Consume my heart away’: ‘I saw that pain itself was the only food of memory:
              for pleasure ends in itself’. All the more worth recording, I would have thought. There are enough moments when form and emotion masterfully
              converge: One leaf slides past her skirt, that hand, and where It passes, like a drop of water loosed On paint, dissolves all colour. ‘Im
              Sommerwind’ This and other exquisite, meditative images are plentiful and beautiful enough to aver that Stephen Edgar’s new collection is
              a splendid poetic achievement."
        - title: Radio National Review
          text:
              "Other Summers Geoff Page Radio National’s The Book Show , 26 September 2006 Out of Herr Feierabend’s private vault A stock of long
              lost film has finally come To light, from that last summer before the War - In colour too, As bright and vivid as delirium. It seems a kind
              of fault In history and nature to restore This Munich, underneath the flawless blue Of mid-July in nineteen thirty-nine, This pageantry
              of party-coloured kitsch. The Fuehrer, with his bored assessing gaze, And his gang, all braid And frogging, leather-bound and medal-rich,
              Sit large as life, benign As the broad daylight, to accept like praise The weather and the crowd and the parade. Why should this hit me
              like a culture shock? Just as the poet said she’d thought her home, The blessed city, till she was born to bless it, Had not known colour,
              But lingered in prenatal monochrome, So is the Nazis’ stock Portrayal, when the mind turns to address it, All black and white, the greys
              of death and dolour. The goose-step chorus line kicking at nothing, With heads ricked to one side, where he looks on, Torch-haunted rallies
              conjuring the tribe, The pavements lined With adoration’s awful unison; And the corpses piled like clothing, Those gates that Dante thought
              to superscribe Long since: all drained of colour in the mind. But here in garish dress coat Goering draws His decorations up to execute
              Some greeting; there’s Streicher smiling in the lens Flushed and appalling; And Hitler’s there, giving his strange salute, That stop sign
              to applause Which calls up more. And as the arm unbends, We see his pink cold fingers curl in falling. Now past they flow, the floats and
              staged effects, The gilded eagles, banners, fancy dress, Teutonic warriors and virgins with Blond streaming hair (Who seem to tempt the
              heart to acquiesce In what judgement rejects), Like something spawned by Metro-Goldwyn-Mayer, A figment spun from myth Alive and beating
              in the gas-blue air. ‘Living Colour’ That poem, ‘Living Colour’, is one of the most memorable in Stephen Edgar’s new collection, Other Summers
              . It has many of his trademarks but not all of them. We have the elaborate rhyme scheme, not always apparent at first glance ( abcdbacd
              , to be exact). We have the elaborate description, partly generated by the rhyme scheme. We also have some striking visuals, such as ‘prenatal
              monochrome’ and ‘party-coloured kitsch’, - but this time the scene is far less innocent than the gently descriptive pieces that open and
              close the book. In ‘Living Colour’ we are in what the Germans thought of at the time as ‘Hitler weather’, ‘the flawless blue / of mid-July
              in nineteen thirty-nine.’ Having watched newsreels from this period many times, we tend to view it as Edgar describes it: ‘All black and
              white, the greys of death and dolour’. That, however, is not how the Nazi enthusiasts were experiencing it at the time. After the humiliation
              of the Versailles treaty and the hyper-inflation of 1920s, they were infatuated with ‘The gilded eagles, banners, fancy dress, / Teutonic
              warriors and virgins with / Blond streaming hair...’ Unlike us, with our later knowledge, they were unaware (or chose to be unaware) of
              ‘the corpses piled like clothing’ and ‘the gas-blue air’ that waited in the near future. Now, with his sixth book, Stephen Edgar has emerged
              as one of the most accomplished Australian poets of his generation. To judge from the imprimaturs on the back of Other Summers , he also
              has considerable support in the UK and the US as well. His work is now good enough to start forcing one to comparisons which may or may
              not be unfair. In his love for widely-varied stanza forms (and the tone in some of his love poetry) Edgar reminds one of John Donne. In
              his leisurely, closely-rhymed-and-metred considerations of modern life he prompts comparison with Philip Larkin. With his erudition, his
              love of the pentameter - and his familiarity with classical myth etc, he suggests A.D. Hope. These are heady names to play with but it's
              a reflection of Edgar's skill that one feels compelled to raise them. And defer them perhaps. Better to look at the way Edgar’s poems actually
              work - and perhaps the pluses and minuses of rhyme as used in the vast majority of poems here. There has been something of a return to rhyme
              in Australian poetry in the past decade or two and Stephen Edgar, along with Peter Kocan, Jamie Grant and the late Philip Hodgins, has been
              at its forefront. As used by Edgar, the elaborate rhyme schemes (demonstrated in ‘Living Colour’, for instance) tend to slow the pace, encourage
              imaginative elaboration of material, set up a complex music throughout - and, quite often, hold the reader at a certain distance. Sometimes
              the emotions dealt with by the poet were felt, we suspect, quite viscerally - but with the rhyme and complicated stanza forms being so important,
              the impact of these emotions on the reader can sometimes be muted. This is not a problem where the material, as in ‘Living Colours’, is
              inherently emotional. Nor is it a problem with Edgar’s fine collection of love poems in the sequence called ‘Consume My Heart Away’. These
              are pretty much as good as anything in the 800 year-old history of love poetry in English. They are beautifully poised, extraordinarily
              well-crafted and yet able to suggest the intensity of the human being who enjoyed and endured the experiences. A couple of stanzas from
              ‘Another Country’ might help to give the flavour: She said she loved being a woman. Her skin pressed mine, my face her hair. And I a man?
              Just being human Can sometimes be too much to bear: The hands remember what they held, The tongue recalls the salt-sweet skin. Who was it
              said that ‘her hair smelled Like a country I could be happy in?’ Something of these same qualities emerges in ‘Pictures of Love’, another
              love sequence towards the end of the book. As might be expected from someone who uses rhyme and metre so fluently, there is a considerable
              elegaic flavour to Edgar’s book. Even the love poems deal with the ‘ghost’ of the lover, as it were. Many other poems deal with lost moments
              in time - in childhood or in earlier relationships, including those with his parents, it would seem, as in the poems ‘The Shadowboard’ and
              ‘Im Sommerwind’ (version 3 - there are three poems in the book with this title). The elegaic mood is the one which suits Edgar best. There
              are certainly moments of humour, irony and social satire, e.g. in ‘Permaculture’, but they don’t last long. More typically, the irony is
              subsumed within the descriptive process, adding to the overall tone and, in effect, holding the reader a little further off. A good sense
              of this can be felt perhaps in the first stanza of ‘The Sounds of Summer’: The cicadas, as though never here, are gone. A silence that was
              always immanent Slides back. The wide bay Aches with heat. Remote yachts balance on This fashioning of motion which the water, Insensible
              as yesterday, Makes of its swashy foibles while, remoter, A sheen rides mantled on its vanishment. That last line is particularly typical
              of Edgar: a perfect iambic pentameter; an unusual word, ‘vanishment’, to rhyme with another unusual word, ‘immanent’ - and an almost-polished
              visual effect, as suggested by the word ‘sheen’. One feels too how the rhyme scheme ( abcadcdb ) contributed to the elaboration of the whole
              stanza, without quite forcing the poet to say anything he didn't really want to say - even though, at one level, Edgar seems to be talking
              about not much more than that the cicadas have gone and the boats are out on sunlit water. So, to return to those earlier comparisons with
              Donne, Larkin and Hope. Maybe it’s a bit early to be making them. Certainly there is something of Donne’s metaphysical playfulness in Edgar’s
              work, his love of elaboration almost for its own sake. Edgar’s social and spiritual vision is not nearly as bleak as Larkin’s but certainly
              sad-enough and well-made-enough to remind you of it. As for the Hope comparison, it may be sufficient to say that Edgar is probably the
              first Australian poet since Hope to get from the iambic pentameter the sonorous authority Hope always achieved in his best poems, the sense
              that we need not be hurried here and that poets should employ the full range of their learning and vocabulary - not sell themselves or their
              readers short. For those who like their poetry well-metred and well-rhymed Other Summers is an essential book. So is it too, however, for
              those who argue that rhyme has no place in modern poetry. They need to see how eloquently they have lost the argument."
history-of-the-day:
    title: History of the Day
    author: Stephen Edgar
    short_description:
        Stephen Edgar is acknowledged as one of the most elegant and technically astonishing poets currently writing. The poems in
        History of the Day
    long_description:
        "At that old station on North Head Inmates still tread the boards, Or something does; equipment there records The voices in
        the dormitories and wards, Although it’s years abandoned. Undeleted, What happened is embedded and repeated... Stephen Edgar is acknowledged
        as one of the most elegant and technically astonishing poets currently writing. The poems in History of the Day have an imaginative reach,
        a grandeur and sweep which lead us through the transfiguring intensities of love to the burdens of loss, grief and horror. They contemplate
        the fragile nature of consciousness when measured against the immensities of time and space. He engages language at the highest, most sophisticated
        level. Edgar makes crystalline forms and patterns out of language so that every word glows, catches the light, and illuminates his vision.
        History of the Day is, quite simply, brilliant. Some of the finest lyric poetry to have been written anywhere in recent times. Gregory Kratzmann,
        Australian Book Review Winner of the William Baylebridge Memorial Prize for 2009 Cover image: Helen Wright 2:00 (Doorway I) 2005"
    price: 24.95
    isbn: "9781876044626"
    release_date: "2009"
    page_count: 109
    reviews:
        - title: Australian Literary Review
          text:
              "Tools of the Trade: History of the Day Geoff Page Australian Literary Review, 5 May 2010 Sydney poet Stephen Edgar is another who employs
              traditional forms. Indeed, in recent years he has established himself internationally as one of the most expert contemporary users of metre
              and rhyme in the language. His seventh collection, History of the Day, has many poems that, like Petsinis’s [My Father's Tools], are satisfying
              aesthetically while emotionally affecting. Edgar’s characteristic stance is standing back and considering his material, sifting it for its
              artistic potential while being aware of its humanity or its implications for humanity. In parts I and III of History of the Day there are
              several deeply felt poems, most notably the poet’s memory of Gwen Harwood in ‘Nocturnal’, as well as 2:00 where the poet is visited by the
              ghost of a former lover. Edgar demonstrates again here that one of the eternal strengths of traditional form is felt at the end of a poem
              where metre and rhyme combine to give a strong sense of inevitability. It’s as if any other way of rendering these particular feelings is
              unthinkable. Even more rewarding, however, is Part II. It is here that Edgar’s emotions are most nakedly engaged and here, too, where he
              is game to risk the political. ‘Divine Rights’, for instance, is as powerful a pacifist poem as one could hope for, and far more imaginative
              than most. ‘The Swallows of Baghdad’ is no less so. Even more horrifyingly memorable than these two fine poems is Edgar’s sequence, ‘Those
              Hours Which Grew to Be Years’, based on a recent exhibition of photographs of American lynchings. In ‘Memorial’, drawn from a photograph
              of the public murder of Rubin Stacy in 1935, Edgar presents us not only with an ekphrastic description of the photo (or parts of it) but
              with some of its more appalling implications: And then you see her. At the left she stands, Behind the awful focus of suspense, Her hands
              crossed, mimicking his handcuffed hands, On her frocked crotch, her naked face intense And lit up with a half-embarrassed leer, A girl of
              twelve, maybe, too unaware To mask her downward grin... In a poem such as this all Edgar’s technical skills are at the service of something
              greater than themselves. We are moved to a depth we almost certainly wouldn’t be by more informal verse. As My Father’s Tools and History
              of the Day demonstrate in their different ways, the resources of metre and rhyme are no less viable in the modern age than is the present
              orthodoxy of free verse."
        - title: mascara lit Review
          text:
              "Form and Fashion in Stephen Edgar’s Verse: History Of The Day Michelle Cahill (editor) Mascara Literary Review - Issue 6, November
              2009 History of the Day is Stephen Edgar’s seventh collection. Acclaimed for his formal virtuosity, the painterly style of his images, and
              an objective, pondering engagement with his themes, his work stems from the modernist tradition for which temporal, aesthetic and moral
              categories are ordered into a wholeness: that which Stevens refers to as a ‘blessed rage for order,’ and Adam Kirsch describes as ‘its unequivocally
              positive character.’ But how relevant is Edgar’s quiet insistence on aesthetic and ethical authenticity in the discursive climate of postmodernity?
              His formal music might seem to be mannered, anachronistic, or elitist even, in its positioned detachment from the real. Reading History
              of the Day might seem a foreign experience, rather like learning a new language, Edgar’s work being labyrinthine and at times recondite.
              His polished cognizance, his formally oblique and elaborate praise of things ordinary defies a trend in contemporary poetics. Seemingly
              removed from the lineage of Rimbaud, Lowell, Plath or indeed Adamson, his poetry is, if challenging, deeply satisfying for its clarity,
              its faithfulness to measured forms of language and thought. History of The Day is a collection of modesty and harmony. An outward sign of
              its grace is reflected in the book’s structure. Each of three sections are inspired by the epigraph taken from Lawrence Durrell’s Balthazar
              so that we move from poems which encounter the intimately personal, to the those of historical irony and philosophical inflection, followed
              by the last sequence, a miscellany, in which poems are addressed to other poets. Edgar’s acknowledged influences include W.H. Auden, Richard
              Wilbur, Anthony Hecht, as well as the Australian poets Gwen Harwood and Peter Porter, among others. His sensibilities are refined, at times
              overwrought; his preoccupations are with the relativity of time, space, destiny and history. A poem such as ‘Space’ is a fine illustration
              of Edgar’s themes and style. Here, he takes a single image of a Treasury flag flapping in the breeze as an instance of the physicality of
              space as it exists in the mind’s eye. The images are visceral. They emphasise a perspective in which the flag is central: the way it ‘writhes’
              against the ‘muscled’ breeze, the ‘distortions’ of matter within ‘a moment’s frame’. The tangential observer, aware of time elapsing, journeys
              on towards the ‘day’s blue, contested edges.’ Broken into stanzas the poem derives its form from the Italian or Petrachan sonnet, with some
              license exercised to the rhyme scheme in the octave. The beguiling simplicity of its subject, the elasticity of its iambic metre, and its
              refined contemplation are hallmarks of Edgar’s most impressive lyrics. It’s a poem that reconciles image, form and thought effortlessly,
              turning adroitly from minimalism to perceptual complexity. Space-time distortions are a principal concern for the poet. In many of the poems
              Edgar takes a phenomenological interest in experience and how it is structured consciously. His attention to the detail of these processes
              enables him to amplify scenes, embellish their dimensions and surfaces, so that time is almost warped, slowed down to the shimmering speed
              of thought. We hear this echoed in the marvellously speculative poem ‘Dreaming At The Speed Of Light’: And every thought would undergo This
              rallentando, every word Would grind down to a halt Midsyllable, interminably heard, But charged with full intention even so, And purity
              of tone, Quantum ironies resound within the poem’s weave of internal assonance and simple rhymes. Such poems exemplify the liberating and
              quirky possibilities of Edgar’s formal music. The situations and figures are often more emblematic than realistic, creating the mildly disturbing
              effect of defamiliarisation, so that we are excluded from the engendering of illusion. The subject matter, however benign, is nuanced with
              a disenchantment that falls short of defeat. This kind of alienation is modernist in its impulse. There is an almost Brechtian distancing
              effect which along with the historical referencing of many of the poems, imbues them with complex ironies. In ‘Out of the Picture’ Edgar
              dramatises the dual perspective of an Impressionist painting. On the one hand is the ‘unnoticed, unmissed’ feminine figure who ‘saunters
              between/The poplars’ out of the picture towards a forgotten ending. The last stanza suggests an alternate perspective of the painting’s
              observer, for whom it is As pointless to depart as to delay: In either course is folded the same space. In Istanbul next year or here today:
              The attention given to the placement of figures, and to the spectator perspective with its minimalist interaction emphasises divisions between
              the viewer’s world and the picture space or the scene depicted, whether it be through a photograph of lynching as in the powerful evocation’
              Those Hours Which Grew To Be Years’, through a dream, as in ‘Dream Works’ or through a camera lens, as in ‘The Swallows Of Baghdad.’ As
              a war poem, one could argue that ‘The Swallows Of Baghdad’ pursues its ethical argument tentatively, leaning towards a tactful, aestheticised
              vision of war’s brutality. The swallows with their ‘flickering wings,’ who dart through a ‘ruined roof/To perch on dreadful engines,’ are
              twice removed from the observer, being reminiscent of ‘a scene from Attenborough.’ Edgar’s instincts are always on the side of aesthetics,
              though one feels the tension between this principle and what is being represented. Moreover the poem attempts to eschew complacency in its
              ending lines: A camera reeling in that chamber follows Their lit flight, where—too recently to show— The cameras turned to darkness for
              their proof. The framing of scenes and narratives is one aspect of the poet’s architectonic finesse but it’s also a lens through which history
              and memory can be purposeful; intensifying and correcting time. This is beautifully realised in the book’s opening poem ‘Golden Coast,’
              in which natures’s ravages are compared to those of love. Edgar’s diction juxtaposes the idyllic with the hideous, as overdeveloped skyscrapers
              ‘make their mark,/Their ulceration of the golden coast/ whose beauties they would sell, Under the settling sediment of dark.’ Metaphysical
              in its dialectic and reminiscent of Herbert or Donne, the poem illuminates how memory operates within a dimension that transcends time.
              The idyllic moment of love’s intensity is preserved : This day unknown to time will be there when The light drifts through the shallows
              like a ghost And dies of hours, the skies And earth fall down and chaos comes again. How many contemporary poets would dare voice such painterly
              abstractions, such affirmation? A reader who might resist a title such as ‘Golden Coast,’ is convinced by the thoughtful accuracy of Edgar’s
              diction, which describes how ‘lights as laggardly as sound/Struggle to make the passage of the gloom.’ Like a Hopper painting, many of the
              poems play with a symbolic use of light and shade, and the careful placement of figures within a given scene. This attention to topographies
              and symmetry is distinctly metaphysical, an ordering principle pleasingly realised in ‘The Earrings.’ The central conceit of a deceased
              lover’s earrings, gifted to a living spouse, play on the spherical as a symbol of nuptial unity, destiny, and the amatory universe. With
              adroitness the poet is able to reconcile loss with recovery, the ironic with the ardent, to unify All of the properties, The pain, Pleasures,
              desires, memories That nothing will appease, Nothing detain, Chronological time does not correspond to memory, dream or to lived experience
              as the portals between past and present are traversed in language. Mystical encounters are celebrated: the dead speak, a doppelgänger contradicts
              himself, entering not a boardroom, but a museum ‘of lost antiquities,’ the ‘mortared ghost of locomotion surges’ in the sculptural form
              of a train. In the poem ‘Nocturnal,’ Edgar’s prosody echoes a Keatsian ode in its iambic rhetoric: Who ever thought they would not hear
              the dead? Who ever thought that they could quarantine Those who are not, who once had been? The reader is moved and surprised by the poet’s
              wit. The discrepancy between the recorded and real voice of the poet’s deceased partner is metonymic of the breach between memory and presence,
              an impasse into which the poem enters. History of The Day is a book of Escheresque passages rendered by the effects of recollection, repetition
              and doubling: The past is ‘Undeleted,’ Edgar writes, ‘What happened is embedded and repeated.’ Speculative, ekphrastic or historical, the
              poems duplicate and tease semantic possibilities which we encounter in poems like ‘Parallel Worlds’ or ‘Interior With Interiors.’ This latter
              poem, inspired by a Ramon Casas painting depicts a scene where a woman and man are mutually abandoned to each other: she ‘self-absorbed’;
              he perhaps dreaming of bliss, a ‘total consummation’ from which he might soon enough be dissatisfied, ‘wishing to be elsewhere.’ The artefacts
              of realism: coffee pot, milk jug and vase become little more than props, or ‘servants liveried to be ignored,’ as the text, painting or
              poem opens to the world of boundless interiors. With idiosyncratic flair, Edgar probes the inner milieu. Yet a stronger dialectic between
              the individual and history than we have come to expect from him is voiced in this collection. The extrajudicial mob violence of white American
              supremacy is powerfully depicted in ‘Those Hours Which Grew To Be Years.’ Here Edgar critiques the historical lens in his appalled response
              to photographs of Frank Embree’s and Rubin Stacey’s lynchings. The naked Embree is ‘stripped/And scored with the judicial script/Of whips,’
              but the poem returns a Christ-like dignity to his ‘composed face.’ Here, at his most outraged, Edgar turns poetic style to indictment. He
              scrambles the metres. Rarely do we see him mix the insistent accents of dactyl with the iambic and anapaest in his prosody: Take him away
              Airbrush him out, And all these men who stand about In the clean light of day, In another poem from the sequence, a young white girl’s voyeurism
              is depicted with uncharacteristic and intended vulgarity: Her hands crossed, mimicking his handcuffed hands, On her frocked crotch, her
              naked face intense And lit up with a half-embarrassed leer, These are poems in which the observer’s perspective, regardless of his nationality,
              class or race exceeds that of witness. Edgar brings into focus the crisis between the social juggernauts of supremacy and a humanist conscience.
              Whatever subject his poems address, no matter how grand or horrific, Stephen Edgar elegantly affirms an objective displacement, sometimes
              theatrical or emblematic, as moments of recollection, history, art and culture are revisited and referenced. This self-imposed distance
              renders him faithful to his aesthetic and ethical ideals. Repeatedly, in History Of The Day, what is beautiful is sustained by loss, to
              become the property of memory. The ravages of history are, at least partially, restored to dignity. Here is a work which dares, in a postmodern,
              Microsoft era, to entertain serious aesthetic contemplations. The speaker encounters notions of reality that are fragile, provisional and
              constructed within the infinite domains of space-time as he attempts to order Dimensions at the heart of matter, Immensities wound up, that
              mind Cannot conceive? Notes: Adam Kirsch, The Modern Element, WW Norton, New York, 2008, pg. 10"
        - title: Australian Book Review
          text:
              "Formal Music - History of the Day Paul Hetherington (poet) Australian Book Review, 20 June 2009 History of the Day is Stephen Edgar’s
              seventh poetry collection. His first was Queuing for the Mudd Club in 1985, and over the last twenty-four years he has been publishing poetry
              with a strikingly individual formal music. This latest volume further refines his superbly measured control of rhythm and cadence. There
              is nothing else like it in contemporary Australian poetry. Edgar’s poetry has always explored a wide variety of subjects, exhibiting a questing,
              cerebral and sometimes troubled sensibility. History of the Day confirms his interest in human history (and human injustice and cruelty),
              art and culture, and the possibility of certain kinds of illumination. Notwithstanding Edgar’s complex preoccupations, his poems - many
              are part narrative, part rumination - move with steadiness and grace. It is as if his measured works, his subtly judicious explorations
              of poetic form, are a counter-statement to the world’s imperfections; or as if the poet, through the overtly constructed framework of his
              poetry, is reminding the reader that he is a maker who has a responsibility to shape the language he works in. To get the best out of his
              poems, one needs to pay particular attention to their stories and measures; get to know their sometimes reserved poetic voice, and follow
              their intricate and original patterns of thought. The formality of Edgar’s writing in History of the Day occasionally creates a sense that
              particular poems are primarily concerned with their own aesthetic and literary considerations. This is especially true of the more filmic
              and painterly works, such as ‘Out of the Picture’: ‘And so, as in some formal wooded scene / By an Impressionist, / The lady with the tilted
              parasol / And gravel-kissing hem saunters between / The poplars.’ Here, human figures and their situations are emblematic rather than realistic,
              and there is a nuanced distance, like a shimmer, between reader and poetic effect. However, in Edgar’s last two books - Other Summers (2006)
              and this one - his poetry has also ventured into the territory of direct personal utterance. Such poetry has an important place in the English-language
              poetic tradition, but, generally speaking, Edgar has previously eschewed the form, even in earlier poems about personal and family matters.
              History of the Day begins with poems about intimacy and moves quickly to poems about loss (in some cases these are the same poem). Edgar’s
              poetic voice is direct and polished, and these poems signal the volume’s significant preoccupation with the intersection of past and present.
              ‘The Earrings’ is a prime example. It shows off Edgar’s virtuosic technique - with alternating lines of iambic trimeter, monometer, tetrameter,
              trimeter and dimeter - while exhibiting an attractive simplicity in its diction and achieving a relaxed sense of movement throughout. Earrings,
              having been put aside after their original wearer passed away, were ‘long lost inside / The void / Of an old jewel box, denied / Adorning:
              to be eyed, / To be enjoyed’. They are given new meaning by being given to and worn by another, and the poet observes how ‘mended spheres
              accrue, / Blend and combine’. Such writing, with its punning attention to language, has a strongly metaphysical dimension. There are two
              poems in the volume’s opening section in which the speaker is visited by a ghost from the past. In one, simply entitled ‘2:00’, the poet
              suffers the ethereal visitation of a former intimate: ‘And so I woke up at the painted hour / And turned and found you there.’ In ‘Nocturnal’,
              the poet accidentally rediscovers a cassette recording of the poet Gwen Harwood years after her death. This leads him to consider how, ‘Here
              in the dark / I listen, tensing in distress, to each / Uncertain fragment of your speech’. In the carefully wrought context of this poem,
              such plain speaking is compelling and poignant. Following on from these poems, the volume repeatedly invokes notions of afterlife, dream-life,
              fantasy and alternative reality - even the idea of a mysterious double life. Multiple poetic doorways are provided to the myriad places
              of the unconscious or creative mind. As one reads, a great deal becomes insubstantial or evanesces, or is shown to be in flux. Much of significance
              is elusive; much that matters belongs to the imagination or to the past. The passing of time is one of the main preoccupations of this volume.
              In ‘Those Hours Which Grew to Be Years’, Edgar meditates on photographs of African Americans lynched in the United States in the late nineteenth
              and early twentieth centuries. His involved detachment is employed to good effect as these poems search after the eerie stillness of the
              photographic scenes they refer to: ‘In the still transfiguration of sunshine / That whites out almost all one leg and arm / Until they merge
              into the slender pine / He’s hanging from with an inhuman calm’ (‘Memorial’). Edgar’s control enables him to powerfully question what the
              documentary record or, for that matter, what art can really say about human injustice and cruelty. The poems demonstrate a great delicacy
              of utterance, a subtle tonal control and intricate, almost woven textures. They illuminate through extending the possibilities of language
              and through a clear-eyed scrutiny of human experience. [Author’s note: In “Nocturnal”, although Gwen Harwood is referred to, she is not
              in fact the subject of the poem and it is not her voice on the cassette.]"
eldershaw:
    title: Eldershaw
    author: Stephen Edgar
    short_description:
        A children’s game in an overgrown garden is the first hint of a troubling presence in the old house ‘Eldershaw’. But is the
        haunting a memory of the past inscribed in the stonework or a discord the occupants have brought with them?
    long_description:
        Then he went through her bits of jewellery, Such as the girls had left, her purse, her perfumes, Her make-up bag, in which
        among the tweezers, Lipsticks, eye pencils, creams, one folded tissue Presented to his gaze the perfect form Of her pursed lips in pink, on
        which, he knew, A few forensic cells of her still clung... A children’s game in an overgrown garden is the first hint of a troubling presence
        in the old house ‘Eldershaw’. But is the haunting a memory of the past inscribed in the stonework or a discord the occupants have brought
        with them? At the heart of Stephen Edgar’s compelling new collection are three interlinked narrative poems ranging forwards and backwards
        in time from the Second World War to the present day. Drawing on personal experience, reimagined and transformed through the lens of fiction,
        they enact those charged episodes which shape and scar the lives of several characters. From the dim rooms of ‘Eldershaw’, to the recollected
        infernos of war, to the uncanny waters of a seaside pool, these narratives affect us with a moving and haunting power. The book is completed
        by sixteen shorter lyrics in Edgar’s more characteristic manner, some glancing at or directly treating themes from the narratives. The cornerstone
        of this collection is a brilliant verse novel exploring both a love affair and the uncanny events that impinge on it. It is a narrative written
        under the pressure of complex and conflicted experiences rather than to order and the difference shows in the vitality of the writing . Martin
        Duwell and Philip Neilsen, judges, Queensland Literary Awards (2013) These pungent and brightly coloured fragments of more than a dozen people’s
        lives are a sustained single narrative, a wonderful love poem and elegy for a woman, Helen, viewed through the eyes of Luke, her lover...
        The final dateless narrative, ‘The Pool’, is intensely emotional and a high point of Australian poetry. Geoffrey Lehmann, The Weekend Australian
    price: 23.95
    isbn: "9781876044787"
    release_date: "2013"
