the-bearded-chameleon:
    title: The Bearded Chameleon
    author: Chris Mooney-Singh
    short_description:
        The Bearded Chameleon is a new collection from Chris Mooney-Singh, an Australian poet who commutes between Australia, Singapore
        and India. The poems are set in India, his country of inspiration, which beguiled him in 1989 to adopt the Sikh way of life. The title poem
        is a witty study of the lizard that can adapt its colours to any circumstance. Mooney-Singh speaks from his perspective as a Westerner who
        now sports a beard, turban and Indian dress, and by doing so merges with the landscape of Indian society. He witnesses an ancient world turning
        modern as a resident, not merely as a traveller or tourist. These are poems of sharp visual detail and comic irony. There are sparkling character
        portraits, such as that of Mrs Pritima Devi. He has a story-teller’s eye and a lyricist’s sense of music. After Octavio Paz, Mooney-Singh
        is the only poet who writes about the paradoxes of Indian landscape with great passion.
    long_description:
        CLICK HERE FOR AN ANIMATED INTRODUCTION TO THE BEARDED CHAMELEON Accept you have no inkling of the power that walks upon the
        dragonfly water. Siberian geese each season migrate here, yet bird and lake exist beyond your will. You comprehend so little of this, truly.
        Brother of fish, brother of water-lotus when will you frog-kick out toward the truth? The Bearded Chameleon is a new collection from Chris
        Mooney-Singh, an Australian poet who commutes between Australia, Singapore and India. The poems are set in India, his country of inspiration,
        which beguiled him in 1989 to adopt the Sikh way of life. The title poem is a witty study of the lizard that can adapt its colours to any
        circumstance. Mooney-Singh speaks from his perspective as a Westerner who now sports a beard, turban and Indian dress, and by doing so merges
        with the landscape of Indian society. He witnesses an ancient world turning modern as a resident, not merely as a traveller or tourist. These
        are poems of sharp visual detail and comic irony. There are sparkling character portraits, such as that of Mrs Pritima Devi. He has a story-teller’s
        eye and a lyricist’s sense of music. After Octavio Paz, Mooney-Singh is the only poet who writes about the paradoxes of Indian landscape with
        great passion. H.S. Shivaprakash, Indian Literature
    price: 25.95
    isbn: "9781876044718"
    release_date: "2011"
    page_count: 86
    reviews:
        - title: "Sam Byfield, Cha: An Asian Literary Journal"
          text:
              "Beyond ‘A Cultural Look and See’: Chris Mooney-Singh’s The Bearded Chameleon Sam Byfield (poet) Cha: An Asian Literary Jounal , Issue
              18, September 2012 It’s not very often that the first poem in a collection involves defecation, and rarer still, I suspect, that it does
              so with grace and artistry. The first poem in Chris Mooney-Singh’s collection, The Bearded Chameleon , does just that and sets the scene
              perfectly for the works that follow. In ‘Punjab Pastoral’ we find Mooney-Singh, an Australian poet who in 1989 adopted Sikhism, squatting
              in a field, cotton shawl pulled up around his ears, ‘bobbing like a sunflower.’ Having moved to India in search of meaning and ‘deeper experiences,’
              he questions his motivations and the wisdom of his choices, suggesting that ‘they all want to leave and yet I’ve come/to squat and shit
              and chew on grass and spit/for ‘a cultural look and see’.’ Perhaps in response to his own preconceptions, this poem starts and finishes
              with the observation that he can hear no mermaid singing; indeed, he notes, ‘I am the fool round here.’ This search for identity, for wisdom
              and for a ‘legitimately’ lived life is a common theme in this collection, though it is interspersed with poems of both great loss and great
              hope, as well as some of the most effectively wrought depictions of Asia and its people that have been published in Australia. As an Australian
              writing from India, Mooney-Singh can be viewed in the context of a broader pattern among the country’s poets engaging with the region -
              think Aitken, Cahill, Caddy, Kelen, among others. Australian poetry is clearly benefiting from the country’s growing engagement with Asia.
              Yet this collection is notable in that it’s not simply a tourist’s weeks or months spent in-country, but years - a whole life that’s been
              packed up and relocated. One of the most notable elements of The Bearded Chameleon is its ghazals. They possess a more playful tone than
              some of the collection’s serious offerings, and highlight both the poet’s preoccupation with the culture he is writing within and with the
              possibilities of language more broadly. The series ‘Bonehead Ghazals’ consists of five poems. In ‘Puzzle’ the poet writes - ‘The system
              sucks: can’t click, can’t knit with it./Round peg, square slot. I’m quit unfit for it’ - demonstrating a sense of lyricisms and rhythm,
              and also emphasising the questions around identity and purpose which pervade the collection. ‘Roses’ shifts to an exploration of the many
              types and connotations of ‘roses’ and again displays a sense of playfulness: ‘The redhead rose has that playboy look./the bee is hooked
              on the soft porn rose’ and ‘Make money, not art, says the plastic rose./I have no nose for that stillborn rose.’ ‘Belonging’ turns to the
              themes of entrapment and the desire to be free, and draws them together with a lovely image - ‘Absurd, this cage, so where do we belong?/In
              peach-faced lovebird-heaven we belong’ - while in ‘The Bearded Chameleon’, the ghazal series from which the collection derives its title,
              the poet writes: ‘Suburbia was a dumb cartoon:/here, typhoid sweats through each monsoon.’ Several poems in this collection deal with grief
              and loss. ‘Casualty’ is an unsettling description of the death of the narrator’s first wife, who passed away en-route to hospital in a taxi.
              This is a poem of acute loss played out in an alien environment, full of effective details. Where it would have been easy to alienate the
              reader through overt bathos and an absence of detail, this poem and several that follow avoid such traps. ‘Casualty’ opens with At 8 in
              the morning, at exactly 8 in the morning, they wheel her through swing doors banging like a poltergeist. and continues with an effective
              mix of image and simile: ‘a woman who gasped like a dove,’ ‘ripping off her wedding ring,’ ‘dehydration on wheels,’ ‘this absurdity of roses
              outside the window.’ The only questionable note comes right at the end, with Mooney repeating the opening but adding a play on words which
              is perhaps out of place: ‘at 8 in the morning,/at 8 in the period of your mourning.’ Some of the most effective poems in this collection
              are portraits. ‘Mrs Pritima Devi’ takes the form of a monologue by a school teacher who has escaped a troubled marriage and left her son
              behind, and who appreciates a sympathetic ear to speak to. The language and grammar of the poem bring it to life and demonstrate the Mooey-Singh’s
              attention to the rhythms of the language around him. In ‘Advice from an Uncle,’ a business-owner explains the realities of business to his
              ‘MBA-fresh, Harvard-hyped nephew,’ noting that ‘Bribes are bad, dear boy,/but we must get the job done’ and ...you must become a practical
              chap: serve all Superintendents of Police their God-allotted cup. Ever-practical, the Uncle even prongs incense in a brass holder before
              the Guru’s photo, so he, too, will turn a blind eye. The only sticking point in this poem is the short line lengths, which disrupt the flow
              and give a sense that the line breaks weren’t thought through, whereas many of the collection’s other works employ a longer, more natural
              line length. In ‘Families,’ Mooney-Singh broadens out this portrait approach to capture the diversity and complexity of families in India:
              This family left the village, that family found the city, this family emigrated on false passports, this family placed an ad in The Times
              of India , this dutiful daughter got a green-card husband. Several other poems share this focus on observation and ‘naming.’ These poems
              are particularly effective and benefit from the narrator taking a step back. ‘Indian City,’ for instance, is comprised of a list of often
              contradictory images: Satellite dishes on a temple sky-line low-flying jets vultures in a flock a bicycle loaded with electrical fans In
              ‘Laws,’ Mooney-Singh provides a series of contrasts between the human and animal worlds, in essence noting that despite our foibles and
              occasional destructive urges, the natural world continues. In this same observational spirit, ‘PEEP PEEP DON’T SLEEP’ is an amusing list
              of signs seen while driving on Indian highways: I AM CURVECEOUS BE SLOW DRIVE ON HORSE POWER NOT ON RUM POWER The second half of The Bearded
              Chameleon contains several traditional love poems, dedicated to ‘Savinder,’ Mooney-Singh’s second wife. These contain strong moments, though
              at times lose focus and momentum. In ‘Long Distance,’ the poet has returned to Delhi from Singapore and is struggling through a rickshaw
              ride. Shaken and queasy, I missed home badly - the flicker of your hair, breezy as the East Coast palms The details of this ride are, as
              with much of the collection, strong and believable. The final two tercets, however, are somewhat unclear in their language and syntax, and
              detract from an otherwise strong work. By contrast, ‘Yatra, 1999’ is a more complete poem. Starting with ‘You had come to lure me/from my
              white-robed life/in a marble sanctuary’ it describes how his lover has come to visit him after a period of long-distance communication.
              In the taxi, ‘We counted the mile markers;/time was rushing to harvest/as you agreed to marry me.’ The final poem in the collection, ‘I
              come in Winter to a City Without You,’ continues with this theme of long distance love, of finding a way to bridge the separation of continents.
              The poem is a worthy finale to the collection, marking a clear and definitive finish to the themes leading up to it. There are a few moments,
              however, when the strong images and tone are somewhat undermined - the following lines, for instance, veer too close to clumsiness: ‘I know
              peach-pink lips still unlock/the zone of your aromas: this is the future/and I will always kiss your rose.’ I also question the need for
              this poem to constitute the whole of the collection’s third section, when the previous two amounted to over 70 pages. At the very least,
              the other works dedicated to Savinder seem to work well with the final poem and could have constituted a section of their own. More broadly,
              the allocation of poems to specific sections, as well as their ordering throughout the collection, is at times confusing, with different
              themes and forms being broken up and interspersed. The overall cohesion and flow might have been aided by more judicial editorial intervention.
              These criticisms aside, this is an impressive collection by an interesting poet. Future anthologies of Australian poets who have ‘written
              Asia’ should certainly contain one or more of Mooney-Singh’s offerings, especially those that engage strongly with locations and people
              and those which utilise the ghazal form. In a literary climate where poets sometimes end up sounding rather alike, Mooney-Singh stands out."
        - title: Phil Ilton, Mascara Literary Review
          text:
              "The Bearded Chameleon Phil Ilton Mascara Literary Review , June 2012 There are poems for the page and poems for the stage. Chris Mooney-Singh
              is an established live performer. His second poetry collection, The Bearded Chameleon , transposes his performative skills into poetically
              good reading. Mooney-Singh is a chameleon because his ‘makeup’ stems from two cultures: his native Australia and India where he has mostly
              lived in recent decades. He is never quite at home in either, his ‘colours’ change according to which country he’s in. His adoption of the
              Sikh faith, which forbids cutting hair, has him bearded. This theme is encapsulated in 40 end-rhyme couplets tightly presented with perceptive
              cultural observations (‘village life is one food chain’). India, exuberant and traumatic, contrasts with Mooney-Singh’s other life: Suburbia
              was a dumb cartoon: here, typhoid sweats through each monsoon; There’s exquisite images of interaction between the newcomer and villagers:
              I wet my tongue, pretend what’s best and they are kind, pretend the rest. An ‘internal ode’ to the poet’s fauna namesake weaves engaging
              snippets; the chameleon is ‘prehistoric, spiky, punk’ for whom ‘sun-bathing is the reptile’s art’. ‘Abstract Studies with Monsoon Green’
              distils the adopted environment’s fecundity’: The days of humid blindness are upon us, the rain has left a steamy haze of green. The mulberry
              limb drips into the milk pail, green are the tears upon the chilli plants. There’s an innovative reprint of humanity’s footstep: I follow
              footprint puddles to the pump. Mooney-Singh aims to ...learn the way of planting rice: green thumb, invite the fingers to make friends.
              Among captivating images of India there’s a night-driving view of a truck’s decorated rear: ‘Krishna and the milkmaids/ were dancing in
              our headlights’. ‘Indian Standard Time’ includes ‘eating pakoras and deep-fried gossip’ and ‘yesterday or tomorrow, neither too late, nor
              too early’ whether that be ‘in this birth or the next’. There’s arresting street-graphics: the lifters of dead-cows, cremation-ground caretakers,
              collectors of the shit-bins, bottom-feeders, vultures. And vivid imagery that could be from anywhere such as this forest-after-rain metaphor:
              sunlight opens up its peacock tail Personal aspects of Mooney-Singh’s journey embrace the evocative pain of witnessing his (first) wife’s
              death. I was helpless, a passenger during the final act of her breathing that slipped beyond even its coma as the taxi halted at the traffic
              light. Aftermath is poignant: ...I lift your old cup from a suitcase of last things you touched on earth. I see the lipstick: two firm petal
              prints. I will never clean away the kiss. ‘My Fallen’, images of deaths in Mooney-Singh’s family, innovatively commences ‘These last photos
              I don’t have’. Significant memories are often associated with background detail and these are captured with powerful brevity: The strident
              starlings of 2001 still halo your head on soft grass. Mooney-Singh produces striking aphorisms including ‘The Kingdom of Heaven is a clear
              conscience’. ‘To the Dalits’ demonstrates well-crafted rhyme is effective for invocation of traditional Indian folklore. Tradition is also
              invoked with the ‘ghazal’, a love song comprising couplets with an end-rhyme refrain that usually repeats the same word; Mooney-Singh diffuses
              the refrain’s monotony by introducing ‘unattached’ prefixes which form cross-rhyme patterns - neither end-rhyme nor internal (within-a-line)
              rhyme, but constructed on rhyming words appearing within different lines: Make money, not art, says the plastic rose. I have no nose for
              that stillborn rose. Poetry got divorced from the rose, yet the New Thing’s still a fresh-worn rose Seventy million years of the rose: fossils
              lime the time-sworn rose. The cross-rhyme is ‘stillborn/fresh-worn’ etc. Creating effective cross-rhyme is difficult. Kipling, Hopkins and
              Swinburne were the only poets of whom I was aware to have crafted it well until I encountered Mooney-Singh’s ghazals; in this challenging
              form he rubs shoulders with the best. Innovation doesn’t always work. Coining neologisms (new words) has potential pitfalls – they can seem
              forced, too-clever or obscure. A neologism in ‘I Come in Winter to a City Without You’ doesn’t suffer these flaws; the now Australian-based
              poet and his (second) wife (temporarily in Singapore) communicate by mobile and internet, chatting in ‘glocal tongues’. ‘Glocal’ is an engaging
              creation: these technologies may be global but they allow for an intimacy which is effectively local. Attractive eclecticism is quirkily
              reflected in ‘found poems’ of Indian highway-side graffiti including ‘riotous’ examples like ‘HORN IS TO HONK/ PLEASE DO IT ON MY CURVES’.
              Mooney-Singh’s India is not all traditional. A woman who dares to reject her violent husband by deserting his family’s home evocatively
              observes: To move in public is no easy choice if you wear divorce’s question-mark upon your forehead. With riveting figurative language
              she urges: ...more women also swept beneath the family carpet. Fight! I say... Never shall we let them make us feel like wedding ornaments,
              like nose-rings returned dishonoured to the jeweller’s shop. The Bearded Chameleon has a pièce de résistance , ‘Another Bhagwanpur’, which
              opens: A country village stuck in the buffalo mud piles up its cow-pats, balancing clay pots of mosquito water on the heads of women who
              wear pregnancy under flimsy shawls. The metaphorically stuck-in-mud village is personified by its ‘orchestration’ of cow-pats and women’s
              actions. The stereotypical heads balancing pots become thought-provoking with ‘mosquito’ water - potential drama not associated with the
              image. Women ‘wear’ prominent pregnancies. We learn much from skilfully packed lines: The village council of five cannot fight the school’s
              wrong sums and cane-learning; cement walls, white-washed by government, the young men employed by opium. There’s doctors who ‘deal in snake-bite
              mantras’ and this arresting portrait: ...the last Gandhian freedom-fighter props up old glory on a walking stick. More transfixing language
              concludes this village vignette: ‘the night-long typhoid prayers to Ram.’ Sixteen lines have the reader experience a tour de force . There
              are flawed moments. If information becomes a poet’s ‘driver’ the poetry usually suffers; this happens with Mooney-Singh’s portraits and
              some traditional-story retelling. ‘Mr Chopra’ is mostly prosaic description. ‘Apartment of a Bombay Millionaire’ and ‘Mrs Pritima Devi’
              are generally similar and include unnecessary didacticism. In ‘Yogesh Meets Ganesh’ and ‘Advice From An Uncle’ storytelling dissolves the
              poetry. There are moments when things don’t work. ‘A Punjabi Leda and the Swan’ presents an ostensibly good metaphor between the Western
              myth and a man raping a woman in contemporary India, but there’s awkward passages; the mental wrestling needed to wrap one’s head around
              these reduces effectiveness - a forced sensibility suggesting the legend doesn’t fit the poem’s context. Sometimes poetically good ‘moments’
              are undermined by additional figurations: Saffron priests say Out! like big sticks hunting rats along the temple drains. The images of saffron
              priests and big sticks hunting rats in drains are vivid; but the linking simile is not – verbal commands and running with sticks are dissimilar
              actions. The ‘common ground’ is intensity, a minimal likeness. Since the commands are projected by priests, effectiveness is further reduced;
              whatever the faith, clerics don’t undermine their authority with doing-the-shitwork frenetics. The collection has instances of overwriting.
              I look out into the darkness for you. Rest is the wraith that will not let me sleep. This image’s potential is under-realised with the superfluous
              ‘out’ and the prosey ‘let me’. Direct ‘ownership’ of the wraith and tighter presentation like (for example) ‘Rest is my wraith that will
              not sleep’ increases metaphorical impact. ‘I Come in Winter to a City Without You’ is curiously headed by this Mallarmé quotation: ‘Oh so
              dear from afar and nearby’. What is this quote’s purpose? True, it fits the theme – but Mooney-Singh’s poem says it much better than this
              (unusually) ordinary Mallarmé line; a redundant epigraph, it may imply credibility is sought through an artificial hitch to the famous.
              High-profile quotations can be epigraphically effective. But there’s risk that contrast with iconic lines may diminish one’s own and inclusion
              may appear to ‘name-drop’. If the same poem’s ‘the god of small transactions’ is an allusion to Arundhati Roy’s Booker-winning Indian novel
              The God of Small Things , should this be acknowledged? Or is it a subliminal reference to the novel? Could it be pure coincidence? Of course
              the reader is never ‘party’ to writers’ thoughts. It’s suffice to say that if Mooney-Singh was aware of his line’s similarity to Roy’s title,
              it was advisable to not use it and rely on his own words. There are minor irritants; an alcoholic’s problems are lessened with a cliché
              (‘all have raised a storm’) and curiously excessive use of colons and semi-colons. These ‘punctuations’ enhance pauses but frequent use
              impairs poetic flow and produces a ‘boy who cried wolf’ effect - reduced impact of their effective moments. The poem ‘Families’, mostly
              a prosaic list, has poetry in its rhythm, which leads to the other key feature of Mooney-Singh the poet: performance. It was informative
              to attend the collection’s launch. Prosey patches were enlivened, reflecting that a not insignificant proportion is ‘poems for the stage’.
              His performance embraced skilful light/shade vocals and effective nylon-string guitar accompaniment. The Bearded Chameleon progresses strong
              poetic qualities Mooney-Singh crafted in his first collection The Laughing Buddha Cab Company (2007). To gain full appreciation one should
              experience the performance."
        - title: Westerly Review
          text:
              Australian Poetry 2011-2012 Judith Beveridge Westerly , Volume 57, Number 1 2012 Chris Mooney-Singh has lived, studied and worked in
              India and Indian religious communities for a number of years. The Bearded Chameleon is an engaging, often satirical account of his time
              there. With sure-footed control of free verse, blank verse, rhyme and oriental forms such as the ghazal, Mooney-Singh reveals the conflicts,
              contradictions and hypocrisies that a Westerner can experience in a country that never quite sits comfortably on his shoulders, though he
              has deep respect for many of its spiritual traditions. Most powerful are the poems about the death of his wife in a rural ashram, and the
              dramatic monologue ‘Mrs Pritima Devi’ concerning a woman who has left her son, husband, and his family because she is being slowly poisoned
              by the mother-in-law. The poem memorably evokes, the ongoing struggle that women have for equality and recognition. Mooney-Singh’s style
              is often playful and there are some delightfully humorous poems about characters and Indian eccentricities, as well as the self-mocking
              ten-part title poem in which the poet, likening himself to a chameleon, reveals how difficult it can be to find purchase on an identity
              in a place as socially complex as India. Overall, the poems in this volume have a lightness of touch and an ease of style, which combined
              with strong subject matter, make them pleasurable and rewarding.
        - title: The Canberra Times Review
          text:
              "The Bearded Chameleon Geoff Page The Canberra Times , 21 January 2012 Chris Mooney-Singh has also had an interesting life story (though
              re-telling it is rarely the intention of his poems). Raised in Canberra in the late 1950s and 1960s, Mooney-Singh adopted Sikhism in 1989.
              He has travelled and lived for extended periods in Singapore, India and other countries in the region. He has also become an expert in Sikh
              music. The Bearded Chameleon , the first of his books to be properly circulated in Australia, focusses on India. Unlike most of the work
              written by Australian poets travelling in that country (or living there for short periods), Mooney-Singh’s poems are written from the “inside”,
              as it were. Even so, the poet has no illusions about how well he knows his subject — or how well he is accepted by his new correligionists
              or compatriots. India is a vast topic after all. The key to this book is probably the title poem, a sequence where the poet sees himself
              as a chameleon, adept at fitting in no matter how difficult. He is also quick to see the irony of his self-chosen predicament: “My sun-cracked
              soles have drawn some sap / from green Punjab. An Aussie chap // I chew on sugarcane each week / and sport this beard — a convert Sikh.
              // Now turbaned like a maharajah, / I’d pass for Ranjit Singh, the Padshah — // a bit like you, chameleon — / a colour-shifting charlatan.”
              There’s nothing of the charlatan, however, in Mooney-Singh’s nicely balanced views of the pluses and minuses of the country which has called
              him. He is quite unsparing of the corruption in Indian life, the savage oppression of a great many of its citizens and yet he also leaves
              the reader in no doubt as to the country’s and the culture’s attractions. There are poignant monologues such as that by the unjustly treated
              “Mrs Pritima Devi” but also the cleverly balanced binaries in the poem “Laws” where every negative is offset by a corresponding positive.
              e.g. “despite the hunting season on dissidents / another mongoose crosses the road” or “despite the rise of fanatics to government / clans
              of macaques will rule the ruins”. As the excerpts quoted may illustrate, Mooney-Singh is a poet who is both accessible and skilled in his
              art. What he has to say about his adopted country should be essential reading for the naive tourist — indeed, even for the sophisticated
              one (who will enjoy even more its slyly observant references). Chris Mooney-Singh’s new collection of poetry The Bearded Chameleon is the
              work of a new voice engaging with the ‘diaspora discourse’. As a Caucasian Australian who embrace truth in the global world. Such are the
              rich layers of thought and experience to be found within the pages of The Bearded Chameleon ."
        - title: The Sunday Observer Review
          text:
              "The Reverse Diaspora - An Australian Poet’s India Ranga Chandrarathne Sunday Observer (Sri Lanka), 1 January 2012 Chris Mooney-Singh’s
              new collection of poetry The Bearded Chameleon is the work of a new voice engaging with the ‘diaspora discourse’. As a Caucasian Australian
              who has converted to Sikhism, his is a kind of reverse-diasporic point of view. Mooney-Singh’s close empathy with the land of his adopted
              way of life and philosophy creates in the reader the impression of a second-generation ‘returnee’ to a familiar time and place, when in
              reality, he is a son of Antipodean soil. This is evident from the dropped hints in selected poems throughout the collection. Otherwise,
              this is poetry that could have been written by an Indian with all its insider knowledge. The title itself hints at Mooney-Singh’s chameleon-like
              position within the Indian landscape and the agility with which he writes about it. Thus, his example as a cultural convert needs its own
              reverse-diasporic category to differentiate it from mere travel writing. It is evident that he has lived and breathed long and deep in Northern
              India and his considered work codifies the vivid and changing reality of the diaspora as he commutes between Australia, Singapore and India;
              along the way, he deals extensively with prominent themes such as nostalgia, memory and the imaginary homeland. Ethnic, cultural and the
              micro-observation of regional diversity are some of the hallmarks of Mooney-Singh’s India poems. As in the classical description of diasporic
              writings, this poetic exploration is not only a codification of individual experiences but also a poetic documentary of the ‘collective
              voice’ in a highly hybridised milieu. In a way, this hybridity is manifested in Mooney-Singh’s mixed genealogy: his Australian-Irish descent,
              a work life domiciled in Singapore (evident from his previous collection The Laughing Buddha Cab Company ) and his ongoing transnational
              experiments with the Sikh way of life. Deprivation Poverty and deprivation in a typical North Indian village is brilliantly captured in
              ‘Punjab Pastoral’ the opening poem of the collection. Poverty is coupled with an inlander naivety on the part of the villagers who think
              the village tank is like ‘the Ocean’ that nobody has ever seen. In fact, this is also a classical allusion to medieval Bhakti and Sikh poetry
              where the metaphor of the ‘Ocean’ represents eternal consciousness and is often applied to any body of water at hand. In a traditional Punjabi
              context a ‘tank’ was a flat ‘ocean-wide’ expanse of water, rather than a small-mouthed well. In the Post-Partition days, however, the Central
              Indian Government created irrigation canals with pumps controlling irrigation within Punjab and controversially to other neighbouring states
              such as Haryana and Rajasthan, negating the old system of using village tanks for human and animal consumption: I cannot hear the mermaid
              singing here beside this irrigation channel, dug with hoes and feeding sugar cane – a sudden crop of sweetest cash, yet magical as staves,
              ... and green-checked lungi , that is now hitched up above my knees, so that my own wet soil can drop and find its way back into landfill.
              It sounds quite pastoral and yet a place without a latrine, without a job for every man, a place of raw mixed opium, strained through muslin
              cotton, squeezed and drained... ... The only way a young man gets to leave is selling his plot for an agent’s dicy promise of a stamped
              visa to a foreign sweatshop. Yes, they all want to leave and yet I’ve come to squat and shit and the chew the grass and spit like village
              elders by the Panchayat tree. For what? A cultural look and see and then To fly back when the travel cash runs dry? They look and talk of
              me, the grubby kids, Dragging a stick of sugar cane in dust, and mothers loading grass onto their heads... ...I hear no mermaid singing
              by the canal. Panchayat: a village council of five The poet contrasts an over-fertilised and toxic pastoral landscape with the impoverished
              human world relying upon it at a time when everyone longs to leave. Having come for ‘a cultural look’ this should be an idealised heaven
              - the land of his philosophical beliefs. The harsh reality is, however, that having endured centuries of Islamic invasion, partition, war
              and discord, including the militant decade of the 1980s, this is now a place in agrarian and social decline - with over-reliance on deep
              artesian wells and pumps in a State subject to water politics, land division, unemployment and social problems such as AIDS and massive
              drug addiction where the Government turns a blind eye and receives its bribes. Like many diasporic poets, Mooney Singh explores with unclogged
              vision a place beset by man-managed tragedies, yet still attempts to link with the idea of ‘the original home’ and historic home of the
              ten Sikh Gurus and their disciples who created a spiritual, economic and political revolution in Punjab - the ‘Land of Five Rivers’ from
              the middle of the 15th to the 20th Century. Sadly, it seems such a haven seems now to exist only in the poet’s imagination and he is aware
              of it. Pastoral The term ‘pastoral’ for instance also carries with it all of the connotations of Western civilization, going back to the
              bucolic age of Homer and Hesiod in ancient Greece and Virgilian Rome. Now, however, the word ‘pastoral’ is clearly ironic in a post British-ruled
              sub-continent. The sources of problems for the Land of Five Rivers of the once undivided State encapsulating Pakistan run deep. ‘Punjab
              Pastoral’ is thus a poem which might well be catogorised according to the poetics of ‘return’. The poet visits a familiar landscape which
              is the ‘original home’. In his mindscape, there is still a mermaid who ‘sings by the canal’ which may allude to Eliot’s Prufrock where the
              mermaids sing ‘each to each’ but not to him. It’s a nod to Modernism that informs us that the author, despite his interest in Indian history
              is still a global poet of the post-industrial era with all its foibles and post-modern doubts. The ‘pastoral’ image of the village contrasts
              sharply with the harsh ground reality with ‘grubby kids, dragging a stick of sugar cane in dust’ while ‘mothers [are] loading grass onto
              their heads’. It is clear that the poet is not part of the landscape he wants to identify with and his cultural anchorage has almost foundered.
              Cultural loss is a major characteristic of diasporic life. The narrator of the poem has dual identities, but in the deepest sense is a stranger
              wherever he is. Memories Thus there are more poems that attempt to find firm ground to re-build memories into edifices of faith. In ‘Steel
              Kiss’, Mooney-Singh solidifies one of these cherished moments celebrating a lover’s lipsticked kiss on a steel cup which has been preserved
              unwashed over three decades. In a highly skilful manner, he returns again and again, poem after poem, during the first section of the book
              to a time of death and tragedy and loss of a life partner and holds each moment up to the light with deep feeling and poignancy. A primary
              trait of diasporic writing is the attempt on the part of the writer to negotiate with retreating history, past customs and traditions. Poetic
              analepsis, the major technique behind the collection, works through nostalgia, memory and reclamation as literary themes. As mentioned before
              in ‘Steel Kiss’, the poet attempts to reclaim history (personal history) which may be a part of collective history as well: ‘Stainless steel’
              we say, long-lasting, one cup per life span, It did not rust away on a table under the pipal tree where we and squirrels took meals. How
              long has it been since I heard your discourse on love? Once sipped from this cup, I unpacked it today as proof you had red lips, and drank,
              and lived. Yet, why have I been detained among the iron gods? I gulp down milk and sorrow from new tumblers of steel, filling and draining
              three decades of gains and losses. Today, I lift your old cup from a suitcase of last things you touched on earth. I see the lipstick: two
              firm petal prints. I will never clean away the kiss. The line ‘of last things you touched on earth’ quite clearly suggests that the loved
              one is no more and all that is left - ‘the kiss’ on an empty cup is a powerful visual reminder of a past relationship and becomes an emblem
              of a love that does not forget and wants to endure. Passionate encounter In the poem ‘Pink Silk from Punjab’, the poet describes a passionate
              encounter with a woman and its memory which is aptly symbolised by the pink Punjabi silk. There is nothing to suggest that the character
              of ‘Steel Kiss’ is not the same love-making woman of this poem. She represents the continent of India, while the narrator is from another
              ‘continent’ and thus the act of union is played out symbolically. Interracial marriages and dating is part and parcel of diasporic life.
              In such a relationship clash of cultures, values and ethos is represented by the expression ‘collision of continents’. I’m still dreaming
              pink silk from Punjab. I’m dreaming the gentle collision of continents. The scent of her is gone from my hair. Enigmatic in the traffic
              as a rickshaw wallah, Why do I imagine her wobbling her head? ... The last time before she left, we wallowed like buffaloes for one hour.
              I am left with only the memory of our bodies, wet as fish. In the poem ‘My Fallen’ the poet evocatively narrates the emotional departure
              of his relations in a long and unending journey of life. The principal motif of the poem is nostalgia associated with childhood (past) peopled
              by his relations. These last photos I don’t have: China doll-haired sister, whom I played and fought with, you were first to fall, aged
              7 - your liver coughing up in 1963 while the heart crashed down for good on a hospital floor. ... The strident starling of 2001 still halo
              your head on soft grass. Dad, you were stroke-struck, ... Bumpiness and a photo flip book and every other happy snap keep smiling among
              tall mountain gods; but I am travel-sick, bussing up the puke-green hillsides of Himachal, climbing to what summit? ‘Abstract Studies with
              Monsoon Green’ lends novel interpretations to the colour ‘green’. In this agricultural context, green becomes a personified invisible form
              who comes and goes mysteriously with the days and the monsoonal moods of the season. Yet, the ‘green’ has always been there like a numinous
              presence as mysterious as in ‘Steel Kiss’ and ‘Pink Silk from Punjab’ On a more pragmatic level, the poem is also celebration of tropical
              nature: The days of humid blindness are upon us the rain has left a steamy haze of green. The mulberry limb drips into the milk pail, green
              are the tears upon the chili plants It is a sudden season of tractor bog, green footsteps printed in the mud It seems the white of milk
              has lost its green, idle days have lost their shouting children. ... I have to learn new ways of planting rice: Green thumb, invite the
              fingers to make friends. A salient characteristic of the poem is that it strongly evokes ‘Home’ or the ‘Old Country’ in which the narrator
              wishes perhaps to be a part of, but cannot, and yet it is a vital part of his emotional life. ‘Home’ is a numinous desire in the diasporic
              imagination. It is a hidden place of no-return, although it’s quite possible to visit the geographical location: a Punjabi village, or place
              of ‘monsoon green’. That aspect of loss is evocatively captured in the line ‘I have to learn new ways of planting rice’. Such is Mooney-Singh’s
              identification with the source of his imagination that he speaks like an ageless peasant from this milieu in the same way that Wallace Stevens
              speaks in metaphors within the lines of American symbolist poem ‘The Blue Guitar.’ Diasporic existence In the aptly titled poem ‘The Bearded
              Chameleon’, the poet skilfully dramatises the basic dilemma in diasporic existence, constantly in negotiation with diverse cultures, languages
              (bilingualism or multilingualism) and the sheer hybridity which virtually obliterates one’s identity. The personality that diasporic writers
              bear is multifaceted and such writings depict the intersection of cultures, identities and ethnicities that swing between an adopted motherland
              and the lost ‘Home’. The narrator compares himself to a ‘bearded chameleon’ on a Bo tree: My sun-cracked soles have drawn some sap from
              green Punjab, An Aussie chap, I chew on sugarcane each week and sport this beard-a convert Sikh. Now turbaned like a maharajah, I’d pass
              for Ranjit Singh, the Padshah- a bit like you, chameleon – a colour-shifting charlatan. Yes, since I came in my blue jeans to do write-up
              for magazines your form has been my best touchstone on how to live in The Zone A decade later or more or less I still reside at your address
              with farmers, trades-folk, holy men who can’t read book , or use a pen. ... My pen is like your sticky tongue I snatch my image- files among
              the geckoes, birds on tree or plant, or dog and pig in excrement. If I could train my mind or hand not just to write, but understand...
              Another thought-provoking poem in the collection is ‘Families’. The poem in its own manner codifies the diversity of sub-continental ethnicities
              and is like a collection of snap shots of life in a melting pot of its cultures: Families of Dravidians inter-married with Aryans, Bactrans,
              Parthians, Scythians, Huns, Families of Arabs, Afghanis, Turks, Tartars, families of Moguls, families of White Men. Families of Ram, Shiv
              Ji, Kali-Durga, Guru Nanak, Mahavir and Buddha, families of Sufi renouncing all but Allah, families of Moses, Jesus, Zoroaster. Families
              of maharishi top-knots under turbans, ash on the forehead, third eyes of red powder; this Brahmin family wears a shaved tuft of hair, these
              lace skull caps are all facing Mecca. Spinning wheels, cane knives, humped bull and tractor, raw chili families, white buffalo butter, gypsy
              carts, truck drivers, itinerant bicycle tinkers, fish hunter families on midnight rivers. Families of fundamental Hindu and Mussalman, militant
              grit in the Government eye, black money families, unfair election tactics, families of bosses, families of thugs. This family fought the
              Moguls, this fought the British, this family chopped off heads during Partition; this family went on non-violent hunger strikes, this family
              plundered, that family looked on. This family left the village, that family found the city, this family migrated on false passports, this
              family placed an ad in The Times of India, this dutiful daughter got a green-card husband. Well-fed families, choked platforms of families,
              endless traffic of uncles and aunties; and this is a family of child prostitutes, this is a family of railway orphans. Families of priests,
              families of bureaucrats, families in business, families with one acre, beggars, street people, Dalits and tribals, castes of inheritors
              and the eternal outsiders. Caste systems The poem is a slice of Indian society with its classes and caste systems. What is obvious is that
              the class system will go on unabated with families of beggars, Dalits and outsiders. Despite change, nothing changes in the social order
              here. The poet has captured the diversity of the Indian human landscape which is an amalgam of ethnicities with their inherent disparities
              in socio-economic terms. The poem also touches on aspects of dislocation, re-location and memo-realisation. Diasporic writers while looking
              backward for ‘home’ also look for the new belongings that can be owned and built upon. In this process, the transformation of ‘identity’
              is accompanied by change of place. One may not regain a ‘home’ in the diasporic existence. It is due to this factor that a diasporic writer
              often tries to realise memory or memo-realisation. One of the poems which captures the quintessential form of the lost ‘home’ is ‘Another
              Bhagwanpur’. The poem offers a microscopic view of a village with its cultural and class diversity, abject poverty and deprivation: A country
              village stuck in the buffalo mud piles up its cow-pats, balancing clay pots of mosquito water on the heads of women who wear pregnancy under
              flimsy shawls The village council of five cannot fight the school’s wrong sums and cane-learning; cement walls, white-washed by government,
              the young men employed by opium. Here buffalos don’t budge from bor trees and doctors deal in snake-bit mantras, while last Gandhian freedom
              fighter props up old glory on a walking stick. How poignant the hopes for a better harvest, the flimsy huts laying down for floods, the
              naïve child-brides of the king of malaria, the night-long typhoid prayers to Ram. Chris Mooney-Singh has admirably dealt with many issues
              such as the caste system in India (particularly in the two-part poem ‘To the Dalits’) and how globalisation is affecting Indian cities.
              There are also several narrative sketches and character monologues that again skillfully depict Indians in their home settings, or troubled
              circumstances such as ‘Yogesh Meets Ganesh’, an agnostic executive forced to accept the faith of his ancestors in an eleventh hour bid to
              save his infant son from fever; or the story of Mrs Pritima Devi, the school teacher and survivor of poisoning at the hands of her in-laws
              who tells her story (in Indian English blank verse) to a foreign colleague on the staff. Despite creating an epic frieze of ancient India
              transitioning to a modern one, there is still a feeling of reverence portrayed in between the moments of confusion, gentle satire and tragi-comic
              irony. In addition, Mooney-Singh’s metrical and open form virtuosity abounds, especially in his adaption of the ghazal into English while
              still retaining its inherent rhyme scheme, equivalent English metres and deep metaphorical conventions while delivering contemporary moments
              of intimate experience. Invisible sensibility Overall, Mooney-Singh delivers many gifts in a post-modern package - flawless technique, psychological
              insight and a knack for catching the flavour of Indian speech without turning it into parody through his role as a cultural translator.
              He is someone equally at home in the Indian milieu he writes about and yet retains the invisible sensibility of his Western upbringing and
              education which does not dominate or try to colonise its subject with ‘easy judgements’ (p29, ‘Apartment of a Bombay Millionaire’). Just
              as Vikram Seth masterfully wrote his tetrameter sonnet-novel The Golden Gate in the voices of satirical Californians, Mooney-Singh has done
              something equally deft, reversing the perspective from Australia to India, in turn, adding a deeply engaging book to the canon of diasporic
              literature. Whether Eastern or Western-born, The Beaded Chameleon offers both macro and micro views of the diasporic reality in which its
              writer is virtually caught between a cultural home that no longer exists, while coming to terms with the new ‘home’ - a modern India that
              is still being constructed through the tug of war of globalization. In the third and final section of the book, a single ‘homecoming’ poem
              - ‘I Come in Winter to a City Without You’ in seven sections, the speaker has left his partner back on the sub-continent while he ventures
              to his original ‘home’ to Australia. In doing so, he is forced to acknowledge that his true home is not a physical one, but the intimate
              relationship he is now forced to inhabit via the virtual world of ‘ennui and email’: Distant intimacy demands imaginings, a new domicile
              of words as the ocean swells under galaxies, out of time zones. When do we meet under stars? And thus, the collection returns us again to
              the symbolic ‘Ocean’ of ‘Punjab Pastoral’ which opened the collection, emphasizing that all journeys aim toward an inwardness and expansive
              understanding, and that all diasporas are allegories of the developing self, learning to embrace truth in the global world. Such are the
              rich layers of thought and experience to be found within the pages of The Bearded Chameleon ."
        - title: Rochford Street Review Review
          text:
              "Blending into the Buddha Tree Mark Roberts Rochford Street Review (rochfordstreetreview.com), 13 December 2011 There is little wonder
              that there is a sense of ‘otherness’ running through Chris Mooney-Singh’s second major collection The Bearded Chameleon . As in his first
              collection, The Laughing Buddha Cab Company , Mooney-Singh is very aware that it is impossible not to stand out in either India or Australia
              when you are a turbaned, bearded westerner. Having converted to Sikhism in 1989 his poems reflect an inspiration which is perhaps unique
              to Australian poetry. But If Mooney-Singh is unique among Australian poets, his position in India is also slightly complicated. A number
              of times in this collection he comments on how he is perceived in his adopted land. In the first poem in the collection, ‘Punjab Pastoral’,
              for example, he begins by describing how much he blends into the Indian landscape: This cotton shawl is pulled up round my ears keeping
              out the fog as I defecate on fallow field like any other farmer. I wear a turban, bobbing like a sunflower But there is a fundamental difference
              here: Yes, they all want to leave and yet I’ve come to squat and shit and chew on grass and spit like village elders by the panchayat tree.
              ‘Punjab Pastoral’ The fundamental difference, of course, is that Mooney-Singh has a choice. He can stay, leave and come back: For what?
              A cultural look and see and then to fly back when the travel cash runs dry? This is a theme he returns to in a later poem, ‘Apartment of
              a Bombay Millionaire’. This poem begins in a mock deferential tone “Sir, you have wide windows, facing West/to the Arabian Sea”. But the
              trappings of wealth can’t hide the reality of every live for the vast majority: yet I find it hard to talk of ‘higher things’ seeing the
              tin shacks of the servant slums directly below these apartment blocks. At the same time as the poet feels disgust at the hypocrisy of the
              millionaire donating to the temple while ignoring the slums, he also releases that there are points where both them are more similar than
              he would like to admit: It’s all too easy to invent tidy aphorisms. It is high time I was gone. Mine are also the words of privilege ‘Speaking’
              But there is hope in the ending as the poet understands that he must ‘escape’ back into reality. As he is washing his hands he realises:
              I must take myself far away from Your sparkling unblemished rose standing in this vase, And make them into useful hands. ‘Apartment of a
              Bombay Millionaire’ The strength of this poem lies in its almost spiritual sense of temptation. From a western tradition one thinks immediately
              of Satan’s role in tempting ‘virtuous men’. In the same way in this poem Mooney-Singh is escaping the temptation to cut himself off from
              the reality of his adopted land by retreating into an Indian version of the West. While he can sense this ‘difference’ Mooney-Singh can
              also see a way out. In the title poem of the collection he sees himself like the chameleon adapting and fitting in so that, over time, the
              ‘differenceness’ fades away: My sun-cracked soles have drawn some sap from green Punjab. An Aussie chap, I chew on sugarcane each week and
              sport this beard – a converted Sikh but in the end his skill at disguising his difference is not as good as the chameleon: Perhaps, I will,
              one day, be free to blend in with the Buddha tree. ‘The Bearded Chameleon’ One of the surprising strengths of this poem, at least for me,
              was the poet’s use of rhyming couplets. While initially a little wary of the use of the form through a fairly long poem, Mooney-Singh manages
              to pull it off with remarkable skill - for the most part the poem maintains a strong internal rhythm mostly avoiding any forced rhymes that
              could disrupt the flow of the poem. The other strength of this collection is the way that Mooney-Singh can turn the everyday into poetry.
              From the stark contrast of the imagery in a poem like ‘Indian City’ – “satellite dishes on a temple sky-line” and “fresh cow pats on the
              new overpass” - to the wonderful juxtaposition of the astrologer in ‘The Thirteenth House’ with the Stock Broker in ‘Mr Chopra’, we begin
              to sense that the poet has, perhaps almost a unique insight into the day to day functioning of Indian life. In the final instance the contradiction
              of a Australian trying to blend, like a chameleon, into the everyday of Indian life provides the major strength of this collection. Mooney-Singh
              has become very close to India, but he still brings the cultural baggage of the West with him. Like the Chameleon, no matter how still he
              stands, no matter how much he tries to blend in, we can still see the outline of a previous life if we look closely. There is much to enjoy
              in this book and I look forward to Mooney-Singh’s next collection."
        - title: Wet Ink Review
          text:
              The Bearded Chameleon Lindy Warrell Wet Ink , Issue 25, 2011 The delightfully titled The Bearded Chameleon refers, in the eponymous
              poem, to the poet, Chris Mooney Singh who writes about India as an Australian convert to Sikhism - My sun-cracked soles have drawn some
              sap from green Punjab. An Aussie chap, I chew on sugarcane each week And sport this beard - a convert Sikh. As the poet-chameleon, Mooney-Singh
              situates himself as both insider and outsider-observer but, overall, the outsider-observer dominates and, despite disclaimers in ‘Apartment
              of a Bombay Millionaire’, often judges - I do admit that easy judgements are A Westerner’s naive undoing. Please excuse my traveller’s stomach
              that needs the toilet. Through the South door? Fine, I’ll try to scrub off The self-righteous caste of ‘foreigner’ from These palms in your
              jasmine-scented bathroom... Mooney-Singh borrows from the Indian poetic forms, especially the Ghazal or rhyming couplets but he uses a range
              of styles, including short bursts of free verse. My favourite poem in this collection is ‘Families’, one of the few where the words themselves
              do the work of poetry instead of the pronoun ‘I’, which places the poet front and centre in the telling. Mooney-Singh’s poetry is clear
              and largely descriptive, but there is joy in reading poets whose work add something unique to the tapestry of Australian poetry.
the-complete-apparition:
    title: The Complete Apparition
    author: K.F. Pearson
    short_description:
        The Apparition is only there when perceived. Many who may evoke him, mostly fail. When he arrives he has a presence. Or he
        is there unannounced—in boudoir, viaduct, United Nations or outback, backyard or shopping strip, by mantel-piece, on dancefloor, in the Islands,
        on flatbed truck—or amongst plants or creatures. Not being there for long, there’s a tear in his eye, a catch in his breath for what will
        be gone, almost as quickly as him.
    long_description:
        "B ook Description Having no ego, nor an id, he doesn’t seem all that he should. His style is of a studied neglect of which
        the decisive cannot speak. He could be cosy, he could be cute if he weren’t always in dispute. Not boastful nor a sexy item the market’s long
        abandoned him. Left on the doorstep as a gift his wrapping has been tampered with. The Complete Apparition is an existential comedy. The Apparition
        is only there when perceived. Many who may evoke him, mostly fail. When he arrives he has a presence. Or he is there unannounced—in boudoir,
        viaduct, United Nations or outback, backyard or shopping strip, by mantel-piece, on dancefloor, in the Islands, on flatbed truck—or amongst
        plants or creatures. Not being there for long, there’s a tear in his eye, a catch in his breath for what will be gone, almost as quickly as
        him. His fractured story embraces both of Tolstoy’s ‘ two plots: a person leaves home; a stranger comes to town.’ No wonder he sings hymn,
        anthem, rap, popular song, nursery rhyme, bush ballad or an odd sonnet to suggest he is here. So let him contest with the fear, our fear,
        of fading."
    price: 27.0
    isbn: "9780648038764"
    release_date: "2021"
    page_count: 304
    reviews:
        - title: Book Review
          text:
              "REVIEW K.F. Pearson: The Complete Apparition Posted on 1 December 2021 by Martin Duwell Melbourne: Black Pepper, 2021, 285pp. Somehow
              it’s hard not to warm to a book whose acknowledgements page tells us that many of the poems about “the apparition” – the character or state
              that the whole lengthy work is devoted to – “have been rejected by prominent magazines and anthologies. I would like to thank them for authenticating
              the nature of his character. The few that did take poems I do not embarrass by naming them”. And you can see why it would be difficult to
              get these poems into journals. Most of them are attempts to define something indefinable and their strategy is to continuously look at the
              subject from different angles, different perspectives and different genres: not something that produces stand-alone works. On top of this
              the poems are often very rough, sometimes even doggerel though – I’ll look at this later on – this seems to be a deliberate ploy on the
              author’s part, perhaps to avoid the unwanted elegances of symbolism. Pearson’s obsession with “the apparition” can be traced, at least for
              an outsider such as myself, to The Apparition’s Daybook , a slim volume of 1995, and a later volume, The Apparition at Large , from 2006.
              Only one of the poems from these two books is included in The Complete Apparition (I think) so this isn’t going to be one of those rolling
              accretive projects like Pound’s Cantos or Berryman’s Dream Songs . In fact it couldn’t be, since the poems of the earlier books are first
              person pieces from the point of view of the central character himself. And the result is quite different to – and, in a way, more restricted
              than – the outsider’s attempts at definition that make up The Complete Apparition . What can be said about the Apparition himself? Although
              there is a certain comical paradox in a reader attempting to define in prose what more than four hundred pages of poetry doesn’t really
              do, it’s still a question that one has to ask and a reading strategy one has to adopt. Firstly it can be said that he has sometimes a physical
              manifestation and sometimes a non-physical one. As a tangible character he can appear in a number of different guises and in a number of
              different roles. The most important is as a man who exists in the world, regularly taking walks and watching the ducks on the lake or the
              Kookaburra on the Hills Hoist, but at the same time being invisible to everybody else, not because he is technically invisible but because
              people don’t see him or, at best, see him as something that “disturbed them at the edge of vision”. To those who are receptive he will pay
              a visit, and many of the best poems are about these visitations. The opening of “Johnny-come-lately”, for example: The arriviste has arrived
              on your doorstep, late at night. Mere pressure of the fingers opens all dark hallways of your house. There’s an almost-pad of footsteps
              like muted shivers from the past as they approach down corridor though you’re asleep and still sleep on a moment before the restless air
              requires you shift, then startle awake to something short of recognition but with a certainty of presence you could not deny, nor have the
              will to object to in the instant of your stirring. It’s hard to say what’s come upon you by an invasion (or your calling forth) of one beyond
              the realm of easy comfort . . . At other times he becomes identified with the downtrodden, appearing quite often as a swaggie “on the wallaby”:
              With dilly bag and walking staff, he strolls his lonely way, to meet the future or lose the past . . . In these concrete manifestations
              he has a specific set of interactions with those who are in the right state of mind to perceive and accept him. He isn’t a simple embodiment
              of saintly visitation, poetic inspiration, intercession or annunciation; in fact he needs others so that he can have a sense of his own
              existence. A late poem in the book says “do not disremember / yourself who are his author” and an earlier one, describing him as being in
              subjection to “a mistress or master” shows him wandering in ‘sleep mode’ awaiting the summons that will activate him: . . . . . He can doze,
              despair and await a summons. He does not himself possess a lure. His time is all the time in other’s hands. I you ask him, he could be your
              creature. Applicants are warned, although without one, he is, once yours, an imposing figure. He has the power of insinuation. They speak
              for him but he’s the more secure. Although we are in the world of paradox here – an imposing figure who doesn’t have a figure – this component
              of the poetry has a solidity that is reasonably easy to grasp. Indeed it invites allegorical readings. He could represent that sensation
              of dwindling into invisibility and irrelevance that can come to most of us late in life. Conversely he could represent a visitation which
              shakes us out of the conventional tracks on which we run our lives so that we realise that while we thought of ourselves as free, in actuality
              we were entirely constrained by “mind-forged manacles” that we couldn’t even see. We could read him as interceding – certainly this is the
              image that the book’s last poem leaves us with. We could read him as an Ariel figure, an embodiment of inspiration. And we could also read
              him as an erotic figure, specializing in night-time visitations. This latter view gets some support from reading the earlier book, The Apparition’s
              Daybook , which is more like a sequence and could be read as a modern version of the renaissance sequences detailing a love affair and focussing
              on the lover’s sense of being insubstantial when apart from the loved-one. This is certainly true of “His State”: My condition makes me
              suffer a state I’d not prefer, to be dependent on a certain gazer’s whim. To know when out of sight I am in no-one’s thought brings me to
              the brink. I am, but you don’t think. But these reasonably substantial portraits of the Apparition – as visitant, as tramp etc – are only
              part of the complicated fabric of this book. There are very good poems defining him negatively, especially those in which various social
              structures – religions, the law, military intelligence – try to cope with him and, of course, fail completely. A group of three poems early
              on summarily dispatches the legal world, the police world and the mercantile world, and the first of these, using the equivocal language
              of legal process, double negatives and all – “The unresolved not impossible non sequitur / his is, your Honour, is not incapable of repair”
              – is not only a lot of fun but also an example of the way language can approach the indescribable as a mesh of contradictions. He is also
              a creature who sometimes leans towards the messianic, “despised among men”, a “figure on the hill” – the Beatles’ fool as well as the preacher
              of the sermon on the mount – an avoider of activism as much as religious structures: . . . . . No mass hysteria ever could persuade him
              on St Peter’s balcony or in Tiananmen Square but roads or floorboards or a verge of grass that are the ways by which he finds his way can
              summon him like an hypothesis . . . There are also a host of theatrical references which set a frame of disguise, impersonation, exits and
              entrances for him – in a poem from The Apparition at Large he describes himself as “a tragedian in civilian garb”. In “Debut” he is an outsider
              “lured inside by a cabaret tout” who is forced to perform: the famous long-handled shepherd’s crook doesn’t drag him off the stage but onto
              it. And as “Any Proscenium in a Storm” says, . . . . . Less a charade, more harlequin with colour leached from clothes his hold, once curtains
              part, is in Republics of Suppose. Finally, there are also two memorable descriptions of him as a sufferer of “reverse Alzheimer’s” – “He
              doesn’t forget but is forgotten” – and as a “reverse pilgrim”, one who goes: . . . . . not to the shrine with relic or lock of a martyred
              saint’s hair her mother cut off when she was a babe, or on a beaten track to sacred rock or tree, but rather he’s the one who wanders to
              be found in drawing room, or byway, or hidden in a crowd. . . These are all concrete manifestations – even though the approach is often
              paradoxical – and as I’ve said, they aren’t the entire picture. Sometimes he is completely insubstantial as in “Selfie” where it’s said,
              “Spotlit at any camera angle / there is a sheen but nothing stable” but also in those poems which relate him to gaps. In “The Resting Place”
              he lives in “the discrepancy between the time / on wristwatch and the mantle clock” and in “The Finer Things” he is a “devotee of interstices”
              who “has spoken well of filigree”. This idea of a creature of the spaces between things is probably best expressed in “A German Poem Read
              in his Youth” from The Apparition’s Daybook , one of a number of poems that refer to Morgenstern’s comic poem about an architect who, much
              to the discomfiture of the local authorities, steals the spaces between the palings of a fence and makes an edifice from them. The book’s
              structure whereby seemingly endless attempts at description and analysis are brought to bear on what is conceived as an indescribable and
              unanalysable phenomenon seems a satisfying one to me. Each fits well with what poetry does because each of the poems is, in itself, a complete
              entity but is also only ever one possible approach to life. And the book uses this well by allowing the approaches to be in completely different
              styles and genres. There is a good deal of warm-hearted parody going on here, for a start, and you can hear snippets of Robert Frost, Kipling,
              Henley, Burns and Stevens – the latter’s “let be be finale of seem”, if reversed, might make a good epigraph for the project. And Les Murray’s
              “An Absolutely Ordinary Rainbow” – a poem dealing with an individual as anonymous and ungraspable as the Apparition – makes an appearance
              in “In Praise of Cowards” which begins, “Ah! the whisper sighs around the Showground. / It is heard in Fitzroy, and on Fitzroy Street”.
              But the apparition also appears in different settings and genres. There are a couple of Gordon- or Paterson-like gestures at the bush ballad
              including “Before Back of Beyond” – a nice paradoxical title – which begins in full bush ballad galloping style – “Way out where the track’s
              exhausted / far beyond the dingo’s cry” – before reverting to more conventional rhythms. And “Recitative” sounds like those twee late nineteenth
              century poems about childhoods remembered and lost: There’s a sigh that hovers near the memory of a passenger seat and an aura gone by that’s
              why there’s a yearning to be just returning along the track to Make Believe. . . So much for the variety of genres. There is also quite
              a variety of styles. Sometimes the syntactic style is very awkward – these are poems that share with others an uncomfortableness with the
              way English deploys a compulsory definite article “He wields stick with ferule”, “or who has stilled brass tongue of bell” – but I think
              the awkwardness is a kind of deliberate rawness: it’s not there in the earlier Apparition books. This is a poetry, in other words, that
              wants to sound more like Blake than Tennyson. And a number of poems are written in a rhymed two-line stanza style that I find very attractive,
              again they nod towards Blake and also to the ghazal form. Take, for example, one of the last poems, “Pebbles”: Who reads a chapter before
              sleep has plot lines her dream may keep. Who hesitates is taking time to weigh the waits, to find the rhyme. Who spends ten minutes with
              an orchid knows the earth’s good habitat. Who plucks a pebble from a pool feels water close once hand is pulled. One who observes her walking
              feet looks up to see who she will meet. A kookaburra on a rotary hoist lifts breakfast to a higher place. Who studies formation of a leaf,
              green or skeletal, finds relief. It probably belongs to a group of poems whose relationship to the apparition is a bit tenuous – “Corona
              Wreath”, for example, is a straightforward Covid poem in which the apparition doesn’t appear either as a figure or a set of moral imperatives
              – but it has that nice, raw Blakean quality. What to make of this strange and intriguing book, when all is said and done? A central hermeneutic
              problem is that an “outside” reader such as myself can’t really define the poet’s stake in the whole project which, since The Apparition’s
              Daybook was published in 1995, has now occupied its author for more than a quarter of a century. There are obviously autobiographical elements
              – the kookaburra on the Hills Hoist and the daphne that lines the lane recur so often that they lead a reader to think that this must be
              happening at the author’s home. One of the most important poems, if we are looking at this question, is “His Letter of Support” from the
              second book, where he has a kind of alter ego relationship with the poet, describing him as “my amanuensis”. The apparition can also be
              allegorised as both inspiration (something that visits the poet) and poetry (and its authors) itself, a force able to play a non-activist
              but important part in public affairs and to celebrate the generally uncelebrated. But these two readings are mutually exclusive: the apparition
              must be either outside the poet or a part of the poet’s life and personality; that is, on the inside. Pearson’s stake in all this can probably
              only be described by the author himself, and although that is a situation that applies to almost all poets, it’s especially complex here
              in this extensive and multi-focussed collection. This entry was posted in Reviews and tagged K.F. Pearson , The Apparition at Large , The
              Apparition's Daybook , The Complete Apparition by Martin Duwell . Bookmark the permalink . Back to top Start of StatCounter Code End of
              StatCounter Code"
messages-of-things:
    title: Messages of Things
    author: K.F. Pearson
    short_description:
        K.F. Pearson, in a collection that includes some of his well-known translations, writes a sensuous poetry with an irony that
        leaves intact his exotic imagery... Pearson offers us what Mark O ’ Connor might regard as ‘ open verse ’ , except that it is too controlled
        and economic to allow self indulgence... carefully delineated images, from which the reader must make his own meaning. John McLaren, The Australian
        Book Review Poetic precision in images so clean you can hang them on a wall. Geoffrey Dutton, The Bulletin
    long_description:
        K.F. Pearson, in a collection that includes some of his well-known translations, writes a sensuous poetry with an irony that
        leaves intact his exotic imagery... Pearson offers us what Mark O ’ Connor might regard as ‘ open verse ’ , except that it is too controlled
        and economic to allow self indulgence... carefully delineated images, from which the reader must make his own meaning. John McLaren, The Australian
        Book Review Poetic precision in images so clean you can hang them on a wall. Geoffrey Dutton, The Bulletin
    price: 11.95
    isbn: 0949363030
    release_date: 1984 (Friendly Street Poets)
    page_count: 63
    reviews:
        - title: Overland Review
          text:
              "Friendly Street Poets - Messages of Things Frank Kellaway Overland, No. 96, 1984 Messages of Things by K.F. Pearson is an impressive
              collection. It contains adaptations and translations from Catullus, Heine, Borges, Lorca, two sixteenth century Spanish, and two Spanish
              American poets. He invests them all with the color and texture of his own thought. Some of the best poems are about objects and suggest
              that things are like mirrors, in the sense that the way we look at them and what we see are a reflection of what we are - thus the cycle
              ‘Self Portrait from Objects in a Room,’ of which I liked the last, ‘A Cigarette Paper,’ the best: Small and frail as a cowrie shell, and
              twisted in discard, a cigarette paper just holds to the edge of the wicker waste basket waiting a breath for its fall. It’s like waiting
              a breath for your fall but at times, at times the sheer diagonal flight of a bird across the upper rectilinear blue of your windowpane!
              The love poems, of which ‘Catullan Variations’ and ‘Gaius Petronius at Night’ are the most interesting, are passionate and sensuous with
              many memorable lines: If you dissemble ‘otherwise engaged,’ send apples kissed by your round lips, and I will freely eat. The dramatic poems,
              ‘Triptych Monologues’ and ‘The Assassin His own Counsel’ show a jazzy zest for contemporary language. In ‘Odysseus’ we are given a sense
              of the interpenetration of the past and present, of Odysseus still alive, as he is, in the twentieth century. However in spite of its vividness
              and vitality, the collection seems to me to be marred bv freauent clumsiness: Once I used to say, Call no man happy who is not born dead
              but now I stand before you, myself the felicitous man The last four words sound stilted and pretentious and jolt to a wobbly halt. ...I’d
              have you remember our prow -ess of my cock and your clitoral tip The grammar is clumsy; cock and clitoral tip are words of conflicting sorts,
              one popular the other medical, which shout angrily at one another; the splitting of the word prowess is idiotic; the poem, which calls itself
              ‘A Formal Sonnet,’ is nothing of the kind. However in spite of these, and other blemishes far too numerous for comfort, and perhaps that’s
              their intention, Messages of Things is interesting throughout, nearly always alive and vivid, with many real insights."
        - title: The Bulletin Review
          text:
              A Vintage Year for Our Poetry - Messages of Things Geoffrey Dutton The Bulletin , Vol. 106, No. 5429, 1984 It is good to see a collection
              from Kevin Pearson, whose verse has qualities of music and precision that are part of the essential heritage of poetry but often threatened
              with demolition in the name of development. In an elegy for David Campbell he writes ‘song is utter voice.’ There are two resonant poems
              about oranges that also state that proposition, while Pearson tackles its implications head on in ‘The Problem of Beauty’. One of my favourites
              is ‘A Smart Ode to Soap’, which has the same shining observation of aspects of the accustomed every day as in Les Murray’s poem about a
              hot shower.
        - title: Australian Book Review Review
          text:
              "Poetry from Friendly Street, Wollongong and the West Barbara Giles Australian Book Review, July 1984 Here again the biennial crop from
              the poets of Friendly Street, and the quality sustained, grant monies well invested. This year we have Rob Johnson’s first book [ Caught
              on the Hop }, a first from Kevin Pearson [ Messages of Things ], Mike Ladd [ The Crack in the Crib ] and Jeff Guess [ Leaving Maps ], and
              Jenny Boult’s third [ The White Rose and the Bath ], though her first with Friendly Street... In Kevin Pearson’s Messages of Things the
              appearance is rather of essences, epiphanies, and those mostly of natural things: objects of art: and of the problems of appearances, of
              beauty. In a marvellously sensuous poetry, attuned to those Spanish poets whom he translates so well, he writes nevertheless with an edge
              of irony which removes his poetry from self-indulgence. His ‘things’ don’t shout their meanings, it is for the reader to conspire with them
              to turn a pomegranate into a paean, a carnation into certainty. The book contains a number of translations, from Spanish and Latin. We recognise
              their distinct voices, like and unlike the voice of Kevin Pearson, which is a precise, sober and joyous voice. We will recognise also in
              these poems the forms and subjects which please him also. It is not possible, with a poet of such intensity to find lines, to be quoted
              in brief, which give enough of his flavour, playful, sensual, reflective by turns, a strong and individual voice."
        - title: Ash Review
          text:
              "Friendly poems - Messages of Things Ash , Winter 1984 K.F. Pearson’s Messages of Things (Number 7 in the series) is quite different
              in approach [to Mike Ladd’s The Crack in the Crib ]. Pearson is a poet who can take his personal lessons for granted and simply allow them
              to inform upon his current choice of perspective. Of all the poets reviewed here his is the most distinctive voice - his technique more
              original and his sources more complex. His approach to the everyday miracles of love and pain is illuminated not only by education and imagination
              but a conscious use of empathy which gets beneath the skin. His writing of something more than direct experience and the intelligence with
              which he does so entirely side-steps pretension. It is dangerous for an Australian poet to display evidence of any kind of love affair with
              the passionate but Pearson is able to charter the reefs involved by his careful structuring, judicious injections of irony and a certain
              sly humour. For example, in ‘Catullan Variations (II)’ Pearson undercuts his first verse evocations of sensuality, beauty and melancholy
              with humour and deliberate Ockerisms: Let all of love go weeping now and all who know of beauty the budgie of my girl is dead, the budgie
              who beguiled her time she loved it more than both her eyes, the honeyed thing knew her that wel1... There are many pleasures in this book
              , exotica of image and subject not least among them. Pearson’s hard-edged lyricism startles with its accuracy. You see it in a poem such
              as ‘A New Pomegranate’ Something now beneath the burnished antipodal sun flexible, gold, lithe visible means of rapport with the green-to-yellow
              ripening pomegranate in the dust of the white window sill silence gathers round. Where the sense of colour and light and the lusciously
              ripe is typically underlaid with awareness of subtle connections and incidental word play. Another side of Pearson’s work is the energy
              and intelligence of his associative abilities. The following is from ‘The Assassin, His Own Counsel’, I am always at the edge. The crunch
              is musk to my ear my thumping adrenal high is fluid as Fred Astaire. Come here I’ll take you there you’ll hear the bullets tear across the
              city square to where the body slumps and isn’t panic sweet hit music to your ears now you are its cause and occasion in the streets? Oh
              you’re a big boy now sweet sweet contamination."
        - title: The Canberra Times Review
          text:
              New, Rewarding Verse - Messages Of Things Peter Lugg The Canberra Times, 30 June 1984 These books [Robert Clark and Jeri Kroll (eds.),
              No. 8 Friendly St Poetry Reader , K.F. Pearson, Messages of Things , Jeri Kroll, Indian Movies ] tempt one to believe that poetry publishing
              in South Australia is flourishing. Pearson’s Message of Things is one of a suite of five new books launched at the Adelaide Arts Festival
              in March... Some of Kevin Pearson’s poetry appears in the Friendly St Reader . His poetry is cosmopolitan, with a special debt to themes
              and techniques employed by South American poetry. Indeed, many of the poems in Messages of Things are translations from Spanish, Latin and
              Italian. While many Australian poets freely borrow the forms and themes of recent US poetry, the impact of Spanish poetry is rare. While
              influence for its own sake is difficult to encourage, the study of other poetic lexicons can often broaden the interests of local writers.
              As a result Pearson’s poems are sometimes alien and gaunt, sometimes rich and rococo. In ‘Catullan Variations’ he has wittily transformed
              the Roman poet into an Australian idiom. He is fond, too, of the epigram, although the form appears to become his master, rather than the
              reverse. Altogether I feel that there are too many translations in this book, and not enough Pearson... Each of these three books has good
              layout and production.
        - title: The Sydney Morning Herald Review
          text:
              Weekend Books - Poetry Judith Rodriguez The Sydney Morning Herald , 16 June 1984 Adelaide’s Friendly Street Poets sets an entrepreneurial
              example to other regional publishers, by launching its books at the biennial festival. Numbers 6-10 are of high quality. All, with the exception
              of Jenny Boult’s The White Rose and the Bath , are first books. With some exceptions in the work of Kevin Pearson and Rob Johnson, they
              agree in trying for an informal fluency that will carry minutiae of description, anecdote and explanation, on to a communicative whole.
              It is spoken poetry, but there are no raised voices, though Mike Ladd and Jeff Guess most obviously register earnestness. Several of the
              books use graphics - to best effect, Eric Chamber’s photos in Boult’s book, and fine pencil drawings by Ronnie Kelly in Guess’s Leaving
              Maps . Kevin Pearson, in Messages of Things , typically has in his field of vision a still life and a reflection of and upon it. His feeling
              for poetic and philosophic tradition is appropriately expressed by his associating translations of Vallejo and Borges with Kevin Hart’s
              work in The Lines of the Hand . These and other poets are raising the difficult art of translating poetry to a level where Australian publishers
              will bring books of poetry, chosen and Englished by Australian sensibilities, to us from foreign literatures. Indeed, the Leros Press in
              Canberra has invited such manuscripts.
        - title: South Australian English Teachers Association
          text:
              Messages of Things Peter Armstrong South Australian English Teachers Association, 1984 These are four of the five new titles in the
              Friendly Street Poets series which were launched during this year’s Writers’ Week. In its eight years of existence, the Friendly Street
              Poets group has grown to be a major force in the publication of new poetry in Australia. Of these four books [ The Crack In The Crib by
              MikeLadd, Messages Of Things by K.F. Pearson, The White Rose & The Bath by Jenny Boult and Caught On The Hop by Rob Johnson] K.F. Pearson’s
              Messages of Things is probably the most demanding of the reader. In many instances, there is an indefinable ‘I enjoyed reading it but can’t
              really say what I enjoyed about it.’ Sometimes it’s the sharpness of the image, Have a motionless apple rage within its skin its hour and
              There’s an orange with a recalcitrant skin, the sting of liquid speargrass in your eye. Then precisely in the pain you are alive. the intensity
              of the feelings portrayed, To desire and desire and attain at the last is the true Kosciusko of pleasure I reckon the intellectual, and
              linguistic challenge, Firm as spidery tungsten coil, tensile, shining, strong, the impossible singing of ‘is’ I gong and gong as ‘as’. or
              simply the pleasure of recognizing and perhaps envying the skill with which these poems are wrought. I see a dual value in these books.
              As collections of contemporary poetry, and contemporary Australian poetry in particular, they are worthwhile and interesting additions to
              anyone’s book collection. Each book shows a high degree of craftmanship and imaginative skill with words. The poems reflect the writers,
              of course, and they reflect the society within which those writers are working. As a teacher, I have found contemporary collections such
              as these invaluable when placed at the heart of any serious study of Australian literature or society. If I were currently teaching Matriculation
              English, I would certainly introduce these books to my students as a possible area for extension work. Back to top Start of StatCounter
              Code End of StatCounter Code
the-history-of-colour:
    title: The History of Colour
    author: K.F. Pearson
    short_description:
        She is complete and in her beauty ’ s complete. That which is outside her face ’ s beauty is less than the sum of beauty.
        Above all a resourceful shape-shifter, the South Australian poet K.F. Pearson keeps trying, and succeeding with, different modes and pitches
        of poetry. From imitations of Polynesian chant and Arabic ghazal to a delicious satire on applying for funding, from auto-biographical sketches
        to highly worked portraits, and equally in richly rewarding examples of that intense meditation on particulars which tests a good poet by
        being so well-worked a field, Pearson displays a versatility and a freshness well worthy of the abundant life in his chosen topics.
    long_description:
        She is complete and in her beauty ’ s complete. That which is outside her face ’ s beauty is less than the sum of beauty.
        Above all a resourceful shape-shifter, the South Australian poet K.F. Pearson keeps trying, and succeeding with, different modes and pitches
        of poetry. From imitations of Polynesian chant and Arabic ghazal to a delicious satire on applying for funding, from auto-biographical sketches
        to highly worked portraits, and equally in richly rewarding examples of that intense meditation on particulars which tests a good poet by
        being so well-worked a field, Pearson displays a versatility and a freshness well worthy of the abundant life in his chosen topics.
    price: 15.95
    isbn: 0207169276
    release_date: 1991 (Angus & Robertson)
    page_count: 78
    reviews:
        - title: Quadrant
          text:
              "Reviews A Vaselined Oyster and a Serenade to Lace Penelope Nelson Quadrant, Vol. 36, No. 5, 1992 KF. Pearson’s blurb describes him
              as ‘a resourceful shapeshifter’, a phrase which dares the reviewer to try and pin him down. ‘From imitations of Polynesian chant and Arabic
              Ghazal to a delicious satire on applying for funding...’ Yes, funding applications again... The poem... can be read as reflections on love-making,
              poetry, or even the mandolin... Pearson’s lines are spare, polished and sophisticated, as befits a sharp-shooting shape-shifter. His concern
              for the aesthetic, for colour, shadows and spaces between things may be seen in many of the poems. Red, the accent colour of the cover,
              is absent from the tropical landscape of ‘Travel to an Island’ until the High Stepping Wader builds a nest topped with a red kerchief. And
              so they came to a religious love of a colour they did not have. This is a world in which a god’s a bearer of forgotten red. One poem that
              particularly appeals to me is ‘The Economy of Fashion,’ a serenade to lace, ‘a membranous slim physicality that replaces other thoughts,
              / fabric that tells of itself by an absence of itself.’ This beautifully crafted poem loses some of its lyricism in the last line when Pearson
              restates his point about absences with the highfalutin word ‘interstices’: And how shall we turn when we leave by a door knowing we worship
              interstices and not their shrill surrounds? I also like the more colloquial ‘A Letter from Mitcalfe’s Hut,’ and the delicately observant
              ‘Entrance Ceremony,’ on the custom of taking off one’s shoes at the door. Another hymn to fabric, ‘The Double World,’ about corduroy, takes
              the dual texture of piping and indents and applies it to a number of other two-edged experiences: ...Thus is a telephone cream and cool
              on a desk but you know too that other nervy telephone you’ve sat by minute by minute, quickened, awaiting its call. I have thought of corduroy
              and thought of it again. ‘The Peach, In Fact,’ a sensuous evocation of the texture, shape and taste of a peach, moves from aesthetic appreciation
              to a juicy bite and then backs away to a long shot of how it might appear in Japanese art. Like many other poems in this collection, this
              one is able to turn a subject around, presenting both experience and its observation. Occasionally, in this collection, something jars.
              (For instance, isn’t the past participle of stride stridden , not strode as in ‘For the Vanquished’: ‘Let it be said when all has fallen
              away/ you have strode naked in the full blast of air’?) Most of the poems, though, have a finished, musical quality and offer intriguing
              ways of looking at the world. I will look forward to other work by this poet."
        - title: The Weekend Australian Review
          text:
              The Elegance and the Intensity Martin Duwell The Weekend Australian, 5-6 October 1991 If Kinsella’s poetry at its best is inten­se,
              K.F. Pearson’s is elegant. Many of the poems in The History of Colou r are highly sensitive (in a way that is often called painterly) to
              objects and the way we perceive them, close to the poetry of someone like Gary Catalano. One important poem, ‘The Double World’, distinguishes
              between objects in themselves and objects as we animate them with our own concerns. Another good poem, ‘The Economy of Fashion’, concentrates
              on lace as a symbol for an art in which the centre of attention is an absence, surrounded by elaborate coruscations of decoration. Some
              of the poems lean towards a Wallace Stevens-like appreciation of context by focusing on the act of locating simple objects in their frame.
              This is true of both the marvellous first poem, ‘Leaf and Context’, and the last, ‘Ghazal of the Mandolin.’ At his best, Pearson has a great
              sensi­tivity to the visual; it is no accident that one of the best poems in the book is de­voted to the poetry of that highly visual poet
              Robert Gray. It is all extremely assured, but there is an un uncomfortable juxtapositioning of an immense meditative assuredness, so­phisticated
              and knowing, with decided awkwardnesses of syntax and punctua­tion. There is also a tendency to lapse into predictable and fashionable modes.
              The book concludes with a set of poems of Middle Eastern inspiration, remind­ing us that the ghaza l is to the 1980s what the villanell
              e was to the 1950s, and there is a set of rather Browningesque monologues. I don’t know what the Renaissance painters did to deserve it,
              but it seems de rigueur that they should appear in En­glish language poetry since Browning, pumping out dramatic monologues for all they
              are worth. Here Brunelleschi, Donatello and Uccello are put through the mill. Perhaps it is a divine punishment for their earlier lives
              that they should suffer these endless literary reincarnations. Ultimately, I am not sure how good a poet Pearson is, but I worry about the
              corruption of elegant smoothness by mo­ments of awkwardness. After all, as we have learnt from poets like Catalano and Gray, this kind of
              painterly meditation must never have rough joins or surfaces.
        - title: The Canberra Times Review
          text:
              "Sharp, Vivid Poems Explore Ideas with Almost Visual Clarity John Foulcher The Canberra Times , 24/8/91 Recent volumes of poetry by
              Gary Catalano [ The Empire of Grass ], Julian Croft [ Confessions of a Corinthian ] and K.F. Pearson clearly demonstrate that a poet doesn’t
              have to be prolific to be successful. All three publish sparsely, and these volumes reflect the quality that such a frugal attitude nurtures...
              K.F. Pearson’s The History of Colour , his first with a national publisher, is an intriguing volume. Its title is, paradoxically, both accurate
              and misleading: although it suggests visual effusion, the book’s focus lies much more in concepts than the actual detail of things. Unlike
              Croft, Pearson seems largely uninterested in painting landscapes or experience; to this end, his poem about Fiji, for instance, uses the
              landscape merely to explore his initial rumination that ‘The furious art of patience makes the coral’. The book’s first poem, ‘Leaf and
              Context’, outlines his method. In its opening lines he tells: I’ll not number the streaks of the tulip but tell of the fall from an ornamental
              vine of a tattered red leaf... ...on a crisp ironical morning. So the context, not the leaf, is where his interest lies. Though his language
              is more expansive than Catalano’s, both poets share the same emphasis. At times, Pearson’s poetry appears a little precious, particularly
              when he borrows from cultures such as the Middle East or Polynesia. More often, though, the poetry has the ability to ambush the reader
              with remarkable twists of imaginative logic, such as in ‘Horizon Walker’, where disparate images and ideas are connected with an easy sense
              of their inevitability. In all three volumes, the shorter poems are far more impressive than the longer ones. Perhaps this is further evidence
              for the late Vincent Buckley’s assertion in his introduction to The Faber Book of Modern Australian Verse that the real strength of Australian
              poetry has always been in the lyric poem."
        - title: The Newcastle Herald Review
          text:
              "Celebrant of description, awareness... Norman Talbot The Newcastle Herald, 3/8/91 This collection, by a South Australian anthologist
              and poet, has a rich front cover and an asinine blurb on the back cover. Which are readers to believe? The front uses a fine water-colour
              of a king parrot, by John Hunter (somewhere back in the Re­gency period, probably), which chimes with the title and promises alert, workmanlike,
              visual poetry. On the back, however, the blurb an­nounces that the poet is ‘a success­ful shape-shifter’ (whatever that means in poetry!)
              then seems con­descendingly to say ‘K.F. Pearson keeps trying...’. Later, it is an­nounced that Pearson writes ‘imi­tations of... Arctic
              [this should read ‘Arabic’] ghazal’. The ghazal is an elegant Persian, Urdu, Arab and Turkish form, rarely at­tempted by Eskimos, and Pearson
              obviously knows a good deal more about the matter than whoever his publishers trusted to describe him. The king parrot emphasis is apt.
              Pearson is a genuinely visual poet, at times very like Wallace Stevens, although by no means as subtle and rhetorically much stiffer. Never
              confined to the descriptive, any more than Stevens is, Pearson of­fers unusual and classy human re­actions to sight. Pearson is even sight-obsessed.
              The second part of the book is a group of dramatic monologues he calls ‘Autobiographical Moments’, all about Renaissance Florence. One comes
              from a poet, Poliziano, but he focuses on visual images; the rest are from a rich cluster of visual art­ists: Cellini, Brunelleschi, Ghiberti.
              Uccello, and Donatello. The poems in the more assorted first section are mostly visual too, including three batches of very satisfying small
              poems, under the headings ‘Stamps on Metal’, ‘A Set of In­teriors’, and ‘Cameos’. Even his superficially tactile ‘Stamp’, perhaps intended
              for a gravestone, can be seen: Elegiac: I remember the touch of porcelain but then also the fur of the peach. In the third section, Polynesian
              in inspiration (this poet is a devoted traveller, obviously), two similar groups of tiny poems are less successful. However, two larger
              poems show a different range of ability. There is a warm and harmonious feeling for narrative in his retelling of two ancient tales of watery
              heroines: Ginifale, who was swallowed by a whale, and Hinemoa, that in­trepid Juliet of Lake Rotorua. This section also offers a chilling
              contem­porary epitaph for all of us, based on R.L. Stevenson’s superb epitaph for himself on Mount Vaea. The fourth section is back with
              the visual, even to having some tan­gential and offbeat Stevensian titles such as ‘The Eye Does Make it So,’ ‘The Peach, in Fact’ and ‘A
              Thing is Event in a Ready World’. All celebrate what ‘the sensitised see’, and alertly too, whether as fact or ‘abstract canvas’. Like his
              thread of spider-web, Pearson’s awareness takes as nothing bigger is able the light and sparks oc­casion in surrounding dark for the casual
              poem. But, as this quotation exempli­fies, sometimes a swoon of syntax creates obscurity where only observation was promised or needed.
              And they are not, like ‘Artic’ on the back cover, misprints. The least successful part of The History of Colour is the Arabic sec­tion that
              ends the volume. First, the verse-forms are not. in these versions, satisfying, especially those where a word is rhymed to itself ('rime
              riche’). I wonder why Pear­son rarely attempts orthodox rhyme? Second, there is no good reason why ‘Inscriptions on Arabic Coins’ should
              include koori-style ad­vice about dreaming the mulloway. Third, the key poem of the section seems to me to be spiritual preten­sion. Is
              a glimpse of an orange in a stranger’s room an equivalent to Paul’s experience on the road to Damascus, no matter how it hangs on in the
              mind’s eye? If so, what a testimony to the sacredness of the purely aesthetic! But the seanng absolute of Paul’s experience is beyond glimpses
              and oranges. But wait. A review of a poet de­voted to real particulars should end positively. Poetry has plenty of room for grateful poets,
              celebrants of description such as K.F. Pearson, who makes readers enjoy - and ask more of - their own awareness of what is around them."
        - title: Australian Book Review Review
          text:
              "Poems Fraught with Shade Ron Pretty (poet) Australian Book Review , No. 133, 1991 ‘The one who would know everything’, I wrote, ‘is
              everywhere at home; nor is a stranger to the past.’ A letter to Donatello One of the strengths of this, K.F. Pearson’s second collection,
              is the range of the poetry it contains: both geographical - from Adelaide (and suburban Adelaide at that) through Polynesia to the Arabian
              Gulf; and historical - moving between the present and Quattrocento Italy. The most impressive poems in the book are undoubtedly those in
              the section ‘Autobiographical Moments’ in which he explores Renaissance artists and writers. These are poems of considerable interest and
              ingenuity, for not only does Pearson create a fine sense of the era, but he also finds, in the lives and concerns of these artists, many
              issues of contemporary relevance. In ‘Fragment of an Autobiography’, for instance, Cellini discusses the reworking of ancient artefacts
              in modern form and using modern materials; in ‘A Circle in Florence’, the need for lateral thinking (I had thought the story of the egg
              made to stand on its end was attributed to Columbus, but never mind); in ‘The Origin of Excellence’ it’s the need for training, for ‘true
              apprenticeship’. ‘An Application for Assistance’ picks up on the most longstanding of issues - that of patronage. ‘Since my poems and inspiration
              I’ve acknowledged to you, Medici’, Politian writes, ‘and my every talent is at your service / ...send your clothes as a gift to me at once’.
              Fairly blunt. I was reminded of the controlled invective of Samuel Johnson writing to Lord Chesterfield. Although there are good poems elsewhere
              in The History of Colour , no other section achieves the sustained high standard of ‘Autobiographical Moments’. Nevertheless, there is considerable
              poetic ability on display. Poems such as ‘Port Elliot Magpie’ or ‘Entrance Ceremony’ are made notable by Pearson’s sharp eye for detail.
              There are many shrewd observations: for fishermen, ‘the horizon (is)... the pinnacle of desire stretched flat’. A number of poems are enlivened
              by subtle touches of humour. The voice that runs through these poems is a colloquial one, though he often successfully contains this voice
              within poems of heightened rhythm and controlled structure. A poem such as ‘Ginifale’ demonstrates Pearson’s range, with its evocation of
              the Polynesian myth, the control of tone and the neat parallel of the whale to the pregnant woman. But balancing these considerable strengths
              are a number of weaknesses that tend to mar one’s appreciation of the collection as a whole. Some of the poems here feel to me as if they
              need more work. The perceptions and the inventiveness are there, the ability to see the everyday world from new perspectives, but some suggest
              that the poet has been too easily satisfied. A number of poems have benefited from being workshopped, or at least looked at with the eyes
              of a critic. In ‘Of the Critic’ Pearson denies the value of such people, suggesting at best, a ‘shadow glory’. I would suggest, however,
              that a critic’s eye before some of these poems went to press would have strengthened them considerably. For example, ‘The Death of the Bird’
              recalls A.D. Hope’s poem of the same name, and that comparison underlines the extent to which some of Pearson’s poems are under-developed.
              In The Cave and the Spring , Hope discusses his poem, and mentions the fact that it took him four years to complete (some of his poems took
              much longer). He began the poem, Hope tells us, but could not see how to finish it, so he put it aside. When he came back to it four years
              later, the missing conclusion suggested itself fairly promptly. Pearson’s poem, like a number of others in his collection, might well benefit
              from such time to mature. The weaknesses in such poems include an over-reliance on modifiers (‘A Drum This Time’, ‘Sea Urchin Shell’, ‘Tiji’;
              a reliance on abstractions and /or rhetoric (The Economy of Fashion’, ‘Tour Glasses’ or ‘A Thing is Event’); line endings that seem arbitrary
              (‘A Touch of Green’, ‘The Eye Does Make It So’ or ‘The Peach in Fact’). There are also occasional lines which remind one of a New Statesman
              competition in the way they state the obvious: ‘the river still moves at a watery pace’, The scarlet anemone will not be like the settled
              / world of blue plates on a dresser’ or ‘When the fish begin to swim, the fish begin to swim’. Some of the poems are very slight: ‘Stamps
              on Metal’, ‘Island Suite’, ‘ A Feather’ among them. Sometimes you leave these slight poems with a sense that there is nothing more to say,
              that the poem is as complete as a Japanese Haiku. More often though there’s the unsatisfied sense that the poet has barely scratched the
              surface. The title for the collection comes from ‘An Urn in a Private Collection’: But the history of colour is fraught with shade, and
              the time of day, the turn of the earth) and recession of removal’s not complete, if that underlying cerulean, sky-subtle tones beneath the
              glaze’s skin, veined by your regret that the world’s constructed thus, partly kindles the original blue. This poem demonstrates many of
              the strengths and weaknesses of the collection as a whole. Here is the eye for detail, the sense of relevance of the past to the present,
              the colloquial voice that works quite effectively with the heightened rhythms of the verse. But here also are the abstractions, the over-dependence
              on modifiers, the resort to rhetoric which tend to attenuate many of the poems."
        - title: The Sydney Morning Herald Review
          text:
              "An Island in the sky - poems of the artist as observer Heather Cam The Sydney Morning Herald , 22/6/91 Although utterly distinct, all
              four poets [K.F. Pearson, The History of Colour , John Foulcher, Paper Weight , Gary Catalano, The Empire of Grass , Tim Thorn, Red Dirt
              ] are centrally concerned with the artist as observer. K.F. Pearson is the most strikingly visual. Much of The History of Colour depends
              on an acutely developed talent for noting and organising particulars in a revelatory fashion: When you are come to love the world it’s numinous
              with single things: you have the flight of one white bird in all an Island blue of sky. Often, Pearson’s strategy is to contemplate (if
              his fierce, often philosophical, concentration can be so described) some one thing. Yet every single thing ‘carries always the freight of
              what / it connotes’, hence Pearson’s ‘double world’. For the space of the poem the observer obsessively possesses, and is possessed by,
              the inspiring particular thing: its details, shape, texture, colour and context. The poem’s focal point may be a red leaf or a pine table
              in a red-bricked backyard, an orchid in a terracotta pot, a purple guava in the sunlight, a blue feather in a jar, or a kitchen chair. In
              the section ‘Autobiographical Moments’, a gallery of Renaissance artists speaks in dramatic monologues, petitions and letters. Here the
              apparent focus is the Quattrocento Masters, but clearly its double is the contemporary Australian artist. For example, a petition to the
              patron Lorenzo de Medici serves as the poet’s wry acknowledgement of a grant from the South Australian Department of the Arts. Pearson’s
              work is intensely focused, controlled and commanding; his language is enlivening and his vision lush."
the-apparitions-daybook:
    title: The Apparition’s Daybook
    author: K.F. Pearson
    short_description:
        K.F. Pearson’s fourth collection is exuberant departure from his earlier work. This book-length lyric sequence creates the
        equivocal inviting figure of the apparition. Precariously, he only exists when perceived.
    long_description:
        Come be the voyeur of my life, see what I do, both by day and night and we will, by desire alone, invent the paths we walk
        along. K.F. Pearson’s fourth collection is exuberant departure from his earlier work. This book-length lyric sequence creates the equivocal
        inviting figure of the apparition. Precariously, he only exists when perceived. No shrinking ghost or pallied figment, the apparition, unapologetically
        sexy, urbane and worldly wise, slips through the seams of the social world. His is the voice of gaps and absences. He may be imageless in
        a mirror but his wounded intelligence gives him dynamic and outline. His spirit is provocative and his thought shapely. A wit Marvell would
        have welcomed. Susan Hancock - Easter Monday, 1996 A brilliant device... A teasing, cavalier game of negatives such as Beckett might have
        enjoyed. Critical Survey (United Kingdom)
    price: 19.95
    isbn: 0646240498
    release_date: "1995"
    page_count: 50
    reviews:
        - title: Critical Survery Review
          text:
              "Reviews The Apparition's Daybook Matt Simpson Critical Survey (UK), Vol. 10, No. 1 1998 I approach K.F. Pearson ’ s The Apparition
              ’ s Daybook with some suspicion after reading the blurb. The quatrain printed there did not augur well: Come be the voyeur of my life, see
              what I do, both by day and night and we will, by desire alone, invent the paths we walk along. nor the fact that the book is dedicated to
              the person who is quoted recommending it with ‘ A wit Marvell would have welcomed ’. The further discovery that Kevin Pearson and Gail Hannah
              who designed the cover are in fact the publishers did not help. To risk a pun, I was dispirited. But I was deceived. This is in fact a very
              engaging collection or, more precisely, it is what Australians call a suite of poems, one which subverts cognito, ergo sum to I am, but
              you don ’ t think . It invites its readers into a wittily and cleverly sustained metaphorical world of being/not being, in which insubstantiality
              is made palpable in a series of soliloquies. These are uttered by a ghost, the apparition of the title, who plays a teasing, cavalier game
              of negatives such as Beckett or W.S. Graham might have enjoyed. This is defamiliarisation with a vengeance. The sense of non-being paradoxically
              creates an exquisite awareness of being, so that, in the end, one is able to read the poems, for all their playful, dandified literariness
              and intertextuality (the range of forms deployed, the seventeenth-century anthology titles His Aubade , His Rival , His Prohibition etc.)
              at least on one level as love poems. The Apparition ’ s soliloquies are themselves haunted by ghosts: the ghosts of literary forms (sonnets,
              villanelles, epigrams etc.) and those of Aubrey, Waller, Traherne, Marlowe, Raleigh, and the madrigalist Thomas Bateson. I also get a sense,
              rightly or wrongly, of Ted Hughes ’ s Crow perched somewhere overhead. It is a brilliant device. There are freedoms ghosts can exercise
              that are denied to mortals. They can observe without being observed, speak without being heard (except paradoxically when we read their
              one-way-mirror poems); they can enjoy (and suffer) separation; and they can be in time without being of it, even if, as these poems continually
              insist, they are dependent upon the existence of others ’ perceptions for their existence or only come into existence in the act of naming:
              But, like the name of god that can ’ t be said in certain religious persuasions, I endure a censorship I can ’ t say ‘ we ’ , or ‘ us ’
              . It is a delightful Puckish game Pearson plays. It would be interesting to see his three previous collections."
        - title: Famous Reporter Review
          text:
              The Apparitions Daybook Elizabeth Winfield Famous Reporter , No.15 - 1997 K.F. Pearson’s The Apparition’s Daybook is a book to be sipped
              like wine. The tone is a dry red. There comes a time in life when ‘Your chimera will doubt its own dimensions.’ If a child makes a fish
              from clay, treasures it, then gives it to you, would you paint a tear beneath its eye for joy or sorrow? This is a book for asking questions
              of what makes life more than an apparition. The poet’s role is as messenger, the truth-teller, like the angels of times past (‘His Family
              Tree’). ‘Come be the voyeur of my life, / see what I do, both day and night / and we will, by desire alone, / invent the paths we walk along.’
              ‘We see the wind when leaves move on a tree.’ Perhaps we are only more than apparitions when reflected / recognised by ‘significant eyes’.
              The gentleness of metre and rhyme are like the caress of a murmering brook. ‘To reach across / and touch a face / suffused with light /
              was just a thought. / I’m conscious now. / I think unseen’. A book that lingers like longing.
        - title: Australian Book Review Review
          text:
              "A Sort of Liberation - The Apparition’s Daybook David McCooey (author) Australian Book Review , No. 186, 1996 Poetry often seems to
              be about collapsing apparitions, haunting moments. These books [Shane McCauley, Shadow Behind the Heart , David Rowbotham, The Ebony Gates:
              New and Wayside Poems , K.F. Pearson, The Apparition’s Daybook ] are largely about shadows, apparitions, and the inglorious dead... A different
              shadow (or is it?) is at the heart of what is, for me, the most sustained and interesting work in this group of books: K.F. Pearson’s The
              Apparition’s Daybook . As with the earlier The History of Colour there is a variety of rhyme and stanza form used, but this work has a unified
              purpose, centring on that shadowy figure, the apparition, who doesn’t exist unless perceived. Pearson is a fine rhetorician, employing various
              linguistic sleights of hand: the pun, zeugma and so on. The first poem tells us to ‘first study his brother smoke’: ‘To map the ways of
              smoke you’ll need / ...the patience of Job or the jobless’. But Pearson is more than just a trickster. These poems tease away at the mind,
              but they have a lightness which is the lightness of smoke, not hot air. Like Marlow’s tale in Heart of Darkness , meaning here is not a
              nut in its shell to be cracked open, but rather the light which allows the smoke to be seen, ‘as a glow brings out a haze’. The world of
              the apparition is that of the café, the restaurant, the bed and other sites of urbanity. (‘Daybook’ means not only diary but also has the
              mercantile meaning of a sales book. These poems, then, suggest the shadow’s transactions with the real world.) The most sustained pun is
              with spirits, the kind one drinks. In ‘He Has a Gin and Tonic’ the obligatory mirror behind the bar appears not to reflect the poet and
              his friend (a photographer) until they realize that in fact there is a real mirror-image bar behind the bar they are in, a kind of drinker’s
              through-the-looking-glass nightmare. In ‘His Cocktail Cabinet’ all the spirits look like water - gin, vodka, ouzo, white Sambuca, vermouth
              - which in turn look like glass. The apparition’s affinity is made clear in ‘His Virtue’: ‘I have a close affinity with glass; / fragile,
              of course, and it can be seen through’. However, it is not simply a matter of seeing through this poem-sequence. The significance of the
              apparition is far from simple. The apparition could - as in Kevin Hart’s Your Shadow - be a memento mori , artfully figuring mortality.
              Or it could be an image of the poet’s craft itself. Poems, like apparitions, are moments we must glimpse to bring into being. This seems
              all the more apposite when one considers the parodic, intertextual nature of the sequence. The collection is literally haunted by the apparitions
              of others: Traherne, ‘The Passionate Shepherd’ , Stevens’ ‘The Emperor of Ice-Cream’ and so on. These uncanny moments in which we intuit
              the apparition are the dream-like moments necessary for poetry: ‘for as you saw the shadow cast its shape, / your big imagination gave a
              leap. / Shadow, or him, or figment of desire, / salute the thing that brought the shadow there’. The reference to desire and sex and the
              inescapable references to death suggest that shadows and poetry are things which point to that moment which is either a moment of loss or
              ‘a sort of liberation’."
        - title: Social Alternatives Review
          text:
              "The Apparition’s Daybook Lisa Catherine Ehrich Social Alternatives, Vol. 15, No.4, 1996 The Apparition’s Daybook is a refreshing, original,
              sometimes witty, but most of all very touching anthology of verse. As the title implies, the protagonist is none other than an apparition:
              a ghost or non-entity who desperately seeks to re-experience the delights of love, intimacy, and humanly reaching. The apparition is an
              instantly likeable being. He is intelligent, sensitive and misunderstood. His vulnerability is aroused in several of the poems that speak
              of his loneliness. In ‘His Song’ he describes his inescapable condition; he is invisible to all except those who are willing to acknowledge
              that he exists. Two key lines are: No body could think to hold what is not in the world (pg. 2) The sad and sorry situation is that the
              apparition’s attempts of being-with-others are thwarted at every turn. ‘His Song’ reminds us that it is through authentic relationships
              that it is possible to come to know and define who we are. The theme of needing another in order that he can be is echoed in several other
              poems (eg. ‘His Epitaph’, ‘The Politics of Appearance’; ‘His Fairy Tale’). For the apparition, however, he is powerless (‘The Slides of
              his Trip’), dismissed (‘His Social Style’), forgotten (‘A Viewer Scorns Him in the Words of Spanish Poet, Pedro Salinas’), unable to use
              inclusive language like ‘we’ and ‘us’ (‘His Prohibition’), and above all, lonely (‘To an Answering Machine’; ‘In Broad Day’). The apparition
              longs for human contact and this is underscored in ‘Occasions of Eyes’. The fourth stanza says: but now, in the meantime, our short present
              tense, significant eyes, which a moment take ours, pleasure our days, and reduce us to tears. Today, when I look may I meet with a glance
              (pg. 45) The final poem, ‘Exit’ whispers of a flickering of hope for an interlude: My welcome short I’ll make my flight. But give your word
              And I’ll abide (pg. 50) In ‘One thing’ the apparition wishes to be seen by a particular person. He is ready and waiting for a sign. One
              cannot help but hope it comes soon. Although a great deal of K.F. Pearson’s poems speak of the solitude and pain of non-being, he manages
              to interject several animated and witty poems in this anthology. For example, in ‘He refuses Tickets to Phantom of the Opera’, the apparition
              prefers the state of non-existence to the option of attending Lloyd Webber’s Phantom . In his view, the music is boring. (One would have
              thought the apparition may have been comforted by a story about a fellow phantom, ostracised by society and in need of love!). The other
              poem I found humorous was ‘His Meteorology’ which highlighted the practical problems of being an apparition living in rainy Melbourne. ‘He
              has a gin and tonic’ is another light hearted look at ghostly (non) existence. The power of K.F. Pearson’s verse is its ability to evoke
              both tenderness and pathos. His work reveals a deep and sophisticated insight into the human condition and this is reflected in the apparition’s
              quest for authenticity in human relationships. In summary, I would have no hesitation in recommending Pearson’s The Apparition’s Daybook
              . Unlike the nature of apparitions, the verse will make a lasting impact on its readers."
passion-war:
    title: Passion & War
    author: K.F. Pearson
    short_description:
        Passion & War; A Flamenco Libretto is a work of great simplicity, terror and hope. It dramatizes the human events and consequences
        of the Spanish Civil War. K.F. Pearson knits his translations of Spanish poets of the time (Juan Ramón Jiminéz, Frederico García Lorca, Miguel
        Hernández and others) into a narrative of the war. Each poet is a separate character. Their ringing words reach out to us now. Passion & War
        is a plea for peace, understanding and civic co-operation. I found myself moved by your translations and evocations of those Spanish Civil
        War poets, many of them dead so young, and I was intrigued by the way you stitched their poems together into a grand AIDS-like quilt with
        the threads of your own lines - a book both original and yet within the tradition of homenajes which has been explored more in Spanish than
        in English. John Ridland (US academic and poet)
    long_description:
        Passion & War; A Flamenco Libretto is a work of great simplicity, terror and hope. It dramatizes the human events and consequences
        of the Spanish Civil War. K.F. Pearson knits his translations of Spanish poets of the time (Juan Ramón Jiminéz, Frederico García Lorca, Miguel
        Hernández and others) into a narrative of the war. Each poet is a separate character. Their ringing words reach out to us now. Passion & War
        is a plea for peace, understanding and civic co-operation. I found myself moved by your translations and evocations of those Spanish Civil
        War poets, many of them dead so young, and I was intrigued by the way you stitched their poems together into a grand AIDS-like quilt with
        the threads of your own lines - a book both original and yet within the tradition of homenajes which has been explored more in Spanish than
        in English. John Ridland (US academic and poet)
    price: 19.95
    isbn: "1876044004"
    release_date: "1995"
    page_count: 62
    reviews:
        - title: Southerly Review
          text:
              "Writer and Reader - By the Sea: Some Recent Australian Poetry David McCooey Southerly The second ‘experimental’ collection [after Jennifer
              Harrison , Graham Henderson and K.F. Pearson, Mosaics & Mirrors ] is also by one of the authors of the ‘composite poems’, K. F. Pearson.
              Passion & War is described as ‘A Flamenco Libretto for voice, guitar and dance, incorporating the author’s translations from the Spanish’.
              Judgement of the ‘libretto’ alone must be partial. However, Pearson gives few clues as to how the piece would be performed (or even whether
              or not it has been performed) which suggests that he feels the work can stand on its own. Though the publishers claim that the work ‘knits...
              translations of Spanish poets of the time... into a narrative of the war’, the Spanish Civil War remains more of a ghostly outline, since
              the sense of narrative can only be marginal at best when the work concentrates on the extraordinary imagistic Spanish lyric poetry of the
              time. Poets translated include Juan Ramón Jiménez, Federico Garcíia Lorca, and Miguel Hernández. While Pearson’s original material which
              binds these poems together is sometimes laboured, many of the poems themselves are arresting in their simplicity. An image of the dislocation
              of the war is presented by Antonio Machado: ‘You will sleep many hours / yet on the old shore, / and one fine morning find your / boat moored
              on the other shore’ (‘The clock struck twelve...’)."
        - title: Herald Sun Review
          text:
              "Poetry among ruins - Alan Wearne reads the pain of Spain Alan Wearne Herald-Sun , 4/11/1995 This is a suite of Spanish lyric verse
              in translation. Linked by a quasi-narrative, and originally written to be accompanied by flamenco guitar and dancer, the poems chart the
              years leading to the Spanish Civil war, the war itself, and a few aspects of its aftermath. The poets K.F. Pearson chooses include Jimenez,
              Garcia Lorca, Machardo and Hernandez. Of these, Garcia Lorca is probably the most well-known in Australia: his poetry and plays are available
              in most literate bookshops, his murder by the fascists is one of the century’s great symbolic crimes. But then, once the Civil War was underway,
              these poets became well aware that to a monolithic ideology and regime, they and their achievements counted for very little. Like their
              Russian contemporaries Akhmatova, Tsvetaeva, Mandlestam and Pasternak, they lived in the knowledge that the penalty for being who they were
              and what they wrote could be death. Exile might have been an option, of course, but exile due to ideology and/or a regime is a lot different
              to wanting a change from the supposed provincialities of Melbourne or Sydney. What the Spaniards and the Russians suffered puts in a wonderful
              relief those whingeings about the Australia Council by certain of our over-rated bardic blowhards. Indeed, for any Australian writer bleating
              about their lot in life, how the lack of national appreciation puts their profile on a par with, say, lacrosse players, I’d have them read
              every available biography of these writers, paying close attention to the conditions under which their verse flourished. K.F. Pearson is
              to be thanked for this homage to these writers. The sheer love of his work comes across formidably. If the poems seem to be colored with
              a consistent seriousness, it is because they are products of consistently serious years. Perhaps Pearson’s linking verse is a little too
              declamatory at times, though this hardly detracts from the book’s laudable ambition. A more major criticism might be that there didn’t seem
              to be a sufficient difference in tone between each of the writers under translation. If this is true, however, one does receive a word portrait
              of a nation consumed by civil war; perhaps it is Spain, or at least the translator’s vision of Spain, which is speaking: a not inconsiderable
              piece of imagination."
        - title: ASN magazine Review
          text:
              Passion and War Alan D. Laslett Ash Magazine Kevin Pearson's translations and his ability to pick up the essence of feeling, evoke the
              mood and convey the nuances of emotion and give them meaning in a language not originally intended. His translation of the Miguel Henandez
              poem 'Waltz of Those in Love and United Forever' is controlled and sensitive. Juxtapozed with the sensitivity of those first lines They
              haven't ever left the orchard of their embrace is an external threatening violence represented through 'rancorous hurricanes', 'inflexible
              lightning', shipwrecks, torment and oppression. Basically, I gue3ss, the simple message is that love surmounts all storms and aggtression.
