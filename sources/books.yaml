    reviews:
        - title: Sunday Star Review
          text:
              "Reviews Perils of life in the danger zone Joy Mackenzie Sunday Star (New Zealand) It takes good timing to find the gap, between the
              regiments of red and green. When you hit it right, you know. Susan Hancock’s short story ‘Windsong’ (published here in her first collection)
              won the Sunday Star Short Story Competition in 1994. The story is an impressionistic one about a boy’s disturbance at his parents’ separation.
              The bereft but enduring deserted wife is a recurring theme in Hancock’s stories. A spectrum of emotions are depicted without overstating
              the anger or frustration of those left behind. In ‘The Porcelain Face’, she adeptly portrays the bewilderment of a child. ‘I hate the whole
              weld ,’ the child says. ‘And I hate all the planets.’ The same characters inhabit many of these stories: the abandoned wife Anna, her child
              James, her sister, her brother, a best friend. Anna is mostly a protective mother. In one sense she reassures her son by recounting the
              time he heard a ‘dangerous noise’ in his room which she thought was a blowfly behind his skirting board. ‘Until I saw the little puffs of
              smoke’, she says. ‘And it made me think maybe there was a little tiny dragon down behind your skirting board, but it was really an electric
              wire So you were quite right all the time, it was a dangerous noise.’ On another occasion Anna is not so comforting. Noticing her child
              ‘shivering and pallid’ in the shallow end of a swimming pool, she is suddenly distressed at their predicament. ‘Oh get out of the water
              you ghastly little wimp,’ she says. ‘God, why couldn’t I have had one ordinary, cheerful child instead of you? It’s not my fault your father’s
              left… and there’s nothing I can do to make it better, so just remember that.’ Often a character gains a flash of enlightenment. In. the
              title story, an idle comment from the female narrator about moving in with her lover and his wife elicits his response: ‘You are a fighter,
              aren’t you? You’d do anything for me.’ His presumptuous remark illuminates the situation and the woman realises she has fallen out of love.
              She likens her situation to that of driving through the amber light at a crossroads: ‘That’s my favourite time, sailing across the gap between
              red and green; it takes good timing to find the gap, the place of pause in between the two regiments of red and green, and when you hit
              it right, you know.’ This is stringent writing, with darkness and lightness of mood conveyed by realistic dialogue and detailed descriptions
              of landscape (New Zealand or Australia, where Hancock now lives). Art is an important component, and it is fitting that Hancock has chosen
              Colin McCahon’s painting The Angel of the Annunciation for the cover of her first book. Hancock’s characters are credible and her writing
              is vivid and technically assured. I look forward to reading more."
        - title: Imago Review
          text:
              Sailing Through the Amber Helen Horton Imago , Vol. 9, No. 2, winter 1997 Sailing Through the Amber is a collection of stories where
              the main characters are trying to find their own identities. ‘I went around being all the different people that I was’ (pg. 44) is the crux
              of their dilemma - they come across as divided souls, drifting through the segments of their lives, some of which are crisis points. Anna,
              who figures in several of the stories, is trying to cope with being left by her partner/husband with a small child. Equally tenacious is
              the drawstring relationship between woman and child - it surfaces in dreams as well as the action. The stories give a strange feeling of
              the protagonist standing aside and watching/analysing at the same time as taking part in the action, more often than not when this includes
              the resolution of a love situation. The philosophy is contained in the last sentence of ‘Behind the Glass’; ‘if you live where you don’t
              belong,’ you are either ‘imprisoned, or on the outside - behind the glass.’ Even the secondary characters are tainted with this sense of
              not quite reality living, such as the brother who at the end of the title story ‘goes off to his room, that place of mystery, of listening.’
              (pg. 66). While most of the stories are of women in this state, ‘Windsong’ is of a child, a boy, who drifts in the limbo of a broken home.
              The final story is an attempt to come to terms with this identity problem associated with restlessness of spirit that pervades all the stories.
              Here the wanderer, having re-entered for a while the place of her roots, is assured by a sister that there will always be somewhere for
              her to come home to. There is a cohesive tone to the whole collection; the stories not only have inter-related characters, they are written
              in the same style, with a mix of perception of detail and imagery that create the atmosphere and scenes well, while interspersed with tight
              and relevant dialogue.
        - title: Overland Review
          text:
              "Intensified Moments Joe Hill Overland , No. 146 - 1997 While Hampton’s streets are punctuated by silences of strangeness in Letters
              to Francesca [Richards], the spaces of Susan Hancock’s stories in Sailing through the Amber are filled with the sombre quiet of waiting
              and knowing. She describes air and light as if they were water and her silences flow like liquids into lives weighed down by failing relationships,
              displaced childhoods and mid-life crises. Sadness, loss and emotional rebirth are recurring themes. Hancock’s stories are compellingly human:
              she takes us close to the warmth and drama of family life, close to the lovers and children around whom her stories swim. Although dense
              with emotive concerns, her prose remains open and considered throughout. In ‘Rubaiyat’, sisters Louise and Lyddie share the task of sorting
              and discarding their dead father’s belongings. We connect with them, not because they tell us about the intensity of their feelings, but
              because we can observe it, in the understated details of their actions and the corners of their everyday worlds. In this way Hancock’s narratives
              focus on the internal workings of characters’ lives without needing to overstate or explain the mechanics. There is easy movement into abstractions;
              from concrete details of households and holidays into shimmering translucent metaphor. The simple acts of cleaning a window or repairing
              a vase frame the traumas and joys of rebuilding and rediscovering complicated lives. Travelling is also important, as both a metaphor for
              framing emotional change and a narrative device for intensifying and concentrating action. In ‘Behind the Glass’, a car trip through wet
              New Zealand hills plays out the drama of a broken marriage and the difficult consequence for a mother and her son. Travelling, or simply
              arriving, or leaving, is also a way of touching family roots and cultural heritage. Hancock is a New Zealander by birth, and it is when
              she returns to New Zealand in her stories that she is most engaging. Here we read through her finely tuned empathy for a history and a landscape,
              and it is here too that the gentle rhythm and keen visual and emotive sensitivities of Sailing through the Amber are at their most potent."
        - title: Listener Review
          text:
              "Go into freedom - Sailing Through the Amber Anne French Listener [New Zealand], 29 March 1997 Here is the loving attention to detail
              that most women lavish only on their closest friends. Susan Hancock: intimate, tender, revealing, true. You can keep your Emilies and Kirsties
              and Rosies. For my money, Susan Hancock is our most exciting cultural export for years. Susan who? Let me explain. She is a New Zealander
              who has spent a while (years? a decade? more?) living in Australia. Until a couple of years ago, she taught at La Trobe University in Melbourne.
              And she can write. Several of the stories in this collection have won prizes; and most of us haven’t heard of her. She is so good that pretty
              soon the Aussies will start pretending she is theirs. But she is definitely one of us. There are little signs all over the stories. ‘It
              is a strange country for insects, Lewis and I agree. Piles of ants like old tea-leaves lie heaped in comers...’ ‘I wonder if they’re living
              somewhere like Rotorua where all the cloud shadows have a yellow underside as they fall down the long heights of the light, and the air
              over the baking pine forests that stretch for miles is electric and dead.’ ‘I think we needed to come to Australia just so we could step
              far enough back to get our own place in focus, the way people who are long-sighted have to do.’ Hancock has a blood-hound’s nose for the
              traces of emotional complexity. She writes about women and their relationships (with their children, their lovers, their ex-husbands, their
              friends) with the loving attention to detail and to meaning that most women lavish only on their closest friends. The whole collection,
              once you’ve read and reread it a few times, is like a weekend of conversations with people you’ve known for 20 years: intimate, tender,
              revealing, funny, true. Hancock is brilliant with the particular, building up characters and situations by tenderly and suggestively laying
              down detail after detail, but she keeps a steady eye on the general case as well. (‘It is a strange world of women that I belong to now.
              Some of us have children; not many of us have men. We all have delicate names - Alison, Laura, Rose - fragile, elusive names our mothers
              gave us for the men we never met.’) She has a great ear for dialogue and damning admissions. (‘He looked at her with a kind of cold patience.
              ‘Children don’t need to live with both parents,’ he said. ‘Look at me - I haven’t even seen my father since I was four.’ She looked.’) She’s
              succinct. Her prose is vivid, pungent and subtle. The title story, ‘Sailing Through the Amber’ is a little masterpiece. It begins with a
              woman, and an argument, and a dream. It seems to be about the woman having dinner with her married lover, and falling out of love with him
              between one sentence and the next. ‘He bends his face very low to the plate when he eats, so that his eyes seem to ride up in his forehead
              and his gaze becomes suspicious, like a wombat I once frightened...’ Not until the last few paragraphs does the real subject reveal itself:
              it’s not the emptiness of the present love affair that’s significant, but the narrator’s realisation at the beginning of the story that
              ‘all the time I’m pretending that I’m happy again and that I’m not missing the other man, the man that I’ve lost’. The metaphor for that
              loss is timing the traffic lights, sailing across between green and red. ‘...Sailing through the amber, I call it, because as you take off,
              through all the warning signs, the moment you cross the grid you go into freedom. The Greeks called it chiasma, the place of absence at
              the centre of a crossroads, the gap that none of the four roads enters; a dark space in the middle of the night.’ Susan Hancock’s publishers
              can’t proofread for toffee. The binding is cheap, and the McCahon on the front has been crudely cropped and given a nasty orange cast. But
              Hancock writes like an angel. Treat yourself."
        - title: New Zealand Books Review
          text:
              "Fiction - Sailing Through the Amber Janet Hughes New Zealand Books , Issue 26, Vol. 6, No. 5,1996 The title of Susan Hancock’s volume
              of short stories, Sailing Through the Amber , strucks me as a welcome change from cryptic single words and the opening story bore out its
              promise of lyricism amply. ‘Mollie’s Windows’ is lyrical, lucid and disconcerting. It traces the emotional curve of a day in a woman’s life,
              using light on, in and through windows, as a correlative. There is a complex symbolic traffic between the intensely vivid imagery and the
              woman’s psyche. The light figures as cause and effect, projection and influence, image and medium; her state of mind is reflected and affected,
              colours and is coloured. The storyline is exiguous. We learn a little about Mollie’s circumstances, watch her wash her windows in a sunny
              mood, learn a little about an old acquaintance she meets at the pub. There is just enough said and seen to discompose Mollie’s humour and
              worry us. We know enough to fear knowing more, and our understanding is reinforced by the negative transformation the imagery takes as she
              walks home, and tries to shut out the light of the moon. That is all. It is an exquisitely crafted story, calling often on resources more
              common in poetry than prose, with a formal elegance at the opposite end of the spectrum from [Raewyn] Alexander’s also poetic language [in
              Fat ]. The imagery renders elusive permutations of mood concrete and intelligible. The minimal action is thought-provoking and open-ended
              but not baffling or cryptic. Most of the stories deploy similar resources in differing proportions: striking visual imagery; fractured relationships;
              lyricism; fragmentary dialogue; loose or open ends. Many of them can stand proudly in the line traceable back to Mansfield, though few combine
              the elements quite so lucently and elegantly as ‘Mollie’s Windows’. And some left me feeling frustrated or baffled. One such was the title
              story and the title itself bears upon my irritation. I misunderstood it. Out of context, I took it to refer to mood, a cruisy sense of moving
              easily through a benign, enchanted atmosphere like the golden light in the McCahon on the cover. An so often Hancock’s imagery colours the
              very air with projected mood - in ‘Mollie’s Windows’ it is sky-blue with heat, good humour and birdsong. But I had it wrong, I discovered
              when I read the story. It was about traffic lights: ...sailing across the gap between the red and the green... sailing through the amber,
              I call it, because as you take off, through all the warning signs, the moment you cross the grid you go into freedom. The Greeks call it
              chiasma, the place of absence at the centre of a crossroad... a dark space in the middle of the night. And I continued to understand imperfectly,
              not just because our traffic lights don’t show amber before green as Australian ones do [in fact Australian lights show amber before red,
              not before green]. My problem was with the obscure, teasing connection between the metaphor and the fragmentary action. Sometimes Hancock’s
              rich imagery fills the air and colours the light till they are no longer transparent and all that is illuminated is the character’s or narrator’s
              mood. Reading these stories felt a bit like navigating something thick and syrupy, warmly glowing but ultimately a hindrance to progress.
              Amber, perhaps? Some of these stories I think suffer from an excess of refinement or sophistication; they ask a lot, perhaps a little too
              much, of the reader. At times they made me think longingly of the way Poppy in [Raewyn Alexander’s] Fat projects her subjectivity on to
              everything but in a way that defines what it bounces off, like radar. The reader doesn’t have to feel trapped in her often frankly distorted
              perception, like an insect in amber. Hancock’s stories demand effort from the reader but at least they do not make one feel got at. They
              maintain a cool distance, where so many short stories resort to tricks to manipulate our sympathy or understanding, by way of compensation,
              I suppose, for lack of space in which to engage us less forcibly. The effort called for may be too much for some readers but in most instances
              it is richly rewarded. Even the most challenging stories are elegant examples of the storyteller’s art, exhibiting a graceful, distinctive
              style and an exceptionally sure touch."
        - title: Landfall Review
          text:
              "Reviews Sarah Quigley Landfall , No. 192, November 1996 The settings for Susan Hancock’s first collection of short stories, Sailing
              Through the Amber , are equally important, equally vivid [as in recent fiction set in urban New Zealand], but more varied. Hancock was educated
              at Canterbury University, then at Oxford, and has finally settled in Melbourne where, until recently, she lectured at La Trobe University;
              her stories, too, wander between Europe, Australia and New Zealand. ‘The Passion of the Poor’ and ‘A Story Set in Venice’; conjure up the
              luminous light and sea of Italy; ‘Rubaiyat’ unfolds from the steep Brooklyn hills of Wellington. The descriptions of New Zealand are the
              most evocative but despite this Hancock is less firmly grounded in this country than Shaw or Alexander. One of her characters feels the
              ‘exile’s pain’ but is not ready to be claimed by time or place, and there is a sense of autobiographical truth behind these words. The visual
              detail throughout the collection is strong, and the imagery arresting: in the evocative ‘Windsong’ the sky is ‘post-marked’ with blue stars,
              and the boy’s voice is a seagull, hanging its ‘two winged hooks of complaint’. Although some take rural settings, the majority of the stories
              reflect an urban influence; they also reveal Hancock’s academic background. Her characters are well-educated, articulate: through their
              dialogue and reactions she explores the themes of isolation, separation and the nature of love. Occasionally, the symbolism placed on everyday
              events seems excessive; you wish for something to be simply what it is, not what it is made to represent. In particular, the lengthy story
              ‘Goodbye’ - about the arrival of an enigmatic stranger at a house-party - labours under the weight of its mysticism. It is in the small
              details that Hancock excels: a twist of speech, a flash of colour; when she strays too far from these her writing loses some of its clarity
              and edge. Sailing Through the Amber is less easily categorised than Black Light [Laura Solomon], Fat [Raewyn Alexander] or Birdie [Tina
              Shaw]: it is less specific in its focus on a contemporary and urban New Zealand and less directly aimed at a particular generation of readers.
              But it has in common with them that certain down-to-earth quality which marks all four out as progressive fiction. Their worlds are the
              worlds of today and tomorrow rather than yesterday."
        - title: Australian Womens Book Review Review
          text:
              "Negotiating the Gaps - Sailing Through the Amber Ruth Starke (academic and writer) Australian Women’s Book Review , Vol. 8, No. 2,
              June 1996 (pgs 36-37) In the title story of Susan Hancock’s first published book - and it is one of the best - the central character describes
              the sort of driver she is: someone who takes risks at traffic lights, who sails across the opening between red and green and finds a brief
              freedom in that momentary gap where no roads inter­sect. The married man with whom she is having a half-hearted affair is a differ­ent sort
              of driver: cautious, calculating, unwilling (and no doubt unable) to take risks. He is, of course, Mr Wrong. Other stories in the collection
              are more impenetrable, especially when they wander into deeply metaphorical terri­tory in exploring the nature of reality. They start on
              a firm foundation - a mother and son on a camping holiday pitch a makeshift tent in the darkness; tourists in Italy play cards in the kitchen
              of their rented villa - but like the hap­less campers, the stories sometimes slide into murky territory where meaning is obscured. New Zealand
              looms large in many of the stories (the author is originally from that country), as does the natural world. Indeed, Hancock’s protagonists
              seem incapable of taking a step or draw­ing a breath without an intense con­sciousness of the interaction of light, wind, sun, stars, moon,
              sky and rain. This works to dramatic effect when used sparingly, as in ‘The Seal Wife’. The cu­mulative effect, however, is to give the
              stories a certain sameness and to fore­ground nature and the elements rather than letting them reflect and comment on the characters’ emotional
              lives. Recurring themes are death, separa­tion, pain and inadequacy (often con­nected with motherhood), and most of the stories are written
              from a woman’s perspective. This doesn’t automatically classify a book as feminist - gender, for example, is very rarely an ingredient in
              the dilemmas and disappointments these women face - but a preoccupa­tion with the female psyche is central to Hancock’s writing. It is their
              determination not to be victims which allows these educated, urban, middleclass women to rise above setbacks and separations. Humour, however,
              is rarely present: this is a deeply serious collection. A few laughs, a few smiles even, would have been welcome. Having said that, the
              best story in the collection, ‘Windsong’, is written from the viewpoint of a young boy about to commit suicide in the wake of his par­ents’
              separation. Lyrical and deeply moving, it is written with economy, clar­ity and compassion. Perhaps it is significant that ‘Windsong’ was
              a prizewinner in a popular newspaper-short-story compe­tition. Many other stories in the collection will only be fully appreciated by sophisticated
              and persistent readers will­ing to read slowly, to ponder, and to read again. And even then they may fre­quently find themselves still stuck
              in the gap instead of sailing through."
        - title: Who Weekly Review
          text:
              "Picks & Pans - Sailing Through the Amber Jamie Grant Who Weekly , 15 April 1996 A woman meets an old friend who is sitting in a pub,
              ‘a small child half-concealed on his knee’. She learns that he has recently been widowed, and the discovery brings her to confront her own
              self-obsession, understanding for the first time ‘her husband’s bitterness one night before he left, the night before she brought home the
              lamp she’d found. ‘Just like you.’ he’d said, ‘standing in a corner, illuminating nothing much except himself.’’ In the title story, a man’s
              careless remark to the woman with whom he is having an extramarital affair (‘You’d do anything for me,’ he says) transforms the way she
              sees him: ‘And that did it. One minute I was inside the situation, the next I was on the outside, looking in.’ The feeling she has, she
              decides, is like that one you have while driving a car through an amber light, ‘that place of pause between the two regimens of red and
              green’. Like many women writers. Hancock is a late starter, delayed by marriages, children and an academic career before publishing this
              first collection while in her forties, but hers has been a talent worth waiting for. Her prose style is rich and evocative, but most importantly,
              she understands that stories should have a point to them, rather than being mere transcribed excerpts from everyday life. In each of the
              pieces in this collection, distinctly recognisable characters undergo experiences like those summarised above, in which their lives, and
              their way of seeing themselves, are transformed by a particular, light-drenched instant."
        - title: The Age Review
          text:
              Embracing the worlds of women’s writing Philippa Hawker The Age , 9 March 1996 Sailing Through the Amber is a collection of a dozen
              stories by Susan Hancock. In the title story, the narrator is being driven home by her married lover. As he approaches an intersection,
              she reflects on the difference between them, saying, ‘This is my favorite, time, sailing across the gap between red and green ... Sailing
              through the amber, I call it, because as you take off, through all the warning signs, the moment you cross the grid you go into freedom.
              The Greeks call it chiasma, the place of absence at the centre of a crossroad, the gap that none of the four roads enters; a dark space
              in the middle of the night.’ Many of Hancock’s stories seem to be about that moment of transition, of a passage through emptiness and beyond.
              She writes of encounters, revelations and longings in evocative, yearning prose.
        - title: Australian Book Review Review
          text:
              Dark Spaces and Chilly Tales - Sailing Through the Amber Fia Clendinnen Australian Book Review , No. 178, February/March 1996 Sailing
              Through the Amber is Susan Hancock’s first published book, a collection of short stories. These stories are all set in an emotional territory
              Hancock calls ‘the gap’, ‘the dark space in the middle of the night’. It’s an uneasy and comfortless place where nothing is quite what it
              seems. The stories are mainly about separation, from the woman’s perspective. A marriage is breaking up; a child is involved. There is no
              great sound and fury on either part; the man is leaving with a sort of weary distaste which is more deeply wounding and annihilating than
              straight-out anger. The child can’t understand any of this and just wants everything to stay as it was. The mother is painfully aware that
              the care she offers the child is fragile. This pessimistic feeling of inadequacy runs deeply through the book. In one story a mother goes
              back to New Zealand with her son for a holiday. They drive around, camp in a bog and, for camping equipment, make do with a tarpaulin, some
              wobbly sticks and an old shower curtain. In the night, in his sleep, the child slides out of this makeshift tent and ends up in the mud
              uncovered. When he wakes up he has a fever. The feeling of hopelessness is described so powerfully it makes you ache. And yet running through
              this masochism is a kind of joy, an unhealthy joy maybe, but fierce nonetheless. Sitting in her failure, the protagonist intensely appreciates
              life and nature, a feeling that verges on being mystical. Hancock makes the natural world become part of her character’s emotional life,
              as happens to all of us in our dreams. The landscape is described intensely and romantically, wind and trees and light seem to rush right
              into the pores of her skin. The boundaries of self blur, which again is a kind of mysticism or madness. In ‘Windsong’, a prize-winning story,
              a boy whose parents are separated kills himself. He commits this act quietly, methodically. He wants to become one with nature, one instead
              of ripped in half as he is by his parents’ separation. The last thing he sees before unconsciousness rushes over him is a drawing he did
              when he was eight years old. It is a bright, happy picture of two adults and a child on a yacht on a sunny sea. This story is written with
              a lyrical, understated intensity of emotion that is almost unbearable to read. Hancock is currently writing a novel about matriarchy set
              in New Zealand (she is originally from that country). If her novel is as good as the best of these stories, I will want to read it. There’s
              a quality of surrender in Hancock’s writing that is rich and beautiful. And as well as all the sadness there is humour and compassion.
        - title: The Sydney Morning Herald Review
          text:
              Summer Stories Helen Elliott The Sydney Morning Herald , 6 January 1996 Melbourne’s Susan Hancock is known and admired by a select audience
              because her stories have that breathless emotional depth that you find only in very fine writing. They are stories of the lives of educated,
              urban middle-class men and women, so they have certain boundaries because of Hancock’s assumptions about her audience. She charts the disturbances
              of their relationships, the ecstasy and the pain of love. She’s uncanny in her observation and has a richly slanted vision framed by a glittering
              intelligence. Her best theme is reflecting exactly how the way we live affects the children of these fraught relationships. ‘Windsong’,
              a very short tale about a young boy whose parents are separating, could be read as emotional and moral instruction. ‘The Passions of the
              Poor’ is a confronting, textured story about a lonely woman who, rushing away from herself, is suddenly made to face herself in all her
              greed, her ignominy and her selfishness. For me, after a year of exceedingly average writing from the Australian scene, Hancock’s writing
              sailed into my world like some startling and haunting song. It’s writing to sing about. The gorgeous cover is thrown in as a bonus.
        - title: The Australian Review
          text:
              "Stories stall on theories Tegan Bennett (author) The Australian , 29/12/1995 The demand for a good, strong metaphorical skeleton must
              be uppermost in a writer’s mind as he or she attempts a short story, possibly the most challenging kind of writing there is. The contrivances
              of language that can be more easily hidden in the novel (embedded, as it were, in the flesh of the plot) or stripped bare in the poem must
              be covered perfectly in the short story - visible, but not too sharp, not too obvious. Susan Hancock’s Sailing Through the Amber has as
              its title a beautiful metaphor, just mysterious enough to catch the eye, but making gorgeous sense when explicated. She describes the moment
              of driving through Melbourne traffic lights as they change from red to green, the sudden in-between-ness, freedom - chiasma she calls it.
              It’s a wonderful image, giving a sense of balance, of an instinct utterly right, and it would be wonderful if this book lived up to its
              promise. However, in the title story, as in its companions, this promise is never fulfilled. Sailing Through the Amber is a series of short
              stories dealing almost exclusively with love and loss. These are eternal, universal subjects that can always, in the right hands, bear another
              reworking. Hancock’s view of them is expressed poignantly and occasionally with real magic, but rarely does she find that exact, exalted
              moment of art. While she is a stylist of genuine talent, her skill is hampered by her tone and attitude to her subject matter. The knell
              of defeat sounds in almost every story. This, from ‘The Porcelain Face’: ‘You’ve lied to me, all along,’ she said, stepping close to him.
              ‘All along you’ve said you weren’t leaving me because of her.’ ‘I’m not,’ he said. ‘I’m leaving you because of you.’ While no one in their
              right mind expects or wants all female protagonists to be feminist heroines, this kind of passivity, this dumb, sad, staring-out-at-the-sea
              response to infidelity and cruelty eventually becomes frustrating. Perhaps Hancock’s work would be more satisfying to read if it were more
              intellectually driven - while she can describe things quite superbly, she never really explores them. The reader emerges from Sailing Through
              the Amber thirsting for a wild generalisation, a theory even, of human relationships, but these never materialise. Hancock’s writing is
              at its best when she is portraying children in ‘The Seal Wife’ and ‘Behind the Glass’. In these you get a glimpse of what she could and
              may yet still be - a thoroughly astute but forgiving observer of domestic life in all its forms. The domestic as subject matter does not
              necessarily make for dissatisfying reading. Drusilla Modjeska, Helen Garner, Tim Winton can all take you on an exhaustive tour of their
              kitchens and bedrooms, and still exhilarate you. There’s a delicate touch needed with this kind of work, somewhere between detailing the
              furniture and the cute things the kids say, and investing these ordinary things with more meaning than they warrant."
the-peastick-girl:
    title: The Peastick Girl
    author: Susan Hancock
    short_description:
        The Peastick Girl evokes Wellington and the force of the natural world. The novel brings Teresa Matheson back to Wellington
        after five years in Australia, where she begins to write a film version of Webster’s The Duchess of Malfi and links the play’s vision of treachery
        and destruction to New Zealand history.
    long_description:
        Is she trying to seduce him? He doesn’t know. Though not exactly distant she seems far away. The fire they have lit is young-looking,
        crowned with green flames; it sends its light onto the red tiles around the fireplace, each with its upright white lily, like a martyr’s emblem.
        The Peastick Girl is a panoramic evocation of Wellington in all its beauty and strangeness and the almost mythic force of the natural world.
        The novel brings its central character, 27 year old Teresa Matheson, the second of the three Matheson girls, back to Wellington after five
        years in Australia. Over the course of the winter she begins to write a film version of Webster’s 17th century tragedy, The Duchess of Malfi
        , not only to set it here but to translate the play’s vision of treachery and destruction into New Zealand terms, linking the characters and
        events to aspects of New Zealand’s history . The irony is that the strongest link is between the Duchess and Teresa herself. Teresa’s own
        decline into darkness and a state of tragic fright brings her close to the catastrophe that overtakes Webster’s heroine. Darkened though this
        is, much of the novel is also given to a dramatising of a large cast of characters in a comedy of manners involving young feminists who feel
        they have lost their way, powerful but disenfranchised Maori women who act as a chorus on pakeha behaviour and the past, Russian emigres,
        Rugby and its players, men in sheds, students in beanies and backpacks, great roaring assemblies in Wellington pubs. Pub life. Literature.
        Private life. Introversion and loss. Fear of the Matheson girls’ sinister mother, the feminist Vivien who has left her mark ( see Chapter
        20, Tattoo) on many of the younger generation even after her early and mysterious death. Family secrets. Broken history. — All these consort
        in this vivid and ambitious novel of New Zealand life. A brave, sensuous and wildly original novel — I’ve never read anything quite like it.
        Helen Garner Where novels are concerned, a lot more attention should be paid to Susan Hancock's 'The Peastick Girl' . Written in prose of
        eloquent intensity, this does for New Zealand passions and landscapes the kind of thing the Brontës did for Yorkshire. Chris Wallace-Crabbe,
        The Age, 8 December 2012
    price: 49.95
    isbn: "9781876044749"
    release_date: "2012"
    page_count: 494
    reviews:
        - title: Transnational Literature Review
          text:
              The Peastick Girl Michelle Austin Transnational Literature , Vol. 6, No. 1, November 2013 Susan Hancock’s novel is a rich and complex
              work that incorporates themes of feminism, national identity and transnational socio-politics into a hugely compelling narrative framework.
              Set in Wellington, New Zealand, the story concerns Teresa, Mollie and Cass Matheson, the three daughters of the mysteriously deceased Vivien
              Matheson. Each of these three main characters has their own distinct identity but, collectively, the strong and sometimes endearing characterisation
              works to construct a positive image of women and sisterhood. The middle sister, Teresa, is given the central role, returning from Australia,
              where she has been living for five years and where she believes she has discovered a demon called Arkeum. Teresa’s return opens the narrative
              and her emotions are the driving force of the plot as she is shown to be a troubled figure who has suffered a traumatic experience that
              has left her psychologically and physically damaged. On returning home she is able to resolve some of the tensions in her family and to
              discover the secrets kept from her by her mother which have, unknown to her, continued to affect her throughout the rest of her life. The
              events of her past slowly return to haunt her during the course of this discovery as she struggles to resolve an intense psychological division
              between her angry and seizure riddled Red Queen persona, and her other, innocent and more fragile self, the Peastick Girl. One of the wonderful
              points of this story is the way that the natural beauty of Teresa’s homeland is able to heal and soothe her at a tumultuous point in her
              life. Nature is an important motif in this novel and the descriptions of the country occur in connection with peaceful scenes to offset
              Teresa’s emotional state of disturbance and unrest. This complex relationship between the natural world and the emotional and social disturbance
              of otherwise peaceful people, then, has parallels with the social and semi-political issues that appear subtly but noticeably in the background
              of the novel. This is interjected with specific debates concerning the plight of Maori women and the need for them to regain the power that
              was stripped from them under British law. The Maori issue is conjoined with the idea of natural and native New Zealand life, while the contrasts
              and affinities between the novel’s main characters and the more peripheral figures of Maori women are shown to be of principal importance
              for reasons concerning both feminism and nationality. Cass is a filmmaker whose most recent project is a film about the Maori people. She
              is the figure to whom the author assigns the responsibility of reminding her two sisters about the feminism with which their mother raised
              them. She is also the character who continually asks important questions about women’s treatment of each other and the meaning of feminism
              and femaleness in contemporary society. In outlining some of the problems caused by colonisation, Hancock’s novel makes key reference to
              New Zealand’s political and social history and considers the effect of this on Maori women within the more established white Western women’s
              movement. The novel positions this issue in order to suggest that colonisation and the subsequent imposition of British, and largely Victorian,
              values concerning marriage, morality and gender roles has had adverse effects on the position and rights of all New Zealand born women.
              At the same time, the male attitudes to women in this novel, though few, are shown to be less than egalitarian. Teresa, for example, is
              harshly criticised by Gil, the philandering but prudish husband of her older sister, Mollie. He makes sporadic and multifarious judgements
              in relation to her attitude to life, her previous experiences with drugs and what he sees as her sexual promiscuity, thereby demonstrating
              one male perspective on the moral and largely gender specific values to which women are still expected to adhere. Mollie offers a contrast
              to Teresa’s freer and more adventurous persona, being described as a housewife and mother whose opinions are, in some ways, informed and
              confined by her husband’s patriarchal and occasionally hypocritical values. The problems of women, and the constriction that they feel,
              come to the forefront here, lending the novel a sympathetic tone which inspires a similarly sisterly affinity and understanding in the reader.
              It is this that makes the novel such a pleasure to read as it is so clearly female orientated and provides a warm and enveloping story with
              enough mystery at its heart to make it absorbing and enjoyable. The narrative tone engages the reader and inspires the imagination in such
              a way that scenes and characters come to life. Its overall effect is, therefore, a powerful one, working to promote understanding of the
              distinctive identity of New Zealand and its people while at the same time encouraging readers to discover more about the country and its
              history.
        - title: New Zealand Studies Network Review
          text:
              "The Peastick Girl Rod Edmond Emeritus Professor of Modern Literature and Cultural History - University of Kent New Zealand Studies
              Network (UK), 22 February 2013 Early in this novel someone remarks to its central protagonist that New Zealand is ‘a hard country to come
              back to’. Teresa Matheson has returned to Wellington after five years living in Melbourne and bought herself a house on the heights above
              the city within sight of her dead mother’s old home. The opening pages are both vertiginous and claustrophobic. Teresa is left dangling
              from a wooden ladder hanging from her veranda; she climbs to a ridge behind her house from where she can see both city and ocean and becomes
              trapped in a maze of gorse as she descends. She feels disconnected from her sisters, Mollie and Cass, and is troubled by Hugo whose former
              friendship with her mother provokes unease and a feeling there are disturbing things in her past that she knows nothing of. As she says
              to Mollie: ‘I’m here but I’m not really back; maybe you can’t get back.’ So far so familiar: the problems of returning and settling, and
              the questions of identity and selfhood that follow from this. But The Peastick Girl has an intensity and strangeness unusual in such ‘return
              of the native’ narratives. Teresa’s problems are not those of social or cultural adjustment. Indeed, apart from odd moments of near-slapstick
              about the curious habits of young New Zealand males, the novel is pretty free of contemporary social comment or satire. Wellington is as
              central to this novel as Egdon Heath is to Hardy’s Return of the Native , but it is a city empty of people other than the small cast of
              characters who are forever meeting or glimpsing each other as they traverse its streets. Katherine Mansfield’s city has become a wild place
              dominated by rain, light, wind and sound. Teresa’s house is a permeable membrane open to all weathers, a mere shack whose roof leaks and
              windows blow in, and through which disturbing memories swirl. Hancock is running an elaborate parallel between the landscapes of the city
              and the mindscapes of her protagonist. As in Hopkins’s sonnet ‘No worst, there is none’, the mind ‘has mountains; cliffs of fall / Frightful,
              sheer, no-man-fathomed’. Teresa has an intensely close relation to the natural world, preferring to be outside than in, always thinly clad,
              impervious to the cold and wet that persist through most the novel. This dramatises her precarious state of mind and provides both comfort
              and escape from whatever it is that haunts her. The most ambitious level of the novel is the parallel it attempts between the dislocation
              of its protagonist and the history of New Zealand since colonisation. ‘This whole country is a lie’, Teresa remarks to Hugo; ‘We signed
              up a Treaty in which we described ourselves as allies of a sovereign people, and then we broke it’. The novel is haunted by the idea of
              treachery. As a consequence, no one is at home: ‘This was an empty country. Nobody had really written on it yet; a few furrows, sheep tracks,
              the scribbling of the wind’, Teresa reflects. I was reminded of the words scrawled across Colin McCahon’s ‘Northland Panels’: ‘a landscape
              with too few lovers.’ Teresa’s eventual lover and perhaps rescuer, Nikolai, is a Russian émigré, one of a shadowy group which inhabits the
              margins of the novel. Nikolai tells Teresa; ‘You are like us... you haven’t really got here yet, you haven’t really arrived’. Pakeha New
              Zealanders in this novel are unable to help each other. In Wellington they live dotted around the hills of the city, facing each other but
              apart. The feminist group, which Cass is part of, splinters once its Maori members leave. A women’s party at Mollie’s house on the Kapiti
              coast is not a sisterly occasion. In another scene, people gather on the beach at Makora at dusk but soon three separate fires have been
              lit; ‘the result of three different decisions, and disputes about the cooking and general organization of the event were turning into the
              event itself’. There are a number of these social gatherings punctuating the novel but none ends, as say Mrs Ramsey’s dinner in To the Lighthouse
              , or the assembly in the round shell house at the end of the bone people does, in harmony or reconciliation. Both Teresa and her country
              are shown as suffering the consequences of an original trauma from which all subsequent pain and dislocation has followed. The place of
              Maori themselves in this is unclear. Their representative in The Peastick Girl is Rangi, an unsatisfactory character often seen standing
              on headlands looking out to sea or heard making gnomic utterances. Although by the end of the novel Teresa, having learnt the terrible secret
              of her past, has glimpsed a possibility of how she might begin to heal, no such hope is held out for a country as unsettled and broken as
              New Zealand. Help, if that is what Teresa has found, begins in a deserted farmhouse in the shadow of Mt Taranaki, far away from the entanglements
              of family and the anomic life of the city. This account of the novel makes it seem thinner and more schematic than it is. The Peastick Girl
              is dense, rich, lyrical and engulfing. It pulls you in and has its way with you, brushing aside critical objections as it does. Much of
              its success is technical. The writing is poetic and elaborate but also very precise, repeatedly surprising in its effects, with remarkably
              few false notes. Teresa’s is the dominant consciousness but the point of view often shifts to other characters, and between past and present,
              in a manner that can momentarily wrong-foot the reader but which suits a work in which time streams rather than ticks. Hancock is a very
              literary writer with a playful sense of the traditions of the novel as a form. Although the shifts in point-of-view are normally unannounced,
              at one point, in mock deference to the limits of the realist mode in making such switches, a third-person narrator declares: ‘And here,
              as he stands behind her... we will leave him and begin to consider this scene so far from her point of view’. Teresa, herself a writer though
              little is made of this, plans to adapt The Duchess of Malfi for a New Zealand context. Chapter 10, ‘Hugo at the Newspaper Office, Aeolus,
              the Cave of the Winds’ refers to Joyce’s Ulysses and Odysseus’s encounter with the wind-god in the tenth book of The Odyssey. And so on.
              There is nothing heavy-handed about this literary referencing. In some ways The Peastick Girl is an almost offhand novel. Characters arrive
              unannounced and for no good reason other than the author needs them at that moment. Characters who are no longer needed simply fail to reappear.
              A vivid scene involving an exhilarating motorbike ride over the Rimutakas has no obvious purpose but I’m glad it’s there. Hancock pays no
              respect to those conventions of the form that require the author to take pains in moving a character from one place to another, or explain
              how it is that X knows Y. Instead she creates a fictional world as phantasmagoric as it is real, and none the less real for that. This indeterminacy,
              however, creates a problem of how to end the novel. In part a mystery, only part of that mystery has been revealed by the novel’s close;
              other secrets hinted at remain undisclosed; loose ends dangle. Perhaps this is wise. A profound mystery always creates expectations that
              its solution must disappoint. On the other hand, when a mystery has helped propel a novel it is frustrating to find it left partly unresolved.
              Hancock’s solution of this problem is to conclude the narrative with the words, ‘To be continued.’ The full-stop is teasing, and the words
              can mean either there is a further volume to follow, or as I think more likely, that this is a story without end. This is hardly a criticism.
              As I said, The Peastick Girl disarms most objections. It is one of those infrequent new New Zealand novels – Eleanor Catton’s The Rehearsal
              (2008) is another – that really is new."
        - title: ANZ LitLovers LitBlog Review
          text: The Peastick Girl by Susan Hancock Lisa Hill ANZ LitLovers LitBlog , 6 October 2012
        - title: George FM (Auckland)
          text:
              Bookish and Awkward book review Lucinda, Time Out Bookshop (Mt Eden) 1 August 2012, George FM (Auckland) http://www.georgefm.co.nz/Best-Of-Wednesday-Breakfast-with-KirstDean-aka-The-Eens/
              tabid/127/articleID/116363/Default.aspx Today we’re talking about The Peastick Girl by Susan Hancock, published out of Australia but written
              by an ex-pat Kiwi writer, am I right? That’s right, it’s published by a really small company in Melbourne but it’s available in New Zealand,
              readily available. So it really is quite important that it’s written by an Australian I think, by an Australian-New Zealander, because it’s
              all about the New Zealand landscape and its effect on people. It’s set in Wellington and Wellington features almost like a character in
              it. It ’ s just incredibly Gothic and it ’ s got all these descriptions of the weather and the wind sweeping across the harbour and all
              the people in it are quite troubled and Gothic as well. It’s really beautiful. I really enjoy it when you get a sense of place in a book
              like that. Yes, absolutely. And I’m actually from Wellington so I felt really nostalgic while I was reading it, and it’s pretty much spot
              on. It’s all about youngish people making their way as well, so there’s lots to identify with. And so, key things, without giving too much
              away? Okay, so it’s basically the story of this young woman called Teresa Matheson and like Hancock she’s been living in Melbourne. She
              comes back to Wellington to live and what’s basically happened is that her mother has died in mysterious circumstances out on the harbour
              in a boat. So it’s all very mysterious when you first get into the book, and she’s got two other sisters and they’re all just trying to
              find their way and find their paths in life and Teresa is in the throes of a mental breakdown, so there’s a lot of madness and hallucination
              in big empty Wellington villas. So it’s pretty good. I’m a really big fan, I just loved it, I think it’s beautiful. It’s good to hear a
              ringing endorsement from you, especially someone that like you say has been a Wellington resident, so you know they weren’t messing about!
        - title: The Canberra Times review The Peastick Girl
          text:
              "Moody Inner Landscapes Felicity Plunkett (Poetry Editor, University of Queensland Press) 23 June 2012, The Canberra Times Susan Hancock’s
              debut novel is ambitious and extraordinary. Composed of four books with poetic titles such as ‘Dialogue of the Insects’ and ‘The Book of
              the Duchess’ and wrapped in a fantastical prologue and ‘end page’, the novel ends with the words ‘to be continued’. It traces the story
              of Teresa Matheson, returning from Australia to her native New Zealand (where Hancock herself was born), to her sisters Mollie and Cass
              and to questions of self, solitude and origin. Hancock’s descriptions of landscape are elaborate and lush, taking in the physical and metaphysical.
              In a kind of pathetic fallacy, the landscape around Teresa seems troubled, vexed by storms or shimmering in the wake of trauma. The harbour
              rises ‘like a curtain of wet light’ and church spires ‘are rusty in the sunlight, smoking with damp’. At one stage characters walk ‘into
              an extraordinary moment where the garden sprang deep globes of blue fruit’. This is glossed: ‘For it was as though someone was shining a
              mirror on the sea whose reflection, lucent, trembling, burning an intense and windless blue rose like an angled plane and flooded the garden
              in a deep luminous atmosphere.’ The density of these descriptions creates a landscape richly layered with the fabulous, the remembered and
              the imagined. At times elaboration results in fresh illuminations, such as when Mollie’s (rather pompous) husband Gil is described as speaking
              to her ‘in the almost priestly intonation, sacerdotal, hieratic, that can govern, at certain moments, the marital antiphon’. It requires
              patience (and a willingness to consult the dictionary) to stay with such writing, which sometimes threatens to overwhelm other aspects of
              the novel, such as plot. Conventional plot, though, is not Hancock’s primary concern. At times a sudden authorial voice tears through the
              narrative fabric to show its seams. ‘There are scenes here we have to leave out’ is a typical intervention. Conventional plot is examined,
              too, by Hancock’s protagonists, especially Teresa. In ‘The Book of the Duchess’, Teresa’s emotional and mental crisis is channelled through
              her decision to write a screenplay of John Webster’s 17th-century play The Duchess of Malfi as a New Zealand tragedy. As Teresa writes,
              her own voice and that of the duchess - one of the most troubled and haunted figures in literature - merge and she lurches in and out of
              what might be thought of as reality. Yet ‘reality’, too, may be a construct, and if so, it is one her characters examine closely. With the
              exception of Mollie, newly pregnant and chasing a particularly active small child and his brother, none of the characters seems to have
              much to do besides reflect. This is a significant luxury, though no one seems at all comfortable within it. The novel’s episodes are intense,
              its characters impassioned and often agonised. The sisters’ reactions to their mother’s mysterious history shape their lives, especially
              their romantic lives. Central to the novel is Teresa’s relationship with Hugo, variously described as looking like (dark, craggily handsome)
              Ted Hughes and (fair, boyishly handsome) Rupert Penny-Jones. Hugo’s first lover was the girls’ mother, and although he appears to be in
              love with Teresa, more striking is the dramatic intensity of their wounding encounters. At one point, visiting Mollie and Gil for dinner,
              Teresa and Hugo are outside engaged in passionate debate, while their hosts watch them from inside. The sense of performance is clear, though
              the incident results in an exacerbation of Teresa’s mental and emotional symptoms. The novel’s scale and scope are Joycean, and its venturing
              into character’s heads is reminiscent of a Modernist concern with charting human cognitive processes. The turmoil of the women’s experiences
              gives the novel a brooding inner landscape to match its fractured portrait of a moody Wellington. Questions of national reconciliation and
              the revelation of personal secrets underpin a novel more concerned with language than with conventional narrative, or its resolution."
        - title: The Age review The Peastick Girl by Susan Hancock
          text:
              "The Peastick Girl Owen Richardson 16 June 2012, The Age Theresa has returned from Melbourne to her sisters in Wellington, partly to
              get away from her Russian boyfriend and his strange theories about the devil he thinks she has hovering about her. It’s a haunted milieu:
              Theresa’s mother died in mysterious circumstances some years before and her younger sister Cass also has a trauma in her past; there is
              also the question of Hugo, a friend to all the women whose exact relationship with their mother is hidden from them. A brief summary can’t
              really do justice to the complexities of this highly gifted novel. Outside the family drama there are the historical wounds inflicted on
              the Maori by the pakeha, and the debates around the feminist magazine Cass works on, and the meeting of race and gender politics represented
              by Rangi; Hancock roams around the pubs and newspaper offices and university campuses. And all this is given a lustre and intensity by her
              precise, musical prose, with its matchless evocations of the weather and the landscapes around Wellington and the fugitive subtleties of
              her characters’ inner lives. Hancock doesn’t like to spell things out; you have to be patient with this book and sometimes allow yourself
              to not be sure where it’s going. It’s her purpose not to tie everything up neatly and there are plot strands and themes that aren’t resolved.
              Tidy-minded readers may baulk at this, but it gives a sense that there is much more to this world and these characters than can easily be
              pinned down. The last words are ‘To Be Continued’."
        - title: NO review Sue Hancock The Peastick Girl
          text:
              "Q & A Sue Hancock NO (online NZ magazine), May 2012 http://www.nomagazine.co.nz/good/sue-hancock-qa An absorbing story of youth, secrets,
              nature and the agony of relationships, brand new novel The Peastick Girl has just hit the shelves here in NZ. NO tracked down its author,
              award-laden Kiwi writer and citizen-of-the-world Susan Hancock, for a peep inside her clever head. Could you explain the title of your latest
              novel? One of my readers wrote to me and said he couldn’t put the book down, that he read it in two great gasps, but that he still never
              understood the first page. Everyone always says ‘The what?’ when they hear the title, and I always say, ‘It’s explained on the first page.’
              It’s about a split in the personality of one of the three sisters; in the book you find out why it happened and who it happened to. Basically
              there are two magical figures who inhabit one of the characters, the Red Queen - who rages and howls in the wind Something had happened
              to the Red Queen that made her howl like that... Her eyes bulged, the wind blew her face away. - and the silent and fragile girl who is
              kind of like a cabbage butterfly fluttering over the peas that are growing up the peastick frames. She is much closer to the natural world
              than she is to human life, and it’s her love of beauty that saves her. What initially inspired the book? This novel started out as a single
              image of three sisters sitting on a beach on the Kapiti coast, one warm summer evening. (So it obviously wasn’t last summer.) I had a sense
              of the three of them right away, even their names, though it took a while for their surname to float into my mind. So the novel started
              with the characters, not really with an idea or a plot. I always feel as if I met them rather than invented them - Mollie, Teresa and Cass,
              sitting on the beach under a sky as blue as any remembered sky ever is, with the light of the sea playing up into it. How will young New
              Zealanders identify with the central characters? I think we come from a fantastic country. And I think New Zealanders, especially the savvy
              generation who are in their twenties and thirties now (the age of most of this novel’s characters) know this. We know how remarkable it
              is out here; we see our country through the eyes of people who travel here; we know how independent our culture is and we know how to live
              a metropolitan life. There’s a lot of activity in this book - huge social scenes open up, people go off into the mountains or ride motorbikes
              through the Rimutaka gorge or hold parties in town, and they all talk! They gossip, they agonise about their relationships - they’re mostly
              in very shifting relationships, they’re seeking something. Some of them have a clearer idea about this than do others. What are some key
              questions dealt with in the narrative? The plot revolves around a pattern of secrets. It’s also about the ways some people get hold of the
              reins of a number of lives and manipulate others to the point of pretty serious damage. It’s about revenge and retribution and treachery.
              It’s about witnessing. One of the characters, a Russian (who, like the Maoris, comes from a broken history) says that no matter how hard
              you try to hide the truth, there is always someone who knows. Do you feel the novel belongs to one genre in particular? Let me turn that
              around a bit and say that the two novels I most admire from the twentieth century are Ulysses by James Joyce and Women in Love by D.H. Lawrence.
              I admire them because of their range and because they don’t try to tidy things up. And they don’t create some special voice for fiction,
              they don’t have so much formal narrative as narrative presented through the consciousness of the characters. They take a lot of risks; no
              reader can ever quite wrap up the reading experience of Ulysses, for example. I love that; the risk taking, the sense of horizons beyond
              the book, the closeness to characters, the crazy digressions – they’re wild novels. I don’t like ‘Tame’. How was the Kapiti coast setting
              integral to the plot? Well, it’s timeless; things out there are held in a very still, clear light. There are great households out there,
              and more of the novel’s communal and social scenes are set there than in Wellington. There’s an excruciating dinner-party in a chapter called
              ‘A Pleasant Evening’ where family tensions get to almost murderous levels. And underneath all that is the sense of the Maori and their dislocation,
              like a deeper atmosphere. And there is the sea! It’s our New Zealand medium, the sea. The Peastick Girl would make a great film. In an ideal
              world, who would you love to see play the main roles? Which director would you choose? I write really cinematically, so the book is very
              visual. And I write a lot of dialogue – so for both these reasons that book would translate very readily into film. And who would I have
              do it, in an ideal world? The New Zealand woman film-maker who has the most beautiful cinematic language in the world: Jane Campion, of
              course. As for the main roles, I think Naomi Watts would be marvelous for Mollie. (All that sweetness and vagueness, and underneath it all
              a strength no one much has bothered to find out about. But Mollie is only thirty-two.) For Teresa, the heroine – Jennifer Lawrence, who
              plays Katniss Everdeen in The Hunger Games and was also fantastic in The Winter’s Bone. Because she is so resolute! Teresa goes through
              a huge amount of pain and fright in the course of the year of this book, but she’s tough. Hugo, the main guy in the first half of the book
              is, Teresa thinks while she is looking at him on the first night that they meet, the most beautiful man that she has ever seen. And that’s
              his problem – because of this he’s never really had to develop his character. But he’s really charming and you find out about what has damaged
              him. Whenever I think about him I think about that English actor, Rupert Penry-Jones, the really gorgeous one from Spooks. I could go on
              at length – there are eight major roles and another twenty significant other characters and then a world of people beyond that who come
              into focus and vanish again as the plot takes them. What kind of literature would you like to see coming out of New Zealand? Young work
              is probably the best short answer - not necessarily written by the young but about the young. I think there’s a very special generation
              in NZ between twenty and forty-five: independent, clever, good fun and metropolitan."
diary-of-a-dwarf:
    title: Diary of a Dwarf
    author: Graham Henderson
    short_description:
        Ironmonger, the dwarf of the title novella, is an inventor of unlikely board games. Foote, of ‘Foote’s Last Stand’, is either
        a 117 year old neglected novelist or failed pornographer. Boot is factotum to Dr Hieronymous Bladder, a psychiatrist in improbable disguise,
        pursued by his patients Bones and Ophul. In these novellas Henderson takes comedic invention to its extreme; he reveals the tragic scope of
        the clown. ‘Nocturnal Emanations of Fish’ tells many stories in one. Story-telling is a ploy to stave off the narrator’s suicide. The ‘death
        of the author’ is declared from within. De Sade is a wimp, the anti-novel like Jane Austen when the demented author makes his final great
        plea for sanity. His control is extraordinary. ‘Fish’ alone would confirm Henderson as a radical and significant writer.
    long_description:
        With his novel The Mountain Graham Henderson was recognized as ‘a new novelist of very remarkable power’ (Stephen Knight)
        and the novel as having ‘shimmering and magical power’ (Helen Daniel). Diary of a Dwarf extends the reach of that stunning debut. Ironmonger,
        the dwarf of the title novella, is an inventor of unlikely board games. Foote, of ‘Foote’s Last Stand’, is either a 117 year old neglected
        novelist or failed pornographer. Boot is factotum to Dr Hieronymous Bladder, a psychiatrist in improbable disguise, pursued by his patients
        Bones and Ophul. In these novellas Henderson takes comedic invention to its extreme; he reveals the tragic scope of the clown. ‘Nocturnal
        Emanations of Fish’ tells many stories in one. Story-telling is a ploy to stave off the narrator’s suicide. The ‘death of the author’ is declared
        from within. De Sade is a wimp, the anti-novel like Jane Austen when the demented author makes his final great plea for sanity. His control
        is extraordinary. ‘Fish’ alone would confirm Henderson as a radical and significant writer.
    price: 24.95
    isbn: 064624048X
    release_date: "1995"
    page_count: 178
    reviews:
        - title: Australian Book Review
          text:
              Reviews Fiction Shorts Kate Macdonell (academic) Australian Book Review , No. 180, May 1996 When Graham Henderson’s first novel, The
              Mountain , was published and subsequently short-listed for The Age Book of the Year Award in 1989, many reviewers both noted its thematic
              investment in the bizarre, the uncanny and the ambiguous, and commended its ambitiously self-reflexivc and polysemantic qualities. It was
              seen as a ‘difficult’ book - but one which was intellectually rewarding to read. Textual martyrs and masochists alike will be pleased to
              learn that with this collection of novellas Henderson is back in fine form. But don’t be put off if you’re not into pain. Readers who simply
              wish to engage with Henderson’s depictions of paranoid and schizoid subjectivities, his language games and/or his often parodic representations
              of the unconscious, may also find this book tempting. The novellas in this collection focus on several repulsive, impotent and incredible
              male characters. In ‘Diary of a Dwarf’, a self-obsessed dwarf named Ironmonger records ‘tall stories’ about his life and in ‘Boot’ the eponymous
              anti-hero acts as the maladroit ‘side-kick’ of Doctor Hieronymous Bladder - a man who not only has an inclination towards parapraxis and
              a penchant for tugging at the rubber genitalia on the ape-suit he wears, but one who also fears that two of his former patients are plotting
              his destruction. ‘Foote’s Last Stand’ constitutes the edited memoirs of an arguably pornographic writer, Silas Foote, and in ‘Nocturnal
              Emanations of Fish’ - the most compositionally experimental and compelling novella in the collection - the unnamed protagonist obsessively
              writes lurid stories about the many characters who cramp his bleak and murderous mind. Although ‘Boot’, for example, is somewhat tedious,
              the collection as a whole is worth consideration - but just remember that if you do decide to broach this host of postmodern imaginings,
              you’ll need to leave ‘commonsensical’ concepts like credibility and logic outside the front cover.
        - title: Muse Review
          text:
              "Books Robert Verdon Muse (Canberra), No. 152, June 1996 Graham Henderson’s bizarre humour reminds us of our own comicality. These novellas
              reek of the insane and the unrequitedly erotic. ‘Diary of a Dwarf’ is the tale of a monomaniacal midget called Ironmonger whose chief interests
              are voyeuristic sex and boardgames of his own devising. Prejudice against his ‘dwarfishness’ and derangement place him outside adult or
              even human society. As a result, he is guileful yet artless, noting in his diary that ‘in the game of life I’m a complete novice.’ Aren’t
              we all. ‘Boot’ explores the combative relationship between a male nurse called (curiously) Boot and a paedophilic psychiatrist named Dr
              Bladder, both besieged by enantiomorphic mental patients (also male). Boot creaks on in timeless subordinate confusion, while Bladder lashes
              out at him with professional arrogance. The result is superb satire. I winced, though, at the Goonish bits in pseudo-German (or Yiddish?)
              dialect: I am zee Viennese gynaecologen, Herr doktor Shtekel, at your zervice. Ach du lieber! Ich kann nicht sage mehr dann gerblunden!
              ‘Foote’s Last Stand’, about the podiatrically tragic past of a 117 year old writer of erotica-cum-pornography, is funnier still. A parody
              of literary autobiography, it will appeal to struggling novelists. Silas Foote has been writing for 80 years and published only eight books.
              Perhaps that is a good thing. The final offering, ‘Nocturnal Emanations of Fish’ is written in disjointed phrases separated by ellipses.
              Its terminal bleakness is wearying. The ‘hero’, again a mad, ageing author (one is reminded of this reviewer), is trapped in the prison-house
              of his own sinister words. He sentences us to many pointless labyrinthal narratives. these words all that matter ... these words ... all
              that keep me from suicide ... Arresting stuff, but I sometimes wonder whether we’ve come very far since the Absurdism of the 1940s."
place-of-the-paintings-and-other-stories:
    title: Place of the Paintings and Other Stories
    author: Graham Henderson
    short_description:
        After all the Napoleons had betrayed themselves, there was always love. Graham Henderson collects in Place of the Paintings
        his favourite stories of the last twenty years. He moves from the mythic tales of the early 1980s to his later magical imagery, and confesses,
        in a postscript, the wellspring of his imagination. His work is unique in our fiction. His imagination creates a remarkable cosmos - a man
        coughs up fragments of glass in a sideshow, a neanderthal woman in 19th century Russia, a letter from exile to an unknown man, an alien from
        the extinct planet of Manao, the biblical Lazarus and a female Odysseus in ‘Sand ’ . His stories are hauntingly unfamiliar but they visit
        our unconscious.
    long_description:
        After all the Napoleons had betrayed themselves, there was always love. Graham Henderson collects in Place of the Paintings
        his favourite stories of the last twenty years. He moves from the mythic tales of the early 1980s to his later magical imagery, and confesses,
        in a postscript, the wellspring of his imagination. His work is unique in our fiction. His imagination creates a remarkable cosmos - a man
        coughs up fragments of glass in a sideshow, a neanderthal woman in 19th century Russia, a letter from exile to an unknown man, an alien from
        the extinct planet of Manao, the biblical Lazarus and a female Odysseus in ‘Sand ’ . His stories are hauntingly unfamiliar but they visit
        our unconscious.
    price: 25.95
    isbn: "1876044411"
    release_date: "2004"
    page_count: 161
    reviews:
        - title: Andrew Peek, Island
          text:
              "Fiction Andrew Peek Island , No. 97, Winter 2004 Graham Henderson writes big, risky fictions. Some of them come off, others don’t.
              His best stories combine imaginative flair and luminous, rhythmical prose with a readiness to exploit the mythopoeic. They feature wonderful
              sentences like: ‘That blue, there was no name for it, no colour on earth to mirror it; it was almost like a huge breach in the constant
              world of the visible.’ Less successful stories, on the other hand, offer: ‘In my mind her small dark nipples kissing them, her body light
              as a flower, above me, beneath me, penetrating invisible sorrowing ecstasies,’ which left me entirely locked out of whatever processes,
              psychic or otherwise, the speaker is supposed to be going through. The earlier stories in the collection are among the strongest, together
              with ‘The Glass Man’, a dark tale of creativity, love and healing, at the book’s end. ‘The She-Wolf,’ ‘The Place of the Paintings’ and ‘The
              Ice’ all reminded me of William Golding’s remarkable 1955 novel The Inheritors , a sci-fi work that goes back, rather than forward, in time.
              ‘The Place of the Paintings’ is particularly impressive. It explores the workings of artistic consciousness at a profound level, in the
              person of an artist recording narratives of animals, landscape and people around him. Like the other two stories, the setting is ancient
              and tribal. As is the case with Golding’s novel, the reader is offered radically new perspectives on art, belief and identity. The challenge
              is to use the sophisticated possibilities offered by language and contemporary narrative form to evoke the oral and preliterate. The results
              test and extend language to remarkable effect. Later stories explore characters drawn from Homer, the Bible, ranging widely and in what
              might be described as a Laroussian fashion through world mythology. To redramatise the story of Lazarus from his point of view is a big
              ask, as the execution of this tale called ‘Lazarus’ indicates. According to the cover notes, ‘Sand’ is about a female Odysseus. I found
              it difficult to follow and, even with the aid of the cover note, the connection with the Odyssey remained unclear to me. ‘Room’ is a five-page,
              paragraphless dramatic monologue incorporating allusions from the Great Transmutation of alchemy to the World Tree of the Kabbalah and many
              points ancient and modern, in between. I had trouble coping with the narrator, a crucial component in any dramatic monologue, and this went
              hand in hand with a broader lack of artistic discipline and control in the use of mythic sources. There’s no lack of ambition in these fictions
              but form and content don’t always support each other as effectively as one might expect to find in, for instance, something comparable by
              Borges or Edgar Allan Poe. In addition, errors in spelling and tense indicate a lack of finish. Talking of ‘finish’, the last narrative,
              a ‘Postscript’ entitled ‘Asylum’ and billed by the cover note as a confession of the ‘wellspring of [the author’s] inspiration’, is rambling
              and, if in reality autobiographical, poses problems for the reader. In an acknowledgment to his book Henderson thanks family and friends
              for their love through the ‘last fourteen years’ of his ‘illness, schizophrenia’. The critic’s first rule is to avoid naive connection between
              life and work: in this case, though, I was left wondering if Henderson’s editor had spent enough time pondering how they worked together."
        - title: Lucy Sussex, The Sunday Age
          text:
              "Short Fiction Lucy Sussex The Sunday Age , 26 October 2003 The fantastic is not only found in enormous tomes with dragons on the cover.
              Indeed, it is increasingly found in ‘mainstream’ or ‘general fiction’, as with this book. Place collects Graham Henderson’s favourite stories
              written over the past 20 years, although less than half have been previously published. The mode here is elliptical, languid, even Borgesian
              (said writer being namechecked in the book). Nor is it particularly Australian, the sensibility and settings tending to the European. We
              get an ex-sideshow freak, cursed with the ability to cough up glass; cavemen; even an alien. Pick of bunch: the five and a half pages on
              the Biblical Lazarus."
        - title: Antipodes Review
          text:
              Place of the Paintings and Other Stories Isolation, Madness and Burdensome Prose Anna Marie Christiansen Antipodes , Vol. 18, No. 2,
              December 2004 (pgs 183-184) [Text not yet available]
the-colony:
    title: The Colony
    author: Graham Henderson
    short_description:
        Set in a leper colony on an unnamed equatorial island our narrator struggles with delirium and memory as he chronicles his
        state. He is fascinated by a strange cast of characters as they live out their destinies towards the grave, pursued by music, dance and song.
        Desire and redemption entwine like snakes as his companions invent charmed pasts, as with Minstrel Joe’s tales of jamming with dead blues
        legends. Part prose poem, part journal, part cri du coeur, part meditation on the last things, The Colony is a novella that stands intransigently
        beyond history and time, assembling a polyglot dramatis personae of outcasts. There is an urgent poetry and profundity in this book, but at
        its heart, floundering against the odds, there is the struggle to live. Henderson writes big, risky fictions. His best stories combine imaginative
        flair and luminous, rhythmical prose with a readiness to exploit the mythopoetic. Andrew Peak, Island
    long_description:
        Set in a leper colony on an unnamed equatorial island our narrator struggles with delirium and memory as he chronicles his
