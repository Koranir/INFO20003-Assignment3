botany-bay-document:
    title: Botany Bay Document
    author: Jordie Albiston
    short_description:
        Jordie Albiston’s Botany Bay Document is a sudden breakthrough from her first prize-winning collection Nervous Arcs. Using
        ship log books, legal records, paintings, etchings and maps, newspapers, private correspondence and diaries she re-creates the lives and times
        of the first women of white settlement. Their hardships, social concerns and triumphs emerge to confront us now.
    long_description:
        "They lie in rows with two to a bed Their sleeping faces assorted And dreams of mothers circle the heads of Lady King's one
        hundred daughters Jordie Albiston’s Botany Bay Document is a sudden breakthrough from her first prize-winning collection Nervous Arcs. Using
        ship log books, legal records, paintings, etchings and maps, newspapers, private correspondence and diaries she re-creates the lives and times
        of the first women of white settlement. Their hardships, social concerns and triumphs emerge to confront us now. A Poetical History of the
        Women of Botany Bay’s radical persuasion is in its approach: spontaneous poem is sculpted from intractable document. The ballad, traditionally
        a male preserve in our literary heritage, is re-invented as a syncopated form. It strikes us like drama. Botany Bay Document is an achievement
        certain to be influential. To bleed in a place makes it home. Jordie Albiston has told us how women became attached to the colonial and ongoing
        landscape. Her young women rescue us as citizens. Jennifer Harrison"
    price: 20.95
    isbn: "9781876044886"
    release_date: "2014"
    page_count: 69
    reviews:
        - title: Cafe Review
          text:
              "Botany Bay Document Wayne Atherton Café Review (USA), Vol. 8, Summer 1997 Botany Bay Document (Jordie’s second published collection
              of poems) is prefaced as A Poetic History of the Women of Botany Bay , spanning the first fifty years of settlement at Botany Bay and Port
              Jackson in New South Wales during the late 1700’s-early 1800’s. They are documentary poems about various women, some of whom were convicts
              in a penal colony there. Albiston has done her scholarly homework, thoroughly researching her many sources. In her own words, ‘In order
              to reflect these sources, poems are variously cast as bush ballad, newspaper report, missive, journal extract, inventory, lament, dialogue,
              dream, and so on. Inventory reads like rhythmic-ballad-cadence as opposed to a random rattling-off of sundry objects; they (the objects
              listed in the poem) are rather thoughtfully arranged as in words intended for a sort of jig, or song. In ‘Headcount’, the native is elevated
              above and beyond what is otherwise merely a boatfull of common occupants and farm animals: ‘varying numbers of natives (naked and / saucy
              with spears and tommyhawks) - strange animals - coloured birds - Space / so much I feel launched into eternity - and me’. The language is
              bawdy and salty, with a prevailing feel of life on or near the ocean; sinister shanties sung from ship to port... the poems often evocative
              lamentations of the wretched. From ‘Letter Home (Anon)’, ‘I / am writing myself as best I can into this / solitary waste of creation’. Botany
              Bay Document stands as a fully realized, complete work; historically informed yet immediate in its sense of timeless rage and pain. The
              poems are well-structured and read well off the page. They are predominantly tercet, quatrain, or cinquain stanzas. The third and fifth
              stanzas of ‘Asylum Song’, respectively: ‘Bridget McGilvray was the officers’ whore / While she was yet in chains / And conceiving aboard
              the Experiment / She was punished again by the government / And she is gone insane ’ and, ‘Bridget McGilvray has lost her sweet bairn /
              And ne’er stops wailing its name / She lives all alone in her top-floor room / Her hands at her hair instead of their loom / For she is
              gone insane ’. This is an important book of poems, an edification of the female spirit to survive with dignity in what was then, especially,
              more of a world ruled by men."
        - title: Australian Womens Book Review
          text:
              "Dovetails and Other W/Edges Bev Braune Australian Women’s Book Review , Vol. 9, No. 2-3, Spring 1997 The act of writing poetry is not
              unlike Hare’s decisions of principle, running in the grooves of experience to acknowledge that ‘to act on principle is not to have a principle
              already, before we act’. The explorations of [Jill] Jones [ The book of Possibilities ], Albiston, [Caroline] Caddy [ working temple ] and
              [Morgan] Yasbincek [ Night reversing ] largely involve how ‘we orient ourselves’ with respect to the world in our backyard and qverseas.
              Their poems are about learning how to behave and, at best, daring to assess the consequences. They are primarily concerned with the way
              we have acted and may act: ‘learning by tides’ (Jones), travelling through foreign landscapes (Caddy), recalling the misdemeanors of personal
              intimacy (Yasbincek), reviewing injustices (Albiston). What readers are familiar with in Judith Wright’s work - charting the wide brown
              land - is extended in Jones’ King’s Cross, Albiston’s Botany Bay, Caddy’s Beijing, and Yasbineek’s Western Australia and Canada, to decisions
              about creating our future landscapes... Albiston’s ‘chain-stitches’ in traditional and free verse, ‘chart[s] gangs of [female] convicts’,
              ‘quilted quotations’ and ‘appliquéd tracts’ constantly on the verge of posing the proposition how should we view the many tracts? for her
              language keeps the characters at a distance. They are caught in the wordage that would have restricted their own expression - the language
              of the colonial master. The book raises questions about the difficulty in using language from an historical text to comment on the text
              itself. Are the poems ‘The Escape of Our Mary Bryant’ and ‘Mrs Bellasis...’ meant to repeat the records or comment on them? The wedge of
              historical moment with retrospective comment is a tight squeeze; it’s not a space easily chiseled effectively. The poet’s voice seems weighed
              down by the gravity of her source documents on convict women and, given her material, understandly so. Albiston appears fixed between the
              seams of verse until we encounter the gems from the middle of the volume onwards. These include ‘Moonfish’ and ‘Asylum Song’ where the impact
              of the source document and the poet’s understanding are harmoniously communicated. For me the strongest poems in the volume are ‘Dorothy
              Paty Paints the Country’, ‘Twelve Maternal Verses’, ‘Dreaming Transportation’ and ‘The Emancipist Finds Parts of Her Body’... The book of
              Possibilities , Botany Bay Document , working temple and Night reversing are loaded with cold lines and hot edges, carving the features
              of experience, exposing a cacophony of encounters with possible futures. You will find something between these pages to pinch your nerves.
              If it’s not ‘garbage collectors... banging the sides’ of a truck, or ‘travelling to Jing De Zhen’ where ‘fields are melted triangles’, it
              will be the sound of an emancipist ‘gasp[ing] on the last of her sin’."
        - title: The Sydney Morning Herald
          text:
              "Journeys of the spirit to Botany Bay Heather Cam The Sydney Morning Herald , 19 July 1997 There is a firmer glue than a poet’s ego
              binding these books [Jordie Albiston, Botany Bay Document , James Cowan, Petroglyphs , Mark Brennan, The Olive Grove ] together into three
              satisfyingly cohesive wholes. Vivid, assured and anchored in a reality beyond the poet’s purely personal experiences, each of these three
              highly individual collections displays a writer firmly in control of his or her material. Albiston, Cowan and Brennan have set themselves
              defined tasks: respectively, to revisit the early years of white settlement at Botany Bay from a female perspective; to embark on a spiritual
              journey through various stark yet exotic far-flung landscapes; to celebrate ‘the greatest little orchard in Australia’. Collaboration with
              historical sources and documents enlivens and enriches Albiston’s and Brennan’s work, while Cowan’s and Brennan’s poems have been enhanced
              by the sympathetic work of the graphic artists Barry Gazzard and Robert Harris. Fascinating historic detail and the particularity of actual
              physical places fortify the poetry of all three collections - especially Botany Bay Document , which explores white women’s experiences
              in Sydney in the 50 years from 1788. Having steeped herself in letters, maps, paintings, newspapers, diaries, journals, bush songs, and
              nursery rhymes of the period, Jordie Albiston writes a ‘documentary poetry’. She includes fragments derived from these sources (italicised
              for identification and authenticity) to help capture the language, flavour and emotional tenor of this bygone era. The rhythms of the Document
              are a compelling combination of sea shanty, lullaby, convict song and antiquated speech patterns, depending heavily on rhyme to reinforce
              meaning: We are cut-purses housebreakers strumpets and Whores we are shoplifters Curse-makers footpads and more. We’ve no morals or manners
              but are debauched and depraved anonymous sweepings from the Old Country floor. Feed like dogs till the slops are gone bleed into the same
              putrid pail sleep with the twitch of the vermin-itch and wake to gaol ‘The Hull’ Albiston’s material is sturdy, arresting, and imbued with
              strong emotion. Her dramatic monologues are spoken in part by desperate convict women who have fallen foul of a cruel system. They reveal
              a double standard that sees them transported for loose behaviour, while officers may take liberties with them without punishment. One mourns
              the death of her child born below deck; another appeals for a pardon so that she can be reunited with her children back in England; a third
              stays on to manage her own farm after serving out her sentence, describing an emancipation unavailable to her back home. Also given voice
              are the free women: the indolent wives of officers whiling away the hours painting the exotic flora, attending tea parties, embroidering
              samplers; Mrs Macarthur, privileged and bored; the determined woman intent on being granted land in spite of her gender; the recent emancipist
              amazed at her newly won freedom. Botany Bay Document provides a rare and robust engagement with the events, conditions, language and cadences
              of an earlier period."
        - title: Overland
          text:
              "One Dead Poet and Five Alive : Botany Bay Document Michael Dugan Overland , No. 147, Winter 1997 The poems in Jordie Albiston’s second
              collection examine the lives of women during the first fifty years of British settlement in New South Wales. The poems draw on a range of
              documentary and pictorial sources, including letters by convicts and other women, the Sydney Gazette , journals, paintings and drawings.
              The result is a refreshingly objective series of poems that take a variety of forms that reflect their original sources. Often Albiston
              quotes directly from some of her source material, using italics to show where this has been done. It is an effective technique. For example,
              the first stanzas of ‘Elizabeth Walsh Gets a Grant of Land’: 1. Petition to Governor Macquarie I want to tell you I have made up my mind
              to settle a farm in this Country I have gained some land at Richmond Hill I purchased with personal bills but require more for my Cattle
              and Stock and despite my gender and lack of wedlock petition just the same 2. Reply I cannot comply with your request it being contrary
              to Regulations to give Grants of land to Ladies"
        - title: The Mercury Review
          text:
              "Books : Botany Bay Document Tim Thorne The Mercury, 3 March 1997 Jordie Albiston has attempted to create a new form, ‘documentary poetry’,
              in her Botany Bay Document , an account in verse of the women of the first white settlement. The most powerful pieces are those where she
              gets the balance right between her own language and the women’s own words, avoiding the flatness of the ‘found poems’ of historical documents
              and the fake antiquity of the words she sometimes puts into her characters’ mouths. This book makes a long-neglected aspect of Australia’s
              history come to life in a way that prose accounts could never do."
        - title: Cordite Review
          text:
              "Snapshots: Jordie Albiston - Botany Bay Document Kathielyn Job Cordite, No. 2, 1997 In this ‘a poetic history of the women of Botany
              Bay’ Jordie Albiston writes predominantly of convict women in the early years of the settlement. The emphasis is on facts and recorded experiences
              and the frequent use of ballad form suits the restrictions of the content. At its best the rhythmic constraints of the ballad cohere with
              uniformity and narrow experience, as in ‘Lady King’s One Hundred Daughters’: They lie in rows with two to a bed their sleeping faces assorted
              And dreams of mothers circle the heads of Lady King’s one hundred daughters. Poems that move the furthest beyond the story into an imaginative
              realm offer more of the experience in ‘The Emancipist Finds Parts of Her Body’, Albiston observes: Callused and curved into cabbage-leaf
              curls with needles for fingers and bread dough for palms they hang at the end of work weary arms too stunned to become unfurled Is that
              your new son? The life of this collection is more a result of voices of the past being given room to speak in the present, rather than from
              any great poetic force. ‘In Letter Home (Anon)’she writes: I take up my pen to acquaint you with my disconsolate situation. By frequently
              using run-on lines and internal or half rhymes, these ballads are contemporary in tone, which, along with the italicising of even the shortest
              quotations, contributes to a sense of honesty in this collection."
        - title: Australian Book Review
          text:
              "Innocence Scorched - Botany Bay Document: A Poetic History of the Women of Botany Bay Beate Josephi Australian Book Review , No. 187,
              December 1996/January 1997 The captains - Quiros, Cook - have long had their visions manifested in Australian poetry. Now Jordie Albiston
              has set out to document the women’s voices of the early settlement. Theirs was a different exploration. Their voyages were ‘well below sea-level
              and sea- / sodden deck’, their view was confined by the planks of the hull. No new Jerusalem unfolded for them, ‘four rows / of miserable
              huts are what they / call our two streets.’ In her admirable attempt to capture the history of the women of Botany Bay in poetry, however,
              Albiston, does not dwell overly on the dejected. The rhyme and rhythms of song - the disenfranchised’s expression of hope and defiance -
              inform many of her poems. It is a nod on her part to the convict ballad, though those poems which are conceived as song are far more akin
              to the lyrics of Les Misérables . Nor is ‘Child-Death: A Lament’, for example, an Anne Bradstreet-like search for a higher will to atone
              for personal pain. It is written for a single hearty voice, and chorus, more a transport’s lament than a mother’s individual grief. This
              is followed by ‘The Dialogue between two Whores’ which carries strong Brecht/Weill overtones. But the Botany Bay Document , spanning the
              first fifty years of the colony, is no songbook. Albiston skilfully chooses tone and subject matter to give as varied a picture as possible:
              there is a ‘Headcount (1788)’ and an ‘Inventory (or What to Bring When Setting Up a Colony)’, letters home, compilations from the Sydney
              Gazette , vignettes drawn from sketches, journal extracts or poems like ‘Missing Him’ or ‘Moonfish’. The latter two, both outstanding poems,
              are first person monologues spoken to no-one but the speaker herself, their plaintiveness moderated by the lyrical quality of the verse.
              Albiston’s poetry is very assured, eschews sentimentality and keeps to the earthier view of women on whom the fruitfulness of the new colony
              depended. Visions, like the captains’, would be misplaced. I could not help being reminded, when reading the Botany Bay Document , of my
              visit to the Museum of Sydney. These poems tread a similarly cautious line in asserting their presence on the new coast, fully aware that
              the land was not terra nullius . The museum specialises in drawer upon drawer of delicately arranged fragments. Albiston’s poems have a
              similar preference for small scopes. What the women knew were their own lives, and that of their fellow convicts. Any conquests of the continent,
              or the spreading of an Empire, were of no importance to them. The Botany Bay Document is as complete as today’s consciousness permits, and
              a pleasure to read."
        - title: ArtStreams Review
          text:
              "Brand New and Fresh Made: The Sum of Us Jennifer Harrison , Cabramatta/Cudmirrah Jordie Albiston, Botany Bay Document Anne Delaney
              ArtStreams , Vol. 1, No. 2, December 1996/January 1997 What more could a reader ask on a dull, dreary summer’s day than to be presented
              with two slim vols of poetry to bring a little glimmer of light and pleasure. It’s always a joy to read brand new, fresh-made, sweet-tasting
              poetry, and Jennifer Harrison and Jordie Albiston certainly added considerably to the quest for lift-off on yet another bloody Monday which
              didn’t even have the decency to smile for us. But never mind, I thought, here’s something to gladden us, just as soon as I saw these elegant
              little books. Both poets, I should imagine, will be delighted with the handsome presentation that their publisher has afforded them, a pleasure
              in itself in these cheerlessly rationalist times, and a gesture of pride in the achievement of both women. And the publisher’s not wrong.
              The poems in both offerings live up to the promise of their covers: for once we can rely on the gift wrap. And yes, both volumes would make
              marvellous gifts for the poetry lover, or the history student, or those who know the value and rewards in succouring and encouraging Australia’s
              burgeoning body of literary activity and its talented practitioners. Both these offerings could reflect, arguably, the sum of us; Sydney-side
              perspective. It all depends on one’s remembrances and prejudices and apprehensions. We see in the other something of ourselves in the birthplace
              of the nation two hundred years ago, forty-odd years ago and a scant five minutes since. Both carry something of the same message of exile
              and alienation and whether it’s on a national or more personal level, that’s something which has been passed onto all Australians one way
              or another over the generations. There is also the discomfort of revisiting and acknowledging rent memory, disappearances of the familiar
              and known, and the flight of the fiducial and the translation of object and meaning... Taking a cursory glance, next, at some old history
              books, I found that I was pushed to find much mention of the experiences of women, until I reached the late 70s. Since then, slowly, but
              very carefully, omission is being rectified and attention focussed on convict women and migrant women whose stories have contributed to
              the reclamation of a hitherto invisible cultural and social history. And an important and interesting history it’s proving to be, challenging
              earlier assumptions and recasting preoccupations of what was and is White Australia. Never one to care much for the myths of early Sydney
              which seemed to derive from the fact that new Australians, hungry for a mythology in a country barren of white people’s legends were willing
              to improvise their own constructs, they’ve always seemed a case of half a loaf. Jordie Albiston clearly redresses this shortcoming in Botany
              Bay Document and provides a solid dollop of leaven to all the mountains of dough we’ve been asked to pound in the past. And, just what sort
              of a landscape was it that Jodie Albiston escorts us through? From The Hobart Town Gazette of March 1, 1817, we read that Mary Connor, convict,
              was charged with stabbing Thomas Welsh with whom she cohabited. Evidence in court established that Mary was severely mistreated, acted in
              self-defence, and that Welsh was guilty of gross provocation and a liar to boot. Mary was sentenced to six month’s hard, and he, to one.
              The Gazette also cheerily reports that ‘A Hibernian whose finances were rather low, brought his wife to the hammer this morning, and although
              no way prepossessing in appearances, to the amazement of all present, she was sold and delivered to a settler for one gallon of rum and
              20 ewes… Last Saturday and Sunday we had another fine and gentle shower of rain...’ Such was the status of women in that fledgling colony
              which became a penal dependency of New South Wales in 1803, and which was not in any way markedly different from young Sydney Town. It is
              with relief, then, that we hear Jordie Albiston’s voice speaking on many of our foremothers’ behalfs, broadcasting their grievances and
              promising some belated dignity to balance the misery of their lives. It is never too late, we believe, when in ‘Lizzie’s Pact’, we listen
              to the suppressed, but no less despairing hatred of the abused for the reviled torturer, uttered, we can imagine, through the clenched teeth
              of desperate passion: The pact with the rapist is one of paralysis you move and I’ll kill you. The deal with silence is you tell you die.
              The bargain with the body is one of demembering his hand from his eye from his indigo gun. If I had a right to this body of mine it would
              be transportation towards some kind of light. If I had a hope on this silent sea it would be to set sail into waters of song. If I had a
              message for young master Munroe it would be it would be a fistful of flowers a wreath of my wrath a litany of lilies sweet- scented as blood
              to bloom and bloom in his favourite room for the term of his natural life. In this poem, the poetry is, typical of the entire collection,
              tight and condensed, and while the imagery ‘embraces’ the unspeakable outrage of violation, the detestability of the violator and a fancied
              and longed-for revenge, neither it, nor tone, nor language is indulged or sentimentalised. Like the victim, it is fully controlled, with
              a sparing and exact use of words which blossom into a barbed bouquet, and rhythms which grow more fluent and buoyant, more deceptively beguiling,
              sing-a-long even, when the ultimate of punishments is attained and the sufferer herself is avenged. We can almost see her performing a little
              canzonet, snapping the thread of tension which the poem initially coiled taut. Given that a primary function of documenting the past is
              also to learn about the present, Jordie Albiston’s Botany Bay Document marches in cadence with this aim by offering the reader a series
              of sites of juxtapositions of experiences, even endurances, with which we can compare. Everywhere her images continue vivid and vocal, teasing
              and terse, pathetic but panoptic, and sometimes cuttingly cruel, as when we’re invited to drop in on Mrs Macarthur’s Tea Party: As I was
              saying a sad and severe case of Women Women everywhere but ne’er a one to bend my mind to save that pack of vile obscenities clothed in
              naught but ulcers and rags brawling for Sport at the Factory my dears. Yet with your arrival our little circle has become quite brilliant
              I’m sure you’ll agree one sugar or two? Milk Mrs Paterson cream Mrs King? Sweetbread? Griddle-cake? Call out for anything. Yes as I was
              saying a distinct drought of company here in the Antipodes no one to sit with or appreciate the View no sharing of news or profitable Conversation
              except for Mary Johnson the Chaplain’s wife (top up your teacup?) and you know what she’s like. Yes some times I find myself quite deprived
              of Distraction despite the merinos and running the farm and a third pot of tea let me ring below stairs or another eclair now as I was saying.
              There is something quite shocking in the lack of understanding and compassion that this ugly, rigidly delineated society, class-ridden to
              its bootstraps, could extend to the wretches it despised and rejected, especially its women. It is even more shocking to reflect on the
              ignorance, revulsion and lack of tolerance of the untainted wives of the Masters, most cosily unsympathetic to the pain and distress of
              such as the very young woman, lately child, who mourns for her mum, her home and her past, and grieves for her present, sick with fright
              of her femininity, in ‘Moonfish’: ...I am become a woman in sad Sydney Cove with no companion or kin to comfort me in the misery of my secret
              ailing. The tide inside is timely turning the fish in me are hauling heavy through the hellish bone… None of which is to say that Botany
              Bay Document doesn’t offer us any appealing images nor any joys and triumphs, no matter how small a piece of the main. Pleasing it is to
              listen to Christiana Eliza Passmore who reports that: The three boys are: growing up fast wild as young kangaroos mischievous as monkeys
              proof of my womb’s capacity The baby girl is: now eighteen months old such a very fine child beginning to be interesting proof of my womb
              The children are: good and affectionate happy and healthy learning their lessons proof Gratifying it is to know that sometimes, things were
              what they’d always seemed to be. I can’t recall when a suite of poems has so immediately found a response in me as Jordie Albiston’s. Almost
              every line on every page hurries concern, sometimes anguish, to the forefront, and not only because of the reflected pain and strain of
              being Woman in this early hell-hole. Informed by a collection of formal documents, ship log books, legal records, painting, etchings and
              maps, newspapers, private correspondence and diaries, this is an outstanding evocation and re-presentation of a past and shames which still
              too many don’t know ever existed or could even have happened. Like the aboriginal father in ‘View of Port Jackson’, from the South Head
              watching the newcomers trammelling then and traipsing over his home, complacently desecrating his sacred ground just as though they’re figures
              in one of John Eyre’s ‘Views’, and who, we might imagine, we can now hear wailing, ‘There goes the neighbourhood’. In many ways, these collections
              offer comment on the sort of society that we’ve bequeathed to ourselves or allowed to be imposed on us. Except for the gloss and veneer
              of a relative gentility that many of us assume, it is sometimes hard to see just what difference two hundred years has made to our society.
              If nothing else, these poems scream at us to pay attention, now! and lucky we are to have such ingenious and well-crafted guides to any
              such re-evaluations or discussions of our past and present. Both Jennifer Harrison and Jordie Albiston have, we’re told, won serious attention
              and consideration from a knowledgeable and discerning readership. Jennifer Harrison’s earlier collection, Michelangelo’s Prisoners , won
              the 1995 Anne Elder Award and was commended in the National Book Council’s Banjo Awards in the same year. Jordie Albiston first collection,
              Nervous Acts , received first prize in the 1995 Mary Gilmore Award and second prize in the Anne Elder Award and was shortlisted for the
              New South Wales Premier’s Kenneth Slessor Prize. No mean accomplishments, these. One hopes that these two women continue to write and write
              often, and that a much wider readership can come to share in the joys of their poetry and find pleasure and pride, insight and consolation,
              in their words."
        - title: The Age
          text:
              Botany Bay Document Fiona Capp The Age , 7 December 1996 In this poetic history of the women of Botany Bay, Jordie Albiston dramatises
              the lives of female convicts, whores, artists, free women, colonial hostesses. Each poem is accompanied by a brief biography of the woman
              concerned and although poetic licence has been taken in transforming documents into poetry, harsh reality is never far away. Albiston follows
              up her award-winning first book with a confronting and emotionally charged collection of poetry resonant with the voices of the dead.
the-hanging-of-jean-lee:
    title: The Hanging of Jean Lee
    author: Jordie Albiston
    short_description:
        The Hanging of Jean Lee follows Jean Lee from adventurous girl to hanged woman, capturing the period around the completion
        of the Harbour Bridge, milk-bar youth culture, American servicemen during the war, and the petty criminals drawn to the 1949 Melbourne Cup.
    long_description:
        Prize-winning poet Jordie Albiston’s third book is dramatic. It spotlights the crunch times in the life of Jean Lee 1919-1951
        from adventurous girl to hanged woman. It captures the times, the completion of the Harbour Bridge, the youth culture of the milk bars, the
        'overpaid, oversexed, over here’ American servicemen during the War, the invasion of petty crims for the 1949 Melbourne Cup won by Faxzami.
        Above all, it understands. Jean's last God-troubled speeches raise her mean life to suburban tragedy. In this richly magical procession of
        poems, Albiston re-imagines how the grim life of Jean Lee stepped along its course to her execution. The book is a triumph of grasp and sympathy.
        Chris Wallace-Crabbe The God poems are terrific - they have unafraidness and tension that is sheer coiled energy. The Hanging of Jean Lee
        is strong, it’s passionate, it’s truthful and it’s complex. And it’s tremendously disciplined poetry. Alison Croggon
    price: 22.95
    isbn: "9781876044251"
    release_date: 1998, reprinted 2004, 2013
    page_count: 75
    reviews:
        - title: Quadrant Review
          text:
              "Reviews Something is Always Ushering Us: Recent Australian Poetry Alan Gould Quadrant, No. 364, Vol. XLIV, No. 3, March 2000 A thoroughly
              ill-written book on the HSC syllabus can suggest a committee has been successfully lobbied - one hears the gossip. Equally, its members
              may simply be ill-read in Australian poetry. Either way, the damage is the same when a wideawake Year 12 student, coming from the superb
              craftsmanship of Wilfred Owen or Judith Wright to the prosy inconsequence of Westbury’s ‘These Days’ or ‘After the Deadline’ [Mouth to Mouth],
              and finding in all that accessibility not a shadow of insight or entrancement, asks, ‘And do I also count these with what is wise, moving
              and good in poetry?’ Somewhere, I suggest, a curriculum committee needs sufficient respite from its sessions to form its taste in what can
              and can’t pass as a poem. That committee might do well to place The Hanging of Jean Lee (Black Pepper) before its students, for Jordie Albiston’s
              verse novel is a thoroughly compelling, incisive and finely wrought sequence of poems which probes the fate of a particular woman, Jean
              Lee, hanged in 1951 at Pentridge for her part in a murder. Stories of this kind, whether in verse or a newspaper column, have a characteristic
              momentum, one that is governed by the reader’s grim foreknowledge of how things will end. This momentum entails an emotional response, in
              part dread for the narrowing of a life towards the ghastly and clinical details of the scaffold, in part a furtive excitement as to how
              this character fell towards this fate, how a life entered a vortex. Elizabeth Bishop’s ‘The Burglar of Babylon’, and some of the Icelandic
              ‘outlaw’ sagas have a similar fatalist momentum. With an acute eye for period and sociological accuracy, Albiston takes us through Jean
              Lee’s thirty-two years from birth notice to execution. There are the skipping rhymes of childhood, domestic frugalities, the experience
              of church, 1930s Sydney and the building of its bridge. Into this everyday, and with telling constraint, Jean’s depressive episodes and
              her later rages are introduced. Indeed Jordie Albiston’s constraint is impressive, for Jean Lee’s story doubtless held opportunities for
              polemics whereby a present sensibility punishes the past for being sexist, judicially brutal, whatever. But this poet is an artist. Her
              focus is steadily upon the vivid individuality of her protagonist. It is Jean Lee who reacts characteristically against her treatment by
              the menfolk in her life, who denies God and church as her personality compels, who goes with piteous realism to the gallows. The moral underpinning
              of the story is the surer for this fidelity to character and detail, and so much more accomplished than the best-seller collections I have
              in mind in my third paragraph above. But this verse novel compels, not only for what may be visualised, but also for what may be heard.
              Albiston’s ear is as finely tuned to childspeak as it is to Australian working-class argot of the 1930s and 1940s. Throughout the story’s
              four chapters there is a rhythmic arrangement similar (as I understand it) to rap music where rhymes are hidden within lines but where the
              momentum of the narrative falls towards them, sometimes with the effect of nursery rhyme, sometimes with a tolling of finality, sometimes
              giving an aural mimesis of the tensions in Jean Lee’s psyche. Here, in the early 1940s, she is sloughing a husband: You licker you stickler
              you fixer of rhymes You know how you mangle me do it keep doing it do it again You’re the genius of undoing love the shade on my shadow
              you double the load I lug through the minute the hour ... ...Get off my future You’re hurting my heart you monkey you husband you florid
              false start I don’t like the way you sing in my choir and I hate the sound of your part. Finally, Jordie Albiston shows great art in structuring
              her story. For all that it proceeds chronologically, individual poems are intruded into the childhood and subsequent sections, foreshadowing
              Jean Lee’s fate and having the effect of gradually straitening the life in a way parallel to her depressive episodes and the paltriness
              of her criminal activity prior to the murder. The arrangement is thus best comprehended as a musical one of themes being anticipated, repeated,
              varied and integrated. A finely made novel requires a fine control of time, and The Hanging of Jean Lee is a case of finely judged premonitions
              and flashbacks. The result is a most convincing story and a most resonant work of art. I hope it brings the poet and her publisher prosperity
              and the gratitude of thousands."
        - title: Cordite Review
          text:
              "The Hanging of Jean Lee Karen Attard Cordite, No. 6-7, 2000 The Hanging of Jean Lee is based on fact. Lee, along with Robert Clayton
              and Norman Andrews, was convicted in 1951 of the torture and murder of William (Pop) Kent in his boarding house bedroom. All three were
              executed in that same year. Jean Lee was the last woman hanged in this country and the only woman executed in Australia during this century.
              The case was a cause celebre, minutely and sensationally reported in contemporary newspapers. Albiston has acknowledged her debt to the
              media by entitling the four sections of the book ‘Personal Pages’, ‘Entertainment Section’, ‘Crime Supplement’ and ‘Death Notices’. There
              are also several found poems in the collection which consist either of headlines or actual reportage. Some of the poems are written in the
              third person but many employ Lee’s voice, although her mother and the executioner are each allowed to speak in a single poem. Pop Kent is
              conspicuously silent, unless you count his wounds - meticulously enumerated in ‘Coroner’s Report’ - as a message written on his body, a
              silent record of abuse. Any contemporary exploration of a violent crime must negotiate the dichotomy between acknowledging the victim and
              an attempt to understand how the perpetrator came to be as they are. To give Pop Kent a voice would have been one solution to this dilemma
              but it wouldn’t have reflected the reality of the trials. The dead don’t speak. Albiston has chosen a more subtle approach. The Hanging
              of Jean Lee begins with Lee’s childhood: I am four years old I can reach the front door get letters from the letter-box and bring in the
              milk go buy the paper and clean up what’s spilt ‘Mum’s Little Helper’ But the reader’s expectation of a simple linear progression from birth
              to death is disrupted by the poems ‘Interrogation’ and ‘Confession’ written in the voice of the adult Lee and inserted amongst the skipping
              rhymes, dolls clothes and diary entries of the first section. The innocence of childhood and some of the formative events that may have
              precipitated Lee’s later rage are mediated by the presence of her victim. Albiston doesn’t let us forget that a man was brutally murdered.
              His voice may be absent but the violence done to him isn’t: Yes I cut the old boy with a small pocket-knife though it wasn’t particularly
              him Yes I burned his skin with some Players Bobby bought beat and bashed till he threw the towel in I s’pose I sort of done my block hit
              him with a bottle and a piece of wood and then he fell over ‘Confession’ But ‘Confession’ also contains echoes of the child who did ‘what
              was to be done’ when she attempts to take sole blame for the murder ‘I’m who you / want I did the old man it was me and me alone’. Mum’s
              little helper can’t clean up this mess. The hanging of Lee, as the title suggests, is central to this collection, the point to which all
              else leads. The prisoner is given into the hands of the executioner, and so is the poem: ...I tie her carefully to the chair that she may
              feel held as she falls Adjust the hood and get the nod then let the trapdoor go ‘The Hangman’s Handbook’ The roots of the word execute lie
              in the Latin ex-sequi: to follow out, pursue, perform. In The Hanging of Jean Lee Jordie Albiston has achieved all this."
        - title: Ulitarra Review
          text:
              "‘Cliff Hanging’ & ‘Gliding’ - The Hanging of Jean Lee Judy Johnson Ulitarra, No. 15, 1999 When I started reading The Hanging of Jean
              Lee, I was reminded of a comment made by Peter Boyle a few years ago that ‘powerful facts and stories are not in themselves, poems’. This
              statement concerned what he had judged to be the disturbing trend of some poets to prop up their work with sensational subject matter. I
              mention this not to accuse Jordie Albiston of ‘propping’, but to offer her writing as an example of how accomplished poetics and sensational
              story line can come together to create something memorable. The Hanging of Jean Lee is a series of poems about the life and times of Jean
              Lee, a woman I confess I knew nothing about. The book spans thirty two years from Jean’s birth in 1919, through her growing up, becoming
              enmeshed in a life of prostitution and petty crime, up until her hanging in 1951 for her part in the murder of aging bookmaker William (Pop)
              Kent in Carlton. The book is divided into four newspaper-like sections: ‘Personal Pages’, ‘Entertainment Section’, ‘Crime Supplement’, and
              ‘Death Notices’. To add extra illumination to events, several newspaper articles are interspersed between the poems. The most intriguing
              part of the collection is Albiston’s poetic exploration of the mind of Jean Lee. Although there is a chronology of events listed near the
              front of the book, the poet has chosen not to use a linear narrative to string the poems together. Instead, she dislocates the storyline
              - time and perspective leap deftly forwards, backwards and sideways. The narrators of the poems are Jean herself, her mother, and several
              other characters as the appear in the unfolding drama. In ‘Mum’s Little Helper’ the speaker is Jean at four years old, telling us my job
              is helping my Mum When she gets tired and has her lie- down I wash up mop lino do what’s to be done I run around tidying up The next poem
              leapfrogs twenty six years to where Jean in ‘Interrogation’, referring to Pop Kent’s murder says Norm and me killed him while Bobby walked
              up Lygon Street I squeeze out a tear so the mongrels will know what betrayal and fear can do to the girl. This juxtaposition of innocence
              and experience is a powerful tool Albiston uses often and to great effect. Like the ‘Innocents’ in Blake’s songs, Jean’s early childhood
              seems unremarkable and unthreatening. The fact that she deviates so far from the straight and narrow creates the tension of unanswered questions.
              There are foreshadowings of how Jean will end up, however. In ‘Sewing Hints,’ her mother tells us of young Jean’s dolls: See how she sticks
              in old dress-pins for pearls a globe on each lobe In a later poem, ‘Bedroom Burial’, Jean dismembers the same dolls: plucks limbs like petals
              he loves me not and grasping a head in each adult hand Snaps it back Her growing sociopathic detachment is at its height in ‘Confession’
              where, speaking of the murder, she says Yes I cut the old boy with a small pocket-knife though it wasn’t particularly him God appears, but
              he seems more an adversary than a comfort. In ‘Dear Diary (1934)’, Jean says I will kill Him but first I will force Him to crawl through
              the valleys and shadows scrawled over my soul I will teach Him the scriptures from inside of me Despite her anger and obvious depression,
              Jean is clearly not a monster. In the tender ‘Jilly’s Song’, she says of her daughter When she cried I was burned a wire on each nipple
              a fire in my womb a start-up spark to the heart. Albiston has a particular gift for conjuring immediacy through unerring colloquial voice
              and a historian’s concern with re-creating time and place accurately. At no point in this powerful collection is there a sense the poet
              is intruding on the poems. Instead, she allows them to tell their own story. It’s an un-putdown-able read."
        - title: Sidewalk Review
          text:
              "Jason Sweeney on The Hanging of Jean Lee Jason Sweeney Sidewalk, No. 2, Summer 1999 (pgs 28-29) Process: to live inside the mind, a
              world contained, unresolved lives, things scattered, remnants, maybe a murder will rate a lost soul to stardom, complicated, an historical
              name, Jean Lee, forged dentity, absent, a voice to speak it/mediate (ghost writer): poet, Jordie Albiston. A book like a scrap journal,
              photos and files, poem-biog. From domestic ideals, daydreams, god/God, betrayed by prayers and compressed by Our Father Which art [‘...There
              is no God... no more Bonnie or Clyde’ - ‘Interrogation’] or [‘When I neet God I will kill Him...’ - ‘Dear Diary (1934)’], swamped with or
              by guilt. Choices made to revile supposed heroes. Jean Lee: heroine in somebody else’s eyes. Viewing character statements, evidence of a
              life in descent, progress made, toward death. Albiston nakes no claims, she surveys and samples (like UK sound artist, Scanner, who maps
              cities by documenting the voices of people, jacking moments/movements, splicing together), it’s a surreal listory written in disturbing
              clarity, making attempts to link events, like watching a television through incessant static. No judgements, fears remain (of what can not
              be left) alone. A cut-up. A killing. A girl (Lee) painted in lucid text with a razor dipped in blood. To a page. A trial. Crimes out of
              sync, no confession to sanctify the sinner, pure admissions, statements, articles, items, witnesses, appropriations of news reports, serving
              (somehow) a narrative, a sentence. Jean went too far [‘I sort of done my block... I was joing my job’ - ‘Confession’). Albiston parallels
              and shifts stuff around. Makes reference. Textual stains. Metaphors/origins for the grime of Jean Lee’s future gutters. A forgotten (Australian)
              figure archived, a pathway leading to an execution for a dark soul. No bright impressionistic landscapes here, only worn, dirtied canvases,
              complex in detail. Words cite ‘fact’ [‘...Lee is the first woman to be hanged at this prison’ - ‘Reportage (The Sun)’]. The subject’s final
              sight: Pentridge. A scene extracted from In Cold Blood. That kind of movie. That kind of book. Images, I am reminded... and shattered. A
              sequence of events leading up to, before and after, the effect. Albiston’s ‘Mug Shot I’ and ‘Mug Shot II’ are evidence of identity trauma.
              A sick portrait of a Lee losing it, on her way down, beyond retribution. Losing children, a lost child, all measured in regret (perhaps)
              or delusion (I figure) and guilt (probably), in public domain, sensational. Her death (a bible hung with her) channelled into/through poems,
              indexed by title, name, author, subject, Jean, Jordie, Albiston, Lee. Spirit needs a tool. Jean: her name is alive in Jordie. And the book
              is framed. Executed, read, relevant. Making The Hanging of Jean Lee an epic tragedy, a libretto for a fucked up life. Reduced to an object,
              on display, for the record."
        - title: Antipodes Review
          text:
              "Poets struggle with experience - The Hanging of Jean Lee Julian Croft Antipodes, Vol. 13, No. 2, December 1999 Decorating the cover
              of Jack Hibberd ’s first collection of poetry [ The Genius of Human Imperfection ] (Hibberd is better known as a prolific playwright and
              occasional novelist) is a George Grosz drawing of one of his embodiments of Weimar decadence. And broken across the cover of Jordie Albiston’s
              volume is a collage of a photograph of murderer Jean Lee being taken to court in 1950... The unitary view of the satirist sure of the evils
              that surround him contrasted with the fragmentary identities that make the individual in the late twentieth century are neatly contrasted.
              The two views come from poets separated by thirty years and very different world-views. Hibberd writes with the weight of the past and from
              the Olympian heights of certainty. Albiston writes from the inside of a consciousness that does not understand what is going on, but tries
              to define where she is by her relationships with her family, her lovers, and her daughter. There is nothing new about the multi-vocality
              of the poet’s speaking position: Shakespeare did it in the sonnets (perhaps he could not escape his everyday chameleon exercises in writing
              for the theater), and poets have often fragmented their sensibilities in order to move in space and time. What is different, though, in
              these two poets is how one strives for the certainty of the Enlightenment in his analysis of the human condition, and the other constructs
              meaning from the bricollage of consciousness - thought and feeling, and empirical textual markers - newspapers, diaries, oral traditions...
              While Hibberd writes to mark his own territory, Jordie Albiston moves into Browning’s - the representations of consciousnesses at some other
              time and place removed from the poet’s, and in The Ring and the Book, to murder and its motivation and meaning. Albiston has chosen two
              murders: one by Jean Lee, and the other the state’s murder of her in the last hanging of a woman in Australia in 1951. Like Browning’s epic,
              the poem is based on textual remains, and Albiston’s poem is broken up into sections that mimic its newspaper origins: Personal Pages, Entertainment
              Section, Crime Supplement, Death Notices. That is not to say that each poem reads like a text from a newspaper; they do not. In fact they
              cover many kinds of inscriptions: rhymes, school reports, diary entries, direct to camera statements, coroners’ reports; but they all purport
              to be some physical and direct textual remnant of Jean Lee’s life. The narrative convention is that of the television documentary in which
              actualité is beefed up with dramatizations, speculations by others, and on-camera revelation. The style is spare and subtle, and the imagery
              direct and striking. Occasionally Jean Lee’s voice sounds more like a radio drama of the time, at least to these ears, which though it makes
              sense in a way, sounds thin and trite at times. On others, Albiston gets the right register and makes her subject’s voice move away from
              flat prose into the full weight of poetry - compare ‘Spring Carnival Fever’ with ‘Leaving Ray Brees’; in the latter the nervous rhythms
              and the heightened language movingly capture Jean’s impatience and the general war fever of late 1939: ...It seems a long way from here
              to the Front but the war’s in my blood and I simply can’t feed Baby darn socks work days be a wife while you do as you please with our life
              So that’s me I’m done little Jill’s right with Mum and I’m going AWOL tonight Give it up Honey Hand in your gun This War’s all over and
              nobody won What Albiston does well is tell the story economically and forcefully. Although Jean Lee’s life and crimes are given to us in
              a basically chronological sequence (and there is a skeletal chronology at the beginning of the collection), Albiston has allowed her subject’s
              consciousness to move around in time, building up to the pathetic climax of her hanging. The blend of direct and indirect narrative through
              real and imagined sources and revelation from Lee herself create a finely realized and sympathetic account of a blighted life. And there
              is the added benefit of some very moving and intelligent poetry."
        - title: Imago Review
          text:
              "New Writing - The Hanging of Jean Lee David Wood Imago, Vol.11, No.3, 1999 The Hanging of Jean Lee, by Jordie Albiston, is poetry of
              an entirely different kind. Jean Lee, who viciously murdered William (Pop) Kent in 1949, was the last woman to be hanged in Victoria. Jordie
              Albiston’s work is a contemporary epic, a danse macabre, which haunts us with its moribund sentiments. It is Dorothy Porter, of course,
              who has brought such gothic tales centre stage in contemporary Australian poetry, appealing with verse both muscular and accessible. Although
              Jordie Albiston does not parallel Porter’s rhythmic verve, her collection is impressive on a number of other accounts. The first thing that
              impresses one about The Hanging of Jean Lee is its elegance and technical accomplishment: fifty-five individual poems effectively hang together
              to form an impressive whole. Jordie Albiston brings to these poems a highly refined sensibility, a deft poetic talent with a sensitive ear
              for cadence and tonal modulation. Her counterpoint of rhythms, some cleverly off-beat, can be strong and compelling: I stepped off the overnight
              onto the payroll of Lennons Hotel on George served sass and liquor in appropriate rations to General MacArthur and his white GI boys at
              their Brisbane watering-hole I just had to get out of Sydney the bastard wouldn’t leave me alone ‘Living it Up’ It is a pity that the collection
              does not climax more effectively. This is partly due to the fact that this small epic is not told strictly chronologically, to the moment
              of Lee’s hanging, partly because Albiston’s technique lacks sufficient muscularity. The tale ends with a nursery rhyme: She is dead she
              is dead says Peter to Robin She is dead she is dead says Robin to Bobbin... The Hanging of Jean Lee is a musical collection of poems grim
              as Humperdinck’s Hansel and Gretel. It makes engaging reading from a poet of considerable insight and technical skill."
        - title: Overland Review
          text:
              "Poetry as History - The Hanging of Jean Lee Dipti Saravanamuttu Overland, No. 156, Spring 1999 Opening this book is like opening a
              book of photographs - the poems are instantly both detailed and absorbing. Jordie Albiston’s third collection of poetry is about the life
              and trial of Jean Lee, the last woman hanged in Victoria. Convicted, along with her lover Robert David Clayton, ‘Bobbie’, and a third male
              accomplice, of the torture and murder of William ‘Pop’ Kent in November 1950, she was hanged in 1951. As a work of imaginative sympathy
              the poems sustain an emotional force and directness that one wonders if Albiston would allow herself if writing from her own persona. Certainly
              the poems about God are like this, but the poems about childhood, about marriage and about birth, are equally striking: When I meet God
              I will kill Him With Bible and knife I will cry for His life in words even He won’t he willing to fight ‘Dear Diary’ This book could be
              a who-dunnit, if one did not already know the ending - with the clues being literary ones, to be found in the early poems about childhood
              and adolescence, hinting as they do, of the existence of violence, and the role of law, and the law of the father. She dresses her dolls
              ‘for a stroll / down streets lined with knives’ in material cut from the lamp in the lounge: O my Lord just you wait till your father gets
              home You can’t do as you please whenever you like there’s no room for children with pincers for fingers in this house tonight or any night
              ‘Sewing Hints’ It’s possible to suggest that the murder of Pop Kent is synonymous with the murder of the principle of authority or the rule
              of law. And that the symbolic murder of the father (‘Pop’ Kent) betrays the wish to substitute logic and sanity with their opposite, to
              replace these things with chaos, tyranny and cruelty. These elements are there, and give the poems their strongly metaphysical undertones,
              despite their readabilily and apparent lightness. But it’s as if the poets enters into the spirit and the mind of Jean Lee to such an extent
              that these elements are written in as opposites: if religious imagery and the hope of traditional religion are presented as a form of salvation
              at the end, so are they fearsome and threatening: These walls are angels in their hordes families of vampires Vultures and harpies are the
              performers of religious rites in this poem: A couple of them sing to me we will watch over thee give me communion in a medicine cup ‘Cell
              Talk’ The angels are prison guards, ‘and angels / have taken Jean under / their capable wings’ (‘Final Night’). The book is constructed
              in rhymes and half rhymes, and employs constant alliteration with a dexterity unusual in a modern poet. This is quite a formalistic book,
              although a preoccupation with form is not to any degree a requirement for understanding and enjoying the poetry. The poems ‘unpack’ rather
              than wear their construction in an ornate or intrusive way. The humour in these poems is not exactly caricature, rather, something between
              bleakness and whimsy, an odd unusual angle on life that is probably the poet’s best grace in dealing with her rather grim subject matter.
              This is a very carefully crafted book, and a highly intriguing one, not least because it calls into question ideas about the role of poetry
              as history: for instance, given that our interpretation of historical events is always to a degree subjective anyway, how valid a medium
              is poetry, to explain or analyze the underlying factors within significant events? If this book is anything to go by, poetry is an extremely
              capable medium, it would seem."
        - title: The Weekend Australian Review
          text:
              "Cities of body and mind Barry Hill The Weekend Australian, 28 August 1999 There is a pile of slim volumes growing on my desk and I
              have to choose. Among the better ones, three [Alex Skovron, Infinite City, Jack Hibberd , The Genius of Human Imperfection and Jordie Albiston,
              The Hanging of Jean Lee] arrange themselves under the heading ‘City’ - the city as body, mind and perhaps soul... Crime is at the heart
              of Jordie Albiston’s city in The Hanging of Jean Lee because she has chosen to shadow the life of a murderer. The book comes with a flyer
              that gives the tabloid story of Lee who, with her pimp and standover partner, bashed an old SP bookie to death in Carlton in 1951. It seems
              to have been a crime that pushed the ugly mug of Melbourne into its own mirror. Albiston is good on the idiom of the times, and the casual
              desperation of the down-beat characters who hung around bookies and pubs. It would have been tempting to become feminist-chic about Lee
              but the poems are too well tuned for that. The blank, suburban childhood, the slippage of life chances, the ultimately inexplicable murder,
              are well conveyed - their special banality highlighted. As a whole, the book works in the mind like a novel, which is some achievement considering
              the spare poetry. Poem by poem, though, it is patchy, and only breaks out of its tabloid strongly in the poems about God. That is the challenge
              to which the book has only partially risen: how to tell a tabloid story without the tabloid murdering the art?"
        - title: Heat Review
          text:
              "Views & Reviews Bev Braune Heat, No. 12, Winter 1999 Judgements and confinement - personal and public - are the common themes of [Dorothy]
              Porter’s volume [What a Piece of Work] and Jordie Albiston’s new collection, The Hanging of Jean Lee, where ‘God / is hurling angels down’
              (‘Dear Diary 1951’). Jean Lee was the last woman hanged in Australia, in 1951. She was convicted with Robert Clayton and Norman Andrews
              for murdering Pop Kent in Victoria in 1949. The Hanging of Jean Lee opens with a chronology of Jean Lee: from her marriage on 28 July 1903
              to her hanging on 19 February 1951. Albiston’s acknowledgments include reference to Wilson, Lincoln and Treble’s Jean Lee: The Last Woman
              Hanged in Australia and archival source material used in composing her book. As well, the publishers include a photocopied extract from
              a Herald article (March 28, 1951) on the Jean Lee case - her Catholic school education, her factory jobs, her taking up with Clayton, ‘underworld
              sniveller and prostitutes’ gentleman’, to street-walking and finally to robbery and murder. Albiston has organised her interpretation of
              Lee’s life in a refracting series of multiple voices - reportage by Lee’s family, newspapers, the autopsy report on Pop Kent, and Lee’s
              Dr Jekyll-and-Mr Hyde voice (even after we have come to accept, as readers, that she is dead). Judgement - and confinement - is a subject
              which characterises some of the best literature of this century - Franz Kafka’s Die Verwantlung, Jack Mapanje’s Skipping Without Ropes,
              Anna Akhmatova’s Selected Poems, David Constantine’s Caspar Hauser and Kamau Brathwaite’s Middle Passage trilogy. Porter’s and Albiston’s
              books foreground human realities as part of their critical assessments of the ‘form’ side of imprisonment, that is, the physical and experiential
              machinations of confinement. For, as Ryle would have argued, you cannot speak about people’s minds without speaking about their physical
              world; to do so is to comply with the Descartes’ category mistake, to regard mind and body as separate spheres of existence. Institutions
              come and go - the Soviet Union, Callan Park Hospital for the Insane. Capital punishment in Australia no longer exists; Pentridge Prison
              does. But in the minds of those who suffered under such systems either as the warders or the prisoners or those writing about either, the
              worlds of constraint are alive as ever, as Albiston so effectively conveys in relating the events Jean Lee’s life. As Lee’s teacher is reported
              to have said of her: ‘she seems / to reside quite a lot in her head’. And as Lee’s voice confirms: But how I wish I was out with my Dad
              on the Chase in our worn wooden boat My cocoon quietly hardens You’re drifting away I’m going inside I dread this ‘Dear Diary (c. 1931)’
              The theme of the restricted woman, that territory of real, imprisoned lives, is Albiston’s singular interest in her published collections
              to date. Her first collection, Nervous Arcs (1995) opened, not surprisingly, with: ‘I am a woman locked in a / room in a house in a / suburb/
              you could call me / some kind of princess / though the only spinning / done is in my head / this is / my industry.’ Whereas in Porter’s
              book we view the world through the gaoler’s eyes, in Albiston’s it is that of the gaoled. We are reminded in both volumes that there is
              some little difference between the experiences of gaoler and gaoled. This new volume brings into sharp focus the question of the possibly
              indispensable false judgement of the last woman to be hanged in Australia: Lee was morally corrupt (a ‘bad’ woman), would have come to a
              ‘bad’ end and was therefore rightfully convicted for murder and for being morally corrupt. There seems no doubt that Lee had a hand in the
              murder of Pop Kent. It is the judgement of Lee as an ‘unrespectable woman’ that has captured Albiston’s imagination. This element gives
              real substance to Lee’s voice, her anger against God and her desire for absolution from social confinement such that physical confinement
              allows her ‘space’ for mental freedom, at least the space where Albiston convinces us that Lee can be free -‘in her head’. Albiston’s uses
              overt and covert caesura which worked to some extent in Nervous Arcs and Botany Bay Document (1996). Here she has taken the poetic form,
              and the theme of bondage, further than a contemplation of the isolated woman, in the suburbs or as a convict, to the study of an historical
              figure who indulged in acts of sexual bondage as a prostitute and was a convicted murderer. It will be interesting to see if Albiston will
              be able to break free of the compelling mid-line and end-line casurae form which dominates her poetry. In The Hanging of Jean Lee she has
              been able to draw a balance between the objective and subjective by manipulating form to her advantage, exemplified by ‘Mug Shot I’, ‘Dear
              Diary (1941)’, ‘You Stalker’, ‘In Defence of the Working Girl’, ‘Note to a ‘daughter’ and ‘The Hangman’s Handbook.’ I tie her carefully
              to the chair that she may feel held as she falls Adjust the hood and get the nod then let the trapdoor go If Jean Lee had lived twenty years
              later, she might have been a patient under the ‘care’ of a Peter Cyren [What a Piece of Work] - the evidence of Dorothy Porter’s powerful
              book leaves me feeling that such a fate would have been worse than hanging."
        - title: Australian Book Review Review
          text:
              "A Grim And Rough Story - The Hanging of Jean Lee Dorothy Hewett Australian Book Review, No. 210, May 1999 The Hanging of Jean Lee is
              the third verse novel I have reviewed recently, except that this one is closer to the verse documentary. As one might expect, it is a grim,
              tough story of the deterioration of a young woman’s life and its brutal end. It is divided into four sections with deliberately cold-hearted
              titles, Personal Pages, Entertainment Section, Crime Supplement and Death Notices. The Hanging of Jean Lee is economically and imaginatively
              conceived with a strong narrative drive. In a series of short connected poems, Jordie Albiston has made a heart-breaker out of her material,
              ringing the verse changes, using rhyme and blank verse in short chopped lines, colloquial language, reportage and newspaper headlines with
              considerable skill. Jean Lee was born in Dubbo in 1919, the daughter of a railway man. Later the family shifted to Chatswood, ‘a normal
              family in a normal house in a normal suburb on Sydney’s north shore’. Yet it took Jean only fifteen years to reach the gallows, the last
              woman to be hanged in Pentridge jail. An attractive, lively redhead, she attended a Catholic school, passed her intermediate, and began
              moving from factory job to factory job, all well below her intelligence level. She married at eighteen but it ended only a year later, leaving
              her with a baby daughter and ‘a trail of rent bills from Redfern to Glebe’. What a waste of a wedding. What a fool of a bloke! With the
              outbreak of World War II, she becomes ‘a soldier’s girl’: Call me yank lover cunt to my face. It doesn’t take her long to graduate into
              prostitution. This is work and as far as I can see You wanna touch? You wanna feel? You wanna pay the lonely man’s fee. Her lover and pimp
              is Robert Clayton, a well known petty crim, embezzler, housebreaker and drunk roller. She calls him ‘her Bobbie’. In the underworld of Sydney,
              Perth, and eventually Melbourne, she is known as Skinny Jean. Together they work the streets, cheap rooms and pubs, Jean as decoy, Bobbie
              as standover man and blackmailer. He calls us Bonnie and Clyde. He thinks we have their kind of style. Their criminal career ends with a
              brutal murder. With the help of an accomplice, they torture and strangle an elderly Carlton bookmaker during race week in Melbourne. The
              victim is left with his nasal bones fractured, a tennis ball cheek, a dinnerplate thigh, cigarette burns, a broken bottle slashed in his
              face, dents to his head and his larynx garrotted by hand. How then to transform Jean Lee, this sleazy cold-hearted whore, into a figure
              fit for human sympathy? Albiston uses Lee’s days in solitary confinement waiting for death as a vehicle for a series of passionate interior
              monologues of considerable strength and energy. With Jean Lee alone in the condemned cell, God doesn’t answer but some tatty angels do rustle
              in. Hark the Herald angels sing Jean Lee is going to die They lick their tacky tabloid wings It isn’t so long ago, 1951, since Jean Lee
              was hanged. We are left with a horror for the whole brutal proceedings of capital punishment and grief for the wasted life of a beautiful
              young woman. Quite an achievement. Fly Away Jean A flurry of feathers and she’s off leaving the chair and the rope and the press and the
              bleeding hearts lined up outside Ding dong she’s flown the coop and the crowd has heard the clang They raise their faces to the sky while
              all over Melbourne the morning stars and mothers call children to their sides to cover their innocent eyes She is dead she is dead says
              Peter to Robin She is dead she is dead says Robin to Bobbin She is dead she is dead says John all alone She is dead she is dead says everyone
              Why is it then that I am left so dissatisfied with the verse novel in general and why this fascination with a particular genre, apparently
              growing in popularity? Is it an attempt to bridge the gap between prose and poetry, to create a new popular audience? Maybe it works well
              for those who are willing to accept poetry only as an offshoot to narrative, but inevitably it seems to me that this strong narrative drive
              must eventually dictate the style. The result is a tendency towards a flattening of diction, a uniformity of tone, that it seems difficult
              in the long run to transcend (unless by the considerable skill of a Les Murray). I don’t want a poetry that is made easy. I long for the
              magical flash of insight, the rhythmic stanzas that sing, the intellectual fascination of decoding what is difficult. In other words the
              whole lyrical transcendental impulse of poetry."
        - title: The Age Review
          text:
              "Characters of Life - The Hanging of Jean Lee Gig Ryan The Age, 17 April 1999 Jean Lee was the last woman hanged in Victoria, in 1951,
              along with two male cohorts for the murder of a Carlton SP bookie. There were no more hangings until 1967. Jordie Albiston’s third book
              consists of an ambitious series of monologues in the voice of Lee interspersed with newspaper reports of the crime and trial. Stepping the
              narrow sparrow-lit alleyways wash-slopped cobblestones a steeling sky brick walls hopscotched with stale ivy vines and out on to Lygon...
              These monologues, from childhood to scene-of-the-crime, never entirely jell: the happy-go-lucky crim flirting with US soldiers in Sydney,
              the childhood in Dubbo, the murder in Melbourne. The language is jaunty, at times sounding like Alan Wearne’s poetry: ...the sound of your
              oars at last reaching a shore where you’ve more than your basic Buckley’s at love? O my boasters! my boys! The last section, Death Notices,
              is the most varied and convincing and Lee here becomes a flesh-and-blood character making diary notes in ‘Dear Diary 1951’ ‘God is / looking
              down on me with eyes / as large as psalms’ and pondering her fate in ‘Solitary’. Soulless territory I know self on self on shadows flung
              weakly down from the tiny bulb clamped to the Pentridge sky... ...till the angels arrive clanging their wings like rubbish-bin lids to herald
              the morning in But there is little suspense or explanation. Lee’s character seems intermittently bland, religious, superficial but strangely
              not tragic and Albiston’s insistent rhythm and rhyme seem at odds with the subject. This book does what it intends, calling Lee and capital
              punishment (abolished in Victoria, 1975) to our attention, but Lee remains somehow incomplete."
        - title: Geelong Advertiser Review
          text:
              "Murderess portrayed in verse - The Hanging of Jean Lee Edward Reilly Geelong Advertiser, 10 April 1999 Jean Lee’s life lasted a mere
              32 years. She was born the daughter of a Dubbo railroad worker in 1919, had a Catholic, schooling, and seemed destined for a mundane life.
              But not Jean. Older readers may remember the screaming heading in the Herald of March 28, 1951, ‘Portrait of a Murder ess’. This article,
              the basis of Albiston’s fictive recreation of Lee’s life, outlines how Lee at 16, ‘a trim, tender girl with a gay, provocative smile, wiry
              red hair’ was restless. Within two years she had made a hasty marriage, ‘a hopeless match from the stars’, the Herald reporter breathlessly
              informed its readers. Soon after, she was found to be ‘frankly practising’ the ancient red-light trade. Het pimp, Robert Clayton, encouraged
              Lee to ‘get her clients drunk’, and at some time in the early hours, Clayton and an accomplice would roll the John, sometimes not so gently.
              Jean Lee was not a nice gal and she came ultimately to a gruesome end, the last woman in Victoria to be executed. Where the Herald tells
              a story like Jean Lee’s as a black and white morality tale, Jordie Albiston is far more understanding of Lee both as a sinner and as someone
              greatly sinned against. Albiston traces Lee’s fall from grace in four stages: -‘Personal Pages’ - her early innocent life; ‘Entertainment.
              Section’ - early marriage and learning the trade, ‘Crime Supplement’ - an account of the criminal life and the killing of William (Pop)
              Kent; and finally, the self-explanatory ‘Death Notices’. Each stage consists of 14 or so one-page poems, many of which are written in Lee’s
              voice: occasionally Albiston, as narrator, intervenes. These poems are strong, and well-written. They have an immediate force and I greatly
              enjoyed the range of textures of the various poems. But what I liked most of all about The Hanging of Jean Lee was its ability to recapture
              a sense of the times.’ I can remember the screaming headlines and Lee’s face staring out of the Adelaide News front page. The cut of her
              double-breasted coat was smart, like those featured in the Women’s Weekly fashion pages scattered on my mother’s workbench. Certainly my
              parents knew of Jean Lee and her Sydney escapades before she ‘turned bad’, as it was put in those days. And there was some sympathy amongst
              the local women: most of them thought Judge Duffy was too harsh in applying the law. Was he looking for a knighthood? Bad enough that Ned
              Kelly had been ‘stretched’, but to do that to a woman was considered to be little more than judicial murder. This is Jordie Albiston’s third,
              and strongest, book of poetry so far. It gains strength from two factors, both of which are missing from many contemporary Australian poets’
              work. Firstly, she is not afraid of formal verse, the poems flowing in ordered stanzas of three, four or six lines and clear rhythmic structures.
              The images are potent and fresh, and as the book nears its climax, Albiston invests her doomed heroine with a tough energy which underlines
              each verse. The Hanging of Jean Lee is strongly recommended as an engrossing and forceful read."
        - title: The Canberra Times Review
          text:
              "The strange life of Jean Lee Geoff Page Panorama, The Canberra Times, 10 April 1999 On February 19, 1951, Jean Lee became the last
              women to be hanged in Australia. This verse biography by Melbourne poet Jordie Albiston is an attempt to make sense of how Marjorie Wright,
              a relatively ‘normal’ girl brought up in Chatswood could end up as the prostitute and murderer Jean Lee, hanged in Pentridge. Using contemporary
              press clippings (many of them collected in an earlier book, Jean Lee: The Last Women Hanged in Australia) Albiston has written 55 poems
              tracing Jean Lee’s trajectory from a slightly strange but ‘promising’ schoolgirl through to an unsatisfactory marriage at 18, the birth
              of a daughter (subsequently left to Lee’s mother to raise), an unsuccessful career in a number of jobs, her entry into the company of pimps
              and petty criminals in Brisbane and Perth during World War II, her collaboration in the murder of an SP bookmaker in 1949 and her eventual
              execution. Most of the poems are written from Lee’s viewpoint but, perhaps disconcertingly, a number are written from that of an omniscient
              narrator or from the point of view of other key figures such as her primary school teacher and her hangman. While the latter do help to
              ‘fill out the picture’ they also diminish the claustrophobic intensity that might have been achieved if the reader had been confined to
              Jean Lee’s head throughout. It’s interesting that in another current and popular verse narrative, Dorothy Porter’s What a Piece of Work,
              we never escape from the first-person narrator’s obsessions. As with Albiston’s previous book, Botany Bay Document, the poet uses metrical
              verse which has been deliberately ‘roughened’ into uneven line lengths with buried rhymes. This is an interesting technique, and one which
              Albiston might reasonably call her own, but it does not work equally well in all poems. Traditional metres and rhymes set up firm expectations
              which are interestingly, and often frustratingly, denied. Much of the verse is anapaestic, unusual in the 20th century, but strongly reminiscent
              of the poetic (and sometimes doggerel-like) broadsheets sold for a penny or so at London’s 18th century execution grounds. As with these
              earlier balladic spin-offs from hangings Albiston’s book has a curious kind of moral ambivalence. While it mostly laments the ill-fatedness
              of Jean Lee’s life, it also rejoices in the adventure of her life and at times seems to endorse the central character’s moral shortsightedness.
              References to the murder of SP book-maker ‘Pop’ Kent are cut into the otherwise chronological stream of events. These pull no punches about
              her contribution to the killing (which included torturing Kent with a lit cigarette) but the poem, ‘An Explanation of Sorts’, does suggest
              that Lee was somehow repaying Kent symbolically (and, of course, unfairly) for all the maltreatment she had suffered at the hands of men
              during her life - and particularly during her more recent years as a prostitute: ‘...and Pop / was the man who stood for those years / of
              wandering hands and laughed-at / dreams and branches catching at threads’. Whether or not The Hanging of Jean Lee solves, once and for all,
              the psychological problem of why Lee committed the murder remains to be seen. The book certainly succeeds, however, mainly through its original
              poetic technique, in creating a sense of Lee’s humanity and making most of us glad that the incredibly simple-minded punishment of ‘hanging
              by the neck until dead’ has not been practised in this country since 1967."
        - title: Meanjin Review
          text:
              "The Hanging of Jean Lee Shane Rowlands Meanjin, Vol. 57, No. 4, 1998 Part discontinuous narrative poem and part poetic biography, Jordie
              Albiston’s third book, The Hanging of Jean Lee, is about the last woman hanged in Australia. The fifty-five poems in this collection become
              the blood, nerve and muscle of the skeletal chronology (included after the contents pages) of Lee’s life, which culminates with her hanging
              in 1951. Dead at thirty-one, Lee’s short life was dogged by grief, depression, violence, alcoholism and petty crime. Born in 1919 in Dubbo,
              the youngest of five kids, Lee grew up In a normal family in a normal home in a normal suburb on Sydney’s north shore ‘A Chatswood Chapter’
              Her ‘normal’ was being pregnant at fourteen and forced to give her baby up for adoption. By the time she was twenty-one, Lee had left a
              violent marriage and abandoned her second child, Jillian, when she moved to Brisbane to escape continued stalking and harassment from her
              ex-husband Raymond Brees. After meeting pimp Morris Dias, Lee began working as a prostitute, travelling from Brisbane to Perth. Later, when
              Lee and convicted criminal Bobby Clayton became lovers, she continued to do sex work, often acting as the sexual bait in the ‘badger game’,
              Clayton’s ruse for fleecing other men. One of these games backfired in Melbourne in November 1949, when Lee, Clayton and Norman Andrews
              attempted to rob an elderly bookie, Pop Kent, who was found beaten and murdered. While there were strong suggestions that Lee did not participate
              in Kent’s murder and that the cops forced a false confession from her, Albiston chooses not to dwell on these injustices or to construct
              Lee simplistically as an innocent victim. Her approach is one of neither flashy sensationalism nor soppy lyricism. In handling the delicate
              matter of a real person’s life, Albiston’s work is characterised by humility, respect and compassion, avoiding the potential pitfalls of
              working with biographical and historical material. The Hanging of Jean Lee does not fall prey to the deterministic thinking of cause and
              effect or the compulsion to explain a life neatly by reducing it to a significant event. A number of poems dealing with Jean as a child
              and an adolescent prefigure the murder and Jean’s imprisonment and death. Often ironic, these omens suggest a fatedness, as is the case
              in ‘School Report (1928)’ with its primary teacher’s concluding remarks about Jean, who Is a girl of obvious promise and handled with care
              she may yet make her mark in the annals of this hopeful young nation However, Albiston is clear that any sense of destiny is constructed
              by readers, poet and Lee herself in hindsight: People get vague about the pre-press years though you can turn this to your own favour You
              alone remember why and how you changed Never write any of it down The moment occurs as it must if you look it reads handle with care but
              then you forget and when you remember it’s gone You say living is for feeling what it is like to be alive and draw a bad hand ‘Note to a
              Daughter’ In her evocations of Jean Lee, Albiston is scrupulous in avoiding anachronisms. A meticulous researcher, she has a thorough understanding
              and sure grasp of the broader socio-historical context, economic conditions and significant public events, and makes dexterous use of this
              in many poems. In ‘Leaving Ray Brees’, World War II informs ‘the modern artillery of the marital military’ and the breakdown of Lee’s marriage.
              The space to be embraced by ‘the unfinished arms’ of the Harbour Bridge undergoing construction (and officially opened in 1932) becomes
              a space in nine-year-old Jean’s head in which she daydreams about ‘a sky full of / future before her wandering feet’ (‘A Chatswood Chapter’).
              Albiston does not mistake or overstate the so-called ‘hard evidence’- including press coverage, photographs (mug shots and studio portraits),
              police, court and prison files - as factual. Drawing on this kind of documentation in a number of poems, she highlights it as partial truths
              open to multiple interpretations. While I found the newspaper reports the least interesting pieces in the collection, they are crucial in
              the inspired structuring of the book’s four sections: ‘Personal Pages’, ‘Entertainment Section’, ‘Crime Supplement’ and ‘Death Notices’.
              There are many similarities between the somewhat perverse pleasures of reading (and writing?) these particular sections of newspapers and
              the territories of biography. In The Silent Woman, her brilliant meditation on the Sylvia Plath biographical industry, Janet Malcolm observes:
              Biography is the medium through which the remaining secrets of the famous dead are taken from them and dumped out in full view of the world...
              The voyeurism and busybodyism that impel writers and readers of biography alike are obscured by an apparatus of scholarship designed to
              give the enterprise an appearance of banklike blandness and solidi ... the more [the biographer’s] book reflects his industry the more the
              reader believes that he is having an elevating literary experience, rather than simply listening to backstairs gossip and reading other
              people’s mail. In The Hanging of Jean Lee, Albiston explores the poetics of biography, and because her subject was, and to some extent still
              is, a demonised woman, Albiston excavates and elaborates biographical moments in order to rehumanise Jean. Her project is not so much a
              matter of exposing Lee’s secrets as it is about inventing them in order to reclaim some sense of her inner.life. In order to hear Jean’s
              many voices in a range of registers, volumes, rhythms and intonations during the various stages of her life, many poems are written in the
              first person. The line breaks and stanzas in ‘Mum’s Little Helper’ immediately conjure up a four-year-old’s awkward stop-start phrasing
              as if learning to read. In ‘Dear Diary (1934)’, Jean - post-adoption and brazen with grief - writes ‘When I meet God I will / kill Him.’
              Albiston’s risk-taking imagery of Jean deifying herself as an angel of vengeance and God casting Himself as pitiful sinner at her feet resists
              repathologising Lee as evil and delusional. By ‘Crime Supplement’, however, Jean’s voice has hardened, her dreams have been squashed. In
              ‘Death Notices’, her voice has been swallowed up by the living death of solitary confinement and the incomprehensible terror and loneliness
              of abandonment by her family. Albiston’s bio-mythography works to restore emotional complexity and some sense of resistance to Jean Lee’s
              life."
        - title: Linq Review
          text:
              "Don’t Play Games, I Want to Be Woken Up Rebecca Edwards Linq, Vol. 25, No. 2, October 1998 The Hanging of Jean Lee, by Jordie Albiston,
              is a re-creation of certain pivotal incidents in the life of the last woman to be hanged in Australia. Lee’s voice develops, in the rhythms
              of 40s swing, from an earnest four year-old, to soldier’s good-time girl, to hardened prostitute capable of murder. The steady, journalistic
              inevitability is broken, powerfully, by Lee’s cry to the God who has forsaken her: ‘I will teach Him the scriptures from inside of me’ (Dear
              Diary 1934). There is nothing moralistic about Albiston’s unfurling of Lee’s character. Why, and how, she became hardened enough to stub
              out cigarettes in an old man’s chest, is hinted at, rather than imaginatively ‘explained’. This left me unsatisfied on the first reading.
              I wanted Albiston to dive in, away from ‘the facts’, to make a solid if fictional connection between an early and a later event. When I
              went back to the book a second time, however, I found that it simply flowed, that everything was right; the slightly jangly rhythms, the
              shifts between newspaper reportage and Lee’s voice, the juxtaposition of ‘past’ (Lee’s childhood and youth) and ‘now’ (her imprisonment
              and execution). The seamless narrative opens to explore, with great subtlety, Lee’s development as both recipient and perpetrator of atrocities
              in a place and time which failed to ‘handle her with care’ (see ‘School Report (1928)’). I am grateful for Albiston’s restraint, for the
              delicate sense of timing with which she places a poem like ‘In Defence of the Working Girl’ very soon after ‘Dear Diary (1941)’. This is
              a book that will ‘make its mark’, in a more positive sense than its subject."
        - title: Wayne Atherton Review
          text:
              "Review - The Hanging of Jean Lee Wayne Atherton In this, her third published collection of poems, Australian poet Jordie Albiston has
              construed a 55 poem biographical chronology of Marjorie Jean Maude Wright, a.k.a. Jean Lee: a woman convicted (along with two men) of a
              murder and sentenced to hang. As such, Lee is known to be the last woman hanged in Australia. The poems begin with Lee’s birth in 1919 and
              end with her death on the gallows in 1951. Alternating between first and third person perspective, these poems effectively capture the protagonist’s
              bitterly tragic story of sullen, loveless rage. Albiston’s language flows. Often darkly limerick, these poems engage the tongue and occasionally
              offer up regionally-flavored dialect: Dulcie’s up the fig Tree sulking from a smack For nicking Florie’s fancy Dib and hiding it out back
              Reading this collection, one may be reminded of the Dillinger series of poems by American poet Todd Moore. Jean Lee could also be thought
              of as Bonnie for a similar though distinctly Australian Bonnie and Clyde saga. From the poem, ‘In Defence of the Working Girl’: This is
              work and as far as I see You wanna touch? You wanna feel? You wanna pay the lonely man’s fee"
the-inheritors:
    title: The Inheritors
    author: Amanda Anastasi
    short_description: The inheritors are those who will suffer the ravages of climate change, be they human, creature or plant.
    long_description: The inheritors are those who will suffer the ravages of climate change, be they human, creature or plant.
    price: 20.95
    isbn: "9780648038788"
    release_date: "2021"
    page_count: 70
    reviews:
        - title: Australian Poetry Review - Martin Duwell
          text:
              "REVIEW Review of ‘The Inheritors’ Gemma White ‘You cannot live without what you’ve destroyed’ (47) The Inheritors opens with the promise
              of new beginnings, with the poem ‘Newcomer’. Here, Amanda Anastasi describes a child who will experience ‘no freer moment than this’, a
              freshness of being, of perceiving ‘before / indoctrination begins its sly, steady seep’ (3). So too are described the ‘expectations’ sewn
              into the child’s birth. But are we talking about the weight of global warming, put off and delegated to future generations? Or are we speaking
              of the normalcies that form human consciousness, the mental ‘steps that will tread too carefully to invite / epiphany’ (3)? This need for
              an inner change of perception or realisation is a theme in Anastasi’s work—it must happen before outer transformation can come. After being
              flagged in the first poem and continued throughout, it appears most perceptibly in ‘Household Chores’, where we are encouraged to ‘Vacuum
              up […] niggling doubts’ and to ‘Keep the cobwebs on the walls rather than in your thinking’ (18). In ‘Koala Holds Up Traffic’, a stray koala
              attracts attention on a road from families in four-wheel drives. After ‘photo snaps / and Facebook Live narrations’, the koala returns ‘to
              the retreating forest’, while ‘The people / re-enter their cars, turn on playlists and continue’ (6). The word ‘continue’ is telling here.
              What are the people continuing? Their fog? Or their disconnect, between a chance sighting of a cute koala on the road and the welfare of
              the ‘retreating forest’ and all its creatures? In this collection, Anastasi suggests that our current stage of evolution—or devolution—requires
              constant vigilance against apathy, for while we may be currently ‘assuming permanence’, we must always stay wary of ‘the bell that will
              end play’, for every one of us is simply a ‘temporary god’ on this earth, a ‘cupped spider’ trapped between the scorching sky and our final
              resting place, the earth (3). Our ultimate fragility as a human species is laid bare, cutting through our denial with gentle yet precise
              use of language. Later, in ‘Monostich VI: Prophecies’, the point is put to us more forcefully, in the line ‘The ocean is holding the weight
              of our apathy’ (55). We are now at a stage where denial is no longer a viable option, as the poet observes, ‘The fence sitter has no choice
              but to descend the planks’ (54). There are warning signs to fence-sitting scattered throughout The Inheritors , and these manifest as turning
              points that perhaps we will never recover from. For instance, in ‘Monostich I: The Turn’, Anastasi writes, ‘The bats are hanging, awake
              during the day’ (5). The same warning is there in the theme of alienation in the book, which connects to that fog and the one small koala
              on the road. In ‘Parameters’, the narrator admits they ‘navigate this place / like a temporary lodger’ as ‘this is the closest thing to
              home’ (7). The rupture between humans and the earth is also expressed in the final monostich of the book: ‘Nature gapes at us, the aliens’
              (57). It must be said that the monostich poems in the collection are extremely well crafted. Their tone brings together a mixture of empathy,
              care, a documentation of what is and may come and a stark, gentle matter-of-fact voice that never strays into the lands of preaching. These
              poems are also delivered with exactitude, which, given the vast subject matter of this collection, is no mean feat. Climate change, so potentially
              and currently devastating in its impacts, is hard to write about because of this, and because it’s so darn important too. But in doing so
              this book becomes part of that inner change mentioned earlier, in which we see ‘Above the mask, eyes that are rethinking’ (52). According
              to Anastasi, we are not just alienated from nature; we are also estranged from other humans. In ‘Summer’: Pedestrians pass each other, faces
              pressed into a mix of doubt and agitation at the idea of human proximity. (43) Similarly, in ‘Lady Returned’, a future-human refunds a robot
              companion, for they can’t stand ‘the daily company of remoteness’ that even ‘ realistic softness technology ’ cannot abate (37). This collection
              seems to point at something deeply wrong in our psychologies—a reason for all the madness. In ‘After the Flood’, an undertaker notes that
              ‘It is not the bareness of post-life, but the daily disregard / of the still breathing, that bolts him upright in his sleep’ (36). I think
              the power of Anastasi’s collection is that it doesn’t fill in all the gaps, it doesn’t tell you what to think, but rather brings you a collection
              of facts and fictionalised futures, and says, ‘Here, what are you going to do with that?’ The book is a call to arms , but one that is more
              effective for being so subtle in acknowledging the complexity of its subject. Anastasi offers a deep understanding of what societal change
              requires on an individual level. That is what makes this collection so compelling. You might think, with tragic scenes of ‘flying / foxes,
              lifeless or starved to motionlessness’ (12), or ‘machines […] making flat newly germinating plants’ (21), that all is lost. But this is
              not what Anastasi suggests. At different moments, hope is conjured. At one stage, Anastasi pleads for ‘Ideas instead of thoughts. Plans
              instead of prayers’ (15), demonstrating how a positive, practical and urgent attitude is necessary. The need to work together is highlighted,
              so we can keep each other honest. She writes, ‘I’ll find room for my hope to rest on yours’, to ‘envisage an alternative present / without
              the choke in our throats’ (38). There is one other source of hope, if we can only become quiet enough to hear ‘something akin / to silence:
              a delicate / hand reaching out, / a pardon, a candid / invitation’ (30). That is, our innate connection to nature, despite our feelings
              of alienation. We may find this connection when our ego is asleep, ‘when we return to a part / of ourselves we thought we had left behind’
              (24). There is such understated beauty in these lines. We are not only monsters, we are also fragile, ugly, vulnerable creatures made of
              the earth that we now destroy."
        - title: Weekend Australian Review - Geoff Page
          text:
              'Compelling Visions of the future Geoff Page Reviews The Inheritors by Amanda Anastasi Weekend Australian December 4/5, 2021 There is
              no denying (any more at least) the importance of what is known loosely as "ecopoetry". Amanda Anastasi''s second collection, The Inheritors
              , is an unusually effective example of the genre. It cleverly manages, for the most part, to avoid the form''s twin dangers: sentimental
              reductivism or counter-productive opacity. There’s a significant number of poems in The Inheritors which may very well make a measurable
              difference to the consciousness of it- readers on the issue of human-induced climate e and its consequences. These include, among others:
              "Koala Holds Up Traffic", “Bat Piles ", “The Mask''s Weight", "Classroom 7C", "The Invasion", "Autumn" and "Aftermath”. All these poems
              focus on indicative specifics which imply something much larger. There is no resort to vague and emotionally­drained abstract nouns or to
              watered-down scientific jargon. They "cut to the chase" but they do not oversimplify. They also obey Emily Dickinson''s dictum to tell the
              truth ''''but tell it slant". A good example of this is seen in the poem "Bat Piles" where a wildlife officer moves into the woodland, steps
              between the crooked corpses of winged limbs; the stiff cloaks swathing brown bodies. A whole colony of fruit bats is dying or is dead already.
              The officer thinks about their "label as a pest and rodent", about their role as a "gothic emblem" and their "replication in plastic". The
              poem ends with an image which manages somehow to be both repugnant and poignant: Their slitted eyes are sealed, their light bodies swiftly
              dropped in council rubbish bags, in response to complaints of the stench of carcasses and the fingers and ankles bitten by frantic teeth.
              Not all the poems operate at this level; some are more personal and tangential to Anastasi''s main concerns and the book''s recurring monostichs
              (one-line poems, hard to bring off) are variable in quality- from the clever dystopianism of "The beachgoers bring blankets and masks" to
              the more pedestrian "Nest boxes are strapped to trees". Overall, however, The Inheritors is a book in which Anastasi’s aesthetic and political
              impulses work powerfully together to create mandatory reading whatever your preferred literary genre may happen to be. an especially disturbing
              observation Martin Duwell comments on The Inheritors The sense of threat and dis-ease is entirely on the surface of Amanda Anastasi’s The
              Inheritors , whose poems focus specifically on climate change. Its title provides a clue that its concerns are with conditions of life for
              those coming after us: our children and grandchildren. Its title, of course, repeats that of William Golding’s novel about the displacement
              of the Neandertals by modern humans and I wondered if this might not be a deliberate allusion, exploiting in some way that novel’s tragedy
              of a declining people faced with a bewildering change in their circumstances and unable to adapt to it. On reflection, I doubt if it’s the
              case, though, since there is nothing and nobody in these poems capable of allegorically representing the new species of that novel. Anastasi’s
              book is in two parts: the first part has poems which are set in the present but look forward while those of the second part are usually
              set sometime in the future. And this is a future whose intricacies the poet obviously enjoys exploring, one whose symptoms vary from messed-up
              breeding times in Greenland to reality TV programs in which a group of contestants have to survive not the jungle but the streets of Melbourne
              on a summer’s day. Books dedicated to poems on a single theme are often ultimately uninteresting because repetition seems more irritating
              in poetry than it is in any other medium. The Inheritors avoids this by exploring as many ways as possible in which the single theme can
              be approached. Anastasi has a talent for the gnomic and this produces a series of poems in one-line stanzas which are spread through the
              book. It’s an attractive form since it blends compression with expansive development. There is also plenty of tonal variation and some poems
              – “Lady Returned”, whose vision of the future is of one with sex-dolls that ultimately prove unsatisfying, and the imaginary programs of
              “TV Guide” or the headlines of “2029 News Headlines” – are funny, even if grimly funny. The framing poem for the first section, and, indeed,
              the book as a whole, “Newcomer”, makes no reference to the climate crisis. It is about a new baby and the way in which its future development
              – its initial socialisation and then its reaction against this in later years – can be plotted. But, of course, this baby will become an
              inheritor and so the subject is broached by omission. There is also a sense of the kind of shadowy dis-ease. . You can see this is in “Parameters”,
              which describes living in an outer suburb of Melbourne and feeling at odds with the house – “I bump a hand or leg // against the corner
              of the bedside or kitchen table” – to the point of becoming more like “a temporary lodger”. The first of the poems with single line stanzas,
              “Monostich I: The Turn”, is interested in those decisive early markers of the onrushing change. Certainly we would expect poets to be sensitive
              to internally registered markers of change that are missed by most of us. One of the single lines in this poem says: The people of the sea
              are moving inland. To someone who lives a couple of metres above sea level on a sand island, this resonates uncomfortably: an especially
              disturbing observation. FOR FULL REVIEW: http://www.australianpoetryreview.com.au/2021/10/jane-gibian-beneath-the-tree-line/ ISBN 9780648038788
              2021 70pgs $24.00 Australia'
the-forest-set-out-like-the-night:
    title: The forest set out like the night
    author: John Anderson
    short_description:
        There is nothing here that is unfinished or carries an excess. Every word counts. This poetry is mature and burnished, a
        highly wrought work of art that deserves to be celebrated by the community from which it has sprung. the forest set out like the night is
        Australian poetry at its very best.
    long_description:
        By the Merri, in the Gippsland forests The blackberries are the tears of the country Its buried black history They have been
        here an Australian length of time The country is making something different of all of us the forest set out like the night is a brilliantly
        conceived meditation on place and being, a uniquely Australian song cycle of epic proportion, which must significantly broaden our perception
        of contemporary poetry in this country. There is a lyrical perfection in much of this poetry that is very rare indeed. Accurate observation
        of exact detail underpins and grounds the larger metaphysical structures, rendering the tone both accessible and sublime. I have rarely seen
        a collection of poems that has so deeply impressed me. There is nothing here that is unfinished or carries an excess. Every word counts. This
        poetry is mature and burnished, a highly wrought work of art that deserves to be celebrated by the community from which it has sprung. the
        forest set out like the night is Australian poetry at its very best. Alex Miller Cover painting by John Anderson
    price: 24.95
    isbn: "9781876044053"
    release_date: 1995, reprinted 2013
    page_count: 116
    reviews:
        - title: Alan Wearne, Eureka Street
          text:
              "Prime Rating the forest set out like the night Alan Wearne (poet and author) Eureka Street , Vol. 7, No. 1, January-February 1997 John
              Anderson is underrated for the finest reason: few know who he is. His previous volume arriving 18 years ago, he has since been assembling
              these 118 pages. To my knowledge no-one today has kept up such a constant, patient ploughing, and the least his audience can do is to apply
              m themselves with commensurate effort. One of the best things about Anderson is that his readers are required to work (though note I didn’t
              say struggle). What does he give in return? An interconnected weaving of rhapsodies, evocations and prose poems celebrating aspects of the
              Australian landscape, its flora and fauna, not just of now, nor even before white arrival, but from before humanity. This is a small-sized
              book of which the term ‘big picture’ is the inadequate cliché it always has been. Has Anderson Laurie Duggan’s ‘The Ash Range’ for a neighbour?
              Certainly for those who don’t know Anderson’s work it could be explained thus: vis-à-vis ‘The Ash Range’ they are neighbours in the way
              that two hermits living 60 kilometres apart in the bush, with no-one in between, are neighbours. Has Anderson (have you) read the remarkable
              Canadian writer Christopher Dewdney? He too may be a neighbour, although Dewdney has been known to go back to his domain’s geological foundations.
              But fishing about for comparisons is, on both sides, somewhat of an insult. Anderson is as original and ambitious as any writing today.
              I’d be certain he knew of his originality and, surprise surprise, be as sure he wouldn’t know, or care, how ambitious he was."
        - title: Tamba Review
          text:
              book reviews Hugh Oakes Tamba , No. 12, Autumn 1998 John Anderson grew up in the Goulburn Valley, at Kyabram. He has previously published
              a volume of poetry, in 1978. the forest set out like the night is a 116-page song-cycle or treatise in poetry, on gum-trees and their environment,
              interwoven with commentry and meditation. Those who expect a modern collection of free-style lyrics will not find it here. In a three-part
              cycle, Anderson sets out his vision of a forested Australia, its avian and other inhabitants, its response to human beings and its effect
              on all who come under its influence. He draws from Aboriginal lore and legend, and from writers as diverse as Mary Gilmore and Chris Mudd,
              but chiefly from his own observation and reflection formed in forest areas here and overseas. He celebrates the extraordinary variety and
              richness of this land and the way its symbols recur and intertwine. The book needs to be read and absorbed as a whole, so I shall not attempt
              to quote lines or indicate preferred segments, although individual pieces have been previously published. For me the interest lies in the
              attempt to give voice to, and teach us to listen to, the music coming from the complex living core of our ancient land. If that sounds a
              little far-fetched, I can only suggest that you get hold of the book and read it.
        - title: Australian Book Review Review
          text:
              "Poetry Shorts Beate Josephi Australian Book Review , No. 180, May 1996 Landscapes are in again - real or imaginary. Not the pastoral
              with its changes of season, but the silvan, fluvial and littoral, all old and enduring enough, so it seems, to provide the measure for a
              poet’s life who, with increasing age, prefers timelcssness over instantaneity. the forest set out like the night is a book of prose/poetry
              exploring initially Victorian themes: the Gippsland forests, Merri Creek, the Grampians. Later it draws in - and provides drawings of -
              the mythic meaning of tortoise and lizard, of eucalypt and elm. Anderson has the naturalist explorer in him. He dreams of entering an untouched
              landscape but he knows that nature is never innocent, is marked by the ‘blood of lava flow’, and the lava flow of blood. More importantly,
              he is fully aware that he is a late settler on this continent and that his language ‘comes from Europe where moonlit reefs and / shires
              and shoals of leaves also glisten.’ The book begins on the fluvial plain. Can the Merri and the Yarra explain Melbourne? Anderson thinks
              so. But this is the only appearance of a town in this 116 page long book, praised on its cover as a ‘uniquely Australian song cycle of epic
              proportions’. In tone and style this book varies enormously, from tourist brochure to nature magazine to poem, from lyrical mode to aphorism
              to the prosaic. On one hand, this makes the book very accessible; on the other, one is left wondering at times whether poetry really needs
              so much explanation: ‘I found myself formulating these words: ‘The ducks fly over in the night and create stillness in the body’’. The title
              poem occupies the first, sixty pages. Much of its energy and liveliness is admirable but the rhythmic force needed to give it unity is lacking.
              Too much is characterized by a magpie approach, picking up a prose paragraph here, stealing a few notebook jottings there. Part II, ‘love,
              the cartographer’s way’, is illustrated with drawings by the author and part III, entitled ‘the logs like silver reliquaries, like bones
              long persisting in the grass’, is a long poem disguised as a book review of ‘anthropomorphic and theosophically speculative literary portraits’.
              The term mulitmedia - loved by some, unloved by others - looks like finding its application also within the narrower confines of one genre:
              poetry. John Anderson’s the forest set out like the night manages to present it within the covers of a single book of poems, and it obviously
              has its attractions: the book is highly recommended by the Poetry Book Club of Australia."
        - title: Metre Review
          text:
              At The Margins’ Margins the forest set out like the night Simon Caterson Metre Still on Australian soil, though further afield and much
              more mobile, John Anderson, Robert Gray [ Lineations ] and Caroline Caddy [ Antartica ] are cartographers in verse, the first two supplying
              visual as well as metaphoric delineations of various parts of the landscape. For her part, in addition to her shiver-inducing poems, Caddy
              conveys the white vastness of Antarctica by means of a heavy reliance on infra- and inter-line spacing and the interleaving of satellite
              images of storms over the Australian Antarctic Territory, the last Australian terra nullius . Anderson’s line drawings help to disguise
              the prosaic (in both senses) nature of his search in the bush for found objects, floral and faunal. Gray’s drawings of landscapes and bodies
              are sparer of line than Anderson’s, yet achieve greater clarity, as do the poems, all of which have appeared before without the illustrations.
the-shadows-keep:
    title: The shadow’s keep
    author: John Anderson
    short_description:
        Les Murray described John Anderson ’ s the forest set out like the night as ‘ a distinctive experimental text, one which
        is bound to be influential ’.
    long_description:
        Les Murray described John Anderson ’ s the forest set out like the night as ‘ a distinctive experimental text, one which is
        bound to be influential ’. the shadow's keep is again a radical text. In his third collection he has gathered single lines received in dreams
        and retained on waking. He taps an unusual vein which runs through certain poetic cultures. The one-line poem is a form sometimes used in
        Aboriginal poetry, often associated with dance ceremonis. The Japanese haiku may also be seen as a one-line form. Anderson ’ s lines are aware
        of these traditions and draw also on Western psychology. Each single-line poem reads like a mystifying maxim or injunction, without the closure
        of the epigram; the language is honed, subtle and volatile. Singly, each line is resolved and hermetic. Clustered, they form a complex mosaic,
        the coruscating facets of which both illumine and shadow. The effect is to startle and subvert, to confound and resonate. His accompanying
        essay the beginning tincture of what I wrote (see below ) describes the genesis of this strange and tantalizing work. It is a lucid essay
        on the origins of poetry. In the final section he gives us eight pantoums fashioned from the dreamlines. Here they achieve a formal grace
        and powerful lyric intensity. As original and ambitious as any writing today. Alan Wearne , Eureka Street
    price: 19.95
    isbn: "1876044128"
    release_date: "1997"
    page_count: 60
    reviews:
        - title: Jennifer Maiden, Overland
          text:
              The Seductive Microcosm the shadow’s keep Jennifer Maiden Overland , No. 150, Autumn 1998 John Anderson’s the shadow’s keep has a haunting
              perfection, too [like Alison Croggon ’s The Blue Gate ]. It is tailored from lines ‘received in dreams and retained on waking’, but the
              juxtapositions are profoundly more fecund, logically wittier and have profoundly more sleepy grace (the atmosphere of real dreams is actually
              much brusker) than that genesis would suggest. Cumulatively, the mismatched words and lightly altered clichés build up to a clear, generous
              personal universe which has an authentic spiritual sweetness and refreshment about it. The lyricism is expansive because it is based on
              the privacy of questioning as much as on physical observations.
        - title: Antipodes Review
          text:
              "Precise Evocation and Tantalizing Elusiveness Delight and Challenge Werner Senn Antipodes , Vol. 12, No. 2, December 1998 In an essay
              placed between Parts I and III of the shadow’s keep , John Anderson discusses the two kinds of problems he (and the reader!) faces in his
              poetry. First, many of the single lines that constitute Part I do not easily (or not at all) yield the ‘core meaning’ Anderson attributes
              to them (pg. 47) but are more notable for ‘their inherent ambiguities’ (pg. 46); second, the sequence of lines seems arbitrary and hence
              the ‘subliminally present narrative’ Anderson claims (pg. 47) is hard to detect. The lines remain self-contained, discrete items, and their
              wide spacing suggests a shying away from contextualization. The author himself seems in two minds: on the one hand, ‘the understanding of
              any line would be influenced by the lines placed around it’, on the other, ‘the lines are complete in themselves, and are often more roundly
              suggestive when taken singly’, their possible significance thus not likely to ‘be lamed by an inappropriate juxtaposition’ (pg. 45). But
              what, one wonders, is the appropriate juxtaposition? The rationale behind this striking ‘relaxation of conscious control’ (pg. 48) on the
              writer’s part outdoes Coleridge and all romantic ideas of the autonomy of poetry. Anderson claims that most of his lines were ‘received’
              in dreams or dream-like states: ‘It is as if I am registering a language... that has rolled through from somewhere further back’ (pg. 43).
              The refusal to tamper with these intuited lines results in a variety of linguistic forms, ranging from the straightforward sentence: ‘we
              both of us know how to take a journey around a bathtub’ (pg. 28), through the simple or complex noun phrase: ‘metabolic essay’ (pg. 26),
              ‘the young and negacious Q’ (pg. 30), ‘the long kitty with only the dab in tune’ (pg. 23), to the grammatically deviant: ‘the pod, that
              once no more than wasn’t, was’ (pg. 39), to the correctly formed but semantically nonsensical sentence, as in ‘to self hatred yields a higher
              dingo’ (pg. 21) or ‘he makes porridge of his name’ (pg. 21). It may be that for Anderson ‘the lines are their own best authority’ (pg. 48)
              but in the absence of any linguistic (let alone narrative) context, they often leave us at a loss. Randomness and discontinuity are highlighted
              in Part III, where many of the earlier lines, repeated in the formalized order of the pantoum , ‘find themselves in shifting contexts’,
              which allows them ‘to reveal facets of themselves much more clearly than I could’ (pg. 46). More than in Part I, this enhances the playing
              off of individual lines against each other while at the same time implying that (changing) context is the basis for the signifying practice,
              that is, that meaning is endlessly deferred. Reading the shadow’s keep is a puzzling, tantalizing, and challenging experience. Its playful
              nonsense, however, cannot hide deep seriousness. Again and again, individual lines impress with haunting elusiveness and powerful suggestion:
              ‘words that feather us’ (pg. 7); ‘no one dug an island more deeply’ (pg. 31), or with an almost Blakean ring: ‘the world cannot be overcome
              by the analogue ‘I’’ (pg. 13); ‘boredom is the fatness that irritates the soul’ (pg. 22). Perhaps Anderson’s art is best characterized,
              in a phrase of his own, as one ‘of a pure and monastery lineliness’ (pg. 14). the shadow’s keep also stands as a curious monument of a radically
              independent and unfashionable devotion to poetic essence."
        - title: Australian Book Review Review
          text:
              "Poetry A Miscellany Michael Sharkey (editor) Australian Book Review , No. 201, June 1998 I have saved the best until last. John Anderson’s
              book is profoundly satisfying. Like Bev Braune’s, his collection’s title holds a clue to its writer’s passion for the exact word. I read
              Anderson’s poems with a note of inescapable regret that he is no longer with us. His first collection ( the blue gum smokes a long cigar
              , 1978) contained some of the most individual poetry of its era and since: lyric, sensual, and absorbing contemplations on the phenomenon
              of ‘reading’ one’s own response to ‘nature’. It was never enough to refer to Anderson’s works as ‘nature’ poems, as it is never enough to
              say the same of Philip Hodgins’ ‘pastoral’ poems or Les Murray’s ‘translations’ from the natural world. In subsequent books ( the forest
              set out like the night , 1995; and the volume under review), Anderson continued the exploration of the poet’s modes of perception. the shadow’s
              keep is a book of jewels of phrasing, laid out, in the first forty pages, in spaced single or double lines ‘received in dreams and retained
              upon waking’. They commence with ‘this is some of the territory from which we strayed in our quest / for the land of prayer’. To read the
              lines sequentially, in the discrete groupings Anderson arranges, is to be increasingly aware of a writer who makes no concessions to a browser’s
              expectations. He demands, deserves and repays the strictest attention. His lines continually delight with their surprises: ‘I’d like to
              coax some answers apart / the mistakes give the work of art ventilation / You, the new poem, stalking on your why’s ways’. This last line
              is reprised in the book’s last poem, one of eight pantoums which comprise the final section. Here, lines encountered in the first section
              are reassembled into tight verses containing refrains and ‘rehearsing’ the theme suggested by the title: the work which occupies the mind
              as ‘shadows’ until it puts on substantiality in a work of art. The middle section of Anderson’s book is an essay on the process whereby
              the ‘dream phenomena’, shadowed in the lines he presents in the first section, constitute poetic form. Here, as in the first pantoum, he
              shows himself a poet’s poet. He offers his approach to keeping the ‘dreamlines’ in their contexts and juxtapositions, and discusses his
              ‘composition’ of lines ‘which might have arrived years past’ [which] can ‘seem to ask to be placed together’ - while other lines ‘seem to
              have no obvious place beside any other lines at present, but which may find their own company in time’. As I’ve implied, I’m grateful for
              all Anderson’s lines, arranged together as he saw fit, in the third section of this book, or queued up, in abeyance, in the first. His work
              is valued by those who heard him and read him; the number in the latter category will, I hope, increase."
        - title: Herald Sun Review
          text:
              Well versed in everyday themes Poetry Review Julie Richards Herald Sun , 2 February 1998 For those with a little more stamina and a
              preference for rougher terrain, take a trip with Emma Lew or John Anderson. Both published by Black Pepper, Lew ’s The Wild Reply , and
              Anderson’s the shadow’s keep are challenging in their use of language and imagery. They depart from the usual highways and offer a somewhat
              harsher view from the top. The experimental nature of Anderson’s use of ‘dreamlines’, received during the first stages of sleep, and his
              arrangement of these lines ‘so as to let them expand infinitely into their own universes’ yields some pretty volatile material. Almost echoing
              surrealism, it expresses the workings of the poet’s subconscious, laced with fantastic imagery and unusual contrasts. It’s a demanding and
              unconventional read, but perseverance and tolerance will be amply rewarded by the originality and ambition of this exciting and fresh new
              perspective. With Barbara Giles [ Seven Ages ], John Anderson and Emma Lew , there is the distinct feeling of being privy to a special moment
              in an ordinary life and going on a memorable journey of discovery, for both poet and reader.
        - title: The Sydney Morning Herald Review
          text:
              "S pectrum books On The Edge Of Sleep the shadow’s keep Poetry Heather Cam (poet) The Sydney Morning Herald , 31 January 1998 Riffling
              through the pages of these three ‘little press’ books [Pam Brown, 50-50 , Fay Zwicky, The Gatekeeper’s Wife , John Anderson, the shadow’s
              keep ], you are immediately struck by the visual differences in lay-out, line length, and the overall approach to the poem on the page.
              Each poet presents a distinctive voiceprint and typographical appearance... In contrast [to Brown and Zwicky], the isolated, virtually unpunctuated
              threads of poetry in John Anderson’s title section are ‘dreamlines’ salvaged from the verge of sleep. They appear to be randomly arranged,
              not fitting into any larger, over-arching structure. At the centre of the shadow’s keep, the essay, ‘the beginning tincture of what I wrote’,
              explains how Anderson receives or captures, seeks to understand, and eventually arranges these potent lines into poetry. A deliberate poetic
              structure emerges in ‘a zephyric alphabet’, the last section of this unusual collection, where some of the floating ‘dreamlines’ have been
              woven into formal, tightly knit pantoums. What each poet’s page layout superficially reveals is reinforced by reading:... Far removed from
              Zwicky’s witty conference contrivances and Brown’s worldly wise, highly self-conscious banter are Anderson’s dreamlines. Akin to automatic
              writing, these lines, we are told, were received by the poet when his conscious mind was literally at rest: ‘The lines gathered here represent
              a variety of dream phenomena. Most can probably be explained at a mundane level by my sleep apnoea, which prevents the normal onset of deep
              sleep. This brings about prolonged spells of relative alertness to events taking place at the bay of sleep.’ ‘ The dreamlines work best
              for me as the building blocks of Anderson’s pantoums: then the ‘gift’ of the dreamlines is combined with the poet’s conscious effort and
              artistry and arranged into the strict verse forms that conclude the shadow’s keep : Quiet ruin is the conversation of the bulbs Then axeman
              builds as rust-man stalks them An apple seeming to the wasteful falls The old watertight roads have sandbars along their edge the shadow’s
              keep is a valedictory. Late in October, shortly after this bock’s publication, Anderson died, aged 49, of leukemia. Much of the work gathered
              here in this last harvest has a prophetic, haunting resonance: I believe in life after death because things always are, they always extend
              An apple seeming to the wasteful falls The everywhere the moon always was and rests Quiet ruin is the conversation of the bulbs In Anderson’s
              final poems, the dreanlines glide out into the whiteness of the page; each one is embedded in the surrounding silence of blank space, approaching
              sleep, and, ultimately, death."
        - title: Heat Review
          text:
              "Views & Reviews the shadow’s keep Dmetri Kakmi Heat , No. 7, 1998 John Anderson, in his essay on the gradual evolution of the hermetic
              lines that constitute the first part of this, his final book, gives the impression that he acted as a kind of radio transmitter, a not so
              passive recipient, who was rewarded with ‘the most exquisite and alert little fish’ while drifting ‘at the bay of sleep’. And, indeed, reading
              these crypto/mystical transmissions one feels that a translucent medium presence is at work, excavating the wisdom of the soil and of the
              spheres - a perception that has become particularly difficult to shake off since the poet died of leukemia in October last year. In the
              first part, ‘the shadow’s keep’, Anderson records, in no particular chronological or narrative order, the short, sharp lines he wrote on
              waking from various dream states. The glyphs he salvaged, however, are not merely dream recordings, but insights that tweek nerve endings
              which continue to reverberate on a subconscious level, so that an initially puzzling line reveals itself, with any number of often contradictory
              interpretations and permutations, when you let go the line and allow the bait to drag and float with the currents. As he observes, ‘If I
              relaxed and simply let the lines happen, they seemed eventually to explain themselves in ways that were more surprising than any I could
              have arrived at consciously’. Yet these are not the wafty dream babbles I feared on initially reading his essay. They are twigs and buds
              caught in the door jamb of the rational and irrational. In the third section of the book, ‘a zephyric alphabet’, Anderson conflates the
              Dionysian upsurge of his dreams with Apollonian reason, as he carefully extricates his brains that ‘sleep in the marsh’ from the rocks that
              pierce an ‘ocelli’ in his blood, to learn what any artist should know before launching themselves before a public: mainly that the initial
              inspiration may knock your socks off, but the silt has to be cleared before a reader can receive it second-hand, or, as he succinctly puts
              it, ‘Mud is a writer - lightning is a writer’. Thanks to his alertness, he brings order and coherence to the disparate lines by harnessing
              them into the pantoum form - a verse form of Malay origin, in which the second and fourth lines of each stanza become the first and third
              lines of the next, and in the last stanza the form comes full circle as the unrepeated first and third lines of the first stanza are used
              as the second and fourth lines. With its possibilities of mood shifts and capacity to underline obsessive themes, the pantoum has a circular
              motion that serves Anderson’s subject matter well; but you sense his reluctance in doing this when one line, in particular, seems to implore
              against such interference, asking that he not alter, ‘but preserve it in its sweet sleep, its inventive mind’. He frets that he may be only
              a custodian of the lines, and has no right to create a drawbridge between the dream-like flow and conscious control, in order that a wider
              audience may receive them. Zen is often misunderstood in the West, as a result, haiku has suffer a great deal in untrained Western hands.
              Orthodox Christianity places the soul of man in direct opposition to God and states that a union is facilitated with the Divinity only through
              contemplation and love. Even so, absolute union and the Beatific Vision is not granted until after death. In Zen, union with the Absolute
              and with Nature are one and the same thing and no intermediary is necessary. In ‘Let the Spring Breeze Enter: The Quest of Zen’, Takahashi
              Ikemoto says, ‘Zen is clarity itself’. A clarity that Anderson aspires to through his adoration of the immeasurable open spaces or, in his
              words, the ‘geology of contrary responses’ afforded by the Australian bush, from which he drew constant inspiration for his work. When he
              remarks that ‘the ironbark is slow to go up in beauty / the ironbark is slow upon the land’ we know he is rooted in a land where Aboriginal
              ‘aloofs are not compatible with Australian journalism’, and as he fixes on the ‘black ducks’ which ‘fly over in the night and create stillness
              in a / body’, he is inwardly transfixed by, and perhaps flying with them, toward an Eastern realisation: ‘My fingers curl towards the East
              / the mountains took a long roll outwards / they were a fan in my heart’. As in the cult of Shinto in Japan, Anderson’s veneration of trees,
              mountains, birds and waterfalls holds sacred the sense of Nature and her cycles. He reflects darkly on human interference: ‘the moon plows
              red / and what of man? So long as he holds influence the earth / dreads its very own water babies’. But when he records that ‘the old watertight
              roads have sandbars along their edge’, he is aware that unstoppable natural elements are encroaching and undermining man’s efforts to seal
              his fortress - a cyclic stock-taking or Darwinian turbulence of give and take. Ikemoto also suggests that, perhaps, the essence of Zen is
              best captured by this classic poem: ‘Transmission outside doctrine, / No dependence on words, / Pointing directly at the mind, / Thus seeing
              oneself truly, attaining Buddhahood’. Of course, as a poet, Anderson’s tools are words, but the function of his utterances is to create
              word-images that point ‘directly at the mind’ and, since the West locates the heart as the true seat of intellect and love, melts dew-drops
              that reflect the indivisible moon, down to that central organ."
        - title: Sidewalk Review
          text:
              the shadow’s keep Richard Hillman Sidewalk , No. 1, 1998 Alternatively [to Andrew Sant , Album of Domestic Exiles ], John Anderson’s
              the shadow’s keep does not suffer from a pretentious groping for unsatisfactory detail; his language may be a dream reached on waking but
              as an experimental text it is a constant poetical challenge, brilliant, leaving nothing for the Jungian to fondle with, to analytically
              sexualise (it cannot be analogised) - but, it might be asked, Why does Anderson think anyone will be interested in his dreams? Do they represent
              a PSYCHE at millennium’s end, or beginning? Are these poems sounds, someone overwhelmed by words? Does this poetry simulate an enviable
              journey - ‘I wish I had written that / it’ - or simply mirror a form of wishing thinking? the shadow’s keep excludes the personal even though
              it invites, because it keeps to itself. Beyond a sense of alienation, the shadow’s keep is sustained by a beautiful, creative voice - perhaps
              the sound of things spoken in silence.
        - title: ArtStreams Review
          text:
              book review the shadow’s keep Lucinda McKnight ArtStreams , December 1997/January 1988 To enter John Anderson’s world, in his poetry
              collection the shadow’s keep , is to enter a world of dream. In his explanatory essay, ‘the beginning tincture of what i wrote’, Anderson
              even calls his lines ‘dream-lines’, explaining that they are vivid fragments released when drifting between waking and sleeping, fragments
              he has ‘received’ and channelled for us. Even without this explanation, though, the reader who is absorbed by the first section of the volume
              will recognise its dream influences. Anderson explores the incongruity of dreams both within each fragment and through his careful juxtaposition
              of lines, expressing his strangest thoughts matter-of-factly, like a dreamer just woken from sleep. The reader, puzzling over each mysterious
              image, relives the disorientation of dreams, as the fragments, unrelated to, yet resonating against those coming before and after, collectively
              create a larger meaning. This meaning is likely to be private, and different for each reader, as the images operate subtly on our memories.
              the shadow’s keep combines uniquely Australian imagery, recalling the magical stillness and glow of the bush at sunset with the frenzy of
              the poet seeking ‘the generous minimalist of the poem’s surprises’. By presenting us with ‘the black sons of water lilies’ and ‘folded blankets’
              or fridges and cleverly playing the exotic off against the mundane, Anderson enthralls the reader for a while, but it is easy to become
              blase about the intensity of the imagery, even when the lines have space around them to ‘expand infinitely’ into. By the time the reader
              finishes the following explanatory essay and delves into the third section, with the same lines rearranged into ‘a Zephyric alphabet’ or
              scries of more traditional poems, the lines appear crammed together and it is easy to become lost or to feel you have over-indulged on Anderson’s
              rich and peculiar feast of language. The best way to experience the shadow’s keep may be to read it slowly, aloud, savouring ‘the indomitable
              spark of message in it’, and the ‘angel pips and squiggle pips of meaning’. This collection provides a rare opportunity to share the story
              of the artist’s creative process and explore how the re-organisation of words changes their impact.
        - title: Famous Reporter Review
          text: Aftertaste the shadow’s keep Liz Winfield Famous Reporter , No.16, December 1997 (pgs 104-107) [Text not yet available]
        - title: Ulitarra Review
          text:
              "A Dense, Word-Haunted Forest the shadow’s keep Martin Langford Ulitarra , No. 12, 1997 In the shadow’s keep , John Anderson has written
              a curious book. It is composed of individual lines and phrases that occurred to him either between waking and sleep, or in dreams. The lines
              and phrases do not necessarily make literal sense, though sometimes they do. They all participate in various types of poetic sounding language:
              tomatoes, potatoes, my rapscallion heart or: three hour jumping frog workshop with Sigmund Freud or: angel pips and squiggle pips of meaning
              In some, an abstract comment or idea is made attractive by the quirkiness of expression: The aborigines. Their aloofs are not compatible
              with Australian journalism or: The day got through the day without the sun At the end of the book, there are several pantoums, where Anderson
              plays with suggestive juxtapositions of the lines. Overall, I think that his fragments represent only one stage of the creative process.
              It is as if he has locked onto the phrases at a time when, while they may hold maximum interest for the writer - still with an intriguing
              sense of being unformed, fresh with a sense of mystery - they could nevertheless not be said to have been developed sufficiently to compel
              the attention of the reader. The phrases are interesting, but not satisfying. They actually beg the question of intelligibility, by insisting
              that the author is only interested in that place where meaning begins. I would argue, however, that it is precisely at that stage when the
              author’s responsibilities come into play."
the-blue-gate:
    title: The Blue Gate
    author: Alison Croggon
    short_description: Shortlisted for the Victorian Premier's Poetry Prize
    long_description:
        Shortlisted for the Victorian Premier's Poetry Prize The centre of gravity in these poems is very rarely external subject
        matter; rather, it is their very emergence, to dry into verbal beings on the delicate skin of the self. It is an important shift in literary
        polarities. Les Murray ... dense, intense and beautifully crafted... will delight readers who saw in her award-winning book, This is the Stone
        , a poet of rare promise. John Leonard Editor, Seven Centuries of Poetry in English One of the most assured of a new generation of Australian
        poets... Her work is remarkable for its technical awareness of earlier poets... There is always a strong physicality about her writing...
        a constant feeling of lyrical sensuality. Geoff Page A Reader’s Guide to Contemporary Australian Poetry
