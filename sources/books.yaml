    reviews:
        - title: Award Review
          text:
              "A Pair of Ragged Claws Report on Eldershaw winning the Colin Roderick Award Stephen Romei (Literary Editor) Weekend Australian Review
              18/10/2014 ... there’s another feelgood literary story I want to share ... DEPARTMENT of Truth is Stranger than Fiction: A novelist puts
              a poem of her own creation in her new book. Not just willy-nilly, but as a necessary part of the story. She is not a poet, a fact her publisher
              makes clear on reading the manuscript. So the novelist goes on a strange search for a poet to pen a bespoke poem for her book. She finds
              one, a poet she has read but never met. The poet finds the proposition unusual, too, but writes the poem and it is included in the book.
              It’s a fine poem. A year later, the novelist and the poet share a major literary award. Had the fiction writer come up with such a plot
              twist she might have been accused of overreach, but it is just what has happened to novelist Ashley Hay and poet Stephen Edgar. This week
              Hay’s 2013 novel The Railwayman’s Wife, which features a poem written for the book by Edgar, was named joint winner of the prestigious Colin
              Roderick Award. The other joint winner was Edgar, for his poetry volume Eldershaw. Hay explains how this odd coupling worked: “I sent him
              some of the imagery I hoped the poem would contain, a bit about its content and its context, and a bit of information about the character
              in the book who would be doing the writing.’’ Edgar sent back a first draft of the poem within a week. “What amazed me,’’ Hay says, “was
              that it not only fitted the voice of my poet so perfectly, and contained all the imagery and ideas I’d sent through, but there were also
              nods to other elements of the novel that Stephen didn’t know about — couldn’t know about. It took my breath away.’’ Edgar says novelist
              Michelle de Kretser was the link between he and Hay, putting them in touch after hearing of Hay’s dilemma. He reveals he did not read the
              novel but based his poem on the one Hay had written, and on the context she provided. “I simply immersed myself in the words Ashley had
              sent and let my imagination work on them and try to find a new form that seemed to be effective. I found it a very interesting and satisfying
              process. But I regarded it as something like working on a libretto for a composer — she would have the final say and I would adapt anything
              I wrote to suit her needs.’’ It’s a lovely story, but we should not forget the poet’s achievement in winning a literary award open to all
              genres. Reviewing Eldershaw in these pages in June, Geoffrey Lehmann lauded a “high point in Australian poetry’’. The Roderick is awarded
              to the “best book published in Australia which deals with any aspect of Australian life’’. First awarded in 1967, it honours the Queensland
              author, critic and scholar Colin Roderick (1911-2000), who was the foundation professor of English literature at James Cook University in
              Townsville. The award is worth $10,000 to the winner — and in an act of generosity Roderick’s widow, Margaret, contributed a further $10,000
              this year so that Hay and Edgar each received the full prize cheque. Previous winners include Ruth Park, Tom Keneally and Peter Carey, but
              as the ever gracious Hay suggests, this year may well represent a first: “Stephen Edgar becomes, in a way, the first person to win the Colin
              Roderick twice in a single year, because my book would not hold without him.’’"
        - title: The Warwick Review
          text:
              "Eldershaw William Bedford The Warwick Review (UK), December 2013 In three superb narrative poems, Stephen Edgar’s Eldershaw moves like
              a Jamesian novel through the lives of its troubled characters. Eldershaw is an old country house, and in searching for the ghosts who haunt
              the house, we are clearly in the same territory as The Turn of the Screw : are these hauntings part of the fabric of the house, or the hysteria
              of the inhabitants? The epigraph—Novalis’s “character is destiny”—offers the first clue. Helen is the central figure in the sequence, knowing
              the house as both child and grown woman. She appears in the first poem, ‘Eldershaw’, when her husband buys her childhood home. Her own children
              play in the wild overgrown garden, running among the plants in a trance-like nakedness, “beautiful corrupted angels”. Nakedness recurs throughout
              the poems. Ghosts seem to haunt the children, though Helen’s husband dismisses such talk with dismissive rationality: “‘I’d say the girls
              // Are feeding on your own anxieties.’” Helen concludes that she has “been the one // On whom the ghosts of Eldershaw had fed”. ‘Eldershaw’,
              and then ‘The Fifth Element’ and ‘The Pool’, move on to an ever-widening circle of family and friends, sexual and ghostly crossovers in
              a world of liminal uncertainties. In Helen’s marriage, the sexual ambiguity becomes most damaging when a male homosexual friend moves in.
              At first, Helen believes that the oppressive spirit “lodging in her heart” is the house. Now, recognising her husband’s secret homosexuality,
              she admits “The incubus that suckled at her life // And withered her was not the house itself, // It was her marriage”. “‘I want him out,’”
              she screams at her husband, and his “‘Don’t be hysterical’” suggests the Jamesian theme, as does her reply when he taunts her about seeing
              ghosts: “‘I didn’t say // It was a ghost. I just said what I felt, // And heard and saw.’” Whether this is hysteria or the spirit world,
              it leaks through into the lives which are entwined in this rich narrative, a “‘bewitchment’” that follows Helen to the grave. Eldershaw
              closes with sixteen lyrics in Edgar’s more familiar style, some reflecting the themes of the longer poems, but the heart of the collection
              is definitely the blank verse narratives. Their achievement is considerable. English poets have found blank verse difficult ever since Wordsworth,
              not having the relaxed, idiomatic tradition which makes Frost’s longer poems so powerful. Edgar makes the form his own, not least with the
              music of the occasional rhymes and sound patterns and the subtle use of allusion: the house being “full of noises,” the “darkness visible”
              of Milton hinting delicately at Golding’s own use of the quotation. These are poems that deserve and reward repeated readings, a fine kind
              of haunting."
        - title: Mascara Literary Review Review
          text:
              "Eldershaw Linda Weste (poet and academic) Mascara Literary Review , December 2013 Publishers are not usually champions of narrative
              verse: it is not sufficient that writers of poetic narratives have literary history on their side. None would deny the pre-eminence of literary
              antecedent: the verse narratives that arose in each period - be it antiquity, the Middle Ages through to the Renaissance, the Victorian
              era, or modern times - are exemplars essential to the canon and remain in readership. Small presses as a rule, are more willing to include
              contemporary verse narratives among their titles. Any style of narrative poetry may seek a place, but in a discerning literary market, a
              collection of the calibre of Stephen Edgar’s Eldershaw , by virtue of its formal accomplishment, asserts that prerogative, and is vouchsafed
              a welcome reception. Edgar is conversant with the narrative poems valorised in western literature long before prose novels became an institutionalised
              genre. The technical elements of poetry accumulated over centuries are at his disposal, and he employs them with grace and ease. The process
              by which a poetic narrative emerges, unique, from each poet’s individualised treatment of elements and themes always inspires a sense of
              awe, and Edgar’s poems are distinctive; resolute in the contemporaneity of their storytelling, and full of references to the natural world,
              a feature for which his poetry is widely regarded. Eldershaw comprises three long interlinked narrative poems spanning seventy-three pages
              in Part I, and a further sixteen single page lyric poems in Part II which in some measure link to the larger narrative. Part I has three
              sections: the first shares the volume’s title ‘Eldershaw’ and comprises nine segments set in the years 1941-1965; these have a non linear
              order that begins with 1955 and ends with 1961. The events in this story pertain to vicissitudes in the lives of twelve discernible characters,
              but focus in particular on the high and low moments of the central character Helen, who, twelve years after meeting Martin in London, finds
              herself unhappily married, with two daughters. Martin is attracted to men, and Helen’s affair with Lex over a period of years attracts detriment
              in Martin’s lawsuit; she loses both house and custody. In the later years, from 1961-65, after Lex has an affair with Vera, Helen lives
              alone in a Sydney flat, and the events of this period include a trip to Greece. The second section of the verse narrative has a further
              seventeen pages in seven subsections with titles such as ‘April 1945. Evan. Fire’ and ‘November 2000. Isabel. Water.’ This cycle of poems,
              thematically framed by the title, The Fifth Element, conjures space, heaven, void, aether, quintessence - words used to describe ‘heavenly’
              phenomena like stars or other supposedly unknowable, unchangeable, or incorruptible entities. ‘Character is destiny’ - Edgar cites George
              Eliot citing Novalis, in the preface to the book, and we are drawn to what is vital about life, about energy, that is manifest in the fabric
              of these characters’ lives. The third section, titled ‘The Pool’ provides a physical and emotional locus from which Luke [with whom the
              older Helen has had an affair] contemplates life, following Helen’s death. These poems draw attention to the miscellany of lives lived.
              ‘The Tapes’ recounts a drunken recording found among Helen’s possessions, and ‘The Papers’ refers to the documentation that gathers over
              a lifetime, and which stands in for Helen’s physical absence. Materiality is prominent, too, in ‘The Annexe’, one of sixteen shorter poems
              in Part II. The poem pans cinematically over the furnishings in a room: an Afghan rug, a television, a sofa and window blinds; nondescript,
              commonplace, generic, their qualities do not matter; they are objects that outlast us. What remains? The narrator of ‘Vertigo’ asks (105)
              ‘Are not your own / Made of the same and failing elements?’ (105) Indeed the book makes much of material remains. In references to a Minoan
              comb, a crushed fossil, the detritus of millenia, Edgar’s narrative poems connect present to past. Edgar’s study of Classics finds synthesis
              in a host of classical allusions such as ‘Some drowned god drags your foot off Sounion’ (107) that imbue line, stanza, and narrative with
              mythical and allegorical constructions of place - the magnificent Cape Sounion of now with its temple dedicated to Poseidon, and the cliffs
              from whence Aegus leapt to his death, a narrative event in Homer’s Odyssey . ‘A Hansel and Gretel pathway’ (7) - an intertextual, thematic
              construction of place - leads to the site of Helen’s historic family home, Eldershaw; a distinctively Australian bush setting with its ‘embassy
              of possums’ (8). In ‘Lost World’ (108) Edgar maps loss onto place as he describes, without sentimentality, fire’s devastation of a home
              that could be Eldershaw: the roar of bushfire ‘dragged by the vacuum it creates, / Swarms up the slope into the sky’s / Exhausted limit,
              where a cottage waits. / ...Trees thrash and, one by one, volatize. / Paint bubbles from the walls. The rooms explode. / Fragments of melted
              window strafe / The lawn like wept and frozen tears’ (108). In an age inclined to posit verse narratives as anachronistic, to produce a
              work such as Eldershaw takes resolve. Only painstaking refinement enables contemporaneous words such as ‘tweezers’, ‘bureaucratic business’,
              ‘garage’, ‘home-made Florentines’, ‘truck’, ‘curtain’ and ‘landlady’ to perch comfortably at the ends of metrical lines - a good many of
              which contain the requisite number of syllables and feet for iambic pentameter, while occasional lines accommodate a triple foot with an
              extra syllable at the end. The rhythmic momentum of blank verse brings buoyancy to unfolding events in the verse narrative, and complements
              Edgar’s accomplished application of metre. Reading verse narratives can take resolve too, if one prefers prose, but narrative verse in English
              is not inherently harder to read than narrative prose. One challenge with Eldershaw may be to keep track of the inter-generational characters
              across the entirety of the narrative. Faced with its non-linear discourse some readers may reconstitute the chronological sequence, while
              others will enjoy the free association and fusion of time-planes in memory, and the corresponding emphasis on existential and psychological
              concerns. ‘What compels writers to produce a verse narrative?’ Edgar once mused. Now he has contributed to the longest tradition in literature
              in English. Eldershaw , constructed with great complexity, economy, and clarity, serves to demonstrate the staying power of verse narratives,
              despite contemporary preferences."
        - title: Westerly Review
          text:
              Aspects of Australian Poetry in 2012 Michelle Cahill Westerly , Issue 58:1, June 2013 At the formal end of narrative poetry Stephen
              Edgar’s Eldershaw makes elegant, thoughtful reading, the blank verse suited to Edgar’s thematic preoccupations with Time, apparition, memory,
              history, loss. Edgar is able to change gear from speculative to piquant (see the conversation about fellatio between Sasha and Helen) to
              dramatic intensity as in the poem ‘1961’ when Martin intrudes on Helen and Lex. Edgar excels in convincing detail and interior monologue;
              he uses flashback, elements of dialogue and an episodic sequence extracting fictional elements and hybridising these with his voluptuous
              elaboration of language. His new and selected collection, The Red Sea , evokes the passage of contemplative exile in which the lyric is
              nuanced by a subtle ethics. The quietness and complexity of Edgar’s poetry, its syntactical challenge to postmodern tropes, is a rare accomplishmen
              t.
        - title: The Weekend Australian Review
          text:
              "Lovers dance through time Geoffrey Lehmann (poet, co-editor of Australian Poetry Since 1788 ) The Weekend Australian, 15 June 2013
              Stephen Edgar, who was born in Sydney in 1951, has an international reputation as one of the most accomplished formalist poets writing in
              English. Eldershaw marks a watershed in his work. Together with 16 shorter rhyming lyrics (more typical of his intricate and constrained
              style), there are three linked narrative poems spanning more than 70 pages. These narratives in unrhymed blank verse, ranging in time from
              World War II to the start of the present century, have allowed Edgar to break through into a more explicit expression of emotion. They can
              be confusing, with their complicated time lines and multiplicity of characters. But at the end you realise these pungent and brightly coloured
              fragments of more than a dozen people’s lives are a sustained single narrative, a wonderful love poem and elegy for a woman, Helen, viewed
              through the eyes of Luke, her lover. The publisher’s blurb describes these narratives as ‘drawing on personal experience, reimagined and
              transformed through the lens of fiction’. This gives them an authenticity and power they would not have if they were pure fiction. The first
              narrative, ‘Eldershaw’, has nine parts with dates as the only headings. It starts with ‘1955’. Helen and her husband, Martin, have bought
              the ‘haunted house’ of Helen’s Tasmanian childhood, Eldershaw. They have two children, Sally and Claire, dancing naked among the rhododendrons,
              singing about imaginary friends called deppites. Then ‘1941’ follows, giving a glimpse of Helen, on the edge of puberty, immersed in the
              bush around Eldershaw. The next section is another ‘1955’. We get the first hint that Helen’s marriage is dead at its heart. Abandoned for
              the evening by Martin, who prefers a night out with the ‘boys’, she screams at a ghost in the back flat of Eldershaw. This is followed by
              ‘1965’, ‘1957’, ‘1945’, ‘1959’, ‘1963’ and finally ‘1961’. The high point is ‘1945’ with the description of Helen naked on her honeymoon,
              ‘with her gleaming breasts’ as ‘great washes of white water surged around her’, and Martin ‘naked as she, calf-deep in the bubbling swirl’,
              balancing with the camera, taking snaps. As Edgar presents us with these slices of time, like biopsies on a glass slide, we discover that
              Martin prefers men to Helen. He encourages her affair with his client Lex. Then he sues for divorce on the basis of her adultery, and gets
              Helen’s share in Eldershaw and custody of Claire and Sally. Helen’s cup of bitterness is drained dry when Lex dumps her for another woman.
              The second narrative, ‘The Fifth Element’, set in Sydney, again has dates at the head of each section and the chronology jumps around. It
              tells the story of Evan, a psychologically damaged World War II bomber pilot, and his baby-boomer children Angela and Luke. In a section
              headed ‘November 1980. Luke’, Luke is having dinner with Helen and hears on the phone about his father’s death. Apart from this casual reference
              to Helen, there is no link between the first and second narratives. The third narrative, ‘The Pool’, has no dates and begins after Helen’s
              death. We discover that Luke and Helen have had a love affair over many years. There are flashbacks: Helen seducing Luke, ‘Helen had stood
              up / And, heading for the fridge apparently, / Had kissed him slowly on the mouth, and stopped / And looked at him, then led him by the
              hand / Along the long and unlit corridor’; Luke waking late at night when he hears a ‘sudden rush of wings and a panicked starling’, to
              discover Helen is dead; the disposal of Helen’s things: Then he went through her bits of jewellery, Such as the girls had left, her purse,
              her perfumes, Her make-up bag, in which among the tweezers, Lipsticks, eye pencils, creams, one folded tissue Presented to his gaze the
              perfect form Of her pursed lips in pink, on which, he knew, A few forensic cells of her still clung... This image appears again at the end
              of a sonnet, ‘Inarticulate’, that is one of the accompanying 16 lyrics: And in your purse, imprinted on a tissue, Your red lips waiting
              in a folded smile Will show themselves as lost for words as I. What contributes to the almost unbearable poignancy of the romance between
              Helen and Luke is their age difference. She is old enough to be his mother. With a restraint worthy of Henry James, Edgar does not mention
              this. But it is apparent from the elaborate dating of the sections in the first two narratives. The final dateless narrative, ‘The Pool’,
              is intensely emotional and a high point of Australian poetry. In it Helen and Luke’s love exists outside time, except that Helen dies."
        - title: Australian Poetry Review
          text:
              "Stephen Edgar: Eldershaw Martin Duwell Australian Poetry Review , 1 June 2013 The title poem of Stephen Edgar’s Eldershaw is a three-part
              verse narrative which, nearly eighty pages long, makes up more than two-thirds of the book. The final twenty-five pages is a collection
              of poems described, on the back cover, as being ‘in Edgar’s more characteristic manner’. The narrative, ‘Eldershaw’, is a brilliant piece
              of ‘uncanny’ fiction focussed on the Tasmanian home of the grandparents of the central character, Helen. She and her husband - a successful
              lawyer - rebuy it in the mid-fifties and, almost immediately, become prey to disturbing events the most affecting of which is finding their
              two little daughters dancing naked in the backyard singing, mysteriously, ‘Dep-pites! a-Darra-dan!’. Both partners end up behaving badly
              (certainly madly) and divorce messily. Helen later takes up with the much younger Luke whose family history forms the basis of the second
              part. Luke’s father is one of those victims of war (he flew Mosquitoes in raids over Germany) whose later life is a process of denial and
              almost self-willed deadness interspersed by eruptions of traumatic memory. The final section of ‘Eldershaw’ deals with Luke’s responses
              to Helen’s death and records instances of the way her presence asserts itself: he finds a tape on which she had, unwittingly, recorded herself
              while drunk; he reads her extensive diaries; clearing out her things he finds, among her make-up, a tissue imprinted with her lipstick kiss;
              and, most importantly, wakes in the night with a clear vision of her sleeping alongside him only to find that she disappears the moment
              he tries to touch her. Described like this, ‘Eldershaw’ seems not much more than a melange of topoi from the genre of uncanny fiction, even
              down to alluding to the sinister and equivocal children of The Turn of the Screw and having a central character (in this case, Luke) who
              is resistant to any suggestion of the occult. But the whole poem works alarmingly well. Unlike a conventional genre piece, it is alive and
              convincing at every point, crackling with engagement and intensity. Working out why this should be the case is a tricky critical issue.
              It can’t be put down to superlative narrative skills on Edgar’s part since there isn’t much in his seven earlier collections to prepare
              us for this movement into narrative. True, there is an early ‘Bluebeard’s Castle’ and there is also ‘King Pepi’s Treasure’ from the 1995
              volume, Corrupted Treasures . Written in the same brisk blank verse as ‘Eldershaw’, this latter poem also visits the familiar landscapes
              of the uncanny in that it is a search for a missing text - in this case a Victorian short story referred to in the footnote of a scholarly
              book. The ‘rules of the labyrinth’ apply: the harder the narrator searches using correct bibliographic procedures, the more the book in
              which the story appears recedes - even the British Library has mislaid it. Eventually, when all desire to find it has been leached away,
              the narrator stumbles on it in a secondhand bookshop in London only to find that the short story has been physically cut from the volume.
              Like much of the uncanny it can be read as an allegory of the search for textual meaning: so much is promised ultimately to be endlessly
              deferred, the text continually slipping out of reach. And there is much about ‘King Pepi’s Treasure’ which is obsessed by text: the narrator
              as a child is fascinated by his first experience of cursive script - ‘the ‘running writing’ he could never catch’ - and fills pages with
              imitation scripts which he hopes will, one day, have a meaning. After his father’s death, he reads, in a late letter, not an act of communication
              from the father but a textual substitute for emotions: An offering of uninformative, Embarrassed platitudes which gestured at Some more
              remote sense of what might be said, For which the act of writing in itself Would have to be the formal substitute, So touching, so profoundly
              not himself. Just like the face presented by his coffin, Expressionless, uncoloured... If ‘King Pepi’s Treasure’ could be about deferred
              textual meanings, we also learn enough about the central character’s love-life to see that desire, too, is about receding and ultimately
              unreachable goals: touching his lover’s body he is visited by the image of a babushka doll hiding ever smaller dolls within: Continually
              deferring the embrace, Continually receding from his hold Towards the central space in the final doll Still moulded by its absence in her
              shape. There are other related readings as well. Perhaps this is not so much about text generally as about poetic text. Perhaps, even, bearing
              in mind the sceptical protagonist of ‘Eldershaw’, it is about the occult (or any religion which harnesses the miraculous) which continually
              leads would-be adepts on with promises of revelation only to present them in the end, when the curtains are finally whisked aside, with
              an empty temple. Another reason for approaching ‘Eldershaw’ by this roundabout path is that ‘King Pepi’s Treasure’ connects with ‘The Secret
              Life of Books’, a ‘more characteristic’ poem which immediately precedes it. It is a poem which turns text from being a controlled human
              tool into a dimension with its own agenda: ... The time comes when you pick one up, You who scoff At determinism, the selfish gene. Why
              this one? Look already the blurb Is drawing in Some further text. The second paragraph Calls for an atlas or a gazetteer; That poem, spare
              As a dead leaf’s skeleton, coaxes Your lexicon. Through you they speak As through the sexes A script is passed that lovers never hear. They
              have you. In the end they have written you, By the intrusion Of their account of the world, so when You come to think, to tell, to do, You’re
              caught between Quotation marks, your heart’s beat an allusion. I dwell on this at length because it encapsulates in a small ambit what might
              be one way of approaching Edgar’s work as a whole. In other words, there is an entire corpus of poems in Edgar’s previous books which stand
              in the same relationship to ‘Eldershaw’ that ‘The Secret Life of Books’ might be said to have to ‘King Pepi’s Treasure’. We have met Luke’s
              father, for example, as early as Edgar’s first book, Queuing for the Mudd Club , published in 1985. ‘Dawn at Bateman’s Bay with Two Figures’
              is an early example of a characteristic shift in Edgar whereby reality is frozen or illuminated into art: that is - land becomes landscape.
              But the landscape here is an expressionist one, encapsulating the deadness of the relationship between father and son in an imagined painting
              of ‘Grey road and river, grey / Sky gumming the interstices of trees, / The buildings pasted flatly like screens...’ When we are told: Those
              fingers now are fused Beyond prising. He’ll not be reached through them. The rigours that made him are emptied and set By. That expression
              is closed to appeal And the closed eyes are focussed in a different Light. ... I’m not absolutely sure whether this is because the father
              is emotionally dead inside or actually, physically dead, but the fact that ‘Dawn at Bateman’s Bay with Two Figures’ is followed immediately
              by ‘Patrimony: Four Poems on my Father’s Death’ suggests that it may well be the latter. The first poem of Edgar’s second book, Ancient
              Music (1988) dwells on his father’s old 78s, accumulated before the war but never played after: ‘All secrets were quite safe / In our technology
              of silence’, it says, ‘He couldn’t speak to me, nor I / To him.’ Above all we have met Helen continually throughout Edgar’s poetry and a
              great number of the events of ‘Eldershaw’ have found their way into earlier lyric expression. She is clearly based on Edgar’s late former
              partner, Ann Jennings, known to all readers of Australian poetry from Gwen Harwood’s much-loved ‘An Impromptu for Ann Jennings’. She is
              the dedicatee of the first book and the posthumous dedicatee of Edgar’s fifth book, Lost in the Foreground , published the year after her
              death in 2002. The first poems of the first book, ‘Beauty and the Beast’, ‘Boobook Owl’ and ‘Home Comforts’, might well be about their life
              together but after 2002 she becomes increasingly the focus - at least the emotional focus - of Edgar’s poetry moving it from a set of elegantly
              formal meditations about art, life, time, the future, our genes (and so on) into a poetry which seems - to me at least - to be trying to
              deal with an oppressive and disturbing subject that continually demands consideration, rather like the house’s protests in ‘Eldershaw’.
              Lost in the Foreground concludes with a comparatively conventional elegy, ‘Elemental’: The body’s graces which you graced Are irretrievably
              effaced, And all you were that now is not, And will no more, resolves to what These gathered memories can make From shreds of pleasure and
              heartache. The lines around your eyes and lips, The gestures of your fingertips, Those limbs that love moved and desire Are disembodied
              now like fire. ... By the time of Other Summers (2006) she (or, more precisely, her absence) is a major recurring theme. There is an extended
              suite of ten disparate poems, ‘Consume My Heart Away’, devoted to getting to grips with the experience of loss from different angles.* It
              carries as an epigraph Francesca’s famous comment that there is nothing so bleak as recalling times of happiness in a time of woe, coupled
              with a comment from Durrell’s Justine : ‘I saw that pain itself was the only food for memory’. Two of these poems are especially fine. ‘History
              of the House’ - again the title specifically recalls ‘Eldershaw’ - deals with ghostly presences and the way that while the central character
              needs to be free of them in general (‘Switch off the radio, / Enough of ghosts...’) he cannot be free of her, specifically (‘She will not
              be denied. / The ghost of her is too much to ignore, / More stubborn to remain since she is gone’). ‘Man on the Moon’ is a magnificent piece
              of poetic indirection where the sight of the moon recalls the experience of seeing the moon landing which itself moves, with the obsessive
              logic of love, to thinking about the way the lover was ‘in the world then and alive’ and how love makes an accidental crossing of paths
              seem a destined meeting. The conclusion: The crescent moon, to quote myself, lies back, A radiotelescope propped to receive The signals
              of the circling zodiac. I send my thoughts up, wishing to believe That they might strike the moon and be transferred To where you are and
              find or join your own. Don’t smile. I know the notion is absurd, And everything I think, I think alone. brings us back to Dante, I think,
              in recalling the circle of the moon in Paradiso . And there is also a wonderful ambiguity in that ‘Don’t smile’ which might, in its defence,
              be addressed to the reader but, as we all know, is really addressed to the dead lover (since we never stop speaking to those we have truly
              loved) and thus is a neat and wry contradiction of the last line. Visitations and memories continue. In ‘Her Smile’ (from later in Other
              Summers ) an old video is recovered showing her in ‘the years before you met / When you were not alive to her, / Nor she to you’, a story
              retold in ‘Eldershaw’. ‘2.00’ from History of the Day (2009) tells the story of awaking to the sensation that she is lying next to him,
              the ‘visitation’ with which ‘Eldershaw’ concludes, and ‘Nocturnal’ from the same book is based on the experience of hearing her voice accidentally
              recorded on tape. It also includes the story of Jenning’s being disturbed by a sinister presence not long after buying the house. This poem
              is thickened by the fact that the tape itself is a recording of Gwen Harwood, a dead friend of both Jennings and Edgar, reciting ‘Suburban
              Sonnet’. In other words it has a frame that doubles the experience of being visited by the voice of the dead. It’s the closest that these
              more conventional poems get to the world of ‘Eldershaw’: ... Who ever thought they would not hear the dead? Who ever thought that they could
              quarantine Those who are not, who once had been? At that old station on North Head Inmates still tread the boards, Or something does; equipment
              there records The voices in the dormitories and wards, Although it’s years abandoned. Undeleted, What happened is embedded and repeated,
              Or so they say. And that would not faze you Who always claimed events could not escape Their scenes, recorded as on tape In matter and played
              back anew To anyone attuned To that stored energy, that psychic wound. You said you heard the presence which oppugned Your trespass on its
              lasting sole occasion In your lost house. I scarcely need persuasion, So simple is this case. Here in the dark I listen, tensing in distress,
              to each Uncertain fragment of your speech, Each desolate, half-drunk remark You uttered unaware That this cassette was running and would
              share Far in the useless future your despair With one who can do nothing but avow You spoke from midnight, and it’s midnight now. What does
              all this mean? It is hard to resist the conclusion that this life/love experience is so powerful that it has, cumulatively, put a lot of
              strain on Edgar’s usual poetic methods. In other words ‘Eldershaw’ is not merely a successful narrative which mines personal experience
              to lift it above being a mere genre piece. Nor is it a sort of roman à clef - the kind of fiction that gets its drive from coded references
              to a known story that is, in itself, for various reasons, unsayable. ‘Eldershaw’ is, I think, an attempt to deal with a profound experience
              by exploiting poetry’s protean possibilities and constructing a verse narrative to both air and attempt to control the material. I think
              it is more successful than the ‘lyric/dramatic’ poems - like ‘Nocturnal’ - largely because it is a mode where complexity of expository detail,
              far from being the awkward drag it can be in a lyric poem (for how can any poet calculate how much contextual detail is necessary before
              an innocent reader can make sense of such a central and repeatedly visited experience?) forms the substance of the text. The main question
              about ‘Eldershaw’ - which a reader cannot answer - is whether this is a final, freeingly successful engagement with this intense material
              or simply another approach, admittedly successful, from a new angle. Time - as they so often say - will tell. The advantage of having quoted
              ‘The Secret Life of Books’ and ‘Nocturnal’ at some length is that they give readers new to Edgar’s poetry some idea of what makes up his
              ‘characteristic manner’, a mode that dates back to the first poems of his first book. It is almost always stanzaic, usually intricately
              rhymed, and exploits a truly prodigious technique to make long sentences articulate themselves within the stanzas. There is rarely any end-stopping
              and the rhymes are almost always half-rhymes (I usually find myself rereading the first stanza with an eye to working out its rhyme scheme
              before I go on with an Edgar poem). Those who dislike it will claim that it is stodgy and old-fashioned but it seems to have served Edgar
              well and choices in poetry should be judged by the extent to which they enable a poet to do what he or she wants and needs to do, rather
              than by any abstract standard such as whether they are ‘in keeping with recent developments’. And getting the syntax of longish sentences
              into a predesigned stanzaic shape produces a distinctive quality of voice: the three stanzas I have quoted from ‘Nocturnal’ will give some
              idea of how brilliantly Edgar does this. Another component of this voice is the presence of lexical density - there are quite a few words
              beyond most people’s competence. ‘Streeling’, ‘obtunded’ and ‘stravaiging’ occur within a few pages of each other in Edgar’s first book
              and ‘planish’ turns up in one of the last poems of Eldershaw . Odd lexical items can create different effects. On the crudest level they
              can just be there to raise the level of the style so that the poem establishes and sustains a slightly hieratic quality. But they also have
              an estranging effect and in Edgar’s style they sometimes seem like (to risk mixing metaphors) little knots in the stately, brahmsian flow
              of the verse. Apart from the fact that it isn’t in one of Edgar’s favoured six or eight line stanzas and is, rather, in syllable-counted
              couplets, the first poem of the sixteen that fill out Eldershaw , ‘Nothing But’, is in touch with Edgar obsessions that go back to some
              of his earliest poems. It begins with the sun illuminating a domestic coastal scene: Like wind and spray, the first sun hits the coast And
              paints it into being, strikes the face Of the sleeper who awakes, in character, Convinced she is herself and yesterday Woke also in this
              room, who, rising, gazes At waves like travellers in time which bring Reports back from tomorrow. Even so, How frail an artifice the pigface
              seems, Streaming in purple down the quarry wall; The empty laundromat, this Monday morning, Its window like an exercise to render Transparency
              from plain day, a collage Of this and that... The work of art which the woman sees through the laundromat window is one in which the objects
              of the day are revealed for what they are - ‘Nothing but this, nothing if not this’ - rather as components of a painted scene with a predetermined
              meaning. But this transmutation of reality into one kind of artwork or another is a theme (if that is the correct word) that seems to recur
              so commonly in Edgar’s earlier poetry that it is almost an obsession. Just as the poems of Gwen Harwood - another poet who moved to Tasmania
              - often touch base with the poetic equivalent of a primal scene (wandering at sunset on the edge of water, receptive to the otherworld of
              dream etc) so a scenario peculiar to Edgar is often repeated in which the poet is looking at the landscape of estuary and hills through
              a window. Probably there is a gull flying, either at random or pursuing goals quite different to the rest of the landscape. Some event of
              light then transmutes this scene into art with the window acting as a plane. ‘Ulysses Burning’ (another Dante allusion) from Corrupted Treasures
              , expresses this perfectly: This room is the darkened theatre. Through the glass The white veranda frames the stage Like a proscenium. Garden,
              street and beach, River and mountain, layer on layer, reach Out to the backdrop of the sky Before which all must pass that has to pass.
              The river with its diamond-crusted gloss; A Petri dish of gel in which A culture of the sun is flourishing. On the mountain, which aspires
              to Monet, cling Veiled glares, some squeegee smears of cloud. ... And so on. In its own way it is a mode full of possibilities especially
              for dealing with endless variations on the opposition of life and art. (In ‘Nothing But’ and another poem from Eldershaw , ‘Auspices’, you
              have the feeling that the later Edgar wants the result to be an art that will be more about things-in-themselves rather than, say, interpretable
              allegories.) But it is also a mode that suits Edgar’s style perfectly because this steady progression of sentences through stanzas has an
              oddly viscous effect which mimics the transitions that the poems deal with. It is a case of an odd music finding its theme perfectly. If
              I had to locate a word within the poetry that might act as a totem, I would choose ‘frieze’ (with its homophonic second meaning as well).
              ‘Nothing But’ also recalls - in its notion that the waves bring reports from tomorrow - those earlier poems interested in the future. One
              of these, ‘In Search of Time to Come’, belongs to that large poetic genre devoted to how we can suddenly be exposed to other dimensions
              either by the destruction of what another early Edgar poem calls ‘that golden stock / Of certainties’ or by being exposed to other orders
              of existence, such as animal consciousness. ‘In Search of Time to Come’ describes an imagined prehistoric community in a cave, turned inward
              - ‘Always back / On itself’ - rehearsing familiar tasks. Outside the sun is setting and the threat of the external dark is beginning to
              loom. The individuals feel that someone is out there but, as the poem concludes, what is out there is us, their genetic and cultural future.
              Given time one could also write a great deal about the way that the past is dealt with. Often it emerges in poems that are about genetic
              determinism and this colours many of the poems about the father like, for example, ‘His Father’s Voice’ from Where the Trees Were and those
              about the family. In fact poems about the family form an interesting counterpoint to the poems of loss about which I’ve spoken. In Other
              Summers there are three different versions of a poem called ‘Im Sommerwind’ in which late adolescence is revisited. In each poem the scene
              is, essentially, frozen but the three versions look like three different snapshots. In the same book there is a wonderful piece, perhaps
              my favourite Edgar poem, ‘Eighth Heaven’, in which the poet wanders through a frozen image of his family home: ... And there is my father
              Standing in the lounge room, half-turned away. I summon up some greeting and can feel The words unbodied, though not a sound disturbs The
              house’s depth. I walk in and am baffled To find, however much I move about him, That that one aspect is still turned to me, Unmoving, a
              one-sided hologram. ... I’m sure that much of the magic of this poem lies in the fact that so many of the Edgar themes are focussed in this
              bizarre scenario. The family is frozen in time in the same way that it is in memory and in photographs but it is a benevolent freezing into
              an enabling art rather than into the horrors of the later cantos of Inferno where the lack of movement symbolises a moral deadness. One
              of the most significant moments in ‘Eldershaw’ occurs when Luke’s father, returned from the war, goes with his new wife on a delayed honeymoon
              in the country: But some particulation of the light Applied across, or rather through the miles Between here and the faint blue hazy sky,
              In which the sun, a smouldering orange disc Behind a screen, was sinking gradually As though the air resisted its decline. How beautiful
              she thought it. ‘I don’t know,’ He said at last, ‘it all looks dead to me.’ What we get here - in compressed form - are the two different
              results of freezing (or ‘friezing’): the enabling beauties of art or deadness. Many of the other poems at the end of Eldershaw reflect on
              the painful material that the long narrative deals with and are thus a part of the dynamic of how Edgar’s poetry is to deal with this issue.
              We are left with the book’s final poem, ‘Lost World’, which describes how a Tasmanian bushfire burns down a shed which contains a lover’s
              photograph in a gardener’s old jacket. The picture is lost but in a sense, the poem reminds us, much more was lost since the picture only
              captured one instant out of many instants: A little earlier, or in a while, And a quite other face or pose Might have been taken than this
              shadowed smile, Which no one may have seen except These two, the nameless and the dead, or kept The curling memory of. And now, who knows?...
              All life is loss, even (or especially) life frozen into art. Narrative may be a solution but it, despite its commitment to a fuller depiction
              of process and change, is also only a sketch of reality. ‘Lost World’ concludes with the hope that everything on earth (crushed fossils,
              drowned Minoan combs, experiences of love at its most intense) survives somewhere as a ‘print in space... coded like a chromosome / With
              lost millennia and multitudes’ - but, at best, it’s a desperate and very faint hope. * Stephen Edgar has provided the following author’s
              note: “In fact ‘Consume My Heart Away’ does not refer to Ann Jennings”."
        - title: Canberra Times and Sydney Morning Herald Review
          text:
              "Fractured Narrative of Haunted House Evokes Ghosts of History Geoff Page Sydney Morning Herald & The Canberra Times , 9 March 2013
              Stephen Edgar is now recognised internationally as one of the most accomplished practitioners of metre and rhyme in English. His poems,
              particularly in recent collections, are poised, visually acute and quite often emotionally detached. Eldershaw , his eighth collection (not
              counting The Red Sea , his recent ‘selected’, published in the US), is something of a departure for him. The book also reminds us that the
              narrative element in poetry has been crucial from the beginning ( The Iliad , The Odyssey and The Epic of Gilgamesh , for a start), despite
              the postromantic emphasis on the lyric. In the first part of Eldershaw , Edgar employs blank verse (unrhymed iambic pentameters) as used
              most notably by Milton in Paradise Lost and Wordsworth in The Prelude . It’s a form that, for good reasons, has never gone out of date.
              It was used superbly, for instance, by the modern American poet Wallace Stevens in masterpieces such as ‘Sunday Morning’ and ‘The Idea of
              Order at Key West’. Edgar, like Stevens, makes excellent use of the form’s flexibility, its combination of leisureliness and compression.
              Eldershaw is divided into two sections, the second of which comprises individual rhyming and scanning poems with the same virtues as those
              in the poet’s earlier books. The first half of Eldershaw breaks into three related narrative sequences that go some distance towards the
              verse novel but seem, ultimately, to draw back from it. Spread across 21 poems, these three sequences (‘Eldershaw’, ‘The Fifth Element’
              and ‘The Pool’) revolve, at least partly, around an old family home in Tasmania called ‘Eldershaw’ that is thought to be ‘haunted’, though
              not in any melodramatic way. Many, though far from all, of the poems are set in the house, but the narrative’s main interest is in the marital,
              family and other relationships of those who have lived there. The tone varies considerably, from ultra-romantic evocations of landscape
              to almost satirical accounts of dinner party conversation. Edgar’s blank verse accommodates all this and more without strain. One problem,
              however, that may be experienced by readers is the book’s lack of a dramatis personae, or perhaps genealogy, to show the connection between
              the characters - who range across three generations and include other important figures not in the immediate family. In Eldershaw , it’s
              as if Edgar has determined to give us only the key scenes, often the epiphanies, of a novel without all the (often laborious) transitions,
              scene setting, physical descriptions etc. normally found there. Its structure is loosely analogous to Frank Moorhouse’s fictional experiments
              with ‘discontinuous narrative’ in the 1970s. There are, nevertheless, in this discontinuity, many highly memorable scenes or set pieces.
              In the poem ‘April 1945. Evan. Fire’, for instance. Edgar gives a relatively short but horrifying account of the aerial campaign over Germany
              towards the end of World War II: ‘...how that pure stellar heat/ Is melting lives from bone and boiling blood,/ Volatilizing screams from
              a thousand mouths...’ Earlier, and in total contrast, there’s a lusciously sensual account of one of the key characters, Helen, naked in
              the surf. ‘Delirious with joy, her shining arms/ Flailing to buoy her up, her gleaming breasts/ Emerging and retreating through the veils/
              Of spume that clothed her so lubriciously/ In lacy and translucent folds of gauze.’ By itself, a passage like this might seem overwritten,
              but seen in the context of the overall narrative it’s apposite. At times Edgar’s narrative risks the tangential, but usually the digression
              is beautiful in itself - and, partly, a key to understanding one of the main characters more fully. It’s only occasionally, as in the first
              of two poems called ‘The Pool’, that Edgar seems to drift off into a pure lyric and lose narrative momentum, but this is rare. As in his
              other poetry, the pace is unhurried and the old device of ‘deferral of reader satisfaction’ works here very well. Some readers may wish
              for a bit more ‘signposting’ as the narrative develops across its 79 pages, but Edgar is probably right to trust his readers to go back,
              reread and sort things out for themselves. If they do, they will conclude that Eldershaw is a considerable expansion of Edgar’s characteristic
              scope and technique - just at the point when he may have been at the risk of resting quietly on his (extraordinary) laurels. One should
              also emphasise that Eldershaw is not merely an achievement in narrative technique and descriptive power; it contains many moments that are
              more than satisfying in their emotional impact. One can sense from certain episodes prefigured in earlier collections that much of the raw
              material for Eldershaw is crucial to Edgar personally, and the book is a product of his compulsion to do it justice."
        - title: Sydney Review of Books
          text:
              "Sunflowers of a kind Peter Goldsworthy Sydney Review of Books , 28 November 2014 As with an ear for music, an ear for the rhymes and
              rhythms of language is hardwired into the human brain; the deeper structures of poetry, in other words, are inscribed in our DNA. Like music,
              their evolutionary purpose is, in part, mnemonic: to help us to remember the knowledge of the tribe in pre-literate times. Hence we remember
              every nursery rhyme we ever heard. Hence, the lyrics of every second song. Hence, a hard-to-forget stanza like this, in an earlier, justly
              celebrated poem of Stephen Edgar’s: Hardly a star as yet. And then that frail Sliver of moon like a thin peel of soap Gouged by a nail,
              or the paring of a nail: Slender enough repository of hope. Nail-clipping moon metaphors are a dime a dozen in literature, but what a rejuvenation
              this is: imagism with a Robert Gray or Galway Kinnell quality of freshness. Or re freshment. And with style nicely fused with substance:
              a formal pentameter and abab rhyme sings subtly beneath the images. No surprises there: although Edgar is a superb imagist, it is not through
              that particular poetic ‘ism’ that he has made his name: he is known first and foremost as a formalist. There are few as accomplished in
              the English-speaking world, or with as large a command of forms. He can turn the music on and off at will: beat it like a drum; allow it
              to whisper sotto voce ; or loosen the shackles into easy-flowing, conversational blank verse. Even when using a standard form – a sonnet,
              say – he is seldom predictable. He especially likes to invent his own end-rhyme schemes. One favourite trick is to rhyme the last lines
              of his preferred six- or seven-line stanzas (sestets or septets) with, say, the second line – an end-rhyme so delayed that it is a half-forgotten
              echo. Auden pioneered this kind of musical suspense in early poems, such as the famous ‘Lullaby’; Edgar stretches our rhyme attention span
              even further. Which is not to say he isn’t perfectly capable of finishing things off with the clashed cymbals of a rhyming couplet: The
              sun displays its gorgeous jewellery Across the spread Of harbour, as it heartlessly arranges Over the bluffs and bays of Middle Head The
              silken trance it’s spun and shed. Edgar wears his influences plainly: Auden, yes, and Larkin, Frost and Hardy, with the towering figure
              of John Donne whispering to us over their heads from several centuries before. Donne’s influence is seen not just in the form of the poems,
              but also in their content. Edgar’s Metaphysical streak jumps out from the first page of his latest book Exhibits of the Sun . ‘All Eyes’
              begins at the rim of the solar system, seen through the proxy eyes of the Voyager probe: Look, look, it says, and peels away the night As
              it flies on. And there, A ghostly Ferris wheel frozen in space, Saturn comes looming at the satellite With all its shattered rings of icy
              lace Exquisitely beyond repair. The regularly varying line-lengths of this poem’s sestets owe something to Donne’s spirit of formal experiment,
              but its evolving argument owes even more to the Metaphysical conceits of Donne’s love poetry. After speculating what might lie further out
              in space, Edgar reverses his telescope, pulling the focus sharply back in, via a joke at the expense of William Blake, and ending in a final
              knight’s-move, or perhaps a warp-jump, to a lover’s face: The fossil in the paginated book Of shale that once was slime Falls open and cries,
              Look! And these sunflowers – Their yellow is the synonym for Look, Though they’ve no word for weary or the hours The sun has summoned them
              to climb. Was it for this the aeons fashioned us? To look and make it so? The moth wing’s intricately subtle scales, The fleck of matter
              in the nucleus, As light as light, your face which never fails To show me what I can never know. Sexual love is more central in the second
              poem in the book, ‘Moonlit sculptures’, which is also written in sestets, and with the same personalised rhyme scheme – abcacb – but with
              the variation of a two syllable-length breather, like a musical fermata, in the fourth line of every stanza. Too hot and humid to do more
              than drowse And slip – who knows how brief the interims? – Into a chafed consciousness, And rouse; Too clammy for the slur and press Of
              fabric or each other on our limbs … All night the poet watches his lover turn and thrash through various sleeping positions and stanzas
              (sextets might be the better term than sestets, given their sensuality) until: Morning approaches and the moon is swamped With day. All
              of those figures, though, survive In you, it’s you that they comprise, And prompt Your mind to waken, and your eyes, And you to turn, now
              sunlit and alive. No pining away with desire for this little sunflower. Edgar’s meditations can spring from love, or from the natural world,
              but they can equally spring from art or cinema or literature: Henry James’ The Turn of the Screw in the next poem; Proust in two superb
              later poems. The first of these, ‘The Representation of Reality in Western Art’, qualifies as a typical Metaphysical conceit as the poet,
              reading Proust in a library, decides to step into the book as a character: After reading Chapter Two of The Guermantes Way He thought ‘Why
              Not?’ and wandered in himself To that immense hall which the drawing room Gave access to. The progress of the day could now resume And someone
              cleared the book from where it lay And put it back in order on the shelf. Meanwhile he casually sauntered through The hall, surprised by
              his command of French … And by his new French friends, until our time traveller finds himself standing before a framed streetscape by Magritte,
              and steps out of frame again. Having come full-circle, he is now back in the library before he had opened Guermantes Way to begin with:
              So browsing for a book He paused and thought ‘Why Not Give Proust a try?’ And sat and opened it and stretched his toes. And presumably steps
              back into the book, searching for lost time ad infinitum . My advice? Open a book by Borges next. * Unlike Blake’s sunflower, Edgar is never
              weary of time. In fact, he is a little obsessed by it. As he is by space. And consciousness. And light. And love. And landscape. But time,
              ‘the fifth element’, ticks along beneath all his work, present both in its rhythms and its ideas. In some parallel world, Edgar is probably
              a physicist, writing equally formal and beautiful equations. On our slow-ticking, sunlit world his algebra is rhyme-schemes, and the solution
              he found for the Proust poem is abcdcab, with that apparently lost and isolated ‘d’ (‘to’ at the end of the half-line in the first stanza)
              finding a delayed echo in the first line of the next stanza: ‘through’. Edgar uses seven-lined stanzas more than any other poet since the
              Middle Ages – but unlike, say, Chaucer, he runs endless musical variations on the basic template. Chaucer’s standard Royal Rhyme has seven-lines
              of regular iambic pentameter in ababbcc . Edgar is having none of that; he is having anything but that. The nerd-taxonomist in me wants
              to classify his Mozartian profusion: let’s call this a K.7(a). The next poem in Exhibits of the Sun , ‘Off the Chart’, also in septets,
              runs abcbcab . K.7(b)? From a meditation on Proust and time, we now meditate upon a suburban clothes hoist and space. The direction of the
              ‘Look’ (a word to remember with Edgar) of this poem is the reverse of the opening Voyager poem: from near focus, to far. It begins with
              the gentle oscillation of hung clothes turning in a breeze, which in itself seems to be a memory of rotary motion on an even smaller scale:
              An action to compare With the white machine that they were packed And swirling in not half an hour ago, As though they were aware Or held
              a memory of that loose, Recurrent motion. I like to think that the this-goes-with-that tricks of the poetry trade – analogies, similes,
              metaphors – are a form of rhyme themselves. Conceptual rhymes, perhaps. This concept snowballs (to pick an obvious metaphor) as our gaze
              widens: So the hoist relays Its agitation to the trees … And ever onwards and upwards, until ‘the obsessive to and fro’ spreads to affect
              the oscillations of the planets themselves: … you sense, The planets and the star-slung zodiac Swung out to some immense Imagined limit,
              forth and back, Impelled by these few things hung out to dry – An astral influence Unknown to chart and almanac. These growing Russian doll
              rinse-cycles are the ultimate anti-Copernican joke, in a way. A Hills Hoist as the centre of the turning universe? In fact, the consciousness
              that can make such a joke is the true centre, as it is in most of Edgar’s work. Nothing we can put into words (or into maths or PET-scanned
              brain images or AI analogues for that matter) gets closer to capturing the weirdness of consciousness than poetry. The next poem, ‘Steppe’,
              takes up this theme. The poet has a lot of fun, in a serious way, about the world-in-itself and our perception of it. ‘Steppe’ is written
              in blank verse tercets – K.3(c) perhaps. One of the great advantages of writing within formal constraints is the paradoxical freedom they
              provide. Yes, sense has to be squeezed into a straightjacket, but that straightjacket can, oddly, provoke a bit of useful madness. That
              is, it can dislocate natural logic, and force fresher and stranger connections on the poet. With luck, and hard work, a differently received
              wisdom can emerge. And the disadvantages? The occasional need for padding to make ends meet, literally. * So far I have been mainly talking
              mainly about Edgar’s ear. What of his eye? Exhibits of the Sun is well-named; the poems are all sunflowers of a kind, drenched in light,
              or seeking it. For a Metaphysical Poet, Edgar has a surprisingly painterly eye. He especially loves the way light rebuilds the world – or
              the consciousness that perceives it – in the light of morning. It is a leitmotif, somewhat in the manner of Eugenio Montale’s great short
              poem, ‘Perhaps One Morning Walking’. From ‘Steppe’: And so the sun inscribes the invented east With its jawline of light … ‘Song Without
              Words’: Light of the nursery invades The morning ward and its uncoloured walls, And like a white sheet on his adult brain Settles opaquely
              where it falls, And will remain All day, as day assembles and degrades. ‘Nothing But’: Like wind and spray, the first sun hits the coast
              And paints it into being … Edgar uses all kinds of lighting effects, sometimes turning the daylight on, blindingly, in the middle of a poem,
              as if in some close encounter of the floodlit kind, and then just as abruptly turning it off. More often, his preference as a painter with
              words is for Turner-like dawns and sunsets, clouds and seas: Four years hence and she Would lie with Martin here as day went down, Although
              it seemed that time forgot its way In them as they embraced and saw the sun Incarnadine the clouds, and the sky rise In blended and aspiring
              zones of peach And luminous mauve and violet, while gold, Too heavy for such heights, was poured away Extravagantly over the eastern shore.
              Edgar is extravagant with his palette. The ‘she’ in this poem is Helen, the central character in a group of linked poems in Eldershaw .
              The title poem, and its two loosely associated sequences, ‘The Fifth Element’ (what else?) and ‘The Pool’, form not so much a discontinuous
              narrative, as a shuffled narrative. Another major heave: there isn’t a rhyme in sight. The whole verse ‘novella’ is in deft, subtly shifting
              blank verse, pentametric, but with endless iambic and non-iambic variations played upon its five-stopped flute. Time is again central –
              but, as befits a verse novella, so is human character. Character is destiny? Time, at least, is the stage on which character will out itself
              – literally, in the case of Helen’s husband Martin. Their Bruny Island home Eldershaw is the other main stage: a Chekhovian country house,
              with ghosts. Even the light in its bush glades is a little spooky: The clouds muster their shadows on the hills Of Bruny. Mist among the
              foliage And hallways of the footpaths trapped the light, Like gas ignited in a jar, and glowed And though the radiance were self-sustained
              Within the vapour. Most of Edgar’s obsessions ravel together in Eldershaw , as we examine the joys and savagery of the marriage of Helen
              and Martin and its long aftermath, often tangentially, through a range of variously unreliable consciousnesses. The ghosts of the past are
              always present, but equally often, rhetorically, ghosts from the future appear, as we time-jump back and forth in clairvoyant asides. Here
              is Martin, photographing his naked wife in the sea in a moment of honeymoon bliss: … calf-deep in the bubbling swirl, Struggling for balance
              with the camera, And taking snap of Aphrodite Anadyomene, who was his wife. The Representation of Reality in Tasmanian Photography? Not
              quite. In the midst of life we are also in the darker future: Perplexing to bethink that decades hence Such shots as these alone might verify
              The life that they were now inaugurating, Such scenes, empty of all but life and joy, Whereas what lay in store, dense with event, Unwitnessed,
              unrecorded, unportrayed In publishable dramas, would prolong Its parallel being in the dark Of memory and bitterness. Memory? A lie perhaps
              even to call it that, Considering how unreliable It proves to be, each instant of recall Subtly rewriting, under influence Of mood and circumstance
              and subsequent Occasion, its each detail till the whole Might no more hold the substance of the day It claimed to represent than the body
              does When seven years of supervening cells Have re-embodied it. Yes, memory lies as much as a Box Brownie – but what, ironically, should
              we make of Edgar’s witnessed, recorded, portrayed and published drama, Eldershaw , which we are reading now on a third parallel time-track?
              The narrative retrospectoscope is always at work. Describing Martin’s ‘meteoric’ law career Edgar writes: Though meteors, they might well
              have remembered, In fact don’t rise but fall. The entire book is a Fall, of a kind: an exile from the lost Tasmanian paradise, and the various
              misadventures, seductions and cruelties that punctuate Helen’s attempts to return to a state of grace. Perhaps Edgar is closer to Milton
              here than to Donne. A later Helen stands on a cliff overlooking a Bronze Age Greek dig, and the meltemi – the powerful north wind that washes
              the Aegean – blows: Down there she stood On that flat promontory, buffeted And shuddered by the gale. As mud-caked stone Is washed clean
              in a stream, she felt the current Of air pour through her, carrying away All she was clogged and matted with. And blow her back to Sparta,
              and Menelaus, perhaps. The very next section time-travels back two years, and we are plunged into a marital cruelty-as-usual story for which
              there can be no forgiveness. The final, stunning sequence, ‘The Pool’, ends with a later lover of Helen’s, the much younger Luke, grieving
              for her in Eldershaw. Photos of her life – including of the honeymoon Aphrodite – are arrayed on a shelf. Helen is dead, but … That night
              he woke and saw her lying there Asleep beside him in the midnight glow Of streetlights … Another ghost, but Luke reaches out to touch her:
              … and in that instant broke the spell. Like a magician’s cape that settles over The volunteer, then emptily subsides On no one to the floor,
              the quilt gave way, Relinquishing her substance, and her head And wavy hair were reabsorbed by shadow. And then? Well, the Montale effect,
              with a less pleasant twist: The first sun strikes his face and he awakes, In character. He can’t escape himself. What remains besides Helen’s
              photographs and journals? Another ghost is a lipstick-printed tissue which Presented to his gaze the perfect form Of her pursed lips in
              pink, on which, he knew, A few forensic cells of her still clung. Eldershaw is a collection of forensic cells, which we try to piece together.
              Luke’s memory of his first sexual encounter with Helen is one of them, as she leads him down a passageway to her bed for their first time:
              A lesson and conundrum from new physics About our abject inability To grasp the simplest principles of time, That corridor, with every step
              he took Towards his life to come, was drawing him Back to her past and what was living there. And so we beat on, boats against the current,
              borne back ceaselessly into the past? * The final, separate section of Eldershaw contains sixteen of Edgar’s more typical shorter poems.
              All the musical variations on old forms are here, including Donne-like shortenings, enjambs and fermate. Voyager also makes an early appearance,
              before it passes beyond the rings of Saturn in the next book and lights out for the really deep territory. But as in the later book, there
              are far more richnesses than I can hope to compass here. Some last honourable mentions, perhaps: the Audenesque (think ‘The Shield of Achilles’)
              ‘Lest Me Forget’ with its alternating stanzas of domestic holiday bliss and scenes of torture. Some poems fascinated by the representation
              of reality in film – ‘Continuous Screening’, ‘Cinéma Vérité’ – or the nature of consciousness – ‘Saccade’, ‘Song Without Words’, ‘Sight-reading’.
              Some typically intricate (obsessive?) explorations of history and personal memory – ‘The Angel of History: Walter Benjamin’, ‘Pictures in
              the Water’, ‘The Trance’ – or of consciousness and memory – ‘A Scene From Proust’, ‘Future Perfect’, and especially ‘Pictures in the Water’,
              with its lovely central metaphor of a couple rowing a boat, seated, as we are when we row, with their backs to the future, facing their
              wake. And so we beat on. Stephen Edgar is a modest man, somewhat of an oddity in the world of poetry, where the gradual shrinking of the
              environmental niche seems at times to demand a Darwinian survival struggle for readership. That’s not a poem, this is a poem! Or, conversely,
              it inspires minimalists: mine is smaller than yours! Edgar’s extravagance is at a tangent to all this. One of his early poems, ‘All Will
              Be Revealed’, is set in a nudist camp. The problem is: In the nudist camp identity is lost Behind disguise. See, over all the fashions of
              the self, Whatever size, They’re slipping on identical pink suits Of nakedness. Which sets our latter-day John Donne up riffingly, until
              the poem ends: In such a place One might devise a nightclub for dress-tease Where they could face, To whistles, randy cries of ‘Get it on!’
              Themselves as lewd Performers who would strut and bump and grind, Beginning nude, Discarding part by part their bare accord, Till they finessed
              The erotic climax of true self-display Completely dressed. One reading of this poem is as a parody that works the narcissisms of both sides
              of the room: the naked and the dressed. But here I choose to read it as a parable of the clothes that Edgar’s body of work wears. His poems
              are fully dressed in every sense: musically, intellectually, visually. They are erudite, but also down-to-earth; Proust is never far from
              the Hills Hoist. They are drenched with painterly light, and can freeze landscapes and moments in a satisfying frame of words, but they
              are also philosophically restless and unsatisfied, banging at the bars of their cage. At times, an unnecessary word or two might be roped
              in to fill a metric line, but what we write always seems at some level to be either too little or too much. Formal rhythm and rhyme might
              be a little out of fashion these days, but fashions come and go. Certainly, despite Edgar’s modest personal qualities, his unique achievements
              are slowly and deservedly emerging into – what else? – the light."
exhibits-of-the-sun:
    title: Exhibits of the Sun
    author: Stephen Edgar
    short_description:
        Exhibits of the Sun moves from Saturn’s rings to a beach pavilion during Sydney’s dust storm, from glimpses of a lover’s
        body in moonlight to a vision of a whole lifetime between one eye blink and the next.
    long_description:
        "You run your eyes across the glossy Lithography of paradise: the sand’s White gold, the opaline transparent blue You’ll soon
        be lolling in, a sky unmarred And constant to the limits of the view— All in your hands. You take the tickets, pass your credit card. “Look,
        look,” exhorts the opening poem of this dazzling new collection. The discoveries of observation, both physical and intellectual, ravishing
        and harrowing, are recounted across a broad sweep of experience. Edgar returns habitually to the character of light. Exhibits of the Sun moves
        from the ghostly Ferris wheel of Saturn’s rings to the beach pavilion wrapped in ochre fog during Sydney’s dust storm, from the glimpses of
        a lover’s light-shaped body in the passage of the moon to a vision of a whole lifetime between one eye blink and the next. Presiding over
        all is Walter Benjamin’s Angel of History, swept away into the future as he looks back on the unravelled pageant of humanity. On the short
        list of the best living practitioners of verse, rhymed or blank. . Joshua Mehigan, Poetry (Chicago) They said of his last book Eldershaw :
        a brilliant piece of ‘uncanny’ fiction… alive and convincing at every point, crackling with engagement and intensity.. Martin Duwell, Australian
        Poetry Review [A] wonderful love poem and elegy… [of] almost unbearable poignancy. The final dateless narrative, ‘The Pool’, is a high point
        of Australian poetry . Geoffrey Lehmann, The Weekend Australian"
    price: 22.95
    isbn: "9781876044886"
    release_date: "2014"
    page_count: 69
    reviews:
        - title: Australian Book Review Geoffrey Lehmann reviews Exhibits of the Sun by Stephen Edgar
          text:
              "Exhibits of the Sun Geoffrey Lehmann Australian Book Review , 1 December 2014 ‘Edgar is a master of rhyme’ Exhibits of the Sun is Stephen
              Edgar’s tenth collection of poems. Born in 1951, he is now ripe for a major Collected Poems. With careful pruning of some lesser pieces,
              such a book will display the full range of his work, which marries virtuosic technique with powerful emotion and intellect. Edgar is a master
              of rhyme. In the poem ‘Sight-Reading’ he rhymes ‘who’, ‘view’, and ‘you’ – all fairly standard rhymes – with ‘autocue’. There is something
              uncanny and magical about rhyme. It can be seen as a form of coupled oscillation. The inventor of the pendulum clock, Christiaan Huygens,
              sick in bed, noticed an ‘odd kind of sympathy’ between the pendulums of two of his clocks mounted in the one case. Over time they would
              start to swing in synchrony in precisely opposite directions, irrespective of how they began. (He wrote about this strange effect in 1665.)
              Coupled oscillation is used in lasers and superconductors. It also pervades the natural world: for example, in the pacemaker cells that
              regulate our heartbeats, the synchronised chirping of crickets and flashing of fireflies, and butterfly irises ( dietes iroides ) which
              have days when they all flower, and days when none flowers. As well as having a love affair with formal complexity in verse, Edgar celebrates
              the formal complexity of the universe. Form merges with theme. In his poem ‘Off the Chart’, he observes a clothes hoist swivelling back
              and forth: Around it turns three feet or so, Its weight of garments too much for the air, And back again, incessantly – in fact An action
              to compare With the white machine that they were packed And swirling in not half an hour ago, As though they were aware Or held a memory
              of that loose, Recurrent motion. This motion is then relayed to the trees, which also move to and fro, and to an ‘oscillation in the sky’,
              and to the universe itself, which Edgar sees as swinging out to some enormous limit back and forth. Edgar, in ‘All Eyes’, tells us as a
              rocket travels into space: Look, look, it says, and peels away the night As it flies on. And there A ghostly Ferris wheel frozen in space
              Saturn comes looming at the satellite With all its shattered rings of icy lace Exquisitely beyond repair. So much to see. And now the vast
              moon, Titan Fills the compulsive lens. In the second last verse of this poem, Edgar challenges Blake’s vision of the sunflower ‘weary of
              time’ with an excited twenty-first-century vision of a universe without apparent limits: The fossil in the paginated book Of shale that
              was once slime Falls open and cries, Look. And these sunflowers – Their yellow is the synonym for Look, Though they’ve no word for weary
              or the hours The sun has summoned them to climb. A highlight of this book is ‘Moonlight Sculptures’. This explores the postures of the poet’s
              lover in bed on a hot and humid night. In the third stanza: Now you lie flat, but twisted to the side, One sheet a failing neckline, and
              I watch The contour of your clavicles Divide The shadow, and the shade that pools Between them in the suprasternal notch. Note this use
              of the wonderfully exact anatomical name for the hollow above the breast bone, and also how ‘divide’, occupying a line to itself, cleverly
              divides the first three lines of the stanza from the last two lines. In the fourth stanza, Edgar observes: Later, and you are offered to
              the air, That sheet kicked to your ankles, to display The image Eve was fashioned in, And there – The world’s unspoken origin, So openly
              depicted by Courbet. This is sexy and profound in a way that A.D. Hope often was, but with a tenderness and affection often missing in Hope.
              The short line, ‘And there –’ skilfully causes the reader to pause before the dénouement of the stanza’s last two lines. ‘Oswald Spengler
              Watches the Sunset’ is imbued with a grand seriousness. Edgar contrasts the immobility of a great oak with the freedom of dancing midges.
              Another fine poem is ‘Saccade’, thoughI had to read the explanation of ‘saccade’ in Wikipedia before I understood it. Edgar is not always
              easy to read, and some of the lesser pieces are dense and dry, marred by personification – the obverse side of his high seriousness. Edgar’s
              poem ‘The Angel of History’ is an extrapolation of a passage from Walter Benjamin, who saw the angel as heroically looking back, yearning
              to restore the wreckage of the past and irresistibly propelled by a storm into the future, to which the angel’s back was turned. Benjamin
              concluded dismissively: ‘The storm is what we call progress.’ For much of his poem Edgar pays homage to the Benjamin text, but at the end
              the angel’s task is described surprisingly as a ‘vice’. Nor is there any dismissive reference to ‘progress’. Edgar’s homage to Benjamin
              ends as a critique. In this book, Stephen Edgar, with his almost Whitman-like embrace of the natural world, encourages us to open our eyes
              to a universe that physicists are starting to realise is becoming more beautiful and complex as it expands, in defiance of the second law
              of thermo-dynamics. Back to top Start of StatCounter Code End of StatCounter Code"
        - title: Mascara LITERARY REVIEW
          text:
              "Exhibits of the Sun David Gilbey Mascara LITERARY REVIEW , Issue 19, September 2016 ‘… the sinople eye of a butterfly wing …’ Sarah
              Howe Edgar’s poetry is like that – detailed, deceptive, minutely crafted, significant and changing – implicating both the watcher and the
              watched. In Sarah Howe’s ‘Two Systems’ lecture at Harvard’s Radcliffe Institute last year, speaking of her own poetry’s slippage between
              different cultural and historical referents, she cited Heather McHugh’s dictum ‘All poetry is fragment … shaped by its breakages at every
              turn.’ Edgar’s is like that too: shardish, provisional, ‘hispid’ (to poach one of his clever, obscure words). In the Old Century, and before
              it became unfashionable, we might call his poetry metaphysical – for its blend of complex thought, vivid imagery and iconoclasm. I can imagine
              Samuel Johnson complaining ruefully that Mr Edgar ‘… doth tempt … not with the softnesses of love but … with nice speculations of philosophy’
              as well as Helen Gardner’s (and Yeats’) praise for his poetry’s ‘passionate intensity’ – though maybe Edgar’s steady iambics regulate passion
              to an intellectual pace … And there are other voices in/behind Edgar’s finely-wrought surfaces too: Milton, Coleridge, Wordsworth, Hopkins,
              Hope, Slessor, Stewart. So Edgar’s poetry is steeped in literary echoes, producing a richness of reference and tone belied by the elegance
              and lightness of his touch. There are, simply, so many terrific poems in Exhibits of the Sun – this is ‘great’ poetry in that traditional
              sense of grand in scope, significant in thematic preoccupations, supply-artificed and multiply-perspectived. In the first section alone
              ‘Off the Chart’’s playful Australian metaphysics (a rotary hoist mirroring the planetary cycles) is framed by ‘The Representation of Reality
              in Western Art’ (playfully interrogating Proust and Magritte) and ‘Steppe’ (a virtuoso poetic essay in tercets conjuring a universal figure
              in a landscape as an image for poetry’s sublime possibilities). These poems hold and play with the reader’s mind and imagination – telescopically
              and microscopically. One of Edgar’s persistent concerns is how poetry can see and know. Take ‘Morandi and the Hard Problem’ with which Edgar
              begins his third, and final, section in Exhibits: focussing on the objects, planes, arrangement and light in Morandi’s paintings, Edgar
              writes: Nothing’s more abstract than reality, These surfaces propped up against the day To hold the light. (p.50) This is the paradoxical
              heart of Edgar’s poems – a koan becoming a conceit. The ‘hard problem’ is what we might call the ‘sentience of objects’: ‘what process could
              endow / Mere matter with the power to wake and feel.’ (p.49) The poem plays ekphrastically with Morandi’s paintings, displacing the human
              viewer as the centre of perception in favour of the objects’ capacities … to see behind The facile complications of event … and view What
              lies below the shining incident. (p.49) The poet/perceiver is a product/victim of his experiences and watches the sun’s power to ‘[shift
              its] abstractions once again’. (p.50) Edgar’s poetry echoes Coleridge’s thinking styles, especially the Conversation Poems (on the Imagination
              and Pantheism). There are echoes of Coleridge’s phrasing (‘esemplastic’, ‘pictures / shine in those walls’ etc) time and time again in Exhibits
              and there are pervasive hints of Wordsworth’s ‘emotion recollected in tranquillity’ as well as the thinking and feeling of The Prelude.
              And we are held by the imagery, the cadences of the verse – this is poetry that persistently claims, implicates and apostrophises the reader.
              ‘The Trance’ begins with a dramatic, sustained conceit of a ‘gale kept feeding through the canopies / Like timber through a mill’ (p.21),
              becoming more like a conversation poem as it links this to a remembered childhood experience which is then framed ‘organically’ by the mother’s
              death. ‘Euroka’ too – camping near Glenbrook – repositions a Wordsworthian sense of place: … the trees Which reeve the boulders to the sky,
              the wide, Light-dusted river that’s about to stall, So slow its downstream glide: You’re spellbound by inaudibilities. (p.59) Edgar’s (Miltonic)
              scope and tones can be seen admirably in ‘The Angel of History’ for example, with which he begins his second group of poems. An extensive
              prefatory note (thankfully) directs us both to Walter Benjamin and Klee’s Angelus Novus so we can get the picture/references as we need.
              The poem opens with an epic sense of physical and spiritual stress: ‘agape’, ‘mingled fascination and alarm’, of being in the middle of
              an ‘impending’ and harmful dilemma: ‘He reaches out as he is forced away’ (p.25) – the iambics enforce the paradoxical weight of the problem.
              The angel sees all humanity’s particular and collective histories strewn out – achieved or botched, or incomplete – Along the road’s Unravelled
              pageant … Like Himalayas hurled before his feet. (p.25) – the scope of the simile is impressive. There is a sense (again, Miltonic) of the
              regret the angel might feel in surveying the scene but he is compelled, ‘swept’ (by the imminent problems in Paradise) to leave – his back
              to the future, facing the past, ‘his task and vice, / But to record, not to restore, the toll’ (p.25) – a kind of allegory, reprising the
              traditional debate articulated by (amongst others) Sir Phillip Sidney in his Apologie for Poetrie about the essential conservatism and limitations
              of history (in contrast to both philosophy and poetry). By contrast, the final poem in this section, ‘Pictures in the Water’ (is ‘this interlude
              and idyll’ a painting or a memory?) antiphonally focuses on a particular moment that might have been seen by the Angel of History. Reminiscent
              of Slessor’s yachts/harbour, the poem, echoing the preceding ‘Vantage Point’ and ‘Saccade’ (‘Its constant sense being constantly unmade’,
              p.43) proposes the frail significance of the micro against the inevitability of the macro. Edgar’s opening poem is the justly praised 2011
              Dorothy Porter Prize joint-winner ‘All Eyes’ – a clever, conceptually enthralling and linguistically transforming poem. The image of Saturn
              as a ‘ghostly Ferris wheel frozen in space’ is arresting enough but the subsequent lines ‘with all its shattered rings of icy lace / Exquisitely
              beyond repair’ (p.3) accrete and multiply understanding, giving what FR Leavis might have called a ‘felt’ seriousness. The brilliance of
              this poem is partly in positioning the reader with Saturn’s moon Titan, as a both close and distant perspective (the terms stretch to almost
              meaninglessness in a ‘felt’ sense) from which to (try to) contemplate what can’t actually be seen in deep space: Who knows what sown and
              pullulating planet Has come and gone, an ark of evidence Interminably circling where it cannot Be salvaged by the optic nerve? (p.3) Edgar’s
              resonant and charged adjectives in the first line above give way to a jostle between science and religion, resolved by a Miltonic sense
              of a lost paradise which cannot be physically perceived. This is a poem full of seeing (Saturn is juxtaposed with fossils found in shale/slime
              and sunflowers whose ‘yellow is the synonym for Look’) and brings the reader back to a fallible, challenged anthropocentrism (‘Was it for
              this the aeons fashioned us?’) displaced by a valuing of the intricacy of a ‘moth’s wing’ and ‘the fleck of matter in the nucleus’ which,
              in a dextrous twist, Edgar turns into a metaphysical compliment: ‘Your face which never fails / To show me what I cannot know’. (p.4) In
              ‘Moonlight Sculptures’ Edgar contemplates another Saturn, apostrophising his partner asleep in their stifling moonlit bed: she is exhibited
              as an object seen from different perspectives – disembodied and fractured ‘intermittent anaglyphs’ – so at times she is a ‘swathed mummy’
              or an avatar of Eve, or (affectionately and voyeuristically) ‘The world’s unspoken origin, / So openly depicted by Courbet’ (p.5). The poem
              becomes an aubade praising the different selves of his love, produced in a night of exhaustion for/by the moon, now eclipsed by its living
              creation. ‘Man in a Boat’ continues Edgar’s flickering essay on epistemology, focusing on the hyper-reality of the acclaimed Ron Mueck sculpture
              and, similarly to the Morandi poem, is concerned with the impermeability of the objectified (or painted) other. Edgar explores the defiance
              of art/image and the corresponding impotence of the beholder, an ongoing tension in Exhibits. The poem compels us to acknowledge the poet’s
              anxiety and recognition of his essential passivity – like the Angel of History, he can only record, not change, though perhaps, by another
              Coleridgean trope, the poet as Aeolian harp can hauntingly express what he imagines and constructs. ‘Paris’ too is about representation
              and its impossibilities – comprised of three quite separate stanza fragments, under Daniel Dennett’s whimsical epigraph ‘a film can be about
              Paris but Paris is not about anything’. Beginning with an exploration of Beraud’s Entrance to the Universal Exhibition, 1889 , Edgar’s images
              cascade through the lines to arrive at “…What’s it all about?” Come on. No Jokes. Don’t say: “It’s about to snow.” Don’t tell me it’s about
              three forty-five. (p.28) There is such pleasure in the playfulness of language and his own poetics. Stanza two recalls Kenneth Clark’s Civilisation
              lecture on Romanticism and Beethoven’s music: … outcrop of dark rock Juts minimally, intermittently From masses of sea swell … (p.29) The
              final stanza begins ‘Across a fissured butte in Arizona / A wingèd shadow glides’: another Angel of History (or ‘Haunted Pane’) – something
              presaging harm? In this instance Edgar’s agnostic optimism is modernist rather than Romantic. ‘The Transaction’ and ‘Clues’ focus particularly
              on the different (masculine and feminine) nuances in comprehending past encounters and relationships. In both poems, Edgar is pointing to
              barely noticeable signs of trauma ‘Like an infection floating on a cough / Or swimming on the lip gloss of a kiss’ (p.33). ‘They found in
              her their metamorphosis’ sounds like the two understandings correspond but ‘she’ is an anarchic signifier pointing to the inevitably irreconcilable
              versions/views. His memory is sexual: Still hidden like the blue tattoo Of a hummingbird that flutters underneath Her restless skirt. (p.33)
              Hers is of violation: ‘Knowing that rogue survives to gloat’. ‘The Transaction’ ends with a troublingly ambiguous image of masculinity.
              Almost as a comment, ‘Peony’ explores the difficulty/impossibility of making sense of memories (and perceptions) ‘You have no sense that
              they make sense’ but its final image is of the peony’s generative power: … in a garden bed More wounding than a work of art, The peony’s
              packed, swollen buds, which hold Whole galaxies of red And forces too immense to be controlled Wait quietly to tear the day apart. (p.42)
              Many of Edgar’s poems play with the ways words create, fracture, problematize and reposition perception. ‘Grand Canyon’ (p.61f) and ‘Cinéma
              Vérité’ (p.66f) play masterfully with perspective. The watcher is watched. The poet is an ‘Ibis trying to prise apart a tub / of salad’
              (p.66). And I must not forget the butterflies – eg. in ‘A Scene from Proust’ (also ‘Govett’s Leap’) – Edgar’s miniaturist and imagist subtleties
              propose (echoing Douglas Stewart?) a minute signifier which the ‘whole of history has unravelled’ (p.65). Like Fuyue Anzai’s famous one-line
              modernist poem (a haiku without the line breaks?), 1929: ‘A single butterfly passed over the Tartar Strait’, Edgar has managed to grasp
              the world in fists of words. Occasionally there are grandiloquent awkwardnesses such as ‘self-unfolding zone of plenitude’ and ‘thrumming
              potencies of un-ness’, both in ‘Exclusion Zone’ (p.51) but for the most part, these ‘exhibits’ are absorbing, subtle, beautifully crafted
              conversations. In the final poem, ‘Rembrandt with Seagulls’, the last lines celebrate stillness, beauty and the (Brennanesque? Slessorian?)
              eye of the beholder: Luminous and remote Under the strobe-lit passage of the day, The circling seagulls float Somewhere that you can only
              see from here. (p.69) Exhibits of the Sun is poetry of glittering fragments and multivalent complexity, its fissuring and layering conjured
              up and held by Edgar in his ‘artist’s isolating eye’. DAVID GILBEY is Adjunct Senior Lecturer in English at Charles Sturt University in
              Wagga Wagga, and President of Booranga Writers’ Centre . His most recent collection of poems is Pachinko Sunset (2016, Island Press). ."
        - title: Plumwood Mountain Review
          text:
              "Exhibits of the Sun Lucas Smith Plumwood Mountain Volume 3 Number 1, February 2016 A.D. Hope once applied the metaphor of ecological
              imbalance to the writing of poetry. Just as a sharp decline in one species will effect the others around it, Hope speculates that neglect
              of any of the great forms by the poets affects the practice of all the others. The introduction of a new literary form, if it becomes popular,
              may seriously upset the whole traditional balance of literature. Moreover changes in social structure, in education or in belief, outside
              the field of literature, may destroy this balance in such a way that certain traditional forms fail to command respect and cease to be practised.
              This, in turn, weakens the respect for others, for the different forms support one another. One after another the great forms disappear;
              the remaining forms proliferate and hypertrophy and display increasing eccentricity and lack of control. A general erosion of the mind proceeds
              with more and more acceleration. A desert ecology replaces the ecology of the rain forest. The forms are few, small, hardy, and reflect
              the impoverished soil in which they grow. If the process goes a little further a point of no return is reached; sand, clay and naked rock
              present a lifeless and inhuman landscape where only minimal forms of life persist. (Hope 2002 [1974], 1–2) Stephen Edgar, then, as perhaps
              the only Australian poet to write only in fixed forms, is a conservationist (though certainly not a conservative). His decades-long commitment
              to rhyme and metre puts his work at odds with much of contemporary poetry. Exhibits of the Sun , Edgar’s tenth collection, contains fluid
              and musical verse that demands to be read aloud, which Edgar himself does well. Edgar creates his own forms, and sticks to them. In “The
              Trance”, a typical Edgar stanza unfolds. Without surprise, The sun displays its gorgeous jewellery Across the spread Of harbour, as it heartlessly
              arranges Over the bluffs and bays of Middle Head The silken trance it’s spun and shed. Edgar’s poems provide what so few, free verse, concrete
              and language poems provide: aural pleasure. Lacking the aridity of Philip Larkin and the stilted syllable counting of some noteworthy Australian
              formalists such as James McAuley and Hope, Edgar is warmer in his thinking and gentler with his cadence. Though at times this looseness
              leads to extra labour for the reader. Try to work out what’s going on in the opening of “Saccade”: They have no sense of what they’re looking
              at, Unless the object moves. (Or so he’s read; who knows if that’s the case?) A painted bird’s an empty analogue To the oblivious cat. And
              it is not his still familiar face So much as that distinctive gait which proves The master to the dog, Who frolics for him like an acrobat.
              Poetry doesn’t have to be easy, of course, but this is heavy going. By the time you look up the definition of “saccade”(a small, rapid jerky
              movement of the eye, according to Merriam-Webster) and wade through the poem picking up and examining the nouns and articles a few times,
              you’ve lost interest. But when Edgar straightens out his syntax the results can be breathtaking, as in “Morandi and the Hard Problem”. Edgar
              pins the central mystery down, using the awkward bottles from Giorgio Morandi’s famous still-lifes as his springboard. How could such simple
              objects know so much? This web of everything that is the case Is nothing, we are told, but matter, Dissolving ever downward from the clutch
              Of common sense to scatter Among the primal mesh of time and space While round their tables the philosophers Knock heads and strike the
              board to break the seal That locks their own hard problem: how A subject that can know itself occurs, What process could endow Mere matter
              with the power to wake and feel. There is perhaps no way to finish off a thought such as this without getting devotional or nihilistic,
              and Edgar cannot be faulted for not sticking the ending. “Nothing’s more abstract than reality” and “What do I know but my experience?”
              What indeed? Pure subjectivity is the modern malaise. From our cognitive prisons we are able to question even the existence of others and
              if they really deserve to be considered. God can square this circle quite well, if we let God, and if human beings are just matter, where
              does poetry find its resonance? In “Let Me Forget” Edgar juxtaposes a contented suburban man’s life with the stranger being tortured to
              death by his criminal next-door neighbour. It is facile to draw a lesson from the mere proximity of evil, as Edgar tries to do. Evil occurs
              everywhere and at all times. The professional in the poem has no idea what is happening. The sentiment of the poem is saved by the second-to-last
              stanza: Behind that door, past comprehension, Beyond imagining, the universe; The laws upon Whose unknown code the selves that you rehearse
              From day to day are based; oblivion In the absence of transcendence, Edgar can only purvey oblivion, which is of course, where everything
              under the sun ends up. Edgar’s stock in trade is ineffables. He writes like a Buddhist Tennyson, agonisingly aware of the folly of all action
              and the transience of all things, yet compelled to shout its beauty to the skies in the strongest rhythmic language he can find. When humans
              kill God, we must attach God’s agency to something. Edgar, like many others, grants it to nature: Almost as though the sky Were sentient
              and desperate to persuade The town’s pre-occupied inhabitants To pause and lift an eye … And a moon perhaps? A far And saffron-flushed exhibit
              of the sun Balanced on that outstretched and weightless power, A swirling upright spar Of cloud, like an ornate Islamic tower, Is capped
              with the crescent moon and one faint star. The show is over that was overdone. You lift your dropping jaw. Such an extravaganza staged above.
              So much superfluous effort to impress. Whatever sky you saw, However swept and bare, would do no less, And its clear depths of night would
              overawe Your sense and call up something much like love The pillowy nihilism of Exhibits of the Sun is in the end defeated by the beauty
              of Edgar’s forms and rhythms. And that might be the most important purpose of poetry. In that moment of creation no poet can be a true nihilist
              and if the work is resonant enough, neither can the reader. Edgar has been reviewed extensively and I won’t stray from the consensus. He
              is a master at what he does. We tend to think of nature as a chaotic realm, separate, as far as we can make it, from human order. The wind
              blows where it wants to blow and the rain falls where it wants to fall. Much eco-poetry seems to try to mimic that alleged chaos, with free
              forms, words scattered across the page like hailstones, and enjambment like a flash flood. But nature, too, has its fixed forms. Similar
              latitudes all over the world have similar climates; different species of animals from different continents fill similar ecological niches.
              Adaptive radiation divides a single species into many. Edgar proves that formalism is evolutionarily viable. When read singly in magazines
              Edgar’s poems punch through the desperate wordplay and strained significance that characterises so much contemporary poetry. When read in
              a book alongside so many others, the effect of each individual poem is diminished. Though formal, Edgar’s poems lack the compulsive memorability
              of some formal poetry. It is hard to avoid memorising, say, Edna St. Vincent Millay’s lyrics. Edgar foregoes the primary use of meter and
              rhyme, as a mnemonic device. What sticks is the atmosphere and the lyrical focus Edgar brings to his subjects. One feels that Edgar could
              make anything into a poem if he perceived it slowly enough, and for once that seems like something to hope for. Humans underestimate nature’s
              resilience at our peril. The time-worn rhythms of formal English poetry have a way of sneaking in through the back door. The American formalist
              poet Dana Gioa has delightfully pointed out that William Carlos William’s famous harbinger of literary modernism, “The Red Wheelbarrow”,
              is actually two lines of perfect blank, not free verse. Not that there needs to be conflict between formal and radical (and all modes in
              between). All are welcome to the fruits of tradition and the hybrid vigour of selective breeding programs. As Czeslaw Milosz wrote, rhyme
              and meter “can … be used like ice, to freeze decaying meat” (1981, 190). Yet, at a time when so much verse reads like cut-up prose, we can
              hope the leaves that fall from Edgar’s trees will prepare the ground for lusher forests. References Hope, A. D. (2002) “The Discursive Mode:
              Reflections on the Ecology of Poetry”, in Essays on Poetry . Sydney: University of Sydney Library (Second edition; Sydney: Sydney University
              Press, 1974) http://setis.library.usyd.edu.au/oztexts Milosz, C. (1981) “The Publican”, in Native Realm: A Search for Self-Definition ,
              translated by C. S. Leach. Berkeley: University of California Press. Lucas Smith is a writer from Orange County, California and Gippsland,
              Victoria. He has published poems in Cordite , and fiction and non-fiction in Voiceworks and The Lifted Brow , among others."
        - title: Southerly Review
          text:
              "Mansions on Parnassus Vivian Smith Southerly, Vol. 75, No. 1, 2015 “Parnassus has many mansions” —W.H. Auden Poets owe so much to the
              small private presses and independent publishers who first take on their work and distribute it. Three of the major volumes of modern Australian
              poetry, Kenneth Slessor’s Five Bells: XX Poems (1939), Judith Wright’s The Moving Image (1946) and A.D. Hope’s The Wandering Islands (1955)
              first appeared from small presses in limited editions, and even Robert FitzGerald and James McAuley, published by Melbourne University Press
              in the 1940s, appeared in editions with small print runs. Later Douglas Stewart, as a senior editor at Angus & Robertson, brought out the
              first series of contemporary hardback Collecteds and inaugurated the paperback Modern Australian Poetry classics. Poetry publishing has
              never been quite the same since the demise of A&R, which went back such a long way in Australian writing. Fortunately a new generation of
              enterprising publishers and a whole line of even smaller private presses have moved in to fill the breach. Publishers like Giramondo Publishing,
              Puncher & Wattmann, Vagabond Press, Walleah Press, and Brandl & Schlesinger continue to release poetry along with novels and other literary
              studies. Younger publishers like Black Pepper Publishing are devoted almost exclusively to poetry, and Pitt Street Poetry and Grand Parade
              Poets have made a very welcome appearance over the last twelve months or so. All this reminds us just how necessary small publishers are
              to the health of our poetic culture... I first noticed Stephen Edgar’s poems in the 1980s and started including them in journals and anthologies
              I was associated with at the time. Later I had the pleasure of launching his book Lost in the Foreground at the Tasmanian-International
              Festival of the Arts in 2003. From the first I was struck by his technical skill, keen powers of observation and remarkable intellectual
              range. Here were music, structure, intelligence and a poet who knew how to look and listen and how to transmit those experiences through
              words. Edgar belongs to that line of robust poets like A.D. Hope, Peter Porter, Clive James and Jamie Grant for whom poetry is both a craft
              and a trade, as well as being a vehicle for personal experience and vision. They are all traditionalists or formalists who follow the broad
              highway or the main stream of English poetry; Edgar has immediate affinities with American poets like Richard Wilbur and Anthony Hecht.
              There is no poetic form not explored in his work from terza rima to blank verse, from sestinas and Spenserian stanzas, to sonnets and odes.
              Technical skill, variety of verse forms, intricate patterning are hallmarks of all of his collections. He is as well a poet of impressive
              intellectual range and erudition. He engages with Walter Benjamin and Oswald Spengler, astronomy, neuroscience, optics, mathematics and
              physics and his poems stretch across the world from South America to Africa, from central Europe to Ancient Egypt, from Ireland to Hobart.
              And there is in his best work a sense of color and a controlled exuberance which is all his own. Too garish to ignore, The city is a painting
              by A child, in thrall to purple, who wants more Than more can satisfy. Edgar is an accomplished wielder of elaboration and delay. It is
              a feature of his work impossible to illustrate in a short review, but it gives some of his poems an almost baroque splendor. Earlier poems
              lik ‘Silk Screen’ and ‘Dr Rogers’ Report’ show his relaxed mastery, and it can be found in a number of poems here like ‘Daylight Music,’
              ‘The Trance,’ ‘Off the Chart,’ ‘All Eyes’ and ‘Moonlight Sculptures’. This last poem has to be compared with A.D. Hope’s ‘The Double Looking
              Glass,’ but where Hope’s poem suggests Titian, Edgar’s poem directs our gaze to Courbet’s famous L’origine du monde . There is nothing else
              like them in Australian poetry for their depiction of the female body. Many years ago A.D. Hope published an important essay on John Dryden’s
              ode to Anne Killigrew, subtitled “the art of modulating in poetry”. It came back to me again as I was reading Edgar’s new book where the
              art of modulating is so brilliantly displayed."
        - title: Angle Review
          text:
              "Exhibits of the Sun Philip Quinlan Angle —Journal of Poetry in English—Spring/Summer 2015, Issue 7 I never attend poetry readings.
              These days, I don’t go to rock concerts either. The reason, I believe, is the same in each case. You know how it is... the version of the
              song you want to hear is the one on the album, the one you grew to love over many repeat playings, whereas the band almost always wants
              to mix things up, offer a new take, or generally ‘big it up’ performance-wise. Unless, that is, they go in the other direction and choose
              to pare it all down and give you the unplugged version. By what right, I ask, do they tamper with something that belongs to me? There is
              a school of thought which says poetry ought to be performed. After all , goes the usual argument, poetry was an oral medium long before
              it became a literary one . Well, yes. And music existed long before it was written down, too. I don’t disagree in principle, but in practice
              it is rarely done well. Put a poet in a room full of listeners and, as with live rock music, what usually happens is one of two things:
              He or she turns the vocal (and often gestural) amplifier up to 11, as if that in itself will serve to energise what is inherently flaccid
              and lacklustre, or; He or she adopts a flat, offhand, monotone, understated (almost apologetic) style. In both cases, a painful distortion
              (though different in kind) kicks in. In the first case, it often seems as if a kind of music is being layered on as an afterthought. In
              the second case, I get the feeling that any sense of lilt or cadence, any musicality, is being deliberately dumbed down in the triply-mistaken
              belief that the language will thereby sound more like natural speech, because natural speech is not musical, and a poem should sound like
              natural speech. I dismiss all three claims out of hand. All speech is musical, the music arising naturally from the sound of the words (albeit
              with geographical and/or cultural variations). The music of poetry (that poetry which actually has any music) is different to the music
              of natural speech to the extent that the language of poetry is different to everyday language (as I think it is and should be). When I read
              a poem, I read it aloud in the head. I can’t get a poem unless I can hear its sound. And I can’t be doing with either a poem which sounds
              like it is trying hard not to be one, or a poem in which sound is discordant with sense. Most of all, I want that sound to be the sound
              of someone speaking to me , rather than a room full of people, even if not in quite the same way as the man next to me in the bus queue
              might speak to me. Which brings me, at last, to Stephen Edgar. Fortunately, I allowed for exceptions in what I said above about poetry in
              performance, because Stephen Edgar is a notable exception. Not that I have heard him read publicly, but I am very familiar with his recorded
              readings, and there is nothing like a well-made recording to capture that sense of being spoken to individually. There is certainly an engaging
              sense of intimacy about Edgar’s recordings. More than that, the sound he makes when reading his work is exactly the sound I hear when I
              read it aloud in my head, with only the slightest additional music arising naturally from his Australian accent (that accent, typically,
              being inherently more dynamic in stress and pitch cadence than say UK English). Other than that, the music is all in the words, which have
              clearly been chosen with the utmost care even if the result looks in no way forced. Before venturing further, at this point you might usefully
              pay a visit to Stephen Edgar’s excellent website http://stephenedgar.com.au/ whereat you will find several poems and readings, including
              four from this collection. The typical Edgar poem uses metre and rhyme, but subtly. A combination of long sentences, heterometric lines,
              skilful enjambment, and non-obvious rhyme schemes lends his poems on the one hand a certain naturalness, but on the other hand imbues them
              with a sophisticated music which requires only that the words be spoken, rather than performed. Consider this, the last stanza of the opening
              poem of the collection, ‘All Eyes’: Was it for this the aeons fashioned us? To look and make it so? The moth wing’s intricately subtle scales,
              The fleck of matter in the nucleus As light as light, your face which never fails To show me what I cannot know. This kind of precise (but
              not precious) diction is one hallmark of an Edgar poem. A key word in this stanza is ‘scales’, because another hallmark, demonstrated here,
              is the juxtaposition of observations of the incomprehensibly large with those of the almost equally incomprehensibly small. The overall
              effect is of looking at the whole universe through a microscope. But his subject is, more often than not, humanity (whose scale—as Michael
              Frayn observed, if not uniquely, in The Human Touch —lies about halfway between the two extremes), and no matter what excursions he may
              take us on, it is almost always the human scale that he leaves us with. Here is another example, from ‘Vantage Point’, a sonnet which I
              quote in full because it defies editing: As onto some still largely unexplored And fictional Pacific too immense To be exhausted by desire,
              or sense, Or all the histories history may record, They wake and look. In every day is stored More time than their most prodigal expense
              Can spend. All space is theirs, and its events Are their incentive, venture and reward: A living map—all folded up and rolled So tightly
              it might not be there, like those Impossible dimensions which, we’re told, In some past shudder of the cosmos froze To flecks the ghostly
              flecks of matter hold, And orders of dark magnitude enclose. Characteristically, the language is fluid and uninterrupted, which is what
              makes it uneditable. You don’t find many sharp edges or corners in an Edgar poem; the world he presents is a voluptuous and curvaceous one,
              intelligently and benignly observed. And there is a great difference between benign intelligence and knowing wit; there is urbanity here,
              but not taken to excess (as is sometimes the case with Edgar’s fellow countrymen Clive James and Peter Porter). Incidentally, it is well
              known that Clive James is a great admirer of Stephen Edgar’s work, and he has remarked in particular on Edgar’s ,unmatched ability to make
              science a living subject for lyrical verse’ [ The Chimaera , February 2009]; the above poem, for instance, references Superstring Theory
              (search for `Kaluza-Klein Compactification’ if you don’t believe me), and no doubt the vantage point of the title is that occupied by the
              sexiest (?!) scientists of all: particle physicists. Given the title of the collection, and possibly those legendarily vast Australian skies,
              it is no surprise that many of Edgar’s poems are also deliciously lit, often with the light and colour of dawn or dusk (one cannot forget
              ‘Giotto’s dream of indigo’ in his most famous poem, ‘Man on the Moon’, from the earlier collection Other Summers ). Now, poets and painters
              have been entranced by light for so long you would think there was no new way of saying so left, but you would be wrong. If you care to
              turn to Angle issue 4 you will find a poem from this collection, ‘Order of Service’, which contains a couple of nice counter¬examples, as
              well as ‘Scatter Pattern’, which is not included here but which exemplifies the juxtaposition of extremes of scale I mentioned above. But
              what about this for a delightful eye (and ear) on light?—culled from ‘Daylight Music’: And here Sibelius’ Symphony Number Seven, Playing
              unheard while my displaced attention Was pausing to daydream, Superimposes on the light of heaven The trombone theme Of its first climax,
              soaring in suspension As though the music were that beam, A column of illuminated sound Advancing through the day. I close my eyes And hear
              its movement, scored From that torn fissure which the clouds surround, In time toward The sun’s conclusion, hear it synchronize The silvered
              river chord by chord. Not only delight ful , but delight ed , I would contend. Stephen Edgar clearly delights in the physical world—which
              he interprets as art (hence, I presume, the ‘exhibits’ of the collection’s title)—while simultaneously reminding us that it is only by the
              agency of light, and our life-giving sun, that we are able to appreciate the scale and grandeur of the universe we find ourselves in. I
              often imagine the oppressive sense of claustrophobia which the loss of sight would mean for me and conclude that, if the worst came to the
              worst, I could more easily contend with the loss of music and speech. I was once sent a series of stunning landscape photographs by a friend,
              along with the simple message: ‘When God paints...’ Many of these poems have that same reverence, if without the religious connotation.
              Scale, of course, can be temporal as well as spatial, and in ‘Steppe’ the vast emptiness of the landscape is magnified by the smallness
              of a lone woman who stands at the centre ‘which, simply by being there, she constitutes’ as the sun completes its diurnal journey, the temporal
              scale being magnified by her stillness. Her only action in the poem is to blow a single bubble at noon, which ‘Hangs faintly on the superscripted
              air’. The fact that nothing other than this happens intensifies the narrator’s gaze, and therefore the reader’s. The woman becomes for me,
              symbolically, what physicists call a (the primordial?) singularity, and the bubble could easily be the inflationary universe which emanated
              from it (although I’m thankful that, if so, that idea isn’t explicitly worked out in the poem, because that would kill it); but if I am
              right, then the adjective ‘superseripted’ nicely conflates the idea of meticulous (God-like? or deterministic?) planning with the equations
              of the laws of physics. As direct as Edgar’s observations are on the ‘art’ of the physical world, his observations on art per se can be
              somewhat more oblique. In ‘The Representation of Reality in Western Art’ the narrator is prompted by Proust to wander (as I read it) through
              the halls of memory and find a painting by Magritte, to the accompaniment of a soundtrack by Fauré. Much more than this I dare not say,
              but only for fear of exposing my own ignorance! Suffice it to say that the poet seems as much interested in the nature of art as in the
              art of nature. The sonnet, ‘Man in a Boat, after a sculpture by Ron Mueck ’, is, however, more plainly ekphrastic, even if it achieves a
              pleasing level of abstraction: And as you tour his stillness to disprove A fancy that you think you never meant, Head cocked, brow raised,
              he’ll nakedly persist In staring past your questionable intent, Until you wonder where the power to move May lie, or the conviction to exist.
              ‘Sculptures by the Sea’ is again a fairly straightforward observation on the al fresco art on show at the annual Sydney exhibition of (almost,
              barring the plural) the same name, whereas in ‘Moonlight Sculptures’ Edgar (or the narrator, at least) is celebrating the sculpture of,
              one must suppose, his sleeping partner: We slide across a moon-slicked sheet. And all the intermittent anaglyphs Of you the moon is working
              to Complete, I see each time I wake and view Your light-shaped body as it stirs and shifts. So here we are at the human scale from start
              to end, but to return to that juxtaposition of extremes of scale again, in ‘Off the Chart’ Edgar manages, in the course of four stanzas
              (with a one-line coda), to navigate unerringly between the motion of a clothes hoist and that of ‘The planets and the star-slung zodiac’
              as if there were a causal relation in play. And one finds those two scales (spatial and temporal) yet again, in ‘Oswald Spengler Watches
              the Sunset’: An animulcule in a drop of dew— And so diminutive That if the human eye should look clear through That globe there would be
              nothing there to see— Although it only has a blink to live, Yet in the face of this is free; The oak, in whose vast foliage this dot Hangs
              from a single leaf, is not. As unique as Edgar’s voice is, there is something distinctly Eliotian in the rhythms and cadences (not less
              the observations) of ‘Song Without Words’: Light of the nursery invades The morning ward and its uncoloured walls, And like a white sheet
              on his adult brain Settles opaquely where it falls, And will remain All day, as day assembles and degrades. A television drones. A phone
              Is ringing. Indistinctly voices drift From further off: two nurses at the end Of their interminable shift Laugh and descend, A walking inventory
              of what is known. The final poem of the collection, ‘Rembrandt with Seagulls’, is the contemplation of a present scene (unromantically including
              distant seagulls circling above a waste disposal site, or ‘the dump’) which gently segues into a contemplation of Rembrandt’s ‘The Stone
              Bridge’. The last passage brings us expertly in to a suitably soft landing: How is it that those trees, Holding that shaft of sun, can still
              be there, As though the centuries Could not get over such an episode, As though that place and moment could appear So piercingly only from
              far away. Luminous and remote Under the strobe-lit passage of the day, The circling seagulls float Somewhere that you can only see from
              here. To summarise—as I suppose, in time-honoured fashion, I must—Stephen Edgar’s is the poetry of vision, both literally and metaphorically,
              and there is an unhurried, ruminative mood throughout this and much of his previous work which is well-served by his perfectly-paced and
              lightly-inflected reading style which, once heard, most readers will internalise, as I have. His poems in some cases had small beginnings,
              as the brief notes to the collection attest, but more often than not he allows space and time for them to develop into a larger statement
              (eschewing, in the process, the device of poetical compression) so that the resulting vision is, to use an expression I have used before,
              as a landscape seen through a keyhole. And poetry, surely, is as much a way of seeing as a way of saying. But, and it is only a very small
              but, the very uniformity of mood and method which unifies this collection also meant that I felt compelled to read it in installments rather
              than at a sitting. One can only appreciate so many landscapes in a gallery before wanting to rest the eye on a portrait, a still life, or
              even an abstract. What matters in the end, though, is that it is the kind of book that, having once put it down, one feels compelled to
              pick up time and again. Stephen Edgar has acknowledged himself that the greater part of the audience for poetry these days comprises other
              poets, in which case the majority of the audience for Exhibits of the Sun will find themselves paying him the highest compliment one poet
              can pay another: I wish I’d written that . Yes, and made it look so easy too. Philip Quinlan is a UK poet and editor"
        - title: Sydney Morning Herald Review
          text:
              "Exhibits of the Sun Geoff Page Sydney Morning Herald , 26 September 2014 Exhibits of the Sun , Stephen Edgar’s tenth collection, is
              well named. Like most of its recent predecessors, the book is concerned with the visual and with the significance of an individual viewpoint
              in both space and time. Its syntax again is leisurely, as if to encompass effortlessly the complex rhyming patterns used. The poems’ narrator
              is almost always a dispassionate onlooker, inclined to see things on a variety of levels—from the microscopic to the cosmic. Often he ponders
              the connection between the two. The emotions involved, however, are inclined to be abstract. The second poem in the book, ‘ Moonlight Sculptures
              ’ , is both a love poem and a good example of this tendency. Its distinctive tone is well caught in the second stanza: “We slide apart across
              a moon-slicked sheet. / And all the intermittent anaglyphs / Of you the moon is working up to / Complete, / I see each time I wake and view
              / Your light-shaped body as it stirs and shifts.” It’s a characteristic stanza. The speaker is looking but not acting. The imagery is visually
              arresting (“moon-slicked”, “light-shaped body” etc). The sentence structure is complex. There is an unusual word (“anaglyphs”). The lines
              are of various lengths, and repeated thus in successive stanzas. There is the music of alliteration (“slide”, “slicked” and “sheets” in
              just one line). The whole stanza is highly accomplished technically but strangely subdued when seen as a love poem. In successive collections,
              Edgar normally has had a number of poems that are highly energised emotionally, or morally, and it is these that the dedicated Edgar reader
              learns to look out for. In previous books they have included the sequences ‘ Consume My Heart Away ’ ( Other Summers ) and ‘ Those Hours
              Which Grew to Be Years ’ ( History of the Day ). In Exhibits of the Sun the closest poems to these highpoints are probably ‘Continuous Screening’
              and ‘Pictures in the Water’, both of them extremely poignant. The latter of the two evokes an almost mystical moment (“an interlude and
              idyll”) between two lovers in a rowing boat on Sydney Harbour just before World War II. The tone Edgar establishes towards the end of this
              poem is indicative of him at his best—and a telling note to finish on. “No other day but this. But the vault of sky / Repeated in the water
              / Is being shattered by the oars they ply. / Their wedding and the day he went away, / His flights above the fire and slaughter, / From
              which he came with all his life to pay, / Their years, which would belie // What they’d imagined for each other’s sake, / And then her years
              alone...”"
        - title: The Australian Richard King Review
          text:
              "Slow down for a lyrical guided tour of life Richard King Weekend Australian , 20-21 September 2014 TO say that the pace of modern life
              is unconducive to lyric poetry is not so much to flirt with cliche as to drop your keys down cliche’s blouse and insist on retrieving them.
              It’s also undeniable. Assailed from all sides by trivia, we’ve lost the habit of the sustained contemplation needed to engage with this
              most challenging of art forms; so many are the demands on our attention that attention itself has atrophied. Nor is it only social media
              and click-bait junkies who are at issue here. In an interview in 2006, the unashamedly highbrow Martin Amis admitted to feeling increasingly
              rushed, so much so that poetry had been pushed to one side: “When you’re reading your New York Review of Books, some piece about North Korea
              or the Middle East, and there’s a poem in the middle of it, you think, What is that doing there?’’ What it’s doing, of course, is what it’s
              always done: it’s imploring us to slow down — to sit down — and to study this epiphany, to ‘‘take time out’’, to compare emotional notes.
              This is what good poems do, or one of the principal things they do. They attempt, in the words of Louise MacNeice, to ‘‘cage the minute’’
              — to stop the clock. Little machines for remembering themselves, they give the reader the (illusory) sense that he has been granted a temporary
              stay against eternity. In his magnificent new collection Exhibits of the Sun , Sydney-based poet Stephen Edgar attempts, at once, to demonstrate
              and interrogate this crucial role. Casting his eyes over such ‘‘exhibits’’ as one finds in museums and galleries — still lifes, sculptures,
              stuffed animals and the like — he extends and expands the idea of the exhibit to include a whole range of phenomena. 'All Eyes' implores
              the reader to ‘‘Look, look’’ and describes the moment at which the Huygens spacecraft first glimpsed ‘‘the ghostly Ferris wheel’’ of Saturn,
              with its ‘‘shattered rings of icy lace / Exquisitely beyond repair’’. Or take the beautiful 'Moonlight Sculptures', in which a naked female
              body is ‘‘set’’ in a series of transitory attitudes: Now you lie flat, but twisted to the side, One sheet a failing neckline, and I watch
              The contour of your clavicles Divide The shadow, and the shade that pools Between them in the suprasternal notch. Here, a mere second or
              so of movement is carefully, lovingly, reconstructed. (As in five of the other six stanzas, the fourth line is given over to a single verb.)
              The moment has been arrested, frozen. In the middle section of this collection, the mood appears to darken slightly. Two poems, 'The Peony'
              and 'Song without Words', dwell moodily on disease and death, while 'The Angel of History' recalls the reader to the inexorable and
              harrowing nature of time. An adaptation of Walter Benjamin’s ninth thesis on the Philosophy of History, the poem describes Paul Klee’s artwork
              Angelus Novus as he is blown on a storm ‘‘out of Paradise’’ towards a future he cannot see. What he can see is the sum of human ‘‘progress’’:
              His face is to the past. And all those brief, ambitious episodes Strewn out — achieved, or botched, or incomplete — Along the road’s Unravelled
              pageant that we both project And roam through, are to him one vast Impacted havoc which the years accrete And slowly heave up, fused and
              wrecked, Like Himalayas hurled before his feet. How, then, to reconcile the unforgiving nature of time with the poet’s ambition to slow
              it down, to reclaim the moment for contemplation? It would be overstating it to say that the third and final section of the book provides
              an answer to this question, but it does strike a more affirmative note. In 'Morandi and the Hard Problem', for example, the great painter
              is commended for trying to ‘‘see behind / The facile complications of event’’ by rearranging (and repainting) the pots and bottles that
              were his principal subject. Or here is the wonderful final stanza of Oswald Spengler Watches the Sunset: An animalcule in a drop of dew
              — And so diminutive That if the human eye should look clear through That globe there would be nothing there to see — Although it only has
              a blink to live, Yet in the face of this is free; The oak, in whose vast foliage this dot Hangs from a single leaf, is not. Closely based
              on Spengler’s introduction to Volume II of The Decline of the Wes t, these lines suggest that animal life (one couldn’t say consciousness)
              is its own reward, that despite having only a ‘‘blink to live’’, the microscopic animalcule is free in a way that the oak tree is not. Here,
              and in 'The House of Time', the poet would appear to be reaching for something beyond the purely material world. At any rate, these later
              poems have a spiritual and philosophical intensity that I hope will repay successive readings. One thing is certain: there will be successive
              readings. Exhibits of the Sun is an exquisite book. It does not demand our attention but it does reward it. Richard King is a Perth-based
              writer and critic."
        - title: Sydney Review of Books
          text:
              "Sunflowers of a kind Peter Goldsworthy Sydney Review of Books , 28 November 2014 As with an ear for music, an ear for the rhymes and
              rhythms of language is hardwired into the human brain; the deeper structures of poetry, in other words, are inscribed in our DNA. Like music,
              their evolutionary purpose is, in part, mnemonic: to help us to remember the knowledge of the tribe in pre-literate times. Hence we remember
              every nursery rhyme we ever heard. Hence, the lyrics of every second song. Hence, a hard-to-forget stanza like this, in an earlier, justly
              celebrated poem of Stephen Edgar’s: Hardly a star as yet. And then that frail Sliver of moon like a thin peel of soap Gouged by a nail,
              or the paring of a nail: Slender enough repository of hope. Nail-clipping moon metaphors are a dime a dozen in literature, but what a rejuvenation
              this is: imagism with a Robert Gray or Galway Kinnell quality of freshness. Or re freshment. And with style nicely fused with substance:
              a formal pentameter and abab rhyme sings subtly beneath the images. No surprises there: although Edgar is a superb imagist, it is not through
              that particular poetic ‘ism’ that he has made his name: he is known first and foremost as a formalist. There are few as accomplished in
              the English-speaking world, or with as large a command of forms. He can turn the music on and off at will: beat it like a drum; allow it
              to whisper sotto voce ; or loosen the shackles into easy-flowing, conversational blank verse. Even when using a standard form – a sonnet,
              say – he is seldom predictable. He especially likes to invent his own end-rhyme schemes. One favourite trick is to rhyme the last lines
              of his preferred six- or seven-line stanzas (sestets or septets) with, say, the second line – an end-rhyme so delayed that it is a half-forgotten
              echo. Auden pioneered this kind of musical suspense in early poems, such as the famous ‘Lullaby’; Edgar stretches our rhyme attention span
              even further. Which is not to say he isn’t perfectly capable of finishing things off with the clashed cymbals of a rhyming couplet: The
              sun displays its gorgeous jewellery Across the spread Of harbour, as it heartlessly arranges Over the bluffs and bays of Middle Head The
              silken trance it’s spun and shed. Edgar wears his influences plainly: Auden, yes, and Larkin, Frost and Hardy, with the towering figure
              of John Donne whispering to us over their heads from several centuries before. Donne’s influence is seen not just in the form of the poems,
              but also in their content. Edgar’s Metaphysical streak jumps out from the first page of his latest book Exhibits of the Sun . ‘All Eyes’
              begins at the rim of the solar system, seen through the proxy eyes of the Voyager probe: Look, look, it says, and peels away the night As
              it flies on. And there, A ghostly Ferris wheel frozen in space, Saturn comes looming at the satellite With all its shattered rings of icy
              lace Exquisitely beyond repair. The regularly varying line-lengths of this poem’s sestets owe something to Donne’s spirit of formal experiment,
              but its evolving argument owes even more to the Metaphysical conceits of Donne’s love poetry. After speculating what might lie further out
              in space, Edgar reverses his telescope, pulling the focus sharply back in, via a joke at the expense of William Blake, and ending in a final
              knight’s-move, or perhaps a warp-jump, to a lover’s face: The fossil in the paginated book Of shale that once was slime Falls open and cries,
              Look! And these sunflowers – Their yellow is the synonym for Look, Though they’ve no word for weary or the hours The sun has summoned them
              to climb. Was it for this the aeons fashioned us? To look and make it so? The moth wing’s intricately subtle scales, The fleck of matter
              in the nucleus, As light as light, your face which never fails To show me what I can never know. Sexual love is more central in the second
              poem in the book, ‘Moonlit sculptures’, which is also written in sestets, and with the same personalised rhyme scheme – abcacb – but with
              the variation of a two syllable-length breather, like a musical fermata, in the fourth line of every stanza. Too hot and humid to do more
              than drowse And slip – who knows how brief the interims? – Into a chafed consciousness, And rouse; Too clammy for the slur and press Of
              fabric or each other on our limbs … All night the poet watches his lover turn and thrash through various sleeping positions and stanzas
              (sextets might be the better term than sestets, given their sensuality) until: Morning approaches and the moon is swamped With day. All
              of those figures, though, survive In you, it’s you that they comprise, And prompt Your mind to waken, and your eyes, And you to turn, now
              sunlit and alive. No pining away with desire for this little sunflower. Edgar’s meditations can spring from love, or from the natural world,
              but they can equally spring from art or cinema or literature: Henry James’ The Turn of the Screw in the next poem; Proust in two superb
              later poems. The first of these, ‘The Representation of Reality in Western Art’, qualifies as a typical Metaphysical conceit as the poet,
              reading Proust in a library, decides to step into the book as a character: After reading Chapter Two of The Guermantes Way He thought ‘Why
              Not?’ and wandered in himself To that immense hall which the drawing room Gave access to. The progress of the day could now resume And someone
              cleared the book from where it lay And put it back in order on the shelf. Meanwhile he casually sauntered through The hall, surprised by
              his command of French … And by his new French friends, until our time traveller finds himself standing before a framed streetscape by Magritte,
              and steps out of frame again. Having come full-circle, he is now back in the library before he had opened Guermantes Way to begin with:
              So browsing for a book He paused and thought ‘Why Not Give Proust a try?’ And sat and opened it and stretched his toes. And presumably steps
              back into the book, searching for lost time ad infinitum . My advice? Open a book by Borges next. * Unlike Blake’s sunflower, Edgar is never
              weary of time. In fact, he is a little obsessed by it. As he is by space. And consciousness. And light. And love. And landscape. But time,
              ‘the fifth element’, ticks along beneath all his work, present both in its rhythms and its ideas. In some parallel world, Edgar is probably
              a physicist, writing equally formal and beautiful equations. On our slow-ticking, sunlit world his algebra is rhyme-schemes, and the solution
              he found for the Proust poem is abcdcab, with that apparently lost and isolated ‘d’ (‘to’ at the end of the half-line in the first stanza)
              finding a delayed echo in the first line of the next stanza: ‘through’. Edgar uses seven-lined stanzas more than any other poet since the
              Middle Ages – but unlike, say, Chaucer, he runs endless musical variations on the basic template. Chaucer’s standard Royal Rhyme has seven-lines
              of regular iambic pentameter in ababbcc . Edgar is having none of that; he is having anything but that. The nerd-taxonomist in me wants
              to classify his Mozartian profusion: let’s call this a K.7(a). The next poem in Exhibits of the Sun , ‘Off the Chart’, also in septets,
              runs abcbcab . K.7(b)? From a meditation on Proust and time, we now meditate upon a suburban clothes hoist and space. The direction of the
              ‘Look’ (a word to remember with Edgar) of this poem is the reverse of the opening Voyager poem: from near focus, to far. It begins with
              the gentle oscillation of hung clothes turning in a breeze, which in itself seems to be a memory of rotary motion on an even smaller scale:
              An action to compare With the white machine that they were packed And swirling in not half an hour ago, As though they were aware Or held
              a memory of that loose, Recurrent motion. I like to think that the this-goes-with-that tricks of the poetry trade – analogies, similes,
              metaphors – are a form of rhyme themselves. Conceptual rhymes, perhaps. This concept snowballs (to pick an obvious metaphor) as our gaze
              widens: So the hoist relays Its agitation to the trees … And ever onwards and upwards, until ‘the obsessive to and fro’ spreads to affect
              the oscillations of the planets themselves: … you sense, The planets and the star-slung zodiac Swung out to some immense Imagined limit,
              forth and back, Impelled by these few things hung out to dry – An astral influence Unknown to chart and almanac. These growing Russian doll
              rinse-cycles are the ultimate anti-Copernican joke, in a way. A Hills Hoist as the centre of the turning universe? In fact, the consciousness
              that can make such a joke is the true centre, as it is in most of Edgar’s work. Nothing we can put into words (or into maths or PET-scanned
              brain images or AI analogues for that matter) gets closer to capturing the weirdness of consciousness than poetry. The next poem, ‘Steppe’,
              takes up this theme. The poet has a lot of fun, in a serious way, about the world-in-itself and our perception of it. ‘Steppe’ is written
              in blank verse tercets – K.3(c) perhaps. One of the great advantages of writing within formal constraints is the paradoxical freedom they
              provide. Yes, sense has to be squeezed into a straightjacket, but that straightjacket can, oddly, provoke a bit of useful madness. That
              is, it can dislocate natural logic, and force fresher and stranger connections on the poet. With luck, and hard work, a differently received
              wisdom can emerge. And the disadvantages? The occasional need for padding to make ends meet, literally. * So far I have been mainly talking
              mainly about Edgar’s ear. What of his eye? Exhibits of the Sun is well-named; the poems are all sunflowers of a kind, drenched in light,
              or seeking it. For a Metaphysical Poet, Edgar has a surprisingly painterly eye. He especially loves the way light rebuilds the world – or
              the consciousness that perceives it – in the light of morning. It is a leitmotif, somewhat in the manner of Eugenio Montale’s great short
              poem, ‘Perhaps One Morning Walking’. From ‘Steppe’: And so the sun inscribes the invented east With its jawline of light … ‘Song Without
              Words’: Light of the nursery invades The morning ward and its uncoloured walls, And like a white sheet on his adult brain Settles opaquely
              where it falls, And will remain All day, as day assembles and degrades. ‘Nothing But’: Like wind and spray, the first sun hits the coast
              And paints it into being … Edgar uses all kinds of lighting effects, sometimes turning the daylight on, blindingly, in the middle of a poem,
              as if in some close encounter of the floodlit kind, and then just as abruptly turning it off. More often, his preference as a painter with
              words is for Turner-like dawns and sunsets, clouds and seas: Four years hence and she Would lie with Martin here as day went down, Although
              it seemed that time forgot its way In them as they embraced and saw the sun Incarnadine the clouds, and the sky rise In blended and aspiring
              zones of peach And luminous mauve and violet, while gold, Too heavy for such heights, was poured away Extravagantly over the eastern shore.
              Edgar is extravagant with his palette. The ‘she’ in this poem is Helen, the central character in a group of linked poems in Eldershaw .
              The title poem, and its two loosely associated sequences, ‘The Fifth Element’ (what else?) and ‘The Pool’, form not so much a discontinuous
              narrative, as a shuffled narrative. Another major heave: there isn’t a rhyme in sight. The whole verse ‘novella’ is in deft, subtly shifting
              blank verse, pentametric, but with endless iambic and non-iambic variations played upon its five-stopped flute. Time is again central –
              but, as befits a verse novella, so is human character. Character is destiny? Time, at least, is the stage on which character will out itself
              – literally, in the case of Helen’s husband Martin. Their Bruny Island home Eldershaw is the other main stage: a Chekhovian country house,
              with ghosts. Even the light in its bush glades is a little spooky: The clouds muster their shadows on the hills Of Bruny. Mist among the
              foliage And hallways of the footpaths trapped the light, Like gas ignited in a jar, and glowed And though the radiance were self-sustained
              Within the vapour. Most of Edgar’s obsessions ravel together in Eldershaw , as we examine the joys and savagery of the marriage of Helen
              and Martin and its long aftermath, often tangentially, through a range of variously unreliable consciousnesses. The ghosts of the past are
              always present, but equally often, rhetorically, ghosts from the future appear, as we time-jump back and forth in clairvoyant asides. Here
              is Martin, photographing his naked wife in the sea in a moment of honeymoon bliss: … calf-deep in the bubbling swirl, Struggling for balance
              with the camera, And taking snap of Aphrodite Anadyomene, who was his wife. The Representation of Reality in Tasmanian Photography? Not
              quite. In the midst of life we are also in the darker future: Perplexing to bethink that decades hence Such shots as these alone might verify
              The life that they were now inaugurating, Such scenes, empty of all but life and joy, Whereas what lay in store, dense with event, Unwitnessed,
              unrecorded, unportrayed In publishable dramas, would prolong Its parallel being in the dark Of memory and bitterness. Memory? A lie perhaps
              even to call it that, Considering how unreliable It proves to be, each instant of recall Subtly rewriting, under influence Of mood and circumstance
              and subsequent Occasion, its each detail till the whole Might no more hold the substance of the day It claimed to represent than the body
              does When seven years of supervening cells Have re-embodied it. Yes, memory lies as much as a Box Brownie – but what, ironically, should
              we make of Edgar’s witnessed, recorded, portrayed and published drama, Eldershaw , which we are reading now on a third parallel time-track?
              The narrative retrospectoscope is always at work. Describing Martin’s ‘meteoric’ law career Edgar writes: Though meteors, they might well
              have remembered, In fact don’t rise but fall. The entire book is a Fall, of a kind: an exile from the lost Tasmanian paradise, and the various
              misadventures, seductions and cruelties that punctuate Helen’s attempts to return to a state of grace. Perhaps Edgar is closer to Milton
              here than to Donne. A later Helen stands on a cliff overlooking a Bronze Age Greek dig, and the meltemi – the powerful north wind that washes
              the Aegean – blows: Down there she stood On that flat promontory, buffeted And shuddered by the gale. As mud-caked stone Is washed clean
              in a stream, she felt the current Of air pour through her, carrying away All she was clogged and matted with. And blow her back to Sparta,
              and Menelaus, perhaps. The very next section time-travels back two years, and we are plunged into a marital cruelty-as-usual story for which
              there can be no forgiveness. The final, stunning sequence, ‘The Pool’, ends with a later lover of Helen’s, the much younger Luke, grieving
              for her in Eldershaw. Photos of her life – including of the honeymoon Aphrodite – are arrayed on a shelf. Helen is dead, but … That night
              he woke and saw her lying there Asleep beside him in the midnight glow Of streetlights … Another ghost, but Luke reaches out to touch her:
              … and in that instant broke the spell. Like a magician’s cape that settles over The volunteer, then emptily subsides On no one to the floor,
              the quilt gave way, Relinquishing her substance, and her head And wavy hair were reabsorbed by shadow. And then? Well, the Montale effect,
              with a less pleasant twist: The first sun strikes his face and he awakes, In character. He can’t escape himself. What remains besides Helen’s
              photographs and journals? Another ghost is a lipstick-printed tissue which Presented to his gaze the perfect form Of her pursed lips in
              pink, on which, he knew, A few forensic cells of her still clung. Eldershaw is a collection of forensic cells, which we try to piece together.
              Luke’s memory of his first sexual encounter with Helen is one of them, as she leads him down a passageway to her bed for their first time:
              A lesson and conundrum from new physics About our abject inability To grasp the simplest principles of time, That corridor, with every step
              he took Towards his life to come, was drawing him Back to her past and what was living there. And so we beat on, boats against the current,
              borne back ceaselessly into the past? * The final, separate section of Eldershaw contains sixteen of Edgar’s more typical shorter poems.
              All the musical variations on old forms are here, including Donne-like shortenings, enjambs and fermate. Voyager also makes an early appearance,
              before it passes beyond the rings of Saturn in the next book and lights out for the really deep territory. But as in the later book, there
              are far more richnesses than I can hope to compass here. Some last honourable mentions, perhaps: the Audenesque (think ‘The Shield of Achilles’)
              ‘Lest Me Forget’ with its alternating stanzas of domestic holiday bliss and scenes of torture. Some poems fascinated by the representation
              of reality in film – ‘Continuous Screening’, ‘Cinéma Vérité’ – or the nature of consciousness – ‘Saccade’, ‘Song Without Words’, ‘Sight-reading’.
              Some typically intricate (obsessive?) explorations of history and personal memory – ‘The Angel of History: Walter Benjamin’, ‘Pictures in
              the Water’, ‘The Trance’ – or of consciousness and memory – ‘A Scene From Proust’, ‘Future Perfect’, and especially ‘Pictures in the Water’,
              with its lovely central metaphor of a couple rowing a boat, seated, as we are when we row, with their backs to the future, facing their
              wake. And so we beat on. Stephen Edgar is a modest man, somewhat of an oddity in the world of poetry, where the gradual shrinking of the
              environmental niche seems at times to demand a Darwinian survival struggle for readership. That’s not a poem, this is a poem! Or, conversely,
              it inspires minimalists: mine is smaller than yours! Edgar’s extravagance is at a tangent to all this. One of his early poems, ‘All Will
              Be Revealed’, is set in a nudist camp. The problem is: In the nudist camp identity is lost Behind disguise. See, over all the fashions of
              the self, Whatever size, They’re slipping on identical pink suits Of nakedness. Which sets our latter-day John Donne up riffingly, until
              the poem ends: In such a place One might devise a nightclub for dress-tease Where they could face, To whistles, randy cries of ‘Get it on!’
              Themselves as lewd Performers who would strut and bump and grind, Beginning nude, Discarding part by part their bare accord, Till they finessed
              The erotic climax of true self-display Completely dressed. One reading of this poem is as a parody that works the narcissisms of both sides
              of the room: the naked and the dressed. But here I choose to read it as a parable of the clothes that Edgar’s body of work wears. His poems
              are fully dressed in every sense: musically, intellectually, visually. They are erudite, but also down-to-earth; Proust is never far from
              the Hills Hoist. They are drenched with painterly light, and can freeze landscapes and moments in a satisfying frame of words, but they
              are also philosophically restless and unsatisfied, banging at the bars of their cage. At times, an unnecessary word or two might be roped
              in to fill a metric line, but what we write always seems at some level to be either too little or too much. Formal rhythm and rhyme might
              be a little out of fashion these days, but fashions come and go. Certainly, despite Edgar’s modest personal qualities, his unique achievements
              are slowly and deservedly emerging into – what else? – the light."
transparencies:
    title: Transparencies
    author: Stephen Edgar
    short_description:
        Stephen Edgar’s Transparencies extends his exploration of the world’s visual aspect, both in itself and as a screen for the
        mind’s projections. The transparencies of the title are daylit images of the natural world and occasions to look through them into deep time.
    long_description:
        "On slender toes Down by the water’s edge Two egrets effortlessly hold their pose In sedge. They hold their pose. This show,
        With all chinoiserie’s Appeal, must be illusory. And so It is. Stephen Edgar’s nimble-footed new collection Transparencies extends his exploration
        of the world’s visual aspect, both in itself and as a screen for the mind’s projections. He questions, in the words of Denis O’Donoghue, ‘the
        delusion by which we think that reality coincides at every point with its appearances’. The transparencies of the title are both the daylit
        images of the natural world, in all their hallucinatory strangeness and beauty, and the occasions they offer us to look through them, now
        into deep time, as in ‘Day Book’ and ‘The Mechanicals’, now into the parallel universe of the dead, as in ‘The Returns’, or into the world
        within this one, as in ‘There’. Edgar’s poems look out and reach in. They probe, even as they have an exquisite ear. As well as moving poems
        on his late mother, to whom the book is dedicated, Transparencies has many pleasures. One of them is waiting for the delayed rhyme on ‘David
        Attenborough’. These poems hold and play with the reader’s mind and imagination—telescopically and microscopically. David Gilbey, Mascara
        What Clive James said of a single Edgar poem holds true for poems in Transparencies : clear from moment to moment, and clear in the way that
        one moment leads to the next, it accumulates so much clarity that you need dark glasses to look at it. Poetry Notebook 2006 - 2014"
    price: 24.0
    isbn: "9780648038702"
    release_date: "2017"
    page_count: 104
    reviews:
        - title: The Australian
          text:
              "Stanzas draw you to the light SIMON WEST Reviews: Stephen Edgar's Transparencies The Australian , January 6, 2018 If you were to imagine
              poetry in the 20th century as a re-enactment of the Trojan war (fought in the name of what? Beauty? Truth? Self-expression? Mimesis?), then
              the fiercest and most drawn-out battle would be that waged between free and formal verse. Free verse won the day and the city, but Stephen
              Edgar is one of a few poets who, like Aeneas, stole from Troy in the hope of founding a new empire. Since the mid-1980s he has been receiving
              acclaim for poetry written in what loosely may be called traditional rhyme and metre. Why go to all that trouble, and what’s wrong with
              freedom? For Dante, form mimicked the metaphysical order of the universe. Poets today are shy of metaphysics, but the desire to keep chaos
              at bay and order our experiences remains constant for those who, like Wordsworth, have ‘‘felt the weight of too much liberty’’. Gwen Harwood
              said she wrote in strict forms not because she was hostile to free verse but because it was so much harder to strike the creative tension
              that gives the poem its energy without the constraints of rhyme and metre. In Transparencies (Black Pepper, 90pp, $24) Edgar has mastered
              a candid conversational style, transparent even. There are few rhetorical flourishes, emotional fireworks or confessionalist dramas, just
              a thoughtful and articulate individual reflecting on world and self. The poems tend to a page or so in length, structured in eight or nine-line
              stanzas with intricate rhyme schemes that again, like the transparency, are there without drawing attention to themselves. My own preference
              would be for more frequent inverted feet, or the occasional dactylic ripple disrupting the march of iambs. There is no denying, however,
              that form shapes rather than hinders the eloquence of Edgar’s voice. Stephen Edgar and his book, Transparencies One sense of transparency
              is allowing light to shine through. Light is a major protagonist of these poems, as active as the artist in creating vision, “the light
              performs its spectral repertoire / from dawn all day to evening.” It can be both the means of vision and a disruption: “Again, a sudden
              shaft, / it stabs right through the picture of the day.” Similarly, perspective can be set a whirl by jumping from the everyday to interstellar
              space. “In which the hours are aeons and the earth / A molten palette fading to a last / Expanse of starlit vacancy as deep / And see-through
              as the night.” These poems chart the way “the mind / Coils in the gyre of its own consciousness”, but also how that mind finds stability
              through art, so that the ever present light shines through their stanzas like sunlight streaming into a room."
        - title: A USTRALIAN B OOK R EVIEW
          text:
              "Undulations Geoff Page reviews 'Transparencies' by Stephen Edgar Australian Book Review , August 2017 After Stephen Edgar’s nine
              collections of poetry, the last seven of which are distinguished by an extraordinary control over metre and rhyme, a reviewer feels bound
              to ask how this new book, Transparencies, differs from its predecessors? There are at least two answers: the recurrent spirit of the poet’s
              mother, Marion Isabel Edgar (1922-2015), to whom the book is dedicated, and the poet’s elegant conviction that the universe lacks any meaning
              beyond that which we arbitrarily impose on it. A third concern - not entirely new - is the unreliability of our senses, particularly our
              vision, and how our perception of the world tends to be layered rather than completed in a single ‘take’. The well-designed cover of Trans-parencies
              features a painting by Judith Martinez called ‘Rumours of Light’. A woman in a wind-flounced dress stares across what seems to be an estuary.
              Littoral views like this are recurrent in Edgar’s verse, and a smaller monochromatic version of the painting is used to separate the book’s
              three sections. ‘Jupiter’, the first poem of the first section, is an introduction to the book’s twin preoccupations (and to Edgar’s poetic
              techniques for readers who may be unfamiliar with them). The first two lines are vintage Edgar: ‘The harbour’s idle undulations slew / And
              swill their slicks of glaze to make ...’ A business-man on a ferry is absorbed with calculations and ‘risk too intricate for even Lloyd’s
              / To cover’. Meanwhile, the poet and his reader merely ‘watch the slurs / Of gloss and shifting craquelure’, before both are reminded that
              ‘They say / It’s Jupiter’s / Vast mass that draws off, and may hurl our way, / A terminating hail of asteroids.’ That last sentence certainly
              puts things into perspective, not only for the businessman with his complex calculations, but also for the rest of us. The sardonic rhyme
              of ‘Lloyds’ and ‘asteroids’ on either end of the stanza is also a typical Edgar touch - as is the use of craquelure’, a word many readers
              will need to look up, only to discover that, though metaphorical, the term is used accurately. It is characteristic too (but not universally
              the case) that ‘Jupiter’ is written in a complex stanzaic form of Edgar’s own making, with line lengths varying from dimeter through to
              pentameter. The device (along with a rhyme scheme to match) creates a sense of complex inevitability even while it also risks being a distraction.
              It is notable, however, that Edgar’s best poems always end in a powerful image which tends to erase memories of difficulties experienced
              along the way and thus leaves us with an awareness of the poem as a resonant whole. ‘A terminating hail of asteroids’ is certainly an arresting
              last line. Another poem of comparable impact is ‘Forest Doxology’. Here, Edgar takes advantage of zoological research by Jane Goodall and
              programs by film-makers such as David Attenborough to present a disturbing parallel between chimpanzees and human apes. Like us, the chimpanzees
              murderously hunt in packs; like us, they can stop to admire a waterfall without quite knowing why. The paradox is that chimpanzees con-trive
              to do both ‘Without the power of speech’. At the poem’s end, after the waterfall viewing, Edgar notes (with a wry nod to Wittgenstein) how:
              ‘At length they make their way, / Holding a picture memory replays, / Whereof they cannot speak.’ Among the most satisfying poems in Transparencies
              are those which evoke the poet’s mother’s final months and days. Here, in poems such as ‘Mother’s Day’, ‘On the Beach’, ‘The Sense of an
              Ending’, and ‘The Art of the Fugue’, we encounter the usual technical expertise, but, on these occasions, see it harnessed to more direct
              emotions. Edgar re-members, for instance, in ‘The Art of the Fugue’, how ‘Nurses, as ever, came and went. / Small groups of relatives stood
              round / Their proper beds and by a mute consent / Were mutually and thoughtfully ignored. ’It is these poems (and a number of comparable
              ones) that persist individually in the memory, like the best poems of, say, Philip Larkin or Robert Lowell, rather than being just a part
              of a more general impression of extreme accomplishment. In Transparencies, as in other recent collections by Edgar, there are also a few
              poems which don’t rely on a strict rhyme scheme. It is interesting to ponder their relative effectiveness. Is Edgar letting himself off
              too easily here and ‘playing tennis without a net’, as Robert Frost argued free verse does? The truth is that Edgar’s verse is never ‘free’.
              The unrhymed poems still have strict stanza structures, adhere to an iambic metre and feature the same metaphorical density as the others.
              ‘The Returns’, for instance, is in tercets with a trimeter in the first line and pentameters in the second and third and with virtually
              no rhyme. It is about citizens returning to a city after being forced to flee by war. ‘The city is still there, / Of course - or rather,
              another city now, / Which occupies that name as it does the ground, // And people in whose mouths / A speech still recogniz-ably the same
              / Sounds not quite right, like a fluent foreigner.’ In the few poems where this relative openness appears, the reader senses, with gratitude
              perhaps, that the poet has not made a prison for himself but is free to move into, and out of, strict form as suits his needs. Transparencies
              is well up to the standard that Edgar has, in the past twenty years or so, increasingly set for himself. ■ Geoff Page has published twenty-one
              collections of poetry."
the-strangest-place:
    title: The Strangest Place
    author: Stephen Edgar
    short_description:
        The strangest place, this world of fact and figment we astonishingly find ourselves inhabiting, is the territory that Stephen
        Edgar’s poetry has been probing and framing for over four decades now.
    long_description:
        "B ook Description They have their stratagems too, though they can’t move. They know their parts. Like invalids long reconciled
        To stillness, they do their work through others. They have turned the world To their own account by the twisting of hearts The strangest place,
        this world of fact and figment we astonishingly find ourselves inhabiting, is the territory that Stephen Edgar’s poetry has been probing and
        framing for over four decades now, looking out on the evanescent representations of light and inwards on the mind and “the gyre of its own
        consciousness”, feeling “toward the labyrinth just behind Creation’s serene surface”, as Alan Gould described it, and “trying to keep faith
        poetically with that strangeness of the world”, in the words of Peter Steele. The Strangest Place offers a retrospective on Edgar’s career,
        with selections from each of his previous ten books. Opening the collection is a book-length section of new poems, Background Noise , which
        continues and extends the range of his meditations, with characteristic technical mastery, interspersed with the title’s leitmotiv, whether
        the notes of lorikeets in the morning trees, echoing voices in an abandoned railway tunnel, the mind’s running commentary or the cosmic hum
        beyond the death of the stars. Cover Image: Judith Nangala Crispin Anika lifting to her ancestors, on a spider-string, over Mt Cooroora, in
        Kabi-Kabi country - Lumachrome glass print"
    price: 22.95
    isbn: "9780648038740"
    release_date: poetry
    page_count: 302
    reviews:
        - title: Review by Kevin Hart Mascara
          text:
              'REVIEW CRICKEY As poetry seems to lose rhyme and reason, Edgar masters technique, complexity and vibrancy GUY RUNDLE, CORRESPONDENT-AT-LARGE
              The Strangest Place: New and Selected Poems . Stephen Edgar The first thing that occurs to any reader who sticks their head into Australian
              poetry — by browsing, say, an issue of Cordite, or one of the just-surviving little magazines — is how bloody raucous it is. Anger, testament
              and incitement has become the dominant aesthetic for a whole section of the form, inevitably occupied largely by non-male, non-white writers,
              though that is not the only thing all of them do. Some of it is worked and paradoxical, some of it deliberately artless and insistent. Most
              of it will age and is ageing badly, not because the sentiments decay but because the particular concepts and language of oppression and
              liberation shift, being nothing more than the technical language of politics rather than the more persistent language of things — hence
              why so much of the stuff from the ’60s sounds like something dredged up for a Saturday Night Live sketch about the ’60s. At the other end
              of the room, a lot of the work is simply incomprehensible at first, and later, glance — a product of several genres of poetry, one known
              confusingly as L.A.N.G.U.A.G.E, whose object is to make it impossible, via discontinuous phrases, broken syntax etc, for the poem to be
              in any way summarised or abstracted to a prose sketch of its subject or arguments. And in between, there is a stretch, a vast stretch, of
              the standard issue stuff — free verse, unrhymed, semi-scanned poetry, irregular stanzas going where it will, following its fairly clear
              exposition of holidays in Italy, childhood in the country, a sepia photo of your great aunt, the taste of cumquats, and on and on and on.
              The ascent, really in the 1960s, of first unrhymed and then unpatterned free verse becoming the standard thing that poetry was liberated
              reader and writer from a lot of bad plinky-plinky verse (for which see the Literary Review‘s traditional poetry competition, run regularly
              in the ’80s and ’90s; designed to defend rhyme and scansion, it helped near-kill it with kitsch). But in doing so it created a disjuncture
              between the poet’s desire to express and the genre’s demand that such be done artfully. In doing so, the commonplace thoughts of poets on
              death, love, the old mill, the beach near Esk, etc, were now the poem’s only driver, and the journals and sites filled up with unworked
              notes for poems presented as the final thing. This has been a problem everywhere, but in Australia, my God, it’s the cultural equivalent
              of the mouse plague. You beat these things flat and they get up again. The situation is absurd. We have no high culture to speak of, and
              yet we have all these poets — some of them quite distinguished within the art — who write nothing but “i reckon” poetry, a sort of “i’m
              sitting on the cliff and looking at the rock out there in the sea and the rock is death. i reckon” type of thing. This wash of poetry is
              a product in part of our lack of high culture; in our left cultural nationalist period from the ’60s to the ’90s, we thought we would make
              one of a scale beyond the small and self-knowing network of artists prior to. When we abandoned that, and relaxed into the arms of globalisation,
              we left the machine on — in the form of creative writing courses, designed to mop up the exploding numbers of arts students that the ’80s-’90s
              Dawkins revolution had not anticipated. This seems to be the cause of this disjuncture — as if we had started hundreds of coopering courses,
              and our cities were now filling up with thousands of poorly-made, unwanted barrels. Stop making barrels, make fewer better barrels, we’d
              say. But no, they go on piling up. There are many poets, some with several collections to their name, who should simply just stop, They
              should go outside and kick a ball around. Amidst all this, the tradition of formal verse in Australia died away more rapidly and completely
              than elsewhere. Our poetry’s rather thin roster of figures, with even the slightest international reputation, were, until the 1960s, all
              formalists, chief amongst them A.D. Hope. After that, rhyme went out the window, and scansion and stanza form were the pursuit of a minority.
              It’s telling that the big hitter — Fat Les — worked in both modes. But it’s also telling that Britain’s two greatest post-war poets — Philip
              Larkin and then Don Paterson — lean heavily towards formalism, with a manner and a facility that does not emerge, en masse, from Australia.
              So the figure of Stephen Edgar, who has just won the prime minister’s prize for poetry, is an extraordinary one; not only an Australian
              formalist, but perhaps the most accomplished such poet in the English language today. No, “accomplished” doesn’t do it. Edgar is a mind-blowing
              poet, producing the most extraordinary transformations of the natural world, the cosmos and memory, from within seemingly impossibly tight
              rhyme/scan schemas. The effect is like very little going on in poetry today, joining the full range of modern expression to the inherited
              formal tradition. The... well, cue tape: The river surface, restless as a child Keeps shifting around its iridescent blues In shirrs and
              stretch marks, quiltings which are styled For nothing, or for what we choose to choose -“Observations of an attendant” If that isn’t your
              sort of thing, you may want to meet the rest of us back at the ratings report. For the rest, Stephen Edgar deserves an introduction and
              a consideration. Born in Sydney in 1951, a Sydney tech graduate, Edgar did the London sojourn in the early ’70s and then returned to Tasmania,
              where he spent three decades before returning to Sydney. Aside from “The Dancer”, a record of a post nervy-b psych ward stay (as much a
              part of poetic life then as hotdesking at The Wheeler Centre is now), his short poems (20-200 lines; few under 50) relate no striking life
              events (“Eldershaw”, an autobiographical set of three long poems, a small amount excerpted here, is more forthcoming). Instead, over several
              hundred poems across 10 volumes, Edgar’s poems are overwhelmingly concerned with small moments of life, from a few minutes to a few days
              long. These are often small observed processes such as a coastal scene: A single sail Transluscent apricot Drifts like a poppy’s petal on
              a frail Breeze that is not A baby’s breath Of air sparingly strewn And eked out by the estuary’s width All afternoon -“the sail and the
              gannet” or a few minutes in sexual afterglow: Too hot and humid to do more than drowse And slip — who knows how brief the interims? — Into
              a chafed unconsciousness And rouse Too clammy for the slur and press Of fabric or each other on our limbs We slide apart across a moon-slicked
              sheet And all the intermittent anaglyphs The moon is working to Complete, I see each time I wake and view Your light shaped body as it stirs
              and shifts…. -“Moonlight sculptures” Or the simple capture of being, being: Sitting in a room, say, when a pause In conversation, or alone
              In stray attention prises a wide space And over on the wall the late day draws A sliding pain of light on which the trees In miniature and
              detailed monotone Project, like memories An imaginary time and place -“Letters of the Law” What is common to hundreds of poems of variant
              matter is the absolute mastery of technique which is put to the service of such particularity. His commitment to a tight, demanding classical
              form is there right from the start, with “Nasturtiums”, written, his introduction tells us, in 1976: In this plot, only nasturtiums Are
              charmed to a snakelike survival All else winces in a wind stiff with salt Dies back or waits stock still (Was this the poem Patrick Cook
              was thinking of in his “Australian poets” cartoon, which depicts a desperate man hovering over a typewriter and pointing a gun at a vase
              of flowers and yelling “Rhyme, you bastards!”?) The Hopkinsian touch would depart relatively early, yielding to straight, subtler rhyme,
              though for the first half of his career, Edgar is as interested in the full palette of the English vocabulary as he is in depicting the
              lessmediated real, as in “reef”, an interior scene: It is night. The spectrum has been cancelled From the glossary of possibles. And here
              Its lettered spines a texture of the wall The library is restful as a morgue It’s only later that the language becomes plainer, and the
              objects emerge, a gesture towards letting things speak for themselves. That sleight-of-hand gives such poems their uncanny air, redolent
              of French symbolism, but with a capacity to flip reality that seems unmatched by, well, anyone. All this is done within the wider frame-demand
              of strict rhyme and scansion, worn so lightly that it sometimes seems to be free verse. Larkin could do this, George Barker and a few others.
              But when one looks around today, one sees no-one doing it (worried that I was simply missing whole genres, I did a quick tour of the Pulitzers
              and other prizes going back a decade — no, nothing much like this that I can see). This isn’t the only way to do great poetry, of course.
              But it’s worth asking why so much of the other way of doing it — loose unrhymed lines, parsimonious metaphor and imagery, lack of rhyme
              and demanding form — is so much more common. One can’t help but conclude that it probably takes a lot less work, and that Edgar’s poems
              take a lotta lotta carpentry to get right. The suspicion might be that poetry once had a (small) “middle” audience, who would read poets
              like, say, Auden or MacNeice, without being of the poetry world themselves. That audience has almost wholly vanished, poets are alone with
              themselves, and one wonders whether, in several quarters, the difficulties of craft-art have been abandoned for shouty self-expression —
              or for the relatively undemanding randomness of L.A.N.G.U.A.G.E-type operations. The greatest danger for high culture today is that no one
              really believes in it anymore, even as they do it, like Roman pantheon priests used to fall into giggles as they invoked the gods. Charlatanism
              is eating away at art forms that gained their authority as a succession from religion, and are now losing it to season three of Succession.
              Stephen Edgar is someone who clearly still believes in the calling — and as a consequence, so many of his poems rise from a simple and direct
              observation towards cosmic heights, at a dizzying speed, or down into the very interstices of being, moments captured in their mote-filled,
              sunlit indeterminacy. He’s not someone I would read in large hits; two to three poems at a time, because they demand slow reading and attention.
              Taking them altogether would be like eating a whole profiterole tower. OK, bad example, because I’ve eaten a whole profiterole tower, but
              the point remains. Complexity for its own sake is not the value I’m pushing — especially as much of the current poetic avant-garde proposes
              a complexity that simply celebrates open-ended interconnection, in which anything can connect to anything else. This makes the style another
              mirror expression of the neoliberal era, in which capital proposes that anything can be anything else, and is a reason why such movements
              run out of energy and purpose. Edgar’s complexity imposes order, the poems’ meanings a product of the interconnections of rhyme running
              crosswise to the main narrative or argument, avoiding kitsch or cuteness. Most poets renounce rhyme because they can’t avoid kitsch. Edgar’s
              skills, honed over decades, give him access to that extra dimension. These poems shimmer and vibrate as you read them; they grow and change.
              They’re an Escher picture, they’re fractals, they’re a fungal colony spread over hectares, they are liquid mirrors of the real. Edgar has
              had prizes and nominations before; the prime minister’s prize should be the start of a new stage in his public life. With all due credit
              to Black Pepper — a mainstay of Melbourne publishing for decades, airing hundreds of writers and a halfdozen major talents — we need a uniform
              edition of Edgar, gathering his scattered books together, some impossible to obtain. Indeed, there’s a dozen contemporary poets we need
              that for. Lacking our own Faber and Faber, we need a government subsidy for one or several publishers to take it up — the cost would be
              nothing, a fraction of a Melbourne writers’ festival dead pets church. As a nation, we dun pretty good on poetry, punched well above our
              weight. It would be good to celebrate that, and to start with Stephen Edgar, who may well eventually be seen as the national oeuvre‘s new
              Hope. And hope. Reviewed by KEVIN HART October 6, 2021 / mascara Poetry always involves a delicate negotiation between craft and art. Craft
              can easily be misunderstood as a set of skills completely external to what is being written. Yet a poet shows craft by moving confidently
              within the work developing on the page. Often, when one looks at an intricately rhymed stanza, perhaps one with five, six or seven lines
              of varying length, such as Stephen Edgar favors, one might be tempted to think that the work has been composed, even revised, in the poet’s
              mind and then set down on the page. There are such compositions, some of them admirable, and examples can be found in volumes of minor seventeenth-century
              verse. The effect is known as “Ciceronian”: the style is marked by balance, antitheses, and repetition; it was developed to a high pitch
              in prose, not verse. Nothing could be further from Edgar’s characteristic way of writing, which is usually “Anti-Ciceronian.” Here sentences
              unfold naturally rather than exhibit a resolved formal beauty, and often the style is marked by asymmetric constructions. The poem shows
              a mind thinking as it progresses from stanza to stanza. Too little is said, then, when critics say Edgar is a formalist, or range him against
              some of the better American “new formalists.” Like theirs, his poetry is often plain spoken; unlike theirs, it tends more surely to the
              baroque. With respect to contemporary poetry, “baroque” need not connote stylistic excess, invention or ornament. Nor need it prompt us
              to admire the deft use of elaborate poetic forms. In fact, Edgar has no deep investment in received poetic forms. Baroque poetry nowadays
              is more concerned with the presentation and contemplation of compound phenomena. Edgar’s poetry is baroque in this manner and is also remarkable
              for its fine sense of timing. In many of his most impressive poems he is concerned to investigate complex situations, sometimes unstable
              ones, which often involve fragility and loss: his consciousness becomes divided, or he encounters problems in constituting the world, or
              he quickly passes from one attitude to another (perception, belief, half-belief, fantasy, anticipation, recollection, and so on). “Timing”
              in poetry is not only a matter of pacing one’s speech, spacing out metaphors and similes, and seeking closure at the right moment. It is
              also the difficult practice of using enjambment, rhyme, varying line lengths, and metrical substitutions in order to place a word or a phrase.
              The proper timing of a word, a phrase, a figure, does not merely follow formal rules; it must also release thought and feeling at the right
              time and to the right degree. To read an engaging poem well is partly to be aware of the confidence and agility, of the poet as he or she
              writes, and to notice those moments, given only to very fine poets, when craft leads one to think of the phrasing as inevitable. Such reading
              perceives that in a poet as good as Philip Larkin craft and art become almost indistinguishable, and something similar may be said of Edgar.
              The Strangest Place is a selection from ten previous volumes of poetry. “Nasturtiums” (81) was written in 1976 and the most recent poems,
              in the opening section entitled “Background Noise,” were completed in 2020. So the book distills forty-four years of practice as a poet.
              I should say “achievement as a poet,” and it would be a lapse of responsibility not to observe that Edgar’s work has only recently been
              read with anything like the attention and thankfulness it deserves. Quite simply, Edgar is one of the most rewarding poets currently writing
              in English. Poems in this volume are likely to survive when many of his contemporaries are remembered only in footnotes. At the moment,
              though, it is sad to testify how difficult it is to obtain any of his earlier books. I have repeatedly tried to purchase Eldershaw (2014),
              only excerpted in this selection. Nor can any library in the United States supply me with a copy. One can only hope that individual volumes
              will be brought back into print once the accomplishment of this selection has been duly acknowledged. Edgar is chiefly a contemplative poet.
              Not that, like the Romans, he looks into a templum to discern the will of the gods or has even the faintest streak of religious faith. When
              he listens to Thomas Tallis he says, “Not one word or wound, / One shred / Of their doxology can sway / Me to belief” (173). His templum
              is his mind, which is utterly modern, entranced more by physics than theology, and emotions and thoughts cross it, sometimes alone and sometimes
              together. For readers, though, each of his poems is a templum . What do we discover when we gaze at them? Many things, no doubt, but chiefly
              his imagination works in eschatological terms: everything points eventually to nothingness. He entertains the idea of “a posthumous, / Unpeopled
              world, a plot / That has no further use for us” (55) and he meditates on the aftermath of war: an empty town left to “the chaos of // Abandoned
              use” (134). More generally, he is haunted by the “black and empty corridor” which “lies in store” for all of us (283). The same imagination
              is entranced by divisions of the self, as when he identifies the inner voice that is forever murmuring in our heads: “always there is that
              accompanist, // Not caught on film or sound, who’s guaranteed / Each moment to intone / A running commentary” (29). In another poem, set
              in a restaurant, he sees his own reflection in a wall mirror behind where his friend sits: “I catch odd glimpses of it watching him, / And
              eyeing me / Askance, as he shifts and sways from side to side” (61). Always, Edgar is aware of the fragility of existence, human and non-human
              alike. Sitting in a house during a strong wind, he observes, “The house is brittle as an hourglass” (80). Often enough, it is an interruption
              of ordinary life that prompts a revealing change of mental attitude and gives an insight into the frailty of things: too many clocks in
              a house (20-21) or the recognition that books really write us (116). Edgar’s great theme, though, is the relation of mind and world. Sometimes,
              like Tolstoy and Montale, he is beset by the apprehension that the visible world might be an illusion. We spend our days, he says, “clearly
              reciting / The myth of an outer world” (196). In “Parallax” he recalls “a droll / Advertisement that had the Martians hoist / Before a rover’s
              lens screen after screen, / Across which it would scroll, / Filming a fake red desert, while unseen / Their high-rise city quietly rejoiced”
              (5). It leads him to ponder that something similar happens while “Walking the crafted streetscape” of Sydney: “A suite of flimsy panels”
              is perhaps sliding beside him, “screening who knows what?” (5). One approach to this theme comes by way of what Edgar calls “the conjuror”
              (12), and indeed worldly beauty is much like a magic show for him, both in what it offers us (“The silken trance it’s spun and shed” (246))
              and in the chilling dénouement that awaits us. No wonder that we think of Schopenhauer when we read lines such as these: “The world cannot
              pretend / And with the end / Of the masquerade throws down its great disguise, / Like a magician’s cape whose folds / Descend / About an
              object which then disappears / Before unseeing eyes” (125). At other times, it is reading in physics that disturbs the otherwise unquestioned
              relation between mind and world. Handling a snow dome, he reflects that in a world of two dimensions, the third dimension would be “just
              a dream that quantum tricks produce” (32). Then panic sets in: “Put down that ornament and look around, / And breathe, for fear / The virtual
              world that some propound / Is ours, here, now, a program that supreme, / Conjectured beings engineer, / Where we imagine we are all we seem”
              (32). In Mauvaises pensées et autres (1943), Paul Valéry has a piercing aphorism entitled “Ex nihilo”: Dieu a tout fait de rien. Mais le
              rien perce [“God made everything out of nothing. But the nothing comes through”]. It is no wonder that Edgar is attracted to this line of
              Valéry’s — it forms the epigraph to the splendid conceptual lyric “The Menger Sponge” (148) — for the Australian and the French poets inhabit
              overlapping worlds. In this imbrication, poetry, music, science and a cool skepticism about religion live in rich harmony. Unlike Valéry,
              however, Edgar has no temptation to be all mind (as with Monsieur Teste), and he has no abiding interest in theorizing about the creative
              process. Only very obliquely does he offer us an ars poetica in “Feather Weight” (44). Nor is there anything like Mon Faust in his work:
              he is one of our most discreet poets. Not that one should thereby think, as some people do, that Edgar has little blood passion. The excepts
              from Eldershaw (2013) testify otherwise. Nonetheless, to read Edgar well is to learn to let the feeling in the verse display itself in its
              own good time; it will not overwhelm the reader on a first or second reading, neither by way of intense metaphors (which Edgar avoids) nor
              by way of ardent declarations (which he would most likely think to be in bad taste). Consider “Nocturnal” from History of the Day (2002).
              The opening stanza shows Edgar’s confidence handling a difficult stanza, nine lines, ranging from trimeter to pentameter, rhyming abbacccdd
              . Quite by chance, the speaker discovers an old cassette with a recording of his distressed partner talking years ago: It’s midnight now
              and sounds like midnight then, The words like distant stars that faintly grace The all-pervading dark of space, But not meant for the world
              of men. It’s not what we forget But what was never known we most regret Discovery of. Checking one last cassette Among my old unlabelled
              discards, few Of which reward the playing, I find you. (202) Many of Edgar’s qualities are tightly coiled in these lines: elegance and lightness
              of touch, to be sure, but also plain speech, and, more, the relish of drawing an apt distinction. Notice the timing of the lines, how the
              drama of hearing the lover’s voice, now she is long dead, in the final word of the stanza, is embodied in the rhyme “few” – “you.” It is
              characteristic of Edgar that the discovery does not lead to confession or a registration of immediate grief but that a contemplation begins,
              one that leads us first to that wonderful poet Gwen Harwood (1920-95). Long ago, the lovers were jolted by hearing their friend’s voice
              on the radio reading “Suburban Sonnet.” Technology exhumes the dead with ease, and with them it brings our loss immediately before us. Again,
              characteristic of Edgar, the contemplation continues, passing now to the North Head Quarantine Station, near Manly, where people who were
              feared to harbor contagious diseases were kept until they were considered safe to enter Sydney. Many died there, and stories abound that
              the place is haunted: “equipment there records / The voices in the dormitories and wards, / Although it’s years abandoned. Undeleted, /
              What happened is embedded and repeated, // Or so they say” (202). The skeptical reflection, delayed until the beginning of the new stanza,
              is nicely placed. Edgar’s former lover was not mistrustful of the dead’s power to cling to the world, however: “You said you heard the presence
              which oppugned / Your trespass on its lasting sole occasion / In your lost house.” (“Oppugned”? Yes, Edgar has an extensive vocabulary and
              is not afraid to use it.) But the poet himself can accommodate the belief only by way of technology. The final stanza runs: Here in the
              dark I listen, tensing in distress, to each Uncertain fragment of your speech, Each desolate, half-drunk remark You uttered unaware That
              this cassette was running and would share Far in the useless future your despair With one who can do nothing but avow You spoke from midnight,
              and it’s midnight now. (203) The word “midnight” in the last line is no longer the simple temporal marker that we encountered in the first
              line of the poem; it is also a dark emotional state shared across decades by the two lovers, though not in the same way or for the same
              reasons. Among the many things to admire in this stanza, not the least is the careful choice of the almost retiring adjective “useless.”
              What was to be the future for the woman can have no effect on her now, and the speaker’s present gives him no way of comforting either her
              or himself. Stephen Edgar, now seventy years of age, has assembled a body of work that is as durable as any poetry written in his generation.
              If we read it steadily from Queuing for the Mudd Clubb (1985) to Background Nois e (2020), we encounter a poet who apparently knew from
              the beginning what he wanted to do. His gifts were already fully apparent, and the decades have only helped him to refine and extend them.
              The Strangest Place is a book to read and re-read; it invites us to choose the poems that most pierce us and to get them by heart. Robert
              Schumann famously reviewed Chopin’s “Variations on Mozart’s ‘Là ci darem la mano’” in 1831. In that piece, he imagined his character Eusebius
              entering his room where he was sitting at the piano with his friend Florestan. Pointing to Chopin’s score in his hand, Eusebius declared,
              Hut ab, ihr Herren, ein Genie [“Hats off, gentlemen, a Genius”]. We don’t say such things these days, not wearing hats, not being so dramatic,
              and having rather exalted ideas of genius, but had he been around today Eusebius might have been just as enthusiastic had he brought into
              a room a copy of Edgar’s new book. KEVIN HART is internationally recognised as a poet, critic, philosopher and theologian. Born in England,
              he grew up in Brisbane, and taught Philosophy and English at the University of Melbourne. He has recently taken up a position at the University
              of Virginia. An assured place Australia’s pre-eminent formalist by Geoff Page • March 2021, no. 429 S tephen Edgar, over the past two decades
              or so, has earned himself an assured place in contemporary Australian poetry (even in English-language poetry more generally) as its pre-eminent
              and most consistent formalist. His seemingly effortless poems appear in substantial overseas journals, reminding readers that rhyme and
              traditional metre have definitely not outlived their usefulness. Edgar’s The Strangest Place: New and selected poems is an ideal opportunity
              to examine what this reputation is founded on. Its poems were written across some forty-four years, though it is only in the past twenty
              or so that we recognise clearly the poet we know today. In the earlier collections ( Queueing for the Mudd Club in 1985, and Ancient Music
              in 1988), the poems already show Edgar’s formal command but are perhaps less ambitious technically than his more recent ones. The use of
              blank verse is never less than assured, and the rhymes, while less complex and original than the ones Edgar uses currently, are still more
              than fit for purpose. His long poem ‘Dr Rogers’ Report’, for instance, is a highly engaging exercise in a nine-line variant of Byron’s ottava
              rima . Edgar’s next two books, Corrupted Treasures (1995) and Where the Trees Were (1999) feature a number of highly memorable poems: ‘The
              Secret Life of Books’, ‘Daisy, Belle and Arthur’, and ‘Penshurst’, to name three. All of these have the vividness of Edgar’s best poetry
              from Lost in the Foreground (2003) onwards. It is worth pausing here for a moment to consider the virtues and limitations of closely rhymed
              and metred verse when free verse is available as an alternative. Free verse can have a directness and rhetorical (even metaphorical) energy
              that highly formal poetry often lacks. Tightly rhymed poems (even when as subtle as Edgar’s) can occasionally have an ‘ingenious’ quality
              about them, where the reader is paying more attention to the technique than to the ‘substance’ of the poem. They can also involve complex
              syntax that can sound more like a legal argument than an outburst of lyricism. The reader’s reward for successfully negotiating such a poem
              may have more in common with the successful completion of a Times Literary Supplement crossword than with the ‘spontaneous overflow of emotion,
              recollected in tranquillity’ of which Wordsworth spoke. It is interesting that in this context Edgar’s most ‘typical’ poems are not those
              that stay in the reader’s mind longest. The default ones tend to be clever and persuasive descriptions of weather (wind, in particular)
              or of estuarine or marine vistas. The final lines of ‘Summer’ are a reasonable example: Almost without A cloud, the unimagined sky annuls
              All qualms across the bay’s embellishment Which it exults above – except, far out, A white dismay among the feeding gulls Of course, taking
              an excerpt such as this from an almost fifty-line poem is hardly fair. It’s easy to appreciate, however, the sheer metaphorical energy of
              the ‘white dismay’ among the gulls and, likewise, the ‘unimagined’ sky that ‘annuls / All qualms’. So too the evocative and comprehensive
              imprecision of the ‘bay’s embellishment’. It should also be remembered that the ending here is a consolatory contrast to the boredom and
              monotony suffered by hospital patients earlier in the poem. The drinking vessels and the get-well cards Again, again the faces drained of
              hours, Emptied by their waiting even of boredom Subsisting in their realm of four o’clock. In ‘Summer’, it’s more than obvious we are in
              the hands of a highly skilled poet, and that’s a good place to be at any time. It is even more satisfying, however, to read a smaller number
              of unforgettable Edgar poems that focus on something outside the poet’s usual sensibility. Poems of this degree are most often encountered
              in Lost in the Foreground (2003), Other Summers (2006), and History of the Day (2009). They involve suffering (or a postlude or prelude
              to suffering) in other countries and times. Interestingly, they also involve ekphrastic accounts of photographic images. Three stand out:
              ‘Sun Pictorial’, ‘Living Colour’, and ‘Memorial’. ‘Sun Pictorial’ deals with how many of Mathew Brady’s photographic plates of the US Civil
              War were afterwards used to build greenhouses. Earlier in his poem, Edgar evokes the conflict’s gauche onset Of murderously clumsy troops
              Dismemberment by cannon before concluding with how the sun each day ensured the soldiers ordered histories of the war Were wiped to just
              clear glass and what the crops transpired. More telling still is Edgar’s account of recently discovered footage from pre-World War II Munich.
              In colour too As bright and vivid as delirium. It seems a kind of fault In history and nature to restore This Munich underneath the flawless
              blue Of mid-July in nineteen thirty-nine This pageantry of party-coloured kitsch The Fuehrer, with his bored assessing gaze A third example
              is ‘Memorial’, a careful scrutiny of the well-known photograph ‘The lynching of Rubin Stacy, 19 July 1935’. After a more general description
              of the crowd, Edgar zooms in on A girl of twelve, maybe, too unaware To mask her downward grin before, at the poem’s end, moving on to:
              The days that have to be the day that’s been Lighting forever everything she knows With what she saw, and knows she saw, and knew It is
              poems of this subtlety and drama that, for this reader, are the highpoint of Edgar’s career. What then of the book’s opening section, ‘Background
              Noise: New Poems’? There’s no doubt that Edgar’s technical standards here are maintained, or even extended a little. The observation is
              just as sharp and cleverly rendered as usual, but there are not many poems as gripping (or distressing) as the ones just referenced. The
              poems here are often philosophical, concerned with ‘background’ issues such as the nature of time and our place in the cosmos. Occasionally,
              there is a more personal (though hardly confessional) poem that has a more emotional than speculative thrust. ‘Possession’ is one example
              – where the poet is clearing out the house of a recently deceased old woman, almost certainly his mother. He tells of how: We emptied out
              the lot Some to distribute much though to discard. And so she was herself, after that stroke Emptied out: for four years there is not One
              thing she owned that is not torn away The Strangest Place thoroughly justifies Edgar’s impressive poetic reputation. He certainly does have
              the formal control and poise of which people speak. And in addition, from time to time, without warning, he can move you very deeply. POET’S
              VOICE SARAH HOLLAND-BATT Formality within the frame Stephen Edgar. The Strangest Place: New and Selected Poems. Black Pepper, 2020. Weekend
              Australian REVIEW DECEMBER 12-13, 2020 As free verse continues its reign well into the twenty-first century, formal poetry still finds itself
              in the minority. It’s been derided in some quarters for being elitist and conservative, clinging to outdated ideals—yet celebrated in others
              for bringing poetry closer to music, and for exhibiting a discipline and technical artistry that free verse supposedly lacks. The tensions
              between free and formal verse are as fiercely held as they are unproductive. As the American formalist Dana Gioia once wrote, “only the
              uninformed or biased can fail to recognise that genuine poetry can be created in both modes.” But Gioia’s conciliatory tone was short-lived;
              in the very next paragraph of the same essay, he railed against “the debasement of poetic language; the prolixity of the lyric…and the denial
              of musical texture” in contemporary free verse. So much for a ceasefire. This week’s poet, Stephen Edgar, is doubtless Australia’s finest
              formalist writing today, and makes a persuasive case for the enduring power of formal poetry; his eleventh collection, The Strangest Place:
              New and Selected Poems (Black Pepper) features extracts from the poet’s previous ten volumes, along with a book-length selection of new
              work, “Background Noise.” What is impressive about seeing thirty-five years’ worth of Edgar’s poetry together is its remarkable thematic
              and stylistic continuity, though the later poems feature slightly more linguistic embellishment and philosophical complication. His influences—chief
              among them, Auden, along with Richard Wilbur, Frost, Larkin, and others—remain constant touchstones. While Edgar has made the odd foray
              into the realm of narrative—most notably in his collection Eldershaw —he primarily writes introspective, metaphysical lyrics, focussing
              intently on transience and loss, memory, mortality, and the future. His poems are seeded with repeated motifs of apertures - filmic and
              photographic lenses, windows, mirrors, reflections and other viewfinders proliferate—suggesting that Edgar sees the poem is an act of framing;
              there is also a strong emphasis on music and art. Often, Edgar’s poems arrive as tableaux, in which time is stilled as the poet unpacks
              a moment in slow-motion; their vistas are at times microscopic, and at others galactic, looking up into interstellar space. Rather than
              writing in established forms, Edgar mostly devises his own metrical and stanzaic constraints. He favours sestets and septets (six and seven-line
              stanzas) which he arranges according to his own invented rhyme schemes. Rather than using predictable envelope rhymes (an abba rhyme pattern)
              or alternating rhymes (abab), Edgar’s end-rhymes are often spaced further apart, so that they are felt less heavily. They are also almost
              continually enjambed, flowing gracefully over into the next line without the heavy pulse of a caesurae. Take, for example, this stanza from
              the poem “Coming Up from Air,” which is fully rhymed, yet moves fluidly due to the continuous enjambment, and the postponed rhyme of “eyrie”
              and “theory”: And there we went: that night, Dinner with friends, perched in their top-floor eyrie, Watching the sky recite The sun’s late
              lessons in the clouds and preach Its pyrotechnic theory Over the revellers on Coogee Beach. There are many established six-line stanzaic
              forms—from the sestet that rounds off the Petrarchan sonnet to the Venus and Adonis and Burns stanzas—but none use the same rhyme scheme
              Edgar uses here. I can think of only a handful of poems that use this abacbc scheme: Elizabeth Bishop’s love poem “The Shampoo,” George
              Herbert’s “Peace,” and a section of W.D. Snodgrass’s Heart’s Needle . Edgar’s self-determined forms also give his poems a nice tension between
              familiar and unfamiliar patterning; it’s only after reading a few stanzas that you work out the rules he’s invented for himself. His technical
              prowess lends his poems an ease that all formalists aspire to, but few achieve: while he adheres to rigid structures, he does so lightly
              and unobtrusively. Although they are often cleverly camouflaged, I get the sense that Edgar’s rhymes are nonetheless the driving engine
              of his poetry. He is expert at finding original full rhymes—a tricky affair, given how shop-worn so many rhymes in English are. There’s
              the perfect chime of encrypts and eucalypts in the poem “Apprehensions,” azalea and regalia in “The Peacock’s Response,” concertina and
              the Italian composer Palestrina in “Analogue,” and—my favourite— limousine and Anthropocene in “Mise en scene,” all of which deliver the
              jolt of pleasurable recognition that a well-executed rhyme should bring the reader. And his poems are dotted with mosaic rhymes too—where
              rhymes span more than one word—as in drowse of sense and recompense in “All or Nothing.” At times, this garners the poet comic frisson,
              as in the chime between unnerve us and BBC World Service in the poem “Letters of the Law.” This week’s poem, “The Shadow Line,” shows Edgar’s
              signature technical powers at full tilt. Prompted by a passage in Ian McEwan’s novel The Children Act , it contemplates a distant future
              in which the earth has been rendered inhabitable, and the record of human life inheres in a compacted “six-inch sooty layer” remaining on
              an otherwise-dead planet. You’ll notice that the poem unfolds in septets, each slightly tapered at the beginning and end, written entirely
              in iambic meter: the first line in trimeter; the second, tetrameter; before the poem billows out into four lines of iambic pentameter; then
              contracts back to tetrameter again. The rhyme scheme—abacbca—reflects a similar shape: the initial a rhyme returns one last, unexpected
              time on the seventh line, a belated third echo of a rhyme which has already been resolved. It’s a form that teases a faint resemblance to
              the rhyme royal stanza—a septet of iambic pentameter with an ababbcc rhyme scheme—but Edgar only gears up into pentameter for four out of
              its seven lines, giving each stanza a looser feel as his line lengths vary. We begin as the poet contemplates earth as a “final star” which
              has been “surpassed / and cancelled.” He juxtaposes human time—described metaphorically as both a “mayfly’s one transparent day in flight”
              and “nothing but a background hum”— against the vastness of interstellar time and space. Swiftly, in a single stanza, human endeavours are
              collapsed into residue: “Plastics and pipes and wires and ticking meters, / The deathless works, the missiles on parade, The Sphinx, the
              Floating Taj Mahal, St Peter’s” become “half-lives haunting our bequest.” As the poem draws to a close, the poet contemplates the possibility
              of a “mere grain, one molecule” residing in all that rubble that an interstellar traveller might find one day as evidence of the poet’s
              existence: “the wattle leaves whose shadows pool / On a desk this afternoon, and brush across / The hand that’s poised above this page.”
              And as the poem closes, we’re gently reminded of the poet’s presence just beyond the poem’s expertly constructed frame. Sarah Holland-Batt
              is a poet and an associate professor at the school of creative practice at the Queensland University of Technology. Poet’s Voice receives
              sponsorship from The Copyright Agency and the Judith Neilson Institute for Journalism and Ideas. She can be contacted at sarah.hollandbatt@qut.edu.au
              . Shadow Line And there it is at last, The last one gone, the final star, The term of its self-fuelled fire surpassed And cancelled. Nothing
              but a background hum And darkness stretching through the nebular Detritus into spans of time to come More incommensurably vast, Next to
              the reign of light, Than Earth’s deep ages set beside A mayfly’s one transparent day in flight. But hale those aeons back and see the face
              Of the dead planet swept and scarified By strobe-lit storm clouds and red gales that chase The skyline as the days ignite. Just a few feet
              below The stripped and lifeless regolith, A narrow, blackened band would put on show The fruits of our endeavour, a footnote To the grand
              tale we’d left to reckon with, A six-inch sooty layer laid down to quote From that portentous folio: Interred there and compressed, The
              residue of all we’ve made, Roads, sewers, factories, vehicles, would attest, Plastics and pipes and wires and ticking meters, The deathless
              works, the missiles on parade, The Sphinx, the floating Taj Mahal, St Peter’s, The half-lives haunting our bequest. And so one might presage
              That a mere grain, one molecule That some outrider from a distant age Sifted from all that indeterminate dross, Might be the wattle leaves
              whose shadows pool On a desk this afternoon, and brush across The hand that’s poised above this page. Back to top [if gte vml 1]><v:shapetype
