melbourne-elegies:
    title: Melbourne Elegies
    author: K.F. Pearson
    short_description: "...Pearson is a complex figure and has in these Melbourne Elegies produced an equally complex text...."
    long_description:
        Melbourne Elegies being an adaptation and extension of Goethe ’ s Römische Elegien is K.F. Pearson ’ s sixth collection. The
        sensibility is fascinating, with the shadow of the German poet in Melbourne. ‘ A work in that tradition of modern verse translation where
        the poet also translates cities and times ’, a homage both to Goethe ’ s Roman Elegies and to Melbourne. The German poet's discovery of 18th
        century Rome and of erotic love are re-mapped in a rediscovery of Melbourne after a long absence. Pearson ’ s inner city is alive with characters,
        observations and bars, although ‘ it ’ s all thin as smoke compared to my knowing you ’. It ’ s a very sexy book; hardly anyone is willing
        to be tender about another person. There is nothing like it in Australian poetry.
    price: 21.95
    isbn: "1876044241"
    release_date: "1999"
    page_count: 62
    reviews:
        - title: Ulitarra Review
          text:
              "Two Very Different ‘Melbourne’ Dreamings Paul Cliff Ulitarra , No.17/18, July 2000 Two books [Alex Skovron, Infinite City: 100 sonnetinas
              , K.F. Pearson, Melbourne Elegies ] from Melbourne-based poets present two very different ‘cities’, though with an unexpected resonance...
              As a Melbourne-based poet, Skovron has concocted a largely ‘detached,’ conceptual and metaphysical city, with little specifically tangible
              of Melbourne itself. The opposite approach is taken by his co-citydweller K.F. Pearson who, in his sixth collection, Melbourne Elegies ,
              positively seeks out and delights in the city’s physical specifics. (The book indicates Pearson to be a principal of the lively Fitzroy-based
              Black Pepper press, whose numerous publications, listed at the back of the book, include Jordie Albiston ’s well-received The Hanging of
              Jean Lee .) As advised by the collection title, Pearson’s departure point is the ‘Eternal City’, Rome - or rather Goethe’s eighteenth-century
              rendition of same in his Roman Elegies . As against Skovron’s imposed ‘fractalisation’, there is less multiplicity of voice in Pearson’s
              sequence - though still a striking stretch of tone. According to Hugh Tolhurst’s Introduction, the genesis of the work lay in Pearson’s
              finding (after a number of years publishing translations of Goethe’s Roman Elegies ) that his return from Adelaide to his native Melbourne
              held resonance with ‘the great German poet’s [own] discovery of Rome’. The poet is constructed as ‘dreaming a personal portrait of the city
              where he lives’ - with some poems in the series being close translations of Goethe’s originals, some mixing Pearson’s and Goethe’s voices,
              arid others again being completely new, ‘non-Goethian’ additions or departures. In total, Pearson makes 40 elegies, compared to Goethe’s
              original 20. The sequence, in which rhyme is rigidly eschewed, ranges from childhood remembrances of yabbying with his mother’s colander
              in the pond at Caulfield Racecourse (‘Yabbies’), to relaying an anti-gambling pronouncement by the city’s head Anglican cleric (‘Archbishop
              Rayner’s Prayer’). Along the way it incorporates references to the city’s tradition of great editorial cartoonists (Leunig, Tanner, Spooner...),
              ‘Ms Ania Walwicz’s Cat’, and the Melbourne Comedy Festival. Frequently (as in ‘The Sun, Like Arthur Boyd’), the Melbourne detail and vernacular
              mode is hitched to a bigger, more formal, declamatory and oratorical mode apparently echoing Goethe’s original: ‘Already I regard / St Georges,
              Brunswick and Johnson streets as my spirit places. / Oh, god, tolerate me here! Cruel time will lead me later, / in a miserable cortege,
              down to a final place’. Admittedly I haven’t read the Goethe original, but Pearson’s collection seemed to gather momentum nicely as I proceeded.
              The range mixes introspection (as son, or lover) with more direct, public invocations to the poet’s fellow cityfolk, and at some points
              the evocation is emphatically sensual. (Although, as I say again, I haven’t read the Goethian model, I’d hazard a guess that Pearson’s evocation
              of the beloved in ‘Green Grocer’ - ‘your clit upon my finger... / entering you from behind... your welcome lovely closure round my cock’
              - doesn’t religiously follow the master’s own tone.) There is also the effective transition from the lyrical to the physical in ‘The Kimono’,
              with its refrain: ‘you move in silk like fishes do in water’, crossing to the unexpected evocation: ‘And he followed fish. And he kissed
              her matutinal cunt’. There is a nice modern playfulness across the series - in titles (‘Artist With Formguide And Papaya’), or the odd,
              sometimes ‘beat-ish’ line: ‘console me, tungsten, thin ambassador of the night’ (‘Lamplight’). Whitman’s New York is of course an earlier
              contriving of the metropolitan metaphor, and the great Manhattan cityman seems to nudge in at points in both Skovron’s and Pearson’s sequences.
              (In the conception of Skovron’s universal ‘singer’ in ‘Credo’; and more directly in the tone of Pearson’s ‘Jury Duty’: ‘Nor you, my intimate
              juror, whom I debrief at the end of the day. / If I had never before, I would love you extremely from now’.) And finally, for all the vast
              difference of technique and intent, Pearson’s sequence closes in a way oddly empathic with Skovron’s, both poets toying with the metropolis’s
              - or Life’s - protean nature, and the issue of its ultimate meaning or unity. Pearson’s romantic invocation in his closing poem, ‘Prayer’
              (‘Melbourne provide us with friends, arms still of those whom we care for. // At the closure of life, yours or mine, make certain the whelming
              of love / remains at its apex of flow, revolving the ball of the world’) is not unreachably distant from the life-affirmative spirit of
              Skovron’s penultimate poem, ‘Credo’: ‘And I really do believe in such a thing / As purity of heart... / I want to sing / The simultaneous
              truth of truth and illusion; / The city’s endlessness, the soul’s profusion’."
        - title: Cordite Review
          text:
              "Melbourne Elegies Charlotte Jones Cordite , No. 6-7, 2000 (pg. 32) Having recently been on a trip to Melbourne K.F. Pearson’s poetry
              serves as a more poignant evoca­tion of those few days than the photos we forgot to take. A camera can often be a rough and clumsy tool
              with which to record experience. In the amateur’s hands it all too often creates cliché, reproduces the familiar and safe. Or worse, serves
              as some kind of lingering colonial impetus, the need to stamp ourselves on landscape, a frozen proof that we have, indeed, been there, done
              that. K.F. Pearson’s Melbourne Elegies , on the other hand, pays homage to the city through a very personal and original lens. I’m fully
              elated now, inspirited on Brunswick Street; I’m captivated by articulate past and present here, now that I follow my bent, and go through
              the works of the old poets with eager hand, daily with original pleasure. So begins ‘Unemployment And Its Friends’, a joyous cele­bration
              of alternative culture, alternative experience. Pearson suggests this unprescribed way of living allows for greater learning experiences,
              specifically an intense aware­ness of the sensual. The artistic, intellectual pleasure of tak­ing in the words of poets by day is transferred
              to the heady pleasures of flesh by night. Learning is a continuum, an experience that cannot be broken into discrete entities frames (to
              hark back to the metaphor of photography). Pearson’s poems repeatedly move from the political to the personal. ‘Crossing The Yarra’ questions
              the wisdom of a life dedicated to material wealth. Pearson suggests that love is purer in the absence of material distractions because there
              is no pretty wrapping paper to sustain illusion; ‘Corporate Boxes, Society Balls and Casinos, the Porsche and Lamborghini’. ‘Portsea and
              South of The Yarra’ revisits this territory, moving from a rejection of the showy (equated with the false) to embracing the restorative
              healing power of love. Pearson is at his best when tackling the personal and this he does in ‘Ms Ania Walwicz’s Cat’. It is a small tableau
              of a poem that begins with a potentially banal experience (the illness of a cat) and ends with the awakening desire in a Fitzroy bar. The
              success of this poem lies in its simplicity. It does not seek to cover the whole gamut of politics and social ills that Pearson attempts
              in other pieces. Woven into the narrative of the sick cat and the meeting between Pearson and the unamed friend of Ania’s is the idea of
              com­munity and friendship. The reward for helping another out is the possibility of new friendships and ultimately love. The friend’s deed
              has made her literally glow, ‘The plane of her friend’s right cheek held all May’s declining light’ which is immediately translated into
              desire by Pearson. While Pearson could be accused of sentimentality and occa­sional wordiness at times, it is hard to deny his deep seated
              attachment to his subject matter: Melbourne and the curi­ous eclectic whirr of Melburnian life. Now and forever, at mornings or in the evenings,
              in the long times let us reach like our ferns in their canopied shade for the light ‘Prayer’ In the final poem of Melbourne Elegies, ‘Prayer’,
              KF Pearson makes an emotional appeal to his reader to cele­brate and hold sacred love’s bonds. Melbourne is attributed with providing a
              community in which this is possible for those prepared to make the life long commitment. At the closure of life, yours and mine, make certain
              the whelming of love remains at its apex of flow, revolving the ball of the world. ‘Prayer’"
        - title: Antipodes Review
          text:
              Echoes of the object of affection K.F. Pearson, Melbourne Elegies Bev Braune Antipodes , Vol. 13, No. 2, December 1999 If we are to
              judge K.F. Pearson’s Melbourne Elegies as a translation and ‘extension’ of Johann von Goethe’s Romische Elegies it will not enlighten us
              to love Goethe’s 24 elegies, which the German poet wrote between 1788 and 1790 to a widow with whom he had an affair while in Rome. It may
              be best to regard the collection, as Pearson tells us, where ‘translators find an echoed life, then theirs’ (61). It does not serve the
              reader well to compare Pearson with Goethe except by a Wittgenstinian resemblance in the way that Pearson has indicated. In a stricter comparison
              we will find ourselves overwhelmed by a lack of exacting claims regarding a sensitivity with language to which Goethe held. J.B. Leishman
              and Stephen Spender’s translation of Rilke’s Duino Elegies (1975), elegies which were sent by Rilke to Princess von Thurm und Taxis, demonstrates
              that translation from the difficult German language is neither necessarily unchartable nor unsatisfying for the reader in English. Perhaps
              Pearson’s translation is held back by an uncomfortable mixture of the colloquial and classical that renders his remaking of Romische Elegies
              in Melbourne problematic, and creates the difficulties in Melbourne Elegies in poems such as ‘Lamplight’, ‘Unemployment and Its Friends’,
              and ‘Portsea and South of the Yarra.’ In telling us how he finds his life in the echoed life, does Pearson tell us too much or too little?
              Or both? His timing makes it difficult to follow either quarrel as a distinctive distraction over the other, as in ‘Late Arrival’. On the
              one hand Pearson seems to be ‘representing’ encounters with his lover while on the other he ‘presents’ Goethe’s elegies, which were about
              Goethe’s lover. There should not be any difficulty in this, as philosopher Vincent Tomas has argued, because the creative work is an embodiment
              of expressive qualities that make it tricky for readers to distinguish between the two when speaking of their emotional response to the
              work. But it seems that Pearson is caught between the two, if that is possible. Melbourne Elegies is an intriguing collection of poetry
              for this very reason. We find ourselves searching with the poet for an illusive, late, or anxious object of his love. She remains strangely
              insubstantial, considering the hold she has on him. It seems that Pearson is embracing an erotic figure of the mind rather than Goethe’s
              compelling ‘Faustina’. Not all of Melbourne Elegies falls into this category, for poems such as ‘A Roll Call’ and ‘Green Grocers’ stand
              out in their striking passion. It is in ‘On the Death of His Mother’ that a female figure comes to life and brings us back to Pearson’s
              statement that the life found (Goethe’s) is merely an echo, while his (Pearson’s) is the real. Poems that focus on what is sensuous in Melbourne
              (‘Green Grocers’) also succeed in bringing to life some aspects of the poet’s framing. Most seem to remain hampered by the ‘echo’, not quite
              finding their footing in embodying the object and subject as a whole picture... Echoes are also the concern of Ouyang Yu, a poet in search
              of his place in the whole picture in Songs of the Last Chinese Poet ... Songs of the Last Chinese Poet discovers the abandonment of the
              sublime. Landscape does not reveal what is hidden so much as require to be upturned, while Melbourne Elegies attempts to elevate clandestine
              encounters in a pub to that of sublime self-revelation. Ironically, Pearson and Yu, both writing out of Melbourne, attain similar conclusions
              - that of contemporary man’s aiming to control the uncontrollable, self-impaled on desire.
        - title: Sidewalk Review
          text:
              "Earth has not anything to show more fair: songs of the city Melbourne Elegies Brian Coghlan Sidewalk , No. 3, August 1999 There are
              cities and, of course, cities. Wordsworth thought there was nothing like a view from the bridge: London on a nice fine morning. Proust’s
              vision of Paris is a mosaic of multiform moments and fleeting impressions. Robert Musil had no particular affection for imperial Vienna.
              But his evocation of it transcends systems, regimes, language and culture. With Lubeck and Danzig Thomas Mann and Gunter Grass created myths
              which are simultaneously concrete, real and lasting; but they also give us the quintessence, ageless aura and piling up of the accumulated
              past. In some ways such myths of the city become more real than the passing view or ephemeral experience of both resident and visitor. In
              yet other ways we may be disappointed or at least disenchanted when, say, Alexandria in the here and now fails to live up to or equate with
              Cavafy’s stereoscopic vision of the city. Not that the myth of the city, any of them, has the function of gilding the lily or touching up
              the picture. Lawrence Durrell’s myth of Alexandria is full of beauty, true; but also of corruption, decay, foul smells and fouler practices.
              Perhaps Hugo von Hofmannsthal was quite near the target when he said that Rome in rottenness and decline was still full of unrealised possibilities.
              A good poet, or so one might think, can catch these myriad possibilities, sensations, habits and happenings: all suspended, recalling Neville
              Cardus’ wonderful phrase, in the magic hour-glass at noon. With Melbourne Elegies , then, K.F. Pearson is in stellar company. But he has
              at least two things going for him before he starts: first - a self-deprecating and ironically humorous perspective on all and sundry, beginning
              with himself. For while these poems are self-styled ‘elegies’ there is absolutely nothing in them of the conventionally elegiac. Not, at
              least, as far as this reviewer, who is inclined to luxuriate in soft-focus melancholy, can discern. And then: as Sancho Panza, while Don
              Pearson wrestles Melbourne down onto the dissecting table, he has Johann Wolfgang von Goethe. Only with difficulty, and writing as a superannuated
              Germanist , do I restrain myself from writing simply ‘Goethe himself’. For Goethe has a place in German literature which has no equivalent
              elsewhere. It was, again, Hofmannsthal who observed: ‘We have no literature; we’ve got Goethe and a lot of little buds.’ But Goethe and
              - not Frankfurt his birthplace; not Weimar, ‘Court of the Muses’ and Goethe’s home for fifty-seven years - Rome ? For Pearson unequivocally
              adapts and extends Goethe’s Romische Elegien . In order to understand Pearson aright and also, I think, to do him justice, the story is
              worth telling. For it has a certain exemplary quality which, as time grinds on, one takes more and more to heart. As, evidently, does Pearson:
              ‘And I’m not as young as I was, nor lonely:...’ In 1786 Goethe’s legendary youth was well and truly behind him. At thirty-seven he seems
              to have been thinking ‘What if all be error?’ At twenty-five, with Werther , he had become celebrated throughout Europe; and a rather dubious
              role model as well. His early poetry, most notably that recording his ‘Strassburg idyll’, had re-created German as a poetic language. Now,
              ten years on, ten years as minister-for-everything at the ducal court in Weimar, he was finding good manners and behaviour ‘ comme il faut
              ’ rather trying. His affairs with the aristocratic Frau von Stein - was it sex, was it spirit? - was terribly worthy; but, to libido and
              spirit alike, increasingly stultifying. At all events, and greatly to the scandalised reaction of the court, the great Goethe simply broke
              out. Telling nobody he simply upped and went. South to Austria, over the Brenner, down into Italy, to Rome, Naples, Sicily and back to Rome.
              In Rome, particularly, he thawed out. Of course: the cynic in one’s psyche, plus, doubtless, the monstrous regiment of women, says simply:
              midlife crisis; Goethe off with the birds and the bees; beads and bangles and the old ‘ Sturm und Drang ’ gear taken out of mothballs. Yes
              of course. But there was more to it than that; there often is. In Italy Goethe was seeking, and actually thought he had found, some kind
              of ideal synthesis between flesh and spirit. To what extent his nightly revelatory adventures with ‘Faustinia’, a young and eager Roman
              widow, are hard fact doesn’t really matter much; any more than his intense and fairly well documented liaison in Milan on the way home.
              One thing is certain: the classical world - he was always seeing ancient and imperial Rome behind the present-day façade; it was, after
              all, Gibbon’s era too - gave him new life. Moreover, he came home mid-year 1788, resolved to put his old well-mannered, emotionally constricted
              life behind him. Clearly what a Marxist critic long ago called the ‘stifling petit-bourgeois climate of the Weimar court’ was not conducive
              to Goethe’s projected change-of-life. But, as Dickens says somewhere, ‘a man might try’. And Goethe did. He did two things. The order in
              which he did them doesn’t really matter. Christiane Vulpius was the sister of a man who wanted something from Goethe. Again the details
              don’t matter here. Goethe seem: to have been entranced. Christiane was beautiful - or at least pretty - straightforward, sensual and trusting:
              Goethe saw her as a child of nature She joined him in his house, first as partner and then, much later, as his wife. Quite obviously, and
              Goethe knew this, he was trying to repeat, re-run, his Roman idyll. His devotion to Christiane and hers to him is remainingly touching;
              and more than that. At the same time all this was happening Goethe wrote the Römische Elegian / Roman Elegies . I suppose one might say
              it was emotion recollected in tranquillity; except that in his case the present emotion went on and on. You can imagine the scandal. The
              chit-chat became legendary: from the grand Duke, Goethe’s friend, to the affronted ladies of the court, from the Herders to Schiller’s wife...
              everyone had an opinion. But Goethe was, after all, Goethe; and he survived it. So, no less to the point, did Christiane. So: Goethe’s retrospective
              view of Rome, but presented as a sentient present-day continuum, is a well-nigh perfect amalgam in which a classical cultural perspective,
              sensual intensity and a nicely sceptical self-irony hold a rather precarious balance. But ‘precarious balance’ is the story of Goethe’s
              life. He was still trying to get his diverse facets, claims and urges together when, with the Marienbader Elegie in 1822, he finally decided
              to ‘put the tools away’, as a plain-spoken English critic put it. He gave up girls but had no difficulty writing a lot more poetry... Pearson
              is thus on sure and well-trodden ground; and he knows how to take best advantage of the fact. The framework of the Römische Elegian constantly
              peers through his text; wryly, appraisingly, relativising it all: I cannot yet perceive the way or road that I will travel, day in, day
              out to her and back while precious time slips by. Pearson’s ability to fuse outside panorama, the day’s diet of sights and sounds, meaningful,
              trivial or irrelevant, which makes up all our days - is balanced, sometimes indeed overborne, by his love: love straight, sensual and wholly
              open. And why, of course, shouldn’t it triumph over all? There is, at one and the same time, something fine, frank and happily middle-aged
              about his love. ‘I love you with the red glow of age’, says Paul Hindemith’s Mathias the Painter, [Paul Hindemith (1895-1963), Mathis der
              Maler (Mathis the painter), Opera in Seven Pictures (1935)] and is able simultaneously to stand outside himself. Pearson is very close indeed
              to Goethe when he says: We’re not even always kissing; we often talk sensible talk; when her sleep comes upon her I lie and contemplate
              much; indeed in her arms I will often make poetry up: the hexameter measure with fingering hand I gently tell out on her back. She breathes
              in her lucid sleep and her breath inhabits me down to the depths of my being... This, of course, is one of Goethe’s most celebrated images:
              it embodies his longing for passion - and control, content unlimited - and absolute form: the fusion, perhaps, of what Schiller called ‘sentimental’
              poetry (himself) and ‘naive’ poetry (Goethe). Pearson, though, is probably to be preferred when he lazily watches his risen love re-kindling
              the morning fire. Here concrete reality and timeless symbol become one. Pearson’s Melbourne is part impressionism, part pointilliste -precision,
              part panorama. Some images are apt, resonant and wholly unforgettable: Awful governments legislate budget cuts throughout the night. Platypus,
              good nocturnals, forage as they’re wont to do. A Master Builder dreams a tower to frighten Qantas off its path. We, second storey, wake
              beside green leaves on a ginko tree. There is barely - but finely - controlled passion and moral rage in ‘John Cargher’s Singers of Renown’.
              Here Pearson captures not so much the daily round as the common lot. Perhaps this too is an insight that comes only with the bitter reality
              of middle-age: I know it is difficult for us to preserve our good name when detractors bring us rumours from our past, the spending spree
              when manic or double cross of a friend. These are old histories, and never told in full. But Pearson’s clear-eyed realism and frankness
              never give way to gloom, nor to that luxurious seduction of the ageing: self-pity. His evocation, on her death, of his mother encapsulates
              a whole epoch. His recollection of the ‘Brownlow Medal of sausage rolls’ rang the bell with this reviewer who in another existence was a
              permanently bedraggled and disappointed supporter of Aston Villa. I think, in brief, it is Pearson’s wide-angle view of Melbourne, plus
              the sudden zoom lens and narrow focus, that goes on echoing in the mind. Inevitably I find myself comparing and seeking equivalents. Bruce
              Dawe is a possibility; so too, I suppose, is Les Murray, though Pearson is without the rather aggressive sense of rectitude that I, at any
              rate, detect in our unofficial laureate. But perhaps that’s only because I’m a Catholic too... In any case though: looking for comparisons
              on the Australian highway might be a bit of a cul-de-sac. I think it could be more productive to see Pearson in the same sort of civic contexts
              as, say, Cavafy, Brecht in Berlin, or particularly Josef Weinheber (1892-1945). Weinheber’s star is presently in eclipse; his spiritual
              proximity to the Nazi ethos, and subsequent suicide, have always made it difficult to see him untrammelled. But his Vienna poems, Wein wörtlich
              (1935) are unique in their multi-perspective view of the city. Weinheber veers unpredictably and with total conviction between nostalgia,
              homesickness, playfulness and parody. And he has his own ‘voice’. Hofmannsthal, another incurable if also very critical Viennese, observed
              that a dialect doesn’t give you another language, but it can give you a voice of your own. This is Weinheber. This, I think, is Pearson.
              I should like to hear him reading, unselfconsciously intoning these verses. I once heard Henry Krips give a full-length reading of Weinheber’s
              poetry. Henry, of course, was a total ‘Weiner’, unblemished, unrepentant (why should he be?) and deeply soaked in Viennese Kultur ancient
              and modern. [Henry Krips (1912-1986) was for many years (1949-73) conductor of the Adelaide (at that time ‘South Australian’) Symphony Orchestra.]
              As he read Weinheber you heard the voice of the city, the over- and undertones, the colours and habits and sibboleths, the big horizon and
              the backyard bigot. Vienna, for better or for worse - very much the better where I am concerned - has never been, or at least seemed, the
              same since. I think, in sum: Pearson has his own ‘voice’ in Melbourne Elegies and one wants to hear it again and often. I don’t think poetry
              has given me so much sheer pleasure since I discovered Ulla Hahn. But that is another story."
        - title: Australian Book Review Review
          text:
              "Urbane Poetry Martin Harrison Australian Book Review , No. 211; 1999 The problem with K.F. Pearson’s Melbourne Elegies is that Goethe
              - on whose classic of sex-tourism, Roman Elegies 1788-1790 , these rhetorical, literary poems are loosely based - is Goethe: difficult to
              translate, still little read in English. It gives him problems. Pearson, to my mind, is not attempting a Poundian ‘replacement’ of an ancient
              text within the framework of a contemporary poetics. That would require a reckoning with the original poem’s logistics and context similar
              to the way that Pound’s Propertius speak electrifyingly in the context of an Empire much later than the Roman one he wrote for; or in the
              manner that Christopher Logue has recently converted excerpts of Homer into a form of late 20th century literary cinema. Such replacement
              requires that the contemporary poem convince us that the original work’s ‘loss’ - a ‘loss’ produced equally by its inaccessible aesthetic
              no less than by our contemporary lack of language-skill and culture - should matter to us. Pearson, however, nowhere tries to persuade us
              that we need Goethe or indeed need the Roman Elegies ’ signal achievement-their re-location of classical measure, classical myth and classical
              amorality in the minds of the then contemporary German audience. Pearson’s aim is to convince us, rather, that we need a wine-drinking,
              amorous, humane, Melbourne-based Pearson - all written up via the writer’s urbane, somewhat unusual enthusiasm (very Melbourne) for Goethe’s
              poetry. Melbourne Elegies is, in other words, that most ancient of poem-forms, pastiche. But how - if you have surrendered a larger critical
              logic, if, that is, you have no equivalent to Pound’s, Lowell’s, Zukofsky’s, Logue’s critically motivated form of updating - do you effectively
              pastiche an exquisite, remote, still lively yet decidedly foreign poem? All too often in Melbourne Elegies where Pearson attempts a literal
              transcription (Goethe’s ‘ Sehe mit fühlendem Aug’, fühle mit sehender Hand ’ / ‘see with a sentient eye and feel with perceptive hand’-
              Pearson) the talkative economy of Goethe’s acquired ‘classicism’ is turned into standard ‘translatese’. Likewise a variation like ‘I’m really
              elated now, inspirited on Brunswick Street’ (Pearson) is neither good Goethe (it is the rather famous ‘ nun auf klassiscbem Boden begeistert
              ’) nor good bathos. Inspirited? Worse, lines like ‘In the morning she will languorously leave our passionate bed’ or ‘Though its elasticity
              were (sic) going the fireside couch was quite hypnotic’ or ‘And he kissed her matutinal cunt’ are neither Goethean nor poetry. It’s a pity.
              I’m no supporter of Poundian methods. A poem which drew expertly on Pearson’s skills as a poet and his knowledge of Goethe (many of these
              poems started off as more than adequate translations) would be a marvellous thing. Melbourne Elegies , however, all too often literalises
              the tone of Goethe into a persona-voice which is at once intimate and fulsomely artificial, erotic yet verbose. Pearson seems stuck with
              it - overshadowed by Goethe, ventriloquising his metres - but unable to do more than gesture (in ‘Miss Ania Walwicz’s Cat’ or perhaps ‘Elegist
              to Reader’) at Goethe’s Latin models. But Goethe’s poem is full of darkness and ironies - the elegy on syphilis, for instance, the final
              elegies about going public and abandoning his love. And he has what his Latin originals outstandingly have - a sense of the metrical instant,
              a sense of vivacity in time and of its brevity. (It’s all said in Zukofsky’s ‘ Peri Poietikes ’: ‘Look in your own ear and read.’) Mainly
              long, often very long ‘happy’ moments capture Pearson’s attention: robust sex (straight), lots of undressing and clit, Jeff Kennett hate-sessions.
              Melbourne’s clearly a better place than Rome. Doubly malign, then, the goddess Typo who even there inspires ‘In Memorium’ (Sic) as the title
              of one the poems."
        - title: Geelong Advertiser Review
          text:
              Melbourne stories told in verse Melbourne Elegies - Melbourne as a Palace of Love Edward Reilly Geelong Advertiser , March 1999 In his
              mid-thirties, that wondrous poet and man of letters, Wolfgang von Goethe, fled the ‘ truebe... und schwer ’ heavens of the Germanic North
              for the clear light of the classic lands. The Roemischen Elegien sing of his delight in the sheer sensuality of life and his sense of liberation
              on reaching the ancient city of Rome. Goethe treats of many subjects, seeing Rome as the Temple of Love, the ultimate goal of the Wanderer’s
              travails, and recapitulates a number of well-chosen classical myths and using them for his own ends. This is a poetry of the highest order,
              and has been taken as a model by Pearson in this book. Kevin Pearson is a complex figure and has in these Melbourne Elegies produced an
              equally complex text, using Goethe’s poems, which Pearson had previously translated and published in journals such as Southerly and Quadrant
              . Pearson had barely escaped with his life when a mysterious and malevolent fire in Adelaide had destroyed his collections of poetry and
              music. He then returned to Melbourne in 1992. Just as Goethe saw classical Rome in the double light of classical myth and his personal eroticism,
              he found in his native city the locus for a redeveloped creativity. But, given the displacements of time and space between Eighteenth Century
              Rome and contemporary Melbourne, there are differences to be expected and encountered. Beginning with ‘Southbank’, the poet invokes the
              occurrence of ‘bluestone’, ‘terrace house’ and ‘café’, each of which go to define Melbourne’s ‘liveable’ atmosphere. Pearson’s satirical
              sense is evident from this point, for where Goethe had invoked Rome’s historied ‘ Steine ’ and ‘ Palaeste ’, Melbourne is far more commonplace.
              Moreover, where Goethe enthusiastically sees his Rome as ‘ Amors Tempel ’, our contemporary poet is stricken oddly .enough with an undefinable
              ‘ennui’ whilst ‘considering the Yarra and Gallery; and / considering a chardonnay’. What he’s waiting for is ‘love’, as to be concretized
              in an unnamed woman. The realization that without love, as Pearson rightly notes, ‘the world would be no world, nor even Melbourne be/Melbourne’.
              In ‘Crossing the Yarra’, Pearson extends his view of Melbourne as a city of love, his tone now quite Ovidian, unashamedly celebrating the
              power that this love has brought his poetry. His ideal palace of love is to be found in the unfashionable northern suburbs, far away from
              the ‘Corporate Boxes, Society Balls and Casinos’ of the South Yarra facades. But these Melbourne Elegies are more than a recapitulation
              of Goethe’s themes in a present-day setting. Rather, Pearson refreshingly extends the range and style of the poems. He remembers family
              in ‘On the Death of His Mother’ and ‘My Father My Enemy’, celebrates friends such as John Truscott and digresses on topics such as sport,
              in ‘Grand Final Week’, and music, in ‘John Cargher’s Singers of Renown’. The tone and style of Melbourne Elegies is open and breezy. It
              is a book which can be read easily, mapping out the poems against one’s knowledge of Melbourne’s landmarks. Pearson’s poems are enjoyable
              in themselves as a celebration of his loves and friendships.
the-apparition-at-large:
    title: The Apparition At Large
    author: K.F. Pearson
    short_description:
        The ghost is back in K.F. Pearson’s The Apparition At Large . Sexy without a body, caustic without a cause, a stateless commentator
        on an unfortunate eternity – it is through his deceased eyes that contemporary Australia ironically becomes alive. Enjoy his epigrams, his
        wit, his spiritual insights and aphorisms. With little poetry of this ilk produced today, The Apparition At Large deserves posthumous celebrity.
    long_description:
        If you’ve heard of me, it was a rumour. The Apparition’s Daybook as A brilliant device... Insubstantiality made palpable in
        a series of soliloquies uttered by a ghost. The Apparition of the title plays a teasing, cavalier game of negatives… defamiliarization with
        a vengeance. There are freedoms a ghost can exercise that are denied to mortals. They can observe without being observed, speak without being
        heard; they can enjoy (and suffer) separation, and they can be in time without being of it. Pearson plays a delightful puckish game. Critical
        Survey , UK The ghost is back in K.F. Pearson’s The Apparition At Large . Sexy without a body, caustic without a cause, a stateless commentator
        on an unfortunate eternity – it is through his deceased eyes that contemporary Australia ironically becomes alive. Enjoy his epigrams, his
        wit, his spiritual insights and aphorisms. With little poetry of this ilk produced today, The Apparition At Large deserves posthumous celebrity.
        Line drawing of K.F. (Kevin) Pearson by the late poet Geoffrey Eggleston Cordite publishes ‘ His Quarter’ by K.F. Pearson from The Apparition
        At Large with artwork by Mirranda Burton (28 October 2013) Click the picture above to view the graphics
    price: 24.95
    isbn: "1876044489"
    release_date: "2006"
    page_count: 101
    reviews:
        - title: Homer Rieth Review
          text:
              "Reviews The Apparition At Large Homer Rieth Apparitions appear in many guises - as ghost or phantom, spirit or shadow, as spectre,
              spook or wraith, as shade or sprite - in short, as existential ‘other’. However, the apparition in K.F. Pearson’s new collection of poems
              seems at moments to (dis)embody or (dis)incorporate elements of even more arcane conceptions - the ancestral manes or even the eidolon lurking
              behind the arras of Greek and medieval philosophy. In K.F. Pearson’s notation, the ‘duende’ of Andalusian folklore is a fair bet. We are
              warned, quite early on: Like the human body, biodegradable, a coaster is not long upon a table. On one I wrote, with something of a flourish:
              ‘Duende’, I have heard, is ‘ghost’ in Spanish. ‘His Book’ This apparition, it is clear early on, (dis)sembles its very apparentness: playful
              yet rueful, quixotic and recondite, the apparition is also funny and mordantly matter-of-fact. There are shades at every turn in this new
              book of poems, Pearson’s sixth collection, of a Borgesian old world sophistication coming to terms with new world order anarchies. The Apparition
              At Large reflects, in part, the widening influence of postmodernist discords and, at the same time, a peculiarly Australian temper in its
              comedic configurations. The poet’s urbane and capricious turns owe something to a tradition of self-deprecation in the broader field of
              Australian humour. The Apparition At Large is, then, a work of considerable strengths: in its seamless dexterity and wit, its sparkling
              verbal glissades and its degree of perceptiveness of unsettling accuracy. It is also a work of great verbal finesse and sophistication.
              The volume may, perhaps, appear at some figment of margin in certain quarters (being an Australian coup de plume ) and hence stands, as
              so much of the literature of this continent often does, in danger of being underestimated. The collection does not merely carry on from
              where Pearson’s earlier The Apparition’s Daybook (1995) left off, but represents a significant imaginative leap across the psychic terrain
              of postmodernist-riven discontinuities between the factious and the purely fictive. The apparition of The Daybook has lost none of his mysteriousness
              and sense of mischief. In this new book, however, it is clear that both the author and his alter ego have taken off the gloves: this is
              poetry of prevailingly ambivalent wit, but also of heightened poignancy and seriousness. Observe, for instance, the art of seeing. In Daybook
              there is a nicely turned figure that is the sum of the poem itself: If I could do / a single thing / I’d not forget / being seen by you/is
              one thing / I’d not forget (One Thing). In the new collection, the underlying problematic has deepened; the language is correspondingly
              denser, geared to the shifts of gyp and dupe, in which the lexemes are never quite what you expect: My transit camp is ‘when’ not ‘where’.
              I have been ‘was’ and may be ‘am’ if ‘whether’ turns on the wind to ‘sure’. My place is neither ‘here’ nor ‘there’, and could not ‘be’ if
              ‘is’ is not. ‘Somewhere’ presumes an apt ‘sometime’ when a ‘here’ is conjunct with a ‘now’, and who knows ‘what’ if there’s an ‘if’. A ‘may’
              could seguidilla to its ‘be’; or ‘perhaps’ confront its axeman ‘not’. ‘His Passport Application’ In his earlier volume, Melbourne Elegies
              (1999), Pearson had confided: ‘You cannot help but know the shock of some impacts at once...’ (‘History Makers’). It is an operative principle
              here, as everywhere in this poet’s oeuvre. There are, nevertheless, poems in this new book that demonstrate the reverse - that sometimes
              it may, indeed, seem to take forever for an experience to ‘shock’ us into knowing - as may be observed in poems such as ‘His Swatch’ and
              ‘His Analogy’ or the powerful burlesque of ‘His Literary Reputation’ and His Interrogators’, whose subtle verbal ploys resist piecemeal
              quotation. Mostly, though, the sinewy pleasures of Pearson’s verse take about as long as it takes to engage with the syntactic thrust and
              parry that (together with his aphoristic flair and verbal precision) are the hallmarks of this poet’s style. In poems such as ‘His Geography’,
              ‘His Companion Arts’ and ‘His Letter Of Support’, Pearson’s signature blend of hard-boiled humour and ironic introspection is augmented
              by a delicate and often delightful whimsy. There are also poems of an almost unearthly cast: self-revealing and yet reticent, couched in
              terms of pass and impasse, point and counterpoint, in a prosody which for all its reach of clarity and firmness, is full of beguiling ambiguities:
              If if were once before is later, the mirror says where we retreat. When when is once upon a time, the that that was is less than if. ‘His
              Coin’ The capacity to sustain such equipoise (of intellect and feeling) is a touchstone of the work of any artists whose aims are as ambitious
              as their methods. The Apparition At Large occasionally strays into tricks of syntax or ‘snookers’ itself in an excess of its own verbal
              intricacies; but these are the faults of strong virtues: in Pearson’s case, a versification that is both highly intelligent and engaging
              and which is also quickened by a preoccupation with the sculptural and tonal possibilities of an ulterior voice. The crypto-autobiographical
              nature of this undertaking is deftly camouflaged by the undeniable charm of the speaking voice with its prevailing air of wry detachment.
              These are evidences of a mature and crafted style. In P oetry and the World Robert Pinksy has observed how tentative (and yet how sure)
              the presentiment is that separates a poetry that succeeds from one that fails. He has remarked that: ‘...despite all the complexities of
              literary theory, for all the ingenuities of ambition and expectation, the trouble with most poems that fail... may be described simply:
              they are not interesting enough to impart conviction.’ There is not a single poem, in The Apparition At Large , that is less than interesting
              and in which the level of conviction the reader experiences is not commensurate with that of the poems themselves. To Pinsky’s formula for
              poems that are likely to succeed, the poems in this collection invariably conform: they are, in Pinsky’s terms, ‘surprising’, ‘musical’
              and ‘revealing’; they also manifestly sustain a level of ‘interest’ that is compelling and which, for Pinsky (as also for this reviewer)
              means nothing less than, as Pinksy has concluded, ‘the free acceptance of the gift of pleasure’. This is a notable achievement, not least
              since the majority of the poems (as their titles indicate) consist of the radial musings of an acutely self-conscious alter ego (if an apparition
              may be so described - since, however elusive, it is palpably present throughout); this far from pallid entity declares every poem as ‘his’
              - ‘His Passing’, ‘His Progress’, ‘His Fingerprint’, ‘His Self Portrait’, etc. Only a few pieces, such as ‘View From His Barstool; His Impromptu
              Diet’ (where the personal pronoun is still in control) ‘The Other’s Dressing Table’ and ‘The Magician’s Position’ deviate from this pattern
              of ghostly self-absorption and clever shadow play. The personal (even confessional) tenor of the apparition’s ruminations, as well as the
              ironic aloofness of his conceits, therefore, serve as decisive ingredients in the plotting of the book’s trajectory. A more complex question,
              however, centres on three poems whose titles intrigue: ‘A Critical Guide to Australian Poetry’, ‘A Poet He Knew’, ‘God’s Words to Him’ and
              ‘A Defence of His Own Life’. The first of these is Catullan in its epigrammatic brevity and cynicism: I’ve a single reference in your index.
              Always the footnote, never the text. The second, ‘God’s Words to Him’ (again the prevalent pronoun) is slightly longer and represents a
              reply to the poem immediately before it, ‘His Words to God’, an unevenly rhymed poem; as a pair, they put one in mind of Yeats’ ‘Crazy Jane
              Talks Wife the Bishop’. However, Pearson’s rhymes here are somewhat diffident and the pith of both ‘God’s Words to Him’ and its antiphonal
              is something of a letdown: the idiom is etiolated after the raised expectations created by the dialogic possibilities signalled in the titles.
              They seem to me the least convincing poems in the book. The remaining piece, ‘A Defence of His Own Life’ (a further epigrammatic construction)
              is the collection’s final poem and is splendid. It is reminiscent of the terseness of the ‘War and Consequence’ movement in Pearson’s justly
              admired translations from the Spanish, Passion & War: A Flamenco Libretto (1995): There is a comeliness in a shadow the person casting it
              can’t match. Three of the volume’s best poems are conspicuous for their assured handling of theme and mood: ‘He Remembers His Skeleton’
              and ‘A Poet Who Knew Him’. In the first the apparition comes as close as anywhere in the book to making itself manifest as flesh and blood.
              The result is a level of understatement, keyed to an effortless articulation: A family death you think you’ve overcome by ritual of good
              burial and procedure of mourning as a group till talking’s done, revisits when there’s unexpected pressure from another quarter and simple
              tears are physical water streaming on a face that wishes it could not be so embarrassed In the second poem, the pressure of personal loss
              and suffering is registered in a movement that controls the argument and then enlarges it with superb restraint: There are not many, there’s
              not ten, whose character in a way precedes them but they are those, who when without them, they occupy our thought in the bland times of
              our time. The third of this group of poems is the book’s penultimate offering: ‘His Title Poem’ and is dedicated to the acclaimed Melbourne
              poet, Jennifer Harrison ; its tonalities are intimate yet declarative, such as to suggest that Harrison may be in the relation of muse to
              the shaping of Pearson’s wider vision and also (in some powerfully implied sense) the apparition’s final (and perhaps only) unmasker: ...I,
              reverso of your forgetting, recall each instant of your passing by, my friend, who made me feel awake, or nearly so, my found European hands
              gesticulated as our talk took on art we shared with an equal passion. The sender who receives can doubly send. Altogether, this is a collection
              of great imaginative scope and resilience. To have achieved a progression of soliloquies fertile with intimations of an inner life, of shared
              secrets and solitudes (such as this or any apparition must endure) in an idiom of such adroit and engaging accents, is a bold execution.
              As an observer, in cadences as droll as the verse itself has already declared on the book’s back cover, ‘The Apparition At Large deserves
              posthumous celebrity’; indeed - though one may trust that a poet of such accomplishments as Pearson possesses, one who is ‘at large’ in
              the haunts of his own art in as assured a manner as his memorable creation, should be spared such a preternatural (though richly merited)
              fame."
        - title: Australian Book Review Review
          text:
              "The Apparition At Large Melissa Ashley (author and poet) Australian Book Review, Feb 2007, No. 288 The Apparition at Large is Black
              Pepper’s K.F. Pearson’s second outing as the commentating enigma, most recently encountered in The Apparition’s Daybook (1995). Opening
              poems map the identity’s regular ‘haunts’ - the bars and cafés of inner-Melbourne - via evocative sketches of daily life’s unexpected sensuality:
              ‘A colour can completely drench our consciousness.’ Transient comforts and pleasures, while lingered upon, are undercut by the apparition’s
              humiliating invisibility and insubstantiality. In several poems, the apparition draws attention to Pearson’s critical reception as a poet.
              His self-deprecation, however, threads a precarious line between black humour and self-indulgence, as in the poem ‘His Author’: I’m not
              the twin of whom I come from. My author used to think himself a poet ...I know better, being his creation. He doesn’t have the powers he
              thinks he has. Pearson oscillates between celebrating and mourning the apparition’s position as excavator and witness to what lingers at
              the margin’s edge. Towards the end of the collection, poems address questions of mortality. The tone is sad and melancholy, which is appropriate
              given the passing of Pearson’s contemporaries Patrick Alexander and Shelton Lea . The clarity of consciousness behind such pieces as ‘His
              Autopsy’, ‘His Funeral Oration’, ‘His Crossing Over’, ‘His Epitaph’ and ‘His Literary Remains’ imparts a shiver. But the spirit is greater
              than the flesh, as suggested by the lovely line: ‘A surface is the skin of what’s inside.’ The disquieting focus of The Apparition At Large
              is of someone casting a warm, clear eye - Pearson could never be cold - over the actions and achievements of his life, including his considerable
              legacy as a poetry publisher and practitioner. At times, the use of traditional forms such as iambic metre and rhyme compromised this reader’s
              negotiation of the text. That said, the poet’s pleasure in the language games of riddling and punning were a delight."
        - title: Radio National Review
          text:
              "The Apparition At Large Geoff Page Radio National’s The Book Show 2006 In Apia with its harbour, and papaya in the morning, when seated
              on a cane chair at a cane-strung table, I’m as placid as the ripples of iced lime juice with water. A lonely drift-net fisherman casts a
              perfect arc of net, and, patient, lets it settle before he’ll draw it in. I’m reading as I breakfast Vasari’s Lives of the Artists . There
              are monologues in them an earlier poet could sense. I’m given fresh green-coconut juice gods can’t go without. But, ah! to be on an asphalt
              footpath and you pull up a chair. ‘And Abroad’ That poem, ‘And Abroad’, is one of two called ‘His Postcards’ in K.F. Pearson’s new book,
              The Apparition at Large . Although it’s not obvious here, the narrator is not Pearson himself but an apparition using the poet as an amanuensis.
              He is not so much a ghost given to scaring people as ‘a voice of gaps and distances’, as Susan Hancock said of this character in the book’s
              1995 predecessor, The Apparition’s Daybook . In ‘And Abroad’ we have a good example of Pearson’s rhythmic control and his sense of cadence.
              The lines (in this case, but not always) are long and leisurely, a sort of loose hexameter. The apparition is meant to be having a good
              time in Samoa but, in the manner of quite a few poets before him, would rather be back in town with a friend or lover. This is one of the
              several pleasures of Pearson’s book, the sense in which he reminds you of other, more distant poets - some of whom we are in danger of forgetting
              a little. Most typically Pearson writes in traditional forms with a strong sense of the iambic. There are poems here that remind one of
              the earlier Theodore Roethke - and others (where the sense of a constant narrator is particularly strong) of John Berryman’s Dream Songs
              . And the echoes go way back before the twentieth century too. As the ‘apparition’ complains in ‘His Literary Reputation’, ‘The skill-less,
              boring, unrhythmical and glib / occupy the Golan Heights of fashion’. This is exactly what Pearson wants to get away from even though he
              thinks it may have been to his cost. The poem concludes: ‘I think the power of lyric is its clearness; / explanation is the opposite of
              worth. / Reincarnated, I would be obscure.’ With his ‘apparition’ persona, Pearson is working a profitable vein here. There is a sense in
              which we all feel insubstantial, almost invisible - and not just at a lunch counter when everyone but you is being served. Pearson has caught
              well our sense of ephemerality and how soon we are doomed to exist only in the memories of those who knew us - and, even there, not for
              long. A sense of this invisibility, both present and foreseen, is found in ‘The Apparition’s Hat’ - which begins: ‘ The hat is worn. There’s
              none beneath. / It walks authoritatively down the street, / half pauses by a fading honeysuckle, / memory invading thought a little...’
              Convincingly, but perhaps disconcertingly, there’s also a sense in which the ‘apparition’’s alienation seems to stand in for the poet’s
              own. In the poem, ‘His Author’, Pearson has the ‘apparition’ say: ‘I’m not the twin of whom I come from. / My author used to think himself
              a poet, / and somewhat of a scholar of that art. / I know better, being his creation. / He doesn’t have the powers he thinks he has. / He
              slumps about in bars to stifle fears / that he has wasted youth and given years / solely to find the critics ill at ease.’ This would seem
              to be showing his reviewers a very soft underbelly indeed but Pearson has his answer ready. In ‘To His Reviewer’ the ‘apparition’ retorts:
              ‘Only those words said about me / are more ephemeral than I am.’ Another two-liner on a comparable theme is ‘A Critical Guide to Australian
              Poetry’: ‘I’ve a single reference in your index. / Always the footnote, never the text.’ In the poem, ‘His Literary Reputation’, the ‘apparition’
              confesses: ‘I have given pleasure to about a dozen, / none of whom was an opinion maker. / Anthologists have never bothered.’ It is hard
              to say whether this slightly self-pitying strategy reinforces or undercuts the virtues of the book’s best poems where Pearson really does
              inhabit his shadowy persona and gives his (surely more than a dozen) readers a healthy sense of their own transience and immateriality.
              At times, as with the poem we started with, Pearson’s persona can be really moving. ‘But, ah, to be on an asphalt footpath and you pull
              up a chair.’ Certainly, most of the time, he is witty and ironic - and not always, by any means, at his own expense. One shouldn’t understate
              his lyrical capacity, either. The ‘apparition’’s sensuous relish for quality food and drink (or perhaps the memory of them) is almost alarmingly
              disconcerting. K.F. (Kevin) Pearson, in his other life, is also the co-publisher of one of the most impressive of the country’s small poetry
              presses, Black Pepper. It would be sad to think that, in the process of publishing other people’s work, the quality of Pearson’s own poetry
              has been somewhat overlooked. Let’s hope not. Back to top Start of StatCounter Code End of StatCounter Code"
the-dining-car-scene:
    title: The Dining Car Scene
    author: Homer Rieth
    short_description:
        Any poet who enchants, writing of the outer suburb of Mount Waverley, or the music of Vaughan Williams, clearly has the skills.
        Homer Rieth’s first collection has been long awaited. The collection was shortlisted for the 2002 Adelaide Festival Awards for Literature.
    long_description:
        "Thornhill strikes a customized match suavely; from a matchbook; she leans forward, into the flame, takes his hand, with the
        match in it... Brian Edwards has said that Homer Rieth’s poems are ‘markers of the culture’. The title poem in The Dining Car Scene , taken
        from Hitchcock’s North by Northwest , previews his approach. He presents an incident, a landscape, a book remembered, or the occasions of
        love or death, crisply and directly. Then he effortlessly goes further: he invites us into a meditation on earthly life and what it may mean.
        An entire period, Carlton in the Seventies, comes under his celebratory and critical eye, in his longer tour de force ‘Siberia’. And he does
        the delicate lyric. Any poet who enchants, writing of the outer suburb of Mount Waverley, or the music of Vaughan Williams, clearly has the
        skills. Homer Rieth’s first collection has been long awaited. The collection was shortlisted for the 2002 Adelaide Festival Awards for Literature."
    price: 19.95
    isbn: "1876044322"
    release_date: "2001"
    page_count: 58
    reviews:
        - title: Imago
          text:
              The Dining Car Scene Imago , Vol. 13, No. 2, 2001 Homer Rieth’s poems, in The Dining Car Scene , are far less complex than those of
              Hammial [ Bread ]. They are about moments captured in time by one medium or another - in the title poem by a camera shot in a Hitchcock
              film - and laid out in detail, real, associated or imagined, and comparative. One has the impression of Rieth walking through streets, through
              the countryside, through the literature and personae of other countries, with his eyes wide open, taking note of the finer points that go
              to make up those surroundings and giving them equal place and significance with the large and obvious. There are three longer poems, that
              is of over two pages, the longest being ‘Siberia’, which deals with the various conceptual deserts, or places of the lost, created as a
              metaphor to the real Siberia. ‘In the end we’re all Siberians’; ‘Siberia your frontiers never end!’; and ‘Wherever you go Siberia’s waiting
              for you’. Mostly these are reflective poems, although a shaft of irony shoots out in a few, such as ‘War’ which satirises not only the place
              war holds in our society but also the clichés that surround our attitude to it and to the society that can produce it.
wimmera:
    title: Wimmera
    author: Homer Rieth
    short_description:
        Replacing the battles of heroes and gods with the struggle of mortal humans with time and space, Homer Rieth in Wimmera re-invents
        the epic. All the classical elements are there but they are now democratic, and ours. The narrator’s anonymous informant knows a thing or
        two. Objective and personal, learned and demotic, local and vast, Wimmera is the history of a region and seedbed of a vision where ‘the bunyip
        indeed lays down with the manticore.’ There is nothing like it anywhere.
    long_description:
        "B ook Description it leaves its mark he says like a mirage on a melting road the one you never took the one you always took
        the one you said you’d never take again only a stone’s throw from bliss a spit’s yard from the fountainhead of a recurring dream Replacing
        the battles of heroes and gods with the struggle of mortal humans with time and space, Homer Rieth in Wimmera re-invents the epic. All the
        classical elements are there but they are now democratic, and ours. The narrator’s anonymous informant knows a thing or two. Objective and
        personal, learned and demotic, local and vast, Wimmera is the history of a region and seedbed of a vision where ‘the bunyip indeed lays down
        with the manticore.’ There is nothing like it anywhere. It’s an impressive achievement, and a remarkable piece of work. Paul Kane Vassar College
        Cover photograph: David Brooke"
    price: 54.95
    isbn: "9781876044619"
    release_date: in books and journals in the UK, USA, Canada, New Zealand and
    page_count: 374
    reviews:
        - title: The Weekend Australian
          text:
              "Inverse Perspectives on the Maturing Voice [reviewing Wimmera and Fuel by Andrew Sant] Geoffrey Lehmann The Weekend Australian 7/11/
              2009 Why do some poets, like some people, do their best work early, and others continue improving and peak in their late 40s or 50s? While
              editing an anthology of Australian poetry, this has been on my mind. Kenneth Slessor, Henry Lawson, Christopher Brennan and Banjo Paterson
              had virtually exhausted themselves as poets by the time they reached 40. But Slessor’s friend, R.D. FitzGerald, matured as a poet only after
              reaching that age. Goethe and Yeats continued developing until late. For male poets, at least, it may be necessary to have an argument with
              oneself if one is to continue developing. Goethe rejected the romantic storm and stress of his youth, and embraced classicism and balance.
              Yeats rejected the lushness of his early poetry for a language that was stripped back and closer to everyday speech, the famous ‘cold eye’
              of his epitaph. With female poets, a decision to have an argument with oneself may not be needed. Biology may force the issue. When reading
              the poetry of Elizabeth Riddell, one of our good middle-ranking poets, I was struck by how free her poetry became once she reached her late
              40s, as though a burden had been lifted from her. Jennifer Maiden, one of our best contemporary poets, has even written a poem about it,
              ‘Menopause as a Bee Freed from a Fairy Floss Machine’. The title of this stunningly good poem says it all. Both books, Fuel and Wimmera
              , are the work of mature poets. Andrew Sant was born in London in 1950 and came to Australia with his parents in 1962. Homer Rieth was born
              in Germany of German and Georgian parents in 1947 and came to Australia in 1952. Both poets are published by Black Pepper, founded by the
              feisty Kevin Pearson, himself a noted poet. Black Pepper is one of the livelier new houses that has sprung up after the large publishers
              decided to exit poetry publishing. That’s about where the similarities between Sant and Rieth stop. Sant has a long publishing history,
              going back to 1980; Fuel is his 11th published volume of poetry. He writes short, mainly domestic poems, and is able to tease significance
              and a sense of profundity out of everyday things with wit and ingenuity. Although a few years older than Sant, Rieth has a short publishing
              history, starting in 2001, and Wimmera is just his second published volume of poetry. In contrast to Sant’s short poems, Wimmera is a single
              epic of more than 300 pages, a leviathan of a poem, cosmic in its ambition and symphonic in its approach. In 1983, as editors of an anthology,
              Robert Gray and I wrote: ‘Sant’s poetry seems very English in its reticence and use of the middle tone of voice. He always deals directly
              with experience... His strength is his interest in and close observation of other people, combined with a classical openness of style and
              freedom from affectation.’ These comments about Sant in 1983 are still true, except that his syntax, which was always a bit complex, has
              become more complex and circuitous, and his poetry is drier in tone; perhaps too dry and sinewy at times. He has continued to grow and develop
              as a poet because his poetry thrives on wit and intelligence rather than on hormones. Take ‘Rock Music’, for example, a poem not about a
              type of popular music. It’s about ‘the frequencies of stones’, the music of geology. Sant is a poet of precision and imagination. In ‘Given’,
              after the inaction of listening to the news and hours at a computer, he starts digging in the garden: Gigantic, the fresh spadefuls of planet;
              wrecked worms like swimmers fighting incredible turbulence. His adoption of the worm’s viewpoint and his choice of the word planet are quite
              remarkable. Perhaps the pick of the poems in this book is his elegy for a fellow poet, Margaret Scott. ‘The Fires’ also may be a poem of
              farewell to Tasmania, the island where he has spent much of his life. Flying out of Tasmania over a bushfire, he thinks of Margaret Scott,
              two of whose houses were incinerated in fires, and who always said to him, in a motherly way between cigarettes, ‘Now tell me what you’ve
              been doing/and where you’ve been.’ He also remembers how Margaret used to keep herself awake while driving at night by repeatedly shouting,
              ‘Elephants! Elephants!’ Rieth’s first volume of poetry, The Dining Car Scene , published when he was in his 50s, was an elusive book. The
              title poem was a virtuoso piece describing with great precision a scene from Alfred Hitchcock’s North by Northwest . But it was hard to
              make out what he stood for. Rieth has been a teacher of Greek and Roman literature and the one thing that was clear was his love of language.
              Wimmera is an extraordinary poem, comprising 12 books, each of two parts. Rieth moved to Minyip in the Wimmera district of Victoria in 1999.
              At a basic level the poem reflects Rieth’s feelings for a landscape and people he has come to love. Each book, we are told in an introductory
              note by Justin Clemens, ‘moves through the experience of a particular place: discoveries, establishments, characters, events, the contingencies
              and violence of settlement and the unexpected profusions of the natural environment.’ The poem reaches its climax in part one of Book 12,
              where Rieth moves from the profusions of drought and flood of the Wimmera and addresses the ‘countless curvatures of space/an atoll of time
              in an ocean of infinitude/the starry night is no more than time/only space only/the inaudible overheard’. The long, sinuous sentences of
              the poem have passages of bravura language. This is how Rieth summarises the life and death of poet Adam Lindsay Gordon: ‘trooper Gordon...
              between poignant poems/... had seen how over the jumps a horse instinctively picks up a/certain tempo/by the time it covers the distance
              the tempo has become a heartbeat/tbe grace of its motion almost supernatural/and yet he shot himself as if the shot ringing out might make
              for/the sound of a caesura’. This technically brilliant passage reveals one of the weaknesses of Wimmera . Gordon’s tragic suicide is treated
              almost flippantly. The consistently heroic tone of the poem, although it knits it together musically, sometimes places too great a distance
              between the reader and details that might have engaged our sympathy. My second grouch is the deliberate use of cliche, such as ‘drunk as
              skunks’, ‘back of beyond’. I realise that the father of European poetry, Homer, also used cliches such as ‘wine-dark sea’ but that does
              not justify their use here. Notwithstanding these faults, Wimmera is quite extraordinary: it reads like a young man’s poem, with its ebullience,
              panache, occasional passages of juddering bathos, and its hormonal music."
        - title: Overland review Wimmera
          text:
              "Wimmera Pamela Brown Overland , Issue 199, Winter 2010 ‘Wimmera’ is a classical epic poem about the Victorian district in which Homer
              Rieth lives. Here, though, the poet substitutes human beings for gods and goddesses. The scope and ambition in this grand poem is laudable.
              Interestingly, Rieth is a long-ago migrant to Australia, and there is a distinctly European philosophical subtext here, as is to be expected
              in an epic - ‘so what is it then about any place/that fills and empties alike/the world with its life’. The poem does, however, have its
              histori­cal heroics that should please those who enjoy Australian idiosyncrasies - ‘I can still see he says Jim Hardingham’s bullockies/the
              bales stacked four storeys high/on top of them a bunch of shearers with the look in their eyes/of a job well done’. There are also many
              passages of descrip­tive, uncontrived pastoral poetry that flow easily and with a certain beauty . Although divided into twelve sections,
              at 360 pages the poem is a bit relentless, having little variation in tone throughout - this in spite of Rieth’s rich imaginings and admirable
              tenacity. It was composed as part of his Doctorate of Creative Arts, and that probably explains its length, which might be a problem in
              an age of shrinking attention spans. [Note: in fact, two sections of Wimmera were written after the author completed his Doctorate.] No
              matter how judicious and broad the reportage, range of form and topic, antitheses of allusion and the literal, I found that I began to flip
              through sections and felt that it might be easier to come to know the Wimmera by reading an actual history of the district. (I hear lovers
              of epic poetry howling!)"
150-motets:
    title: 150 Motets
    author: Homer Rieth
    short_description:
        "Motet: a composition adapted to sacred words in the elaborate polyphonic church style; an emblem. Addressed to and inspired
        by the time-honoured figure of a mistress or muse, Homer Rieth’s sonnets cascade into each other across rocks of autobiography, memory and
        desire."
    long_description:
        "Motet: a composition adapted to sacred words in the elaborate polyphonic church style; an emblem. Addressed to and inspired
        by the time-honoured figure of a mistress or muse, Homer Rieth’s sonnets cascade into each other across rocks of autobiography, memory and
        desire."
    price: 24.95
    isbn: "9781876044794"
    release_date: "2013"
    page_count: 186
    reviews:
        - title: Australian Book Review
          text:
              "‘Lords of nothing’ Geoff Page Australian Book Review April 2013, No. 350 Although the Melbourne publisher Black Pepper has a stable
              of major Australian poets (Stephen Edgar and Jennifer Harrison among them), it is also a house that likes to take chances. The favourable
              reception accorded Homer Rieth’s 359-page epic poem, Wimmera , in 2009 was definitely a punt that paid off. The book was shortlisted for
              The Age Book of the Year and became an ABC television program. Rieth’s new book, 150 Motets , though shorter, may be even riskier. It is
              a hard book to categorise. Sonnet sequence (cf. Shakespeare’s)? Epic with muse (Dante’s Divina Commedia and Petrarch’s Il Canzoniere )?
              Spiritual autobiography (Kazantzakis’s Report to Greco )? Daybook (Thoreau’s Walden )? All of these are possible descriptions. Apart from
              ‘Slaying the Dragon’, a short prose memoir of visiting the monasteries at Mount Athos in Greece, Rieth’s collection comprises ( pace the
              title) 154 sonnets, which are also called, with some justification, ‘motets’. A motet is remarkable for its polyphony and rep¬etition, and
              these are indeed important dimensions of the book. Technically, the sonnets are somewhat frustrating; they consist, almost always, of a
              strictly rhymed octet and an unrhymed sestet. The virtues of establishing a strict convention in the first part of a poem and then abandoning
              it in the second are not obvious. Although a few of the sonnets appear to use the pentameter normally associated with the form, most of
              Rieth’s lines are far longer and are best seen as free verse. The combination of free verse and strict rhyme in the sonnet’s first eight
              lines can lead, quite often, to a certain awkwardness of tone. Similarly, long epistolary sequences addressed to a muse (or patron) are
              always hard to carry off. Rieth’s ‘Lola’, like Shakespeare’s Mr W.H., is a fairly shadowy figure, despite the vivid-enough reminiscences
              of times spent together. Like other muses, Lola is inaccessible, perhaps in this case more due to geography than to anything else. There
              are moments when Rieth shows uncertainty about his ambitious project. One is when he refers to his efforts as a ‘wilderness of words’. He
              wonders elsewhere if the readers of his ‘little book’ will be ‘of mind to set sail / upon a boat as frail as this?’ Poem ‘126’ opens with
              the line: ‘Sometimes I’m tempted to say too little.’ With his somewhat expanded sonnets, this is a temptation to which the poet rarely succumbs.
              Rieth’s use of the longer line also seems to encourage him into prophetic stances, reminiscent of Walt Whitman in Leaves of Grass (1855)
              or Kahlil Gibran in The Prophet (1923). If 150 Motets is a spiritual autobiography, it is also something of a theological exegesis. Though
              Rieth uses the word ‘soul’ as if it were unproblematic, he does give even the agnostic reader a convincing sense of a lifelong spiritual
              quest and of the author’s need to look beyond simple dogma into something less easily defined. A few more lines from poem ‘126’ may serve
              to illustrate both the difficulties and the strengths of Rieth’s approach. He tells Lola that ‘saying nothing really is / the only way to
              understand, what otherwise would seem absurd, / as if, finally, knowing everything means nothing - no more than to exist // could equate
              to this, to say that one lives - that one is, in the end, alone - / inconspicuous, inconsequential, short-lived as weather, as are the barn
              swallows / in the autumn air...’ Instructive here is the manner in which the poet rescues himself from abstraction with the telling image
              of ‘the barn swallows / in the autumn air...’ One is, however, reminded at the same time of Wallace Stevens’s ‘Sunday Morning’, which ends
              with much the same point, but more discipline: ‘And, in the isolation of the sky, / At evening, casual flocks of pigeons make / Ambiguous
              undulations as they sink, / Downward to darkness on extended wings.’ This is not to say, however, that Rieth doesn’t make some persuasive
              spiritual points. In poem ‘51’, for instance, he laments how we are the earth’s ‘ruination - plundering the skies, the seas, the soil -
              // we who are lords of nothing, lord it over all...’ He then concludes, not unconvincingly (though with a little exaggeration of time frame),
              with the assurance that ‘the day comes, the night is near, when the mother of all / shall give herself - a sacrifice - to her lord, the
              sun’. Robert Gray and Geoffrey Lehmann have praised Rieth’s work as ‘overheard private rhapsodies, in which the arcane and everyday mingle’.
              This does describe the private, almost ‘daybook’ nature of his letters to Lola. Gray and Lehmann have also described Rieth’s language as
              ‘ebullient’ and ‘rococo’, referring perhaps to the large number of words that will send readers scurrying off to the dictionary - or to
              Google. ‘Equiponderate’, ‘anacoluthon’, ‘eurhythmy’, and ‘armamentarium’ are just a few to get one started. These may be words that the
              average reader should know, but their presence in a line of poetry can have a jarring effect. Certainly there is scholarship here, but it
              is not worn lightly. It is hard to imagine the ideal reader for 150 Motets . He or she would need to have real spiritual concerns, a certain
              tenacity of purpose, a tolerance for abstract language - and perhaps be a fan of the motet form, with its emphasis on repetition and polyphony.
              Whether or not Lola, Rieth’s muse, has these qualities remains unclear, but we have to suspect that she must."
the-garden-of-earth:
    title: The Garden of Earth
    author: Homer Rieth
    short_description:
        The Garden of Earth is a hymn to and argument in defence of the future of the planet. It is the poet's final assay of our
        age-old dream vision of the world, only here it is as something at once luminous and exceptionally Australian.
    long_description:
        "B ook Description Out on the river you’ll see there are swifts and babblers and other assorted thieves all of whom have their
        own bush telegraphy, a kind of Morse passing quietly from one landmark to the next, disappearing and reappearing with wild insouciance at
        the waterline—some, in fact, say that’s where another life begins, more secret than you know, to do with the keeping alive of memory, all
        those residual mysteries that tend to hang around towns, theirs are stories the river dwells on the longest, which it passes on surreptitiously
        to creeks, dams and waterholes— The Garden of Earth is told in Thirty Five Books. Each canto is a long-breathed sentence that takes you in
        its flow. They gather all the hues of nature, history, culture and philosophy like metaphorical rivers gathering majestic detritus. It invites
        us to consider the plenitude of the world, but also how precious and precarious a thing this is. Homer Rieth’s first epic Wimmera gave voice
        to the history, legend and folklore of the Wimmera region of north western Victoria, and to ideas of 'place' and 'country' not only as
        cultural markers, but as ciphers of an enduring mythos. In his new companion epic, he turns his gaze to the larger arena of the Murray Darling,
        to this oldest of continents more broadly. He offers a vision of the natural environment and the human world as bound together on a global
        scale. The Garden of Earth is a hymn to and argument in defence of the future of the planet. It is the poet's final assay of our age-old
        dream vision of the world, only here it is as something at once luminous and exceptionally Australian. Cover photograph: Tim J Keegan, Aerial
        view of The Darling River from 15000ft"
    price: 65.0
    isbn: "9781876044893"
    release_date: last year and June this year when the review was
    page_count: 600
    reviews:
        - title: Cordite Poetry Review
          text:
              "Review Short: Homer Rieth’s The Garden of Earth Robert Wood Cordite Poetry Review 26 June 2017 You could be forgiven for thinking that
              ‘Australia’ was simply this place, rather than an imagined community. It is of course not only a phantasm or a figment that is whole, but
              also real and divisible. In poetics, it is not a stretch to suggest that there is a heuristic, ascendant, paradigmatic separation between
              those in a transnational sphere sipping turmeric lattes and those authentic patriots tilling the soil. This fault line, which is, of course,
              anachronistic and dialectical, exists in the selected texts and influences as well as the paratextual selling points that tell us something
              is ‘traditional’ or ‘experimental’, ‘Romantic or ‘modern’, ‘country’ or ‘city’; in what claim ‘this is Australian’. Homer Rieth’s The Garden
              of Earth is packaged as an Australian epic, and yet, it might be better to suggest that it is a located and regional long poem that is speaking
              to nation and nature. This is not the same ‘Australia’ as Pi O’s beloved Fitzroy in his 24 Hours , nor is it similar to the Wheatlands of
              John Kinsella’s Divine Comedy . It takes as its own location the whole of the Murray-Darling, building from Rieth’s home in Minyip in the
              Wimmera region in regional Victoria on the East Coast, where he has lived for several years. And yet, one cannot help but notice that The
              Garden of Earth , like respective works by O and Kinsella, is a poetic idea of ‘Australia’ that takes as its root and routes a direction
              from ‘the West’, a Greco-Romanic understanding of where epic comes from. Perhaps this shouldn’t be surprising given all these authors have
              European heritage, but it is striking given the demographic realities of a decolonising Australia, which brings with it Indigenous and CALD
              spectres, materials and discourses. There are, of course, epic traditions in each and we do not have to rely only on Odyssey and Iliad like
              good colonial boys might, but could suggest the Ramayana, Martin Fierro, Omeros or any other such non-Western undertaking. What though can
              we learn from Rieth’s vision about the epic in the here and now? And how might this presentist perspective be projectively useful? Rieth’s
              book is a big one. Coming in at 584 pages, it must approximate some 15 thousand lines – bigger than Milton’s Paradise Lost , bigger than
              Kalidasa’s Raghuvamsa, bigger than Berndt’s Three Faces of Love . But then again, the Murray-Darling is a big river, placing fifteenth in
              length worldwide, between the Niger and Tocantins. Rieth’s work in the basic proportions would seem appropriate. Although the epigraph of
              the work is taken from a translation of Hafiz, The Garden of Eden emerges from a transatlantic milieu. The preponderance for rhyme and the
              long sentence lends a Whitmanian cadence – expansive, regular, encompassing – which is buttressed by the familiar expression ‘I sing’ (on
              page 58 particularly). There are also references to Walt’s contemporaries Longfellow and Kendall. The work is not ‘difficult’ then in terms
              of message, pagination, rhythm, line-break, form or style. This project does not come after Charles Olson (Maximus poems) or Basil Bunting
              ( Briggflatts ) let alone Rachel Blau DuPlessis ( Drafts ) or The Grand Piano . While Ezra Pound is referenced (11) and Robert Lowell is
              quoted (488), it is not a stretch to say it pre-Modernist, hence the signposts of the late nineteenth century. At the level of content The
              Garden of Eden is firmly focused on nature with occasional painterly references (Delacroix, Leonardo, Lorenzo Lippi) and some more popular
              culture (beer, cricket, footy in Canto 7; and ‘Barbeque Shapes’ (25) [one of my favourite flavours]). These references often come from a
              different location and generation to mine (I only know ‘California poppy’ because that is what my grandfather put in his hair) but that
              does not mean they are inaccessible. What does distinguish the work is that the land is often idyllic, pure, silent, often Romantically
              so, suggesting a lack of eco-critical co-ordinates and some sediment of the idea of terra nullius , which is confirmed by the lack of Indigenous
              references, the absence of living characters and the anachronistic (mis)spelling of Arrente as Arunta (56). This is a work of landscape
              with landscape punctuated by high culture from Europe or poetic expression that pre-dates federation on this continent. There are unnamed
              interlocutors, whom Rieth quotes, but not characters; and, given the evenness of tone this implies a work that is not ‘polyphonic’ (in Bahktin’s
              sense) or ‘dramatic’ (in Hegel’s). The world is brought into the subject, the speaking ‘I’ of a poet and then sent back out whole and resolute.
              This central I expresses itself in a high voice (see the use of ‘O’ to begin sentences and to pre-figure ownership for example in ‘O my
              Murray, /my Campapse, /my Ovens, /my Goulbourn, my Murrumbidgee’, (11); ‘O tamed continent’ (109); ‘O keep me safe’ (249)). This is a work
              of grand liberalism that is curious and idiosyncratic. Rieth is a starting point as good as any, from which we can suggest that Australia
              is continental, that it can become a republic with several countries, countries that are demarcated by cultural and geographic realities
              and ideas that are nevertheless a utopian kind of treaty. The Murray-Darling is not a singular place. It is a part of a regionalism that
              is not simply somewhere away from the urban or buffeted by the suburban, but has as much to do with the mind in the sky as boots on the
              ground. Rieth begins to show us the poetic way with rhythm, scale and possibility. If The Garden of Earth is firmly located in a traditional
              and Romantic context, it might nevertheless show us what might yet be Australia’s poetic tomorrow if we labour to read it slant."
midden-places:
    title: Midden Places
    author: Kirsty Sangster
    short_description:
        Kirsty Sangster lures us in by beguiling narratives. An artist recalls a Russian baroness who posed for her during the War.
        A black dog gives birth in the shadow of thousand year old temples. A mother’s ghost becomes halo and dust. A girl begs in Athens, cathedrals
        are built. Saints and sailors throw standing stones into the sea. Erasmus walks in the High Country and a tale is refashioned from Tolstoy.
        These stories occupy her midden places which are a dumping ground where / all graced and abandoned things gather . In such common locales,
        and to their folk, transformation happens. They experience change or a rare luminescence. This is quiet but disturbing religious poetry of
        a high order. Kirsty Sangster has, as
    long_description:
        "Erasmus. Philospher. Goes walking in the high country below the line of snow gums. It is summer and the world is huge and
        hot amongst the granite boulders. He stops by a tarn to watch a fish. Kirsty Sangster lures us in by beguiling narratives. An artist recalls
        a Russian baroness who posed for her during the War. A black dog gives birth in the shadow of thousand year old temples. A mother’s ghost
        becomes halo and dust. A girl begs in Athens, cathedrals are built. Saints and sailors throw standing stones into the sea. Erasmus walks in
        the High Country and a tale is refashioned from Tolstoy. These stories occupy her midden places which are a dumping ground where / all graced
        and abandoned things gather . In such common locales, and to their folk, transformation happens. They experience change or a rare luminescence.
        This is quiet but disturbing religious poetry of a high order. Kirsty Sangster has, as Kevin Hart noted, ‘the spark that poets must have’.
        Cover photograph: Pam McGrath, Old Gaol, Old Onslow, 2002"
    price: 24.95
    isbn: "9781876044473"
    release_date: "2006"
    page_count: 59
    reviews:
        - title: Geoff Page, Radio National
          text:
              "Midden Places Geoff Page Radio National’s The Book Show 2006 Erasmus. Philosopher. Goes walking in the high country Below the line
              of snow gums. It is summer and the world is huge and hot amongst the granite boulders. He stops by a tarn to watch a fish. The pool is stained
              by the oil of the blackwood wattle and its deep still green holds a certain monastic viridescence. The fish is alone but not tragic about
              this, instead he is playing the fool and catching insects in his mouth and twisting his tail to see how the light will break, refract, spin
              at the slightest move. The water is his whirligig. The fish delights; turning around and trying to swim on his back will amuse for hours
              and Erasmus can see immediately the similarities; man standing in direct relation to god and mucking around under his gaze. Like that daring,
              darling fish the age spots on his skin. So irreverent. Laughing and crude in the face of spirit. Stirring the scum of skeletons and pods
              up with his belly just for fun, just to shock. The fish knows he has an audience. ‘Erasmus in the High Country’ I am weary of this wise
              man That poem, ‘Erasmus in the High Country’, is one of several very memorable poems in Kirsty Sangster ’s first collection, Midden Places
              . There are several others that might have been equally well chosen but ‘Erasmus in the High Country’ makes more explicit the religious
              element which seems to underly most of her work. In some ways it is a poem of pure, even arbitrary, imagination. How does the Dutch religious
              humanist philosopher get to be ‘walking in the high country / below the line of snow gums’? It’s not a question that disturbs us for long
              however since we’re almost immediately caught up in Sangster’s description of the single fish in a tarn ‘stained by the oil / of the blackwood
              wattle’. The wise philosopher, rather like God, looks down. The fish is ‘laughing and crude in the face of spirit’. The fish is ‘Stirring
              the scum of skeletons and pods... just for fun, just to shock’. Like us naughty humans, Sangster implies, ‘The fish knows he has an audience.’
              It’s a neat little parable - disturbing and charming, even for the most secular of readers. It’s significant, though, that we cannot tell
              to which religion, let alone denomination, Sangster belongs. Her poetry goes much deeper than that. The biographical notes speaks of her
              work for human rights and refugees and it is clear that her knowledge of such plights informs her work. In several poems of remarkable empathy
              she seems to know exactly what is going on in the minds of people in such situations. At the end of her poem, ‘Mustafa’, for example, she
              talks of how a Kurdish refugee in Scotland ‘looks / for all the world like some weird / partisan... pretty stunned, totally cool and yet
              / grieving a grief so huge / it is tactile /held like that mug.’ In ‘Two Friends’ she has a Burmese refugee talk ‘about the ten months crouched
              / with knees against chest getting weaker / and weaker in the crowded prison cells’. Although Sangster clearly has a talent for the imaginative
              use of detail, she also has a remarkable rhythmic skill. Unlike quite a lot of what passes for free verse these days, Sangster’s has a real
              energy and cumulative impact, reminiscent of the psalms of the 1611 Bible where free verse in English started. Take the opening of ‘Agape’,
              for instance: I see you kneeling on a street in Athens veiled in black you spit from a face that is all mouth, all hole and rag... or the
              opening of ‘Laments’: Our deep love started near the mountain where the Three Sisters stare at the sea... Sangster also has a feel for the
              dramatic and exactly how long a poem needs to be to have its effect. Most of the pieces in Midden Places run for about a page and a half
              - long enough to establish and examine a situation but short enough not to become bogged-down or repetitive. She has quite a way with language,
              too, - not just with the descriptions that seem to combine the physical and metaphysical but also in her risky but effective occasional
              use of archaic or ‘out-of-register’ words and inversions of word order. In ‘Koonwak: Garden’, for instance, she says: Under the giving sway-back
              of the hills a wattle-bird brings in singing the dark. Chooks settle in their locked up shed. There have been several highly auspicious
              first books by female Australian poets in the last few years - Bronwyn Lea’s Flight Animals and Adrienne Eberhard ’s Agammemnon’s Poppies
              , to name just two. Kirsty Sangster ’s Midden Places also deserves a place in that distinguished company."
        - title: Janet Upcher, Island
          text:
              "Midden Places Janet Upcher Island , No. 107, Summer 2006 Whereas Edgar’s collection [ Other Summers ] ends with a cemetery, Sangster’s
              begins in one: ‘the head stones grow wild here / ...this is a midden place...’ In her debut collection, she confronts us with some unusual
              locations, unusual experiences, emotional, physical and spiritual. We see, inter alia , through the eyes of an artist’s model in Oxford,
              an Australian in Iona, a traveller in Thailand and Burma. Sangster takes us into places where we sense not simply the gulfs between cultures,
              but also between individuals. Her poems are bold and original, although sometimes not fully realised: ‘We walk through the sanctuary of
              the mango grove, / you mourn friends lost in the May massacre and I / do not know how to comfort you’ (‘Letters To a Thai Friend’). An overliteral
              recording of experience can limit the poetry, which becomes, instead, prosaic and at times there is weak lineation. Mostly, though, there’s
              a refreshing openness, an empathy and compassion for humanity, as in ‘Hsay Plo’: ‘The most peaceful can be the most / full of rage.’ Two
              especially strong poems are ‘Caledonian Forest’ and ‘Marriage Country’, behind both of which is the notion that things which bring us together
              can also intensify our separateness. The imagery in ‘Marriage Country’ is unified, understated and vividly evoked: the setting, old gold-mining
              territory, is a perfect metaphor for a rejected marriage proposal, ‘The ground beneath us / riddled with empty and ungilded chambers / Gold,
              all gone.’ The final poem, ‘Sultan Suleyman Amongst The Cows’ is a quirky and imaginary blending of two cultures in a timeless cosmic vision:
              ‘Cow gods / pulling the sky along / a newly etched pigment / amongst the milky breathings / the steam of dung.’ Sangster’s is a very individual
              voice speaking from ‘midden places’, places where displacement can bring transformation. When things and people are abandoned, displaced
              (like ‘Mustafa’), perhaps they gain greater integrity, more authenticity."
album-of-domestic-exiles:
    title: Album of Domestic Exiles
    author: Andrew Sant
    short_description:
        Album of Domestic Exiles is Andrew Sant's fifth collection. Umbrellas banned by Benito Mussolini, a time-traveller, migrants,
        an English meadow, and LPs are among the exiles which inhabit his poetry. Whether in Hong Kong or Australia, Indonesia or New York, dislocation
        is seen as commonplace and yet there ’ s conciliation, too. The London-born poet ’ s own migrant experience reinforces this sense. With his
        eye for intrinsic and offbeat detail, Sant brings into question the nature of the place we call home.
    long_description:
        Album of Domestic Exiles is Andrew Sant's fifth collection. Umbrellas banned by Benito Mussolini, a time-traveller, migrants,
        an English meadow, and LPs are among the exiles which inhabit his poetry. Whether in Hong Kong or Australia, Indonesia or New York, dislocation
        is seen as commonplace and yet there ’ s conciliation, too. The London-born poet ’ s own migrant experience reinforces this sense. With his
        eye for intrinsic and offbeat detail, Sant brings into question the nature of the place we call home. Sant ’ s poetry is notable for its quizzical
        and analytic teasing out of resonances... underlying his close attention to detail is a sophisticated poet's ‘ raid on reality ’ in order
        to bring back multiple possibilities and a continuing search for clarification. The Oxford Companion to Twentieth Century Poetry Andrew Sant
        is a generous poet. His poems are inviting, with an ease of rhythm; carefully crafted, their tone is conversational, even chatty... His observations
        are sharp and he evokes atmosphere with confidence. Susan Schwarz, Australian Book Review A poet of lively and intelligent curiosity and fine
        powers of observation. Alan Gould, The Canberra Time s
    price: 19.95
    isbn: "1876044217"
    release_date: "1997"
    page_count: 71
    reviews:
        - title: Verse Review
          text:
              "Reviews Book Reviews : Album of Domestic Exiles David Yezzi Verse A Londoner by birth, Andrew Sant resides in Tasmania, and it is this
              continental drift that underlies the poet’s sense, in his fine fifth collection, of exile at home. Mindful of the impermanencies of place,
              the relocated Sant is everywhere the oddball, neither native nor newcomer. Through their far-flung settings - England, Australia, New York,
              and Indonesia - his poems convey not so much the comforts of a global village as the dislocation infusing Sant’s world view with a brawling
              restlessness and hardscrabble redemption. Sant’s title poem, with its sequence of homages to such quaintly antique artifacts as vinyl recordings,
              candlesticks, and old photographs, recalls the outmoded objects and observances of the postwar generation: Oh children of the fifties, this
              exile within formal borders is but the shadow of the exile into which now you’ve grown... From a nation of holidays, hop-scotch, and knee-length
              skirts; of hampers and shillings and the last 78s; of Be Seen and Not Heard (the pre-TV screen); parents, Royalty, slap-stick comedies;
              and black and white snaps within albums few will ache to see unless an odd one, slipped free, is returned for its treason. This consignment
              to the cultural ash heap of such familiar - and, for Sant, defining and sustaining - items deepens his estrangement from things as they
              once were. His awareness of the rapidity with which memories, rendered here as barely regarded albums, are left behind, lends his sober
              nostalgia a particularly hard edge. Personal history resembles not some carefully kept archive but the odd mementos that shake loose from
              a former time dimly recalled. Indeed, nostalgia itself - the effort to repossess the past - is for Sant a losing battle. ‘We court orderliness
              yet find lithe process / befriends us’, he explains in ‘Late Summer Passages’, a poem that renders everyday objects as ‘the playthings of
              vertiginous change’. Similarly caught between a past tenuously held and an insistent future is ‘Climate’: I invoke spring garden’s motto:
              transform or whither, though the house with its elderly furniture and photographs would have it otherwise and pardons reflection. Yet gardens
              are continuance... Hie poem, which discovers the speaker puttering among the clematis and ivy, counters the season’s harsh dictum to modify
              or die with a tentative acceptance of impermanence as embodied by the ‘magnified spaces’ that ‘the windblown backdoor opens onto with its
              comings and goings’. Nature has perennially provided poets with a trope for change, and while Sant, thankfully, cannot be mistaken for a
              ‘nature poet,’ he capably employs images of the natural world in working out the drama between stasis and mutability. Nowhere does Sant
              elucidate more fully this often violent dynamic than in ‘To the Sea’: Here is a headland, there the bay you, great cartographer, have made
              and which won’t be ripped free of my hands in the wind; your pride the monumental permanence of cliffs though all your meditations turn
              to sand. How I love your movements: whorls and rips; the waves called by the loyal moon, or fluid forces that boggle cities. Sant’s acceptance
              of fluidity here is as restless, one might almost say as volatile, as the force of change itself. The poet makes his home in the ‘whorls
              and rips’ of perpetual motion. In this vein, questions of home - which Sant finds not by a quiet hearth but in a constantly shifting world
              - recur throughout the collection. ‘Long Distance’, in which a dial tone simulates proximity, explores the problem telephonically: ...Now
              the voices come clear, oh so recently close, it seems ear rests on ear to show distance has thinned, time zones twinned... or just that
              home is all places to the telephone with its fluent and garrulous dial tone. That home exists not in one place but in ‘all places’ is for
              Sant both a hard fact and a useful realization through which to make life more habitable. Not surprisingly for a poet, it is words that
              serve finally as a stabilizing influence, fixing with a name what might otherwise slip soundlessly away, as in ‘An Australian Visits the
              Future’: Language, I find, is home. Old holograms in shops recall it: streets with Anglo-Saxon names, a new brick suburb anxious for trees,
              people in cars who greased their pleasure in distance. In his clear-eyed views of harsh uprootedness, Sant manages to take a melancholy
              ‘pleasure in distance’, which, for the geographically dispossessed, can be one way through to the sustaining domesticity which we all need
              to survive."
        - title: PN Review Review
          text:
              "Australian Verse: Triumphs And Inanities Album of Domestic Exiles Brian Henry PN Review, No. 127, Vol. 25(5), May 1999 Like Forbes
              [ Damaged Glamour ], Andrew Sant writes intellectually compelling and formally taut poems that deftly wed structure to subject matter. The
              poems in his fifth collection, Album of Domestic Exiles , offer a skilfully ‘controlled abundance’, and invite and sustain repeated readings.
              As the book’s title suggests, Sant is interested in the psychological and emotional effects of various types of exile, as in the work of
              Elizabeth Bishop, whose poetry Sant’s more than superficially resembles. And because he does not allow himself to become complacent with
              language, he manages to avoid the quotidian quagmire in which most domestic poets become trapped. The book’s title sequence consists of
              eight short poems focusing on objects exiled from domestic use - LPs, candles, black-and-white snapshots, Mussolini’s umbrella. Sant considers
              the poignancy of being perpetually unsettled rather than the pathos of it (political exile is absent in this collection, which, after all,
              is an ‘album of domestic exiles’). This angle brings the poems closer to individual experience while avoiding sentimentality, convenient
              expressions of emotion, and hackneyed language, so that Sant surfaces with personal poems of universal import. In his examinations of exile,
              Sant illuminates the experience of displacement in numerous poems - ‘Haute Locale’, his mock ode to the United States, that ‘generous ally,
              home of the free / cliché’; ‘Elegy for the Queen’s Head’ (‘Let’s face it, since she’s licked, / ...The rest’s expressly philatelic’); and
              the more serious ‘Voyage’, a dramatic monologue about ‘Britain’s child migration scheme’, a euphemism for the export of unwanted children.
              Although Sant is serious about exile, he is devoted above all to his art: when ‘everything is leaving’, ‘language, I find, is home’. This
              preoccupation with language is manifest throughout the collection. Sant’s well-turned lines advance an often-complex syntax that enhances
              the rhythms of his poetry. ‘Tactic’, a 36-line poem consisting of two sentences, never strains under the syntactical manoeuvres that keep
              the poem moving; and ‘Profit and Loss’ is well-controlled and lyrical: the accounts are windswept; where memos flew, gulls blessed with
              subatomic guile encounter walls that are not there, swoop through and up beyond the roof, a perch of air; the absent- minded managers, sportsmen
              all, have blown their cover and can’t be seen though it’s still early afternoon... Sant’s best poems demonstrate Bishop’s low-key yet scrupulous
              style; and like Bishop, Sant seems equally comfortable in traditional forms and in a contemporary vers libéré (freed verse), as opposed
              to the lineated prose many poets call free verse. Sant’s rich verbal layers and cadences are almost always compelling, and many of these
              poems reveal the ‘whorls and rips’ made possible when an exceptional facility with language collides with everyday subjects."
        - title: Antipodes Review
          text:
              "Poetry - Three poets and fifty years of Australian poetry Album of Domestic Exiles Julian Croft Antipodes , Vol. 12, No. 2, December
              1998 This is an unusual selection of current poetry books to review. Two of the three [David Rowbotham, The Ebony Gates , Val Vallis, Songs
              of the East Coast ] are partly collections of poems written in the 1940s, supplemented by poems written in later decades. The remaining
              one is a selection of recent verse by an established poet in mid-career. It is hard to read them without reflecting on the differences fifty
              years have made to Australian poetry... Coming to Andrew Sant’s latest book, Album of Domestic Exiles , the reader feels like the states
              invoked in the title poem: the comforting familiarity of the domestic, but the attendant dislocation, unease, and uncertainty of exile.
              That, I imagine, is the state of the ego in any poem these days, either as reader or writer. In fact, the title poem sequence ends with
              a poem addressed to the reader in which the writer competes with the reader to be a reader too: Look, a book must belittle a DINK when it
              replaces a condom - won’t you rise and circulate now as a breeder? Give those pages the brush-off. Let me too be a reader. ‘Absent Third
              Party’ And there you have the difference between a poet of the present generation and those of the previous one. The transparent page, which
              was there as a conduit for voice from poet to audience, has become a mirror, partly silvered, which lets both sides of the poem leak one
              into the other. But we might note, there is an absent third party, which the rest of the poem tells us is creativity or the life-force.
              Sant’s poetry is witty, stylistically difficult in places, urbane, pleasant, deep but whimsical. Not unexpectedly, the playfulness of the
              poetry often obscures the subjective centre of the poem. This is not a bad thing, for it gives the poetry a slippery, shining elusiveness
              that challenges readers to give the game of reading their total commitment. It is intriguing that place is so central to each of these poets
              from different periods. All of them range through the world, yet locate the subjectivity of the poet in a distinct Australian region. In
              Sant’s case, this is Tasmania, but, as one would expect of a poet in the late twentieth century, that place is not a point, as it is for
              the earlier poets, but a field, fuzzy, subjective, and open to influence from other points. Style then might be an expression of that same
              difference. For the earlier poets a declamatory certainty, a rhetoric of persuasion, and for the later poet, the reflexive suggestion, thc
              whimsical invitation, a rhetoric of collaboration."
        - title: Social Alternatives Review
          text:
              "Antipodean Voices - Album of Domestic Exiles John Knight Social Alternatives, Vol.17, No.3, July 1998 Album of Domestic Exiles strikes
              a wry dry note from the start. [...] Sant’s verse is clever, polished, subtle, dry and sometimes a little too subdued or restrained for
              my taste. Yet on a second or third reading its quality is undiminished and new aspects revealed. Befitting the book’s title, his poems range
              the globe: NZ, India, USA, England, Bali... Four great poets [ 50-50 by Pam Brown, Dividing the Light by John Allison, Both Roads Taken
              by John Allison, Living in the Shade of Nothing Solid by Jeff Guess], five brave publishers. This most minor poet, editor and boutique publisher
              salutes you. You deserve much greater audiences than you receive."
        - title: Southerly Review
          text:
              "The Genius of the Reader (or Who’s sitting on the chair?) Album of Domestic Exiles Bev Braune Southerly , Vol. 58, No. 2, Winter 1998
              Let me too be a reader In Album of Domestic Exiles Andrew Sant openly asks to be considered a reader of worlds ‘claimed or copied or constructively
              made afresh’ (‘Profit and Loss’) even though his ‘chair in the room’ might be concealed by ‘a drunken / fence’ (‘Tactic’). Here ‘might big
              questions arise again’ (‘Taking My Daughter to the Cave’) where we may participate in ‘the slow / digestion of this place’ (‘A Painter in
              Paradise’). He reads ‘whatever tricks the light proposes’. It is acres between atoms, magnified spaces the windblown backdoor opens onto
              with its coinings and goings. ‘Climate’ Drafts of air turn the leaves of his book. He moves from the static - the taxidermist of the ‘vivid
              block’ of ‘adverse weathers’, of ‘meetings with archaeology’ - to the regeneration of images - gardens and due ripening, glass, lights,
              flames, matched flints reaching from his earlier book Brushing the Dark where a single ‘match flares’. In Album of Domestic Exiles he has
              travelled deeper into soil and beneath doors. He shifts back and forth from the last century to one in the far future. His is a world of
              cameras, shutters and exotic heights. He draws us in with the music of subtle and effective internal rhyme, assonance and end rhyme, carrying
              metaphors with grace through individual poems and the entire collection. Sant’s care in understanding his position as the reader’s reader
              is a marked characteristic of his work. It is a position with which he opened his first collection, Lives , with ‘Glenlyon’: ‘let these
              passing words settle on the unmapped page’. ‘So much must be pared down to this: / whale bone, crow’s skull, fossils’, he reminded us in
              The Flower Industry . In his latest volume the way to the objects in the poem and the objective of writing poetry are largely bound by disruptive
              winds where ‘sunlight strives to eclipse the best gift’. His markers are precise and distinct, particularly in two beautifully sustained
              series, ‘Late Summer Passages’ and ‘An Album of Domestic Exiles’, where he is ‘the sanguine invader [who] blows fuses and darkness confides’."
        - title: Island Review
          text:
              "Mr Lawrence and Dr Sant - Album of Domestic Exiles Simon Patton Island, No. 75, Winter 1988 Like Dr Jekyll and Mr Hyde, the work of
              Andrew Sant and Anthony Lawrence [ Skinned By Light, New and Selected Poems ] represents two contrasting personalities within a complex
              psyche - in this case that of contemporary Australian poetry. Sant’s writing displays a certain gaiety of disposition: it is urbane, metaphysical,
              sedentary; Lawrence’s wears a more than commonly grave countenance: darkly pastoral, hallucinatory, itinerant. Yet aspects of their poetry
              overlap. Both base their poetry in the world of experience and tend to subordinate nature to culture, swearing allegiance to ‘personality’
              as the source and objective of the poetic. Thus, despite their many differences in motivation, their two poetries are consistent in the
              way they value the transformation of reality through language over what Eliot described as transparency: ‘poetry so transparent that we
              should not see the poetry, but that which we are meant to see through the poetry’. The cover of Andrew Sant’s latest collection - Album
              of Domestic Exiles - features a black-and-white snapshot of a young boy. This one image effectively suggests two distinct yet complementary
              aspects of his writing. Most obviously, it makes a direct reference to poetry as photography, the ‘writing of light’ that is able to capture
              the flux of the present moment for posterity. Secondly, it suggests that dimension which coincides with historiography - poetry as a means
              with which to interpret and to reanimate that which has already happened (an impulse that is not always free from a decadent nostalgia).
              Of these two poetries, Sant expends most of his talent on photography, the black-on-white of poetic transcription. Many of his titles serve
              as captions to the scenes he has caught in language. Despite this orientation, Sant is not essentially a word-portraitist; his vision is
              cerebral. The majority of poems in Album are animated not by any proliferation of visual detail but by wit: For company, each other. Monkish
              these stooped willows huddled around the dam are guests when, at dusk, the rest of the party has fled; guzzlers like their mates whose reflections
              all day brisk rivers have trawled; experts when the diviner discovers in the forked switch he’s grasping a seizure from water like lightning.
              ‘Willows’ What counts here is not photographic accuracy but the ability to transpose nature into metaphors drawn from an all too human world.
              The willow trees are quickly displaced by a population of monks, guests, mates, experts, diviners. I think you could argue that Sant does
              not see the willows at all in their particularity. Instead, they are perceived only insofar as they act as a trigger for a series of related
              meanings. Throughout Sant’s Album , the line of inspiration leads almost exclusively from the natural to the cultural: tortoises ‘swagger
              / as if pissed’; timber recalls ‘wine deepening / its flavour in a cellar’; red poppies ‘brazen out their lateness’. In other words, the
              poet projects human qualities onto nature, taming its fundamental otherness in an effort that could be called ‘civilising’. It is this insistence
              on the human that inspires Sant’s poems on social artefacts, the ‘domestic exiles’ of his title. In these texts objects of frozen history
              become the pretext for a punning anthropology: If music hadn’t stunned them they’d be less upright and orderly, confounded by the echolalia
              of usurpers: and slipping free of the rack, welcome a spin away from Coventry. ‘LPs’ If Sant fixes the moment with his wit, Lawrence does
              so with his exuberant fantasy... Ingenuity is a mixed blessing for both these poets. Sant, in particular, is capable of a difficult intricacy,
              a feature aggravated by his fondness for syntactic inversions, archaic vocabulary, and double-entendres. Where he is comprehensible he can
              be charming, but elsewhere his density verges on convolution - ‘Let’s face it, since she’s licked, / the dial of HRH corresponded with a
              need for absent mates / who stuck to their posts. The rest’s expressly philatelic’ (‘Elegy for the Queen’s Head’). Lawrence on the whole
              sticks to colloquial diction and thereby avoids syntactic tangle. His imagistic richness does make for opacity, but he is capable of great
              inventiveness in his use of new angles to probe familiar situations (poems such as ‘Genealogy’, ‘Retirement’, and ‘Reversals’). Both Sant
              and Lawrence take their stand on the ‘I’ to write poetry expressive of their views of the world. But this stepping back into personality
              produces a literature of separation in which the human projects its private meanings onto the natural. The American poet Robert Creely offers
              an alternative, oracular model: ‘I am more interested, at present, in what is givcn to me to write apart from what I might intend. I have
              never explicitly known - before writing - what it was that I would say.’ It is precisely this unknown quantity that I missed in the work
              of his Australian counterparts. Sustained by a strong sense of self, their poetry resists the tug of more experimental agencies."
        - title: Famous Reporter Review
          text:
              "Album of Domestic Exiles Louise Oxley Famous Reporter, No. 17, June 1998 This volume, Andrew Sant’s fifth and his first for nearly
              nine years, confirms him as a poet of unusual intelligence and skill. As the title indicates, the poems are linked by the overarching theme
              of exile, but it would be simplistic to dismiss them as only about this. In his hands exile has many facets. The subjects of his scrutiny
              are exiled in time, as well as physical and mental space. And the range is broad, encompassing both the natural and man-made worlds: gardens,
              caves and forests, journeys, animals (domestic and otherwise), everyday artefacts. All are observed so minutely as to reveal a hitherto
              hidden, and often quirky, aspect of their existence. These are reflections on visits to England from Tasmania, and to places, notably Indonesia,
              in between. Through the poems Sant explores what it means to live in the shadow (or perhaps the light?) of one’s birthplace. Reading ‘Shifting
              Furniture’ I am reminded of a comment made by critic Andrew Riemer, another child migrant, that ‘I am always conscious that my living here
              was the product of a decision made on my behalf’ ( Canberra Times , 9 May 1998). Sant examines dis-junction and con-junction, dis-location
              and co-location, the fact of living with ‘Familiar unfamiliar signs’ (‘Typhoon’). Predominantly intellectual rather than emotional, the
              poems are characterised by a mood, not of detachment exactly, but of emotional restraint. In spite of the fact that many centre on family
              relationships and close friendships, there is the sense of a distance placed deliberately between the poet and his subject-matter. They
              are indeed considered poems, experience magnified by rational hindsight. Change, renewal and the oddity of scale are major preoccupations
              in these poems. Sant’s mastery of metaphor renders it unobtrusive; he manages to do away with the now-naturalised metaphor of the future
              as forward and the past as back or behind, conflating the temporal with the spatial. In this way he probes our complex relationships with
              history and with home. He hopes, for example, that his parents’ furniture will end up ‘disencumbered by the decades removed from the eyes
              of my daughters’ (‘Shifting Furniture’), and discovers ‘a hole surprised by loggers / toppling the future one afternoon’ (Taking my Daughter
              to the Cave’). It is in lines like these where he is at his most skillful; in the latter example the coupling of the casual language with
              an event of such moment makes it all the more appalling. For the most part, however, the poems are suffused with good humour, with a largesse
              which equally accommodates the earthy and the elevated. There is an obvious love of wit, both as admired in others, (as in ‘Vocal’), and
              as exercised by the poet himself, (as in the playful ‘Blotter’ and ‘Elegy for the Queen’s Head’). The conversational tone of the poems is
              deceptive, however. They can be so linguistically loaded that the reader is pulled up short by a dense line, often the last. Very occasionally,
              this doesn’t quite come off, in the last lines of ‘LPs’, for example: Exile’s an eclipsed disc parade when a die-hard fad’s sacked. This
              seems to me to be just too tightly packed for comfort, positively tongue-twisting when read aloud. I wonder whether in these cases the idea
              isn’t being strangled. Otherwise there is very little that jars. Technically the poems are conservative - painstakingly constructed and
              carried by assured rhythms. His sense of irony and ear for the colloquial ensure that the tone is never pompous. In every poem there’s something
              to delight, the senses apprehended with novel acuity, a surprise, a felicitous image: ‘the slouched shed and delinquent fence’ (‘In the
              Garden’) and ‘the garden fork holding the soil in its place / like an hors d’oeuvre’ (‘Days of Incompletion’). These are sharp, refractory
              poems. They glint obliquely. There is much to be discovered here, but concentration is needed to bring them into focus. I have to admit
              that I didn’t warm to them immediately, but I have discovered that this is because they are poems which require - and reward - reading and
              re-reading. The best kind."
        - title: Overland Review
          text:
              "Waiting for the Lights to Change - Album of Domestic Exiles John Foulcher Overland, No.152, Spring 1998 In his book The Great Divorce
              C.S. Lewis tells of a dying man sitting under a tree in a meadow: he is becoming impatient to die, knowing that he will soon be in paradise.
              Finally, death comes, and he wakes excitedly, only to find he is sitting under the same tree in the same meadow. Just as disappointment
              is starting to descend, he touches the grass and finds that it feels and looks more like grass, like the essence of grass, than he has ever
              known. It’s the same with the tree, the sky, the clouds. Looking around, he realizes that he is indeed in paradise; in fact, he always had
              been there, but he had simply failed to notice. The point of the story is obvious: paradise is in the detail that constantly surrounds us,
              but we don’t see the eternities in our grains of sand. It’s not surprising the aim of a great deal of poetry is to explore the daily detail
              which catches life’s meaning and delight. Each of these books, in its own way, deals with this concern, and each provides moments where
              the mundane is elevated and transcended... It’s been almost a decade since Andrew Sant’s last collection, Brushing the Dark . His new volume,
              Album of Domestic Exiles , shows the meticulousness of poetry a long time in the making. From the opening lines of the book’s first poem,
              ‘Climate’, Sant’s impressive sense of language and line is clear: A jasmine spreads its scent into the humid air, the white flowers whirr
              like propellers for a few days and there are more and more, and a clamour of bees that have sped beyond winter: everything is leaving. Unlike
              Kinross-Smith [ If I Abscond, New Poetry and Short Fiction ], Sant handles a variety of forms with ease, poems either tumbling down the
              page in short lines (‘LPs’) or spreading elegantly in long rhythmical units (‘Willows’). More than the other poets reviewed here [Jennifer
              Strauss, Tierra del Fuego, New and Selected Poems , Connie Barber, Enter Your House with Care , Joyce Lee, The Whispering Ear ], Sant finely
              observes the small detail of individual lives. He lives in a paradise of ordinary things: garden rituals, domestic procedures, furniture,
              umbrellas, old records and so on are all explored with excitement and so are lifted into themselves. Occasionally, though, I’m left with
              the impression that Sant’s facility with language disguises a lack of substance, that the weaker poems don’t transcend their detail - the
              title sequence may be a case in point. Sometimes, an urgency is lacking in them. Sant is a better craftsman than Kinross-Smith, but occasionally
              could do with the latter’s intensity, his economy. Overall, though, both poets’ collections demonstrate the virtues of infrequent publication."
        - title: Australian Book Review Reiew
          text:
              "Domestic Poets - Album of Domestic Exiles Brian Henry Australian Book Review, No. 198, February-March 1998 Both Dennis Haskell [ The
              Ghost Names Sing ] and Andrew Sant are primarily domestic poets. Family and friends comprise the milieu of many of their poems, which attempt
              to transform quotidiana into some­thing of enduring interest. The chief danger of this type of poetry is that the prevalence of so many
              poems about family members and friends results in a poetic environment that can resemble a vast, monotonous suburb. If most domestic poets
              seem indistinguishable from each other in their subject matter alone, then the situation of contemporary poetry be­comes further muddled
              when this homogeneity is bolstered by a general complacency with language. Andrew Sant, on the other hand, writes intellectually and linguistically
              compelling poems that deftly wed structure to subject matter. The poems in his fifth collection, Album of Domestic Exiles , offer a skilfully
              ‘controlled abundance’ and invite and sustain repeated readings. As the book’s title sug­gests, Sant is interested in the psychological
              and emotional effects of various types of exile, as in the work of Elizabeth Bishop, whose poetry Sant’s more than superficially resembles.
              The book’s title sequence consists of eight short poems focusing on objects exiled from domestic use - LPs, candles, black-and-white snapshots,
              Mussolini’s umbrella. Sant considers the poignancy of feeling perpetually unsettled rather than the pathos of it (political exile is absent
              in this collection, which, after all, is an ‘album of domestic exiles’). This angle brings the poems closer to individual experience while
              avoiding sentimen­tality, convenient expressions of emotion, and hackneyed language, so that Sant surfaces with personal poems of universal
              import. In his examinations of exile, Sant illuminates the experience of dispalacement in numerous poems - ‘Haute Locale’, his mock ode
              to the United States, that ‘generous ally, home of the free / cliché’; ‘Elegy for the Queen’s Head’ (‘Let’s face it, since she’s licked,
              /...The rest’s expressly philatelic.’); and the more serious ‘Voyage’, a dramatic monologue about ‘Britain’s child migration scheme’, a
              euphemism for the export of un­wanted children. Although Sant is serious about exile, he is devoted above all to his art: when ‘everything
              is leaving’, ‘Language, I find, is home.’ This preoccupation with language is manifest through­out the collection. Sant’s well-turned lines
              advance an often-complex syntax that enhances the rhythms of his poetry. ‘Tactic’, a thirty-six-line poem consisting of two sentences, never
              strains under the syntactical manoeuvres that keep the poem moving; and ‘Profit and Loss’ is admirably textured yet lyrical: the accounts
              are windswept; where memosflew, gulls blessed with subatomic guile encounter walls that are not there, swoop through and up beyond the roof,
              a perch of air; the absent- minded managers, sportsmen all, have blown their cover ...and can’t be seen though it’s still early afternoon,
              Sant’s best poems demonstrate... low-key yet scrupulous style; and... Sant seems equally comfortable in traditional forms and in a contemporary
              verse libéré (freed verse), as opposed to the prose hacked into lines that many poets call free verse. Sant’s rich verbal layers and cadences
              are almost always compelling, and many of these poems reveal the ‘whorls and rips’ made possible when an exceptional facility with language
              collides with everyday subjects."
        - title: Geelong Advertiser Review
          text:
              "Human side to imperial policies - Album of Domestic Exiles Edward Reilly Geelong Advertiser, 17 January 1998 Closely watched, our familiars.
              Andrew Sant is one of those careful, observant writers for whom the world is to be read as one would examine a painting or a printed text,
              and above all, he likes what he sees. In reading through this book, I was struck at the domesticity of his subjects and the close familiarity
              with which Sant talks about a diverse range of subject matter - tortoises and hedgehogs, assorted pets, family, eating strawberries - but
              also with his willingness to tackle major subjects. In ‘Voyage’ Sant uses his experience as an immigrant from England to explore the loneliness
              and feelings of abandonment of a group of young English boys sent out to Australia. Some of them must have landed in Adelaide, for in my
              schooldays there were batches of boys who were ushered into the classroom looking lost and spoke quite strangely. Perhaps it was the first
              time we had heard English as spoken by the English. They could play cricket quite well, preferred soccer or rugby to real football, and
              were given rice pudding - ‘to make them feel at home’ - explained the cook. The last batch ever of childish migrants, England’s unwanted,
              left Southampton as late as 1967 as part of the child migration scheme which had its origins as far back as 1618 when a group of destitute
              children were shipped off to Virginia to fill ‘the empty Empire’. Sant recognises the cruelty of imperialist policies in effect: these children
              were ‘farm hands, at first, last coinage, imperial investments spent’ - in which human lives had become expendable items in some vast geopolitical
              game. The real cost in human terms were the unrecoverables - self-respect, misplaced parents, ‘lost years’. Of all the poems in this collection,
              my favourite is ‘The Pendants’. What one may call ‘a forest’ another will name as ‘woods’: is this just a difference in local dialect? I
              doubt it. Even the light changes when we cross over from the mainland to Tasmania, and changes even more so when we make the voyage back
              to Europe. Saint uses these differences to investigate how changeable our language becomes at such removes of time and place. On a lighter
              note, sequences ‘Late Summer Passages’ and ‘Album of Domestic Exiles’ extol the very ordinary and wonderful things we do in our daily lives,
              climbing ladders to ‘an exotic height’, visiting a Church, celebrating a birthday and lost and banished household items. Each is an occasion
              for celebration of detail and wry comment of life’s little absurdities. Sant’s skill with language and verse-form are evident throughout
              the collection. He offers the reader polished sonnets, blank verse and extended poems. Andrew Sant lives and teaches in Tasmania and has
              been a distinguished co-editor of Island , Tasmania’s foremost literary magazine, and a writer with an Australian and overseas reputation.
              This collection of poems builds upon his previous works begun with Lives (1980) and continued through to the memorable Brushing the Dark
              (1989). I especially would like to remark on the production of this collection by Black Pepper, the North Fitzroy publishing house which
              is building up an enviable list of modestly priced and well presented publications by interesting Australian writers. With the withdrawal
              of many of the major publishing houses from publication of new poetry and fiction, and the hardening of distribution channels for independent
              writers, Black Pepper’s enterprise should be encouraged by the reading public. Our good writers like Andrew Sant deserve to have their voices
              heard, their works read as widely as possible. In Geelong, Album of Domestic Exiles and other publications by Black Pepper are stocked by,
              or can be ordered from, local bookshops."
        - title: Ulitarra Review
          text:
              "Exiles In Heart And Mind - Album of Domestic Exiles Andrew McCue Ulitarra, No. 14, 1998 Same publisher, same theme of exile, even similar
              allusion to photography in the titles, but Andrew Sant’s Album of Domestic Exiles and Mammad Aidani ’s A Picture Out Of Frame are two very
              different books. Black Pepper obviously knows what is the spice of life. In the Album , Andrew Sant is often as missing from his work as
              are photographers from theirs. It’s hard to get to know him, even when he appears to be revealing his childhood to you. When you get a glimpse
              of him in what seem to be some of his self-reflections, he’s usually got the camera in front of his face. Then I read this: Care, detachment,
              a framed deletion of words called from a distance, and clearly a background gentled like haze. ‘Ah!’ I said to myself, ‘He’s more interested
              in a photographer’s eye than he is in the writer’s ‘I’ and his favourite subject turns out to be ‘a background gentled like haze.’ This
              is an easy enough aesthetic to pull off if you’re a photographer (and many a centrefold in Penthouse has been pulled off in the same way).
              All you do is focus upon some quirky, domestic object in the foreground, so that your naked subject is ghosted into the background where
              it can to stick to itself (and many a centrefold does this, too). And if you are an ‘exile’, backgrounds are pretty bloody important to
              you. I bet you, for example, that if Sant were to take a identifying dial could be pleasingly ‘gentled like haze’ beyond recognition. Admit
              it; you’d love it. Nevertheless, Sant manages to do it with words which is no mean feat, given that it is the nature of a words in poetry
              to argue for the spotlight. In the aptly (if not lyrically) named Album of Domestic Exiles , Sant applies the same backgrounding technique
              to a number of subjects. We get, for example, the exile’s experience of his ‘adopted street’ via a focus on a fruit stall; or a sense of
              traversing oceans and deserts by foregrounding a dial tone; or a discourse ‘on the fascism of Mussolini via a back-lit umbrella. One poem,
              titled ‘The Mineral Boom’ turns out to be a nostalgic and cleverly boyish portrait of a teacher in school. Indeed there is no subject, no
              memory, no theme which does not hang like an arras - gently exiled to the background haze - behind Sant’s still-life arrangements of some
              domestic or garden object. This may sound critical, but it mostly works. Backgrounds are obviously important to an exile, and Sant seems
              determined to perfect the roving, idiosyncratic eye of the perfect stranger. Your background marks the spot where you are both rooted and
              uprooted. You inherit the Cherry Orchard, but have lost the recipe for cherry preserve. ‘Living is a knack’ writes Sant; ‘It’s handed down
              like an axe that cannot fell the family tree’ while your mental larder can end up jam-packed with unused labels. The ample lexicon of Sant’s
              Album mainly produces black and white stills - he has little time for colour and movement. He is an intellectual poet. Line and form are
              his chief aesthetic concerns. At a glance he may seem to offer you an abstract art. But you need to spend some time with him - join the
              dots and paint over the numbers - the abstractions will take root, and the backgrounds will come to the fore. If some of those French theorists
              are right, and thinking is always and already a form of exile, then Sant’s poetry is about as intelligent as it gets. If you take your hat
              off to Sant for giving you the exile’s natural, if cool-heeled intelligence, you eat it for what Mammad Aidani can do with banishment’s
              blistering heart. Neatly, for the conceit of this review, Sant’s finale is this: ‘Write! And make exile / unite with the reach of a table’.
              Mammad Aidani’s short novel starts out with a man at a table doing this. ‘What kind of world are we living in?’, he asks himself looking
              into the distance of his memories. He feels the exhilaration of his strong desires and hopes for a better future."
        - title: Sidewalk Review
          text:
              Album of Domestic Exiles Richard Hillman Sidewalk, No. 1, 1988 The poetry in Andrew Sant’s Album Of Domestic Exiles compares with Bertolt
              Brecht’s satirical poetry, perhaps not in content, but in its childlike though poignant construction of detail. Sant is a playful and elegant
              poet. His use of the vulgar comes with a set of stage instructions while off-stage you can hear someone urging, ‘once more, with feeling’.
              His poems appear in-progress, caught out during rehearsal (as if by accident), but wanting to leave early they rush over things, perhaps
              an encounter, missing the mark, or cue, unable to be called back to do it again. Like a child practising a magic trick, Sant is a privileged
              illusionist who must impress his captive audience with a flare for the obvious. Exiles pretends to be a geo-historic lesson in retrievability
              but recited with the short-cut tempo of an actor full of his own self-worth.
russian-ink:
    title: Russian Ink
    author: Andrew Sant
    short_description:
        Like the KGB, the poems in Russian Ink work beneath respectable surfaces. In his expansive new collection, Andrew Sant’s
        language is often charged with wit, and is always incisive. There’s characteristic playfulness in ‘Anthony Sant’, a comic take on Graham Greene’s
        unpublished first novel, and in a vibrant series featuring the folkloric Green Man on a contemporary mission. But beneath surface detail there
        are powerful, controlled emotions. His ‘Stories of My Father’ is like Turgenev on holidays. Above all, these are enjoyable poems, rich in
        imaginative diversity.
    long_description:
        "...trust me, a swatted fly knows the cry of Neighbourhood Watch and gravity tots up the cost when an apple drops. Like the
        KGB, the poems in Russian Ink work beneath respectable surfaces. In his expansive new collection, Andrew Sant’s language is often charged
        with wit, and is always incisive. There’s characteristic playfulness in ‘Anthony Sant’, a comic take on Graham Greene’s unpublished first
        novel, and in a vibrant series featuring the folkloric Green Man on a contemporary mission. But beneath surface detail there are powerful,
        controlled emotions. His ‘Stories of My Father’ is like Turgenev on holidays. Above all, these are enjoyable poems, rich in imaginative diversity.
        Andrew Sant is a craftsman who is not afraid to take risks with language and themes. This book is a major work by an important, innovative
        poet. Anthony Lawrence, The Mercury Among the poets playing the more traditional tunes, Andrew Sant is the best of those new to this reviewer.
        Conor O’Callaghan, The Times Literary Supplement Andrew Sant writes intellectually and linguistically compelling poems... made possible when
        an exceptional facility with language collides with everyday subjects. Brian Henry, Australian Book Review"
    price: 25.95
    isbn: "1876044349"
    release_date: "2001"
    page_count: 112
    reviews:
        - title: Mattoid Review
          text:
              "Reviews Two Very Different ‘Melbourne’ Dreamings Melbourne Elegies , Bread , Russian Ink , The Dining Car Scene Brian Edwards Mattoid,
              No. 55, 2006 .......Andrew Sant’s Russian Ink is a generous collection that offers accessibility with edginess. Most typically, these are
              poems about ‘everyday’ experience; but, as should be the case, this is the everyday reconceived astutely and anew such that recognitions
              of the familiar include, simultaneously, those necessary factors (at least for writers) of particularity and difference. The sense of contexts
              that include and exceed the local is implicit in the book’s title which comes from the opening poem, ‘Nightfall,’ where a string of metaphors
              evokes the coming of darkness and leads to the final lines: ‘Then try repeating / Dark clouds over Siberia’ / and ‘I write with Russian
              ink’.’ Here there are poems about experiences of travel, parting, family, ailments, showering, holidays, a snake catcher, moths and carpentry.
              But ‘Moths,’ for example, moves in its five parts from the bemused description of moths beside the home front door to childhood memories
              of a man who captured specimens, the names of planes, Darwin in Brazilian forests, and to such imaginative projections as: There’s change
              in any event - the moths are testing the binary stakes, ranging from dark toward light, a scattered archipelago, at rest, here, weightless
              as images gleaned from a book. As they linger in drawers and, with butterflies, in taxonomies, collections, forest ways and the imagination,
              moths can provoke poetry. Similarly, rituals of showering include an image of Juliet Binoche, a pun on Eliot’s ‘falls the Shadow,’ details
              of plumbing and decor, a play on Heraclitus, and luxury of waterflow. Interspersed with short poems notable for their precise use of language
              and the dexterity of their formal arrangements, there are longer sequences: ‘Anthony Sant’ with its attention to texts, publication, Graham
              Greene and the vagaries of literary history; ‘Stories of My Father’ which presents a fine litany of detail around ‘I just wanted to get
              him off my back. / Now it’s the certain weight I lack;’ ‘Indian Pacific’ and the intermingling of specificities of journey and dream; ‘All
              We Know’ as a variable exploration of neighbours and the limitations (and temptations) of knowing; and the tight-checking sonnets of ‘Belli’s
              Shade’ which evoke images of Giuseppe Belli, Rome, a conference, sexuality and a relationship. In addition, there are the Green Man Poems,
              fourteen of them, that update the mythical figure, setting him loose upon the world as a sort of flaneur of the imagination, and ‘Summertime:
              A Holiday Chronicle’ which presents the cleverly conceived narrative of Jim and Wendy and the boys, with sundry doubts, clues, shifts, discoveries
              and, it seems, a happy ending. ...These are interesting collections. Black Pepper continues to present writing that warrants attention."
        - title: Southerly Review
          text:
              "Russian Ink Nicolette Stasko Southerly, Vol. 62, No.1, 2002 In China, porcelain is defined as ‘pottery that is resonant when struck;
              in the west, a material that is translucent when held to the light’. It is, of course, easily chipped and equally breakable. One could say
              this is also a plausible description of good poetry and one which applies to the following three collections [Diana Bridge, Porcelain ,
              Gig Ryan, Heroic Money , Andrew Sant, Russian Ink ]... ... from Black Pepper, another very handsome production is Russian Ink by Andrew
              Sant. In other respects, however, and although Bridge and Sant share a certain wordly knowl­edge and erudition, these two poets could hardly
              be less alike. While the poems in Porcelain are meditative and elegiac, concen­trating on the past, those in Russian Ink are very much in
              the present tense - audacious, romping through ordinary life as observed from a train window, seen over the road or heard next door: ‘...trust
              me, / a swatted fly knows the cry of Neighbourhood Watch / and gravity tots up the cost when an apple drops’ (‘All We Know’). The poems
              are witty, acerbic and intelligent. Even the elegy ‘Stories of My Father’, remains poised on the edge, equally willing to see the absurdity
              and imperfection of human beings and their relationships, as well as the sadness and fraility of existence: I’ll never get it straight,
              or wish to. There’ll not be his Scotch to intercede. I am the sole beneficiary. Although occasionally perhaps too clever, rarely does Sant’s
              humour overstep the mark by being judgemental or smug. He just as often turns the magnifying glass on himself - as in what the cover blurb
              describes as his ‘comic take on Graham Greene’s unpublished novel Anthony Sant’: Of readers or critics I relinquish my need; leave ‘Sant’
              to the reams of that poet. Russian Ink is a rich collection replete with - there seems no other word for it - muscular verse which dances
              through the pages. I partic­ularly enjoyed the satiric narrative ‘Summertime’ with its paranoid male characters, just for the sheer playfulness.
              Sant’s ability with rhyme is unusual in contemporary poetry and almost always subtle and sur­prising. But it would be unfair to leave the
              impression that Russian Ink is only entertaining: there are many poems of substance and feeling: ‘If now I could grasp the source / of this
              darkness when the sky is bright’ (‘Down from Mars’); ‘I’m recalling now since memory / comes increas­ingly to seem / a habitation’ (‘Moths’).
              The book, however, is simply too long. This reader at least, could have done without the ‘Green Man Poems’ in particular, which, while inventive
              and sometimes interesting, stretch the theme beyond its limits."
        - title: The Sunday Tasmanian Review
          text:
              "Changing our way of seeing Anthony Lawrence (poet) The Sunday Tasmanian , December 28 Album of Domestic Exiles appears at a critical
              time in the publishing of Australian poetry. Black Pepper is one of two or three publishers committed to continuing what most mainstream
              houses see as a financial drop in the bucket. Of course, anyone who knows anything about the genre understands that finance is not concomitant
              with the writing and publishing of poetry. Black Pepper is a floodlight in the gloom, and they have an outstanding catalogue. Andrew Sant’s
              fifth collection, like its cover, is sharp-edged, yet draws you in. We see an aging photo of a small boy wearing a fighter pilot’s helmet.
              An oxygen mask hangs down like some terrible growth under his chin. He is gazing off into the distance while standing against a backdrop
              of suburban security. It’s a key to the collection, which can be read as one long poem, or seen as a series of connections. Sant has crafted
              past, present and future into a book that is, while not totally seamless, a map that unfolds by itself as you read. ‘Climate’ is the perfect
              opening poem. It lays the foundations for many of the book’s concerns: loss and replenishment, pure observation (through memory and immediacy)
              and the poet’s sense of his own life and death; of how an acceptance of this balance is essential for growth. Take these examples from the
              last two stanzas: continuance, co-operative death, interdependence, comings and goings . Having sampled the dislocation, here’s unity: ...a
              round seven years it takes for the all-change of my body’s cells and ...a clamour of bees that have sped beyond winter: everything is leaving
              Reading back and forth through this book, I had a sense of someone mapping presence and absence, despair and exhilaration: a curious cartography
              of the mind and body. It works. You don’t need a compass. Sant’s fine sense of craft and his ability to change our way of seeing are directions
              enough. Often, he uses tight rhythms in long-limbed, narrative pieces like ‘Mainstreet Fruiterer’ or ‘The Pleasure Seekers’. Though, even
              here, there is a lyricism that works on the inner ear as the stories unfold. ‘The Pleasure Seekers’ has echoes of Paul Muldoon, that Irish
              shape-changer, and the American poet August Kleinzahler. Take the last two lines: Dark eyes watch them stalking shadow-like across wilted
              offerings that might be refuse, towards the insomniac, throbbing bars. The brilliant ‘Elegy for the Queen’s Head’ reveals how Sant can align
              black humour and history to create a common, local experience. I’m amazed that a poem about a postage stamp can be so unsettling: Never
              in miniature did she flinch or shake the tiny sparklers at her throat… ‘Voyage’, while being the most prescriptive of the poems concerning
              exile, is a poignant diary of internal/external conflict in a new land. It’s like a talk-back program about identity coming and going on
              the wind until, when you’re close enough to hear every word, a gallery of lives and stories come through indelibly. Album of Domestic Exiles
              is a book that works on many levels: as a whole, and within each poem. Andrew Sant is a craftsman who is not afraid to take risks with language
              and themes. This book is a major work by an important, innovative poet."
        - title: The Age Review
          text:
              "When the shape is everything Gig Ryan The Age , 23 June 2001 Russian Ink is Andrew Sant’s sixth book. His work is always consistent,
              but Sant’s strengths and weaknesses do not change from book to book and again there are stray endings preceded by a sudden formality or
              ominousness, striking images lost in a sea of unevenness (‘At his wrists / his sleeves are Elizabethan / frills of suds’), the sage-jester
              persona, elegies to childhood. In one of the best poems, ‘Anthony Sant’, the title of an unpublished Graham Greene novel, he finds parallels
              between writers - ‘Two fat volumes for a life outpiloting death / while I laze in the wake of what you wrote’. And later: Proof he’s really
              a brother, a chum, a bulwark in such dark hours, as publishers know when readers fail to erupt. Ah, far less risk besets the unpublished
              manuscript. In many poems, Sant is straitjacketed by a traditional sense of melody and rhythm, with corrugating internal rhymes and metronomic
              assonance. Although he pays homage to such unlikely forebears as Larkin and Graves, as well as Pope and Browning perhaps, he misreads Larkin
              as pure domesticity and Graves as wobbly excess, and so his imitations misfire. Developments in Sant’s work are chronological and philosophical,
              not linguistic. The long fourth section, ‘Summertime’, details a family holiday, and though the odd formal rhyme parcels up the action,
              this poem is too attached to the subject it puzzles over at length in a form of biographical penance. Sant echoes Ted Hughes at times in
              his ‘Green Man’ poems, with their epigraph from Graves and he also uses some Berryman-like inversions and contortions unconvincingly: There,
              on the slippery deck, I first met you, famous poet, who could tilt the globe of memory, exile words in blue acres, exact, within sea-whipped
              cartography’s grid, a lasting measure. Compare that to Berryman’s ‘Dream Song 283’: I seem to be Henry then at twenty-one steaming the sea
              again in another British boat again, half mad with hope: with my loved Basque friend I stroll the topmost deck high in the windy night,
              in love with life which has produced this wreck. The last section has a series of poems extrapolating single objects - moths, ferries, pencils
              - and this barcode poetry is a common device used by many. At other times poems are choked by inflated verbiage - ‘This returns to me now,
              checked, / since old reading from memory bleaches’. For Sant poetry comes with specific purposes and equipment whereas for Curnow [ The
              Bells of Saint Babel’s ] poetry is all-inclusive. Curnow’s writing is refined, not to conform to tastefulness, but to convey his matter
              most clearly. Some writers’ careers are a hacking away at the marble until the figure appears, others’ constant hackings only roughly order
              the shape into any change, but each change is neither better nor worse than the previous attempt."
        - title: Australian Book Review Review
          text:
              "The Impetus of Poetry - Russian Ink Paul Kane Australian Book Review , No. 231, June 2001 Wallace Stevens once remarked: ‘One of the
              essential conditions to the writing of poetry is impetus.’ It’s a statement worth keeping in mind when confronting a new book of poems because
              thinking about impetus helps us locate the concerns of the poet and the orientation of the book. Since poems are not objects so much as
              events, what drives a poem helps govern how it arrives at its destination - how, in fact, it is received by that welcoming stranger, the
              reader. Poems reveal their origins, whether they intend to or not. What Emerson says of character, that it ‘teaches above our wills’, that
              ‘we pass for what we are’, is true for poems as well. So it is not an idle question to ask of these books - these poets - their impetus,
              remembering that ‘impetus’ derives from the Latin ‘to seek’. I think it would be a mistake to assume that these poems seek to communicate
              with readers. The impetus here is not self-expression. At this point in their careers - and that’s a telling word in itself for a poet -
              both Andrew Taylor [ Götterdämerung Café ] and Andrew Sant have established themselves in durable fashion. Taylor, born in 1940, has just
              published his tenth volume of poems; Sant, born in 1950, his sixth. Neither, at this juncture, is likely to believe that he is reaching
              out to a populous audience of poetry lovers. Except in a few cases, that’s a supreme fiction, though a necessary one. Nor are these coterie
              poets, writing for a small devoted band of followers. No, like most poets at mid-career, the impetus is to write the poems that they, as
              poets, seek to write. If that sounds tautological, it needn’t be: devoted poets are devoted to their poems; they are ‘makers’, whatever
              their readers may, in turn, make of them. Consider the opening poems of each volume, and the way they gesture towards the writing of poetry.
              Sant begins ‘Nightfall’ with the lines: The leaves release their light. Bees, the fuchsia’s guzzlers, quit their day routine as somewhere
              a voice calls, ‘Come inside.’ That voice is presented as a domestic one (for the poet) and an instinctual one (for the bees), but it also
              serves as the voice of impetus, the call to turn inwards towards poetry, to ‘Come inside’. The whole poem in fact hinges upon the moment
              when ‘the past and future / fold in the breadth / of all the air’. We are left with enigmatic phrases that signal the presence of a poem
              seeking its poet: Then try repeating: ‘Dark clouds over Siberia’ and ‘I write with Russian ink’. Similarly, Taylor writes in ‘Das Abendland’
              (that Occidental realm of Western thought and desire): Still there’s kindness a refracted glory in this proximity to Eden if one can bear
              the burden of absolute kindness. The kindness of natural beauty here is burdensome because it is absolutely beyond recompense; we cannot
              adequately repay the gift of life. In the same way, a poem is a ‘refracted glory’, a kindness language bestows freely upon the poet no matter
              how hard the poet may be working to be equal to it. If there is an ethics here, it is to write the best one can. This is not to suggest
              that these poems are merely self-reflexive or self-regarding. On the contrary, both poets engage with the world and speak to those encounters
              we denote as experience. What, then, distinguishes them, in both acceptations of the word, ‘to separate’ and ‘to recommend’... Andrew Sant’s
              poetry, like Taylor’s, evinces a sharp intellect at work, though Sant’s poems come across as more restless perhaps, more driven to seek
              out new approaches, new retrievals. There is a seven-part poem that takes up the name ‘Anthony Sant’ (the title of Graham Greene’s first
              novel, which went unpublished). It’s a witty poem in which the character Anthony learns of a namesake, Andrew Sant, who is living in Tasmania.
              The second section of the book is devoted to ‘Green Man Poems’, in which the tree-spirit of Frazer’s The Golden Bough becomes a curiously
              contemporary figure. And the fourth section is a long narrative poem, ‘Summertime: A Holiday Chronicle’, which details the amusing exploits
              of two couples caught up in a mysterious financial speculation. All of these poems display Sant’s quick inventiveness, which extends to
              the characteristic movement of his verse: he is fond of short lines with rapid shifts of sense and sudden stops, where one encounters single-word
              sentences in the midst of a line. This accords with Sant’s keen eye, which invites us to see as he sees, where the concern is more for immediacy
              than meditation, for compression more than extension. To write narrative in such a line is a challenge, but Sant is capable of it. At times,
              I miss the sweep of those long verse lines so captivating in earlier work ( Brushing the Dark , for instance), but there are memorable poems
              here to be sure. One is the sonnet sequence (in the difficult Petrarchan form), ‘Belli’s Shade’, which narrates a love affair in Rome between
              a visitor and a local beauty. Wryly, sonnet four begins: Above him, exalted, that later week, since on his back he gained a better view,
              a fresco of the Virgin, robed in blue, was one position, swapped about, until each peak released the lovers, breathless, cheek to cheek
              - Another fine poem is the moving memorial to Gwen Harwood, ‘Ferries’, where: There, on the slippery deck, I first met you, the famous poet,
              who could tilt the globe of memory, exile words in blue acres, exact, within sea-whipped cartography’s grid, a lasting measure. Here it
              is memory that makes for the memorable, and at times one can sense in Sant’s work a tension between invention and remembrance. In ‘Moths’,
              the poet is recalling a scene out of darkness, ...since memory comes increasingly to seem a habitation. Whether Sant’s poems inhabit memory
              or seek an imaginative realm, they are impelled by a receptivity that requires an openness to their own processes. As he says in ‘Waiting
              Games’: Waiting, too, needs a strategy as artists do, heads askew, gazing like the commuters, here, in cold air. Both Sant and Taylor understand
              such waiting. In poetry, it is a strategy for action, an essential condition for a poem’s impetus."
        - title: Island Review
          text:
              "Outside & Beyond - Russian Ink Chris Wallace-Crabbe Island , No. 86, Winter 2001 In the case of Andrew Sant, we turn to an old Island
              hand; he edited the journal - with Michael Denholm - for a decade. I realise, too, that his first book of poems was published as far back
              as 1980. This being the case, it is surprising that he has not had more critical attention. Sant appears on stage quietly, but he has range:
              he sets himself projects. He exhibits some of the qualities which a nineteenth-century critic found in Browning: ‘the cunning prying into
              detail, the suppressed tenderness, the humanity - the salt intellectual humour’. As an example of the last trait, he offers a suite of seven
              lyrics on the fact that Graham Greene’s unpublished first novel was called Anthony Sant . He gets around, with a fine poem on ‘Waiting Games’,
              a nice closure on pencils (he has beaten me to the draw on this theme), and a tribute to that larrikinesque Roman sonneteer, G.G. Belli.
              What I have called his projects include the eight elegiac ‘Stories of my Father’, fifteen pages of Green Man poems, and also a fictive holiday
              chronicle, done in the free tercets which suit him as a medium: ‘That Viet Nam War,’ a serious son is saying, flywire door slamming behind
              him, ‘did it generate economic gloom in Asia?’ His father is an arse reversing out of the fridge. And, of course, Vietnam was the Cold War
              in reverse. But this is also an ordinary kitchen; it enters what Randall Jarrell called ‘the dailiness of life’, as we can find it doing
              so often in Sant’s inventive poems. These poems use long lines or short, sonnet, parody and prose poems; there is even a ballad with the
              malty refrain, ‘Halm, Guinness, Fosters, Bass’. The guy who inhabits Sant’s poetry is clever, but is also a genial humanist who proffers
              the mild request, ‘Give me extremes of cold and hot / mixed in a mega-ritual’. Just the thing for a dinner guest."
        - title: Togatus Review
          text:
              Book Reviews - Russian Ink Michael Lang Togatus, February 2001 As a reader it is a joy when you read something so well crafted in its
              style and energy that the effect is electric, sincere, almost profound. This is one of those books. Andrew Sant’s most recent book of poetry
              is fairly dark, never dull and very often funny. As with any writer worth their salt Sant’s work allows the reader to indulge in a fair
              whack of self-examination. Writing about life, love, the sociological importance of showering, waiting, and the guises of mistrust, Russian
              Ink is a volume of work that will grasp the heart and hold your attention. The touching and revealingly human ‘Stories of My Father’ and
              the humorously dark and refreshingly accurate ‘Summertime A Holiday Chronicle’ contrast dramatically with Sant’s ‘Green Man Poems’, such
              as ‘The Sensualist’ and the more Ballard-like ‘Greenland’. Sant has the ability to give to his writing an honest craft that makes for a
              satisfying book of poetry.
tremors-new-and-selected-poems:
    title: Tremors, New and Selected Poems
    author: Andrew Sant
    short_description:
        Tremors, New and Selected Poems distils Andrew Sant’s poetry published over twenty-five years. The poems move from seriousness
        to wit, with subjects including music, marine biology, Martian meteorites and fresh perceptual territories.
    long_description: Tremors, New and Selected Poems is the distillation of Andrew Sant’s poetry
