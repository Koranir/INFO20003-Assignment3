        - title: Paul Knobel, Southerly
          text:
              "Wisdom on the Wing An Australian Conference of the Birds Paul Ernest Knobel Southerly , Vol. 56, No.3, Spring 1996 (pgs 224-225) In
              An Australian Conference of the Birds , the Sydney poet Anne Fairbairn has produced a masterpiece of poetry and one of the great poems of
              Australian English. The work is inspired by the Persian poet Attar’s Conference of the Birds , written in the twelfth century, itself a
              masterpiece of world literature. In Attar’s poem the birds of Persia gather to debate the meaning of existence and to search for the Simorgh,
              the Bird King who embodies the truth (Simorgh means thirty birds in Persian). Attar was a Sufi. Sufism is a mystical religion based on love,
              connected to both Hinduism and Christianity and widely disseminated from Turkey to India and as far as Malaysia and Indonesia; Sufi works
              are also know in Africa, in Hausa and Swahili. In An Australian Conference of the Birds , the setting is Australia and the birds are all
              Australian. Each bird gives his own view of life: ‘try to grasp eternal love’, the Peregrine Falcon says; ‘strive to avoid the shallow pools
              of the self (the Spinifex Pigeon); ‘forget... indulgence, and purify your soul’ (the Swamp Pheasant). Finally the birds, gathered around
              a billabong, look into the water and realise what they are seeking can not be found in any external action but only within themselves. The
              poem concludes with the Sea Eagle flying to ‘the Turquoise land’ - that is, Iran - with- a whisper of wool to place on Attar’s tomb, an
              allusion to the fact that the word Suf means wool and Sufis always wore woollen garments (as the notes at the end make clear). Sufi Poetry
              was allegorical. What is the meaning of Anne Fairbairn’s allegory? Clearly the work is meant as a comment on Australian society, its foibles,
              greed and petty vanities - and by extension other societies: ‘Your avarice is a regrettable sign of the times’ we learn from the Spinifex
              Pigeon, and later ‘Stop preening your feathers under the jewels of night / stop wandering aimlessly and search for the essence’. For those
              who know the contemporary poetry scene - especially the Sydney poetry reading scene - it ran also be read as a comment on poets and poetry
              (each of whom thinks she or he has produced a masterpiece every time she or he reads). Finally it seems a comment on rulers and parliamentarians:
              ‘A little less pride... will serve you well’. Like all great poetry this is a poem rich in wisdom: ‘be brave for life / demands it; try
              to stand firm but never be cruel’ the Spinifex pigeon tells us and ‘everybody / drunk or sober, thirsts for the Beloved’. ‘Our finite minds
              can never grasp the infinite / and wisdom is knowing we may never know’ we learn again from the same bird - perhaps the ultimate meaning
              of this postmodernist work in which many talk but few seem to be listening. Hopefully An Australian Conference of the Birds will be read
              by adults and to Australian children for many generations (it is especially suitable for reading to small children without being specifically
              a children’s book). It is an enchanting work and, in a world overwhelmed by serious problems, a reminder that the main purpose of art is
              to give pleasure. Many Australians who do not know the names of Australian birds will learn them from it (how aptly named seems the Squatter
              Pigeon). The poem is being translated into Persian and translations into other languages such as Turkish, Arabic, Urdu, Bahasa Indonesia
              and Chinese are already on the way we are told in the introduction. Its fame seems assured. It should receive many fine illustrations in
              future editions showing all the Australian birds who appear in it. The present edition only shows a few."
        - title: A.H. Johns, The Canberra Times
          text:
              "An Australian narrative inspired by Sufi classic A.H. Johns (academic) The Canberra Times , 16 December 1995 This little book is a
              delight, modest in presentation, rich in insight and spiritual wisdom, and exquisite in its use of language. It is a narrative poem inspired
              by a classic of Sufi literature in Persian, The Conference of the Birds (Mantek at-Tair) by the Persian mystic Farid ud-Din Attar (circa
              1120 to circa 1193). An English rendering appeared in Penguin Classics {Farid ud-Din Attar, The Conference of the Birds , 1984). Attar’s
              poem is a long work of more than 4,000 lines. It is an allegory. The birds decide that they need a king. The Hoopoe, who in the Qur’an (Sura
              27 [The Ant]:27) is Solomon’s envoy to the Queen of Sheba, is recognised as their leader. He tells them they should seek not a worldly king,
              but the Simorgh, a spiritual bird representing spiritual enlightenment, which, after a long and dangerous journey which will take them across
              seven valleys representing spiritual states, they will find within themselves. The birds are hesitant to take up the challenge. Each makes
              excuses that reflect the personality assigned to it by convention. The Nightingale is loath to abandon the rose, the Parrot is more concerned
              with its freedom than any spiritual quest; the Peacock longs only for the earthly paradise it once shared with Adam, and the Duck is reluctant
              to leave its ponds and streams. The Hoopoe answers each objection in turn, exposing the moral weakness that gives rise to it, and telling
              a story to drive her point home. Finally the birds set out on the long quest, and 30 of them reach their goal. A rich mystical theology
              underlies the structure of the poem as it unfolds. It is multilayered in its significances. It pulses with both spiritual and worldly wisdom
              and shrewd psychological perceptions, and is sustained by numerous allusions to and echoes of the Qur’an. Attar’s poem has given spiritual
              inspiration to millions over the centuries. Anne Fairbairn’s poem, dedicated to his memory, uses the same allegory. Attar’s Hoopoe calls
              to her cousin the Spinifex Pigeon ‘Through shadow-drifting veils of time and distance’ in the remote south to hold a conference of Australian
              birds. The Spinifex Pigeon obeys, and summons her country’s birds. They come from the scorching deserts and sullen swamps of this vast,
              forbidding land; from the seas, rivers, relentless skies and steely trees. With faith we shall beat our wings as one flying in our hearts
              towards the Light, seeking for our darkest sins and sorrows/with quiet resolution. The birds arrive one by one, and Fairbairn, in describing
              them by delicate shifts in the rhythm of the verse and hints at onomatopoeia in the choice of an epithet, gives a three-dimensional picture
              of movement, colour and sound distinctive of each of them. As the Spinifex Pigeon addresses them in turn, she modulates its tones with a
              skilful use of speech rhythms within the pulse of the verse, as in Your avarice is a regrettable sign of the times,’ sighed the Pigeon,
              eyeing the Bower Bird, ‘And this Crow has blood, on his beak. I warn you, possessions and cruelty bring no peace. Renounce your habits for
              love, When you reach for the inner meaning , as Rumi tells us, You reach peace, marrow of existence! Often she realises a truly Tennysonian
              verbal music: Now I hear the Bell-Birds calling me from Toma valley, to say one is flying here; they sound like tinkling bells in a distant
              shrine. Followed by a down-to-earth apothegm: It’s always wise to listen to what1 is said, but even wiser to know what’s left unsaid. Into
              the verse, Fairbairn weaves lines of the great Persian mystics Hafiz, Jafni, Rumi and Sa’di. and with them phrases, and echoes from the
              Qur’an, including the ecstatic phrase of God as Light upon light (Sura 24 [Light]:35) as sustenance that carries the birds on their way
              and the birds reach their goal, realise and recognise within themselves the spiritual wisdom that they seek. In gratitude, they send as
              a gift to Attar ‘a wisp of softest lamb’s wool’ carried by a relay of birds. Among them a Crested Hawk who flew across our starlit heart
              of dust over scrub and bony Eucalypts, over Wattles and River Gums she soared, above the Kimberleys and out to sea by a Sea Eagle who flew
              North high over the rhythm of rolling oceans. winging his way through storm-inked monsoon clouds split by fire, winds and hurricanes to
              Hormuz. At length it is passed to the Golden Eagle, who takes it to Nayshapur to Attar’s tomb. The gift has been delivered: a wisp of softest
              wool from the Great South Land to the great Sufi poet - and suf means wool - whose words inspired them. A token of love and honour from
              Australia to one of the great spiritual traditions of humankind."
        - title: Campus Review Review
          text:
              "On a poetic flight of fancy Ehsan Azari Campus Review , Vol. 6, No. 33, 28 August-3 September 1996 Poet Anne Fairbairn’s recasting
              of a 12th-century Persian fable is a piquant mixture of Sufi mysticism and poetry in a contemporary Australian setting. The poem fuses East
              and West in a way that seems to dissolve the ‘otherness’ of the East. An intimate debate among the birds opens the verse, akin to the beginning
              of Chaucer’s dream-poem ‘The Parliament of the Fowls’, but unlike Chaucer’s fowls, the Australian birds guided by Spinifex Pigeon hold a
              gathering by a billabong to discover their inner selves. The Wagtail and his companions, Crimson Rosella, Peregrine Falcon and Butterfly
              Quail, bring the flock of the birds from Australia’s scorching . deserts to the billabong. While rapt in a passion by their guide’s stirring
              sermon, the birds agree on an inner voyage in their search for divine unity. Many birds perish along the arduous inner journey. At the end,
              the surviving 30-odd birds open their eyes and see their quivering images in a mirror-like surface of the billabong. Through a revelation,
              they realise that the deity is none other than themselves - the core of Oriental emanationism. Then a wisp of wool, pecked from a lamb by
              a Crested Hawk, is ritually passed from beak to beak. A desert wind lifts the wisp to Uluru (Ayers Rock), and from there to the Iranian
              city of Naishapur by a Golden Eagle. There it slowly floats over the tomb of Farid ud-Din Attar, the great Sufi poet (1120-1230 AD) who
              wrote the Persian mystic poem ‘The Conference of the Birds’. Why a wisp of wool? By this symbol the poet makes her offering to the Persian
              saint. The Arabic word sufi is derived from the word for wool, traditionally worn by Sufi adherents. Fairbairn’s long interest in Middle
              East poetry is well-known, especially her remarkable editing of an anthology of Arabic poetry Feathers and Horizon. But her love of the
              region does not hold her back from exposing evil there. The plight of Iran today is laid out in the last lines of the poem: [Eagle] whipped
              away the wisp of wool, carrying It over sleeping Naishapur, over Night Hawks soaring in the wild nocturnal flight, Up to spinning supernal
              Light upon Light. An Australian tone is created with laconic humour throughout, by avaricious Bower Birds, laughing Kookaburras, the Cruel
              Crow and the Black Swan ‘stretching its long neck, searching for signs of passing day’. The poet’s depiction of Australian birds with a
              mystical context revives the anthropomorphic ethos of medieval Persian poetry. The Sufi doctrine of pleasure through pain has offered a
              conduit for the imagination of the poet to escape from an ‘inner wasteland’ and the tyranny of materialistic society to a dreamy world of
              Oriental mysticism. To live is to feel, to feel is to suffer, through Our pain, we find the pleasure of Paradise. The ubiquitous sense of
              despair in the book connects Fairbairn to a feeling of alienation found in Judith Wright’s work, and to another Australian poet, James McAuley,
              who drew on ‘the voyage within’ in his poem ‘Terra Australis’. Fairbairn’s miniature replica of the tale of Attar - the saddest of the Sufi
              poets - opens the gate of the rose gardens of ancient Persia for a new readership. Unlike Edward Fitzgerald, who introduced the sparkling
              Rubaiyat of Omar Khayyam to. the English-speaking world, she brings out a deeper mystical fable, perhaps to match her own gloomy vision."
        - title: The Mercury Review
          text:
              Verse shaped by the nature of the land An Australian Conference of the Birds Patsy Crawford The Mercury , 29 January 1996 Anne Fairbairn
              brings another, more academic perspective to the business of poetry. She has lectured at universities in the Arab world and has translated
              Arabic poetry into English and much of her work is translated into Arabic, Turkish and Persian. It’s the Arabic influence she brings to
              An Australian Conference of the Birds , a very direct tribute to the work of Islamic poet Farid un-Din Attar whose A Conference of the Birds
              she describes as ‘a glittering work of the Sufi tradition.’ Fairbairn sets her poetic adventure among a gathering of Australian birds, including
              the spinifex pigeon who, at the invitation of her Middle Eastern cousin, the hoopoe bird, calls on them to go on a journey. It will be a
              journey of inner discovery and a search for truth. The poet uses the desert common to both Australia and the Arab lands as a backdrop and
              her narrative blends imagery and metaphor as it takes flight. It is a brief and pretty piece from a poet of great subtlety.
        - title: Five Bells Review
          text: An Australian Conference of the Birds A.H. Johns Five Bells , Vol. 3, No. 3, April 1996 (pgs 8-9) [Text not yet available]
paths-of-flight:
    title: Paths of Flight
    author: Luke Fischer
    short_description:
        Paths of Flight is Luke Fischer’s first collection. The poems attend to visual detail, the natural world, and imaginative
        vision.
    long_description:
        Paths of Flight is Luke Fischer’s first collection. The poems attend to visual detail, the natural world, and imaginative
        vision.
    price: 22.95
    isbn: "9781876044855"
    release_date: "2013"
    page_count: 96
    reviews:
        - title: Plumwood Mountain Review
          text:
              "A Life Viewed through Verse Megan Blake Plumwood Mountain, Vol. 1, No. 2, August 2014 Paths of Flight felt undecided as I first encountered
              it—at turns caught and contradictory, bent sometimes one way and sometimes the other, strung between and among competing ideas—but, in the
              end, seemed to achieve a certain balance and reconciliation, that was perhaps its destination all along. There is a dynamic of tension and
              reconciliation in the poetry that can feel at some points like the poet is sending contradictory messages, unsure of what he wants to value
              with his words or the way in which he wants to use tropes to do it. Individual poems can certainly be read and enjoyed on their own, but
              for me the best way to appreciate the balance of contradiction and unity was to read it as a collection: from start to finish, allowing
              the progression to lead me on its own terms to an overarching interpretation or impression, rather than me looking for a coherent and single-note
              one from each piece. And, from the beginning, in retrospect, the title gives me a hint that this will be the way it is. The “flight” of
              the collection’s name evokes sweeping movement, unrestrained and liberated, arcing like the black birds of Fischer’s Overland Judith Wright
              Poetry Prize-winning poem “Augury?” in swoops and gusts that lift away from the ground, the page. As Fischer comments in the poem “Pedestrian”—his
              ode to the liberated movement of air—flight is the meandering, flowing and tumbling, lifting and eddying with the gathered leaves: flight
              is the dancing. Paths, therefore, are where flight is not; on the ground, paths are where, in “Pedestrian”, the park is not. And so, in
              the collection’s title, the paths both ground the flight and are somehow given lift-off by it. Because a path is a directional space, it
              has a destination, and prescribes a way in which to achieve it. It does not swoop in unselfconscious eddies like the air above it does,
              but rather traces on the tangible the way to walk—controlled, yes, but also comforting and giving purpose. The paths in a way give this
              purpose and tangibility to the flight, but by being traced in air are made light, like a liberating breath, and are seamlessly, invisibly
              connected to the surrounding air. One cannot, after all, see the edge of a path through air; one can only see it as it is made. The name
              of the collection thus, for me, enacts the kind of tension that I find weaving through the book: one of seemingly opposing forces looping
              around and even occasionally appearing to undermine each other, yet somehow finding moments of temporary harmony. I would hesitate to say
              that the collection “resolves” in any kind of absolute or permanent way, because it is a journey rather than a state, and the movement that
              seems such an integral part of the collection—the movement of music, the movement of people across landscapes, the movement of birds through
              air, the movement of one line seamlessly to the next (one poem, “Walking Instructions”, eschews punctuation almost entirely)—would resist
              that. But a balancing emerges. This is a tension that manifests in various ways—almost testing out possible resolutions before moving on
              to another and then discarding that, too. On the one hand the poems honour the “small” of existence: the birds, small and relatively frail
              members of the non-human community; within this, individual birds such as one owl, one hawk, two black birds, each given their own materiality
              and vitality; the radiant atoms of the sky, not as any great “dome of the infinite”, but as a simple primary colour with which one pair
              of eyes connects like a gentle hand touches a child’s back; the delicate structures of a twig, “touching the smooth current/of a mountain
              stream” (72); the steps that are imprinted, one by one, into the quilt of new snow. On the other, however, the poems are redolent of high
              culture and the intellectual theorising of the world: Rilke hovers over the words and appears explicitly as epigraph; European cultural
              sensibilities are evoked through references to Renaissance painting, sculptural snapshots such as Rodin’s “Thinker” and Brancusi’s “Bird
              in Space”, mythology and ancient Greek philosophy; and the mass spread of humans across the planet is mapped through poems referencing travels
              to Damascus, Provence, Germany and Australia. Similar tensions emerge in the contrasts of human and non-human; losing versus finding; the
              metaphorical against the literal—and even through form, with enjambment and flow against pause, stanza break and punctuation lacunae. Some
              pieces seem more focused on the world of humans and culture than on that of the non-human or nature. The opening poem, “Portrait of a Thinker”
              (1), commences with an avian conceit: His eyebrows are falcon wings gliding on a constant current. His metallic eyes take in the scene dart
              to distant prey. His nose is beak-like – not the small busy beak of a sparrow nor the ibis probing a garbage bin afterwards, moving to a
              more geological metaphor with: His face is wind-sculpted, facetted like a crystal. And his brow is steep and hard not sandstone but granite,
              tall But the referent object of all this bird-life and land is a sculpture of human art and high culture. The language therefore seems bent
              towards the reflection and intellectual processing of humans beings, diminishing the value of the natural world being used to illustrate
              it. Nature is the manifest content, but culture is the latent. The direction of thought away from the apparent natural object also occurs
              in “Appassionata”, for instance—where a pianist going over and over his progressions has “movements/like an alpine stream continually smoothing/the
              stone”; and “We thank the clouds” acknowledges the elements, but in terms of the gifts that weather gives us, thanking the lightning that
              “splits the dead stumps/our hearts had become”, the mists for “hiding moments of our past”, and the “endless drizzling days” in the way
              they “incite us/to read a recommended book/forgotten on a dusty shelf” (60-61). In the final poem, “Diptych”, the sky is described as “the
              blue of a renaissance sky”, somehow subordinating the natural blue to that of the paint it aims to emulate (80). This directionality is
              complicated at other points, however, where the natural is privileged and the human is the illustration of lesser weight. In “Corellas”,
              the birds are described as “ladies at a tea party”, “dressed/in white tennis outfits, strolling to the courts”: “A daintier sort of parrot
              – cockatoos/who read their Emily Post” (35). The marriage here of human cliques and class hierarchies is transported hilariously onto the
              smooth feathers and high-pitched “squeaks” of the Aussie bush. In “Augury?”, the title of which means a kind of presentiment of the future,
              the black birds observed by the speaker arc “more smoothly than figure skaters” and flip “far swifter than stunt planes”, bending thus our
              focus towards the singularity of their flight and away from the planes and olympians (74-75). In the end it almost seems interchangeable,
              whether nature illustrates culture or culture illustrates nature, and the language bends both towards the natural and away from it. In “Early
              Autumn Morning” (64), you see a eucalypt in the park with torn clothes dangling from its limbs, and a grey lamppost standing at a corner
              like a lost giraffe. while in “Dealing with Early Spring” (5), A beggar cups his hands and pleads for change while the sun gilds his palms
              and fingers like a bowl possessed by Charlemagne, standing now in a museum’s vitrine. The tension between high culture and low culture is
              also exploited, in a way I feel I would recognise in the future as an emblem of Fischer’s style. One striking and, for me, enjoyable example
              is the progression of “Band of Cockatoos” through “Thoughts on a Walk by the River Sorgue” to the beginning of “Swift”. “Band of Cockatoos”
              (22) plays on the collective noun pun of the title to paint the group of birds as a punk rock band, starting off with plumage “a bit too
              white like/the polished teeth of salesmen,” but then breaking into havoc as they “open their gravel beaks” and the lead alights and hops
              along a broken branch, flares his pineapple Mohawk while banging his head, rends his jacket and insists the members scatter to the surrounding
              tiers where they join in a punk-rock cacophony. The page then turns and moves to a reflective walk along the River Sorgue, and we are transported
              from an Australian backyard to countryside France, picturing high school graduates with heads full of knowledge and philosophising on the
              fate of ducklings who might, in the patchy fuzz of their feathers, have in their destinies “a form/other than that of duckness” (24). The
              third poem, “Swift”, then commences with a quotation in French—with no offered English version—from a piece by twentieth-century poet, René
              Char: “Such is the heart”, it proclaims upon translation, “if he touches ground, it tears him apart” (25). My favourite parts of the collection,
              however, are split somewhat likewise: one, an overarching matter of style; the other, one specific line and its prosaic literality. The
              overarching matter of style is Fischer’s use of metaphor. Yes, there are some moments for me that are perhaps too much—I do not, for instance,
              enjoy “Your Eyes” (66), Your eyes are macadamia that quickly sprout under the pour of my gaze as much as I might perhaps enjoy something
              either more subtle or more absurd. But I do, however, adore the “humming” of the sun’s radiance in “I can almost hear a humming”, which
              is so warm and luxurious that, “If it didn’t yet exist/this radiance would find a way/to create honey” (58). And I cannot quite picture
              the face of the man in “Syrian Desert” (44) from the features attributed to it through metaphor, described as: dry and cracked yet tilled
              by the work of renunciation – from its furrows rise vast trees abundant with flowers and gliding the blazing gusts firebirds alight in their
              branches. But nor do I want to. Or need to. The specific line that I will take from this book as I close it comes at the end of “Swift”,
              and this favourite moment is almost the opposite of the figurative turn of phrase that claims the other spot. “Swift” is a poem more narrative
              in style than many of the others, and it tells the story of an injured swift being cared for by the poet and his family. After finding the
              creature lame on the ground they nurse it back to health and, in the process, develop an intimacy that gives the bird something of the human
              and the human something of the bird. When finally released, the swift like a new baby stammers and trips its way into the air with the speaker
              racing after it, “obliviously/trampling seedlings” (29), but then—disappears. Until nightfall we searched, and still do not know whether
              you reached the sky, or landed helpless in the next field. Not only is this poem a privileging of the material self of one small, vulnerable
              bird—I read in it no grand allegory of the human condition—but it ends with the notes of trust, hope and fear that love is . Because that
              really is the heart of devoting ourselves to something: yes, to something as small in the great scheme of things as sitting down and reading
              a book of poetry from beginning to end, but also to those greater tasks of birth and the preservation of species, lands and cultures. We
              do not always know what will come of the time and care we have invested, whether the object of that love will reach the sky or fall helpless
              in the next field, but investing in something is in the end an act of love. I find that Paths of Flight returns that love."
        - title: Cordite Review
          text:
              "Paths of Flight Lucy Van Cordite , 9 January 2014 In Shakespeare’s last great poem, ‘The Phoenix and the Turtle’, the owl is banished
              from the allegorical proceedings of the bird funeral: But thou, shrieking harbinger, Foul pre-currer of the fiend, Augur of the fever’s
              end, To this troop come thou not near Whether you read this poem as dense figural allegory, enigmatic elegy or refined coterie poem, you
              should mark this ironic moment of exclusion. The tradition of augury in poetry is richly prefigured here, not only in the careful inclusion
              and exclusion of birds, but in the deceptive formal simplicity of the stanzas. Devolving into triplets in the threnody coda, the rhythm
              of the poem is incantatory, reminiscent of the magic of prophetic language. Why, then, the prohibition on the augur owl? Luke Fischer’s
              first collection, Paths of Flight, is deeply alert to the signs made by birds. Fischer displays an affinity with a certain notion of the
              ‘natural’ world, as well as a temperament for classical poetic tropes. Birds, depicted in both mythical and parochial attitudes, populate
              the collection. And while not every poem depicts the physical manifestations of a bird, many actually do. The owl keeps ‘vigil in a cell
              / of twisted boughs’; the swift’s brow is ‘planed by supernal winds’; the punk cockatoo ‘flares his pineapple Mohawk.’ Conversely, more
              enigmatic figures are infused with bird-like qualities. The first line of the collection, from the poem ‘Portrait of a Thinker’, is unequivocal:
              ‘His eyebrows are falcon wings/ gliding on a constant current.’ There is a certain satisfaction to be taken from such thematic consistency.
              Like Shakespeare’s poem, Fischer’s book takes up an allegorical mode, calling forth the presences of ‘Owl’, ‘Swift’, ‘Corellas’, ‘Raven’
              and a ‘Band of Cockatoos’ through the direct titles of the poems. The collection’s undertaking as a work of augury is emphasised by its
              omnibus title. How do we read a bird’s flight, which once foretold the will of the gods? What is the relation between poetry and prophesy?
              I’m making this sound unnecessarily lofty - Fischer’s address is nothing if not graceful and intimate, posing these questions about language,
              time and causality through a personal turn. For ‘paths of flight’ also implies a travelling itinerary; the collection maps a topography
              of a young cosmopolitan speaker, tracing snowdrops in West Philadelphia to early spring in Hamburg. The matter-of-factness of a Paddington
              morning, ‘a freckle blemishing her even tan,’ is set against the expanse of ‘Syrian Desert’, where the totemic speaker and observed man
              appear ‘cloaked in the winds.’ I couldn’t say that the collection is Eurocentric, but there is a longing for Europe across this collection
              that is likely linked with Fischer’s Eastern European heritage, as well as his recent academic postings in Germany. Australia is rendered
              in contrasting tones of bare familiarity. There is a sort of blankness that the speaker alludes to in ‘Twilight’: ‘Like children / we hold
              no beliefs.’ Consistent with the book’s theme, the birds deliver a sign: Through the emptiness a flock of birds surely follows its invisible
              compass, and reminds us of another home Such a sentiment not only speaks of longing for elsewhere, but also speaks of the ambivalence of
              the cosmopolitan wanderer, who finds home precisely in mobility and rootlessness. Non-fixity reaches its joyful apex in ‘Lexcial Synthesis
              101’, where trees walk and travel on planes. The privileging of the path, or the space ‘in-between’ is showcased in ‘Swift’, which, in a
              turn reminiscent of Derek Walcott, celebrates flight as a liberation from earthly history: Up there almost forever, journeying from Europe
              to Africa […] At equal elevation you pass eagles, they scan the earth, you never look down. The speaker ironically finds this emblem of
              mobility, ‘awkward on land as a seal.’ The swift is nursed, restored and released to the winds. The poem closes on an apposite note of ambivalence,
              with the speaker left wondering ‘whether you reached the sky, / or landed helpless in the next field.’ In Paths of Flight the uncertainty
              of earthly peregrinations is married to anxiety about how words take flight. How do they reach their destination? Is memory the destination?
              How do we remember what we see, and what we say? Fischer alludes to that fear of the ancients, the winged word, numerous times in the collection.
              But winged words, and ‘air-writing’ do not signify horrific disappearance or erasure, but rather reveal a world charged with story and signification,
              an excess of ways to read signs. The reflexive ‘Poem’ shows the poet in a derangement of meaning as he surveys the infinite answers to the
              question, ‘what is a poem?’ The only relief is tautology: ‘A poem is a poem.’ If not quite a blessing, erasure is surely a kind of concession,
              as it is in ‘Transcription from the first page of a hermit’s diary (c. 1500): ‘So I speak / and do not speak / Even as I write / my pen
              / erases.’ Paths of Flight is a strong first collection, drawn equally from a scholarly depth of influence as from a calm, intuitive knack
              for scene and story. And Fischer is a strong poet, watching the delicate details of the natural world, gracefully gleaning their abstractions.
              ‘Augury?’ won the Overland Judith Wright Poetry Prize and appears near the end of the collection, drawing the subtly interrelated themes
              together. The speaker observes two black birds in flight and simultaneously feels the stir of ‘recurrent doubts about the art / of poetry,
              its prospects in our time.’ Fischer’s owl is the key inclusion in this collection of ambivalent augury - the bird that watches the watchers:
              ‘It’s frontal eyes / (new moons) / kept us under watch / long before we noticed.’ Doubt about the art’s prospects seems ever increasing,
              yet it remains the task of the poet to read for signs."
        - title: Overland Prize
          text:
              '2012 Overland Judith Wright Poetry Prize for New and Emerging Poets Awarded to Luke Fischer for "Augury" Peter Minter - Judge, Poetry
              Editor, Overland (Augury - on page 74 : Paths of Flight) This year’s fine winning poem, ‘Augury?’, by Luke Fischer, begins ‘I’m not sure
              if I’m following a trail / left by goats or on the human path’. A walk in the hills is put into perspective by a wonderfully overt sense
              of uncertainty. ‘I’m not sure’ gives a contemporary (and ethically acute) spin to the ‘ramble’ poem, a genre central to environmental literature,
              in which observations and impressions collected on outdoorsy treks are traditionally enumerated. ‘Augury?’ balances epistemological certitude
              on a hinge of doubt, first announced by the question mark in the title and then followed through in a finely composed event where the complexities
              of human ambivalences are made ineluctably central to the experience of nature. At first the poem grabbed me because it is fundamentally
              ‘honest and well-crafted’, making no bones about wanting to be easily read and demonstrating an excellent grasp of romantic, modern and
              post-modern environmental poetry and poetics, all the way from Goethe to Gary Snyder. Is it a goat or human path, back there in Greece?
              ‘Augury?’ is a marvellous example of a radical poetry that draws its energy more from progressive intention and scope than, for instance,
              displays of formal experimentation. It’s a big bad world out there, and we need all the good poetry we can get.'
bread:
    title: Bread
    author: Philip Hammial
    short_description:
        "Bread was short-listed for the New South Wales Premier’s Literary Awards, Kenneth Slessor Prize for Poetry, in 2001. The
        judges commented:"
    long_description:
        "just to the left of the alarm clock, just to the right of the abiding distractions The poet Philip Hammial is also is also
        a sculptor. His poems are word constructions, installations for the imagination. They confront and tease and strangely charm with their abrasive
        wit. Out of a diaspora of forms and traces of what was once functional, he creates that living object of art which dances, screams, shouts,
        farts, raves. Adam Aitkens Like all good Surrealists Hammial is at heart a serious poet, whose shimmering surfaces open out to social analysis
        and an engagement with culture and politics, resulting in a dazzling bravura poetry. Hugh Tolhurst It’s jazz on the page. Zan Ross Bread was
        short-listed for the New South Wales Premier’s Literary Awards, Kenneth Slessor Prize for Poetry, in 2001. The judges commented: Hammial has
        a strong, fascinating, individual and reliably animated style. What might be mere experimental whimsy in another writer is toughened and made
        memorable by his well-integrated but unyielding ethical tone: ‘His is an evacuated face. Actually, it’s an extrajudicial face permeated with
        suck this immunity... A scummed face. A face in the final analysis, that’s down on all fours’ (‘Howard’). This is a beautifully disciplined
        book, mirroring social and literary genre absurdities back and forth to achieve a stance which is extremely valuable both artistically and
        socially. Cover sculpture A Postmodernist Watching The Shit Hit The Fan by Philip Hammial"
    price: 21.95
    isbn: "1876044357"
    release_date: "2000"
    page_count: 56
    reviews:
        - title: Kerry Leves, Overland
          text:
              "Solitudes that Resonate: New Poetry Bread Kerry Leves Overland , No. 166, Autumn 2002 If Lou Reed were updating his most famous song
              to these duty-of-care times he might add that if you are taking a walk on the wild side, you are probably moving too slowly for the good
              of your health. Philip Hammial’s Bread is an alert, prowling lope across the earth-clung, wormy underbelly of our culture. Hammial lifts
              the stone, rolls it back - shows us the efflorescence of rot underneath, decay as animal action, contempt as a three-ring circus. Hey, that
              stuff looks amazing - but, Jesus! it’s moving, it’s acting on us... One action is evacuation, principally of the self, which is displaced,
              kicked out of any certainties regularly and brutally: the party’s over, the last guest leaving with my children in tow... Hammial keeps
              his syntax almost insanely crisp; he’s very matter-of-fact in linking the least obvious things, the mythic ‘Fourth Reich’ and the mystical
              longing for a poetry that’s ‘clear and concise’; Christian hypocrisy and its dubious tradition: Fornicators dismantle a resurrection. Prepare
              a balcony for takeoff. What’s startling - and I think original - is the way shibboleths are torn down in a terse, colourful, street-talkin’
              style: A 21st birthday - Jump on a bus & give the moon, your youth & a bar of soap to the bus driver. If successful (if all three items
              are accepted without question) get off at the next stop & at the no-longer-there moon set up a howl. Persist with this until you’re taken
              away by the police. Hammial also serves up a lot of nasty fun at the expense of that poetic afreet, the lyrical ‘I’ - ‘an effigy of myself
              / to do with as you will’ - plus heads of state, (‘They are, from first / to last, pneumatics./ Anyone, even an infant, / can pump them
              up’), colonels, a junta, medicos, a suicide, tourists, armies and a certain ‘Howard’: ‘A face, in the final analysis, that’s down on all
              fours.’ Zan Ross notes on the back cover: ‘It’s jazz on the page.’ I disagree - it’s rock’n’roll, post-punk; it’s got the directness of
              rap along with a verbal pizzazz and intellectual fullness that rap doesn’t usually extend to, Hammial is also a kinetic artist, a portrait
              sculptor in scrap metal and junk oddments, an endlessly inventive materialiser of demons comical and nightmarish. One of them is on the
              cover. This book could be dubbed UTAOP - unfair to all other poets - because of its brilliance and acrobatic speed in getting its points
              across. But those are also reasons for poets and non-poets to read it."
        - title: Imago Review
          text:
              "New Writing Bread Helen Horton Imago , Vol. 13, No. 2, 2001 Philip Hammial’s poems, in Bread , have the effect of chapters of a subject
              or life being thrown up on the screen at the same time, to take their place in what amounts to a surreal rendition of that subject or life,
              in order to produce its eventual meaning, or alternatively the lack of it. The method is not always easy to follow, the conclusion not always
              immediately obvious, and in these cases it is better to stand back a little to gain the overall effect, in the same way as is necessary
              with an abstract painting. One of the more simple examples is the poem ‘Correspondence’. Not all are in this mode, however. ‘An Incident
              in Famgusta’ is a straight telling of an incident, in starkly real detail. Satire is an integral part of Hammial’s poetry; these are not
              poems to be taken lightly, or to be read for light-hearted pleasure. Always there is the conviction of serious comment being made behind
              the associations that may sometimes appear incohesive, their meanings requiring effort to unravel. More direct are the short short poems
              that liberally punctuate the collection. These are telling, single subject comments, as in ‘La Mort Est Sur La Table’. Their terse lines
              pinpoint the smallest of observations, as in ‘Concert’: As the flautist only has one eye the crow as though on a branch can perch on the
              flute & not be heard. The last of these luminous comments are written in prose form in the final item ‘Things to do’, which ends, ending
              also the collection, with the admonition: ‘Squeeze an accordion shut. Remember the sound it made. Remember it for the rest of your life.’
              Philip Hammial is also a sculptor and the cover depicts one of his sculptures. It is not hard to deduce that his art and his poetry arise
              from the same nucleus."
        - title: Mattoid Review
          text:
              "Poetry from Black Pepper Melbourne Elegies , Bread , Russian Ink , The Dining Car Scene Brian Edwards Mattoid , No. 55, 2006 Whereas
              K.F. Pearson ( Melbourne Elegies ) typically invites reader compliance by emphasising the attractions of sharing and communication, Philip
              Hammial’s Bread collection is confrontational. Critical, satirical, and disjunctive, his poems are mostly surreal, their combinations bizarre.
              When Colonels, the Junta, Heads of State (including Howard), and the army become targets for satire, the modes are curiously indirect (overtly
              metaphorical) but also insistent. Focussing on stupidities, dullness, self-interest, and abuses of power, he mocks simple public-private
              distinctions while suggesting, as it were, the advisability (even the necessity) of stringent critique. Something of this humorous/serious
              play can be seen in the short prose poem ‘Howard’: His is an evacuated face. Actually, it’s an extrajudicial face permeated with suck this
              immunity as a function of fraternal arcanum. In other words, it’s a face of extortion modified to suit the present political climate - slapdash.
              Or, to put it simply, an about face. A packed-with-lies face. A floundering in malignancy face. An orchestrated by the lowest common denominator
              face. A scrummed face. A face, in the final analysis, that’s down on all fours. One can only wonder what Hammial might add following the
              awful opportunisms of the Tampa affair, September 11, the ‘War on Terror,’ and all the way to Iraq with George, the Younger, Bush! By contrast,
              ‘An Incident in Famagusta,’ ‘Homeward Bound’ and ‘Stations’ are constructed as disjunctive narratives, phantasmagorical journeys in which
              the disconcerting play of images and ideas displaces literality for the more difficult appeals of symbolic possibilities. Similar strategies
              of dislocation appear in ‘Procedures’ where common events (the birth of a child, a baptism, a 21st birthday, choosing a valentine...) become
              the labels to which are attached short paragraphs of bizarre instructions and in ‘What to Say,’ a litany that offers harsh comfort about
              moments of crisis. Bread is much concerned with death. So many of the poems address horrors, from history and from nightmare; and in their
              witty displacements, the sounds of parodic laughter suggest, as well, tears of frustration and concern. Satire is always at least double-edged.
              ...These are interesting collections. Black Pepper continues to present writing that warrants attention."
        - title: Westerly Review
          text: New Poetry - 2001 Bread Alan Urquhart Westerly , Vol. 46, November 2001 (pgs 109-125) [Text not yet available]
        - title: Launch Speech by Martin Langford
          text:
              "Launch Speech Martin Langford Burning Lines [Arts and sculptural] Festival, April 2001 There is a wonderfully apt epigraph to this
              book: ‘He gluts himself on astonishment’, and in some ways, astonishment is the bread of the title. Bread , like, perhaps, all of Phil’s
              poetry, is fuelled by astonishment - at the craziness, weirdness, dumbness, marvellousness, of the life he finds himself in. And he does,
              in some ways, glut himself on it - in that way artists have of returning again and again to the material which both drives them crazy and
              delights them, the material they can never quite get out of their system through their art. This astonishment, however, is not something
              which just appeared without forebears or context. Phil’s deck of literary possibilities was formed not by the Anglo-American tradition so
              much as by the continental modernists - the French and Spanish surrealists, the later French writers such as Michaux, Char, Jabés. There
              is something syncretic about the Anglo imagination: it prefers to work in consonance with a comprehensive explanation of the world. Somewhere
              along the line, the French diverged from that need - that thoughtfulness, that insecurity - and let the imagination loose without, as it
              were, feeling that they need always be beholden to reasonableness. As I read Phil’s work, it is written in the spirit of that tradition.
              The imagination is free to respond directly to the world without being mediated or restrained by the need to construct a plausible explanation
              of what is happening. For a long time, this tradition has been alien to the Australian cast of mind, and sometimes Phil has struggled to
              find readers because of it. I would suggest that, with the greater tolerance for alternative possibilities that is around now, with the
              greater expectation that poetry is a mansion with many rooms, it is worth taking another look at Phil’s verse - or a first look if you haven’t
              already done so. Bread seems to me to have been written out of a desire to produce something in language which was equivalent to the craziness
              and intensity of the world itself. And in the way that language has of being found to contain whatever it was the seeker was looking for
              already within it, Phil discovered a repertoire of violence and craziness already there. Many of the poems, for instance, are built around
              puns. But these aren’t little wry-smile puns, they are bearers of absurd or demonic alternatives (see:’ Sound’, pg. 49). Others are built
              around verbal patterns - recurring linguistic events might be a better term - which develop a momentum and charge of their own as the imagination
              takes hold. ‘Problems and Solutions’ is built around a sort of absurd folk-wisdom in which one might always knows what to do in every situation.
              The really absurd thing, of course, is the assumption that life is a perfectly ordinary thing, but Phil’s tone never moves from the rituals
              and conventions of that assumption. It is just that as his solutions get weirder, so, too, by implication, does that assumption become more
              absurd. I don’t recommend Phil’s solutions, by the way. I don’t think people will find them helpful at all. In some ways, Phil is a joker-poet.
              Reason, and reasonableness, are just the flimsiest of constructs. Having no credibility, their main attraction is as the source material
              for inconsistencies, puns and funny ideas. But from another angle, Phil is close to being a poet of dream. Not dreaminess: one very noticeable
              characteristic of this verse is its rapidity of verbal movement. But dream in the sense of being unpredictable, unsettling, vivid. There
              is, for instance, none of that clear distinction between ‘dream’ and ‘waking reality’ that we maintain in our everyday lives. In Phil’s
              memoirs of his somewhat testosterone-fired youth, ‘Travels’, he writes of how he was continually confronting authority. He has carried something
              of that same attitude into his writing of verse. These poems strike one as direct imaginative confrontations rather than being, say, meditations
              or expressions of some feeling. All this, however, is made accessible by his instinct for form, which seems to me to have gone on developing
              throughout his work. It is form - the lists and motifs and variations and recurring constructions - which provides the lens to his craziness,
              and, by being the expression of human effort in the face of something difficult, becomes a sort of implicit awe (‘Autumnal’ or ‘Me, Myself,
              No Other’). There are no places of rest in this poetry - unless one counts the somewhat uncomfortable tightrope of humour. But then, there
              aren’t, really, any places of rest anywhere. Phil Hammial is one of the distinctive voices of Australian verse, and Bread is an excellent
              place in which to start to explore that voice."
the-poets-stairwell:
    title: The Poets' Stairwell
    author: Alan Gould
    short_description:
        Behind this company lives a virtual one of poets and philosophers from Yeats to Plato, attending as time and place invoke
        them. Our picaros’ adventures allow Alan Gould to discuss poetic inspiration from womb to self-conscious maturity.
    long_description: "...with scarcely a disruption to her rhythm, a gaunt Indian woman in purple sari voided the"
    price: 27.95
    isbn: "9781876044800"
    release_date: "2015"
    page_count: 326
    reviews:
        - title: Australian Book Review Review
          text:
              "The Poets' Stairwell Gillian Dooley Australian Book Review , June-July 2015, no. 372 In 1977 the aspiring poet Alan Gould travelled
              through Europe with his friend Kevin Hart. Just such a tour forms the narrative thread for Gould’s latest novel, The Poets’ Stairwell .
              This is a roman à clef and those in the know will enjoy the identification game. More interesting, though, is the intellectual journey;
              Gould’s virginal twenty-seven-year-old hero, Claude Boon, slowly defining his own poetic self against the austere and particular mode of
              his strikingly talented younger friend, Henry Luck. A vagabond he might be for these few months, but Boon is no picaro. Adventurous and
              willing to abet the occasional rogue, he is decidedly not one himself. Though well into adulthood, Boon undergoes a steady process of maturing
              and self-understanding during his journey. The subtitle of The Poets’ Stairwell could as well be ‘A Bildungsroman’. I have always been attracted
              to Gould’s narrative voice; his selected poems, The Past Completes Me (2005), is the only book of poetry I have ever reviewed: I liked it
              too. There is a genial insistence on following his own muse (perhaps Clio, as Henry Luck suggests). The narrative pace is leisurely, but
              there is none of the pretentiousness which so often mars ‘literary fiction’. It is true that concessions are not made to the etymologically
              naïve. In the first stairwell of the story, their nostrils are assaulted by ‘the fetor of concrete’. But more often a startling and amusing
              image is hewn from workaday materials. There are many, but it is hard to beat the image of Henry clutching the Yugoslavian Branca ‘as though
              she were a cupboard he had rescued from a flood’. There are acrobats and tricksters in the poets’ stairwell, but Boon keeps ascending, with
              Gould, admiring their antics but not ultimately distracted from his own artistic illumination."
        - title: Sydney Morning Herald
          text:
              'The Poets'' Stairwell Peter Pierce Sydney Morning Herald 2/4/2015 Alan Gould''s ninth work of fiction, The Poets'' Stairwell , is sub-titled
              "a picaresque novel". That promise – of a tale of adventures on the road by characters open to experience and destined to be taken up by
              kindly and malevolent strangers – is richly fulfilled. Two London-born Australian poets, Claude Boon and Henry Luck, decide to travel overseas
              together. To Boon, his narrator, Gould gives details from his own life that have been rehearsed in earlier books: childhood as an army brat,
              the miseries of boarding school, university radicalism. The resilient Boon, witty and lonely, has to shepherd Luck through both the perils
              of their travels and the self-absorption of a true believer in his genius as a poet. In their conversations, many poets and philosophers
              are summoned – genial, ghostly presences who inform the cities and regions on the Australians'' route. Boon travels optimistically: "what
              happens might be good or bad, but its happening will be good. Spirit of the picaresque, that." Bangkok delivers the pair up to prostitutes
              and pythons. Next stop is London, where of course old friends from Australia are to be found, if hardly to be trusted. One of these is Eva
              Swart, radical and dancer, another is the anarchist Dave Beamish, who is more sinister than he seems. Boon accompanies them on a hilarious
              but dangerous detour to a rock concert in Leeds. Reunited with Luck, they travel to Ireland to be greeted in the language of local hospitality:
              "And will you gentlemen not be coming along with me?" Gould''s ear never fails him, as he simulates the speech of rogues and dreamers of
              numerous nationalities, besides interpolating lines of his own verse, and Luck''s Stand-up performance artists and chancers of all stripes
              are drawn to the indulgent Boon and the haughty Luck. Among them are a Turkish smuggler wanting a reference to help him emigrate to Australia,
              an American terrorist-cum-acrobat, a jailed French philosopher and cadger of cigarettes, a German truck driver who is an expert on Aquinas,
              a Greek who discourses on Mount Olympus, let alone Branca and Jelena Mavec, mother and daughter translators from Yugoslavia who take Boon
              and Luck to a poetry conference in Venice, while also enticing one of them to bed. Gould''s delight in the folk who cross paths with his
              travellers never flags. One brilliant cameo involves a Czech janitor who says of the national poet Honza Roubik that "he writes from the
              room where man and devil laugh together. That is our country." Gould''s novel rejoices in many countries and sites, for instance the staircase
              that Boon mounts in Assisi at the top of which "the mountains of Umbria, glistening with spring verdure, seemed to gather as though alive".
              Picaresque heroes are willing prey to coincidence, and people come back unexpectedly into the lives of the wandering poets, nowhere more
              so than in the novel''s surprising and affecting last episode. This also gives the author a chance to engage in the coming commemoration
              by making a poignant Anzac joke. While Boon reflects that after three months on the road, "a certain lassitude threatened our Grand Tour",
              the momentum of The Poets'' Stairwell never flags. This is the sunniest and funniest work in Gould''s long and distinguished career. (Peter
              Pierce is the editor of The Cambridge History of Australian Literature )'
sideshow-history:
    title: Sideshow History
    author: Amanda Anastasi
    short_description:
        Jennifer Harrison has always been interested in performers, their choices and vulnerabilities. In her new collection, Sideshow
        History, she shows us the risk of being a public performer where the artist is continually under pressure of being seen to fail or succeed.
    long_description: "it's the centre

        I want to show you

        the centre to the side

        of the side in the centre—

        it's what I want you to know

        of almost-gesture

        something hiding

        in the who-are-you of a name—

        the performance

        could be unsettling

        in being so ill-defined

        but let's go inside

        Jennifer Harrison has always been interested in performers, their choices and vulnerabilities. In her new collection,
        Sideshow History , she shows us the risk of being a public performer where the artist is continually under pressure of being seen to fail
        or succeed. Her admiration for this long tradition, its humanism and energy, is what she examines in these poems about circus and street art.
        In researching and documenting this culture, through photography and poems, she comments on its contemporaneity, a vibrancy that whilst looking
        back into ideographic history, also looks forward towards a new way of valuing difference. Throughout these sequences and the individual poems
        which separate them, Harrison writes an understated poetry of great humanity, fineness and often wit. Peter Rose , Australian Book Review
        Harrison knows how to cast an image that'll hold, engage; it's a talent well used - for suggestion and sensuousness, nothing overwrought.
        Kerry Leves, Overland There is no escape from the sense that Harrison's performers and artistes are skating on wafer-thin ice. And the water
        underneath is a big cold black drop. Yet. There is a thermal warmth that bubbles through so many of the poems. Dorothy Porter , Melbourne
        Writers' Festival A major contribution to Australian poetry which demonstrates Harrison's evolving career and mastery. Its depth of intellectual
        and emotional registers, in addition to its sustained craft, makes this poetry demanding yet also immensely rewarding and enjoyable. Judges
        comments , Western Australian Premier's Book Awards"
    price: 25.0
    isbn: "9780648038795"
    release_date: "2025"
    page_count: 130
    reviews: []
michelangelos-prisoners:
    title: Michelangelo’s Prisoners
    author: Jennifer Harrison
    short_description:
        Michelangelo’s Prisoners announces the arrival of a significant new poetic voice. Black Pepper’s second title, and its first
        book of poetry, it won the 1995 Anne Elder Award.
    long_description:
        'In the title poem of her first collection Jennifer Harrison re-imagines art history as a mastectomised aesthetic. Her poetry
        is of a kind to be found nowhere else. She uses her scientific and medical training to give her poems a sinuous intellectual backbone. It
        allows her feminist and humanist concerns to affect us with unusual force. She presses into controlled intensity a lyrical response to typical
        late 20th century displacement. I once saw a baby catching sunlight in his hands - everywhere the child touched he laughed at what he could
        not touch until language wheeled his pram away and he learned that silhouettes and sun were called chair and where. Part One: The Body is
        a celebration and critique of medical and scientific achievement made poignant by her own particular experience. Part Two: The Sea broadens
        out to examine love, childhood, the family, other societies and friendship. Michelangelo’s Prisoners announces the arrival of a significant
        new poetic voice. Black Pepper’s second title, and its first book of poetry, it won the 1995 Anne Elder Award. "Jennifer Harrison’s Michelangelo’s
        Prisoners was immediately engaging and stood out from the rest of the entries. Harrison posseses a mature poetic sensibility and which allows
        her to tackle a wide range of subjects, reflecting her own personal and professional experiences. Her scientific and medical reflections are
        accesible to the general reader because Harrison draws on a disciplined and intellectual lyricism to illustrate her subjects. This is an impressive
        first collection of poetry and one which demands re-reading". Catherine Bateson and Barbara Giles, Judges - Anne Elder Award 1995'
    price: 19.95
    isbn: "1875606203"
    release_date: "1995"
    page_count: 56
    reviews:
        - title: Southerly Review
          text:
              "WRITER AND READER - Michelangelo’s Prisoners David McCooey Southerly Review - Summer 1995 A new poet also concerned with the troubling
              implications of the materialist view of existence engendered by medical science is Jennifer Harrison. Michelangelo’s Prisoners is no doubt
              partly achieved through Harrison’s experience as a psychiatrist, but it is not clear whether this is the ‘particular experience’ alluded
              to in the book’s blurb which makes the first section regarding the body ‘poignant’. It does not really matter if Harrison’s experience is
              from either or both sides of the medical fence; her writing is acute, sharply observed and her musicality is sinuous and muscular. For instance,
              in ‘Aus-lan’, a poem about the Australian sign language of that name, Harrison makes the kinds of connections, at once precise and mysterious,
              which are required for such a poem. She writes of a baby catching sunlight in his hands - everywhere the child touched he laughed at what
              he could not touch until language wheeled his pram away and he learned that silhouettes and sun were called chair and where The last line
              gives a rigour which saves the image from the cloying, but at the end she returns to the image and the subject of the poem with extraordinary
              effect: her friend teaches me the sign Forget it is a fist placed against the right temple the hand opening, flicking sun away from the
              head Again, the pastorals are piscatorial, even when (as in the New Guinea poems) subterranean rumbles can be heard. Part two is ‘The Sea’
              and even the brain, that site of fascination for Harrison, can be described in such terms: ‘in sea-grey cells, memory stirs, flows back
              / across a sandy ti-tree shore’ (‘St George’s Basin’). This poem doesn’t really go anywhere, but where in such a landscape (or seascape)
              is there to go? A number of the poems in the first half of the book work by associating scientific (in particular neurological) language
              with poetry. For me, however. Harrison’s best poems work often through the suggestiveness and indirection of the sea."
        - title: Imago
          text:
              "Michelangelo’s Prisoners Silvana Gardner Imago, Vol. 8, No. 2, Spring 1996 Jennifer Harrison’s first collection, Michelangelo’s Prisoners
              , is unusual in its free-range use of medical or scientific terms, which, mercifully, are explained in the Notes. While I was intrigued
              by the mystique of a new tongue, the charisma of the foreign, I became impatient when I had to stop regularly to consult a dictionary. On
              the one hand, I believe new language is educational and widens one’s knowledge but if there’s too much, especially in poetry, it becomes
              a burden of non-understanding and the work risks abandonment. But from Harrison’s point of view, these terms are not new at all. ‘Caconym’,
              ‘encaphalitis lethargica’, ‘null-hypothesis’, ‘Schwann Cell’, ‘astroglia’, ‘Tourette’s Disorder’ would be commonly heard in her everyday
              work as a psychiatrist. To intrigue further, the second section -of her poems contains pidgin English. This, too, I needed to clarify on
              the back page. Should the reader be elevated to the poet’s world or take what is useful in her life? Both, I suppose. What I take for myself
              in Harrison’s poems is some magical imagery as seen in ‘Aus-lan’: ‘I once saw a baby catching sunlight in his hands... he laughed at what
              he couldn’t touch... silhouettes and sun / were called chair and where .’ Sunlight, like a golden glow reappears in other poems, together
              with silvery lunar light. This gold and silver subtly shines in Harrison’s poems, foiled by the shine of hospital chrome or steel. Poetic
              warmth chills, sometimes, by the cool clinical eye and vice versa. The title poem shows art ‘mastectomised’. 500 years updated by late 20th
              century diction! The last three lines are very powerful: ‘...it is not the anguish of chiselled stone / which matters. / It is the standing
              still which kills.’ There’s a Yin-Yang, poet-scientist tuning ‘The Body’ section. ‘The Sen’ is lyrical, offers variety in travel and my
              favourites are those which are more sparse, such as ‘Rajistan’, a remarkably pared poem, almost etched in black/white: ‘...the killing silence
              / the returning bird where sky once was’ creates an unforgettable impression with its economy. …I recommend Jordie Albiston ’s Nervous Arcs
              for poetic bravura, Diane Fahey’s The Body in Time for lyrical flexibility, Jennifer Harrison for poetic difference and Kerry Scuffins [
              Laika’s Run ] for contagious vitality."
        - title: Quadrant
          text:
              "I Want Them Electric Alan Gould Quadrant, Vol. 40, No. 1-2 1996 I have no misgivings whatever about Jennifer Harrison’s book Michelangelo’s
              Prisoners . I found it an exhilarating collection from start to finish. Trained in medicine and psychiatry, this poet taps and eases the
              terms of medical science into her poems with the tact and flair of one for whom argument and illumination in poetry appear to come naturally.
              Here, for instance, is the speaker of one poem meditating upon the nature of the brain while engaged in catching prawns. Shaped uncus of
              brain grey cloud we cannot see or breathe spiller of guilt lust gape a brave shape complex lexicon-tripper communes outside itself folds
              back on concave gyrus and deep fissure on itself prawns mating rushing down river I’ll call you my thoughts I’ll catch you in the net and
              miss rain... I lack space to quote, as it demands, the entire poem, which would show how the speaker’s imaging of the brain and her attention
              to the business of prawning are integrated into the one meditative event, a meditation that manages to do both sensuous and intellectual
              justice to the experience described. ‘Prawning the Brain’ is the last poem in the first of the book’s two sections, perhaps more properly
              termed hemispheres. Deftly it unites the subject matter of a series of poems that ponder the human body, particularly the brain and neural
              system, with a series whose leit-motif is the sea. Indeed orchestration, both within and between the poems, is also a meta-subject of the
              book concerned, as so many poems are, with the orchestration of the body or the tides, the connections between physiology and language,
              medical science and magic, inside and outside. Thus, in the first half we find a tribute to the neurologist Oliver Sacks, in the second
              a vivid memory of an old Aboriginal seaside magician. With equal rigour of argument, and scintillance of imagery. Debussy, Michelangelo
              and Gilgamesh are used as reference points to explore the relations between art and catatonia, art and the effect of bodily disfigurement,
              art and the sense of an inarticulable Other. There is the same credibility and wholeness of realisation when the poet adopts a dramatic
              persona in ‘A Kalgoorie Prostitute Contemplates a Proposed Museum’. Above all, these poems are fresh. In common perhaps with the marble
              prisoners of the title, they give the sense of emerging out of an intractable element, language-experience, while being conscious of their
              emergence. They are not fashionable, they gesture nowhere; they are too deeply attentive to the strangeness they have found in the world.
              Take this short lyric, ‘The Wheel’: Under the tongue, after meals the little pill melts. A mongrel dog mfects an embryo with its indolent
              lick. We can bear it, we say. Look now at the human genome, a shiny new ship emerging from the dock. Ambitious, on schedule. A precise faith
              that might yet fall apart like a soft clay pot failing to centre. But see the wheel still spinning splattering mud. Hippocrates wants a
              perfect pot. The potter is patient. This is a fabulous, wise, superbly crafted book. May it prosper."
        - title: Australian Book Review
          text:
              "Michelangelo’s Prisoners Jennifer Strauss Australian Book Review , No. 174, 1995 Michelangelo’s Prisoners is an impressive first collection
              - technically assured and intellectual in the best sense. That is, the gears of Harrison’s intelligence are as fully engaged with the facts
              and theories that we bring to box on our corporeal and emotional experience of the world as they are with the specifics of such experiences
              and with the language in which we can (and cannot) speak them. For Harrison, those facts and theories often come from her professional disciplines,
              medicine and psychiatry, and a set of notes indicates awareness that there is a certain transplanting of discourse going on. If the process
              results in occasional poetic strain, it is vindicated by fine poems like the one on Oliver Sacks (‘this vagabond of afflictions’). The notes,
              along with the title - pointing towards such more acclimatised references as Michelangelo, Nijinski, Auden, Herodotus - may indicate that
              we are in the realm of ‘high’ culture, but Harrison can also write forcefully and accessibly of matters that are the stuff of tabloid journalism:
              anorexia, chemotherapy, the anguish of being an ‘Amok-runner’s Mother’, the desire of a Kalgoorlie prostitute for ‘music like a pair of
              solid gold 24 carat dingoes... no pretty-arse dancing’. Indeed one unifying motif throughout this carefully ordered collection is the force
              of human desire: ‘there is more we want’ - more than ‘the body map of sand’(‘Oliver Sacks’); more than ‘Ideas, cheap umbrellas [that] blow
              inside out / when you need them most’ (‘Maturana Songs’); more than ‘spoken words falling short of what they name’ ‘Aus-lan’. The strikingly-evoked
              ‘one-breasted woman’ of ‘Michelangelo’s Prisoners’ has a ‘peasant rhyme in her eyes / which longs for a woman’s symmetry’. To know something
              of feminist theorising of the body will increase the resonance of this disturbing poem, but its imaginative strength is not dependent on
              such knowledge. It should be clear that this is not apprentice work. The extent to which her poetic is formed in this initial mid-life publication
              recalls Gwen Harwood’s 1963 emergence and Harrison seems to me to have other affinities with that formidable talent - not leas an affection
              for fishing. In speaking earlier, I perhaps made Harrison sound unduly melancholy about unfulfilled and unfulfillable desires: in her themes
              and in the very process of her writing there are also robust celebrations of the fulfilled moment when the poet can say ‘I shout Fish! /
              dragging the tide towards me’ (‘Deep Sea’). The title of the concluding poem is ‘A Good Catch’: this reader agreed."
        - title: The Sydney Morning Herald
          text:
              'Explorations of mortality - "Michelangelo ’ s Prisoners" Heather Cam (editor) The Sydney Morning Herald, 26 August 1995 Exploration,
              discovery and communion are the engines which drive these four collections [Vera Newsom, Emily Bronte Re-Collects and Other Poems , Alec
              Choate, Mind in Need of Desert , Lawrence Bourke, Eating the Sun , Jennifer Harrison, Michelangelo’s Prisoners ]. All are preoccupied with
              the big, imponderable questions: where do we come from, why are we here, and where are we going? The sites chosen to probe for meaning and
              some tentative answers reflect the idiosyncrasies of each poet’s personal history... Jennifer Harrison’s explorations tend to be biological
              and medical (body, brain, breast and skin). In the second half of Michelangelo’s Prisoners she turns to that largest of bodies - the sea.
              For both Newsom and Harrison the body is the chief focus. This private space extends outwards for Newsom to include the close, harmonious
              world of home, garden and the senses. For Harrison, a practising psychiatrist, the body’s pathology (cancer) and the inner workings and
              quirks of the brain provide poetic subject matter: hysterical blindness, deafness. Tourette’s disorder, Oliver Sacks’s sleeping subjects.'
        - title: Australian Book Review Review
          text:
              "Michelangelo’s Prisoners Jennifer Strauss Australian Book Review , No. 174, 1995 Michelangelo’s Prisoners is an impressive first collection
              - technically assured and intellectual in the best sense. That is, the gears of Harrison’s intelligence are as fully engaged with the facts
              and theories that we bring to box on our corporeal and emotional experience of the world as they are with the specifics of such experiences
              and with the language in which we can (and cannot) speak them. For Harrison, those facts and theories often come from her professional disciplines,
              medicine and psychiatry, and a set of notes indicates awareness that there is a certain transplanting of discourse going on. If the process
              results in occasional poetic strain, it is vindicated by fine poems like the one on Oliver Sacks (‘this vagabond of afflictions’). The notes,
              along with the title - pointing towards such more acclimatised references as Michelangelo, Nijinski, Auden, Herodotus - may indicate that
              we are in the realm of ‘high’ culture, but Harrison can also write forcefully and accessibly of matters that are the stuff of tabloid journalism:
              anorexia, chemotherapy, the anguish of being an ‘Amok-runner’s Mother’, the desire of a Kalgoorlie prostitute for ‘music like a pair of
              solid gold 24 carat dingoes... no pretty-arse dancing’. Indeed one unifying motif throughout this carefully ordered collection is the force
              of human desire: ‘there is more we want’ - more than ‘the body map of sand’(‘Oliver Sacks’); more than ‘Ideas, cheap umbrellas [that] blow
              inside out / when you need them most’ (‘Maturana Songs’); more than ‘spoken words falling short of what they name’ ‘Aus-lan’. The strikingly-evoked
              ‘one-breasted woman’ of ‘Michelangelo’s Prisoners’ has a ‘peasant rhyme in her eyes / which longs for a woman’s symmetry’. To know something
              of feminist theorising of the body will increase the resonance of this disturbing poem, but its imaginative strength is not dependent on
              such knowledge. It should be clear that this is not apprentice work. The extent to which her poetic is formed in this initial mid-life publication
              recalls Gwen Harwood’s 1963 emergence and Harrison seems to me to have other affinities with that formidable talent - not leas an affection
              for fishing. In speaking earlier, I perhaps made Harrison sound unduly melancholy about unfulfilled and unfulfillable desires: in her themes
              and in the very process of her writing there are also robust celebrations of the fulfilled moment when the poet can say ‘I shout Fish! /
              dragging the tide towards me’ (‘Deep Sea’). The title of the concluding poem is ‘A Good Catch’: this reader agreed."
cabramatta-cudmirrah:
    title: Cabramatta / Cudmirrah
    author: Jennifer Harrison
    short_description:
        is an intense meditation on desire, memory and forgetting. As the place names of its double title imply, it locates us in
        the sites of those experiences. To understand, Jennifer Harrison would first have us feel.
    long_description:
        "Cabramatta/Cudmirrah is an intense meditation on desire, memory and forgetting. As the place names of its double title imply,
        it locates us in the sites of those experiences. To understand, Jennifer Harrison would first have us feel. In Cabramatta she tells of her
        adolescence. As she drives back Sydney streets suggest a metaphorical map of her body. The language of the poem, using a lost patois of CB
        radio, makes that yesterday quick and alive. It is an extraordinarily sexy work. In the contrasting formal Cudmirrah she returns to her childhood
        summers on the New South Wales south coast. Drawing on a local shipwreck, oral and Aboriginal histories, the natural sciences and her own
        recollections, she attempts to hold the tide against her grandmother’s Alzheimer’s disease. In remembering, she writes an elegy on memory
        itself. What Alan Gould said of Harrison’s first book Michelangelo’s Prisoners applies equally here: ...above all these poems are fresh. They
        give the sense of emerging out of an intractable element, language-experience, while being conscious of their emergence. They are not fashionable,
        they gesture nowhere; they are too deeply attentive to the strangeness they have found in the world."
    price: 19.95
    isbn: "9781876044114"
    release_date: "1996"
    page_count: 69
    reviews:
        - title: Cordite Review
          text:
              "Reviews Snapshots : Cabramatta/Cudmirrah Kathielyn Job Cordite , No. 2, October 1997 The two sections of this, Harrison’s second collection,
              operate in contrast. ‘Cabramatta’ is concerned with the past, travelling a new highway that cuts across the old, just as images of the past
              intersect the present. With a rhythm that starts, stops and accelerates through lower-case places, images and ideas accumulate into a representation
              of Western Sydney life. With the accumulation of facts and memories, and the concurrent valuation of both, the collection concludes appropriately
              with the word ‘elegy’. I was left with a final impression of individual poems reverberating with the strength of collective purpose."
        - title: Social Alternatives Review
          text:
              Rockpool reflections... Cabramatta/Cudmirrah Jennifer Miller Social Alternatives , Vol. 16, No. 3, July 1997 This slim volume of poems
              follows Harrison’s first book, Michelangelo’s Prisoners , and is divided into the two parts designated in the title. ‘Cabramatta’ is in
              fact one poem, an extended reflection on the writer’s childhood and adolescence, evoked through a drive back through the streets of this
              Sydney suburb. One prevailing metaphor is of the body. you notice how the suburbs have developed breasts and muscles, pubic parks a need
              to be themselves ‘Cudmirrah’ comprises the bulk of the volume, and is a more formal collection of poems which recall lost childhood summers
              on the south coast of New South Wales. Harrison ranges over a diverse terrain, incorporating many elements of natural history, memories
              of people, of swimming, and reflections on the process of memory itself. Themes that run through ‘Cabramatta’ include urbanisation, environmental
              transformation over time, pollution, urban icons and celebrations, and adolescent encounters. Some images reverberate in a warm and comic
              way, as shown in the following lines, which encapsulate a 1968 Easter parade. bagpipes puff their cheeks and strut ahead of the rsl mermaid
              who, swathed in a mesh-metal suit made of cola ring-top pulls floats on a papier-mache sea espaliered children cheer Her fondest memories
              are perhaps of the bikes and chicks, of the ‘granville boys, their breath like diesels’, of the motorcycle culture. Motorcycling provides
              a major metaphor throughout this poem. We glimpse her father’s motor-bike shop, and the irreverent nose-thumbing recklessness of bikers
              everywhere. As Harrison describes it, it was a tough and masculine culture, one to which she was perfectly attuned, shades of the recent
              Simone de Beauvoir’s Babies (ABC TV). On a more technical note, there is an odd shifting of pronouns throughout the poem, from first to
              second and third person. The colloquial ‘you’, the more personal ‘I’, the more distant ‘she’ combine to blur the focus at times. There is
              the added ambiguity, perhaps intended, of ‘you’, which clearly changes in reference from ‘all of us’, to the writer herself, to someone
              seemingly addressed. One other minor language barrier to easily comprehending parts of this poem concern what is referred to on the blurb
              as the use of ‘a lost patois of CB radio’. This is an insider dialect, and I was unable to decode it fully. The descriptions in ‘Cudmirrah’,
              a collection of 43 poems, evoke the coastal region of Harrison’s childhood, but are self-consciously adult reflections on the diverse phenomena
              (biological, human and philosophical) she re-encounters. I was reminded of the marine collections of Oscar’s father in Oscar and Lucinda
              . Some poems list the biological features of sea creatures, while other descriptions are inflected more heavily with the writer’s perceptions.
              Still other creatures provide a foil for remembered emotion. She holds the conch to my ear and I hear its spiralling music hack back to
              the pulse. Lure of the tongue, the ear another’s calves tangled with mine... the scale of love harks back to the limit the female limit.
              ‘Triton’ The language of some of these poems is self-consciously obscure and clinical (a possible intrusion of her other life as a psychiatrist).
              Harrison is at her most touching in simple poems such as ‘The Green House’, which describes through a tired child’s eyes the arrival of
              her family at their beach house late at night. These offer the reader moments of lived experience. We have a clear sense in ‘Cudmirrah’
              that these are things the author has loved, but at times she defends herself against their loss with a passionless and scholarly obscurity,
              in both word and image. As she describes this littoral landscape, and its reverberations in her own psyche, I feel I am watching a movie
              through a blue filter, with the sound turned off. But in many poems, the richness and fascination of Harrison’s brightly lit sea world are
              clearly evoked, along with the poet’s feelings, transparent and reflecting.
        - title: The Mercury Review
          text:
              Cabramatta/Cudmirrah Tim Thorne The Mercury , 9 March 1997 A new poetry book by last year’s Anne Elder Award winner, Jennifer Harrison,
              is Cabramatta/Cudmirrah , of which I especially enjoyed the ‘Cabramatta’ section, a heady mix of petrol fumes, CB radio, sex and hard-edged
              nostalgia celebrating adolescence in Sydney’s western suburbs.
        - title: Famous Reporter Review
          text:
              "Cabramatta/Cudmirrah Elizabeth Winfield Famous Reporter, No. 15, June 1997 ...Jennifer Harrison: what a wonderful, wonderful voice.
              I have only skimmed the surface of a cohesive work which uses the sea and its inhabitants as meditations and explorations worthy in themselves,
              with comparisons to human life. For me these poems, ‘these grains, sharp crystals / irritate the skin / until everything fluid / grinds
              in the groyne of my mind / a pocket, now a fracture / swept apart by imagery.’ (‘Stingray’) Loaded imagery such as ‘cigarettes bitch the
              gossipy air’, ‘No sign of a pepsi-drinking moon / but straw-holes pierce our atmosphere’, ‘In the dun’s shape / a dusty child settles /
              to sleep, dreaming / of breasts weaning the sea’, and ‘My brother has buried me in a play coffin; / my head above the sand, my body below.’
              She shows the perceptive insights one would expect of a psychiatrist as in ‘the wish to touch the root / which is the tree. All lies begin
              / with identity, confusion, clarity’, ‘the easy words are factory words’, and ‘Scarcely daring to read / what I have written the day before
              / in case I edit what I mean.’ She shows the vulnerable self, for example ‘How do we choose the places we love?... Lorca said / ‘the loved
              one sleeps on the poet’s breast’ / I plant my feet like native trees and whisper Cudmirrah.’ After reading ‘A Question’ I paced the room
              thinking of the people I wanted to share this poem with, immediately; a summary and meditation on what it is to be a woman, to love, and
              to really live. ‘Yes, yes’, I said into an empty room."
        - title: Overland Review
          text:
              "Cabramatta/Cudmirrah Michael Dugan (author) Overland , No. 147, Winter 1997 Jennifer Harrison is a psychiatrist whose first collection
              of poems, Michelangelo’s Prisoners (1995), won the Fellowship of Australian Writers’ Anne Elder Award for a first collection and was commended
              in the National Book Council’s Banjo Awards. ‘Cabramatta’ is a longish poem in which Jennifer Harrison recalls memories of her childhood
              and teenage years in Sydney while noting the changes that have occurred as ‘i drive into liverpool past the pizza hut / that was my father’s
              motor-bike shop’. Roads, cars, motorbikes, suburbanization, rivalries between kids from different parts of town are commented on and considered
              retrospectively in this poetic memoir. The section of the book titled ‘Cudmirrah’ consists of a series of poems in which Harrison explores
              her childhood memories of summers spent on the south coast of New South Wales: The poems are more formal in arrangement than the freewheeling
              ‘Cabramatta’ but are no less evocative and thoughtful."
        - title: Australian Book Review Review
          text:
              "Drifting in the Margins Peter Rose (poet) Australian Book Review , No. 188, February/March 1997 Jennifer Harrison has been prolific
              since the publication of Michelangelo’s Prisoners , a relatively late first collection, which won the Anne Elder Award in 1995. It was quickly
              followed by Mosaics & Mirrors; Composite Poems , on which she collaborated with Graham Henderson and K.F. Pearson. Now she has published
              a third book, Cabramatta/Cudmirrah , which, in its subtle, enigmatic way, is as impressive as the first. The title links the two long works
              that constitute the book. ‘Cabramatta’, the first of these, offers a ten-page evocation of Sydney and childhood. Uncompromisingly, with
              the determined moral vision that characterises the book, it begins: in myxomatotic crystal balls farmers saw the flexing virus of the universe
              exercise its fist in a rabbit’s eye gone white and blind. Largely unpunctuated, written in lower case, and divided into thirteen parts,
              ‘Cabramatta’ alternates between the first and second person and mixes memories of destinations such as ‘liverpool’ and ‘pymble’ and ‘bathurst’.
              With a kind of tentative nostalgia, the poet recalls the public places of her childhood: the bike races; an ignominious dance-floor; her
              father’s old bike shop, now a pizza hut. Images from her childhood recur: seeing a man being decapitated by a guard-rail; the sexual indignities
              and frissons of adolescence. The details of those times are modest but universal, making the poem highly evocative for any child of the
              ‘50s. Occasionally, there is a leap of imagination, as in these three random examples: like everything else, you resemble bits of socialism
              the plastic roses smell of tripe cigarettes bitch the gossipy air my father scrambling in sepia style he lays the bike on its coccyx it
              rears like a horse In the background lurk the ‘granville boys’, clamorous, insolent, ‘their eyes looking right through you / as though you
              were the exhaust’, their remembered virulence ‘like a thrilling disastrous dare’. Family, never absent for long in this book, overshadows
              the poem. While cousins ‘grizzle their fairlanes’, the poet’s ubiquitous grandmother serves tea on a plastic cloth. A needful aunt pours
              her savings into a poker machine, ‘something in the rhythmical pull’. When the survivors finally meet at the family reunion in Lidcombe
              Park there is a kind of shared need: ‘the wish to embellish the root / which is the tree, all lies begin / with identity, a confusion’.
              More successful, because more intense and varied, is the second, longer sequence, ‘Cudmirrah’. Some of the earlier poems might strike readers
              as a little resistant at first, but the language and ideas become varied and compelling, unpredictable as the sea and ‘illogical breezes’
              that dominate these poems. Here too the imagery is sharper, more original: The deepest blues are the deserts the calcereous Saharas where
              ships and terrified bronzes twist like windmills as they sink with open-eyes The stars, at one point, form ‘delicate colonies’; crabs ‘italicise’
              the sand. The poet is aware of’ tidal countenances’; the jelly fish ‘drift more silently / than combs through hair’. There is something
              very private, microscopic, about this poetry: ‘long days / browsing the minute bookstores / of rocky shores...’. Elsewhere, the poet resolves,
              ‘I must think of the wave as a diary’. The repeated promise in ‘Ballad of a Spear-fisherman’ is equally apt and beguiling: ‘I’ll tell you
              the story of an underneath day’. In ‘The Swimmer’ water, language, thought, all swirl around in this aquarium, this ‘private fragmentary
              world’. Later, in ‘Electra’, a poem about growing up in Cudmirrah and about the birth of attraction, the poet memorably declares, ‘Sometimes
              I sleep like a drowned river’. She recalls various agonising strolls with an older, more sexually confident cousin, adding that she would
              have preferred to sit talking about ships. Most of the poems in ‘Cudmirrah’ are lyrics, but there are a couple of ballads - not, I think,
              among the best things in the book. Occasionally, the language is spirited and inventive, as when Harrison describes ‘a burly of birds’,
              but there is something unconvincing about ‘I fill it with all I nothingly know’. Most welcome, in an age famously suspicious of words as
              long as ‘bland’, is Harrison’s knowing vocabulary. Words like ‘laminar’, ‘bathymetric’, ‘soliloquil’ and ‘equilibriate’ will hardly endear
              her to our lexical wowsers, who are plainly affronted by ‘the awkward blocks / of alphabet triumph’. In the end, Harrison’s poetry impresses
              with its intelligence and its containment. There is something admirably modest and poised about this personal but clear-eyed cycle of poems.
              At times it can almost seem too unassuming, as with a poem like ‘Green House’, but even this work has its own integrity, evoking a journey
              along the New South Wales coast. The best poems - ‘The Red Tide’, ‘Headland’, ‘Sponge’, ‘Among the most picturesque molluscs of our rocky
              ocean shores are the chitons’ - present a serious, ironic, uncompromising voice, occasionally reminding one of the poetry of Judith Wright.
              Although there is humour here, there is nothing flip or jokey. ‘Facts’, one poem begins, ‘seek to be more handsome / than uncertain words’.
              In ‘It’s Late’, another suggestive poem, the poet, drawn once again to the sea, observes a fisherman (symbolically ‘unhappy with his catch
              / and most happy when he has caught nothing’): ‘Too old for games / he lands each step in another’s / as though it is his mother’s footprints’.
              There is a kind of suppressed, not clinical, sadness here, as if some deep disappointment has been absorbed. In her first collection Harrison
              observed that ‘a great grief / can leave the sunlight tainted’. Not that these sober vestiges diminish the poet’s clarity or resolve. Harrison
              feels the ‘exotic nerves’ behind the television glass, the ambiguous skin, the life. In ‘Swan Lake’, one of the finest poems in the book,
              a young girl goes prawn fishing with her father, whom she longs to help, to impress. (‘I will be manly, waiting for him / until everyone’s
              gone with their buckets.’) Here the restraint and the detail are perfectly matched, reminding one of Randall Jarrell’s comment on Elizabeth
              Bishop’s first collection: ‘all her poems have written underneath, I have seen it .’ Later, the associations with the father are wonderfully
              complex: But as he eats the sweet meat of the sea with lemon I watch my father’s arms rest on the table then sleep in stringless nets which
              haul and fish and let me go. ‘We drift in the margins’, the poet attests - the margins of brother, sister, mother, father: ‘The drift has
              no purpose that I can see / but I name the waves’."
        - title: ArtStreams Review
          text:
              "Brand New and Fresh Made: The Sum of Us Jennifer Harrison, Cabramatta/Cudmirrah Jordie Albiston, Botany Bay Document Anne Delaney ArtStreams
              , December 1996/January 1997, Vol. 1, No. 2 What more could a reader ask on a dull, dreary summer’s day than to be presented with two slim
              volumes of poetry to bring a little glimmer of light and pleasure. It’s always a joy to read brand new, fresh-made, sweet-tasting poetry,
              and Jennifer Harrison and Jordie Albiston certainly added considerably to the quest for lift-off on yet another bloody Monday which didn’t
              even have the decency to smile for us. But never mind, I thought, here’s something to gladden us, just as soon as I saw these elegant little
              books. Both poets, I should imagine, will be delighted with the handsome presentation that their publisher has afforded them, a pleasure
              in itself in these cheerlessly rationalist times, and a gesture of pride in the achievement of both women. And the publisher’s not wrong.
              The poems in both offerings live up to the promise of their covers: for once we can rely on the gift wrap. And yes, both volumes would make
              marvellous gifts for the poetry lover, or the history student, or those who know the value and rewards in succouring and encouraging Australia’s
              burgeoning body of literary activity and its talented practitioners. Both these offerings could reflect, arguably, the sum of us; Sydney-side
              perspective. It all depends on one’s remembrances and prejudices and apprehensions. We see in the other something of ourselves in the birthplace
              of the nation two hundred years ago, forty-odd years ago and a scant five minutes since. Both carry something of the same message of exile
              and alienation and whether it’s on a national or more personal level, that’s something which has been passed onto all Australians one way
              or another over the generations. There is also the discomfort of revisiting and acknowledging rent memory, disappearances of the familiar
              and known, and the flight of the fiducial and the translation of object and meaning. In Jennifer Harrison’s poem, ‘Cabramatta’, the first
              placed and a major fragment of her volume, we hitch a ride on a graphic and rollicking harkening back to the time and place of her rearing
              and younger self, an outer Sydney western suburb, a home, it appears, for the disheartened, which now shouts only as bleak and unlovely,
              and most certainly not the gorgeous and gregarious Sydney that many of us have revelled in. We have to trust the poet and believe that her
              Cabramatta-state-of-mind was once all there, as she thinks , while trying to get a handle on it all: travelling now for years without arriving
              at the place you left you can’t arrive because it’s gone and possibly did not exist - and, so adaptably, you take the new version of the
              hume highway as it slices towards cambelltown... ... but this isn’t how you remember it now that the highway by-passes everything that is
              ordinary you see only the ordinary invisibility of speed you are unsure which cows are trees, which trees are people the anabolic blur flattens
              the lot until you are driving fast into your own history and digging deep into the eye within which is the only place you see it There is
              a sense of voyeuristic, lascivious fun in this adventure into recall. Here we have the gross and polluted west of the city which recollection
              engrosses, the unattractive and youthful pastimes lushly on offer in the fibro city, following the traditions, like; bikie gangs; escaping
              from dreary Cabramatta and Parramatta, haunt of the hounded and hassled woman, to the more salubrious northern beach suburbs where one’s
              location is one’s vocation; coming back to swoon for the Granville boys whom you love by the seat of your pants… The shoutlines of this
              volume propose that ‘Cabramatta’ is an extraordinarily sexy work, and it is that. There is a deft and suggestive marrying of the words of
              innocence and experience throughout the whole, sly at times but ever amusing: and I’m driving through the outskirts of sydney numb as the
              best boyfriends I met on the cb radio: it’s King John here calling for a copy you flick I’ll switch go down Brother Butch… vowel-static,
              it’s a voice you speak when your car’s a burrow in here you breed inflamed around the eyes going with the green stopping with the red thonged-foot
              flat to the floor you blast the orange your furry dice swing Much of her account of adolescence and experience glows with rueful humour
              and an element of self-mockery; well, I trust it’s self-mockery when I read: cars sit in the car-sale yards along parra road like books
              in a shiny store and you know how the harbour plumps up in the afternoons touching the west with rabbits’ breath but, now, what of the future
              and who do I love? Those of us who’ve been there know that the car yards make Parramatta Road probably the ugliest thoroughfare in all Australia
              and can only see an analogy with books in a shiny store as a half-jest, despite their similar appeal to possibly different people; those
              of us who’ve been poor and imprisoned in the west and haven’t necessarily felt as though the city was willingly ‘myxing’ us and have never
              rejected it, don’t need to cast off old connections and affections for a future one, or for that matter, a present one. The imagery in ‘Cabramatta’
              then, can seem at times a little too intimately-wrought, too ‘insider’ to the outside reader, and whereas the skill in the poem’s crafting,
              and an eager response to the narrative is apparent and immediate, I grappled with understanding a few of the gestures to reverie, or is
              it remorse?, such as... ‘All lies begin / with identity, confusion, clarity.’ And here, I must say unequivocally, that these difficulties
              are surely mine, not the poem’s. In the ‘Cudmirrah’ collection, I felt on much surer ground, though the sense of loss and the pain of parting
              was much more plangent and demanding. Poems in this grouping are often moving, even exquisitely sad, as in ‘Ekman Spiral’: Spirals of energy
              extend a hundred meters downwards a kind of laminar flow of pages sliding across each other long days spent browsing the minute bookstores
              of rocky shores.... half nylon worlds glinting, cilial tangles... lineal, arrowed, inept energy glows and the gyre folds back upon the past
              of its trace creating the flowchart of a permanent self undeflected by continents eavesdropping salt I pour the sea from cup to cup so that
              we might exit there, briefly, in the pouring a vast furrowed tongue licks the break wall the fact is you forget me layer by layer going
              down stair in the awful dark Jennifer Harrison always seems to find the right words for her insights in the poem entitled ‘Cudmirrah’, where
              we see her sorrowful recollections painting the images with grace and power. It is a wonderful poem to read and reflect on: the past has
              truly departed, the memories are clouded, and the ache of the inevitability of her grandmother’s Alzheimer’s disease lurks ponderously over
              all. Reading this poem several times I came to believe the integrity of the poet’s assumed truths and even to value and share the intensity
              of her distress: How do we choose the places we love? First we love, then we choose. Or call it love later, when memories assume the cloudiness
              of the past. Throughout this collection its easy to be impressed with the colours and shapes and lines which always seem to me to be concerned
              with some part of the Australian landscape: those things that the poet’s mind composed as a child, the grottiness of the city and the sourness
              of its environs - read all of our cities, the beautiful but terrifying and absorbing sea, the refulgence of the vitality of everything within
              a duplicitous and dangerous and deadening milieu, even the banality, finally, of fugitive memory. Here and there there’s a suggestion of
              detachment, an unconscious attitude, as in ‘Sponge’ or ‘Dictionary’, which we ally to the outcome of a romantic and autobiographical stance,
              and can sense that we’re reading very much in the subconscious mind to draw from the sensations of landscape, details of pieces of wood,
              rocks, sands, all forming the expressions of spontaneity and the life of these poems. A small quibble that I have with this collection,
              and it’s probably just idiosyncratic at that, was references to specialist words and things which were unknown to me and which I couldn’t
              readily find in The Shorter Oxford or any other immediately available reference. No doubt, many readers wouldn’t worry unduly about it,
              (what’s imagination for, anyway?) but this reader has a passion for understanding, literally, what the names of things mean - it’s from
              where my fancy takes flight, after all. It’s not that this detracts from the poetry, but it certainly does distract, here and there; skilfull
              poetry doesn’t use words uselessly, and a short, annotated glossary might have proved both interesting and useful to this reader... Both
              Jennifer Harrison and Jordie Albiston [ Botany Bay Document ] have, we’re told, won serious attention and consideration from a knowledgeable
              and discerning readership. Jennifer Harrison’s earlier collection, Michelangelo’s Prisoners , won the 1995 Anne Elder Award and was commended
              in the National Book Council’s Banjo Awards in the same year... Jordie Albiston ’s first collection, Nervous Acts , received first prize
              in the 1995 Mary Gilmore Award and second prize in the Anne Elder Award and was shortlisted for the New South Wales Premier’s Kenneth Slessor
              Prize. No mean accomplishments, these. One hopes that these two women continue to write and write often, and that a much wider readership
              can come to share in the joys of their poetry and find pleasure and pride, insight and consolation, in their words. Back to top Start of
              StatCounter Code End of StatCounter Code"
mosaics-and-mirrors-composite-poems:
    title: Mosaics and Mirrors; Composite Poems
    author: Jennifer Harrison, Graham Henderson and K.F. Pearson
    short_description:
        Three discretely distinguished poets Jennifer Harrison, Graham Henderson and K.F. Pearson have conjointly composed a collection
        of fearless intense works. There is nothing satirical here. Their composite sensibility rejoices in our contemporary, if troubled, world.
    long_description:
        The ghost of Ern Malley has haunted Australian poetry. Mosaics & Mirrors, composite poems by three and sometimes four hands,
        lays Ern’s ghost to rest. Three discretely distinguished poets Jennifer Harrison, Graham Henderson and K.F. Pearson have conjointly composed
        a collection of fearless intense works. There is nothing satirical here. Their composite sensibility rejoices in our contemporary, if troubled,
        world. Their poems engage the emotions, confront our alienation and celebrate friendship and love. They defy the post-Romantic idea of the
        individual author. Acutely alive to tradition, they re-make it in clothes that tradition in a mirror would hardly know. They terrify, delight
        and intrigue. Mosaics & Mirrors is a tribute to the collective imagination.
    price: 19.95
    isbn: "0646240471"
    release_date: "1996"
    page_count: 56
    reviews:
        - title: Authors Article - Arena
          text:
              "Author’s Article Poetry And Selves - Collective Writing Jennifer Harrison, Graham Henderson, Kevin Pearson Arena, No. 26, December
              1996/January 1997 Mosaics & Mirrors is a collection of poetry in four sections in which each discrete poem was conjointly written by us.
              The poems are narrative, dramatic or lyrical and embrace language, love and absence, friendship, suicide and alienation in the urban landscape
              as subjects. The book is unusual because, unlike the leaching one might expect with a conjoint work, the poems directly engage with emotional
              experience. They read like single-author poems. Literature is sprinkled with examples of author co-operation. It was not unusual for Elizabethan
              playwrights to co-write, Beaumont and Fletcher being the obvious examples. Screenwriting is more often than not multiple-authored, Casablanca
              being a celebrated example. In other disciplines such as the physical sciences, advances are made more often than not by chance discoveries
              arising from composite research efforts. The earlier co-operation of the Elizabethan playwrights, the screenwriters and the present day
              co-operative enterprises of other disciplines clearly needs reclaiming for a literary world often caricatured as one of gulls squabbling
              for scraps. So what was the identity of our conjoint author? The decision not to skulk behind a pseudonym or have an identification index
              (of who wrote which lines) was deliberate. We declared our complicity. Unlike James McAuley and Harold Stewart our intent was not to deceive.
              This decision, in retrospect, takes on particular resonance given that the book was released into the literary climate of the Demidenko
              affair and Paul Radley’s confession of not having written his own books. We declared our identity from the first. Lines or part lines contributed
              by an individual author we did not identify because the poems became artefact and had to stand as such. We are left with the equivocal fact
              that the author exists only in the poems themselves and in the collection Mosaics & Mirrors . It was not the problems nor limitations of
              authorship which nudged us towards joint composition - it was, in fact, the limitations of authors workshopping together which seemed the
              limitation. Workshopping together we came to know each other’s work so well that workshopping, in the usual sense, became irreverent or
              irrelevant. Because of those previous hours spent, we came to see in each other’s sensibilities a possible dialogue, as was the case with
              Li Po and Tu Fu: Like two Chinese poets in the pavilion of lost dreams across a moonlit river we reflect each other’s hopes. Reflected in
              the stream the poplar is doubled; though the water flows by the set image remains. ‘Great Southern Stand’ We sought a shared but separate
              poetic consciousness; we wanted our separate sensibilities to be a unity within the finished poem. Not surprisingly, we have found, as a
              common response to the book, a kind of game where readers attempt to pick individual voice from individual voice; to pick female from male.
              More surprisingly, even those familiar with each author’s work pick wrongly. The poems appear to stand alone; they reflect a social structure
              but the architectural seams are no longer decipherable. We met weekly for eighteen months between October 1993 and April 1995 at The Rose
              Hotel, a quiet backstreet pub in Fitzroy. We sat in a corner looking out onto the plane trees of Napier Street, the hundred-year-old cottages.
              Few cars passed. The meditativeness of the streetscape fed the meditation of the work. We began our first conjoint poem, ‘Anguish of Departure’,
              with its title. It was to prove the only time we used a title to initiate the poem. Our beginning in this manner allowed us, almost immediately,
              to strike the procedure we would follow in the coming months of composition. In this case we had a title but no beginning or foreseen end.
              The technique we used was to allow each writer to contribute two or three lines - enough to develop a theme, metaphor, idea or suggestion.
              The poems weren’t discussed as they developed. We didn’t want one author to dominate the poem or its ending. Finishing the poem set a task:
              when the poem was felt to be nearing completion, we abandoned the earlier procedure of the poem and wrote line for line. I will hear the
              sea’s distant futilities. I will hear the sand siren calling nomadic Odysseus back to shore to find Penelope changed by the milk of memory.
              She unbraids her hair, lets it fall cascading through my mind like a sailor drowning at sea. Final stanza from ‘Revenants’. Having started
              thus, we varied the technique as we became more confident. No procedure was fixed; it was guideline only. We passed the notebook when lines
              were finished. Whilst one wrote, two spoke of other things but with a sense of anticipation about the poem in progress. Each writer took
              whatever time they required to compose their thoughts. We deliberately didn’t engage in criticism or implied criticism of each other’s work.
              At the end of the session the poems completed were read aloud. This was a testament of respect for each author’s work. We wrote more poems
              than were included in the collection. Early in the process of writing we saw the book emerging as a text we would submit to an as yet unknown
              publisher. To compose an occasional poem together may have been a folly but to finish the book became an ambition. This ambition didn’t
              shape the writing but meant a necessary commitment over a sustained period because we knew there would be times when the collective effort
              failed and we needed to write enough poems for a fierce editorial culling. Failed or successful, each poem was retained in the notebook.
              Before we could group, we needed to decide which poems worked enough to be available for grouping. A core of poems pleased all and these
              were the poems included in the final manuscript. We wrote three or four additional poems at this stage. For those who know the work of the
              individual authors, Mosaics & Mirrors reads like jazz improvisation. This analogy reflects the process of how the poems were made and asks
              the reader, habituated to the idea of an integral author, to shift perspective. Lyric poetry has been, since the beginning of Romanticism,
              the literary form most passionately individual. This book challenges that expectation within the reader. The presentation of the book in
              the orthodox arrangement of a collection is deliberate. Ironically, Mosaics & Mirrors , by the orthodoxy of its presentation as a standard
              poetry collection, requests of the reader that he or she approach it as a conventional read. At the same time that notion is fractured.
              Like the authors who needed to rethink their notions of ego, the reader needs to abandon his or her preconceptions. The readers become complicit
              partners with the authors by allowing themselves this freedom of approach. Their reading enacts the collection. The reader makes the poems
              whole."
        - title: Australian Book Review Review
          text:
              'Reviews Poetry by Consenting Adults Mosaics & Mirrors; Composite Poems Michael Costigan Australian Book Review , No. 183, August 1996
              "Is it possible, I asked myself, that this is an Angry Penguins episode in reverse, that a sole poet actually wrote all the poems, presenting
              them as the work of three in order to deride the attempts of critics to identify each one’s contribution?" Is the writing of good poetry
              necessarily a solitary act? Or can it also be achieved co-operatively in private by consenting adults? Is the very idea of ‘composite poems’
              offensive to pious ears? Reviewing these two books together [Adrian Caesar, Hunger Games , and Mosaics & Mirrors ] - and, perhaps unfairly,
              comparing them - one faces such questions. Jennifer Harrison, Graham Henderson and K. F. Pearson are Melbourne-based poets who, in the spirit
              of Ern Malley’s creators, came together at Fitzroy’s Rose Hotel late in 1993, and continued meeting weekly for eighteen months, to write
              poems conjointly. Occasional contributions came from other poets, notably Catherine Hassell. Mosaics & Mirrors is a selection of poems (also
              [as with Hunger Games ] forty-six in number) emerging from this team effort, which, if their own description is accurate, was strictly regimented:
              We had been meeting during the previous six months to workshop together; we had come to appreciate each other’s sensibilities… Our primary
              procedure was silence. Once a poem was commenced it would be handed to the next participant; its content was never discussed nor its possible
              development pre-empted… We neither re-wrote nor edited any poem. It may be less apparent, but is nevertheless arguable, that Mosaics & Mirrors
              earns a similar entitlement for the three (or so) experimenters who collaborated in the production of composite poems. In fact, each of
              the three has begun to make a mark in Australian poetry circles. Graham Henderson, already well-known for his fiction and drama, has completed
              a poetry collection, The Coma of Becoming , while the poetry of Jennifer Harrison and Kevin Pearson, both of whom have spent a number of
              years abroad, is also being noticed here. Reviewers confronted by their ‘composite poems’, however, face a problem or two. It even occurred
              to me, having been caught once (yes, I confess to being the person who long ago successfully nominated Paul Radley as ‘Young Australian
              of the Year’), that this could be another literary hoax. Is it possible, I asked myself, that this is an Angry Penguins episode in reverse,
              that a sole poet actually wrote all the poems, presenting them as the work of three in order to deride the attempts of critics to identify
              each one’s contribution? In spite of that query from a too suspicious mind, I am willing to take the risk and assert that a good number
              of the poems in Mosaics & Mirrors read like the work of several hands. Take these lines from ‘White November’: Our union is not of the flesh
              only proximity. Our parting was not as bad as our being apart. Water is neighbour to the river bed. All things are disparate which also
              are companions. Or these from ‘Great Southern Stand’ (a good title for a Melbourne sonnet): Adversity has haunted us like a curse but wine
              warms our afternoons like a blessing. Indulgence and discipline are twins that unite us. Our tendrils are both from the vine and the pen.
              While recognising that a certain amount of sweat went into the composing of the poems, one is left to wonder how much better some could
              have been if the ban on editing or re-working, an integral part of any serious writing, had been dropped. On the other hand, it must be
              conceded that the blended sensibilities of the Melbourne poets have in quite a number of instances produced an effect as pleasing and harmonious
              as any poet working in solitude could have managed. I liked these lines from ‘Voices’: Perhaps there will come the peace of quiet, peace
              of old age. The Judge will be answered, the cacophony subdued. I will lie down in sheets, dreamless before I sleep. And these from ‘The
              Explorer’: He will see mirages of turbulent seas and perish amidst ancient rocks, his house bewildered at this departure. Civic statues
              resurrect folly and outward gaze. The theory behind the composite approach is articulated in a couplet in ‘Ghazel of the Journey’: ‘Poets
              in their youth are social beings; / in later age devoted to a room.’ This is a generalisation of doubtful validity, just as it is questionable
              to suggest that the lone creative artist or writer is less able than a group to hold up a mirror to society or to challenge Margaret Thatcher’s
              denial that such an entity even exists. As a demolisher of Thatcherism, I prefer the lone Caesar [ Hunger Games ]. In spite of which, the
              Rose Hotel experiment has resulted in something of genuine interest and value. Mosaics & Mirrors was worth publishing and is worth reading.
              But Paradise Lost it is not.'
        - title: Southerly Review
          text:
              "By the Sea: Some Recent Australian Poetry David McCooey Southerly At least two of these collections [ Mosaics & Mirrors and K.F. Pearson,
              Passion & War ] could be described as experimental. Jennifer Harrison is one of three authors of the ‘composite poems’ of Mosaics & Mirrors.
              Her partners are Graham Henderson and K.F. Pearson. Though invoking ‘Ern Malley’, the book states that ‘There is nothing satirical here’.
              One is intrigued. Could three people together write poetry? A short note describes die process of writing: ‘Once a poem was commenced it
              would be handed to the next participant; its content was never discussed nor its possible development preempted’. What was alarming to read,
              though, was the fact that ‘We neither re-wrote nor edited any poem’. This shows. The process assumes that the poets are prepared to either
              jettison any notion of where a poem is heading, or to write with no teleological sense to begin with. Consequently there is a twisting quality
              about these poems, like a trapped eel sliding this way and that."
dear-b:
    title: Dear B
    author: Jennifer Harrison
    short_description:
        Jennifer Harrison, in Dear B , writes as if poetry were invented to put dressings on poetic wounds, while all along the poet
        is serving language and its properly selfish concerns. There is a strange formality of her own in this book.
    long_description:
        "Jennifer Harrison’s fourth book opens and closes with the wisdom of older women. The first is the family lore of grandmothers
        and mothers, the last the wry observations of a gambling addict in ‘Casino’ where the invented world stalls like smoke over Asia. ‘Casino’
        is one of four major sequences. The memory of an incident trekking in the Himalayas transforms into a haunting love song in Dear B; epigrams
        of daily life form ‘Miniatures’; in ‘Boston Poems’ crisp tragic lyrics face the diagnosis and early treatment of breast cancer. Throughout
        these sequences and the individual poems which separate them, Harrison writes an understated poetry of great humanity, fineness and often
        wit. In the end, Harrison’s poetry impresses with its intelligence and its containment. There is something admirable and poised... the restraint
        and detail are perfectly matched, reminding one of Randall Jarrell's comment on Elizabeth Bishop’s first collection: all her poems have written
        underneath, I have seen it. Peter Rose, Australian Book Review"
    price: 22.95
    isbn: "1876044276"
    release_date: "1999"
    page_count: 68
    reviews:
        - title: Sidewalk
          text:
              "Naming/Scapes: Jennifer Harrison’s Dear B Richard Hillman Sidewalk, No. 4, December 1999 Jennifer Harrison’s Dear B is a strangely
              ambivalent and enticingly foreign collection of sound postcards in a new language album. Press to open and watch its pages turn with the
              care held for old black and whites and family histories. A diary of sorts (suggesting ‘a lack of restraint. There is no map’ - from ‘Diarist’).
              Turn the pages before the words fall out. Stand back from places half remembered on ‘waking, a camera dangling from a neck captures a foot
              just out of focus. Adjust the lens - write home to friends, lovers, a world gone mad with habit. Dear B is an uncertain series of seductive
              slides, evocative serjise data matching service, a displaced poet in curious places, wherein lie two poems which deserve wider critical
              appraisal: ‘Boston Poems’, and ‘Dear B’. ‘Boston Poems’ prepares us for what we don’t expect, allows us to question the obvious: ‘a traveller
              like us making excursions / into cultures we trust will / accommodate our oddities’ and nothing is taken for granted. Boston has its own
              quirky mythology (‘History pins names to cafes and fountains’) which underpins a people caught up in a desperate struggle for recognition.
              With lightness of, touch Harrison treats this struggle as if it were a skin disease, a cancer, a form of oppression spreading over a glass
              and concrete epidermis - names on billboards, walls and street signs are viral infections smothering the life those names articulate - and
              there is a fever sweating on the surface of things, forcing the resident to compete against the mirror-like liquidity of otherness, a full
              immersion in someone else’s desire to be recognised; perhaps the traveller is drowning, also, and the movement towards stillness (which
              the poem approaches) is not unlike death; or, a moment of revelation, witnessing the cancer which lies at the heart of the poet’s own awareness
              (a desire to name what names). Then there is the title poem, ‘Dear B’. A powerful doubling back on self-history, retracing memories of a
              trip through the Himalayas in 1980. A rite of passage examining the rituals that have constructed memory, or simply left ‘an impression’.
              Harrison’s self-deprecating style allows us to examine the poet as a signifying presence, an entity writing itself upon the surface of its
              own choosing. Yet, something definitely meditative, chanting on this surface, includes the listener - the often repetitive statement that
              she is ‘writing’ her way through this dream/memory journey, this soundscape, forces the reader to think as if s/he were part of that journey
              too - part of the ritual, the ceremony that has become the poem: I’m writing a path through the mountains to the festival of Holi the stone
              walls of the village are splashed with dye so that the village which bleeds bleeds all day to the sound of laughter and the smell of clay-baked
              bread when children throw a bucket of dye over you you are stained with the first blood of a woman and I taste you like a ceremony I don’t
              understand what it is to be foreign. Harrison listens to her words as much as they are listening to her - her poems are like shells brought
              to an ear - at some point they begin calling her back from the edge of sound, away from the enigma that is the edge of the human sea surging
              towards her feet: I hear you calling to come and see the fossil you have found in the sand ‘Doubtful Sound’"
        - title: Overland
          text:
              "Routines & Revelations: New Poetry - Dear B Kerry Leves Overland, No. 157, Summer 1999 Very con­centrated - some readers may feel there’s
              a community with Pushkin: fables take shape like constellations against the dark. And the wit’s informed by worldliness -’dancing in ever-widening
              folk dresses / the self-help book snaps open and shut, the chinks / in theory now so overgrown with narrative / you’d never know where to
              find a neurosis’ thirsty roots.’ Harrison knows how to cast an image that’ll hold, engage; it’s a talent well used - for suggestion and
              sensuousness, nothing overwrought. There’s a difference, however, between the flow of images that gives dimen­sion to longer poems like
              ‘Dear B’ or the’Boston’ sequence (both spellbinders, incidentally) and the set-piece meta­phors or similes that close - and diminish - some
              of the shorter ones (e.g.’That Place’). But the book’s final sequence, ‘Casino’, has cogency to spare - its gambler convinces and involves:
              ‘the most pure lurching / human thing I do each morning / is to scheme, even in church / I daydream poker’."
        - title: Australian Womens Book Review
          text:
              "The Geography of Non-sense - Dear B Bev Braune Australian Women’s Book Review, Vol. 11, 1999 Two-and-half decades ago Xavière Gauthier’s
              short essay ‘Is there such a thing as women’s writing’ was published in Tel Quel after it was rejected by Le monde des livres apparently
              because it was considered ‘completely incomprehensible, absurd and meaningless’. Gauthier pursued (and, it seems, demonstrated too well
              for one editor) the line of argument that women’s writing disrupts a norm considered established by a history of writing dominated by men
              whose tradition marginalised women’s writing. Here, in Jennifer Harrison’s words, ‘in the margins / of a slightly-known text / I am a paradox’
              (‘Lot’s Wife’). The act of writing by women (by its nature), argued Gauthier, must be non-sense in comparison with a sense-making, sensible,
              reasonable tradition which excluded women. She then went on to suggest that writers who are women must also be very clever indeed if they
              are to make themselves heard and read. This is especially so since, in recording their words and meanings, they are adding disruptive texts
              of ‘non-sense’ to the linguistic ‘order’ of established norms. If women speak they break or disrupt that order. And since they were not
              part of the ‘sensible’ in the order, when they speak it must be ‘non-sense’. At the very least, these notions are part of the process of
              an evaluation of writing by women relevant to our generation familiar with Gauthier, Cixous, Kristeva and Wittig. The new poetry collections
              by Caddy [editing the moon], Cronin [Everything Holy] and Harrison show that Gauthier’s essay remains relevant. The poetic voice in all
              three (to the least extent in Caddy’s) is determined to identify itself as ‘a woman’. If writers never fully agreed (aloud, anyway) with
              what Gauthier et al said, the sometimes extreme non-sense made women sit up and consider what they were doing as writers. These three volumes
              may themselves serve to bear out an investigation into the activity to which Gauthier referred - disruptive texts of non-sense. If nothing
              else, these poets show that poetry is an ideal medium for examining the aetiology of non-sense. Oftentimes, attending to meaning in poetry
              is indelibly circular or, as all three poets suggest, in imitation of life’s natural processes - birth to death, embedded in moon tides
              and cycles. And if women’s work is circular, these three volumes celebrate the circular argument without flinching at the dilemma of the
              reductionist in the wheel. They seem compelled to pursue ‘what makes me examine / the point of annihilation?’ (‘Negritude’, Caddy). The
              purpose of this might be provided by Harrison: If there is a riddle to decipher it will not despair on its own enigma ‘The Thought’ They
              agree that riding the wheel without getting caught in the spokes is nothing less than ‘moving / through the clamour, unused to freedom,
              unsure of the corner’ (Harrison) or searching for ‘lost... music in the chaos’ (Cronin). Jennifer Harrison’s Dear B celebrates the fact
              that landscape has the power to sweep itself clean of humans who cannot sense its needs… For me, it is Harrison who has captured the marriage
              between intellection and passion with Dear B. She is attracted to smooth, solid and magical objects - the embryonic, agates, gravel, the
              woman whose labour and body reflect the stones she was worn to their smoothness (‘Dear B’). In Harrison’s world, ‘her metaphors share the
              career / of other river gravels.’ Here ‘sand slicks to your skin’ (‘A Serious Case’). And her imaginative detours are grounded, as in ‘The
              Society of Psychotherapist’s Fantasy Ball.’ We are always likely to meet the most marvellous women: I’m a woman who wears her jaguar tooth
              sealed in silver, I tumble over rocks I live underground. Mountains of the Moon. ‘Mountains of the Moon’ Harrison consistently achieves
              an openness perhaps because she maintains so well what she calls ‘the shape of anticipation’ in one of my favourite poems in the collection,
              ‘Lot’s Wife.’ I wished the ‘Doubtful Sound’ series went on for more than 2 sections. A traveller ‘into cultures ‘we trust will / accommodate
              our oddities’ (‘Boston Poems’), she leaves me feeling that she understands her intellectual and sensual territory, and is never impatient
              even though she’s ‘got a wheel to spin / and detours to deal with’ (‘Casino’). We might regard these poets as Gauthier’s witches because
              they ‘dance’, ‘sing’, ‘are alive’ and ‘rapturous’ with it or within a broad consideration of perception, definition and the phenomenon of
              interviews with the self. Perception and self-definition, with as much certainty as we can glean from experience, are parts of the body
              (literally) of who we are. Eye and mind - the two (or the one) - enclose any world we describe, as Maurice Merleau-Ponty would have argued.
              It seems to me that Caddy, Cronin and Harrison make the point of the significance of their perception as women: Caddy, meditating on the
              rhythm of landscape; Cronin, breaking every rule in the book; Harrison, studying the unsteady progress of the self. It may be best to regard
              these volumes in the way that Julia Kristeva, in an interview in 1974, suggested one ought to consider making a trip to China - ’if you
              don’t care about women, if you don’t like women, you needn’t bother going’."
        - title: Southerly
          text:
              "I think I must write this down Greg McLaren Southerly, Vol. 59, No. 3-4, Spring/Summer 1999 Of a number of newer poets consolidating
              or establishing their reputation (Tracy Ryan another among these, as well as MTC Cronin, Peter Minter and Coral Hull), Jennifer Harrison
              displays perhaps the most interest in the use of the sequence. Although Coral Hull’s work represents a continuous open-ended sequence of
              sorts, Harrison has made sequences something of a signature. Her first book, Michelangelo’s Prisoners , includes several extended pieces,
              most notably ‘Skin’ (featured also in Picador New Writing 2 ) and ‘Maturana Songs’, while Cabramatta/Cudmirrah , her second, opens with
              the long poem ‘Cabramatta’. Harrison is equally comfortable with shorter pieces, which in their wider context sometimes take on a punchy
              quality. The poems in Dear B are inhabited by a variety of characters, their individual voices captured with a precise but light touch.
              If you don’t ask you won’t learn ... ...we’ll buy them a present but let’s only give it to them if they’ve got one for us. ‘The Getting
              of Wisdom’ The voice of the poems’ characters at times acts as a point from which Harrison’s imagery departs on cleanly-observed tangents:
              Am I late he asked arriving late, behind him the small deaths of each town he had passed, in his eyes the tired light, as it had, all day,
              fallen across the tar’s curve ‘Sewing’ Elsewhere Harrison’s persona speaks for the people in the poems: Sometimes he is afraid of everything
              that ends ... Primum non nocere first do no harm... poets, too ‘Hippocrates’ By speaking in the voices of others, Harrison also receives
              something of the authority and resonance of that voice. In ‘Hippocrates’ Harrison’s double-career of poet and psychiatrist forms a symbiosis
              in which each adds to and benefits from the discipline of the other. The book’s title poem is a series of verse letters to a lover, ‘writing
              a path through the mountains / through the Himalayan snows’. The writing of the letters acts as an aid to memory, hence the leitmotif ‘I’m
              writing a path through the mountains’, which transforms through ‘I’m writing a path through memory’ and ‘she was carving a path through
              the mountains’ into I think I must write this down now before morning before I forget The sequence’s concern with the self’s otherness relies
              on continual splitting that self off from what is identified with the self. This is achieved partly through the formal fragmentedness of
              the short letters, incorporated into the larger framework of the sequence in a manner that retains the integrity of the individual parts.
              The greatest split is that of self from other: ‘I don’t understand what it is / to be foreign’. There is a certain foreignness and isolation
              inherent in not understanding, one emphasised by reference to the national groupings of the speaker’s fellow (western) tourists: we have
              been stranded in Jomson with the Swiss and Germans we are waiting for the plane which can’t land we are helpless out of place here and here
              we might die among the evil fairies we conjure because we are so far from home A sense of collectivity remains in the repeated assertion
              of ‘we’, but this also acts as an attempt to impose belonging where there is none. The speaker is also temporally apart from herself and
              physically and emotionally distant from her lover: I’m writing a path through memory and it’s as though I send you a photo of ourselves
              years ago Machupuchare in the background Collecting these fragments of poetry and memory together counts as a bringing together and acknowledgement
              of the disparate parts which make up the self - the past, those who one loves and has loved, the places one has been - and through the writing
              restoring them in some sense to the whole. ‘The Boston Poems’ is an extended piece comprised of a variety of forms: individual poems, diary
              entries (‘Diary / Boston, October 1990-June 1991’) and recollections of place. The sequence is a meditation on the poet’s illness, likening
              the experience of cancer to a journey: It was always arriving, although we didn’t realise until it had arrived, how far it had travelled,
              how weary the cancer must have been to sleep so tenderly, not bothering anyone and how quickly the word fitted our lives, easily, as the
              Charles river or Thanksgiving or the story of Martin Luther King ‘Arriving’ To ‘have’ cancer is a cultural shift: it opens up geographical
              and psychological spaces. Cancer is not explicitly mentioned in ‘The Bridge’, Harrison’s elegy for Andrew Ziolkowsky. There is only ‘a point
              of view / that transcends the camera obscura of cells’ that intimates his illness and death. The poem succeeds in bridging the gap between
              loss and meaning: the central motif of the poem performs precisely this function. Understatement is especially effective when it follows
              a string of metaphors: Of your death thirty years of birth remain a shelter of sorts and I can speak of solid structures anchored struts,
              of tollways, railways of scientists and imagists of space and style. Even grass feels the weight of grief Harrison’s poetry crosses the
              space between death and birth with words containing images of travel and movement. Conversely, experience of the world provides ‘struts’
              and ‘structures’ for a moving and highly impressive poetry that acknowledges its own origin in ‘the weight of grief’ and recognition of
              the poetic drive: ‘I think I must write this down’ (‘Dear B’)."
        - title: Australian Book Review
          text:
              "Public Connotations - Dear B Peter Rose Australian Book Review, No. 212, July 1999 Since the publication in 1995 of her first collection,
              Michelangelo’s Prisoners , Jennifer Harrison has continued to impress readers and to broaden her repertoire. Her fourth collection in as
              many years, the intimately entitled Dear B , consolidates her reputation and demonstrates sufficient difference and intensity to satisfy
              admirers of this sensitive, likeable poet. As in her previous collections, there is no swagger or braggadocio. Falsity of tone or temperament
              is not a feature of this unassuming if yearning writer. The subjects are often modest, peripheral, domestic, yet they can reverberate with
              more public connotations. One such poem opens the collection: ‘The Getting of Wisdom’. The first line in the book is surely deliberately
              placed: ‘As my mother said’ - an unostentatious but pointed epigraph. Cabramatta/Cudmirrah , her previous book, revealed the extent of her
              filial mindfulness. In the new poem, a kind of muted sadness runs through these maternal legacies, which become bleaker with recollection,
              like a rueful dream: ...Treat others as you’d have done unto you, never boil abalone in the pressure cooker, a little Ajax on the teeth
              for whiteness, we’ll buy them a present but let’s only give it to them if they’ve got one for us. Elsewhere, as the poet moves around in
              this pleasingly peripatetic volume, there is a sense of defensiveness or defeat, if not defeatism. There is nothing romantic or redemptive
              about this identification with misfortune. Travel sharpens her innate sense of the mortal and the tawdry in the civic, as in ‘Lightning
              Ridge’: An emblem of the town’s history, a shack made of beer bottles becomes a museum. Easy to imagine someone down on their luck slapping
              the cement on an empty. Harrison is always at her best when she is roaming, uprooted, somehow stateless. Even a fairly modest poem like
              ‘New Year’s Eve, Boston Common’ (part of the long sequence ‘Boston Poems’) opens up into something quite strange and isolating: Children
              scratch their names into puddles. Strangers hug each others gloves. Shots of bourbon burn like Sydney. I stay past midnight when the kissing
              starts. The influences in Harrison’s work are subtle, and various. In that third line, with its scorched notion of Sydney, one detects an
              echo of Gig Ryan. Two memorable lines in Harrison’s previous book - ‘like everything else, you / resemble bits of socialism’ - had a similar
              effect. The slight warp and staccato give the poetry a pleasing edginess and variety, moderating the personal. Good poets jolt us intermittently
              with the unexpected. Lines like ‘She’ll be describing a third party, a white noise’ and ‘And the sun drinks colour from the fences’ compel
              us to respond long after the poet has restlessly departed. Clearly, though, some of the strongest poems in this new collection are unambiguously
              direct. There is a long cancer poem, frank and observant, but also done with considerable restraint. It reminds me in its spareness and
              insight of early Hodgins, and late Hodgins, on the same subject. ‘It must have been arriving, always’. The unpunctuated plainness of some
              of the poems in this cycle heightens the shock, the existential affront. I ask questions but more arrive later when I’m at home alone in
              the dark with my cells Yet even in this state of numbness or dislocation the poet achieves a sort of timeless weirdness which presents her
              with some of the best images in the book: you hold me like a circle like a clock I sew the hem of a dress and now you keep away Reference
              to Akhmatova in an earlier poem surely offers one possible clue to poems such as ‘The Abbey’: If I were to say the river has broken its
              bank they would open their laps and cradle my lips which speak the truth. For me, the long title-poem, another travelogue, possibly too
              epistolary, seems less successful than poems such as ‘The Light Itself’, ‘The Society of Psychotherapists’ Ball’, and ‘The Remains of the
              Day’. ‘Loneliness is a habit,’ one of the poems suggests, but Harrison’s sensibility is rarely apolitical or unengaged. Notwithstanding
              the intimate settings and themes, the poet is conscious of broader implications. In ‘Sewing’, the second poem in the book, a driver, arriving
              home late, is haunted by landscape and evening and ‘the small deaths of each town’. There is a marvellous, funny, and somehow very apropos
              poem about a naturalisation ceremony in Collingwood in 1992. ‘Ceremony’ is acute in its detail and understatement. ‘The mayoress gave everyone
              / a native plant, a plastic bag of roots.’ In the end, after the rhetoric and the allegiances and the kangaroo paw, we are stranded, almost
              ominously, in an empty hall: ...On the floor, left behind, lay all the plastic flags people had dropped in their hurry. Best of all in this
              context is the long poem ‘Casino’, which ends the collection. Here the poet achieves a memorable overview: Rumours will not be believed
              but can we trust yet the weird sciences of our future? This roll, this deal, this incoherence Incoherent and compulsive indeed, but there
              is something almost oracular in the closing figure of the cracked gambler spinning her wheel and bailing out her widowhood: I’m content
              with the drift the microcosm of strangers their voices like gravel my gin & tonic minding my machine, my people. Readers will admire this
              vulnerable and exposed poet, many of whose creations demonstrate the kind of ‘nervous heart’ diagnosed in one poem. In a longer, tripartite
              poem, ‘Lot’s Wife’, the figure of the woman ‘unwraps and sorts the look of death’: More petrified than ever before she paces inside her
              sea-shell calm. What can she do to undo fear? She can only look. In her fatalism, her isolation, and her openness to both, Jennifer Harrison
              continues to offer a distinctive and questioning voice in our poetry."
folly-grief:
    title: Folly & Grief
    author: Jennifer Harrison
    short_description: Like her funambulist, Jennifer Harrison produces from her new book Folly & Grief
    long_description:
        "and here are the things I carry: a silver bell, a desk, a lock of hair; some laurel flowers, a lantern, a bonbonniere, three
        scarves, a black cat, a peacock, a box of rain, a streak of lightning, a ladder, a pipe, a coffin, a fan, a pumpkin, a skull, a book of law.
        Like her funambulist, Jennifer Harrison produces from her new book Folly & Grief a bag of miracles. Her care for the language and her revelling
        in it, alerts us: we are in the presence of a poet whose work is ravishing. In a tumble of life she introduces us to a ceramic tea cup maker
        outside the Taj Mahal, a chainsaw juggler, a sculptor in bees, a book sculptor, human statues, objects in house or museum, street and theatre
        performers and, tellingly, herself. Each actor and line is vibrant. Individual poems hover like fables. Then, in the diary-like title sequences,
        she doubts and re-affirms her art. Folly & Grief offers us what poetry should: beauty under pressure. ...immense compassion and razor-sharp
        observation, dark under-edges and disturbing beauty. Ian McBryde, Five Bells"
    price: 25.95
    isbn: "1876044454"
    release_date: "2006"
    page_count: 133
    reviews:
        - title: Blast Review
          text:
              "Folly & Grief Petra White Blast, Issue No. 6, September 2007 Jennifer Harrison has been marked from her first book, Michelangelo’s
              Prisoners (1995), as a poet who works at full pitch with a scientific and philosophical scope (she is a medical doctor) - and with skilled
              imagination. Three books later, Folly & Grief is her most ambitious and accomplished. Her books approximate to the livre composé , and a
              discernible ‘theme’ in the new book is in the intermittent tropes of street performers - a well-established poetic tradition that takes
              in Baudelaire and Rilke. As with her predecessors, Harrison’s figures are most interesting for how their gestures are spaciously transparent
              to the poet’s sense of humanity. At times, they are fellow travellers in a serious quest for survival and grace in the face of loss and
              transience. In ‘The Audience’, the steadiness of a juggler on a unicyde exposes his unstable onlookers, drifting ‘like Piiz in the shadow’s
              cumin / in search of the present ’. For Harrison, the present is a layered and shifting affair, constantly requiring new ways of finding
              balance and of warding off delusion. Not least among her muses is that ultimate trickster, memory. Folly & Grief , as its title might suggest,
              is a memory-laden book, but Harrison doesn’t privilege memory as a source of truth or epiphany; she offers us no madeleine cakes. While
              many of the poems place emphasis on objects - ‘Funambulist’, for example: ‘and here are the things I carry: / a silver bell, a desk, a lock
              of hair, / some laurel flowers, a lantern’ - these may be keepsakes, or tools of the magician, or accoutrements of the writer (the desk).
              This drum-roll poem is on the first page, announcing a poetry that is prepared to juggle anything; and a poet who holds nothing sacred,
              whose vision both accommodates and challenges. ‘The Ferris Wheel’ takes what might be a conventional childhood memory and offers instead
              a complex splicing of perspectives. There is ‘a sense of memory mined / as though you’ve almost reached beyond yourself / and a fibro shack
              lurks always behind’. The ‘lurking’ shack is faintly shocking here, both stabilising and unsettling. The future looms with ‘scientists repairing
              the daisy-chained genes. / The fear of what we will fix’. Nostalgia for a particular kind of childhood is balanced by a genuine interest
              in the workings of the mind itself, and the voices of the carefree child and the anxious, world-and-self-aware adult are wonderfully combined:
              ‘Be careful now, or you’ll see only plywood, / the wheel as a vicious, ruinous form’. The stunning ‘Fauna of Mirrors’ is in some ways a
              re-casting of Judith Wright’s ‘Naked Girl and Mirror’. Whereas Wright uses the mirror to come to terms with a changed self (‘This is not
              I. I had no body once’), Harrison is as interested in what the mirror does. The mirror itself is a locus of change and trickery, shiftily
              containing the gazer’s whole past. Body, self and mirror can all be ‘smashed’; Harrison repairs: ‘The breast and the belly, the man-wetted
              thigh: / their fragments and half-promises can’t haunt a woman / who has conquered the distance between her eye and the light.’ If there
              is a hint of bravado in ‘What luck / to be confronted, daily, by the mirror’s radical memory / its freedom to invent’, ‘luck’ and ‘daily’
              suggest that nothing may be taken for granted. Often, Harrison’s uses of the magical or surreal are to explore a heightened awareness brought
              about by grief or loss. In ‘Pippying’ the sight of a woman on the beach ‘wading, her dress slapping the sea’ opens up a memory that isn’t
              exactly lost, and a time that hasn’t ended as such. There is something of the annihilation/preservation of Ovidian metamorphosis: ‘But it
              wasn’t long ago we pitched a tent in the sand / and slept in our clothes the way trees do’. The woman disappears: ‘all I recall is that
              when night fell, I saw / stars fill the darkness where her heels had left a hole.’ This is quietly exhilarating, flashing sibilants giving
              way to pausing outbreath h’s: ‘her heels had left a hole’. The mystery of absence and forgetting reveals something larger than the self.
              One of the two long title sequences, ‘Grief’, relates partly to cancer: ‘the sky’s blue mastectomy... chemotherapy’s caress of neon / the
              privacy of blood / the young bald girl / selects the wig she will not wear’. It is a journey poem, not through or into grief, but with it:
              ‘this is where grief / begins: in a rainforest / opened by machines / ...a red earth road / leading away from the known’. Both the ‘Folly’
              and ‘Grief’ sequences are remarkable for their momentum of mind, unpacking and releasing the suitcases of imagery piled up elsewhere in
              poems like ‘Funambulist’. ‘Folly’, more surreal, is a dream-journey through moonlight and rivers, as well as through such daylight spaces
              as the hardware store and the art gallery. There is a haiku-like concentration (‘a string of light rising / through the lake’s handbag of
              fish’). ‘Folly’ does not yield easily to the reader; it persists into a compelling strangeness, unafraid of ambiguity. This is how good
              poetry can be; and here, as elsewhere in Folly & Grief , Harrison shows that she has the poetic resources to keep the reader with her."
        - title: Wet Ink Review
          text:
              "Folly & Grief Heather Taylor Johnson Wet Ink , Issue 6, Autumn 2007 It will take more than a few long bubble baths and glasses of cab
              sav to get through Jennifer Harrison’s latest book of poems, Folly & Grief . This one hundred and twenty seven page collection is rich with
              images and character sketches, linguistically challenging and highly complex overall. Though it appears slight to medium in volume, it is
              extremely dense. In it, Harrison examines the secret worlds of jugglers and mimes, gets lost in the audience or becomes part of the music
              at folk festivals, imagines paintings coming to life and exonerates the beauty of the Taj Mahal, a china bowl or Changzhuo’s face covered
              in bees. She is both a keen observer and avid storyteller, squeezing life from magic, memory, smirks, melancholy, music, silence and colours.
              This is highly crafted poetry. Harrison’s precision is almost intimidating at the best of times: I can’t tell where I’m going but shall
              I memorise the shape of streets the slope of bridges, the vertigo? today I’m carried somewhere new - I’m lost, in pieces, and I rattle the
              smell of camphor (my skull, cedar from Cameroon) - I remember silt in my mouth eyes dredged from a factory when a light wind blew, my hair
              moved ‘Ventriloquist’s dummy’ This is a woman who loves words. Though at times I wonder if she might love them too much. I ask myself, can
              a poet place too much emphasis on the brilliance of a single word? And in the case of Harrison, can there be too many words in one single
              stanza which shine so brightly that the whole of the image becomes blurry? Too much brilliance, too much brightness, can be blinding, after
              all. But I am not convinced that this is a bad thing. In the overall scheme of Folly & Grief , becoming lost and having to re-read (if meaning
              is your motive) is only slightly distracting. Truly it is more seductive, like a drug that sneaks up on you then settles on in. The disorientation
              is simply part of the package and ultimately of no real concern. What matters is the way it makes you feel."
        - title: Island Review
          text:
              "Folly & Grief Janet Upcher Island, No. 107, Summer 2006 The cover of this collection, representing a group of ceramic acrobats from
              the Northern Wei Period, is a tantalising invitation to explore further. Harrison’s verbal acrobatics are equally tantalising, sometimes
              dazzling, at times mystifying and esoteric. There are poems here which resonate; there are others which, like any acrobat, risk falling
              flat. Her dalliance with wordplay can be oblique and annoyingly self-conscious (‘I angle through my own semantics’, ‘Folly’) but shows her
              awareness of the traps in artistic expression and her courage in pursuing the risks. Despite its universality, its strange appeal as a gallery
              for jugglers, magicians, buskers, acrobats and eccentrics, the collection nevertheless has a distinctly ‘Melbourne’ feel to it; one senses
              that Harrison is trying to shake off a middle-class legacy via her disconcertingly honest, almost disdainful view of the ‘comfortably numb’:
              ‘...the blank TV screen / has the soft, dull glow of a woman lost / inside the silk of her home’, ‘Model Home - With Stick Figure’. ‘Lucky
              Rich’ also reveals simple, yet powerful imagery: ‘I notice the sea’s wilderness / the minty breath of pines / ...I find my feet where love
              I sucks. I find my swim looking up. / All day too. Along sunset’s burning claw.’ Two of the most effective poems deal with the tangible
              and intangible, visible and invisible: ‘Golden Sadness’ with its poignant, starkly honest comment on physical relationships and ‘The Shark’
              where ‘Dawn slinks like a cat / along the sky’s spine’, making visible ‘the giant shadow / ... beneath the slicing silver fin.’ And finally,
              there is the powerful title sequence, ‘Grief ‘, with its fearless scrutiny of mortality. The imagery conveying individual isolation and
              the menace evoked by ‘chemotherapy’s caress of neon’ is striking. In a memorable, unified poetic sequence, Harrison explores ‘where grief
              begins’. Through startling metaphors, she manages to avoid sentimentality, subtly underscoring the fragility, the transience of things and
              people, one minute here, the next minute gone: are we all toys at the mercy of a magician, a juggler? Is survival merely a question of sleight
              of hand? Are we all merely acrobats in a crazy circus/cosmos? Such questions, it seems, have made her look more sharply, more incisively
              at the visible world, thereby revealing more of the invisible, the things rarely seen beneath the surface. Some of her images have a heightened
              sensibility which makes them unforgettable and poignant: ‘in the trees on Chapel Street / sparrows thrill and ripple / their small brown
              arias raining down / twilight in a seizure of song’. With such power in this sequence, one wonders whether other parts of the collection
              might have gained from more savage editing, more selectivity."
        - title: Australian Poetry Review
          text:
              "Folly & Grief Martin Duwell Australian Poetry Review - 1/2/ 2007 One of the features of Jennifer Harrison’s work is the way that the
              themes are consistent and the styles change. Folly & Grief is, quite simply, a brilliant book. To get a sense of what it is doing and where
              it is positioned, though, it is more than helpful to look at her previous work. Her first book, Michelangelo’s Prisoners (published in 1994),
              began with a group of poems about the body which position the author both as external analyser and participant; that is as body-owner. The
              first poem, ‘Imaging the Brain’, looks at that unknowable entity in terms of the traces it leaves, one of which is the very poem we are
              reading: The scan declares a brain is free Of tumour or haemorrhage But doesn’t comment on the mind’s possibility. Idle, industrious, the
              faint white streamers Which streak the filmy cortex Must be sentences. Other poems (such as ‘Cancer Poem’, ‘Chemotherapy’, ‘Outrider’ and
              the title poem) seem based on a personal experience of the body going wrong and so have a less-removed, occasionally nightmarish quality.
              Nevertheless they are still defiantly analytical in mode. The second section of Michelangelo’s Prisoners is called ‘The Sea’. Here, especially
              in the last poems, it foreshadows the next book, Cabramatta/Cudmirrah . The central poem of this section is a sequence of seven sonnets
              called ‘Maturana Songs’. It is central because the biologist/epistemologist figure which it celebrates provides a philosophy which seems
              to underpin much of Harrison’s work. Since Maturana’s work gravitates towards the image of ‘drift’ for the way in which human and non-human
              systems inhabit an environment, we can expect that seas in Harrison’s work will never be simply seas. Insofar as the sea is opposed to the
              body then it does inevitably symbolize the mind but the conventionality of this image (with its attendant symbols of fishing, drifting etc.)
              is complicated by the addition of the idea that it also represents the medium that we inhabit and never control. If each observation is
              a system each thought an adaptation, then we drift upon a spacious sea. Slippery meanings flash through weeds... So the sea poems at the
              end of Michelangelo’s Prisoners , like those in Cabramatta/Cudmirah , have a decidedly equivocal quality: they describe a medium which can
              represent the brain, the house of memories and creativity, but which can also represent a kind of primal medium out of which observers produce
              what they imagine to be solid ‘objects’ and experiences but which don’t in fact have any ‘objective’ status though they do serve to obscure
              the fact that they have been created. It recalls Tarkovsky’s Solaris though that wonderful film never appears in any Harrison poem that
              I know. To put it mildly, a lot of things are happening when this poet goes down to the sea. Cabramatta/Cudmirah is a book of memories:
              the titular suburb and coastal town being the twin poles of the poet’s upbringing. But memory for Harrison is far more than the re-creation
              of old, loved places. The first section is obsessed by fast travel and roads, symbols of the passage of time, and makes no bones about its
              interest in the very act of observation: but this isn’t how you remember it now that the highway by-passes everything that is ordinary you
              see only the ordinary invisibility of speed you are unsure which cows are trees, which trees are people the anabolic blur flattens the lot
              until you are driving fast into your own history and digging deep into the eye within which is the only place you see it The second section
              takes us back to the sea which is looked at through all the possible symbolic filters. It is the medium, it is also process, the natural
              world, the unconscious mind, the meaning-laden underside of a poem, and all human bodily fluids. There are two major human figures: a wise
              gypsy and a grandmother. Since the latter is suffering from Alzheimers she is a place where memory is slipping into the dark and her character
              is the reverse of the poet who pulls memories into the poems. Poetry is always responsive to this central human dilemma: the almost infinite
              details of life (the exact call of the local currawongs outside my study as I write this, for example) slip continuously into the irretrievable.
              Those things that are retrieved - chance items in a vast shipwreck - can be fixed in a poem but they do no more than remind us of the enormity
              of what has been lost. At any rate, one of poetry’s functions is to be aware of its power to fix: as Yeats says in ‘Easter 1916’, ‘I write
              it out in a verse’ and that poem celebrates poetry’s transforming power while seeming to record a transformation wrought by political commitment.
              One of Harrison’s poems, ‘Thermocline’, sets up a three-layered sea. There is the surface (the world of phenomena), the deep ocean (the
              world of forgetting), and between them the thermocline where memories are preserved and have an influence on the waves and currents of the
              surface. It seems schematic but it is a good poem: Lying between the eye’s horizon and the eye’s blindness the thermocline hoards memories
              that do not fade for without light, without heat the sea would be an infinite homogenous forgetting. Cudmirrah Shoalhaven Swan Lake Ulladulla.
              Waves are never one colour - they inhabit space not place - they’re in the sea’s lung then they’re out in the open mouthing the smoke of
              Bherwherre - then they curve to the shore taking the ship’s dog with them. Girls lie nearby rubbing hot-noonday suns into their skin’s cool
              echo. I must think of the wave as a diary. Scarcely daring to read what I have written the day before in case I edit what I mean. There
              are enough surprises here to overcome the schematic quality. I like the unexpected ending and I really like the listing of the towns in
              the middle - it is as though a list will re-establish the power of the poem to fix particulars. Another poem, ‘Sea Eagles’, seems to suggest
              that a list of remembered items can have an incantatory quality as though each object became sacred: See grandmother - we are recording
              the swimmer the cry, the unexplored X, coloured red meaning this is where we will go without finding the village of strange implements and
              boasts. There is a way of touching the dreams of another of calling when you have no voice. We make a tower from sticks and hang it with
              feathers, funeral stones rubber thongs, whelks, a wind-chime. There is a lot that is relevant to Folly & Grief in that image. Poets develop
              and change in their own ways and are not required to please their readers, but it is hard not to think of Dear B as a disappointing book.
              The bulk of the poems seem extremely gnomic and don’t - unlike the poems of the first two books - suggest approaches that a reader might
              take. What are we to make, for example, of ‘Husk’? Your nervous heart insists that lightness makes sense of grace that boneless time weighs
              the seed and spills its morse as choreography now prisoner stammering in the breathless crevice - fly fly across flagstones: smooth tumbling
              brief - pinned now to the ragged branch you disappear longing to see. Yes it is about the seed which carries its plant’s DNA across cracks
              in stone and paving and ends up in a tree and it is also about the heart’s desire to approve of the weightlessness of the seed but it is
              hard to determine the poet’s stake in all this: what makes it a necessary poem instead of a merely incidental one. The same could be said
              of the bulk of the poems in the book although occasionally, in poems like ‘Local Astronomy’ and ‘A Serious Case’, familiar themes (memory,
              system-identity) push through. And the poems are not necessarily bad. Everything I have said in a way applies to ‘Out of Body Experience’
              which is, in its own way, a tour de force : Last night I lay above myself in the dark looking down upon a stranger beside him. Momentarily,
              in the moonlight, she was that person I am no more, the one seen from far away who cannot be regained or changed and whom the dawn will
              not unite. The two women who lie awake beside him cannot speak or touch each other. One is made of earth and blood, the other of air and
              moon-frost. All the night between them is past and future night so that everything I have done, everything she watches becomes a memory,
              now passing as I sleep and wake outside her, inside myself, beside him. The brilliant opening works by quickly and unexpectedly introducing
              a third person as a kind of marker point so that the spectral self looks down on ‘a stranger beside him’. But even this poem despite its
              personal theme has an impersonal quality, almost as though its ideal housing would be some kind of anthology where poems don’t need to be
              read through their individual author’s obsessions and thematic and stylistic quirks. And so to Folly & Grief . At the simplest level we
              can see that, like the first two books it is in two parts. It is also a long book, each of the parts being as long as a conventional book
              of poetry. Each section ends with a diary-like poem that represents something that is, as far as I can see, new in Harrison’s work - though
              Dear B does contain a diary section in one of its longer sequences. But the overwhelming impression that a first reading of Folly & Grief
              makes is of the almost all-encompassing symbolic set-up built around commedia dell’arte, mime, clowning and funambulism. You can get the
              wrong initial impression - as I did - that this is a kind of got-up research project that a poet might put to an arts-funding body: promising
              to write a sequence about the circus world. In fact the obsessions of the earlier books are here and the magic of Folly & Grief is that
              these obsessions find a natural, logical home in the world of the clown and the mime. In fact the nature of these obsessions becomes so
              much clearer when they are opened out, so to speak, into a different symbolic realm. When discussing the earlier books, I have already spoken
              about the features of memory and the way a poem can fix them. Sometimes these memories actually are embedded in objects inherited and kept.
              It is no accident that the word ‘heirloom’ occurs so frequently in Harrison’s poetry. We meet these pregnant objects in the first poem of
              Folly & Grief , ‘Funambulist’. Coins fill the busker’s hat; it’s true, a thief will steal from the blind. Satellites spin delicate journeys
              in the woods above. Space the guestroom we never had. Malleable, down below, in the mute neon between streets, we’ve touched only the details
              of maps. Believing ourselves beamed upon, we script new mercy themes and here are the things I carry: a silver bell, a desk, a lock of hair,
              some laurel flowers, a lantern, a bonbonnière, three scarves, a black cat, a peacock, a box of rain, a streak of lightning, a ladder, a
              pipe, a coffin, a fan, a pumpkin, a skull, a book of law. Believing myself beamed upon, I carry one clap of thunder, some shrimps and a
              globe, a bag of nails, a carton of crème, a rolypoly of doves. I carry the city, the cleft mirror, the faked fight of the fist on the drum.
              Part of the magic of this initially strange poem is its movement into list. Instead of fixing one item by focusing on it, it provides a
              list which suggests the infinite number of possible items for the character to carry and, at the same time, takes over the poem: a really
              fascinating structure. The list itself is an abbreviated version of the one provided in Kay Dick’s history, Pierrot , as an account of the
              property of the greatest of the Pierrots, Gaspard Deburau, who flourished in Paris in the first half of the nineteenth century. It is tempting
              to look back to the idealist position of Maturana and to begin to make symbolic connections. If the world of objects is essentially illusory
              then what better expression of this could be found than the world of fixed-role comedians and, above all, mime. I think it would be reductive
              to see this as the essential principle behind the poems of the book but at the least it can be said that the circus world is one whose thematic
              possibilities chime well with poet’s obsessions. ‘Ringmaster’, for example, is the monologue of a character reluctant to be a mere clown,
              one who wants to seize the key to Rimbaud’s ‘barbarous sideshow’: But I went inside the rough sketch of a woman to find the dice’s grace
              - to find hail drubbing on an old Zephyr sedan a ringmaster’s whip scything the air. I went to the circus to take charge; to remove blouse
              after blouse. I went alone because to master the sanded weights a juggler first conquers clumsiness then writes the same poem, over and
              over. Sometimes it is possible for the power of memory-objects to be overwhelming. The first prose poem of ‘The Feminine Sublime: Two Briquettes’
              treats heirlooms as dangerous: Should I open this pressed metal trunk with a surface like crocodile skin - should I fall in - I might not
              return. Crocheted into doilies, the dead wait with powdered faces, bleeding floral lips and sometimes with kind, eccentric maps. However
              kind they may be, they lure you into memory, there to tangle their perfumes through your own until you cannot resist the past’s vigilance.
              And what you find is a caravel treasure: satin pennants, third place, lace, the cigarette box your father made from matchsticks... But there
              is more going on in the book than an exploration of the theme of memory through the image of the clown and the collection of heirloom-objects.
              ‘Cochlear Implants’, a poem - obviously - about an operation that will stop the world being an experience of mime for the sufferer, focuses
              rather on the heightening of the visual sense over the auditory: You believe the ear is Orphean - I treat it as an appendix in the mirror.
              Before I take the bee inside give me time to memorise the poem I’ve seen: the red hibiscus in bloom my street without shadow - outside my
              window, men in mime digging with their jackhammers at noon. Another theme related to the idea of the world as shadow, playacting and illusion
              is the mirror. A fine and very complex poem, ‘Fauna of Mirrors’, explores this at length, using both the ancient Chinese idea that mirrors
              harbour their own creatures (not necessarily well-disposed to the watchers on the other side) and the idea that the mirror contains our
              entire past. The world of Cudmirrah recurs: Starlight twists inside the mirror and an old woman wades barefoot across the moon, later washing
              towels of blood to hang between the fibro houses clutched around a shore. Children there, too, shaking the sand from polished bones - a
              bird’s skeleton, its stutter raked by storms... And it reminds us that the gypsy character from Cudmirrah, Moss Wickum, is celebrated in
              a poem in Michelangelo’s Prisoners as ‘a man who threw shadows / on a fibro wall: a rabbit, a parakeet, a balloon twisted / into a giraffe’:
              he too inhabited the world of illusion and a kind of mime. And it reminds us of an earlier poem in that book which concerned itself with
              sign-language: ‘and foam, rubber, snow and glycerine / seem softer in the fingering span / than spoken words falling short of what they
              are’. ‘Fauna of Mirrors’ concludes not with the French priest’s catalogue of the Chinese notions of what inhabits a mirror but with an allusion
              to Borges, that connoisseur of objects like books and mirrors which trouble us by suggesting the infinitely multipliable nature of reality.
              Borges’ ‘baldanders’ - ‘soon something else’ - in his Book of Imaginary Beings can teach us how to converse with objects and becomes the
              subject of a sequence in Folly & Grief in which the figure of the poet becomes his partner. This first section also contains two fine poems,
              ‘Glass Harmonica’ and ‘Chinese Bowl’ which seem (at least in my inadequate readings) to focus on the positive, creative aspects of objects
              and art. In the former the artist playing on the instrument conjures up images far beyond those imagined by the inventor and players of
              this exotic eighteenth century instrument and in the latter the artwork contains in itself, and makes available, the entire cultural history
              that went into its making. References to the world of professional illusion become a little sparer in the book’s ‘Grief’ section although
              there is a poem about Antonioni’s Blow-Up (a film which includes a mime troupe as a framing symbol) as well as poems about dancers, musicians
              and statue-mimes. Overall these poems seem, true to their title, darker and, above all, obsessed by loss. In ‘The Steyne Hotel’ it is a
              friend suffering from cancer and in ‘Birthday Poem’ it is the poet herself accommodating herself (at least in my reading) to the stream
              of time symbolised in a strangely clarifying rainstorm and the fact that ‘more bark has fallen from the gum tree’. ‘Soiree at Black Lake’
              is a complex poem about the attempt to find a place outside of time: A man stroked my hair and said, memories are grasses; flax, hay, lawn
              - a little traffic a bicycle bell - all is at it was. There is nothing to fear. But I didn’t believe that lullaby... And I knew, then, that
              the cruel hours spring back when the hay is cut, the lawn mowed. And ‘Fathers’ has one of the books finest treatments of memory - though
              also one of the darkest. The poet is reading the work of Li-Young Lee: Tonight when I read your poems, I think nothing in you grieves that
              should sleep, nothing hungers that has not been fed, nothing glimpsed through a door or feinted by a corner of light has been lost. Memories
              corner us into type - and the untidy ghosts are arriving by later, less punctual trams. Outside ourselves, then, are the essential moments
              not here in these poems, these crowfolk of the streets, each dressed in invisible black each hurrying beside the traffic bird-poised ahead,
              buoyed by life’s recompense. Finally there are the two sequences, ‘Folly’ and ‘Grief’ which end each section - one of ten pages the other
              thirteen. It is difficult to know exactly what to make of them beyond saying that they are clearly movements into new territory. They have
              something of the cast of those psychological/autobiographical sequences of the seventies - Andrew Taylor’s ‘The Invention of Fire’ and Jennifer
              Rankin’s ‘The Mud Hut’ are two very different examples. They are odd sequences and it is hard to judge how successful they are. They certainly
              represent yet another kaleidoscopic retreatment of previously met themes and images and we know immediately that we are in familiar territory
              when the first poem of ‘Folly’ speaks of the ability to ...dip my hook over the side and retrieve deletions that have left my mind this
              theatre more tawdry than last year’s... and the second poem establishes a riverscape where shallow swamps are littered with memorabilia
              possessive as the sea hoarding its wrecks art folds back on itself But familiarity with the poet’s thematic material only goes so far. Beyond
              saying that ‘Folly’ is centred on a return home, or movement to another home (it concludes with another reference to the sea: ‘...marshlands
              / reclaimed by the sea / leave no trace of nests’), and that ‘Grief’ is about treatment for cancer and is built around the equation of the
              body with the land and recalls the poem ‘New Road In’ as well as the much earlier ‘Cabramatta’ in its interest in the metaphorical possibilities
              of the road, I am not sure I would trust myself much farther. This does not mean, though, that I think they are failures as poems or are
              modes that the poet will not profitably explore. In fact it may not be the case that Harrison’s future books work through this diaristic-imagistic-unconscious-oneiric
              quality. There are, however, a couple of other poems in Folly & Grief which are open, relaxed and celebratory. I am thinking especially
              of the second of ‘The Feminine Sublime’ prose poems which is a celebration of the act of childbirth and of ‘Tamagotchi Gospel’. This poem
              is about experiences of childhood and the natural world and has an expansive, relaxed, long-breathed quality which is a long way from the
              delphic images of ‘Folly’ or ‘Grief’: It may be nothing more than a faded awning tilting in oleander sun, or the way someone rings on the
              mobile at just the right time, someone who might not have noticed your regard for their humour, or the way you admired the coral torque
              against their skin last spring. And see how happy you are when alone in the bush, the others ahead as mossed voices, you arrive at the fern-lit
              pool where the bird of long wings and hard eyes dips to drink from the creek’s sigh?... There is no freedom from change but it is quiet,
              words nowhere to be seen - quiet as your father’s favourite silence: the psh!psh! of waves softening the shore, the silence of bush bees
              chiming hard and bright against the earlier time you were here dressed in a costume of leaves. I am easily entranced by this poem - by this
              kind of poem - but somehow so much intelligent analytical material has to be left out to say these simple things that I can’t think of it
              as a model for Harrison’s future poems."
        - title: Famous Reporter Review
          text:
              "Folly & Grief Mark O’Flynn Famous Reporter, No. 34, 2006 Folly and Grief is a dense and generous collection of poems from Jennifer
              Harrison, her fourth. Within the range of her recurring obsessions Harrison offers quirky observations in finely honed language that is
              lyrical and imagistic, and in a form that is structurally confident and varied. The blurb describes her work as ‘ravishing’, and this descriptor
              is apt. A ravishing, stylish poet. The book is divided into two sections - folly and grief. - each with a long title poem to conclude. It
              must be said that her favoured subject is perhaps an unusual one for poetry. Harrison’s concerns are dominated by an interest in theatre
              and performance, ostensibly the characters from Commedia dell’Arte . Why not? Poetry will question everything. She asks of Pierrot: ‘Can’t
              you find something new to write about?’ The poems are not ‘theatrical’ as such. They are not dramatisations of stock characters, but take
              their essential traits, and apply them in highly poeticized and lyrical ways to the business of contemporary living. They deal with the
              real world by exploring the manifestations of archetypes in a variety of performance styles. In ‘Clown’ she concludes: I have metaphor,
              and behind metaphor more costume. All these performers, in their various guises, serve as more personal metaphors: A juggler first conquers
              clumsiness then writes the same poem, over and over. The analogy is precise. Harrison’s notion of performance is not restricted to Commedia
              dell’Arte . Her stage is broad. But like Dorothy Hewett she keeps returning to the same subject. It includes a multifarious array of poems
              dealing with a range of activities which, at least on a superficial level, might be regarded as some sort of performance. There are poems
              exploring the circus, juggling, carnival, side show alley, busking, acrobatics, clowning, ballet, film and so forth. It is a rich source
              of imagery. Even skateboarding fits into this street theatre aesthetic. A ventriloquist’s dummy, as do all the others, clearly has deeper
              symbolic implications. While not every poem alludes to theatre or performance, it is clearly a recurring conceit for which Harrison has
              a predilection. About the only activity that is not addressed directly is performance poetry. Harrison is too lyrical for that. In this
              sense the poems approach a Brechtian sense of life-as-performance; a witness-at-the-car-accident type of theatre. There are domestic scenes
              which collude with the reader to strip away the fourth wall and eavesdrop. We even observe childbirth as a kind of beautifully moving performance.
              Some poems take the form of a poetic monologue, but usually they treat the theatre-as-subject with more impersonal lyricism. The point of
              view is not solely descriptive, but seems to take on an oblique stance which allows ‘feminism’s busking licence.’ Her preoccupation with
              ‘theatre’ as a topic is intriguing. It is difficult, for example, to get the juggler’s sense of perpetual movement down on paper, yet Harrison
              approaches this with some typically arresting imagery: We’re afraid he’ll slip and fall on the wet road but he juggles his macabre salad
              well,... There are, of course, other pieces concerned with such subjects as painting, disease, storms, fishing, travel, friendship; a broad
              ranging canvas in fact. Being a psychiatrist by trade Harrison occasionally slips in a quiet psychological reference, which presents a nice
              synthesis of her various disciplines - theatre, psychiatry and poetry. Do you understand how I’m forced to defend myself in dreams of rabbits
              and ferris-wheel rats? While some of the poems deal with the rather ‘tawdry’ world of street theatre, Harrison’s language is highly refined,
              eloquent, even tending to the mellifluous, when sometimes what we want is the grunge. Mostly however there is a balance in her imagism between
              the earthy and the porcelain: ...the lips of a ferry licking thin cream from the river. Sometimes this grandiloquence can be irksome. One
              can only take so much of ‘fecund glades’; sunsets that ‘glowered like a necrosis’; or phrases like: ‘scholium illuminates / porcelain’s
              tissane history.’ (Huh?) Sometimes the analogy drawn between circus tricks and writing is stretched a bit: ‘near the sea wall / the unicyclist
              in my pen / travels so far’. On balance though this is a small quibble. More frequently there are striking images such as: a string of light
              rising through the lake’s handbag of fish Part two of the book still retains the performance conceit in a substantial number of the poems.
              The circus tropes predominate, but in a more elegiac tone. Folly and grief: it is a balance of symbiotic opposites. Here grief takes the
              stage in a variety of domestic and tragic scenes and, as such, seems to reflect a more dolorous view of the world with images that pull
              you up short like: ‘the sky’s blue mastectomy’. However there is nothing morbid or depressing about this, even if the language is more conceptual
              and sombre, the energy somehow static. The poems are still dense with ideas. The imagery has a surreal edge: Broken stones forget their
              dry kiss and giant moths touch the moon with flaming wings. While the landscape is largely one of grief and loss, the mood is not one of
              mourning; the language is paradoxically exultant. The reader does not grieve. I might have lost my way, forever, in mourning’s indifferent
              mime The reader is distanced by this more philosophically abstract quality of the language. One has to work for the rewards. Although as
              soon as you think this you come across, for example, the moving poem of the loss of her father, (Galleria), and think you’ve been reading
              these all wrong. Harrison’s control of form is measured and precise. Structurally the book hangs together with a sense of well-balanced
              wholeness. (The cover, showing ancient ceramic acrobats, is perfectly representative.) Each poem displays Harrison’s attention to craft,
              and there is a diverse range of poetic structures. There is danger in a book this long of the reader tiring of the style. However Harrison
              is astute enough, and too much in control of her craft for that. There is enough variety to keep the reader consistently engaged. If anything,
              I preferred the first section of the book, a little folly over grief, but this is splitting hairs, both are marvelous. Chekhov once said
              that ‘every time I come out of the theatre more conservative than I go in.’ Harrison is more optimistic. She says: I pass through ghosts
              each time I leave the theatre each time I feel the kindness of the sun. This is a dense yet celebratory book; sprawling, yet tightly controlled;
              a cross-pollination of subject and genre that is eccentric and appealing, with a powerful use of language, and enough confidence to carry
              the idea. Sometimes it leaves you slightly gobsmacked."
        - title: The Book Show, Radio National
          text:
              "Folly & Grief Geoff Page Radio National - The Book Show, 14/11/ 2006 In her busking cloche velvet dress and army boots her Salem air
              of ashes... she clears a space in Harvard Square to play the musical glasses. Tucked along a spindle, each rim larger than the last, beneath
              her wetted fingers the bowls begin to sing of Faneuil Hall and Kirchgässner, of feathered snow and wolverines, of broken fans and wreathless
              things - The Woman without a Shadow echoes through tabernacles with eyes of broken tin. Iced air is rising from the river - call me Ishmael
              call me Ishmael - a wave to drown the soul of bowls and now the sea has taken on the burden of the song. September shakes down leaves to
              make the branches simple... one high note might light a pyre of bundled birch— but today she has no bowls for death. She plays a wintry
              madrigal. In the city of white swans she reaches for the smallest bowl, and then the smaller one. ‘Glass Harmonica’ That poem, ‘Glass Harmonica’,
              is one of the more explicitly rhythmic and intriguing in Jennifer Harrison’s new book, Folly & Grief . The vast majority of the poems here
              are about performers of one kind or another, particularly street performers. In ‘Glass Harmonica’ Harrison presents us with the player of
              an instrument invented by Benjamin Franklin in 1761. Mozart, apparently, wrote a quintet for glass harmonica in 1791. As in many of the
              other poems, Harrison is concerned not only with the technique of the performer but the performance’s imaginative, even spiritual, implications.
              To her, the sound of this strange instrument summons up ‘feathered snow and wolverines’. The madrigal is ‘wintry’ and although ‘today she
              has no bowls for death’ there is a distinct foreboding throughout the poem. At the end we move from ‘the smallest bowl’ of the instrument
              to the impossible ‘smaller one’ of the infinite. Harrison has clearly made an extensive study of these people: buskers of all kinds, ‘living
              statue’ artists, jugglers, funambulists, street magicians, fire swallowers, circus clowns, various commedia d’el arte figures and so on
              - sometimes, in person, close up; at other times through the books she lists in her bibliography. Harrison is obviously concerned with more
              than their legerdemain, however. She is interested in their motives, in the effect they have on us, the audience - and even in the metaphysical
              implications of their art. Is it, for instance, analagous to poetry? She doesn’t make the comparison quite explicit but there are times
              when we feel it. In ‘Clown’, for instance, Harrison has the clown say: ‘I have metaphor, and behind the metaphor more costume’. In ‘Ringmaster’,
              she points out that ‘a juggler first conquers clumsiness / then writes the same poem, over and over.’ Some might be tempted to argue that,
              in this livre composé , Harrison has fallen into this trap herself. However, despite so many poems being about the same group of people,
              the points she derives from them are quite various. One monologue, for instance, evokes the symbolic helplessness of the ventriloquist’s
              dummy when the dummy complains of how ‘my ideas / seem only his, amusingly / my suit fits him like a glove / my tongue snared / by his taste
              for the trashtalk of Vegas’. A quite different poem, ‘Zanni’, asks of a ‘living statue’ artist: ‘Why have you come? / Why bring us this
              courteous mime? / Where is the second statue / beneath your easy charm?’ This variety is further embellished by a scattering of one-off
              poems through the book, dealing with subjects as various as - the effect of a cochlear implant on the profoundly-deaf; the emotions of childbirth;
              love set against trouble in Iraq and grief in the sequence of that name which, for all its obliqueness, seems to have an autobiographical
              ring: ‘grief pushed back from the rain / like the bow-wave of a canoe / but I’m trying to see / with less metaphor / now that I’m hollowed.’
              You don’t need to be a fan of street performers to enjoy Folly & Grief . It’s another example of how poetry can be about much more than
              it seems to be. Perhaps these performers would be flattered by the attention Jennifer Harrison has paid them - and by how much she has derived
              from their art - but the main point of Folly & Grief lies elsewhere, mainly with the complexity and fragility of what we loosely call ‘the
              human condition’."
        - title: Australian Book Review Review
          text:
              "Folly & Grief Melissa Ashley Australian Book Review , No. 285, October 2006 Folly and Grief , Melbourne poet Jennifer Harrison’s third
              collection, reads on one level as a playful inquiry into the centuries-long association of folly with innovative live performance. Lizard
              men abseil down gallery walls; an extreme body artist creates a living sculpture of bees; a ventriloquist’s dummy stirs to life; New Age
              travellers toss firesticks, knives and chainsaws high into the sky. While the danger lurking in such displays is often what retains our
              interest (‘He juggles a chainsaw... even the fine patinating rain / feels like sprayed blood on my face and lips’), Harrison is equally
              concerned with the challenging apprenticeships these unusual skills demand. The road to becoming a master entertainer is explicitly connected
              to the craft of writing: ‘a juggler first conquers clumsiness / then writes the same poem, over and over.’ The sideshow artist’s metamorphosis
              from individual into character is attended with heightened interest: how the statue busker applies her silver greasepaint, or the clown
              his white talc and wig; the transformation of an actor donning a commedia dell’arte mask. Grief, that other term in the collection’s title,
              shears into focus. In the poem ‘Pierrot’, inspired by Edward Hopper’s painting Soir Bleu , Harrison’s world-weary clown has a ‘chemo-smooth
              skull’. ‘[H]unched / around pain, like a hospital’, there is gritty recompense in the fact that ‘nobody notices / you’re an odd-looking
              guy.’ The cancer survivor, like the street entertainer, is expected to don a mask to negotiate the public realm. Folly & Grief is an original,
              if occasionally unsettling, meditation on the intersections of illness, artifice and art. Ultimately, Harrison’s conclusions are ambiguous.
              Yes, she seems to say, we need the distractions of folly; yet we must also face what the magician’s flashing scarves conceal: ‘the possibility
              / that a statue like a poem / plugs a hole in each life / that disguise / is the true form of evil.’ A response in the letters section What’s
              it come to? Dear Editor, I have a complaint concerning the October issue of ABR . Jennifer Harrison is a major Australian poet, and her
              collection Folly & Grief , published by Black Pepper, is a major work, a stunning collection of technically dazzling, superbly poised and
              breathtakingly moving poems. Why was this book relegated to the ‘In Brief’ section in the back pages of ABR , this while a biography of
              Shane Warne received a full page, including a large photograph of Warne and Pamela Anderson? Is this reflective of what literary criticism
              in this country has come to? This situation is all the more disconcerting when one considers the generosity Jennifer Harrison has unstintingly
              shown the poetry and wider literary community over many years. The ‘review’ by Melissa Ashley does nothing to ameliorate the problem. It
              begins with a mistake: Folly & Grief is not Harrison’s third individual collection of poetry, but her fourth (the second sentence of the
              book’s biographical notes reveal this for those unfamiliar with her work); and the review continues with a mere recitation of a fraction
              of the characters, themes and subject matter, padded with quotes. Even worse, Ashley seems to have read this book as if it was an essay:
              ‘Ultimately Harrison’s conclusions are ambiguous.’ Poetry must have conclusions? Poetry can’t be ambiguous? Ashley pays no attention to
              the poetics of a 130-page collection that is dazzling in its command of the line, and in its diversity as a meeting of free verse and formal
              techniques; nor to the Commedia dell’Arte that becomes a deeply researched composite and protean metaphor in Harrison’s expert hands. A
              surface reading of poetry - especially poetry as multi-layered and subtle as this - is no reading at all. I would recommend Folly & Grief
              to anybody who loves poetry as both alchemical craft and as an experience of deep feeling and insight; who knows the difference between
              ‘conclusion’ and poetic resolution; and who is interested in reading the leading poetry being written in this country. Mal McKimmie, St
              Kilda East, Vitoria"
colombine-new-selected-poems:
    title: Colombine, New & Selected Poems
    author: Jennifer Harrison
    short_description:
        A major contribution to Australian poetry which demonstrates Harrison’s evolving career and mastery. Its depth of intellectual
        and emotional registers, in addition to its sustained craft, makes this poetry demanding yet also immensely rewarding and enjoyable. Judges
        comments, Western Australian Premier’s Book Awards
    long_description:
        In her busking cloche velvet dress and army boots her Salem air of ashes she clears a space in Harvard Square to play the
        musical glasses. Reading all of these poems, from first to last, is to marvel at their gorgeous awareness, and language, to feel a subtle
        but palpable transmission between figures of being, as if Michelangelo’s unfinished figures merge with the teenagers in their yearning, merge
        with the anxieties and anguishes of cancer, and of love. They are present in the inner joy and grief of Colombine when she shockingly performs
        a self-imposed penance on her own body and breast, echoing an early poem, in Jenny’s earliest book, about the body and the breast, the unfinished
        and unknowable power of material of the sculpture... and the breast of the poem. There is an uncanny single being emerging from the material.
        It is her poetry’s own kind of love and nurturing, not to impose, but to be. It is brilliantly done throughout. Philip Salom A major contribution
        to Australian poetry which demonstrates Harrison’s evolving career and mastery. Its depth of intellectual and emotional registers, in addition
        to its sustained craft, makes this poetry demanding yet also immensely rewarding and enjoyable. Judges comments, Western Australian Premier’s
        Book Awards
    price: 28.95
    isbn: "9781876044657"
    release_date: "2010"
    page_count: 250
    reviews:
        - title: Geoff Page The Canberra Times review Colombine
          text:
              "Reviews Repeatedly Satisfying Geoff Page The Canberra Times , 29 January 2011 Melbourne poet (and child psychiatrist) Jennifer Harrison
              published her first collection, Michelangelo’s Prisoners , 15 years ago. Since then there have been three more collections and a co-edited
              anthology, Motherlode: Australian Women’s Poetry 1986-2008 . Now we have her selected poems and an opportunity to look back over her work
              as a whole. As with most ‘selecteds’ these days, Colombine starts with a significant batch of recent poems and then proceeds to sample the
              poet’s earlier work chronologically. In this case the new poems are mainly in two long sequences, ‘Fugue’ and ‘Colombine’. One risk of this
              arrangement is that some readers may be disconcerted by the more recent work and prefer the earlier poetry with which they have been more
              familiar. A Sydney reviewer of Colombine has, in fact, already done this and it is possible to see why without necessarily agreeing with
              him. In her first three books, Harrison ranged widely in her concerns and quite a bit in her techniques. There were poems (a whole book,
              in fact) which paid tribute to a favourite childhood holiday destination; there were others which portrayed, very movingly, the poet’s experience
              of breast cancer. Another sequence, ‘Cabramatta’, evoked the poet’s ‘westie’ childhood and adolescence in and around that particular suburb
              of Sydney (a rather different place from inner-city Melbourne, where she now lives and works). Although the imagery Harrison used in those
              poems was energetic and original, it was generally in the service of the poem as a whole and its subject matter. In Folly & Grief (2006),
              Harrison changed her style somewhat. That book made an extensive study of street performers of all kinds: buskers, ‘living statue’ artists,
              jugglers, funambulists, magicians, fire swallowers, circus clowns, various commedia dell’arte figures and so on. Harrison’s technique seemed
              to be become more consciously sophisticated and image-driven, as if to accommodate this new, and relatively arcane, subject matter. In several
              cases, for example in her classic poem, ‘Glass Harmonica’, Harrison achieved a genuine, even unearthly strangeness and a very convincing
              sense of metaphysics. Writing about a woman playing a glass harmonica in a cold Boston autumn, Harrison finished her poem with ‘...but today
              she has no bowls for death. // She plays a wintry madrigal. In the city of white swans / she reaches for the smallest bowl, / and then the
              smaller one.’ Now, in the new part of her ‘selected’, Harrison has gone a step further. In the opening sequence, called ‘Fugue’, the poet
              employs a variety of forms which rely on repetition, most notably the pantoum and variations of it. The cumulative impact of repeated lines
              (or nearly repeated lines) can be considerable but much depends on the quality of the line itself. Not every line a poet writes will, or
              should have to, bear such an emphasis. ‘We visit Rick Amor’s show at the Longwarrrin Gallery’ is probably not such a line whereas ‘Ozymandias
              brooding over beaches and abandoned cars’ (in the same poem, ‘Before the Funeral’) probably is. This section also has a number of stand-alone
              poems, such as the gently affectionate ‘Admiral John’, which offer more familiar pleasures. Although she has been told that ‘Admiral John’,
              an admired figure from her childhood, has ‘died accidentally / shooting blackbirds down the back of Thornleigh Gully’ the poet knows better
              and asks: ‘Do the green years in your eyes / drift, still, like anger-fish? / Reflected in your polished shoes, / do dragonflies glitter
              over deep river pools? / Did the gunshot consume forever / the hot bad scream of the sea?’ In ‘Colombine’, the book’s 26-page title sequence,
              Harrison takes one of the figures who first appeared in Folly & Grief and writes what amounts to a long, eponymous dramatic monologue (in
              12-line poems of three quatrains each) which contrives somehow to be both mythical and, at least partly, autobiographical. Again repetition
              is used but this time more as connective tissue than as a rhetorical device. Earlier, in Folly & Grief , Harrison had a clown declare: ‘I
              have metaphor, and behind metaphor more costume’. In ‘Colombine’ we have plenty of both—and, admittedly, the risk of the decorative. On
              the other hand, the sequence does contain a considerable number of highly memorable poems, one of the most striking of which is number XVIII,
              ‘...the rim copper-bound’. It begins with ‘I’ve not forgotten how the child slid from my body’ and ends with ‘...I swim like an imperfect
              fish in her greater shadow’. In between we are given a vivid and often metaphoric account of the character’s (and presumably the author’s)
              experience of breastfeeding in lines such as ‘I’ve not forgotten the shit and vomit, the difficult milk...’ or the more imagistic ‘her body,
              pale as a morning moon against mine / and, in her breath, the imagined scattered noises of the sea’. For some, the ‘Colombine’ sequence
              may be an ‘imperfect fish’ but there’s a large amount of deeply satisfying poetry to be had there. The same can be said for Harrison’s selected
              poems as a whole. It’s no surprise that she has already become an influential figure for a highly talented younger generation of Australian
              women poets, many of them also from Melbourne."
        - title: Martin Duwell Australian Book Review Colombine
          text:
              "Poet of Pairs Martin Duwell Australian Book Review , February 2011, No. 328 Colombine selects from Jennifer Harrison’s four previous
              collections and adds a book-length group of new poems. In keeping with current practice, the new poems precede the selections, so that anyone
              wanting to consider Harrison’s twenty-year poetic career in terms of development has to begin some seventy pages in with the poems from
              her first book, Michelangelo’s Prisoners (1995). You met a lot of her distinctive interests in that book, and it still stands up well. She
              looks at what we would call embodiment from a distinctly scientific perspective, invoking the position of Humberto Maturana to write poems
              in which the sea, a major and polyvalent symbol in her work, can stand for the medium in which our embodiment occurs: ‘If each observation
              is a system / each thought an adaptation, then we drift / upon a spacious sea.’ Cabramatta/Cudmirrah (1996), her second book, is a kind
              of double journey into memory, focusing on grandparents. The opening section is a tribute to the western suburbs of Sydney, written slightly
              in the tough talk of that area; the second section is about her childhood holidays on the south coast of New South Wales. However, the issue
              of memory is not quite as simple as it usually is in poems where childhood sites are revisited. Her grandmother, we learn (less equivocally
              in the book than in the selection made in Colombine ) is an Alzheimer’s disease victim, and the later poems are partly imagined to be conversations
              between grandmother and granddaughter, trying to prevent the past disappearing. Memory, the grandmother is imagined to say, ‘digs less for
              an accurate world / than for the fetch of the wave / and the tide which calls my name / most faintly inwards’. Though Harrison’s next book,
              Dear B (1999), has rather the quality of a time-marking third book (and is selected from sparingly in Colombine ), her fourth book, Folly
              & Grief (2006), contains her best work so far and deserves to be celebrated as one of the books of the decade. The overriding symbol is
              of performance, and the poems show an intense interest in commedia dell’arte figures such as Colombine and Harlequin, in buskers, ventriloquists,
              and sideshows. Often the result of building a collection around a constellation of images like this is a certain attenuated quality, but
              Folly & Grief is marked by an extraordinary richness of invention and poetic performance. The new poems are divided (like all of Harrison’s
              books, except for Dear B ) into two sections. The first contains many poems of travel, which again are far more ambitious and accomplished
              than the fairly tame poetic genre in which they have their origins: ‘In landscapes I think myself improvisatory,’ she says, gnomically,
              in ‘Uluru’. And the second section is a kind of biography of Colombine or, at least, the biography of someone who might be one of her incarnations:
              ‘An actress, I study the faces of birds and believe in science.’ Good as these new poems are - ‘Swann’s Way’ is a brilliant poem about love
              and life in the past contrasted to the present - it is hard not to think of them as being a kind of afterglow of Folly & Grief . Colombine
              shows that its author is a copious, varied, sophisticated, and complex poet. When you first read Harrison’s early work, you are likely to
              be taken by the continuous presence of the sea and, in her later work, by the continuous presence of performance. As will be seen from the
              brief descriptions of the books which I have given, I think she is better seen as a poet of journeys, memories, and masks. She is also a
              poet of pairs, sometimes the pairing of face and mirror-image, or of face and mask. If one wanted to provide an example of a moment when
              her poetry is at its most distinctively personal, it might be a small passage in the first part of Cabramatta/Cudmirrah , in which she speaks
              of the outskirts of Sydney which have, over the years since her own childhood, grown up around the highway as ‘dicotyledon suburbs / flowering
              into tidiness’. It is not only that the metaphor betrays her background in the sciences (this passage is considerably simplified from its
              initial appearance in Cabramatta/Cudmirrah , and one of the ways of looking at Harrison’s development would be to note the gradual disappearance
              of the technical vocabulary that is common in Michelangelo’s Prisoners ), but you feel that the mirror-image of the doubling of the suburbs
              is what provokes the poetic response here. The interest in mirrors (as an example of pairing) produces two of the best poems in Folly &
              Grief . ‘Baldanders’ (the title, German for ‘soon something else’, derives from Borges) is a complex, three-part poem made up of encounters
              with a kind of mirror-man; ‘The Fauna of Mirrors’ uses the idea of an eighteenth-century French priest’s catalogue of the beings that inhabit
              mirrors as the basis for what is, essentially, a personal poem. Poet of memory or poet of pairs, Harrison is a challenging and significant
              poet, the quality of whose work needs defining and celebrating. A handsome, mid-career, selection of poems like Colombine might just get
              that process started."
anywhy:
    title: Anywhy
    author: Jennifer Harrison
    short_description:
        "Anywhy considers the world: its ecology, history, fragilities and resilience. Jennifer Harrison’s poems invite the imagination
        to consider the inner life of birds, the emotive pull of hardware, Emma Hamilton, and a reverie at Blackwood Village."
    long_description:
        "If birds could fly free from ornithological books and from watercolour illustrations if they could fly free from taxidermy
        agitated aviaries and roseate oil paintings they’d leave us more earth-bound than ever before but we might find a way to rise with them transmogrified
        and see for ourselves their world of ultraviolet night Like the great grey owl, we might hear the scratchings of a mouse running under deep
        snow Jennifer Harrison’s Anywhy is exceptional. The depth and lightly carried learning of the author, as we embrace each poem, is startling.
        We are philosophically shaken. Her title Anywhy may suggest the cool shrug of ‘whatever’ but Harrison’s neologism is a steady-eyed consideration
        of the world: its ecology, its history, its fragilities and resilience. Her insight is subtle but never vague, inviting our imagination to
        consider the inner life of birds, the emotive pull of hardware, Emma Hamilton, a reverie at Blackwood Village (from which the title emerges),
        DNA or Absolute Zero. Above all, it scintillates with human sorrow and human response. Harrison is a challenging and significant poet, the
        quality of whose work needs defining and celebrating. Martin Duwell With its subtle but inventive lyrical strategies and masks, poetry like
        Jennifer Harrison’s addresses poetry—which means it addresses us, quietly, as readers who enter its space as observers and who are active,
        and who feel its presence within us, not in our faces. Philip Salom"
    price: 24.0
    isbn: "9781876044190"
    release_date: "2018"
    page_count: 96
    reviews:
        - title: Australian Book Review
          text:
              "At the height of her powers David McCooey reviews Anywhy by Jennifer Harrison Australian Book Review , November 2018, no. 406 Jennifer
              Harrison’s new collection, Anywhy , is concerned with the dynamic between light and dark, self and other. Harrison has a deep concern for
              non-human animals. ‘The Animals’, about the burning of the Warsaw Zoo during World War II, is a particularly harrowing example of this concern.
              Harrison illustrates a post-Romantic interest in the natural world, but here there is a more explicit acknowledgment of the Anthropocene
              that we have brought into being. Harrison, who is also a psychologist, habitually incorporates putatively non-poetic registers – especially
              scientific discourse – in her poetry. She is notably wide-ranging in her interests. Poems in Anywhy cover ancient history and archeology,
              war, photography, suburbia, birdlife, and so on. A number of poems are ekphrastic in nature, which is to say they respond to other works
              of art, such as a famous photograph by Walker Evans. This is not to say that Harrison’s poetry is merely random in its concerns. It has
              a number of unifying features. The neologistic title of Anywhy illustrates Harrison’s love of linguistic play. There are, for instance,
              two ‘Air Variations’ that employ words with particular initial letters (C and D, and L and M, respectively) to produce a rich musicality,
              even as they cast a characteristically cool eye over the world. In ‘DNA’, various versions of that famous abbreviation illustrate Harrison’s
              serio-comic inventiveness: ‘Developmental Needs Analysis / Digital Network Architecture / Do Not Abbreviate’. As these poems illustrate,
              Harrison can allow the comic and the elegiac to occupy the same poetic space. In the apparently self-elegiac poem ‘The Exchange, Blackwood
              Village’, the poet meditates on life after cancer: ‘Death found my measure in its pill of greed / and I carry the taste inside like a baby,
              never to birth.’ Ultimately, with its emphasis on different types of media and discourses, Harrison seems to be concerned with representation
              itself, and with representation as something that takes in both sympathy and violence. When she quotes the Hungarian war photographer Robert
              Capa – ‘if the photograph is not good enough / you aren’t close enough’ – one gets the sense that she is offering a description of her own
              poetics. Harrison is a poet of close-up photography, anatomy, and intensity, and this latest collection shows her to be at the height of
              her powers. David McCooey is a prize-winning poet and critic."
        - title: Weekend Australian
          text:
              'Inspiring range of ingenuity Geoff Page reviews Anywhy by Jennifer Harrison Weekend Australian , August 11-12, 2018 Jennifer Harrison,
              also from Melbourne, is a poet of comparable stature to Jordie Albiston. Since Michelangelo''s Prisoners (1996), Harrison''s collections
              have been wide-ranging in concerns and formal resources. Her new book, Anywhy (Black Pepper, 78pp, $24), may well be her best so far. At
              times hermetic, at others confessional, Anywhy leaves the attentive reader plenty of space to move in, enjoying the verbal music for its
              own sake, while also at other times making important, even insistent, points about human nature and the natural world with a memorable directness.
              A fine example of the former is Seeker after Smooth Things, which is short enough to quote in full. “It’s quiet now — that time of night
              / when children sleep / and you have stolen from their dreams / this small arc of solitude... // The night untitled, untidy / a seeker after
              smooth things: / a crumb brushed, a fragment thought / an echo of silence / more silent than silence.” The ending is almost a Zen koan and
              nicely wraps up what is, in one sense, an exercise in alliteration and assonance. Many questions remain and yet we are not frustrated. What
              does an “arc of solitude” look like? Has there ever been a night that was “titled”? Is “thought” a verb or a noun here? What exactly is
              inside those “smooth things” sought out by the personified “night”? Emma Hamilton: a Postcard is a very different sort of poem. Hamilton,
              Lord Nelson’s Mistress, is at once “a tourist / sitting on a hotel balcony overlooking the Port of Naples" in the1790s and an observer of
              the nuclear-powered aircraft carrier USS Dwight Eisenhower in that same bay a couple of centuries on. After a deft comparison between Vesuvius
              and a nuclear holocaust, Harrison finishes with an unforgettable couplet: “Emma remembers those she loved and for what reason... / Horatio
              Nelson remembers those he killed, and why” Point made. A group of similarly powerful poems includes Cuttlefish, The Inner Life of Birds,
              Possum and Gnidarian. Though each is very different, all four are conservationist in intent and remind us what can (or will) be lost through
              our disregard of creatures that escape our notice or concern. In each case, Harrison employs extensive personification, which would normally
              risk sentimentality. She begins Cuttlefish by talking about the animal “squint(ing) an inky cloud, the prudish veil / of a storybook widow
              we might read /about in Dickens”. By the end, however, we readers are more than aware that we too are likely to share the fate of this strangely
              beautiful creature “hoovering shrimp with her parrot beak, jaws // and raspy tongue”, who “chas(es) down divers for company //... as if
              we too live only a few years / out there beyond the day’s dazzle in moody / crevices in the middle of False Bay". Geoff Page is a poet and
              critic.'
the-genius-of-human-imperfection:
    title: The Genius of Human Imperfection
    author: Jack Hibberd
    short_description:
        "a scabrous sequence which imagines from moral Melbourne a Sydney bequeathed by Cavafy. I recommend all into whose hands
        these poems pass to read The Genius of Human Imperfection with care. As Peter Porter writes: ‘ A distinctly original and enjoyable collection
        of poems - his poetic is to do with rhythm, sharpedged language, proverbial utterance, oracle. His humour is wry and sensual... the raunchy
        side of this collection gets broader as it progresses. ’"
    long_description:
        "Jack Hibberd has produced a distinctly original and enjoyable collection of poems, superbly crafted and marked by the author
        ’ s wit and linguistic flair - his poetic is to do with rhythm, shap-edged language, proverbial utterance, oracle. His humour is wry and sensual,
        a form of the intellect in its wooing shape. The raunchy side of this collection gets broader as it progresses, especially in ‘ Camperdown
        Dichotomies ’, a scabrous sequence which imagines from moral Melbourne a Sydney bequeathed by Cavafy. I recommend all into whose hands these
        poems pass to read The Genius of Human Imperfection with care. As Peter Porter writes: ‘ A distinctly original and enjoyable collection of
        poems - his poetic is to do with rhythm, sharpedged language, proverbial utterance, oracle. His humour is wry and sensual... the raunchy side
        of this collection gets broader as it progresses. ’ These poems give pleasure, and there can never be too much skill at large in the world....
        Peter Porter Hibberd’s language is a source of delight... resembling nobody else and, possibly, nothing else.... Chris Wallace-Crabbe"
    price: 21.95
    isbn: "1876044268"
    release_date: "1998"
    page_count: 82
    reviews:
        - title: Cordite Review
          text:
              Reviews Poetry - The Genius of Human Imperfection Bev Braune Cordite , No. 6-7, 2000 In the sense that one of the aims of poetry is
              to stimulate our curiosity about the world behind and before us, understanding something of the background of ideas as a theme to a collection
              is often very useful if it unifies readers to the poet’s voice. In this respect, Jack Hibberd signals in The Genius of Human Imperfection
              that nineteenth-century French poet Charles Baudelaire and early twentieth-century Austrian composer Arnold Schoenberg are significant to
              his collec­tion. In some instances the controlled style and strange mix­ture of violence, eroticism and the voyeuristic seem burdensome
              - la Baudelaire’s Les Fleurs du mal ( The Flowers of Evil , 1857) perhaps. While his subjects often seem either as monuments or as part-documentaries
              on political disasters, most of the poems here are fairly well crafted. But the territory in which Hibberd seems most comfortable is that
              of apparent harmony set against contra­dictions and the disharmony of experience set against expectation. His focus on the movement of rhyme
              may perhaps be a conscious effort to emulate Schoenberg’s serial repetition of tones as a means to achieve this counterpoint. You wake in
              the middle of the night and walk into the garden and there is a full moon, wafer, medallion, gong. Though men explore its surface, probe
              for minerals, estimate radiation, it is we, the unsleeping, here, who know what it is worth. It is where all the dead go, and live. It is
              their essence, not so much the milk of human kindness more cold concentrated laughter. ‘Presage’ In the cases of Hibberd and Rose [Peter
              Rose, Donatello in Wangaratta ] the extent of our under­standing of their collections seems filled out first by a knowledge of and sympathy
              with the artistic considerations that form the background to the works. Our satisfaction, however, appears to rely on how each poet keeps
              us intrigued by the art of their ‘sugary alliance[s]’.
        - title: Sidewalk Review
          text:
              "The Genius of Human Imperfection Martin R. Johnson Sidewalk , No. 2, 1999 As an opener to his book, Jack Hibberd’s gone for a line
              from that odd comic genius, Samuel Beckett. ‘Death has not been given a fair crack of the whip.’ Already a smile, like an appreciative nod,
              or a As an opener to his book, Jack Hibberd’s gone for a line from that odd comic genius, Samuel Beckett. ‘Death has not been given a fair
              crack of the whip.’ Already a smile, like an appreciative nod, or a ‘I dips me lid to yer’ forms on my mouth. I am immediately rewarded
              for my thinking with ‘For The Good Old Days’, opposite. A sonnet with engaging rhythms, clear images, and a philosophy commensurate with
              Beckett’s pessimistic grimace - as in wry humour - at life. Begins: ‘In the good old days we swung from trees,’ then further on, ‘In the
              good old days we ran on all fours,’ and further on, ‘In the good old days we had no knives, clubs,’ and concludes, ‘Things changed incredibly
              when we walked tall, / reached for the stars, began our long slow fall.’. I always believe first poems should not only set the scene for
              what is to follow, but arm the reader with a sense of anticipation. That the further in to the book the reader goes, the more embroiled
              in the poet’s philosophies the reader becomes. Is exposed to and receptive of new perceptions, and has their own beliefs reinforced. Turn
              the page. ‘I writhe like a snake, imagining treachery’ (‘Eve’). Good poems follow, witty, insightful, but lose some of their power with
              slight lines, and annoyingly silly rhymes. ‘I blame universities, / the anvils of ideas, / Kant, Marx, Spengler, Leavis, / where, enraptured,
              I bashed ears’ (‘Bores III’). There is also such a heavy saturation of nouns that some poems are blockaded into becoming lists! Some lines,
              though, rewarding. A woman dancing, ‘an hourglass on high heels’ (‘Naga-uta I’). Nine Poems Following Baudelaire - for Dinny O’Hearn & Chris
              Wallace-Crabbe, follow. I can just see Charles, those haunted upstairs eyes absorbing the sights, sounds and smells of derelict humanity
              from his Parisian slum window. These poems are more steady in pace than the previous, and succeed. From ‘...Épigraphe pour un livre condamné’
              to ‘Tristesses de la Lune’, Hibberd captures the essences of Baudelaire’s irritability with life. ‘His bed, swarming with lilies, smells
              like a grave,’ (‘Spleen’), and the solace he sought from the women he loved: ‘a pious playwright and resolute insomniac / cups the pale
              liquid (woman’s tear) in his hollow palm, / where it coruscates, now opal and charm, / then buries it inside his heart’s sunless sac’, is
              the concluding poem, for Irene Stevens. The sex poems, From ‘Kitty’ to ‘Nocturne’, bother me, not because of their content, ‘When I go on
              a bender / I change my gender, / anus to vagina, / tea in fine bone china’ (‘Camperdown Dichotomies IV’), but because, do they really matter?
              Again, the silly sing-song rhyme. Political poems, ‘The Body Politic’. Here Hibberd drags out those tired old names, Nixon, Menzies, Churchill,
              Franco, Stalin, Hitler, etcetera, etcetera: Boring stuff this, and brings a wince to read. Perhaps Howard’s too close to the bone? One can
              only shake their head in dismay at this sad attempt at humour. ‘It is harder / for a famined man, / or a woman, / to enter Hades / than
              it is for a potato / to pass through life / as a pomegranate’ (‘Rabbi O’Connell’)."
        - title: Antipodes Review
          text:
              "Poets struggle with experience Julian Croft Antipodes, Vol. 13, No. 2. 1999 Decorating the cover of Jack Hibberd’s first collection
              of poetry (Hibberd is better known as a prolific playwright and occasional novelist) is a George Grosz drawing of one of his embodiments
              of Weimar decadence. And broken across the cover of Jordie Albiston ’s volume [ The Hanging of Jean Lee ] is a collage of a photograph of
              murderer Jean Lee being taken to court in 1950. The unitary view of the satirist sure of the evils that surround him contrasted with the
              fragmentary identities that make the individual in the late twentieth century are neatly contrasted. The two views come from poets separated
              by thirty years and very different world-views. Hibberd writes with the weight of the past and from the Olympian heights of certainty. Albiston
              writes from the inside of a consciousness that does not understand what is going on, but tries to define where she is by her relationships
              with her family, her lovers, and her daughter. There is nothing new about the multi-vocality of the poet’s speaking position: Shakespeare
              did it in the sonnets (perhaps he could not escape his everyday chameleon exercises in writing for the theater), and poets have often fragmented
              their sensibilities in order to move in space and time. What is different, though, in these two poets is how one strives for the certainty
              of the Enlightenment in his analysis of the human condition, and the other constructs meaning from the bricollage of consciousness - thought
              and feeling, and empirical textual markers - newspapers, diaries, oral traditions. If that sounds like I am criticizing Hibberd for being
              old-fashioned, that is not my intention. Hibberd comes from my generation. I understand why he writes the way he does with apocalyptic overtones,
              Dryden’s energy, and Swift’s disgust, the Gothic rumblings of Dylan Thomas’s rhetoric, and the free-wheeling, hieratic vernacular of the
              Beats, even if for many of us it was a façade that produced little: Duffel coats, desert boots, the Grove Press, speed, shades; most were
              dead-set squares, poops, no Kerouacs, John Braines... Fierce all night, they groaned and woke two-thirds through the day, their condition
              palaeozoic, prone scarecrows, half rag, half hay. ‘Salad Days’ I also understand why he casts such a liverish eye on the fall-out from what
              should have been, according to the theories of the 1950s, the great sexual liberation of the 1960s. His Hogarthian view of Sydney’s gay
              revolution is classical satire, not polymorphously perverse irony: Sad as a Fellini clown, feathers galore, layered red lipsticks and bruise-blue
              eyes, she/he trudged down Oxford Street, the last in the parade, a seronegative straggler who would never catch up, not too old, more superseded,
              a certain lack of rhythm, in need of fresh spark plugs, upholstery, a body-lift, new exhaust, pong-box, not really rejected by the fold,
              but as she blundered along one could tell: fucked up and fucked out. ‘Camperdown Dichotomies, V’ And that, I imagine, is why Hibberd has
              called this collection The Genius of Human Imperfection : that the stragglers have to be celebrated, and the impossible ideals against which
              we are measured are what merit the satire, not the individual. As Swift said, it was the vice he castigated, not the person. There is a
              generosity of imagination and spirit in these poems. Hibberd has the same gift of the gab as his famous dramatic creation, Monk O’Neill,
              in A Stretch of the Imagination , and the same wry compassion as that other doctor/dramatist, Chekhov. And it is a relief to come across
              poetry that stands its ground with a single voice and challenges what Dryden called his ‘lubric and adult’rous Age.’"
        - title: The Weekend Australian Review
          text:
              "Cities of body and mind Barry Hill The Weekend Australian , 28 /8/1999 There is a pile of slim volumes growing on my desk and I have
              to choose. Among the better ones, three arrange themselves under the heading ‘City’ - the city as body, mind and perhaps soul. By contrast
              [to Alex Skovron, Infinite City ], Jack Hibberd’s snarling city The Genius of Human Imperfection is as carnal as they come. From her lush
              elastic hair a living sachet of herbs and myrrh rose a savage untamed scent... are lines from ‘Le Parfum’ - a take on Hibberd’s beloved
              Baudelaire. Although Black Pepper says this is Hibberd’s first poetry collection, he did some gritty translations of Baudelaire many years
              ago, when he was most famous as a playwright. There are more poems after Baudelaire here, but they are an affectation: out of what genuine,
              metaphysical heresies should an ageing Carlton larrikin (let alone a suburban GP) feel the need to goose the Pope? Hibberd’s talent, really,
              is for Jacobean revenge and spleen about the body. ‘Death has not been given a fair crack of the whip’ is his epigraph, from Samuel Beckett,
              and poem after poem indulges a morbid disgust with human motives, and an ennui about the inevitable end of things. Hibberd’s linguistic
              zest, which is skilful and considerable, is at its best with political caricatures (‘Kennedy lived with Gatsby in his head’) and his clever
              takes on various poetic forms. His book is well worth reading for its malevolence and the surprising love poem at the end. Artistically,
              the last poem almost gives the game away by suggesting an angel lurking in Hibberd’s venomous persona."
        - title: The Sydney Morning Herald Review
          text:
              "Let’s Not Be Averse to a Verse Alan Wearne The Sydney Morning Herald , 17/7/1999 The medico, bon vivant, novelist, above all playwright,
              Jack Hibberd has been Melbourne’s irritant-conscience for more than three decades. He also writes sardonic, democratic, unpredictable verse.
              And if it is ‘verse’ (that stuff people enjoy) rather than ‘poetry’ (that artefact so many war about with ludicrous fury), well, better
              good verse than bad poetry. And more power to verse: for verse allows you to write on what you damn well like, how you bloody well please.
              Which Hibberd does. Together with his versions of Baudelaire (the volume’s highlight) he has produced (for mere starters) meditations on
              death and on his children, a portrait of the late Frank Knopfelmacher’s detestation of Wilfred Burchett, gadfly squibs on certain ‘great’
              20th century statesmen, satires on Sydney as drag mecca (easy) and the United States as freak show (easier) and an evocation of Schoenberg’s
              Transfigured Night . Surely not since the late Jas H. Duke has an Australian collection contained such a show-bag variety."
        - title: The Age Review
          text:
              "Characters of life Gig Ryan The Age, 17 April 1999 Jack Hibberd is best known for his plays, particularly the seminal A Stretch of
              the Imagination , and suitably displays in his poems a love of craft and theatrics. There are sapphics and tankas and other uncommon verse
              forms, each with its own personality. His poetry is characterised by verve and abundance in vocabulary and verse form (‘The heart is an
              old frigate, / tough as nails, / flexible, obdurate, / with bloody scalps for fails’) as well as imagination (‘the Messiah sports a video
              of his soul’). Hibberd has published many poems over the years but, apart from his 1977 translations of Baudelaire, this is his first collection.
              Baudelaire remains a continuing interest, but knowledge of the original helps with these poems. Hibberd triumphs in comedy and satire as
              in ‘Have a Nice Day’: Have a perfectly rotten day, Septic, may all your gold teeth fall out, your hair moult, including the eyebrows...
              may the dispossessed of the USA ... simmer you in a chowder, while singing, however discordantly, God Bless America. Or, in ‘Mussolini’,
              which ends: ‘II Duce / ,at that time expressed to a nicety / deeply held European ideas.’ or ‘Stuffings’: ‘God, why haven’t you forsaken
              us?’ ‘Day of Wrath’ imagines the death of a 1980s high-flyer: Dies irae, dies illa. Discarded wives cheer from Heaven, a Tax Commissioner
              sneers. The deceased’s mates, MPs to a man, congregate on Earth, mawkish and quotable at the wake. Hibberd’s poetry is filled with characters,
              the transvestite of ‘Camperdown Dichotomies’, the political figures in ‘The Body Politic’ or the dreaded ‘Bores’ - ‘a kind of polio of the
              soul sets in’."
        - title: Australian Book Review Review
          text:
              "Threnodies - The Genius of Human Imperfection Peter Steele Australian Book Review, No. 209, 1999. The epigraph to The Genius of Human
              Imperfection is Samuel Beckett’s ‘Death has not been given a fair crack of the whip’ and there you have it - Hibberd’s own blend of conjecture,
              public idiom, irony and dark joking. As he has been for a number of other modern poets, Beckett’s shade broods over Hibberd’s book, accompanied
              by that other bleak but copious jester, Swift. Nobody writes plays just like Hibberd’s, or novels come to that, and his poetic voice is
              just as distinctive. Asked for a single word for what he is doing here, I should say that he is writing threnodies. That seems appropriate
              to the formality which he finds congenial, the grief at loss which pervades many of the poems, and the spanning of both public and private
              experience. Renoir said that he had been forty years discovering that the queen of colours is black. Hibberd did not take so long, and he
              continues to make the most of the realisation. Here, for instance, is ‘Death of a Father’: He didn’t know what had struck him, poleaxed
              on my bed; Moira my mother calling out Jim half of his heart half dead. Then he knew what had struck home; I’ve done it this time he said,
              sorry, his last words an apologizing groan, half of his heart not dead. ‘Poleaxed’ is unflinching, with its connotations of a doomed animal:
              ‘my bed’ and ‘struck home’ confront each other disconcertingly: and the ways and fates of the heart in its various readings colour the whole
              occasion. Hibberd has a professional’s skill, an amateur’s openness. The fifty-three poems in the book are informed by a range of learning,
              but are not dictated by it. As is natural in so expansive a dramatist, Hibberd is dexterous in hearing voices. Sometimes, as in ‘Nine Poems
              Following Baudelaire’, these are those of earlier writers, inflected in original ways; sometimes they belong to - often charmless - public
              figures, especially politicians. ‘The Body Politic’ - the title once again turning in several directions - offers us for inspection such
              worthies as Nixon, Menzies, Franco, Machiavelli. Here, as frequently in the book, a gesture or a posture is seized upon, to give us an agent
              who turns out to be an actor. Thus, of Mrs Thatcher, A daughter of Imperial Rome, neither plebeian nor patrician, able to thrust and shear
              to the bone, a Boadicea turned female centurion who was curiously desperate to rule the waves with England reduced to pit-managers and slaves.
              It is a play in little, where identity is first made up and then melted. That touching-in of the gladius, ‘able to thrust and shear to the
              bone’, is Hibberd all over, as is the bitter diminuendo of the conclusion. To write like this was Swift’s game, a game which is brought
              to mind by Hibberd’s fascination with the making of ‘Characters’, those (usually hostile) distillations of essential personal features.
              Sometimes it is the obdurate perversity of the inspected individual which holds attention, sometimes his or her instability. Language, in
              its own quirky modes, can be invoked for satirical or sardonic purposes, as when one poem is called ‘Prelude to an Afternoon with a Prawn’,
              and another, ‘On Hearing the First Cuckold of Spring’. Hibberd demonstrated long ago that, for him, language is less an instrument than
              an element, and his poems are among other things ways of letting the language be elemental. Demotic copiousness, melancholy or erotic lyricism,
              stoic dignity - each issues in its own idiolect, and they sometimes combine, as in the brief, ‘With a song in my heart / unrendered / I
              will croak.’ Death is after all getting a fair crack of the whip here, but only a fair one. Visited by many indignities of body and spirit,
              these poems nonetheless often read like quests for dignity. Auden claimed that ‘Even a limerick / ought to be something a man of / honor,
              awaiting death from cancer or a firing squad / could read with contempt’ and that is the air of most of these poems. Here is one of the
              ‘Sonatinas’: (iv) For whom the bell tolls increases day by day, so much so soon the whole world will reverberate with billions of carillons.
              Doctors, more than many, live wittingly along the trajectory of mortality, but the whole process can still be laced with surprise. One of
              Hibberd’s gifts as a poet is to convince the reader that that other mortal, mutable creature, the linguistic imagination, has its incessant
              surprises too."
madrigals-for-a-misanthrope:
    title: Madrigals for a Misanthrope
    author: Jack Hibberd
    short_description: by Eve and Adam but haunted by the depravity of the Third Reich, Madrigals for a Misanthrope
    long_description:
        The Führer wore layered cotton waste around his dapper genitals when exhorting hordes of supplicants at those Walpurgisnacht
        spectacles. Bookended by Eve and Adam but haunted by the depravity of the Third Reich, Madrigals for a Misanthrope questions our place on
        the planet. Author of one of Australia’s most famous plays, Dimboola , Jack Hibberd is Swiftean, savage and funny. His satire flays human
        pretensions. The poet’s affinity with Baudelaire is given in a suite of adaptations. His laments on the deaths of lost friends form a group
        of mellower character portraits. Jack Hibberd has been Melbourne’s irritant-conscience for more than three decades. He writes sardonic, democratic,
        unpredictable verse. Alan Wearne, Sydney Morning Herald Hibberd’s talent, really, is for Jacobean revenge and spleen about the body... Poem
        after poem indulges a morbid disgust with human motives, an an ennui about the inevitable end of things. His linguistic zest, which is skillful
        and considerable, is at its best with political caricatures and his his clever takes on various poetic forms. Barry Hill, The Australian His
        poetry is characterised by verve and abundance in vocabulary and verse form. Gig Ryan, The Age Hibberd has a professional’s skill, an amateur’s
        openness... I should say that he is writing trenodies. That seems appropriate to the formality which he finds congenial, the grief at loss
        which pervades many of the poems, and the spanning of both public and private experience. Peter Steele Australian Book Review
    price: 24.95
    isbn: "1876044462"
    release_date: "2004"
    page_count: 104
    reviews:
        - title: Island
          text:
              "Reviews Poetry Survey : Jack Hibberd - Madrigals For A Misanthrope Oliver Dennis Island, No. 101, Winter 2005 For someone who has long
              held a reputation as an irreverent dramatist, Jack Hibberd can write surprisingly formal poetry. A number of these poems are sonnets, ranging
              from elegies and ancestral portraits to a set of translations from Baudelaire. Acerbic and despairing, Hibberd’s work often responds to
              life’s cruelties (as one poem has it: ‘I comprehend / that life itself is punishment’); it also expresses disgust at our endless capacity
              for selfishness and violence, and specifically targets famous Nazi figures: ‘A model for tasteful totalitarians, / beyond causes, ideology,
              race, caste, / the über-Hitler to some historians, / a stylist, he made Stalin seem gross, daft’ (‘Reinhard Heydrich’). In contrast, Hibberd
              elsewhere writes a good deal about sex and the consoling influence of love: ‘Often our branches / caress, rub, touch; / not quite as often
              / they thrash’ (‘Siamese Love’). Excluding a fine version of ‘Le Chat’, which speaks magnificently of Jeanne Duval’s ‘coffee limbs and curls’,
              his metrical writing tends to appear somewhat strained. In fact, one of the most likeable poems in this collection is pure doggerel. ‘Poem
              No. 2 for Bill’, about ‘a piebald hound’ that dies of heat exhaustion, shows him in complete control of his medium, employing language he
              is perhaps used to reserving for the stage."
chiaroscuro:
    title: Chiaroscuro
    author: Sandy Jeffs
    short_description:
        Celebrity and the economic market are equally dismantled in poems that examine the absurdity and cravenness of their power.
        She feels how we are compromised by our own selfishness when we make a Sophie’s choice to buy a book of Rilke’s poems rather than a copy of
        Big Issue from a homeless vendor. She breaks out from her own darkness and light, her personal chiaroscuro, to reveal a poet with a keen sense
        of observation and a soft sensitivity. It allows her to bring a bristling anger to bear on social injustice. Chiaroscuro
    long_description:
        "I can recommend my therapist. J. Alfred, go and see her and get back to me when you’ve pulled yourself together. You’ll find
        me with my girl friends in a room walking to-and-fro talking of Michelangelo. The world is a place full of dark and light as is that of Sandy
        Jeffs. She explores this tension with a clarity that is troubled by shadows. Humour and sadness intermingle in a show that must go on. Popular
        culture and parodies of classic poems are used to illuminate the world for what it is. St Jerome in his study prepares a reader’s report on
        the Bible. Clancy is contacted at theoverflow. com.au. Celebrity and the economic market are equally dismantled in poems that examine the
        absurdity and cravenness of their power. She feels how we are compromised by our own selfishness when we make a Sophie’s choice to buy a book
        of Rilke’s poems rather than a copy of Big Issue from a homeless vendor. She breaks out from her own darkness and light, her personal chiaroscuro,
        to reveal a poet with a keen sense of observation and a soft sensitivity. It allows her to bring a bristling anger to bear on social injustice.
        Chiaroscuro shows her to be homeward bound to sacred ground. Jeffs’ poetry gives the frustrated and often unheard pleas for understanding
        from the mentally ill a new, clearer and poignantly beautiful voice. Samantha Ryan, Entopy Cover design: Gail Hannah Cover painting: My Mad
        Friend, Veronica Holland"
    price: 23.0
    isbn: "9781876044817"
    release_date: "2015"
    page_count: 90
    reviews:
        - title: The Australian
          text:
              "Chiaroscuro Michael Farrell, The Australian 6 February 2016 It’s not likely that all the poems in a book will appeal to any reader:
              books that try to please all may end up pleasing none. One poem can make a book worthwhile. In Sandy Jeffs’s The Mad Poet’s Tea Party (Spinifex,
              84pp, $19.95), it is Therapy: Prices Update , a simple list poem where a “Hello” once cost $10 and now costs $30; “What seems to be the
              problem?” was once a $40 question and is now $140; while “Get in touch with your inner child” was once relatively cheap advice at $100,
              but is now $360. A potentially great list poem gone begging is that of the reviews of The Sanity App (we only get two). For the small audience
              poetry books attract, it is a wonder most publishers aim at a general one. Why not poetry books for people with mental illness, or Chinese
              students, or lawyers? There must be thousands of each at least. Jeffs’s book, for example, might be appreciated by those who suffer from
              mental illness but who are not readers of poetry in general. The subject is clearly a highly generative one for Jeffs and the poems produce
              the occasional “mad” good line: “I thought I was a sunrise / then discovered I was a sunset” and, better, “The loose roos are raising my
              roof / it’s their party time / they’re hanging me out to dry / but I’m hanging tough even though / I’m on a slippery slope to nowhere /
              Because I keep missing the bus”, from the title poem. This poem stands out for its undoing of cliches about madness, and about life: “the
              world has been taken out of my oyster”. This would seem a bit too wrenching as a poem ending, but occurring within this poem’s cascade of
              imagery, it is a catching piece of pathos. The poem asks a question — recalling the flies of Catch 22 — pertinent to many poets: “is my
              mind’s eye too vivid or too clouded / are there too many butterflies in it”. The observations and jokes are often obvious and sometimes
              strained, but there’s an admirable persistence and lightness here nevertheless. All poetry that deals with the everyday risks being too
              ordinary or not ordinary enough: Jeffs’s ordinary, as presented, can often be extreme, as in McMadness : “Have you spent all your savings
              / and bought three new Ferraris and a Rolls lately / and slept with every Tom, Dick and Jane?” Jeffs signals her reading — or constructs
              a sympathetic network — with epigraphs from local and famous writers that largely just seem a thematic gesture: her quote from Tennessee
              Williams on the “kindness of strangers” is an “ouch” moment, however: the poem is about being taken to a psych ward. There is also the wryness
              attached to knowing who is the present Prime Minister. Jeffs has published two books recently. The second, Chiaroscuro (Black Pepper, 90pp,
              $23), appears more subdued than Mad Poet’s Tea Party . This may be partly the effect of a different font and paper stock. Jeffs’s framing
              of madness for narrator or protagonist allows for extreme statements. Not just of the buying-cars kind quoted above, but statements such
              as these from Detachment : “She is as detached from the world as the Buddha”, and, in reference to Plath, “Sylvia’s suicide / was her last
              great poem / it cemented the legend”. Neither is aggrandising, but they are not convincing either. Lines such as “I am in Rilke’s great
              song / I am in Kafka’s burrow” read like typical poetic hyperbole, whereas “I am a bulging reservoir of churning waters” (because less flattering)
              and “Words are chasing me through the shadows” (because less self-centred) are more compelling ( The Hour is Striking ). There is a nice
              dialogue in Jeffs’s poems between global and local culture: her narrator is not just Rilke or Plath, but “Hewett … Slessor … Harwood” (
              Finding Voice ), and her celebrities are not just Brad and Angelina but Bert and Patti and Angela Bishop ( I Want to be a Celebrity ). There’s
              a “mad” pay-off for this poem: “& if I can’t be a celebrity / I’ll just stalk one!” Yet it, and Clancy@theoverflow.com.au , which updates
              Banjo Paterson, could have been pithier. Her narrators exist on a broad spectrum, encompassing, for example, the stockbroker and the shopaholic.
              This affects satirical mode: the extremes of the former are represented caustically, while the latter is more arch, producing hyperbole
              edging into hysteria ( The Greed¬ocracy; The Shopocratic Oath ). A few poems address what kind of poet the narrator is, and whether they
              “cut the poetry mustard” ( Poetic Licence #2 ). It’s clear poetry is Jeffs’s world; it permeates ordinary human existence, doing its best
              to withstand insanity and capitalism. Michael Farrell is a poet and critic."
        - title: Jean Taylor Review
          text:
              "Chiaroscuro Jean Taylor, Wurundjeri Country Melbourne 3 August 2015 To have two poetry books published and launched in Melbourne by
              two different publishers within days of each other, Chiaroscuro by Chris Wallace-Crabb at the Fitzroy Arms Hotel on 2 June 2015 and The
              Mad Poet’s Tea Party byJennifer Harrison at the Christmas Hills Mechanics Institute Hall on 11 June, is no mean feat. But then the poet,
              Sandy Jeffs, is no ordinary poet. Diagnosed with schizophrenia during the 1970s Sandy has had to learn to live with this debilitating and
              mind-altering disease for almost 40 years, an almost impossible task but one she has managed with aplomb and with her sense of humour intact.
              One of the mitigating features of her compromised life was the fact that Sandy wrote poetry and it was after her first book of poems, Poems
              From the Madhouse , was published by Spinifex Press in 1993 to critical acclaim that Sandy realised that she finally had a purpose in life
              as a recognised poet and also as an advocate and a public face for people living with mental illness. These are books seven and eight of
              Sandy’s output to date and as with the previous books being mad, a ‘loony, loopy, schizy’, to use Sandy’s terminology, is the central theme
              of the poems in The Mad Poet’s Tea Party. She writes about her fears and her feelings of despair in The Dark Hours (p 19): ‘I spend too
              much time in these hours / my mind darkens in to them / a long creep down a deep weeping wound / where I know myself too well’. She likens
              the ways in which madness manifests itself in her head to an on-going conflict in Waging War (p 15): ‘This is not the war to end all wars.
              / A mind wages perpetual war - against itself.’ And even the every day ordinariness of madness in The madwoman in This Poem (p 1): ‘The
              madwoman in this poem / is everywoman / is any woman / is a mother, daughter / sister, lover, friends - / the madwoman in this poem - /
              is me.’ And yet, and at the same time, Sandy is able to step back, to recognise the humour in the bleakest of situations as in Occupy My
              Mind (p 25), ‘it is occupied by / Jesus, Judas, God, Satan / Tweedledum and Tweedledee / my mind if a full house / I’ve hung out the ‘no
              vacancy’ sign.’ It is perhaps essential to make fun of the medical profession in a reproving fashion in Therapy: Prices Update (p 27): Hello!
              $10 $30 / Sit down $20 $70 / How are you? $30 $110.’ And especially to make fun of madness itself as in Downsizing (p 60): ‘I’m downsizing
              my mind / in preparation for the new year’. This is also true of Done to Death (p 66): ‘I’m a little concerned / I’ve done madness to death
              / and I’m casting around for another subject / to engage my interest’ And yet, ultimately, we are left with no illusions in Housemate (p59):
              ‘I live with schizophrenia / and all her moods / she is the housemate from hell.’ Madness is also the subject of many of the poems in Chiaroscuro,
              how not to be in this book whose very title means the strong artistic contrast between light and dark. However here, the darkness is not
              quite so terrifying: Splintering (p 6): ‘I am splintering in winter barrenness’ and Lifequake (p 25): ‘A life is quaking / tectonic plates
              are shifting’ and again Someone Else (p 60) ‘Perhaps I could climb into someone else’s mind / hear someone else’s voices / have someone
              else’s delusions’, which are all about madness in a different key to the sometimes desperation in the other book. Not only that, the majority
              of these poems are laugh out loud funny and some have an underlying political meaning that is criticising, and understandably so, the status
              quo. The best of these include poems that take down the sacred literati. Such as Hermione Beecham-Smith Counsels J Alfred Prufrock (p 17):
              ‘J Alfred, you can’t go on like this / you need therapy... Who cares if you are growing old / and balding ... I can recommend my therapist
              / J Alfred, go and see her and get back to me ... You’ll find me with my girlfriends / in a room walking to and fro / talking of Michelangelo.’
              Then there’s Durer’s St Jerome in his Study who is editing a book of fiction (p 18): ‘It’s title, The Bible, is most uninspiring. / Who
              on earth is going to buy a book called that?’ This is accompanied by the black and white illustration of the same name to emphasise the
              point. In fact, the only other illustration on page 33 is equally serious in contrast to the poem that accompanies it. And taking one of
              Australia’s iconic poems on which to hang her critical humour in Clancy@the overflow.com.au (p 43), Sandy gives us an altogether different
              perspective on mateship in the bush: ‘and a reply came as directed in a font quite unexpected, / (The Epson printed the email like a thumb-nail
              dipped in tar) / ‘Twas his secretary who wrote it, and verbatim I will quote it: / ‘Clancy’s gone to some retreat and we don’t know where
              he are.’ ' The much darker poem, Daddy, What Did YOU Do in the Great War? (p 33), reveals Sandy’s political intelligence as The Sergeant,
              whose job it is to turn army recruits into killing machines, replies: ‘made them drink semen / chucked them into a shower / and scrubbed
              them with a wire brush / rubbed their dicks and balls and arse with boot polish / sodomised a young bloke’ with the inevitable consequences
              as the The Recruit answers the same question (p 34): ‘I gave the sheila recruits a hard time... and ya gotta let the shitheads know who’s
              boss / so I raped a few of their women / it’s what happens in war’ Mention must also be made of the eye-catching covers. The cover painting
              on the Black Pepper book is My Mad Friend by Veronica Holland, a colourful styalised picture of Sandy with her long hair flying as she plays
              the violin surrounded by everything she holds dear, cats, books, friends, a circus tent, trees, a magpie and green rolling hills with the
              monster breathing fire held at bay in the far corner. The Spinifex book has Charles Blackman’s painting Feet Beneath the Table on the front
              with a wary looking Alice at the unstable tea table and more feet under the table than seems possible. In the interest of full disclosure
              I was also there when Sandy’s first book Poems From the Madhouse , (Spinifex Press, Melbourne, 1993, 1997, 1998, 1999, 2000) was launched
              by Judith Rodrguez at Bromham Place Clubhouse in Richmond on 19 June 1993 and wrote a review of it for Lesbian Network no 37 September 1993.
              And likewise when Sandy’s autobiography, Flying With Paper Wings: Reflections on Living With Madness , (The Vulgar Press, North Carlton,
              2009) was launched by Christos Tsiolkos at Dantes in Gertrude Street on 17 October 2009 I reviewed it for LOTL on-line in February 2010
              and also included the review in Stroppy Dykes (2012). In other words, Sandy is one of my all-time favourite poets and I admire her talent
              and courage immensely. For as Sandy puts it in Dangling (p 20) ‘we dangle from a thread of sanity // while madness snaps at our heels’,
              but it hasn’t stopped her from offering us the very best of herself and we are the richer for her persistence over the years. To read more
              of Sandy’s work: she also coauthored Loose Kangaroos (Domain Press, Melbourne, 1998), and wrote Blood Relations , (Spinifex Press, Melbourne,
              2000), Confessions of a Midweek Lady: Tall Tennis Tales (Overthefence Press, Melbourne, 2001, 2009) and The Wings of Angels: A Memoir of
              Madness (Spinifex Press, Melbourne, 2004)"
        - title: Geoff Page Review in SMH
          text:
              'Chiaroscuro Geoff Page The Sydney Morning Herald , 13 August 2015 Writer/poet Sandy Jeffs. Photo: Cathryn Tremain Over six collections
              and a memoir, Melbourne poet Sandy Jeffs, has developed a considerable track record as an "insider" spokesperson for the mentally ill. She
              has battled schizophrenia and other disorders since 1976, From 1994, with her first book, Poems from the Madhouse, Jeffs has used poetry
              to provide a graphic insight into her situation and that of thousands of others enduring comparable problems. Technically, Sandy Jeffs in
              The Mad Poet''s Tea Party , is no Sylvia Plath but her skills are more than adequate to the task at hand, especially in longer poems such
              as "Congratulations","McMadness ​" and "The Sanity App" where she satirises the seemingly limitless limitations of the psychiatric establishment.
              In "Medicated", Jeffs sardonically converts the names of her 21 successive or simultaneous medications into verbs. Hence lines such as:
              "when I was Risperidoned​ I lactated like a cow" and "I was Lithiumed​ and Epilimed​ to even my pendulum / I''ve been Imipramined​, Prothiadened​,
              Lexaproed​ / Effexored​ and Zolofted​ to happiness ..." In case readers think this is making too light of the situation, there are other
              poems, such as "Crouching Tiger", which give a more than unsettling vision of what the voices of schizophrenia are actually like: "The crouching
              tiger / and hidden dragon have come / once more to mock me. / Sniggering as they taunt me / they smear me with their insults." "Why can''t
              you hear them?" she quite reasonably asks in her next poem, "Vampire". In "Done to Death" Jeffs admits that "I''m a little concerned / I''ve
              done madness to death / and I''m casting around for another subject / to engage my interest / but I am madness / and madness is me ..."
              Readers might suspect that, as a poet, it would indeed be better for Jeffs if she were able to find "another subject" but, having read The
              Mad Poet''s Tea Party , they might be perversely glad she hasn''t. Surprisingly then, and perhaps as a warning to be careful what one wishes
              for, Jeffs has issued, within the year and with another publisher, a collection where she does indeed range far more widely in manner and
              subject matter. In Chiaroscuro , Jeffs comes out of the ward, as it were, and writes about a number of issues, only a few of which directly
              relate to mental illness. They include sardonic takes on information technology, the bible, celebrity culture, consumerism etc. The risk
              here is that the poet may drift from her immediate and hard-won expertise into a more general competition with other poets who also write
              copiously on these issues. Sometimes the comic touch that serves Jeffs so well in The Mad Poet''s Tea Party transfers successfully to these
              new concerns. At other times her targets seem a bit too well-peppered already. Among the more memorable poems in Chiaroscuro , however,
              are ones such as "The Big Issue", where the poet wrestles with a deeply-felt moral conflict, and "Hermione Beecham-Smith Counsels J. Alfred
              Prufrock​", a parody in which Jeffs not only satirises the eternally self-pitying Prufrock​ but also the "counselling" industry with which
              she herself is only too familiar. As Hermione says towards the end of the poem, "I can recommend my therapist. / J. Alfred, go and see her
              and get back to me / when you''ve pulled yourself together". It''s also a passing put-down on those who believe, as almost everyone did
              once, that the depressive need only "pull himself together" to recover. The poem also ends with a clever touch. "You''ll find me with my
              girl friends / in a room walking to-and-fro / talking of Michelangelo." It''s important to note, however, that Jeffs still has quite a deal
              to offer on her original subject in Chiaroscuro . Her four-line poem, "Soul Searching", demonstrates, for instance, that schizophrenia is
              not something easily escaped from: "I took my soul to the bathroom / to clean away the dread / found a Skinhead in my bones / and a Nazi
              in my head." Both Chiaroscuro and The Mad Poet''s Tea Party are important reading for anyone concerned, however tangentially, with mental
              illness. Indeed, the collections are almost bipolar in the way they veer, unpredictably, from the seriously disturbing to the uproariously
              comic.'
        - title: Cordite review by Alexis Lateef
          text:
              "Chiaroscuro Alexis Lateef Cordite , 23 September 2015 In her poem ‘The suicides’, Janet Frame writes: ‘know they died because words
              they had spoken/ returned always homeless to them’. Perhaps more deaths could be prevented if people were able to speak without fear of
              being shamed or ostracised, knowing that their words might lodge in someone’s mind or heart, and that language, if wrestled with, could
              offer healing. Poetry – confessional poetry in particular – offers a safe forum for the frank translation and exploration of mental illness,
              as spearheaded by American poets of the sixties such as Anne Sexton and Robert Lowell. In Australia, Francis Webb, Bruce Beaver and Kate
              Jennings, to name a few, furthered the style. One thinks of Webb’s sequence ‘Ward Two’, intimately detailing his and inmates’ lives, and
              Beaver’s ‘Letters to Live Poets’, unflinching in its capturing of both inner and outer processes of madness. Sandy Jeffs is a Victorian
              poet writing within this lineage, whose first collection, 1993’s ‘ Poems from the madhouse ’ (which won the Anne Elder Award’s second prize
              and a Human Rights award), aimed to give the reader direct insight into the florid thought patterns of a schizophrenic mind, forgoing the
              restraint of Webb and Beaver for a rambling transfusion of desperate words, and utilising startling, grandiose imagery. It is the struggle
              to convey her illness through a slippery lexicon that sets the groundwork for later poems. Her second book, ‘Blood relations’, published
              in 2000, saw Jeffs tackle her traumatic childhood, moving from mind to past. She invites us to see the connection between the two, as she
              recreates the pain of domestic violence. Despite the horrors, she remained hopeful, feeling strength in knowing ‘that was then’, moving
              forward by exorcising such demons through poetry. In her latest collection, Chiaroscuro , Jeffs is notably restrained and deliberate in
              her choice of words, indicating that she has become comfortable with language. The title refers to the use of contrasts between light and
              dark, and she conveys this continuing, if less horrific, struggle in the title poem: … in the house of mirrors a bewildered face illuminated
              by darkness and shrouded in light peers back at me She implies that you will uncover her true self through her more sombre words, which
              will ‘illuminate’ her, rather than through the mask of happiness she may wear outside of her writing. Jeffs also writes about poetry, a
              tricky area, since such poems can suffer from generalisation. The process of writing poetry must have a redemptive, spiritual presence in
              her life, and there is a personal magnitude that can only be conveyed through hyperbole, such as in ‘The hour is striking’: The hammers
              and anvils are pounding. Her foundry is casting its metal. The zephyr is turning into a gale. A poetry storm is brewing There is also the
              overwhelming sense that Jeffs is now joyous with language, where in earlier collections there was a brooding mistrust of it, of whether
              it could hold her suffering. She is grateful for the words that find her, knowing that, due to her mental illness, her brain may turn against
              her the next day, but it is a universal feeling, for all who experience writer’s block: Words are flying into the air and falling madly
              upon a page. I seize this hour. There may be no poetry tomorrow It is in her satirical poems, however, that we find Jeffs at her strongest,
              such as in ‘Hermione Beecham-Smith counsels J. Alfred Prufrock’, a critique of T.S. Eliot’s infamous persona: J. Alfred, you can’t go on
              like this you need therapy your indecision is paralysing you just pop the question. Who cares if you are growing old and balding It is tongue-in-cheek
              advice from one who is well seasoned in experiences of psychiatry and counselling, a 21st century reaction to the mental instability inherent
              in this cornerstone of modernism. Jeffs is not afraid to question such holy cows, and in ‘Durer’s St Jerome in his study’ she dissects the
              bible in a Wilde like manner, through the voice of St Jerome: … I would suggest a major rewrite to make it a more coherent narrative … To
              be honest, in my humble opinion I think The Bible is beyond salvaging even with my considerable editing skills. I cannot recommend it. I
              simply can’t see it being a bestseller. It encourages us to look more critically at all texts we read, and indeed at the application of
              language itself, when it is taken for granted. In a time where people are still fighting religious wars, it is pertinent. Elsewhere, Jeffs
              unpacks the romanticisation of war that still exists both in this country and overseas by responding to the advertisement ‘Daddy, what did
              you do in the Great War?’ with a biting dichotomy of a sergeant and his recruit, the lines mirroring each other as they unveil corruption
              and abuse: Well, darling, I saw the young men come into bootcamp and being their sergeant it was my duty to turn boys into men into fighting
              men, you know so me and some mates initiated them by shoving a broom handle up their arse forced slops down their throat ‘Well, darling,
              first I went to bootcamp I was taught how to kill then I was bastardised by me superiors they shoved a broom handle up me arse forced slops
              down me throat In other poems she comments on the commoditisation of celebrity, the economic market, the growing presence of the Internet,
              the philosophical dilemma of buying poetry over a Big Issue, and even ‘poetic license’ itself. In these tight, vernacular poems she displays
              the same candour but in a critical, amusing light. The poems are less rambling; they are sharp and humorous, despite the dark subject matter,
              as she surveys the contrasts of her own personal chiaroscuro. It is safe to say, with this third collection, traversing social awareness,
              disarming wit and exuberant use of language, that the strengths overcome the weaknesses, and that Jeffs’s words will always find a home."
nomadic:
    title: Nomadic
    author: Judy Johnson
    short_description:
        The poems in Nomadic fuse myth, culture, history and emotion. Judy Johnston is alert to the complex interplay between the
        external world and the often terrifying inner one we carry with us. An earlier version of this book won the Wesley Michael Wright Prize. This
        powerful collection deals eloquently and humanely with the difficulties of experience. There are many fine psychological studies taking us
        into worlds of childhood and adult pain, while being equally sensitive to private rapture. I am struck by how much gets into these poems -
        how much openness, how much imagination.
    long_description:
        "This afternoon while looking for my watch I found a love letter from your mistress In 1947 while searching for his lost goat
        a Bedouin boy found the Dead Sea Scrolls The poems in Nomadic fuse myth, culture, history and emotion. Judy Johnston is alert to the complex
        interplay between the external world and the often terrifying inner one we carry with us. An earlier version of this book won the Wesley Michael
        Wright Prize. This powerful collection deals eloquently and humanely with the difficulties of experience. There are many fine psychological
        studies taking us into worlds of childhood and adult pain, while being equally sensitive to private rapture. I am struck by how much gets
        into these poems - how much openness, how much imagination. Peter Boyle Judy Johnston’s poems are strong and surefooted. The world has presence:
        animals, voices, histories, objects are all given existence through her remarkable understanding and curiosity. This is a poetry at once worldly
        and refined. Judith Beveridge"
    price: 24.95
    isbn: "1876044438"
    release_date: "2004"
    page_count: 111
    reviews:
        - title: Mattoid Review
          text:
              "Moving Against Complacency Nomadic Kristen Lang Mattoid , No. 55, 2006 There is a startling range of poems in Judy Johnson’s new collection,
              covering subjects and settings that travel from loss to lovemaking, from cannibalism to a cure for stagnation, and from New Guinean forests
              to shipwrecks in Western Australia. There is great contrast, too, in both tone and accessibility. Captivating poems, the varied creations
              of a strong and original poet, appear beside works in which abruptness and incongruity render involvement difficult. Three sequences stand
              out, each as exotic as the other. Anoint your skin with dapples of burnt butter and charcoal. Look up at the tree you have chosen. Take
              note of the muscular folds This from ‘The African Spider Cures’, where each image drums a rite of passage one feels it would be perilous
              to ignore. Even absurdity is here contagiously buoyant - one tends to believe, almost smiling, that ‘under each foot / you will have sprouted
              the softest grade of toothbrush.’ ‘Three Faces of Shiva’ is as fluently persuasive. In its first poem, a man imagines he is the son of Shiva
              and Vishnu riding Brahma in the guise of a tiger down the length and breadth of Mohammed Ali Road. Without pretending to be African or to
              be Indian, each sequence plies its borrowed influences to yield a fresh and convincing vision of human realities and possibilities. With
              great beauty, ‘Three Faces of Shiva’ paints images of faith and doubt, ambition and destiny, and of prayer and death. In one scene, a woman
              descends into a river to pray and is described so intimately it is possible almost to breathe with her. There is no more moving way to consider
              what prayer is. In ‘The African Spider Cures’, coherency is sustained through a commitment to ‘cures’ for, in turn, disappointment, self
              pity and stagnation. The mood is all-embracing, the locations specific (Kenya, Kampala, Cairo, Fez...), and the effect delightful. Each
              poem is built from directives (the addressee is ‘you’ -’your hair’, ‘your jaw’, ‘your predicament’) so cleverly phrased and paced as to
              effect, rather than tyranny, a sense of licence and thrill (like being whipped with strange coloured tulips). In the second poem, one of
              these directives is so cheekily and pleasantly personal as to elicit almost immediate admission to its simultaneous accusation. ‘It’s time
              to admit’, the poem insists, ‘you did not come to this cure to relieve your self pity, merely to indulge it’. The merriment is not insubstantial
              - the mind, here, suffers no boredom. ‘New Guinea Mission’ is a sequence in a different style again. These poems tell of a failed attempt
              to bring God into the jungles of New Guinea, and do so through the private voice of the only member of the expedition who does not turn
              back. Rhythmic and narrative strength support images that other contexts would perhaps deny: ‘The sunset, a sheet / of clotted metal seeping
              into the trees’, and, ‘The hollow cores of roots / sucking at their own reflections / from pools of fetid water’ are here persuasive. Indeed,
              belief and anticipation are the rule from the outset of these poems. The finally revealed fate of the missionary does not disappoint. For
              this reader, the sequence yields the best poems of the collection. Nomadic offers many moments of brilliance. A seven-year-old’s response
              to her father’s death becomes ‘Girl on a Paling Fence’. Here, rhythmic tension matches a balancing of both body and mind as the girl ‘spacewalks’
              on the fence around her garden. The attention to detail (the girl looks down, for example, ‘to two striped feet with their strapped-in cargo
              of toes’) tilts the emotional weight of the poem on a fragile edge, compelling reading. The work’s sister poem, ‘Photography at Dingo Creek,
              1967’, in which the same girl, aged six, is photographed by her father as she swims, is still more powerful. Fine control in sound and sense
              lend a secure and deep intimacy. The daring with which Johnson writes, the risks taken to describe toes as cargo, gills in timber (‘Diving
              the Westralian Coast’), death as a phone conversation between lovers (‘Five Poems of Light’), and to compare, as occurs in ‘Nomadic’, the
              finding of a letter from a husband’s mistress to the finding of the Dead Sea Scrolls, are never guaranteed of success in the eyes of individual
              readers. It is perhaps to be expected that where the degree of daring is high, the number of poems that do not ‘sing’ for a specific reader
              will also be significant. ‘Rainforest Bats’ is indeed one of many poems offering images I cannot amalgamate. In this poem, the ‘ghosts of
              orgasms’ drift ‘along the branched-ether / of urban streetlights and into the rainforest, where each inhabits a small, furred bat in the
              canopy’. It is a cumbersome journey. Without pause, the bats are to be placed on a ‘green abacus’ and given voices ‘reminiscent of our playful
              pillow talk’. The poem doesn’t stop here, stacking image on image without sufficient scaffolding for the climb into any sense of honesty.
              In ‘Rainforest Bats’, the density of Johnson’s imagery falls into clutter, a bombardment without a frame, or light that has been confused
              by too much shadow. In the sequence, ‘Encountering Easter Island’, we are given a report: The ocean and a backdrop of sun are confused and
              her vision is trapped between horizon and the rim of window remembering the first mammogram This, too, is a difficult moment to absorb.
              In the strain of navigation (from ocean to sun, to the horizon, the rim (which rim?) of a window, the past, and finally to the subject of
              breast cancer) there is no time or room for empathic involvement. Simplistically, we are told, ‘With the tenacious amnesia / of a schoolgirl,
              she erased / what the Doctor had said / one hundred times / on the blackboard of her mind’. Too absurdly, we learn how, ‘her body seemed
              eager to fly / like an open book, hinged / at the spine and fluttering to wings.’ There is no space, here, for the tenderness that seems
              to be invited. The number of such obstacles in Nomadic is disconcerting. To visualise ‘the cliff wind coaxing his eyebrows to wings’ (‘Towards
              the Edge’), or a hand as ‘a lesser, broken string / of knuckles to be counted over / and over like rosary beads’ (‘Hands’) is to engage
              in a gymnastics of the imagination that is beyond me - both beautiful ideas are marred by their own physical impossibility. It seems necessary
              to mention that a further cause of doubt regarding the poems in Nomadic rests with their appearance on the page. The lines in near to half
              of the poems are longer than the page is wide. The disruption is severe. Single words are often stranded on an indented second line. From
              ‘Diving the Westralian Coast’, for example: Off the Houtman Abrolhos, you descend to a place where all motion frays. Fish and corals waver
              to an outline that could be port holes of a ship’s hull, or giant wedding rings for a Jules Verne eight-tentacled bride. It is sometimes
              difficult to tell whether a sense of brokenness or disjointedness in a poem arises from this violent distortion or from the poem itself.
              It is an awful complaint to have to make. Abruptness, distortion, and confusion do not deny the moments in this collection of tremendous
              beauty and delight. Nomadic does not carry a strong sense of unity. It does contain, however, instances of brilliance for which all else
              is, while perhaps not forgiven, certainly tolerated. The strength worth seeking and returning to in this collection is also worth returning
              to here. In ‘Five Poems of Light’, a woman travelling home to her dying mother informs us, ‘It’s worth the dizziness, the confusion of an
              ox brain yoked to its own / forward motion, to turn the train seat / backwards, show some resistance / to the future.’ There is an insistence,
              here, on pushing the mind and body to where it will feel most pressed, and in a sense most alive. If there is one thing to cherish in Nomadic
              it is this move against complacency."
