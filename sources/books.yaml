    reviews:
        - title: Island review Fuel by Andrew Sant by Geoff Page
          text:
              "Reviews Andrew Sant - Fuel Geoff Page Island , No. 122, Spring 2010 Andrew Sant. was one of the co-founders of Island in 1979, came
              originally from England and has in the past ten years or so spent considerable time there. In some ways he is as much now an English poet
              as an Australian one. This is more apparent than usual in his most recent collection, Fuel . Though there are a few poems which are explicitly
              set in Australia (Tasmania, in particular) the domesticity and suburbia (even the climate) we feel in the poems appear to be English. Andrew
              Sant shares with Stephen Edgar , another poet who lias spent considerable time in Tasmania, a predisposition to stand back and observe,
              to let the relatively mundane phenomena speak lor something more universal. With Edgar, the scene is often littoral; with Sant it is interior.
              One of these recurrent observers in Fuel is Mr Habitat. He has seven poems devoted to him nominally but his spirit runs through the whole
              book. He is a somewhat solitary suburban man, bemused by the small things he sees around him and disposed to see them as being symbolic
              of something rather larger but, even so, less than terrifying. What’s coming is coming, whatever its incredible links to tea leaves or the
              entrails of sheep. Why take the leap? I think the brave live on the brink ‘Mr Habitat’s Take on the Future’ The book is unified by more
              than viewpoint and attitude, however. Sant’s syntax and lineation are also very characteristic. He prefers long sentences and, for the most
              part, relatively short lines. This gives his poems a quality of unwinding, of wending their way down in a deliberately leisurely manner
              to their final revelation - which, while often low-key, is generally memorable. Sant likes to leave the reader with a last line to chew
              on. It also creates, in many cases, a strong sense of poise. The mildly erotic poem ‘Knight’ is a good example of the technique at work.
              Its single sentence runs for eighteen lines across six unrhymed tercets. He begins When I saw her, slender and taut, as if for the first
              time in the steamy bathroom, turning away from the mirror, so separate, hair still wet, no sudden storm could do it better, her body...
              Later he says: I look no ridiculous out-of-place steps to protect her because (at the end) in any case she’d meet whatever fiasco, sawily
              dressed and, as any shield can’t he, readily animated It’s a neat reversal of the damsel-in-distress trope - created almost entirely by
              the manner in which it’s written. More typical perhaps are poems such as ‘Dedication to a Potter Wasp’, ‘The Household Moth’ and ‘Words
              with an Ant’ where a narrator or protagonist, observes an ant, a wasp, a moth, a fly, a spider and meditates, in the same leisurely manner,
              upon them. A few of these poems are genuinely philosophical; most are light-hearted and some downright funny. A good example of the last
              is ‘The Spider in the Kitchen’ where the narrator begins, somewhat dramatically, ‘I fed the spider beef’. A few lines later her babies are
              ‘little monsters, big // and hungry.’ A tall teenage relative arrives and swears it is ‘the hormones in the meat’. The spiders, at this
              stage, ‘stretch... / themselves across wide windows’. The poem ends with a nice ambiguity, a free-standing line in which the narrator says:
              ‘I looked heartlessly into their eyes.’ Not all of Fuel is concerned with the animal or insect kingdom, however. There’s a playful villanelle
              called ‘The Marriage Vow’. There’s a convincingly heartfelt elegy for the late British/Tasmanian poet, Margaret Scott. There are several
              character studies of rather hapless men doomed to English suburbia. ‘Freddy and the Christening Gift’, with its symbolic serviette ring,
              is one that comes to mind. Something of the same mood can be sensed in the opening lines of ‘High Cost’: In their garages, obedient cars
              are like pets drcaming of petrol, oil, speed, highways as beelines to free the use of carboniferous energy. It’s as if young boys want to
              escape their fearsome primary schoolmarms but There is no getting past them, out of range, buttoned-up dames calling out the lists of name
              ‘Misses’ The publisher’s blurb suggests that ‘ Fuel represents a journey that begins and ends with water’. If water is a symbol of something
              that goes only where it has to, that is, downhill through the channels available to it, then the image may well be a suitable encapsulation
              of the book as a whole. What is more the case, however, is a sense, of someone watching the water and pondering its significance in the
              book’s penultimate poem, ‘Along the Rehabilitated Creek’ the narrator observes with pleasure the wild antics of the birds who have now been
              able to reinhabit their original environment. ‘The fire finches... / ...light up the scrub.’ ‘A fantail, the show-off, can / put, on an
              aerobatic display.’ What pleases the narrator most, however, and what speaks for the book as a whole, is the image we are left with of the
              heron: Only the heron slows right down, motionless at the edge of the flow as if it’s heard of the illustrated Field Guide to Birds , and
              poses."
        - title: Australian Book Review review Fuel
          text:
              "A full tank Paul Hetherington, poet Australian Book Review , December 2009-January 2010, No. 317 Fuel is Andrew Sant’s eleventh poetry
              collection. His previous volume was Speed & Other Liberties (2008), which included some of the new poems from Tremors: New & Selected Poems
              (2004), along with additional work. The epigraph to Speed & Other Liberties is Marc Bloch’s statement that ‘Contemporary civilisation differs
              in one particularly distinctive feature from those which preceded it: speed’. So, the titles of Sant’s last two volumes imply movement,
              power, freedom and forward thrust. Certainly, some of the poems in Fuel move at least as fluidly as the often fast-paced poems in Speed
              , impelled by a rapid accumulation of ideas and associations. There are also other respects in which Fuel and Speed & Other Liberties read
              as companion volumes. For example, both contain poems in the voice of Mr Habitat, an alter ego for Sant who allows him to write with a sometimes
              prickly assertiveness. The rhythmic life of Sant’s poetry is various and involving. There are extended poetic sentences; a considerable
              verbal inventiveness; a quicksilver way with ideas; and a purposeful deployment of devices such as internal rhyme and enjambment. But the
              poems are never helter-skelter. Sant drives them onwards with care, organising and containing their energy even when he is at full throttle.
              Sant’s poetic voice in Fuel emphasises momentum in a way that extends the considered measures of the poetry of his first four or five volumes,
              the pleasures of which were closely tied to its judicious intricacy and carefully observed image-making. But although his mode is more energised
              (though no less intricate) than in the past, he retains his interest in history, in articulating his sense of being-in-the-world and in
              questioning the adequacy of language to register complex experience. He writes: ‘Fuel exists, carboniferous heat,/and harnessed water that
              drives townships,/lit up, into the night; but there’s no energy/as inexhaustible as that seen/in a lover’s eyes’ (‘In the Land Called Desire’).
              This volume has many such confident-speaking poems that link personal concerns with larger, even global, issues. While some are deliberately
              lightweight, even jokey, they are all informed by the poet’s attentiveness to the world and by his probing, occasionally mordant, sense
              of humour. For Sant, issues relating to history, the environment, modernity and the future have always seemed personal. From his first volume
              onwards, his poetic personae have been close to the world’s concerns, travelling through time and place with a restless interest in what
              has happened - today and yesterday, in preceding centuries, and even throughout geological time. For instance, in Tremors, the poem ‘Geologist
              in a Cave’, from the early 1980s, speaks of the ‘Countless strata beneath / the veneer of place’. It is no surprise that Fuel begins with
              a poem (‘Revisiting Cliffs’) in which the poet ‘whistle[s] out the boy’ in him to climb a ‘wind-sculpted cliff face’, ‘to get at the fossils’.
              The present, the personal past and the ancient history of the earth intersect as this work considers the vast geological changes that have
              occurred over the millennia, the numerous extinctions and the continuance of the life cycle, including gulls feeding on the fruits of the
              sea. Sant finishes with.a characteristically ruminative and encapsulating statement that functions to open up his reflections: ‘What a strange
              wonder,/on this latest day of creation,/to be human, scramble up/a cliff-face to extract,/with a pick, a bunch of old stones//and look into
              it deeply for orientation.’ There are numerous poems in this volume about insects and animals. ‘Little Forest Bats in the Foothills’ (‘Their
              forest/is continuous dark. Spiv-eared,/they listen; wings shrivelled’) emphasises the disjuncture between human research into bats and their
              natural ‘mapping ultrasound’. ‘The Household Moth’ and the fine ‘Dedication to a Potter Wasp’ explore the poet’s strong sense of being connected
              to, if separate from, other living things. In the latter poem, Sant’s thoughtful anatomy of the wasp’s activities remind one that a significant
              part of the poet’s art lies in truly registering what he witnesses. The book’s final poem, ‘Ode To Water’, invokes the work of other writers
              - including Pindar’s famous ode, ‘Olympian I’, beginning ‘Best blessing of all is water’ - but this poem is pure Sant in the way that it
              moves from a parody of high rhetorical modes (‘Even the elliptical drip / on the tap, I praise’), to the ironic observation that human fashions
              extend to bottled water (‘in the shops / - mountain landscapes on the labels - proves / that it’s precious’), to a playful conceptual riff
              about ‘continuities no spanner/will interrupt when the tap’s fixed’.This poem’s multifaceted conceit turns on the fundamental importance
              of water: how we take it for granted; how the tap continues to drip; how water can clean, save and enthral. This is a satisfying, shifting
              and thoughtful volume, charged with ideas, energy and a strong engagement with the world - fuel for the mind."
        - title: Martin Duwell Australian Poetry Review online Review
          text:
              "Andrew Sant: Fuel Martin Duwell Australian Poetry Review ( online ), 1 October 2009 Andrew Sant’s previous (his tenth) book was called
              Speed and Other Liberties and carried as an epigraph a quotation from Marc Bloch: ‘Contemporary civilisation differs in one particularly
              distinctive feature from those which preceded it: speed.’ The title of this new book suggests that one of the things it might do is to explore
              the material which is combusted into producing that speed. And it’s true - fuel and speed do make regular appearances here but they do so
              from surprising perspectives. Fuel is really more about location, balance, self-awareness and, well, perspective. Sant’s recent poetry seems,
              to me at least, to be happy to avoid those things which knock us out of balance, things such as erotic love, transcendence and the arrival
              of the divine in the form of visitations. It is humanist, in the old sense of the word, in that human life is at the core of its concerns,
              but it has very little patience with the tendency to inflate the significance of that human element. A good example of these interests is
              the first poem of the book’s fourth section, ‘The Promethean Gift’. As the title tells us, it is about fire and, in this respect, it balances
              the section’s final poem which is about water. In ‘The Promethean Gift’ humans are situated between fires and lizards in terms of their
              need for fuel: In appreciation of this, I raise a whiskey, and to friends who, unlike hidden lizards in the woodpile, as a species need
              ready fuel. The fire is keen about this, like smoke in clearings before humans moving coldwards cleared more and more... In a sense this
              issue is taken up again in a series of poems called ‘Cycle’. In one of them the image of the human flanked by the fire and the lizard is
              repeated. The wood-burning fire has a fast metabolism, faster than that of its human owner and feeder, but the lizard which has been hibernating
              in the sawn up logs has one which is slower than either: When it slid its few burnished inches into the open, the skink unfroze a trick
              rehearsed in the Triassic of riding idle with the inanimate while woodsmoke showed whose metabolisms aren’t for slowing... So the volume
              of demand for fuel and the speed of its consumption, not to mention the activity of the heart, is one of the ways this poetry wants to situate
              us: what one might call a biological positioning. But there are many others. And one of the most attractive throughout the poems of Fuel
              is the drive toward fitting us into geological frameworks. The first, very fine, poem, ‘Revisiting Cliffs’ specifically contrasts our sense
              of the elapsing of time with geological time. Clambering up cliffs in the search for fossils, the adult man thinks about the boy in him
              and about the passing of a few decades that makes the massive change from child to man. But the act of climbing is taking place over sedimentary
              rocks which cover millions of years and contain, between their strata, fossils which themselves contain a ‘glimmer’ of the mammals which
              we will eventually evolve from. So the growth of a single human is also set in the context of evolutionary growth that goes back to the
              Jurassic. The end of the poem is interesting: What a strange wonder, on this latest day of all creation, to be human, scramble up a cliff
              face to extract, with a pick, a bunch of old stones and look into it deeply for orientation. The word ‘wonder’ (which appears twice in the
              poem) has a suggestion of the miraculous which the poems of Fuel generally avoid, though there exist, of course, perfectly secular wonders,
              such as looking at images from the Hubble telescope. But the search for an orientation is close to the heart of the book and another good
              poem, ‘Rock Music’, takes up the geological theme, operating, as many of the poems do, in terms of contrasts. There are two kinds of rock
              music: the stuff that comes out of the radio - absolutely up-to-the-minute and focussed completely on the present - and the strange sounds
              made by rocks themselves. If you switch off the radio, the poem says, you can attempt to tune into ‘the frequencies of stone’ working through
              sandstones, schists and flint: Elsewhere you, as audience, facing Triassic strata, may get transported by sediments bound together like
              pages that predate the break-up, layers of the supercontinent Pangea. Ultimately you arrive at a meteorite in a museum which ‘signals, mysteriously,
              all / it can about how life modestly began’. ‘Rock Music’ has the attractiveness of being a comparison built into a single phrase in the
              title. It’s not a powerful poetic technique but it is one of the things that Sant is good at and it lightens and animates the poems. To
              be without direction is to be ‘all at sea’, for example, and one of the poems, ‘Mr Habitat at Sea’ exploits this (Mr Habitat is a kind of
              alter ego whose experiences fill out a dozen poems of what looks to have been, originally, a sequence and is now spaced out throughout the
              poems of Speed and Other Liberties and Fuel ). A small but intriguing poem, ‘The Misses’, invokes the formidable teachers of primary school
              but is really interested in the way that formal education contrasts (or, perhaps, complements) the immersion of informal education: There
              were fields, seasons containing forever, to quicken in; nests, eggs, chicks in the hedges - grazed knees, open space. As well there were
              the firm Misses at the beginning of our formal educations: I remember Folkes, Powell, Josa. What you get from the formal component of your
              education, the poem wants to say, is identity, location and orientation. Contrast, the way Sant’s poems use it, is not a way of correcting
              (one road wrong, the other right) but of locating. The second poem of the book, ‘Two Fisherman’, is built from an intriguing contrast. For
              the first man, fishing is a social activity and takes place on a petrol driven boat fuelled, metaphorically, by dreams of the big pelagic
              fish out beyond the harbour. He gets a single thirteen-line stanza, as does his counterpart: Fisher two is stationary, with a heron’s patience,
              edge of a lake, and if there’s no strain on the line, nod of the rod towards promise, there’s meditation. He waits, winds in the fly, casts
              and recasts a gossamer arc. The lake is corrugation, then it is glass. Or in his boat he stays put, anchored as he might be at a bar, looking
              dreamily to see what might happen, beyond his beer. The trout is elusive, tactics and a Sunday gambled might win it. The man’s moves are
              sudden, spiderish. He’ll use many old tricks till, by nightfall, he too may be spent. Eleswhere, women later might surface. Two approaches
              to life are set up here and both seem viable - neither at least is explicitly condemned. One blasts through its element in search of fulfilment,
              the other floats patiently on it. One works by capture, the other by luring; one by action the other by stealth. A more significant matter,
              may be the ambit of the allegory. Do these men represent approaches or life or approaches to poetry: fishing - using lines to bring strange
              things up from the depths - has been a metaphor for poetry long before Seamus Heaney got out his fishing rod. And the issue of what licence
              readers have to read these poems as allegories about poetry itself extends to other poems in the book. ‘Two Fishermen’ is followed by ‘Marvellous
              Harbours’, which is also, at heart, a contrast poem. It juxtaposes open, wild water with enclosed water; the fishing boat’s arrival with
              the tourist liner’s, the view from the harbour’s surrounds and the view of the harbour from the ‘cannon level’ of approaching boats. One
              wants to read it as being, like the fisherman poem, about open and enclosed, raw experience and calm processed experience. This makes it
              seem an allegory of ingestion, always something close to poetry and its response to experience. And then there is ‘Dedication to a Potter
              Wasp’ contrasting, on the one hand, the torpor of a poet from temperate climates who has finished up in the tropics and, on the other, the
              remorseless energy of the wasp which goes about building little clay poets for its eggs and filling them with paralysed caterpillars: Nine
              cells I’ve greeted - two already set hard when I arrived as a guest - each deftly erected during slack afternoons or treks from the house;
              the lot being rendered - this northern wasp cannot stop! - smooth as a pot, while I, sluggish in the tropics, praise this maker, now pack
              to fly in pursuit of the south. ‘Maker’ in the last line signals ‘poet’ but, apart from that, I suppose there is no really compelling reason
              that it should be read as a contrast of the productivity of two poets. In fact, given the rest of the poems in the book as a kind of interpretive
              context, it is most likely that Sant is interested in contrasting the metabolisms of the wasp and the human. The poem that perhaps best
              sums up this interaction between biology and geology, between fuel and perspective, is ‘Heart on a Summer Afternoon’. Here Sant addresses
              his own heart, beating rapidly after climbing (as in the first poem) to a place where there is a perspective, ‘a view / to die for, if you’ll
              excuse / an expression that smacks / of conflict.’ Again, the place of perspective leads to a meditation about where humans fit in the scales
              of things and here it is the swallows, so fast that a ‘target summer fly moves / like a Zeppelin in their sight’, which contrast with the
              human. If the wasp was dogged application personified, the swallow is a frantic life-in-process: Now I have my breath back, many thanks,
              quite steady along, I guess, with the swallows’ intake as they swoop, squeal, and rise above the house, all thoroughly in the present, unlike
              the slow, reflective humans on the path. The poem finishes with an acceptance of torpor in the summer heat and locates the evolutionary
              origin of the human heart in African warmth, rather than the paleolithic conquest of the cold forests of Europe: The African beat you keep
              in my chest is great; we’re sunned and fed - as if, in this equatorial heat, vast Europe might still be the risky domain of strange primeval
              forest. Fuel is, as I said initially, largely about the implications of a humanist view of existence and perhaps prizes perspective as the
              ultimate gift of the self-knowledge that derives from this. I said it was a book without much interest in those potent experiences - erotic
              love, epiphanic experiences of the divine - which disturb that humanist position. That was a little misleading since there are poems which
              focus on these issues but the fact that they seem unusual poems in the context of the book actually supports my case. The erotic appears
              in an odd and intriguing poem, ‘August’, where, after extended descriptions of place and an extreme sensitivity to perspective - an aeroplane’s
              view is imagined and then a hawk’s or eagle’s and then that of the lowly oystercatchers at the ocean’s edge - two lovers appear on the beach,
              significantly described in evolutionary terms as ‘late arrivals’. The intention seems to be to see erotic intensity from an evolutionary
              perspective and the poem finishes: We might be headed, right now, arm in arm, down a platform at a grand station, lovers pressing forward
              through a crowd in the Age of Steam. And there is another poem, ‘In the Land Called Desire’, which is also about love, setting up an allegorical
              landscape where mountains are mere blocks to fulfilment and the streets of the town have one mission which is ‘to offer rapid passage’.
              It remains a very Sant-like (Santly?) poem though in its interest in what fuels the erotically charged heart: Fuel exists, carboniferous
              heat, and harnessed water that drives townships, lit up, into the night; but there’s no energy as inexhaustible as that seen in a lover’s
              eyes while crossing a bridge or square... And, finally, there is a puzzling poem, ‘Visitants’, about, as its title says, visitations. A
              door slams and the house’s owners think in terms of ghosts. The author, a visitor himself (hence the plural title) sees a raven land clumsily
              in a tree and is of the opinion that the bird is the cause of the various goings on, falling leaves on a windless day, and so on. I don’t
              feel completely confident about this poem but I want to read it as an assertion that there is a logical answer to the phenomenon but that
              that logical answer - the raven - is, seen from the right perspective, a miraculous one because life itself is miraculous. A human-centred
              view of life is a complicated one for poetry since it removes as a motivic force the power of the numinous. Visitations are phenomenally
              powerful poetic (as well as personal and cultural) experiences. Poetry itself is also, of course, a power in the human-centred universe
              and Fuel doesn’t seem to focus much on this - at least not overtly. But what can be said about the poems of Fuel is that they are never
              reductive and are very alert to what that first poem calls the ‘wonder’ of true perspective."
        - title: The Weekend Australian
          text:
              "Inverse perspectives on the maturing voice [reviewing Fuel and Wimmera by Homer Rieth] Geoffrey Lehmann The Weekend Australian, 7 November
              2009 Why do some poets, like some people, do their best work early, and others continue improving and peak in their late 40s or 50s? While
              editing an anthology of Australian poetry, this has been on my mind. Kenneth Slessor, Henry Lawson, Christopher Brennan and Banjo Paterson
              had virtually exhausted themselves as poets by the time they reached 40. But Slessor’s friend, R.D. FitzGerald, matured as a poet only after
              reaching that age. Goethe and Yeats continued developing until late. For male poets, at least, it may be necessary to have an argument with
              oneself if one is to continue developing. Goethe rejected the romantic storm and stress of his youth, and embraced classicism and balance.
              Yeats rejected the lushness of his early poetry for a language that was stripped back and closer to everyday speech, the famous ‘cold eye’
              of his epitaph. With female poets, a decision to have an argument with oneself may not be needed. Biology may force the issue. When reading
              the poetry of Elizabeth Riddell, one of our good middle-ranking poets, I was struck by how free her poetry became once she reached her late
              40s, as though a burden had been lifted from her. Jennifer Maiden, one of our best contemporary poets, has even written a poem about it,
              ‘Menopause as a Bee Freed from a Fairy Floss Machine’. The title of this stunningly good poem says it all. Both books, Fuel and Wimmera
              , are the work of mature poets. Andrew Sant was born in London in 1950 and came to Australia with his parents in 1962. Homer Rieth was born
              in Germany of German and Georgian parents in 1947 and came to Australia in 1952. Both poets are published by Black Pepper, founded by the
              feisty Kevin Pearson, himself a noted poet. Black Pepper is one of the livelier new houses that has sprung up after the large publishers
              decided to exit poetry publishing. That’s about where the similarities between Sant and Rieth stop. Sant has a long publishing history,
              going back to 1980; Fuel is his 11th published volume of poetry. He writes short, mainly domestic poems, and is able to tease significance
              and a sense of profundity out of everyday things with wit and ingenuity. Although a few years older than Sant, Rieth has a short publishing
              history, starting in 2001, and Wimmera is just his second published volume of poetry. In contrast to Sant’s short poems, Wimmera is a single
              epic of more than 300 pages, a leviathan of a poem, cosmic in its ambition and symphonic in its approach. In 1983, as editors of an anthology,
              Robert Gray and I wrote: ‘Sant’s poetry seems very English in its reticence and use of the middle tone of voice. He always deals directly
              with experience... His strength is his interest in and close observation of other people, combined with a classical openness of style and
              freedom from affectation.’ These comments about Sant in 1983 are still true, except that his syntax, which was always a bit complex, has
              become more complex and circuitous, and his poetry is drier in tone; perhaps too dry and sinewy at times. He has continued to grow and develop
              as a poet because his poetry thrives on wit and intelligence rather than on hormones. Take ‘Rock Music’, for example, a poem not about a
              type of popular music. It’s about ‘the frequencies of stones’, the music of geology. Sant is a poet of precision and imagination. In ‘Given’,
              after the inaction of listening to the news and hours at a computer, he starts digging in the garden: Gigantic, the fresh spadefuls of planet;
              wrecked worms like swimmers fighting incredible turbulence. His adoption of the worm’s viewpoint and his choice of the word planet are quite
              remarkable. Perhaps the pick of the poems in this book is his elegy for a fellow poet, Margaret Scott. ‘The Fires’ also may be a poem of
              farewell to Tasmania, the island where he has spent much of his life. Flying out of Tasmania over a bushfire, he thinks of Margaret Scott,
              two of whose houses were incinerated in fires, and who always said to him, in a motherly way between cigarettes, ‘Now tell me what you’ve
              been doing/and where you’ve been.’ He also remembers how Margaret used to keep herself awake while driving at night by repeatedly shouting,
              ‘Elephants! Elephants!’ Rieth’s first volume of poetry, The Dining Car Scene , published when he was in his 50s, was an elusive book. The
              title poem was a virtuoso piece describing with great precision a scene from Alfred Hitchcock’s North by Northwest . But it was hard to
              make out what he stood for. Rieth has been a teacher of Greek and Roman literature and the one thing that was clear was his love of language.
              Wimmera is an extraordinary poem, comprising 12 books, each of two parts. Rieth moved to Minyip in the Wimmera district of Victoria in 1999.
              At a basic level the poem reflects Rieth’s feelings for a landscape and people he has come to love. Each book, we are told in an introductory
              note by Justin Clemens, ‘moves through the experience of a particular place: discoveries, establishments, characters, events, the contingencies
              and violence of settlement and the unexpected profusions of the natural environment.’ The poem reaches its climax in part one of Book 12,
              where Rieth moves from the profusions of drought and flood of the Wimmera and addresses the ‘countless curvatures of space/an atoll of time
              in an ocean of infinitude/the starry night is no more than time/only space only/the inaudible overheard’. The long, sinuous sentences of
              the poem have passages of bravura language. This is how Rieth summarises the life and death of poet Adam Lindsay Gordon: ‘trooper Gordon...
              between poignant poems/... had seen how over the jumps a horse instinctively picks up a/certain tempo/by the time it covers the distance
              the tempo has become a heartbeat/tbe grace of its motion almost supernatural/and yet he shot himself as if the shot ringing out might make
              for/the sound of a caesura’. This technically brilliant passage reveals one of the weaknesses of Wimmera . Gordon’s tragic suicide is treated
              almost flippantly. The consistently heroic tone of the poem, although it knits it together musically, sometimes places too great a distance
              between the reader and details that might have engaged our sympathy. My second grouch is the deliberate use of cliche, such as ‘drunk as
              skunks’, ‘back of beyond’. I realise that the father of European poetry, Homer, also used cliches such as ‘wine-dark sea’ but that does
              not justify their use here. Notwithstanding these faults, Wimmera is quite extraordinary: it reads like a young man’s poem, with its ebullience,
              panache, occasional passages of juddering bathos, and its hormonal music."
the-bicycle-thief-other-poems:
    title: The Bicycle Thief & Other Poems
    author: Andrew Sant
    short_description:
        Energy, natural and man-made, is at the heart of Andrew Sant’s The Bicycle Thief & Other Poems - energy released at the speed
        of an escaping cyclist or through the planet’s eruptions and metamorphoses in geologic time. Either way, here is the second law of thermodynamics
        writ large, creation and destruction in a binary tussle. The mischievous title poem, a fast-moving narrative, is a robust celebration of ‘good-for-the-planet
        transport’, while elsewhere motor vehicles depicted in a ‘personal history’ are drolly seen as harbingers of an apocalypse. Many poems are
        monologues that give voice to characters whose identities are fluid and circumstantial. These are poems that get about - lively, unfettered
        and expansive.
    long_description:
        "Energy, natural and man-made, is at the heart of Andrew Sant’s The Bicycle Thief & Other Poems - energy released at the speed
        of an escaping cyclist or through the planet’s eruptions and metamorphoses in geologic time. Either way, here is the second law of thermodynamics
        writ large, creation and destruction in a binary tussle. The mischievous title poem, a fast-moving narrative, is a robust celebration of ‘good-for-the-planet
        transport’, while elsewhere motor vehicles depicted in a ‘personal history’ are drolly seen as harbingers of an apocalypse. Many poems are
        monologues that give voice to characters whose identities are fluid and circumstantial. These are poems that get about - lively, unfettered
        and expansive. Praise for his previous collection Fuel: This poetry wants to situate us: what one might call biological positioning. But there
        are many others. And one of the most attractive throughout the poems of Fuel is the drive towards fitting us into geological frameworks. The
        first, very fine, poem ‘Revisiting Cliffs’ specifically contrasts our sense of the elapsing of time with geological time. Martin Duwell, Australian
        Poetry Review Sant’s linguistic exuberance, a delight in handling words makes Fuel a bravura performance... It is certainly the work of someone
        in love with what poetry can do... I had to read Fuel twice before grasping how subtly Sant handles this serious matter, how the collection
        in fact makes a distinguished contribution to what is now often called ecocentric poetry. John Lucas, Critical Survey"
    price: 22.95
    isbn: "9781876044763"
    release_date: "2013"
    page_count: 84
    reviews:
        - title: Cordite Review
          text:
              "Reviews The Bicycle Thief & Other Poems Lucy Van Cordite , 9 January 2014 It’s no current reference, but reading Andrew Sant’s recent
              collection, The Bicycle Thief, Andrew McGahan’s Praise springs to mind. When I studied McGahan’s novel, a more astute student than I pointed
              out that Gordon’s only romantic relationship was with his car, and that, accordingly, his only romantic response was towards the sad demise
              of that Holden. His relationship with Cynthia (who he develops a relationship with) was conversely defined by emotional inertia and moral
              detachment. This observation struck me as highly sophisticated. It did not endorse a clichéd view of Australian men and their cars, rather
              it subtly suggested a masculine romance for an idyll of mobility. I think that for all the mischief and conversational flare of The Bicycle
              Thief , Sant is a romantic. Sant constructs a romantic idiom around various modes of transport that is not simply commodity fetishism, but
              as with McGahan, a desire for transcendence through acceleration and movement. There is no strict narrative progression yet the collection
              does riff around the twinned themes of movement and stasis. Somewhere in the middle of the book the speaker presents an Ur -scene in ‘Jack
              and Yves and Their Many Transports’, where children are observed locking language to movement: Train! Jack calls out once and once again.
              He lives near a railway station. He stops. His index finger is a little wand. Transport attracts his first vocabulary. One of Sant’s great
              gifts is this ability to wed naturalness with thematic abstraction. The allusion to a kernel of the poetic form - metaphor, language in
              movement – is light and unburdened, and always keening to the particular rather than the general truth. Sant’s poetry also insists on nearness
              - ‘I,’ ‘you’ and ‘we’ surround the reader as she is increasingly embedded in the personal address. This address reaches an early climax
              in the eight-page ‘The Motor Car: A Personal History’, which delivers on the promise of its title through a catalogue of cars that have
              come into the speaker’s life. It’s part David Copperfield, part confessional poem: I was three, if I’m correct, when I saw parked in the
              street what we now owned - a Morris Minor, green as leaves... There’s a lovely unreliable charm here that is consistent with the collection’s
              allergy to seriousness, even as the task of personal reconstruction invites unflinching rigour. The playfulness applied to these undertakings
              is underscored by Sant’s subtle half rhyme, which appears throughout the poem: ‘Number plate / 177 EMG. It was code // to enter the quick,
              slow / everlasting story of British roads.’ Yet the poem is no folly. The tone is often self-deprecating but the method is attentive and
              thoughtful: ‘Skip some years - the panic attacks / in traffic jams. This / is an accelerated, partial history.’ Charting a life through
              this conceit is fruitful and constructive, illuminating the speaker’s impatience with stasis as the verse careens from one vehicle to the
              next. Appearing at the end of the collection, the title poem literalises the crisis of Sant’s mobility narrative. The theft of the speaker’s
              bicycle brings about a moment of truth, or at least a confrontation with what stasis might signify. The drama of ‘The Bicycle Thief’ unfolds
              in casual class-phobic speculation (‘You know the type. He needs a bike’), but as the poem develops, it locates the problem of mobility
              precisely at the intersection of class and race in suburban Australia. Although the speaker is initially helpless before ‘[t]he absence,
              next to the wall, / […] exactly the size / of my bike,’ it is the young man who is profoundly stuck, caught by the web of class and race
              expectation: ‘You’re a bad lot, you Muldoon’s, corrosive.’ The bicycle thief becomes the speaker’s fantastic other, upon which accelerant
              desires may be projected but perhaps poignantly left unfulfilled: So is getting in various measures, quickly, fame, the girl, and the money
              - with my best wishes. The gesture of good will here is earnestly made, signifying a transmission of romance - a young man’s wild dreams
              - across generations. Perhaps this exuberant paternalism is a major feature of the collection, Sant’s twelfth. But it is no easy task to
              decide upon one defining aspect of what is a pleasingly loose gathering of works, which along with mobility pursues themes around loss,
              ecology, temporality and personhood. This last is richly explored through recurring figures of anthropomorphised animals and animalised
              humans, mixed in poems such as ‘Animalia’, ‘Loose at the Zoo’ and ‘In the Villa Gorilla’. Sant’s framing of women is at times unsettling,
              where, rather than the bicycle thief, it is an abstract ‘woman’ so often poised to doom the dream of mobility. Nowhere is this more apparent
              than in the tongue-in-cheek ‘The First and Last Ballad’: I lived with a woman in a luxury flat where she criticised this and she criticised
              that In strict abcb form, the poem is the only piece in the collection that adheres to full rhyme, and the cyclic effect is claustrophobic
              and deadening. Is this playful sour grapes, or a more pessimistic broad view of the feminine? Overall, the collection is a wide-ranging
              account of a rich life, awake to the possibilities of unfettered energy, but ironical, self-deprecating. But for all the doubts aired Sant
              writes with confidence and charm. The first line of the collection, in ‘Lost Things’, cannily predicts the fate of The Bicycle Thief in
              a moment of reflexivity: A book, often lent to whom? Some friend! This is characteristic Sant - warmly welcoming his reader to the mischief.
              The Bicycle Thief presents Sant’s delight with the possibilities of language in transit, language as vehicle. This is poetry for lending,
              sharing, travelling – this collection wants to move."
        - title: Westerly Review
          text:
              Aspects of Australian Poetry in 2012 Michelle Cahill Westerly, Issue 58:1, June 2013 Andrew Sant’s twelfth collection The Bicycle Thief
              is a witty, lyrical exploration of travel, transit and writing as forms of exile from existential gloom as well as from the inescapably
              mundane. From its opening verse ‘Postcard to Hamburg’, with its intrigue of names, nouns and addresses, somewhat redolent of Derrida’s La
              Carte Postale , human meanings and connections occur accidentally and are postponed by writing. Childhood, in a fabled tableau of poems
              like ‘The Motor Car’, is satirised, ‘Tame as a cliché, made/for postwar, predictable British / Sundays.’ Collusions between travel and writing
              are acknowledged in many poems juxtaposing remote tundras or geological terrains with the digressions and exaggerations of words. In ‘Speed
              and Other Liberties’ the speaker seeks ‘liberty to finish the new book quickly’ while ‘Addicted to Islands’ interplays a multiplicity of
              destinations, dalliance and parenthetical departures. Poems like ‘Animalia’ and ‘The First and Last Ballad’ are humorously misanthropic
              in tone, yet overall The Bicycle Thief is a refined and most enjoyable collection to read.
        - title: Sydney Morning Herald Review
          text:
              Classy vehicle for entertaining verse Geoff Page Sydney Morning Herald, 8 June 2013 Andrew Sant moved with his parents from London to
              Melbourne, aged 12, in 1962 and has since lived in both countries for long periods. His work has been published more widely in Australia
              than in Britain but it retains a distinctly English flavour. This is felt mainly in its low-key, rather formal wit and its alertness to
              class. A good example is seen in ‘The Motor Car’, an eight-page sequence detailing his (mixed) experiences with nine successive cars, starting
              with his parents’ Morris Minor in the 1950s and culminating in ‘A Datsun. Sunflower yellow. Automatic / gears. Tragic.’ Most of the sequence
              is light-hearted but there are deeper moments, too. The same seriousness-amid-jokiness can also be felt in poems such as ‘Animalia’ (where
              at the London Zoo there are ‘once swift giraffes, / above it all, with a prime view of Regent’s Park’) or ‘In the Villa Gorilla’ (where
              an unusually intellectual gorilla is ‘working on a thesis about / why non-human creatures feature strongly / in kids’ literature, and in
              adult,/ weakly’). Technically, Sant is something of a formalist, though it is only in ‘The First and Last Ballad’, written in anapaestic
              dimeter with an abcb rhyme scheme, where this is explicit. (‘I lived with a woman / in a luxury flat / where she criticised this /and she
              criticised that’.) More typically, Sant prefers to scatter rhymes and half rhymes through roughly iambic lines of unequal length. Again,
              this playing with formality has a slightly self-deprecating ‘Englishness’ to it. Something of the same tone is heard in Sant’s impressive
              10-page poem, ‘The Bicycle Thief’. Though the poem is set in Melbourne, there is a considerable ‘Englishness’ to it, best shown in the narrator’s
              playful awareness of class. We note particularly the difference between the somewhat diffident, self-ironising middle-class narrator who
              owns the bike and the criminal ‘underclass’ boy who light-heartedly steals it. The vehicle in question, ‘a ten-speed Wanderer, blue’ had
              been ‘Passed / on to me, free, to see / if I’d again take to riding - the likely / final owner. Wrong. It was gone. / The sun shone on the
              spot / where I saw it not / in actuality but in the shape / of my dismay.’ The narrator then visualises, in extensive and persuasive detail,
              just what the thief is doing, moment by moment - along with his various ambitions, his family situation, his ingrained (perhaps congenital)
              criminal habits and so on. Without saying so, Sant’s narrator implies that the thief has, in effect, done him a favour, forcing him (the
              narrator) to think more deeply, even empathetically, about a class of people he normally has little contact with. In the process, the young
              thief has generously, if unconsciously, provided the inspiration for a well-sustained poem with which to finish an already entertaining
              and effectively idiosyncratic book of verse.
        - title: Australian Book Review Review
          text:
              "Mystery Agent Martin Duwell Australian Book Review, No. 352, June 2013 There are some poets whose works only seem to come alive when
              seen in the light of their other poems. Andrew Sant may well be one of these. A Sant poem, read on its own, can often seem thoughtful but
              rather lightweight; embedded in one of his books, given a context by the surrounding poems, it becomes animated by a set of consistent themes
              and obsessions. Take, for example, the first poem of this new book, The Bicycle Thief . ‘Lost Things’ seems initially no more than a genial
              look at the way everyday possessions go missing. The most that could be said for it, on a first reading, is that it works by engaging one
              of Western literature’s greatest themes - loss (the way heroes, loved ones, and objects all eventually pass into the dark) - and, by providing
              homely, domestic examples avoids the temptation of being overblown. But ‘Lost Things’ turns out to be concerned not so much with loss as
              with perspective. As Sant’s poem points out, nothing really gets ‘lost’; the keys, socks, umbrellas, watches of the world simply inhabit
              a different space. It might be true that we cannot find them, but that is our problem: ‘All those / nose down searches only concern / fresh
              products of perspective.’ And perspective is one of the themes that runs through this book. Another is energy, (expressed even in the titles
              of his two previous books, Speed & Other Liberties [2008] and Fuel [2009]) and a third is metamorphosis, another classic theme of Western
              poetry. This book’s title poem appears last and, together with ‘Lost Things’, nicely brackets the rest of the poems. It is a whimsical 300-line
              narrative about a particular lost thing, the author’s bicycle. As with the other poems, you have to read it in the light of the whole book
              for it to make much sense or, at least, sustain its length. The poem follows the stolen bicycle’s existence after the act of stealing; after,
              that is, the moment at which the author’s own perspective becomes irrelevant. We see how the bicycle lives on in the possession of its thief,
              taking him through the obsessions of his life: the girl at the chemist; the aunt and uncle who can provide some cash; the brush with the
              police, and so on. We feel that the energy of the bicycle’s existence somehow carries it beyond the author’s life into its own poem, where
              it is ready to keep a different person moving. It is all a matter of perspective, and Sant makes sure that we don’t miss these implications:
              The absence, next to the wall, was exactly the size of my bike. So let me fill you in. ... It is me, not him, the monkey, who is missing
              from the scene... ‘Deserter in the Counselling Room’ deals with a husband who disappears. From the perspective of the abandoned wife he
              is lost, but the counsellor tries to see things from the man’s perspective, whereby there is both guilt and a certain rightness in his actions.
              ‘Arrangements in Transit’is a summary of all the attractions of travel to an inveterate traveller, a reminder that travelling is a controlled
              kind of becoming lost, involving the jettisoning of all possessions apart from the essential - the ‘nomad’s weight’. The other poems of
              the book usually embody one or more of these interests: energy, change, perspective. In ‘Postcard to Hamburg’, a ‘lost’ stamped postcard
              is popped into a letterbox so that it will arrive to the amazement of the sender. It is suggested that this will seem an example of those
              quantum-physics paradoxes whereby an object will be in two places at once, but the author’s real interest is in the way in which he, the
              finder and poster, becomes an absent ‘mystery agent’. ‘Beating the Chinese’ describes, on the surface, how the author, harnessing his energy,
              does well at table tennis against Chinese who are waiting for the announcement of the site of the 2008 Olympics. But it finishes by dwelling
              not on insubstantial table-tennis balls but on the wrecking balls that will soon, harnessing the same energy, demolish suburbs to prepare
              for the infrastructure. It is no surprise that when autobiographical material emerges it appears in the form of transformed energy and speed.
              ‘The Motor Car’ is subtitled ‘A Personal History’ and follows the author’s numerous cars (before they are abandoned for a bicycle). ‘Speed
              & Other Liberties’ describes being pulled over for speeding in Iceland while needing both speed and liberty to finish the book of poems
              that gives its name to this poem. Stone is another locus for Sant’s interests, and a number of poems look at it as geological process focusing
              on the inhuman perspectives of geological time - ‘How fleeting // and small our comprehension seems.’ ‘Mudlark’ revisits ‘Lost Things’ dealing
              with somebody who is ‘nose down among detritus. The motive is the search for objects of contemplation, granted that status because they
              provide tangible clues ‘to the past doings of his gene pool’. We find these solidified icons in the fossil of ‘Marine Desire’ as well as
              in the pebble picked up in ‘Thirroul’. Almost all these poems can be read as homely and genial visits to the wells of conventional themes,
              but that doesn’t do them justice. They blossom in the context of the surrounding poems, making Andrew Sant one of those poets of whom it
              is better to speak of their collective poetry rather than their poems."
        - title: Critical Survey Review
          text:
              "The Bicycle Thief John Lucas Critical Survey (UK), May 2013 Andrew Sant’s new collection is seriously good. It combines the fleetness
              of intellectual movement which is habitual to his work with a perceptiveness - of the human and natural worlds - that has about it such
              grace you feel that, different in many ways as her work is, Elizabeth Bishop would not only approve of The Bicycle Thief , she’d delight
              in it. She might even envy Sant’s ability to master the art of losing - though admittedly her sense of loss (or losses) comes with an emotional
              freight he doesn’t tote. Which is as much as to say that he’s more connoisseur than participant in the various scenes and circumstances
              about which he writes. But this isn’t intended to imply that he’s in any sense the heartless onlooker. If anything, he’s a celebrant of
              the quotidian, of whatever happens to happen. It’s this that tells him to stick with his instinct for keeping on the move, physically, emotionally,
              mentally. As he says in ‘Addicted to Islands,’ ‘each destination/[was] a welcome escape and, sadly, // a possible trap. The tricky / as
              an adult he admitted, was not to OD...’ The elan of these lines, their nimble pace, is inseparable from an acknowledgement that the ‘trick’
              of knowing when to choose is a kind of games-playing, and that the wrong move can mean depletion. A rolling stone may gather no moss but
              stoniness isn’t especially desirable. The really important trick, therefore, is to stay open to experience. In registering this, Sant shows
              himself to be the heartening opposite of those who, swallowing the post-modernist aridities of self-referentiality, see in the world only
              the nothing that is not there and the nothing that is. The opening poem of The Bicycle Thief , ‘Lost Things,’ sets the template for what
              is to follow. A wry, defiantly dandiacal take on what falls away from us, the detritus of our lives - ‘So many phones, bags, umbrellas’
              - becomes a kind of synecdoche for human consciousness ‘All those/nose down searches only concern/fresh products of perspective.’ And the
              poem that follows, ‘Postcard to Hamburg,’ which seems at first blush an inconsequential anecdote about how the narrator picks up and posts
              a card someone had inadvertently dropped, neatly avoids the opportunity for a heavy-breathing meditation on Chance - ‘me, a mystery agent
              (call me Fate)’ - while delighting (that word again) in fortuitousness. It’s this which leads him in ‘Performance’ to celebrate a man who
              is ‘singing / under an ugly bridge’ and who must be doing so for the sheer joy of it. ‘He ignores / the walkers, and none / wants to be
              caught standing in front / of his storming performance.’ ‘Only the wasteful virtues earn the sun,’ Yeats proclaimed. There is no Yeatsian
              grandiosity in Sant’s quizzical take on this street performer, but there is an uncensorious pleasure in the registering of his singing which
              is cherishable because, to use a word I don’t often want to be found indulging, it is so humane. In a book crammed with excellent poems
              it’s difficult to point to any without feeling that others deserve equal attention. Still, here goes. There is, for example, the funny,
              laconic and not quite tongue-in-cheek ‘The Motor Car A Personal History’, with its confession of how, having been given the ignition keys,
              ‘Repeat, eight times... I’d had it // with old Volkswagens... // another smoking engine, then a bang, / Hitler’s vehicle, globally / at
              home, fit for scrap.’ There’s the Kees-like ‘Deserter in the Counselling Room,’ in which the observer notes a man ‘slipping out of the uniform
              / - the way he saw it - of marriage,’ and in whom, letting his imagination run free in a manner novelists might envy, he sees ‘in his genes,
              restlessness, a line / of bolters dating back to a medieval village / long since flattened... // a forebear itching to settle / on whether
              to fight for King / or Cromwell, and then escaping / into the privations of a dense forest.’ Escaping into privation - the characteristic
              twist of wit. Equally characteristic, equally poised, ‘Mr Habitat’s Birthday Candle,’ ends with the protagonist reflecting on ‘the time
              and place where / in effect, I crash landed in the dark // blow out an annual candle, imagine / weirder planets on which to get stranded.’
              But perhaps first among equals in The Bicycle Thief & Other Poems are ‘Homage to Warren Zevon,’ and the title poem. Between them, these
              two poems not only encapsulate the book’s virtues, they encapsulate the virtues which Sant so dextrously celebrates and, by his sheer skill
              as a maker of verse, endorses. Today I’m going to be a tough guy in a leather hat and shades, surprise myself without a flick-knife, go
              white, increase my heart-rate, threaten further inner retribution; hang out later, with Warren, my newest and now best mate. ‘Even in bed
              I pose.’ Thom Gunn’s famous opener is here echoed by a poet whose instinctively assured handling of assonance (guy, surprise, knife, white)
              has the virtues associated with the best song writers, among whom apparently the soon-vanished Zevon was to be numbered. I wouldn’t know,
              any more than I can follow the blizzard of names of those ‘who get by well enough without // the encumbrance of their surnames,’ but whom
              I assume to be part of the music world fingered in the poem; I do know, though, that this is a model of how to write an elegy appropriate
              for our times: slangily vivid, witty, evocative, and attentive to the subject without plonky rhetoric. The poem ends with the narrator saying
              he intends to seek out the Soho Chinese restaurant whose name, Lee Ho Fook’s echoes ‘your solitary hit - where / a wolf can eat alone, prowl
              the extensive menu / for beef chow mien and then, in character, howl.’ Prowl/howl. Being in character means keeping your wits about you.
              As for ‘The Bicycle Thief’ itself, it’s so unmistakably the goods that to say much about it feels superfluous. A long narrative poem, it
              begins, The absence, next to the wall, was exactly the size of my bike. So let me fill you in. There now, isn’t that the cat’s pyjamas,
              isn’t that a perfect way to reel any reader in. And does anyone need to have the adroitness of those line-breaks pointed out? What follows
              is a wondrous ruminant tale of how the narrator imagines the thief pedalling off on his own affairs, with his own concerns. Anger, irritation,
              speculation are gradually replaced by a feeling of almost enthralled involvement with the thief’s progress, through the day, through the
              city, through various meetings, the poem an utterly compelling story in verse which ends with the narrator imagining the thief as he comes
              to a bike shop and sees outside the ‘super model he longs for.’ But, having checked the price, he ‘looks recklessly / down on old reliable
              between his legs, / and thinks, honestly why bother? / He’s right. She’s most impressive. / So is getting in various measures, / quickly,
              fame, the girl, / and the money - with my best wishes.’ An urban pastoral, is this what this marvellous poem is? Perhaps, although I don’t
              want to trap it in terms that make it a herd animal. It’s out on its own. Simply the thing it is will make it live."
        - title: Weekend Australian Review
          text:
              "Poets at home in the natural and manufactured worlds Ali Jane Smith The Weekend Australian , 27 April 2013 As one of the founders of
              Tasmania’s Island magazine, a survivor in the uncertain world of Australian literary journals, Andrew Sant’s place in Australian literary
              history would be assured had he never written a line of his own. In fact, his published collections of poetry run to double figures. The
              Bicycle Thief & Other Poems opens with ‘Lost Things,’ a poem, at first reading, intended to amuse. As we will learn later in the book, Sant
              is an admirer of the American poet Elizabeth Bishop, so ‘Lost Things’ must stand against the background of her villanelle ‘One Art,’ and
              its refrain, ‘the art of losing isn’t hard to master.’ Bishop’s poem begins with trivial things but closes with the loss of a loved person.
              While Sant does not refer directly to death, his poem is haunted by ‘One Art,’ and as the collection unfolds we do learn of a profound loss
              experienced by the figure at the centre of the poems. How to read, then, the closing lines of ‘Lost Things’? Nothing’s lost, intrinsically.
              All those nose down searches only concern fresh products of perspective. Is the poet referring to some abiding presence after death, or
              is he thinking only of material losses: keys, books, wallets? I lean towards a metaphysical interpretation, given his treatment of the material
              world in his long poem, ‘The Motor Car.’ The enthusiasms and difficulties of car ownership, the love and frustration played out between
              fathers and sons over the family car, the car as courtship display and as a repository of secrets, are among the byways travelled here.
              Subtitled ‘A Personal History,’ this piece will perhaps be most enjoyable for readers of a certain age who share Sant’s memories of makes
              and models: the poem does not resist nostalgia, though eventually the owner of a string of Morris Minors and Volkswagens becomes disillusioned
              with cars, which have become: - pests wrecking a planet made, where it’s flat to accommodate easy perambulation. A highlight of The Bicycle
              Thief is ‘The Other Life,’ a poem in which the road not taken is spelled out in detail that is humorous and sad. Central to the poem is
              a migration that, in the imaginary world of ‘The Other Life,’ never happens. Sant gets this one just right, shifting between everyday habits
              - ‘My father read the New Statesman’ - and momentous events - ‘My mother lived’. Eventually, the imagined other life washes away. Sant clearly
              values the formal qualities of poetry. He uses conventional, though often convoluted, syntax. There are places where it feels as though
              a poem might have been tightened, the sentence structure simplified, but leanness and brevity are clearly not Sant’s style. He writes as
              though for a circle of listeners sinking into their whisky around a fire that has settled into glowing coals, with a chuckle at times, and
              a solemn nod at others."
        - title: artsHub Review
          text:
              The Bicycle Thief Travis Englefield ArtsHub , 5 April 2013 A gorilla imagined as an anthropologist, a lost postcard serendipitously
              arriving where it was always supposed to go, a rumination on the symbolic and practical usage of islands, and a shopping list as a manifesto
              for middle-age. These are just some of the subjects of Andrew Sant’s eclectic new collection, in which he uses a lot of words to construct
              a kind of prose poetry which perfectly enunciates the quirks of being a curious boy in the body of an aging poet. If the objective of The
              Bicycle Thief is unclear, it’s certainly not for an evasion of meaning or a dearth of ideas. Sant insistently (and sometimes literally)
              leaves no stone unturned in creating lyrical portraits of his Wes Anderson-like worlds. It’s just that between the autobiographical tales,
              the ruminations on history big and small, the memoriams, the experiments, and the dalliances with the offbeat and fantastic, it’s hard to
              get a grasp on the tone, the subtleties, of where the work is coming from. A place to start might be the poems bookending the collection
              - ‘Lost Things’ and the titular poem. ‘Lost Things’ ponders the lives activated by spaces all the lost, forgotten and missing things open
              up, while ‘The Bicycle Thief’ begins with the narrator’s factual bicycle and ends several suburbs, generations and social classes away at
              the hands of its fictional thief. These poems, like much of the collection, to an extent examine the secret lives of the world passed by
              and the secret worlds of lives passed by. This can mean telling a speculative yarn about how life might have been had Sant never emigrated
              to Australia, an unreliable recounting of a relationship, or a reverential yet irreverent vignette about time spent at a residence of D.H.
              Lawrence - ‘a shrine / that isn’t , private behind a high fence’. All of which makes for an engaged reader/listener, though often an unmoved
              one. The problem with the collection is twofold. Firstly, Sant is prone to over-telling, to the extent that there is no imaginative space
              in the poems and the poetry is rendered entirely cerebral. That this has no aesthetic function – the phrasing is clunky and rarely memorable
              - makes it doubly difficult to digest. Secondly, there is a conviction that small details denote emotional/intellectual heft, which ultimately
              comes across as a bizarre fixation on banal moments that too often fail to make the intended leap to the sublime. This, combined with the
              juvenile navel-gazing, can make the otherwise riveting subject matter a little trite, Sant often showing himself up as the person asking
              a question just after it’s been answered. Which isn’t to say that the poems don’t have purpose - they are well-conceived, playful explorations
              of the distance from the quirky to the eternal, and resonate with an intellectual clarity which keeps them alive once the excesses of the
              explanations are forgotten. Sant has plenty of wonderful, clever and durable ideas, but they just might be better served by an economy of
              language which gives some credit to his audience’s own intellects and imaginations. Back to top Start of StatCounter Code End of StatCounter
