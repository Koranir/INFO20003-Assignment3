    reviews:
        - title: Ian McBryde, ArtStreams
          text:
              Review The Blue Gate Ian McBryde (poet) ArtStreams , June/July 1998 Alison Croggon’s inaugural 1991 Penguin collection of poetry, This
              is the Stone , made a deservedly clean sweep of the literary prizes for a first book, most notably the Mary Gilmore and Anne Elder awards.
              In the intervening years she has published plays, libretti, critiques, translations and a novel, Navigatio, released in 1996. It is therefore
              with mounting interest that fans of Croggon’s work have looked forward to The Blue Gate , her second collection of poetry, from Melbourne’s
              courageous and prolific Black Pepper Press. From the opening lines of ‘For Ben’, the first poem in the collection, Croggon’s highly individual
              poetic voice lets us know that she is back with a poignant delicate timeliness. The themes of her work range from the observations of mothering
              and children/childhood to adult relationships, love, lust, dreamscapes, and other more veiled, mysterious subject matter. She has an uncanny
              knack for approaching even so commonplace a routine as shopping with original verve and her own stylised approach, as seen in the poem ‘The
              Elwood Organic Fruit and Vegetable Shop’. Who else could end a piece about picking up groceries with such growing excitement, in a rush
              of exclamation marks and lines such as ‘...the marriages which await them! The lips that moisten to meet them! Glorious speeches of the
              earth!’? The poem ‘Nights’ is a series of monochordal lines assembled together in five sections, containing such gems as ‘immense flowers
              bruise your horizons’, ‘my hands have lost courage’, and ‘speech is so fragile, it is as if we have never spoken’. Croggon continually surprises
              and delights with an almost eerily fresh outlook on events and emotions. Never is this poet more intriguing and enigmatic than when she
              moves into more esoteric poetic landscapes, in pieces such as ‘Angels’, ‘Fairytale’ and ‘Ars Poetica’. Her startling imagery and unique
              word combinations inject a sharp twist to the ordinary. The collection ends strongly with ‘Sonata’, a long poem in fifteen sections which,
              while ostensibly about elements of nature, angles out and away from that into other, deeper realms. The Blue Gate solidifies Alison Croggon’s
              position at the very forefront of modern Australian poetry. She remains a uniquely-voiced, assured writer very much in control of her craft.
              Hopefully, despite the current parlous state of poetry publication in this country, we will not have to wait eight years for her next collection.
        - title: Australian Womens Book Review Review
          text:
              Connections & Contrasts The Blue Gate Michelle Mee (poet) Australian Women’s Book Review , Vol. 9, No. 2-3, Spring 1997 As the publishing
              industry gradually prints more Australian women poets, the marvellously diverse nature of women’s voices is heard and can be celebrated.
              The four collections [Ludwika Amber, Our Territory , Emma Lew , The Wild Reply , Sarah Day, Quickening ], discussed in the following, indicate
              something of the fecundity, intensity, method and power of work currently being produced by Australian women writers. Sometimes there are
              connections, other times contrasts... Reading Alison Croggon’s The Blue Gate is a joyful, painful, intense experience. It is written with
              something more substantial than ink, perhaps clotted blood, such is the bright colour and shock of the poems. Other times the sensual explorations
              give pleasure. There is an exquisite, squirming-with-life poem for shoppers - ‘The Elwood Organic Fruit and Vegetable Shop’. There are erotic
              poems, writing of tracery on skin, giving frisson to the mind. A pleasure to be reading them, as the words are printed on flesh, on bone,
              on brain. Yet good feeling is gutted in poems about separation, loss, feelings of incompleteness. There arc many bruises in this collection.
              The voice is strong and insists on stating its pain. Sometimes I felt, reading this volume, that I had fallen into a Venus fly-trap and
              was drowning in the poet’s sensitivities, acuteness. It was an acid bath, and bones remain, memories of intensity and colour. Resonate.
              The most intense birth poem I’ve read is contained in this collection. ‘Nights’ shows us an hallucinatory evening of childbirth where a
              child’s ‘single cry is the axis’. And later child-rearing, in ‘Ode to Walt Whitman’, is gritty, frustrating and occasionally, humorous.
              The Blue Gate is a profoundly felt collection. It is backgrounded by Croggon’s novel Navigatio , a work that rests sometimes closer to poetry
              than prose.
        - title: Poetry Review Review
          text: Borders and Crossings The Blue Gate Katherine Gallagher Poetry Review , Vol. 89, No. 1, Spring 1999 (pgs 83-85) [Text not yet available]
        - title: The Australian Review
          text:
              "The Blue Gate Adam Aitken The Australian’s Review of Books, The Australian , Vol. 3, No. 8, November 1 998 Of these poets, Alison Croggon
              is the most self-consciously analytical and philosophical, almost old-fashioned; Coral Hull [ How Do Detectives Make Love? ] is the most
              political, a poet with a mission. Emma Lew ’s [ The Wild Reply ] approach is the least traditional and probably the hardest to grasp: there
              is little desire to define identity, or use poetry as a vehicle for social protest. The idea of self as the body defines it, alternately
              constructed and undone by eros and agape, is the primary site of consciousness in Croggon’s The Blue Gate . Her language hugs close to sensuality
              and eroticism. It’s as if she has treated the white page as the skin: a permeable site of interchange between ourselves and the realm of
              animate and inanimate matter. This is a book about love’s complexity, its tyrannical pressures, its crisis points, its controlling force.
              As mother and poet she asks ‘who has given birth? and who is born?’. Giving birth is joyful but also catastrophic, breaking the mother’s
              sense of boundaries, tearing skin and organs: I am waiting for what emerges from the white edges of catastrophe that last bleeding note.
              Perhaps poetry compensates for the body’s pain, and the fear and silence we experience in the absence of God. The Elizabethans, Whitman,
              Dante, Rilke, the Latin American surrealists are Croggon’s influences. But too often her high style relies on a restricted range of well-worn
              tropes. At times, she fires off strident assertions: ‘Our language is a bitter struggle towards the child’s speechlessness. / We fail, always.’
              If you agree with this, following the permutations of this book’s ‘endless garden’ will lead you to its primary question: how can poetry
              escape solipsism and still express the self, when ‘all the names you mine out of silence / retreat into the sounds of themselves’?"
        - title: Southerly Review
          text:
              "The Genius of the Reader (or Who’s sitting on the chair?) Alison Croggon, The Blue Gate Bev Braune Southerly , Vol. 58, No. 2, Winter
              1998 Alison Croggon dedicated her first collection of poems, This is the Stone , to ‘the perfect reader’ in the figure of John Leonard,
              someone Gerald Prince might identify as the ‘ideal reader’, the observer of the poem who understands the overt and covert steps set up by
              the poet, someone who has achieved more than what Stanley Fish would call ‘linguistic competence’. Perhaps, this is Umberto Eco’s highly
              educated and literary reader (as must be Jonathan Culler’s), able to determine meaning from the state of closure or openness in a word.
              Or it may be Hans Jauss’s reader - able to slide into a population of endless interpretations or perpetual ‘fusion of horizons ’ quite at
              home in the skins of Hemingway as cast by David Reiter. However we define the person who reads the poem, the poet has to be the best of
              readers because the poet is primarily an inventor. Poets may use different tools, vastly different formulas and blueprints. When we find
              a poet with a unique formula, we often say we recognise ‘the genius’ in the invention, in the affirmation of the existence of a set of objects
              that are as real as, say, a chair in a room... You open the blue gate in the wall of stone If the objects in a poem exist in the same way
              that a chair does in another room into which we have not yet entered, and no less so, discovering its existence is a matter of reading the
              map to its position so that we find the chair. As the composer, the poet is the first observer to enter the room and describe the chair
              to would-be observers waiting outside the room but with little inkling as to how to enter. The fun in finding it, for Alison Croggon in
              The Blue Gate , lies in the chase itself. The chase restores her ‘to many things I lost: a stone trough filled with miniature flowers, the
              privacy of nests in bamboo thickets, a tiny lawn always filled with the voices of books, a blue gate’ (‘Notes’). You open the blue gate
              in the wall of stone and pass through the dense birdhaunted forest ‘Divinations VTH’ Croggon shares with Rainer Rilke the sheer joy of mining
              names out of silence (‘Divinations XV’). She presents her first clues to her world through an epigraph taken from the first of Rainer Rilke’s
              Duino Elegies . The key phrase in the epigraph is ‘ Denn Bleiben ist nirgends ’- ‘For staying is nowhere’. The Rilkean string, endured by
              the quivering arrow, is to be found everywhere in Croggon’s pursuit, her musical background brought successfully to bear on each ‘pure note’,
              each ‘last bleeding note’. Her statements are simple and active, following neat, reverential tracks to lists of questions, open-ended answers
              - the interrogative without a mark. There is no promise in The Blue Gate that you will catch up with her to sit with her on the chair in
              rooms made of stone or to join the head of the hunt through ‘libraries of skin’ (‘Aria’). Her rhythmic territory is the highly polished,
              wobbly chair where the rings of [Andrew] Sant ’s [ Album of Domestic Exiles ] ancient trees string the bow of her arrows to reveal love
              bloodied and divine."
        - title: The Canberra Times Review
          text:
              "Wedding the lyric, and the essay The Blue Gate Geoff Page (poet) The Canberra Times , 30 May 1998 Three alliterative words suggest
              the essence of Alison Croggon’s second book of verse, The Blue Gate - metaphor, metaphysics and motherhood. It is easy to see why this poet
              has sometimes been impatient in her reviewing of the more laconic and mundane verse which tends to comprise our present poetic mainstream.
              With Croggon there has to be something happening in every line. A certain rhetorical level is quickly reached and maintained. Among the
              more obvious, though by now well assimilated, influences on her work are Whitman (for whom she specifically writes an ode), Pablo Neruda
              and Dylan Thomas, all lovers of rhetoric, of catalogues, of metaphor. Counteracting this perhaps are the more disciplined metaphysics of
              Emily Dickinson. Three lines from Crog-gon’s ‘Ars Poetica’ suggest the book’s dominant feeling: ‘Because you have tasted your salt in the
              blood / of another’s mouth, because a small flower / is eating the history of stone’. It’s important to note that Croggon doesn’t actually
              name the flower. It’s always the symbolic, archetypal flower of metaphysical poetry and must remain so. There is no way in which it can
              be a petunia or a dahlia. Despite the increasing prominence of poets such as Peter Boyle and Peter Bakowski who have the same love of metaphor
              and a comparable level of rhetoric, Alison Croggon is now, with this second book, an even rarer voice in Australian poetry than she appeared
              to be in her first, This is the Stone . With Croggon there is always a strong sense of the female - in the love poems, the poems for her
              children and more generally. There is almost always a powerful appeal to the senses of touch and smell, even while she is being intensely
              metaphysical. ‘Somewhere beyond me’ she says in the poem ‘Bird’, ‘is a wholeness, a memory of being stone, although this consoles nothing
              and explains nothing’."
        - title: Quadrant Review
          text:
              "Books Poetry in the Matter-of-Fact The Blue Gate Alan Gould (poet and author) Quadrant , Vo. 42, No. 5, May 1998 A tenuous link between
              the poems of Philip Hodgins and those of Alison Croggon may lie in Rilke. Rilke’s death from leukaemia explains his presence above in Hodgins’
              ‘The Change’. The link is tenuous because I doubt that Philip’s sense of his region and its haeccitas would have allowed him to fully believe
              the last phrase of the quote from Rilke with which Croggon’s The Blue Gate commences: Denn Bleiben ist nirgends (For to remain is to be
              nowhere). In this, Croggon’s second collection of poems, Rilke’s spirit - his emergent philosophy of poetry as that which praises Existence,
              his attentiveness to an art at once precise, sensual, yet (to my ear) peculiarly forced and estranging - has evidently been absorbed by
              Alison Croggon as congenial to her own stance toward the world and the art of poetry. Indeed she pays homage to the German poet in the fourteenth
              section of her ‘Divinations’, and the first three lines might be describing her own enterprise. You spoke out of that deep cleft, sexed
              and unsexed, where carnivorous petals caress the strangeness of dream - but what nocturnal meetings deliver you here, emptied so finally
              of yourself, poet whose gaze was self torn by sight What follows in this poem is an interior, half-hallucinated landscape, and while it
              is not life-drawing in the Hodgins manner, it is a credible and properly fluid background on which to pay homage to the German poet. She
              meets him, as she says, nocturnally, and many of Croggon’s landscapes are nocturnal, the effect of this darkness being to narrow and intensify
              our sensation of the poet’s singularity. Rilke and his Weltinnenraum are one of her resources. The Elizabethans and metaphysicals are another,
              with their confidence that wordplay, paradox, conceit, are the wherewithal of passionate discourse. Take this from her sequence of four
              ‘Sonnets’. Let me say without self-pity, that I love a man who loves me more than sanity can bear, who’s so afraid he will our love abhor
              and give to others most of what is mine. What of his cock? What of his private kiss? They’re mine by right of pleasure and of pain, and
              should he prick his gentle braille upon another’s flesh, how blind is my caress which reads him true, and feels within his eyes fidelity
              more deep than his betrayal. I like the forthrightness of this, its headlong, Donne-like enjoyment of the argument. But more, I like its
              courage. It is brave, not only for the unfashionableness of what it says, but for its welcome of the idea that a tactful observance of the
              resources from within the canon is no hindrance to making utterance fresh or insight topical. Like Hodgins, Croggon does not repudiate a
              canon simply because some of it has been curriculum, and this fact endows the works of both with a sense of their being thoroughbred, of
              their finding strengths in the art of their antecedents in order to make an art of their own that is strong. These sonnets show Croggon
              at her most confident, I believe, because the rigour of form, and her use of metaphor as the instrument with which to argue, give her thoughts
              on the perplexities of love, or the intriguing genetic echolalia of creating children, their edge and temper. There’s much in The Blue Gate
              which treats the subject of conceiving, carrying, and giving birth to children. As with Rilke, one has the sense in Croggon’s poems that
              in the very representation of multiform, blind Existence lies the praise. Her gynaecological imagery in poems like ‘For Ben’, ‘Ultrasound’,
              ‘Bearing’, or the very elemental ‘Cuneiforms’, is persuasive in its depiction of pregnancy’s sensuousness and vulnerability, its associated
              longings and anguish, its tense consciousness of self and the imminent other self. She does allow herself some out-of-body moments, when
              the fierce nucleus of the self relaxes into an interval for the celebration of detached things. The poem called ‘Bird’ is one such, as well
              as this deft pastiche from Christopher Smart, where she conjures a particular organic fruit shop: I will go walking... to the Elwood Organic
              Fruit Shop... for mignonette purses its frilly lips and snowpeas pout their discreet bellies and the melons hug their quirky shapes under
              their marvellous rinds. for onions ringing their coppery globes and o the silver shallots and the hairy trumpets of leeks for the cabbages
              folding crisp linens and the broccolis blooming in purple tulles and the dense green skirts of lettuces... ‘The Elwood Organic Fruit and
              Vegetable Shop’ For all the tense deliberation in the poems of The Blue Gate , I found two grounds of dissatisfaction. Firstly, I became
              impatient wherever I felt the densely metaphorical idiom was overstrained. In the fifteenth ‘Divination’, for instance, we are informed
              ...this vine winding our bones rustles ceaselessly in absent winds. A vine rustling in absent winds? Is that ‘absent’ as in absent-minded
              or as in absent? The adjective is careless of clarity and this carelessness is symptomatic of a tendency throughout this volume. It betrays,
              I suggest, a kind of lyric impulse too zealous for a strangeness of sense, with the result that it deprives some poems of common sense.
              This aspect of the lyric impulse has the further result that The Blue Gate offers too little relief from the poet’s private chamber. Certainly
              it is a chamber where, on occasion, the reader is given telling insights into the immediacy and complexity of a particular woman’s experience
              and relationships. But elsewhere, in poems like ‘Muse’, ‘Lunar’, ‘Notes’, ‘Ars Poetica’, the imagery of private reference confines and oppresses
              the reading experience because the thick layer of metaphorical usage restricts rather than liberates a meaning that we, the readers, can
              share. We are let in, but not let out. This leads me to my second discontent. There is a poem called ‘Pause’ which is in the form of a mantra
              about the simultaneities possible within the heedless moment. Again the act of representing the overflow of reality in any given moment
              is the act of celebrating that reality. And its haphazard has some momentum: Within the undivided moments A train stops on a bridge A woman’s
              finger touches the rim of a man’s mouth A child hides in a secret place and counts his collection of stones A general tells his soldiers
              that justice is not possible... ...A lie becomes a truth and then a history... A baby tastes an orange for the first time A soldier stamps
              on the hands of a little boy... ...Magnificent lords of cloud reveal again beauty no one can see. It was the fifth, eighth and last lines
              I balked at. Sure, they were plausible, but unfair. Does no-one see that beauty in the clouds, not even the speaker who draws it to our
              attention? Then again, can our epoch never give generals any moral characteristics that will pleasantly surprise us? I decided to change
              the lines round. Thus line eight became ‘A little boy stamps on the hands of a soldier’, whereupon I had a reversal that was equally plausible,
              more arresting, and (I think) more sociologically telling for such trouble spots in the world as Ulster or Jerusalem. Such tampering with
              a finished work is mischievous of me, but my criticism of Alison Croggon’s poem, and a shortcoming in this book generally, is the lack of
              precisely this connection with quotidian particulars. Hodgins’ poems have this connection, occasionally to a prosaic excess. But it is the
              attribute which allows a poet to transform the matter-of-fact into the poetic. It is, if you like, the point at which photo-journalism contributes
              to the personal vision. So I find myself taken with many of the qualities of Alison Croggon’s poetry, the fierce independence of her viewpoint,
              her facility for witty metaphorical argument and sensuous realisation, her dedication to craft. At the same time I’m quite certain my interest
              would have been more fully engaged had the world’s matter-of-factness infiltrated her personal account of things to give the poetry an ampler
              sympathy and justice."
        - title: Social Alternatives Review
          text:
              "The Blue Gate Gloria B. Yates Social Alternatives , Vol. 17, No. 2, April 1998 First, don’t be put off by the drab cover. Black Pepper
              Press should realise that a boring glossy cover is wasted. Any class of HSC art students offered a prize of fifty dollars would produce
              a better picture than the purple square on a dark background which fails to tempt you to open this book. Secondly, don’t be put off by the
              inane quote from Les Murray on the back. Almost anything he says nowadays is regarded as holy writ, even these are nuisances. But the poem
              is redeemed by its last verse where Alison Croggon speaks plainly, effortlessly: Yet still I wish for you an inexhaustible love, the fruits
              of every season, a sure voice to name them, shelter when you seek it and the sixteen winds to call you from yourself back to this first
              ocean... The second poem, ‘Ultrasound’, is better - ‘I’ve seen its nameless face / lit on a sonar screen... the clean / bubble of its skull,
              its budding fingers, / its black mouth innocent of words, / its coruscating fearless heart.’ And the opening line from ‘Aria’ is unforgettable:
              ‘Because you love me, I fear the angels will be jealous...’ The poem ‘Pause’ excels by using the simplest, most effective images: Within
              the undivided moments A baby tastes an orange for the first time A soldier stamps on the hands of a little boy A man loses his mind in the
              endless garden. The four sonnets are excellent. They have the instant authority of the greatest Elizabethans, though the themes are modern
              indeed. Perhaps she’s missed her century. The temptation to quote them must be resisted because each line is so closely interwoven with
              the others that it would be an offence not to present each sonnet in full. And as we read on the book continues to irritate and simultaneously
              evoke admiration. Some poems are so choked with images that one longs to shake the writer and say, Wait! ‘before each breast unfolds into
              its hour of light’ and becomes ‘heavy grapes that swing aside their cloistered sun from inattentive lips’ - Hang on, what do think your
              readers are doing? our minds can’t jump around like jazzed-up kaleidoscopes. By this bombardment of metaphors nothing is gained for reader
              or poet; we need time to appreciate each image and trust the poet - you make it sound too much like a series of conjuring tricks. Nevertheless
              sometimes this plethora of imagery succeeds. ‘Lines on Human Grace’ certainly hits the jackpot. So my favourite poem from The Blue Gate
              is not one of those that glitter with conflicting images but the lovely and totally original piece, ‘The Elwood Organic Fruit and Vegetable
              shop’: for bawling children are solaced with grapes and handled to leave no bruises for the man goes are soft yellow thighs and the strawberries
              klaxons of sweetness... for peaches like the breasts of angels and passion fruits hard and dark and bursting with seed in your palm for
              the dull gold flesh of pontiacs and knotty umbers of yams and new potatoes like the heels of babies for the tubs of sweet william and heartlifting
              freesias and orchids as damp and beautiful as clitoral kisses... how they nestle up the vegetables, promising them the fruits of their ardour!
              There is more, much more, in this poem. Read it and I guarantee you will never pass by vegetables again without admiration. For many poets
              can write of love and despair, but Alison Croggon is the only one I’ve ever encountered who can sing of lettuces, broccoli, onions and ‘the
              hairy trumpets of leeks’. She has learnt what she calls ‘the glorious speech of the earth’. Don’t be put off; do buy this book."
        - title: Overland Review
          text:
              "The Seductive Microcosm Alison Croggon: The Blue Gate Jennifer Maiden Overland , No. 150, Autumn 1998 Another cage - this time of subject
              matter - is suggested to me by Alison Croggon’s The Blue Gate . I had heard very well of this writer and was indeed avidly impressed by
              her clear, deliberate vocabulary and intense expertise in spacing and timing - as in ‘Song’, which begins ‘There is a flower / made of eyelids
              / there is a moon / which scythes the ripples / of a black river / and then nothing’. There is a circularity in her themes, however - a
              recurrence of elemental things, broken loves, legends, children, birdsong - as if all were brilliantly frozen in a lyricism which makes
              me wish the blue gate would open more often. There is a wilfulness in such perfection and it will become quite admirably the wilfulness
              of wider, wilder art."
        - title: Sidewalk Review
          text:
              "The Blue Gate Allison Croggon Jason Sweeney (poet) Sidewalk , No. 1, 1998 Like a list I try to order some kind of response. At random,
              in order of appearance... Ultrasound : the unborn (yet) unshaped ultrasound techno-screen star, anticipation of a bluegreen figure. Bird
              : a skeleton withholding it’s memory. Aria : a fear of love, the interminable truth of closure, nothing ever lasts, we might as well sing
              operas, this libretto over dinner. Pause : there’s horror out there, a million untold stories, bleak moments, a collection of beautiful
              atrocities. Elegy for Children : shaped into things (out of the ultrasound, into sight, flesh), signs of things, being things, bodies born
              out of innocence, still shine in your head. Nights : in flat darkness there are, or seem to be, no words, so much fear and the accent of
              pain. A hundred thoughts, grand scale, manifested in half-sleep and a poem is written. Fugue : poetry, I think, is about articulating the
              intangible. Or is that the reviewing of it? The Elwood Organic Fruit and Vegetable Shop : ah, the language of food, to see and eat, something
              tangible and of flesh. Angels : Croggon, she’s opening the sky, spilling hymns, saviours in lines of words, silent on the page, new children
              are angels, another elegy, boosted spirits. Lines on Human Grace : remembering sex and body and sweat and the ringing in your ears, what
              can never be a total picture but snapshots of an erotic moment, bodies as plates to feed off, consumption, politely. Shark : my friend is
              made nauseous by the sight of sharks, so there are prayers and poems, psalms even, a litany loaded with oceans of death, regret, possibly
              life. Sonnets : flesh, anger, loss transferred - what of his (now absent) body? his cock? what’s his? what’s yours? Limbo : cycles like
              words, a body remembers pain then fears it, remembers words then loses them, recites poetry to a crowd, gives life to it. Fairytale : breaking
              into a dollhouse, in an ugly city of gilt-edged mirrors, all cracking, we find fantasy and strange reality collide [here]. Notes : footnotes
              from a broken heart, burnt tongues of desire, scolded in fact, there’s bleeding and blood-letting. Letting the words seep through. Something
              to hold. Croggon gives the reader a remarkable glimpse into horror and purity. The shape of words to come."
        - title: Coppertales Review
          text:
              Layered Lip after Lip The Blue Gate Debbie Comerford Coppertales, A Journal of Rural Arts , No. 5, 1998 (pgs 117-118) [Text not yet
              available]
        - title: New England Review Review
          text:
              "Alison Croggon, The Blue Gate Jack Bedson New England Review , No. 7, Summer 1997-1998 Black Pepper press in North Fitzroy is among
              the current crop of small non-commercial publishers putting out attractive paperbacks of new Australian poetry with the assistance of the
              Australia Council. In these two 1997 titles by Alison Croggon and Hugh Tolhurst [ Filth and Other Poems ], Black Pepper shows us it can
              appeal to very different palates… Alison Croggon is a writer not shy of a challenge. Besides poetry published in Australia and overseas,
              her biographical note lists an output including journalism, plays, libretti, translations, editing and criticism. The title of this, Croggon’s
              second book of poems, The Blue Gate , is part tease, part clue, and partly an opening into secret gardens of spiritual and imaginative possibilities.
              And yes - childhood and the past. Croggon’s impulse is to go through the material world to inscapes of secrecy and darkness, and to open
              it up to a sense of higher nature. The book is riddled with gnostic and Manichean symbolism. Don’t bother looking up your Dictionary of
              Philosophy and Religion - I’ve got mine open. Gnosticism was a sect of the early Christian church that was into dualisms between good and
              evil, light and dark. Materialism is evil and the spiritual world is the realm of goodness. There are angels everywhere, sort of gremlins
              who emanate from God, but help spread darkness. There’s a Great Mother who gives birth to the angels. There’s a Primal Man who comes to
              make war on darkness, is partly vanquished but sets himself free. Now, the Gnostic elect could get out of the shit and lift themselves up
              towards God through appropriate knowledge and ascetic separation from the lower world. The union of the Great Mother and the Primal Man
              signals salvation. One of the bits I like about Manicheanism is that even at the inanimate level (rocks and stuff) there is light to be
              released from darkness - it streams towards the higher regions by a ‘Pillar of Glory’. I’m only going on about all this because it’s all
              there in The Blue Gate , (I’ll let you wonder what Alison gets up to on a Saturday night). There’s angels, wings, darkness, heaven, clouds,
              dreams, night, birth, and people and things opening up to light and revelation You open the blue gate in the wall of stone ...into the distant
              summer. ‘Divinations VIII’ this book of changes, dissolvings, transformations, fluidity between inside and out, between people and nature.
              Many of the poems resolve themselves in a final movement towards light, nature, sublimation, or sensual epiphany, towards final images of
              air, breath, wind, ocean, love, and sun. Gnostic material is not the point of Croggon’s poetry, it is simply one strand, one starting point,
              in her creative mill. Other starting points are the poetic tradition and musical forms - the ways that art works, what it can articulate
              and what it fails to articulate, the inexpressible, white space and silences, unfaithful translations ...your crumbling words, unable to
              hold even one drop of light. (‘Ars Poetica’) Part of Croggon’s experiment is in line with the modern effort to get maximum expression and
              referentiality with few words - words as ciphers, cuneiforms, red fist, nose, coney, eye, moody orchid, (‘Cuneiforms’) Even in the titles
              she gives her poems, three-quarters of them are one word only: ‘Bird’, ‘Aria’, ‘Pause’, ‘Nights’, ‘Fugue’, ‘Angels’, ‘Lunar’, ‘Sonnets’,
              ‘Limbo’, ‘Elysium’, ‘Riddle’, ‘Sonata’. These are blue gates, opening into a world rich with possibilities. Never a reductionist, Croggon
              believes in flowering open."
        - title: Ulitarra Review
          text:
              "A Dense, Word-Haunted Forest Alison Croggon, The Blue Gate Martin Langford Ulitarra , No. 12, 1997 The ‘blue gate’ in the title of
              Alison Croggon’s second book of poems is an entrance to the ecstatic and the marvellous, and much of this book is an attempt to find words
              for the related ecstatic worlds of love and art. Perhaps its central tension is that paradise both must and cannot exist: a duality stalked
              and paralleled by the not unrelated paradox that art both attempts to capture some sense of ecstasy (‘crumbling words, unable / to hold
              even one drop of water’: ‘Ars Poetica’) yet also contributes to the vision of paradise in the first place. It is not surprising that the
              collection is prefaced by a quote from Rilke. At its best, some excellent poetry is produced by these tensions. Croggon’s craftsmanship
              is sufficient to enable her to say what she really wants to say, and the poems are impressive for their honesty. Look at the wonderful balancing
              act in the word ‘loosens’, for example: In the simple gardens the orchards of hair and sweat mesmeric with dapple and beehum where birdbreath
              tunes its delicacies and the skeined senses tumble out their embroideries the eyed wing, the amphibian tongue, the feathered hand stone
              loosens its speech ‘Divinations I’ While this is a book displaying a great deal of skill and courage, I do have some reservations. To some
              extent these question marks are a by-product of the unfortunate fact that every style has some shortcomings; that you cannot build strengths
              in any area without also making sacrifices in others. In most of these poems, the emotional intensity is pitched fairly high. It often feels
              as if the focus is on the emotion, that the poem’s primary function is as a vehicle for the retrieval of feeling. That need not be a problem:
              the more intense voices are badly under-represented in Australian poetry. But it does create a curious effect when thinking about these
              poems afterwards: the power of the emotion can tend to evaporate in a manner analogous to the way the memory of emotions - such overwhelming
              forces - simply vanish in real life. A further, more significant point is that in Croggon’s poetry, a focus on intensity accompanies a de-emphasis
              on the particularities of time and place - perhaps the momentum of emotional imperatives cannot afford that slower paced attention to the
              detailed and specific. Croggon’s language (via Rilke, and Americans such as Merwin?) is in some ways a modern version of a grand style.
              It insists on the nobility of intensity without being foolish enough to ask why such urgency should be noble. When, however, the attention
              wavers or the pitch drops, it can become a type of grandspeak, overly reliant on the strong beat or the extra breath, and on words such
              as ‘dark’ or ‘burn’. At its best, however - and Croggon’s attention does not waver too often - there is some terrific verse. The following
              ‘Psalms out of Sickness’ are perhaps indicative of her poise and control: once I thought answers would grow cleanly out of the soil of my
              life: I would pluck them - aha! inhaling serenity o my love you are there instead with your empty hand curving to the shape of my cheek
              This verse is brave and well-crafted. Just occasionally, I could wish it were a little more particular."
        - title: Imago Review
          text:
              The Blue Gate Helen Harton Imago , Vol. 9, No. 3, Summer 1997 Alison Croggon’s poetic expression is rather more enigmatic, tending at
              times to the esoteric, but the images it conjures up have an appeal all their own. midnight rolls like hunger into the still eye of an absolute
              dawn all the possible birds arrive and fly through your sky like music ‘Elysium’ Her collection begins with a ‘mother to child’ poem and
              continues with several that are a celebration of life. Many of the poems contain metaphors that relate back to the love of a mother for
              her child, an emotion that Croggon puts above all else, although this wonder in life and its emergence is extended also to other forms,
              such as birds, or a tree bursting into bud. Soon, however, the mood changes - there are many emotional pitfalls, and the necessity of getting
              on with life and of somehow transcending those pitfalls is always in the background. Amongst the one- to two-line life fragments presented
              in the poem ‘Pause’ is one which concludes that ‘A lie becomes a truth and then a history’, striking a note of wariness in any present day
              outlook. Throughout the collection, there are recurrent metaphors referring to water (or rain), sunshine, shadows, trees and blossom, and
              children. They have a cohesive effect on the whole. The title, The Blue Gate , comes from one of the poems in a series entitled ‘Divinations’;
              it is a symbolic gate in a ‘wall of stone’ through which we must pass. On the other side, in these poems, there is a feeling of being in
              a world without end, without resolution, albeit with much love; and in the way of dreams, it gets you in.
        - title: Australian Book Review Review
          text:
              "Silence and Solitude Andrew Sant Australian Book Review , No. 195, October 1997 Two presences in Alison Croggon’s poetry in The Blue
              Gate are Walt Whitman and Rainer Maria Rilke. Whitman, the American, in his preface to Leaves of Grass , writes of the poet responding to
              his country’s spirit, of being ‘commensurate with a people’. If Whitman endeavours to speak from the middle of life and culture in nineteenth
              century America, the German poet, Rilke, in his famous Duino Elegies , speaks of the need to abandon such a position to quest for something
              much deeper though elusive in ourselves. These views suggest something of the polarities in Croggon’s work. Rilke, at his most complex,
              is a difficult poet. Indeed, he implied that the way to enjoy his Elegies is not through elucidation but rather through the reader’s abandonment
              to them. In any case, poetry is diminished by elucidation if dogged, as many a bored classroom student knows having been denied the immediate
              experience of it. Perhaps this is why Whitman was for so long under-appreciated: a poet so fond of lists of things and events delivered
              with great cumulative effect makes pedagogical exegesis redundant. The trick is just to go with it. I suspect Croggon feels much the same
              about appreciation of her poetry. Often shifting and elusive, her poems can conjure the ‘strangeness of dreams’ - a quality she mentions
              in her poem to Rilke. There is also an epigraph to the book as a whole in German from Rilke which asks that we liberate ourselves from things
              loved so that we can, in effect, become more ourselves. Readers would therefore be right not to expect many familiar signposts in Croggon’s
              poetry; there are few proper nouns and things that are named are often in the service of inner experience. So in the main this is not ‘social’
              poetry as much Australian poetry is, in a relatively congenial and outgoing way. ‘Silence’ and ‘solitude’ are key words though the poetry
              is neither quiet nor retiring. This might make the sensuousness and abundance portrayed in ‘The Elwood Organic Fruit and Vegetable Shop’
              seem at odds with the general drift of the book. Here there is a wonderfully celebratory Whitmanesque list of produce - ‘the glorious speech
              of the earth!’ Croggon is at the centre of ‘the civil business of buying and selling’ where mangoes are ‘soft yellow thighs’ and orchids
              are ‘strange and beautiful as clitoral kisses’. However in a neighbouring poem, ‘Ode to Walt Whitman’, the ‘gentle imperfect generous man’
              is addressed as a companion in a widely viewed but diminished world where ‘cities mourn their dead no longer’. This poem proceeds in Whitmanesque
              style, a homage, until it leads to a personal declaration: ...truly what is my faith except a stubborn voice casting out its shining length
              to where I walk alone sick and afraid and unable to accept defeat singing as I was born to Croggon’s inherited strategies here serve her
              own ends neatly. But this is not a bleak book. The ‘stubborn voice’ is restless, impatient, exploratory - attuned to bedrock reality. Poems
              are often carried forward by sheer rhythmical energy and, if the nature of the anguish that often informs them can be hard to pin down,
              it’s because anguish is seen as a price of being alive when emotions are strong. Courage (in ‘Bird’) and fortitude (in ‘Limbo’) overcome
              the odds, no more so than in the fine opening poem to Croggon’s son, which is one of several memorable poems where the abiding concern is
              with motherhood. In ‘Ultrasound’ there’s hope the child will ‘burst the sorrow of your swelling mother’. Elsewhere ‘savage promise’ leads
              to loss. When Croggon’s poems depict moments of consolation they are particularly moving: in the house of my soul the bed is smooth and
              dark, its pungent shadows breathe in the empty room we still inhabit and silently the book opens its voices in the late air, where hands
              have been waking to tasks, to the patient business of living. All is quiet now, the light is gentle and you, voice that I love, o you are
              coming home. ‘Sonata’ Like Rilke, Croggon would choose to summon angels, whether, in her poetry, they embody belief in or the impossibility
              of fulfilment, I’m not sure. Unlike Rilke she has an enduring regard for relationships while he tended to see them as a distraction. Her
              poems about relationships are among her best - highly-charged, erotic. Then a clever surprise in a book where experience is so often depicted
              as being raw and relentless, her ‘Sonnets’ offer a formal elegance that dignifies pleasure and pain. A surprise, not only within the context
              of this book, but also because these days the sonnet is so often put to more demotic uses. John Leonard, quoted on the cover, is right to
              praise Croggon’s craft. She can slip in and out of styles as readily as an amphibian slips from land to water. It’s part of her achievement
              that this can seem as much facilitatory as a matter of flourish; though sometimes, as in ‘Bearing’, she cranks up the volume too much and
              the poetry becomes overwrought. I was also concerned about her readiness to make such prosaic statements as ‘The slow beat of living continues,
              intolerably’. This is not borne put by the overall dexterity and richness of Croggon’s poetry, its willingness to be formal or fragmentary
              with equal flair - its distinction not diminished by the company of the two great poets it honours."
        - title: The Sunday Age Review
          text:
              Top Shelf Editor’s Choice The Blue Gate by Alison Croggon Larry Schwartz The Sunday Age , 17 August 1997 Journalist and writer Croggon
              has been hailed as among the best of a younger generation of Australian poets since publication of her award-winning first book of poems
              six years ago. The new collection comes with critical plaudits on the back cover from the likes of Les Murray (‘an important shift in literary
              polarities’), John Leonard (‘dense, intense and beautifully crafted’) and Geoff Page (‘a constant feeling of lyrical sensuality’). She has
              the flair to write of experience such as love or childbirth in a way that has resonance for others. ‘Ode to Walt Whitman’ might make you
              think of Ginsberg’s imagined encounter with the bard in a California supermarket; a line such as ‘stone loosens its speech,’ in ‘Divinations’
              is reminiscent of another by W.C. Williams. But her voice is very much her own, finding an order in the world about her. ‘Poetry remembers/
              everything that exhaustion / strews across a wasteland’, she writes in ‘Fugue’. In another (‘Ars Poetica’), of ‘a possible music’ that ‘lifts
              through the panic of decay’.
sentences-of-earth-stone-goban-cre-is-cloth:
    title: Sentences of Earth & Stone / Gobán Cré is Cloth
    author: Louis de Paor
    short_description:
        Gobán Cré is Cloth/Sentences of Earth & Stone is Louis de Paor’s second collection of his Irish poetry accompanied by his
        English translations. These poems of love, history and memory have been critically acclaimed and are now reprinted for the first time. This
        collection was nominated for The Irish Times Literary Award in 1997. The terror of distance from family or language invades the everyday.
        Individual moments are suddenly alert with protest, loss or larger possibility. In our times of the fashionably cool, he writes poems of cruelly
        informed warmth. Love poems of such a passionate tenderness as to take one's breath away. Tim Thorne His sense of the special in the ordinary...
        his capacity to tap beneath consciousness, allows an energetic compassion that strikes deeper than sympathy. Lynette Kirby Louis de Paor can
        make a genuine claim on greatness. Pete Hay
    long_description:
        Gobán Cré is Cloth/Sentences of Earth & Stone is Louis de Paor’s second collection of his Irish poetry accompanied by his
        English translations. These poems of love, history and memory have been critically acclaimed and are now reprinted for the first time. This
        collection was nominated for The Irish Times Literary Award in 1997. The terror of distance from family or language invades the everyday.
        Individual moments are suddenly alert with protest, loss or larger possibility. In our times of the fashionably cool, he writes poems of cruelly
        informed warmth. Love poems of such a passionate tenderness as to take one's breath away. Tim Thorne His sense of the special in the ordinary...
        his capacity to tap beneath consciousness, allows an energetic compassion that strikes deeper than sympathy. Lynette Kirby Louis de Paor can
        make a genuine claim on greatness. Pete Hay
    price: 21.95
    isbn: "1876044063"
    release_date: 1996, reprinted 1997
    page_count: 91
    reviews:
        - title: Robert Verdon, Muse
          text:
              "Books Robert Verdon (author of The Well-Scrubbed Desert ) Muse , February 1997 This is exquisite poetry. When I opened it I was ‘worded
              out’ from too much reviewing, but (perhaps due to my Celtic soul) it revived me in a flash. Louis de Paor (pronounced more or less ‘de pware’)
              has a particular talent for striking imagery - ‘a surplice-white light’; ‘useless as a rope on sand / when curiosity slipped its lead’;
              ‘scoops of wind off the mountain’. His book is bilingual but sadly I’m not, so I’ll stick to the Saxon translations. ‘The Isle of the Dead’,
              which may refer to Australia, is a strongly anti-imperialist work, yet lacks the awkward self-consciousness or arch didacticism found in
              the political works of less accomplished poets. The corner of this foreign field is forever England, perhaps, but it is an England of convicts
              and their military oppressors, an England of master and slave. And though they are dead, this England, a system of dehumanising brutality
              driven by greed and hypocritical Christianity, lives on: ‘You must remember these were naughty boys who had to be shown the error of their
              wicked ways’, explained the guide ex-army in polished shoes and priest-clean nails, his sweet talk fouling the air with mouldering lies.
              Naughty boys, all of them Irish: ‘pointless to pray / for the souls of animals.’ ‘The Corn Field’ had me almost in tears; it looks back
              at a childhood trauma through a prism sharper than mere nostalgia. With his talent for understatement, de Paor is a master of the elegy,
              the cold-eyed, warm-hearted poem that catches you up when you least expect it. All these poems arc alive with joy or heartache; the emotions
              they engender can be scarifying, but all are liberating (and in two languages at that). For once I can truly agree with the blurb on the
              back: de Paor, as Philip Cleary states, is a ‘rare and radical talent’."
        - title: Lyn McCredden, Arena
          text:
              "Gaelic Breath Lyn McCredden (academic and essayist) Arena , April-May 1997 I don’t read Gaelic, though I wish I did, and so am not
              eminently suitable to review this book. However, reading Louis de Paor’s Sentences of Earth & Stone , his second bilingual English/Irish
              book of poetry, I am given some chance to enter into the words and scenes and character of another culture, by chance the culture of my
              ancestors. de Paor is an Irishman from Cork who has lived and written in Australia for the last nine years. He is currently back in Ireland
              for a year, the recipient of the Seán Ó Ríordáin Prize. In performance, Louis reads his poetry in both English and Irish. For the audience,
              it is a thrilling and a humbling experience. You are invited to listen to poetry as it makes sense and music in two languages so very different
              in sound and history. It’s not merely the rich, earthy narratives of these poems, but the musical repertoires of the two languages which
              give such pleasure. The mono-lingual reader like myself must sit humbly with the presence of poems on facing pages in a language and from
              a culture so different to the English. The title’s ‘sentences of earth and stone’ suggests contact with a simple, everyday and peasant-based
              world - ‘the argot of old men / on stone benches ... their gapped mouths / and the sun’ - where ordinary objects and time schemes are invoked.
              However, the first poem, ‘Fable’/ ‘Fabhalscéal’, elaborates on these old men and their argot: ‘When silence fills their mouths’ with ‘the
              wooden language of the dead’. It is a metaphysical elaboration in the most palpable of language. The second poem, ‘Isle of the Dead’, is
              also concerned with death through the things of death: headstones, graven letters, worms and cages of bone. But as in ‘Fable’, it is death
              as metaphor for living which is a central concern. Death is registered in all its forms: in the land and the weather - ‘the weight of a
              sky / that drove their easygoing bodies / beyond the unhurried stroke / of their gentle hearts;’ and includes the living bodies which know
              their destinies: ‘a surplice-white light pouring / from the well of their gapped mouths.’ In ‘Isle of the Dead’ ‘the convicts lie as / they
              did in life on edge / in cramped beds ... to teach the thing / the body is a jail’. This latter lesson is not de Paor’s directly, but it
              is one the poet sees inscribed everywhere in human beings’ treatment of each other. Much of the poetic and political energy is found in
              de Paor’s searching out the possible reasons for such barbarity. In rough, blunt, short lines the poetry spits out its accusations against
              those who continue to perpetuate the lies of colonisation and human cruelty: You must remember these were naughty boys who had to be shown
              the error of their wicked ways,’ explained the guide, ex-army in polished shoes and priest-clean nails, his sweet talk fouling the air with
              mouldering lies. ‘The Isle of the Dead’ It won’t be the words and actions of the army or the religious who can honour such dead, but the
              poet’s, as his poetry momentarily resurrects the forgotten, in a rollcall of the long dead: ‘Thomas Kelly, / carpenter, Edwin Pinder, /
              miner, John Bowden, barber... a rollcall unopened... without stain that bows / my head and inflexible / knee in supplication / to the earth’.
              The rough dignity given to such victims of a past regime finds its power from the poet’s words, and their anger at the brutality which was
              their lives and deaths. The religious and political forces which would leave such a rollcall ‘unopened’ are repudiated, as the poet forges
              an angry ‘supplication’ in his art. But there’s also lightness of touch, and humour, in de Paor’s poetry. Shoes and objects of the household
              are given life as they sense the onset of summer, that ‘hooligan / hooning around corners / joyriding with the sun’: At the back of the
              wardrobe behind the broken clock my grandmother’s shoes can feel forbidden music touch her dead feet, click of fingers clack of heels smack
              of lips on powered cheeks ‘Visitors’ Here the dance between death and life takes a joyous turn, and the structure of the lines expresses
              the verve, part nostalgia, part humour. Generalisations such as ‘the Irish are musical and nostalgic’ are pretty vapid, so I’ll just say
              that here’s an Irish poet who creates through both registers, but who also has a keen sense of the present. The everyday - of children and
              parents, of sexual bodies, of things - is created through music and a contemporary sense of living, upon which the past impinges endlessly.
              de Paor likes to tell stories, and many of his longer poems are historically placed narratives of childhood, of loss, of longing. What is
              most interesting for me is the plangent sense of struggle in many of the poems between life and death, the past and the present, the traditional
              and the individual. The acknowledgements thank, amongst others, those close to the poet who ‘set me back on course whenever I strayed onto
              the straight and narrow’. The nice irony of this phrase is augmented by the tensions, inscribed in many poems, between old religious beliefs
              and practices and more earthy, earthly realities. For instance, in the long narrative poem in five parts. ‘The Cornfield,’ the brutal death
              of a small child - ‘...her huddled body / small as a wren nesting in a bed’ - is remembered: As we said the rosary that night the cold floor
              hurt our knees, we made a quilt from patches of old prayers to cover her perished soul and lit a candle at the Virgin’s feet to keep out
              the night for a while, we drugged the bulk of heavy blankets on stone cold bones that would never again be warm. ‘The Cornfield, Part 4’
              de Paor often writes like this, abutting religious and bodily needs agains each other, in a climate (Irish? Melburnian?) which doubts the
              efficacy of prayer, but grimly confirms the need of it also. Sentences of earth and stone are mortal ones in this volume, but the music
              of de Paor’s ‘everyday wordbrawl’ continues to exhilarate."
        - title: Metre Review
          text:
              A t the Margins’ Margins Gobán Cré Is Cloch/Sentences of Earth & Stone Simon Caterson Metre (Ireland) 2001 The reason why people abroad
              tend to think there are more Australians than there are is because so many of them are at any given time out of the country. It is therefore
              refreshing to find a poet of Louis de Paor’s calibre travelling in the opposite direction. If not geographically then linguistically Louis
              de Paor is as isolated an exile as perhaps a poet can be nowadays. de Paor refuses to allow the English translations of his work, or ‘forgeries’
              as he prefers to call them, anywhere near Ireland. Like his previous bilingual collection, the new poems, at least in the English, celebrate
              the newfound landscape and in particular its big weather, but de Paor also begins to explore an Irish childhood. His thoughts, it seems,
              heliotrope towards home, though he also has some powerful things to say about indigenous Australians, with whom he as an indigenous Irishman
              feels an affinity. It is here that a rich seam is waiting to be worked.
        - title: Tirra Lirra Review
          text:
              A Terrible Beauty Is Born Poetry and Community in the work of W.B. Yeats, Seamus Heaney, Vincent Buckley and others John McLaren Tirra
              Lirra , Vol. 9, No. 4, Winter 1999 Appropriately, an Irish-born and Gaelic-speaking poet, Louis de Paor, has been able to suggest the link
              between the oppression of the Irish, the convict system in Australia, and the dispossession of the Aborigines. His long poem on Port Arthur,
              ‘The Isle of the Dead’, describes first the graves of the English, their headstones facing home to England as the tourist guide justifies
              their deeds with ‘mouldering eyes’. The poet then describes the graves of the Irish where they Lie as they did in life on edge in cramped
              beds that hurled them against walls or knocked them to the floor if they moved in their sleep, a devout technology to teach the thing the
              body is a jail to be rent asunder releasing God’s image imprisoned within, The spare lines allow no sentimentality as they move from the
              physical details of incarceration by way of the explicatory and condemnatory phrase, ‘devout technology’, summing up the twinned aspiration
              and process of imperialism, to the ironic message. The gaol that holds the image of God also denies it, but by confining the prisoners together
              creates for them a community that survives in the chronicle of names on headstones with which the poem concludes. Even those whose names
              are not recorded constitute a ‘rollcall unopened’, to be known only in the future, but with the power in the present to bow the poet’s head
              and inflexible knee in supplication to the earth. This rollcall of the unknown refers not only to the convicts, but to all the anonymous
              labourers whose work has built the settler society. In the following poem, ‘Didjeridu’, the poet turns to the song of the dispossessed,
              which, rather than setting rebel hearts to dance, calls up the sounds of the land and its creatures, and Ancient tribes of the air Speaking
              a language vour wild Colonial heart cannot comprehend. For those able to listen ‘for a minute or two/ hundred years’ these songs ‘bleed
              from punctured lung’, while our gentle ancestors can only ‘beat the skin of the earth’, feeling nothing. In this admission of an inability
              penetrate to the meaning of the song, while still being prepared to listen to it, and to the voices of the convicts, lies the possibility
              of community that, by acknowledging responsibility for its past, will learn to be at home with the land. Louis de Paor, speaking as a latecomer
              this land, as well as a speaker of the language of the oppressed of the old world, is able express a community that will transcend both
              the suffering and oppression of the past and the divisions they breed even as we try redress them.
        - title: Quadrant Review
          text:
              "The Necessity of True Speaking Alison Croggon Quadrant November 1997 Only truthful hands can write true poetry, said Paul Celan. Celan,
              the exiled German Jew who perhaps more than any other twentieth-century poet attempted to make of the quicksand of language a place where
              truth could exist, stands as a beacon of rigour. His standards are harsh, exacting, extreme. He is a wound in the side of poetry, an admonition,
              an exhortation to attention, a conscience. With Osip Mandelstam, another child of political and social extremity, he has been called a martyr
              and a saint. But it would be more respectful and more accurate to say of them both, as Rene Char said of Rimbaud, that they were poets,
              and that is enough. Such voices are discomforting. They do not protect themselves, they do not apologise, and despite their disconcerting
              humility they will not budge from an insistence that the heart must be ‘a place made fast’, that poetry is ‘a unique instance of language’
              that matters uniquely. They write from the far reaches of existence, uncertain whether their poems will ever wash up ‘on the shoreline of
              a heart’. And yet they speak, across the vastness of their silences, in the face of everything that demonstrates such speaking is impossible,
              that such speaking has no value. That’s the high standard. No historical age has been hospitable to poets. Poetry is always, as Celan and
              Mandelstam both said, ‘against the grain’ of an epoch. It often appears that, given this general caveat, we have entered a time when poetry
              is less possible. The Italian Nobel laureate Eugenio Montale claimed that we were entering a new ‘dark age’ driven by the materialist ideologies
              of technology, in which the processes of the spiritual organism that are tracked in the poet will increasingly retreat from the Zeitgeist
              of the age. Poetry, that mode of speech which penetrates the legislative armour of language to remind us of a possible wholeness of being,
              a possible freedom, a possible truth, is now almost wholly ‘against the grain’. But the urge towards the poetic is a primitive and stubborn
              expression of humanity that will never vanish entirely. Poetry is not, and never has been, merely a business of words. Craft, as Celan said,
              is of minimal interest: one expects craft as one expects hygiene. Living speech escapes classifications, proceeding by a process of constant
              improvisation, and literature, its cousin, is without exception connected to the act of human breathing, the rhythm of a body, and consequently
              will always present the disruptions of complexity. The true life of poems.does not exist in their craft, however formally attentive the
              language, but in another activity the craft makes possible: what one might call the living organism of the poem, a kind of magnetic field
              around the words that is at once immediately perceptible and impossible to describe. The six books under review started me thinking again
              of the question of the poetic… Of all these writers, de Paor is the closest to an intuition of human truth, the least afraid of the deep
              vein of poetic resistance. Sentences of Earth and Stone is an extremely readable book, a virtue of the stubborn clarity of de Paor’s language.
              The poems are given en face in English and the original Gaelic. I can’t really speak about the Gaelic, but the English poems are compromised
              by a refusal of craft that may be, in part, a political refusal of the heritage of English poetry. de Paor’s aim is to give speech to the
              unvoiced, the dead and the anonymous living, and he gives weight in the world of his poems to a tangible domestic world and the clear but
              incomplete perceptions of childhood, written with a simplicity that at its best recalls the unadorned voice of Patrick Kavanagh. ‘Scribbling’,
              the last poem in the book, finishes: I can just make out, A trick of the light Maybe, a smeared claw Tagged with the ring of words, A prop
              against the Jamb of nothing, A breath of air on The hinge of everything. This sense of the contingency of language runs through the book,
              an intuition of immanence within the everyday that notes ‘this never / ending moment already gone / in the whoosh of an angel’s wing’. But
              de Paor eschews a tight lyric control that might push his metaphors further than one step into meaning. I can’t help thinking of the grace
              and intensity that inhabit the poetry of the Estonian poet Jaan Kaplinksi, whose stringent and pained insistence on the present, human moment
              opens into a Buddhist contemplation of the eternal: de Paor’s poetic impulse is in similar territory, but his lack of discipline often slackens
              the line and leaves the impulse floundering. His simple language can drop to the simply prosaic, relying for its emotive weight on unquestioning
              political or emotional sympathy. This is clear, for instance, in the sequence on Port Arthur, ‘The Isle of the Dead’, which assumes a status
              of wronged victimhood for the convicts and generates its energy not from its language but from its charged subject matter. The truth of
              the Port Arthur penal colony is more complex and brutal than de Paor’s lament for murdered innocence suggests, and apotheosis for its uneasy
              shades calls for a harsher resolution of paradox than de Paor offers in his rollcall of Irish names, ‘a shower of rain / without stain that
              bows / my head.’"
        - title: Australian Book Review Review
          text:
              "Beguiling Irish Lynette Kirby Australian Book Review , No. 183, August 1996 Louis de Paor has been involved with the renaissance in
              Irish language poetry since 1980 and this is his second bilingual collection (the first was Aimsir Bhreicneach / Freckled Weather ). I was
              fortunate to hear him reading his poems in both languages last June on Radio National’s Books and Writing and was transfixed by the music
              and movement of the Irish Gaelic - mellifluous, vital, achingly melancholic. Sentences of Earth & Stone comprises only twenty-eight poems
              and the poems in English translation hold the same qualities. The words flow and loop, curl and twist, resound, and beguile. Sometimes a
              last line dumps us with the insistence and authority of a wave dumping its debris. The imagery is so strong as to bring alive ‘chipped crockery’
              and a dripping tap (‘The Creator’) with the imperfection, the coarseness and vitality of a Van Gogh. There are poems of dislocation, exile
              and desecration, both historical and contemporary - in particular see the long second poem in the volume, ‘The Isle of the Dead’, ‘Didjeridu’
              and ‘Assimilation’, a short poem which quietly and simply sums up the trauma of the event in the last line, ‘Still he doesn’t believe.’
              There are love poems of different kinds, some of which hold the minutiae rather than embrace the grand scale, showing small precious moments
              that are often not consciously realised, both intimacy and separateness implicit. ‘The Lucky Caul’ is a fine example: Catwoman purrs beside
              me, lascivious thoughts slinking through her stretching limbs until her toes touch the hollow behind my knees soft as a kitten’s tongue
              lapping milk... ...and still I wouldn’t go choosing instead this never ending moment already gone in the whoosh of an angel’s wing. The
              moment looms large in de Paor’s poetry - a glimpse, a quickening, a discovery, a recognition, a swift act of violence, a twist of fate.
              In ‘Heart Beat’ a sleeping woman’s ‘indrawn breath / stops’ momentarily, poised in nothingness, before the flood of life to come, providing
              a shocking realisation of mortality. ‘Treasure’ suggests the human condition reflected in what is heard in the moment of putting an ear
              to a shell. ‘Sliabh Luachra,’ a short, spare, potent poem, elucidates ‘a foothold on the edge / of nothing,’ which is where de Paor takes
              us frequently, pushing the limits within the commonplace to show all manner of possibilities. His sense of the special in the ordinary,
              his obvious contempt for pretension and hypocrisy, his capacity to tap beneath consciousness, allows an energetic compassion that strikes
              deeper than sympathy. Of earth and stone this book certainly is: rooted in the ground, the cornfields, hawthorn bushes, fruit, bonfires
              and chestnuts - and as buoyant as ‘scoops of wind off the mountain’ (‘Spectacles’); encompassed by the Irish tavern ‘fug;’ permeated by
              the sea, which parallels in human terms cruelty, treachery, unpredictability, death and a wild beauty; and relishing the simple but necessary
              way we shape our world first thing in the morning when the day is still innocent (see ‘The Creator’). There is huge joy in the love of a
              young daughter (‘Daughter’); and luscious love in ‘Apples and Pears’ which by turn is heavy, thick and sweet, light, languorous and delicate.
              There is a hint of the mystical, or at least the unknown felt, a shift to the beyond and its peculiar power. Throughout the book Louis de
              Paor works with sunlight, day and night, the sun and moon, providing a shifting pattern of light and dark that is as visual as it is metaphorical.
              It’s bewitching poetry and its kernel is quintessentially Irish."
        - title: The Mercury Review
          text:
              Irish poet brings an Australian flavour to his work Tim Thorne The Mercury , 22 June 1996 Louis de Paor is one of the best contemporary
              poets from a land that has traditionally produced great masters of the art. Unlike those of his compatriots who are better known to the
              English speaking world, such as W.H. Yeats and Seamus Heaney, he writes primarily in the Irish language, then translates his work into English.
              de Paor has twice won the Seán Ó Ríordáin Prize, the premier award for poetry in his native tongue, and for nearly 10 years has been living
              and writing in one of the great cultural centres of the Irish diaspora, Melbourne. Hear Tasmanians have been fortunate enough to have had
              opportunities to hear him read on a number of occasions over the past couple of years, but the appearance of this book is timely, as he
              has recently returned to his native city of Cork and it may be some considerable time before we hear his mellifluous bilingual performances
              again. This selection contains a number of poems with Australian settings, including the long poem, ‘The Isle of the Dead’ / ‘Oileán Na
              Marbh’, set in Port Arthur, which is a powerful evocation of the brutality and shame of that accursed place. Other poems, such as ‘Assimilation’
              / ‘An Dubh Ina Gheal’ and ‘Didjeridu’ (which, unsurprisingly, has the same title in Irish), deal with Aboriginal themes, and it is interesting
              to read the responses to such subjects from a writer whose background is a similarly colonised culture, especially alongside those which
              are set in Ireland. Love The book also contains a handful of love poems of such a passionate tenderness as to take one’s breath away, poems
              full of delicate observation, earthy sensuality and whimsical humour which add a dimension to his poetry which was not evident from his
              earlier published work in English. Louis de Paor already has a firmly established reputation as an Irish poet. This collection should help
              him achieve his due recognition as a major contributor to multicultural Australian literature as well.
        - title: Peter Hay Review
          text:
              "de Paor, Beach: Poets, Humans Extraordinaire Peter Hay, Famous Reporter , No. 13, June 1996 Louis de Paor lives in Brunswick, Melbourne,
              and is devoted to the preservation and propagation of the Irish language. A very large ask for someone who is a resident of Brunswick, Melbourne.
              Too large an ask - and Louis de Paor is about to leave us, going home. He may, perhaps, come back - but if not, and for the nonce, we are
              much the poorer. Louis de Paor is both a great Irishman and more; he is, too, a great observer of the human condition. Thus he also knows
              Australia and its peoples; its foibles and rhythms; its lights and darks; its plagues and its promise - and particularly does he know his
              adopted Melbourne, from its great folk expression, Australian football, that vast all-gathering passion that he shares, to the political
              phenomenon that is his friend Phil Cleary, whose last quixotic political stand attracted to its defiant banner the wisest Melburnians, and
              the best. Louis’ parting gift is Gobán Cré Is Cloch , the second of two bilingual poetry collections to have been published in Australia.
              The first of these, Freckled Weather , was warmly received - perhaps especially so here in Tasmania, where Louis has been a regular visitor,
              has read to considerable acclaim, and where he has made many friends. To my mind Gobán Cré Is Cloch actually surpasses Freckled Weather
              in power and imaginative reach. Though the themes in Gobán Cré Is Cloch represent a continuity rather than a sea change - finely observed
              memories of childhood, the liberatory struggle against stultifying moral and cultural closure, the small and profound comforts of loving
              family relationships - this fine poet here rides new, vibrant currents of language; strikes beyond conventional boundaries of metaphor.
              I most enjoy de Paor when he depicts the profound heart within moments apparently small and commonplace. There are many such poems in this
              book - a young novice goes into a pub to see her mother (‘The Novice in the Tavern’); as the poet lies sleepless in bed his partner, for
              a split second, stops breathing (‘Heart Beat’); the same poet, in the same bed, reflects contentedly on his lot in the instant before sleep
              (‘The Lucky Caul’): I’m so lighthearted and airy a wren’s fart would blow me clean into the next world and still I wouldn’t go choosing
              instead this never ending moment already gone... In this mode is ‘The Creator’, a poem that I think an absolute standout, one upon which
              Louis de Paor can make a genuine claim on greatness. A woman (the poet’s mother?) goes about her early morning chores whilst her dozing
              husband gently, perhaps a little reluctantly, struggles into wakefulness. This is a beautiful poem; it conveys a small, affectionately observed
              world of corn flakes crisp as frosted grass, handsome eggs with moles on their cheeks and steaming tea so strong underfoot a mouse might
              trot along on legs of faith without drowning. Louis de Paor remains a poet of Irish preoccupations, with an Irish cast of phrase even in
              the English (vis the marvellous ‘this bockety house’), and with the eye and the spirit of an earlier Ireland struggling through today’s
              drear blanket of orthodoxy. This flows inconspicuously through much of the volume, and in ‘Believing’ it is made explicit, as an old woman
              reverts to pagan superstition in the time of her dying. The surfacing of such tensions provides some of the most memorable of images, some
              of these comforting: the fianna came back to a hollow in the middle of the ploughed field, their laughter smelled of fermented apples as
              bonfires blazed on their flushed cheeks... some not: ...when the relentless pull of the music leaves the body sense less and all the souls
              of the dead hurl a demented yell from the mouths of the living... A poet of Ireland first and foremost then - but Louis de Paor also brings
              his unique eye and sensibility to Australia - as many of his countryfolk have done before him. I have already said that I think ‘The Creator’
              a poem of greatness - but two other poems, I think, warrant similar assessment, and these are both overtly Australian poems. One of these
              is a brilliant and complex linking of the didjeridu with biophysical and spiritual essences of a landscape old beyond telling (‘Didjeridu’).
              The other is a slashing, angry, entirely contemporary tribute to the unmarked convict dead of Port Arthur’s Dead Island (‘The Isle of the
              Dead’). I have heard Louis de Paor read this poem (at Port Arthur!). Hear it once, it’s never forgotten. The poem has two distinct segments
              - in the second de Paor struggles to find a respectful visitor’s appropriate demeanour in the presence of the island’s dead: ‘You should
              go down on your knees on this sacred ground and pray,’ my pagan companion counseled but I will not bend my heart or my knee. Better to wear
              a cowl to hide the shame of man made nothing, to cover your face lest the remnant of light reflected in your eye absolve the irredeemable
              dark. Towards the end of this long poem de Paor does an apparently unpoetic thing. He lists - merely lists - the names and occupations of
              some of the Irishmen anonymously buried in the mass graves. But it is not in the least prosaic - it is, rather, a moment of sustained emotional
              power. And then, as the poem ends, de Paor reconsiders, despite himself, his earlier position: a rollcall unopened, a snail’s trail across
              eternity, a shower of rain without stain that bows my head and inflexible knee in supplication to the earth. Recent happenings [the mass
              shooting at the former penal settlement] at Port Arthur have so overwhelmed the Tasmanian community that, in the understandable desire to
              ensure a respectful remembrance for the dead of 1996, there is a very real possibility that the time and place of the earlier dead, the
              dead who came here to create Port Arthur, will be obliterated. Louis de Paor’s masterful poem stands as a warding against that danger. It
              will, I hope, become a familiar, much read cornerstone of Tasmanian literature - as Gobán Cré Is Cloch will become, I hope, a classic of
              a robust literature of the Irish language. …Not even [Eric] Beach [author of Weeping for Lost Babylon ] surpasses de Paor in performance.
              To listen to de Paor is to listen to the cadences of deep, rolling ages, and the moment when the elemental music of the Irish language flows
              as water into the translation is a rare point of poetic experience. And de Paor, too, is a person of noble, undeflectable passion - for
              him, too, his life is where his poetry is. This Irishman, this New Zealander [Eric Beach], dwelling here on our thus privileged shores,
              are truly poets and humans extraordinaire."
cork-other-poems-corcach-agus-danta-eiles:
    title: Cork & Other Poems / Corcach agus Dánta Eiles
    author: Louis de Paor
    short_description:
        "Louis de Paor was born in Cork, or Corcach, in 1961. The name means literally ‘a marshy place’ and is the origin of the
        term ‘bog Irish’. His subtle poems deny the insult of that term. Cork & Other Poems starts with a dockland farewell set in drenching rain.
        But it is leavetaking seen in recollection: he remembers his departure from Ireland and family. The turmoil of the storm is internal. And
        it introduces the theme of his book: the powerful impact of his homecoming and the echo of his Australian years. The Gaelic only version,
        released in Ireland, won the Seán Ó Riordáin Prize, the premier prize for Irish poetry. This volume also won the Lawrence O’Shaughnessy poetry
        prize in the USA in 2000."
    long_description:
        "Louis de Paor was born in Cork, or Corcach, in 1961. The name means literally ‘a marshy place’ and is the origin of the term
        ‘bog Irish’. His subtle poems deny the insult of that term. Cork & Other Poems starts with a dockland farewell set in drenching rain. But
        it is leavetaking seen in recollection: he remembers his departure from Ireland and family. The turmoil of the storm is internal. And it introduces
        the theme of his book: the powerful impact of his homecoming and the echo of his Australian years. The Gaelic only version, released in Ireland,
        won the Seán Ó Riordáin Prize, the premier prize for Irish poetry. This volume also won the Lawrence O’Shaughnessy poetry prize in the USA
        in 2000. If you ’ ve read Louis de Paor’s poems only once or twice, then I suggest you’ve missed them. It is through careful excavation that
        the secrets of their complex imagery unfold and their hidden treasures are laid bare. Louis de Paor is one of the most consistently challenging
        voices in Irish poetry today. Michael Davitt"
    price: 23.95
    isbn: "1876044292"
    release_date: "1999"
    page_count: 94
    reviews:
        - title: Duncan Richardson, Social Alternatives
          text:
              "A Breath of Fresh Air! Duncan Richardson Social Alternatives , Vol. 20 No. 1, January 2001 de Paor is a breath of fresh air in contemporary
              poetry, to borrow a tired cliché but his honesty and unpretentiousness demand a metaphor of that kind. For lovers of myth and legend too,
              his poems are exemplars of how to use such themes without beating readers over the head with your erudition. There are two pages of notes
              on Irish myth and legend at the end of this book, yet this comes as a surprise, so skilfully are the images and references worked in. de
              Paor, who draws on experiences in Ireland and Australia for the poems in this collection, has a poetic voice that takes a participant-observer
              stance, not the self-righteous or heroic tone so common among writers who deal with traumatic subjects. When he deals with Ireland’s recent
              history of conflict, his images stem from the cycle of generations, migration and the violent scenes so familiar from TV yet he does not
              preach or lapse into mawkishness. Instead, he offers insight into the conflicting desires in the human heart, virtue versus fear, and the
              difficulty of living up to ideals whatever level of action they may be applied to. Readers of Gaelic will get double value from this book
              as each poem appears in the two languages. The impact of his work depends on the development within the poem, so short quotes cannot do
              them justice. The following poem though shows how de Paor lets the world speak for itself, through deft handling of a scene. Heredity: It
              won’t come out, / the blood that goes through / me from my mother’s side / leaving one snarled tooth / in the roof of my mouth, / an itching
              poet in my head / where demented ideas / scratch in unseasonal heat, / an ogham stone / shouting me down / with its unintelligible alphabet.
              // I put my thumb / under the tooth of knowledge / and the stone speaks its mind / from the underworld of my thoughts: / - You’re only a
              blow-in, / like all that belong to you; / hard words like grains of sand / in the corner of an eye / shut tight as an oyster. // When a
              blade of light / prises it open / there’s a tooth askew / in my son’s mouth, / bright as a pearl / in his perfectly / crooked smile."
        - title: The Sunday Tasmanian Review
          text:
              "Fine collection of haunting love lyrics Tim Thorne The Sunday Tasmanian 26 March 2000 Louis de Paor has produced yet another excellent
              collection of bilingual poems. It is gratifying that Black Pepper has enough faith in his appeal to Australian readers, despite the fact
              that it is more than three years since he last lived in this country, to bring this book out. de Paor’s reputation in Ireland is firm and
              since his return there he has edited an anthology of Irish poetry which includes work in English and Irish. He invariably creates his own
              poetry in Irish, then translates it into English. Having the Irish text on pages facing the English is a constant reminder of this and must
              make the vast majority of his Australian readers, who cannot pronounce, let alone understand the language, long to hear those pages come
              to life. Those of us who have been privileged to hear de Paor read are aware of the magic that his presence and his voice create in either
              language. In this collection there are occasional references to Australia but, as the title implies, most of the pieces are set in his native
              city of Cork and in other parts of Ireland. There is the wonderful and poignant ‘Rory’, about a musician who now plays ‘ where Robert Johnson
              plays broken / riffs on the boards of a coffin ’ . It encapsulates the dilemma of the exile returning from the other side of the world after
              a long absence, while at the same time extolling the glory of music which transcends narrow cultural boundaries as it transcends nostalgia
              and even grief. There is an element of wry wit apparent in this book which was not such a feature of de Paor’s earlier work. It is evident
              in lines like this from Harris Tweed: 'In the month of July / in Inverary the grouse / take to the sky on teatowels.' These lines follow
              a list of archetypal images of the smells of traditional Ireland evoked by a tweed jacket bought ‘ for a song / from the Salvation Army
              / in Wonthaggi ’ . But it is the haunting love lyrics, the celebrations of the natural world and the meditations on domestic life that form
              the core of this fine collection. Louis de Paor has the gift of writing with crystal clarity while presenting challenging complexities.
              You can delve into deeper and deeper layers of meaning or just enjoy the brilliant surface of his poems, as the mood takes you. Either way,
              this is a most rewarding book."
        - title: Overland Review
          text:
              "‘Blow, wind, blow...’: new poetry Cork & Other Poems Kerry Leves Overland , No. 157, 1999 The poet’s English translations accom­pany
              his Gaelic originals; reading aloud is advisable. Each bit of the ordinary - stockings on a washing line, a pregnant woman’s back and belly,
              clocks, cars, a tweed jacket still redolent of the barn-floor love-making it once eased; an eviction at once achingly particular and deadpan
              commonplace, the lot of any poor person anywhere - is chanted, caressed, growled, rasped irifo life. A woman is shot mistak­enly by a sniper:
              a child on the way home from mass sees it happen, but there’s no easy lament; instead, the painstakingly ingenuous narration, with its dogged
              rhythms, seems to follow the entry of this experience into the child’s nervous system. The in­tensity may have to do with the poet’s return
              to Ire­land after ten years in Australia; de Paor’s word-music mixes rain, earth, light, the body’s alertness. His po­etry makes physical
              inroads, and searches out gener­osities on its shifting Catholic-animist ground."
        - title: Antipodes (United States)
          text:
              Gaelic Poetry... Nicholas Birns Antipodes (United States) , Vol. 14, No. 2, December 2000 Louis de Paor’s Cork & Other Poems ( Corcach
              agus Dánta Eile ), published by Black Pepper Press, seems at first but an intriguing cultural phenomenon. de Paor (born 1961) is an Irish
              Gaelic poet who resided for a time in Australia. Here he publishes a bilingual edition of his poems with an Australian press. But de Paor’s
              poems themselves are startlingly good, confirmably so in English, and coming through quite well in Gaelic even for the reader who does not
              know much of it (though Gaelic, presumably one of the “European languages” of the notorious dictation test for prospective migrants, is
              an easy one to crib). de Paor’s freshness of diction, even, and especially, when using the most transparent language, is stunning. “...and
              again today/ the light is soft as butter/ on bread fresh from the oven,/ you could put it in your mouth/ and let it melt/ like holy communion/
              on your tongue/ or place it in a jar/ in the medicine box/ a sovereign remedy/ for the heart.” I will give the Gaelic for the last two lines
              as the syntax falls into place if you realize, not a hard task, that chroi = heart. “iochshláinte/a chneasóidh do chroi”. This is poetry
              one can read, and re-read, as poetry, not as rhetoric or even as “verse.” The language is unbelievably simple, yet possesses an equally
              unbelievable amount of depth. The poems themselves have little to do with Australia, and de Paor, it seems, is no longer resident there.
              But it shows what Australian literature can be in a global sense. It can also serve as a clearinghouse for all sorts of possibilities in
              global literature - as if Australia can because of its own “distance” shake us into confrontation with reawakened language such as that
              de Paor gives us.
        - title: Tain Review
          text:
              "De Poar: award-winning poems Chris Watson (past secretary, Cumann Gaeilge na hAstráile/Irish Language Association of Australia) T á
              in , September 2000 Louis de Paor, who was born in Cork, lived at Melbourne’s Coburg for about ten years before returning to Ireland in
              1996 to live at Oughterard, County Galway. Chris Watson, past secretary of Cumann Gaeilge na hAstráile/lrish Language Association of Australia,
              reviews de Paor’s new book, Cork & Other Poems: Corcach agus Dánta Eile. Louis de Paor, fluent in both Irish and English, is a self-translator
              who freely changes idioms that work well only in one language, so that both versions of poems in this recent bilingual collection read as
              strong poems in their own right. Readers of the edition published in Ireland are given less assistance: for them, it’s Irish or nothing.
              The poems based on his departure for Australia and return to Ireland explore memories and come to terms with the relationships of the family’s
              past. ‘Gaol Cross’ recalls that in flying out from Shannon Airport, he ‘crossed over/ in my father’s footsteps,’ and he sees his grandmother,
              like Mary at the cross, as a symbol of bereaved motherhood: ‘When I looked back across the water / the last light was dying / in my grandmother’s
              eyes / as she stood like a statue in the dark / looking after us from the foot of the Cross.’ ‘Silk of the Kine / Sioda na mBó’ takes its
              title, as a note reminds us, from the old song An Droimeann donn Dílis. ‘When flight number EI 32 / turned its dripping snout / for home,
              slow / as the white-backed heifer / that took one last look / at those faraway hills...’ Return from abroad brings mixed feelings. He remembers
              his grandfather’s cow whose own last journey strangely resembles his own return home: ‘before climbing the ramp / of the old brown truck
              / to the slaughterhouse.’ Even wryer and more enigmatic is the Irish version of the ending, alluding to the opening of the old song: ‘sara
              gcuach isteach / i dtrucail donn / dílis an tseamlais (the faithful brown slaughterhouse truck).’ In the later part of the book, the family
              perspective shifts, with emphasis on being a husband, and father to a new generation. Several poems are about his response to his wife’s
              pregnancies. I was particularly struck by those where he speaks as a father of young children. In ‘Notice/Neamhaire’, his daughter asks
              him to watch her dance on the kitchen table. ‘“Jesus Christ,” I say, “Watch yourself,”’ corresponding to the untranslatable exclamation,
              “A dhiabail álainn / ...tabhair aire” gives the English poem another ‘watch’ usage in a poem with several references to cutting and watching.
              At the poem’s end, ‘She’s fallen, her face streaming / like blood from a cut’ and calls on him to see her in her distress. However, ‘When
              I take off / the blindfold / she cuts me dead.’ The Irish version is starker in its use of the watching and cutting imagery: ‘Nuair a bhainim
              / an púicín dem amharc / tá faobhar ar a súil / dom fhéachant go feirc. (When I take / the blindfold from my sight /there’s a blade from
              her eye / watching me to the hilt.)’ Other poems recall incidents and characters outside the family, often with wit, as in the words of
              the woman who has to leave her dwelling: ‘I wouldn’t give him the itch / for fear he’d have / pleasure scratching it.’ In ‘Congregation’,
              the noise of a group of disturbed swans suddenly resembles the more ominous noises of those who expressed ‘righteous indignation... in the
              kangaroo court / outside the Cathedral’ over ecumenical actions by Mary McAleese. Like this one, many poems, even when not overtly political,
              are conscious of the important public and historical issues surrounding the more familial concerns. The book is attractive. The cover by
              Gail Hannah, has a beautiful overhead picture of a curragh on sand. Sorcha When she talks to trees plums and apples land in her lap, fruit
              of the vine and half-blind strawberries give in to her giving hands. Cats and dogs know her for one of their own, their coats speak in velvet
              tongues to her attentive cheeks. She goes out like a light when the dark comes in and stays out till the sun climbs from the snare of her
              buckled hair as morning picks its way through the locks on her forehead, the slip-knots of her undark name. Má labhrann sí le crann péacann
              úll nó pluma ina glaic, cuardaíonn an fhineamhain is an sú talún béal a baise gan chraos. Aithníonn cait is coileáin aon dá gcineál labhrann
              a gcotai fionnaidh briathra sróil lena grua biorchluasach. Téann sí as nuair a ligtear an doircheacht isteach is ní thagann ar ais nó go
              scaoiltear an mhaidin as gaiste búclaí a foilt, éiríonn an ghrian ionam as dola reatha a hainm nach dorcha. Author’s note: Sorcha is a girl’s
              name, meaning brightness, the opposite of Dorcha, darkness. Photo: Sorcha de Paor at Korweignguboora, 1996"
        - title: Sidewalk Review
          text: Raining on Mythology’s Parade Cork & Other Poems Peter Skrzynecki Sidewalk , No. 6, July 2000 (pgs 46-48) [Text not yet available]
        - title: Ulitarra Review
          text:
              "The Long and the Short of It: 24 Writers Cork & Other Poems Michael Sharkey Ulitarra , No. 17/18, July 2000 (pgs 222-232) [Text not
              yet available]"
        - title: Island Review
          text: A Summer Feast Cork & Other Poems Ian McBryde Island , No. 80/81, Spring/Summer 1999 - 2000 (pgs 203-208) [Text not yet available]
        - title: Citation for 4th Lawrence M. O’Shaughnessy Prize for Poetry
          text:
              "Cork & Other Poems - Winner of Fourth Lawrence M. O’Shaughnessy Prize for Poetry Citation 29 February 2000 Here on Archbishop John
              Ireland’s campus halfaway round the globe from County Galway, we gather not for the customary March observances of things Irish--no parading
              or pub-crawling tonight—but for a feast—a feast both literal and literary. We gather in honour of the Irish poet Louis de Paor, the language
              of his originality, and particularly his seventh collection of poems Cork & Other Poems . Published just last year, Cork & Other Poems is
              the third of de Paor’s bilingual books after Sentences in Earth and Stone of 1996 and Speckled Weather of 1993. Each of those collections
              offers de Paor’s own English--what he terms his “forgery”—of the original Gaelic poem. Each collection gives a welcome to English, and not
              a farewell to it. Because each of his lines pronounces by turns de Paor’s devotion to the familial, the intimate, and the sum of Irish heritance,
              each reader receives what such other poets in Modern Irish as Máire Mhac an tSaoi or the late Michéal hAirtnéide have so generously passed
              on to those willing to listen. de Paor’s poem “Gaeilgeoiri” raised that question early on: Cad leis go rabhamar ag súil? Go mbeadh tincéiri
              chun lóin in Áras an Uachtaráin? Go n-éistfí linn? *** What did we expect? That tinkers could drop in for a spot of lunch at Aras an Uachtarain?
              That people would actually listen to us? The answer, this night, is a plain “Yes.” Remarkably, de Paor’s Irish and his English forgeries
              have come to us in St Paul and London—or Boston and even Dublin—all the way from Australia. Speckled Weather / Aimsir Bhreicneach came first,
              marking off from the outside de Paor’s maturity in 1993. This is hardly an accident. It comes, of course, from an essential Irish circumstance—the
              necessity to emigrate. Goban Cre is Cloch /Sentences of Earth and Stone voices that diasporic heritage in a long poem titled “Oileán na
              Marbh” or “The Island of the Dead.” Whether in English or Irish, those lines keep all of de Paor’s later poems mindful of the penitential
              durance of emigration, and not solely because Australia served as a British penal colony for decades. Visiting the plots of those prisoners,
              de Paor declares: Better to wear a cowl to hide the shame of man made nothing, to cover your face... *** Ba chuíúla dar liom cochall a chaitheamh
              gan uirísleacht an duine... The hallmark qualities of Speckled Weather and Sentences of Earth and Stone underscore the real presence of
              every line in Cork & Other Poem s. De Paor’s title reminds us that he received the Sean O Riordain prize 1988 and then the 1992 Oireachtas.
              de Paor was bom in Cork and educated there. His study of the Galway writer Mairtin Ui Cadhain and his anthology Leabhar Sheain Ui Thuma
              pay tribute to the poet and scholar Séan Ó Tuama. Like the poets Nuala Ní Dhomhnaill or Thomas McCarthy, de Paor comes of a remarkable generation
              tutored by Seán Lucy, John Montague and Ó Tuama himself at University College, Cork. In Cork & Other Poems , local and national events speak
              bitterly and passionately. Early and Bardic lines pose their sweet and sour against our contemporary lives. Most importantly, though, de
              Paor keeps to simple freedom with metaphor that suddenly and rewardingly complicate a living moment. That is why the father-and-son scene,
              a family scene, of “Heredity/ Oidhreacht” surprises us in its closure. ...ta fíacail ar sceabha i ndrad mo mhic gleas chomh hard le niamh
              an phearla ar a ghaire neamhfhoirfe gan teimheal. *** ...there’s a tooth askew in my son’s mouth, bright as a a pearl in his perfectly crooked
              smile. One of the traditional tasks of the poet’s language is to skew our perceptions and expectations, to make our straight ways of understanding
              crooked, to set our ordinary feelings ar sceabha . Whether forgeries in English or playfully forged in Irish, Louis de Paor’s poems renew
              the powers of Irish to set askew the presumptions and usual preferences of English as we find it in Ireland and Britain, in the Americas,
              in Australia. It is in recognition of those powers that we celebrate the accomplishment of Louis de Paor by awarding him the fourth Lawrence
              M. O’Shaughnessy Prize for Poetry."
agamemnons-poppies:
    title: Agamemnon’s Poppies
    author: Adrienne Eberhard
    short_description:
        Adrienne Eberhard’s poetry is attached to her native Tasmanian landscape and attracted to the mythical landscapes of other
        ancient lands. Her poems move from sexual intimacy and birth to events of exile, travel and consequence.
    long_description:
        Honey pools on my spoon, rolls of redness, sticky as the sun; for a moment, beehive tombs and poppies crush in my mouth –
        Mycenae rises rich and oozing, a gold memory dissolving on my tongue. Sensuous and measured, Adrienne Eberhard’s poetry is, as Paul Hetherington
        has noted, ‘involving and image-rich’. She is deeply attached to her native Tasmanian landscape and equally attracted to the mythical landscapes
        of other ancient lands. Her sympathy for other places and cultures begins at home, in sexual intimacy and birth. She tells of the joy and
        consequence of an event, from eating a scallop to being exiled on the Black Sea. She is, as John Millett has said, ‘a wonderful talent’.
