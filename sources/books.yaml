    reviews:
        - title: Southerly Review
          text:
              "Could a Poem Talk to a Lettuce (?) Noel Rowe Southerly , Vol. 63, No. 3, 2003 Adrienne Eberhard’ s Agamemnon’s Poppies quite often
              finds itself, as in ‘Stone Boat’, moving through dark water to the silent, white spaces at the edges of the mind. Eberhard’s poetry concerns
              itself with different kinds of passion. The opening poem, ‘Roots’, has a speaker who wants to go ‘where water runs darkly, silently’. Some
              love poems follow, ranging frorn the intimate registers of ‘Voyages of Discovery’ to the grander, historical drarna of ‘The Cleopatra Poems’;
              all are concerned with dark currents. Then there are readings of landscape, readings that often imagine land as water and sometimes use
              mythic allusions to create depth and connectedness, as in ‘The land ends like a bruised shadow- / Icarus fallen...’ (‘At Land’s End’). After
              poems about love, storms, and children, we reach ‘Lines from the Black Sea’, where Ovid’s imagination is acclimatising to his new place,
              his exile. I preferred those poems in which Eberhard worked with a dramatic voice, particularly ‘The Cleopatra Poems’ and ‘Tile Garden’.
              They say more by saying less. Elsewhere Eberhard shows a tendency to crowd a good line. The second of her ‘Meditative Sonnets on Voices,
              Bones’ begins: ‘There are whale skulls in your cupboard...’ It is an effective line, appealing to the wilder parts of the imagination. Then,
              however, she begins to describe the skulls and the wildness is lost. While this collection relies too much on water, whiteness, bones and
              silence, Eberhard’s writing has emotional intensity and imaginative daring and will become much stronger when it develops a slightly more
              extrovert energy."
        - title: Antipodes (Australia)
          text:
              "Reviews POETRY - Five Ways of Seeing with Eberhard Bev Braune Antipodes (AUS), Vol. 18, No.2, December 2004 Tasmanian Adrienne Eberhard
              presents us with a coming to terms with visual memory and its relationship with other senses in Agamemnon’s Poppies , her first collection
              of poetry. ‘The book is divided in four sections, with helpful reference notes at the end. Eberhard’s poems travel monuments, ridges, rivers,
              her ‘neighbours’ yard’; intimacies of contact with the concrete; the ‘whiteness’ of pebbles, marble, skin and pearls being dominant motifs.
              Eberhard embellishes these with ‘honey,’ ‘pale ambergris,’ ‘amber,’ ‘Blue sequins,’ ‘sapphires,’ ‘rose,’ ‘peanut-coloured valley[s],’ ‘poppies,’
              ‘pale buds of flowers,’ ‘porcelain-blue,’ ‘lapis lazuli’ (frequently). The opening poem, ‘Roots,’ sets us up to be on the look-out for something
              else, her landscape appended with sounds and shapes that do not quite seem to match the simile they describe, or we find more than we expect
              to. Where an ancient tree is likened to an anchored ship, the tree’s canopy, a sail, we have: ‘high in the canopy it’s all at sea / sailing
              the threading blue, leaning in the light / mimicking the curved globe of the sky // the leaves rustle like canvas / spin and trip in the
              wind’ (pg. 3). The sound of canvas, unfurling, or rubbing against itself is a steadier, more spacious and deeper sound than that of the
              scattering tones of rustling leaves. A globe suggests a view from the outside and of the outside, not from the inside, of a spherical object,
              always taking a globe as curved. Her opening ‘globe’ continues to try to become something else yet always like itself: ‘peas,’ ‘beads,’
              ‘grapes,’ ‘marbles,’ and so on. What are we to make of Eberhard’s views? She may be asking us to consider how we interpret our use of visual
              language. I find Eberhard’s world capable of opening up in interesting ways. The first way or view might be likened to sliding photographs
              of actual places or the outside type - an imagined, prehensive view, as in ‘Roots.’ The world is as itself, a closed (or opened) globe;
              or the world may be as a book, as we imagine it exists between its covers before we read its schema of sentences and images. On entering,
              we are often surprised by what we encounter there. We might say ‘This is incredible’ or ‘I don’t believe it’ but eagerly read on for confirmation
              that the schema is part of our actual world after all. This tends to be a panoramic view, an outside viewer’s, someone who is not yet part
              of a population of characters. The second type is a closer view, a present type . At any given moment we are inside the present time of
              the scene. We can turn to see what is behind and before us. The poet describes a scene or object, and we play the role of characters within
              that scene with whom we may converse about the scene or object: Eberhard speaks with and for Ophelia, Vita Sackville-West, a wife of Nebuchadnezzar,
              Agamemnon, Ovid, for example. The third type takes us inside the second view type. Here we are solitary and so close to the view that we
              can feel the particles of air and participate in events that are unusual. Our sensory perception is not limited to its usual role in the
              actual world, Perhaps, we can eat the skin of a pea ‘explod[ing] with sweetness, sharding like rock’ (pg. 13) (even though the imagery confuses
              eye, tongue and literary sensibility) or consider that ‘this blueness is sweet as breath’ in part II, in ‘Eating the Firmament’ (pg. 41).
              We know what people look like before we converse with them; in this way, it is not impossible to be Ovid. However, it is words that transform
              us - actual scripted language - our fourth view type. ‘Meditative Sonnets on Voices, Bones’ explores this. ‘[N]ext to / the / whale skulls
              in [her] cupboard [...] cartwheels and pockets / of spine spoke the silence of the shelf’ (pg. 31). ‘Books For Dreaming’ takes this further:
              ‘I turn the pages of these books / and my body deserts me [...] I escape like clouds / in an endless chase after the world’ (pg. 49). A
              composite of these four views, a fifth type, is concerned with two ways of seeing . We transpose images that do not fit or help us at one
              level of the text by placing them into other levels of the text. This subtle point of view is perhaps what Eberhard is seeking out. She
              tries to show how this works with shared signs bringing the hidden or secret to the surface in part III, in the beautiful ‘Ceramics/Braille.’
              Here we ‘trace veins’, ‘taste this cauldron’, ‘Hear the featherbrush’, ‘Raised to exactness of fingerprints / the whole world is lit transparent
              / until muteness speaks in many tongues’ (pg. 54). In this context, ‘The Garden’ of part I, prepares us for the closing sequence in part
              IV, ‘Lines from the Black Sea.’ Eberhard’s choice of Ovid in exile is apt, showing us as much of her relationship with Tasmania as our understanding
              of Ovid’s longing for Rome: ‘I would navigate the narrow channels, / the inland waters, as if they were / the warm, secret places of my
              lover’s body.’"
        - title: Westerly Review
          text:
              "New Poetry 2003-2004 Adrian Caesar Westerly , Vol. 49, November 2004 In Adrienne Eberhard’s impressive first book, Agamemnon’s Poppies
              , it is a relief to find that irony need not be ubiquitous in twenty-first century poetry, and that the conventionally punctuated sentence
              still has a role to play in articulating subtle perceptions and fine shades of feeling. Refreshingly, Eberhard is willing to try her hand
              at the sonnet and rhymed quatrains, and though these do not seem to me to be amongst the best of the poems in the book, I applaud the ambition
              to make these formal structures her own. As the title implies, there is something in this book of the exoticism I noticed in Judy Johnson’s
              work, but here the rhetoric usually convinces of something deeply felt or imagined; there is a rhythmic and linguistic certainty in the
              development of the poems that convinces one that the writer is passionately engaged with her subject matter, rather than being passionately
              engaged with artifice. Eberhard is concerned with landscapes of the body, mind and heart; she has a talent for precise sensuality. Her poems
              about pregnancy and birth are admirable as is the ambitious sequence ‘Lines from the Black Sea’. Here, Eberhard imagines Ovid exiled from
              Rome by Augustus. She is not intimidated or inhibited by Malouf’s treatment of the same situation in his great book, An Imaginary Life .
              In the following poem, Eberhard fuses Ovid’s longing for home with his longing for love: If I had a boat and the strength to sail it I could
              make my way home. Return to the lithe, summer air, to the cool breath of early evening, to amber wine on my tongue. I would navigate the
              narrow channels, the inland waters, as if they were the warm, secret places of my lover’s body. I would suffer the storms of open seas as
              if they were the wild gasps, the frenzy of our couplings. I would breast the coast of my country, hugging every inch and crook as if breathing
              love into the pores of her body, cajoling with the lips and tongue until, at last, we arrive at Rome. The poem is simultaneously lucid and
              complex as it not only articulates the misery of exile and loneliness with its attendant sexual frustration, but also forces us to ponder
              the politics (and sexual politics) of an impassioned patriotism of place."
