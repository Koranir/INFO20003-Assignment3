woodsmoke:
    title: Woodsmoke
    author: Todd Turner
    short_description:
        Woodsmoke, an occasional motif throughout Todd Turner’s collection, refers to the ancient resins that fire draws upon in
        burning. The smoke becomes a signal for poems concerned with death, loss, craft and memory.
    long_description:
        "...A boy, my fingers intent and nimble as a lace maker’s, I peeled back the layers, split the husks, the green... Snap off
        the ends, tear open the strip, split the hull and with a run of the thumb rake the peas into the pot. Repeat. Todd Turner writes a poetry
        of unfashionable warmth. Woodsmoke, which is an occasional motif throughout the book, refers to the ancient resins which fire draws upon in
        burning. The smoke is the signal, the equivalent of the poem. His unforced measured language yields deeply moving poems—whether on the death
        of a brother or the loss of market gardens. This is what a modern popular poet should read like. It is simple but takes a daring amount of
        craft to get there. Todd Turner has produced a body of poems remarkable for the rich brocade of their language, their hard won lines, their
        hammered beauty. This is a poet who brings his work close to worship, who looks at the world and returns it clarified and finessed through
        his painstaking and elegant craftsmanship. Patience and a belief in the transformative power of poetry are at the heart of this most impressive
        debut volume. Judith Beveridge In Todd Turner’s Woodsmoke memory is a potent force at work. His ability to delight and disturb, often within
        the one line, gives these poems a vibrant, edgy quality that leaves us with a sense of heightened expectancy and urgency. Anthony Lawrence
        Turner’s language is at times rich with the savour of earth, stone, wood, at times as weightless as light falling over a field, which ‘passes
        for benediction’. Stephen Edgar Cover painting: Alexander McKenzie, Firestarter , 2011, oil on linen, 167 x 244 cm, private collection, Sydney.
        Image courtesy of Alexander McKenzie and Martin Browne Contemporary, Sydney"
    price: 22.95
    isbn: "9781876044862"
    release_date: "2014"
    page_count: 72
    reviews:
        - title: Plumwood Mountain Review
          text:
              "Woodsmoke by Todd Turner Brian Hawkins Plumwood Mountain Volume 3 Number 1, February 2016 Todd Turner’s debut collection deals mostly
              with the every-day: weeding, burning off garden waste, lying in the yard watching beetles, driving through the city, growing a bonsai wattle
              in a pot. The book is arranged in a loose chronology, with the earlier poems about rural childhood or family history, and the later ones
              set in adulthood in an urban environment – Sydney in at least some of them. The hinge between the two halves is Homecoming , a harrowing
              poem about the death of a brother. Many of the poems in Woodsmoke (e.g. “Shelling Peas”, which is excerpted on the back cover) consist of
              finely-crafted description set forth with little comment. The tone is sober, matter-of-fact, precise; and there is a fastidious avoidance
              of overstatement and verbal ostentation. They tend to regular stanzas, with lines of roughly equal length (there may be a more formal metrics
              at play): Whenever my mother took hold of the spade and handed me the cardboard box, I knew we’d be doing the weeds. She’d dig, while I
              stood there beside her as she threw them in. (“The Weeds” 5) A few poems (e.g. “Heading West to Koorawatha”, “September on Gasworks Bridge”,
              “Leaving My Place on the River”) offer the same basic aesthetic, but with irregular stanzas and line-lengths, and are reminiscent of poets
              such as Robert Bly and James Wright. The final section of “Heading West to Koorawatha” reads: It is almost dark, and the last of the light
              falls onto the canola fields, and onto the hillsides full of Paterson’s curse. I pull over and watch the sun sink into a stretch of grass.
              ( “Heading West to Koorawatha” 2) Nature poets since Wordsworth have been afflicted by the urge to moralise, to view the natural world as
              a teacher of lessons which it is the poet’s job to interpret. Turner’s collection is, on the whole, markedly free of this tendency. In fact,
              I found poems such as “The Weeds”, “Lot” and “After Chores” a little puzzling: the descriptions are finely wrought, but the emotional significance
              of the activities described is unclear. Perhaps the determination not to over-state, not to over-write, can go too far. My favourite poems
              in the book (“Woodsmoke”, “A Penance”, “Nocturne”, “Fieldwork”) are those that break free of the propensity to (stylistic and/or emotional)
              sobriety. In the title poem, the language is unusually extravagant: woodsmoke sends up its flag of stored aeons and multifarious resins
              in a surly blue charred blaze. The poet reveals that he thinks of it as what passes for benediction; the tenured door through which seasons
              pass, a time-tempered passage This poem ends: Somewhere lost among the welcome arms of the woodland trees I see it, adrift in a smock of
              ribbons, and set amid the downy blueprint of allegory, charted, in the aftermath of flame. ( “Woodsmoke” 3)"
        - title: Australian Poetry Journal Review
          text:
              "Todd Turner's Woodsmoke Carol Jenkins Australian Poetry Journal, Vol. 4, No. 2, December 2014 As poems only exist as the experience
              of being read, the reader’s job is to make the poem out of the gaps, to effect a surge of perception and understanding, and it might be
              argued that it is in the space between the words on the page, and the page and the reader, and the spoken word and the listener, is the
              space that allows this to happen, where the reader remakes this white space into her or his poem event. To my way of thinking one measure
              of the poem’s excellence is the how reliably this poetic effect can be found. I am a fickle reader, and I have read some poems once and
              enjoyed them but on a return reading find they’ve fallen quite flat: Single Use Only poems, as it were. A good poem is tamper proof; it
              delivers on any number of rereadings, and amplifies the friendship between poem and reader. So setting out to review a book, is for me a
              naturally hazardous process: I have to want to revisit the poems, and not turn what had been a pleasant one-off into a penance. Todd Turner
              is a goldsmith, and the word ‘lapidary’ seems to hum about Woodsmoke , his first collection, an elegant production at a modest 56 pages.
              The opening poem, ‘Shelling Peas’, sets out the rhythmic practice of shelling. It’s ostensibly a simple telling of a daily task, but the
              coda to each stanza, ‘Snap off the ends, tear open the strip/, split the hull…’ builds and becomes incantatory by reiteration, reinforcing
              the poem’s declarations for routines and repetitions, and the narrator’s application to craft, his liking for needlepoint and lace-making.
              All of these careful acts of construction provide an understated trope for the making of poems, a podcast, as it were, to the pleasures
              of orderly practice. From this contemplative domestic space, Turner’s poems move out into paddocks, past Paterson’s curse along flat roads,
              in cars and trains. From the second poem, ‘Heading West to Koorathawa’, until the road brings us to an end in ‘Field Work’, we watch a cinematic
              landscape slide by. The landscape ranges from back of Bourke through the porous edges of suburbia, where farmland is subsumed into house
              lots, leaving poignant remnant blocks, into the inner city. One of the central concerns of Woodsmoke is the migration of country families
              to the city, what they bring and what they lose. The poems here often find the pastoral looking out from bridges and train windows, congested
              roads turn into cattle races in ‘The Road’: The Road A few miles in and the road forks into a funnel of diverging ways. I steer clear of
              the cars that veer and swerve, and stick to the middle lane. Soon the traffic chokes to a crawl and it feels as if we’re being herded along
              like cows on a cattle run, all bulk and weight converging in the crush. Further on, beyond the gridlock, I pick up the pace and regain whole
              minutes of lost time, drive on at speed across a region of winding suburbs with the hard ground rushing towards me, the dark tar glinting
              with sparks the way rivers do in sun. This doesn’t last long, and it’s back to the bustle and chug of bumper to bumper, of vast and middling
              distances, innumerable and immense. We halt—and then putter along. The clear lens of the windscreen holds true. The sheer dawn-dusk of it
              all pushing us to press on, to come full circle, like the conjoining head and tail of a serpent, who makes of itself a perpetual ring. Turner
              catches the ironic rush and stall of traffic, wryly noting ‘now I... regain whole minutes of lost time’, and when he conflates the circularity
              of dusk/dawn with conjoined head and tail of the serpent, we have not just the ambiguity of going nowhere fast in a cattle/traffic race
              but a clever allusion, a whiff of that high sweet note in petrol, from the benzene in the motif of the ouroboros famed for providing Kekulé’s
              dreamt insight into the structure of benzene. A quick head count of noun groups to give a frequency distribution provides an insight into
              how Turner balances his palette. The noun subjects of Woodsmoke are broadly, in descending order of frequency: plants, animals, fields/terrain,
              rivers, roads, country towns, fire and smoke. He uses these to build a sense of down to earthiness that ranges from the subterranean up
              to the wink of starlight. In between the urban pastoral works are poems of quotidian practices and objects. Turner has a way of diversifying
              and then conflating his metaphors, so they amplify and illuminate each other. In ‘The Wireless’, he leads off with the evocative, ‘sepia
              tones’ deftly pairing the aural experience with visual nostalgia borrowed from photography and follows on with the hallowing effect of a
              ‘muffled sermon of kettle and cup’: The Wireless murmured in sepia tones; first creak of the morning, routine cockcrow, muffled sermon of
              kettle and cup. Little lamp light, dear hub of the house dawn kindler of draughts and cracked leaves, sweet shepherd of hob-fired broth,
              spirit level of whim and woe. Your console hummed from the rungs of the kitchen where no stool or step could reach your touch-tuned hearth.
              Upon the table, a stove warmed stout jug bubbled and brewed, knee-worn chair legs slid in under shadowed nooks. We sat and listened, hunched
              in the quiet. Potato eaters in the communal dark. Opening the second stanza with ‘Little lamp light, dear hub’ brings to my mind an echo
              of ‘Dear Soul Mate, little guest…’ from David Malouf’s wonderful ‘Seven Last Words of the Emperor Hadrian’. More importantly for Turner’s
              poem, this line sets up a tighter arrangement of the alliterative runs that were introduced in the first stanza; we have ‘hub of the house’,
              then ‘dawn kindler of draughts’, a phrase with one internal alliterative pair and a half of another pair in the next phrase, creating a
              movement that works to lead the reader onwards. So too do the nicely slant rhymes and half rhymes, hub/hob, hummed/rung, reach/heart, proceed
              with their job of discretely carrying us on without the obvious smack of settling into a predictable pattern. ‘The Wireless’ builds its
              picture of a family with an adroit ‘family-lessness’: the family here is unnamed and unseen until the last two lines and then only by actions,
              they listen ‘hunched in the quiet’, an act of fine ambiguity that plays on the radio creating its own silence, in parallel to the way a
              poem creates its own white spaces. Turner’s hybrid world of country/city has certain nearly painterly effects. While we are focused on a
              scene, it is frequently the light or the air that takes centre place, and provides an embodiment of the duality of place, evoked by phrases
              like ‘ ambling air that roams’ from ‘Mid Winter’ and then in River Birds ‘Strobing with its under-light/ to any passing thing.’ In ‘Pine
              Grove’, opposite the elegiac poem on a brother’s death, we spy in on a cemetery where mourners crouch and where the ‘unliving … have no
              words, no thoughts to speak of’, an interesting commentary on thoughts and words, and the numbness of grief. There is an uncanny uncertainty
              about Turner’s graveyard, and a certain knowingness about the odd juxtaposition contained in ‘Beyond the rows/of the flame-shaped cypress
              trees/ a man kneels above his own.’ Is it his grave, a grave of one his own or his cypress tree? The logic here is both nicely weird and
              entirely plausible. ‘Interiors’, a composed still life, opens as neatly as a venetian blind, with the drone of traffic and the nuanced pre-figuring
              of the river by the bridge and the final stanza ‘He draws the blinds/sees an ibis on the river/ pause… then take up flight’, where the neat
              enjambment of ‘pause’ works to give a sense that we are being given polite reading instructions, and then asked to think about it all. As
              a collection, Woodsmoke mines this kind of duality with deft technique. Turner often writes along an edge or brink to give the reader sense
              of depth. These are poems that don’t set out to obfuscate; here, lucidity, the pastoral and warmth of feeling prevail, and fine attention
              to craft pays off handsomely. I’ve focused here on the machinations of just four poems in this collection, but I think many of them will
              repay this kind of close reading."
        - title: The Weekend Australian Review
          text:
              "Australian Poetry Anthony Lynch The Weekend Australian , July 2014 Todd Turner is a younger poet, and Woodsmoke is his debut collection.
              Although Turner was born and reared in Sydney’s west, it is the pastoral realm that occupies him and makes him an heir to the more mature
              poets reviewed here, [Geoff] Page in particular. The poet’s parents lived in farming communities before moving to Sydney in 1959, and this
              slender collection draws heavily, and with great affection, on family and rural experience. The strong opening poem ‘ Shelling Peas ’ sets
              the tone, the rhythm of pea shelling captured in the refrain to each stanza, the poem a testament to the dignity of simple tasks. The title
              poem denotes woodsmoke as the signature of time and ‘what passes for benediction’, a ‘plait’ wending through land and the collection. ‘
              Mellowed Fruit ’ is a prayerful poem to the farmworker. Other poems fondly record the poet’s father working the land, and ‘ H omecoming
              ’ is a touching account of a brother’s death. Drawing strongly from English pastoral traditions — right down to the preference for ‘fields’
              over ‘ paddocks’ — these poems are a country mile from the recent Black Rider anthology Outcrop: Radical Australian Poetry of Land . The
              disrupted landscape of that anthology will grant some readers little foothold, but amid Turner’s rustic calm one might long for a mobile
              phone to ring and snap the verse into a post-pastoral 21st century. In Nocturne, the poet stands in ‘the neon blaze of the electric / light
              of the refrigerator door’ while his daughter sleeps. It’s a superb image, and an instructive one. Sometimes, you need to douse the fire
              and go electric."
        - title: Australian Book Review
          text:
              "Woodsmoke Geoff Page Australian Book Review - Sept 2014 Todd Turner’s first collection, Woodsmoke , evolves intriguingly. It starts
              in the ‘anti-pastoral’ mode founded by Philip Hodgins. Here the poet, long since relocated to the city, looks back with tellingly evocative
              detail but a divided sensibility on the life he (it’s normally a ‘he’) has now abandoned. Turner’s early poem, ‘Heading West to Koorawatha’,
              is a good example. It finishes: ‘It is almost dark, and the last of the light / falls onto the canola fields, and onto the hillsides / full
              of Paterson’s Curse. // I pull over and watch the sun sink / into a stretch of grass.’ Paterson’s Curse neatly embodies the poet’s ambivalence:
              it is visually beautiful but poisonous to livestock. Significantly, Turner’s action in pulling over to look at it foreshadows the metaphysical
              dimension that develops towards the end of the collection. The key continuity in this shift is Turner’s steady concern with verbal perfection.
              This at times can slow a poem’s impetus, and it is not for nothing that Turner, in a later poem, ‘Apprentice’, celebrates the would-be craftsman’s
              hands as being ‘wedlocked in the grip of some dogged / perfection, jigged epiphanies, theorems // in the crux of being stubbornly made’.
              In many of Woodsmoke ’s later poems Turner is noting and/or recreating moments of what even secular readers will be happy to call ‘grace’.
              His short poem of that title reveals what interests him most, and the closing lines seem to reach out to embrace the book as a whole: ‘Something
              about how the river rose, and / about the stillness of the birds on the banks / in the rain / and about the way the air made it possible
              / to forgive – / and be forgiven.’"
        - title: "Review Short: Todd Turner’s Woodsmoke"
          text:
              "Review Short: Todd Turner’s Woodsmoke Autumn Royal Cordite - May 2014 http://cordite.org.au/reviews/royal-turner/ The poetry in Todd
              Turner’s debut collection Woodsmoke explores topographies of land and memory. Comparable to the approach of Australian poets such as Philip
              Hodgins and Brendan Ryan, many of Turner’s poems explore human interactions with rural landscapes. Turner’s biographical note indicates
              that his ‘parents were from farming families in the town of Koorawatha, situated on the Western Plains of New South Wales’ (v). Like Hodgins
              and Ryan, Turner is unafraid to include autobiographical references within many of his poems. The collection opens with ‘Shelling Peas’,
              a poem that may be read metapoetically for the way it details the poetic qualities of the quotidian. The speaking ‘I’ in the poem, presumably
              Turner, refers to a childhood memory of shelling peas, a monotonous task the poet ‘hardly tired of…just eased into a certain / order, felt
              a kind of rhythm at hand’ (1). This ‘rhythm at hand’ puns on the crafting of poetry and also emphasises the cadences of domestic labour,
              the obligatory cycles that can inform our imagination. It may be argued that for Turner, the consideration of memories through poetic encounters
              allows for an enhanced understanding of the self. Following this assertion, the poem ‘Shelling Peas’ may then be read as a Turner’s retrospective
              identification of a moment where he first began to perceive the poetic qualities of the diurnal, evident in many of Woodsmoke’s poems: Front
              porch, set up in a row of chairs, given a bucket of pods, we were told to wash the grit then prise the husk for peas. A chore I didn’t mind,
              I took my time over every pail, over each repetitive task… Snap off the ends, tear open the strip, split the hull and with a run of the
              thumb rake the peas into the pot. Repeat. (‘Shelling Peas’, 1). The three italicised lines ending this stanza become the poem’s refrain.
              It is within this refrain that one may understand the metaphorical process of the ‘run of the thumb’ as a means of extracting a moment or
              idea from its ‘hull’ and containing it – like the ‘peas into the pot’– within a poem. Through this process, Turner learns ‘to feel the variance
              between / each seam, between the notched ends, / the ridged sides’ (1). Turner’s use of the ellipsis also instills a subtle playfulness
              in this poem. Appearing immediately before the poem’s refrain, these ellipses simultaneously represent the ripe peas being extracted from
              their pods and the swelling thoughts occurring during such a repetitious task. Recollections of the past, both actual and invented, form
              the basis for many poems in Woodsmoke . Poems such as ‘Crop’, ‘Kooravale, 1959’, and ‘Kooravale, 1971’ are imaginings of farming and family
              challenges during the years before Turner’s birth. ‘Kooravale, 1959’ is particularly striking for the way it explores gendered obligations
              that may pertain to (but are not isolated to) farming families. The poem, dedicated to Turner’s mother, opens with an ominous description
              of a farmer ‘hacking the edge / of the boundary line with his scythe’ (6). Connections between masculinity and violence are made between
              this act of labour and the paradoxical complicity and victimisation felt in viewing such acts: From the porch my mother looks on, hearing
              the whip-sound of the blade, the light lowering down upon the crop with every cut. (6). The shortened line: ‘with every cut’ enacts the
              process it describes and also echoes the limitation felt by the woman in the poem; the reader may conclude that there is nothing left for
              her on this farm, this land is not her land. References to boundary lines, edges, blades, and traps also emphasise the restrictions felt
              by this woman, who is thankfully given a means of escape in the poem’s final couplet by following ‘the train line that is headed / the other
              way’ (6). The final line of the poem, ‘the other way’, is also shortened, suggesting that the act of leaving the farm is not necessarily
              an easier path to follow, it is merely a new direction. Turner’s poems, many of them written in unrhymed couplets, tercets and quatrains,
              are filled with acute observations of the poet’s immediate surroundings. Poems such as ‘Nightwalk’ and ‘Fieldwork’ explore the contrast
              between the natural and urban ecosystems, as the opening lines from ‘Nightwalk’ demonstrate: ‘Wedged between the suburbs and the city, /
              the parklands are a labyrinth in the dark’ (34). During ‘Fieldwork’, the collection’s final poem, the poet asks: ‘I know what the cycle
              / serves, but what is being served by / the cycle?’ the question remains unanswered, but the poem, and perhaps too the collection as a whole,
              become Turner’s attempt to grasp at such an answer. Like the smoke that ‘plumes from the fire’s red hearth’ (3) in the collection’s eponymous
              poem, ‘Woodsmoke’, some memories are as distinctive as smoke curling into the air, rich with possibility or menace. Turner’s poetry captures
              his observations of environment and his contemplations of memory in ways that allow for new meanings to rise up for the reader. Back to
              top Start of StatCounter Code End of StatCounter Code"
hidden:
    title: Hidden
    author: Mirranda Burton
    short_description:
        At first glance, Mirranda Burton’s art room is a hidden world full of strange eccentric characters and mysterious minds.
        The stories move through joy and sadness, pain and comfort, community and art.
    long_description:
        At first glance, Mirranda Burton’s art room is a hidden world full of strange eccentric characters and mysterious minds. But
        stay a while and in that room you'll find all the joy and sadness of life, the pain and comfort of community, and the ultimate meaning of
        art. This hidden world is our world; it is where we all live, together and alone. In Hidden Mirranda Burton is writing about what matters
        most, and she does so with such gentle humanity and wisdom these stories will stay with you long after you turn the final page and reluctantly
        close the art room door. It is one of the most beautiful books I have ever read.” Dylan Horrocks, author of Hicksville
    price: 22.0
    isbn: "9780646559063"
    release_date: in French by
    page_count: 104
    reviews:
        - title: The Age Article
          text:
              Artist Uncovers A Hidden World Carolyn Webb The Age , 30 August 2011 An artist has turned her weird and wonderful experience teaching
              art to intellectually disabled adults into a new book of graphic short stories. Characters in Hidden , launched yesterday at the Melbourne
              Writers Festival by Mirranda Burton, include Ronnie, who hugs vacuum cleaners, Steve who’s prone to farting and stripping naked, and Annie,
              who only draws genie bottles. Ms Burton, a former Disney animator with no previous link to the intellectually disabled, writes that entering
              the classroom “was like opening a new tin of ink and rolling out a colour I had never seen before”. The book gives fictionalised sketches
              of people at a Melbourne institution with conditions such as acquired brain injury and Down Syndrome. Ms Burton draws herself as an earnest
              woman keen to do the right thing. But the students’ obsessions send her into fantasies of asking Elvis Presley for teaching advice or walking
              inside a vacuum cleaner, where she asks the resident genie whether her art room has a future. “It’s affectionate humour,” she says. “I think
              if you work in this industry or have a relative with a disability, and you can’t laugh, you'll go crazy.” The students taught her that art
              could be unselfconscious, without ego and a handy vehicle for emotions. Mercurial Eddie can’t speak, but lights up when he devises scrawled
              pencil drawings of his bike, his mandolin and his teacher. Gentle Melanie draws a touching love heart for her boyfriend. “It's symbolic
              of what she’s expressing. Whether it’s a fine piece of artwork that will go in the National Gallery is completely irrelevant,” says Ms Burton.
              The title Hidden was inspired by autistic woman Julie, who would hold her art up to block her face when photographed. It also describes
              the world of the intellectually disabled, that not many people see, that a lot of people misunderstand and fear”. Mindless bureaucracy -
              cost cutting, building closures - is a constant threat to the characters’ fragile world. Echoing a recent news story of the closure of a
              disabled men’s house in Northcote, Julie is bereft when she is suddenly moved to a new suburb. She takes a bus to her old neighbourhood
              shop “just so she could buy a chocolate bar from a familiar face”. While she will continue teaching, next month Ms Burton starts a year-long
              artist residency at Clifton Pugh’s property Dunmoochin, near Hurstbridge. Hidden was launched at Federation Square by comic book artist
              and publisher Bernard Caleo. Mr Caleo said Hidden was “a very significant book in the development of autobiographical comics,” because it
              doesn’t navel-gaze. “It’s clearly Mirranda's story, it’s her life, but she’s like a guide, a Virgil, taking us the reader into an unseen,
              unexperienced world. The art students are trying to understand this incomprehensible world and we’ve got Mirranda doing the same for us,
              the reader.”
        - title: Friday Fave Annabel Smith blog Hidden Review
          text:
              "Friday Fave: Hidden by Mirranda Burton Laurie Steed Annabel Smith blog , May 2013 I had flown in from Perth to attend The 2011 Melbourne
              Writers Festival. I wasn’t on the programme that particular year, and, truth be told, was not sure why I’d come. I spoke the previous year
              on being a professional writer; now here I was being a professional slacker instead. They had invited graphic novelists to work in The Atrium
              at Federation Square as part of the festival’s Don’t Feed the Artists installation, a high-definition camera set up to chart their every
              sketch, projected up onto a huge screen. Having spent the day watching worlds created with my friend Andy, the two of us reclined in matching
              beach chairs, I ventured across to the bookstore. I perused the shelf looking for something special... something different. I wish I’d gone
              to the Hidden launch at MWF 2011, but me being me, I missed the boat. As it was, she made my festival. Mirranda never set foot into my world
              and yet it feels like she was there, seeing what I saw, taking it all in alongside me. Together but alone, we thought about what it means
              to love, be loved, and stay human. If I ever meet her, I’ll give her a big hug, unless she’s not a hugger, in which case I’ll just say,
              “Hey, I’m Laurie, it’s great to finally meet you,” and politely shake her hand. I love this book more than muffins, cakes and most types
              of biscuits. Read it and you will too. Laurie Steed is a writer, reviewer, editor, and freelance journalist."
        - title: Australian Comics Journal Review
          text:
              "The Fine Line Between Okay and Not Okay: Mirranda Burton’s Hidden Owen Richardson Australian Comics Journal , 16 May 2013 I feel uncomfortable
              around the mentally disabled. It isn’t something that a person is supposed to say, but I feel as if it’s something that I have to say. I
              have very little experience with, and knowledge of, the mentally disabled, and thus I either find myself patronising them or being slightly
              afraid of them. I’m working on it, as clearly this is not ideal, but it’s a work in progress. Mirranda Burton, thankfully, is not me. Mirranda
              Burton is an extremely talented woman, who tells stories about her time as a teacher within an art class for the mentally disabled. What
              kind of disabilities her subjects suffer from are never revealed, simply because they don’t matter. What matters in Burton’s Hidden is their
              personalities, their voices, and how they express themselves through their art. The first story concerns the mercurial Eddie, who lives
              for his sister’s visits, his pencils sharpened to fine points, and his etchings. He etches intricate patterns on pieces of paper until the
              paper is nothing but black. Then there’s Julie, the resident rock’n’roll afficiando. Julie’s so skilled with lino prints that Mirranda attempts
              to enrol her into an art course at a local TAFE-like institution, however unfortunately Julie can’t get in because of a lack of computer
              skills. She has also recently moved home and was mugged. Other characters who are in the class include Steve, the flatulent weather guru
              who stages nude protests when he doesn’t get his way, and signs his art ‘p’ and ‘s’, short for ‘pig’ and ‘stink’. Annie, who feels the need
              to protect the art room from those ‘different’ from her, aka the high support mental patients. And Ronnie, one of those patients, who is
              obsessed with fans and vacuum cleaners. Themes of anxiety and fear run throughout the graphic novel, but it’s because Burton feels protective
              of her class, rather than afraid of them. She tries to understand and help them in ways big and small, whether it’s trying to find Julie
              alternative accommodation so that she doesn’t feel so afraid, or constantly sharpening Eddie’s pencils. But most of all, Burton is worried
              about how the outside world sees her class, the increasing funding cuts to disability support, and the ways in which we see people who are
              ‘different’. Naturally, it was an idea that somebody relatively privileged and ignorant like me had to mull over, anyway. The irony of researching
              comic books is that I don’t get too many opportunities to read them anymore, and so I hope that when I do get to read one, it’s worth investing
              my time in, leaving me with questions, thoughts and feelings. From Hell left me feeling disturbed. Rooftops left me feeling pensive and
              nostalgic. Maus left me feeling emotionally drained and sad, but then again if anyone can read Maus and NOT feel that, they’re either an
              android or a sociopath. Hidden was one of those graphic novels that left me with a distinct feeling. I suppose the most accurate way that
              I could describe it as disquieted, the feeling that I’ve looked into a world that I’ve never properly understood, and like Burton, becoming
              emotionally invested in these people so I start to fear for them, rather than actually fear what they are. The longest story, ‘That’ll Be
              the Day’, concerns Julie, and for good reason. It’s the most ambitious, both in terms of emotion and artwork. Using strong black and white
              contrasts and fine lines, Burton’s art is also characterised by people who manage to be expressive, even as they are drawn with basic strokes.
              It’s a skill, and I’d put Burton up there with Clowes and Burns in that regard. But the real surprise came from Burton’s whimsy, which fully
              suited an introspective piece such as this. Told from the author’s point of view, there are flights of fancy, such as when Burton, confounded
              by Annie’s questions about ‘medicine being yummy’ on the Titanic, is floundering in a cup of tea. My personal favourite imagination interlude
              is in Julie’s story, when Burton converses with Elvis and Buddy Holly before sinking into a record as if the vinyl was quicksand. Empathetic,
              intriguing, and very funny in places, Hidden is one of the best graphic novels that I’ve read in a long time. I look forward to seeing the
              art that Burton produces in the future, as she’s a talent in deserve of recognition."
        - title: The Age Review
          text:
              "Graphic Memoir Owen Richardson The Age , 1 October 2011 “When I took a part-time job as an art instructor to people with ‘intellectual
              disabilities’, ranging from Down syndrome to autism,” Mirranda Burton writes, “I was rescued from learned ideas about human progress.” This
              short book of four graphic narratives introduces those who rescued Burton. The old line about how they taught her as much as she taught
              them comes to life, so natural and unassuming is Burton’s way of telling the story. There is Eddie, who fills in each piece of paper with
              pencil lines until he gouges a hole in the page, and Julie, whose severe autism coincides with an artistic gift good enough for Burton to
              try to get her into a mainstream art school; and Steve, who only a mother could love. Burton’s depiction of her charges is wry and warm
              and never mawkish. The society that is outside the art room has various ways of being ungiving or threatening. Julie is mugged, and she
              can’t get into that art school because of the essay requirements: the government wants people to move from assisted to independent living,
              with all the strain and disruption that goes along with that. And towards the end even the art room itself is under threat as in some post-apocalyptic
              fantasy, the buildings around the facility are closed down one by one, abandoned and left to the elements. Burton has a strong, straightforward
              visual style, with the emphatic though never overstated lines of a woodcut, and it moves easily from realism to occasional flashes of fantasy
              to suggest both her students’ strange inner worlds and her own sense of disorientation."
        - title: The Book Show Review
          text:
              "Hidden Ronnie Scott, editor The Lifted Brow The Book Show, ABC Radio National, 5 October 2011 Mirranda gave up her job as an animator
              for Disney to teach art to intellectually impaired adults. But quite unexpectedly, her new career spawned a new project. She decided to
              write and illustrate a book of graphic short stories, inspired by some of her students. The book's called Hidden and it takes us into the
              minds of fictionalised characters suffering from Down syndrome and brain injuries . Ronnie Scott: On the final page of Hidden there's a
              scene that shows the artist, Mirranda Burton, emptying a vacuum cleaner bag. As she does, she tells us that it traps more than dust and
              pencil shavings. In fact, she draws a parallel with the art room she’s just vacuumed, which she says is notoriously thick with the particles
              of artists’ hopes, dreams, passions and desires. These characteristics might be true of any art room, but they’re particularly true of Burton’s,
              where Burton practises a form of art therapy with the mentally impaired. Throughout Hidden , Burton takes us on a tour of her art room,
              but more so of the people who work within it. In comics it’s hard not to feel a closeness with the artist: their hand is how we undertake
              their experience of the world. This is why autobiographical comics often work so well, but it’s also why it's refreshing that Burton’s
              comic is a journal about something other than herself. It’s about her students, like Eddie. To him, Mirranda is just a giant pencil sharpener,
              which makes sense because Mirranda’s role in Eddie’s life is more or less the sharpening of his pencils. But both explicitly and artistically,
              this act of pencil sharpening is likened to the creation of a blade; it becomes logical, then, that drawing with a pencil is likened to
              physical carving. If a pencil is so sharp it hurts, then and only then is Eddie satisfied with Mirranda’s work. By reporting this, Burton
              deepens the image of the pencil until it develops into a malleable vocabulary. In Burton's hands, this pencil -- which is such a simple
              image! -- represents expectation, mental state, and the cyclical character of life, often on an individual page. Few of these symbolic uses
              of the pencil are ever written, but considering the subject matter, and the setting-an art room -- it’s all the more powerful because it’s
              drawn. Eddie’s is just the first of several character studies in Hidden , and Burton herself seems to float between these stories, always
              half-personally observing the art and the behaviour of other people, wondering at the fact that she’ll never actually see anything but the
              physical remnants of their perceptions. The problem of personal reality is often questioned, but never solved, and Burton exhibits an admirable
              lack of anxiety at this position. She seems to see her job as opening the conversation. Beneath the loveliness of this book, she has a lot
              to say about social policy. One short, sad sequence tells how a character is barred from enrolling in an art school due to a lack of computer
              skills. In presenting this story so simply, and focusing on the character, Burton allows us to unpack the problems and complexities ourselves,
              feeling it from one perspective and observing it from many more. At the same time, she’s still deepening that visual vocabulary: a vinyl
              record becomes both a pool of ink and a disc, the images combined so skilfully that she both sinks in the ink and spins upon the record.
              Eventually, it becomes clear that Burton, as an art teacher, is trying to formulate a kind of sign system for her characters. In other words,
              the way she draws that pencil, and that record, has as much emotional purpose as the expressions on her characters’ faces. For the people
              in Mirranda’s art room, our usual ways of getting by in the world-the filling of forms, the renting of houses, admissions processes – aren’t
              adequate. But unlike bureacratic forms, the pencil means a lot to Eddie and that vinyl record is Burton’s shorthand for another character’s
              love of music. Burton mainly comes to understand the people in her art room by observing the art they make. After all, she can’t see inside
              their heads. But she can help us understand them through pictorial language, and this makes Hidden not just an enjoyable read, but valuable
              as well. Link to The Book Show"
        - title: Comicbookslut Review
          text:
              "The Cockroach in Your Head Martyn Pedler Comicbookslut , September 2011 Hidden , the first graphic novel by Australian Mirranda Burton,
              is a collection of stories about her time as an art instructor to adults with “intellectual disabilities.” (Her scare quotes, not mine.)
              On the very first page, she says that this position “rescued” her: “I stepped into a reality outside of the box and hit the ‘reset’ button.
              It was like opening a new tin of ink and rolling out a color I had never seen before.” ...Burton’s black-and-white artwork provides some
              truly superb acting for her unusual cast - slumped postures, head tilts, averted eyes - but it’s also littered with fantastical moments
              as she tries to understand her student’s hidden worlds. “Oh for those ten thousand wishes,” she says, “to see how you all see for just a
              minute...” Her best guesses, though, are powerful. For example: the artwork of her student Eddie is comprised hundreds of small graphite
              marks, crisscrossing until the page wears through. Burton shows his language in the same way, filling Eddie’s speech balloons with these
              indecipherable scratches. As Eddie becomes more and more distant from others, these marks also cling to him like metal shavings on a magnet.
              Even time passing is expressed within the same vocabulary as Eddie’s pencil is sharpened smaller and smaller, down to a nub. Less successful
              are when fantastical moments swim around her, instead of her students. The third story in the book, “That’ll Be The Day,” concerns an autistic
              young woman and talented artist named Julie. Julie’s struggle with budget cuts and bureaucracy is heartbreaking, but when her obsession
              with ’50s and ’60s rock music causes Mirranda to hallucinate her own Elvis it feels like something from a quirk-heavy sitcom. And yet Burton
              can yank those moments back to emotional truth with the turn of a page - as when Mirranda, overwhelmed with concern for Julie, sees herself
              drowning in the spinning vinyl quicksand of those same songs. When Mirranda looks deep into Eddie’s eyes, there are no answers. She can’t
              see through the twin peepholes to whatever’s living inside, peering back from inside his head. All she sees is “a deep, dark mystery.” Burton
              should trust her art to do more of the heavy lifting, as these words diminish what we can already see. The same when she thinks about “how
              much I didn’t understand... and wondered if I’d ever stop asking questions.” The book itself, the one we’re holding, makes this sort of
              narration unnecessary. It is the question; unselfconscious proof of Burton’s curiosity and compassion."
        - title: Adam Ford Review
          text:
              "Hidden Adam Ford theotheradamford.wordpress.com, 19 October 2011 This arvo I had a chat with alicia sometimes and Clementine Ford (no
              relation) on RRR’s Aural Text. I gushed and mused (mushed? gused?) at them about Mirranda Burton’s Hidden , a beguilingly gentle and deft
              collection of stories about her job teaching art to adults with intellectual disabilities. It sounded a bit like this: Radio review at 3RRR
              here Excerpts from radio review: Adam Ford: I was curious as to how Black Pepper would approach printing a graphic novel. It’s a sequence
              of four short stories that are all semi-autobiographical stories about Mirranda's job teaching art to adults with intellectual disabilities,
              Down syndrome and autism. When I say semi-autobiographical Mirranda looms large in every story but the stories ostensibly aren’t about her,
              they’re about the various students that she has within the art room - some of them are her students and some of them are people who just
              come into the art room to use the art facilities, whether they’re supposed to or not according to the rules of the organization that she
              works with. It’s a really lovely story about eccentricity and how looking at other people’s lives can make you reflect upon your own life
              and the assumptions that you make about the way things work. And it’s rather beautifully drawn as well. If I was going to compare it to
              any contemporary comic artist at the moment I'd think about Marjane Satrapi’s Persepolis books but perhaps with a little bit more depth
              of field in terms of shading. I’ve read a couple of reviews of Hidden and a lot of them remark upon what they call the woodcut like appearance
              of the artwork. On the one hand the figures in the artwork are very simplistically drawn, thick artwork very simple facial figures but on
              the other hands the backgrounds are often very exquisitely rendered, so it speaks of Mirranda’s depth of talent that she can undertake a
              variety of styles within the same story. alicia sometimes (interviewer): The beautiful thing about graphic novels obviously is the picture
              being able to tell a story when the words fail and to me it seems like that particular kind of story would lend itself really wll to that
              format. Adam Ford: Very much so. That’s a really good point. Well one of the things that stand out for me in trying to work out where does
              Mirranda come from in the really wide spectrum of comic art (and one of the nice things as well as the variety of style) is the subtle crossing
              of the line between the depiction of real events to metaphorical depictions of almost dream state events. And so you’ll have two or three
              pages that will be essentially Mirranda talking to her students and then all of a sudden the next panel will have her climbing inside a
              vacuum cleaner to have a conversation with a genie and then she’ll go straight back to the art room again. Or Elvis Presley in one story
              suddenly appears at the end of a class and everyone suddently goes into this full rock and roll medley, shake it all out baby, and then
              the day finishes by packing up the art materials and closing up the door of the art room. So there’s a very nice visual metaphor device
              being used consistently throughout the collection . On the one hand it takes you aback as it just shifts so quickly but on the other hand
              it’s a gentle move from one to the other so it feels perfectly natural when it happens. alicia sometimes (interviewer): Is that a deliberate
              metaphor using the potential of art to deliver a group of people who as the title suggests are hidden from society into a place where they
              can explore parts of themselves where they don’t have to be either hidden or different? Well I think so. You definitely get the sense from
              the stories that Mirranda tells that this is a safe place for these people, where she doesn’t come across as a very prescriptive teacher.
              She provides the art materials for them and guides them as they ask in the skills they are interested in. One of her students is simply
              interested in drawing in greylead pencil on a piece of paper until it’s so full of greylead markings that it’s one black blob and he’ll
              even go beyong that and have drawn it till the paper tears. Another of her students is very much into linoprinting, linocut and block printing,
              and you do get this sense that the art is providing a safe place. Maybe not for them to hide because there’s a tension in the story that
              comes out. By the time you’ve read the collection there’s a sub-text there about the fragility of that kind of space. Mirranda is a part-time
              art teacher in a Department of Human Services funded arts school that looks after clients with special needs and of course in contemporary
              society there’s financial pressure on maiintaining those institutions and occasionally in these stories these tensions will rear their head.
              A certain student will be moved out of her residential unit to a different residential unit on the other side of the city. Another student
              will try to undertake art classes within a non-specialist organization and then fail to meet the entry requirements of literacy. So there
              is this sense of being hidden and safety. I didn’t come right out and say it, but I really love this collection. I’m intrigued by the venture
              into graphic novel territory that this represents for poetry publisher Black Pepper, but I can see the logic in the fit: like a lot of good
              poetry, Hidden uses a combination of personal stories, metaphor and flights of fancy to reveal the unique and the universal in everyday
              life. Here’s to seeing more comics turn up in unexpected places."
        - title: Comicsworthreading Review
          text:
              Hidden Johanna Carlson Comicsworthreading.com , January 2012 One of a number of graphic memoirs inspired by the success of Persepolis
              , but I appreciated the confident blacks on display in the solid art. Burton teaches art to intellectually disabled adults in Australia,
              and the stories here deal with how it is to work with people who don’t operate the way others do. “Memoir” is somewhat incorrect, since
              we learn nothing about Burton herself, why she came to this job, or her life outside it. The first character introduced, Eddie, speaks only
              in sounds, but his obvious care for others in the face of his own obsessions is touching. Eddie’s verbal tic is illustrated through pencil
              scratchings in his word balloons, a visual technique that sums him up elegantly. Steve is annoying in many ways, his focus on illustrating
              the weather report only a small one. The autistic Julie is obsessed by rock’n'roll and literally hides behind her art. It’s not all discouraging,
              though. One patient, Kate, shows improvement through diet changes and art therapy. Underlying all these glimpses into moments in patients’
              lives is a fear of encroaching budget cuts. If you liked Psychiatric Tales and wanted more, this would be a good next choice.
a-picture-out-of-frame:
    title: A Picture Out Of Frame
    author: Mammad Aidani
    short_description:
        In A Picture Out Of Frame our sympathy is wholly engaged. A boy grows up in poverty in Iran; he goes to the capital; he receives
        a letter from a friend; he is in exile. Nothing else happens. It will break your heart.
    long_description:
        In A Picture Out Of Frame our sympathy is wholly engaged. A boy grows up in poverty in Iran; he goes to the capital; he receives
        a letter from a friend; he is in exile. Nothing else happens. It will break your heart. The prose is simple like that of Juan Ramón Jiminéz
        in Platero and I. (Yes there are donkeys here too.) But the village life so lovingly portrayed is on the brink of tragedy. That fate is precariously
        held in balance; its extent is only fully revealed in the letter received at the end. Aidani's deft ability to hold back in the face of overwhelming
        odds justifies his deliberate simplicity of style. The structure is invisibly subtle. A meditation on the connections between reality, imagination,
        past and its present, this is a challenging book with revealing emotional richness. It tells the story of a young man who speaks in the third
        person in order to examine what he saw and suggests that this story could be anyone’s when invasion, war and terror dictates. The book invites
        the readers to be the real witness of its character’s narrative and observe how he shares his shattered world with us. The narrator invites
        us to think about the power of memory and its expression in our lives. A Picture Out Of Frame is ultimately both hopeful and challenging,
        revealing how urgently the West and the East need to embark upon an understanding of each other. I SBN 1876044233
    price: 21.95
    isbn: "1876044233"
    release_date: "1997"
    page_count: 86
    reviews:
        - title: Ulitarra Review
          text:
              "Exiles in heart and mind Andrew McCue Ulitarra, No. 14, December 1998 If you take your hat off to Sant [ Album of Domestic Exiles ]
              for giving you the exile’s natural, if cool-heeled intelligence, you eat it for what Mammad Aidani can do with banishment’s blistering heart.
              Neatly, for the conceit of this review, Sant’s finale is this: ‘Write! And make exile / unite with the reach of a table.’ Mammad Aidani’s
              short novel starts out with a man at a table doing this. ‘What kind of world are we living in?’, he asks himself looking into the distance
              of his memories. He feels the exhilaration of his strong desires and hopes for a better future. Aidani’s ‘he’ is not so much a man who writes
              his exile at arm’s length, as feels it written upon him. He asks, ‘What kind of world?’ and reads himself for the answer. The marks run
              deep, but he also finds hope in the remarkable plasticity of his own substance. The passions and excitations of exile are never allowed
              to wallow in self-pity or nostalgia. Aidani’s man may be banished from his homeland, but the tall canopy of his exile also enables a critical
              overview of his nurturing roots. ‘What has that village done to us?’ he asks of his childhood haunts (in what I take to be Iran), but the
              voice that replies is that of the older and exiled man: Suspicion is always there in the village. One can see it and almost taste it in
              the air. There is no language there. People speak only on rare occasions. Men speak to each other and women speak only to other women. One
              may ask, when seeing them, what planet are they living on? It brings me to believe that natural human interaction has been suppressed for
              centuries. This is called intimidation. In the marketplace, silence is the symbol of discussion... The ground is the only medium to which
              one can talk freely. Clear-sighted, hawk-eyed the vision may be, but as it is rendered in this humble but far-reaching book, it is in constant
              and dramatic conflict with the blind longing to belong. These are, after all, the memories which constitute his own sense of being. And
              if in exile he ‘wishes he could hear someone or write, ...he knows, as they would all know by now, that memories are private possessions’
              - not to be spoken aloud, painfully kept to yourself, yet ironically, the only attachments that cannot be ‘stolen or destroyed’. It is a
              cruel exile, whose heart confesses its longing for a past in which the heart cannot speak, but Mammad Aidani lends it voices of passion,
              compassion, drama and even hope. The exile, at least, and unleashed, can speak for itself."
        - title: Overland Review
          text:
              "The Australianity of this Literature Dan O’Neill Overland, No. 152, Spring 1998 A hundred years ago some of the best energies of Australian
              literature were devoted to defining and registering what was typical of the nation. It was always possible for discerning spirits to see
              that enterprise as somewhat foolish. Christopher Brennan, in the Sydney University magazine Hermes in 1902, for example, saw ‘the Australianity
              of this literature, which largely dealt with and was mainly addressed to mythical individuals called Bill and Jim’ as ‘painted on, not too
              laboriously, from the outside’. What was wanted was something cooler and less chauvinistic. But neither the writers he mocked nor Brennan
              could have predicted the present state of affairs in which the national writing scene is full of the most ‘untypical’ characters, being
              Australian in the many ways that their various pasts in various parts of the globe have made congenial, natural or necessary to them. Among
              those ways is that in the tradition of Conrad, writing as someone who has embraced the English language with a passion born of a love of
              its literary potential, writing about places that are ‘over there’, writing with the complicated feelings of the migrant, the refugee, or
              the exile, writing with the conviction, wrested from widespread forms of modern suffering, that all countries, all cities, are capable of
              showing the same terrible things about the plight of being human that have driven some people to this country, where they are still at least
              free to write. This, for some people nowadays, and for those who read them, is ‘the Australianity of this literature’ as well. Those who
              are already familiar with the poetry of Mammad Aidani will know that he is such an Australian writer resident here after three years in
              Europe, principally in Italy. I am sure they will welcome this prose work, as will readers who here encounter him for the first time. The
              genre lies somewhere between novella and prose poem. It was a good idea to precede it by a foreword consisting of an excerpt from a letter
              that the writer sent to his family from Brisbane in early 1983. For its preoccupations give the best clue to the real content and the real
              method of the work that follows. He speaks of ‘the war’ (it remains that undefined and thus potentially historico-mythic throughout) that
              continues, of his isolation (‘People here do not talk about the war and us at all, as if that part of the world that I come from is irrelevant’)
              and of his desperate attempt to maintain some kind of human continuity, some link with them and with what he must keep on valuing to survive
              - ‘I’m seeking goodness and love, for beauty and knowledge, as you have taught me with your simplicity and poverty.’ He speaks also of the
              necessity he feels to keep on writing: ‘I feel now that I’m alone I have to create my world in my mind’s imagination... I have this strange
              feeling that if I don’t write I will die unnoticed ...’ Writing helps him in ‘forgetting the pain’. The work has two parts. Its overall
              effort is to keep alive the images that remain in the mind of the exiled anonymous central figure who is first presented to us as someone
              looking back with his fading memories to an otherwise irrecoverable past, to a land that is, for him, a village and then a city slum of
              his childhood and adolescence. He is in a barely furnished kitchen in a new land, and the reader joins him in a painful effort of recall,
              of going inward to glimpse, fan alive, and warm the mind and heart at, whatever ashes of the old life remain there for his imagination to
              cherish and extend into a renewed attempt to live. Aidani has very evidently given a lot of thought to the travail involved for a writer
              in working, not with fantasy elements, but with what is genuinely there, and in building on the remembered fragments of the precious past
              to recover the world that one once lived inside. In fact, for the reader, a great part of the subtle but firm structure of the work is the
              well-communicated process of gradual emotional breakthrough to a solid connection with the threatened past of the central figure. In the
              first chapter we see and feel this effort begin, as the narrator shows us the exile, under the pressure of his great need, trying to get
              too far: He returns to the side of the chair, thinking, ‘What would it be like to be prosecuted and to be waiting for the following morning
              to be hanged or shot?’ This thought, which will not be explained until near the end of the second part, and which is centrally important
              to the effect of the whole work, exacerbates the frustration and despair of exile. And, in the mind that has been cruelly torn from its
              native context, it is a thought that can only stay alive after that mind has gone back to the beginning. Hence, for the rest of part one,
              we see in quickly evoked flashes a retrospect, from childhood on, of images, fragments, residues that are deftly interpreted with the later
              knowledge of the character-narrator so as to go beyond the boy’s then world. For the boy has ‘a vast array of images’ but, ‘like the others,
              he has no language other than a vocabulary of three hundred words’. The true pathos of the work lies in the sort of healing that the central
              figure is trying to bring about by this attempt to go back from the world he now lives in, to re-connect that old world that has made him
              to this new world that is so big, so cruel and merciless, and that was already there in the occupation of the city by the soldiers. This,
              which he begins to remember, and, as it were, re-make in part one, is the obsessive theme of part two. Years of living in cities of strangers
              seem to lie behind Aidani’s skill in evoking the imprint of massive events on the collective psyche, as gleaned by the lonely and sensitive
              individual from the look and feel of public spaces, crowds on streets, queues, bare trees and other indices of gloom, anxiety and suppressed
              anger. He is good at the poetic evocation of the symbolic and allegorical dimension of events - a conversation between friends as the troops
              begin their seizure of the city, the return and then death of the family’s long-lost adopted stray dog, a train’s crossing of a stretch
              of desert to get from village to city, the gathering of migrant Kurds on a particular street in town. In fact, as a true poet, he shows
              facility in managing the lyric and the epic tasks of writing, guiding the reader to the individual’s and the people’s feelings. He has yet
              to become master of the dramatic. The dialogue, except where it can be read as the externalization of archetypal thoughts of quasi-mythic
              figures, reads a little stiffly, set-pieces designed to expound thoughts of the author, rather than the utterances of living beings. The
              conversation of the mother and father of the central character seems mainly devoted to demonstrating the poverty and oppression that afflicts
              their whole class. It contrasts unfavourably with the power and tenderness of the more direct evocation of the character-narrator’s feeling
              for the love between his parents. It is true of the work in general that its life resides in the saturation of memories of a treasured past
              in the powerful feeling that the act of writing both calls up and embodies in words. Its true unity lies not in the concatenation of its
              episodes or the interaction of its characters, but in the sure growth and flowering of its emotional world towards a climax of sensibility,
              after which we return to the central character sitting at his desk in the new country. There he is trying to deal with the question of how
              he has survived while his friend is dead at the hands of their common enemy. We are back with the isolation and alienation of the foreword,
              but the confusion has abated. The ending of the book is both calm and dark. For a political radical it presents both a realistic presentation
              of a common experience of defeat in our time and a real problem about where to go from here: He wishes he could hear from someone or write.
              But, he knows, as they would all know by now, that memories are private possessions. And although many things can be stolen or destroyed,
              the people’s private memories cannot be. So, although they may not be able to speak out as they wish and as they need to, they still have
              their memories. As a prose-writer, Mammad Aidani still has a lot to learn, principally I think about the rational and craft-based elements
              that distinguish this kind of writing from poetry. But on the really indispensable thing, the intuitive grasp of the way feeling holds material
              together and makes it alive all the way through, he is already totally sound. His capacity for the undefended and honest expression of positive
              and valuable emotion marks him off from the more common Australian mode of ironic and laconic understatement, in a way that makes him an
              unusually interesting new voice in the cacophonous national choir."
        - title: Social Alternatives Review
          text:
              A Picture Out of Frame Michelle Maree Ehrich Social Alternatives, Vol. 17, No. 4, October 1998 Born in 1955 at Khorramshahr, Iran, Mammad
              Aidani migrated to Australia in 1982, after three years in Europe. He has published a collection of poetry, edited a collection of stories
              by victims of torture, and written a play. A Picture Out Of Frame is Mammad Aidani’s first novel. The novel comprises a foreword and two
              parts. The foreword contains an insightful excerpt from a letter (dated 23/2/1983) that Aidani sent to his family in Iran from Brisbane,
              Australia. Here Mammad states, I’m seeking goodness and love, for beauty and knowledge, as you have taught me with your simplicity and poverty.
              You know I’m 27 now, and I started to write this book to keep myself sane. I’m not sure what will happen to it but I have to write it. I
              know you might laugh but I mean it - I have this strange feeling that if I don’t write I will die unnoticed. You see... When I write, I
              only think of writing and what’s in me to write, and then I think I’m forgetting the pain (pg.ix). A Picture Out Of Frame is a touching
              account of a young man’s memories of his former life in Iran. It spans his childhood through to adulthood and his ultimate exile. The story
              begins with the young man sitting at a table, much like the young man in the photograph on the book’s cover who is depicted in shadow and
              ‘out of frame’. The young man is reminiscing. This book is an evocation of private memories which represent for Aidani his most precious
              possessions. He conjures up images of his past - his family, his homeland, his friends and his experiences. Aidani presents us with such
              a loving portrayal of his life in the village with his family and friends despite terrible hardships. Apart from the natural hardship caused
              by the desert climate and the tragic circumstances caused by the oppression of poverty, there was also military oppression from an occupying
              army, and the turbulence of living under extreme fundamentalism. The reader shares in the fearful and repressive atmosphere and a culture
              of silence because (pg. 57) ‘...the holes in the walls have mice... the mice have ears’. We also eavesdrop on recalled conversations between
              his mother and father, the young man and his friends. We hear stories that his Grandmother told him which provide much needed comfort for
              him in later years. These are such stirring and tender moments. The reader also gains an understanding and appreciation of what it’s like
              to be dispossessed and separated from one’s family and homeland. It is a moving tale of loneliness, sorrow and despair interspersed with
              moments of happiness derived from love for family and homeland. Mammad Aidani’s subtle narrative skill and deliberate simplicity of style
              make for an emotional and very worthwhile reading experience.
        - title: Geelong Advertiser Review
          text:
              "Tale of Iran poses questions for our times Edward Reilly Geelong Advertiser, 30 May 1998 What kind of world are we living in? It took
              me a long time to get around to finishing this sad tale. There is only so much I could bear from time to time, my sympathies going out to
              all those bruised by poverty, ignorance and wickedness, knowing that I am privileged in this world, and yet quite powerless to ameliorate
              the suffering of Aidani’s people. This book is set in Iran, a potentially rich country that had been wasted by its irresponsible Shah, and
              now ground into dour fanaticism by the Mullahs, where ordinary people, farmers, tradesmen, wives and students are increasingly preyed upon,
              driven out of their houses, sent to beg for one rial, murdered or exiled. for what? ‘What kind of world are we living in?’ Aidani asked.
              Nothing, not even memories of his beloved mother and grandmother can relieve the tension and fear of seeing armed men in khaki standing
              about his town - the gulf between the ordinary people and their would-be saviours is too great for sympathy: he becomes a prisoner in his
              own country. The only way out in such a situation is to retreat inwards. Friends such as Scheherezade, Sharif and Fereshteh become lifelines
              to sanity. He dreams about Kurdestan, a land of hills and valleys while living in the impossible dust of a big city. But even such a retreat
              cannot shield him or Sharif from army reinforcements and the horrors of his times. In 1983, while the Persian Gulf War was still burning,
              Aidani sent a letter to his family in Khorramshahr, crying out ‘I have not heard from you for so long’. How many victims of this century
              have echoed that cry? In a bleak letter which eventually reaches the narrator, Sharif details how he was picked up by military agents, tortured
              with nails driven into his feet and under his skin and placed on trial (we are not told what for). Signed ‘Your school friend’, Sharif cannot
              write his own name lest he implicate others. Such fears pervade this novel that I think it must have taken a great toll upon the writer
              to recount even the better times with his friends and family. Aidani, now in his early 40s, eventually went into exile and migrated to Australia.
              Carrying with him a love of Persian literature, he is our gain. He has proceeded to publish a collection of his own poetry, Better Not To
              Explain, and also has edited an anthology of stories of the victims of torture, Voices from the Deep Close Distance. I strongly recommend
              this novel to teachers and readers who value the truth and who are able and willing to impart that to their friends and families. These
              days in our own society, we teeter so close to intolerance and social distrust that we have need of corrective tales, reminders of what
              could happen to ourselves if we let our freedoms be sold cheaply to prophets, religious or political. We must keep on asking ourselves,
              as does Aidani, ‘What kind of world are we living in?’ and find the answers for ourselves."
        - title: Australian Book Review Review
          text:
              Shorts Thuy On Australian Book Review, No. 199, April 1998 Reading the biographical note on Mammaid Aidani, you discover that he once
              edited a collection of stories by people who were victims of torture. This piece of information prepares you for his first novel, A Picture
              Out Of Frame. You know, for a start, that it will not be light and fluffy. Yet although the book deals with wartime oppression in Aidani’s
              motherland, Iran, the narrative is not as heavy as expected. A third-person account provides a subtle distancing ploy, enabling a more objective
              eye to be cast over intense personal tragedies. In a style close to prose-poetry, Aidani presents a critical but loving panorama of his
              homeland. We are duly surrounded by the dust and humidity, the mud wall houses and the boys picking for copper wire in dumps. At one point,
              there is the wry observation that ‘The confrontation of life and death does not leave one room’ to romanticise. And yet, the poverty and
              political fracas in Iran are elegantly commented upon. The narrator, after having trouble with his old primus stove, mutters angrily about
              there being ‘no oil in the land of oil’. Owing to its slimness, its novella length, what is significant about A Picture Out Of Frame are
              the things that Aidani does not comment on - the things that remain out of frame. The book is testament to the power of the unspoken, and
              is all the more harrowing for what it leaves out.
        - title: Write On Review
          text:
              "New Books - A Picture Out Of Frame Write On, December 1997-January 1998 Mammad Aidani’s book deals with memory and exile, focusing
              on a poverty-stricken village in Iran and the formative influence of place and family. Heat and desolation form the backdrop - then the
              army arrives. The cover shows a man silhouetted in a window: the book itself is a window on a life we know in Australia only through the
              exiled who live among us."
        - title: The Canberra Times Review
          text:
              Compassion outweighs desire to impress Veronica Sen The Canberra Times, 21 December 1997 A Picture Out Of Frame is not quite so successful
              [as Pham Thi Hoai Nam, The Crystal Messenger] in its portrayal of a war-haunted country. Mammad Aidani has written with sensitivity, but
              in a rather plain and repetitive style, about a rural and urban poverty that permeates every aspect of life down to ‘clothes, gestures,
              posture’. In the process he condemns recent political turmoil in modern Iran. What he has to say about these situations, and their effect
              on ordinary men and women, is worth hearing. His low-key writing creates a real sense of the injustice and fear that stalked the land that
              he has now left for Australia.
        - title: The Sunday Age Review
          text:
              Top Shelf - Fiction Michelle Griffin The Sunday Age, 23 November 1997 Iranian-Australian writer Mammad Aidani is a wonderful poet, but
              his novel about poverty and exile in Iran is not really successful. The book shakes with half-choked rage about the oppressive regime and
              its contempt for the poor. However, the highly formal English in which it is written suffers from a stilted tone and extremely wobbly syntax.
              The story itself is certainly strong enough, following one of the sons of a desperately poor village family into the city and out into exile.
              And the mother, illiterate, exhausted and proud, is warmly and powerfully captured. Those who pick their way to the ending will find it
              unbearably sad.
fear-of-tennis:
    title: Fear of Tennis
    author: David Cohen
    short_description:
        An anxious sighting marks the re-appearance of high-school friend Jason Bunt in Mike Planner’s ordered life as a courtroom
        sound-recordist. Mike is a cool obsessive – an avid spectator of criminal trials and a connoisseur of restrooms, both public and domestic.
        A lighthouse-related disaster in Year Ten has left him with a debt to Jason. Jason has meanwhile taken up tennis with evangelical zeal, and
        Mike seizes on this in an ill-advised attempt to wipe the slate clean. Further complications arise when Mike’s Bible-reading co-worker Fiona
        introduces him to the Old Testament, and he grapples with questions of guilt, redemption, the Patriarch Abraham, and former Wimbledon champion
        Pete Sampras. Fear of Tennis – a novel about the impossibility of avoiding sport.
    long_description:
        Cited as a Book of the Year (2007) by Les Murray in the Times Literary Supplement and The Age and The West Australian The
        back of Jason Blunt’s head filled me with unease. I could already feel my chest muscles tightening. I could almost hear them tightening –
        a creaking sound, like someone had inserted a key in my back and was slowly winding me up. An anxious sighting marks the re-appearance of
        high-school friend Jason Bunt in Mike Planner’s ordered life as a courtroom sound-recordist. Mike is a cool obsessive – an avid spectator
        of criminal trials and a connoisseur of restrooms, both public and domestic. A lighthouse-related disaster in Year Ten has left him with a
        debt to Jason. Jason has meanwhile taken up tennis with evangelical zeal, and Mike seizes on this in an ill-advised attempt to wipe the slate
        clean. Further complications arise when Mike’s Bible-reading co-worker Fiona introduces him to the Old Testament, and he grapples with questions
        of guilt, redemption, the Patriarch Abraham, and former Wimbledon champion Pete Sampras. Fear of Tennis – a novel about the impossibility
        of avoiding sport.
    price: 26.95
    isbn: "9781876044558"
    release_date: "2007"
    page_count: 214
    reviews:
        - title: Owen Richardson, The Age
          text:
              "Parody: Fear of Tennis Owen Richardson The Age , 29 September 2007 Perth-born, Melbourne-based David Cohen’s first novel is a minimalist
              parody of dramas of guilt and atonement. Mike and Jason are high-school best-friends; one day Jas takes the rap for an act of foolishness
              on Mike’s part involving a toy light-house. After Jason is expelled they have little to do with each other until in adult life they run
              into each other on the bus: Mike is a perfectionist court reporter and Jason a corporate thug. It’s the comedy of syndromes: Mike is as
              obsessed with the cleanliness and mod cons of public toilets as Jason is with tennis, while Mike’s workmate Fiona, whom he is trying to
              date, is heavily into the Pentateuch (first five books of the Bible) - she fills Mike in on the trials of Abraham, a useful myth for his
              particular circumstance. Mike operates by second-guessing and mind-reading, and the plot and the incidental humour get mileage out of Mike’s
              inability to deal with anyone directly. The recessive absurdism has its appeal, and it wouldn’t be a bad thing if Fear of Tennis became
              a cult book: like Seinfeld, it makes Fabergé mountains out of everyday molehills. At the same time, the deliberate flatness of the writing
              threatens to make the whole thing too dry - Mike’s is the voice of pedantry and so is Cohen’s - at least until the accumulating ridiculousness
              and the elegance of the construction draw you forward."
        - title: Roger Bourke, Westerly
          text:
              "The Year's Work in Fiction 2007-2008: Fear of Tennis Roger Bourke Westerly , Vol. 53, 2008, pg. 54 Fear of Tennis by David Cohen,
              a Perth-born writer, mainly of short stories, now living in Melbourne, was another standout Australian first novel of 2007-08. It is not
              often one comes across a comic debut novel - certainly not such an accomplished one. ‘It wouldn’t be a bad thing if Fear of Tennis became
              a cult-book: like Seinfeld, it makes Fabergé mountains out of everyday molehills,’ the reviewer Owen Richardson wrote of it in the Melbourne
              Age . While not quite, like Seinfeld, ‘about nothing,’ Cohen’s novel is indeed quirky and offbeat with a dry wit and an acute eye for some
              of the absurdities of contemporary urban life. Its hero, Mike Planner, is a nerdy, obsessive-compulsive type who works as a courtroom sound-recordist
              in present-day Perth. He is also a man who has a fixation with hygiene and bathrooms, public and private: ‘The sight of a well-designed,
              well-maintained public toilet always fills me with pleasure.’ But Mike’s closeted existence is changed in unexpected ways after he happens
              to see his best mate from school, now a yuppie banker and tennis addict, on a bus. The plot resolves itself in the age-old comic tradition
              of a satisfying, ‘feel-good’ ending with all loose ends tied. I thoroughly enjoyed this novel: for its intelligence, its understated humour,
              its engaging central character, and, not least, its sure grasp of the conventions of the difficult craft of comic writing. Once again, this
              author is a new writing talent worth watching."
        - title: Overland Review
          text:
              Fear of Tennis Ben Peek Overland , No. 191, Winter 2008, pg. 86 A dry-humoured novel featuring the obsessive-compulsive Mike Planner
              who works as a courtroom sound-recorder and practises his smiles in the toilet mirror. The novel begins when Planner sees an old school
              friend, Jason Blunt, on a bus and feels that he owes him for an incident in their childhood where the latter took the blame for something
              that the former did (how’s that for avoiding spoilers?). Unaware of this, Blunt, caught in his own obsession with tennis, invites Planner
              to join him and his coach Gary, an ex-pro player who never plays but who instead takes photos of Blunt playing. I found Fear of Tennis a
              little strained by end of two hundred pages, as Planner’s obsessive-compulsive nature, in combination with tennis itself, was not exactly
              to my taste. I would have liked a little more time devoted to Fiona, the student of religion on whom Planner develops a crush after she
              steals his cup - but I suspect I would have gone for anything that would have taken.me away from the tennis. Regardless, Cohen’s writing
              is tight, detailed and the dialogue rarely skips a beat.
        - title: Australian Book Review Review
          text:
              "Parody: Fear of Tennis Louise Swinn Australian Book Review , No. 299, March 2008 Fear of Tennis is David Cohen’s quirky and absurd
              first novel. It features the obsessive Mike Planner, whose interests include court reporting and bathrooms. When he bumps into Jason Bunt,
              his best friend from high school, Mike recalls how they fell out. At the centre of the story is a bizarre struggle towards redemption; Mike
              wants to atone for a past sin and believes that Jason’s series of ‘challenges’ are a way to do just that. So, somewhat perplexingly, Mike,
              who has never been interested in sport, begins to swim and play tennis, frequenting the gym with increasing regularity. Mike is not the
              only one whose obsessions litter Fear of Tennis . Jason, who holds his racquet even when he is at rest, spends evenings watching videos
              of his tennis practice. Halfway through, the book picks up pace. We meet Gary, Jason’s tennis coach, who tries to avert Jason’s tantrums
              with such aphorisms as ‘never surrender to the chemistry of anger’. While maintaining this rekindled friendship with Jason, and constantly
              training, Mike is holding down his job, and trying to find ways to woo a female colleague, who is studying the Old Testament. The humour
              derives from Mike’s assumptions and from his inability to communicate them to people. The situation is interesting enough, highlighting
              as it does the possible lengths that people can go to for redemption; but the prose, monotonous to reflect the orderliness of Mike’s life,
              makes this a dull read. The book needed a good edit and proofreading; this would not be worth mentioning if its absence wasn’t so distracting.
              By far the best thing about the novel is Gary; he is the caricature of the sports-crazed, adrenalin-fuelled trainer who quotes from the
              Tao Te Ching and, like Jason, doesn’t see humour in anything."
        - title: Citations as a Book of the Year
          text:
              Citations as a Book of the Year (2007) West Australian writer David Cohen offered a sprightly, original novel titled Fear of Tennis
              (Black Pepper), in which a mild-mannered courtroom sound recordist and sports-hater gets enmeshed in high-tech athleticism as an act of
              atonement for a wrong he committed a dozen years before. Les Murray, The Age , 8 December 2007 and The West Australian David Cohen’s Fear
              of Tennis (Melbourne, Black Pepper) stood out among the novels I read. A sports-hating courtroom recordist enmeshes himself in high-tech
              athleticism to atone for an old wrong, and the rabbinical underpinnings of the original tale are discreetly conveyed. Les Murray, the Times
              Literary Supplement , 1 December 2007
thicker-than-water:
    title: Thicker than Water
    author: Judith Colquhoun
    short_description:
        As her mother Kate lay dying, Lucy O’Connell had learnt of a rape committed in Carlton by a young Italian boy. Not the best
        introduction to the parent she had never known and, yes, it was a long time ago, but Lucy believes it is never too late for justice.
    long_description:
        "Writers and artists had come here for centuries but she was neither. She was not even seeking a new lover or running away
        from an old one. No, her mission was altogether different. And the fact that she came in a Boeing instead of a chariot drawn by griffins should
        not have encouraged anyone to doubt the seriousness of her purpose. Lucy was Nemesis. She had come to settle a very old score. As her mother
        Kate lay dying, Lucy O’Connell had learnt of a rape committed in Carlton by a young Italian boy. Not the best introduction to the parent she
        had never known and, yes, it was a long time ago, but Lucy believes it is never too late for justice. Wary of the amorous Stefano’s assistance,
        she battles her way through Italian bureaucracy and finally traces her father, Paolo Esposito, to his restaurant by a beach in southern Italy.
        There she meets his wife Silvana and her own half-siblings: cheeky Andrea, studious Chiara, scatty Rosaria. She lives an uneasy lie with this
        new family. She obsesses over how to punish her father without hurting the others. Violent forces gather. Still she ignores the friends, who
        insist that penitence can be more real than a mumbled rosary might suggest. That la vendetta is not the work of gods but of devils. Cover
        photograph: Lucia Rossi – Water Profile Cover design: Gail Hannah"
    price: 27.95
    isbn: "9781876044879"
    release_date: "2014"
    page_count: 296
    reviews:
        - title: The Weekly Review Thicker Than Water by Judith Colquhoun
          text:
              "Judith Colquhoun writes of a lovely death and revenge Teresa Murphy The Weekly Review (Brighton and Port Phillip) 19 May 2014 It was
              a seminal moment in Australian TV many baby boomers would still remember: Molly Jones dying in A Country Practice . Younger readers grieving
              over the recent loss of Asher Keddie’s on-screen doctor boyfriend, Patrick, in Offspring will understand the impact TV deaths can have –
              not just on viewers but also on those who ‘kill off’ the characters. Brighton’s Judith Colquhoun is one of these: she wrote the Molly Jones
              episode when ‘Australia wept into the Kleenex’ in 1985. ‘We wept plotting, actually,’ the veteran screenwriter said. ‘I was considered good
              at doing a ‘lovely death’ so I wrote the episode when Molly, who had leukaemia, dies quietly in the garden as she watches her kids and husband
              fly a kite.’ It was the series’ highest-rating episode in its 12-year run. Colquhoun – who won five Australian Writers’ Guild awards – has
              created many memorable TV moments during 40 years of scriptwriting, which started with Bellbird . Neighbours , Home and Away , Blue Heelers
              , The Sullivans , GP , Something in the Air , Flying Doctors , MDA , The Man from Snowy River ... she has written for them all, as well
              as children’s series Cornflakes for Tea , Zoo Family and Ocean Girl . A new chapter of her life has opened with the publication of her first
              novel, Thicker than Water , a story of revenge set in Naples, where Colquhoun advised on an Italian soap opera in the mid-’90s. Colquhoun
              is now writing her second novel. ‘This one’s about redemption and set in Oz,’ she said."
        - title: Sisters in Crime Review
          text:
              "Thicker than Water Suzanne Bozorth -Baines Sisters in Crime - 12 June 2014 http://www.sistersincrime.org.au/content/thicker-water “Writers
              and artists had come here for centuries but she was neither. She was not even seeking a new lover or running away from an old one. No, her
              mission was altogether different. And the fact that she came in a Boeing instead of a chariot drawn by griffins should not have encouraged
              anyone to doubt the seriousness of her purpose. Lucy was Nemesis. She had come to settle a very old score. As her mother Kate lay dying,
              Lucy O’Connell had learnt of a rape committed in Carlton by a young Italian boy. Not the best introduction to the parent she had never known
              and, yes, it was a long time ago, but Lucy believes it is never too late for justice. Wary of the amorous Stefano’s assistance, she battles
              her way through Italian bureaucracy and finally traces her father, Paolo Esposito, to his restaurant by a beach in southern Italy. There
              she meets his wife Silvana and her own half-siblings: cheeky Andrea, studious Chiara, scatty Rosaria. She lives an uneasy lie with this
              new family. She obsesses over how to punish her father without hurting the others. Violent forces gather. Still she ignores the friends,
              who insist that penitence can be more real than a mumbled rosary might suggest. That la vendetta is not the work of gods but of devils.”
              Proof of Judith Colquhoun’s writing ability is spelled out in her 40 year career scriptwriting for television, and her various awards including
              Life Member of the Australian Writers’ Guild. But she’s given that away to write her first novel, based on a script that never came to fruition.
              Given that script writing is somewhat different than writing a novel, Judith hasn’t done too bad a job of it, although I wish I hadn’t known
              she was a scriptwriter. I kept expecting the story to turn into a made for TV book, which wasn’t really the case. Underlaying this novel,
              which doesn’t really seem like a crime novel, is the understanding of Italy, the place, and Italy, the culture. When I say it doesn’t seem
              like a crime novel, there’s no real blood and guts here, but the slow burn of someone who’d like revenge for wrong doing–(how Italian)–and
              the torturous thought processes of how to take revenge without hurting other people not involved in the matter. The beauty of the Italian
              landscape is there, also the garbage. The Italian language is part of it, and of course, food and drink. And, what else but to include a
              little romance for the main character, not bodice-ripping Italian, but proper nice boy Italian. Also very interesting is the interactions
              of Australian culture with Italian in some unexpected subplot developments. Judith also refers to the ever present corruption inherent in
              the Italian way of life even on the simplest scale. Being of Italian extract myself, and having just returned from Sicily, I could visualise
              this family, see the intentions and the undercurrents from the slightly underhanded way the matriarchs work, to the vacuous step sister,
              to the adored little brother. I could understand the excitable tone of the language and the animated hand waving and voices of the speakers.
              I could smell the ocean, be amazed at the garbage only meters from the gorgeous views, and shake my head at the incomprehensible way corruption
              is tolerated by communities and families."
        - title: Ben Marshall Review
          text:
              "Thicker than Water, by Judith Colquhoun Ben Marshall Blog review 16/7/2014 http://www.benmarshall-wordpirate.com/blog-of-writing/book-review-thicker-than-water-by-judith-colquhoun
              ‘It’s just a story.’ This is how Judith self-deprecatingly referred to her new novel after I complained my wife had grabbed it and, before
              I could get to it, started reading. My wife – a fast thinker but a slow reader - wolfed down Thicker Than Water . I watched her find time
              to read when normally she wouldn’t bother. A good sign. When it was finally my turn, I was drawn into the story. A young woman, Lucy, born
              from a rape, sets out to avenge her mother. The man she seeks, her biological father, lives on the other side of the planet, is Italian,
              has a loving family, a business under threat from mafiosi, is well-regarded, and has everything to lose from having his crime exposed. All
              power lies in Lucy’s hands, and the main driver of the narrative is how she uses it. The setting moves from Victoria, Australia to Southern
              Italy, both familiar to the author. Colquhoun’s dialogue is pitch-perfect, and her naturalistic prose is a relaxed yet taut mix of show-and-tell
              that works well to propel story to just the right pace with just the right amount of context. Any exposition is brief and insightful. I
              never felt a sense of the authorial voice intruding. The portrayal of Southern Italy is rich without being verbose. Colquhoun paints a picture
              well. Crisp, clean writing. I couldn’t fault this charming story – I was hooked, didn’t know what was going to happen next, and kept reading
              to find out. It may seem like faint praise to any non-writers, but TTW is also beautifully and efficiently structured and edited. And well
              proofed. I found one misspelling. Did I mention My Asperger’s side? Despite the dark crime that is the seed of TTW, I’d describe this as
              a warm, humane and honest portrayal of human behaviour. ‘Just a story’? Sure, but one I have no trouble saying I enjoyed a great deal. Recommended!
              *Disclosure: Judith is a friend and colleague. That said, I paid for my copy, and, trust me here - if Thicker Than Water had turned out
              to be a dud, I’d have slipped my hands in my pockets and walked away, whistling softly, never writing this review and hoping Jude never
              asked what I thought of it. Buy it from Black Pepper Publishing ."
        - title: The Senior Review
          text:
              Thicker than Water, by Judith Colquhoun The Senior - 20 July 2014 Kate O'Connell was a rare one. The teenager from Carlton in Victoria
              had stood up to the nuns at the home for single mothers and refused to give up her baby girl for adoption. It was 25 years later – on her
              deathbed – that she finally told her daughter, Lucy, the truth. Lucy was born the result of rape by a young Italian man. There was only
              one thing for it. Lucy was going to Italy to find the father she never knew and make him pay for raping her mother. She never considered
              the consquences for her father, Paolo, his wife, Silvana, or her half-siblings. She never considered her own feelings or that blood was
              thicker than water. Author, Judith Colquhoun, is better known in Australia as a TV scriptwriter, with credits to her name including The
              Sullivans, Flying Doctors, A Country Practice and Neighbours. Her debut novel, Thicker Than Water , is a powerful statement on family.
the-gentle-art-of-tossing:
    title: The Gentle Art of Tossing
    author: Alan Cornell
    short_description:
        This was more than a simple sporting contest. This was a tilt at a dream. The little guy against the odds. Daisy and Goliath.
        Ches Fanning is a downsized sports broadcaster reduced to calling sheep dog trials in rural Gippsland. He stops for counter tea at the rundown
        Fish Creek pub. It is the night of the local darts finals. There he spots in languid action the willowy Sam Alley, a twenty-year-old girl.
        Despite her parents’ reservations, he takes her under his wing. He becomes her player manager and promoter but her Australian run is derailed
        by power brokers. Ches decides to take Sam to England. She competes against Britain’s finest in the Pay-TV series Double Tops . He and Sam
        must contend with his ex and would-be wives, Helen and Hollie, the fierce local champ Tiger Magee and a hostile dartocracy. As Ches says,
        ‘People are going to lap up the story of the small town country girl who went to the Old Dart and whipped them on their own patch of lager-sodden
        axminster.’ Whether you’re a sports tragic or not, Alan Cornell’s The Gentle Art of Tossing aims straight for your funny bone and hits the
        target.
    long_description:
        This was more than a simple sporting contest. This was a tilt at a dream. The little guy against the odds. Daisy and Goliath.
        Ches Fanning is a downsized sports broadcaster reduced to calling sheep dog trials in rural Gippsland. He stops for counter tea at the rundown
        Fish Creek pub. It is the night of the local darts finals. There he spots in languid action the willowy Sam Alley, a twenty-year-old girl.
        Despite her parents’ reservations, he takes her under his wing. He becomes her player manager and promoter but her Australian run is derailed
        by power brokers. Ches decides to take Sam to England. She competes against Britain’s finest in the Pay-TV series Double Tops . He and Sam
        must contend with his ex and would-be wives, Helen and Hollie, the fierce local champ Tiger Magee and a hostile dartocracy. As Ches says,
        ‘People are going to lap up the story of the small town country girl who went to the Old Dart and whipped them on their own patch of lager-sodden
        axminster.’ Whether you’re a sports tragic or not, Alan Cornell’s The Gentle Art of Tossing aims straight for your funny bone and hits the
        target.
    price: 27.95
    isbn: "9781876044688"
    release_date: "2011"
    page_count: 212
    reviews:
        - title: Herald Sun Review The Gentle Art of Tossing Alan Cornell
          text:
              Comic Tale Hits the Target Emma Scarpella Sunday Herald-Sun Bart Cummings is allergic to horses, yet he has trained 12 Melbourne Cup
              champions. Any sports fan will enjoy the fascinating facts peppered throughout this comic novel (if you can overlook the dubious title).
              Ches Fanning, a sports broadcaster in his twilight years, discovers a prodigiously talented dart thrower in a country Victorian pub. Her
              resurrects her career by convincing her to try her luck against the UK’s finest. Pay-TV picks up the resulting series of shows and a star
              is born. Ches’s complicated love life adds extra humour.
        - title: Wet Ink Review
          text:
              The Gentle Art of Tossing Susan Errington Wet Ink , No. 25 The Gentle Art of Tossing is the story of Ches Fanning, a sports broadcaster
              whose career is on the wane, and a young bush darts champion, Samantha Alley. When the novel opens, Ches’ television career is over and
              he finds himself on the country circuit, hosting sheep dog trials and calling darts’ tournaments in pubs. Ches is a classic sports’ tragic
              and his narration is full amusing and intriguing anecdotes about the famous and not so famous, as well as his own misdemeanours in sport,
              romance and life generally. The humour of the book is convincing and gentle, sometimes too gentle. I would like to have seen a more ridiculous
              element to some of Ches’ adventures but Ches is a very likeable character and we laugh at and pity him in turn. What’s wonderfully drawn
              in the novel Is Ches’ relationshlp with Sam. Cornell paints a convincing relationship between mature promoter and young sports star. What
              could so easily have slid towards sleaze remains fresh and paternal under some very skillful writing. There’s no doubting Ches’ respect
              for Sam’s talent and his determination to get her to the top of her field. His romantic indulges remain firmly separate and with women his
              own age. If I have one criticism of this novel it is that the language occasionally feels a little old fashioned, but Cornell’s style is
              smooth and the story flows well. The Gentle Art of Tossing is definitely one for summer holiday reading and the sports enthusiast in the
              family.
navigatio:
    title: Navigatio
    author: Alison Croggon
    short_description:
        is a story of double migration. Told in alternative chapters, it is part family memoir drawing on her own childhood arrival
        from South Africa, part dramatized account of nineteenth century sea-voyage and arrival. It is a feat of memory and imagination, finally drawing
        together the two tales, like twine through canvass, to reveal the individual caught in the cruel flow of history.
    long_description:
        "And it seems to me miraculous that another human being could love me as my daughter does, when she grants me the pure action
        of her kiss. And perhaps this is the sum of my labour: to find, amid the rubble of illusions, the real kiss that always lay there, unbroken
        and wholly itself. Alison Croggon's Navigatio is a story of double migration. Told in alternative chapters, it is part family memoir drawing
        on her own childhood arrival from South Africa, part dramatized account of nineteenth century sea-voyage and arrival. It is a feat of memory
        and imagination, finally drawing together the two tales, like twine through canvass, to reveal the individual caught in the cruel flow of
        history. The last chapter, the log-book of a sea-captain becalmed at sea, is a tour de force . It brings us to the eye of the storm, a place
        that has affinities with Eliot's ‘ still point of the turning world. ’ As much as it is a journey through the physical world, Navigatio is
        a journey towards poetry."
    price: 19.95
    isbn: "1876044098"
    release_date: "1996"
    page_count: 111
    reviews:
        - title: John Ashton, ArtStreams
          text:
              "book review Navigatio John Ashton ArtStreams , April/May 1997 Navigatio is both an autobiography and a nineteenth century sea journey
              whose narratives occupy alternate chapters and are nominally unified by titles commencing with the letter ‘A’. It also has the audacity
              to open with ‘Once upon a time...’ The controlled authorial voice of the biographer is strong with descriptive imagery which is kept almost
              entirely to the visual; a childhood memory which employs serious reportage as she recalls the early years in South Africa, Cornwall and
              Australia. On one level we get the matter of fact portrait of a family which is trying to secure an emotional and geographical grip on its
              identity as a family: Suddenly the fact is firmly fixed in our lives. We will be away for three years in Australia, where the days and nights
              are upsidedown and the seasons are backwards. My mother is desperately unhappy. We will travel without my father... At another level, the
              prosaic description of rural life: We were allowed to watch the milking: the calling cows herded into the milkshed and hitched up to shiny
              machines, and milk running through the cow-dung on the concrete floors. But while trying to maintain the linear symmetries of this structure,
              the ‘straight’ narrative is continually subverted by the ever-changing poetics of the strange and lonely journey of the HMS Fedelis , at
              times seemingly random and unconnected, we ‘hear’ the voices of the crew, a child’s wonder, a captain’s anxiety. And in following a reminiscence
              with almost religious significance, we are plunged into a young girl’s trauma of an horrific assault. The rhythms and imagery of which echo
              the Old Testament, Hieronymous Bosch, Coleridge and yes, the ghost of Sylvia Plath which ever haunts; as it does much poetry of the twentieth
              century. ‘Am I thy bitch? My dugs all barren, whelping puppies in a ditch. You’d have me so my darling, I’d gnaw thy pate like the bishop
              in the ice of hell, forever and ever, until you answered me, until the stone split open and spoke its water.’ One reader commented that
              Navigatio is ‘therapy writing’ - the author’s voice has precluded such critique in the following sentence: ‘I cannot understand myself except
              for language’ and ‘...in its trespass, a poetic language retrieves the unanaesthctised reality we inhabit at our births’ Therapy? So What?
              Navigatio is a seductive read, and as in all good poetry, a secret world is both revealed and shrouded in lyrical ambiguity. Each chapter
              has both a completion and a hook to keep the reader engaged."
        - title: Airlie Lawson,
          text:
              Books Extra Paperbacks Navigatio Fiona Capp The Age , 30 November 1996 Established last year, Black Pepper is a small press which is
              rapidly making a name for itself and has already published 16 titles. Alison Croggon is best known as a poet, librettist and playwright.
              In her first novel, she combines personal memoir with the story of a 19th-century sea voyage as she navigates the stormy waters of her family’s
              past. ‘It took until my adulthood to acknowledge how my father lied to me... I don’t know how to navigate past what he has taught me about
              truth - that truth does not exist, that trust is impossible.’ Now, as she contemplates the world her children inhabit, Croggon offers up
              a meditation on memory and the meaning of ‘truth’.
        - title: Australian Book Review Review
          text:
              shorts Navigatio Airlie Lawson Australian Book Review , No. 186, November 1996 Find a comfy chair and a quiet room before you embark
              on Navigatio . Though slim, Alison Croggon’s first novel is not light. Prose narrative overlaps poetry to produce a work densely packed
              with images and voices. The past, the present and the imagination are all invoked, making the reader constantly reassess and reconsider
              what has gone before. Croggon, widely known as a poet, mixes her own story of migrating with others. One of these others is a young mother
              who is travelling to Australia over a hundred years ago, and her feelings of melancholy, loss and looking are strikingly similar to the
              author’s own. What is to be trusted? Doubting God, Croggon and the characters ponder on the life of language, the nature of beauty and the
              cruelty of man. Who is to be known they ask, and how? Is a person’s fate wholly tied up in what has gone before? The awesome helplessness
              of just being borne along by life is wonderfully evoked in the final chapter, the logbook of a sea captain, dated 1869. A thoughtful journey.
        - title: Social Alternatives Review
          text:
              "Past Lives: A Poet’s Retrospective Navigatio Kris-Ann Ehrich Social Alternatives , Vol. 17, No. 2, April 1998 Alison Croggon trained
              as a journalist and her work includes poetry, plays, libretti, translations, editing and criticism. Croggon’s book, Navigatio , is a story
              of her family’s double migration and an account of a nineteenth century sea voyage and arrival. The book is divided into ten different stories,
              all weaving past and present history. The prologue informs the reader of her father: I knew all my childhood that I was my father’s favourite
              daughter. The betrayals of adulthood, the cruelties and indifference, do not change this, but endow it with the intolerability of paradox.
              My weaknesses, my fears, my dishonesties, the defining hurts of my life, are my inheritance from him: and these words. Particularly these
              words. I want to migrate forever from these shadowlands where speaking is not possible because the darkness swallows every syllable before
              it can be uttered, this realm that ate up my parents. Each step takes me further into shadow, into the impossibility of speaking. But I
              must persist. (pg. 1) Croggon goes on to talk of her father’s dreams of a new life in a new country ‘where a man could walk without the
              burden of history on his shoulders’ (pg. l). She describes her father’s long absences and her mother’s despair and disillusionment. The
              life her mother had dreamt about was very far removed from the reality of life she had inherited. The first five stories tell of the voyage
              to England firstly and then other places. These are vividly written anecdotes of the author’s childhood. Chapter 7, ‘Africa’, brings us
              into the present day with Croggon talking of her own children and then intertwining memories of the past, her own despair and feelings of
              futility. Chapter 9, ‘Accounts’, is moving from the past into the present with raw emotion. Croggon expresses the need to bury herself in
              her writing, ‘I cannot understand myself except through language’ (pg. 95 ). In this chapter the author goes on to describe the hardships
              that the family encounters on arrival to Australia. Finally, Chapter 10, entitled ‘Apeiron’, is a logbook of a sea captain becalmed at sea.
              The final few lines are very climatic and full of drama: Yet, despite my Despair and Grief, I am possessed by strange Exhilaration, which
              I am at a loss to explain, as if everything I desire and is Mine is before me, as behind a door which is merely closed and presently will
              Open: and I am overwhelmed with Gratitude for the beauty and terror of the world... (pg. 111) There are moments of sheer beauty in Croggon’s
              written words. I especially found the following paragraph truly poetic when the author describes her own daughter: And it seems to me miraculous
              that another human being could love me as my daughter does, when she grants me the pure action of her kiss. And perhaps this is the sum
              of my labour: to find, amid the rubble of illusions, the real kiss that always lay there, unbroken and wholly itself. (pg. 13) This book
              is an interesting retrospective of the author’s life which interlaces different stories and past lives somewhere deep in Croggon’s subconscious;
              a fascinating infusion of thoughts, ideas, imaginings and her reality as she knows it. Well worth reading."
        - title: Radio National Review
          text:
              "Books and Writing Geoff Page (poet) Radio National, broadcast February 1997 Navigatio , a first novel by the talented young Melbourne
              poet, Alison Croggon, has also been released by the same innovative new publisher [as for Vivien Hopkirk ’s Meditations of a Flawed Groom
              ], Black Pepper. Like Hopkirk’s Flawed Groom , Croggon’s Navigatio is also highly experimental and unorthodox in form. Two stories alternate
              here; one a fairly straightforward autobiography, the other a stylistically adventurous account of what seems to be an analogue for the
              author’s own family voyaging to (or at least towards) Australia in 1869. The two strands of the novel, if that’s what it is,are decidedly
              different from each other, despite the centrality of the mother/three daughters unit in both. The autobiography is a relatively unadorned
              and presumably accurate account of the unhappy marriage of Croggon’s parents - and of some of the more important highs and lows of her childhood
              in South Africa, Cornwall and Australia. Unlike the autobiographies of, say, Sally Morgan or Albert Facey, there is not a great deal here
              which transcends the personal. Clearly this strand offers plentiful material for poems (as seen already in Croggon’s outstanding first collection,
              This is the Stone ) - or possibly for an autobiographical novel along the lines of Kate Jennings’ recent book, Snake (also about the unhappy
              marriage of an writer’s parents). As it stands, however, despite Croggon’s more than competent writing, this half of the book is finally
              disappointing. This is particularly so in contrast to the other strand dealing with the 1869 voyage. Here Croggon displays both lyricism
              and insight. In the sections ‘Anaesthesia’ and ‘Adelaida’ she reports convincingly on the psyche of her young mother of three in a marriage
              already turning unhappy. In between a complaining letter to her brother and a cheerful letter to her husband describing the same unbearable
              shipboard situation we get a moving and poetic embodiment of what must surely have been the feelings of such a woman at that time and how
              severely she would have had to repress them. The quality of Croggon’s prose itself is additionally affecting since it reminds us of how
              much of the woman’s own essence she has had to give up to fit the demands of others - and the fantasies about marital happiness which she
              has absorbed from them. One paragraph is enough to get the flavour: When I was a virgin and whole the sea was different, it was a horse
              and I was fearless. I was blown across its expanse without harm, I knew too little to care who I was. Now I am small and timorous, a nose
              poking out from the wainscot, a scurry of frills, a noise of yes. I put my hand to the ladle and the crib and arrange the silver. How is
              it I despise myself so much? In another section of this 1869 narrative, the one called ‘Ananke’, we are given a strong and stylishly colloquial
              monologue by a female convict who has been savagely abused by her employers in England - and, seemingly, by her father as well (whose influence
              she finds impossible to escape and to whom the monologue is addressed). In the closing sections of this strand, both equally well written,
              Croggon becomes steadily more metaphysical and the story becomes a kind of reenactment, almost in magic realism mode, of Coleridge’s ‘Rime
              of the Ancient Mariner’. As a piece of prose the final section is,as the publishers claim, a tour de force but whether it makes a convincing
              conclusion to the plot is another question. As a postmodern appropriation, however, it is certainly carried off with great élan. It is hard,
              ultimately, to know what to make of Navigatio .What do you say when a book is two books - one decidedly more than the other? Probably both
              could have done with a little more work - the autobiography given a little more of the poetic writing found in the other half - and the
              sea voyage filled out perhaps into the full-blown lyrical and freestanding novel that it wants to be. In the meantime Black Pepper has Alison
              Croggon’s second volume of poetry well on the way, a book which will surely be less problematic and more consistently enjoyable than the
              rather strange adjacencies of Navigatio ."
        - title: Imago Review
          text:
              "New Writing Navigatio Helen Horton Imago , Vol. 9, No. 1, Autumn 1997 This is classed as a novel, but most of it is drawn from an autobiographical
              source, even that half that is written as a fictional account of a nineteenth century migration from England to Australia. Except for two,
              the chapters alternate between this fictional family and the writer’s own family, with its migration from South Africa. The exceptions are
              Chapter VIII, named ‘Angel’, a series of fragments with a dream-like quality, and the last chapter. In this ‘The Tale of the Ancient Mariner’
              is retold via the medium of the log-book of the captain of a ship, the name of which, Fidelis , is symbolic, as is the ending of the book.
              The focus throughout is on the far-reaching and complicated emotions that are involved when a husband and wife relationship breaks down
              and the inevitable spilling over into the minds and emotions of the children, in this case, three girls. This is not a story told sequentially.
              The chapters are individual fragments, with the present and memories of the past constantly intermixed, and firmly linked by the parallel
              family device. The result is at times slightly confusing, but the book never wavers from its main recurring theme of the emotional impact
              of family members upon each other and their lasting effects. In the process of this emotional probing, there is a certain amount of philosophising,
              that could perhaps become just a little wearing. It takes the form, however, of a questioning, rather than being didactic, and the reader
              is never allowed to lose sight of the concept contained in the third paragraph of the Prologue: ‘I want to migrate forever from these shadowlands
              where speaking is not possible because the darkness swallows every syllable before it can be uttered, this realm that ate up my parents.
              Each step takes me further into shadow, into the impossibility of speaking. But I must persist.’ That tone is maintained throughout."
mothers-claw:
    title: Mother’s Claw
    author: Louise Davenport
    short_description:
        The launch will be followed by a party at her home at 7.00 PM at Unit 6/10 Clark St, Richmond 3121 (9421 3739). Pizzas and
        alcohol will be provided. Copies of Mother’s Claw will be available at the special
    long_description:
        Louise Davenport ’ s short fiction is spare in the classic modernist manner. Strong underlying emotion is controlled, oblique
        or symbolic. The ‘ claw ’ in the title sequence is a traditional image that is strikingly re-invented through the agency of a moving statue,
        itself an image re-energised from the canon. In many ways her first collection is a fractured mirror, presenting key images recurrently. Or
        it can be read as a mosaic autobiography, the author ’ s facing the childhood horror of her mother ’ s suicide and dealing with its emotional
        ramifications in her adult life. Mother ’ s Claw is both cool and healing.
    price: 21.95
    isbn: "1876044160"
    release_date: "2001"
    page_count: 111
    reviews:
        - title: artStreams Review
          text:
              ArtStreams Like a fracturing mirror, Davenport’s short fiction presents key images recurrently. Beginning with childhood memories of
              the horror of her mother’s death, Davenport moves gently between stoires of her life. These stories are all coloured by the claw - the image
              of her mother that haunts her life. Moving roughly along a timeline, her scattered images weave a surprisingly clear story. To go to the
              heart of the truth is too much pain. I enter from an angle and light up the edges of my object with pastel relief. Davenport’s story is
              ghostly and quiet, fragments of dreams and memories entangle to produce an engaging fiction.
digging-in-dark-places:
    title: Digging In Dark Places
    author: Colin Duckworth
    short_description:
        When Janet Crompton, a young and beautiful research student, goes from Melbourne to Brittany to find out the facts behind
        a local legend, she unearths unexpected truths about herself, her mysterious parents, and several strange, sinister, colourful, courageous
        and eccentric people.
    long_description:
        When Janet Crompton, a young and beautiful research student, goes from Melbourne to Brittany to find out the facts behind
        a local legend, she unearths unexpected truths about herself, her mysterious parents, and several strange, sinister, colourful, courageous
        and eccentric people.
    price: 20.95
    isbn: 0958705941
    release_date: 1997 (Ryan Publishing)
    page_count:
    reviews: []
summer-symphony:
    title: Summer Symphony
    author: Colin Duckworth
    short_description:
        "Mongrel Jazz, an imprint of Black Pepper, launched Summer Symphony: A Novel In Four Movements , by Colin Duckworth on 8
        August 2005 at The Stork Hotel, Melbourne, with a speech from Dr David Kram, Associate of the Royal College of Music, composer, librettist,
        conductor and Head of Opera, Victorian College of the Arts. Colin Duckworth’s third novel tells of the power of love to encourage and inspire,
        and music’s power to move and heal. But music can also be immensely destructive. A battle between good and evil is fought, with music as the
        weapon."
    long_description:
        "1971. In London’s Festival Hall Alan Scott’s Symphony of Universal Healing is first performed. Its mystic harmonics have
        extraordinary effects on the audience: an elderly woman stands up, exclaiming she has not been able to do that for years. Another, younger,
        woman, admits without embarrassment that the performance gave her an orgasm. In this predominantly English middle-class audience the unthinkable
        has happened. People start to talk openly about an unusual feeling of wellbeing. After the concert a stranger introduces himself to Alan and
        his wife as an old school friend, Keith Maxtel. From that point on, the disquieting past intrudes.The chequered love story of Alan and his
        wife Bella begins when they are fifteen and Hitler’s bombs are raining down onEngland. Their musical quest (mystical to Alan, scientific to
        neuropsychologist Bella) is sparked by their experience of an inexplicable healing phenomenon in a Norman château duringthe Liberation. It
        extends to the past and the future, from Paris in the 1890s to California in the early 21st century. Alan is determined to find out why he,
        a musically gifted but nondescript boy from a suburban background, became guardian of such powerful mystical harmonies. Harmonies which others
        might seek for their dark and destructive aspects. Alan and Bella’s decisions will prove crucial. Duckworth’s pace and timing are just about
        perfect. The Weekend Australian"
    price: 28.95
    isbn: "1876044993"
    release_date: "2005"
    page_count: 334
    reviews:
        - title: William Brown, Wet Ink
          text:
              The Latest Word Summer Symphon William Brown Wet Ink , Issue 3, Winter 2006 Summer Symphony chronicles the lives of Alan Scott, composer,
              and Bella Cassell, neuropsychologist and their efforts to transcribe and understand the seven harmonies (which exist only in Alan’s mind).
              The seven harmonies are an immensely powerful combination of musical frequencies that have great effect on the human mind and body for good
              or possibly ill. Told mostly from the perspective of Alan, this fascinating tale takes the reader from wartime Birmingham and London, England,
              through post-war France and up to present-day California, with focus on 1970’s London. Though the section headings, comprised of music terminology
              and quotations, may seem daunting at first, it is not necessary to be familiar with either to appreciate this tale. It is not necessary,
              either, to be able to read French, which appears frequently in the early sections of the story. Summer Symphony is written so that anyone,
              regardless of linguistic or musical experience, can enjoy and understand it. Though I admire the creativity, structuring and loads of research
              that were utilised in constructing this book, the narrative voice detracted from the experience for me. Though this voice is disembodied,
              it is at times too strong - especially when jumping across character perspectives, revealing the thought processes of those characters,
              and foreshadowing events to come. If the characters are allowed to show the tale through their own actions and dialogue, the illusion is
              stronger, and the story more gripping and real. The real strength of this story comes out in the early sections of Alan’s life - when he
              meets Bella, comes to grips with the music in his head, and experiences all those firsts we all went through growing up. Alan, and thus
              the story, experiences more conflict not just because of the Battle of Britain, but because he is growing up, discovering his family history,
              finding his path and leaving home. Not to say that a strong story is solely based on conflict and firsts, but in these early sections the
              narrator allows the story to express itself more, and is stronger for it. Summer Symphony is an ambitious work, a rich read. I would have
              liked to read the story to its natural conclusion - it is a shame that this book is a ‘novel in four movements’ instead of an epic in four
              books.
cairo-paris-melbourne:
    title: Cairo Paris Melbourne
    author: Maher Abou Elsaoud
    short_description:
        Cairo is an old man crossing a crowded road. Paris is a pretty girl in search of a hero. Melbourne is an innocent child playing
        in a vast land. Our first person narrator has a naïve knowingness. Zoheir who becomes known as ‘Prince’ and takes on the persona of Zoheir
        Oqla, the inventor of tales, has a touch of Scheherazade about him. Cairo Paris Melbourne
    long_description:
        In the mid-1960s Cairo was overpopulated and some of the poor could not find shelter. They resorted to the cemetery yards,
        and used them as houses, and they lived among the dead. I was born in one of these cemetery yards... Cairo Paris Melbourne is three novels
        in one. The original Arabic language novel established Elsaoud’s literary reputation. Set against the backdrop of Middle Eastern wars from
        1967 to 2003, its Dickensian characters and acute social concerns assume new poignancy in light of today’s Arab Spring. Zoheir struggles to
        escape the poverty of the ‘City of the Dead’. Ghosts torment his childhood. Family, friends and villains that populate his world are evoked
        brilliantly through his young eyes. He learns of love and brutality quickly. Entering adolescence he yearns for another place, where he can
        find his purpose. He secures a visa to Paris in a comic tour de force, cleverly exposing corruption in Cairo. In France he is an immigrant
        worker, travelling with fellow Egyptians and reading Hamlet . He falls for the fascinating and destructive Caroline, holds a forged passport
        and is soon on the run from drug dealers in the Algerian quarter of Paris. Struggling with the chasm between East and West, fate leads him
        towards treachery, arrest and, eventually, Melbourne. Living above a café in Fitzroy, Zoheir descends into meaninglessness, yet finally finds
        an unexpected reason for living, one both redemptive and all consuming. Cairo is an old man crossing a crowded road. Paris is a pretty girl
        in search of a hero. Melbourne is an innocent child playing in a vast land. Our first person narrator has a naïve knowingness. Zoheir who
        becomes known as ‘Prince’ and takes on the persona of Zoheir Oqla, the inventor of tales, has a touch of Scheherazade about him. Cairo Paris
        Melbourne is a novel of the getting of responsibility
    price: 44.95
    isbn: "9781876044756"
    release_date: "2012"
    page_count: 333
    reviews:
        - title: Anna Couani, Rochford Street Review
          text:
              Flying by the seat your pants Anna Couani (writer and poet) Rochford Street Review , 12 June 2012 It is an interesting fact that, while
              Australian writers festivals and other public literary events and programs showcase and celebrate the work of writers from other countries,
              there is little exposure given to Australian writers writing in languages other than English. So Cairo Paris Melbourne , a translation of
              a novel by an Egyptian Australian writer who writes in Arabic, is a welcome addition by Black Pepper Publishing to the Australian literary
              landscape. Maher Abou Elsaoud has had works published in Arabic in Egypt and speaks English, French and Arabic, having lived in Egypt, France
              and Australia. His knowledge of those countries has provided him with the settings for this novel. He writes primarily in his mother tongue
              and with this book, worked on the English translation with his translator, Ahmed Fathy who lives in Egypt. So especially now that both travel
              and communication are easy and accessible, writers like Elsaoud can maintain and capitalise on links with their country of origin. Very
              different from the migrant writers of a generation ago who felt isolated and cut off and were barely recognised in their adopted country.
              Cairo Paris Melbourne has a first person narrator in a kind of English that retains traces of its origins. In some ways it reads like an
              autobiography although it is fictional. The structure of the novel, the absence of big chunks of time in the narrator’s life, is evidence
              of that. Elsaoud has studied film and written film scripts and the cuts are certainly understandable in filmic terms. It traces parts of
              the narrator’s life journey across 30 years, starting with an innocent childhood, along with hair-raising experiences as an eavesdropper,
              then through myriad difficulties as a transient worker and culminating in a cynical adulthood in Melbourne. There is however, an unexpected
              redemption at the end of the book which gives the narrative a satisfying closure. Most Australians have had the experience of being tourists
              in foreign countries and have even roughed it a bit. However, the experience of a poor kid from Cairo as a traveller, flying by the seat
              of his pants without money, no parents wiring cash to the nearest American Express, is altogether another and very brutal world. It has
              the kind of adventurous and optimistic spirit you find in Slumdog Millionaire but without the Bollywood gloss or the happy ending. Similar
              is the close bond between the male friends and their generosity and kindness towards each other. The young eavesdropper in the Cairo section
              of the book has warm and loving connections with older females but also witnesses monstrous incidents involving the abuse of women amongst
              the street people and this, along with the ubiquitous corruption, seems to partly explain his desire to get out of Egypt. He is idealistic,
              believing that opportunities and a better society await in other places. However, the character is eventually ground down by unjust and
              unfair circumstances. As well, while he can see the injustice of the treatment of women in Cairo, he finds he doesn’t have the tools to
              cope with Western gender relations in a way that can bring him happiness. The character insulates himself from the consuming, controlling,
              heartbreaking behaviour of the Western women he encounters by becoming a Don Juan and hanging out with the other disillusioned bachelors
              in a Fitzroy coffee shop. It is personal relationships that are in the foreground of this novel, not the places, as might be suggested by
              the title of the book. The relationships are depicted from a masculinist perspective that I found a bit grating. However, the book is interesting
              to read, the plot is not predictable and many of the characters are intriguing and lovable.
        - title: Ed Wright, The Weekend Australian
          text:
              New Australian Fiction Ed Wright The Weekend Australian , 9 June 2012 Now based in Melbourne, Maher Abou Elsaoud has successfully published
              novels in Arabic and was recently in Egypt for the filming of one, until it was disrupted by the Arab Spring. The picaresque Cairo Paris
              Melbourne is the third book in his opus and the first to be translated into English. It follows a young Egyptian, Abou Zoheir, from his
              poor but fascinating beginnings in a neighbourhood improvised from a cemetery on the outskirts of Cairo, to a life as a fruit picker, lover
              and theatre student in France, then as an inhabitant of the Fitzroy demi-monde in Melbourne. Elsaoud captures the characters of Zoheir’s
              childhood neighbourhood with humour and humanity. Characters such as Um Fawzy, the large beautiful kind woman, known to the neighbourhood
              as ‘the mattress of tenderness’, resonate in the mind long after the reading, as does Zoheir’s scamming but funny father. Although his own
              childhood has its tragedies, Zoheir shows a great sense for the neighbourhood gossip and the various tales that compose this section of
              the novel are arguably its highlight. The France section is more a road novel, a young naturally gifted man throwing himself at the mercy
              of life and being variously rewarded. Its open depiction of young men in thrall to their libidos and the rigidity of testosterone-driven
              idealism is oddly refreshing. It also captures beautifully that sense of the unlimited horizons of youth coming into conflict with established
              hierarchies of society. Readers will be reminded of Saul Bellow’s The Adventures of Augie March ..., Kerouac’s On the Road , or the novels
              of Norwegian author Agnar Mykle. It is treachery that forces Zoheir to leave France and love that leads him to Melbourne. But by the time
              we meet him there in his late 30s things have gone pear-shaped and disillusionment has set in. He is living in a single room above a café
              in Fitzroy, where he keeps company with a cast of misfits including an alcoholic ex-diplomat, a prostitute who dreams of love, a Serbian
              gambler, the Italian café owner, a stingy Chinese grocer, an impotent PhD student and another unrecognised novelist. It’s a reminder that
              true bohemias are not so much places of youthful transition as places where people congregate as a salve for the failures of their lives
              and their estrangement from the mainstream. While Zoheir’s rhetoric of disillusionment at times becomes a bit monotonous (pride can be very
              tedious), this is rescued by the fascinating character sketches and life logics of the people who surround him.
two-that-got-away:
    title: Two That Got Away
    author: Jim Ewing
    short_description:
        "William James 'Walrus' Rose's long-term relationship with volatile ex-erotic dancer Jill has finally turned turtle. As
        an unsuccessful actor/author/playwright, he's also had a gutful of The Arts with its anus-lickers and parasites.

        Better a dinkum profession where a bloke's only ambitions are to catch lobster and avoid drowning. Within a day of arrival in Port Gong the
        locals reduce his nickname 'Walrus' to just 'Rus', and he finds work as a deckie with Possum Wright, eccentric skipper of the local fishing
        fleet's smallest vessel.

        Possum is a delightful fellow with whom to fish, but Rus has been warned he can be dangerously erratic. Rus therefore seldom completely relaxes
        when they are offshore.

        The Southern Ocean is a wondrous but challenging workplace. When its waters turn murderous it is not the spot to be in a small craft beside
        a bloke, by now far more your cobber than your boss, who appears to be losing his mind."
    long_description:
        The Boat went almost perpendicular. Thrown full back on her rudder she flew over the next foamer, fell with a crash into the
        trough following. Pain stabbed Rus’s hip—Shit, The Package! In the excitement of frenzied natural forces and frenetic activity of catch and
        re-baiting within that fast-risen sea and wind, it had slipped his mind completely. William James 'Walrus' Rose’s long-term relationship with
        volatile ex-erotic dancer Jill has finally turned turtle. As an unsuccessful actor/author/playwright, he's also had a gutful of The Arts with
        its anus-lickers and parasites. Better a dinkum profession where a bloke's only ambitions are to catch lobster and avoid drowning. Within
        a day of arrival in Port Gong the locals reduce his nickname ‘Walrus’ to just 'Rus', and he finds work as a deckie with Possum Wright, eccentric
        skipper of the local fishing fleet's smallest vessel. Possum is a delightful fellow with whom to fish, but Rus has been warned he can be dangerously
        erratic. Rus therefore seldom completely relaxes when they are offshore. The Southern Ocean is a wondrous but challenging workplace. When
        its waters turn murderous it is not the spot to be in a small craft beside a bloke, by now far more your cobber than your boss, who appears
        to be losing his mind. "Characterized by wit, energy, and sharp perception, his writing is wise and always entertaining." John Clarke "In
        regard to his favourite theme, the sea, he is better qualified to speak on the subject than anyone I know." Bruce Pascoe
    price: 29.0
    isbn: "9780648038733"
    release_date: "2019"
    page_count: 304
    reviews:
        - title: The Age / Spectrum
          text:
              "A diabolically un-PC comic caper Carmeron Woodhead reviews Two That Got Away The Age / Spectrum , November 9, 2019 Jim Ewing’s second
              novel Two That Got Away is an eccentric, diabolically un-PC comic caper featuring disgruntled writer and actor William James “Walrus” Rose.
              Rus, as he becomes known, is sick of THE ARTS SCENE, and somewhat anxious to leave its pretensions and arse-kissing behind. (Or, to use
              Ewing’s memorable phrase, “he was off quicker than a ten buck f---’s knickers”.) Off where? To sea: Rus heads to Port Gong, where he’s soon
              in a small vessel in the wild Southern Ocean, fishing for lobster with a mad bloke called Possum. Ewing is a humourist with a great gift
              for the Australian vernacular. If the comic profusion of the prose can be as wild and foaming as the waves Rus voyages over, and the author
              takes an unseemly relish in rocking the boat, the book’s ocean of Ozploitation remains a bit of a hoot to read."
the-butterfly-stalker:
    title: The Butterfly Stalker
    author: Robyn Friend
    short_description:
        The Butterfly Stalker is rich in symbolism and layers of meaning. It marks Robyn Friend ’ s anticipated return to fiction
        after the controversial success of her first novel Eva .
    long_description:
        The Butterfly Stalker is a psychological thriller with a difference. When Theodora Dante is commissioned to write her City
        ’ s official history she also uncovers its unauthorized secret history. That alone could spell trouble. She overlooks the city through the
        ancient flawed window of her top storey dwelling. In the flats below are a couple ensnared in a marriage of dependency and violence, and an
        adulterous nurse and her clergyman lover. In strange ways their lives begin to echo hers. But Thea has her own secret. She is planning the
        murder of a stained-glass artist, Daniel, who lives across the park in a desanctified church he is renovating. Her plan is reaching its final
        act. Thea ’ s story has the glittering depths of a butterfly preserved in a glass paperweight... And that is the object she intends as her
        murder weapon. The Butterfly Stalker is rich in symbolism and layers of meaning. It marks Robyn Friend ’ s anticipated return to fiction after
        the controversial success of her first novel Eva .
    price: 26.95
    isbn: "1876044381"
    release_date: "2003"
    page_count: 199
    reviews:
        - title: Carmel Shute, Stiletto
          text:
              The Butterfly Stalker Carmel Shute Stiletto , No. 26, Spring 2004 Set in Tasmania, this is a powerful tale about obsessive love and
              murderous intent. Theadora Dante, commissioned to write the official history of her town, wants to write of the dark, hidden truth of the
              dispossession and murder of the original inhabitants. The civic leaders want a sanitised account of the colonial past. Meanwhile, Thea’s
              embarked on an illicit affair with Daniel, an artist who lives in an old de-sanctified church where, amongst other things, he teaches stained
              glass making. He gives Thea a butterfly caught in a prism of glass, which she comes to see, I believe, as representing the male gaze. It
              helps harden her heart against her lover and she plots to kill him. Friend has a strong voice and brings some new approaches to the thriller.
              The Butterfly Stalker will keep you enthralled to the end, which has a pleasing twist. Again, this is another Australian crime novel that
              could benefit from being with a major publisher with good distribution.
        - title: Famous Reporter Review
          text: Recent Writing The Butterfly Stalker Ralph Wessman Famous Reporter , No. 28, December 2003 (pgs 181-190) [Text not yet available]
        - title: The Age Review
          text:
              Fiction The Butterfly Stalker Cameron Woodhead The Age , 19 July 2003 Robyn Friend’s second novel is a second-rate psychological thriller
              in which the narrator, a local historian called Theadora Dante, plots to kill a stained-glass artist who inhabits a nearby church. From
              her third-storey apartment, she observes the romantic foibles and domestic disputes of the women living beneath her, while unearthing the
              darkest secrets of the island city she inhabits. The way that Friend interweaves past and present is mildly absorbing but her prose is purple
              and prone to affectation. And if The Butterfly Stalker is typical, the editorial standards at Black Pepper leave much to be desired. The
              book contains solecisms that would induce wild lamentation in the reader if they weren't so unintentionally hilarious, How cool are ‘lava
              floes’, for example? And how long do you have to wait if something is ‘on queue’?
        - title: Newsletter IASA
          text:
              "The Butterfly Stalker by Robyn Friend Sumanyu Satpathy Newsletter IASA (online), Indian Association for the Study of Australia, February
              2003 Set in a nameless city, which nonetheless shares a close resemblance with Launceston in Tasmania, The Butterfly Stalker tells the story
              of Theadora Dante, its narrator-protagonist. She has been commissioned by the City Council to write the official history of the city in
              which she lives. While researching her subject, Thea comes across archival material that threatens to unmask the powers that be, exposing
              the horrible doings of their ancestors, the island’s first settlers in the mid-Victorian era. Using these bits of information she begins
              to chart another history, the sordid unpublishable story of the ancestors of the city’s present lawmakers. She lives in a top-floor flat
              of what was earlier an inn, with a history of its own. In the flats below live a couple ensnared in a marriage of dependency and violence:
              Angela and Hadley; and yet another couple: an adulterous nursing sister Suza and her clergyman lover Paul. Thea discovers that the rumour
              about the house being haunted may well be true; and further that these characters may well be living each other’s lives, and, maybe, die
              other people’s deaths. Thea’s experiences lead her to plot the murder of her lover who is a stained-glass artist, Daniel by name living
              in a dilapidated, Gothic church overlooking her window. The suspense of whether she succeeds in carrying out her plot or not carries on
              till the end. The other subplot pertaining to the historical exposé is also held in suspense till the very end. This bare outline of the
              novel, of course, fails to do justice to its rich and intricate symbolism, its highly subversive politics, and what is more, its technical
              brilliance. For, beneath its narrative surface runs a seething undercurrent of anger and protest directed at power structures in Friend’s
              city, Launceston (‘the brooding pretty prison’ as she calls it in ‘This Pretty Prison’). After all, because of her political activism, she
              has been called names in the recent past: ‘a communist’, ‘lesbian feminist’, ‘a ratbag’ and so on. Because of the novel’s sharp indictment
              of the inhuman implementation of the political agenda of the city’s founding fathers, and of the erasures performed in official history
              writing, it may well prove to be as controversial as her first novel Eva is. I, therefore, shall proceed to bring in some more details.
              First, that the central symbol of the novel is a triptych by Daniel comprising three images of feminine sexuality. The artist has used Thea
              as the model for the triptych. The second symbol that dominates the narrative is the glass paperweight gifted by Daniel to Thea in which
              a butterfly in flight is cleverly captured. She plans to smash the first by using the second one as a weapon. The self-reflexive novel wonders
              more than once how the narrative simply cannot do without the primacy of the number three, already suffused with Christian symbolism. But,
              here, the idea of the Trinity is treated with utmost irreverence. The multi-layered narrative is the result of many a crisscrossing of spatiotemporal
              frames. That the city is no geographical fiction becomes evident from the close resemblance it bears with present-day Launceston. Placed
              beside the other aspect of the novel, its tendency to parody stereotypical ideas and icons, the interweaving of history and fiction in the
              novel makes it highly intertextual. This parallel between the discursive and the creative alerts us immediately to the falsity of the binary
              in the context of postmodernism. In the novel, the unofficial history, which is destroyed by Thea at the end, attains a performative status
              as, by articulating the so-called suppressed history, it actually lays bare the ugly past of the city’s founding fathers. What is noteworthy,
              however, is how Friend is able to interweave the two histories, and the stories of the lives of the fictional characters. Whatever happens
              to the fictional characters seems to have been predetermined by the history of the place or the people they are connected with. There is
              a trace of the naturalist tradition here. The main plot around the life of Thea and Daniel (and her husband), however, is used for raising
              aesthetic questions, about the power and purpose of art. But, like the other man-woman relationships in the novel, this relationship is
              also used to explore problems of female subjectivity, and sexuality. The novelist interrogates the use of the female body by male artists
              to serve patriarchy, and the eagerness of the women as willing victims. At one level the triptych is quite obviously a representation of
              the stereotype of woman as the lover, mother and witch-temptress. But Thea deconstructs it for herself. The same can be said about the paperweight.
              The butterfly stalker is undoubtedly Daniel. But both, the image of the butterfly and Daniel transcend their particularity to the universal
              image of the sexually exploited and exploiter. Thea, Angela and Suza, for all their differences replicate and relive each other’s lives
              even while reliving the lives of the mother who was killed by George Ratford. Eventually Angela is murdered by her husband, Hadley, because
              she refused to abort; Daniel does not want Thea to become the mother of his child, and there is a hint that he used his psychic powers to
              destroy the foetus. Thea nearly dies of a miscarriage and is saved a second time from a suicide attempt. In her fight against the perpetrators
              of crimes in the past and present, she decides to first expose the generational history of crimes and their present-day descendents, and
              then take her little personal revenge. Intriguingly, after delaying the revenge Hamlet-like, she does not kill Daniel, and destroys the
              typescript of the second history. Shrouding herself by a haze of metaphysics and aesthetic theory she persuades herself into believing that
              Daniel, though living, is yet dead. And she preserves the history of the gory past in her mind. It is this ending which is the most dissatisfying
              for me because it sounds so defeatist. Or, is it left deliberately disturbing? This is debatable. Friend’s ideological moorings may well
              have been shaped by intellectual and political developments within Australia. After all, (Germaine Greer) The Female Eunuch and The Empire
              Writes Back (Bill Ashcroft et al ) were influential works by Australian academics. But, in spite of what she calls the ‘islandness’ of the
              fictionalized Launceston (or Tasmania or for that matter Australia) the effect of globalization, of political activism among writers cannot
              be ruled out. Yet, the blurb of the novel makes the innocuous claim that the yet-to-be-published book is a psychological thriller. I do
              not know whether such a description enjoys the approval of the author. But, having read the novel (novella) many times over, and carefully,
              I feel that the description is misleading. As I said the novel is self-reflexive at many points. What it does not reflect on, however, is
              the novel’s preoccupation with three kinds of hegemonies: patriarchic, territorial, and racial. One wouldn’t like to schematize the novel
              so neatly, one might still say that the twin political concerns of the novelist, feminism and post-colonialism are enmeshed in the multi-layered
              story, presented in the formless form of postmodernism. In the process, Friend redefines the parameters of both feminism and post-colonialism.
              If post-colonialism generally concerns itself with the colonizer-colonized binary in a seamless and undifferentiated pattern, where the
              voices of the aboriginal people are systematically muted, homogenizing categories such as Africa and Australia, Friend goes to the heart
              of the problem, by trying to reconstruct the history of the aboriginal people. In her attempt to fictionalize history, offering a new historiography
              altogether, layering history and fiction, and avoiding realistic linearity, and using self-reflexivity and irreverent parody as a fictional
              strategy, Friend firmly places herself in the post-Patrick White generation of writers. We are told Friend has lived and worked in Launceston
              (Tasmania) and Africa. She has worked at old-age homes, and with the aboriginal people of the Huan and Channel communities. In her forewords
              and writings, such as We Who are Not Here - Aboriginal People of the Huan and Channel Today , dealing with these subjects she has given
              evidence of her concern and sympathy for these marginalized people, helping them to articulate their problems. She figures in A Writer’s
              Tasmania edited by established feminist writers and poets such as Carol Patterson and Edith Speers, and has herself written on ‘Sex and
              the Australian Writer’. These preoccupations and interests of hers colour the novel. In this she is a part of the process which overtook
              intellectual life of Australia in the 1980’s. As Bruce Bennett has pointed out, in the decades following the `80s ‘Australia... became a
              testing ground for intellectual movements, including feminism, post-colonialism and postmodernism’. When I first heard that the publication
              of the novel, has been delayed due to certain `unforeseen circumstances’, I attributed the delay simply to the inscrutable ways of the publishing
              world. After reading the novel, however, I feel that there is cause for worry. I shall be happy to be told that my fears were unfounded,
              and the novel has seen the light of day."
sailing-through-the-amber:
    title: Sailing Through the Amber
    author: Susan Hancock
    short_description:
        Loss and change and the sudden exhilaration the gaps in our lives give are at the heart of Susan Hancock’s fiction. The cities
        she creates are thronged with people telling their own stories. At times, strangely silent and deserted, they become the sites of an oddly
        visionary grace. Her prose, seemingly casual and airy, is structured and considered. A keen balance of dialogue and description develops into
        metaphor and image. It embraces heartbreak and angels.
    long_description:
        "That’s my favourite time, sailing across the gap between the red and the green; it takes good timing to find that gap, that
        place of pause between two regimens, and when you hit it right, you know... sailing through the amber, I call it, because as you take off,
        through all the warning signs, the moment you cross the grid you go into freedom. The Greeks call it chiasma, the place of absence at the
        centre of a crossroad, the gap that none of the four roads enters; a dark space in the middle of the night. Loss and change and the sudden
        exhilaration the gaps in our lives give are at the heart of Susan Hancock’s fiction. The cities she creates are thronged with people telling
        their own stories. At times, strangely silent and deserted, they become the sites of an oddly visionary grace. Her prose, seemingly casual
        and airy, is structured and considered. A keen balance of dialogue and description develops into metaphor and image. It embraces heartbreak
        and angels. I find its wit, sophistication, colour and technical command impressive. Helen Garner Hancock ’ s writing sailed into my world
        like some startling and haunting song... Her stories have that breathless emotional depth that you find only in very fine writing. They are
        stories of the lives of educated, urban upper-class men and women. She charts the disturbances of their relationships, the ecstacy and the
        pain of love. She ’ s uncanny in her observation and has a richly slanted vision framed by a glittering intelligence. Her best theme is reflecting
        exactly how the way we live affects the children of these fraught relationships. Helen Elliott, The Sydney Morning Herald Hancock ’ s stories
        are compellingly human: she takes us close to the warmth and drama of family life, close to the lovers and children around whom her stories
        swim. Although dense with emotive concerns, her prose remains open and considered throughout... Finely tuned empathy for a history and a landscape.
        Joe Hill, Overland Hancock is brilliant with the particular, building up characters and situations by tenderly and suggestively laying down
        detail after detail, but she keeps a steady eye on the general case as well... The title story, ‘ Sailing Through the Amber ’ is a little
        masterpiece... Hancock writes like an angel. Treat yourself. Anne French, The Listener (New Zealand) Cover painting Angel of the Annunciation
        by Colin McCahon"
