chasing-marie-antoinette-all-over-paris:
  title: Chasing Marie Antoinette All Over Paris
  author: Adrienne Eberhard
  description: Adrienne Eberhard’s new collection Chasing Marie Antoinette all Over Paris forges connections between past
    and present, public and private, and human and non-human, exploring what it means to be truly at home in the world, whether
    her beloved Tasmania, France or Indonesia. Ranging in subject matter from native grasses, ducklings and footy games, to
    cave paintings, family and 9000 years-deep ancestry, she draws on personal, as well as cultural, history to investigate
    possibility, love and loss. With their focus on the small and the precious, these poems draw our attention to what is
    often overlooked, enabling us to see the extraordinary in the ordinary.
  price: 25.95
