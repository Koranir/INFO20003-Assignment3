blueprints-for-a-barbed-wire-canoe:
    title: Blueprints for a Barbed-Wire Canoe
    author: Wayne Macauley
    short_description:
        Bram has a reluctant story to tell. Excavating common objects from the mullock heap of a failed housing estate, he records
        the lives of those who lived there. One-eyed Michael, fencing contractor and ideologue, his daughter Jodie, Slug the real estate agent, Layland
        from the Ministry and Tony the bricklayer-in-waiting are some of the people whose lives he records.
    long_description:
        "The rain fell hard and unending on the roof. All the ghosts of ur were sleeping. The night was as dark as a whale ’ s belly.
        She passed by swiftly, cried out softly; I wasn ’ t listening, I couldn ’ t have heard. Bram has a reluctant story to tell. Excavating common
        objects from the mullock heap of a failed housing estate, he records the lives of those who lived there. One-eyed Michael, fencing contractor
        and ideologue, his daughter Jodie, Slug the real estate agent, Layland from the Ministry and Tony the bricklayer-in-waiting: these are just
        some of the players in a laconic comedy of circumstance. Prize-winning short fiction writer Wayne Macauley has made, as Peter Craven has noted,
        ‘something almost like allegory.’ His compulsive telling ensnares us in an escalating series of remarkable events. An old leather satchel
        holds the documents for the fatal vessel of the title... Beguilingly simple, eccentric and original, Blueprints for a Barbed-Wire Canoe is
        a fable of ownership, and an elegy for a dream. stunningly written... If more Australian literature was of this quality, we’ be laughing.
        Cameron Woodhead, The Age Cover drawings by Ian Bracegirdle"
    price:
    isbn: 187604442X
    release_date: "2004"
    page_count: 147
    reviews:
        - title: Cameron Woodhead, The Age
          text:
              Blueprints for a Barbed-Wire Canoe Cameron Woodhead PICK OF THE WEEK The Age , 24 January 2004 More than 50 kilometres north of Melbourne,
              a model estate is built in a flush of quixotic enthusiasm. It turns into a town-planning disaster. Three years later the seven identical
              culs-de-sac are virtually abandoned - no jobs came, the freeway extension was never built and the inhabitants fled back to the city. Bram,
              excavating the wreckage of the site, tells the strange stories of the people who moved there. Wayne Macauley has the soul of a poet and
              his surreal novella is stunningly written. Blueprints for a Barbed-Wire Canoe evokes a series of quirky characters, the humour set against
              suburban decay. It is a satire of exquisite poise and confidence and a timely corrective to the noxious utopianism of, say, Caroline Springs
              advertisements. If more Australian literature was of this calibre, we ’ d be laughing.
        - title: Graham Clark, The Courier Mail
          text:
              Paperbacks Blueprints for a Barbed-Wire Canoe Graham Clark The Courier Mail , 17 December 2005 Beguiling, eccentric, tapping the hidden
              heart of a different Australia - call Wayne Macauley’s work what you like, but after Bram gets through musing about life in the scrapheap
              of a failed housing estate; the last eventful canoe voyage of Jodie and her rabbit skin hat; the black-humoured tale of the one-eyed ideologue
              Michael the former fencer; Slug, the real estate agent who arrived in that government-sponsored estate with the grandest plans for making
              a million and eventually washed up on barren shores dispensing home brew - Macauley’s work, so the publishers say, is a fable of ownership,
              and an elegy for a dream. But that’s selling it short - this is original Australian writing at its best, sifting through a series of seemingly
              everyday events to unearth the real story of that derelict estate and its characters, which could be a parable of modern life seeking meaning
              anywhere.
        - title: ANZ LitLovers LitBlog
          text: Blueprints for a Barbed-Wire Canoe Lisa Hill, ANZ LitLovers LitBlog (online), 23 February 2013
        - title: Well of Lost Plots Review
          text:
              Blueprints for a Barbed-Wire Canoe welloflostplots.blogspot.com , 31 May 2007 Blueprints for a Barbed-Wire Canoe is an odd little book
              and beautifully quirky. It borders on the ridiculous at times, and yet the characters motives never lose their believability. Quite a fine
              balance really! The author is Wayne Macauley, an acclaimed Australian short story writer. The title relates to the old saying - ‘Up shit
              creek in a barbed-wire canoe without a paddle’ (although I must say I have never heard of the barbed-wire canoe bit before). And in fact,
              the barbed-wire canoe, a symbol of hopelessness and doom (because how far can you really get in it?) becomes the symbol for the entire story.
              In a way that only an Australian can, Macauley writes about the suburban dream of housing estates, and sets his story in a satellite estate
              - one that has been built far out from the urban fringe, but lies waiting for buyers and the long-promised freeway (which sort of gains
              mythical status throughout the book) to catch up to it. Like the canoe, the little community is doomed before it even begins, by bad planning
              and shoddy workmanship. Yet despite this (or perhaps because of it), Macauley painstakingly shows us the development of a society in the
              estate that becomes known (by letters falling off a sign) as ur - a clear parrallel to the doomed Sumerian city of the same name. The core
              characters stubbornly do not leave the development, despite the lack of plumbing, electricity, and eventually income that they are subject.
              Instead, they band together and survive using each of their unique skills. At what point they story may verge on the ridiculous will change
              with every reader. Some will say it is the building of the wall around the estate (do I hear East Germany anyone?), while others will vote
              for the senseless deaths or the sheer lunacy of Michael’s attempts to draw attention to their plight at the end. Bram, our narrator (and
              now think biblical reference) tells the story if the demise of the estate and all of their dreams after the event. But how reliable is he?
              His is a love story, and yet the object of his affection is strangely silent and absent. I would love to hear anyone else’s thoughts on
              this. It’s a really original read - which makes it great. Certainly it’s not for everyone - but no good book is. Trying hard to please everyone
              just makes for a bland read.
        - title: Overland Review
          text:
              Real Life? Some Recent Fiction Paul Gillen Overland , No. 182, Autumn 2006 Wayne Macauley’s Blueprints for a Barbed-Wire Canoe is an
              eccentric parable about a prematurely constructed housing estate abandoned by the vagaries of property development. The estate, which comes
              to be called, sardonically and Biblically, ‘Ur’ after most of the letters have faded from a gateway sign, could even be the same estate,
              a few years down the track, that is called ‘Another’ in [Joel] Deane’s novel [ Another ]. Macauley commands a rich and flexible style, ranging
              easily through satire, intensity and reflec­tion. There is nothing in this exemplary suburban Gothic tale to place it specifically in Melbourne,
              or anywhere, but there is something undeniably ‘Melbourne’ about its ironic brew of community, weirdness and failure. ...Even more striking
              than their attachment to place is the attachment of these books to the past. Overwhelmingly, they look back. The Singing [Stephanie Bishop]
              and Barbed-Wire Canoe are retrospective narratives...
        - title: The Sydney Morning Herald Review
          text:
              "A descent into the wildness of isolation A. Bronwyn Rivers The Sydney Morning Herald , 5-6 June 2004 With its isolated characters,
              gothic elements and sense of degenerating humanity, Wayne Macauley’s Blueprints for a Barbed-Wire Canoe is reminiscent of Elizabeth Jolley’s
              The Well , or even William Golding’s Lord of the Flies . Macauley has imagined an engagingly creepy setting. City planners create an unusual
              new housing development in the countryside north of Melbourne. The ‘Outer Suburban Village Development Complex’ is supposed to be a brave
              new type of town organised around a central square, with residents enticed by cheap housing and the promise of a fast freeway to the city.
              Its circular layout is mischievously suggestive of Milton Keynes or Canberra, those triumphs of 20th-century city planning. But the promised
              freeway never eventuates, the town dies, and eventually only a few obstinate residents remain. The interest begins when officials attempt
              to erase this failed urban dream and the residents bunker down against the outside world. The story is perhaps intended as a salutary fable
              about the horrors awaiting our disaffected modern citizenry: these isolated urban dwellers, abandoned by government and their fellow citizens,
              descend into wildness. Macauley displays a strong sense of situation, he keeps the action moving, and he creates lasting visual images and
              resonant symbolism. These strengths are let down by uneven narration. The voice of the narrator, Bram, is rather bland, and too often Macauley
              states the obvious, rather than allowing themes to grow out of suggestion."
        - title: The Bulletin Review
          text:
              Mark Tredinnick The Bulletin , 11 May 2004 Wayne Macauley’s novel feels like a short story that got away, a dense and implausible suburban
              fable about... it’s hard to say what. There are times when you wonder not only how this tale will end, but if it will. Which is not to say
              it’s a bad book. But reading it felt like falling into a bail of barbed wire in the dark and fighting to get out till morning. The more
              I struggled, the more it got under my skin.
        - title: Wet Ink Review
          text:
              The Latest Word Blueprints for a Barbed-Wire Canoe Emmett Stinson, Wet Ink , Issue 2, Autumn 2006 Wayne Macauley’s novella tells the
              story of a failed government-funded housing estate. Envisioned as a village of 1,000 people 50 kilometres north of Melbourne, potential
              residents are offered incentives, such as the building of a highway and petrol discounts, to relocate. But these promises never materialise
              and the community dwindles to seven people. Stranded far from the city, the remaining develop an informal commune increasingly isolated
              from the outside world. The novella (though billed as a novel) feels more like a bloated short story in form and scope and Macauley’s tale
              spirals into an absurdist surreality reminiscent of Fat Man in History -era Peter Carey. The residents of the estate (pseudo-cleverly renamed
              ‘Ur’ because those are the only two remaining letter of its official name - the Outer Suburban Village Development Complex) square off against
              vandals, government freeway builders, and the creation of an adjacent garbage tip. Eventually two are driven to a bushranger/guerilla insurgency
              that evokes Ned Kelly. To Macauley’s credit, the plot remains bewitching and ethereal, lending a vaguely allegorical bent to the story,
              which seems to reflect on Australia’s own settlement and antipodean isolation from the West, as well as the alienation of modern suburban
              living. Unfortunately, the characters remain flat and unbelievable - and while this may be the point, evoking ‘types’ rather than rounded
              characters, this approach often comes off as affected rather than effective. Bram, the novel’s narrator, claims to be in love with Jodie,
              but she remains a secondary character and inexplicably disappears from this short book for dozens of pages at a stretch - despite his supposed
              infatuation. At other points, important information is delivered after the fact (e.g., after cleaning a gunshot wound, one character conveniently
              mentions her background as a nurse). Macauley’s prose, though verbose enough to suggest an intellectual narrator, is staid and uncomfortably
              ridden with cliches (such as ‘ridden with cliches’). The book’s nadir occurs when a character literally navigates up a sewage-drenched river
              in a barbed-wire canoe - a premise trying so hard to be clever that it nearly cripples an otherwise enchanting story. Still, the hallucinatory
              power of Macauley’s tale ultimately manages to surmount these shortcomings. His novella remains ambitious and experimental - and it succeeds
              more often than it fails. In an era when many Australian novelists are playing it safe, Macauley’s literary gambits are refreshing even
              when they don’t pan out. Most impressively-for a work that is consciously literary, intellectual and experimental - Blueprints for a Barbed-Wire
              Canoe makes for a page-turning, accessible read. It is not a masterwork, nor even an unqualified success, but its high aspirations and ability
              to tackle multiple issues in a small space suggest that Wayne Macauley is an ambitious talent worth watching.
        - title: The Age Education article
          text:
              "The Age Education Little Aussie Battlers Text Talk: Blueprints for a Barbed-Wire Canoe A bleak take on the Australian dream of owning
              your own home Bob Hillman (senior English teacher at Trinity Grammar School, Kew) The Age Education VCE Express, April 16 2007 When I finished
              reading Wayne Macauley’s outer urban exploration, Blueprints for a Barbed-Wire Canoe , the first image that came into my head was a television
              advertisement of a husband and wife hugging one another as he leaves on a trip. The husband repositions his wife so he can gaze in wonderment
              at the roof of his new home, which just happens to be in one of Melbourne’s burgeoning outer estates. There are promises made within the
              advertisement that somehow this roof, this house, means more than just a place of residence. Likewise, Australia’s long obsession with a
              house being so much part on an individual’s identity and sense of self is apparent in the classic film The Castle . Both that advertisement
              and the film reinforce the main character Bram’s dream of ‘a vague notion of a house, a family and a happy life in the former housing estate
              north of Melbourne’. Macauley’s novel, however, demolishes this idea and challenges the middle-class beliefs that everyone is entitled to
              a supposed suburban Utopia. The problem lies in that Melbourne’s suburbs were once within sight of the city’s heart. Today, with the ever-growing
              population, the estates are moving further and further out. The residents in the novel become victims to a careless and negligent bureaucracy.
              Macauley paints a dark picture of those who are responsible for the ‘Outer Suburban Village Development Complex’. While the estate is completed
              ‘in record time’ and the grand opening includes dignitaries, politicians and even the Premier, it is not long before all those who should
              take responsibility wash their hands of ‘ the estate and the people who live there. Australians’ natural suspicion of, and aversion to,
              government is reinforced throughout the story. We are told of the chicanery, deception and downright fraud by those civil authorities whose
              job it is to look after citizens. When the residents fail to accept defeat and acknowledge that the experiment is a failure, the local council,
              in league with the Government, places a garbage tip next to the estate with the underhanded purpose of driving them away. A parade of representatives
              is sent with hollow promises and pronouncements, none of which prove sincere. When Loch and two security guards arrive at ur, the residents
              are presented with an eloquent declaration of support and Macauley uses the opportunity to emphasise to us ‘that there is something decidedly
              wrong with a system that has driven a group of otherwise ordinary citizens to this end. I am shamed bv it.’ The residents of ur have become
              an embarrassing reminder of governmental failure and neglect. The authorities are prepared to do anything to rid themselves and the public
              of a symbol of their incompetence and negligence. The Government even closes a bank account that the residents communally opened. It is
              suspected that the vandals who destroy some of the few civilised aspects of life in the estate are hired by those who have a vested interest
              in its evacuation. They become forgotten and ignored by the outside world. While Macauley describes parts of his novel as containing ‘amusing
              bits’, he also acknowledges that ‘there’s another side of me that is dark, troubled’. The plight and behaviour of those who eke out an existence
              over 11 years is nothing short of gloomy and depressing. They endure dreadful odours from the open sewerage and the tip. As the story unfolds
              they eat anything they can get and live in squalor. The electricity and water are turned off, their lives are miserable. There is a fine
              line between the awe we may feel at the indominatability of the human spirit, even in the most horrific circumstances, and the appal we
              feel for the steady deprivation that the residents of ur impose on themselves. There is little to celebrate as the life of each resident
              disintegrates. Unwashed, hungry and isolated from the outside world, they can only find some solace in each other’s company. There is a
              community spirit but even that collapses in the face of poverty and the idle existence away from other humans. The few moments of celebration
              come when outsiders arrive and offer improvements. Jodie’s arrival added ‘a new spirit of enterprise’ and Marie-Claire’s appearance, all
              the way from France, enlivens the mood and atmosphere for a time. One by one, however, individuals can no longer bear the deprivation of
              their existence. Slug perceives the hopelessness of the situation and flees in the night. Instead of understanding, those left behind ignore
              the contributions he has made to the community by opening a cafe, but instead delete ‘all trace of Slug’s influence’ and ‘from that day
              on he became ur’s much needed bete noir’. In his return there is some substance in his claim that he has done everything he can to help
              them with the authorities, but he is reviled and chased away with a blast from Michael’s rifle. Vito is responsible for enormous contributions
              with his resourcefulness. He possesses left-leaning ideologies and offers his talents as a vegetable gardener, but he too steals away in
              the night after finally succumbing to the reality of their plight. Even Alex disappears, driving his bulldozer through the wall built to
              keep the world out. Although Bram does not leave, he recognises ‘it’s an unguarded stairway, easily descended, from the warm house of solitude
              to the dungeon of loneliness and I had without knowing begun to descend it’. Once the improbable deaths of Nanna and Dave occur, it is left
              to five defiants who are under the influence of Michael. At first he is a somewhat comical eccentric, but as the tale unfolds, it is clear
              that he is dangerous - to himself and others. Symbolically, his visual handicap occurs when he creates the tension of a wire too tight and
              it snaps. Michael, too, is psychologically stretched tight and ultimately snaps. His menacing presence seems to drag the inhabitants of
              ur down with him, ‘no one dared argue with him’. Not even his daughter could influence him and ‘his behaviour became increasingly reckless
              and bizarre’. It is interesting to note the allegiance this madman is able to elicit even when it is clear his actions are not in the interest
              of those around him. He has become ‘like some prowling animal, his mind completely gone’. This does not, however, diminish his influence.
              The narrator ‘could hardly look Craig in the eye, so infected had he become with Michael’s madness’. It is a madness that is played out
              in the actions of Jodie, his daughter, which opens and finishes the tale. According to the blueprints for a barbed-wire canoe, she must
              ‘be sure you’re sick of life, say to yourself: I’ve had enough’. Her drowning in the creek and the death of Bram’s and her unborn baby is
              the final chapter in a tragic story. As Bram completes his archaeological dig and unearths artefacts, he writes the history of a failed
              estate and its destruction of those who tried to make a life out of hollow promises on ‘40 hectares of abandoned farmland’."
caravan-story:
    title: Caravan Story
    author: Wayne Macauley
    short_description:
        One morning, without warning, the narrator wakes into a nightmare. He and his female companion are put in a caravan and driven
        to a football oval in a faraway country town. There they join scores of other caravan-dwellers in a seemingly closed community, where they
        are divided into groups and given tasks. Then the narrator escapes to an abandoned school in a big country town.
    long_description:
        "So here I am, I’m going: it happens to us all. There is no rhyme nor reason. Even when you’ve sucked the fingers of the hand
        that feeds you it can still turn around and grab you by the throat. One morning, without warning, our narrator wakes into a nightmare. He
        and his female companion are put in a caravan and driven to a football oval in a faraway country town. There they join scores of other caravan-dwellers
        in a seemingly closed community. They are divided into groups, given their tasks. Then our narrator ‘escapes’, to an abandoned school in a
        big country town… Wayne Macauley has a gift for storytelling. He can, and cannot but help, spin a yarn. It is this continual shifting on of
        our attention through the description of the particulars of a scene that gives his writing such a weird intensity. Examining the darker side
        of our manufacture and manipulation of culture, Caravan Story is a deeply unsettling and at times hilarious read. With Macauley’s inexorable
        narrative logic we are held in its thrall until the sparkling, if muted, transfiguration of its ending. In an era when many Australian novelists
        are playing it safe... Wayne Macauley is an ambitious talent worth watching. Emmett Stinson, Wet Ink"
    price:
    isbn: "9781876044534"
    release_date: "2007"
    page_count: 168
    reviews:
        - title: Martin Shaw, Readings Monthly
          text:
              Caravan Story Martin Shaw Readings Monthly , July 2007 (An edited version of this review appeared in The Monthly , July 2007) In 2004
              Macauley published Blueprints for a Barbed-Wire Canoe to great acclaim, with one critic even going so far as to say that ‘if more Australian
              literature was of this calibre, we’d be laughing’. On the strength of this, his second, book, I must say I entirely agree ! But as much
              as the art of this book - its surreal, dreamlike atmosphere, its memorable cast of slightly sinister characters (à la Kafka) - seduces the
              reader, what really excites is Macauley’s provocative cultural intervention. The central premise is a not-so-far-away-as-you-might-think
              radical utilitarianization of the arts in Australian culture. A young couple, one a writer named Wayne Macauley, the other an actor, are
              removed from their inner-urban lodgings and taken by caravan to the local football oval at a small town in the Victorian countryside. There
              they find themselves in a new ‘community’ of like-minded cultural workers. Somewhat confused, Wayne begins work on his writing – until it
              becomes apparent that the community’s material is simply ending up in the garbage bin. The select few get the opportunity to render themselves
              ‘possibly’ useful by generating scripts for film or TV; the others simply vanish. His girlfriend, on the other hand, finds that her profession
              at least is deemed to have its uses – she finds herself on the road seven days a week in a traveling troupe, providing entertainment for
              demoralized country towns suffering from the drought, or making TV commercials. But in the camp even more artists are arriving on buses,
              it’s full to overflowing (in need of a final solution, in fact). A lament but also a call to arms, Caravan Story is a thrilling piece of
              satire, a compulsively readable, extremely well-wrought Orwellian fable that I believe announces the arrival of Macauley as a major Australian
              writer, one who definitely has something to say.
        - title: Owen Richardson, The Age
          text:
              Macauley on the road again Owen Richardson The Age , 25 August 2007 Melbourne writer Wayne Macauley’s first novel, Blueprints for a
              Barbed-Wire Canoe , showed that a real talent had arrived, and his second confirms the promise. Like Kafka or Ballard, his books are set
              in a dreamlike parallel world that shines a light back onto ours. Allegory being hard to keep up at length, both those writers are better
              in their short stories than in their novels, and Macauley’s chosen form of the longish novella - about 150 pages -and his physical specificity
              show canniness and discipline, as well as ability. In Caravan Story , Wayne, a writer, and his actor girlfriend are rounded up along with
              their colleagues and made to live in caravans parked in a country town footy ground, like so many refugees or Jonestown cultists, and put
              to work on various projects. The writers fare the worst; the actors look as if they are going to spend their lives doing corporate training
              videos or public service ads, while the painters, well, they have all those community murals to do. The writers are sent back to school,
              literally - shades of Ferdydurke - in the hope they may have a future in TV and film and made to watch Chinatown over and over again and
              schooled in the jargon of story paradigms (set-up, confrontation, resolution), the rhetoric of the commercial arts. It’s a book written
              by someone who has had to fill out one grant application too many, or had to read the dreadful pap funding bodies put on their websites,
              until he’s started to bleed from the ears.
        - title: Radio New Zealand Review
          text: "Caravan Story Radio New Zealand, ‘Nine to Noon ’, 17 August 2012 For the audio of this review click here: http://www.radionz.co.nz/national/programmes/ninetonoon/audio/2528420/book-review-with-louise-o%27brien.asx"
        - title: Australian Book Review Review
          text:
              Caravan Story Tali Polichtuk Australian Book Review , No. 298, February 2008 In his lauded début novella, Blueprints for a Barbed-Wired
              Canoe (2004), Wayne Macauley charted the development and demise of a badly planned and hastily constructed outer-suburban housing development.
              Luring city-dwellers with cheap housing and a promised highway to enable quick access to the city, the government abandoned the project,
              leaving the residents to fend for themselves. In Caravan Story , Macauley’s second novella, the author renews his preoccupation with urban
              planning and hones his gift for allegory, spotlighting the plight of artists forcibly relocated to the countryside. Wayne, the narrator,
              is one of hundreds affected by this government policy. Evicted from the inner-city home he shares with his partner, Alice, they are moved
              to a football field cum caravan park in a Victorian country town. Here they are trained to channel their creative abilities (writing and
              acting, respectively) to utilitarian ends. The aim of the project is to turn them into citizens ‘[w]ho might make a worthwhile contribution
              to society’. This proves to be a futile exercise for Wayne and his fellow writers. Bureaucrats dispose of their work unread, their rejection
              letters having been drafted even before they began their menial writing tasks. An attack on the strip-mining of the arts, Caravan Story
              ’s strength lies in the manner of Macauley’s critique. Eschewing heavy-handed didacticism, he opts for economical prose imbued with subtle
              imagery. Housing serves as the key motif, a totemic symbol of the depletion of the community’s artistic freedom. The stationary caravan
              is a cogent metaphor for the precarious position of the handout-dependent artist, ‘[s]ucking on the dug of dubious benevolence’. Mixing
              elegy and whimsy, satire and black humour, language becomes pliant under Macauley’s command. The narrative palls when the author allows
              his characters to sermonise at length, but this is a small blemish in an otherwise engaging read.
        - title: Canberra Times Review
          text:
              "Ebb and flow of everyday life made new Emily Maguire (author) The Canberra Times , 8 December 2007 Reading a metafictional novel can
              be like working at a cryptic crossword. The cheeky winks and word play are good fun but in the end it’s all just so much diversion. At their
              best, however, such novels work to expand our understanding. Happily, Wayne Macauley’s use of metafictional techniques in Caravan Story
              is more revelatory than masturbatory; the head games and narrative tricks are directed toward getting the reader to think more deeply, not
              just more cleverly. The narrator of Caravan Story , also a writer named Wayne Macauley, is confused rather than shocked when he is herded
              into a caravan and driven to a country football ground. It seems Wayne and all the other writers, actors and painters have been involuntarily
              recruited to an artists’ colony in which they will be fed and watered so long as they beaver away at their set assignments. The actors and
              painters disappear fairly quickly; their skills are in high demand for corporate training videos, commercials and community murals. The
              writers, though, are less useful. ‘The question is,’ says the camp administrator at one point, ‘what good are all these writers, what possible
              worthwhile contribution could any of you possibly make, how could any of you ever possibly pay your way?’ After wasting the days writing
              pages that end up in the overflowing garbage cans behind the toilet block, the useless writers are sent - literally - back to school. Here
              they are bluntly told the ‘facts’: ‘You can hold on to your romantic dreams all you like... but there is only one way to make a living out
              of telling stories and that is having your stories told on celluloid within the paradigm of a three-act structure.’ On one level this book
              is a painful (to this novelist, anyway) satire on the endless round of grant, fellowship and residency applications that writers undertake
              in an attempt to eke out a living or improve their literary status. But it’s also an interrogation of the place of art, specifically literature,
              in our society. Is literature that is produced by demand or written to pre-defined parameters literature at all? Is a work of art only worth
              something if someone (anyone), somewhere (anywhere) is willing to pay for it? What’s the point of it all, anyway?"
        - title: Readings Monthly book of the year
          text:
              Citation as a Book of the Year (2007) My discovery of the year was Brunswick author Wayne Macauley. For anyone who thrills to a hypnotic
              prose style and incisive social satire, I would urge you to discover his work! His most recent novella is Caravan Story . Martin Shaw, Readings
              Monthly , December 2007-January 2008
other-stories:
    title: Other Stories
    author: Wayne Macauley
    short_description:
        Wayne Macauley’s Other Stories is a much-awaited collection. Here at last Macauley’s peculiar take on the world is gathered
        together in short stories, satires, fables and anecdotes. Many are set in the hinterland of the outer suburbs where big cars, big driveways,
        big houses and big skies make small people feel lost and strange. This familiar world seems eerie, like a Jeffrey Smart painting. His yarns
        of the margins are at the centre of our culture.
    long_description:
        Wayne Macauley’s Other Stories is a much-awaited collection. Here at last Macauley’s peculiar take on the world is gathered
        together in short stories, satires, fables and anecdotes. Many are set in the hinterland of the outer suburbs where big cars, big driveways,
        big houses and big skies make small people feel lost and strange. This familiar world seems eerie, like a Jeffrey Smart painting. His yarns
        of the margins are at the centre of our culture. Macauley’s short fiction has appeared for over a decade in our most prestigious literary
        magazines, including Meanjin , Overland , Westerly , Island and Griffith Review . As novelist and playwright he is one of our most original
        and challenging writers and a winner of The Age Short Story Competition. His two corrosive novels, Blueprints for a Barbed-Wire Canoe and
        Caravan Story , won critical acclaim. For anyone who thrills to a hypnotic prose style and incisive social satire, I would urge you to discover
        his work! Martin Shaw, Readings Monthly
    price: 26.95
    isbn: "9781876044664"
    release_date: "2010"
    page_count: 172
    reviews:
        - title: Emmett Stinson Known Unknowns review Other Stories Wayne MacauleyU
          text:
              "Other Stories Emmett Stinson From 3RRR Breakfasters Show, 7 September 2010 (and Emmett Stinson’s blog Known Unknowns , 7 September
              2010) [From Known Unknowns 2 September 2010: This week I picked up two books that I’m very excited about. The first is Wayne Macauley’s
              Other Stories , which I’ll be reviewing next week. I loved his first two novels ( Blueprints for a Barbed-Wire Canoe and Caravan Story ),
              and this collection is even better (so far). He deserves a much wider readership, and I think he’s one of the finest writers in Australia
              right now. So buy it now! Yes, right now!] Wayne Macauley’s Other Stories collects a variety of short fiction that he has published in literary
              magazines over the last eighteen (!!!) years. Despite the work’s lengthy gestation, these stories demonstrate an impressive unity of vision,
              as well as an extraordinary—if uniquely Australian—voice. Macauley is also the author of two excellent novels, Blueprints for a Barbed-Wire
              Canoe and Caravan Story , but, as good as his novels are, Other Stories reveals that he is an even better short story writer. Macauley’s
              prose is absolutely beautiful, as the very first sentence of his collection proves: ‘In the dog days of summer, when the earth rolls and
              sighs and a heat shimmer wobbles and distorts everything in the middle distance and beyond, who has not wanted, as evening falls, to take
              their mattress and pillow outside and sleep like a well-heeled vagabond under an open sky?’ Here readers can already see Macauley’s humour,
              and how his stories twist everyday situations into strange, otherworldly experiences. In this sense, Other Stories is an appropriate title
              for this eclectic, often experimental collection, but Macauley’s rigorous innovation is always inflected with mordant satire, resulting
              in work that is both affecting and hysterically funny. Consider the story ‘Bohemians’: here, a real-estate agent in a once-hip inner-Melbourne
              suburb faces a problem; local housing prices have skyrocketed to the point where artists and intellectuals can no longer afford to live
              there. The solution, of course, is to rent bohemians from a dealer; the entire story consists of a letter written by this bohemian-dealer
              in response to the real-estate agent. Many of his stories have similarly absurdist conceits; in ‘The Man Who Invented Television’, a man
              named Henry Walter invents the television set in Melbourne in 1855, and, in an even more unlikely turn of events, his TV broadcasts current
              programs, such as The Oprah Winfrey Show. In my favourite story, ‘The Bridge’, a soldier is stranded in a remote outpost and his claustrophobic
              circumstances recall Samuel Beckett’s Waiting for Godot . And this is what is interesting about Macauley’s work: although his formal experimentation
              might bear the influence of international writers like Beckett and Kafka, his work also suggests the local inheritance of Henry Lawson and
              Peter Carey’s early short stories. And Other Stories ultimately is a book that is uniquely and particularly Australian. Not only does the
              book possess a wry, laconic tone, but also figures from Australia’s cultural history are a signal fixation in Macauley’s work: Adam Lindsay
              Gordon, the dig tree, the inland sea and Melbourne’s trams all play a key role in these stories. In this sense, Other Stories presents an
              excellent model for a truly Australian literature. While its aesthetics are influenced by the great traditions of world literature, the
              content remains recognizably Australian. Wayne Macauley should be recognized as one of Australia’s best living writers – that he isn’t is
              an indictment of Australian literary culture. This is one of the best books by an Australian I’ve read all year. Do yourself a favour and
              go buy it now."
        - title: The Sunday Age review Other Stories Wayne Macauley
          text:
              "Other Stories Owen Richardson, The Sunday Age , 24 October 2010 ( The Age Review of the Week) “He is one of Australia’s deadpan visionaries.”
              Melboume writer Wayne Macauley’s first novel Blueprints for a Barbed-Wire Canoe was published in 2004, and his second, Caravan Story , in
              2007. His fiction deals in parables and allegories, satirical fantasies of the bureaucratised, neo-liberal world, and yarns that read like
              the dreams of some collective suburban unconscious; he is a writer of great purity, combining social critique, fertile imagination and the
              highest aesthetic scruples. His work is some of the best fiction Australia has to offer. This new book collects the stories he has been
              publishing since the early 1990s. There are 19 in all, though the book is not long: many are hardly more than a couple of pages and at 21
              pages, ‘The Bridge’ is the collection’s epic. Figures from the Australian past appear, such as Simpson and his donkey, and Adam Lindsay
              Gordon; television is invented in 19th century Melbourne; a woman’s brother turns into a tree; Death himself loiters behind the changing
              rooms at a suburban football ground, calling people to his dance. And just as Blueprints for a Barbed Wire Canoe was a fable about an outer
              suburban development, and Caravan Story about the co-optation of artists by the government, in this book, too, the fate of the city and
              of the artists who try to live in it are among Macauley’s preoccupations. Macauley is a moralist: there are parables of greed and corruption
              such as ‘Decency’s Grave’, and ‘The Dividing Spring’, in which a natural spring causes the dishonest people who drink from it to become
              sick. As the 1990s arrive, more and more are exposed: “the filed reports of the St John Ambulance team now stationed there permanently showed
              them treating up to a hundred serious cases a day.” And the spirits both of Swift’s A Modest Proposal and of Kafka’s In the Penal Colony
              lurk behind ‘The Farmer’s New Machine’, a story that pivots on the single line “This continent is 60 per cent arid. The human body is 60
              per cent water: work it out for yourself.” One of the stories reminds you sharply of its age: in ‘So Who’s the Wrecker Then?’, from 1999,
              the unnamed larrikin premier is visiting a building site. Rather than throw sand at journalists, as Jeff Kennett did, he gets into a bulldozer,
              with which he then runs amok: first he chases after the media and then demolishes a school, a childcare centre, a hospital and a church.
              We all know, of course, that preachy is a bad thing for fiction to be, but the sardonic exaggerations of these stories have such clarity
              of outline, and the writing is so controlled, that they have the graphic power of the very best cartoons. Whether or not Macauley is arguing
              against the way we live now, the writing is unfailingly exact in its effects: towards the end of the first story in the book - about the
              night all the inhabitants of Boxstead Court, Keilor Downs, dragged their mattresses out into the street and slept under the stars - Macauley
              tells us that afterwards “something still lingered, some ineffable thing, like a porchlight left on all day.” The image is so right that
              Macauley’s discovery of it is also an ineffable thing. His opening lines pull surprises on us; they lead us down the path from our world
              into his alternative universes. Here he pulls the trick twice: first on the word “television”, announced with a little flourish of neo-Victorian
              pedantry; and then at the end: Over the course of one glorious summer, in the year 1855, in a house in a burgeoning city soon to become
              known as Marvellous Melbourne, the amateur inventor and professional copy clerk Henry Welter finally brought to a practical realisation
              the invention he had been working on assiduously for the previous 10 years, videlicet the television set, and that evening, his wife Elizabeth
              having retired to her bed, Henry removed himself to his study with a jug of beer and some Stilton cheese to watch re-runs of I Dream of
              Jeannie and later, with a hot chocolate and a biscuit, the CNN News Overnight . Then there is this, starting with mousily pompous sociological
              observation and ending as if in the world of some ancient myth, or of Shakespearean comedy gone terribly wrong: Given the strange and often
              troubled world of familial relations, and particularly those that take place in an isolated outer suburb such as M—, it is perhaps not very
              surprising that Ellana McLeod, the newsagent’s daughter, should end up marrying her brother. Macauley’s work is dark and more than tinged
              with melancholy; it is also often wildly funny. Like Bail and Murnane, he is one of Australia’s deadpan visionaries, a teller of tall and
              cerebral tales."
        - title: Review of Other Stories Australian Book Review
          text:
              "Kaleidoscopic fiction Laurie Steed Australian Book Review , February 2011, No. 328 How to review a book that includes, as major characters,
              Simpson and his donkey, the Dig Tree, and a bus that may or may not be a tram? In the case of Wayne Macauley’s Other Stories ,it is best
              to read story by story, pausing only to chart connecting themes in the cultural landscape. MacAuley’s short fiction draws inspiration from
              a surprisingly broad range of influences. Adam Lindsay Gordon, Simpson, and the inland sea are all featured in his kaleidoscopic rendition
              of Australian history. The author also revisits suburbia, seeing the potential for both connection and disconnection in widening roads and
              disjointed communities. What sets Macauley apart from his contemporaries is his willingness to experiment with form and theme. His shortest
              stories, such as ‘The Streets Are Too Wide’ and the excellent ‘One Night’, are lingering images that veer closer to narrative poetry than
              to prose. His longer pieces weave tales about elaborate themes: his 1995 Age Short Story Competition winner, ‘Reply to a Letter’,explores
              the implicit bonds between a husband, a wife, and their performing bear. High concept, for the most part, takes precedent over character.
              In some of the shorter pieces, characters are barely developed at all. Even in the longer ones, it is difficult for the reader fully to
              connect with the emotional core of any of the players. Regardless, Other Stories is an excellent collection. There is much to admire here:
              lyrical, rhythmic prose melds effortlessly with Macauley’s uncanny ability to create an indelible image, and the author plays raconteur
              with great ease. The result is a thinking man’s compendium of quality literature, while the heart gets slightly short shrift."
        - title: Crikey review Other Stories Wayne Macauley
          text:
              "Elizabeth Bryer on Wayne Macauley’s Other Stories Guest reviewer: Elizabeth Bryer, Angela Meyer’s Literary Minded 2 December 2010,
              Crikey Other Stories brings together Melbourne-based Wayne Macauley’s output over the past decade and counting. The collection is filled
              with ‘other’ stories - tales that are other, or outside the mainstream, in a double sense. They are other in subject, given that they are
              stories that trace the lives of characters who exist on the margins, or characters who would be otherwise unlikely contenders for centre
              stage in Australian literature; and they are other in an industry sense, since the collection is published not by a multinational - or even
              large independent - publisher, but by small outfit Black Pepper. Many are also other-worldly stories, stories about ordinary people who
              find themselves contending with surreal experiences. Some of the collection’s tales read as allegories. Yet this age-old form is given new
              life in Macauley’s hands, and most of the allegories are firmly placed in recognisable, contemporary Australian territory: the stories are
              populated with trams, inner-city ex-bohemian suburbs, one-street towns and places where ‘houses have crept up the valley... the skeleton
              bones of the new houses marching’. Other tales develop in less familiar, though still recognisable, worlds, both in setting and content:
              ‘Jack the Dancer Dies’ has a personified death as protagonist in a poetic take on the fable ‘The Red Shoes’, while in ‘Man and Tree’ a woman’s
              brother transforms into a tree. Throughout, there is wry commentary on modern society, which makes the collection seem almost prophetic.
              For example, no sooner has a man turned into a tree than: ‘They came in their hundreds, bumping up the fire track and crashing through the
              bush. The local shire sealed the road, cleared a square of land for a car park, and began charging five dollars to see him’. In another
              story, the narrator recounts how he hires out bohemians to real-estate agents in order that ex-bohemian inner suburbs - which the bohemians
              were pushed out of - exude a measure of ‘character’ and ‘ambience’. Elsewhere, schoolboys who ride trams are set to work re-stumping houses
              in an informal labour market, until various regulations ensue and ‘records could then be matched against the previously agreed quotas and
              notices might then be placed in trams informing the public whether or not these targets had been reached’. In some of these stories-as-commentary,
              there is a Kafkaesque sense of the oppressive and ominous presence of authority and systems, such as in ‘This Bus Is Not a Tram’, in which
              buses are plastered with signs declaring that they are trams and all passengers are expected to take on this belief; or in ‘The Bridge’,
              where the protagonist dutifully carries out his superiors’ orders to guard a bridge, and throughout there is a mounting sense that the orders
              and subsequent occurrences are some kind of cruel psychological experiment. In another sharply critical tale, the excesses of political
              leaders - and their general tendency to wreak havoc - are detailed; then, in a single moment, the blame for their behaviour is squarely
              placed on the public’s shoulders, for our condoning their symbolic gestures and our apathy when it comes to considered, responsible voting.
              Meanwhile, ‘The Farmer’s New Machine’ is chilling in its portrayal of the lengths gone to in the name of progress, and in the name of supporting
              a lifestyle of excess on this driest of continents. The language that Macauley employs is usually simple, but is often used to great effect
              to create rhythmic structures. Many stories take the form of kinds of first-person testimonials, which facilitate this rhythmic style. Occasionally
              a metaphor is so arresting for its clarity of vision that it takes your breath away - for example, after a magical night, ‘something still
              lingered, some ineffable thing, like a porchlight left on all day’. At times the language is image-rich, such as in the phrase, ‘In the
              dog days of summer, when the earth rolls and sighs and a heat shimmer wobbles and distorts everything in the middle distance and beyond...’
              The only (small) reservation I had about the collection was its occasional use of place names as short cuts for establishing setting: while
              ‘Keilor Downs’ may evoke some connotations for a Melburnian, would it do the same for a reader from elsewhere? Yet, all in all, this is
              an accomplished collection from an as-yet underappreciated Australian writer who is, nevertheless, slowly, surely achieving a significant
              output, both in quantity of titles and importance and relevance of the same not only to Australian literature but also to each reader. We
              could do much worse than learn from these tales."
        - title: The Weekend Australian review Other Stories by Wayne Macauley
          text:
              "Shorts are back in James Ley (critic, member of the University of Western Sydney Writing and Society Research Group) The Weekend Australian
              , 13 November 2010 The Australian short story has been undergoing something of a renaissance in recent years. Collections such as Cate Kennedy’s
              Dark Roots , Steven Amsterdam’s Things We Didn’t See Coming , Nam Le’s The Boat , Paddy O’Reilly’s The End of the World , Bob Franklin’s
              Under Stones and Tom Cho’s Look Who’s Morphing (to name only a handful) is indicative of a renewal of interest in the form and the breadth
              of local talent. A notable feature of tins resurgence is its spirit of playfulness. These are writers unbounded by conventional notions
              of realism or literary respectability, willing to experiment with genre and incorporate fanciful or offbeat concepts into their fiction.
              The short story has seemingly provided a more amenable way for many contemporary authors to exploit the essential contingency of storytelling.
              For O’Reilly, Franklin and Cho, a robust sense of humour is an intrinsic part of this conceptual freedom. Wayne Macauley’s Other Stories
              can also be placed in this category. Macauley is a seasoned writer who has published two novels, Blueprints for a Barbed-Wire Canoe and
              Caravan Story , and has written for the theatre. Other Stories brings together short fiction written over the course of nearly two decades,
              most of which has appeared in a number of Australia’s literary journals. One of the most substantial inclusions, ‘The Bridge’, is a poised
              and darkly ironic excursion into Coetzeean allegory, but the dominant mode, and Macauley’s true métier, is a form of slyly satirical comedy.
              Each of the pieces in Other Stories is based on a quirky conceit of some kind. These are by turns strange, unreal or merely funny. Sometimes,
              as in the standout story, ‘The Man who Invented Television’, the concept is gleefully anachronistic. But each tale is crafted into a small,
              self-contained world. The stories roam widely, but many prowl the suburbs of Melbourne, where Macauley finds plenty to whet his satirical
              blade. ‘Bohemians’ is a sardonic comment on the process of inner-city gentrification; ‘Wilson’s Friends’ spins the idea of a man offering
              to buy a schoolboy with a price tag accidentally stuck to his sleeve into an amusing fable about the economics of workplace relations; ‘So
              Who’s the Wrecker Then?’, in which a politician runs amok with a bulldozer, would seem to be a not-so-veiled dig at former Victorian Premier
              Jeff Kennett. But there is a balancing warmth to Macauley’s fiction. His barbs can be pointed but his humour is generally forgiving. Other
              Stories begins with a tale in which the residents of a suburban street emerge on a mild evening to sleep under the stars and end up engaged
              in a love-in; it ends with a fine story based on the life and suicide of poet Adam Lindsay Gordon. In between, there are frequent intimations
              of the great distances that can come to exist between people: ‘The Streets are Too Wide’, which is more prose poem than story, literalises
              the figurative distance; while Macauley’s silent protester, slowly absorbed into the tree he is trying to save, presents an image of terrible
              loneliness. Yet it is the persistent and welcome note of affirmation that makes this a likable collection. In one story, a homeless man
              embarks on a cross-town odyssey, setting out on a quest (more Dorothean than Homeric) to find a place called Garden City so that he might
              ‘gather flowers for Decency’s grave’. He never gets there. He is eventually arrested while brushing his teeth with someone else’s toothbrush,
              having wandered into their house. The man is deluded, but by the end you are on his side. After all, going to such trouble to find flowers
              to put on Decency’s grave is a thoroughly decent thing to do."
        - title: The Age review Other Stories Wayne Macauley
          text:
              Other Stories Cameron Woodhead, The Age , 23 October 2010 ( The Age Pick of the Week) Author of the acclaimed novels Blueprints for
              a Barbed-Wire Canoe and Caravan Story , Wayne Macauley is a compelling voice in contemporary Australian Literature. Other Stories , a collection
              of his short fiction, showcases his willingness to see - and interrogate - aspects of Australian culture that normally pass under the radar.
              Macauley is an excellent short-fiction writer; this volume a miscellany that grabs and gnaws on absurd threads of an experimental suburban
              dreaming. In ‘Bohemians,’ a real-estate agent employs decorative street artists to stand around, altering the atmosphere of a suburb in
              which they can no longer afford to live. ‘Wilson’s Friends’ is a parable that satirises the exploitation of young labour. ‘One Night’ sees
              a cul-de-sac in Keilor Heights invaded by people who decide to sleep outside on the road. Macauley is a spry and compassionate humorist
              of the postmodern soul. In lamenting the marginalisation of art from politics, he writes it back into the picture.
        - title: Emmett Stinson Known Unknowns review Other Stories Wayne Macauley
          text:
              "Other Stories Emmett Stinson From 3RRR Breakfasters Show, 7 September 2010 (and Emmett Stinson’s blog Known Unknowns , 7 September
              2010) [From Known Unknowns 2 September 2010: This week I picked up two books that I’m very excited about. The first is Wayne Macauley’s
              Other Stories , which I’ll be reviewing next week. I loved his first two novels ( Blueprints for a Barbed-Wire Canoe and Caravan Story ),
              and this collection is even better (so far). He deserves a much wider readership, and I think he’s one of the finest writers in Australia
              right now. So buy it now! Yes, right now!] Wayne Macauley’s Other Stories collects a variety of short fiction that he has published in literary
              magazines over the last eighteen (!!!) years. Despite the work’s lengthy gestation, these stories demonstrate an impressive unity of vision,
              as well as an extraordinary—if uniquely Australian—voice. Macauley is also the author of two excellent novels, Blueprints for a Barbed-Wire
              Canoe and Caravan Story , but, as good as his novels are, Other Stories reveals that he is an even better short story writer. Macauley’s
              prose is absolutely beautiful, as the very first sentence of his collection proves: ‘In the dog days of summer, when the earth rolls and
              sighs and a heat shimmer wobbles and distorts everything in the middle distance and beyond, who has not wanted, as evening falls, to take
              their mattress and pillow outside and sleep like a well-heeled vagabond under an open sky?’ Here readers can already see Macauley’s humour,
              and how his stories twist everyday situations into strange, otherworldly experiences. In this sense, Other Stories is an appropriate title
              for this eclectic, often experimental collection, but Macauley’s rigorous innovation is always inflected with mordant satire, resulting
              in work that is both affecting and hysterically funny. Consider the story ‘Bohemians’: here, a real-estate agent in a once-hip inner-Melbourne
              suburb faces a problem; local housing prices have skyrocketed to the point where artists and intellectuals can no longer afford to live
              there. The solution, of course, is to rent bohemians from a dealer; the entire story consists of a letter written by this bohemian-dealer
              in response to the real-estate agent. Many of his stories have similarly absurdist conceits; in ‘The Man Who Invented Television’, a man
              named Henry Walter invents the television set in Melbourne in 1855, and, in an even more unlikely turn of events, his TV broadcasts current
              programs, such as The Oprah Winfrey Show. In my favourite story, ‘The Bridge’, a soldier is stranded in a remote outpost and his claustrophobic
              circumstances recall Samuel Beckett’s Waiting for Godot . And this is what is interesting about Macauley’s work: although his formal experimentation
              might bear the influence of international writers like Beckett and Kafka, his work also suggests the local inheritance of Henry Lawson and
              Peter Carey’s early short stories. And Other Stories ultimately is a book that is uniquely and particularly Australian. Not only does the
              book possess a wry, laconic tone, but also figures from Australia’s cultural history are a signal fixation in Macauley’s work: Adam Lindsay
              Gordon, the dig tree, the inland sea and Melbourne’s trams all play a key role in these stories. In this sense, Other Stories presents an
              excellent model for a truly Australian literature. While its aesthetics are influenced by the great traditions of world literature, the
              content remains recognizably Australian. Wayne Macauley should be recognized as one of Australia’s best living writers – that he isn’t is
              an indictment of Australian literary culture. This is one of the best books by an Australian I’ve read all year. Do yourself a favour and
              go buy it now."
room-for-delusion:
    title: Room for Delusion
    author: Margaret Mathews
    short_description: Told through the lens of Bronwen’s lusting for Bella, Margaret Mathews Room for Delusion
    long_description:
        "Room for Delusion Bella. Isabella Cavani. I whisper her name. It sounds like a hummingbird fleeing my mouth, and if I shout
        it, the letter ‘l’ pulses in my head and vibrates away. She’s Isabella Cavani. Bella. She’s my therapist. And I’m terrified of losing her.
        Bronwen is vulnerable. She consults psychotherapist Isabella Cavani. But who is Bella? In consultations at the well-heeled therapist’s home,
        Bronwen wonders: is she the younger version of her mother who can listen as her own mother could not? Or is she the secret woman she desires?
        Certainly Bronwen (with an ‘e’) will reveal through their sessions the shapes of her life: her parents, teenage angst, her husband, the kind
        and gentle Richard, her children and their times. An exposé of the fantasies and yearnings of a woman undergoing psychotherapy, the novel
        offers insight into the spirited but destructive Bronwen and her quest to overcome fears and obligations to an ageing, disturbed mother. Told
        through the lens of Bronwen’s lusting for Bella, Margaret Mathews Room for Delusion oozes with life. Mathews is brilliant at capturing the
        panic involved in some of our everyday acts. You will ache for the ending."
    price: 28.0
    isbn: "9781876044947"
    release_date: "2017"
    page_count: 312
    reviews:
        - title: TheAge3Nov2018
          text:
              Room For Delusion Kerryn Goldsworthy The Age / spectrum / IN SHORT FICTION, Saturday November 3, 2018 This novel is about a woman trying
              to understand her present life through the prism of her past. Heroine and narrator Bronwen seems to be having a pretty good life, with an
              affectionate and tolerant husband and some good friends and sensible children. Having first met psychotherapist Bella Cavani for couples
              counselling during a glitch in the marriage, now successfully resolved, Bronwen returns for some solitary therapy. Her relationship with
              her difficult mother — "a critical, mocking, suffocating, bossy bitch" — has always been fraught, and this is the centre around which her
              therapy revolves. Bella by contrast is sane, warm-hearted and detached, and Bronwen becomes dependent and infatuated. The story is meandering
              and drawn-out, rather like therapy itself, but told in a lively fashion and rich in sensual detail.
posing-in-vast-spaces:
    title: Posing in Vast Spaces
    author: Peter Murk
    short_description:
        As much a travelling salon as a road novel, Posing in Vast Spaces is an object lesson in the art of digression. Our narrator,
        a poet, is an aesthete. He is given to frivolity, drinking, ogling, cloudwatching, research into town bakeries and japes. His fellow traveller
        is a landscape painter, upright and dedicated to his immortal daubs. Their common companion is My Darling Chevrolet. Together they head inland
        to sing and paint the dead lakes. On the drought-stricken land the locals are resilient in their good humour. Our Dionysian and Apollonian
        heroes are like vagabond wraiths in comparison. Peter Murk’s picaresque novel is a love song to his country. He dotes on the vernacular as
        though he has discovered a lost dialect. Posing in Vast Spaces is seriously funny.
    long_description:
        Before I describe true beauty, let me describe the ashtray in front of me. A browny-red bakelite McWilliam’s Cream Sherry
        job duly embossed and shaped into the coastline of Australia. Imagine the tales and torment heard and inflicted over this common object. What
        other country would allow this? As much a travelling salon as a road novel, Posing in Vast Spaces is an object lesson in the art of digression.
        Our narrator, a poet, is an aesthete. He is given to frivolity, drinking, ogling, cloudwatching, research into town bakeries and japes. His
        fellow traveller is a landscape painter, upright and dedicated to his immortal daubs. Their common companion is My Darling Chevrolet. Together
        they head inland to sing and paint the dead lakes. On the drought-stricken land the locals are resilient in their good humour. Our Dionysian
        and Apollonian heroes are like vagabond wraiths in comparison. Peter Murk’s picaresque novel is a love song to his country. He dotes on the
        vernacular as though he has discovered a lost dialect. Posing in Vast Spaces is seriously funny.
    price: 28.95
    isbn: "9781876044572"
    release_date: "2008"
    page_count: 256
    reviews:
        - title: Kerryn Goldsworthy, The Sydney Morning Herald
          text:
              Posing in Vast Spaces PICK OF THE WEEK SYDNEY MORNING HERALD Kerryn Goldsworthy The Sydney Morning Herald , 16 August June 2008 This
              remarkable book is accurately described on the cover as a combination of travelling salon and road novel. The narrator, a poet, takes off
              on a road trip with his artist friend Matthew in a car called My Darling Chevrolet. They travel deep into the wilds of country Victoria,
              where they travel around painting, drinking, chatting up the local ladies, smoking dope and - most of all - talking. You would have to call
              this book a celebration and the two main things it’s celebrating are the country-Victorian landscape and the great joys and pleasures of
              conversation with someone you've known very well for a long time and whose mind travels along the same track as your own. Peter is a poet
              and can therefore get drunk on words as easily as on beer and the many other beverages he samples as he and Matthew trundle around the landscape
              from town to town and pub to pub; their conversations, like the narrator’s own description of the trip, are full of puns, quotations, double
              entendres and other wordplay. There are also endless allusions to culture both popular and high, a potential disadvantage since readers
              unfamiliar with them will miss all the best jokes. In this, as in its setting and its indiscriminate and unremitting mockeries, the book
              is strongly reminiscent of Jack Hibberd’s classic one-man play A Stretch Of The Imagination . The story of the road trip is told in smallish
              fragments, the smallest of which features the title ‘Nhil’ (the unfortunate name of a Victorian town) at the head of a blank space, a silly
              yet irresistible joke. It’s impossible to describe the quality of Murk’s style or to pick out an example; it needs to be read properly and
              with care. There’s a kind of tumbling ebullience and complete lack of restraint about its playfulness that some readers might find excessive
              but that others will embrace.
        - title: The Age Review
          text: Posing in Vast Spaces PICK OF THE WEEK Cameron Woodhead The Age , 21 June 2008
the-prisoner-gains-a-blurred-skin:
    title: The Prisoner Gains a Blurred Skin
    author: Nicholas Playford
    short_description:
        These stories are subtle and innovative. They are clinically satirical and have a miniaturist visual style. His Canberra,
        Melbourne and Adelaide are places we have not yet seen. The ontological flux of the everyday is suddenly revealed as overwhelmingly fantastic.
        The Prisoner Gains a Blurred Skin is the work of a rational being contending with the tumult of emotion. If his world is seen through a magnifying
        lens, that lens is also trained on us. The Prisoner Gains a Blurred Skin was the first title released by Black Pepper.
    long_description:
        Nicholas Playford - now Avatar Polymorph - is a masterful writer. His fourteen tales of the imagination, of bizarre transformations,
        are in the tradition of Poe and Borges. Fringe citizens of Australian society are revealed in ways which haunt us. His microscopic vision
        of how the senses affect his characters transforms our perception of their lives. He looked at Curtis’s face, examining the pores of his skin
        and the sliced bristles on his chin. On a scale of millimetres the phenomenal world became tangled. These stories are subtle and innovative.
        They are clinically satirical and have a miniaturist visual style. His Canberra, Melbourne and Adelaide are places we have not yet seen. The
        ontological flux of the everyday is suddenly revealed as overwhelmingly fantastic. The Prisoner Gains a Blurred Skin is the work of a rational
        being contending with the tumult of emotion. If his world is seen through a magnifying lens, that lens is also trained on us. The Prisoner
        Gains a Blurred Skin was the first title released by Black Pepper. Cover painting Spain (1950) by James Gleeson
    price: 21.95
    isbn: 187560619X
    release_date: 1994 (released 1995)
    page_count: 169
    reviews:
        - title: Brenda Walker, Australian Book Review
          text:
              "Fantastic Fictions Brenda Walker Australian Book Review , February/March 1995 Apparently Jules Renard’s final journey entry had a lasting
              influence on Samuel Beckett. In Deirdre Bair’s book on Beckett the story reads: ‘Last night I wanted to get up. Dead weight. A leg hangs
              outside. Then a trickle runs down my leg. I allow it to reach my heel before I make up my mind. It will dry in the sheets.’ The scrupulous
              notation of bodily sensation which Beckett enjoyed is also one of the unusual qualities of Nicholas Playford's first story collection,
              The Prisoner Gains a Blurred Skin . The style is less concerned with intimacy than with cumulative detail, with precision. There is often
              a scientific rather than an emotional conviction in this work, though the work does have emotional depth. Playford also has some of the
              stylistic flamboyance, the pleasure in the texture of language, which is like Beckett's early fiction, before he moved towards austerity.
              My favourite story is ‘Whale’, dominated by the great and threatened shape of a terminally ill grandfather. The grandfather is part of an
              experimental drug program. The side effects of the drug have already killed two participants. These side effects are a physical manifestation
              of the horror of ageing: primarily skeletal growth and distortion, as if the very structure of the loved body must finally grow huge and
              twist. The bulk of the dying is more than physical. The observing grandson cherishes and resents the dying man. There is tact and resilience
              in the grandson’s conclusion: ‘I looked down at the water and the wooden supports beneath the long ramp of the pier and wanted to hug him
              but could not. I clutched the tough fence.’ ‘The Birth of Stone Revealed in Vapours’ is another strong story, this time about labour, physical
              deprivation and significance. Three exhausted workers sort unidentified pellets in a shed in the Adelaide hills. They are isolated from
              the factory and the community - from the sites of production and consumption. They have no idea of the product’s function. An industrial
              accident poisons the atmosphere, which seems to liquefy, then harden into stone. Having refused an underhand rescue offer from the son of
              the factory manager the workers are enclosed in stone. The last narrator defies a final, ambiguous consolation: As the substance hardened
              I began to lose the sensation that it was pushing against me. It was as if we were floating in another dimension, bereft of all senses save
              touch and pain. I was not thirsty, and my hunger had left me. There were no disasters left and no expectations, just the stone, come from
              some reckless folly beyond our understanding. The world narrowed to the warmth of my comrades and the beat in their blood vessels, things
              without change. The irony of course is that in this atmosphere bodily warmth will change, the workers will die. Solidarity occurs in a fatal
              industrially misproduced solidity which blinds, deafens and prevents movement, indeed, workers ‘lose the sensation’ of resistance. Escaping
              with the bosses is impossible, even if workers are invited to escape, yet worker solidarity is not effectual. Several stories explore situations
              of helplessness. One of these is ‘Examining the Audacious Edifice.’ Sub-headings indicate the emotional territory: Imprisonment , Suspicion
              , Inertia , Difficulties , Apathy , Action , Future , Perplexity , Loss and Catastrophe . Each heading has a brief quotation from what I
              assume is a Tarot guide, as if to suggest the inevitability of the imprisonment etc which follows. There is an ironic play, too, between
              the fantastically exotic Tarot predictions and the more prosaic story: This crowns him; in the World, reversed, a naked woman holding two
              scrolls .floats in the sky, tresses of her long hair suspended in ignorance of gravity, surrounded by a wreath and partially hidden by an
              unfurled length of snow-coloured silk. He lay on his bed and wished that he could sleep. He liked the accommodation but was concerned that
              he was too dissimilar to the two women who lived with him. Both were office workers and less than twenty years old. Though tactically prosaic,
              the story is not uneventful. A man feels uncomfortable with his house-mates, they have little in common. Misinformed police raid the house,
              looking for narcotics. The door is smashed, possessions are exposed not only to strangers but to a fierce and authoritative dog. The tentative
              hopefulness which the character has brought to the household is fractured, there is to be no social place for him and he leaves for the
              isolation of a hostel. Like much of the writing in this collection. ‘Examining the Audacious Edifice’ is a tense, sad, powerful story. Many
              of the stories are about sexual estrangement through active betrayal, indifference or complete misunderstanding. This is where Playford’s
              precise notation of sensation is most apparent and where it most obviously contributes to the general effect of distancing and isolation.
              These narrators are not lovers, they are watchers and classifiers: I firmed my caresses, attempting to assert my socially defined masculine
              role; though not brawny she was strong, and her body stipple. I took in her scent, the celebration o f her arousal - I knew that we were
              going to have sex, and with that intimate knowledge I became conscious of my penis, a hardening tube within my underwear, minimally wider
              at its base, and touched the roughness of the brim of my tongue to hers, tasting her saliva. In another story the narrator claims that ‘The
              rush of the haptic overwhelmed me.’ There is no sense of overwhelming tactile involvement, but rather of objective notation. This estranging
              precision extends to the non-sexual. In one story the narrator clears his throat, ‘swallowing the gelled secretion of my salivary glands.’
              Here he scrutinises involuntary interior processes. The final story describes a man who is so emotionally disassociated that he abandons
              his species, becoming a bird. There is considerable diversity in these stories, yet what they have in common and what they offer the reader
              is a perception of the actively fantastic - as in the transformation of species - or the part that language can play in the edginess of
              social detachment and Cartesian internal division. There are dangers in writing about these issues, including the danger that the fantastic
              will become abstract or cryptic, and the notation of estrangement will estrange the reader. Yet social detachment and internal division
              are the issues of Beckett’s early work and it will be interesting to see where they take Nicholas Playford’s fiction."
        - title: Pamela Eade McCasker, Overland
          text:
              "Pamela Eade McCasker Overland , 140, Spring 1995 Nicholas Playford’s new collection of stories, The Prisoner Gains a Blurred Skin ,
              teases the reader with its sense of dislocation. Many more questions are asked than answers given. In ‘Encircling the Rose Garden’, a story
              written rather confrontationally in the second person, the protagonist, contemplating a rose garden while struggling to accept the cooling
              of her lover’s passion, is asked by the narrator: ‘How many thorns can you see? Thousands? The information is before you but you can’t assimilate
              it.’ The author’s writerly eye zooms in like a camera to reveal the micro world underlying the macro one: ‘The burn marks running down his
              deltoid... tell of when you ate halva together.’ These stories’ sense of physical location is as sharp as the emotional landscape they inhabit
              is foggy. In ‘Hinges’, Harry, apparently employed to renovate an old house, is actually being put to a far more sinister use. Playford further
              undermines our belief in his own vividly-drawn realities by throwing the reader off-balance with metaphysical data which makes nonsense
              of certainties. In ‘The Fragmentation of Tyres’, a spectral hitchhiker warns Emily: ‘our minds are potent, they can turn dream into bland
              reality’."
        - title: The Weekend Australian Review
          text:
              "Terry Dowling Science Fiction, The Weekend Australian , 13-14 May 1995 Another debut collection appears here, not because its 14 stories
              are patently genre (few fit the popular definition - by way of an experimental drug, mysterious stones, a suggestion of psychic vampirism,
              transformation into a bird) but because of a focus, a set of narrative modes, sensibilities, perceptual postures if you like, which, as
              in the work of Borges, David Brooks, Gerald Murnane or in J.G. Ballard’s Atrocity Exhibition , bring the reader to a shift in viewing the
              commonplace fundamental to the genre. These aren't always easy stories to enjoy, with detached delivery and often passionless accretions
              of detail: ‘Her pink tongue had been visible, the detail of its tissue like cellular stucco’ or ‘his sunburnt hands swung the dimpled steering
              wheel from side to side, its oscillations an encoded rhythm, a different map of the city.’ But when the technique works, as in the title
              story, this intense objectification - and fantastication - of context does alter ‘the nature of comprehension,’ attuning us to how we each
              put reality together for ourselves. Still, as the young handyman in ‘Hinges’ reflects, an audience is ‘a valuable thing.’ One can only wonder
              if the audience can be beguiled long enough for any of the book’s very real gifts to emerge."
        - title: Melbourne Star Observer Review
          text:
              New Fiction on the Bookshelf Marcus O’Donnell Melbourne Star Observer , 27 January 1995 From the opening tale in this impressive collection
              of stories we know to expect the unexpected; we immediately feel in the real world but slightly askew. Written in an unsettling second person
              address, like a letter from an omnipotent stranger never sent, the story charts the dissolution of Ursula’s relationship with Timothy through
              the metaphor of a garden where every rose holds a memory of their relationship. There’s a story of the menage a trois between Regina, Thomas
              and Toby where Thomas’ academic interest in terrorism imaginatively takes off. Then there’s the story of a schizophrenic cleaner who sits
              in a cupboard in total darkness for much of her day, watching bizarre and violent visions. A bungled police drug raid on a Canberra group
              household is related through the structure of a Tarot reading, playing with notions of fate, force and the violence of destiny. Playford
              has worked in both state and federal government bureaucracies, and his family is famous for its involvement in politics, perhaps as a consequence,
              his language is often that of a bureaucrat. It follows a certain precision, as if each word has been chosen and placed for its absolute
              correctness. This often works as an ironic counterplay to the surreal events described, but it can work to undermine the full emergence
              of particular characters. There is a sense in which Playford needs to become more playful and discover a range of voices to suit his range
              of characters.
        - title: The Canberra Times Review
          text:
              Paperbacks Veronica Sen The Canberra Times , 22 January 1995 Eerie and disturbing, Nicholas Playford’s The Prisoner Gains a Blurred
              Skin consists of short stories as unusual as the collection’s title. Many of them set in Canberra, they reveal characters in off-balancing
              and heightened situations, such as dealing with soul vampires, other people’s nervous breakdowns, weird physiological changes and strange
              fantasies. Playford seizes attention with his exploration of alienation and perversity and of the bizarre potential of seemingly normal
              events. Even though obsessive detail and circumlocution are often germane to the character - ‘I was unhappy with her presence in the geomorphology
              of my cerebrum’ - there is also a tendency in the stories towards stilted expression and striving too hard for effect. He is best at his
              most simple, as in a story set in the gardens of Old Parliament House.
        - title: Synapse Review
          text:
              Synapse , December 1994/January1995 One of the first publications from a new fiction imprint, Black Pepper, this collection of short
              stories is immediately striking for its cover alone. It features a painting by the great James Gleeson - visceral, Jungian, surrealist and
              haunting. The Prisoner Gains a Blurred Skin is imbued with a similar mood, of brooding and nakedness. It has several unusual features. Nearly
              all the stories are set in Canberra or Adelaide, rather than the larger metropolises. Playford takes full advantage of the physicality of
              the locations, and the works take on the quality of cinema. Interestingly, his super-realism and strong narrative drive compensate for a
              use of unsual states of mind. He makes consistent and teasing references to schizophrenia. ‘The Birth of Stone Revealed in Vapours’ deals
              with a near future in the Adelaide Hills where three women slave under an eternal summer. They flee an industrial accident which turns the
              air to sludge, to something solid, and yet they live. Playford’s concern here is not to construct an alternative world but to flesh out
              metaphors - for the migrant experience, and the commonality of human suffering. It is a rhapsody about the resilience of the human spirit
              in the face of tragedy. This collection is strong meat, and requires the reader’s attention. While the book has its share of sarcasm and
              pessimism, one is left feeling rewarded, as Playford is searching for systems of moral truth. A good start for the Black Pepper imprint.
        - title: Bloodsongs Review
          text:
              Jeff Wearne Bloodsongs , 1995 Tall and lanky, with dyed-blond hair and steel-rimmed glasses, Nicholas Playford is a familiar figure
              among the bohemians and literati that still haunt, like pale ghosts, the now yuppified pubs and cafes of Brunswick Street, Fitzroy. Intense,
              articulate and serious, 33 year old Nick discussed his first book of short stories over a beer at Rhumberallas. It is a handsome paperback,
              the first from Black Pepper, a new imprint publishing innovative Australian fiction and poetry, with a striking cover painting, the first
              of his works to be used this way, by James Gleeson, the now aging master of Australian surrealism. Nick describes his stories as ‘fantasies
              about the nature and perception of being’ that us ‘states of mind bordering on the schizophrenic to illustrate metaphorical ideas.’ His
              precise and microscopic descriptions of our constructed urban environment, with its ordered rituals and stylized sensations, reveal this
              world to be unreal and bizarre. When emotion breaks through into this rational universe it transforms and liberates. In several stories
              the ending of relationships becomes a freeing from psychic bondage, from being ‘trapped in otherness.’ The deceptively dead-pan ‘Hinges’
              is a sinister tale of psychic vampirism. 'The Fragmentation of Tyres’ is a hallucinogenic nightmare in which a woman driving from Canberra
              to Melbourne is pursued by the spectres of a lesbian hitch-hiker and a deranged motor mechanic. Another piece realtistically tells the true
              story of an unjustified police raid on a shared household. Anyone who has had this unfortunate experience, and there are quite a few of
              us, will relate to this one. Two stories stand out. In ‘Orientation of the Cinder-Track Horizon’ infidelity and sado-masochism lead to a
              revelation of love, and the title story, ‘The Prisoner Gains a Blurred Skin’ is an occult tale of transcendental mysticism, set in modern
              Canberra. J.G. Ballard is an important influence, particularly The Atrocity Exhibition and Crash expositions of the perversions and pathologies
              latent in modern life. Nick told me that Canberra, where most of his stories are set, was like a landscape straight out of a Ballard story,
              with its ‘antiseptic beauty’ and obsessively planned artificiality. To illustrate, a few story titles; ‘The Skimmer Upon the Perceptual
              Sea,’ ‘The Birth of Stone Revealed in Vapours,’ ‘Examining the Audacious Edifice.’ But if you are looking for innovative and ambitious modern
              Australian fiction, this unusual collection should satisfy.
gifts-sorrows:
    title: Gifts & Sorrows
    author: Raphaëlle Pomian
    short_description:
        French author Raphaëlle Pomian’s Gifts & Sorrows [ Don et Miseres ] is a delightful and slightly anguished collection about
        girls. Each story has as its title the name of its young hero. They are arranged in ascending order of age, so we gain the subtle impression
        of watching the general growth of a girl in France in the late 1960s. These bittersweet stories bring to life both school and home life, particularly
        the troubled relationships between the girls and their mothers and siblings. They are poignant tales to appeal to adults and adolescents.
    long_description:
        She lay down on the cold tiled floor, listening with one ear. Is there anyone? Is there anyone there? Her ear grew bigger
        and bigger. She was only a giant ear curled up on the icy floor, listening and searching for signs of human presence on the floor below. French
        author Raphaëlle Pomian’s Gifts & Sorrows [ Don et Miseres ] is a delightful and slightly anguished collection about girls. Each story has
        as its title the name of its young hero. They are arranged in ascending order of age, so we gain the subtle impression of watching the general
        growth of a girl in France in the late 1960s. These bittersweet stories bring to life both school and home life, particularly the troubled
        relationships between the girls and their mothers and siblings. They are poignant tales to appeal to adults and adolescents. Gifts & Sorrows
        , translated by the author and Graham Henderson , was written during the author’s stay in Australia. She describes that exile and the making
        of the collection in an Afterword written especially for this edition. Gifts & Sorrows has compassion and perfect formal architecture, like
        Katherine Mansfield’s stories. Graham Henderson Cover painting Nude (1960) by Charles Blackman
    price: 19.95
    isbn: "1876044047"
    release_date: "1996"
    page_count: 93
    reviews:
        - title: Barbara Oakman, Australian Book Review
          text:
              "shorts Barbara Oakman Australian Book Review , No. 188, February/March 1997 School life, parental rules, younger siblings, jealousies
              and insecurities are all parts of childhood that author Raphaëlle Pomian has vividly brought to life in this collection of six short stories.
              Gifts & Sorrows has for every story a different young girl as protagonist, each a bit older than the last. Each story is a slice of life,
              concentrating on a particular moment of aday: Val é rie waits for her mother to come home from work; Odile agonises over whether her mother
              will have a baby boy or girl; Fabienne tries in vain to keep her parents from fighting yet again. From amidst the ordinariness of these
              scenes, several disquieting themes emerge: the troubled home lives, the disturbing relationships between parent and child, the childhood
              struggle for identity. Violence, confusion and a sense of anguish are apparent in all the stories, yet Gifts & Sorrows is not a depressing
              read; each of the young heroes deal with their situations with honesty and resilience, and there are many instances of childish humour and
              imagination that give the book balance. Gifts & Sorrows is a sensitive and honest depiction of some of the more painful experiences of childhood."
        - title: Veronica Sen, The Canberra Times
          text:
              "Paperbacks Veronica Sen The Canberra Times , 8 December 1996 On a much smaller scale [than Giovanni Verga’s The Defeated ] is Raphaëlle
              Romian’s Gifts & Sorrows : sensitive stories, translated from French, about young girls confronting life. With sympathy and considerable
              insight Pomian explores the perennial need for love, sometimes denied even by parents; the fear of separation; the predicament of children
              caught in the middle of parental arguments and violence; and the frequent unreasonableness of adults who ‘have the right to do anything,
              whereas children had always the need to obey’. Though not startlingly original, her straightforward stories are well-crafted, realistic
              and sometimes heart-wrenching."
        - title: Social Alternatives Review
          text:
              Gifts & Sorrows Gloria B. Yates Social Alternatives , Vol. 17, No.3, July 1998 These six short stories really are everything the blurb
              says, and more. Though each story is named for a different girl, it is obvious that most share the same history, as Graham Henderson admits
              - ‘We gain the general impression of watching the growth of a girl in France in the late 1960s... These bittersweet tales of childhood bring
              to life the troubled relationships between the girls and their mothers and siblings.’ The stories are powerful and poignant, especially
              the central and longest, ‘Fabienne’ and the shortest and last, ‘Helene’. These are stories which demonstrate clearly that children can be
              made bitterly unhappy by quarrelling parents, the arrival of a baby brother, or by nothing much at all - a train whistling in the distance.
              But for me it was hard work reading this book. There is no balance, no gleam of humour. Although the book is called ‘Gifts and Sorrows’
              there are far more sorrows than gifts. These stories gain nothing from being put together in one book with no relief from the besieged world
              of an unhappy childhood. It is as if a modern video camera with the very finest lens has been focused on a girl, but from exactly the same
              angle every time, and the photographer refuses to budge. The book is well worth reading, but in tandem with something really funny to break
              up the sadness and despair. In my case the despair is caused by the fact that Raphaelle Pomian deals with truth - isn’t it bad enough that
              children are starving, abused, exploited, enslaved all over the planet - what can we say when a girl hates soup and the skim on heated milk
              and is made to eat it, what kind of tragedy is this? Yet I know very well from my own sisters that forcing a child to eat what she loathes
              can warp a life, even when this is not a parental policy but inflicted by an outsider for a matter of three weeks. So I don’t dispute the
              mastery of Pomian’s stories or their strength. The translation is very good too.
the-invention-of-everyday-life:
    title: The Invention of Everyday Life
    author: Nicolette Stasko
    short_description:
        "The Invention of Everyday Life is a sparkling novel of observation. There is no central character and barely any speech
        or dialogue. It is a group portrait with persons, locales, fruits, creatures, vegetations and sand. We meet Mrs Caminiti the only female butcher,
        the photographer dreaming of a lost Prague, the six year old prodigy who speaks solely in mathematical formulae, Zoltan Blum the sad drycleaner,
        Ivanka a young girl fascinated by the lives of the saints. The canvas shifts through the ravages of time in human life and its environs. The
        Invention of Everyday Life reveals a community: unpretentious, tinged with sadness and Stasko’s great feel for beauty in the natural world.
        It inveigles us like a Cup-goer’s fascinator. It dazzles because it floodlights the ordinary."
    long_description:
        "The eyes of Dr Bob Wood are two metres high and follow you wherever you walk in the main street of Dockside. The Invention
        of Everyday Life is a sparkling novel of observation. There is no central character and barely any speech or dialogue. It is a group portrait
        with persons, locales, fruits, creatures, vegetations and sand. We meet Mrs Caminiti the only female butcher, the photographer dreaming of
        a lost Prague, the six year old prodigy who speaks solely in mathematical formulae, Zoltan Blum the sad drycleaner, Ivanka a young girl fascinated
        by the lives of the saints. The canvas shifts through the ravages of time in human life and its environs. The Invention of Everyday Life reveals
        a community: unpretentious, tinged with sadness and Stasko’s great feel for beauty in the natural world. It inveigles us like a Cup-goer’s
        fascinator. It dazzles because it floodlights the ordinary. Her control, both emotional and poetic, is awesome... a triumph of critical and
        creative distance from the autobiographical self. Don Anderson, The Sydney Morning Herald"
    price: 25.95
    isbn: "9781876044565"
    release_date: "2007"
    page_count: 184
    reviews:
        - title: Stella Clarke, The Australian
          text:
              "Mundane Ascends to Poetic Perfection The Invention of Everyday Life Stella Clarke The Australian , 19 July 2008 Despite appearances,
              poets have scored from Sydney writer Nicolette Stasko’s defection into prose fiction. So have readers. Stasko has published several critically
              acclaimed volumes of poems since her 1992 award-winning collection, Abundance . Contemporary poets often feel relegated to a struggling
              niche market: their works languish in an arcane zone, the haunt of small publishers and literary magazines, excess to the concerns of the
              common reader. This is a pity for Stasko’s beautiful writing, since she celebrates precisely what is common; she finds ecstasy in the familiar.
              In The Invention of Everyday Life , she shifts her perceptions into prose and manages to achieve an even more candid celebration of the
              prosaic. She also pulls prose back towards poetry, covers the rift between them and extends the possibilities of prose. Stasko is a poet
              of the mundane in the same way as Jan Vermeer was a painter of domesticity. She meets 19th-century painter Jean-Francois Millet’s definition
              of art, imbuing the commonplace with the feeling of the sublime. Though her sensibility is often redolent of artistic tradition, her stylistic
              achievements are contemporary. The refreshing of perception was a founding tenet of modernist art, and this is also a mark of her success.
              Yet Stasko’s revelations are managed with subtlety; she startles without strain or affectation. Hers is a calm intervention in the quotidian,
              a strangely peaceful awakening. The contents of the book read like a volume of poetry, but The Invention of Everyday Life is an inventory
              of prose fragments. It seems to turn on meanings from the root word, invent, asserting the artist’s impulse not only to create but also,
              more humbly, to record. It is a collage of observations made from a flaneur-like perspective. Small, evanescent pieces of lives gesture
              at the submerged complexity of existence in the fictional town of Dockside, and at the water’s edge of Half Moon Bay. The novella opens
              by mapping the geography of Dockside, a peninsula split by a busy road, an axis of noise and pounding onrush. The highway is briefly intersected
              by the flight of a spur-winged plover, which models Stasko’s informing inspiration. Everyday life is reinvented in the idea that every country,
              city and suburb is laced with unmapped, domestic, human, non-human and elemental geographies and topographies. The poet invites us to note
              the most transient signs of life, of unseen tracks and working. Many and various citizens of Dockside, with their private concerns, move
              temporarily into and out of focus: a butcher, a dry-cleaner, a photographer, an old Greek housewife, a man with no memory, a mother, a dying
              girl. Not far away tiny, diaphanous sea creatures drift, ants travel through dirt and birds make journeys. People cook, rest, love, hope,
              wait, dream, breastfeed, grow old, or fill their homes with shells from the bay. In ‘Interior with Eggplants,’ there is a tableau that recalls
              Henri Matisse’s Still Life with Sleeping Woman : a woman slumps on her kitchen table, saddened and exhausted by the vegetables’ perfection.
              Small things are cherished, seeds are planted. Stasko records such things as light and shade on eggshell or wood, the texture of wrapped
              soap. Tellingly, a solitary novelist wonders how he might escape the constraints of plot and write about happiness and ordinary things.
              These fragments are not poems. Words are stilled into units of logic, into sentences, rather than allowed to float and turn in space, shooting
              out semiotic impulses like slivers of light. They are not corralled into narrative, however, but work like poems, inviting contemplation,
              generating their own significance. Stasko’s Dockside is like the central London of Virginia Woolf ’ s Mrs Dalloway , a net holding myriad
              private moments. At one point in Woolf’s novel, an aeroplane unites the attentions of unconnected characters when it bursts from clouds
              above the metropolis. Consciously or not, this is echoed in Stasko’s Half Moon Bay. Here, however, few stop to look up when a plane passes
              overhead, though the saw and roar of the engines is deafening. For Stasko, it seems, it is not social convention that weighs oppressively
              on the delicate webbing of private experience (as it was for Woolf), but the relentless, blunting mechanical clamour of urban existence.
              Stasko demonstrates an ego-shucking shift. Readers can do more than survive without story and character; they can thrive. As a poet, she
              makes a refreshingly unconventional novelist. Hers is not an anthropocentric vision and, goodness knows, ecologically speaking, it’s time
              to get away from that. She once wrote a nonfiction study of lives of oysters; here, jellyfish multiply and drift amid pollution and plastic
              bags, water-birds continue their delicate choreography. Exquisite natural miracles emerge despite the barrage of commerce and brutal roar
              of traffic on Dockside’s central highway that bookends the novella. Vegetation and fecundity adorn Stasko’s inventory. She was born in the
              US, the daughter of Polish and Hungarian immigrants. She migrated to Australia, settling for a while in different cities. She is familiar
              with displacement. Her treatment of garden food feels like an extension of roots. Her vision is civilised and culturally rhizomic. The growing
              of zucchini and asparagus in Dockside serves an almost atavistic purpose. There is a bottling of sun-fed fruits. Preparations for winter
              include making salsa pomodoro, salting chillies and covering artichokes. Basil makes a meticulous transit from garden to pesto; all this
              in the shadow of massive semitrailers pulling into petrol stations. Her melodic focus on herbs, preserves and shaded, sacred interiors feels
              like an archaic European idyll, smuggled in as an antidote to asphalt and cacophonous trucking. The music of The Invention of Everyday Life
              lies in this perverse retrieval of numinous domestic minutiae from the indifferent, rapacious jaws of today. Despite our mania for more
              and faster cars and roads, in this respect we may have peaked. We possibly face a fuel-starved future, where we may be forced to pull over
              and watch the tumbleweed. Viewed within that frame, Stasko’s slow poetics are an early liberation and a preparation. In any case, her invention
              of everyday life is as graceful and compelling as Woolf’s early 20th-century experiment with consciousness."
        - title: Cameron Woodhead, The Age
          text:
              "The Invention of Everyday Life PICK OF THE WEEK Cameron Woodhead The Age , 20 October 2007 Not far into her debut novel, you can tell
              Nicolette Stasko is a poet of some calibre. The Invention of Everyday Life has none of the characteristics of a traditional novel. There’s
              no central character, the dialogue is sparse. Rather, like the sea that frames it, this is an immersing fiction that ebbs and surges through
              a community of characters. Stasko has a gift for imbuing ordinary lives with compelling strangeness: there’s a female butcher, a young maths
              prodigy, a girl fascinated by the lives of the saints. The novel, if that’s what it is, flits between them at tangents, held together by
              arresting natural imagery and, more generally, prose that is cadenced and lyrical, yet flensed of the pretension that sometimes accompanies
              those qualities. For all its dream-like fluidity, there are islands in Stasko’s book that create a starkly familiar sense of place."
        - title: Dominique Wilson, Wet Ink
          text:
              "The Invention of Everyday Life Dominique Wilson Wet Ink , Issue 10, Autumn 2008 In New notes on E. Poe [1859], Baudelaire wrote: ‘An
              artist is an artist only because of his exquisite sense of beauty, a sense which shows him intoxicating pleasures, but which at the same
              time implies and contains an equally exquisite sense of all deformities and all disproportions! Baudelaire could have been writing about
              Stasko. Set in the township of Dockside on Half Moon Bay, The Invention of Everyday Life transcends the geographical, creating instead distinct
              canvases where the ordinary becomes extraordinary. There are no central characters, no plot as such, and only minimal dialogue. Rather there
              are scenes - sketches - as if the reader has meandered, at random and unseen, into houses, shops, along the seawall and through streets
              and alleys: Six pelicans fly slowly in circles high above Half Moon Bay. On Garfield Street a barber in his tiny shop carefully sweeps up
              the hair of his last customer in anticipation of the next. Three blocks away a large ginger cat cleans itself on the sunny ledge of a brick
              wall, wary of the dog sleeping next door. On the shelves of the supermarket, packets of flour wait to become new bread. Stasko’s images
              border on the mundane, yet display an acute understanding of human condition - in their very simplicity, the inhabitants of Dockside become
              intriguing: Elini, who sleeps naked on hot afternoons dreaming of her death, old Gladys Johnson, who considers encroaching blindness almost
              a blessing, and Ivanka, whose death brings a wave of fanaticism sweeping over the parish. Some characters appear but once, others reappear,
              interact, or simply themselves become the observers. Although this is Stasko’s first fiction, she has published a number of collections
              of poetry, winning the Anne Elder Award, and being short-listed for the New South Wales Premier’s Prize, the Dame Mary Gilmore Award and
              the National Book Awards. Her understanding of the form is revealed in her controlled, unpretentious prose, which nevertheless reflects
              a keen eye and finely tuned sense of beauty: ‘Slowly turning as if alive, bottles idle in the shallows - fat green or brown blowfish dancing
              on their tails’. You don’t read The Invention of Everyday Life - you experience it, one exquisite moment at a time."
        - title: Cordite Review
          text:
              "Between Virtue and Innocence (excerpt) On prose poetry, tableau and imagistic fiction Adam Geczy (artist and poet) Cordite, No. 6 and
              No. 7, 2000 “Its art is not only in what is observed but the skill with which the entire book is assembled, like installing a large photographic
              suite in a difficult, demanding, at times inhospitable exhibition space.” On The Invention of Everyday Life ...Why there is such a dearth
              of support for prose poems, poetic fragments and tableau fiction in Australia is perhaps best approached with a statement about the beginnings
              of visual art in this country. Bernard Smith opens the first major study of Australian art, Place, Taste and Tradition , with ‘In older
              countries art has usually been, at its beginnings, the handmaiden of religion, but in Australia it first waited upon science’. An analogous
              observation might be made of Australian writing. It is remarkable that our earliest poetry is dominated by narrative verse with a strong
              leaning toward quickly cultivating a folkloric tradition. Romanticism had made of folklore artistic content as the Graeco-Roman myths; by
              appealing to local lore, the poet was able to stress his tie with his immediate place, and the continuity of his voice to that of the many,
              which folklore, as an inheritance of illiterate groups, enshrined. Hence, with the aim of fostering a language which could be shared, epic
              and lyric on one hand, the radicality of prosodic poetry on the other hand, had no place. And it is only in the last twenty or so years
              that the greater urbanised reading public do not feel the same urgency as before in having to read about the country which it does not and
              is indeed disinclined to inhabit. Nevertheless the comfort of reading about one’s place - instating a history and making up for lost time,
              has left a vast hole in Australia’s artistic habits which are loath to nurture this form except in literary journals and quarterlies. For
              the genre of the fragment is not necessarily experimental in the use of the term to mean opaque writing for specialists, though it is branded
              as such, despite the continental tradition of this approach and continued use of this form by eminent exponents such as Deguy and Ashbery,
              and by many younger poets in Germany where formal lines are increasingly, as Baudelaire had wished, suppler. I will end with a recent work
              by Nicolette Stasko who, with David Brooks and Gail Jones, is among the leaders of this form in Australia. In all three writers the debt
              to Continental Romanticism leading up to Symbolism is well evident. All have a strong tendency toward the visual and in some cases, the
              oneiric, yet there is a notable development in the visual referent for all three writers in that, while all three appear to be deeply moved
              and influenced by all forms of painting as well as the decorative arts, there is now the overwhelming presence of photography, as if they
              had kept the form and genre up-to-date since the end of the nineteenth century. It is a presence ubiquitous not exclusive to this form:
              John Ashbery’s extraordinary Three Poems are more like poetico-philosophic ruminations, fluctuating between declamation and mellifluous
              inner mumbling, and Deguy works more with the tension between the concrete force of words and sounds and their meaning as the successor
              to the examples of Mallarme, Jacob and Apollinaire. Contrastingly, once the cover of Stasko’s most recent book, The Invention of Everyday
              Life is closed, and one looks up from the words, one feels as if one has just ‘read’ a photo-essay. It is a Spleen de Paris but anonymously
              suburban and without the spleen. It is a prose composition of a female flaneur (though her protagonist is in fact male) in what could be
              any Australian city, and her mundane - prosaic - observations are about whatever one goes about in living; living at its most elementary:
              walking, shopping, staring out the window, passing people on a bench; what occurs when one passes someone more than once, and so on. Its
              art is not only in what is observed but the skill with which the entire book is assembled, like installing a large photographic suite in
              a difficult, demanding, at times inhospitable exhibition space. The preface bears this out. It tells of a mildly strange and solitary woman
              photographer. It is as if the author’s verbal visions are what is lasting of what the author herself saw as lasting, the eccentric photographer’s
              pictures, plastered randomly in the dusty window of her ‘modest studio’. The author/narrator is ‘intrigued’ and follows her, first unobtrusively
              then to encounter friendship. He is given a keepsake before her death. Shortly afterward the narrator convinces the photographer’s sister,
              arguing to her that they will only sit around and deteriorate, to surrender the copious, disordered remainder of the photographs - ‘It was
              difficult to believe that anyone could have produced an enormous quantity of work that, from what I could tell, nobody had ever seen.’ The
              reader of course never sees them and the author professes to inhabit them, colonising them verbally, travelling through them as a guide
              and the fragmentary character of the rest is revealed to any sensitive reader: The narrative, if it can be called that, better a constellation
              or archipelago, describes a double search. The first, the narrator’s self-assertion within a sphere of existence which is largely inconsequential;
              the other a hypothetical tracery of hunches and suppositions based on a medium which is of her own; to make relevant, to consummate perhaps,
              the images which would have been discarded or would have moulded away, or if preserved, whose meanings would have dissipated as all precise
              meanings do. Stasko’s narrator’s effort of twofold restitution does not, she/he knows, restore anything. The success of the book is, paradoxically,
              to register the opposite. Exploring the small moments through and between these photographs, as he jitters between a morass of partial records,
              petrified moments, the minor and paltry deaths which are photographs, the narrator intercalates into them his own transient (verbal) records
              only to confirm - despite this twofold gesture of preservation - that there is still alienating chaos in the midst of order-making art.
              Art may be order prized from chaos - maybe. The terse and nimble violence of the fragment is a concession to the order which art must have
              but, by ripping it slightly apart, it leaves room for instability and with it, a dangerous liveliness. Samples from The Invention of Everyday
              Life by Nicolette Stasko “ A Plot The novelist is feeling pleased. Having altered somewhat its original emphasis, his novel is going well
              for a change. It is now mainly about a young woman who becomes a recluse after her lover kills himself in her beauty salon because she wants
              to break off their seven-year relationship. In fact the young man is only seriously wounded and in critical condition for a while, but eventually
              recovers. It is the well-known heart surgeon who is going to operate who is the one actually shot and killed, in a suburb not far away.
              A different surgeon, soon to be equally famous, performs the successful operation. The young man’s family, having never liked his girlfriend,
              have ‘a change of heart’, so to speak, and relent in their opposition to the marriage. Long, emotional discussions follow between the mothers,
              apologies, gifts are exchanged. The engagement is announced and a trousseau planned. The Castel d’Oro is booked for the reception. Soon
              a little van with tablecloths and bed linen piled in the back begins to appear weekly in front of the young woman’s mother’s house. There
              is an engagement party with truckloads of food and drink and a bazoukia band so loud that the police are called by a distant neighbour who
              must not know the situation. At the wedding the bridesmaids will all wear pale blue and the groom will wear a red carnation like a bullet
              hole over his heart.” “ Portrait of Vincenzo d’Orti Vincenzo d’Orti is a man who smells. Day in, day out, waking or sleeping his nostrils
              register the world and convey it to his simple brain. Like many, Vincenzo moves between thinking his life a torment and thinking it a joy.
              Outside his house grows a mean, gnarled lemon tree—unusual, because lemons grow well in Half Moon Bay. The fruit is a dirty yellow colour,
              not much larger than golf balls and just as hard. There are almost no leaves. While Vincenzo’s wife complains bitterly about the lemons,
              he is grateful that there is one less smell to torment or gladden him. Spring is always the worst. The first delivery of mangoes, as the
              truck rolls down the highway from Queensland—the smell reaching him from as far away as Werris Creek—soon mingles with the tomatoes and
              flowers and onions in the huge produce market in the centre of the city, a terrible cacophony of odours! Rotten fruit, rat filth, chickens.
              Vincenzo often joins his neighbours on the surgery porch hoping for some relief, not unlike that prescribed for hay fever. But aside from
              breathing continually through his mouth, which of course cannot be healthy, swathing his nostrils in scented cloths, or wearing an oxygen
              mask, there is nothing that can be done for him. And he suffers.”"
        - title: Canberra Times Review
          text:
              "Ebb and flow of everday life made new Emily Maguire (author) The Canberra Times , 8 December 2007 Reading a metafictional novel can
              be like working at a cryptic crossword. The cheeky winks and word play are good fun but in the end it’s all just so much diversion. At their
              best, however, such novels work to expand our understanding... Acclaimed poet Nicolette Stasko’s The Invention of Everyday Life could be
              read as an answer to Macauley’s questions [see review of Wayne Macauley ’ s Caravan Story , Canberra Times , 8 December 2007]. The point
              of literature, one feels after reading this hypnotically lovely book, is not to impart information - something of which we already have
              so much - but to discover new truths about familiar things. Billed by the publisher as a novel, The Invention of Everyday Life is so different
              in form and content to most of its category that it could reasonably be called an anti-novel. There are characters but no protagonist. Things
              happen but there is no plot. The setting is vividly described, but this is not a book about a specific place. What we have are glimpses
              of lives and experiences presented without an authorial or narrative filter to tell us what to think of it all. There is one small, classically
              metafictional touch: a novelist ‘wonders why it is so difficult to write about happiness, the ordinary things’. He wishes there was a way
              to fit into his novel ‘the people who pass by - the dogwalkers and runners, old men and children, benchsitters and birdfeeders’ but, tellingly,
              ‘the plot will not let him’. Stasko, unlike her fictional novelist, chooses the passers-by and the ordinary things over the plot. The book
              is made up of scores of vignettes and sketches, each lasting fewer than two pages, many focused on the natural or man-made features of the
              town rather than human action. All describe the stuff of everyday life in an extraordinary way. ‘Shoes’, for example, is a contemplation
              of the origin and meaning of ‘two bags full of men’s shoes - hot old or throwaway but quite respectably heeled and soled’ found on a park
              bench. ‘Knitting’ shows us an old disabled woman who thinks of how her ‘feet, horny and gristled as salt. meat, rubbed together in clean
              starched sheets with a papery sound, are still capable of making her sigh in the bed at night’. The many small moments of wonder and beauty,
              the glancing portraits of individuals, the haunting moments of lonely contemplation, have an accumulative effect on the reader. Rather than
              following one or two characters on a specific journey, as in more traditionally structured fictions, the reader is drawn into the ebb and
              flow of an ordinary, community. We may think this town and its inhabitants are familiar, but Stasko’s tiny, perfect revelations make us
              view them - and therefore ourselves - anew."
the-set-up:
    title: The Set-Up
    author: John Vasilakakos
    short_description:
        It is 1978. This is the Sydney that refuses to know, Australia refuses to know. Lakis is caught up in the notorious Social
        Security Greek Prosecutions Scandal. John Vasilakakos’ remarkable novel takes us into that nightmare. The Set-Up is a psychological thriller
        that questions the assumptions of the migrant experience. It is like Peter Corris re-imagined by Kafka.
    long_description:
        If things were different, today too, Saturday, 25 March, celebrating the Annunciation, Lakis would wake up at 6.30 in the
        morning... But things are not different. Lakis is under surveillance. Who is the Other, a fellow patient in his doctor’s waiting room? What
        is the secret meaning of his impossibly long surname? What will the Boss, his interrogators, psychologists and theologians make of Lakis’
        underlinings in a magazine article on the insurance of Cheryl Ladd’s breasts? How will it effect his worker’s compensation claim? Who does
        the misprint in that article condemn? It is 1978. This is the Sydney that refuses to know, Australia refuses to know. Lakis is caught up in
        the notorious Social Security Greek Prosecutions Scandal. John Vasilakakos’ remarkable novel takes us into that nightmare. The Set-Up is a
        psychological thriller that questions the assumptions of the migrant experience. It is like Peter Corris re-imagined by Kafka. The Set-Up
        has the potential to become to Australian literature what J’Accuse is to French or 1984 to English writing. Philip Grundy Cover painting Colossal
        Boy by John Baird
    price: 19.95
    isbn: "1876044071"
    release_date: "1996"
    page_count: 173
    reviews:
        - title: Marion Joy Hulme, Social Alternatives
          text:
              "The Set-Up Marion Joy Hulme Social Alternatives , Vol. 17, No. 2, April 1998 Vasilakakos’ novel is set in 1978 when suspicion and intrigue
              were rife in Australia. This was the time of the infamous Social Security Greek Prosecutions Scandal. The scandal saw hundreds of Greek
              immigrants accused of illegally receiving invalid pensions and sickness benefits. Fuelled by speculation of fraud and opportunism, the department
              of Social Security set about proving that Greek migrants had an organised crime syndicate bent on taking advantage of Australia’s social
              welfare system. The department’s ‘conspiracy theory’ was thrown out of court, millions of dollars were lost and many lives were altered
              forever. The Set-Up is a story about one of those lives. Lakis Papahadjimanolakopoulos is sent on a nightmare journey through an unknown
              labyrinth. He is arrested on conspiracy charges while preparing to be reunited with his wife and son in Greece. Lakis wants to leave Australia,
              a land that had initially promised him hope, because he cannot find his place here. He feels suffocated and believes that ‘in this country
              you don’t live, you merely exist... I’ve been transplanted into the wrong type of soil. No matter how much I’m watered, I don’t grow’ (pg.
              69). The department has no compassion or understanding for Lakis’ plight, instead he is blamed for his own problems and put through humiliating
              and dehumanising rituals that serve to confuse and destabilise him. By blaming poverty on the poor, helplessness on the helpless and madness
              on the mad, the DSS creates for itself an inescapable, ever-expanding and interconnecting puzzle. All through the story the reader must
              navigate a system of messages that never clearly lead to the book’s true meaning. Reading this story is like taking a hallucinogen, things
              come at you from out of nowhere, you never know if what you see [read] is real, and it is difficult to centre yourself. Lakis is incarcerated
              in hospital. He is told he has a brain tumour. The hospital is itself a network of passageways, doors and stairwells. His orientation is
              challenged, his feeling of place is clouded, Lakis is in a void, people he has seen in his doctor’s waiting room appear around him, he feels
              his sanity come and go and does not know who to trust. It is never clear whether his condition is madness or drug induced. Is this a ploy
              by the author to confuse the reader, putting him/her in the same position as the unfortunate Lakis? This confusion is reflected through
              his thought processes and experiences. During his time in hospital Lakis is beset by an alarming array of contradicting situations and suspicious
              people. Sharing his underground room with a questionable character puts Lakis on guard. He contemplates the ‘Other’, his room mate: Looking
              now at the flowers, now at the Other out of the comer of my eye, I was trying to make out what sort of a person this man was, to guess his
              character. ‘He’s either great at pretending or very naive,’ I thought, without believing the latter too much. Besides, he didn’t look naive.
              ‘He’s playing the innocent, he’s playing this part as naturally as can be. Here he is now, telling me about the shower to cover up what
              he’s really up to, to draw information from me surreptitiously, as if I don’t know where it’s at...’ (pg. 61) He suspects that all is not
              what it seems. He does not understand what is happening to him. The more he tries to understand his situation, the more confused he becomes.
              Unfortunately this is the position of the reader. There is no dramatic irony here, the reader is left, like Lakis, to navigate the labyrinth
              alone. The DSS sets about trying to prove his guilt through a series of interviews, but are hindered by his madness, the very condition
              under which he is eligible for government assistance in the first place. The benign brain tumour causing Lakis’ condition is never fully
              revealed by the author. Does Lakis really have a tumour? Is he under the influence of drugs? Is the department deliberately manipulating
              him? Is the author deliberately manipulating the reader? The confusion experienced by Lakis is reflected throughout the prose, forging a
              psychological and political web. The Set-Up portrays an elaborate and extravagant array of tests and misguided psychological analysis used
              to gather evidence. This evidence does nothing to confirm the department’s theory, because a conspiracy does not exist. Investigators grasp
              anything that may vaguely incriminate Lakis, including making analysis of his social habits, speech, and idle drawings on a magazine page.
              Even Lakis’ name is enough to make him a suspect, with a surname like Papahadjimanolakopoulos the department ‘can imagine how many alternative
              surnames or variations he may use officially or unofficially every time he comes in contact with and has dealings with the Australian bureaucracy
              and law, [such] names make it easy for him to slither and slide away like a snake’ (pg. 25). The DSS is the dark force in this novel, using
              character assassination, intimidation and dehumanisation to trap the alleged frauds. However, the ‘mad’ Lakis seems the most sane person
              among the delirious and suspicious arbitrators of the social security system trying to prove his guilt. We are taken through the confused
              states experienced by Lakis and left where we started, in Lakis’ mind. There is no plot to this story, just a puzzle of experiences and
              imaginings. A work of fiction, The Set Up is an eerie echo of the increasingly racist climate immigrants fear in Australia today. Immigration
              is being blamed, by some, for the majority of Australia’s ills; ranging from high unemployment to decay in Christian morals. Although set
              in 1978, Vasilakakos’ story was actually written in 1987 and translated from the Greek (by Mary Mylonas) in 1996. Eighteen years after its
              actual timeframe, and nine years after its penning, Lakis Papahadjimanolakopoulos’ story could well be written according to the theories
              of our most infamous politicians today in 1997. The Set-Up shows what can happen when deranged ideas are left unchecked until it is too
              late."
        - title: Australian Book Review Reviw
          text:
              shorts The Set Up Lisa Kerrigan Australian Book Review , No. 190, May 1997 Michel de Certeau identifies practices taken up by those
              outside the institutions of power as ‘tactical processes’. These tactics arc unintentional and quotidian but still effective and, in a wonderful
              moment, Vasilakakos gives us Lakis Papahadjimanolakopoulos, a Greek migrant who is being investigated by a xenophobic government department.
              They become lost, give up straight after Pap, surrendering and saying ‘that’s enough’ finishing off with the abbreviation etc. And this
              is exactly what this cunning Greek exploits; his difficult surname... [E]very time he comes in contact... with the Australian bureaucracy...
              [his] name makes it easy for him to slither and slide away like a snake. And Papahadjimanolakopoulos needs any small break he can get. Without
              any hard evidence the department convicts him, in absentia, on the opinion of various ‘experts’ who testify to Lakis’ membership in The
              Set Up, a group that the department paranoiacally believe exists solely of Greek migrants rorting the system. Their ‘evidence’ consists
              of an analysis of several words underlined in a Greek tabloid that Lakis was ‘caught’ reading and an analysis of the articles themselves.
              In pre-Hanson, pre-Howard times, the assumptions that these ‘experts’ make about the character, motivation and toilet habits of the accused
              might have been slightly comic. Now they just seem frightening. Vasilakakos has fashioned an inventive novel using multi-layered texts to
              talk about the migrant experience and the ways in which he/she is often caught in the Kafkaesque nightmare of bureaucratic mentality. There’s
              just too much going on in this novel to cover in one short review. Anyone interested in fiction, multiculturalism, or postmodern narrative
              techniques should buy the book and find out for themselves.
        - title: George Kehagioclou, Outrider
          text:
              "A Roman A Clef Greek-Australian Fiction A Year of Australian Writing [Review of the Greek language version of The Set-Up ] George Kehagioclou
              (academic, Greece) Outrider , 1990 The Set-Up [This novel was first published in Greek as To Kolpo (which literally means ‘The Trick’) by
              Elikia Books, Melbourne, 1987. This publication was a literary event as it attracted unusual publicity from the mass media of Australia
              and Greece. To complete the writing of this novel, the author received a General Writing Grant from the Literature Board of the Australia
              Council in 1984. The English translation of this novel will be published in Australia in 1990.], a novel, is John Vasilakakos’ seventh work
              of fiction, since 1973, and number four among his recent literary output which has migration aspects as its thematic core. [John Vasilakakos’
              other works to date are: Adumbrations of the World (short stories, Petranis Press, Melbourne, 1973), The Shipwreck of the S.O.S. (novel,
              Serios, Athens, 1974), The Identity (play, Gutenberg, Athens, 1982), According to St. John (novel, Gutenberg, Athens, 1985), Psychology
              of a Greek Migrant (prose, Gutenberg, Athens, 1985), Profile of Tyranny (prose, published in the same volume of the English translation
              of The Shipwreck of the S.O.S. by Dezsery Publications, Adelaide, 1985), Attention: Fragile! (play, staged in Melbourne in 1985, unpublished).
              As well as the above works, John Vasilakakos has also published a collection of essays entitled Studies in Modern Greek Literature (criticism,
              Gutenberg, Athens, 1980) and numerous articles on literary, translating and cultural issues in Australia, America and Greece.] It is not
              by accident that John Vasilakakos, a noted and prolific writer of the Greek-speaking world, living in Australia for some time now (and established
              as a writer mainly after his first play The Identity , first staged in Melbourne in 1980 and published in Athens in 1982 by ‘Gutenberg’,
              became a theatrical and publishing success and was acclaimed by critics as ‘a classical work of migrant literature’), [Of the numerous reviews
              published on The Identity , the most important are those of Con Castan, AUMLA , No. 59, 1983, pgs 16-18 and Australasian Drama Studies ,
              No. 10, 1987, C. Yiamiadakis, Antipodes , Vol. 9, No. 14, 1982, pgs 27-28, P. Bien, Manual to The Identity , Melbourne, 1988, Tachydromos,
              Athens, 22 October 1981, The Greek Times , Melbourne, 30 April 1981, and S. Walls, The Weekend Australian , 18 December 1982.] deals with
              issues arising out of the migration experience. His latest novel, The Set-Up is the most recent and greatest achievement of this fruitful
              and remarkable literary career. [When an excerpt of The Set-Up was included in the bilingual (English-Greek) edition of Reflections - Selected
              Works from Greek-Australian Literature , Elikia Books, Melbourne, 1988, it was highly acclaimed in The Herald (‘Exiles in Residence’, by
              K. Kizilos, 22 July 1988), The Sydney Morning Herald (‘A Sunbaked Heritage’, by D. Johnson, 3 September 1988) and other newspapers and periodicals.
              (See also B. Farmer’s review ‘The ABA of Greek Literature’ in The Age , 8 October 1988).] The story of The Set-Up revolves around the life
              and adventures of Lakis, a Greek migrant in Australia, who is the protagonist of the story, and has been inspired by an earlier, actual
              event in Australia, the well-known ‘Social Security Conspiracy Case’ or ‘The Greek Prosecutions Scandal’. [See The Age , 19, 20 and 21 July
              1982.] After great hardships, Lakis, who has lived alone for the last four years and has become a nervous wreck, succeeds in obtaining an
              invalid pension. His psychiatrist advises him to return to Greece and be reunited with his family, which has left Australia and is now awaiting
              him. With the approval of his invalid pension, Lakis prepares to return to his home country. But before he can leave, he is arrested in
              his psychiatrist’s rooms on conspiracy charges. He is accused of being a member of the ‘Kolpo’, an allegedly Mafia-style gang which, using
              unorthodox means (bribes, false certificates and fraud) attempts to cheat financially the Australian Department of Social Security. This
              is the first ‘Kolpo’, that of the supposed defrauders. The Government, believing it can dismantle the network of the ‘Kolpo’ and save millions
              of dollars in pensions and allowances, unleashes a relentless prosecution against the Greeks it considers under suspicion by implementing
              at the same time a ‘Kolpo’ of its own, in order to fight that of the opponent. It assigns to a Greek agent the role of pretending to be
              in the same plight with Lakis, in order to pump Lakis during the time they are held in the same psychiatric ward and are watched through
              electronic devices. Eventually despite all the devices the mighty government machinery employs, it fails to locate the evidence it seeks
              and is forced to fabricate it. Lakis is questioned mercilessly and put in a psychiatric hospital where he is subjected to the trial of a
              relentless war of nerves. Finally he escapes. Realizing, however, that all links are broken and that the return to his homeland is no longer
              possible, he chooses to commit suicide by inhaling insecticide, as a protest and as the only way of escaping from his hell. The novel is
              complex, ambitious and demanding on the reader. The non-linear structure of narration demands that the reader exert some effort if he is
              to follow the development of the events of the plot. Right up to the end the writer deliberately insists on employing puzzling but well-aimed
              allusions in relation to the outcome of the plot. Thus, although the final paragraph of the novel does not leave any doubts as to the final
              exit of the protagonist, the questions about his innocence or guilt, his mental state etc., continue till the end to puzzle the reader.
              An example (pg. 144): But perhaps I should get on with it. The truth - the bare truth - was that I did not simply feel guilty. I was guilty.
              Lately I was becoming more and more convinced of my guilt. I may not have lied, of course. But I had not told the whole truth either. I
              had left out a small detail, not out of fear, but because I had thought it irrelevant, insignificant. It was a plan of action, purely personal,
              I had made for that day, somewhat uncertain. An intention only. After posting my mail - which I would surely do if the prophecy of the Fool
              that had turned up did not come true - I thought I might show up for our now regular meeting of the 7. Last time everything had turned out
              wrong. I had left in great agitation. There I was, at the last moment, everything ready to go, and I missed my train. It was too much! And
              as if it were not enough that the Fool’s prophecy had not come true until that moment, I also wanted to make sure, on top of everything.
              So, then, more out of an obsessive curiosity than superstition, I thought I might try my luck again at the meeting of the 7. Oh yes, I forgot
              to say that all 7 of us were fellow sufferers. Nervous disorders, psychological problems and the like. The truly ‘philhellene’ doctor had
              unreservedly recommended to us this kind of group therapy. To get together. To busy ourselves with something interesting. To talk, to discuss
              freely amongst ourselves whatever was troubling us. So we often followed the doctor’s advice. We got together and dealt the tarot cards.
              We killed time, we enjoyed ourselves, we tried our luck. That’s right. About the meeting of the 7 I had not breathed a word at the Police
              Station. Besides I did not know that even intentions count as facts in a statement to the Police, that they might be interpreted as incriminating
              evidence. The lucky thing now was that, at last, I knew my guilt. Or at least, I suspected it. The prose of the writer, innovative, exploring
              psychological states, reveals a complex and mature talent, attempting to deal with problems of technique and presentation of theme. And
              this is an aspect not to be dismissed lightly, when we take into consideration the fact that a great deal of the dominant realistic prose
              in Greek literature today does not seem to be concerned so much with such issues. Besides, the theme and its treatment in The Set-Up is
              free of the outdated and trite motifs of ‘the foreigner in the cursed foreign land’ which have traditionally characterized and may still
              characterize the works of the majority of Greek writers of the diaspora. In this case the writer’s interest focuses on a realistic and convincing
              character and his personal problems - that are collective and social problems too. However, it should be stressed that the writer is not
              simply satisfied to utilize the current material - of a theme which was a social and political phenomenon of general interest - but endeavours
              to render this initially ‘journalistic’ material into life-like material through the fleshing out of true, vivid, fully rounded characters.
              Such a successfully created, fully rounded character is, of course, the protagonist. The characters of the ‘agent’ and the ‘interrogator’
              could also have been such ‘fully rounded’ ones if the writer were not in a hurry to describe them in their essential, psychological dimension,
              in only a few pages. Also, a greater development of the words or actions of other secondary characters (who are few, in any case) perhaps
              would have enriched the human ‘population’ of the ‘fully rounded’ characters of the novel. Nevertheless the fact is that the protagonist
              is already an achievement of narrative technique which owes much to the ‘breaking up’ of it, achieved by having alternating narrators and
              points of view in the narration (in the novel there are three narrators - an impersonal one, the protagonist and the agent - so that the
              point of view of the narration changes with the result that the narration attains a multidimensional character). As well as this, the careful
              technique of the narrative structure, the dexterous exploitation of language and of the various figures of speech, the polysemic and numerous
              allusions and use of symbolism, the metaphoric language, the realistic detail and generally the word play constitute basic and positive
              characteristics of the novel. The rhythms of the language here are clear and direct and are tied organically with the exploration of the
              protagonist’s psychological world. These devices are not striving for effect, but play a functional role by constituting an inseparable
              part of the whole theme and by reinforcing, depending on the case, the whole strategy of the plot and what we might call ‘pervading atmosphere’.
              The writing in the novel often reaches remarkable heights of realistic economy, humour, and clarity which can be seen, for example, in the
              description of the protagonist’s christening ceremony: Air! He’s drowning! The servant of God Nikolaos... is baptized... He’s suffocating.
              In the name of the Father... The two hairy arms, like cables, plunge him to the bottom, bubbles escape from his mouth and nostrils, he’s
              going, suffocating, drowning... Around him laughter... the little brat... at last the surface, a breath, come on my darling... My lamb,
              he’s cold... just look at him, and of the Son... oil, snort, tears, water all suffocate him but the two cables plunging him into the water
              again relentlessly, mercilessly persist in annihilating him, irrespective of the fact that he’s screeching and writhing, and of the Holy
              Spirit... come on now, enough ... Congratulations! to the newly baptized... my baby... come, come to your godfather my little heart... the
              birdie, the birdie, there! the little brat, such stubbornness! Congratulations! Congratulations Godfather!... Well done, many more of the
              same... Amen. Air!... The sharpness of images shows life-experience and a keen ability to observe, and make the text convincing: When I
              arrived at my Doctor’s room I let the receptionist know, of course, that I was there. Then, although there was no one else in the waiting
              room, I sat at the empty seat in the corner. I always preferred corners. I felt greater security there just like a dog won’t piss unless
              there’s a wall there. Next to me was the wall. On it was a decorative wall plate depicting some ancient columns - they looked a bit like
              those of the Temple of the Olympian Zeus. The Doctor was a philhellene. Next to me was a wastepaper basket. In front of me the little table
              with the magazines. The columns were leaning. Leaning at a greater angle than the Tower of Pisa. A dull stain shaded the horizon. A cloud.
              It might be a cloud or smog. Or dirt due to the age of the place. It might be an antique, from the times of King Otto, or even from Monastiraki,
              who knows... An interesting characteristic of John Vasilakakos’ writing, also testimony of his formal literary knowledge, is the well-used
              inclusion of other texts into his own, whose function it is to promote or support the action. Such passages, for example, are the incriminating
              text ‘Figure - Goldmine’, which becomes the starting point of a painstaking and interesting narrative and historical-social analysis by
              the ‘hellenist’ interrogators, as well as ‘The Prime Minister’s Message to the Greeks of the Diaspora’, ‘Coach States’, ‘Miraculous Tickling
              Directions’, ‘How Power Changes the Individual’, ‘Spring’, and ‘Arachne and the Goddess Athena’. The evocation of a psychological atmosphere
              shows, also, a writer working creatively in the tradition of Samarakis and other significant post-war Greek prose writers. Apart from some
              sections of the novel which are a bit heavy-going (such as pgs 21-33, the ‘Kafkaesque’ prolongation of atmosphere on pgs 47-50 and the words
              of the interrogators, pgs 87-89), the rest of the text is extremely well-handled, with climaxes pgs 101-105, where the writer proves himself
              a master of internal monologue as well as the dialogue form through the use of the device of the dream. In a second reprint of the Greek
              edition of the novel, some printing and spelling errors, which detract from the book, should be corrected. Here, however, one should take
              into account the fact that the Greek edition of this novel was published in a non-Greek-speaking country. Generally, ‘Elikia Books’, a significant
              Greek-Australian publishing house which has recently given us other interesting publications, amongst which the valuable anthology Reflections
              - Selected Works from Greek-Australian Literature (1988) stands out, was fortunate to be able to publish this work by John Vasilakakos.
              From the point of view of quality his novel is of a level exceptionally high compared to works by other Greek writers of the diaspora, who
              naturally live relatively cut off from the linguistic centre of their homeland and its literary developments. Nor does it lack anything
              significant when compared to many recent works of the literary output of Greece itself. John Vasilikakos’ novel is undoubtedly an unusually
              mature and complex work by a writer still young, who, we believe, may still have to offer great things to our literature."
        - title: Overland Review
          text:
              Set-Up by Vasilakakos Michael Hanrahan Overland , No. 147, Winter 1997 Reading the first few pages of The Set-Up gave me that sinking
              feeling usually saved for a Monday morning. With his story of the migrant experience in Australia, Vasilakakos has taken an interesting
              idea and beaten it to a slow and painful death. Lakis lives in Sydney in 1978. He has become caught up in the Social Security Greek Prosecutions
              Scandal, which involves people fraudulently obtaining sickness and invalid pensions. It is suspected that Lakis, who is Greek-born, is exaggerating
              his various ailments in order to receive one of these pensions. Sent to investigate is ‘the Other’, a man who tries to win the confidence
              of Lakis in an effort to expose him. He makes his first appearance at Lakis’ doctor’s surgery, and later appears in Lakis’ hospital room.
              ‘The Other’ wants to find answers to such questions as what is the secret meaning of Lakis’ exceptionally long surname? What is the significance
              of his underlinings in an article about Cheryl Ladd’s breasts? Who is condemned by the misprint in that article? Vasilakakos has hidden
              any points of interest beneath his character’s idle ponderances. Lakis spends many paragraphs wondering about his feet and toenails, and
              giving such insights as ‘this woman’s either pulling my leg or telling the truth’. To add to his flat characters, Vasilakakos has a tiresome
              style of writing. The story seems to have been run over with a steam roller. It is nice and smooth throughout. Nothing to get excited about,
              no tension, no drama. Rather strange for a book that purports to be a ‘hand-grenade’ thriller. There is really nothing going on at all,
              the lifeless feeling accentuated by the unchanging sentence lengths and long paragraphs. Originally written in Greek, there is no way this
              level of monotony could be the result of translation. Vasilakakos also seems to have an obsession with rambling, trivial dialogue. He doesn’t
              always identify which character is speaking, making the conversations even more difficult to follow. The potential exists for an intriguing
              tale, but Vasilakakos began in a rut and refused to move out of it for 173 pages. The Set-Up is supposedly ‘like Peter Corris re-imagined
              by Dostoyevsky or Kafka’. Unfortunately it was then written by Vasilakakos.
        - title: The Weekend Australian Review
          text:
              "Paperbacks The Weekend Australian , 26-27 April 1997 The notorious Social Security conspiracy case - a hideous blot on Australia’s
              ethnic affairs record - saw hundreds of Greek migrants labelled as crooks, allegedly receiving sickness benefits and invalid pensions illegally.
              When police swooped on Sydney homes and doctors’ surgeries in 1978 they set off a legal nightmare that produced 6.5 million words of transcript
              and cost taxpayers millions of dollars. The courts found no conspiracy existed - but migrant lives were left shattered. With a strong nod
              towards Kafka, Melbourne academic John Vasilakakos revisits the conspiracy scandal and delivers a rare thing in Australian writing: the
              socio-political novel. Lakis is crazy (‘pissing is a pleasure as significant as eating and making love,’ he claims) and manages to obtain
              an invalid pension. Preparing to return to Greece and his family, he’s arrested on conspiracy charges. Stalinist Russia no, but sunny Australia
              is where he’s hounded to an inevitable and tragic end. ‘After fulfilling this social duty,’ observes Lakis of his own actions, ‘he would
              certainly rest.’ Vasilakakos’s novel turns into a deliberate puzzle, reflecting Lakis’s confusion at the hypocritical stance of his adopted
              land."
        - title: Herald Sun Review
          text:
              Weekend Books Sorry Case The Set-Up Patricia Drivas Herald Sun , 22 February 1997 It was the longest-running committal hearing in the
              English-speaking world and cost $7.5million - but all for nothing. The 1978 ‘social security conspiracy case’ started with a series of Commonwealth
              Police raids on members of the Greek community in Sydney. The Greeks allegedly were illegally obtaining sickness benefits and invalid pensions,
              but the case eventually was closed because there was no case to answer. Now, Deakin university lecturer John Vasilakakos has created a fictional
              version of the case in his novel The Set-Up . Much of the novel centres on the persecution of one of the accused migrants, referred to as
              ‘Lakis’, and through him traces the trauma inflicted on the 1,700 Australian Greeks allegedly involved. The Set-Up is a well-written psychological
              thriller that closely questions the assumption of the persecutors - and their motives.
        - title: Moreland Sentinel Review
          text:
              "Author exposes trauma of ’70s conspiracy case Michael Coulter Moreland Sentinel , 2 December 1996 John Vasilakakos’s novel The Set-Up
              looks at the psychological trauma suffered by those charged over the Greek social security conspiracy case. The Greek social security conspiracy
              case is one of the uncomfortable episodes in Australia’s race relations history. Like the white Australia policy and the removal of Aboriginal
              children from their families, it raises questions about how tolerant we have been. It was April 1978 when federal police raided the homes
              of hundreds of Greek Australians in Sydney. Police believed up to 1,700 Greeks were involved in a conspiracy to defraud the social security
              system through invalid pensions j and sickness benefits. Nearly 200 people were charged but only five people were convicted, and these were
              for minor offences. Media reports from the period indicate the case cost $7.5 million and became the longest committal hearing in the English-speaking
              world, with an estimated 6.5 million words entered in transcript. Author and academic John Vasilakakos extensively studied the incident
              and reached this conclusion: ‘All this proved one thing - the whole thing was initiated by a bias against migrants.’ The case provided the
              raw material for Mr Vasilikakos’s novel The Set-Up , the first English translation of which was launched in Brunswick last week. Mr Vasilakakos,
              who lived in Brunswick for nearly 20 years, said the novel was a fictionalised account of the psychological trauma suffered by those charged
              over the conspiracy. ‘Eventually one person committed suicide because he couldn’t take the insult and the degradation to his name,’ he said.
              ‘What my novel is trying to expose is the psychological trauma that the migrant faces.’ Mr Vasilakakos has published nine books, including
              plays and volumes of criticism in Greek and English. He said The Set-Up attracted attention when it was first published in Greek seven years
              ago. He believes this English translation could have a similar impact, particularly in light of the Pauline Hanson-inspired resurgence in
              the race debate. ‘The important thing I want to stress is my hook hopes to prove one thing: all these extremists who are around now can
              never lead to a harmonious society, they can only lead to destruction and social upheaval. ‘We’ll never be able to have a homogenous society.
              The whole world is heading towards multi-culturalism, not just Australia, and it’s stupid to try and stop migration. All those people who
              think they can live in a vacuum - it’s just absurd.’ Mr Vasilakakos has seen Australia become a more tolerant society since his arrival
              but said racism was a deeply ingrained part of the human psyche. ‘I came to Australia in 1965 and things have definitely changed since then,
              especially since the time of the Whitlam Government, which did a lot to create a multi-cultural society. ‘Australian society is more tolerant
              than it was, but racism has not been wiped out and a large percentage of the population is still against migration. ‘It’s a deep-rooted
              evil, not only in Australia but all around the world. I think it’s quite natural, especially in these days when we are going through tough
              financial times. ‘Once a person is unemployed, he tries to blame others for his bad state of affairs, and often he blames migrants, both
              for his own personal affairs and for the nation’s affairs. ‘On the one hand that’s not born out by evidence, which suggests that more migrants
              actually means more jobs, because there’s more people to feed, more services required. ‘On the other hand I can understand it. I think all
              people are more or less racist but there are degrees of racism. Even I in some ways can be racist. ‘I think inside all of us there is somebody
              who doesn’t like some group or country but the difference is some people are more racist than others. It won’t be phased out easily but
              I believe if we try we can make progress. I think Australia is already one of the most cohesive societies in the world.’"
kicking-in-danger:
    title: Kicking in Danger
    author: Alan Wearne
    short_description:
        "Alan Wearne is one of the great masters of what can be done with the Australian vernacular. This is an alternative history
        of Australian Rules, rendered rich and strange by one of the great connoisseurs of suburban Melbourne. Damien Chubb and Johnny Moomba are
        great acquisitions to the rogues' gallery of football myth. The ghosts of everyone from John Elliot to Dermott Brereton flit through this
        comic extravaganza which provides us with every possible archetype you could poke a stick at: a rich brew of sporting Australia as it is and
        as comic nostalgia can refashion it."
    long_description:
        "What kind of time warp is this? Collingwood has made the Grand Final. Their ace full forward is missing. Yes, Johnny Moomba,
        odds on for the Brownlow, Rhodes Scholar and Aboriginal land rights activist has been kidnapped! From Sydenham to Dingley, from Kew to Rowville,
        murky forces are at work. Through this mayhem ambles Damien Chubb, ex-Bomber ruckman, private eye to the sporting world, laconic centre of
        calm in a Melbourne gone even more berserk than usual. It's heading towards the last Saturday in September. Anything can happen. It does.
        Alan Wearne is one of the great masters of what can be done with the Australian vernacular. This is an alternative history of Australian Rules,
        rendered rich and strange by one of the great connoisseurs of suburban Melbourne. Damien Chubb and Johnny Moomba are great acquisitions to
        the rogues' gallery of football myth. The ghosts of everyone from John Elliot to Dermott Brereton flit through this comic extravaganza which
        provides us with every possible archetype you could poke a stick at: a rich brew of sporting Australia as it is and as comic nostalgia can
        refashion it. Peter Craven Filled with unique takes not only on football but life in general, seeing things from both sides of the fence.
        Alan Wearne has given us The Great Australian Rules Novel. James 'Charlie' Manson The footy novel. Ron Barassi Damien Chubb is the Philip
        Marlowe of the forward pocket. Shane Maloney"
    price: 19.95
    isbn: "1876044209"
    release_date: "1997"
    page_count: 177
    reviews:
        - title: Famous Reporter Review
          text:
              Kicking in Danger Tim Thorne Famous Reporter , No. 16, December 1997 Black Pepper has rapidly emerged as perhaps Australia’s most vigorous
              small press publisher of poetry, presenting, to deserved acclaim, the work of poets such as Louis de Paor and Emma Lew , but what has been
              less remarked upon has been its growing fiction list. This volume is the press’s eighth venture into fiction and while it makes no claim
              to be serious ‘high literature’, it is great fun to read and should sell well, especially in those parts of Australia where Australian Rules
              football is a dominant feature of the culture. The timing of its release, in the weeks leading up to the AFL finals, will no doubt help
              sales. Alan Wearne belongs to that group of writers and other intellectuals, mostly based in Melbourne and mostly (but by no means exclusively)
              male, for whom Aussie Rules is more than a casual interest and slightly less than a religion. To his credit, he is not. unlike what appears
              to be a majority of that group, a Carlton supporter. Indeed, the hero of this novel. Damicn Chubb, Australia’s (the world’s?) first private
              eye specialising in sports, is a former Essendon ruckman of somewhat minor repute, who has named his son Alex Bluey Barry (after the famous
              half-back line of ’62). Every Victorian club, however, gets a mention and is apportioned at least one character who is either a supporter,
              a former player or an official. It should be pointed out that the phrase ‘Victorian club’ is a crucial one, and that these clubs include
              South Melbourne and Fitzroy. The significance of this, for those who do not follow the indigenous game, is that, although Kicking in Danger
              is set in the early 1990s, there is no mention of the AFL’s interstate teams, and the expansion which began with the Swans migrating to
              Sydney a decade earlier is only mooted in the book as a rumour too ridiculous to be taken seriously. Wearne wears his heart on his sleeve
              as a footy fan of the nostalgic persuasion, a traditionalist who is set against the economic rationalism which is turning the game into
              just another arm of the media moguls’ entertainment empires, but he doesn’t preach about this. Instead, he chooses to construct a hybrid
              world of fantasy and reality which the reader can take as given and within which his cast of characters can be humanly real, rather that
              the cyphers on corporate notepads that their ‘real-life’ counterparts too after are. While there are some characters based quite firmly
              on living people, and while real footballers, past and present, are mentioned, what Wearne has quite cleverly done is distil the essence
              of each club’s image into one or two characters. Thus former Geelong player Alistair Arbuthnol is an urbane, tweedy, old-wealth anachronism
              from the Western Districts, whereas Lenny Hell, the wise, kind-hearted, softly spoken, modest publican of a modest pub, used lo play for
              Fitzroy. There is plenty, too, of the world outside football. Crucial to the novel’s plot are the Koori Lesbian Kollective, computerised
              astrology, a particularly nasty bunch of racist, anti-football skinheads, and CNN. For all its elements of farce, and for all that it should
              appeal to those whose only contact with literature is reading the Footy Record , this book does not avoid issues of political, economic,
              even philosophical significance. And for all that the world of footy is a macho domain, it is women who emerge as the stronger sex, and
              it is a woman who, in one of the book’s funniest scenes, turns the Brownlow Medal award ceremony into a massive land rights demonstration.
              I have-a minor quibble with the number of misprints and misspellings. The consistent use of ‘loose’ for ‘lose’, ‘Princess Park’ for ‘Princes
              Park’ (which may, on second thoughts, have been an intentional dig at Carlton). some fairly haphazard scattering of commas, and most heinous
              of all to a Tasmanian reader, ‘Daryl’ instead of Darryl Baldock, perhaps betray an unfortunate haste in production. But these are outweighed
              by some great one-liners, such as ‘Football has an entire academic underclass’. ‘There are no Pie [Collingwood. for the uninitiated] supporters,
              there are only Pie fanatics’, and the advice given to Chubb at one stage to ‘just sit here, beating-up your memories for Truth or Playboy
              or Meanjin .’ Alan Wearne has established a reputation as a major Australian poet and his verse novel The Nightmarkets is a tour de force
              . Kicking in Danger probably won’t even make it on to the interchange bench of the Ozlit canon, but then literature is like football in
              that you can have a great time watching the minor leagues.
        - title: Ian McFarlane, The Canberra Times
          text:
              "Paperbacks Ian McFarlane The Canberra Times , 12 October 1997 And now for something completely different: Kicking in Danger , by Alan
              Wearne, has Johnny Moomba, Aboriginal land-rights activist and star full-forward for Collingwood, disappearing during finals fever. Has
              someone played the man without the ball? Damien Chubb, ex-Bombers ruckman and private eye, investigates, and before anyone can say ‘stacks
              on the mill’ (a sadly defunct Aussie rules expression for an all-in brawl) the fun is thickening like MCG mud. Wearne’s comic concoction
              of corporate box power games and Koori Lesbian Kollectives give new meaning to the Aussie Rules tradition of flying high. Fast footy fun."
        - title: The Melbourne Weekly Review
          text:
              "Barass and I Literature and football can come together - just ask the great Barassi Mary Lord The Melbourne Weekly , 16-22 September
              1997 At the risk of sounding unpatriotic, I have to confess that I equate springtime with the end of the footy season and the domination
              of the media by large ocker blokes and their tiresome, crude jokes. It’s the thought of the slow approach of the cricket season that sustains
              me through those dreary winter weekends. On the other hand, the summer must be dreadful for hardline footy fans, which is probably why they
              have that mini-competition in late summer before the real thing begins. That’s probably also the reason why publishers bring out footy books
              towards the end of season - punters need crutches to sustain them through the footy drought. Though I must say it’s hard to imagine a fervent
              fan settling down for a good read in the off-season, I guess if they’re desperate enough anything’s possible. According to that champion
              of champions, Ron Barassi, Kicking in Danger , hot off the presses, is ‘ the footy novel’. He’s probably right. Almost certainly right.
              OK, he’s definitely right. I, who even standing on uppy-toe don’t quite reach his knees, wouldn’t want to argue with him. Though mild-mannered
              enough off the field, he is intimidatingly large and I, frankly, am a coward. Alan Wearne, the author of Kicking in Danger , is a highly
              acclaimed poet and best known for writing the prize-winning verse novel Nightmarkets . He may well have written the Australian rules novel.
              Not being an aficionado I am not really in a position to judge. I’d say that Wearne knows the footballers’ lingo, and genuine fans familiar
              with the jargon will really enjoy his book. I met the great Barassi on a memorable occasion a few thousand years ago. I was dining in a
              restaurant with colleagues from academia and in came Barassi who recognised one of my friends and came over to say hello. His friend, an
              historian of popular culture, introduced us with explanatory notes which, I suppose, were intended to justify his mixing in such stodgy
              company. He explained me to Barassi with an apologetic look, saying, ‘She’s literary’. I thought this sounded faintly insulting but I let
              it go. Barassi raised one eyebrow, then he also let it go. Or at least I thought he did. We invited him to join us but, seeing we were almost
              through our meal, he graciously declined but suggested we join him and his companion for a drink when we’d finished. I doubt he really meant
              it; it seems unlikely that he’d enjoy being on display for his fans when he was out for a quiet dinner with a friend. He was merely being
              polite. But the blokes in our party insisted the great man would be deeply hurt if we failed to take up his invitation, which, of course,
              we did; the men in our party mentally rehearsing the tales they’d tell their students tomorrow about what they said to Barassi and what
              Barassi said to them. At Barassi’s table I stayed fairly quiet (for me) while the others bubbled and squawked like demented school-boys,
              each one showing off for the great man. After a few minutes of this, he turned to me and barked: ‘I thought you were supposed to be literary!’
              The others cringed. I took a slow, deep breath. ‘Good gracious, Ron,’ I said, with the confiding smile of one expert to another, ‘you don’t
              play football at the table, do you?’ The great man digested that thoughtfully and after a brief pause offered the laconic response, ‘Fair
              enough, darl.’ The tension in the air subsided, everyone visibly relaxed and ‘Darl’ went down in history as a woman with nerves of steel.
              It was a character-building experience and not one I’d care to repeat. I abandoned the academic life not long after, though there’s probably
              no connection. So, I definitely agree with Barassi’s judgement of Kicking in Danger ."
        - title: Overland Review
          text:
              "A Welcome Addition Alan Wearne: Kicking in Danger Robert Pascoe (academic) Overland , No. 150, Autumn 1998 Colleagues, including the
              editor of the illustrious Overland , are wont to complain that reading The Winter Game , my social history of Australian football, is rather
              like being stuck in one of those endless pub conversations which goes on and on, without any pause which might allow an interruption, another
              voice offering a verbal route out of the all-enveloping, ceaseless and neverending, never-tiring discourse on the Great Australian Game
              which for most months of the year threatens to engulf and suffocate everyone living in Melbourne: this novel would have the same effect
              on the ‘unbelievers’, those, like the journalist writing in the American magazine Fortune who is quoted as saying recently that Melbourne
              would have featured much higher on his list of desirable cities in which to live were it not for the endless talk of football (and which
              school you had attended when growing up), but for those of us who do believe, and are passionate, and never stop yarning and spinning tales
              of footballers, and their alleged deeds, and misdeeds, this novel is a welcome addition to the not-very-long shelf of fictional works which
              take that endless conversation from the pubs and hairdressing salons to the printed page..."
        - title: Australian Book Review Review
          text:
              "Crime Fiction Out Of Bounds Kicking In Danger J.R. Carroll Australian Book Review , No. 197, December 1997/January 1998 A kidnapping
              forms the centrepiece of Alan Wearne’s Kicking in Danger , an Australian Rules mystery bearing the imprimatur of such diverse luminaries
              as Ron Barassi and Peter Craven. The only other football mystery I know about is Death in the Back Pocket , which failed to kick a goal,
              but thankfully Wcarne’s tilt is much more successful. He is better known for his epic verse novel The Nightmarkets , but with this book
              he has shown his true colours, which are red and black. A true Bomberholic, he boasts an impressive store of club lore and trivia. In fact,
              sometimes the book seems to be merely an excuse for him to flaunt his knowledge and obvious love, of the game. The protagonist in Kicking
              in Danger is super-sleuth to the sporting world, Damien Chubb, who was a ruckman for Essendon in the sixties and seventies, before the advent
              of Simon Madden, but the thing he is remembered most for is tangling - unwisely - with Big Nick in the ’68 Grand Final. I was there, but
              must have missed it. Now, however, Collingwood superstar Johnny Moomba is missing, and with the Grand Final a week away Chubb has to find
              him fast. Moomba is so good he makes Gary Ablett look like a bush hack: mega-goalkicker, hot favourite for the Brownlow and high-profile
              Aboriginal activist - and he plays for Collingwood, which is a nice ironic touch. While Melbourne prepares itself for that last frenetic
              Saturday in September, Chubb uses all his old football contacts to track down his man. The question, of course, is not if he will find him
              in time, but does Moomba want to be found? Is his disappearance a stunt, or perhaps a political statement? Wearne makes full use of this
              idea as Chubb weaves a passage through the pack, unearthing a whole host of wonderfully eccentric types, some of whom even non-football
              followers may recognise: J.J. Hobson, head-kicking president of Carlton, and a beer baron; Danny Gallagher, a Harley-riding rap singer and
              media star with blond tips who used to wear number 23 for Hawthorn - and so on. All that’s missing is Eddie McGuire. It’s a lot of fun,
              a hoot in fact, and the finale, involving the occupation of the MCG on Grand Final Eve, is way over the top. My only complaint about Kicking
              in Danger is that Wearne has not been well-served by his publisher in the editorial department - the book is absolutely full of mistakes."
        - title: The Canberra Times Review 2
          text:
              "Book Review A novel idea to satisfy the football fanatic Kicking In Danger : A Damien Chubb Mystery Di Lloyd The Canberra Times , 30
              November 1997 Well, it had to happen. We have had the player biographies, the historical accounts and the world’s best football yarns, and
              now we have the Australian football novel. The plot of Kicking in Danger centres around one week - grand final week in the Australian Football
              League. But this is no ordinary grand final week, after all grand finalist Collingwood has had its star player, Brownlow medallist, Rhodes
              scholar and Aboriginal land rights activist Johnny Moomba kidnapped. The Magpies call in former Essendon footballer and now private eye
              Damien Chubb to solve the mystery. As the mystery unravels you are introduced to an array of characters, from J.J. Hobson, the Carlton president
              - who bears an uncanny resemblance to John Elliott - to Maurie Moon the forgotten South Melbourne star who played in the blood-bath grand
              final of 1945, to the Koori Lesbian Kollective - and you need to read about them for yourselves to understand the importance of that group.
              While the book is essentially a fictional tale, it illustrates the very real passion associated with Australian football. The rivalry between
              the clubs, the passion of the supporters, the common bond between all football people when it comes to the game they love, and - as any
              Victorian would understand - the sacredness of the MCG, not only to football, but to Melbourne as well. In fact, the MCG is central to some
              of the more memorable moments of the book. For example, at one stage it looks like the MCG is not going to be available for grand final
              day and Chubb asks his son Alex for a solution. Alex’s reply: ‘Simple Dad, play it at Waverley.’ Chubb takes up the story: Those surrounding
              him were chilled and, like an ice age, the enormity of his statement rippled out to engulf the room. From the mouth of a relative babe:
              heresy! Oedipus has been blinded, Valhalla has fallen. Liz, Liz, a demon had entered our child, and turned him into some heinous prophet!
              All adults, seeing such a terrifying future recoiled, some I swear swooned. This, we all thought, comes from too many Mega Slime Lime Slurpees.
              Kicking In Danger is best suited to the football fanatic, the one so passionate about the sport that they can laugh at it but still respect
              it."
        - title: Herald Sun Review
          text:
              Kicking in Danger Alan Wearne Richard Harling (bookseller) Herald Sun , 20 November 1997 Finally, a new book for AFL fans. Kicking in
              Danger is a new departure for Australian crime novels and, it must be said, for Australian sports writing. It is a crime novel about footy,
              set in a weird time-warped Melbourne, where Collingwood has made the grand final, and... well, the plot really is too complex to explain
              and probably only AFL fans will really appreciate it. But if you like crime novels and love footy, then this might be the book for you.
        - title: The Age Review 2
          text:
              "Top Shelf Crime fiction Kicking In Danger Michelle Griffin The Age , 19 October 1997 This crime caper is really just a romp through
              a fantasy league, where the original 12 teams still exist, the national game is just a cloud on the horizon, and the president of the Carlton
              Football Club is a loveable old rogue. Damien Chubb, sport’s private eye, is smart, funny and used to play for Essendon. Wearne has a lot
              of fun with all the footy archetypes, including an astrology mad North fan, a rap-singing Hawthorn superstar and the man Chubb must find
              before the Grand Final: Johnny Moomba, Collingwood full forward, Aboriginal land rights activist, Rhodes scholar and Brownlow favourite.
              The plot goes off the rails but it’s a lot of fun. Sustenance over summer."
        - title: The Weekend Australian Review 2
          text:
              Books Kicking In Danger Michael Sharkey (editor) The Weekend Australian , 4-5 October 1997 Like [John] Birmingham’s [ The Tasmanian
              Babes Fiasco ] cast of disparate desperates, Wearne’s dramatis personae reflect a certain metropolitan melange. But where Birmingham scours
              Brisbane’s bottom-feeding social strata, Wearne embraces the social classes that make up Melbourne’s tribes who live for football. And where
              Birmingham hardly explores the possibility that any class outside the urban lumpen-fringe dwellers could have a life worth examining, Wearne’s
              narrator shows a gift for looking appreciatively into the minds of a beer baron, a Jewish football team manager, the licensee of a Fitzroy
              pub, a serially divorced ex-Grammarian gentleman girl-chaser and Koori lesbians. Wearne’s book displays a sympathy for the muesli mix that
              constitutes Australian (or Victorian) society, which goes beyond Birmingham’s talented depiction of one-dimensional grotesques. Chubb’s
              girlfriend is the straight daughter of a megalomaniac beer baron; Moomba’s girlfriend Dr Daisy Jackson is an Aboriginal academic whose articulacy
              is superior to any male’s in the novel; Johnny Moomba is, by his own admission, ‘the most calculating prick in town’. Wearne knocks the
              stereotypes around quite a bit in the earlier stages of his novel, although he has such fun with such irresistible targets as the International
              Socialists and the supremacist wackos that it’s understandable any effort to maintain the illusion of realism gets tossed to glory in the
              end. New Age lesbianism and Aboriginal mysticism come together to provide a happy ending that lets down the novel’s tone a treat. The resolution
              of Kicking in Danger is weaker than Birmingham’s inner-Brisbane grunge Gotterdammerung . But if you can hop, step and jump over the typographical
              minefield, you might hope that Wearne, who made his name with The Nightmarkets , a book-length poem, will produce more book-length prose.
        - title: Brisbane Courier-Mail
          text:
              "books Fun and frolics in footy crime Kicking in Danger , The Footy Novel John Collins (publisher) The Courier-Mail , 27 September 1997
              Strange title, or is it a prophetic one? In the ancient version of the game, no matter how bloody-minded the affray, kicking in danger just
              wasn’t on. It wasn’t footy and that was that. So perhaps the ancient Alan Wearne is trying to tell us something about the future. Perhaps!
              But we are talking Melbourne; the town where the game is said to have begun on that strip of paddock beside the Yarra. The strip that now
              encloses the G, the holy of holies: the stadium that pretends in summer to be a cricket ground and at other times has played host to pop
              stars, opera tenors and that first Australian Olympic Games. In a sense, it is the G that is the hero of this rather clever entertainment
              where Wearne, the poet, the dyed-in-the-wool Melburnian and obsessive football enthusiast, leaves you in no doubt that his bizarre, fun-packed
              events list is somehow a deadly serious affair. But come 2000, the timetable, like the game, is about to change because big power outside
              his Melbourne has caused the date of the grand final to be changed to fit in with the Sydney Olympics! Wearne could not have known this
              when he passed the final proofs to. Black Pepper. Perhaps that will be the scenario for a second Damien Chubb footy mystery. Wearne, a word
              master, gives the action both barrels. Perhaps he can’t help getting just a little precious about the Brunswick end of town but at the same
              time, his hatred of Carlton is palpable. He can make fun of Collingwood and their supporters: Let’s face it: wide open democratic, can’t-say-no
              tradition-smothered Collingwood are such a credulous organisation. There are no Pie supporters, there are only Pie fanatics: their eyes
              have galaxies of stars shining in them and they spell out naivety. They are the least objective of Australians: the Queensland National
              Party is a paragon of rational discourse in comparison. However, Carlton might be suspiciously close to Brunswick but it is still home to
              the silvertails. Carlton, the real power centre, comes in for some very special treatment. The cartoon character of J.J. Hobson, the Carlton
              Club president, is a none too subtle image of a very famous club president. There is sour grapes here but then Carlton once had the unseemly
              habit of beating Essendon and besides, even in tribal days, prime minister Robert Menzies was the No. l ticket-holder. The nostalgia is
              strong and there’s no doubting Wearne’s longstanding fascination with the game. But he does fear change. He does manage to include the interchange
              but only in a character cast list. And he does include some of the recent well-known names but he has his central character, private eye
              and ex-Essendon player, Damien Chubb, react with shock when his son hears the news that the G may not be available for the grand final.
              ‘Forget the G, Dad. The game’s going national.’ That is too much for Wearne, the patriot, to accept because he’s old school. His league
              still has only 12 teams and the Sydney Swans and the Brisbane Bears (let alone Lions!) just haven’t happened. Tribal Melbourne is over but
              not for Wearne! I suspect he thinks the code’s heyday is decades old, and yet he obviously likes the present day razzamatazz. He enjoys
              the North Melbourne Grand Final breakfast, the Grand City Parade and the whiffs of money and power that have always been present but now
              have a new dimension of flavour - Footy Rules, OK! He accepts this and so sets out to entertain by inventing a plan of action - not too
              difficult in a Grand Final Week - and a cast of characters that beggars description although if you are a dedicated follower, you’ll enjoy
              sifting through the subtle and not so subtle disguises. In this sense, it reminds me a little of Power Without Glory , where no edition
              was complete without the key to real names. Remember when John West (Wren) was King of Carringbush? But for the sake of the artifice, Wearne
              doesn’t just cling to the past because his footy hero is Johnny Moomba, a Koori full forward - a modern version of Farmer, Coleman, Winmar
              and Ablett rolled into one but with the added Wearnian touch of being a Rhodes Scholar! - and it is his kidnapping just before grand final
              day that begins .the adventures of Chubb, the private eye and his many footy mates of both sexes. It is a romp: a frolic into an imagined
              past/present where even the literary magazine attached to Melbourne University, historic Meanjin , gets a guernsey. It is an exercise in
              good fun, heavy vernacular and lots of leg pulling. But there are barbs, because the game is serious business in Melbourne and it is. probably
              (dare one say it?) in spite of its origins, becoming similarly so in the fleshpots of the north."
        - title: The Age Review 1
          text:
              "Pitch battles Kicking in Danger : The Footy Novel Garrie Hutchinson (editor) The Age , 30 August 1997 Talking about footy life imitating
              footy art: Alan Wearne’s footy fantasy features, at its climax, the MCG being taken over by a right-wing band of thugs on grand final eve.
              These neo-Nazis had previously kidnapped the greatest footballer in the land, the problematic Aboriginal star Johnny Moomba - a combination
              of Krakouer, Lewis, Winmar, Long, Rioli - and Coleman. He was released, almost accidentally, by the sports private eye Damien Chubb, a former
              Essendon player who had tried unsuccessfully to fix up Big Nick in the 1968 grand final. The sacred site of the ’G was to be liberated by
              the collected forces of players not involved in the big game, who, in the hours before the attacking thrust, assembled at Victoria Park.
              There they were addressed by none other than the less-than-successful coach of Desert Storm, General Schwarzkopf. In art, the boys (and
              girls - a potent force in this novel is the Lesbian Koori Kollective) succeed beyond football’s wildest dreams; in life, the general failed
              to get Collingwood over the line against Carlton. Ah, well. The grand final is between Collingwood and Melbourne, itself a fantasy, and
              Wearne does not reveal the result. Probably a draw. In Wearne’s league, there are still 12 Victorian teams and, at the end of the book,
              South stay at South as a direct result of Chubb’s success - it’s enough to make you weep in memory of those palmy Saturday afternoons when
              the local tribes did meet at the Lake Oval, at Windy Hill, or even Brunswick Street. Ardent fans of footy will have a chuckle over the conceits,
              as well as recognising the affectionate disguises of selected football personalities, such as a certain Carlton president, and many other
              Melbourne and football types and places. I must declare an interest: years ago, I used to go to Carlton Essendon clashes at Princes Park
              with the author, thereby, perhaps inspiring his unreasoning hatred of the Mighty Blues. I was also one of a number of people who read an
              early draft of this novel and offered partisan advice - some of which has been acted upon. The story, as published, is an improvement on
              what I read then, but I still have some reservations. The storyline, even as fantasy, is both a bit obvious and hard to follow through the
              occasional thickets of long, under-punctuated sentences. And, while I love the idea of an alternative reality in football Melbourne and
              like the clash of anachronisms that ensue, it isn’t an idea that is followed through in the detail of place, description and character.
              Wearne isn’t overly interested in character - he is kicking around types and stereotypes with the result that when the jokes don’t quite
              work and there is little to involve the reader. On the other hand, he isn’t attempting crime fiction in the classical style of time, place
              and character as in Shane Maloney’s retro-Melbourne thrillers. Wearne’s bonk is a kind of regional roman a clef in which the key to enjoying
              the story is a thorough knowledge of the importance of football in Melbourne culture - otherwise, not even The Footy Show will help you."
        - title: The Bulletin Review
          text:
              Literary luminaries explore life’s little vices Marietta The Bulletin , 12 August 1997 Life imitating art again? No one, according to
              Melbourne gossips, could have been more surprised than author Alan Wearne to read last month in the local daily that General Norman Schwarzkopf,
              Stormin’ Norman of Gulf War fame, is addressing the Collingwood AFL team before its clash with Carlton at the MCG. Wearne, in his new novel,
              Kicking in Danger , just published by Black Pepper, already has the tactically brilliant Schwarzkopf doing just that before the grand final.
              However, he also has kidnappers running off with the star Collingwood full forward, and the Magpies hiring private eye Damien Chubb to track
              them down... Might be advisable say the wags, to keep the Rocca brothers under wraps!
        - title: The Weekend Australian [1]
          text:
              "Readings Higher Education Peter Craven The Weekend Australian , 1997 That writer of political verse epics, Alan Wearne, has an extract
              from his long work in progress, which intertwines a set of stories, a trick we associate with Chaucer in verse and Boccaccio in prose. Prose
              is Wearne’s elected medium in his new book, Kicking in Danger , which comes with the words of the great Ron Barassi quoted on the front
              cover: ‘The footy novel’. Wearne is best known for his first novel The Nightmarkets , a story of politics and the shadow it casts on everyday
              life, which was compared by Jack Hibberd to both James Joyce and C. J. Dennis. Kicking in Danger is from the other end of Bourke Street,
              a comic thriller about Australian Rules which involves, among other things, a not-entirely-lovable black Collingwood star called Johnny
              Moomba. The Koori lesbian feminist collective call him Johnny Hardword because that’s what he puts on people. The story involves a kidnapping
              and it has as its detective a former footballer called Damien Chubb. Wearne’s world of Australian Rules is one in which the VFL has never
              transmuted into the AFL and where football history has developed in a counter-factual universe, though it also includes portraits of some
              not unfamiliar characters who have splendoured or made miserable the game. Famous brewers and the like. When The Nightmarkets appeared more
              than a decade ago, Mungo McCallum, the political journalist, said he thought it would become a cult book. It will be interesting to see
              if this fate overtakes Wearne’s attempt at pulp fiction."
letters-from-byron:
    title: Letters from Byron
    author: Jim Williams
    short_description:
        "Jim Williams’ letters, written over a period of eighteen months to friends, acquaintances and antagonists, reveal his natural
        talent as a storyteller. Setting out to detail the day-to-day life amongst the humal flotsam and jetsam of Byron Bay he discovers unexpected
        tales: the mysterious influence of the Lighthouse, Pedro’s Gaucho history, the uncanny Beach Burial, the sinister Carers or the powerful Dice-thrower.
        He intrigues, jokes with, disquiets and enchants his addressees. It is almost unprecedented that a writer’s letters are"
    long_description:
        "Jim Williams’ letters, written over a period of eighteen months to friends, acquaintances and antagonists, reveal his natural
        talent as a storyteller. Setting out to detail the day-to-day life amongst the humal flotsam and jetsam of Byron Bay he discovers unexpected
        tales: the mysterious influence of the Lighthouse, Pedro’s Gaucho history, the uncanny Beach Burial, the sinister Carers or the powerful Dice-thrower.
        He intrigues, jokes with, disquiets and enchants his addressees. It is almost unprecedented that a writer’s letters are"
    price: 19.95
    isbn: 187604408X
    release_date: within
    page_count: 129
    reviews:
        - title: Philipa Burgess, The Canberra Times
          text:
              Paperbacks Phillipa Burgess The Canberra Times , December 1997 If you haven’t been to Byron Bay and want a taste of café society, or
              you just have a nostalgic yen for the counter-culture of the ‘70s, Jim Williams’s Letters from Byron may motivate you to pack your-bags
              and board the next bus north. Williams is a prolific letter writer and a great storyteller. His letters to friends and acquaintances provide
              detailed observations of the tourists and townsfolk that frequent the shores of this NSW coastal retreat and they will stir the most lethargic
              imagination. His descriptions of the mundane and seemingly insignificant activity which occur in Byron Bay are intriguing. Williams’s scepticism
              and tongue-in-cheek detective approach to his subjects engages the reader as he sifts through clues and follows every new lead, excited
              by the prospect of solving some of the mysterious happenings in Byron Bay. We don’t always find out whodunit, but the investigation into
              the behaviour of Byronites as they embrace life and the New Age philosophies of the ’90s, while having their collective feet planted firmly
              in the ’70s, is stimulating summer reading.
        - title: Fiona Capp, The Age
          text:
              "Paperbacks: Letters From Byron Fiona Capp The Age 16 August 1997 As you might expect from a correspondent in Byron Bay, these letters
              are not so much conventional despatches so much as tall stories that begin with everyday events and veer off into the gothic or surreal.
              Through playful irony, Williams provides a beguiling commentary on Byron’s weird and wonderful cultural mix. The result is a series of enigmatic,
              yet strangely satisfying, tales: a biologist mysteriously disappears in the Big Scrub; the Grim Reaper visits a Byron cafe in the guise
              of a man in a black suit carrying a pair of dice. While these stories resonate with all sorts of subtle allusions to ‘old masters’, they
              never lose their informal, conversational quality."
        - title: Gerald Ross, Imago
          text:
              New Writing Gerard Ross Imago , Vol. 10, No. 1, Autumn 1998 Whether the letters in Jim Williams’s Letters from Byron were ever genuine
              letters (does anyone actually write to a friend Byron, the eternally green and bountiful, with its rich pastures and tropical orchards...?)
              or whether the presentation itself is a fiction is not especially relevant here. For each letter is, in fact, a bizarre or macabre apocrypha
              wrapped around a warmly observed vignette of Byron Bay life - sort of an Edgar Allen Poe in sandals. Surprisingly - and, I must add, fortunately
              - most of the letters express bemusement and gentle mockery of the New Age orthodoxies of the area. It’s all quite pleasant and distracting,
              but is it a book worth publishing? There are a lot of ideas running through it; however, the choice to run these stories as letters restricts
              the whole to a meandering collection of half-formed starting points. There is some good stuff in here and the letters probably would be
              fun to find in your post box, but... Black Pepper would have done well to have encouraged the author to develop these notes into something
              more substantial.
        - title: Overland Review
          text:
              The Seductive Microcosm Jennifer Maiden Overland , No. 150, Autumn 1998 Australian critics are often charmed by the combination of modest
              scope and sumptuous detail. The details in themselves need not be trivial. They can be about migraines, mountains, melons or misalliances.
              But they must be sharp, sensuous and original, and their larger context must not be ambitious. Broken or wistful love affairs, dull jobs,
              lifeless marriages, ‘small’ people trapped uncomprehending in large wars or the results of large wars seem permissible. Characters or authorial
              personae who think, strain or question too far beyond the initial philosophy of their writer or reader seem open to literary suspicion.
              The reverence for detail is reinforced by the natural tendency of people in shock, mistrust or mourning to partialize their sense-data into
              manageable portions, to notice only bits and pieces of things and to notice those with an increased brilliance of perception. To question
              such processes can seem almost sacrilegious at times. When I received this miscellany of recent Australian writing, I expected the books
              to rate very high in wonderful sense-data and rather lower in surprising concepts or situations. The word ‘high’ is applicable, too, because
              fixation on bright details is also characteristic of most forms of intoxication (as it is of childhood and prison). One suspects, too, of
              course, that (despite the undoubted compensations - as in Borges - of enforced metaphor) there is an element of sexual evasiveness in some
              of the splendid evocation. Even in Patrick White’s novels, the powerful settings might have dwindled in perspective to personality had his
              central characters not been the rather one-dimensional Mrs Roxburgh and Mrs Godbold but someone like the rather more voluptuous and much
              more multi-dimensional Mr Munday. Many of these current books, too, have powerful Australian settings. The oddest is Letters from Byron
              , in which the seductive locale of Byron Bay serves as a ready made backdrop for what are essentially tight, tense epistolary fictions in
              which the reader is made to understand more about the nature of the events - usually scientifically impossible and occasionally simply illegal
              - than the narrator ostensibly does, As short stories, the ones illustrating straightforward indignation at ‘idealistic’ social experiments
              I think work best, but the self-consciousness of the autobiographical device as such makes the narratives seem much more contrived than
              they really are. This author deserves to relax into the luxury of third person characterization and the full freedom of fiction.
        - title: Social Alternatives Review
          text:
              Tom Sharpe in Byron Bay? Letters from Byron Paddy Ryan Social Alternatives , Vol. 17, No. 1, January 1998 In Letters From Byron , Jim
              Williams exhibits a sketch of one of Australia’s favourite destinations for those who wish to pursue an alternative lifestyle. This sketch
              is in the form of a series of short ‘letters’ written to friends, most of whom seem to be based in Melbourne’s café culture. The stories
              are short and simple enough to read over a café latté in a chic espresso bar and give a sense of the pace of life in Byron Bay and some
              of its more colourful fringe dwellers and local entrepreneurs. The tales he spins are sometimes reminiscent of the bizarre short stories
              by Peter Carey. The author appears ambivalent towards some of his more alternative characters. Often, his judgement of these characters
              becomes antagonistic, similar to the cynicism seen in P.J. O’Rourke’s stories. However, there is a sense that the author is ultimately sympathetic
              to his characters and their causes. Indeed, he may even be one of them himself. During those moments in Letters From Byron when the author
              is at ease, the reader is reminded of another comic writer. As he relaxes into his role as story teller, the riotous antics and vaudevillian
              frivolity of the likes of Tom Sharpe can be seen in his character development. In these instances, his potential as a teller of tales shines
              through and the reader is left wishing for more. However, throughout the book there is often a sense of self consciousness. Sometimes parts
              of some of the stories seem far too wordy. There are also occasions where the stories become bogged down in the technicalities of the subject.
              For example, in one story the author concentrates on the use of the internet and computers as a focus for his ideas. Rather than exploring
              the story’s central characters in more detail, he labours over lengthy explanations of his understanding of how the technology works. For
              a while it seems as though one is reading a beginner’s text on the theory of computing and the internet. It is only after this brief lesson
              that he rejoins the essence of his story. In this case, one with lots of imagination on and potential. At times, it is not until near the
              end of a story that the pace picks up and then within a dozen paragraphs the colourful ideas quickly form but end prematurely. Just as a
              story becomes interesting and gathers momentum, usually in a bizarre kind of way, the reader is left up in the air only to imagine what
              might have developed. A particular favourite was ‘The German Couple’ story in which the author describes an out of body experience. Whilst
              visiting a mysterious ‘new age’ couple’s house somewhere in the Byron region, the author tells of a mystical and disturbing experience while
              in a trance. The story begins with a cynical view of all things not scientifically based. However, by the end of the story, the author is
              bedazzled by his experiences and can only wonder at what might be. Overall, a light and easy read. A good companion while biding your time
              over an aromatic cappuccino in your favourite café.
        - title: Australian Book Review Review
          text:
              "Shorts Letters From Byron Andrea Moss Australian Book Review , No. 197, December 1997/January 1998 ‘There always seems to be a fine
              line between the real and the unreal, especially here on the North Coast’. So writes Jim Williams to a friend ‘down South’. This slim volume
              of letters is written from colourful Byron Bay and surrounds, where he leads a somewhat nomadic existence among eclectic Byronites. The
              letters form a window into Williams’ life, the oddities of Byron Bay, and the bizarre experiences that Williams finds himself having: which
              may or may not be figments of his imagination. The mysterious yiralinga, Artificial Intelligence experiments, animal sacrifices, out-of-body
              experiences, toughs in search of valuable Argentinian manuscripts, ethereal people who disappear without a trace... all are treated with
              Williams’ entertaining description and detail. Each letter details the strange twists and turns of the episodes and escapades, merging a
              spectrum of topics with storytelling, myth-making, spirituality, local history, science and even social commentary. And each letter ends
              with a decidedly fanciful twist and a lurking sinister tone. We are left to come to our own conclusion about what portion of each story
              exists solely in the letter-writers imagination: if any. While light-hearted and humorous, there is a tone of underlying cynicism about
              the Byron Bay ethos, and its ultimate superficiality and emptiness. The letters become more enjoyable and engaging as the book progresses,
              and have a cumulative effect of drawing the reader into Williams’ curious world: ‘Even I wonder what sort of world I live in up here’."
        - title: Star Weekend Review
          text:
              "Paperbacks: Letters From Byron Jo Martin Star Weekend There’s something deliciously forbidden about reading other people’s letters.
              From the comfort of anonymity, one can quietly disrobe the shrouded secrets of others. That’s why Letters From Byron , by Jim Williams is
              such a dainty morsel - especially for locals who may wonder as to the identity of some of the characters. ‘It is a collection of letters
              written to genuine people over a period of about 18 months,’ Mr Williams said. ‘It has only cost me one friend so far.’ ....Jim Williams
              is best known for his poems, particularly haiku, that have appeared in magazines and journals everywhere. Mr Williams now lives at Bullarto,
              Victoria. But his heart still is in Byron Bay. ‘I lived in this area for about five years,’ he said. ‘Mainly in Suffolk Park, Ocean Shores
              and Lismore. I see this whole area as The Golden Triangle. People come here to live out their dream and that is reflected in all the companies
              you see around here.’ Letters From Byron is a close-up of a handful of these dreams set amid the day-to-day goings on around town. The joy
              of the letters is that it’s hard to tell where reality begins and ends. ‘I have always enjoyed writing letters but sometimes I get the feeling
              that they have managed to go far beyond my actual experiences. They began as letters but became stories,’ Mr Williams said. There’s the
              one about the uncanny beach burials, the sinister carers, and the mysterious influence of the lighthouse. Mr Williams weaves intriguing,
              funny, sometimes unsettling but delightful tales of the unexpected."
the-truth-is-longer-than-a-lie:
    title: The Truth is Longer Than a Lie
    author: Kieran Carrol
    short_description:
        The Truth is Longer than a Lie tells the crossover stories of the separate families of Amy and Spiderman, and of an anonymous
        child, whose story we hear in voiceover. It is a family drama.
    long_description:
        "ANDREA: I married this man because I loved him and I thought he loved me, but since our daughter was born he pays every minute
        of his attention to her. I mean, I would never want him to be neglectful or be uninterested in her activities—but, doctor, I think my husband
        has an unusual fascination with our little girl … BEN: Whatever I did to Amy I did it out of love…I did it because she was the only person
        I idolised and cared about. I could only see the point of life when I gave all my love to her. The Truth is Longer than a Lie tells the crossover
        stories of the separate families of Amy and Spiderman, and of an anonymous child, whose story we hear in voiceover. It is a family drama.
        The adults Ben and Andrea or Rod and Paula are depraved, complicit or disbelieving. Andrea’s denial is particularly affecting. The family
        culture that Kieran Carroll’s drama unveils is that of child abuse. It is the children we come to know: their shame, their fear of disclosure,
        their urge to self-harm, their small window to healing given by counsellors and by their chance meeting. The authority of their young voices
        in Carroll’s dialogue will grip your heart. They are heroic. In their foreword Neerosh Mudaly and Chris Goddard from Child Abuse Prevention
        Research Australia, state: ‘If we are a moral and just society, we must protect children. If we are to protect children, we have to listen
        to them.’ The Truth is Longer than a Lie wrenches us into listening. This publication was made possible with the support of Monash University
        Peninsula Campus"
    price: 23.0
    isbn: "9781876044831"
    release_date: "2015"
    page_count: 90
    reviews:
        - title: Quadrant Mazagine
          text:
              "A Violent, Tangled Mess The Truth is Longer than a Lie Peter Wilkins Quadrant Mazagine, May, 2016 The statistics on the Australian
              Institute of Health and Welfare websites are frightening. Every year approximately 55,000 children are the subjects of substantiations of
              notifications of neglect and abuse. One in thirty-seven children receive child protection services. Indigenous children are seven times
              as likely to be receiving child protection services as non-indigenous children. As of June 30, 2014, 43,009 children in out-of-home care
              were in relative/kinship or foster home care and 49 per cent of foster care households had multiple children placed. Forty per cent of these
              55,000 children have suffered emotional abuse, 28 per cent have been subject to neglect, 19 per cent subject to physical abuse, and the
              remaining 14 per cent are victims of sexual abuse. Statistics such as these have given rise to a national conversation, highlighted in 2015
              by the appointment of Rosie Batty as Australian of the Year. It is therefore timely that Kieran Carroll’s play The Truth is Longer than
              a Lie should have had its first performance last November. Carroll’s play is an adaptation of the published PhD thesis of Neerosh Mudaly
              and Chris Goddard, which describes the rising incidence of child abuse and neglect in Australia and draws on case studies and true accounts
              by victims, their families, school counsellors, child protection unit workers and other agencies. Carroll’s play echoes with the disturbing
              truth. It is direct, honest and powerful in its simplicity and its depiction of two families entangled in a web of lies, violence and despair.
              Carroll has chosen to focus on two contrasting families. Andrea and Ben, a successful real estate agent, live in an affluent suburb. Their
              teenage daughter, Amy, attends a prestigious school. Since the age of three, she has been sexually abused by her obsessive father, who is
              addicted to child pornography. Paula is a working-class mum, struggling to survive and provide for her son, Matthew, who escapes into a
              fantasy world as Spiderman. After the failure of her disastrous and abusive first marriage, Paula married Rod, who has become more violent
              and abusive as their marriage has deteriorated, and Matthew has once again become the innocent victim. Andrea is in denial, while Paula
              finds herself powerless to escape the horrible circumstances that confront her. Gradually, Amy and Paula are both forced to recognise the
              terrible consequences of their situations and seek urgent help. Amy confides in her school counsellor, Janice, while Paula seeks the assistance
              of the child protection unit after Rod has been shot by police who were responding to a report of domestic violence. Amy leaves her home
              to live with her best friend Jodie and her mother, while Paula takes Matthew to live with his grandmother. Carroll relates the stories of
              Amy and Matthew in twenty-seven short scenes. There is no need for elaboration or theatrical artifice. Each scene depicts a stage in the
              journey towards resolution, as we observe the eventual destruction of relationships and the family unit and of the physical and psychological
              well-being of the two children. Occasionally, the scenes are interspersed with the verbatim voiceover accounts of a ten-year-old child.
              Though brief, they are a gut-wrenching testament to the horror of abuse of the innocent. Carroll cleverly avoids the pitfalls of moralising
              and sensationalism. His short scenes allow his audience to draw their own conclusions about the morality of the perpetrators’ actions. There
              can be little doubt, given the raw realism of the dialogue and the reality of the setting of each scene in a home, at a nightclub, at the
              child protection unit, in a hospital or at a railway station, where Amy saves Matthew from leaping beneath a train. These are real people
              experiencing real abuse, struggling to repair their broken lives and confronting their fears. Carroll’s world contains no fantastic invention.
              His aim is not to excite our imaginations, but to provoke us to take responsibility as citizens to recognise, admit to and act upon a social
              injustice, indeed a crime that needs to be justly and effectively dealt with, not only for the sake of those who are suffering but also
              for the welfare of society. Carroll’s narrative is simply told, but its message is complex. Like Mudaly and Goddard, he shows that only
              through intervention can any possibility of resolution be reached. It may be the intervention of the police, acting upon a report by a neighbour.
              It may be because of the meeting between Amy and Matthew. It may be because of their referral to the child protection unit and the sympathetic
              and enlightened actions of Bronwyn, the child protection officer. While it is clear that Ben and Rod are the perpetrators of the terrible
              abuse, Carroll is careful not to apportion a stark, ill-considered judgment. He demonstrates the obsessive nature of Ben’s sexual addiction
              and Rod’s abuse as a child at the hands of his father, acknowledging that the abused may become the abusers. He will present the empathetic
              professionalism of Bronwyn in contrast to the ignorant ineffectualness of her colleague Danielle. All the pieces of this complex puzzle
              are laid out in a drama that is provocative and compelling. Only truth can fit these pieces together to make these people’s lives whole
              once more. Whatever agents of resolution Carroll is able to conjure in his short play, the damage remains. Andrea remains unable to say,
              “I believe you,” to her daughter. Matthew no longer needs to believe he is Spiderman, but the memories and the pain remain. Ben and Rod
              face ruined lives. Each character at the close of the drama remains a victim. The final scene expresses hope for Amy and Matthew as they
              find comfort in each other’s company and shared experience. The Truth is Longer than a Lie is a thought- provoking and moving account of
              the destructive nature of child abuse and domestic violence in a society purporting to be open, free and just and governed by laws designed
              to protect and nurture. Carroll’s adaptation of the Mudaly and Goddard book deserves to be played on a multitude of stages. The play is
              deliberately confronting, although I suspect it has avoided cases that have had more violent and deadly consequences. It is an important
              vehicle for further debate and would provide an excellent resource for discussion after a performance. Matthew’s outburst will constantly
              remind us of our obligation to listen and believe: That’s always the problem with these people [professionals], they don’t want to believe
              the truth, they want to believe the easiest side ... They don’t want to hear the truth because the truth is so much harder to understand
              and so much longer than a lie about the truth. Carrol has exposed the lie with scalpel-like precision and compelled his play to utter a
              truth that cannot be ignored. Peter Wilkins is a theatre reviewer for the Canberra Times ."
dont-ever-let-them-get-you:
    title: Don’t Ever Let Them Get You!
    author: George Dreyfus
    short_description: As ever, he is restless and irascible. Don’t Ever Let Them Get You!
    long_description:
        Ladies and Gentlemen Black Pepper proudly presents the one and only, indefatigable, direct from Camberwell Junction, George
        Dreyfus! As ever, he is restless and irascible. Don’t Ever Let Them Get You! is a book about the Holocaust, reconciliation and faith in the
        face of commercial pressures, the imperative of instant appeal and the moral vacuum of the post-modern age. George Dreyfus provides answers
        to the question of survival as a composer in the face of life’s slings and arrows. Unabashedly he places himself at the centre of half a century
        of serious - and not-so-serious - music-making in Australia, including his ground-breaking involvement with Aboriginal music in the 1960s
        as remembered by Jennifer Isaacs. Dreyfus focuses his famous and often vengeful wit on antagonists and sponsors, audiences and colleagues,
        critics and fans. Rosemary Richards tells of a one-night resounding success and John Whiteoak provides a more objective account of the memorable
        band music he has created along the way. The text is generously illustrated with musical examples and photographs and a complete catalogue
        of his works is included. If he had no musical ability, Dreyfus could easily have made a living as a stand-up comic. Ian Robinson, The National
        Times
    price: 25.95
    isbn: "9781876044602"
    release_date: "2009"
    page_count: 186
    reviews: []
said-the-rat-writers-at-the-water-rat-2000-2003:
    title: Said The Rat! Writers at The Water Rat 2000-2003
    author: Jennifer Harrison and Phil Ilton
    short_description:
        "The readings at the Water Rat Hotel at the edge of the city in South Melbourne lived in interesting times. They broke the
        lull. Writers responded to September 11, Tampa and paused to watch Cathy Freeman run. Audience and readers came from all over: country Victoria,
        interstate and overseas. Said the Rat! celebrates those nights."
    long_description:
        "The readings at the Water Rat Hotel at the edge of the city in South Melbourne lived in interesting times. They broke the
        lull. Writers responded to September 11, Tampa and paused to watch Cathy Freeman run. Audience and readers came from all over: country Victoria,
        interstate and overseas. Said the Rat! celebrates those nights. Contributors Andrew Zawacki, Maurice Wirth, Lauren Williams, Sean Whelan,
        Chris Wallace-Crabbe, Dimitris Tsaloumas, Hugo Toonen, Hugh Tolhurst, Patricia Sykes, Jennifer Strauss, Maurice Strandgard, alicia sometimes,
        Sarndra Smith, Steve Smart, Alex Skovron, Jean Sietzema, Michael Sharkey, Andrew Sant, Philip Salom, Brendan Ryan, Robyn Rowland, Jacob G.
        Rosenberg, Judith Rodriguez, Pauline Reeve, Ron Pretty, Peter Porter, Dorothy Porter, Melissa Petrakis, K.F. Pearson, Geoff Page, Barbara
        Orlowska-Westwood, Suniti Namjoshi, Les Murray, Peter Murk, Ashlley Morgan-Shae, Alex Miller, Tim Metcalf, Meg McNena, Sandon McLeod, Lorraine
        McGuigan, Patrick McCauley, Ian McBryde, Chris Mansell, Garth Madsen, Myron Lysenko, Earl Livings, Ray Liversidge, Lish, Sheridan Linnell,
        Emma Lew, Joyce Lee, Phil Leask, Doris Leadbetter, Alana Kelsall, Manfred Jurgensen, John Jenkins & Ken Bolton, Janet Howie, Jillene Hone,
        Nguyen Tien Hoang, Sandra Hill, Matt Hetherington, Kristin Henry, Kevin Hart, Susan Hampton, Philip Hammial, Kathryn Hamann, Katherine Gallagher,
        Adrea Fox, Lesley Fowler, Lorin Ford, Wendy Fleming, Tony Fairbridge, Diane Fahey, Ross Donlon, Carla de Goede, Glenda de Bont, Charles D’Anastasi,
        Fred Curtis, James Cristina, Annie Condon, Sherryl Clark, Helen Cerne, Edward Caruso, John Muk Muk Burke, Pam Brown, Megan Brown, Kevin Brophy,
        Gillian Bouras, Rory Barnes, Connie Barber, Ali Alizadeh, Jordie Albiston, Adam Aitken"
    price: 15.0
    isbn: "1876044446"
    release_date: "2003"
    page_count: 221
    reviews:
        - title: Australian Book Review Review
          text:
              "Past the Itch Brian Edwards Australian Book Review, No. 264, September 2004 This new anthology commemorates monthly readings conducted
              at The Water Rat Hotel, South Melbourne, from March 2000 to December 2002, each of which presented a guest writer from overseas or interstate
              together with a featured local writer and an open section. The rich variety of the exchanges is immediately evident in this collection,
              which is notable not only for its diversity but also for the general assurance and interest of the selections. In all, there are 123 pieces
              of writing, from ninety-three writers. In ‘The Beekeeper’s Directory’, Andrew Sant presents a discontinuous history through the figure of
              the bee-keeper, a link across countries and time that is suggested in the common busyness of bees and the golden nourishment of honey. It
              is a tracery of family, generations and inheritance, an act of mnemonic retrieval that Philip Salom addresses in terms not of honey but
              of figs (‘these metaphors which took me past the itch / metaphors stand in for’). In ‘The Family Fig Trees’, fig trees are displaced by
              family trees in an act of recovery of ‘the old Sephardic bloodline’ denied by claims ‘we were English, and Spanish married into Welsh’,
              designations that, ‘like watermarks’, cannot efface others. Represented here by three poems, Emma Lew’s writing is hauntingly suggestive.
              Her spare diction plays between the literal and the symbolic as she explores the unreality of realities - a man struggling with words, a
              speaker demonstrating her selves, and a traveller in other people’s lives. In Lorraine McGuigan’s ‘Husk’, the metaphor is literalised as
              ‘she’, reduced, bound in hospital sheets and then unravelled, ‘begins to crumble / to collapse to fall inward / until she is nothing / but
              powder’. Her poem ‘Cocktail Hour’ is also sharp in feeling as it evokes in carefully measured language a woman’s (‘the poet’s’) loving attention
              to a suffering man, ‘washing him young again’ with a sponge and with words. Real or imagined, places are always important, and in this collection
              they vary from the effective detail of Katherine Gallagher’s ‘My Mother’s Garden’, with its notion of talking to mother ‘through the soles
              of my feet’ and Doris Leadbetter’s sensuous hymn to the Yorkshire moors in ‘Northern Summer’, to Kevin Hart’s ‘Finland’ as a place ‘I can
              do without’. In Edward Caruso’s ‘Walls’ and Ron Pretty’s ‘Epiphany Perhaps’, place expands to incorporate vastnesses of space and time and,
              in the latter, contemplation of signal moments in the sweep from creation to apocalypse. Kevin Brophy’s ‘Morning’ presents markers of place
              in a short narrative of family routine that becomes also a meditation on life values and the threat of death. Among various tributes to
              artists and to art, Chris Wallace-Crabbe, in ‘Reading Smoke with Orpheus’, acknowledges mortality, debts to the past and the power of art,
              which ‘for a while, after all, / keeps fingernails of the maenads well away / and a head on your shoulders’. Alex Skovron’s ‘Dreams of Dead
              Poets’ offers an ironic vision of fame obliterated by thoughts of inadequacy and of what must yet be discovered: ‘like a poet at night,
              in one last desperate quest: /I must find Milton, Botticelli, Bach. / There are some urgent things I need to know.’ Taking up the old association
              of madness and creativity, Hugh Tolhurst begins disarmingly: ‘Going crazy is quieter for me these days.’ His ‘Rockling King’ is witty, a
              well-controlled consideration of the interplay between Dionysiac excess and ideas of security, of ‘safe mooring’. For humour, there is Michael
              Sharkey’s modulated satire of television soaps with characters ‘so / Gorgeous in their kitchens’, ‘beautiful in crisis’. Indeed, ‘Where
              do they all go, when the cameras / Are asleep?’ Given the precious banality of soaps, we can even begin to enjoy the ad breaks. There is
              a broader comedy in Myron Lysenko’s ‘Sex at the Poetry Workshop’, an amusing short narrative that interfuses workshop and playhouse as poets
              discuss their metaphors while awaiting the arrival of a love-starved woman who will select one of them ‘for a safe one-night stand’. Amongst
              the considerable range of poetry, the collection also includes a number of prose pieces. In an extract from Journey to the Stone Country
              , Alex Miller presents a compelling short portrait of Annabelle Küen, forty-two, who arrives home to discover unexpectedly that her husband
              Steven has left her. Fifty, an academic working on biography, he is sometimes held to be dull. He has left a letter on the hallstand and
              we have only Annabelle’s point of view, her reaction shaped as self-criticism: ‘he would be admired, even envied, for his conquest. He would
              not need her again to defend him against the charge of dullness.’ It is an astute piece of writing built through an accumulation of deft
              touches. From Aphrodite and the Others , Gillian Bouras’s sympathetic portrait of Aphrodite depicts a life of routines constructed according
              to seasonal patterns, religious observations and family matters. She is Greek, old, daughter of a priest and wife of one, a stoic figure
              caught sharply in photographs. Jennifer Harrison and Phil Ilton deserve congratulations for the readings and for the anthology. Those monthly
              readings continue, at Molly Bloom’s, in Port Melbourne."
        - title: Malleable Jangle Review
          text:
              Said the Rat! - Writers at The Water Rat 2000-2002 Richard Hillman Malleable Jangle (online), No. 4 Beside the large number of poetry
              anthologies currently available it might be difficult to find one that makes a point of distinction, stands out from the others, or offers
              something else but Said the Rat! has done just that and much more. One of the problems with a collation that covers the history of Australian
              poetry is that it often will confine itself to periods of time and to particular styles of writing. Finding an anthology that showcases
              a wide range of contemporary Australian poetry has never been a simple thing, often complicated by a focus on established poets with little
              regard for the innovative and up-coming poets that surround their lives. Said the Rat! offers a mixture of emerging and established writing
              from all over the continent, providing readers with an opportunity to notice the diversity, originality, and intelligence of Australia’s
              poets. As with all anthologies there is always that stand out poem or peculiarity of image that captures the heart or the imagination. In
              this instance I was struck by the creativity of Sarndra Smith’s ‘Last Detail’, reminiscent of Michael Ondaatje’s writing in its use of the
              eye dropper filled with salt-water to bring the ocean life back to her ex-sailor father on his death bed. An oddity could have been a Geoff
              Page poem that was not a rhyming poem. I was disappointed in three contrived poems from Les Murray but was deeply moved by the integrity
              of Ray Liversidge’s elegy for his father called ‘Baudelaire the bricklayer’. Many of the poems from well-known poets come from current collections
              and, if read before, will not offer the surprise of reading; for those who have not read widely Said the Rat! will generate more than a
              few moments of excitement and many hours of enjoyable reading.
to-whom-it-may-concern-and-other-plays:
    title: To Whom It May Concern and other plays
    author: Daniel Keene
    short_description:
        Described by the author as A Little Bumper Book of Plays, To Whom It May Concern is a collection of eight plays by multi-award
        winning dramatist Daniel Keene. All works are from the acclaimed Keene/Taylor Theatre Project. Their stories forge what Geoffrey Milne has
        called "a poetics of dignity in despair." Occasionally theatre delivers something quite extraordinary. Sitting in the poverty-marked surrounds
        of The Brotherhood of St Lawrence furniture warehouse, watching three more of Daniel Keene's plays in his collaborative project with director
        Ariette Taylor, more than tears were brought to my eyes. It was as if a hand had reached into my chest and squeezed my heart until it hurt.
        These plays are so everyday on the surface yet they articulate in their gaps and silences a profound sense of human worth. Helen Thompson,
        The Age
    long_description:
        Described by the author as A Little Bumper Book of Plays, To Whom It May Concern is a collection of eight plays by multi-award
        winning dramatist Daniel Keene. All works are from the acclaimed Keene/Taylor Theatre Project. Their stories forge what Geoffrey Milne has
        called "a poetics of dignity in despair." Occasionally theatre delivers something quite extraordinary. Sitting in the poverty-marked surrounds
        of The Brotherhood of St Lawrence furniture warehouse, watching three more of Daniel Keene's plays in his collaborative project with director
        Ariette Taylor, more than tears were brought to my eyes. It was as if a hand had reached into my chest and squeezed my heart until it hurt.
        These plays are so everyday on the surface yet they articulate in their gaps and silences a profound sense of human worth. Helen Thompson,
        The Age
    price: 22.95
    isbn: "1876044330"
    release_date: "2000"
    page_count: 123
    reviews:
        - title: Marisa Mastrocola, Togatus
          text:
              To Whom It May Conern and other plays Marisa Mastrocola. Togatus , March 2001 I approached my first reading of this book of eight short
              plays incorrectly. At first I read the plays in a random order and ended up having to put the book down in confusion. I found it easier
              to read these plays in order; a greater sense of the people Keene writes about becomes apparent. In this second reading I became drawn into
              the poetry of Keene’s writing, as well as the unusual style he has presented these works in. Keene’s characters are not those of contemporary
              society; they are usually depicted through their simple struggles and their subtle madness. Each character pulls at your heartstrings and
              is timeless. We never know the names of each character yet somehow we do know them; we have met them somewhere before or are going to meet
              them somewhere in the future. Keene’s lack of punctuation was at first very distracting, but through perseverance I discovered my own rhythm
              in the dialogue. This lack of punctuation creates a sense of building and allows the reader (or performer) to utilise their own creativity
              in setting a pace and rhythm. This also applies to the lack of stage directions. It is in this void that the imagination flourishes and
              takes each play into its own realities. The only use of punctuation is the question mark. Keene has left it open for any one of us to question
              the remarks made by the characters. After all, whose truth is it and what is it all founded in? Let these eight short plays give you a peek
              into moments that are quite unexceptional yet are revolutionary.
        - title: Palz Vaughan, Herald-Sun
          text:
              Front Row Brave play Palz Vaughan Herald-Sun , 27 February 2001 Since it was founded in 1995, the publishing house Black Pepper has
              published 14 fiction and 22 poetry titles. Co-publisher Kevin Pearson has decided to branch out into publishing plays. The inaugural volume,
              To Whom It May Concern and other plays , is by critically acclaimed author Daniel Keene. ‘In some way it’s a brave venture,’ Pearson says.
              ‘Across the ages the best writers have been dramatists. Daniel Keene’s work is more pithy and moving than much of the fiction around at
              the moment. If Henry Lawson had written plays, this ( To Whom It May Concern ) is what ‘The Drover’s Wife’ would look like.’
        - title: Social Alternatives Review
          text: To Whom It May Concern and other plays Melissa Ashley Social Alternatives , Vol. 20, No.3, August 2001 (pgs 56-58) [Text not yet available]
        - title: The Big Issue Review
          text:
              "BOOK BRIEFS Chris Boyd The Big Issue Black Pepper has just published a slim collection of recent plays by Daniel Keene, all of which
              were written for the Keene/Taylor Theatre Project. From humble beginnings in a Fitzroy Brotherhood of St Laurence furniture warehouse, in
              which highly stylised and poetic encounters between down-and-outs were played out, the project has become something of a juggernaut, attracting
              rave reviews and huge interest from the theatre community. Thespians are falling over themselves to offer their services. But the reception
              has been troubling, with some critics and performers seemingly revelling in getting down and dirty. But as poet and critic Alison Croggon
              eloquendy argues in the preface of To Whom It May Concern and other plays , Keene’s phrasing owes more to Beckett than it does to Wesker.
              These are not - or at least not merely - tales of the working class. Nor is Keene (merely) the people’s poet. Ironically, rave reviews have
              obscured the significance of the plays which, at their best, jostle in bleakness and beauty with Beckett’s. Few other Australian playwrights
              would have the sensibility (or the balls) to write a line like this: ‘You crawl out of your old mum and into your f***ing grave.’"
        - title: The Age Review
          text:
              The New Jerry Lewis? The Age , 28 September 2004 The French just can't get enough of Aussie playwright Daniel Keene, best known on his
              home soil for the now disbanded Keene/Taylor Project. More than 50 productions of Keene's work have been staged in Belgium and France since
              2000, and one of the latest, To Whom It May Concern , takes the eclair when it comes to accolades. Keene's wife, Alison Croggon, reports
              that a critic on France Culture radio believed it to be the most significant theatrical event in Paris since 1953 when Samuel Beckett's
              Waiting for Godot opened. The French have also been quick to adopt Keene as their own, with publications such as Le Monde , L'Humanite and
              Figaro touting him as a major new voice in "European" theatre; in other good news, the overcoat Keene lost during his last visit to Paris
              has miraculously resurfaced in the wardrobe department of La Cartoucherie.
the-falling:
    title: The Falling
    author: Alan Loney
    short_description:
        The Tangiwai rail disaster of Christmas Eve 1953 touched the lives of thousands of New Zealanders. Alan Loney was 13 years
        old at that time, and the deaths of a schoolboy friend, Robert Hale, and his mother Eileen Hale, have haunted the life and often the writing
        of the poet for over 45 years.
    long_description:
        The Tangiwai rail disaster of Christmas Eve 1953 touched the lives of thousands of New Zealanders. Alan Loney was 13 years
        old at that time, and the deaths of a schoolboy friend, Robert Hale, and his mother Eileen Hale, have haunted the life and often the writing
        of the poet for over 45 years. In trying to understand why this connection was so strong, or what was the real reason this event persisted
        in the poet’s memory, Alan Loney took a journey into the lives of these two of the 151 who were killed on that fateful night. The interrupted
        journey of the train takes Alan Loney on a journey into his own unconfronted childhood, to his home town where most of what he knew as a child
        has been destroyed - the houses where he and Robert lived, the bridge that was a passageway between them, and other places where a childhood
        with its share of pain, violence and confusion was lived. All journeys lead to their beginnings. And in searching for the graves of those
        who have died the author discovers the way to how he has lived, and to how he might live in the future. In standing by the site of the disaster
        in the dark of night, he has been able to come to terms with the darkness of his own life. This is a poet’s memoir, written poetically, yet
        the vividness of its detail is conjured up by a relentless prose that does not flinch in the face of the hard truths that the author has had
        to accept. It is a book full of extraordinary insight and compassion.
    price: 25.95
    isbn: "1869402502"
    release_date: "2001"
    page_count:
    reviews: []
the-printing-of-a-masterpiece:
    title: The printing of a masterpiece
    author: Alan Loney
    short_description:
        "Alan Loney ’s interview about The printing of a masterpiece was broadcast on NSW Radio 2SER on the 14 July 2008 episode
        of ‘Final Draft: Books and Writing.’ In a charming interview with Benedic t Taylor former New Zealander and Australian resident Alan Loney
        reveals insights into his philosophy and art (click here for podcast: note - the Loney interview starts at 17 minutes 05 seconds into the
        show)"
    long_description:
        "I cannot think of any work that resembles The printing of a masterpiece . It is a memoir of the flowing intermesh of typography,
        ink-and-paper, Renaissance cultural history and deeply personal, hands-on knowledge. It is about the printing of an exquisite book, an object
        in which every stage of craftsmanship has been scrupulously considered. Inside the printer’s narrative there grows, like something marvellous
        in a tropical aquarium, Leonardo da Vinci’s incipient book on Nothing. The printing of a masterpiece pays its tribute to predecessors and
        exemplars; to Aldus Manutius, Joseph Moxon or Eric Gill. The reader is gently led to feel inward with Process. It’s a book about making, and
        about understanding. We come away knowing a great deal more than we did. Alan Loney is a beautiful stylist - lucid and compelling. He takes
        us into the heart of that question: How is a book actually made? It is an ultra-fine book whose growth he charts, but what happens happens,
        in petto , with all printed books. I have never seen paper, ink or type described in such a sexy way, let alone the character of pen nibs.
        For all its refinement of style and subject matter this text is, as my late Professor used to say, a rattling good read. Chris Wallace-Crabbe"
    price: 26.95
    isbn: "9781876044589"
    release_date: "2008"
    page_count: 126
    reviews:
        - title: Fiona Capp, The Age
          text:
              The printing of a masterpiece Fiona Capp, The Age , 5 July 2008 This gem of a book will delight anyone who takes pleasure in books as
              physical objects and who is interested in the traditions of the hand-made book. Printer and writer Alan Loney takes us through the making
              of one particular book, which he printed on black paper in gold ink with text from Leonardo da Vinci's writings on Nothingness. But The
              printing of a masterpiece is not simply a description of the process of making a book. It is a meditation on the aesthetics of the hand-printed
              book - the halo effect around letters, the colophons that provide a brief description of the book's printing history, the handmade paper,
              the typography, the design and so on. Loney's passion for these arcane details is communicated in playful prose reminiscent of writers such
              as Italo Calvino and Umberto Eco. In this beguiling essay he invites us to take our time and savour the craftsmanship of a finely made book,
              the alchemy of text, ink and paper.
        - title: Newsletter NSW Guild of Craft Bookbinders Inc Review
          text:
              "Alan Loney's The printing of a masterpiece Michael Small Newsletter of the NSW Guild of Craft Bookbinders Inc. March 2009 Alan Loney
              is clearly a man in love. He is in love with the layout of a page, the balance of space and positioning of text, the way the eye moves across,
              up and down words and images. He is in love with the feel of paper, its finish, its weight and how light is reflected or absorbed. He is
              in love with the viscosity of ink and how the gentlest of touches between type, ink and paper involves a chemical reaction. He is in love
              with how a binding protects and enhances a book’s content and completes its balance and beauty. He is even in love with his cranky old Albion
              printing press, which on one day can give him perfect results and on the next an unfathomable mess. Poet, writer, publisher and printer
              Alan Loney has written an ode to his love of printing fine books by describing the creation of his ‘masterpiece’, Leonardo on nothingness.
              Each chapter describes one part of the process of making a book, from the initial slowly evolving idea of its creation, to design, to choice
              of paper and ink, to the actual printing and binding and even the creation of a suitable colophon. In a chapter on ‘The printery as cosmological
              haven’, Alan evocatively describes his workshop: After all, it is a special environment, where slow, careful, meditative thinking is the
              rule; where a book and its designer/printer have the time to grow into the project, for the ideas around it to come and go as they need
              to; to watch the work take shape in ways that are sometimes surprising and unexpected; to allow the concentration needed to have its intense
              focus and imagination its full rein. And, having been given an early glimpse of this haven, Alan later shares with the reader the rhythmic
              ritual and dance that is the preparation for each day of printing, the repetitive process of the printing of the pages, and the methodical
              cleaning and re-arranging of his printery at the end of each day to allow tomorrow to begin afresh. He weaves his way, and ours, through
              the sequences of preparation for putting ink to paper, each task a labour of love. And when faced with a difficult decision about what materials
              to use in the final binding he adopts the strategy many of us use when faced with such a dilemma: Aha! But I am not trusting the process
              am I? I have removed myself from the arena and tried to solve the problem by thinking from the outside in – What fabric will go with the
              book? – has been my question, rather than letting the answer come from the process of making. The result of my marinating then has been,
              not to provide a solution, but to send me back to the printery. I try the oblique approach. I’ll tidy up. The Printing of a Masterpiece
              is much more than a description of a process, however. It is a beautifully crafted journey of creativity and a reflection on a life’s work
              of striving to produce something so perfect it leaves you feeling deeply fulfilled. Fulfilled, but still wanting to experience the masterpiece
              described: can it be held, can the weight of it be measured, can its words and images be experienced?"
        - title: Parenthesis Review
          text:
              "The printing of a masterpiece Andrew Johnson (Gabriel Press, Cambridge) Parenthesis , The Journal of the Fine Press Book Association
              (UK & USA), No. 16, February 2009 This is an intriguing book through which, as Alan Loney said recently in a broadcast, the author ‘wanted
              to talk to the general reader.’ Those who read Crispin Elsted’s review in Parenthesis 13 will know of Loney as a New Zealand poet and hand-press
              printer/publisher now living in Australia. The printing of a masterpiece purports to be an account of designing and printing Leonardo on
              Nothingness at, according to his title page for it, ‘his private press, Utopia.’ The absence of the preposition highlights the ambiguity
              Loney revels in: is Utopia the name of the press or the place? He did produce Leonardo on Nothingness for his Electio Editions in 2004 and
              in 21 short sections he takes us through some practical questions of its making (what is the best font, ink, and paper to use; how much
              of it do I need; how do I keep the paper damp without it going mouldy in a warm climate; how do I print black illustrations on black paper;
              and so on), meditations on the vocational activity of achieving a book and philosophical explorations on the nature of nothingness with
              passing references to Heidegger and Wittgenstein. His first glimpse of the idea of a book as an object in itself came to Loney in his early
              twenties, when he had access to a large library in a private house. Here he caught the sensuality of leather bindings with their raised
              bands and gilded tooling, the rough feel of thick paper and impress of type, all independent of content. The delight in the sheer physicality
              of the book has not left him, as he details the decisions he needs to take, including the economics of it all. Where to begin? The preference
              he states here is not to plan rigidly to the last detail before starting (‘from the outside in’) but, having made certain basic choices,
              to allow the book to develop, so that, for example, the title page could be the last thing he designs once all else is printed. His section
              on choice of font gives us a flavour of him at work: Gill Sans for his minimal text (fewer than 800 words over a dozen or so pages), for
              its absence of the classically carved form he wished to avoid and its warmth relative to other sans serif fonts. The text he printed for
              his Electio edition, however, uses the type he explicitly rejects in this utopian book, Mardersteig’s Dante. Loney’s ‘masterpiece,’ we realise,
              is the book he might have printed but didn’t and this account is the story of what might have happened had he done so. The teasing becomes
              clear. ‘It is a great book,’ he writes in his introduction, ‘but I am aware that this is ambiguous.’ The ambiguities lie not solely in the
              reasons he gives but also in the fact that, like nothingness itself, the volume does not exist except in his (and through his description
              of it, the reader’s) imagination. He succeeds in his wish ‘to convey something about what I have come to understand about being in the world
              as a creative person,’ making great metaphysical claims for his occupation. One section is called ‘The printery as cosmological haven,’
              an ordered universe in which all phenomena in space and time coexist. For Loney, the book becomes a ‘hallowed’ object, ‘for’, to adapt the
              words of the fifteenth-century lyric, ‘in this room conteynyd was / heven and erthe in lytyl space.’ With his tone of considered conversation,
              he conveys what it might be like to be a printer and what it is like to be reader. Why have a title page and running titles, he asks: are
              we ‘likely to forget what book we are reading, as if I might mistake this excruciatingly erudite tome on particle physics for a romance
              novel and wonder why I don’t seem to be getting to any juicy bits.’ The printer and writer become readers too: the slow pace of typesetting
              certainly sharpens up one’s responses to the text. To those unattuned to Loney’s ‘gnomic utterances’ (see Roderick Cave’s reminiscences
              of him in Matrix 26), relax and treat yourselves to a series of paradoxes: the fiction of a book which does not exist, on a topic which
              does not exist, citing an author who does not exist (his Leonardo is also a construct of Loney’s readings and adaptations). Relish the fact
              that perfection is unattainable. The masterpiece which qualified the apprentice craftsman to join the guild turns out to be elusive as he
              approaches the next transition. Few books on printing invite you to consider that death is the bridge between being and nothingness. Even
              fewer suggest this so entertainingly. Gill’s God can look dangerously like Gill; Loney’s God may well turn out to have a greater sense of
              sparkle and fun."
        - title: SHARP (Society for the History of Authorship, Reading & Publishing) News
          text:
              "The printing of a masterpiece Marcia Karp (Boston University) SHARP News (Society for the History of Authorship, Reading & Publishing),
              Vol. 18, No. 2, Spring 2009 Alan Loney’s masterpiece is a 32-page book, printed on black paper, in an edition of 26, lettered A-Z. Not until
              the final twenty pages of his account of making it does he, who has served literature in so many offices - as writer, editor, printer, and
              publisher - write, ‘tomorrow I begin the new work, the printing of a book by hand’ (pg 81). I give nothing away about this book - printed
              in the usual black ink on the usual white paper - which gives so much to its readers, in quoting the final sentence. This reminds us of
              an honorably shared service necessary in order for literature to thrive: ‘Today I sat down and, with all the time in the world on my hands,
              read the book, literally, from cover to cover’ (pg 111). You might imagine that the pages between tomorrow and today are filled with the
              technical matters of printing. You’d be right. They are, and yet, like the book that comes into existence as we watch, the short title of
              which is On Nothingness: From the Notebooks of Leonardo Da Vinci , this one, nominally about fine-book printing, has to do with everything
              and nothing, so that when Loney finally makes his dummy, shows us how he dampens the sheets - one way to prepare for the black ink of the
              images (upon the black page), another way for the gold ink of the text, and demonstrates, as he composes, letter by letter, with his newly-cast
              type, how much more patient he is than we’d likely be, we have already been well-prepared for those matters and many more. Loney has designed
              Leonardo’s book ‘from the inside out’ (pg 40). His first decision was to use the black paper, but for what, he didn’t know. As he claims,
              and as he shows, by letting us in on his meditations, one thing leads to, or away from, another. The history of the book, that of printing,
              the physical stuff of printing, commerce and art, Leonardo’s notebooks, and Loney’s own poetry, as well as the trust he has in what he knows
              and what he will stumble over, all accompany him from that beautiful paper on the shelf of his printery to the masterpiece in his hands.
              This book, Loney on Loney, is charming. While reading it, you might yearn for the sumptuous texture and intriguing dark and light of that
              fine book, Leonardo on Nothingness . That yearning is Loney’s, too. Yours, however, will come too late, for none of the 26 copies remains
              available. Still, there is another yearning, common - though not all too - that a book fine in other ways can satisfy: the intimate populating
              of ourselves with the language of someone worth listening to. Such a combination is rare enough, but is on offer in Loney’s fine account
              of his yearning to be part of something great. This book, too, is nice enough in the hands; it is a paperback that doesn’t curl and which
              has pages of crisp type with generous margins. Look for Albrecht Dürer’s pressman on the cover, and then judge this book for yourself."
        - title: Cuneiform Review
          text:
              Alan Loney's The printing of a masterpiece Kyle Schlesinger (poet, critic and printer) cuneiformpress.com [New York], 21 May 2008 I
              just read the last page of Alan Loney ’ s moving new memoir, The Printing of a Masterpiece , new from Black Pepper Press. For those of you
              familiar with Loney's elegant and contemplative writing, you will not be disappointed with his latest book - if you haven ’ t read him before,
              I urge you to partake in this feast for the mind and heart. Loney discusses, in glorious detail, a highly personal approach to producing
              Leonardo da Vinci ’ s book on Nothing. I say ‘produced ’ because this book was edited, transcribed, typeset, printed, illustrated, designed,
              distributed, etc. etc. by Loney alone, so to say ‘published ’ or ‘printed ’ would hardly describe the range of activities involved in the
              book ’ s conception and construction. Although few of us will ever see this book (there are only 26 copies) The printing of a masterpiece
              documents aspects of the work in a sturdy, affordable form that will surely take its place among the ranks of Clifford Burke ’ s Printing
              Poetry and Harry Duncan ’ s Doors of Perception . Rich with philosophical nuances and and salt of the earth splendor, this insightful reflection
              on the work of Australia ’ s finest poet and typographer will enrich our understanding of his work and will no doubt inspire generations
              of letterpress enthusiasts and bibliophiles... Do pick up a copy from Black Pepper Press.
in-the-cleft-of-the-rock:
    title: In the Cleft of the Rock
    author: Deborah Masel
    short_description:
        DEBORAH MASEL APPEARED AT THE PARLIAMENT OF THE WORLD’S RELIGIONS IN MELBOURNE ON MONDAY 7 DECEMBER 2009 Deborah spoke on
        The Torah through Paintings and Poetry and appeared in a panel discussion with Victor Majzner, Deborah Masel, Rosemary Crumlin and Helen Light
        focusing on the visual depiction of the Torah.
    long_description:
        Here is the heart of the matter, the quintessence of desire. We do not flee, we do not chase. Here we sit and wait with wilderness
        in our mouths where once was heavenly breast. Here in the stillness of the watch, in a whirl of desert wind, we sit and learn the sacred art
        of travelling. Deborah Masel’s meditations on the Five Books of Moses come from deep study, yet they are effusive. The dialogue between the
        ancient text and the modern writer is dramatic. As she says herself, ‘We are brought out to tell the story, and through the telling we are
        brought out.’ Her insights lift us to a realization of how we may live now. A timeless and timely commentary written from the cleft of the
        heart. Masel’s words shatter old stones to reveal new meanings through a journey that soars from dazzling heights to a place of mystery that
        lies beyond life and death. Mark Baker, Australian Centre for Jewish Civilisation Deborah Masel in this extraordinary collection of prose
        poems cuts to the depth and uncovers the throbbing, achingly beautiful heart of the Torah. Rabbi Ralph Genende Drawing from a rich imaginative
        knowledge of midrashic and hassidic commentary on the Bible, she creates a personal mythology of death and life, darkness and light, void
        and meaning. Passionately searching, her words draw together fragments of hidden beauty. Dr Avivah Gottlieb Zornberg
    price: 27.95
    isbn: "9781876044640"
    release_date: "2009"
    page_count: 228
    reviews: []
the-humming-tree:
    title: The Humming Tree
    author: Bron Nicholls
    short_description:
        The Humming Tree, Memories of an Eccentric Childhood is a captivating collection of stories about childhood. It is a companion
        volume to Bron Nicholl’s earlier An Imaginary Mother . Now the focus is on the father of the family, and his disturbing transition from an
        easy-going, jovial man, into somebody inflexible, harsh and oppressive.
    long_description:
        The Humming Tree Memories of an Eccentric Childhood But there was no canopy of flowers in mid-winter, of course. Even the
        tough, dark-green, pointed leaves appeared to be unhappy, turning brown on their edges, perhaps drought-stricken. I closed my eyes, hugged
        my knees, and the little tree was in flower again—clouds of apricot-pink blossom, the colour of sunrise, and buzzing with thousands of wild
        honey-bees. I was never afraid of the bees. They ignored me, and the dogs. The Humming Tree, Memories of an Eccentric Childhood is a captivating
        collection of stories about childhood. It is a companion volume to Bron Nicholl’s earlier An Imaginary Mother . Now the focus is on the father
        of the family, and his disturbing transition from an easy-going, jovial man, into somebody inflexible, harsh and oppressive. The time is the
        decade following World-War II; the place is the flat, dry country of Northern Victoria, where John Nicholls built up a small but flourishing
        subsistence farm, and then abandoned it, forcing his family into another place, another life. Writing with both a child’s viewpoint and an
        adult’s insight, Bron has created a series of pictures filled with finely-drawn detail, subtle colours, and life’s unavoidable deep shadows.
        The Humming Tree is a biography of the rural poor. There is not a murmur of rancour. It is ‘a fortunate life’.
    price: 25.0
    isbn: "9781876044527"
    release_date: "2017"
    page_count: 118
    reviews: []
an-imaginary-mother:
    title: An Imaginary Mother
    author: Bron Nicholls
    short_description:
        Bron was Phyllis Nicholls’ first child. An Imaginary Mother is an open-hearted memoir of her mother and their intense relationship
        over fifty-six years. Phyllis was a secretive, complex and unpredictable woman. Before her marriage, Phyllis worked happily as a designer
        in Vida Turner’s pioneering textile company. After World War II, with a young family, she had to cope with the isolation of a struggling subsistence
        farm, the tumult of her husband’s conversion to a rigid religion, and her own increasing mood changes between despair, melancholy and joy.
        Yet to the end of almost eighty years, Phyll was also a stoic. She saw her ‘madnesses’ as the inevitable ups and downs of a full life, to
        be worked around with a mixture of courage, stealth, ingenuity and, whenever possible, with humour. An Imaginary Mother is a portrait in which
        the sitter and the painter are both revealed.
    long_description:
        Some days, if the wash hadn’t been too grubby, Mum would scrape the hot ash from under the copper, let the water cool down,
        then plonk me naked into the ‘pot’. Grinning wickedly she would tell me I was being boiled until tender. ‘And then I will gobble you all up!’
        Bron was Phyllis Nicholls’ first child. An Imaginary Mother is an open-hearted memoir of her mother and their intense relationship over fifty-six
        years. Phyllis was a secretive, complex and unpredictable woman. Before her marriage, Phyllis worked happily as a designer in Vida Turner’s
        pioneering textile company. After World War II, with a young family, she had to cope with the isolation of a struggling subsistence farm,
        the tumult of her husband’s conversion to a rigid religion, and her own increasing mood changes between despair, melancholy and joy. Yet to
        the end of almost eighty years, Phyll was also a stoic. She saw her ‘madnesses’ as the inevitable ups and downs of a full life, to be worked
        around with a mixture of courage, stealth, ingenuity and, whenever possible, with humour. An Imaginary Mother is a portrait in which the sitter
        and the painter are both revealed.
    price: 24.95
    isbn: "9781876044770"
    release_date: "2013"
    page_count: 164
    reviews:
        - title: Review of An Imaginary Mother by Valmai Simpsomn
          text:
              An Imaginary Mother - Readers Report Valmai Simpson I read this book eagerly from the outset, it sucked me in immediately, and I greedily
              lapped up the pages. This story validates for me any perceived or imagined weirdness that existed in my own family life. We all want to
              come from a 'normal family' whatever that is, but each family is normal to themselves as this book revealed to me, and I now believe we
              are each meant to be in the particular family unit we inhabit. I found this book so refreshingly honest and frank, and Bron's writing warmed
              me to her eccentric Mother, and indeed created for me a new perspective and appreciation of my own Mother and family. There are aspects
              we hate and aspects we love about our own childhood, and many of us exaggerate the good, and hide the 'not so good' but not so with Bron,
              she tells it how it is. This had quite a cathartic effect on my own somewhat ambiguous childhood memories. Love, however it is demonstrated,
              is the vital ingredient that cements the relationships in a family, along with all the inconsistencies. So I thank Bron for sharing her
              life and giving her readers the opportunity to see into another 'normal' family's life and dynamics, and to witness the brave stoicism she
              employs in the telling of her story. Bron is a storyteller I will certainly read again, as I loved the generosity she extended in An Imaginary
              Mother, of the opportunity to know and appreciate her own journey, her Mother, and in a briefer way each member of her family. I loved them
              all.
        - title: Rochford Street Review
          text:
              "A Heartrending Memoir Georgina Scillio Rochford Street Review , 10 May 2013 This heartrending memoir by Bron Nicholls of her ‘strange
              mother’ is well written and hard to put down. Nicholls’ relationship with both her parents, especially her mother Phyll with whom, naturally,
              she spent more time, was very difficult. Often Nicholls was given contradictory messages and the more she tried to please her secretive
              and unpredictable mother, the more her mother frustrated her and belittled her efforts. As a child Phyll and her younger sister Meg had
              been sent to Sutherland House, an orphanage for destitute children at Diamond Creek in Victoria. They were neither destitute nor orphans
              and never forgave their father for having sent them there. At the Home they were not ill-treated but their hair was cut short, they had
              very few possessions, the food was meagre and they were made to work hard housekeeping or in the farm. Phyll retreated into books and became
              an avid reader for the rest of her life, often living out in her head the events of the books she read. It was an escape into an imaginary
              life which caused her to ‘block’ out many things, including her family. One of the main flaws of the narration in An Imaginary Mother s
              that Nicholls calls her mother ‘Phill’ and at other times - sometimes in the same paragraph - she calls her ‘Mum’. Again, with her father,
              he is both ‘John’ and ‘Dad’ when just she or he would have been clear enough. At times, this proved confusing and one had to re-read the
              piece to find out who are the people mentioned. There are also sections of the story where we are left wondering what happened next. For
              example, the horrendous bus trip with Nicholls and Nicholls’s very sick sister was described in great detail and is very moving. But as
              the author changes subject immediately, the reader is left high and dry and not knowing what was wrong with girl: did she recover? Later
              on in the story, the girl reappears, so we can assume she did not die from whatever sickness she had been suffering. In another instance,
              the author and her mother are sitting on the verandah, waiting for the father to arrive as he was late from work. The reader becomes anxious
              and worries: did Dad have an accident? Did he arrive home safely for dinner? But instead of answering these questions for us, Nicholls talks
              about her beloved dog, Jelly Roll, who is now old and who has to be put down by the vet. We get the impression that there is more affection
              for her dog, than for her father. What was also sad about the author’s childhood is the way her Christian fundamentalist father’s rigid
              beliefs blighted his family’s lives and especially that of the author. When Nicholls tried to escape, she ended up in more trouble. She
              states very briefly (one sentence) that she got married to the violent young man with whom she had fled. We are not told why and how she
              decided to make such a seriously bad move and we are left rather puzzled: if she knew he was so unpleasant, why did she marry him? Was her
              desperation that great? The marriage did not last long and she continued moving from place to place - she moved house more than 40 times
              - at times leaving jobs and friends behind her. She admits to be following the example of her parents, especially her father, whose restlessness
              made him continually change jobs, suburbs and States. There are some bad luck stories, but Nicholls does not indulge in self-pity, on the
              contrary, she blames herself for when things go wrong. The way she cared for her ill mother in the last years of her life is very touching,
              even though her efforts were not always appreciated. In spite of some shortcomings, this is a very worthwhile book to read, if not for anything
              else to learn about the consequences of mental illness on other members of a family. It is also a very interesting story about the struggles,
              both financial and social, of many Australian families in the early and middle part of the twentieth century. The book has several photos
              of the mother, the author and her family and is an excellent way to engage the reader. The front cover, a photo of the mother, with the
              author as a baby in a washing tub in the garden, is rather delightful."
        - title: The Age Review
          text:
              An Imaginary Mother Fiona Capp The Age , 23 February 2013 Bron Nicholls called this poignant gem of a memoir An Imaginary Mother because
              of her mother’s habit, when Nicholls was a child, of mentally ‘disappearing’ and leaving a ‘fake’ mother in her place. Through a series
              of discontinuous reflections, Nicholls probes the reasons behind the mental peculiarities of her mother, Phyllis, and pays tribute to her
              troubled spirit. Phyllis was left in an orphanage by her father when she was 11 because he wanted to get her away from the influence of
              his wife, whom he considered mad. The pain of abandonment and the experience of growing up in an institution left Phyllis haunted for life.
              ‘I’m glad nobody can see into my head,’ she would say to her daughter. Nicholls’ tale is framed by her mother’s diagnosis and death from
              what was thought to be mad cow’s disease. Despite Phyllis’ grim end and mental quirks, Nicholls draws a loving portrait of an intense, unconventional
              woman who struggled to contain her ‘overworked imagination’.
        - title: The Australian Review
          text:
              "Agonising ruptures in the maternal world Joanne Fedler The Australian , 16 March 2013 An Imaginary Mother is Melbourne author Bron
              Nicholls’s attempt to understand her complex and elusive mother and how their relationship shaped who she is. Nicholls, the rescuer in her
              family, is left bereft and relieved by her mother’s death at 80, and it’s this paradox that lies at the heart of the narrative. We are drawn
              into Nicholls’s unpredictable world at various times: she describes overhearing her parents fighting at night and not recognising her mother’s
              voice; and later when her mother leaves without saying goodbye: ‘I wanted to cry out... for godssake be NORMAL. Come back and say an ordinary
              goodbye, like an ordinary mother!’ But Nicholls leaves it at that, perhaps just like her mother did, with a slight feeling of being let
              down. This is a short book replete with letter excerpts and photographs from a family scrapbook in which large tracts of time are quickly
              summed up and emotional turning points glossed over. These moments cry out to be more fully excavated. Only towards the end of the book
              do we feel the full impact of Nicholls’s pain when she writes: ‘You nullified me... if I said I was feeling happy you said that I looked
              sad. If I said I felt well, you told me I looked sick, and when I said I was sick, you insisted that I was pretending.’ Many readers will
              recognise this dislocation and sense of alienation from our mothers, and this book is a heartfelt effort at evoking this filial ambivalence.
              It isn’t easy to write about our parents, especially one who gave and took in one gesture, one who was never really there. Nicholls writes:
              ‘I’m remembering the secret fantasies of my childhood - the banality of them. I never wanted adventure but yearned only for some stability
              in a chaotic world, for routines, for parents who remained recognisable from one day to the next.’ She shares fragments from a mother-daughter
              relationship of which she has struggled to make sense: ‘The lost child is the lost mother is the lost child, on and on, endlessly. The Imaginary
              Mother is me.’ Back to top Start of StatCounter Code End of StatCounter Code"
there-a-lot-of-it-going-around:
    title: There'a a lot of it going around
    author: Leon Piterman
    short_description:
        Leon Piterman weaves anecdotes about his patients into a critical account of contemporary general practice. The stories show
        the compassion that sits alongside medical training and diagnostic skill in the work of a good doctor.
    long_description:
        Scoring a hole in one is an achievement for any golfer at any stage in life. What made Bessie’s achievement more noteworthy
        was that she was 84 years old and being treated for cardiac failure and osteoarthritis of her hips and knees. Leon Piterman weaves many anecdotes
        about his patients into his critical account of contemporary General Practice. They are not mere case studies but show the compassion which
        is an element in the make-up of a good doctor as vital as medical training or diagnostic skill. “There’s a lot of it going around” has information,
        stories and advocacy. It is a book to enjoy and learn from. I have often heard it said that whoever is in front of you is your teacher. If
        reading these fascinating, touching and often humorous tales from general practice is anything to go by, Leon Piterman has accumulated more
        than a lifetime’s wisdom from his patients. Associate Professor Craig Hassed OAM I loved reading A GP’s Odyssey. All doctors and medical students
        will identify with this precious book from an inspirational GP. It will make you laugh, cry and celebrate the unique and valuable role of
        the generalist in comprehensive patient care. You will love it too. Clinical Professor Leanne Rowe AM Sometimes poignant, sometimes hilarious
        the stories in this GP’s odyssey are filled with what makes general practice unique—pumpkin scones, family tragedy, those determined to live
        and the stoic humble elderly coming to terms with their fate. Ever the great educator, Leon Piterman’s stories has learnings for us all. Professor
        Danielle Mazza
    price: 24.0
    isbn: "9780648038726"
    release_date: author.
    page_count: 170
    reviews:
        - title: The Weekend Australian
          text:
              "Infectious and insightful Phillip Siggins reviews There is a lot of it going around — A GP’s Odyssey The Weekend Australian , August
              10-11, 2019 If you are anxious about consulting your GP and looking for reassurance, read this book. It will allay your fears because it
              reveals how self-aware, alert and compassionate doctors must strive to be. Such competence only comes with courage, openness to experience
              and humility in the face of life’s complexities and mysteries. This “GP’s Odyssey” is a short book. It contains 25 stories drawn from Leon
              Piterman’s practice as a doctor in Melbourne. Medical practice affords a remarkable view of the human condition: think Chekhov and his short
              stories. Piterman estimates that in his 40-year career he has engaged in about 140,000 consultations. The vibrant stories he has selected
              from that breadth of experience resonate with what his colleague John Murtagh describes as “the buzz of the human encounter”. In an introduction
              Piterman explains the stories are based on “real, but de-identified, clinical encounters... designed to capture aspects of patients’ stories,
              their emotional response and to explore my own parallel response as their treating doctor”. The target audience incudes his fellow GPs but
              I read the collection as a lay person and a patient and found it engaging, not least because the writing is vivid and accessible. There
              is also, of course, a certain voyeuristic enjoyment in reading about other patients’ lives. Each chapter in There’s a Lot of It Going Around
              presents a story followed by Piterman’s response. His instructive commentary puts each story into context, framing the clinical encounter
              with serious, humane insights into diagnostic challenges, case management and problem solving. The first story, “Muscle Soreness?”, sees
              Piterman confounded by the hidden reality of domestic violence. Maria and Guiseppe were longstanding patients, Maria attending the clinic
              more frequently than Guiseppe. Piterman is troubled because he cannot find a cause for her peculiar muscle aches and pains. “She looked
              well, generally, felt well and denied any emotional problems.” Puzzled, he refers her to a rheumatologist who quickly phones back with the
              diagnosis. For 20 years Maria had been physically abused by Guiseppe. The aches, pains and occasional bruising were the result of that violence.
              Piterman’s initial response is one of sadness, frustration and regret. Maria had been too embarrassed to disclose the situation because
              she thought Piterman would raise the matter with her husband She was unaware of patient confidentiality, yet she felt comfortable in telling
              the specialist. Piterman feels “hopelessly inadequate. Should I have asked the right question and even if I had been insightful enough to
              do so would I have received a truthful answer?”. This immediate reaction gives way to a calmer, more empathic response in which he seeks
              to understand Maria’s nondisclosure of abuse through considering her social, cultural and marital situation. There is something wistful
              in his concluding statement “I was left wondering how many other cases I had missed by not being attuned to the possibility of domestic
              violence. Current publicity has made me much more aware.” Awareness is central and Piterman is able to identify child abuse and elder abuse
              in some cases. In “A Caring Grandfather?”, he has to deal with a spectacularly indifferent child abuser, one who, having been caught, is
              “more concerned about the emotional consequences he might suffer than any damage he may have inflicted on his granddaughter or her family”.
              Shocked at the man’s lack of insight, guilt or remorse, Piterman is also frustrated by the abuser’s attempts to rationalise the situation
              to his advantage. After his trial the man presents himself for a check-up and he is a “shadow of his former self”. Yet, the shattered man
              is Piterman’s patient and in need of guidance and some help. Despite his personal feelings, Piterman must explore this patient’s medical
              and psychological needs. “When there is tension between personal feelings and professionalism or duty of care, the latter should prevail.”
              Other encounters are equally compelling. A wide range of conditions is explored, from dementia to the intractable cases that Piterman identifies
              as “heart-sink” patients. And the cast of patients is various and fascinating. This is both an important medical text and a book that anyone
              can enjoy and learn from. Phillip Siggins is a writer and critic."
living-in-covid-times:
    title: Living in COVID Times
    author: Leon Piterman
    short_description:
        The COVID-19 pandemic has devastated lives and livelihoods. Some 12 months after its declaration by the WHO, COVID-19 has
        left over 105 million people infected and more than 2 million dead, around 450,000 of these in the USA alone. Australia has been fortunate.
        We are an island, our leaders have listened to and largely acted on the science, and our population responded.
    long_description:
        Rarely in human history has an invisible pathogen had so much publicity. The COVID-19 pandemic has devastated lives and livelihoods.
        Some 12 months after its declaration by the WHO, COVID-19 has left over 105 million people infected and more than 2 million dead, around 450,000
        of these in the USA alone. Australia has been fortunate. We are an island, our leaders have listened to and largely acted on the science,
        and our population responded. Leon Piterman may be a general practitioner by training but he is a philosopher, healer and humanitarian by
        nature. In Living in COVID Times Leon takes us on a fascinating journey in time and also perspectives. He helps us to look from every angle
        at the experience of living through the extraordinary events of the 2020 pandemic as they unfolded. Leon explores our individual and shared
        experience with compassion, wit and wisdom. It would be hard to read this book without feeling both better informed about the pandemic, but
        also comforted and inspired. These are the kinds of stories we will proudly share with coming generations one day when we try to communicate
        what it was like to live through these 'unprecedented times'. Associate Professor Craig Hassed As one of the world’s leading GP educators
        and a practising GP with extensive mental health experience, Leon Piterman insights span the everyday experiences of individuals, their fears,
        and concerns, through to the ethics of the unprecedented political and public health pandemics Dr Grant Blashki, Lead Clinical Advisor, Beyond
        Blue …read this book. It will allay your fears because it reveals how self-aware, alert and compassionate doctors must strive to be. Phillip
        Siggins The Weekend Australian
