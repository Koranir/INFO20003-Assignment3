        - title: Quadrant Review
          text:
              'IVAN HEAD The Rock in the Poet''s Bag Quadrant May 2021 The Strangest Place: New and Selected Poems, is a formidable book of 284 pages.
              It embraces Stephen Edgar''s lifetime of published poetry and reaches across forty-five years of publications and ten volumes of poems.
              Edgar, in his seventieth year, is a significant Australian poet at the apogee of a life of writing and publishing success. The intro­ duction
              tells us that after some time in London in the 1970s he moved to Hobart where he lived for some thirty years. He acknowledges the help and
              influence of Clive James and Gwen Harwood amongst others, including Judith Beveridge. He has lived for the last fifteen years in Sydney
              and is married to Judith Beveridge. Judith''s review notes from Westerly grace the rear cover of the Adrienne Eberhard Volume. The introduction
              should be read. It reminds us of the hard-won success a poet might earn with a measure of inspiration and dedication to excel­ lence. Of
              the ten previous volumes mentioned, three achieved the status of shortlist for major awards or won a major award. Edgar won what is now
              the Peter Porter Prize in 2006, the inaugural Australian Catholic University Literature Prize in 2013, and the Philip Hodgins Memorial Medal
              for excellence in literature. Having read Philip Hodgins''s poetry, one knows how significant that memorial medal is. Edgar tells us that
              his first book was published in 1985, midpoint of his life to date, but the earliest poem in it ("Nasturtium") dates to 1976. That poem
              is included in this new book. The latest poems are included in The Strangest Place as "Background Noise" and occupy the first seventy -fi
              ve pages . I read and greatly liked the new poems. "Hoverfly" is masterly. Its fifteen two-li ne stanzas locate this brilliant, tiny, flying
              creature "stationed precisely in midair, / The hoverfly seems painted there". The end-rhyme of each couplet adds to the pleasure of reading
              and flows as eas­ ily as the creature seems to hover. The reader can re a d up and down the rhyming pillar on which the creature is set.
              The rhyme suggests vertical stabil­ ity. The same rhyming couplet pattern illuminates "Dragonfly", a l so a new poem. Again, I like_ the
              way that the steady- repetition of the rhyming couplets forms a column on the pages, as if a soft ladder, an easy s upport for the mind
              as the reader ascends the aura l pattern. Perhaps this makes the poem a kind of verbal icon of the flesh-and-blood world. Edgar''s poems
              seem to move very close to the tangible reali­ ties in the physical world they describe and are a delight to read. They seem to code the
              tangible. It is not only the selection of poems as prior, suc­ cessful and awarded books that make this collection worth having. The book
              is a hendecagon of delight as the new poem s add to the long-established suc­ cess of the prior ten volumes from which selections are mad
              e . Back to top Start of StatCounter Code End of StatCounter Code'
an-australian-conference-of-the-birds:
    title: An Australian Conference of the Birds
    author: Anne Fairbairn
    short_description:
        At the invitation of her Middle Eastern cousin the Hoopoe Bird, the Spinifex Pigeon calls together a gathering of Australian
        birds. They will go on a journey. They will confront the world and themselves. They will seek the path of the aware and will find the truth.
        Faird un-Din Attar ’ s Manteq at-Tair (The Conference of the Birds) is a glittering work of the Sufi tradition, the mystical school that is
        at the heart of Islam. Anne Fairbairn has flawlessly blended Middle Eastern and Australian imagery and counsciousness in this classical tale
        of discovery. Our poets and shared deserts come together with a natural ease in her narrative. An Australian Conference of the Birds is a
        delightful tribute to Attar ’ s famous poem. It is a story for young and old.
    long_description:
        At the invitation of her Middle Eastern cousin the Hoopoe Bird, the Spinifex Pigeon calls together a gathering of Australian
        birds. They will go on a journey. They will confront the world and themselves. They will seek the path of the aware and will find the truth.
        Faird un-Din Attar ’ s Manteq at-Tair (The Conference of the Birds) is a glittering work of the Sufi tradition, the mystical school that is
        at the heart of Islam. Anne Fairbairn has flawlessly blended Middle Eastern and Australian imagery and counsciousness in this classical tale
        of discovery. Our poets and shared deserts come together with a natural ease in her narrative. An Australian Conference of the Birds is a
        delightful tribute to Attar ’ s famous poem. It is a story for young and old.
