        - title: Westerly Review
          text:
              "New Poetry 2003-2004 Adrian Caesar Westerly , Vol. 49, November 2004 In the prefatory pages to Judy Johnson’s Nomadic , we not only
              have the usual list of acknowledged periodical publications, but also a list of some ten or eleven prizes her poems have won. The collection
              has also had the assistance of the Australia Council. Johnson is unlikely, therefore, to be unduly worried by my carping. But almost every
              poem in this volume seems to me to fit [Amanda] Lohrey’s description of fireworks above [the ‘literary writer’ has ‘a verbal facility...
              they’re like... a set of fireworks that can just toss adjectives or esoteric words into the air at random and link them up in some fascinating
              and preferably obscure way - which suggests that the writer is ineffably more clever and sensitive and deep... than the reader’ has ‘ taken
              hold in several critical circles’.]. As an added extra, there is a kind of specious exoticism at work in many of the poems, which locates
              their imagery in the Middle East or New Guinea or India or the West Australian outback, anywhere, it seems, other than the Newcastle, where
              Johnson lives. The opening poem of the book is also the opening poem of the Nomadic sequence; it is entitled ‘Shape’ and begins like this:
              This afternoon while looking for my watch I found a love letter from your mistress. In 1947 while searching for his lost goat A Bedouin
              boy found the Dead Sea Scrolls. There is no connection between the two events. This is plain enough, but plainly unhelpful - an anti-metaphor
              pointed out by a banal and bathetic line. Here’s how the poem proceeds: I exist continents away from the Qumran monastery. And words on
              paper predicting a future cannot compare with copper scrolls etched with clues to a biblical past. Yet I encounter coincidence. As a snail
              shell may only reveal the extent of its secrets when the snail is crushed, so each ancient carapace crumbled as it unrolled. And I am broken
              also, unravelling this script from eye to tongue. It is not so much the shell that cannot take the pressure. It is the space beneath the
              shell, that once upheld its shape. The poet is right, of course: one cannot compare the discovery of a love letter with the discovery of
              the Dead Sea Scrolls. So why are we bothering? Because of a ‘coincidence’. What this coincidence might be is not vouchsafed us - the date,
              perhaps? Maybe the letter is her father’s. Yet the next poem in the sequence seems to be about the poet’s marriage. Who knows? What is certain
              is that the poet is not going to help us out, because that would make it all too easy. Returning to the ‘coincidence’, we also return to
              the tortured syntax of the next sentence and the even more tortured simile and metaphor it introduces. Leaving aside for the moment the
              ‘secrets’ of the ‘snail shell’, let’s consider the way the simile unhinges following the word ‘so’. The first term of the simile is about
              the relationship between shell and snail; the second concerns the shell only: we are asked to consider the unlikely possibility of an ‘unrolling
              carapace’. What are the referents of this metaphor? If the scrolls or the letter or the poet are like the snail shell, where or what or
              whom is the crushed snail? The rest of the poem does not help. The poet (like the snail and the shell) is also broken - so much is clear.
              But then a third term is introduced to the metaphor i.e. the ‘space beneath the shell’. That would appear, appropriately enough, to be air
              - hot perhaps? The metaphor doesn’t work. And the point of a comparison (which isn’t a comparison) between the love letter and the Dead
              Sea scrolls remains obscure. I cannot leave this book without also mentioning a poem called ‘Towards the Edge’ which describes a man ‘drunk
              and naked on the cliff top’, who is ‘spinning on his body’s axis’. The middle stanza describes an ‘aerodynamic principle / that has his
              penis flare outwards like a / helicopter blade’. One would have thought that a drunk behaving in this manner on a cliff top had enough problems
              without this serious anatomical worry, which beggars exegesis."
        - title: Blue Dog Review
          text:
              "Nomadic Robyn Rowland Blue Dog , Vol. 3, No. 6, November 2004 There is a deep satisfaction in reading poetry when its craft presents
              us with an innovative way of viewing imagistic connection, or surprises us with unusual juxtapositions of objects and nature. Judy Johnson
              invites us in Nomadic to journey with her like this, both through time and place, and through threaded images, into the heart of those things
              that matter to her. At the personal level, there is the end of love; the small child closeted literally in the past; a girl dealing with
              her father’s death; her father’s love frozen behind photography and her mother’s passing away. At the political level, there is the poet’s
              desire to hold up to us our own unjustified dissatisfaction with life compared to, for example, the deprivation and suffering of Africa.
              Her first book, Wing Corrections (Five Islands Press, 1998) contained well-crafted short poems that used a brightness of image powerfully.
              In Nomadic , this skill with images has expanded into a mature and more complex form. Often, rather than evoking feeling, the poems strike
              the reader with awe at the turned image, at the way they clarify understanding. The craft is impressive. Here mere are chains of images
              - lines on a map perhaps - often discrete and seemingly disconnected objects or creatures, that become our trail: theirrelationship to each
              other exposed by the poet so that we see them anew, reshaped. In ‘Girl on a Paling Fence,’ we move from the image of the girl balancing
              on the fence, to her dead father lying in the house, ready for visitors. The experience is woven through a sweep of particulars that draw
              us into a visual picture of the moment. The girl’s sandals are blue, like the colour of a plastic necklace of her mother’s that the girl
              once broke and hid, ‘piling its kaleidoscope of / planets into a box under her bed. Now she threads herself / along the string offence...’.
              We look down at the the girl’s ‘two striped feet with their strapped-in cargo / of toes’. Her mother is drowning in grief: ‘all morning
              her mother’s / eyes have been brown stones sinking beneath the weight of / water’. The girl has taken objects from her father’s bedside
              table - a tobacco tin and a pipe: she doesn’t touch ‘the heaviness of the objects she has taken for fear of a similar drowning / ...She
              keeps the two apart by the warmth of a body-width. She measures their coldness this way / as she measures the fence / by the flat spaces
              where she can place her feet and not by the spikes that divide them ’ . Finally, her lonely grief is caught as she balances ‘...the pipe
              on one side, tobacco tin / on the other and in the middle, her unlit heart’. Johnson has a deft hand with nature. I am delighted by the
              variations on the moon that as a crescent in ‘Excavation’ (‘Nomadic’ sequence) ‘hangs like a pale cheese in a muslin sack’, and transforms
              into ‘the ghost gum moon’ in ‘Thirty-four years on’. In ‘Going home for her dying’ it becomes ‘that jack-o-lantern tuber, / the moon, the
              colour of pumpkin the only way my mother liked it. Rind / as hard as charity and inside, the flesh dry as orange dessicated coral’. In her
              hands, the ocean is brim-full of intent, of secrets and of a fever for understanding. In ‘Shipwrecks’ ‘The ocean / mocks the geometric absolutes
              land aspires to, and surface / becomes another dimension, as the breeeze-pampered sailcloth / of your skin adapts to the heavy press of
              atmospheres’. ‘Diving the Westralian coast’ leaves us ‘just suspended at the / border between estrangements’. In the captivating poem ‘The
              Way a Lighthouse Knows her Keeper’, it is the inanimate lighthouse made living that holds the keeper above the ‘caw and cackle of ocean’
              the ‘colour of that middle-blue Faber / Castelle pencil’. In another fine poem, ‘Stone’, it is the land that becomes animate as it draws
              the carvers to itself ‘yearning for transformations’. ‘Stone predicts in its own time and way’ and as the suicide falls, it is practising
              its shapechanging. The faster they fall, the smoother // and more impassive the face, until those who go this way are so reminded / of their
              own elusive god, that in the end the brokenness barely surprises them ’. Johnson knows that she’s playing the line between image and reality;
              between image and its meaning; between image and feeling, felt and conveyed. ‘Image’ she warns, ‘divides us from who we really are’ (‘Light
              and skin’). She is at her best when interlocked images flow from her naturally, without expectation. It may fall flat though, when the stretch
              of the image is overdone and the poem seems to be trying too hard to find that odd juxtaposition which is her forte. In ‘The Giant Statues
              and the Birdman’ (‘Encountering Easter Island sequence’) the statues are ventriloquists that moan in the wind ‘exhaling warm breath on summer
              nights / like honey mixed with talc’. Here the lightness of breath and talc, mix uncomfortably with dense honey, so the line doesn’t succeed
              for me. A lot is travelling on those directed collages of image. They frequently set us up for the last significant lines. Nature and animals
              are often transformed into otherness, our selves in some form, so that we are enticed to anthropomorphize ourselves in order to find the
              nub of meaning in the poem; in life. In ‘Amphibian’, there is a merging of lover with tadpole/frog. In ‘Rainforest Bats’ the ‘ghosts of
              orgasms’ drift from bedrooms to inhabit the bats and their squeaks are ‘our playful pillow talk’. The ‘points of inevitability we pass in
              / lovemaking acts’, ‘move us towards a larger dying’. The rustling of leaves and bats in the forest leaves us ‘ ...unable to decide if the
              corresponding flutters we feel / are the beginnings of arousal, or the unfolding wings of fear ’ . In ‘The African Spider Cures’, a substantial
              and complex sequence, we are to become the spider, to ‘lurch side to side... / until you feel the shuffle of fine hair on your legs and
              back... extend your incisors...’. This sequence takes us wandering through Africa: its colour, its pain, its endurance. We are shown how
              we weave our discontent while others live life hard. Inside the spider - trapdoor, huntsmen - on the floor of the forest or strung across
              the river - we are without language and can ‘consider the wisdom of silence’. We are admonished to admit our self-pity, our inner poison,
              and in our smallness, the animal we have become: ‘ Watch it twist and turn inside the silk it’s rolled in, stuck to / what you are determined
              it will neither die of, nor escape from / while ever you are so dexterous at weaving discontent ’ (‘2SelfPity’). The web becomes the image
              of entanglement, of connection, of death, of safety, of buoyancy and of persistence. The web itself is a powerful symbol: when spider webs
              unite, they can tie up a lion, so the Ethiopian saying goes. Spider silk itself can be curative. I’m searching for meaning here. We are
              I think, left with the poet’s own challenging ambivalence in the meaning of the spider’s cure. Moving from the creation of a drum from the
              Baobab tree, as spider we move up into the trees, along the Argungu, thrown from Krakatoa, through Kampala alongside the Masai, into Levubu,
              Fez, Morocco, Somalia, the Sahara and finally Victoria Falls. All the while, the harsh driving tone of the poet is making sure we haven’t
              missed the sharp edges of the journey. And why? To drop our easy self-indulgence, our one-eyed first world vision, while recognising the
              connections between all things and the web that holds us: ‘ Take it as a sign. Know that there’s nothing else for it, but to persist. /
              It’s either that, or stand stiff as a cliff-edge old testament prophecy / and be eroded just the same, while the migratory world keeps falling
              and falling ’ . In this sequence Johnson also reveals her poetics, her process. In ‘Flying’ in her first book, she wrote: ‘ Not so easy
              to dismantle the puzzle / and see flying for what it is, / what most things are: // a set of compromises - a series / of subtle wing corrections
              / to make the pieces fit ’ . Reminiscent of this unveiling, she writes in ‘ The African Spider Cures’: ‘ ...Let these images collide, as
              well as all those other / childhood antidotes and poisons. Allow each its own freeze frame, but see // how they are all recorded against
              the same backdrop, so. like an early / animation, the light thumb of dreams may flick through the pages / creating a seamless movie ’ (1.
              Disappointment). This ‘freeze frame’ recurs throughout the book as method and image: in ‘Heat’, ‘Thirty-four years on’, ‘Watching the storm’
              (in ‘Five Poems of Light’). In ‘Photography at Dingo creek, 1967’ the father photographer misses the lived moment to capture it in the camera,
              ‘her childhood / preserved like the fossil of some sea-going creature ...to trap her in the infinitesimal shutter-speed wink / between the
              moment and the moment’s loss’. Ironically, she is caught too, between the living of it and the recording of it. Yet here is a purpose of
              poetry: to be the snapshot album of moment. Interestingly, poems about a girl’s father dying that occur in three poems, speak from the third
              person. Yet the poem on her mother’s dying is first person direct. In these poems feeling is more strongly conveyed in comparison to the
              more distanced, yet finely crafted, ‘traveller’ works, through Easter Island, New Guinea, Africa. Personally, I like to be moved by poetry,
              and the title sequence, ‘Nomadic’, which captured the sadness of a relationship ending, and the familial poems, are closest to the heart.
              The ‘Five poems of Light’ for the poet’s mother are deeply moving and loving poems, as Johnson remembers a childhood (‘childhood splinters
              are working their way out’ we are told in ‘Splinters’) through to her mother’s death. Some of the strongest writing is here, with its crisp
              imagery, moving narrative and precision of craft. I love the crystalline beauty of ‘3. The Day of the Toboggan - Kosciusko 1973’ and the
              beautiful flowing lines following a kite outside the hospital window to the inevitable death: her mother ‘hungry all her life’, at the end
              ‘...relaxed on the pillow, intent on becoming the bone / the flesh spends all its life peeling back from in incidental layers. // Until,
              by nightfall, the spars shone through, devoid of unnecessary material: a frame / that the air eventually lost patience with supporting //
              and plummeted to earth. Leaving nothing to show she had ever flown except, // in the broken room, still attached, // our long trail of sorrow’
              (5. Her Last Day). Rarely does Johnson seem uncertain of what she wants to convey. But with the folding and unfolding of image, there is
              a risk that purpose outside image might become lost, the poem fading merely into a made thing, an artifact. ‘Heat’ might be one of these,
              the concluding lines falling diffidently, compared to the wonderful twisted word usage of ‘Splinters’ with its ‘lung-thirst of sawdust;
              a smell of / imprisoned forests and hard rain sifted / from an axe-cut sky’. I felt that the two sequences following Chinese poetry read
              a little like exercises in mimicry, detracting from Johnson’s own voice. Line endings seem crucial to me in the creation of the poet’s voice:
              the voice that captivates; that guides; that invigorates or impassions. Line breaks direct the living pulse of breath, with its essential
              shadow - stillness/no breath. The breath units of voice drive the rhythm of the poem, which is crucial to the success of free verse poetry.
              Sometimes movement into varying form on the page enhances the quality of directness in communication of voice. Johnson wrote in ‘The woman
              who painted the sky’ ( Wing Corrections ): ‘the critics said for years she was too predictable, / painting only one shade of sky’ …so ‘in
              the end she compromised’ - ‘they said her art had come of age, / but it felt like selling out’ and ‘she never had the dream again where
              her body / let go its own blue centre and spiralled / up to light like egg white / in glass blown air’. This is always the risk of falling
              for fashions in form, and Johnson tells us here that she knows it. So I felt disappointed when I read the prose poems. Unpunctuated, they
              made the inner reader stumble looking for breath, trying to find a flow that was blockaded by an invisible fence. They seemed to lack the
              energy and intensity of the free verse forms. I was, however, delighted to find such faults, bearing in mind the Persian carpet makers’
              belief that flaws have to exist in, or in fact need to be added to, the best of rugs to ensure the weaver will not be struck down for impersonating
              the perfection of god. Nomadic carries the weft and weave of well-made poetry, and for this, it is a pleasure to read."
        - title: Books and Writing, Radio National
          text:
              "Nomadic Geoff Page Books and Writing , Radio National, 25 July 2004 It is difficult to find a single poem in Judy Johnson s first full-length
              collection Nomadic , that one could consider typical. As with most first books, the poems range widely in theme and technique but the poem
              ‘Her Last Day’ is a good starting place. Like many other pieces in the collection, it moves at a leisurely pace and chooses its metaphors
              carefully but seemingly without effort. The literal kite that accompanies the poet’s mother s last afternoon is seen as a ship or maybe
              a bird. The uncertainty mirrors the mother s dialogue with death, the tug and let go of things. In some ways, the poem is an essay as much
              as it is a story. The phrase for instance precedes the stunning simile for the way neither the mother s heart nor lung will hang up first.
              They are like lovers on the phone to each other. The fragility, the delicate balance of the dying woman’s situation, is elaborated in a
              series of images increasingly emphasising her insubstantiality. Eventually there is nothing to show that she has ever flown except in the
              broken room, still attached, our long tail of sorrow. Johnson’s particular ability is to take an image and develop its full potentiality
              through a series of closely-related images, each one adding emotional force to the original premise. The images are not simply logical deductions,
              nor are they free flights of surrealism; rather they are something in between with the characteristics of both. Sometimes, as in ‘Sequence
              in the Style of the Liang’ and ‘Sequence in the Style of the Chin’, Johnson is able to inhabit another culture and historical period and
              discover perennial truths in a style which is obviously derivative at one level and yet, at another, seems to have much of the same force,
              as many of the best poems are written in the time and place chosen. She also has a particular feeling for the geography of the Pacific,
              its cultures and the colonial or quasi-colonial ventures which occur there. ‘Encountering Easter Island’ is an early example, and the book
              finishes with two sequences of this kind: ‘New Guinea Mission’ and ‘From the Journals of Robert Louis Stevenson’s Mother’. The latter comprises
              five unpunctuated prose poems, showing the same sharpness of observation that Stevenson himself was noted for. Johnson has his mother displaying
              more than a little wry humour at the cultural gap horizontal rather than vertical between herself and the Polynesians. In ‘Long Pig’, for
              instance, one elderly man explained that the hand had been his favourite morsel because he could accommodate each finger one by one in his
              mouth. Undeterred, Mrs Stevenson tucks in to the roast boar but assures the reader after some exchange of gifts to cement family connections
              that under no circumstances shall I turn cannibal to fit in with our new found relatives. All this should not give the impression that Johnson
              is concerned only with the exotic. There are many poems rooted solidly in Australian landscapes, both literal and emotional. ‘Photographs
              of my Great Grandparents’ is just one example, so too are ‘Stone’, ‘1950s Bedroom Cupboard’, and ‘Heat’. All are concerned with mental states
              but all have their parallel, and often their origins, in particular Australian geographies. Johnson is obviously influenced by the poetry
              of other cultures, including the American, but there is no mistaking her Australianness. Not necessarily a virtue, of course, but nevertheless
              an important part of the book’s likely reception by Australian readers. It is worth noting too that Judy Johnson has won an extraordinary
              number of poetry prizes. Given the makeup and vagaries of some judging committees, this is not always significant but in Johnson’s case
              one can see what impressed such a wide variety of judges. Johnson seems to know how to really get into a topic. She is not one to just sketch
              an attitude and let it go at that. She wants to investigate the thing more thoroughly and does so by poetic means rather than those offered
              by either academic research or standup comedy, to name two frequently used alternatives. Along with Bronwyn Lea’s and Adrienne Eberhard
              ’s first books, Judy Johnson’s Nomadic is certainly setting a higher standard for first collections than we had become used to just a few
              years back."
        - title: The Canberra Times Review 2
          text:
              Perennial Truths and Sharp Observation Nomadic Geoff Page The Canberra Times , 26 June 2004 Newcastle poet Judy Johnson, who has just
              published her first full-length collection, has already won an extraordinary number of poetry prizes. Given the make-up and vagaries of
              judging committees this is not always significant but in Johnson’s case one can readily see what impressed such a wide variety of judges.
              Johnson knows how to really get into a topic. She is not one to just sketch an attitude and let it go at that. She wants to investigate
              the issue more thoroughly - and does so by poetic means rather than through academic research or stand-up comedy, to name two frequently
              used alternatives. In poem after poem in Nomadic Johnson takes an image and develops its full potential through a series of closely related
              images, each one adding force to the original premise. Such associations are not simply logical deductions; nor are they free flights of
              surrealism. Rather they are something in between, with the characteristics of both.One can see this process in her ‘Sequence in the Style
              of the Liang’ and ‘Sequence in the Style of the Chin’. Here Johnson proves herself well able to inhabit another culture and historical period.
              In them she discovers perennial truths via a style which is obviously derivative at one level and yet, at another, has something of the
              same force as many of the best poems written in the original time and place. Johnson also has a particular feeling for the geography of
              the Pacific, its cultures and the colonial (or quasi-colonial) ventures which occurred there. ‘Encountering Easter Island’ is an early example
              and the book finishes with two sequences of this kind, ‘New Guinea Mission’ and ‘From the Journals of Robert Louis Stevenson’s Mother’.
              The latter comprises five unpunctuated prose poems showing the same sharpness of observation that Stevenson himself was noted for. Johnson
              has Stevenson’s mother displaying more than a little wry humour at the cultural gap (horizontal rather than vertical) between herself and
              the Polynesians. In ‘Long Pig’, for instance, one elderly interlocutor explains that the hand used to be ‘his favourite morsel because he
              could accommodate each finger one by one in his mouth’. Undeterred, Mrs Stevenson tucks into her ‘roast boar’ but assures the reader, after
              some exchange of gifts to cement family connections, that ‘under no circumstances shall I turn cannibal to fit in with our newfound relatives’.
              These examples should not, however, give the impression that Johnson is concerned only with the exotic. There are many poems rooted solidly
              in Australian landscapes, both literal and emotional. ‘Photographs of My Great Grandparents’ is just one example. So too are ‘Stone’, ‘1950s
              Bedroom Cupboard’ and ‘Heat’. All are concerned with mental states but all have their origins in particular Australian geographies. Johnson
              is obviously influenced by the poetry of other cultures, including the American, but there is no mistaking her Australianness - not automatically
              a virtue, of course. Nevertheless, it will, I suspect, form an important part of the book’s appeal to Australian readers. There have been
              several outstanding first collections of poetry recently (those of Bronwyn Lea and Adrienne Eberhard spring to mind). Judy Johnson’s Nomadic
              is also in that class.
        - title: Island Review
          text:
              "Review Nomadic Andrea Breen Island , No. 98, Spring 2004 The poems in Judy Johnson’s collection Nomadic cut to the quick. Each one
              voices the internal struggle for self-understanding and they are expressive too of the baffling experience of living in the external world.
              Structurally, these poems shift between concise formal poems and longer experimental forms, such as ‘Three Faces of Shiva’ where enjambment,
              gaps between words and single lines widely spaced work to test the reader. This fractured structure is congruent with the images and subject
              and suggests linguistic stumbling. We watch from further out on a small leaf-shaped boat not knowing what to make of the single human hand
              that floats past nor the purifying tiger that roars and crackles on shore sears with its dozen burning eyes. In some senses this collection
              is like a travelogue, as many poems recall destinations visited by the traveller. In ‘Heat’, the discomfort of searing temperatures, for
              an anonymous woman subject, suggests universal experience: There is no sign of rain and the woman has not yet dropped the steaming paleness
              of her dress near the fence and let the sky fall in medusa tongues. But it will come... The volume connects with a wide range of women’s
              experiences, such as in the free form poem ‘My Dressmaking Aunt’: ‘...the gravity of choices never made bearing down or what fell to the
              floor day after day the scraps she made a life of when all the matrons had gone home’. These songs from lived experience that are Judy Johnson’s
              poems tell many tales in an assortment of ways. The fragmentation of structure is sometimes disconcerting yet this volume makes very good
              bedside reading."
        - title: Australian Book Review Review
          text:
              "Beyond Matter Oliver Dennis Australian Book Review , No. 262, June/July 2004 ... Let these dreams collide, as well as all those other
              childhood antidotes and poisons. Allow each its own freeze frame, but see how they are all recorded against the same backdrop, so, like
              an early animation, the light thumb of dreams may flick through the pages creating a seamless movie. In these lines, taken from ‘ The African
              Spider Cures ’ , Judy Johnson might almost be describing her poetics. Nomadic , Johnson ’ s second poetry collection, consists of well-made
              poems that combine objective views of the world with snippets from the poet ’ s personal life. In the title poem, which centres around a
              recent separation, Johnson compares her experience of finding an illicit love letter with a Bedouin shepherd-boy ’ s chance discovery of
              the Dead Sea Scrolls: ‘ There is no connection between the two events, ’ she writes, ‘ Yet I encounter coincidence. ’ Throughout the book,
              Johnson brings together mythology, family history, travel scenes and childhood memories; but, whatever the subject, there is always a strong
              emotional element in her writing. It is particularly evident in Johnson ’ s moving conclusion to an elegy for her mother, who ‘ [l]eaves
              nothing / to show she had ever flown except, // in the broken room, still attached, // our long tall of sorrow ’ . One of the major strengths
              of this poetry is its ability to surprise and unsettle the reader with ingenious imagery or phrasing. While Johnson has an occasional tendency
              to indulge in overly elaborate explication ( ‘ The African Spider Cures ’ , for example, uses up a lot of space, only to make a fairly lame
              point about the importance of keeping one ’ s grievances in perspective), many of her lines bear witness to an admirable restraint. Consider
              ‘ My limbs by association climb the walls ’ ( ‘ Possibility ’ ) and the following account, from ‘ Girl on a Paling Fence ’ , of ‘ two striped
              feet with their strapped-in cargo of toes ’ . Indeed, it comes as little surprise to find that Johnson has been inspired to imitate the
              poetry of two early Chinese dynasties, the Liang and the Chin. The best of Nomadic owes much of its success to the constraining influence
              of form. For an imagination as restless and enquiring as Johnson ’ s, there could be no better foil."
        - title: The Canberra Times Review 1
          text:
              Using Poetic Images to get to the heart of the matter Geoff Page The Canberra Times , 1 May 2004 Newcastle poet Judy Johnson, who has
              just published her first full-length collection, Nomadic , has already won an extraordinary number of prizes. Given the make-up and vagaries
              of judging committees this is not always significant, but in Johnson's case one can readily see what impressed such a wide variety of judges.
              Johnson seems to know how to really get into a topic. She is not one to just sketch an attitude and let it go at that. She wants to investigate
              the issue more thoroughly and does so by poetic means rather than through academic research or stand-up comedy, to name two frequently used
              alternatives. In poem after poem in this book, Johnson takes an image and develops its full potentiality through a series of closely related
              images, each one adding force to the original premise. Such associations are not simply logical deductions; nor are they free flights of
              surrealism. Rather, they are something in between, with the characteristics of both. One can see this process in her ‘ Sequence in the Style
              of the Liang ’ and ‘ Sequence in the Style of the Chin ’ . Here Johnson proves herself able to inhabit another culture and historical period.
              Here she discovers perennial truths in a style which is obviously derivative at one level and yet, at another, has something of the same
              force as many of the best poems written in the time and place chosen. She also has a particular feeling for the geography of the Pacific,
              its cultures and the colonial (or quasi-colonial) ventures which occurred there. ‘ Encountering Easter Island ’ is an early example, and
              the book finishes with two sequences of this kind, ‘ New Guinea Mission ’ and ‘ From the Journals of Robert Louis Stevenson's Mother ’ .
              The later comprises five unpunctuated prose poems showing the same sharpnes of observation for which Stevenson himself was noted. Johnson
              has Stevenson ’ s mother displaying more than a little wry humour at the cultural gap (horizontal rather than vertical) between herself
              and the Polynesians. In 'Long Pig ’ , for instance, one elderly interlocutor explained that the hand had been 'his favourite morsel because
              he could accommodate each finger one by one in his mouth ’ . Undeterred, Mrs Stevenson tucks into her ‘ roast boar ’ but assures the reader,
              after some exchange of gifts to cement family connections, that ‘ under no circumstances shall I turn cannibal to fit in with our newfound
              relatives ’ . These examples should not, however, give the impression that Johnson is concerned only with the exotic. There are many poems
              rooted solidly in Australian landscapes, both literal and emotional. ‘ Photograph of My Great-Grandparents ’ is just one example. So too
              are ‘ Stone ’ , ‘ 1950s Bedroom Cupboard ’ and ‘ Heat ’ . All are concerned with mental states but all have their parallel - and often their
              origins - in particular Australian geographies. Johnson is obviously influenced by the poetry of other cultures, including the American,
              but there is no mistaking her Australian-ness - not necessarily a virtue, of course. Nevertheless, it will, I suspect, form an important
              part of the book ’ s appeal to Australian readers. There have been several outstanding first collections of poetry recently (those of Bronwyn
              Lea and Adrienne Eberhard spring to mind). Judy Johnson ’ s Nomadic is also in that class.
nebuchadnezzar:
    title: Nebuchadnezzar
    author: Shelton Lea
    short_description:
        Shelton Lea is a poet of the streets. His Fitzroy, Redfern and Oxford Street are inhabited by figures who arise in their
        oppression, while Nebuchadnezzar brings together poems of place, love, advice and confrontation.
    long_description:
        'i am nebuchadnezzar and i am the king of fitzroy, my skin is black, my heart is strong, you see my gardens there in gertrude
        st beneath the high rise flats, that’s my babylon, Shelton Lea is a natural poet of the streets. His Fitzroy or Redfern or Oxford St are as
        native as the bush is to Lawson and the balladists. The inhabitants of his places arise in their oppression like heroes. He can touch on a
        fishpond, or love, with delicacy. The themes of his singing meet in his farewell advice to his sons. Nebuchadnezzar pulls no hard, or soft,
        punches. Shelton Lea’s work kicks through inner-city streets as well as prison cells with mattresses ‘thin as two tally-hos’ and a cast of
        characters real and imagined such as the incendiary half-crazed half-joyous ‘king’ Nebuchadnezzar reclaiming Fitzroy. Often with incidental
        rhymes or euphemistic rhyming slang, he covers a wide territory from elegies to history - ‘while the berlin wall’s torn down / others, more
        subtle, are being raised’ - to gentle love poems, homages and reflections on being an adoptee with ‘absent d.n.a.’. His tone varies from full-throttle
        public address to quiet introspection to anarchic defiance and is often seamed with humour. Shelton Lea exuberantly celebrates and contests
        an unauthorised untelevised Australia. ...me and the parkie darkies, drinking port on australia day Gig Ryan Cover art: "Nebuchadnezzar Burning"
        - Arthur Boyd,'
    price: 24.95
    isbn: "1876044519"
    release_date: "2005"
    page_count: 114
    reviews:
        - title: Australian Book Review Review
          text:
              "Reviews Last and First - Shelton Lea: Nebuchadnezzar John Jenkins Australian Book Review , No. 285, October 2006 Nebuchadnezzar is
              Shelton Lea’s ninth and last book. Sadly, this colourful poet, a well-loved stalwart on the Melbourne reading circuit, died of cancer in
              May, shortly after its publication. The book begins by surveying a ‘land of fences and diatribes’(‘1988’). It describes the inhabitants
              of Koori streets: ‘old men with no tomorrows / who rock on broken chairs / and stare at a bitumen sea’ (‘fitzroy’). Lea was an advocate
              for Aboriginal causes, and his poems often celebrate marginalised people who must summon the desire to survive. This burden of grit grounds
              life in harsh experience, before a remarkable lift-off. Everything gains altitude (and attitude) in ‘nebuchadnezzar’, the defiant, lush
              and memorable title poem, in which the ancient king of Babylon, scourge of Judah, builder of the famous hanging gardens, returns to earth
              as a blackened but unrepentant fire-bringer: ‘i am nebuchadnezzar / ...the king of fitzroy. / ...trees emanate from me / for i’m the king
              of what’s loud... / aflame i fall through fitzroy skies.’ Lea’s beast-king declares his desires are generous, inclusive, Whitmanesque. He
              wants to sprout a great tree of heaven from his body, to give ‘shelter to the beasts of the field / and (let) the fowls of heaven find home
              along with my kin / for its leaves are as broad as the sun’. Another standout poem is ‘at robert drummond’s, beenliegh’, about waking to
              an artist’s studio, where a quirky bohemian disarray reflects the poet’s own life: ‘a broken piano, / guts bare, / a pillaged muse / at
              the foot of my bed. / it was come dawn. / the rooster crowed as if a man / imitating a rooster, crowing.’ I like the concise self-parody
              here. Certainly, ‘playing the poet’ was an amusing game for Lea, his roses full and blown. But there were good biographical reasons for
              this. He was born in 1946 and orphaned, then ran away from his adoptive parents to live on the streets. He went to a boys’ home and did
              time in gaol. Although he became a successful writer, publisher and bookseller, freedom was dear to him, the mean streets never far away.
              Playing the footloose troubadour became a sort of dance, and a mask. With his identity as poet, Lea felt protected. He could outpace life’s
              ‘narks’, sidestep conventional shackles, skip mundane restraints. In poetry as in life, he liked to lead a merry dance. Lea’s flamboyance
              expresses a piercing joy - psychic and actual release. But don’t be fooled. It also conceals the thoughtful reserve of one who often had
              his heels cooled: ‘it is improper to divulge the secret of the stone, / for in the stone lies a stillness / reserved only for stones’ (‘secrets
              of the stone’). Within his dance, Lea’s touchstone, his dominant tone, is always lyrical; tender and heartfelt: ‘i dream of weeds flowering’
              (‘i dream of the soft slide of light’). But not every poem works, particularly where looseness invites failure. In defence, you could say
              Lea’s ‘artlessness’ is only superficial, tailored to appeal to the disenfranchised, who must also cobble value out of tail ends and tat.
              The prosecution objects, however, that this is a risky method: what is contrived to appear slipshod can quickly become so. Finally, Lea
              delivers the innovative and exciting ‘autistic man’, a fractured, collage-like narrative poem about crime, a victim and how it all plays
              out in the mind. Here, the fine writer in Lea is fully liberated, to dazzling effect."
        - title: Blue Dog Review
          text:
              "Shelton Lea: Nebuchadnezzar Philip Harvey Blue Dog: Australian Poetry , Vol. 4, No. 8, November 2005 Here is a poetry of hard lessons,
              a beating out of tough facts into sayings that are smooth as he can make them. Shelton Lea wants to fix it in the least words. This last
              collection before Lea’s death this year, contains poetry of mature control. Within the personal world of his own experience and its geographic
              confines (‘where distances cannot be described by maps’), Lea does what he does best: talks out his bravado, his passions, his temperaments,
              his dreams and his griefs. The moods and status of an adopted child troubled Shelton Lea: it wasn’t that i was different to them, they were
              different to me. that ache, that longing in me was as certain as the sky. (to lael) His poetry dramatises the quandary of identity, sometimes
              defiantly, sometimes softly. He is someone at odds with those around him, waking each morning to ‘wonder at the source of self.’ Perhaps
              it explains his praise of other heroic loners like Barrett Reid and Adrian Rawlins, his attraction to groups of fringe dwellers. And in
              ‘my unknown father’ the unbearable tear between longing (‘i had dreamed that i had actually touched / my unknown father’s shoulder’) and
              pathos (‘yet we have never met. / i turned to leave the room’) shows up again and again in other relationships. Between the lines of this
              poetry we see an aging man who believes that kicking against the pricks is still worth the bloody effort. Shelton Lea was always one of
              the main subjects of his own poetry. When a collection suddenly turns posthumous (he died on the evening of the launch of this very book)
              [Black Pepper correction: Shelton Lea died later, on Friday 13 May, at home], we see the choices the poet made with a stark focus, from
              toorak through fitzroy; from reform schools through jails; from deserts to seas. (1988) He knows politics, social inequity and the clash
              of wills. Yet his poetry is leavened by camaraderie, a shared suffering and a shared survival. He talks to his kind, be they Aborigines,
              drug-takers, boozers, jailbirds, or fellow authors. Many poems speak directly to ‘bra’, the brother who, though an outsider to society,
              is an insider to the Australian society of this writing and its memory. He shouts: you don’t hurt me none bra for the wind is different
              here in Fitzroy. it is our land won by fists and diatribe where we can stalk the remnants of the sense of tribe, where within ourselves
              we count. (fitzroy) When the voice gets aggressive or surges into violence, the perspective inevitably turns also from the subject to Lea
              himself. The connection between lowlife behaviour and stints behind bars cannot be lost on the reader. He is a marijuana-smoking Villon,
              too ready it seems to up the tension or find a fight. A challenge for any of us is judging when he is aggressor and when the threatened.
              When is he the criminal and when is he the victim? Lea’s personal voice will brag or swagger, then switch to threat or attack in a moment.
              His wistful moments sometimes come as a relief, like coming down after a high, or recovering from a punch-up. Then his lyrical talent serves
              as antidote, as in this subtly ironic portrait, ‘clifton hill’: the paradigm of early afternoons filled with birdsong fishgurgle through
              still ponds, spiders and their webs describe the sky in perfect mathematics the parabolic curve of nits and gnats the Clifton hill train
              sound slap is sea sound; the regular fatwah, fatwah of wheels over sleepers. This possessive, intense connection with place is expressed
              in a language of hardship tinged with sentiment. In Oxford Street ‘buses collide with the air.’ Melbourne is ‘all that grey skyline / below
              the liveried clouds.’ Sitting in Barwon Jail he sees looming in the background the you yangs a sullen frown When the locations for his poems
              are not breakfast tables or hotel bars, Lea is usually found in the streets or out in the bush somewhere. Polite and proper locations are
              absent; there is no scent of the salon or the seminar room. We did not hear everything we could have from Shelton Lea. Perhaps that’s true
              of all poets, but in this collection we notice attempts at reconciliation and personal resolve that are a change in his personal trip. The
              book is even given the dry dedication: for Leith who head-butted my shattered hear back into shape. And one measure of the man can be seen
              in ‘poem from an adoptee’ in which he goes from addressing his Mum, ‘last time i saw you / i glanced at your flatulent arse,’ only, by the
              end of the same poem, lauding her: for i have lain betwixt your legs once as warm and wonderful as a pet bear, and yea i yearn for the knowing
              of you because you are never there, and yea i bless you for my life. One of Lea’s great strengths as a poet is his unremitting honouring,
              like John Forbes and others of his peers, of the permanent lower-case. This well-nigh universal practice was anything but when he started
              his apprenticeship; out of non-capital poetry he has gained huge returns in terms of a natural voice, the true language of the streets,
              a spacious accommodation for listeners. Other strengths that come especially to the fore in this late book are heartfelt recollections of
              the Heide art scene, Kings Cross in the 1960s, and the lifestyle of the young and stoned. He has perfected the art of line reduction. Experiment
              is not his scene. He has trusted to the end his brand of common voice, a combination of the vernacular and the well-earnt truism. At the
              same time there are certainly weaknesses in some of these poems. For me a particular temptation is his sentimentalism, as distinct from
              sentiment. Lea can accidentally devalue the beauty or effect, even the meaning, of a poem by trying too hard for the lachrymose, or the
              merely flowery, effect. I won’t trouble you with examples, suffice to say there are lapses. The other problematic weakness here is that
              some of the works do not translate from their performance roots onto the page; they may only mean something to those who were there at the
              time. One of my favourite poems in Nebuchadnezzar is ‘it can only be once’, an expression of acceptance about loss and death that is a fitting
              way to close. It opens: it can only be once in your life that you take the orange train The classical weight of these words holds the attention.
              The orange train is life’s passage, but also the transport of your death and my death. The poet knows enough though to add that ‘we never
              travel alone’, a consoling thought when we find out that there is always baggage that is blues and the stops which are stops. you lug your
              life up and down so many steps that you are fatigued The poem plays out a series of hard facts, of brutal realities, then softens them with
              a kind of stoical happiness, made most agreeable in the beautiful lines yet your steps quell the shadows on behalf of themselves This could
              be enough, self in equilibrium. Acceptance rather than resignation should be a decent end in itself. However the poet then expands the witness
              of his own life by exclaiming ‘the dream is an absolute’, then concludes with an unexpected analogy of that absolute: like dancing in the
              meadows with tough bright girls whose dresses swirl with their fingertips’ turn. The poem displays many of the excellent qualities of Lea’s
              best poetry. There is an ordering of the pragmatic and the emotional into a coherent narrative. His love of the well-placed saying is matched
              perfectly by his delight in the personalized image. He lets his positive motives win out over his warring negative tendencies. His favourite
              free verse form gives Lea the freedom to put all these factors together, where they hold together under their combined strain."
all-travellers-we:
    title: All Travellers We
    author: Shelton Lea
    short_description:
        "As Shelton lay ill, many friends (among them poets, musicians, actors, family, and friends from every walk of life) arrived
        with all types of presents. Many of these gifts were poems. Some were kept at the time, others arrived after his death, and many had been
        written (either for or about him) in previous years. Jen Jewel Brown encouraged me to keep these for a possible book. Kerry Scuffins pushed
        hard for its birth, and with the rest of the gang: Jordie Albiston, Lyn Boughton, Martin Downey, Ian McBryde, Peter Tiernan, Raffaella Torresan,
        and myself, joined together to bring this to fruition. To those who may not be represented here, this book simply fell into its own space
        and time, and was virtually born of itself. Our credo was immediate and simple: to publish a collection which honours Shelley’s unique journey
        and work, by those who shared his life and loved him to the end."
    long_description:
        'i do not want to go out as i do not want to go out as frenzied molecules trapped by tough air as if all moments are this,
        of this & more or less, this. we dance with jack through thinning air our desires a questionnaire. Shelton Lea April 2005 Born in 1946, Shelton
        Lea was adopted from an orphanage in Fitzroy. At twelve he ran away from his adoptive parents, living by his wits on the streets of Melbourne.
        Over the ensuing years he did time in reform schools and prisons, wherein he wrote love poems for the sweethearts of fellow inmates in exchange
        for contraband. He then travelled widely and began a lifelong commitment to write about Australia’s black and white dilemmas. After living
        in Sydney during the 1960s, Lea moved back to Melbourne, where he was associated with the vibrant Heide set and worked with Barrett Reid on
        Overland . An extremely engaging performer of his work, he also served as mentor to several generations of budding poets all over the country.
        Lea read his poetry in schools, pubs, performance venues, prisons, universities, and anywhere across the nation where eager and captivated
        crowds would gather to hear him read and speak. His elegant generosity of spirit, eternal optimism, and far-reaching influence on Australian
        poetry will echo into the future. There will never be another like him. From the "Foreward" As Shelton lay ill, many friends (among them poets,
        musicians, actors, family, and friends from every walk of life) arrived with all types of presents. Many of these gifts were poems. Some were
        kept at the time, others arrived after his death, and many had been written (either for or about him) in previous years. Jen Jewel Brown encouraged
        me to keep these for a possible book. Kerry Scuffins pushed hard for its birth, and with the rest of the gang: Jordie Albiston, Lyn Boughton,
        Martin Downey, Ian McBryde, Peter Tiernan, Raffaella Torresan, and myself, joined together to bring this to fruition. To those who may not
        be represented here, this book simply fell into its own space and time, and was virtually born of itself. Our credo was immediate and simple:
        to publish a collection which honours Shelley’s unique journey and work, by those who shared his life and loved him to the end. Leith Woodgate,
        Melbourne, July 2008 Cover photograph by Raffaella Torresan.'
    price: 20.0
    isbn: "9781876044985"
    release_date: "- 2008"
    page_count: 64
    reviews: []
the-wild-reply:
    title: The Wild Reply
    author: Emma Lew
    short_description: In The Wild Reply , Lew projects the cinematic mystery and baroque wit of Cocteau and Buñuel.
    long_description:
        'Winner of the Mary Gilmore Prize (1998) Joint winner of The Age Book of the Year Prize (the Dinny O''Hearn Poetry Prize)
        (1998) Lew''s first book has an astonishing originality in its vivacious imperatives ("Start out and remain a villainess") and cool humour
        ("Will technology make me remote?"). This is often poetry of unadorned statements or questions and subtle non-sequiturs, which are always
        suprising, yet always confidently irreplaceable. She uses a variety of stanza forms and sometimes rhymes and half-rhymes. In one of the best
        poems, ''They Flew Me in on the Concorde from Paris'', the detachment of the narrator wavers between sardonic and naive to dramatic effect.
        Lew''s brisk, puzzling, intelligent narrators have not been heard before. Gig Ryan, Judge, The Age Book of the Year Prize He was already the
        least curable, most diminished of people. Civilization increased his moments of sadness. I knew this from the nature and number of scars.
        Let them be collected. Let them be classed with method. Reading Emma Lew ’ s poetry is like entering a cinema after the movie has started.
        Mysteriously, you arrive just at the climax. The characters are in full flight: the urgency of their need and demand for recognition is immediately
        apparent. In its scale and intensity hers is an essentially dramatic art, one which claims its own right to speak, with a defiant gesture
        and powerful assertion, against hosility, disappointment or - worse still - indifference. This is a first collection of uncommon strength
        justly called The Wild Reply . Ivor Indyk In The Wild Reply , Lew projects the cinematic mystery and baroque wit of Cocteau and Buñuel. Adam
        Aitken, The Australian’s Review of Books'
    price: 21.95
    isbn: "1876044136"
    release_date: "1997"
    page_count: 56
    reviews:
        - title: Martin Duwell, The Weekend Australian
          text:
              The Wild Reply Martin Duwell The Weekend Australian , 14-15 March, 1998 Dragons in Their Pleasant Palaces is something like Porter’s
              17th book of, poems; The Wild Reply is Emma Lew’s first. Here, as with all good first books, one meets a consistent, unusual and challenging
              voice. Most of the poems might be described as monologues reduced to surreal narrative fragments, but there is also group of night-saturated
              expressionist lyrics. Reading most of the poems is a bit like coming to grips with a set of intense outbursts without clues as to either
              the speaker or the situation; or, to paraphrase Ivor Indyk’s comment on the book’s cover, to arrive at the cinema just before the climax
              of the film. You have the sensation that Lew has set out to write a set of monologues from a coherent group of speakers (family friends
              or family members or even characters from fiction) and then to strip away all contextual clues. Two things happen to the innocent reader;
              first we focus on the intensity of the poem (and Lew is an intense poet) and, second, our interpretive drive pushes us to try to intuit
              the situation, the key to this particular barbarous sideshow. It’s an exciting tension and it sustains a brilliant first book.
        - title: Bev Roberts, Australian Book Review
          text:
              "Confounding Order Bev Roberts (poet) Australian Book Review , No. 191, June 1997 A recent article on Les Murray quoted his view that:
              ‘Poetry consists of three things... The thinking mind, the dreaming mind, and the body. The body’s there for the dance, the rhythm.’ All,
              yes, Les, but where are the emotions - and the uncomfortable irrationality of emotions? This question seemed particularly apposite when
              I read Emma Lew’s The Wild Reply - which at some points did indeed seem to be a wild reply to Murray’s dictum. While the considerable strengths
              of her poems include thinking, dreaming and rhythm, they also include the impact of disturbing and pervasive currents of emotion. In fact
              the whole book is charged with emotions which confound order and certainty. The power of many poems is achieved through the sustained tension
              between the assured technique, the complex and sophisticated tropes and the fears, doubts and existential terrors invoked in such simple
              terms as ‘Everything we do is scary’, ‘I don’t know where I am / I never know what’s going to happen’ - and the far from simple apprehension
              of Newlyweds, the dead in them; War crying Wage me! Wage me! Orphanages of ideas. But back to the book. The Wild Reply is a first collection
              but for many readers it will not introduce a new voice. Emma Lew’s work has been widely published in literary journals throughout Australia
              (and in other countries) and those who’ve read them - or heard them at readings - have long been looking forward to the appearance of her
              first book. Such anticipation is amply justified: this is an extraordinary book as well as an extraordinary first book, revealing a mature
              and impressive poetic talent. One of the remarkable aspects of that talent is Lew’s ability to create compelling first lines which draw
              the reader into the poems and into immediate and intense engagement: ‘I feel that I can trust you with a secret...’; ‘So I became his bluish-white
              partner...’; ‘Of what earthly use is Madame Bovary to me...’. The strong and urgent rhythms, dramatic images and passionate voice of the
              poems are irresistible but sometimes bewildering, with the focus of the poem hard to find, elusive as a dream. ‘Cheap Silhouette’, for example,
              begins with ‘I need to know / the truth about / the elevator crash’, then moves through a series of staccato, imperative statements to a
              vivid but mystifying conclusion: This must be the world’s sexiest cruise, or a speeded-up version of Coppelia. You see me in a little fury,
              blue halo whirling in the last full year of peace. In a cover note, Ivor Indyk responds to these features of the poems through a cinematic
              analogy: ‘Reading Emma Lew’s poetry is like entering a cinema after the movie has started. Mysteriously, you arrive just at the climax.
              The characters are in full flight: the urgency of their need and demand for recognition is immediately apparent.’ For me, the experience
              was more intimate than film: more like walking into a conversation which has built up and reached a point of intensity that precludes my
              participation - I’m fascinated, want to join in, but too much has happened before my arrival. What this really means is that Emma Lew is
              able to evoke those inner states, those emotions, which are otherwise so resistant to language. Inevitably, I suppose, there are times when
              language wins out: when what’s evoked becomes febrile, almost hallucinatory, through the profusion of imagery and metaphor - Night moves
              like a shadow’s sense, struggling mothwise up from the dust, shaping its howls and merest dreaming, murmuring into the skin. But in many
              poems, Lew is capable of a wonderful clarity exemplified in the concluding lines of ‘Caught in the Act of Admiring Myself’: I’m busy with
              the big nectarine in the fruit bowl while the world plans around me! Yes, and I sketched a little gesture of doubt in the air without moving
              my chin from my hand. The Wild Reply demonstrates the variety as well as the virtuosity of Lew’s writing as she moves with assured case
              between the technically difficult/thematically complex (‘Mythic Bird of Panic’, ‘The Tides’, ‘They Flew Me in on the Concorde from Paris’)
              and the simpler meditative lyricism of poems like ‘Aubade’, ‘Pleiades’, ‘Pond’, ‘Lumber’ and ‘Words for the Night’. Some of her finest lines
              are in these latter poems. Apart from characteristically gripping openings such as ‘Night! Night! / Sell me the small fires’ (‘Pleiades’);
              and ‘Dawn’s massing her old bully self / Above us in a lurid mood,’ (Aubade), I particularly liked this passage from ‘Lumber’: It is this
              anaesthetic air, energy of crouching mountains that holds the trees in a wild lull... The Wild Reply is an accomplished, challenging collection
              with a strength and consistent poetic quality unusual in a first book. Its publication by Black Pepper highlights the major contribution
              that small press is now making to contemporary Australian poetry."
        - title: Herald Sun Review
          text:
              Well versed in everyday themes The Wild Reply Julie Richards Herald Sun , 2 February 1998 For those with a little more stamina and a
              preference for rougher terrain, take a trip with Emma Lew or John Anderson. Both published by Black Pepper, Lew’s The Wild Reply , and [John]
              Anderson ’s the shadow’s keep are challenging in their use of language and imagery. They depart from the usual highways and offer a somewhat
              harsher view from the top... Emma Lew’s The Wild Reply is a bit like gatecrashing a party in full swing. A certain amount has obviously
              gone on before our arrival, and as we make our entrance the characters explode into action as they deal with the modern scourges of apathy
              and hostility. Though at times a little too cryptic, Lew’s dense images store energy like coiled spring’s and she unleashes them at just
              the right moment, resulting in poetry that can point us in a new direction. Both unsettling and subversive, this aggressive response to
              the expressionless face of modern civilisation urges us to fight back with passion. Perhaps poetry is a road less travelled because of all
              the excess baggage poets tend to carry. When this is expressed as metaphors, many readers can feel they’ve missed the bus. With Barbara
              Giles [ Seven Ages ], John Anderson and Emma Lew, there is the distinct feeling of being privy to a special moment in an ordinary life and
              going on a memorable journey of discovery, for both poet and reader.
        - title: Sidewalk Review
          text:
              "Remembering the Negatives The Wild Reply Ian McBryde (poet) Sidewalk , No. 4, December 1999 (pgs 76-77) The best of award-winning Melbourne
              poet Emma Lew’s poetry is akin, to me, to the sensationof suddenly half-way through the day rembering the vivid details of a strange dream
              you had the night before. From its unsettling Maryanne Coutts front cover painting of a small girl, numb with distress, leading a ghostly
              parade of figures around some night terrain, The Wild Reply remains a challenge, a map of mysteries. Lew employs no particular adherence
              to form as such; many of the pieces use stanzaic structures of two, three, four (and sometimes more) lines, which Lew occasionally tampers
              with for effect, such as the final stanza of ‘Evolution of Rogues’: All the jottings come to nothing. Anything terrible has already happened.
              Letters written for the sake of forgetting lie in little bits on laboratory floors. Beneath the surface of some of these poems lie a sublime
              hopelessness, a beautifully-defined melancholia, such as the middle stanza of ‘Coal’: I have nothing but slow trains, the daily thud of
              vodka, eerie light from a skull, my diligence, my sleep, a reverence for iron, machines in the dark, the sad mystery of mountains. As with
              any collection, some poems work better than others; I did not find myself as moved by pieces such as ‘Remnants at Sunset’ or ‘Neptune Street’
              with their short, broken, off-centred lines, but perhaps this is because I find myself more drawn to the surrealistic science of Lew’s more
              ordered work. She has a knack as well, of emphasising the single line with verve and evocation - ‘The great barn bums’, ‘Bring the negatives’,
              ‘cool, deft night decants the last colours.’ I have read a comment or two in other reviews of The Wild Reply that suggest that some or the
              poems don’t work due to a vagueness of intent, or a lack of actual ‘subject matter’ as such. In the end, I cannot agree. Lew’s poetry, often
              by the nature of its (only seemingly) scattered arrangement, produces an unsettling, elegant disquiet which can remain with the reader long
              after the book has been put down. If you have not yet read The Wild Reply , do so and be swept into Lew’s world of drowned jewels and the
              celebration of dust. Oh yes, and bring the negatives."
        - title: Poetry Review Review
          text:
              "Hinterlands The Wild Reply Tracy Ryan Poetry Review , Vol. 89, No.1, Spring 1999 Emma Lew too moves in unaccustomed regions, as the
              haunting cover painting of her book The Wild Reply might indicate. That title can be read as description or sentence: her reply to poetic
              predecessors is unbroken-in, untamed by their conventions, and her voices are multiple, if insistent on certain themes. Lew possesses a
              freedom of diction reminiscent, if we must have predecessors, of Gig Ryan’s, but all her own in style. She can be weirdly gothic (‘The Recidivist’,
              ‘My Adventurer’) and repetitively focussed on the narcotic, the opiate, the world of shadow - ‘shiver’ is a signature word for Lew - or
              cuttingly terse - ‘Smile at me like you smile at police’ (‘Little Sister’), ‘...you can no more trick / the universe into granting favours
              / than your parents into loving you’ (‘Earlier Cartographers of the Moon’) - almost in the manner of a John Forbes; or again a subtle evoker
              of sparse real and psychic landscapes (‘Pond’, ‘Lumber’). Though her poems have been widely published in periodicals, this is Lew’s first
              published collection, and it is exciting to find a first book that immediately strikes out in its own direction/s rather than playing it
              safe."
        - title: The Australian Review
          text:
              "Books in Brief The Wild Reply Adam Aitken The Australian’s Review of Books, The Australian , Vol. 3, No. 8, November 1998 Of these
              poets, Alison Croggon [ The Blue Gate ] is the most self-consciously analytical and philosophical, almost old-fashioned; Coral Hull [ How
              Do Detectives Make Love? ] is the most political, a poet with a mission. Emma Lew’s approach is the least traditional and probably the hardest
              to grasp: there is little desire to define identity, or use poetry as a vehicle for social protest. In The Wild Reply , Lew projects the
              cinematic mystery and baroque wit of Cocteau and Buñuel. Lew’s ‘wildness’ speaks through masks and discontinuous utterance. This is poetry
              that speaks neither for nor against an originating self, but a personality is present, putting on its faces in dusty theatre props rooms
              - the place for ‘portraits / Not touched up’. Here we find sympathetic magic and spells for life’s ineffable randomness. ‘Listen, I am /
              the doctor of this / theatre’ Lew - writes playfully, assertively. Living is a profound performance, ‘an optics so slim, / a to-and-fro
              illusion / of seeing and touching’. Routine is dissolved in alienation-effects and weird metaphor. Mostly she gets away with it. There’s
              a public realm the reader can recognise as historical and real. But she cheerfully admits her expressionistic denial of everyday interpretations
              of life. Her ambivalence undercuts the tableaux and souvenirs of mere artfulness: ‘What smooths the pliable into the mythical, the icon
              into its frame?’ Is there an answer to this that poetry should supply? Not here. Ultimately it is not experience offered second-hand; nothing
              in Lew’s work will seem as familiar as that."
        - title: Island Review
          text:
              Review The Wild Reply Kris Hemmensley Island , No. 75, Winter 1998 Although Emma Lew’s constructions aren’t obviously hitched to anything
              crying out to be said, emerging like runes or stars’ captions, parody of tarot or I Ching, they’re evidently composed of the stuff of such
              urgency. The model for their discontinuity and juxtapositional surprise, all of their tricks at the expense of the traditional address,
              seems to be the surrealism surviving contemporary American practice, thus Ashbery, Palmer, Coolidge, Tate and behind them what’s left of
              the philosophising Wallace Stevens. But Lew’s poems are aggregates of effects, where saying isn’t how one begins but where one hopes to
              finish up, in the nature, I suppose, of ‘the wild reply’. So one recognises that postmodern lyricism which disports as and delights in its
              hermeticism. Only when one catalogues these effects does a vocabulary of illness, death, misery, violence, of hankering after the otherwise
              and the elsewhere, of darkness and its emotional palette, of what I’ll call the sado-masochistic dealing in duality, emerge. Their apotheosis
              might be in the poem ‘How Like You’, whose addressee is cholera, ‘a surprise visitor playing Cupid’, and whose supplicant croons for her
              god to ‘rise like Islam this mauve morning, / inventing dark and savage deserts. / Tonight you launch them from the spire / and they’ll
              spread like spiny fire’. Given, then, that sensible declaration is largely bypassed or suppressed, is this poetry a massive avoidance or
              dissembling? Or, with Paul Celan in mind, is the world so monstrous that only poetic codification can support its telling? A handful of
              poems, including ‘Of Quite Another Order’ with its hypnotic refrain ‘Let them be collected. Let them be classed with method’, and the tragedies
              of ‘Broken Coast’ and ‘The Truth About Love Fearlessly Told’, return pleasure and profundity to a reading too often ambushed by almost formulaic
              messages, memos and instructions. The other, European, possibility arises, that Emma Lew’s writing represents language’s suture of history
              and self, but in this first collection it is marred by an obsessive repetition of tone and mode to the extent that the poetic aspiration
              per se is compromised.
        - title: Social Alternatives Review
          text:
              "Reviews The Wild Reply Gloria B. Yates Social Alternatives , Vol. 17, No. 2, April 1998 The title of this book is apt. The cover art
              is compelling; Maryanne Coutt’s half-child, half monster, is leaving a group of devil-worshippers at midnight. She treads her path alone.
              Even the blurb by Ivor Indyk has some relationship to the text. ‘Reading Emma Lew’s poetry is like entering a cinema after the movie has
              started. Mysteriously, you arrive just at the climax. The characters are in full flight: the urgency of their need and demand for recognition
              is immediately apparent.’ And in an ideal world Emma Lew’s poems would be reviewed by someone who loves them on sight rather than this reviewer
              who has to read and re-read and concentrate, think, reason in an effort to make some sense of half her work. A poem that lacks meaning may
              yet convey a richness, an emotion. But with Emma Lew, poems that begin brilliantly often bog down in their own absurdity. Let me give an
              example: the poem ‘Accountancy’: A man invited me to wrestle, just a man with a normal heart. That same commissionaire set the forest alight.
              The sky’s blue was defeated by his vision of little corners, and the half-mad were mingled wild in the radishes. Summer could at any moment
              end the juggling of the wolves. A midnight breeze rips the strings, then the water attracts us and we dive. More than once he falls down
              in the street in the most calming way I’ve ever seen. Ho always falls like a moody angel - it’s what he means by ‘the scheme of things’.
              Now the first lines are surprisingly perceptive. I think: Yes! Every sexual encounter begins with this tacit invitation to wrestle, the
              disguised experiments at mastery. Yes, she’s right, and it is normal. And when that normal man becomes a commissionaire, I can accept it
              because he ‘set the forest alight’ - that rage of love is recognisable. But by the second verse we know that that this ‘normal’ man is half
              mad, and the third deliberately tries to give the impression of a disjointed mind reflecting a fractured world. Well, for me the juggling
              wolves don’t work. If they are there to prove the world’s absurdity, they don’t succeed. They are unbelievable, they are irritants. I love
              the last verse and its ‘moody angel’ which is totally convincing: I don’t believe in angels any more than I believe in juggling wolves,
              but if angels existed they could be delightfully moody, whereas wolves... Now I’m caught in this absurdity, which is no doubt what the poet
              intended. A victory of sorts. But why turn from the sublime to be ridiculous? The fact is that Lew’s best poems are the least absurd, the
              most sane. ‘I’m being blackmailed again’ is an example where she stops trying to be wild and relaxes into lucidity - and the poem is perfect.
              As for ‘Caught in the act of admiring myself’ one can only admire her, and it’s perfectly clear. These poems demand careful reading and
              re-reading, but they are rewarding. It’s worth deciding for yourself - am I bitching about another poet’s brilliance or have I hit the nail
              on its creative head?"
        - title: The Age Review
          text:
              "Teeming With Ideas The Wild Reply Gig Ryan The Age , 14 February 1998 Emma Lew’s first book from the prolific local Black Pepper has
              a refreshing originality of observation with vivacious imperatives: ‘start out and remain a villainess’ and cool humour: ‘Will technology
              make me remote?’. This is poetry of unadorned statements: ‘Anything terrible has already happened’ and non-sequiturs: ‘Why would I go to
              sea? where no-one can admire me?’ which are surprising and assured, though occasionally random and disingenuous. She uses a variety of stanza
              forms, not always successfully, and sometimes rhymes and half-rhymes. In one of the best poems, ‘They Flew Me in on the Concorde from Paris’,
              the narrator wavers between sardonic and naive: ‘In the carpark at the Institute of Space Research / Women workers were performing their
              role of holding up half the sky...’ Lew’s poems do not just aim for sincerity, which is more common than poetry, as some of Zwicky’s [ Gatekeeper’s
              Wife ] and McMaster’s [ Chemical Bodies ] do; her concern, like Peter Porter’s [ Dragon’s In Their Pleasant Palaces ], is firstly with language,
              and her shocked love poems resemble Elizabeth Barrett’s in sentiment but with a contemporary humour: ‘You cannot count on me for anything’.
              Though the influence of Ashbery and younger poets can be heard, at least in some titles, her work is more direct."
        - title: The Age Shortlist Review
          text:
              Leading literary line-up [The Age Book of the Year Shortlist - Poetry] Andrew Clark The Age , 13 December 1997 Lew’s first book has
              an astonishing originality in its vivacious imperatives (‘Start out and remain a villainess’) and cool humour (‘Will technology make me
              remote?’). This is often poetry of unadorned statements or questions and subtle non-sequiturs, which are always surprising, yet always confidently
              irreplaceable. She uses a variety of stanza forms, and sometimes rhymes and half-rhymes. In one of the best poems, ‘They Flew Me in on the
              Concorde from Paris’, the detachment of the narrator wavers between sardonic and naive to dramatic effect. Lew’s brisk, puzzling, intelligent
              narrators have not been heard before.
        - title: Southerly Review
          text:
              "Poetic Possibilities Danny Huppatz Southerly , Vol. 57, No. 4, Summer 1997-1998 On a completely different track, Black Pepper continues
              its innovative and exciting publishing effort with the first book of poetry by Emma Lew, The Wild Reply . Lew’s work is strong and polished
              with jagged juxtapositions of images and ideas. Involved and intense, her poems open in the middle of a fragmented narrative, urgent to
              the point of vertigo, ‘Will technology make me remote? / I don’t know where I am, / I never know what’s going to happen’. The uncertainty
              of Lew’s poetry takes the reader on a surreal roller-coaster ride into the unknown. Lew’s narrative ‘I’ adopts a series of different character
              positions and viewpoints, the shifting ‘I’ producing a series of short, unexpected dramas: ‘They flew me in on the Concorde from Paris.
              / We were fortunate not to burn. / Over Shanghai I observed to my flautist husband, / ‘Such a metropolis needs a decent opera house.’ ‘They
              flew me in on the Concorde from Paris’, like much of this collection, moves quickly and without fear into difficult terrain and is (thankfully)
              not without its humorous moments: ‘He rejected me in late May. / I resolved in future to express my feelings through my garden, / With an
              archway of zucchinis and cucumbers / A bed of apothecary roses and high-yield grass seeds’. Throughout The Wild Reply there is a sense that
              the world has already ended, the event has happened, and Lew is presenting the shock waves of some mysterious unknown realm yet to be evaluated.
              Writing is a means to enter this unknown realm and, like Jones [ 100 Elegies for Modernity ], Lew embraces its failure to really get anywhere
              in ‘Evolution of Rouges’: ‘All the jottings come to nothing. / Anything terrible has already happened. / Letters written for the sake of
              forgetting / Lie in bits on laboratory floors.’ This fractured world is precariously pieced together - there are traces of love, addictions,
              and the imminence of death. The collection does have its quieter moments, less frenetic poems that provide welcome breathing space, such
              as ‘Alliance IV’ and ‘Caught in the Act of Admiring Myself’. The latter relays a conversation, ‘But doctor, / I’m busy with the big nectarine
              in the fruit bowl / while the world plans around me !’ In ‘Chernobyl: Small Talk’, Lew continues in a more accessible vein, ‘Something about
              the way you dance / reminds me that I have to sit down. We / are beautiful as long as we are masked, / and treachery is an affectionate
              game. / Like a circus, I cover my heartache. / Soon my mistakes will make me famous.’ The reader is immediately involved in the poetic drama
              Lew creates and the juxtaposition of layers anil ideas is unsettling yet absorbing. While The Wild Reply was uneven in places, I look forward
              to further work by Lew and more challenging and dynamic literature from Black Pepper."
        - title: Antipodes Review
          text: Soundings from Down Under The Wild Reply Nicholas Birns Antipodes , Vol. 11, No. 2, December 1997 (pg. 114) [Text not yet available]
        - title: Cordite Review
          text:
              "reviews Emma Lew The Wild Reply M.T.C. Cronin Cordite , No. 2, October 1997 Ghosts inhabit this text, as do figures ‘Of Quite Another
              Order’ and those of the ‘Afterlife’. These are poems of the surreal, landscapes of dream and fantasy, not just a filtering of the real world
              through the lens of poetry. No simple, or even complex, narratives here. Though it is claimed in ‘Earlier Cartographer of the Moon’ that
              we ‘are not free to tell our dreams’, the dreams here are told. Drug(ged) images of opiates and opium, fire and fireworks, heat and flame,
              the burned and burning, haunting and atonement, heaven and hell, sin and saints, magic and chanting, skeletons and coffins, madness and
              death, dreaming and deep... here we have all the altered states of poetry and the poet telling the mysteries of love and sadness within
              the sacred atmospheres of art and life. The poems unfold in darkness and shimmer in an unearthly light. It is a text of shades. Interestingly,
              none of the poems in The Wild Reply stretch longer than a page. Although they may explore the realm of the intuited, the magical, they are
              still incredibly focussed and pared back, Taut ‘visions’ of the inner life, lived in the outer life, are not by any means exclusively interior.
              Words are not thrown around here, but used sparingly in pursuit of the ‘strange’, the ‘other’. The poems may even be paradoxically described
              as small narratives that are anti-narrative in effect. As such, they ask much of readers unfamiliar with poetry, or even those after a yarn.
              They are a species of poems into which you can ‘fall’ and enjoy the words, phrases and atmospheres they create, prior to (and almost exclusively
              of) having to know what they mean. It is this play with meaning, the possibilities at work in the creation of meaning - not of particular
              words and sentences, but of the poem as a whole living organism - by stretching and challenging predictability, that makes for vigorous
              poetry. For some this leads to, and ends with, charges of obscurity. It could also be considered to be the essence of writing, that tracing
              of the mystery of ‘being human’, which must always come back to the human, the condition of being such, as in ‘Holes and Stars’: I just
              got my memory back, few loons and I would live in a corner at the airport, not for the sequence but the agony we had to be in, running off
              with the money and taking our own deaths. Which technology will make me remote? I don’t know where I am, I never know what’s going to happen.
              In this unusual, and not easily identifiable scenario is to be found the grounding line ‘Will technology make me remote?’ The protagonist
              is identified and by the poem’s denouement a long, perhaps ordinary story has been told in a short and remarkable space. These are poems
              which can be read and read again and again, which if nothing else makes the book great value for money. Unlike simple narratives, mapped
              out in advance and inexorably unfurling toward an expected end, Lew’s poems engage the reader directly with the creation of meaning. Rather
              than act as empty vessels waiting to be filled by the reader’s predictions, the content of these poems wash and move and sparkle, are always
              open to the pleasure of interpretation. They seem to hold something different every time they are read. In ‘Mythic Bird of Panic’ the poet
              is ...a child entrusted with state secrets, Caught knowing too much and too little at once. A tiny heart pounds under my collar: A disturbing
              package has arrived. The poem is that package and it disturbs. Another package is delivered in ‘The Power of Loose Change’, where Balanced
              on tho edge of loving, we fall silent in the sediments, Ethics make it possible for us to sit in a room together, damned packages add to
              the fire. The blurb on the collection’s back cover states that ‘reading Emma Lew’s poetry is like entering a cinema after the movie has
              started. Mysteriously you arrive just at the climax. The characters are in full flight.’ This poet’s actors also strive desperately for
              sense in the senseless and the fantastic, and although we may not always ‘know’ the scene, the stage, we are left in no doubt as to the
              necessity and need, for love, understanding, opening or closure, that is at the heart of the work. The more accessible poems confirm this.
              Lew can write with energy and complexity, and her work is often beautiful and touchingly naked in emotion and self-recognition. ‘Alliance
              IV’ ends You cannot count on me for anything, But suppose I volunteer to be harnessed? As you know, I will be desperate if that’s the costume
              you want me to wear tonight. and in ‘Caught in the Act of Admiring Myself’, about a trip to the doctor But doctor I’m busy with the big
              nectarine in the fruit bowl while the world plans around me ! Yes, and I sketched a little gesture of doubt in the air without moving my
              chin from my hand. This poem’s emphatic ‘Yes’ and the ‘me’ of the patient, the sufferer - who is also an individual, an actor - is in direct
              contrast to the usual powerlessness, inertia and apathy of a victim. Through humour and parallel emotional undercurrents Lew effectively
              widens the scope of her work, and creates more space in which the reader can ‘know’ the person in the play. Some of Lew’s phrases are delicious.
              All are original and otherwordly. If sometimes I was left wondering it was a joyful wondering. And in ‘Coal’ she does ask for forgiveness:
              Forgive me: I’m in a trance, and this, is not an age of grace. I live my life twice - a fiercer, ripe, real, sulky, sepulchral, identical
              storm. And there can be no doubt the second life, or perhaps the first, is one of poetry, one I want to share with her. The book’s title
              is superlative."
        - title: The Canberra Times Review
          text:
              "Wide range of new poetry The Wild Reply Paul Hetherington (poet) The Canberra Times , 18 October 1997 Recently in these pages Geoff
              Page wrote about the way larger Australian publishers are withdrawing from publishing poetry. Despite this trend, a good deal of poetry
              continues to be published in Australia... Emma Lew’s The Wild Reply is a debut volume of considerable interest. Both the strengths and weakness
              of this volume come from its pursuit of mystery and suggestiveness, often at the expense of definition and clarity of writing. Some of the
              poems have the quality of fable or myth, as if their reality demands a suspension of disbelief on the reader’s part. For Lew the act of
              poetry seems both an exploration of the evocations of which language is capable, and a defiance of simple narrative conventions. Her poems
              have a sense of being annotations of a place where language and experience are more than usually entangled. An example of her work, ‘Pleiades’,
              begins: Night! Night! Sell me the small fires; Pawn my winter For the shadows of birds. This is an impressive, shifting and indeterminate
              poem which invites the reader to speculate about the act of making meaning from language. It is as if the poem brings a kind of incantatory
              magic with it; a search for the roots of understanding beneath all that is rational and easily explicable. Lew has a good ear for the music
              of phrases, and a number of her poems are tellingly gnomic. ‘The Last Colours’ is one such work. Though brief, it flares in the imagination.
              In such poems, Lew’s suggestiveness works entirely for her, and small poems bring large ideas into focus, and large questions into mind.
              Perhaps what is most interesting about this book is the individuality of the poetic voice it offers, and the conviction of the poetic enterprise
              it contains. Her mostly short poems range widely, and she appears to be prepared to trust the reader to travel with her. There is real faith
              in such an enterprise, and real pleasure for those prepared to take up her challenge."
        - title: Imago Review
          text:
              The Wild Reply Angelika Fremd Imago , Vol. 10, No. 2, Spring 1998 Emma Lew hails from Melbourne. Many of the poems in The Wild Reply
              have been published in reputable literary magazines. Lew’s is a new voice, the diction unusual, breathless and thoughtful; original. Her
              phrasing is reminiscent of Dorothy Porter’s poetic rhythms that simulate dramatic speech. The whisper of a new car. The darkness of trees
              and behind the darkness. The pipe, the cool hills and the man. Things you only buy once in a life time. ‘Afterlife’ Perhaps Lew is familiar
              with Wittgenstein’s theory that the world is made up of unrelated facts. Yet the images, the information she collects together without attempting
              to create a lyrical synthesis, add up. She rails against cruelty, indifference, disappointment, the down side of human existence. This is
              an exciting book, a poetic revolution.
        - title: Heat Review
          text:
              "The Wild Reply Felicity Plunkett Heat , No. 6, 1997-1998 (pgs 203-206) In ‘Thebes’, towards the end of her first collection, The Wild
              Reply , Emma Lew describes a body as ‘crepuscular’, and though there is blood in Lew’s poems, the bodies here are located not in the moment
              of laceration which Ryan describes [Tracy Ryan, Bluebeard in Drag ], but beyond that, in smudgy havens, places beyond pain. The body in
              twilight, then, is a motif Lew plays with here. Like Ryan, Lew’s poems deal with the terrain of revisited childhood and familial violences,
              and the retrieval from those of innocence and passion. Yet there’s an aloofness here, a stepping back from the immediacy of pain to inspect
              it with distance. With this come self-ironising speakers and unexpected apostrophes - an address to cholera, or from a younger sister asking
              ‘Do spies love, Em?’ These shifts in tone and direction give the collection a dream-like aspect, and a sense of dreamscape logic. It also
              makes the collection a more playful one than Ryan’s. In the final poem, ‘The Recidivist’, the speaker reminds me of Plath’s protean speaker
              in ‘Lady Lazarus’, each contemplating wounds, wounding, and damaged bodies. Like Plath’s famous opening lines ‘I have done it again’, death,
              in Lew’s more riddling version, states: ‘I’ve done it. I do it. I’ll do it again.’ It’s the same fascination with pain and healing, and
              the verge and verve of death, and a similar cool appraisal. Yet in the last stanza of the poem, ‘Atoning dust blows here every day, / ancient
              sunlight cools my sins’ is more typical, to my mind, of the currents in these poems. The speakers and feelings are often enigmatic, ambiguous,
              unsettled and unsettling. In ‘Cartouche’ one describes her face as ‘strange... hieroglyphic and shadowed’. There often seems to me to be
              some sort of dust coating the images of Lew’s poems, or some sort of veil separating speaker from pain, and reader from speaker. I don’t
              think this makes the poems less daring than Ryan’s, just adventurous in a different direction - that of costumery, masquerade and carnival.
              Lew’s poetry, like Ryan’s, deals with demons and dreams, and with hauntings, but Lew’s use of metaphor could be described as centrifugal,
              where Ryan’s tends towards the centripetal. Ryan’s metaphors seem to me to crystallize, where Lew’s associative, intuitive poems move out
              from metaphor to metaphor. In ‘The Understudy’, for instance, there’s a striving outwards for meaning, a shifting from image to image. Alongside
              this is a representation of the struggle to sense meaning: ‘I cut as deeply as I can.’ ‘Earlier Cartographers of the Moon’ metaphorises
              the processes of articulating and expressing pain, and weaves images of ‘eerily managed reality’ around the starkness of lines like: ‘...you
              can no more trick / the universe into granting favours / than your parents into loving you.’ ‘Little Sister’ similarly mixes the whimsical
              with the blunt and unflinching, following evocations of unsettlement and chaotic emotion with the pragmatism of ‘What is left of our family
              / Must make do on cold philanthropy.’ Another strand of the collection deals with the erotic. In ‘Aubade’ Lew inflects the genre with whimsy
              and understated honesty. The speaker confronts an ominous morning, ‘massing her old bully self / Above us in a lurid mood’, but ultimately
              feels sheltered on the ‘tranquil shoulder’ of a lover. Yet the resolution is an uneasy one, as the last couplet underscores safety and ecstasy
              with potential violence: ‘your trigger finger / Lays me out on our prairie bed.’ The wilderness of this recurs in the collection, as the
              jagged energies of desire and fear run beside one another. The vulnerability of the hearts and bodies in these poems is also their strength:
              Lew writes, unflinchingly, of the impossibilty of safety and sureness, and the erotics of courage and desire."
        - title: Overland Review
          text:
              "True Fever Julie Hunt (poet) Overland , No. 149, Summer 1997 The poems of Emma Lew in The Wild Reply are from a very different world,
              a world in which the idea of gaining a sense of place and meaning through continuity would be absurd. The cover painting depicts a macabre
              little girl leaving what could be a carnival scene or a ruined theatre. Stark figures play with a giant mask in the background. Someone
              is attempting a balancing trick. All is ominous and shadowy. The departing figure, a sort of ‘wise child’, glances behind her with a knowing
              look. Who is this character? An orphan at the end of history. Someone who lives ‘heirless / on playthings, collectables’. The Wild Reply
              is exciting. It is a defiant answer to a question that makes no sense. Emma Lew is not concerned with conventional meanings. She does not
              ease the reader into a poem as if into some understandable reality. The arrival is abrupt, jagged. There is a sense of urgency: I need to
              know the truth about the elevator crash. I can’t wait or the pain will go back into its house. Listen, I am the doctor of this theatre.
              ‘Cheap Silhouette’ ‘This theatre’ is charged territory. The terrain is unpredictable. Emma Lew uses whatever comes to hand - surreal image,
              bland statement, sudden declaration, Hitler, Goebbels, ‘an archway of zucchinis’. The lack of caution is exhilarating: There is so little
              to hide behind We are always hounding ourselves Why shouldn’t we laugh, even if there is nothing? ‘The Way out of Hungary’ There is a wry
              intelligence at work here. We are warned to be attentive: ‘hoax callers are jamming the emergency lines...’; ‘we are beautiful as long as
              we are masked, / and treachery is an affectionate game...’; ‘The agony is only put on...’ It is easier to describe the work in terms of
              what it does rather than what it is. Abrupt changes of style and tone disorientate the reader. There is a hit-and-miss quality to the writing,
              a sort of stab-in-the-dark abandonment that dislocates and allows for sudden and surprising possibilities which is what I look for in poetry
              - to be startled into a new place. Reading The Wild Reply is to be in the line of random fire. Sometimes it misses but there is no mistaking
              when the words meet their mark. You receive them like advice: collect your mail, keep your strange name, feed your true fever."
        - title: Verse Review
          text:
              "Book Reviews The Wild Reply Judith Bishop Verse Images in Emma Lew’s striking first book, The Wild Reply , do not come as softly to
              the table of symbolic resonance. The dramatic narrative voices of these poems render the material world opaque, projecting the psychic states
              of a speaking ‘I’. This is the first stanza of ‘New Moon’: First kisses, all salty. The muteness of public places. It is evening. The landscape
              twitches the way a lunatic waves goodbye. The last lines of this stanza show an anthropomorphizing technique Lew has developed throughout
              The Wild Reply , it is one element of the affect of her poems. Dawn ‘mass[es] her old bully self’, cholera ‘worr[ies] over the health of
              strangers’, night ‘shap[es] its howls and merest dreamings’, planets ‘moan’, the moon is ‘sad, striving’. In ‘Lumber’ the technique is used
              to subtle effect (‘prowl of dark’, ‘crouching mountains’): Seek here for that purple strength, slow curtain of an arcane light; the pull
              of shadow, prowl of dark, the benumbing, the quiet fuming. It is this anaesthetic air, energy of crouching mountains that holds the trees
              in wild lull: smoky fingers to lure a sun. An occasional poem, such as ‘Pond’, gives a glimpse of the world through a lens less tinged with
              subjectivity, yet still emotive. Here the sense of touch is invoked to describe the intangible qualities of light: Shadows grab the nettle.
              Dusk gains as it touches, with cool-warm movement, soft-solid colour. Day itself seems to glide down to earth, finished, fingered, like
              a father’s ghost. Some of Lew’s most effective poems are startling renditions of the conflicting impulses of desire and repulsion which
              inhabit us, and the conventional idioms which give them voice. She frequently splices moods and tenses, the shifting inflections of the
              narrative voice mirroring the asequentiality of thought in an agitated mind. The poem ‘Chernobyl: Small Talk’ makes memorable use of these
              devices: I feel that I can trust you with a secret: I’ve been ordered to fall in love with you and I’m insanely worried about my eyes. To
              this, add the collapse of my own private world. I would kiss you but am afraid to soil myself. I’m inaudible. I’m babbling and my hands
              are in a constant state of motion, for love is immortal and lingers on in dreams and waking visions. A fanatic is not expected, but allow
              me to hanker. Come over, the apples are ripe in my guardian’s orchards. On the negative side, Lew’s poetry does not substantially gain by
              its collection in a book. Poems in which the words are carefully weighted, which arrest one’s attention when discovered singly in journals,
              can seem resoundingly dark in the company of like poems; Lew’s chosen diction is collectively heavy with symbolism. In the closely-crafted
              poem ‘Words for Night,’ we Scan night, burning, terrible, moody, howls, savage, aching, dark, dying, dead. Lew’s diction is an element of
              her striking originality; as the poet Gig Ryan has remarked, the narrative voices of Lew’s poetry ‘have not been heard before.’ Yet the
              public success of Lew’s book cannot be solely attributed to its newness. Her modulations of tone and word collocations are often beautifully
              precise, as in the choice of ‘wayward’ in this stanza of ‘Words for Night’: There is an opium of the night, epic, luminous, wayward - a
              sad, striving moon lost in what is whispered. There is a skilled use of internal rhyme in this and other poems; end-rhyme is occasionally
              used unobtrusively and to strong effect. Lew alternates between employing regular stanzas of between two and eight lines and a freer delineation
              of stanzas, modulating the impact of lines; where regular stanzas are used, there is often a tension produced between the content and form
              of the poem. A small number of poems experiment with a more widely-spaced lineation, but for the most part, the effect the poems seek is
              one of spatial and psychological density."
        - title: Australian Womens Book Review Review
          text:
              "Connections & Contrasts The Wild Reply Michelle Mee (poet) Australian Women’s Book Review , Vol. 9, No. 2-3, Spring 1997 As the publishing
              industry gradually prints more Australian women poets, the marvellously diverse nature of women’s voices is heard and can be celebrated.
              The four collections [Ludwika Amber, Our Territory , Alison Croggon , The Blue Gate , Emma Lew, The Wild Reply , Sarah Day, Quickening ],
              discussed in the following, indicate something of the fecundity, intensity, method and power of work currently being produced by Australian
              women writers. Sometimes there are connections, other times contrasts... Emma Lew’s collection The Wild Reply made me feel that I had arrived
              when the party was well under way, that everybody else knew each other and was talking, tongues loosened by wine, so that I could not contribute,
              or even give a wild response. But I shall try. I’m sure that it is good poetry. I know that it states the case of the contemporary poet/artist.
              Perhaps it is post-feminist. It is surely a strong, strident intelligent voice. Emma Lew’s eloquence remains after the book has been read.
              There is in places a gothic quality: ‘I have shivered with jackals / and half-lit gods / and the heavens in this lurching, / tender gloom’.
              But it is not in the subject matter - this is a poem about Africa. It is the language that vaults and spires and arches in the architecture
              of the mind. It is not sensual poetry, but witty and artful. Sometimes the poetry has a quality of being oral history transcribed onto the
              page. But the reader only comes in at the middle of the story. From the fragments given, however, we can imagine the whole story. Our minds
              are teased with the detail of a picture. We make up, search out the rest. Other times there is the suggestion, the feeling, of intended
              or forthcoming violence. There is threatening confrontation in the physicality of, ‘a fury locked / in the body crepuscular’. I would like
              to have more points of reference than I was given, as a reader, in The Wild Reply ."
        - title: New England Review Review
          text:
              "Elegance and whimsy The Wild Reply Paul Cliff New England Review , No. 6, Winter 1997 Emma Lew’s finely-produced tome from small Victorian
              publisher Black Pepper (with the aid of the obligatory Australia Council grant) appears a timely debut, in view of the extensive acknowledgments
              list showing publication across Australia and overseas. Born in 1962, Lew’s work straddles that modernist/post-modernist blur. The great
              bulk of the 56 poems are written in the first person, an often strangely removed ‘I’ or ‘we’, with a foot firmly in the surreal: They will
              be making snow tonight; it will be beautiful and we can afford it. Come quickly, by yourself, bring the negatives. ‘Holes and Stars’ The
              personas speak of estranged love, often in an undefined-sex voice (male or female?). For me, there is something of the Latin/South American
              tradition in such lines as: ‘the tactile celibacy of the machine’, somewhere in the general area in which other Australians such as Peter
              Boyle have been seen to work: ‘pawn my winter / for the shadows of birds’ (from ‘Pleiades’). There is also a recurring menace and a lean
              to the whimsically sinister: ‘The Fuhrer’s pockets are always filled with chocolates’ (from ‘Berchtesgaden’), and an Emily Dickinsonian
              tightness, with the title often serving as the poem’s first line. There is, too, a tilt towards the smart-talk of the New York / John Forbes
              school (Lew acknowledges Forbes for support in the pre-matter): I delivered my acceptance speech in the Great Hall of the People... calling
              on steel makers to take up the way of Lamism. ‘Lets start calming down!’ I cried... ‘Let’s get off painting and onto banking.’ ‘They Flew
              Me In On The Concorde From Paris’ Or again: We punch shapes into space which a museum exists to defend... If a head is complicated, it can
              be used as a chapel; ‘The Power of Loose Change’ There is likewise a welcome lyricism, as in such lovely lines as: ‘Like water crumbling
              in a place of stones’ (‘I’m Being Blackmailed Again’), or the extended image of dawns which: methodically lick out street lights, scuttle
              cross-dressers from the soiree, strain night sweats into resealable vials ‘Aubade’ Generally Lew’s is a somewhat abstracted world - engaging
              the human-made (laboratories, asylums and geometry) rather than the overtly natural world. A creditable first collection."
        - title: The Mercury Review
          text:
              Books The Wild Reply Tim Thorne The Mercury, 12 May 1997 One of the most exciting talents among emerging poets in this country belongs
              to Emma Lew, from Melbourne, whose first book, The Wild Reply demonstrates a high degree of skill and a quirky, idiosyncratic approach to
              experience and language, resulting in poetry which makes for compulsive reading.
        - title: Eureka Street Review
          text:
              "Poetry The Wild Reply Alan Wearne (author and poet) Eureka Street , Vol. 7, No. 4, May 1977 I am only interested in promoting those
              volumes of verse that seem an adventure for the reader. All of these four volumes [Emma Lew, The Wild Reply , Judith Beveridge, Accidental
              Grace , Les Murray, Subhuman Redneck Poems , Lee Fuhler, Dogtown ] have adventure (though the adventure may not be the one the poet had
              in mind). None plays safe. Take this, for example, from Emma Lew’s ‘How Like You’? How like you, cholera, to worry over the health of strangers.
              And you have let your sweetheart go hungry, while your legend crossed the country, a surprise visitor playing Cupid, keeping the happy happy
              from guest wing to portrait gallery, prickly wilderness to deepest city. Like many a Lew poem it smoulders and blazes; it stares straight
              at you, ready to seduce, ready (even better - or worse) to spook. ‘Oh my God!’ you ask, ‘Where’s the woman taking us this time?’ Disarming
              stuff. Most poets can juxtapose at times, but few can do it like her. With Ramona Barry and Cassie Lewis (who have yet to appear in volumes)
              Lew is as formidable a new Australian poet as any in the nineties. Were she a writer of prose fiction (damn refuge of the contemporary over-rated)
              she would be in line for a call from Vogue or The Good Weekend , pleased to announce her appointment as the latest fad goddess. Luckily
              good verse requires more brain power: though that doesn’t mean you can’t just soak mind and imagination in Lew’s sombre lyrics. There’s
              a chilling portrait of Hitler and henchmen, at home in Berchtesgaden, a reminiscence of weirdly black humour from (I think) a Chinese woman
              politician, love poems, landscapes, evocations of the European past. The tone might be consistantly intense (though never bleak) but the
              subject matter covers considerable imaginative territory. I need to know the truth about the elevator crash, I can’t wait or the pain will
              go back into its house. Listen, I am the doctor of this theatre. Emotions, reactions - they’re my business. I’ll say they are."
the-sea-palace-hotel:
    title: The Sea Palace Hotel
    author: Patrick McCauley and Raffaella Torresan
    short_description:
        a group of nine paintings, three photographs and twenty poems which explore Patrick and Raff's three week visit to Colaba
        in Mumbai, India, during February 2016. The Sea Palace Hotel is just down the road from the Taj Mahal Hotel, and the site of the Islamist
        terrorist killings in 2008. The Gateway To India, a huge and magnificent arch built by the Indians to welcome the English and The East India
        Company to India, was also the place where Raff camped for a few weeks free accommodation - back in the mists of time, when she was on the
        hippy trail.
    long_description:
        The Sea Palace Hotel a group of nine paintings, three photographs and twenty poems which explore Patrick and Raff's three
        week visit to Colaba in Mumbai, India, during February 2016. The Sea Palace Hotel is just down the road from the Taj Mahal Hotel, and the
        site of the Islamist terrorist killings in 2008. The Gateway To India, a huge and magnificent arch built by the Indians to welcome the English
        and The East India Company to India, was also the place where Raff camped for a few weeks free accommodation - back in the mists of time,
        when she was on the hippy trail. Travel art can be a way of seeing. In The Sea Palace Hotel Patrick McCauley poems and Raffaella Torresan’s
        paintings refresh such seeing. Past narratives which persist in memory and collide with the shock of the present through the viewing of new
        unfamiliar landscapes and cultures. The confusion of ideas and stories which are already with us, merge with the first hand stories and images
        never before viewed first hand. This phenomenology allows the perception of the artist to apply itself differently—as it seeks to find its
        truth or beauty within the new environs. We search for new words (or colours or lines) to describe what we see ‘en plein air’. Words tumble
        through each other. Time can be felt to expand and contract. "In a sequence of verbal and visual responses to the Mumbai stream of consciousness
        flowing around them, Mc Cauley's poems and Torresan's paintings and photographs achieve a kind of syncopation, working as ciphers of a shared
        experience, rather than simply being versions of each other. As a result we are given access, both as readers and as viewers, to a world that
        meets us on several dimensions at once." Dr Homer Rieth
