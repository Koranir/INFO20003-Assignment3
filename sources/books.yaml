meditations-of-a-flawed-groom:
    title: Meditations of a Flawed Groom
    author: Vivian Hopkirk
    short_description:
        Art begins with puberty, with seduction. Ask the lyrebird. Meditations of a Flawed Groom is an unashamedly philosophical
        novel, its language a cool display of a fabulous pyrotechnic. It is set in a Sydney jail. The narrator Stephen West, arrested for disorderly
        behaviour, is obliged to stay to discharge accumulated fines. From this point on the forceful and satirical action often takes place within
        the landscape of Stephen West's mind. The bride implied by the groom of the title is unrestrained imagination. The hero is the prototype of
        the Romantic and Modernist artist. The author is a nephew of the painter Brett Whiteley, who decisively intervenes as a character in the novel.
    long_description:
        Art begins with puberty, with seduction. Ask the lyrebird. Meditations of a Flawed Groom is an unashamedly philosophical novel,
        its language a cool display of a fabulous pyrotechnic. It is set in a Sydney jail. The narrator Stephen West, arrested for disorderly behaviour,
        is obliged to stay to discharge accumulated fines. From this point on the forceful and satirical action often takes place within the landscape
        of Stephen West's mind. The bride implied by the groom of the title is unrestrained imagination. The hero is the prototype of the Romantic
        and Modernist artist. The author is a nephew of the painter Brett Whiteley, who decisively intervenes as a character in the novel. Mr Vivian
        Hopkirk is a poet and prose writer of outstanding talent and dedication. Rodney Hall a powerful but anarchic talent Geoff Page, Books & Writing,
        Radio National Cover painting Portrait of Stephen West by John Baird
    price: 19.95
    isbn: "1876044039"
    release_date: "1995"
    page_count: 149
    reviews:
        - title: Rodney Hall, The Sydney Morning Herald
          text:
              Best books of ’ 96 Rodney Hall, novelist The Sydney Morning Herald , 30 November 1996 My year’s reading has been dominated by Roger
              Milliss’s magnificent history of the Australia Day massacre of 1838, Waterloo Creek . Pauline Hanson ought not to be allowed back into Parliament
              until she has read all 750 pages. Milliss’s great achievement is to marshal a wealth of facts into a story of breathtaking drive and moral
              urgency. A thoughtful Christmas present for John Howard, too. I have just begun The Glade within the Grove by David Foster. It is already
              proving to be Foster’s characteristic mix of comedy and erudition - massive, quirky and very good. I am yet again astounded that he is not
              more celebrated. Too much adulation is squandered on lightweight novels masquerading as literary works. While on the subject of mis-judgments,
              how depressing it is when a gifted new writer emerges to almost complete silence. That’s what happened this year to Vivian Hopkirk’s Meditations
              of a Flawed Groom . It deserves to be celebrated, not ignored.
        - title: Lisa Catherine Ehrich, Social Alternatives
          text:
              Lisa Catherine Ehrich Social Alternatives , Vol. 15, No. 4, October 1996 Meditations of a Flawed Groom is a very complex novel. Essentially
              it is the story of a man who spends three days in a Sydney jail as a result of some unpaid fines and disorderly conduct. Stephen West, the
              main character, is a poet and philosopher. Among other things, he expounds on various topics such as religion, art, history, society, and
              metaphysics. The reader is very quickly introduced to his unbridled imagination and his philosophical quest for understanding the nature
              of humanity. The book is divided into four main sections, and each section introduces a new inmate who spends a short stint in West’s cell.
              Each of these characters is colourful - from Morris, the Aboriginal junkie and thief, to the brilliant-minded derelict who is able to hold
              his own with West when it comes to intellectualising. However, the reader is prevented from developing any empathy for the inmates, because
              the author’s convoluted language and cryptic statements act as a barrier. The final part of the book marks a dramatic and unexpected shift
              in pace, language and style. Whereas the first three chapters rely heavily on overused metaphors and artificially flowery language, the
              final part of the book is refreshing in both its content and language. It is as though the author decided to give up on trying to impress
              the reader and just got on with the job of writing. The change in style is so great, it is a little disorienting. It is in chapter four
              that Hopkirk becomes the writer of advanced ability that he only pretends to be in the earlier part of the book. He shines through with
              affection as he narrates his childhood with a keen and cynical eye. His recollections are interrupted by the arrival of another inmate who
              shares one night in his cell. The two men develop an instant rapport and exchange humorous stories. The stories are delightfully refreshing
              and light-hearted. The book concludes with West’s release from prison. In fairness to Vivian Hopkirk he has set himself an almost impossible
              literary task. To write seriously a philosophical and poetic novel that can maintain a gripping narrative throughout is something that only
              the likes of Genet or Sartre could accomplish. However disjointed the first part of the book, the second part improves dramatically. The
              author’s talent is defined without question at the end of the book. Hopkirk is an important writer though one cannot help but feel cheated
              at having to wade through so much obscurity at the beginning of the novel to get the rewards at the end.
        - title: Robert Umphelby, Muse
          text:
              Musecrits Robert Umphelby Muse , No. 156, October 1996 Meditations of a Flawed Groom jumps upon the reader’s senses with the first word
              and never takes breath. With an almost euphoric mien Vivian Hopkirk’s first novel describes his deliberately induced stay in a Sydney jail
              and its impact on his philosophical and poetic mind. His vision draws constantly on the likes of Camus, Kundera and Solzhenitsyn for quotation
              and guidance and combines with his own words to create a novel of very heavy reading. The language of Hopkirk’s novel is dense with description
              and creates such a vivid dialogue of a mind agonising in jail, it is hard to believe it is not deaf with self-possession. This is not to
              say Vivian Hopkirk does not wield a mighty style of prose, just that at times it takes on a mind of its own that it is so strong it loses
              credibility in descriptive overload. Meditations of a Flawed Groom ’s dense prose is hard to read and is really only for those who are patient
              and can enjoy the complexities of a philosopher’s mind in the poetic.
        - title: Radio National Review
          text:
              "Books and Writing Geoff Page Radio National, Broadcast February 1997 Clearly autobiographical in many, but not all, ways, Meditations
              of a Flawed Groom is a daunting book to review. As with most autobiographies one feels that in some sense one is reviewing the author rather
              than the work. In the book’s blurb we learn that Vivian Hopkirk is a nephew of the painter Brett Whiteley and it is not a total surprise
              to see that the late painter is hagiographically offered as a character in the novel. We also learn that Hopkirk is a poet and it is no
              surprise to see that the book’s narrator, Stephen West, is also a poet. The publishers also inform us that the book’s basic situation, a
              short stay in jail,has also been an experience of the writer. Given this extra-literary information we may proceed to the novel itself.
              The narrator, Stephen West, in the course of a three day stay in jail, converses with, or listens to, a succession of cellmates: a young
              Aboriginal man called Morris, a philosophical derelict who is heavily into metaphysics and a painter who is an extraordinary raconteur.
              Occasionally he hears disconcerting activities in the corridor outside and is from time to time abruptly visited by the warders. In between
              there are various flashbacks, as for instance, to the narrator/author’s childhood and his parents’ marriage break-up, in which Brett Whiteley
              himself seems to have played a benignly facilitating role. The style of the book ranges wildly from large slabs of indigestible philosophical
              dialogue (such as were almost never spoken, even by Socrates and his students) to humorous and highly engaging tall tales from the painter’s
              travels in Europe. Significantly the later are not from the mouth of Stephen West who seems to have had a terminal overdose of polysyllables
              and will never use two simple words when one arcane one will do. West himself explains this preference, though not necessarily convincingly.
              ‘As a rule’, he says, ‘one must be careful not to speak too mysteriously in the English tongue, particularly in the Antipodes, for fear
              of a smack in the mouth.’ One excerpt from the ‘dero’ sequence illustrates what he means. ‘In other words,’ says Stephen West, ‘God and
              the Cosmos are synonomous. God evolves. This life ensures that we begin at the darkest beginning and find our way in the gradual realization
              that we are responsible, not only to our selves, but the fortunes of all existence: to God.’ ‘Hmrnmm,’ said the dero. ‘You certainly are
              a crack metaphysician. I admit that I like your style. Of course, you know what Albert Camus would say.’ Hopkirk, via Stephen West, may
              indeed by a ‘crack metaphysician’ but whether he’s a true novelist is less certain. The problem with most of this book is that it really
              asks too much of its reader, especially in the opening sections. The narrator often seems pompously grandiloquent and the texture of both
              narration and dialogue is more or less impenetrable. One needs a kind of protestant self-discipline to persist and I was encouraged only
              by skipping ahead and noting that some of the later sections were rather clearer and so forced myself to go back and work my way slowly
              forwards again into those more open pastures. Among the more congenial of such expanses is Hopkirk’s account of his childhood in New Zealand
              and the breakup of his parents’ marriage. The narrator says of his mother at this point that ‘she was proud and yet somehow abandoned by
              the extraordinary fame of her brother, who was, until he perished alone in a motel on the South Coast of New South Wales, one of the most
              remarkable men ever to pace the earth.’ Although this was not the universal view of the critics who reviewed Whiteley’s 1995 retrospective
              it is clear evidence of the artist’s heroic status in his nephew’s eyes, a view further confirmed by the commanding assistance given by
              Whiteley to his sister in giving her husband the bad news. ‘Brett was straight from the hip: ‘Man, we’re here to break your heart, and you
              have to accept it. It’s your fate, you’ll have to be real big. Fran is leaving you for this man, they are in love, and they are going to
              live in London. That’s the story, that’s the way it is and I have come a long way to tell you this.’ Another of these more open pastures
              are the tales told by his third cellmate, John, a painter, who is in overnight on a charge of ‘asleep and disorderly’ following a drunken
              night out with a woman that went badly wrong somewhere. The painter leaves Stephen West (and the reader) highly entertained (and mercifully
              speechless) with several tales of wild times in Europe with other Rimbaud-style artists and their women. The scene shifts considerably -
              France, Greece, Italy and Ireland - but perhaps most memorably to a plane trip in New Guinea with a drugged wild boar who wakes up in mid
              flight. The novel ends with Stephen’s ejection from jail on the third day and his return to the inner city boarding house described earlier
              in the novel and tenanted by people of various sexual inclinations and no less strange than West himself. What the average reader will have
              made of Hopkirk’s novel by this stage is hard to say. Some, like the narrator, may be groggily relieved at their new freedom. Some will
              consider, with some justice, that they have wasted their time. Still others will feel they have been in the claustrophic presence of a powerful
              but anarchic talent which has not yet quite found its true metier. In any event, Vivian Hopkirk and his Meditations of a Flawed Groom will
              not slip blandly from their memory."
        - title: Australian Book Review Review
          text:
              "shorts Sydney Smith Australian Book Review , No. 188, February/March 1997 These are the ruminations of one Stephen West during a three-day
              stint in prison. Groping through the murk produced by the author’s over-use of the thesaurus and under-use of the dictionary, I encounter
              Stephen’s co-inmate, an Aborigine from Redfern,who recounts his history of drug abuse and crime, which sets Stephen off on a line of reflection.
              A people for whom we have inherited the responsibility of those who assumed to change the world, into which we have invaginated ourselves...
              A page of this exhausted me. And it went on: ‘What a centrifuge of terrors and absence of communication or belief in the ductile holiness
              of a child.’ Good grief. Look - this is a bad book. The English is usually deranged; the philosophical bits are trite or poorly reasoned;
              poetry and humour don’t exist in it. The recurrence of certain words: ‘vanity’ and ‘invaginated’ are two examples, gave me a picture of
              Stephen and his creator which I’m sure the latter did not intend. So that, when Stephen announced, ‘Estrange the child, and you estrange
              it from itself,’ I knew with certainty he had no idea the truth he spoke."
running-dogs:
    title: Running Dogs
    author: Barry Klemm
    short_description:
        Klemm’s company tries to survive with laconic forbearance amid their Apocalypse Then . In its determined unsentimentality,
        Running Dogs both moves and chills as it evokes life with a Catch-22 edginess where death is always imminent.
    long_description:
        Running Dogs is a novel of Australians in the Vietnam War, told by one who was there. It tells the story behind why Post Traumatic
        Stress Disorder, a condition politely known as ‘battle fatigue’, was defined only as a deep-seated psychological trauma after the Vietnam
        War. It will open your eyes. It will tell you, surprisingly, of the camaraderie of humans under extreme pressure. This is not preaching or
        ideology. This is a drama that puts the reader in the midst of life and death action. We are plunged into the midst of an ambush. The attack
        is ruthlessly accomplished. But the jungle and pressure take their toll. With the narrator Yogi Griffin we are at the sharp end of the platoon’s
        life and death endeavour. Each incident is tense. A Buddhist monk dies in Yogi’s arms. Children are shot. The men begin to find their own
        actions unacceptable. Adopting the tactics of the Vietcong, they turn upon their officers in a frantic battle of wills. But by then their
        worst enemy has become themselves. Both heart-rending and comic, Running Dogs is the coalface war the official histories do not tell. Barry
        Klemm served in 11 Platoon in Phouc Tuy Province, South Vietnam, during the time when the novel is set, between April 1967 and March 1968.
        ‘Not only can we now say that the enemy cannot win but we ourselves have won the war although it is not yet at an end.’ General Westmoreland,
        US Commander in South Vietnam, April 1967 ‘The Tet offensive has meant nothing less that defeat for the enemy.’ General Westmoreland, March
        1968 Klemm’s company tries to survive with laconic forbearance amid their Apocalypse Then . In its determined unsentimentality, Running Dogs
        both moves and chills as it evokes life with a Catch-22 edginess where death is always imminent. Murray Waldren, The Weekend Australian The
        tenor of some of the last words of the novel (‘It was a f------ fiasco, wasn’t it’) recalls that of William Nagle’s The Odd Angry Shot , the
        other veteran’s novel with which Running Dogs can fitly stand guard. Peter Pierce, The Canberra Times
    price: 25.95
    isbn: "1876044314"
    release_date: 2000, Reprinted 2005
    page_count: 173
    reviews:
        - title: Debra Adelaide, The Sydney Morning Herald
          text:
              "In short new releases Debra Adelaide The Sydney Morning Herald , 16 September 2000 Klemm has drawn on his own experiences in the Vietnam
              war to write this novel, but there is nothing earnest or self-indulgent, preachy or even political in any of this - nothing but bold savage
              writing that grips us by the throat, thrusts us into the horrors of war and never lets us go. Written in the second voice, the narrative
              creates the disturbing illusion of becoming our own voice, echoing madly. Episodic chapters chart the gradual disintegration of a platoon,
              starting with a ruthless ambush of four civilians, and ending with the last card game before going home where ‘you didn’t have to carry
              a rifle everywhere you went’ but where the nightmares will remain forever. The tone is both cruel and comic, drenched with irony: ‘Maybe
              it was a massacre, maybe it was a great victory, maybe it was a trivial skirmish in which no-one got hurt. No-one could ever tell.’ It’s
              a terrible and powerful reading experience."
        - title: The Examiner Review
          text:
              Dogs of an ugly war Ivy Fleming The Examiner , 21 October 2000 There’s nothing pretty about Barry Klemm’s story of the Vietnam War in
              Running Dogs . It’s a frank account of what the war was like - and who better to tell the story than an Australian Vietnam-veteran-turned-author.
              The events in the book take place between April 1967 and March 1968 in Phoue Tuy province, South Vietnam. The reader takes on the identity
              of Pte Griffin, or Yogi Bear. Because the reader is at the centre of the action, it gets very disturbing when faced with everything from
              shooting a group of armed Vietnamese kids to dealing with leeches in the swampy terrain. And just when you think this bunch of soldiers
              can kill anything, there’s the incident where Yogi tries to save a Buddhist monk. Running Dogs provides a picture of the Vietnam War in
              frank detail. However, it might be a bit more than some can stomach. Although the story starts off ferociously (I had to force myself to
              continue despite the rough language and too-much-detail narrative) it does eventually ‘slow down’ as the soldiers come to grips with what
              they are doing. Shudder, and feel lucky that you’re reading it and not living it.
        - title: The Sunday Age Review
          text:
              Debut Mike Shuttleworth The Sunday Age , 23 July 2000 Private ‘Yogi Bear’ Griffin is a conscript fighting in the jungles of Vietnam.
              Klemm’s story is life-and-death stuff and while he’s particularly good at relaying the mechanics of warfare he exposes the frailties and
              fears of a soldier. It’s as though the reader sits at Griffin’s shoulder as he stalks the jungles and villages, listening to his innermost
              thoughts. Klemm, who served in Vietnam, does not preach or judge; he has refined his story to the essentials. It’s classic Australian realism.
              The language is as you would expect, loaded with bitter oaths, but the writing is tightly controlled and poignant. Black Pepper has something
              good on their hands with Klemm’s debut novel.
        - title: The Weekend Australian Review
          text:
              Other Voices Murray Waldren The Weekend Australian , 9-10 December 2000 In the rush of historic revisions of Australia’s involvement
              in the Vietnam War, scant what-it-was-really-like attention has been paid to front-line fever. Barry Klemm’s Running Dogs helps amend that
              imbalance. Set largely in South Vietnam’s then Phouc Tuy Province in 1967-68, this slice-of-life account of ‘Pig’ Battalion is moodily energetic.
              And quickly engaging, with its colloquial, gallows-humoured toughness. Beset by hostile environments, antagonistic officers and logistical
              snafus, Klemm’s company tries to survive with laconic forbearance amid their Apocalypse Then. In its determined unsentimentality, Running
              Dogs both moves and chills as it evokes life with a Catch-22 edginess where death is always imminent. The fears, lunacies and chaos of guerilla
              war confrontations are especially vivid; also memorable is the self-protective, jugular camaraderie of the soldiers.
        - title: The Canberra Times Review
          text:
              "Vietnam War revisited in veteran’s tale Peter Pierce The Canberra Times , 5 August 2000 As the volume of fiction of the Indo-Chinese
              Wars from the United States eased in the last decade, Australians - if in small numbers - are turning to those conflicts. Recent novels
              have included Christopher Koch’s Highways to a War (1995), Nigel Krauth’s Freedom Highway (1999) and, earlier this year, Peter Corris’s
              quickie, The Vietnam Volunteer . In addition, the stream of unit histories and memoirs continues steadily. The Official History under the
              editorship of Peter Edwards has been completed. It is becoming easier to see the contours and demolish the myths of Australian remembering,
              analysis and fabrication of the wars in which the country was involved in Southeast Asia, and especially in Viatnam. The latest novel to
              appear, Barry Klemm’s Running Dogs , intriguingly and knowingly fixes the familiar with the unexpected. Klemm was a veteran, unlike the
              authors mentioned above, and indeed most Australian - if not American - novelists of the Vietnam War. The novel is set in Phuoc Tuy province,
              where Klemm served, from April 1967 to March 1968. He has therefore had a long time to meditate on his experiences of military life and
              - one guesses - to read critically in the fictions of Vietnam. A sign of that is his recourse to a staple of such writing - the use of similes
              that edge towards cliche as they dream of domestic rather than war settings. Thus ambush victims have heads that look like watermelons split
              apart with an axe, another hapless enemy’s spilt brains resemble scrambled eggs. More resourcefully, Klemm finds ‘like a discordant song’
              for the voices of yet unseen Vietnamese as Australians overhear them. He also disorders the standard narrative pattern of novels of the
              soldier’s tour of Vietnam. Instead of beginning with the introduction to members of the platoon, Klemm opens in the middle of an ambush.
              This is action typical, dangerous, yet unpredictable, as Klemm’s anti-hero Yogi Bear and his mates stand by ready to strike by a track that
              is ‘narrow and winding through the green shit’. The pleasantries of telling us something of the platoon wait till the third chapter, by
              which time there has also been a botched, almost comic raid on a village whose people may be sympathetic to the Viet Cong. Then along they
              come, with their nicknames, supposed or rumoured home lives and their liabilities on display. There is Greyman, a part-Aboriginal conscript
              who does not know to which world he belongs; Sniffer Gibson, ‘a freckled lad from Tasmania whose affinity with machines was stronger than
              with men’; Alby Dunshea, ‘a flatout arse-hole’ who neither merits a nickname nor much sympathy when he is killed in action. Yogi Bear goes
              through the familiar rites of passage - the first things of war - seeing an enemy corpse, suffering a wound, suffering the death of one
              of his own. The Viet Cong, the notional enemy, are glimpsed, respected, sometimes killed. The American allies, so often more despised than
              the VC in Australian novels of the war, are scarcely seen or heard in Running Dogs . Not that Yogi and his mates lack for enemies among
              such vain, dangerously incompetent representatives of the Australian officer class as ‘Hatrack’ (Major Haddon). The way in which others
              will tell of their war stories is also the object of soldiers’ weary contempt. Of a confused, frightening encounter, Yogi remarks that ‘maybe
              it was a massacre, maybe it was a great victory, maybe it was a trivial skirmish’. In any event, there is a painting ‘purporting to describe
              The Broken Hill Contact in the Canberra War Museum (sic)’. Running Dogs is a superior combat narrative to most of its Australian predecessors.
              It is not free from banality (‘This is a bloody war, Yogi, not a Sunday school picnic’), nor from incipiently and not altogether plausible
              anti-war comments: ‘This relocating populations, burning farms, destroying crops. It’s the way the bad guys carry on.’ Our guys do not pretend
              to be good. Yogi’s tour ends in disillusionment. The tenor of some of the last words of the novel (‘It was a f------ fiasco, wasn’t it’)
              recalls that of William Nagle’s The Odd Angry Shot , the other veteran’s novel with which Running Dogs can fitly stand guard."
        - title: Social Alternatives Review
          text:
              For Those In the Know Duncan Richardson Social Alternatives , Vol. 20 No. 1, January 2001 Barry Klemm provides a convincingly stark
              portrait of what it could be like to find yourself fighting in a strange, far off land against a formidable, elusive enemy, with companions
              not of your choosing and officers whom you don’t trust. Anyone wanting an insight into the experience of the Australian infantry soldier
              in Vietnam could do worse than read Running Dogs yet it would only be necessary to dip into the narrative. Part of the problem with this
              book as a novel is the determination with which Klemm reproduces the repetitive boredom of war, punctuated by flashes of terror, in chapter
              after chapter. The book is episodic, charting the disillusionment of the men in one small group engaged in searching out the Vietcong on
              their own territory. The Vietnamese emerge as tough, inscrutable, hardly human at times, which no doubt mirrors the views of some Australian
              troops at the time but one of the failings of the book is that the narrative docs not go beyond this perspective. Using a second person
              point of view doesn’t help this and gives the effect of an amnesia victim being filled in on what happened to him. The soldiers remain nicknames
              with one or two character traits and the jumps in chronology are not handled smoothly. There is also a wealth of specialised terms used
              by forces in Vietnam, that are not explained as if this is a book for those in-the-know.This is a pity because many readers will miss the
              important underlying messages about a key event in our history as this novel is unlikely to attract interest beyond those fascinated by
              the ‘face of battle’.
by-way-of-water:
    title: By Way of Water
    author: Phil Leask
    short_description:
        When her Italian mother takes up with the builder Tony Tomaselli, Leonora Stanislavski finds herself at a loose end in Cairns.
        Known there as ‘the Englishwoman’ because of her London upbringing, she meets Vic Townsend, a tour boat operator fleeing his past. Leonora
        has been investigating her own past, in particular, the mysterious death by drowning of her Russian father in Berlin. Their pasts seem destined
        to keep them apart. But when Tomaselli sends them on a journey to the far north to deliver an Aboriginal painting to the derelict cattle station
        of old Albert Winters, their buried love surfaces. Then Leonora reveals the horrific things she's done to uncover her father’s past.
    long_description:
        ‘In the end Vladimir chose London for us.’ She smiled, thinking about it. ‘So Leonora became an English child, dreaming of
        happy endings.’ When her Italian mother takes up with the builder Tony Tomaselli, Leonora Stanislavski finds herself at a loose end in Cairns.
        Known there as ‘the Englishwoman’ because of her London upbringing, she meets Vic Townsend, a tour boat operator fleeing his past. Leonora
        has been investigating her own past, in particular, the mysterious death by drowning of her Russian father in Berlin. Their pasts seem destined
        to keep them apart. But when Tomaselli sends them on a journey to the far north to deliver an Aboriginal painting to the derelict cattle station
        of old Albert Winters, their buried love surfaces. Then Leonora reveals the horrific things she's done to uncover her father’s past.
    price: 22.95
    isbn: "9781876044305"
    release_date: "2000"
    page_count: 167
    reviews:
        - title: Margaret Linley, The Geelong Advertiser
          text:
              "Margaret Linley The Geelong Advertiser , July 2000 This is a first novel for Australian writer Phil Leask, who now resides in London
              but returns home each year. On one level this is a love story between Leonora and Vic, who meet in Cairns. She is a rich London-born woman
              holidaying with her mother. He is a tour boat operator living a simple lifestyle. They meet and their love unfolds as the story does. But
              on another level this story is so much more than this. The characters bring a range of interesting cultural baggage with them. The dying
              and reformation of Europe after the second world war, the history of a number of political movements in Europe and the history of cane-cutting
              in the far north of Queensland. Delia Falconer spoke at the book launch and said about the characters’ journey inland. ‘They are not travelling
              inland to a dry place; they’re not travelling to a place where souls are lost. They are travelling to a place where souls are found. I thought
              this was a very clever and original reversal of a lot of the ways that we see the Australian landscape in literature.’ In order for Leonora
              and Vic to have a relationship they need to look first at their own pain. A journey inland throws their soul-searching into sharp focus.
              The characters bravely face their pain and their demons against a backdrop of relentless rains and flooding creeks. Phil Leask’s writing
              is rich and generous, sensually evocative and resonates deeply. Here is Vic thinking about Leonora’s beauty: ‘Leonora had an angular beauty
              that was almost too much to bear, as if the smoothness of her flesh was threatened by the bones beneath, or by the pressure of time, like
              the ancient mountain ranges eroded by millions of years of wind and rain, whose bare, rocky ridges continued to crumble away into nothing.’
              Here is Leask writing of despair and futility: ‘All they had ever touched and turned to dust, and he, Victor, on whom they had pinned so
              many of their hopes and dreams, who would achieve through his life all the things they might have aspired to themselves, was the living
              example of the pointlessness of all they had ever embarked upon.’ And now, the eternal optimism, the pale flickering light of hope: ‘Limited
              though his dreams might be, he could not bring himself not to dream them.’ There are many points along the journey of the relationship where
              they lose and hurt and push each other away. ‘Deliberately, painstakingly, she had banished him from her life. With every word and every
              phrase she had pushed him further and further away from her, leaving him huddled in the corner of the four-wheel drive, his shoulder pressed
              against the door, as far away as he could get.’ Leonora realises that her investigations into her own past, the drowning of her Russian
              father in Berlin, really serve to divert her from her own self-knowledge. Continually, she, Vic and other characters are forced to assess
              what is important and what is not. This is a wonderful book with beautiful lyricism, a kind of curl-up-by-the-fire-and-do-not-disturb-me
              book."
        - title: Southern Cross Review
          text:
              Southern Cross (London), 10 January 2001 A great, sweeping story of unravelling pasts and love denied from Aussie author Phil Leask.
              Leonora has been dragged up to Cairns by way of her mother’s second marriage. Not knowing a whole bunch about her original old man, she
              goes about remedying the situation. On a delivery run to the far north, Leonora grows close to Vic, a man who is plain and simply on the
              run from his own past. As trust between the two deepens, the shocking measures necessary to discover oneself are revealed.
        - title: The Canberra Times Review
          text:
              Paperbacks By Way of Water Veronica Sen The Canberra Times , 19 November 2000, (pg. 55) A less engagingly depicted quest concerns Leonora,
              reared in England, who is seeking to unravel the long-hidden secrets behind the death of her Russian father drowned in Berlin during the
              Cold War The details of her years of searching are told to a new lover Vic, a person with a troubling past, when they meet in Cairns. The
              attempted fusion of elements of Australian and European social and political experience is not particularly successful. Then there is the
              gratuitous inclusion of an indigenous Australian motif when Leonora and Vic are commissioned to deliver an Aboriginal painting to a decidedly
              eccentric old man on an isolated cattle station. What happens at mad Albert’s shack is melodramatic to say the least; its evidence of aggressive
              sexism, seen elsewhere in the book, is meant to explain how males overcome their feelings of grief or inadequacy by doing violence to women.
        - title: Australian Book Review Review
          text:
              Shorts By Way of Water Melissa Hart Australian Book Review , No. 226, November 2000 (pg. 60) By Way of Water is an intriguing and gentle
              first novel that is not so much driven by plot as by its characters and their unfolding memories and desires. Vic is a tour boat operator
              in Queensland who meets Leonora, a cosmopolitan and nomadic woman on holiday with her mother. Their turmoiled pasts prevent them from becoming
              involved until her mother’s lover intervenes and insists they both travel to the remote north to deliver an Aboriginal painting to Albert
              Winters, a recluse on a rundown cattle-station. Essentially a romance story, By Way of Water explores the haunted lives of its protagonists
              as they examine their pasts before surrendering to the future possibility of love. Leask’s writing style is consistent, confident and quite
              original - unlike a first time novelist who often stumbles here and there. His characters are also multi-layered. They are rich with personal
              histories and messy emotional baggage, which is something of a rarity in recent Australian literature. The reclusive Albert Winters, who
              ‘did not mind if they thought he was odd, since he was, and knew it himself’, is a curious character. He is loveless and raging with hatred,
              cynicism, guilt and desire, yet he unfortunately sits awkwardly in this gentle story. And although Leask attempts a tragic climax with the
              unveiling of the painting, it reads more like a melodrama. That said, however, Leask is a promising and gifted new voice in Australian literature.
              One that values and dives into the emotional depths of his characters.
the-slow-death-of-patrick-oreilly:
    title: The Slow Death of Patrick O’Reilly
    author: Phil Leask
    short_description:
        Patrick O’Reilly, it seems, has roamed the Tasmanian forests for 150 years. He knew Lake Pedder before it was flooded for
        hydro-electricity. A scourge of the local community, he has raided farms and apple orchards. But is he involved with a lost child? And with
        Bernard Laurent, a French sailor who has jumped ship? Bernard, having started an affair with a farmer’s wife, is sheltered by a collector
        of historical documents. She gives him a journal of an earlier Frenchman, a deserter from Nicolas Baudin’s 1802 naval expedition. The journal
        tells an almost parallel story of tenderness and brutality. Bernard’s translation leads to a startling and violent revelation.
    long_description:
        Patrick O’Reilly, it seems, has roamed the Tasmanian forests for 150 years. He knew Lake Pedder before it was flooded for
        hydro-electricity. A scourge of the local community, he has raided farms and apple orchards. But is he involved with a lost child? And with
        Bernard Laurent, a French sailor who has jumped ship? Bernard, having started an affair with a farmer’s wife, is sheltered by a collector
        of historical documents. She gives him a journal of an earlier Frenchman, a deserter from Nicolas Baudin’s 1802 naval expedition. The journal
        tells an almost parallel story of tenderness and brutality. Bernard’s translation leads to a startling and violent revelation. Set across
        two centuries, Phil Leask’s compelling new novel is told with effortless ease. Leask’s characters are multi-layered. They are rich with personal
        histories and messy emotional baggage, which is something of a rarity in recent Australian literature. Melissa Hart, Australian Book Review
        Phil Leask is just on the money... he is an orginal and new voice. Delia Falconer.
    price: 24.95
    isbn: "1876044365"
    release_date: "2001"
    page_count: 305
    reviews:
        - title: Andrew Harper, Togatus
          text:
              "Andrew Harper Togatus , 2002 Phil Leask isn’t that well known an author on the Aussie writing scene but if this, his second crack at
              the task of creating a novel, is anything to go by, he really should be. As a reader, I want a style that seduces me keep on reading, but
              doesn’t patronise me with the tricks of the potboiler. I also want a rush of ideas and images that can and will stay with me when the novel
              itself ends - something to frighten and tease me with grotesquery or to charm me with simplicity. Demanding little bugger aren’t I? Well
              The Slow Death of Patrick O’Reilly has left me well pleased. It’s a real task to write simple, pretty language that doesn’t bog itself down
              with needless metaphor and yet hints of something deeper. It’s also really impressive to create a believable folk mythology - that is, something
              that is the sole creation of one mind, but somehow feels like it's a true folk myth, an urban legend fleshed with the whispers of generations.
              The pivotal creation in this novel is the Patrick O’Reilly of the title - a man who lurks in the bush of Tasmania, wild and lonely and wandering,
              a bogeyman with a broken soul. He’s a link with the novel’s created past, a character that might be immortal but might be a trick, in a
              story that moves with a fluid sense across time and around many characters. Tasmanian farmers, a proto-feral girt child and a French interloper
              called, appropriately, Bernard. There are others as well, but the almost soap opera quality of some aspects of the plot (adultery and revenge
              and such) isn’t what sucked me in; it was the evocation of place. I’m a diehard Tassie boy; I’m from here. I didn’t come here to study or
              to get freaked out by the wilderness. This place is my home so I can spot a fake a mile away and I loath the way so many try turn this place
              into some kind of dark crystal fairy land, without acknowledging that a place is made primarily of people. So many times I have heard wretched
              interlopers say this would be a great place if not for the people. Yes it is dark here, but we get on with our lives, and it’s lives that
              Phil Leask makes his wonderful almost-fable of a book from. Not that the bush isn’t there - the sense of place is very strong with this
              book - but it was the panorama of characters that really did it for me here. I can and do recommend you read this book; there are a great
              many reasons why, but the bottom line is it’s good and it’s about Tasmania, and not even remotely like Richard ‘professional Tasmanian’
              Flanagan’s dreary work. It smacks of things I love in a book: darkness and magic realism, and best of all it gets closer to really discussing
              stuff about my home, whilst acknowledging that the author isn’t a local, just someone who has watched and listened and felt. Go and buy
              The Slow Death of Patrick O’Reilly right now."
        - title: The Examiner Review
          text:
              Human Nature Explored Ivy Fleming The Examiner , 1 September 2001 Phil Leask presents the intimacy of human nature in The Slow Death
              of Patrick O'Reilly . The story is set in Tasmania, and focuses on two different men with similar lives spanning two centuries. Everyone
              in the State has heard of Patrick O’Reilly, but they do not know if he really exists. He is believed to be an escaped convict who has lived
              in the bush for over a century, tormenting people and killing their sheep. It is the early 1900s, and little Cathy Connolly meets a man
              in the bush who calls himself Paddy. He is a gentle old man who provides Cathy with knowledge about the wilderness. Then there’s Anna and
              Johnny McCluskey whose tepid marriage is being threatened by wandering Frenchman Bernard Laurent, who has grown tired of life on the seas
              and has settled into Tasmania's wilderness. Bernard has also become good friends with Elizabeth, who has given him some early 1800s French
              journals to translate. The journals provide the second branch to the story. It all collides when Cathy goes missing, and Anna and Bernard
              are forced to hide out in the bush - from the law and Johnny. Most people are convinced Patrick O’Reilly took Cathy, but the last person
              seen talking to her was Bernard. Although it is a complex story, it impressively pieces together everything for the reader. It conveys everything
              about the characters - what they see in themselves and others, and their uncertainty about their lives. It also shows the two minds of the
              time - those who loved Tasmania’s wilderness and those who cleared land for fruit trees and livestock. It is a compulsive read about all
              facets of life - including survival, love and family.
        - title: Terry Monagle, Táin
          text:
              "Taming the bush, tamed by the bush Terry Monagle Táin , June-July 2001 On Friday evening 25 April, Táin hosted a dinner with Phil Leask
              who has just published a new novel, The Slow Death of Patrick O’Reilly . According to Kevin Pearson of Black Pepper press who published
              the book, ‘Patrick O’Reilly has roamed the Tasmanian forests for 150 years. He knew Lake Pedder before it was flooded. He raids farms and
              apple orchards. He is involved with a lost child and with Bernard Laurent, a French sailor who has jumped ship. A farmer’s wife who has
              an affair with Laurent gives him a journal of a French deserter from Baudin’s 1802 expedition. Bernard’s translation leads to a violent
              revelation.’ Here are some remarks on Leask’s novel made by Terry Monagle as a beginning for our discussion. In April this year, Ben Moloney
              staggered out of the southwest Tasmanian wilderness. This apparition, after 37 days of absence, engendered awe and suspicion. Novelist Richard
              Flanagan commented that it is good that there are still places where one can get lost. This is a romantic view. I’m inclined to a contrary
              position that if people don’t spend the $10 on hiring a positioning device, they can be left out there. Let the wanderers have the romance
              and not the taxpayer the cost. However Flanagan is correct: the wilderness is powerful and valuable. Australians overseas mourn for it whatever
              it is. Issues to do with land and water are the bedrocks of our political and economic debates. The need is profound to get these right.
              Phil Leask makes an important contribution with his second novel, The Slow Death of Patrick O’Reilly . To understand the nature of wilderness
              it is necessary to study ancient land formation and the history of flora and fauna. In his Australia: A Biography , Eric Rolls says, ‘There
              was no beginning, there is no end. Time is, it was and will be. The universe is infinite, there is an infinity of universes: the universe
              is best seen as a perpetual womb unendingly and unconsciously giving birth. Fertility, not consequence, is the main consideration.’ Some
              characters in The Slow Death of Patrick O’Reilly approach the wilderness in this spiritual way. One says: ‘I have discovered, at last, the
              secret. The secret is in time and space, through which I move untouched and untouching and which encloses me and confines me within a sense
              of infinity and eternity that is here and now and all around me, wherever I wander, whenever I sleep. Wake. Dream, walk or hunt.’ The Aboriginals
              who share the bush with him have not taught this unitive experience of the bush to him but he has learnt it from living alongside these
              black strangers. They share everything with him because he has reached this state of grace, this state of equanimity that is ‘worth more
              than all the centuries of a god who is all seeing and all forgiving but who never let me be that which I am and have become: myself.’ Feet
              as a way to God Many Australian Christians are searching for a way of integrating the insights of their tradition with the place they are
              in. A Catholic nun in the Kimberley suggests, for instance, that in Australia a spirit god is less appropriate than one who emerges from
              the earth and enters us through our feet. Such a god subjects us creatures to the land and its power. The land remains an awesome mystery
              and happiness can involve full immersion in it. This is similar to a Buddhist awareness. The characters in The Slow Death of Patrick O’Reilly
              are likeable, with divisions and confusions, fears and lusts. They have the same sexual regenerative needs as the bush. They clear the forests
              to establish their own families and orchards. For them, too, fertility is more imperative than consequences. Their lives evolve in interaction
              with a huge canvass of wilderness. Some become intoxicated with it and are sharers of its secrets. Others see it as enemy and are besotted
              by rumours of presences in the bush which haunt and frighten them. These latter neurotically need to destroy the things which come from
              the bush, anything their experiences don’t prepare them to understand. The most powerful personality in the book is the wilderness. As one
              character says: ‘It is a mistake to attempt to tame this land.’ This is a challenging thought. It comes at a time as Australians retreat
              from the bush they tried so hard to tame over two centuries. So this book is, amongst other things, about the spiritual power of place,
              it’s about people trying to find lives which are livable, not because they tame the bush but because they find niches around the margins
              of it. It also focuses on the contradictory human need for both solitude and community. Each of the characters is a solitary traveller even
              when in a rapturous embrace. They hear two sirens singing contradictory allurements. Is this not our condition? This book is not about people
              wearing leather jackets sipping coffee in Paddington, Carlton or Notting Hill, it is not about grunge, sex or drugs, it is not about corporate
              malfeasance. This book made me look forward to getting into bed at night for that last half hour, that turning of the pages perhaps made
              from Tasmanian woodchips. Now, months after I have finished it, I can feel its myths and mythic perspectives roaming in my brain."
        - title: Overland Review
          text:
              "The Question of Identity The Slow Death of Patrick O’Reilly Laurie Clancy Overland , No. 169, Summer 2002 Phil Leask comes with the
              recommendation of no less distinguished a writer and reviewer than Delia Falconer. All the more disappointing, then, that this second novel
              fails to live up to expectations. It is the story of the eponymous O’Reilly, who lives in the hills of Tasmania in 1952, a source of constant
              discussion and conjecture to the citizens of the tiny local town, some of them believing he is over a century old and most of them, for
              reasons which are unclear, deeply hostile to him, regarding him as a troublemaker. The opening sentence of each of the first four chapters
              introduces us to one of the protagonists: O’Reilly, the young girl Cathy Connolly who has seen him, the Frenchman Bernard Laurent who has
              deserted ship, and Anna McCluskey, who has just got married. Later we meet the other important character, an old lady named Elizabeth Morgan,
              who is more or less in love with O’Reilly. Elizabeth has bought some journals in Hobart and Leask juxtaposes one of these, the story of
              a French sailor Clement Hebert at the beginning of the nineteenth century, against the contemporary narrative. Hebert, like Bernard, is
              a deserter who spends a virtual lifetime alone in the Bush, writing his journals with an ink he has made out of ‘berries and some sort of
              earth or clay’ and carrying paper on his back that somehow lasts thirty years. Perhaps we can say of him also, as O’Reilly says of Bernard,
              that he ‘carried his suffering with him like some Biblical mark upon his forehead’. For over thirty years Hebert, like Paddy, wanders alone
              in the bush except for one incident in which he fathers a child. When we find out the child’s identity it is both predictable and, like
              much in this book, implausible. The prose is filled with quasi-poetic meditations: ...and sometimes when he came down into the towns or
              did odd jobs on the farms there would be a woman waiting for him, who would turn and look at him and reach out to him with wel¬coming arms,
              and what they did together then, on an empty bed or behind the garden shed, was what they always did, men and women everywhere, the same
              but different every time... This is fairly typical of a novel which seems to be making attempts at immense but obscure significance."
        - title: Westerly Review
          text:
              "History and Theirstories: A Review of Some Recent Australian and Asian Fiction Douglas Kerr Westerly , Vol. 46, November 2001 ‘The
              past is not dead,’ said William Faulkner spookily. ‘It is not even past.’ It is a novelist’s idea - a historian would probably not put it
              like that - and novels, which conventionally tell their tales in a historic tense, are one place we are used to looking for a confirmation
              of this necessary sense of the presence of the past, its representation... A myth of a different sort is at the centre of Phil Leask’s The
              Slow Death of Patrick O’Reilly . There are three main narrative strands to this intricately woven novel. The Patrick O’Reilly of the title
              is a tramp, but also a semi-legendary figure, dangerous and immemorial, who is believed by some to have roamed the Tasmanian forests for
              a hundred and fifty years. His story mingles with that of Bernard Laurent, a war-weary Frenchman who jumps ship in Tasmania and wanders
              into a secluded valley looking for work; and with that of Clément Hébert, another Frenchman who came to the island in 1802 and left a journal
              of his years wandering in the forest (and turns out to be the ancestor of the current Patrick). From early on, there is a self-consciousness
              here about place and story, land and history. The Frenchman who has come to Tasmania also seems, appropriately enough, to have landed in
              a storybook. At last, he [Bernard] felt pleased to be ashore, wandering through the Tasmanian bush, wandering through the old stories that
              spilled out of everyone he spoke to whether he wanted to hear them or not, as if the whole country was awash with things that had happened
              and had to be talked about, things that had to have a life of their own, filling every space in this huge, wild, empty landscape. Phil Leask
              writes powerfully about place when he is looking at it, but his view is too often obscured by a portentous and romantic insistence on the
              mystic numen of the land. You can see these moments coming by the length of the sentences, and their cumulative effect can be irritating.
              There are important and interesting issues here, about ‘development’ and land ownership and the relation of human beings to nature, but
              they are often steeped in a metaphysical solution that sometimes seems to mean a good deal less than it says, a Tasmanian sublime. ‘Now
              it was coming to a close, the dreamlike wanderings of an old man who had lived a life like no other, living with no thought or need for
              tomorrow, since today was forever and forever was a part of him, like the great, broken, immutable rocks that rose up around him, and the
              wind and the rain and the sun and the snow, and the lakes that one day would vanish beneath the sea...’ Phil Leask should perhaps be introduced
              to a really ruthless editor. ‘A country as young as this cannot have lost its history, not so soon,’ thinks Bernard. But there is just as
              much history as you want there to be. Patrick O’Reilly is the direct link with the past, with the earliest white settlement of the island,
              and with the state of nature; there is a story worth telling in his death."
        - title: Island Review
          text:
              "A Long Time Dying The Slow Death of Patrick O’Reilly Giles Hugo (writer) Island , No.87, Spring 2001 The Great Tasmanian Novel - henceforth
              GTN - is, like the thylacine, paradoxical and elusive. Evidence of its hoped-for presence is tantalising but inconclusive. Unless, like
              Fox Mulder and I, you believe it may still be Out There… Some say the concept of the GTN is ridiculous - so parochial. Do we speak of the
              Great Queensland Novel? No, but we Tasmanians, like most small island communities, claim an identity that sets us apart. And, since Tasmania
              also claims the first Australian novel in Henry Savery’s 1831 Quintus Servinton , it seems appropriate to hope that turning Tasmanian lives,
              legends and longings into fiction will continue to be a potential growth industry striving for greatness. This novel touches on themes common
              to several GTN claimants: the effects of white settlement on Tasmanian Aborigines and the environment, and that harsh landscape’s long-term
              impact on the interlopers. The eponymous Patrick O’Reilly is a Tasmanian legend in his own extended lifetime - more than 150 years by popular
              account - an elusive wraith who taunts and haunts isolated valley communities with petty thefts of food and livestock, and opportunistic
              womanising. The only people who get to know him in more than just the biblical or mythical sense are: Cathy Connolly, a young girl; Bernard
              Laurent, a French sailor fleeing from memories of the Nazi occupation; Anna McCluskey, a farmer’s wife, who cuckolds her husband, Johnny;
              and spinster eccentric Elizabeth Morgan, who shelters both O’Reilly and Bernard at her home. Elizabeth sets Bernard to work translating
              an ancient journal, written in French by Clement Hébert, a sailor who jumped ship in Van Diemen’s Land in 1802. It details his flight, brief
              contacts with Aborigines and decades of wandering in the wilds. Links between the journal and the mystery of O’Reilly’s origins propel the
              plot to the point where love, lust and jealous longing intersect. Coincidentally, Cathy chooses to follow O’Reilly into the mountains, leading
              to a huge manhunt for the presumed abductor and victim. The climax is predictably violent, the denouement neat - if somewhat forced - as
              the last pieces of the puzzle clunk-click into place. So, is the long dying of Patrick O’Reilly a worthy prospect as the GTN? Or even just
              a GTN? For me it is not - and, since I am a follower of late, great rock writer Lester Bangs’s injunction to critics to be ‘honest and unmerciful’,
              here is the awful truth, as seen through my twisted, gonzoid vision. The best snatches of writing come in Hébert’s musings, such as this
              neat bit of je ne sais quoi : ‘What I hold in my grasp now is a kind of emptiness that folds in on itself as I open my hand and gaze at
              it’. There are sparkles of oblique characterisation - but too few - such as when Cathy first meets Bernard: ‘She continued to look at him
              as if he was a book she might want to read’. However, apart from the tortured soul revealed in Hébert’s journal, other members of the ensemble
              cast of fugitive outsiders and alienated insiders are lightly sketched: the lonely but indefinably wise young girl acting as precocious
              provoker of adult action; adulterous wife seeking real passion from the mysteriously driven French sailor she met at her wedding feast;
              spinster sage mothering all waifs and strays; and the ambitious, violent husband MCP. Industrial-strength recycled cardboard, mostly. Ho,
              hum. The characters’ speaking voices are very much the same from mouth to mouth - scant depth, almost no humour. Sadly, nothing is made
              of Bernard and Clement’s native tongue, no colourful regional French oaths, not even a casually spat ‘ Merde! And these dudes are sailors?
              Oh for the subterranean, poetic earthiness of Jean Genet’s Quenelle . Thematic possibilities are also largely ignored. O’Reilly’s bogeyman
              role - scapegoat for the valley folk’s xenophobia and abiding fear of the wild environment - is stated but not satisfactorily examined.
              The Aborigines are merely sad and elusive human scenery in Hebert’s journal. If the novel had shed the fifties melodrama and O Henryesque
              resolution, and been confined to an expanded and more in-depth journal, it might have worked. Instead, it’s just another well intentioned
              but bland, steam-driven, neo-Gothic mystery. The quest for the GTN continues."
        - title: The Sunday Tasmanian Review
          text:
              "Many-layered perspective on Tasmania Wayne Crawford (From The Sunday Tasmanian , 29 April 2001) The old tramp has spent a lifetime
              roaming the mountains, stealing sheep and chickens, raiding orchards and making love to farmers’ wives. But is he involved in the disappearance
              into the bush of a little girl? And has his past caught up with him? And the mysterious Frenchman - the unhappy, wandering sailor. Why has
              he jumped ship and headed for the hills? Paddy O’Reilly, the tramp, has indeed roamed the Tasmanian forests since before Lake Pedder was
              dammed for a power scheme and before the Tasmanian tiger was hunted to extinction. He has been raiding orchards since the days when Tasmania
              was establishing its reputation as the Apple Isle. And Bernard Laurent is spending his nights absorbed in the diaries of a fellow countryman
              of 150 years before in whose footsteps he now finds himself following. This historical novel, The Slow Death of Patrick 0’Reilly , is set
              in Tasmania in two parallel periods - the 1950s when the state was emerging from World War II and finding its new identity, and in the pre-British
              period of 1802 when the French explorer and naturalist Nicolas Baudin’s party arrived in Van Diemen’s Land and surveyed the D’Entrecasteaux
              Channel. This is the second novel by Phil Leask who, although Queensland-born and now living in London, is well known and remembered in
              Tasmania where he has lived for short periods, on and off, since the ‘60s when he came here to do some bushwalking, stayed on to do his
              Diploma of Education and spent a year teaching at Scottsdale. That’s how he came to know the Tasmanian bush so well. Even now, living in
              London where he works as a freelance consultant in urban regeneration, his love for and fascination with the wilderness of southern Tasmania
              has remained part of him. He continues to make frequent visits back to Tasmania, most recently this month. His writing is very much location-based,
              and he has woven into the book an intimate knowledge of the area of Tasmania where he has spent months of his life exploring the bush -
              the Huon, the Hartz Mountains, the South-West through to the South Coast. Like the fictional Patrick 0’Reilly of his book, Phil Leask knew
              Lake Pedder before it was flooded for hydro-electric power and had known the Tasmanian rainforests in all their moods, all their weather
              patterns. There are many layers to the characters and locations of The Slow Death of Patrick O’Reilly , but primarily there are the events
              of the mid-1950s in the rural Huon area, and flashbacks to 150 years previously through the device of diaries kept by a deserter from Nicolas
              Baudin’s party. During his visits to Tasmania, Leask became fascinated with the strong French connection, evident even though it had been
              the British who made the early European settlements. He discovered when doing historical research into the Baudin expedition which landed
              in Tasmania in 1862, that the party was threatened with death from scurvy. For his story Leask imagined: ‘But what if one of them said ‘I’m
              not going to die of scurvy; I’m going ashore...’?’ It is the diaries of that imaginary deserter that, a century and a half later, fall into
              the hands of yet another Frenchman who has jumped ship in Hobart and headed for the hills where his path crosses that of the locally infamous
              Paddy O’Reilly. Against this backdrop the diaries reflect on a period of European enlightenment, the French Revolution merging into the
              period of Romanticism. Leask’s first novel, By Way of Water , was set in north Queensland and Europe; his third, Olhovsky, Prince of Hamburg
              , will be published next year. Although the 54-year-old Leask continues to work as a consultant advising on plans for urban redevelopment
              especially among deprived communities in Britain, he considers himself primarily a writer by profession. The consultancy work is what allows
              him to follow that primary interest, he says."
olhovsky-prince-of-hamburg:
    title: Olhovsky, Prince of Hamburg
    author: Phil Leask
    short_description:
        Hamburg, in Phil Leask’s third novel, is a city of the displaced. Accidents of personal history throw together an odd collection
        of strangers - English poet Michael Rothney, a Polish dancer, a German sculptor. They find themselves locked within the hypnotic orbit of
        Olhovsky, ambiguous, charismatic, sensual, a sailor and wanderer with a dubious past. Even before Olhovsky passes bay leaves crushed in his
        palm beneath the nostrils of his friends during their love-making, we know he is influential.
    long_description:
        He cannot bear how beautiful she is, he tells me, and sighs, and looks across at a woman with a skirt split to the top of
        her thigh, her legs crossed, her elbows on the bar in front of her, a cigarette in one hand. He lights a cigarette himself, and I close my
        eyes and let the smell of cloves drift over me, reminding me of everything, of my life before and after, of Lucy, of Urmilla and Olhovsky;
        above all Olhovsky. Hamburg, in Phil Leask’s third novel, is a city of the displaced. Accidents of personal history throw together an odd
        collection of strangers - English poet Michael Rothney, a Polish dancer, a German sculptor. They find themselves locked within the hypnotic
        orbit of Olhovsky, ambiguous, charismatic, sensual, a sailor and wanderer with a dubious past. Even before Olhovsky passes bay leaves crushed
        in his palm beneath the nostrils of his friends during their love-making, we know he is influential. One of those lovers, Rothney, is intrigued
        by Olhovsky, his mysterious hold over others and his dubious, perhaps mythical past. When Rothney and Olhovsky meet Urmila, an Indian woman
        whose husband runs a spice importing business, loyalty and trust become strained. A cold winter of snow and ice sets in. There is a long anxious
        wait for the thaw. Phil Leask has dreamed a story of wonderful strangeness into existence and sets it in the fragile, sparkling world of Hamburg
        ’ s winter... The author’s pen moves with the ease and grace of one long acquainted with the quirky side of this city. Terry McDonagh, Irish
        poet and dramatist living in Hamburg The characters are allowed their moments where we see into their uncertainties and into the untracked
        wilderness that ’ s in them. Rodney Hall Cover painting by John Anderson
    price: 28.95
    isbn: "1876044373"
    release_date: "2003"
    page_count: 208
    reviews:
        - title: Terry Monagle, Eureka Street
          text:
              Reviews The Shortlist Terry Monagle Eureka Street , Vol. 13, No. 7, September 2003 Michael Rothney is an English poet working on a suite
              of poems in the German city, Hamburg. He is attempting to shrive himself of a former lover. Rothney walks incessantly, at night, feeling
              for the pulse and lineaments of the city. He meets Olhovsky, a semi-mythological creature, a mermaid, a hermaphrodite beauty. We meet characters
              plagued by incompleteness. They long for the other, for the missing part of themselves. Their questing, their roiling hopes, seek relief
              in relationships, with a sexual partner or partners. Love appears to be the ground of human need, but it is fickle and treacherous. Desire,
              possession and belonging are its convenient and clandestine counterfeits. It’s a study of a city, too, which seeks its destiny with the
              same carnal energy as its inhabitants. The rhythm of the text, growing in intensity like Ravel’s Bolero , is sympathetic with the insistent
              walking of the characters as they explore the city. Leask’s characters are psychologically stateless, and grieve for a home. Though an Australian,
              Leask has lived in London for thirty years, travelling in Europe and returning to Australia. Leask’s book is about place, and rootlessness;
              about heartless loves and places of absence. It is a haunting book and seems likely to be a novel which will reverberate beyond its times.
        - title: Catherine Ford, The Age
          text:
              "Fiction Catherine Ford The Age , 28 June 2003 Nicolai Olhovsky, rugged up and ready for heartbreak, stands next to Michael Rothney,
              soft-spoken with a face ‘like a third division footballer’, waiting for the lights to go green on Hamburge Street, and they start up a conversation.
              Like startled lovers they remove to a bar to discover each other: Olhovsky, a sailor, fled Odessa long ago, hunted whales, then was stabbed
              by a woman in Palermo. Rothney, a Londoner, is writing his ‘Hamburg sequence’ in verse under the devotion of a ‘Mexican professor in California’.
              His wife, Lucy, is in Africa working as a surgeon and he occupies their Hamburg apartment and garden, which is so deserted, he says, that
              it resembles 'the setting for a Tarkovsky film.’ Phil Leask, with astonishing fluency and speed, opens up Hamburg’s snow-buffered streets
              and bars and moves through his characters’ assignations as casually, and with almost as much psychic baggage, as they do themselves. When
              Olhovsky and Rothney go back to Esmerelda’s for coffee, we barely flinch when the evening ends with all three of them naked and a stranger
              downstairs singing a little Verdi. Hamburg, Leask wants us to know, is at least as wretched as fun as Berlin or Paris. And until the unhappily
              married Indian opthalmologist, Urmila Vasani, appears, the novel might just have been about trysts of the love-lorn, confused sexuality
              and homesickness. Leask’s story occasionally becomes as light-starved as a February afternoon on the Binnenalster, but it is beautifully,
              poetically strange too."
        - title: betterread.com.au Review
          text:
              Hanna Torsh betterread.com.au (online), 2003 It is rare to find a contemporary novel which stands out for its style as much as its subject
              matter. This strange and wonderful new novel by Phil Leask, his third, is striking almost at once for its tone of self-conscious melancholy
              and its rather obvious theme of exile; English poet Michael Rothney is alone in Hamburg, lost in the obscurity that comes with being a stranger
              in a strange land, thinking of his love, his wife. On one of his late night wanderings through the dark and wintry city he meets an enigmatic
              man who calls himself Olhovsky and is instantly fascinated by him. Together they experience the city beneath the city and in doing so Michael
              is drawn even deeper into his own emotional journey away from his former life. A fairly typical bildunsgroman I thought, as I began. However,
              this novel is not typical, although it is definitely a ‘journey novel’, it contains more of the surreal than its beginning scenes intimate.
              The nighttime journeys are depicted as grey, shadowy episodes, edged with sexual desire and ambivalence, while Rothney’s daytime experience
              seems almost to exist on another plane. This is, in many ways, a novel of the night. Similarly the many characters he meets either are merely
              daytime creatures, mildly interesting versions of those you might meet in any modern novel, or nighttime ones, vivid caricatures, painted
              as explosively intelligent, unbearably unattainable or viciously sexual. The accumulated effect of these disparate episodes is to create
              a real sense of the surreality of Rothney’s existence, that of a writer, whose role is to both observe and participate, to create and to
              fall in love with his creation. I wouldn’t recommend this book to everybody, as the languidness of the style and its use of poetic image...
              make it less accessible than other works of modern fiction. That said, I would recommend it to those who really care about fiction, especially
              Australian fiction. It's wonderful to know that books like this - experimental, challenging, beautiful - are still being written.
        - title: Amazon.co.uk Review
          text:
              Exile, melancholia, women, beer and deliverance Ced Jackson Amazon.co.uk (online), 8 September 2003 An adult book. A book for adults.
              As with Lawrence, there is the visceral shock of seeing inexpressible thoughts in cold print. And it is a cold book, from Hamburg’s frozen
              river to the hearts of men. Yet only when emotions are accepted coldly is there hope of redemption. Michael Rothney has fled to Hamburg
              in exile from his wife and her lovers. These torments he accepted, for how else could he love her. He accepted everything, asked for nothing
              ‘...but you were never as innocent as you like to believe, Michael. You think that you are the poet, standing back, observing, watching
              others live their lives as if you were not part of them.’ Olhovsky is his complement. Yang to Rothney’s yin. Mercurial, gypsy-like, an accidental
              sailor, long black hair cascading around his shoulders, a man for whom women are not a problem, but who seeks beyond achievement. Rothney
              and Olhovsky wander the frozen streets of Hamburg, picking up and discarding women and beer, Grail knights seeking that which they do not
              know. ‘We have come back from Jerusalem and have not found that we sought,’ as Jung proclaimed in his Seven Sermons to the Dead . Both Rothney
              and Olhovsky are invisible, flotsam on Hamburg’s sea, making no waves. And yet... ‘What we do is never done with impunity. I never thought
              I would have to be responsible for what I did. I thought I could do what I wanted and never have to care. And then it catches up with you,
              when you least expect it.’ ‘You don’t want to see that people are suffering. You don’t want to find that you might have been the cause.’
              Age advances. Life is lived - it is unavoidable. Courage is all.
anne-of-the-iron-door:
    title: Anne of the Iron Door
    author: Alan Loney
    short_description:
        In the city of Strasbourg in 1436, a woman sued the father of printing, Johann Gutenberg, for breach of promise. Her name
        was Ennelin zu der Iserin Tur, in English, Anne of the Iron Door. The outcome of the court case is not known, but it is known that Gutenberg
        never married, and he did pay taxes for ‘another person’ in Strasbourg sometime before 1440. Not much is known of Gutenberg the man, although
        a number of official documents still exist that mention him. Of Anne we know practically nothing beyond her remarkable name. In Alan Loney’s
        extraordinary fable he uses the historical records to weave a fictional life for Anne, almost purely for the purpose of keeping her name alive.
        In Anne of the Iron Door Loney creates a world of deceit and betrayal, disease, unicorns, playing cards, the birth of printing, and a strange
        tale of mutually unrequited love.
    long_description:
        In the city of Strasbourg in 1436, a woman sued the father of printing, Johann Gutenberg, for breach of promise. Her name
        was Ennelin zu der Iserin Tur, in English, Anne of the Iron Door. The outcome of the court case is not known, but it is known that Gutenberg
        never married, and he did pay taxes for ‘another person’ in Strasbourg sometime before 1440. Not much is known of Gutenberg the man, although
        a number of official documents still exist that mention him. Of Anne we know practically nothing beyond her remarkable name. In Alan Loney’s
        extraordinary fable he uses the historical records to weave a fictional life for Anne, almost purely for the purpose of keeping her name alive.
        In Anne of the Iron Door Loney creates a world of deceit and betrayal, disease, unicorns, playing cards, the birth of printing, and a strange
        tale of mutually unrequited love.
