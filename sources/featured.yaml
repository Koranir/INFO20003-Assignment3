Sideshow History:
  author: Jennifer Harrison
  description: Jennifer Harrison has always been interested in
    performers, their choices and vulnerabilities.
    In her new collection, Sideshow History, she
    shows us the risk of being a public performer
    where the artist is continually under pressure
    of being seen to fail or succeed.

The Strangest Place:
  author: Stephen Edgar
  description: The strangest place, this world of fact and
    figment we astonishingly find ourselves
    inhabiting, is the territory that Stephen
    Edgar’s poetry has been probing and framing for
    over four decades now.
