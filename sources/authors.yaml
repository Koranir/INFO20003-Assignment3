jordie-albiston:
  name: Jordie Albiston
  sort_name: Albiston, Jordie
  source_url: albiston.html
  image: albistonphoto.jpg
  books:
  - botany-bay-document
  - the-hanging-of-jean-lee
  short_description: Jordie Albiston has died, aged 60. Born and raised in Melbourne, Victoria, Albiston studied music at
    the Victorian College of the Arts and received a Doctorate in English from La Trobe University.
  long_description: Jordie Albiston has died, aged 60. Born and raised in Melbourne, Victoria, Albiston studied music at the
    Victorian College of the Arts and received a Doctorate in English from La Trobe University. With a career spanning over
    25 years, Albiston was the author of 17 books. Her first poetry collection Nervous Arcs (Spinifex) won the Mary Gilmore
    Award, and her fourth The Sonnet According to M (John Leonard Press) was awarded the Kenneth Slessor Prize for Poetry
    at the 2010 NSW Premier’s Literary Awards. In 2019, Albiston won the Patrick White Award for her contribution to Australian
    literature. Albiston was a finalist for the 2021 Melbourne Prize for Literature, and her most recent collection Fifteeners
    (Puncher & Wattmann), posthumously won the John Bray Poetry Award in the 2022 Adelaide Festival Awards for Literature.
amanda-anastasi:
  name: Amanda Anastasi
  sort_name: Anastasi, Amanda
  books:
  - the-inheritors
  source_url: anastasi.html
  image: Amanda A 3.jpg
  short_description: Amanda Anastasi is a Melbourne poet whose work has appeared in unlikely places, from the walls of Artists’
    Lane, Windsor to The Massachusetts Review in the US.
  long_description: Amanda Anastasi is a Melbourne poet whose work has appeared in unlikely places, from the walls of Artists’
    Lane, Windsor to The Massachusetts Review in the US. 2012 and other poems was her debut poetry collection and she co-authored
    with Robbie Coburn the chapbook The Silences (Eagle-mont Press, 2016). She is a two-time winner of the Ada Cambridge Poetry
    Prize and a recipient of the Words in Winter Trentham Poetry Prize. Amanda completed a Wheeler Centre Hot Desk Fellowship
    in 2018, where she wrote a series of poems set in the year 2042, and was an Assembly for the Future Artist in Residence
    with The Things We Did Next in 2020. She is Poet in Residence at the Monash Climate Change Communication Hub until 2022
john-anderson:
  name: John Anderson
  sort_name: Anderson, John
  source_url: anderson.html
  image: andersonphoto.jpg
  books:
  - the-forest-set-out-like-the-night
  - the-shadows-keep
  short_description: John Anderson was born in 1948 at Kyabram, Victoria, where he grew up on an orchard. The locality was
    once covered with thick forest and its name is thought to indicate this.
  long_description: John Anderson was born in 1948 at Kyabram, Victoria, where he grew up on an orchard. The locality was
    once covered with thick forest and its name is thought to indicate this. That forest is the one he would have most liked
    to have seen. He lived in Melbourne after 1966 and after 1975 near the Merri Creek. He travelled in Europe, South-East
    Asia, Niugini and extensively around Australia. His first collection of poetry was the bluegum smokes a long cigar (Rigmarole
    Books, 1978), followed by the forest set out like the night and the shadow’s keep. John Anderson died of a sudden illness
    in 1997.
alison-croggon:
  name: Alison Croggon
  sort_name: Croggon, Alison
  source_url: croggon.html
  image: croggonphoto.jpg
  books:
  - the-blue-gate
  - navigatio
  short_description: Alison Croggon was born in 1962 in Transvaal, South Africa, and has three children. Alison Croggon moved
    as a child to England in 1966 and to Australia in 1969, growing up near Ballarat and later moving to Melbourne.
  long_description: Alison Croggon was born in 1962 in Transvaal, South Africa, and has three children. Alison Croggon moved
    as a child to England in 1966 and to Australia in 1969, growing up near Ballarat and later moving to Melbourne. She trained
    as a journalist on the Melbourne Herald and her work includes poetry, plays, libretti, translations, editing, criticism,
    an adult novel and fantasy novels for young adults (The Riddle, The Gift). Her first book of poems, This is the Stone,
    was published in 1991 and won the Anne Elder and Dame Mary Gilmore Prizes that year; she has also published Pharaohs Returning
    and Attempts at Being (2002). Her opera The Burrow, with score by Michael Smetanin, premiered at the Perth Festival in
    1994 to critical acclaim and had seasons in Sydney and Melbourne. Her play Lenz was premiered at the 1996 Melbourne Festival,
    produced by the Mene Mene Theatre Company.
louis-de-paor:
  name: Louis de Paor
  sort_name: de Paor, Louis
  source_url: depaor.html
  image: depaorphoto.jpg
  books:
  - sentences-of-earth-stone-goban-cre-is-cloth
  - cork-other-poems-corcach-agus-danta-eiles
  short_description: Louis de Paor was born in Cork / Corcach in 1961. The name means literally ' a marshy place ’ and is
    the origin of the term ' bog Irish ’.
  long_description: Louis de Paor was born in Cork / Corcach in 1961. The name means literally ' a marshy place ’ and is the
    origin of the term ' bog Irish ’. His subtle poems deny the insult of that term. His career as a poet began in the late
    seventies at University College Cork, where he studied for his BA in Irish Language and Literature while publishing poems
    and reviews in Irish-language journals. He has been involved with the contemporary renaissance in Irish language poetry
    since 1980 and edited the Irish language poetry journal Innti. In 1986 he was awarded a PhD from the National University
    of Ireland for his thesis on the fiction of Máirtin Ó Cadhaín, one of the finest prose writers of Irish this century,
    and in the same year he received the Poetry Ireland Prize for his review of poetry by Nuala Ní Dhomhnaill.
adrienne-eberhard:
  name: Adrienne Eberhard
  sort_name: Eberhard, Adrienne
  source_url: eberhard.html
  image: eberhard-portrait.jpg
  books:
  - agamemnons-poppies
  - jane-lady-franklin
  - this-woman
  - chasing-marie-antoinette-all-over-paris
  short_description: Adrienne Eberhard is a poet whose collections include Agamemnon’s Poppies, Jane, Lady Franklin, This
    Woman and The Voice of Water.
  long_description: Adrienne Eberhard is a poet whose collections include Agamemnon’s Poppies, Jane, Lady Franklin, This Woman
    and The Voice of Water. Adrienne Eberhard has published four previous collections of poetry, Agamemnon’s Poppies (2003),
    awarded second place in the Anne Elder Prize and longlisted in the Victorian Premier’s Prize; Jane, Lady Franklin (2004),
    adapted for PoeticA, Radio National; This Woman (2011), short-listed for the 2013 Tasmania Book Prize and The Voice of
    Water (2019), in collaboration with artist, Sue Lovegrove. Her poems are included in anthologies such as Motherlode (Puncher
    and Wattmann, 2009); Australian Love Poems, (Inkerman & Blunt, 2013), Prayers of a Secular World (Inkerman & Blunt, 2015)
    Contemporary Australian Poetry (Puncher and Wattmann, 2016) and Best Australian Poems (Black Inc, 2009; 2017). Adrienne
    was poetry editor of Island (2008 to 2011), has taught poetry at UTAS, and currently teaches enrichment classes at St
    Michael’s Collegiate.
stephen-edgar:
  name: Stephen Edgar
  sort_name: Edgar, Stephen
  source_url: edgar.html
  image: edgarphotorecent.jpg
  books:
  - other-summers
  - history-of-the-day
  - eldershaw
  - exhibits-of-the-sun
  - transparencies
  - the-strangest-place
  short_description: Stephen Edgar was born in Sydney in 1951. He spent the early 1970s in London before moving to Hobart,
    where he lived for some thirty years.
  long_description: Stephen Edgar was born in Sydney in 1951. He spent the early 1970s in London before moving to Hobart,
    where he lived for some thirty years. Since 2005 he has lived in Sydney. He is married to the poet Judith Beveridge. He
    has published ten previous collections of poetry in Australia, the three most recent of which were shortlisted for the
    Prime Minister’s Literary Awards, Transparencies in 2018, Exhibits of the Sun in 2015, and Eldershaw in 2014 (also joint
    winner of the Colin Roderick Award and shortlisted for the Queensland Literary Awards). His other collections are Queuing
    for the Mudd Club (1985), Ancient Music (1988), Corrupted Treasures (1995), Where the Trees Were (1999), Lost in the Foreground
    (2003), Other Summers (2006) and History of the Day (2009). In 2012 a volume of new and selected poems, The Red Sea, was
    published in the United States where he has a dedicated following.
anne-fairbairn:
  name: Anne Fairbairn
  sort_name: Fairbairn, Anne
  source_url: fairbairn.html
  image: fairbairnphoto.jpg
  books:
  - an-australian-conference-of-the-birds
  short_description: Anne Fairbairn, born in 1948, is a granddaughter of poet and politician George Houston Reid (1845-1918).
    She is a widely published Australian poet.
  long_description: Anne Fairbairn, born in 1948, is a granddaughter of poet and politician George Houston Reid (1845-1918).
    She is a widely published Australian poet. She has won the Banjo Paterson Writing Award for Open Poetry (1995). Her translation
    of Arabic poetry Feathers and the Horizon (Leros Press, 1989) received international acclaim. She is also the author of
    Shadows of Our Dreaming; a celebration of early Australia (Angus and Robertson, 1983), with haiku-like poems set beside
    her evocative black and white drawings, and Djuringa Haiku. Her own poetry has been translated and published in Arabic,
    Persian and Turkish. She won the 1995 Banjo Patterson Centenary Award for her poem ' High Country Dreaming ’.
luke-fischer:
  name: Luke Fischer
  sort_name: Fischer, Luke
  source_url: fischer.html
  image: fischerphoto-thumb.jpg
  books:
  - paths-of-flight
  short_description: Luke Fischer is a poet and scholar. He was born in 1978 into a European family in Sydney (his mother
    is French and his father’s family emigrated from Eastern Europe in 1950).
  long_description: Luke Fischer is a poet and scholar. He was born in 1978 into a European family in Sydney (his mother is
    French and his father’s family emigrated from Eastern Europe in 1950). In 2008 he was awarded a PhD in philosophy from
    the University of Sydney for his thesis on Rilke and phenomenology. From 2010-2011 he completed post-graduate study in
    creative writing (poetry). For a number of years he lived in Germany and the US, where he held academic positions, and
    he has travelled extensively in Europe and the Middle East. He is currently an honorary associate in the philosophy department
    at the University of Sydney. He won the 2012 Overland Judith Wright Poetry Prize, was shortlisted for the Newcastle Poetry
    Prize and was commended in the 2013 FAW Anne Elder Award for his book of poems Paths of Flight (Black Pepper).
philip-hammial:
  name: Philip Hammial
  sort_name: Hammial, Philip
  source_url: hammial.html
  image: hammialphoto.jpg
  books:
  - bread
  short_description: Philip Hammial is a prolific poet and author whose work includes Bread and many earlier collections.
  long_description: Philip Hammial is a prolific poet and author whose work includes Bread and many earlier collections. Philip
    Hammial is the author of Foot Falls & Notes (The Saturday Centre, 1976), Chemical Cart (Island, 1977), Mastication Poems
    (The Saturday Centre, 1977), Hear Me Eating (Makar, 1977), More Bath, Less Water (Red, 1978), Swarm (Island, 1985), Squeeze
    (Island, 1985), Vehicles (Island, 1985), Pell Mell (Black Lightning, 1988), Outsider Art in Australia (co-editor) (Aspect,
    1989), Travel/Writing (with Ania Walwicz) (Angus & Robertson, 1989), With One Skin Less (Hale & Iremonger, 1994), Just
    Desserts (Island, 1995), Black Market (Penguin, 1996), Bread (2000) (short-listed for the New South Wales Premier’s Literary
    Awards, Kenneth Slessor Prize for Poetry, 2001) and In the Year of Our Lord Slaughter’s Children (2004) (shortlisted for
    the New South Wales Premier’s Literary Awards, Kenneth Slessor Prize for Poetry, 2004).
alan-gould:
  name: Alan Gould
  sort_name: Gould, Alan
  source_url: gould.html
  image: gould-portrait.jpg
  books:
  - the-poets-stairwell
  short_description: Alan Gould was born in London in 1949 of English-Icelandic parents and lived on armed forces camps in
    England, Northern Ireland, Germany and Singapore before coming to Australia in 1966.
  long_description: Alan Gould was born in London in 1949 of English-Icelandic parents and lived on armed forces camps in
    England, Northern Ireland, Germany and Singapore before coming to Australia in 1966. He has an arts degree from the Australian
    National University and a Diploma of Education from the Canberra College of Advanced Education. He has held short-term
    jobs, such as a nuclear physics technician and as an agricultural and builder’s labourer. Since 1973 he has written poetry
    and fiction, augmenting his income with literary journalism and relief teaching. He has held several fellowships from
    the Australia Council and has been a writer in residence at the Australian National University, Geelong College, the Australian
    Defence Force Academy, Lincoln and Humberside Arts, Brisbane Church of England Grammar School and Brisbane Grammar School.
jennifer-harrison:
  name: Jennifer Harrison
  sort_name: Harrison, Jennifer
  source_url: harrison.html
  image: harrisonphoto3bw.jpg
  books:
  - sideshow-history
  - michelangelos-prisoners
  - cabramatta-cudmirrah
  - mosaics-and-mirrors-composite-poems
  - dear-b
  - folly-grief
  - colombine-new-selected-poems
  - anywhy
  - said-the-rat-writers-at-the-water-rat-2000-2003
  short_description: Jennifer Harrison was born in Liverpool, Sydney, in 1955, in a motorbike shop. She completed a medical
    degree in 1979 and her training as a psychiatrist in 1990.
  long_description: Jennifer Harrison was born in Liverpool, Sydney, in 1955, in a motorbike shop. She completed a medical
    degree in 1979 and her training as a psychiatrist in 1990. She runs the Developmental Assessment Program for children
    and adolescents at the Alfred Hospital, Melbourne. She began writing poetry while living in Boston, USA. Jennifer’s poetry
    has won many prizes including the 2003 NSW Women Writers National Poetry Prize, the 2004 Martha Richardson Poetry Medal
    and the 2004 Australian Book Review Poetry Prize. Her poetry has appeared in The Best Australian Poetry 2003, The Best
    Australian Poems 2004 and The Best Australian Poetry 2005. Her first collection Michelangelo ’ s Prisoners won the 1995
    Anne Elder Award and was commended in the Banjo Awards of the same year.
graham-henderson:
  name: Graham Henderson
  sort_name: Henderson, Graham
  source_url: henderson.html
  image: hendersonphoto.jpg
  books:
  - mosaics-and-mirrors-composite-poems
  - diary-of-a-dwarf
  - place-of-the-paintings-and-other-stories
  - the-colony
  short_description: Graham Henderson was born in Melbourne in 1953. He studied Drama, Literature, Print-making, and Film
    at Rusden State College.
  long_description: Graham Henderson was born in Melbourne in 1953. He studied Drama, Literature, Print-making, and Film at
    Rusden State College. He began writing stories and plays in the mid 1970s. His first collection of stories, The Anguish
    Of Departure, was published in 1979. His first novel, The Mountain, was published by Picador in 1989. The following year
    it was shortlisted for The Age Book of the Year Award. He has translated from the French, in collaboration with the author,
    Raphaëlle Pomian, a collection of short stories, Gifts & Sorrows (Black Pepper 1996). He has written five collections
    of poems and over twenty plays. In his youth he worked extensively in the theatre as an actor and director. Diary of a
    Dwarf, a collection of novellas, was published by Black Pepper in 1995, followed by his collection Place of the Paintings
    & Other Stories in 2004.
kf-pearson:
  name: K.F. Pearson
  sort_name: K.F. Pearson
  source_url: pearson.html
  image: pearson_index.jpg
  books:
  - mosaics-and-mirrors-composite-poems
  - the-complete-apparition
  - messages-of-things
  - the-history-of-colour
  - the-apparitions-daybook
  - passion-war
  - melbourne-elegies
  - the-apparition-at-large
  short_description: Pearson was born in Caulfield, Melbourne in 1946, and grew up on the working class side of the Racecourse.
    He has survived fire, lightning and gunshots, the last whilst head gardener at Koonunga Golf Course.
  long_description: 'Pearson was born in Caulfield, Melbourne in 1946, and grew up on the working class side of the Racecourse.
    He has survived fire, lightning and gunshots, the last whilst head gardener at Koonunga Golf Course. He has been a steel
    tier in the building industry, once established a crosswords company and has worked in printing and as a publisher. He
    has also been an art critic, journalist, editor and anthologist. He returned to his ''grey city’ of Melbourne after eighteen
    years away, including in the South Pacific and Adelaide. Black Pepper was founded in late 1994 by K.F. Pearson and Gail
    Hannah, initially in conjunction with Australian Scholarly Publishing. It is now an established and truly independent
    small publisher which has made a significant mark on Australian literature. K.F. Pearson’s books include: Friendly Street
    Poetry Reader No.'
jack-hibberd:
  name: Jack Hibberd
  sort_name: Hibberd, Jack
  source_url: hibberd.html
  image: hibberdphoto.jpg
  books:
  - the-genius-of-human-imperfection
  - madrigals-for-a-misanthrope
  short_description: Jack Hibberd was born during 1940 on the plains of north-western Victoria, educated at Bendigo and at
    the University of Melbourne, where he clinched a medical degree.
  long_description: Jack Hibberd was born during 1940 on the plains of north-western Victoria, educated at Bendigo and at
    the University of Melbourne, where he clinched a medical degree. He has written 38 plays including Dimboola, A Stretch
    of the Imagination, A Toast to Melba, Slam Dunk, and Legacy. His plays 'draw on a ribald vernacular and music hall traditions.’
    As well, he has published three novels, Memoirs of an Old Bastard, The Life of Riley, Perdita and The Great Allergy Detective
    Book. Jack has survived Melbourne for forty years, being married to the actress Evelyn Krape, and a father to Lily and
    James, from a first marriage, and Spike and Molly. The Genius of Human Imperfection, Jack Hibberd’s first poetry collection,
    was followed by Madrigals for a Misanthrope in 2004.
sandy-jeffs:
  name: Sandy Jeffs
  sort_name: Jeffs, Sandy
  source_url: jeffs.html
  image: Jeffs-portrait.jpg
  books:
  - chiaroscuro
  short_description: Sandy Jeffs was born in Ballarat and grew up there in the 1950s and 1960s. She graduated from La Trobe
    University in the 1970s and came to terms with her sexuality as part of an alternative family.
  long_description: Sandy Jeffs was born in Ballarat and grew up there in the 1950s and 1960s. She graduated from La Trobe
    University in the 1970s and came to terms with her sexuality as part of an alternative family. She has lived with schizophrenia
    for 39 years. She has published five volumes of poetry and a memoir. Much of her writing has been about exploring her
    madness and its challenges but she has also set her sights on the mad world, the even madder world of midweek ladies’
    tennis and her family. Sandy has been a very public advocate for those living with schizophrenia for many years presenting
    a human face for this often misunderstood condition. She lives with her friends and animals in a place where it is Christmas
    every day. Her collection The Mad Poet’s Tea Party is to be released in 2015 by Spinifex Press..
judy-johnson:
  name: Judy Johnson
  sort_name: Johnson, Judy
  source_url: johnson.html
  image: johnsonphoto.jpg
  books:
  - nomadic
  short_description: Judy Johnson was born in 1961.
  long_description: Judy Johnson was born in 1961. She has won the Josephine Ulrick Poetry Prize, the Val Vallis Queensland
    Arts Award and the Regional section of the Newcastle Poetry Prize (all in 2002) as well as the Bruce Dawe Poetry Prize
    (2001), the Tom Collins Poetry Prize (1995 and 1998), the Roland Robinson Poetry Award (2000), the John Shaw Neilson Poetry
    Award (1998) and the WB Yeats Poetry Prize (1998 and 2000). Her chapbook of poetry, Wing Corrections, was published by
    Five Islands Press in 1998 and came second in the Anne Elder Award and was on the Year 11 literature list in Western Australia
    for two years. Since 1998 she has been published widely, including with her chapbook Light and Skin (1992), published
    by Picaro Press. She has received several grants from the Australia Council, including to write full-time in 2004.
shelton-lea:
  name: Shelton Lea
  sort_name: Lea, Shelton
  source_url: lea.html
  image: leaprofile.jpg
  books:
  - nebuchadnezzar
  - all-travellers-we
  short_description: Shelton Lea was born in 1946 in Fitzroy and found himself adopted into Toorak. At twelve he ran away
    from home and Carey Grammar and lived on the streets, stealing to survive.
  long_description: Shelton Lea was born in 1946 in Fitzroy and found himself adopted into Toorak. At twelve he ran away from
    home and Carey Grammar and lived on the streets, stealing to survive. He did time in various reform schools. At sixteen
    he was walked into Pentridge’s C Division. Inside jails he wrote love poems and letters for tobacco. He travelled and
    forged Aboriginal bonds beginning his life-long commitment to write about Australia’s black and white troubles. His 2004
    interview on ABC television’s Stateline was influential in raising the minimum age for jailing teenagers. His first collection
    appeared in 1962. In the 1960s he lived in Kings Cross, later moving to Melbourne, where as part of the Heide set he was
    associated with Barrett Reid on Overland. Prominent as a reader and mentor, he regularly performed his works, sometimes
    with a jazz group.
emma-lew:
  name: Emma Lew
  sort_name: Lew, Emma
  source_url: lew.html
  image: lewphotothree.jpg
  books:
  - the-wild-reply
  short_description: Born in 1962 in Victoria, Emma Lew completed an Arts degree at Melbourne University in 1986 and has worked
    as a deckhand, shop assistant, proofreader, receptionist and clerical assistant.
  long_description: Born in 1962 in Victoria, Emma Lew completed an Arts degree at Melbourne University in 1986 and has worked
    as a deckhand, shop assistant, proofreader, receptionist and clerical assistant. She began writing poems in 1986. Before
    his early death she was the partner of poet John Anderson. Her first book of poetry, The Wild Reply, was shortlisted for
    the NSW Premier’s Prize, was co-winner of The Age Book of the Year and won the Dame Mary Gilmore prize for 1997. It was
    also runner-up for the Anne Elder Prize. Her second book of poetry, Anything the Landlord Touches (Giramondo, 2002) won
    the Judith Wright Calanthe Poetry Prize and the Victorian Premier ’ s C.J. Dennis Prize for Poetry.
patrick-mccauley:
  name: Patrick McCauley
  sort_name: McCauley, Patrick
  source_url: McCauleyAndTorresan.html
  image: McCauleyAndTorresan.jpg
  books:
  - the-sea-palace-hotel
  short_description: Poet Patrick McCauley and painter Raffaella Torresan have produced in The Sea Palace Hotel a group of
    nine paintings, three photographs and twenty poems which explore their three week visit to Colaba in Mumbai, India, during
    February 2016.
  long_description: Poet Patrick McCauley and painter Raffaella Torresan have produced in The Sea Palace Hotel a group of
    nine paintings, three photographs and twenty poems which explore their three week visit to Colaba in Mumbai, India, during
    February 2016. The Sea Palace Hotel is just down the road from the Taj Mahal Hotel, and the site of the Islamist terrorist
    killings in 2008. The Gateway To India, a huge and magnificent arch built by the Indians to welcome the English and The
    East India Company to India, was also the place where Raff camped for a few weeks free accommodation - back in the mists
    of time, when she was on the hippy trail.
raffaella-torresan:
  name: Raffaella Torresan
  sort_name: Torresan, Raffaella
  source_url: Torresan.html
  image: TorresanPhoto.jpg
  books:
  - the-sea-palace-hotel
  - la-ragazza
  short_description: Raffaella Torresan is a visual artist and writer. She is a Melbourne institution and over the years she
    has collected an interesting assortment of people from the bohemian scene, of jailbirds, of artists, writers and poets.
  long_description: 'Raffaella Torresan is a visual artist and writer. She is a Melbourne institution and over the years she
    has collected an interesting assortment of people from the bohemian scene, of jailbirds, of artists, writers and poets.
    She has photographed poets reading their work, she has painted their portraits, she has painted other painters. She has
    had many exhibitions of her own work, and curated many more group shows which she considers ''conscience’ shows, often
    with interesting themes, such as ''Leave The Animals Alone’ and ''For Love of Trees’ and ''The Kindness Show’ and Weep
    Leviathan and more. She has previously published: The Dream of a Ridiculous Man (1986), illustrations for Dostoevsky’s
    short story Melbourne Poets Live / photography by Raffaella Torresan (2003) Literary Creatures (2009) Poetry and Ideas
    (2015) and The Sea Palace Hotel (2016).'
chris-mooney-singh:
  name: Chris Mooney-Singh
  sort_name: Mooney-Singh, Chris
  source_url: mooneysingh.html
  image: mooneysinghcolourphoto.jpg
  books:
  - the-bearded-chameleon
  short_description: Chris Mooney-Singh was born in 1956 of Australian-Irish descent. He has worked extensively in publishing,
    editing and education.
  long_description: Chris Mooney-Singh was born in 1956 of Australian-Irish descent. He has worked extensively in publishing,
    editing and education. He adopted Sikhism in 1989 and has lived in various parts of India and Asia, including Singapore.
    Mooney-Singh is well known for his research into sacred Sikh music and its lost string instrument tradition, including
    recent honours in India for the revival of the rabab, including as an accompaniment to Sikh devotional poetry. The founder
    of Poetry Slam in Singapore and Malaysia, he has also published two joint collections of poetry, two chapbooks, co-edited
    The Penguin Book of Christmas Poems (1992) and has three spoken word CDs, the latest being Living in the Land of the Durian
    Eaters. Mooney-Singh is founding director of Lit Up, Singapore, a festival for emerging writers and performers.
homer-rieth:
  name: Homer Rieth
  sort_name: Rieth, Homer
  source_url: rieth.html
  image: riethhportraitrh.jpg
  books:
  - the-dining-car-scene
  - wimmera
  - 150-motets
  - the-garden-of-earth
  short_description: Rieth was born in Stuttgart in 1947, of German and Georgian parents. He came to Australia in 1952. He
    was educated at Padua and Assumption Colleges and, following a short period in the Jesuit novitiate at Loyola, Watsonia,
    at the University of Melbourne.
  long_description: Rieth was born in Stuttgart in 1947, of German and Georgian parents. He came to Australia in 1952. He
    was educated at Padua and Assumption Colleges and, following a short period in the Jesuit novitiate at Loyola, Watsonia,
    at the University of Melbourne. Since 1999 he has made his home in the Wimmera township of Minyip. He has been a teacher
    of Greek and Roman literature and philosophy, English literature and medieval and modern history. He has traveled through
    Mediterranean lands, including a sojourn in the monasteries of the Holy Mountain of Athos in Greece and has tutored in
    Spain and the UK. He lectured in Classical Studies in the Greek-Australia Centre at RMIT University, and also held the
    Honorary Chair of the Melbourne Poets Union. He has three daughters and a son. His awards include the Deakin Literary
    Society Prose Prize (1994) and the Australian Poetry Cup (1998).
kirsty-sangster:
  name: Kirsty Sangster
  sort_name: Sangster, Kirsty
  source_url: sangster.html
  image: sangsterphoto.jpg
  books:
  - midden-places
  short_description: Kirsty Sangster is a poet, reviewer and essayist. She was born in Ferntree Gully in August 1970. She
    has read widely at writers events since winning Melbourne University’s Writers’ Competition in 1991.
  long_description: Kirsty Sangster is a poet, reviewer and essayist. She was born in Ferntree Gully in August 1970. She has
    read widely at writers events since winning Melbourne University’s Writers’ Competition in 1991. She has completed a doctorate
    in Human Rights Law at La Trobe University after earlier studying Refugee and Humanitarian Law at Oxford University. She
    now teaches medical anthropology. She has travelled in Europe and was a gardener on the island of Iona of the west coast
    of Scotland. She has worked widely in community and social justice arenas, which took her from refugee camps on the Burma-Thai
    border to Aboriginal communities and shelters for homeless men in Gertrude Street, Fitzroy. She is married and has a newborn
    son. Midden Places, her first collection of poetry, was published by Black Pepper in 2006.
andrew-sant:
  name: Andrew Sant
  sort_name: Sant, Andrew
  source_url: sant.html
  image: santphotothumb.jpg
  books:
  - album-of-domestic-exiles
  - russian-ink
  - tremors-new-and-selected-poems
  - fuel
  - the-bicycle-thief-other-poems
  short_description: Andrew Sant was born in London in 1950 and educated there and in Melbourne after his family emigrated
    to Australia in 1962.
  long_description: Andrew Sant was born in London in 1950 and educated there and in Melbourne after his family emigrated
    to Australia in 1962. He studied at La Trobe University and has travelled widely, working as a teacher, boatman and manager
    of a hostel for delinquent youth. For many years he was based in Hobart, Tasmania, although he has also spent several
    periods overseas and including as writer in residence at the University of Leicester and is currently in the United Kingdom.
    His poems have been widely published and anthologised, and he has received Australia Council Grants, Awards and Fellowships,
    as well as a Centenary Medal for outstanding contribution to literature and education in Tasmania and short-listing for
    the Dinny O’Hearn Poetry Prize (1998) for Album of Domestic Exiles. He is a co-founder and was for ten years co-editor
    of the literary quarterly, Island, and has been an anthologist.
nicolette-stasko:
  name: Nicolette Stasko
  sort_name: Stasko, Nicolette
  source_url: stasko.html
  image: staskophoto.jpg
  books:
  - the-weight-of-irises
  - the-invention-of-everyday-life
  short_description: Nicolette Stasko was born in the US of Polish and Hungarian ancestry and emigrated to Australia in 1979.
    Her first collection of poetry Abundance (1992) won the Anne Elder Award in 1993 and was shortlisted for the Dame Mary
    Gilmore Award, the New South Wales Premier’s Prize and the National Book Awards.
  long_description: 'Nicolette Stasko was born in the US of Polish and Hungarian ancestry and emigrated to Australia in 1979.
    Her first collection of poetry Abundance (1992) won the Anne Elder Award in 1993 and was shortlisted for the Dame Mary
    Gilmore Award, the New South Wales Premier’s Prize and the National Book Awards. She has since published three further
    collections, Black Night with Windows (1994), Dwelling in the Shape of Things (1999), In Certain Light (2001) and The
    Weight of Irises (2003) as well as the best-selling non fiction work Oyster: from Montparnasse to Greenwell Point (2000).
    She is a reviewer, editor, essayist and teacher and has recently completed her PhD at the University of Sydney. Her New
    and Selected Poems Glass Cathedrals was released in 2006. She currently lives in Sydney. Black Pepper released Stasko’s
    first fiction, The Invention of Everyday Life, in 2007.'
hugh-tolhurst:
  name: Hugh Tolhurst
  sort_name: Tolhurst, Hugh
  source_url: tolhurst.html
  image: tolhurs-thumb-b+w.jpg
  books:
  - filth-and-other-poems
  - rockling-king
  short_description: Hugh Tolhurst was born in Melbourne. Educated at Carey Grammar, Taylor’s College and at Deakin University
    and the University of Melbourne.
  long_description: Hugh Tolhurst was born in Melbourne. Educated at Carey Grammar, Taylor’s College and at Deakin University
    and the University of Melbourne. Although his academic studies have involved reading English Literature and Philosophy,
    he has a strong interest in Ancient History, particularly military history; he became the Australian champion of ancient
    miniature wargaming at the age of sixteen. His poetry has appeared in newspapers and in Australian and American literary
    journals in the 1990s and on. In that time he has worked as a bookseller, a bindery hand, a fundraiser, a proofreader
    and a supermarket shelf-stacker. In 2003 he was the recipient of an Australia Council grant to write full-time. He has
    also also been the recipient of an Australia Council Skills and Arts Development overseas studio residency grant, once
    in 2001 for Rome and in 2006 for the Cité Internationale des Arts in Paris.
todd-turner:
  name: Todd Turner
  sort_name: Turner, Todd
  source_url: turner.html
  image: turnerportrait-thumb.jpg
  books:
  - woodsmoke
  short_description: Todd Turner was born in 1971 and raised in the western suburbs of Sydney. His parents were from farming
    families in the town of Koorawatha, situated on the Western Plains of New South Wales.
  long_description: Todd Turner was born in 1971 and raised in the western suburbs of Sydney. His parents were from farming
    families in the town of Koorawatha, situated on the Western Plains of New South Wales. They came to Sydney in 1959. His
    father worked as an interstate truck driver and his mother raised four boys as well as working part time at a local grocery
    store. In 1987 he was apprenticed as a jeweller with a large jewellery manufacturing company and worked alongside gold
    and silversmiths, enamellists, gem setters and hand engravers, learning various techniques of the craft. Many of those
    craftspeople instilled in him a deep interest in art and literature. Upon completing his apprenticeship in 1991 he travelled
    throughout Europe before returning to Sydney after the sudden death of his younger brother. He then travelled to London
    and throughout Africa and the Middle East.
mirranda-burton:
  name: Mirranda Burton
  sort_name: Burton, Mirranda
  source_url: burton.html
  image: burton-portrait.jpg
  books:
  - hidden
  short_description: Mirranda Burton was born in Auckland, New Zealand in 1973 Since graduating from art school in South Australia
    in 1995, she has forged pathways in independent and commercial animation, multimedia design, printmaking and drawing.
  long_description: 'Mirranda Burton was born in Auckland, New Zealand in 1973 Since graduating from art school in South Australia
    in 1995, she has forged pathways in independent and commercial animation, multimedia design, printmaking and drawing.
    More recently she has devoted herself to the medium of comics, drawing upon her life experiences. Her comics have been
    published in Tango and Going Down Swinging since 2006, and in 2010 she won the Scenario Prize for her comic strip P.S.
    at the Fumetto International Comix Festival in Lucerne, Switzerland. Hidden is her first book. In September 2011 she was
    artist-in-residence at Dunmoochin where she had access to Clifton Pugh’s printing press. website: www.pawpedaller.com
    blog: Notes from a Pawpedaller. an example of recent work from Notes from a Pawpedaller'
mammad-aidani:
  name: Mammad Aidani
  sort_name: Aidani, Mammad
  source_url: aidani.html
  image: aidaniphoto2012.jpg
  books:
  - a-picture-out-of-frame
  short_description: Born in Iran, Mammad Aidani spent his childhood in the poverty stricken areas of the city of his birth,
    Khorramshahar, near the Persian Gulf.
  long_description: Born in Iran, Mammad Aidani spent his childhood in the poverty stricken areas of the city of his birth,
    Khorramshahar, near the Persian Gulf. He was introduced to Persian literature in his youth by his teachers. Aidani’s early
    poetry draws on individual responses to feelings and sensations which express the displaced poet’s struggle with the language
    of day to day life. As a playwright he has explored the contemporary experience of alienation, disadvantage and how we
    construct meaning in life. His plays include 'An Idiot Amongst Us’ (1996), 'She’ (1997), 'A Few Steps... Not Here... not
    There’ (1998 and 2002), 'In the Mirror’ (2002) and two short plays, 'It was... Then’ and 'Waiting for the Sunset’ (2003).
david-cohen:
  name: David Cohen
  sort_name: Cohen, David
  source_url: cohen.html
  image: cohen.jpg
  books:
  - fear-of-tennis
  short_description: 'David Cohen was born in Perth, Western Australia, and now lives in Melbourne. His short fiction has
    appeared in HQ, Meanjin, Metro, Space: New Writing and Westerly and in the anthologies Sibling Stories (1997), The 2001
    Glen Eira Literary Awards Anthology and Allnighter (2006).'
  long_description: 'David Cohen was born in Perth, Western Australia, and now lives in Melbourne. His short fiction has appeared
    in HQ, Meanjin, Metro, Space: New Writing and Westerly and in the anthologies Sibling Stories (1997), The 2001 Glen Eira
    Literary Awards Anthology and Allnighter (2006). He won the HQ/Flamingo Short Story Prize in 1999. He has co-written Surfin’
    Girlfriend, a musical comedy for the stage, and his short television script Forbidden Fruit was screened on 11 October
    2007 as part of SBS’s Marx and Venus series. Fear of Tennis won a Varuna Award for Manuscript Development in 2002. He
    is currently writing a second novel.'
judith-colquhoun:
  name: Judith Colquhoun
  sort_name: Colquhoun, Judith
  source_url: colquhoun.html
  image: colquhounportrait-thumb.jpg
  books:
  - thicker-than-water
  short_description: Colquhoun was born in North Queensland and studied production at the National Institute of Dramatic Art.
    She was a film editor with ABC Television and a radio copywriter before becoming invited to write television scripts for
    Bellbird.
  long_description: Colquhoun was born in North Queensland and studied production at the National Institute of Dramatic Art.
    She was a film editor with ABC Television and a radio copywriter before becoming invited to write television scripts for
    Bellbird. It began a 40 year career of television and telemovie scriptwriting, including for The Sullivans, Twenty Good
    Years, Skyways, GP, Something in the Air, Flying Doctors, MDA, The Man From Snowy River, Blue Heelers, A Country Practice,
    Home and Away and Neighbours, and the children’s series Cornflakes for Tea, Zoo Family and Ocean Girl. Judith is still
    (to her slight chagrin) best-known for killing Molly Jones in A Country Practice. Judith’s television career resulted
    in five AWGIE awards and in 2007 she was a made a Life Member of the Australian Writers’ Guild. She is married with two
    children and two grandchildren.
alan-cornell:
  name: Alan Cornell
  sort_name: Cornell, Alan
  source_url: cornell.html
  image: cornellphoto.jpg
  books:
  - the-gentle-art-of-tossing
  short_description: Alan Cornell is a Melbourne-based author who writes advertising copy for a living and other things for
    pleasure.
  long_description: Alan Cornell is a Melbourne-based author who writes advertising copy for a living and other things for
    pleasure. Short stories. Children’s stories. Sketches. Songs. A monthly column cum sitcom in the Warrandyte Diary called
    'Living with the Trotts’. More than 50 sketches for revues and productions. And a monthly arts newsletter. He has also
    written the book and co-written the songs for a musical called Open Season (Bushfire Press). The Gentle Art of Tossing
    is his first novel.
louise-davenport:
  name: Louise Davenport
  sort_name: Davenport, Louise
  source_url: davenport.html
  image: davenportphoto.jpg
  books:
  - mothers-claw
  short_description: Louise Davenport was born in Melbourne in 1955. Her childhood was partly spent in the Bendigo Babies’
    Home and the Andrew Kerr Memorial Home for Children while her mother was receiving psychiatric treatment.
  long_description: 'Louise Davenport was born in Melbourne in 1955. Her childhood was partly spent in the Bendigo Babies’
    Home and the Andrew Kerr Memorial Home for Children while her mother was receiving psychiatric treatment. Her mother served
    in the Australian Women’s Airforce during World War II and was a singer of classics, light opera and musical comedy. She
    suicided while Louise Davenport was eight. Louise Davenport h as an MA in Australian Studies from Melbourne University,
    having studied fiction with Gerald Murnane and history with Michael Cathcart. The landscapes of the Goulburn Valley and
    of Point Hicks have been her still centres. Her stories have appeared in the magazines Meanjin, Southerly and Westerly
    and in The Temperment of Generations: 50 Years of Writing in Meanjin (Melbourne University Press, 1990).'
colin-duckworth:
  name: Colin Duckworth
  sort_name: Duckworth, Colin
  source_url: duckworth.html
  image: duckworthphoto.jpg
  books:
  - digging-in-dark-places
  - summer-symphony
  short_description: Colin Duckworth was known internationally for major works on the 18th century, especially Voltaire and
    French counter-revolutionary espionage, and on modern theatre, with particular reference to Samuel Beckett.
  long_description: Colin Duckworth was known internationally for major works on the 18th century, especially Voltaire and
    French counter-revolutionary espionage, and on modern theatre, with particular reference to Samuel Beckett. He was a freelance
    academic, writer and occasional television actor and theatre director. He held an M.A. in Modern Languages from Birmingham,
    where he studied singing at the School of Music. He also had a Ph.D. from Cambridge and a D.Litt. from Melbourne University,
    where he was an emeritus professor and professorial fellow. He was a Commander in the Ordre des Palmes academiques. His
    theatre and book reviews, essays, stories and articles appeared in journals and newspapers in England, the U.S.A., Canada,
    Australia, New Zealand, France and Germany.
maher-abou-elsaoud:
  name: Maher Abou Elsaoud
  sort_name: Elsaoud, Maher Abou
  source_url: elsaoud.html
  image: elsaoudphotoone.jpg
  books:
  - cairo-paris-melbourne
  short_description: Maher Abou Elsaoud was born in Cairo on 20 December 1964. He studied film making in Paris before coming
    to Australia in 1991.
  long_description: Maher Abou Elsaoud was born in Cairo on 20 December 1964. He studied film making in Paris before coming
    to Australia in 1991. He has worked as a factory worker, storeman, kitchen hand, cook and security guard. In Egypt and
    the Middle East he has sold many tens of thousands of copies of his fiction, including the Arabic version of Cairo Paris
    Melbourne. He has made two short films and one documentary about cultural differences in Australia. In 2010, he moved
    to Egypt to write the script for the movie of his novel The Legend of Schnedar. Shooting was disrupted by Egypt’s Arab
    Spring. Maher Elsaoud was active politically during the Revolution, writing for newspapers and magazines and on Facebook.
    He was present in Tahrir Square and describes this as the best experience he has ever had.
jim-ewing:
  name: Jim Ewing
  sort_name: Ewing, Jim
  source_url: ewing.html
  image: ewing.jpg
  books:
  - two-that-got-away
  short_description: Jim Ewing has a problem-his work is too original and irreverent to suit Australian publishing elites
    who desire their Oz literature to, in appearance and flavour, be emu stew covered by a saccharine European garnish.’ Carmel
    Bird, novelist, former literary editor Meanjin 'Jim Ewing writes with a spring in his step.
  long_description: Jim Ewing has a problem-his work is too original and irreverent to suit Australian publishing elites who
    desire their Oz literature to, in appearance and flavour, be emu stew covered by a saccharine European garnish.’ Carmel
    Bird, novelist, former literary editor Meanjin 'Jim Ewing writes with a spring in his step. The narrative takes you out
    of the everyday into lives that are funny, sometimes sad, and revealing. Characterised by wit, energy, and sharp perception,
    his writing is wise and always entertaining.’ John Clarke, writer, actor, satirist, comic genius 'I published Australian
    Short Stories for sixteen years. Jim Ewing’s stories appeared regularly in the magazine.
robyn-friend:
  name: Robyn Friend
  sort_name: Friend, Robyn
  source_url: friend.html
  image: friendphoto.jpg
  books:
  - the-butterfly-stalker
  short_description: Robyn Friend was born in Melbourne in 1942 and now lives in Tasmania where she teaches creative writing
    and works as a community oral historian.
  long_description: Robyn Friend was born in Melbourne in 1942 and now lives in Tasmania where she teaches creative writing
    and works as a community oral historian. In 2002, Friend spent time in India as part of a writer’s residency funded by
    Arts Tasmania and the Australia Council. Friend has written in the genres of biography and oral history, reviews, essays
    and poetry. Her books include the controversial Eva (1985), Fancy Seeing You Here (1989), We Who Are Not Here - Aboriginal
    people of the Huon and Channel Today (1992) and numerous short stories, articles and reviews. She has two sons and a ginger
    cat called Lil. The Butterfly Stalker is her second novel and was published in 2003.
susan-hancock:
  name: Susan Hancock
  sort_name: Hancock, Susan
  source_url: hancock.html
  image: hancockphotothumb.jpg
  books:
  - sailing-through-the-amber
  - the-peastick-girl
  short_description: Hancock has set all her fictional work in New Zealand, despite spending much of her time in Europe, England
    and Australia.
  long_description: Hancock has set all her fictional work in New Zealand, despite spending much of her time in Europe, England
    and Australia. 'Wellington for me is both a place and an obsession,’ she says. Reading from the MS at a recent Writers’
    Conference at Colgate University in New York, where other invited guests included two Pulitzer prize-winning poets, she
    found the American audience was keen to see in New Zealand a site for literature as lively and as open as their own. 'A
    city like Wellington, small by American standards but metropolitan, set out in a near-fabulous part of the world, peopled
    by a very lively, opinionated, savvy and often tricky, even dangerous group of characters in their twenties and thirties,
    defining their lives, trying to escape the past and shape the future - all of this appealed to that audience far more
    than I had ever expected,’ she says.
vivian-hopkirk:
  name: Vivian Hopkirk
  sort_name: Hopkirk, Vivian
  source_url: hopkirk.html
  image: hopkirkphoto.jpg
  books:
  - meditations-of-a-flawed-groom
  short_description: Hopkirk was born in Sydney. The nephew of Brett Whiteley the painter, he was educated at Christ's College,
    Canterbury, and Victoria University, New Zealand, he lived and studied for a decade abroad, sponsored by Cinzano in Tuscany
    and living as writer in residence at the Shakespeare & Company Bookshop in Paris.
  long_description: 'Hopkirk was born in Sydney. The nephew of Brett Whiteley the painter, he was educated at Christ''s College,
    Canterbury, and Victoria University, New Zealand, he lived and studied for a decade abroad, sponsored by Cinzano in Tuscany
    and living as writer in residence at the Shakespeare & Company Bookshop in Paris. He returned to Australia in 1992 to
    write Meditations of a Flawed Groom, for which he deliberately induced a brief stay in a Sydney jail. Vivian Hopkirk was
    well known as a poet, publishing poems in Europe. He passed away unexpectedly on 31 May 2013. In memorium: Vivian Hopkirk
    with Nick Lyon, violinist (photo: Raffaella Torrenson) Vivian Hopkirk recited the following poem at the Big Day Out music
    festival in Melbourne on 28 January 2007 as part of the John Cooper Clarke segment.'
barry-klemm:
  name: Barry Klemm
  sort_name: Klemm, Barry
  source_url: klemm.html
  image: klemmphoto.jpg
  books:
  - running-dogs
  short_description: Barry Klemm was born in 1945. He abandoned an array of careers before concentrating on writing. He emerged
    in the 1990 ’ s with a series of one hour radio dramas broadcast on Radio National.
  long_description: Barry Klemm was born in 1945. He abandoned an array of careers before concentrating on writing. He emerged
    in the 1990 ’ s with a series of one hour radio dramas broadcast on Radio National. At the same time a number of short
    stories were published. He has published two teenage novels, The Tenth Hero and The Last Voyage of the Albatross. Running
    Dogs is his first adult novel. He is a Vietnam War veteran. Running Dogs is based on his experience in that conflict and
    was broadcast in serial form on Radio National Australia in 2006.
phil-leask:
  name: Phil Leask
  sort_name: Leask, Phil
  source_url: leask.html
  image: leaskphoto.jpg
  books:
  - by-way-of-water
  - the-slow-death-of-patrick-oreilly
  - olhovsky-prince-of-hamburg
  short_description: Phil Leask was born in Brisbane in 1947. He bushwalked, studied English and French at the University
    of Brisbane and Education at the University of Tasmania.
  long_description: Phil Leask was born in Brisbane in 1947. He bushwalked, studied English and French at the University of
    Brisbane and Education at the University of Tasmania. He demonstrated and dreamed of sitting in Parisian cafes with John
    Paul Sartre and Simone de Beauvoir. After teaching in Tasmania, he travelled across South-East Asia, Nepal, India, Pakistan
    and Afghanistan on his way to another island, England, in 1973. During his years based in London, he has worked variously
    as a teacher, storeman in a department store, hospital porter, adviser in a community law centre, and researcher and adviser
    on economic development in local authorities. He completed an MA in Modern European History at the University of Sussex
    and is currently a postgraduate student in German Studies at University College London.
alan-loney:
  name: Alan Loney
  sort_name: Loney, Alan
  source_url: loney.html
  image: loneyphoto09.jpg
  books:
  - anne-of-the-iron-door
  - the-falling
  - the-printing-of-a-masterpiece
  short_description: Alan Loney was born in 1940 in Lower Hutt in New Zealand. His first book of poems The bare re-membrance
    was published in 1971 and he printed his first book in 1974.
  long_description: Alan Loney was born in 1940 in Lower Hutt in New Zealand. His first book of poems The bare re-membrance
    was published in 1971 and he printed his first book in 1974. Since then he has gained an inter-national reputation as
    a poet, critic, writer, publisher and printer. He has been a book and magazine editor (including Parallax and New Zealand
    Crafts) and a publisher at Hawk Press (1975-1983), Black Light Press (1987-1991) and The Holloway Press at the University
    of Auckland (1994-1998). He has also been published by fine presses such as Granary Books (New York), The Janus Press
    (Vermont), Ink-A! Press (Oregon) and Barbarian Press (British Columbia) as well as Five Islands Press and Auckland University
    Press. He was Auckland University Literary Fellow 1992, Honorary Fellow at The Australian Centre, University of Melbourne
    2002-2006 and Printer in Residence at University of Otago 2008.
wayne-macauley:
  name: Wayne Macauley
  sort_name: Macauley, Wayne
  source_url: macauley.html
  image: macauleyphoto2.jpg
  books:
  - blueprints-for-a-barbed-wire-canoe
  - caravan-story
  - other-stories
  short_description: Wayne Macauley is a Melbourne writer whose stories have been published in Meanjin, Westerly, Overland,
    Arena, HQ and other magazines.
  long_description: Wayne Macauley is a Melbourne writer whose stories have been published in Meanjin, Westerly, Overland,
    Arena, HQ and other magazines. He was the winner of The Age Short Story Competition in 1995 and was anthologised in Best
    Australian Stories 2001. He has written extensively for the theatre over many years and was a founding member of the award-winning
    site-specific performance company, the Institute of Complex Entertainment (winner of the 1999 Green Room Award for ' Tower
    of Light ’). His first novella was Blueprints for a Barbed-Wire Canoe (Black Pepper, 2004) and his second Caravan Story
    (Black Pepper, 2007). These two novellas have since been republished by Text Publishing. Other Stories (Black Pepper,
    2010) collects his short fictions together and has received widespread critical acclaim.
margaret-mathews:
  name: Margaret Mathews
  sort_name: Mathews, Margaret
  source_url: mathews.html
  image: mathews.jpg
  books:
  - room-for-delusion
  short_description: Margaret Mathews is a graduate of Box Hill Institute’s Diploma of Arts (Professional Writing and Editing)
    course receiving Academic and Highest Achievement awards.
  long_description: Margaret Mathews is a graduate of Box Hill Institute’s Diploma of Arts (Professional Writing and Editing)
    course receiving Academic and Highest Achievement awards. She won the Gippsland Travel Writing competition in 2008 and
    was Commended in the FAW Mornington Peninsula 2008 Short Story Competition. She has been published in The Age, Good Weekend,
    Traveller, The Sunday Age (letters and competitions) and several small literary magazines. Margaret has three adult daughters
    and lives in Melbourne. Room for Delusion is her first book. She is currently writing a sequel- Hotel Del Monte.
peter-murk:
  name: Peter Murk
  sort_name: Murk, Peter
  source_url: murk.html
  image: murkphoto.jpg
  books:
  - posing-in-vast-spaces
  short_description: 1960-2019 Peter Murk, born in 1960 in Yallourn. His immigrant father and local mother moved to Melbourne
    in 1967.
  long_description: 1960-2019 Peter Murk, born in 1960 in Yallourn. His immigrant father and local mother moved to Melbourne
    in 1967. He began writing poetry and short prose from childhood with a particular interest in recording stories collected
    from those he has met. He has been published in Overland and other journals including essays on aesthetics for the Victorian
    Contemporary Sculptors’ Association, travel pieces and reviews for the Temple Studios newsletter. He has presented specialist
    programmes on radio about gardening and written gardening notes in The Age. He worked as a gardener from 1985, at first
    in Fitzroy Gardens in Melbourne assisting an old Calabrian fellow in his work. 'Peter, the plants will tell you what they
    want’; and so they do if you’re taught to look.
nicholas-playford:
  name: Nicholas Playford
  sort_name: Playford, Nicholas
  source_url: playford.html
  image: playfordphototwo.jpg
  books:
  - the-prisoner-gains-a-blurred-skin
  short_description: Nicholas Playford was born in the storeroom of a Canberra hospital on 5 May 1961, the same day that Alan
    Shepard became the first American to leave planet Earth and travel into space.
  long_description: Nicholas Playford was born in the storeroom of a Canberra hospital on 5 May 1961, the same day that Alan
    Shepard became the first American to leave planet Earth and travel into space. His father’s family has been involved in
    South Australian and national politics for a number of generations. His mother’s family came to Australia as refugees
    from Lithuania in 1949. He has a history degree from Adelaide University and worked for several years as a policy adviser
    in the PM’s Department in Canberra and later for the Victorian Premier’s Department. He has continued to write occasional
    fiction and also on nanotechnology, futurology and spirituality (including under his current name, Avatar Polymorph).
    Ill from 1996 to 2007, he has been based around Fitzroy, Melbourne, since 1990, including for various Performance Art
    and other art projects.
raphaelle-pomian:
  name: Raphaëlle Pomian
  sort_name: Pomian, Raphaëlle
  source_url: pomian.html
  image: pomianphoto.jpg
  books:
  - gifts-sorrows
  short_description: Pomian was born in 1956 in Nantes, France. She lived in Australia from 1976 until 1992. She co-wrote
    a play Landscapes of a Life with Graham Henderson which was performed at La Mama in 1988.
  long_description: Pomian was born in 1956 in Nantes, France. She lived in Australia from 1976 until 1992. She co-wrote a
    play Landscapes of a Life with Graham Henderson which was performed at La Mama in 1988. She is a practising artist and
    has exhibited at the old Powell Street Gallery, Melbourne and in Paris. Don et Misères/Gifts & Sorrows was written during
    her sojourn here. She has continued to write in France.
john-vasilakakos:
  name: John Vasilakakos
  sort_name: Vasilakakos, John
  source_url: vasilakakos.html
  image: vasilakakosphoto.jpg
  books:
  - the-set-up
  short_description: John Vasilikakos was born in Greece in 1951 and came to Australia in 1965. A graduate of Melbourne University,
    he has received a doctorate and published widely in Australia, Greece and America.
  long_description: 'John Vasilikakos was born in Greece in 1951 and came to Australia in 1965. A graduate of Melbourne University,
    he has received a doctorate and published widely in Australia, Greece and America. His Greek fiction includes Adumbrations
    of the World, The Shipwreck of the SOS, According to St John and A Psychological Portrait of a Greek Migrant, while his
    plays in Greek include The Identity and Attention: Fragile! His criticism includes Studies in Modern Greek Literature
    and Modern Greek Literature of the Diaspora: Australia in Greek, and The Poet S.S. Charkionakis: A Critical Approach to
    his Work (co-authored with G. Kehagioglou and X. Kapsetakis). His work is also included in various anthologies and has
    been translated into other languages. He has taught Modern Greek and Interpreting and Translating at Deakin University.'
alan-wearne:
  name: Alan Wearne
  sort_name: Wearne, Alan
  source_url: wearne.html
  image: wearnephoto.jpg
  books:
  - kicking-in-danger
  short_description: Alan Wearne is the author of four books including the award winning verse novel The Nightmarkets. An
    Essendon supporter since 1954 he helped found the Nunawading District Junior Football League and was, for one season,
    a boundary umpire with the Eastern Districts Football League seconds.
  long_description: Alan Wearne is the author of four books including the award winning verse novel The Nightmarkets. An Essendon
    supporter since 1954 he helped found the Nunawading District Junior Football League and was, for one season, a boundary
    umpire with the Eastern Districts Football League seconds. He was once mistaken for Jason Dunstall and shares his birthday
    with Tony Shaw. Alan Wearne’s webpage is at www.uow.edu.au/creats/staff/wearne. See also www.afactor.net/wearne.
jim-williams:
  name: Jim Williams
  sort_name: Williams, Jim
  source_url: williams.html
  image: williamsphoto.jpg
  books:
  - letters-from-byron
  short_description: Jim Williams (Di Guglielmo) was born near Chikkahominy in New York State, survived his multicultural
    childhood and somehow managed a BS degree from Cornell University.
  long_description: Jim Williams (Di Guglielmo) was born near Chikkahominy in New York State, survived his multicultural childhood
    and somehow managed a BS degree from Cornell University. After a working holiday in the Bahamas he absconded to Australia
    aboard an old Liberty Ship carrying agricultural machinery and arrived in Brisbane at 7 in the morning on Currency Day.
    He has done everything from cane cutting to scientific research to donkey trekking but is perhaps best known for his poetry
    and striking resemblance to the playwright Mammad Aidani. He lived in Byron Bay for two years and while there he wrote
    the letters collected here to various friends, acquaintances and antagonists. Since Letters from Byron he has returned
    to Victoria and now lives in Castlemaine. Painting by David Frazer of Jim ’ s house in Castlemaine.
kieran-carrol:
  name: Kieran Carroll
  sort_name: Carroll, Kieran
  books:
  - the-truth-is-longer-than-a-lie
  source_url: Carroll K.html
  image: carroll_portrait.jpg
  short_description: Kieran Carroll was born in 1968. Prior to becoming a playwright, he spent the 1990s as a regularly published
    poet, performance poet and lyricist for literary pop band, The Beautiful Few.
  long_description: 'Kieran Carroll was born in 1968. Prior to becoming a playwright, he spent the 1990s as a regularly published
    poet, performance poet and lyricist for literary pop band, The Beautiful Few. Switching forms, in 2002, his first play
    3XY OR I DIE! was judged Best Original Production at the Melbourne Fringe Festival. After moving to Sydney, his next two
    plays appeared at The Old Fitzroy Theatre. On his return to Melbourne in 2006, La Mama Theatre became the central venue
    for his work with five further plays being produced. His most recent productions include: The Giraffe’s Uncle (The Les
    Robinson Story) which has enjoyed three seasons in Sydney and Melbourne and the ongoing rock’n’roll biographical play
    Sons of Sun (The Sam Phillips Story) about Sun Records, Memphis, which was performed at the Sydney Opera House studio
    in 2014 and 2015.'
george-dreyfus:
  name: George Dreyfus
  sort_name: Dreyfus, George
  source_url: dreyfus.html
  image: dreyfusphoto.jpg
  books:
  - dont-ever-let-them-get-you
  short_description: George Dreyfus was born in Wuppertal, Germany in 1928. He left Germany in 1939 and settled in Australia.
    He was educated at Melbourne High School and later at the Vienna Academy of Music.
  long_description: George Dreyfus was born in Wuppertal, Germany in 1928. He left Germany in 1939 and settled in Australia.
    He was educated at Melbourne High School and later at the Vienna Academy of Music. After eighteen years as an orchestral
    musician he became a freelance composer in 1965. His compositions include music for film and television, operas, musicals
    and other works for the stage, symphonies, chamber music and music especially composed for children. His many appointments
    include Composer-in-Residence at the German Academy in Rome, Mishkenot Sha’ananim in Jerusalem, the University of Potsdam
    and the Conservatoriums in Beijing, Tienjing and Nanjing, China. George Dreyfus’s awards include the Creative Arts Fellowship
    (Australian National University, Canberra); the Don Banks Fellowship; the Henry Lawson prize for Outstanding Services
    to the Arts; the Order of Australia; Bundesverdienstkreuz 1.
phil-ilton:
  name: Phil Ilton
  sort_name: Ilton, Phil
  source_url: ilton.html
  image: ilton.gif
  books:
  - said-the-rat-writers-at-the-water-rat-2000-2003
  short_description: Phil Ilton has published four collections, including More than Words, Capsules (1996) and Not Just On
    the Road (based on incidents from his solo bicycle ride around Australia).
  long_description: Phil Ilton has published four collections, including More than Words, Capsules (1996) and Not Just On
    the Road (based on incidents from his solo bicycle ride around Australia). His poetry has appeared in over thirty books
    and journals including Best Australian Poems 2005 (Black Inc), Overland, Island, Going Down Swing, FourW, Imago and Envoi
    (UK). He has won many awards and featured at the 2002 Australia Poetry Festival. He has had work translated into Chinese
    for the Chung Wai Literary Monthly (Taiwan). In 1993 he co-edited Rhymes for the Times, an anthology of Australian poets.
    He was on the Executive of the FAW (Victoria) from 1993-2003. He currently has a poem displayed on Melbourne trains (Committee
    for Melbourne/Connex Moving Galleries) and his work has been performed on Radio National’s Poetica.
daniel-keene:
  name: Daniel Keene
  sort_name: Keene, Daniel
  source_url: keene.html
  image: keenephoto.jpg
  books:
  - to-whom-it-may-concern-and-other-plays
  short_description: Daniel Keene was born in Melbourne in 1955. He has written many plays including Cho Cho San, Silent Partner,
    Because You Are Mine, Low, Beneath Heaven, Terminus and The Architect’s Walk.
  long_description: Daniel Keene was born in Melbourne in 1955. He has written many plays including Cho Cho San, Silent Partner,
    Because You Are Mine, Low, Beneath Heaven, Terminus and The Architect’s Walk. He has won the South Australian Premier’s
    Prize for Drama, the Victorian Premier’s Prize for Drame (twice), the Wal Cherry Play of the Year and the New Dramatist’s
    Award, New York. He was co-founder with Ariette Taylor of the Keene/Taylor Theatre Project. With her he won the award
    for Outstanding Contribution to Theatre (Green Room Awards, 1998) and the Kenneth Myer Medallion for the Performing Arts.
    The Project’s productions of his plays featured in the Melbourne and Sydney Festivals. His plays are performed widely
    in Europe and France. He is also the author of several screenplays for movies, including the movie based on his play,
    Silent Partner (released 2001), and Tom White (released 2004).
deborah-masel:
  name: Deborah Masel
  sort_name: Masel, Deborah
  source_url: masel.html
  image: maselphoto2.jpg
  books:
  - in-the-cleft-of-the-rock
  short_description: Deborah Masel, born in 1957, was an author and teacher with a special interest in Jewish mysticism. She
    lived in Melbourne where she lectured regularly for Jewish and interfaith groups and organisations, and wrote on aspects
    of Jewish mystical tradition for various publications.
  long_description: 'Deborah Masel, born in 1957, was an author and teacher with a special interest in Jewish mysticism. She
    lived in Melbourne where she lectured regularly for Jewish and interfaith groups and organisations, and wrote on aspects
    of Jewish mystical tradition for various publications. She was a regular contributor to the Faith column in The Sunday
    Age and was a book reviewer for The Age. She is the author (under her previous name, Deborah Miller) of The Company of
    Words and The Maisonettes and she edited Sacred Fire: Torah from the Years of Fury 1939-1942, the English version of a
    mystical hassidic text discovered in the rubble of the Warsaw Ghetto after the War. In her last years she conducted regular
    classes on the weekly Torah portions and their numerous interpretations, ancient, medieval and modern. In the Cleft of
    the Rock; Writings on the Five Books of Moses is her penultimate work.'
bron-nicholls:
  name: Bron Nicholls
  sort_name: Nicholls, Bron
  source_url: nicholls.html
  image: nichollsphotothumb.jpg
  books:
  - the-humming-tree
  - an-imaginary-mother
  short_description: Bron Nicholls was born in Melbourne in 1944. After the war, her demobbed father took his family to an
    isolated region on the Broken Creek in Northern Victoria.
  long_description: 'Bron Nicholls was born in Melbourne in 1944. After the war, her demobbed father took his family to an
    isolated region on the Broken Creek in Northern Victoria. Bron’s passion for books and writing began in that lonely, vast,
    fascinating bushland. Over the years, Bron has been a nurse, art teacher, English as a second language teacher, children’s
    book illustrator and tutor in Drama and Television at Rusden State College, Victoria. Now in her sixties, she still regards
    writing as her main job. Her books before An Imaginary Mother are: Move! (Heinemann, 1974) Three Way Street (Penguin,
    1982) Mullaway (Penguin, 1986)-made into the film Mull (1988) Three Way Street (Random House, 1993) Reasons of the Heart
    (Penguin, 1994) Zeno’s Paradise (Bruce Sims Books, 2000)'
leon-piterman:
  name: Leon Piterman
  sort_name: Piterman, Leon
  source_url: piterman.html
  image: piterman.jpg
  books:
  - there-a-lot-of-it-going-around
  - living-in-covid-times
  short_description: Professor Leon Piterman is Professor of General Practice at Monash University and Director of Monash
    China GP Training.
  long_description: Professor Leon Piterman is Professor of General Practice at Monash University and Director of Monash China
    GP Training. He is the Foundation Head of the School of Primary Health Care, and past Pro-Vice Chancellor of Monash’s
    Berwick and Frankston campuses (2010-2016). He has sat on university, professional and government expert committees, and
    maintains part time clinical general practice in Moorabbin. Leon has extensive expertise in medical education, medical
    research and clinical audit. He has published widely on clinical and educational issues related to general practice, with
    particular interest in mental health and chronic disease.
anne-rittman:
  name: Anne Rittman
  sort_name: Rittman, Anne
  source_url: RittmanAndWilson.html
  image: RittmanAndWilson_Anne.jpg
  books:
  - brunswick-street-art-revolution
  short_description: Anne Rittman taught art and filmmaking in Victorian Primary and Secondary schools for over 23 years.
    She co-founded and managed Pigtale, a design studio and small manufacturing business in Brunswick Street, Fitzroy.
  long_description: Anne Rittman taught art and filmmaking in Victorian Primary and Secondary schools for over 23 years. She
    co-founded and managed Pigtale, a design studio and small manufacturing business in Brunswick Street, Fitzroy. Anne was
    the instigator and a founding member of The Women’s Gallery which ran successfully for 8 years in Brunswick Street. She
    also created the Australian Student International Film Festival which opened at ACMI in 2002, then moved to the Capital
    Theatre in 2004. Anne studied writing at RMIT, producing Telling Tales, an anthology of short stories, The Spider and
    the Fly, a short film. She also co-shot the documentary The Touched, a film made inside the walls of Maiti Nepal, an institution
    sheltering women who escaped the horrors of child trafficking in India and had returned to Nepal. Maz Wilson taught photography
    in Victorian Secondary Schools.
maz-wilson:
  name: Maz Wilson
  sort_name: Wilson, Maz
  source_url: RittmanAndWilson.html
  image: RittmanAndWilson_Maz.jpg
  books:
  - brunswick-street-art-revolution
  short_description: Maz Wilson taught photography in Victorian Secondary Schools. She travelled extensively, building a worldwide
    photographic collection.
  long_description: Maz Wilson taught photography in Victorian Secondary Schools. She travelled extensively, building a worldwide
    photographic collection. She has exhibited at the Buoyancy Gallery in Richmond and more recently in Castlemaine. She was
    a partner at Pigtale ceramic design studio. Maz designed the last mudbrick house to be built in Castlemaine. She completed
    the Professional Writing and Editing Diploma at RMIT University. Maz Wilson is the co-author of Brunswick Street, Art
    & Revolution.
jon-weaving:
  name: Jon Weaving
  sort_name: Weaving, Jon
  source_url: weaving.html
  image: weavingsmall.jpg
  books:
  - and-the-winner-is
  short_description: Jon Weaving was born in London in 1955 and now lives in Melbourne with his son. His short stories have
    appeared in both literary and popular magazines and have won numerous awards including the Olga Masters Bicentennial Award
    For Literature.
  long_description: Jon Weaving was born in London in 1955 and now lives in Melbourne with his son. His short stories have
    appeared in both literary and popular magazines and have won numerous awards including the Olga Masters Bicentennial Award
    For Literature. His works include fiction, articles, anthologies, a creative writing text for secondary students and columns
    for a national magazine. Besides having judged many literary awards he has been awards numerous grants, worked as a writer
    in residence in many areas of Australia, and in 1994 was shortlisted for the Guiness Award. His thriller, To A Wolf The
    Kill, was published by William Heinemann Australia in 1997.
rhonda-wilson:
  name: Rhonda Wilson
  sort_name: Wilson, Rhonda
  source_url: wilson.html
  image: wilsonphoto.jpg
  books:
  - shelter-an-oral-history-of-marjorie-oke-house
  short_description: Rhonda Wilson has always loved listening to people tell stories. She has worked as an actor, director,
    teacher and oral historian.
  long_description: Rhonda Wilson has always loved listening to people tell stories. She has worked as an actor, director,
    teacher and oral historian. With her theatre company 'The Tide’ she has produced plays in Melbourne, Sydney and New York,
    including many of the works of the internationally acclaimed playwright Daniel Keene. Her earlier oral history Good Talk,
    The Extraordinary Lives Of Ten Ordinary Australian Women (Penguin, 1995) was nominated for the Victorian Premier’s Prize
    in Australian Studies.
